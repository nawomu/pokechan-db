  <!-- 顔の白いマスク部分 -->
  <ellipse cx="180" cy="172" rx="42" ry="38" fill="#eeeeff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左耳(折れた大きな耳) -->
