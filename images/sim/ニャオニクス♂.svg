  <!-- 左耳内側 -->
  <path d="M 132 132 Q 122 100 115 78 Q 110 62 122 61 Q 134 61 136 82 Q 138 102 140 126 Z" fill="#c8caff" stroke="none"/>
  <!-- 左耳先端の白い光 -->
  <ellipse cx="114" cy="54" rx="9" ry="7" fill="#ffffff" stroke="none" transform="rotate(-15, 114, 54)"/>

  <!-- 右耳(少し非対称に) -->
  <path d="M 228 136 Q 246 95 255 67 Q 262 46 243 44 Q 225 44 220 75 Q 216 98 214 130 Z" fill="#4455bb" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
