  <path d="M 226 128 Q 242 96 248 74 Q 252 59 241 59 Q 229 60 226 80 Q 222 102 218 126 Z" fill="#c8caff" stroke="none"/>
  <!-- 右耳先端の白い光 -->
  <ellipse cx="250" cy="50" rx="9" ry="7" fill="#ffffff" stroke="none" transform="rotate(12, 250, 50)"/>

  <!-- 目(左) 切れ長ツンとした目 -->
  <path d="M 152 168 Q 162 161 172 163 Q 162 172 152 168 Z" fill="#2d263c" stroke="#2d263c" stroke-width="2"/>
  <ellipse cx="162" cy="165" rx="10" ry="7" fill="#1a1040" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="159" cy="163" rx="3" ry="2" fill="#ffffff" stroke="none"/>

  <!-- 目(右) -->
  <path d="M 188 163 Q 198 161 208 168 Q 198 172 188 163 Z" fill="#2d263c" stroke="#2d263c" stroke-width="2"/>
  <ellipse cx="198" cy="165" rx="10" ry="7" fill="#1a1040" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="195" cy="163" rx="3" ry="2" fill="#ffffff" stroke="none"/>

  <!-- 眉毛(白い眉) -->
  <path d="M 148 158 Q 158 153 170 155" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <path d="M 190 155 Q 202 153 210 158" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="180" rx="5" ry="4" fill="#cc8899" stroke="#2d263c" stroke-width="2"/>

  <!-- 口(ちょっとへの字) -->
  <path d="M 173 188 Q 180 193 187 188" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- ヒゲ(左) -->
  <path d="M 155 182 Q 130 178 108 172" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <path d="M 155 186 Q 130 185 106 183" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <path d="M 155 189 Q 132 193 112 200" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- ヒゲ(右) -->
  <path d="M 205 182 Q 230 178 252 172" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <path d="M 205 186 Q 230 185 254 183" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <path d="M 205 189 Q 228 193 248 200" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- 胸の白い毛モフ -->
  <path d="M 165 210 Q 180 204 195 210 Q 188 220 180 218 Q 172 220 165 210 Z" fill="#ffffff" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
</svg>