  <ellipse cx="268" cy="163" rx="16" ry="12" fill="#f0f0f8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 体(胴体) -->
  <ellipse cx="180" cy="240" rx="65" ry="75" fill="#4455bb" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹(白) -->
  <ellipse cx="178" cy="258" rx="38" ry="50" fill="#eeeeff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左足 -->
  <path d="M 148 295 Q 138 318 132 330 Q 128 340 145 342 Q 158 343 162 330 Q 165 318 162 300 Z" fill="#4455bb" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
