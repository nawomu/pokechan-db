<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尻尾(後ろ) -->
  <path d="M 210 270 Q 270 240 285 200 Q 295 170 270 160 Q 250 155 240 175 Q 232 195 250 205 Q 265 215 255 235 Q 242 255 220 265 Z" fill="#5560cc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
