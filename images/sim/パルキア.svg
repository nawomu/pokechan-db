<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尻尾(体の後ろ・先が平たいひれ状) -->
  <path d="M205,255 C250,270 290,290 305,325 C295,335 275,332 262,320 C240,300 220,280 195,268 Z" fill="#f2dcec" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="290" cy="318" rx="18" ry="11" transform="rotate(35 290 318)" fill="#e6a9cf" stroke="#2d263c" stroke-width="4"/>

  <!-- 背中の大きな青い翼状パーツ(左右・体の後ろ) -->
  <path d="M120,150 C90,120 55,90 35,55 C60,60 95,75 120,100 C140,120 145,140 140,165 Z" fill="#4a72dd" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M230,150 C260,120 295,90 315,55 C290,60 255,75 230,100 C210,120 205,140 210,165 Z" fill="#4a72dd" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M105,135 C88,112 68,92 55,72" fill="none" stroke="#3355ad" stroke-width="4" stroke-linecap="round"/>
  <path d="M245,135 C262,112 282,92 295,72" fill="none" stroke="#3355ad" stroke-width="4" stroke-linecap="round"/>

  <!-- 後ろ足(体の後ろ側) -->
  <ellipse cx="135" cy="300" rx="26" ry="20" fill="#f2dcec" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="215" cy="300" rx="26" ry="20" fill="#f2dcec" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="130" cy="313" rx="22" ry="10" fill="#e6a9cf" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="220" cy="313" rx="22" ry="10" fill="#e6a9cf" stroke="#2d263c" stroke-width="3"/>

  <!-- 胴体(卵形・真珠のような白ピンク) -->
  <ellipse cx="177" cy="215" rx="72" ry="82" fill="#f2dcec" stroke="#2d263c" stroke-width="8"/>

  <!-- お腹の白い部分 -->
  <ellipse cx="177" cy="240" rx="46" ry="52" fill="#fff5fa" stroke="#2d263c" stroke-width="3"/>

  <!-- 胸の真珠(ピンクの宝玉) -->
  <circle cx="177" cy="215" r="24" fill="#ff8fc0" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="169" cy="207" rx="7" ry="5" fill="#ffe3f2"/>

  <!-- 前足(体の手前・小さい腕) -->
  <path d="M115,225 C100,235 92,255 98,272 C108,278 120,272 122,255 C124,242 120,230 115,225 Z" fill="#f2dcec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M239,225 C254,235 262,255 256,272 C246,278 234,272 232,255 C230,242 234,230 239,225 Z" fill="#f2dcec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 首 -->
  <path d="M150,150 C150,120 158,100 177,90 C196,100 204,120 204,150 Z" fill="#f2dcec" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="177" cy="95" rx="52" ry="44" fill="#f2dcec" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭の左右のひれ(青いふち) -->
  <path d="M128,80 C108,68 92,60 78,58 C86,75 100,90 120,100 Z" fill="#4a72dd" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M226,80 C246,68 262,60 276,58 C268,75 254,90 234,100 Z" fill="#4a72dd" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭の上の小さな冠状トゲ -->
  <polygon points="163,55 177,28 191,55" fill="#4a72dd" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目 -->
  <ellipse cx="158" cy="95" rx="15" ry="17" fill="#ffffff" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="196" cy="95" rx="15" ry="17" fill="#ffffff" stroke="#2d263c" stroke-width="4"/>
  <circle cx="160" cy="98" r="8" fill="#2a6fd0"/>
  <circle cx="198" cy="98" r="8" fill="#2a6fd0"/>
  <circle cx="162" cy="95" r="3" fill="#1a1a1a"/>
  <circle cx="200" cy="95" r="3" fill="#1a1a1a"/>

  <!-- 鼻 -->
  <circle cx="170" cy="118" r="2.5" fill="#1a1a1a"/>
  <circle cx="184" cy="118" r="2.5" fill="#1a1a1a"/>

  <!-- 口 -->
  <path d="M158,128 Q177,140 196,128" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
