<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 左うで(岩のこぶし・体の後ろから) -->
  <ellipse cx="60" cy="205" rx="36" ry="30" fill="#b8916a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" transform="rotate(-12 60 205)"/>
  <!-- 右うで(岩のこぶし) -->
  <ellipse cx="300" cy="205" rx="36" ry="30" fill="#b8916a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" transform="rotate(12 300 205)"/>

  <!-- こぶしの節の線(左) -->
  <path d="M42 190 Q56 205 42 222" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- こぶしの節の線(右) -->
  <path d="M318 190 Q304 205 318 222" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 体(丸い岩) -->
  <ellipse cx="180" cy="200" rx="108" ry="103" fill="#b8916a" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 岩肌の模様(暗いしみ) -->
  <ellipse cx="118" cy="238" rx="22" ry="16" fill="#93704a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" transform="rotate(-15 118 238)"/>
  <ellipse cx="246" cy="230" rx="20" ry="15" fill="#93704a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" transform="rotate(10 246 230)"/>
  <ellipse cx="180" cy="132" rx="20" ry="12" fill="#93704a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- ひび割れ(左) -->
  <path d="M96 150 Q116 180 104 218" fill="none" stroke="#6b4f33" stroke-width="4" stroke-linecap="round"/>
  <!-- ひび割れ(右) -->
  <path d="M262 145 Q272 175 258 205" fill="none" stroke="#6b4f33" stroke-width="4" stroke-linecap="round"/>

  <!-- 底の小石ぼこぼこ(左下) -->
  <circle cx="122" cy="290" r="12" fill="#b8916a" stroke="#2d263c" stroke-width="5"/>
  <!-- 底の小石ぼこぼこ(右下) -->
  <circle cx="238" cy="288" r="13" fill="#b8916a" stroke="#2d263c" stroke-width="5"/>

  <!-- 光沢ハイライト -->
  <ellipse cx="140" cy="120" rx="30" ry="18" fill="#d8bd97" opacity="0.55" transform="rotate(-20 140 120)"/>

  <!-- まゆの岩のでっぱり(左) -->
  <path d="M126 158 Q148 142 172 156" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- まゆの岩のでっぱり(右) -->
  <path d="M188 156 Q212 142 234 158" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 目(白目・左) -->
  <circle cx="150" cy="184" r="16" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 目(白目・右) -->
  <circle cx="210" cy="184" r="16" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- ひとみ(左) -->
  <circle cx="153" cy="188" r="8" fill="#241f1a"/>
  <!-- ひとみ(右) -->
  <circle cx="207" cy="188" r="8" fill="#241f1a"/>

  <!-- 口 -->
  <path d="M160 226 Q180 236 200 226" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
