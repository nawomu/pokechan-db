<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (back) -->
  <path d="M230,210 Q255,230 245,260 Q248,280 238,290" stroke="#2d263c" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="238" cy="295" r="11" fill="#4a3a2a" stroke="#2d263c" stroke-width="5"/>
  <path d="M232,210 Q265,225 260,258 Q265,278 255,288" stroke="#2d263c" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="258" cy="293" r="11" fill="#4a3a2a" stroke="#2d263c" stroke-width="5"/>
  <path d="M224,212 Q275,220 275,255 Q278,276 268,287" stroke="#2d263c" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="270" cy="293" r="11" fill="#4a3a2a" stroke="#2d263c" stroke-width="5"/>

  <!-- body -->
  <ellipse cx="175" cy="215" rx="95" ry="65" fill="#2e2e38" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- belly white patch -->
  <ellipse cx="165" cy="230" rx="52" ry="35" fill="#c8c0b0" stroke="#2d263c" stroke-width="4"/>

  <!-- back legs -->
  <rect x="210" y="260" width="28" height="52" rx="10" fill="#2e2e38" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="224" cy="316" rx="18" ry="9" fill="#1a1a22" stroke="#2d263c" stroke-width="5"/>
  <rect x="130" y="258" width="28" height="52" rx="10" fill="#2e2e38" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="144" cy="314" rx="18" ry="9" fill="#1a1a22" stroke="#2d263c" stroke-width="5"/>

  <!-- neck -->
  <path d="M120,185 Q105,155 110,130" stroke="#2d263c" stroke-width="8" fill="#2e2e38"/>
  <ellipse cx="112" cy="165" rx="28" ry="38" fill="#2e2e38" stroke="#2d263c" stroke-width="7"/>

  <!-- head -->
  <ellipse cx="105" cy="120" rx="48" ry="42" fill="#2e2e38" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ears -->
  <path d="M68,95 Q52,68 62,52 Q72,72 78,90 Z" fill="#2e2e38" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M145,93 Q158,66 150,50 Q138,70 132,88 Z" fill="#2e2e38" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- horns (2 white-ish horns) -->
  <path d="M80,82 Q70,48 78,30 Q88,52 90,78" fill="#d4cfc0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M120,78 Q120,44 128,26 Q134,48 130,75" fill="#d4cfc0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- front legs -->
  <rect x="90" y="255" width="27" height="55" rx="10" fill="#2e2e38" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="103" cy="314" rx="18" ry="9" fill="#1a1a22" stroke="#2d263c" stroke-width="5"/>
  <rect x="56" y="252" width="27" height="55" rx="10" fill="#2e2e38" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="69" cy="311" rx="18" ry="9" fill="#1a1a22" stroke="#2d263c" stroke-width="5"/>

  <!-- face: angry brow left -->
  <path d="M72,108 Q82,100 95,105" stroke="#2d263c" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- face: angry brow right -->
  <path d="M115,103 Q127,98 138,105" stroke="#2d263c" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- eyes -->
  <ellipse cx="87" cy="114" rx="9" ry="8" fill="#e8e0c8" stroke="#2d263c" stroke-width="4"/>
  <circle cx="89" cy="115" r="5" fill="#1a1010"/>
  <ellipse cx="126" cy="112" rx="9" ry="8" fill="#e8e0c8" stroke="#2d263c" stroke-width="4"/>
  <circle cx="128" cy="113" r="5" fill="#1a1010"/>

  <!-- nose (big nostrils) -->
  <ellipse cx="98" cy="133" rx="16" ry="11" fill="#1a1a22" stroke="#2d263c" stroke-width="4"/>
  <circle cx="92" cy="132" r="5" fill="#3a2a2a"/>
  <circle cx="104" cy="133" r="5" fill="#3a2a2a"/>

  <!-- mouth (grumpy line) -->
  <path d="M88,148 Q105,155 120,148" stroke="#2d263c" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- mane / ruff around neck -->
  <path d="M80,140 Q62,155 70,175 Q85,165 100,170 Q110,155 125,168 Q140,155 138,175 Q150,160 145,140" fill="#3a3048" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
</svg>