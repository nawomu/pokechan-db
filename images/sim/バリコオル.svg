<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- バリコオル (Mr. Rime) - こおり/エスパー -->
  <!-- 見た目の特徴:
    1. 体色: 淡い空色(#a8d8ea)と白(#f0f4f8)、手足は濃い青紫(#5b6bbf)
    2. シルエット: 直立二足歩行の人型、頭に赤いポンポン
    3. 顔: 白い仮面状、赤い鼻、大きな目、ニヤリ口
    4. 模様: 胸に赤いボタン列、腹白、コート裾に縞
    5. 持ち物: 右手に氷のステッキ、赤い先端の靴
  -->

  <!-- 氷のステッキ (後ろ) -->
  <line x1="245" y1="185" x2="270" y2="295" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="270" cy="298" rx="11" ry="8" fill="#b0e0ff" stroke="#2d263c" stroke-width="5"/>
  <line x1="245" y1="185" x2="270" y2="295" stroke="#d0f0ff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- 右腕 (ステッキ持ち) -->
  <path d="M215 210 Q240 195 248 182" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M215 210 Q240 195 248 182" fill="none" stroke="#5b6bbf" stroke-width="5" stroke-linecap="round"/>

  <!-- 胴体 (コート) -->
  <path d="M138 190 Q128 200 125 240 Q122 270 128 295 Q148 310 180 312 Q212 310 232 295 Q238 270 235 240 Q232 200 222 190 Z" fill="#a8d8ea" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- お腹の白い部分 -->
  <path d="M150 195 Q150 205 148 235 Q147 258 150 280 Q160 290 180 292 Q200 290 210 280 Q213 258 212 235 Q210 205 210 195 Q195 202 180 202 Q165 202 150 195 Z" fill="#f0f4f8" stroke="none"/>

  <!-- コート裾の縞 -->
  <path d="M128 278 Q148 285 180 287 Q212 285 232 278" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M127 265 Q148 272 180 274 Q212 272 233 265" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- 左腕 -->
  <path d="M143 215 Q118 225 110 248 Q108 260 118 265" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M143 215 Q118 225 110 248 Q108 260 118 265" fill="none" stroke="#5b6bbf" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 左手グー -->
  <ellipse cx="116" cy="268" rx="14" ry="12" fill="#5b6bbf" stroke="#2d263c" stroke-width="6"/>

  <!-- 右手グー -->
  <ellipse cx="250" cy="178" rx="13" ry="12" fill="#5b6bbf" stroke="#2d263c" stroke-width="6"/>

  <!-- 脚 左 -->
  <path d="M155 305 Q150 318 148 332" stroke="#2d263c" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M155 305 Q150 318 148 332" stroke="#5b6bbf" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- 左足 (赤いつま先) -->
  <ellipse cx="144" cy="336" rx="16" ry="8" fill="#5b6bbf" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="132" cy="336" rx="8" ry="7" fill="#e03030" stroke="#2d263c" stroke-width="5"/>

  <!-- 脚 右 -->
  <path d="M205 305 Q210 318 213 332" stroke="#2d263c" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M205 305 Q210 318 213 332" stroke="#5b6bbf" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- 右足 (赤いつま先) -->
  <ellipse cx="216" cy="336" rx="16" ry="8" fill="#5b6bbf" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="228" cy="335" rx="8" ry="7" fill="#e03030" stroke="#2d263c" stroke-width="5"/>

  <!-- 首 -->
  <rect x="166" y="165" width="28" height="28" rx="8" fill="#a8d8ea" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭 (白い仮面状) -->
  <ellipse cx="180" cy="140" rx="52" ry="56" fill="#f0f4f8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭の上の水色部分 -->
  <path d="M138 128 Q142 78 180 68 Q218 78 222 128" fill="#a8d8ea" stroke="none"/>
  <path d="M136 128 Q140 76 180 65 Q220 76 224 128" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 赤いポンポン(頭頂) -->
  <circle cx="180" cy="52" r="20" fill="#e03030" stroke="#2d263c" stroke-width="7"/>
  <circle cx="174" cy="46" r="5" fill="#ff6666" stroke="none" opacity="0.7"/>

  <!-- 目 左 -->
  <ellipse cx="158" cy="138" rx="16" ry="18" fill="white" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="160" cy="140" rx="9" ry="11" fill="#4488ff" stroke="#2d263c" stroke-width="3"/>
  <circle cx="163" cy="137" r="4" fill="#1a1a6e"/>
  <circle cx="165" cy="135" r="2" fill="white"/>

  <!-- 目 右 -->
  <ellipse cx="202" cy="137" rx="16" ry="18" fill="white" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="200" cy="139" rx="9" ry="11" fill="#4488ff" stroke="#2d263c" stroke-width="3"/>
  <circle cx="197" cy="136" r="4" fill="#1a1a6e"/>
  <circle cx="199" cy="134" r="2" fill="white"/>

  <!-- 赤い鼻 -->
  <ellipse cx="180" cy="160" rx="8" ry="6" fill="#e03030" stroke="#2d263c" stroke-width="5"/>

  <!-- ニヤリ口 -->
  <path d="M162 172 Q172 182 180 183 Q188 182 198 172" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 口角のくぼみ -->
  <circle cx="162" cy="172" r="3" fill="#2d263c"/>
  <circle cx="198" cy="172" r="3" fill="#2d263c"/>

  <!-- 胸のボタン列 (赤) -->
  <circle cx="180" cy="218" r="6" fill="#e03030" stroke="#2d263c" stroke-width="4"/>
  <circle cx="180" cy="237" r="6" fill="#e03030" stroke="#2d263c" stroke-width="4"/>
  <circle cx="180" cy="256" r="5" fill="#e03030" stroke="#2d263c" stroke-width="4"/>

  <!-- 眉 左 (ちょっと困り気味) -->
  <path d="M146 120 Q158 114 168 118" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- 眉 右 -->
  <path d="M192 118 Q202 114 213 120" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

</svg>