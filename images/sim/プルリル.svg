<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail nub (behind body) -->
  <ellipse cx="180" cy="316" rx="20" ry="16" fill="#7FD4E8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- body -->
  <path d="M180,140 C232,140 262,182 266,230 C270,282 230,312 180,312 C130,312 90,282 94,230 C98,182 128,140 180,140 Z"
        fill="#7FD4E8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- belly translucent patch -->
  <ellipse cx="180" cy="262" rx="54" ry="42" fill="#C4F1F6"/>

  <!-- internal organ spots (translucent skin) -->
  <circle cx="150" cy="205" r="8" fill="#4A9CB0"/>
  <circle cx="212" cy="196" r="6" fill="#4A9CB0"/>
  <circle cx="182" cy="248" r="7" fill="#4A9CB0"/>

  <!-- head stalk -->
  <path d="M170,142 L170,92 C170,84 190,84 190,92 L190,142 Z"
        fill="#7FD4E8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- glowing bulb -->
  <circle cx="180" cy="72" r="32" fill="#FFDD55" stroke="#2d263c" stroke-width="7"/>
  <circle cx="180" cy="72" r="15" fill="#FF9E45"/>

  <!-- glow rays -->
  <path d="M150,46 L138,32" stroke="#FFDD55" stroke-width="6" stroke-linecap="round"/>
  <path d="M210,46 L222,32" stroke="#FFDD55" stroke-width="6" stroke-linecap="round"/>
  <path d="M180,34 L180,18" stroke="#FFDD55" stroke-width="6" stroke-linecap="round"/>

  <!-- blush -->
  <ellipse cx="140" cy="218" rx="9" ry="5" fill="#FFB3C6"/>
  <ellipse cx="222" cy="218" rx="9" ry="5" fill="#FFB3C6"/>

  <!-- eyes -->
  <ellipse cx="150" cy="196" rx="22" ry="26" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="212" cy="196" rx="22" ry="26" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <circle cx="150" cy="200" r="10" fill="#222222"/>
  <circle cx="212" cy="200" r="10" fill="#222222"/>
  <circle cx="146" cy="194" r="4" fill="#FFFFFF"/>
  <circle cx="208" cy="194" r="4" fill="#FFFFFF"/>

  <!-- mouth -->
  <path d="M168,232 Q180,240 192,232" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
