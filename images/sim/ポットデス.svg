  <!-- 取っ手(左側) -->
  <path d="M117 185 Q88 188 84 210 Q82 232 110 235"
        fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M117 185 Q90 188 86 210 Q84 230 112 233"
        fill="#ddd5be" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 蓋 -->
  <path d="M135 160 Q148 148 180 145 Q213 148 225 160 Q220 168 180 170 Q140 168 135 160Z"
        fill="#d4cbb5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 蓋のつまみ -->
  <ellipse cx="180" cy="142" rx="14" ry="8" fill="#c8be9f" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="180" cy="136" rx="8" ry="5" fill="#c8be9f" stroke="#2d263c" stroke-width="4"/>

  <!-- ゴースト霊体(ポットから溢れる・上) -->
  <path d="M158 158 Q145 130 148 105 Q150 88 162 82 Q170 78 175 90 Q178 75 185 72 Q195 68 198 85 Q205 70 215 75 Q225 80 220 98 Q222 118 210 140 Q200 158 180 162 Q165 160 158 158Z"
        fill="#a06fcc" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 霊体の模様(腹が少し明るい) -->
  <ellipse cx="182" cy="112" rx="22" ry="28" fill="#b888de" opacity="0.6"/>

  <!-- 顔 -->
  <!-- 左目 -->
  <ellipse cx="166" cy="105" rx="13" ry="15" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="168" cy="107" rx="7" ry="8" fill="#2d263c"/>
  <ellipse cx="170" cy="104" rx="3" ry="3" fill="white"/>

  <!-- 右目(ちょっと大きさ違う・落書き感) -->
  <ellipse cx="198" cy="103" rx="14" ry="13" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="200" cy="105" rx="8" ry="7" fill="#2d263c"/>
  <ellipse cx="202" cy="102" rx="3" ry="3" fill="white"/>

  <!-- ほっぺの赤丸 -->
  <ellipse cx="152" cy="118" rx="9" ry="7" fill="#f08080" opacity="0.75"/>
  <ellipse cx="210" cy="116" rx="9" ry="7" fill="#f08080" opacity="0.75"/>

  <!-- 口(いたずらっぽい笑い) -->
  <path d="M169 123 Q182 133 196 122" stroke="#2d263c" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- 歯っぽいの -->
  <path d="M175 127 L175 131" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <path d="M182 130 L182 135" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <path d="M189 127 L189 131" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- 眉毛(ちょっと怖い感じ) -->
  <path d="M158 92 Q166 87 174 91" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M190 90 Q198 85 206 90" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- お茶の液体(ポット内部から溢れる感じ) -->
  <path d="M155 165 Q160 172 168 170 Q175 172 180 168 Q186 172 195 170 Q202 172 206 165"
        stroke="#7b4e28" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- 小さな星/霊ドット -->
  <circle cx="125" cy="145" r="4" fill="#c09de0" opacity="0.8"/>
  <circle cx="235" cy="150" r="3" fill="#c09de0" opacity="0.8"/>
  <circle cx="140" cy="120" r="3" fill="#c09de0" opacity="0.6"/>
  <circle cx="222" cy="128" r="4" fill="#c09de0" opacity="0.6"/>
</svg>