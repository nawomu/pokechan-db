<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ゴースト霊体のはみ出し(後ろ層) -->
  <ellipse cx="180" cy="260" rx="90" ry="30" fill="#7b5ea7" opacity="0.35"/>
  <ellipse cx="178" cy="255" rx="70" ry="22" fill="#9b78c8" opacity="0.4"/>

  <!-- 霊体のもやもや(ポット周囲) -->
  <path d="M130 200 Q110 170 125 145 Q115 130 135 120" stroke="#9b78c8" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M230 195 Q255 165 240 140 Q252 125 232 115" stroke="#9b78c8" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- ポット本体(影) -->
  <ellipse cx="183" cy="245" rx="78" ry="10" fill="#5a4080" opacity="0.25"/>

  <!-- ポット本体 -->
  <path d="M115 175 Q108 220 115 255 Q130 275 180 278 Q232 276 245 255 Q253 220 247 175 Q235 155 180 152 Q126 154 115 175Z"
        fill="#e8e0cc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ポットの古びた模様(ひびっぽい線) -->
  <path d="M155 185 Q160 195 153 205" stroke="#b0a898" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M200 200 Q207 210 202 222" stroke="#b0a898" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M170 230 Q178 225 185 233" stroke="#b0a898" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ポットの青い模様(公式の紫青い絵柄) -->
  <ellipse cx="180" cy="215" rx="28" ry="20" fill="none" stroke="#7b5ea7" stroke-width="3" opacity="0.6"/>
  <path d="M162 207 Q180 200 198 207" stroke="#7b5ea7" stroke-width="2.5" fill="none" opacity="0.5"/>

  <!-- 注ぎ口(スパウト・右側) -->
  <path d="M244 185 Q272 178 278 165 Q282 155 270 150 Q258 148 248 160"
