  <!-- body -->
  <ellipse cx="180" cy="176" rx="98" ry="118" fill="#f4a7c9" stroke="#2d263c" stroke-width="8"/>
  <ellipse cx="180" cy="215" rx="52" ry="58" fill="#fbd4e8"/>

  <!-- ears -->
