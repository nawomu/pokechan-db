<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tentacles peeking from under shell -->
  <path d="M 95 300 q -25 15 -20 40 q 20 5 30 -15 Z" fill="#5fb8d6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 140 320 q -12 22 -2 40 q 20 -2 22 -22 Z" fill="#5fb8d6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 220 320 q 12 22 2 40 q -20 -2 -22 -22 Z" fill="#5fb8d6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 265 300 q 25 15 20 40 q -20 5 -30 -15 Z" fill="#5fb8d6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- body/head peeking below shell -->
  <ellipse cx="180" cy="262" rx="98" ry="76" fill="#7ecbe8" stroke="#2d263c" stroke-width="8"/>

  <!-- shell (ammonite spiral) -->
  <circle cx="180" cy="148" r="118" fill="#d3a466" stroke="#2d263c" stroke-width="8"/>
  <path d="M 180 148 C 250 148 250 78 180 78 C 132 78 128 122 170 124 C 196 125 198 106 182 102"
        fill="none" stroke="#9a6a35" stroke-width="7" stroke-linecap="round"/>
  <path d="M 60 130 A 118 118 0 0 1 120 45" fill="none" stroke="#9a6a35" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  <path d="M 300 130 A 118 118 0 0 0 240 45" fill="none" stroke="#9a6a35" stroke-width="6" stroke-linecap="round" opacity="0.55"/>

  <!-- blush -->
  <ellipse cx="120" cy="280" rx="14" ry="9" fill="#f5a3b8" opacity="0.8"/>
  <ellipse cx="240" cy="280" rx="14" ry="9" fill="#f5a3b8" opacity="0.8"/>

  <!-- eyes -->
  <circle cx="148" cy="252" r="22" fill="#fff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="212" cy="252" r="22" fill="#fff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="152" cy="256" r="10" fill="#2d263c"/>
  <circle cx="216" cy="256" r="10" fill="#2d263c"/>
  <circle cx="148" cy="250" r="3" fill="#fff"/>
  <circle cx="212" cy="250" r="3" fill="#fff"/>

  <!-- mouth -->
  <path d="M 165 296 q 15 14 30 0" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
