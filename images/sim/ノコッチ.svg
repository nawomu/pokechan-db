<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)黄色い長いイモムシ状の胴体(節がある筒) 2)背中に茶色いひし形模様が並ぶ 3)手足なし・丸くて可愛い顔(黒い丸目/赤いほっぺ/口) 4)しっぽの先が茶色い平たいパドル状 5)体色はクリームがかった黄色・輪郭は太い線 -->

  <!-- 後ろ: しっぽのパドル -->
  <ellipse cx="313" cy="216" rx="16" ry="24" transform="rotate(-18 313 216)" fill="#8a5a2c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体: 節になった丸みのある胴体(尾側から頭側へ) -->
  <circle cx="298" cy="206" r="22" fill="#f7dd7a" stroke="#2d263c" stroke-width="7"/>
  <circle cx="278" cy="200" r="32" fill="#f7dd7a" stroke="#2d263c" stroke-width="7"/>
  <circle cx="233" cy="192" r="42" fill="#f7dd7a" stroke="#2d263c" stroke-width="7"/>
  <circle cx="180" cy="182" r="50" fill="#f7dd7a" stroke="#2d263c" stroke-width="7"/>
  <circle cx="115" cy="172" r="60" fill="#f7dd7a" stroke="#2d263c" stroke-width="8"/>

  <!-- 背中のひし形模様 -->
  <rect x="286" y="167" width="16" height="16" transform="rotate(45 294 175)" fill="#8a5a2c" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <rect x="240" y="153" width="20" height="20" transform="rotate(45 250 163)" fill="#8a5a2c" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <rect x="184" y="139" width="22" height="22" transform="rotate(45 195 150)" fill="#8a5a2c" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <rect x="135" y="130" width="20" height="20" transform="rotate(45 145 140)" fill="#8a5a2c" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 顔: ほっぺ -->
  <circle cx="76" cy="178" r="11" fill="#ffb3ba"/>
  <circle cx="152" cy="170" r="10" fill="#ffb3ba"/>

  <!-- 顔: 目 -->
  <circle cx="92" cy="150" r="10" fill="#2d263c"/>
  <circle cx="133" cy="143" r="9" fill="#2d263c"/>
  <circle cx="88" cy="146" r="3" fill="#ffffff"/>
  <circle cx="130" cy="140" r="3" fill="#ffffff"/>

  <!-- 顔: 口 -->
  <path d="M98,180 Q113,191 128,178" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
