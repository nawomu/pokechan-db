<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1) 体色は青緑(ターコイズ)の丸っこいカエル型シルエット
  2) 左右のほっぺに大きく膨らんだ黄色い毒袋(頬袋)
  3) 目の周りに赤いリング状のマスク模様・黒目に白ハイライト
  4) お腹はクリーム色でその中央に黒い星(十字)模様
  5) 頭のてっぺんに小さく垂れた2本の突起(頭のコブ)
  -->

  <!-- 後ろ: 脚 -->
  <path d="M145,255 C130,272 128,295 140,313 C150,323 168,323 175,313 C180,295 172,272 160,255 Z" fill="#2f9e8f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M215,255 C230,272 232,295 220,313 C210,323 192,323 185,313 C180,295 188,272 200,255 Z" fill="#2f9e8f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ: 足 -->
  <ellipse cx="157" cy="316" rx="28" ry="13" fill="#2f9e8f" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="203" cy="316" rx="28" ry="13" fill="#2f9e8f" stroke="#2d263c" stroke-width="6"/>
  <path d="M144,322 L142,330" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M170,324 L170,332" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M190,324 L190,332" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M216,322 L218,330" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 後ろ: 腕 -->
  <path d="M110,205 C75,215 55,250 62,285 C66,298 84,300 90,286 C98,260 105,230 122,210 Z" fill="#2f9e8f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M250,205 C285,215 305,250 298,285 C294,298 276,300 270,286 C262,260 255,230 238,210 Z" fill="#2f9e8f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体: 胴体 -->
  <ellipse cx="180" cy="225" rx="95" ry="85" fill="#2f9e8f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体: お腹(クリーム色) -->
  <ellipse cx="180" cy="245" rx="58" ry="62" fill="#f7edd0" stroke="#2d263c" stroke-width="6"/>

  <!-- 体: 胸の黒い星模様 -->
  <path d="M180,205 L191,224 L213,233 L191,242 L180,262 L169,242 L147,233 L169,224 Z" fill="#2d263c" stroke="#2d263c" stroke-width="2" stroke-linejoin="round"/>

  <!-- 顔: 頭 -->
  <circle cx="180" cy="115" r="75" fill="#2f9e8f" stroke="#2d263c" stroke-width="8"/>

  <!-- 顔: 頭のコブ(左右) -->
  <path d="M140,55 C130,38 130,22 145,28 C150,42 150,55 150,60 Z" fill="#2f9e8f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M220,55 C230,38 230,22 215,28 C210,42 210,55 210,60 Z" fill="#2f9e8f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔: ほっぺの黄色い毒袋 -->
  <ellipse cx="95" cy="140" rx="38" ry="42" fill="#f4bc3c" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="265" cy="140" rx="38" ry="42" fill="#f4bc3c" stroke="#2d263c" stroke-width="7"/>

  <!-- 顔: 目の赤いリング -->
  <circle cx="150" cy="105" r="24" fill="#d8503d" stroke="#2d263c" stroke-width="6"/>
  <circle cx="210" cy="105" r="24" fill="#d8503d" stroke="#2d263c" stroke-width="6"/>

  <!-- 顔: 黒目 -->
  <circle cx="150" cy="108" r="11" fill="#2d263c"/>
  <circle cx="210" cy="108" r="11" fill="#2d263c"/>

  <!-- 顔: ハイライト -->
  <circle cx="145" cy="102" r="3.5" fill="#ffffff"/>
  <circle cx="205" cy="102" r="3.5" fill="#ffffff"/>

  <!-- 顔: 口 -->
  <path d="M158,148 Q180,162 202,148" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
