<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 髪(左右のポニーテール) -->
  <path d="M140 80 C 100 60, 70 90, 78 130 C 84 150, 110 150, 122 130" fill="#e8437a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M220 80 C 260 60, 290 90, 282 130 C 276 150, 250 150, 238 130" fill="#e8437a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭 -->
  <circle cx="180" cy="120" r="58" fill="#fbe4ea" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭のリボン模様(左右) -->
  <path d="M132 108 C 118 100, 118 118, 130 122" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M228 108 C 242 100, 242 118, 230 122" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 目 -->
  <ellipse cx="160" cy="120" rx="9" ry="12" fill="#2d263c"/>
  <ellipse cx="200" cy="120" rx="9" ry="12" fill="#2d263c"/>
  <circle cx="163" cy="116" r="2.5" fill="#fff"/>
  <circle cx="203" cy="116" r="2.5" fill="#fff"/>

  <!-- ほお -->
  <circle cx="140" cy="138" r="8" fill="#f6a8c0"/>
  <circle cx="220" cy="138" r="8" fill="#f6a8c0"/>

  <!-- 口 -->
  <path d="M170 145 Q180 153 190 145" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 胴体(ドレス風・回転ポーズ) -->
  <path d="M150 170 C 130 200, 100 230, 90 270 L 130 285 C 145 250, 160 220, 180 200 C 200 220, 215 250, 230 285 L 270 270 C 260 230, 230 200, 210 170 Z" fill="#f06090" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 中心の縦模様 -->
  <line x1="180" y1="178" x2="180" y2="230" stroke="#c23a68" stroke-width="6" stroke-linecap="round"/>

  <!-- 左腕(振り上げポーズ) -->
  <path d="M150 185 C 115 170, 90 150, 75 120" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <circle cx="72" cy="115" r="12" fill="#fbe4ea" stroke="#2d263c" stroke-width="7"/>

  <!-- 右腕(横に流すポーズ) -->
  <path d="M210 190 C 250 195, 280 210, 295 235" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <circle cx="298" cy="240" r="12" fill="#fbe4ea" stroke="#2d263c" stroke-width="7"/>

  <!-- 脚(ステップを踏む足) -->
  <path d="M150 275 C 140 300, 130 315, 110 320" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="102" cy="323" rx="16" ry="9" fill="#e8437a" stroke="#2d263c" stroke-width="6"/>

  <path d="M210 275 C 222 298, 235 305, 255 300" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="262" cy="298" rx="16" ry="9" fill="#e8437a" stroke="#2d263c" stroke-width="6"/>
</svg>
