<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 地面の影 -->
  <ellipse cx="180" cy="331" rx="130" ry="7" fill="#000000" opacity="0.15"/>

  <!-- 体(アルファベットの「A」の形・三角の穴で文字の抜き) -->
  <path d="M180,42 L332,328 L28,328 Z M180,100 L240,215 L120,215 Z"
        fill="#3b3b4a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" fill-rule="evenodd"/>

  <!-- 左あしの折れ線(質感) -->
  <path d="M118,140 Q95,220 65,295" fill="none" stroke="#241f2c" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- 右あしの折れ線(質感) -->
  <path d="M242,140 Q265,220 295,295" fill="none" stroke="#241f2c" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- 左あしの足元かげ -->
  <ellipse cx="65" cy="305" rx="22" ry="12" fill="#262230" opacity="0.5" transform="rotate(-10 65 305)"/>
  <!-- 右あしの足元かげ -->
  <ellipse cx="295" cy="305" rx="22" ry="12" fill="#262230" opacity="0.5" transform="rotate(10 295 305)"/>

  <!-- 光沢ハイライト(左上) -->
  <ellipse cx="158" cy="110" rx="12" ry="25" fill="#6a6a82" opacity="0.35" transform="rotate(-18 158 110)"/>

  <!-- 古代文字っぽい丸もよう(左あし) -->
  <circle cx="122" cy="180" r="6" fill="#201c28" opacity="0.6"/>
  <!-- 古代文字っぽい丸もよう(右あし) -->
  <circle cx="238" cy="180" r="6" fill="#201c28" opacity="0.6"/>

  <!-- 大きな目(白目) -->
  <circle cx="180" cy="275" r="44" fill="#ffffff" stroke="#2d263c" stroke-width="7"/>
  <!-- ひとみ -->
  <circle cx="170" cy="266" r="18" fill="#201c28"/>
  <!-- 目のハイライト -->
  <circle cx="160" cy="250" r="6" fill="#ffffff" opacity="0.85"/>
</svg>
