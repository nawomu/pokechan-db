<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ホルード / Bidoof SVG -->
  <!-- 体の茶色: #c8924a, 腹クリーム: #f5e4b8, ほっぺ: #e8a06a -->

  <!-- しっぽ(後ろ・平たいビーバー型) -->
  <ellipse cx="260" cy="250" rx="52" ry="28" fill="#8b5a2b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-12 260 250)"/>
  <line x1="218" y1="245" x2="308" y2="240" stroke="#6b3e1a" stroke-width="3"/>
  <line x1="220" y1="254" x2="307" y2="250" stroke="#6b3e1a" stroke-width="3"/>
  <line x1="230" y1="263" x2="300" y2="260" stroke="#6b3e1a" stroke-width="2.5"/>

  <!-- 後ろ足(左) -->
  <ellipse cx="135" cy="295" rx="28" ry="18" fill="#c8924a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 後ろ足(右) -->
  <ellipse cx="215" cy="298" rx="30" ry="17" fill="#c8924a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体(メイン) -->
  <ellipse cx="175" cy="225" rx="95" ry="90" fill="#c8924a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹の白っぽいクリーム色 -->
  <ellipse cx="170" cy="240" rx="58" ry="52" fill="#f5e4b8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 前足(左) -->
  <ellipse cx="90" cy="278" rx="22" ry="16" fill="#c8924a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-20 90 278)"/>
  <!-- 前足(右) -->
  <ellipse cx="252" cy="274" rx="22" ry="15" fill="#c8924a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(15 252 274)"/>

  <!-- 頭 -->
  <ellipse cx="175" cy="140" rx="72" ry="68" fill="#c8924a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 耳(左) -->
  <polygon points="118,88 100,55 135,72" fill="#c8924a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 耳(右) -->
  <polygon points="228,85 248,50 240,78" fill="#c8924a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 耳の内側(左) -->
  <polygon points="118,84 107,64 130,74" fill="#e8a06a"/>
  <!-- 耳の内側(右) -->
  <polygon points="232,81 244,59 242,75" fill="#e8a06a"/>

  <!-- 顔の白い部分(鼻周り・下半分) -->
  <ellipse cx="178" cy="158" rx="50" ry="44" fill="#f5e4b8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左目 -->
  <ellipse cx="148" cy="128" rx="14" ry="12" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="151" cy="131" rx="8" ry="9" fill="#2d263c"/>
  <circle cx="154" cy="128" r="3" fill="white"/>
  <!-- 右目(ちょっとぼんやり・少し小さめ) -->
  <ellipse cx="206" cy="126" rx="13" ry="11" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="208" cy="129" rx="7" ry="8" fill="#2d263c"/>
  <circle cx="211" cy="127" r="2.5" fill="white"/>

  <!-- まゆ毛(左・のんびり) -->
  <path d="M138 116 Q148 111 160 114" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <!-- まゆ毛(右・ちょっと上がってる) -->
  <path d="M196 114 Q207 108 220 113" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 鼻 -->
  <ellipse cx="178" cy="152" rx="10" ry="7" fill="#b06030" stroke="#2d263c" stroke-width="4"/>

  <!-- 口(横に伸びたのんびり顔) -->
  <path d="M155 168 Q178 175 200 168" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 出っ歯(特徴的！) -->
  <rect x="168" y="168" width="10" height="16" rx="2" fill="#fffbe8" stroke="#2d263c" stroke-width="4"/>
  <rect x="182" y="168" width="10" height="16" rx="2" fill="#fffbe8" stroke="#2d263c" stroke-width="4"/>

  <!-- ほっぺの膨らみ(左) -->
  <ellipse cx="125" cy="163" rx="22" ry="18" fill="#e8a06a" stroke="#2d263c" stroke-width="4" opacity="0.85"/>
  <!-- ほっぺの膨らみ(右) -->
  <ellipse cx="228" cy="160" rx="20" ry="17" fill="#e8a06a" stroke="#2d263c" stroke-width="4" opacity="0.85"/>

</svg>