<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)紫のドロドロぬるっとした塊 2)胴体は低く横広 3)頭から2本の触角(先に小粒) 4)大きな垂れ目 5)ぬるぬるの輪郭・口は小 -->

  <!-- 触角(2本・先に小粒) -->
  <path d="M168,150 Q160,120 150,98" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="150" cy="96" r="9" fill="#b89bd6" stroke="#2d263c" stroke-width="6"/>
  <path d="M198,150 Q208,120 218,98" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="218" cy="96" r="9" fill="#b89bd6" stroke="#2d263c" stroke-width="6"/>

  <!-- 胴体(ぬるっとした塊・低く横広) -->
  <path d="M95,230 Q90,180 130,165 Q180,150 230,165 Q280,180 275,230 Q275,275 230,278 Q180,282 130,278 Q90,275 95,230 Z" fill="#b89bd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- てかり(ぬるぬる光沢) -->
  <ellipse cx="140" cy="195" rx="22" ry="12" fill="#d6c4e8" opacity="0.7"/>
  <ellipse cx="220" cy="210" rx="14" ry="8" fill="#d6c4e8" opacity="0.6"/>

  <!-- 底の濡れ影 -->
  <path d="M110,268 Q180,278 260,268" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- 左目(大きな垂れ目) -->
  <ellipse cx="158" cy="210" rx="22" ry="24" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="162" cy="215" rx="9" ry="11" fill="#2d263c"/>
  <circle cx="159" cy="210" r="3" fill="#ffffff"/>
  <!-- 右目 -->
  <ellipse cx="208" cy="210" rx="22" ry="24" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="204" cy="215" rx="9" ry="11" fill="#2d263c"/>
  <circle cx="201" cy="210" r="3" fill="#ffffff"/>

  <!-- 眉(垂れ感) -->
  <path d="M138,188 Q150,184 162,192 M228,188 Q216,184 204,192" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 口(小・W型) -->
  <path d="M172,245 Q180,238 188,245" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
