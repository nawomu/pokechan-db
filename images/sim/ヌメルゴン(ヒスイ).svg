<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 殻(シェル)- 一番後ろ -->
  <ellipse cx="230" cy="145" rx="68" ry="58" fill="#d4b87a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="233" cy="142" rx="50" ry="43" fill="#c9a85c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="236" cy="138" rx="34" ry="29" fill="#b8934a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <ellipse cx="238" cy="136" rx="20" ry="17" fill="#a07e3a" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <!-- 殻のハイライト -->
  <path d="M 218 122 Q 228 116 238 122" fill="none" stroke="#e8d4a0" stroke-width="4" stroke-linecap="round"/>

  <!-- しっぽ -->
  <path d="M 188 255 Q 240 280 258 268 Q 275 256 262 242 Q 248 228 222 238 Q 196 248 195 258" fill="#3a5c8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- しっぽ先のぬめっとした感じ -->
  <ellipse cx="261" cy="255" rx="16" ry="12" fill="#4a6fa0" stroke="#2d263c" stroke-width="5"/>

  <!-- 体(メイン) -->
  <path d="M 98 200 Q 85 168 95 138 Q 108 105 142 98 Q 170 93 192 105 Q 215 118 218 148 Q 222 180 210 215 Q 196 250 168 262 Q 140 272 118 258 Q 96 242 98 200 Z" fill="#3a5c8a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹部(明るい青) -->
  <path d="M 120 180 Q 115 158 128 142 Q 142 128 162 130 Q 182 132 188 152 Q 194 172 186 200 Q 178 224 158 230 Q 136 234 124 214 Q 118 200 120 180 Z" fill="#6090c0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左腕 -->
  <path d="M 102 185 Q 72 180 62 195 Q 54 210 68 222 Q 82 232 102 220" fill="#3a5c8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 左手先(ぬるっと) -->
  <ellipse cx="62" cy="210" rx="14" ry="11" fill="#4a6fa0" stroke="#2d263c" stroke-width="5"/>

  <!-- 右腕 -->
  <path d="M 196 188 Q 222 178 236 190 Q 248 202 238 216 Q 226 228 208 218" fill="#3a5c8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 右手先 -->
  <ellipse cx="240" cy="204" rx="13" ry="10" fill="#4a6fa0" stroke="#2d263c" stroke-width="5"/>

  <!-- 頭部 -->
  <path d="M 108 120 Q 102 88 118 70 Q 136 50 164 52 Q 194 54 206 76 Q 218 96 210 118 Q 202 140 178 148 Q 154 156 132 146 Q 108 136 108 120 Z" fill="#3a5c8a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 左触角 -->
  <path d="M 132 60 Q 120 32 112 18" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <circle cx="110" cy="16" r="9" fill="#6090c0" stroke="#2d263c" stroke-width="6"/>

  <!-- 右触角(少しズレてる=落書き感) -->
  <path d="M 168 55 Q 178 26 188 12" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <circle cx="190" cy="10" r="8" fill="#6090c0" stroke="#2d263c" stroke-width="6"/>

  <!-- 顔 - 左目(大きめ丸目) -->
  <circle cx="138" cy="100" r="18" fill="white" stroke="#2d263c" stroke-width="6"/>
  <circle cx="142" cy="102" r="11" fill="#2d263c"/>
  <circle cx="145" cy="97" r="4" fill="white"/>

  <!-- 顔 - 右目(少し大きさ違う=味) -->
  <circle cx="176" cy="98" r="16" fill="white" stroke="#2d263c" stroke-width="6"/>
  <circle cx="180" cy="100" r="10" fill="#2d263c"/>
  <circle cx="183" cy="96" r="3" fill="white"/>

  <!-- ほっぺ(もっちり) -->
  <ellipse cx="122" cy="118" rx="13" ry="9" fill="#5080b0" stroke="#2d263c" stroke-width="3" opacity="0.7"/>
  <ellipse cx="196" cy="116" rx="11" ry="8" fill="#5080b0" stroke="#2d263c" stroke-width="3" opacity="0.7"/>

  <!-- 鼻(ちょこん) -->
  <ellipse cx="158" cy="115" rx="5" ry="3" fill="#2d263c"/>

  <!-- 口(ゆるっとした笑顔) -->
  <path d="M 142 126 Q 158 138 176 126" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ぬめり感の光沢(体) -->
  <path d="M 110 155 Q 105 140 115 132" fill="none" stroke="#7aaad0" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M 175 108 Q 190 100 196 110" fill="none" stroke="#7aaad0" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- 足(短くてずんぐり) -->
  <path d="M 128 258 Q 118 278 124 292 Q 132 304 148 298 Q 160 292 156 274" fill="#3a5c8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 172 260 Q 174 282 182 294 Q 192 304 204 296 Q 212 286 204 270" fill="#3a5c8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 足先 -->
  <ellipse cx="136" cy="296" rx="18" ry="9" fill="#4a6fa0" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="192" cy="294" rx="16" ry="9" fill="#4a6fa0" stroke="#2d263c" stroke-width="5"/>
</svg>