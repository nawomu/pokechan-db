    Q70,120 118,80
    Q148,58 180,58
    Q212,58 242,80
    Q290,120 292,192
    Z"
    fill="#39508c" stroke="#241f36" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ちぎれたマント(触手の裾・ギザギザ) -->
