  <path d="M212,66 Q233,50 227,28" fill="none" stroke="#241f36" stroke-width="8" stroke-linecap="round"/>
  <circle cx="133" cy="26" r="9" fill="#b8302a" stroke="#241f36" stroke-width="5"/>
  <circle cx="227" cy="26" r="9" fill="#b8302a" stroke="#241f36" stroke-width="5"/>

  <!-- クラゲ型の傘(頭・体) -->
