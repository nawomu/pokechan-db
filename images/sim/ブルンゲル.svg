  <!-- 中の核(赤黒い玉) -->
  <circle cx="180" cy="186" r="26" fill="#8f2c22" stroke="#241f36" stroke-width="5"/>
  <circle cx="169" cy="174" r="9" fill="#c85040"/>

  <!-- 左目 -->
  <ellipse cx="140" cy="150" rx="23" ry="27" fill="#ffffff" stroke="#241f36" stroke-width="6"/>
  <circle cx="143" cy="156" r="10" fill="#1a1626"/>
  <circle cx="138" cy="150" r="3" fill="#ffffff"/>

  <!-- 右目 -->
  <ellipse cx="220" cy="150" rx="23" ry="27" fill="#ffffff" stroke="#241f36" stroke-width="6"/>
  <circle cx="223" cy="156" r="10" fill="#1a1626"/>
  <circle cx="218" cy="150" r="3" fill="#ffffff"/>

  <!-- 吊り眉(意地悪な表情) -->
  <path d="M114,120 L156,132" stroke="#241f36" stroke-width="9" stroke-linecap="round"/>
  <path d="M246,120 L204,132" stroke="#241f36" stroke-width="9" stroke-linecap="round"/>

  <!-- ニヤリ口 -->
  <path d="M136,208 Q180,236 224,208 Q180,196 136,208 Z" fill="#1a1626" stroke="#241f36" stroke-width="5" stroke-linejoin="round"/>
  <!-- ギザギザ歯 -->
  <path d="M148,207 L145,220 M164,211 L163,224 M180,213 L180,226 M196,211 L197,224 M212,207 L215,220" stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>

