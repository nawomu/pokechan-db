<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.黄緑の芋虫型の体 2.茶色の葉っぱフードが頭を覆う 3.クリーム色の丸顔と黒い目 4.体下部に小さな緑の足2本 5.体に薄緑の縞模様 -->

  <!-- 後ろ: 足(体の下に少し隠れる) -->
  <ellipse cx="132" cy="313" rx="26" ry="15" fill="#5f9c2b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="228" cy="313" rx="26" ry="15" fill="#5f9c2b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体: 黄緑の芋虫ボディ -->
  <ellipse cx="180" cy="222" rx="98" ry="98" fill="#9ad13f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体のハイライト -->
  <ellipse cx="148" cy="185" rx="28" ry="38" fill="#c3e88a" opacity="0.55"/>

  <!-- 体の縞模様 -->
  <path d="M108,238 Q180,262 252,238" fill="none" stroke="#6fae2c" stroke-width="7" stroke-linecap="round"/>
  <path d="M115,272 Q180,294 245,272" fill="none" stroke="#6fae2c" stroke-width="7" stroke-linecap="round"/>

  <!-- 頭の葉っぱフード(左右の垂れ) -->
  <path d="M150,150 C110,150 82,190 92,225 C112,205 130,190 152,168 Z" fill="#8a6a3d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M210,150 C250,150 278,190 268,225 C248,205 230,190 208,168 Z" fill="#8a6a3d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭の葉っぱフード(上の三角) -->
  <path d="M142,132 C150,80 210,80 218,132 C198,116 162,116 142,132 Z" fill="#8a6a3d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- フードの明るい模様(小さな渦) -->
  <path d="M165,95 Q180,82 195,95 Q180,104 165,95 Z" fill="#f4e6bf"/>

  <!-- 顔: クリーム色 -->
  <ellipse cx="180" cy="168" rx="55" ry="48" fill="#fdf1d6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ほっぺ -->
  <circle cx="144" cy="182" r="9" fill="#ffb3ad" opacity="0.6"/>
  <circle cx="216" cy="182" r="9" fill="#ffb3ad" opacity="0.6"/>

  <!-- 目 -->
  <circle cx="160" cy="163" r="10" fill="#2d263c"/>
  <circle cx="200" cy="163" r="10" fill="#2d263c"/>
  <circle cx="157" cy="159" r="3" fill="#ffffff"/>
  <circle cx="197" cy="159" r="3" fill="#ffffff"/>

  <!-- 口 -->
  <path d="M166,187 Q180,197 194,187" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
