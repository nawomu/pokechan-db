<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 大きなポテッとしたクリーム色の体(だらけた座りポーズ)
  2. 目のまわりの焦げ茶色のマスク模様(眠そうな半目)
  3. だらんと長い両腕と鋭いツメ
  4. 頭のふさふさした焦げ茶のたてがみ(前髪)
  5. 短いしっぽ+先端のふさ、口を半開きにしただらしない表情
  -->

  <!-- しっぽ(後ろ・体の奥からちょこっと) -->
  <ellipse cx="288" cy="255" rx="26" ry="34" fill="#e8d9ae" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(20 288 255)"/>
  <ellipse cx="292" cy="232" rx="16" ry="20" fill="#7a4a30" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(15 292 232)"/>

  <!-- 奥の脚(座って投げ出した足) -->
  <ellipse cx="245" cy="318" rx="34" ry="20" fill="#e8d9ae" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 奥の腕(だらんと後ろへ) -->
  <path d="M260 190 Q300 220 296 275 Q294 296 272 300 Q258 298 260 278 Q268 240 240 205 Z" fill="#e8d9ae" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体(大きなポテ腹) -->
  <ellipse cx="180" cy="245" rx="98" ry="88" fill="#e8d9ae" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- お腹の明るいパッチ -->
  <ellipse cx="178" cy="270" rx="62" ry="52" fill="#f6ecd2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 手前の脚(投げ出した足) -->
  <ellipse cx="120" cy="322" rx="38" ry="22" fill="#e8d9ae" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 手前の腕(だらんと前へ垂れる・長い) -->
  <path d="M100 190 Q56 225 60 285 Q62 316 88 320 Q104 318 100 296 Q92 250 122 205 Z" fill="#e8d9ae" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 手前の手・するどいツメ -->
  <ellipse cx="76" cy="300" rx="24" ry="20" fill="#e8d9ae" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M58 300 L44 296 M62 314 L50 316 M84 316 L82 330" stroke="#2d263c" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- 首もと -->
  <rect x="150" y="150" width="60" height="46" rx="16" fill="#e8d9ae" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="120" rx="70" ry="62" fill="#e8d9ae" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 耳(丸い・両側) -->
  <ellipse cx="118" cy="90" rx="20" ry="18" fill="#e8d9ae" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="242" cy="90" rx="20" ry="18" fill="#e8d9ae" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭のふさふさ前髪(焦げ茶) -->
  <path d="M140 70 Q150 30 175 50 Q182 24 200 52 Q222 30 228 68 Q205 58 190 68 Q170 56 150 68 Z" fill="#7a4a30" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目のまわりの焦げ茶マスク模様 -->
  <path d="M118 118 Q112 92 140 88 Q168 90 168 118 Q168 138 140 140 Q116 138 118 118 Z" fill="#7a4a30" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M192 118 Q188 90 216 88 Q244 92 240 120 Q240 140 216 140 Q190 138 192 118 Z" fill="#7a4a30" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 眠そうな半目(白目+まぶた) -->
  <ellipse cx="140" cy="118" rx="15" ry="12" fill="white" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="216" cy="118" rx="15" ry="12" fill="white" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="140" cy="121" rx="7" ry="7" fill="#2d263c"/>
  <ellipse cx="216" cy="121" rx="7" ry="7" fill="#2d263c"/>
  <path d="M124 110 Q140 102 156 110" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M200 110 Q216 102 232 110" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 鼻 -->
  <ellipse cx="178" cy="148" rx="8" ry="5" fill="#5a3a24" stroke="#2d263c" stroke-width="3"/>

  <!-- だらしなく半開きの口 -->
  <path d="M148 162 Q178 190 210 160 Q195 178 178 178 Q162 178 148 162 Z" fill="#5a3a24" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M168 172 Q178 182 190 170" fill="none" stroke="#e07070" stroke-width="8" stroke-linecap="round"/>
</svg>
