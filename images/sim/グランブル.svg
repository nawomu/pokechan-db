<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.クリーム色ふわふわの細身レムール体型 2.左右非対称の目模様(右=青紫/左=ピンク) 3.大きな丸い耳 4.長い尻尾(先端が灰色) 5.ピンク色の手足と爪、にんまり口 -->

  <!-- 後ろ: 長い尻尾 -->
  <path d="M235 250 Q300 235 320 175 Q332 130 305 95 Q290 78 275 92 Q292 115 282 145 Q270 185 220 200 Z"
        fill="#f3ecd8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M285 100 Q300 90 305 95 Q315 105 305 120 Q295 112 285 100 Z"
        fill="#8d8698" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="175" cy="235" rx="62" ry="80" fill="#f7f1de" stroke="#2d263c" stroke-width="8"/>

  <!-- 足 -->
  <ellipse cx="150" cy="315" rx="24" ry="20" fill="#f7f1de" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="205" cy="315" rx="24" ry="20" fill="#f7f1de" stroke="#2d263c" stroke-width="7"/>
  <path d="M136 322 q6 12 14 4 M148 326 q6 12 14 2 M160 322 q6 12 14 4" stroke="#e598c4" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M191 322 q6 12 14 4 M203 326 q6 12 14 2 M215 322 q6 12 14 4" stroke="#e598c4" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- 腕 -->
  <path d="M120 210 Q90 225 82 260 Q78 280 95 285" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="95" cy="285" rx="18" ry="15" fill="#f7f1de" stroke="#2d263c" stroke-width="7"/>
  <path d="M85 292 q4 10 12 4 M96 295 q4 10 12 2" stroke="#e598c4" stroke-width="5" fill="none" stroke-linecap="round"/>

  <path d="M228 205 Q255 218 262 250 Q266 270 250 278" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="250" cy="278" rx="18" ry="15" fill="#f7f1de" stroke="#2d263c" stroke-width="7"/>
  <path d="M240 285 q4 10 12 4 M251 288 q4 10 12 2" stroke="#e598c4" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- お腹の毛の模様 -->
  <path d="M175 175 Q195 210 190 260 Q180 285 175 300 Q170 285 160 260 Q155 210 175 175 Z"
        fill="#fbf6ea" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 頭 -->
  <circle cx="175" cy="150" r="70" fill="#f7f1de" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳(大きな丸) -->
  <circle cx="118" cy="100" r="34" fill="#f7f1de" stroke="#2d263c" stroke-width="7"/>
  <circle cx="118" cy="102" r="18" fill="#f6d6e6" stroke="#2d263c" stroke-width="3"/>
  <circle cx="234" cy="100" r="34" fill="#f7f1de" stroke="#2d263c" stroke-width="7"/>
  <circle cx="234" cy="102" r="18" fill="#f6d6e6" stroke="#2d263c" stroke-width="3"/>

  <!-- 非対称の目まわり模様(左=ピンク・右=青紫) -->
  <path d="M120 130 Q110 150 122 170 Q140 178 152 162 Q150 140 140 128 Q130 122 120 130 Z"
        fill="#f2a6cf" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M232 130 Q244 150 232 170 Q214 178 202 162 Q204 140 214 128 Q224 122 232 130 Z"
        fill="#9a8ce0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目 -->
  <circle cx="137" cy="150" r="13" fill="#2d263c"/>
  <circle cx="141" cy="146" r="4" fill="#fff"/>
  <circle cx="216" cy="150" r="13" fill="#2d263c"/>
  <circle cx="220" cy="146" r="4" fill="#fff"/>

  <!-- 鼻 -->
  <ellipse cx="176" cy="172" rx="8" ry="6" fill="#2d263c"/>

  <!-- にんまり口 -->
  <path d="M150 185 Q176 205 202 185" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>
