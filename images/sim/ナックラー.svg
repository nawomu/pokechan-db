<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.オレンジ~茶色の丸いマウンド型の体 2.顔の下半分を占める巨大なあご(シャベル状) 3.小さい黒ビーズ目 4.胴体下のちいさい足 5.頭頂のクリーム色の模様・腹側のクリーム色 -->
  <!-- 後ろ: 影・耳のような頭頂の突起 -->
  <ellipse cx="180" cy="300" rx="95" ry="18" fill="#c96a2e" opacity="0.35"/>
  <path d="M140,95 Q150,60 168,90 Z" fill="#c9631f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M220,95 Q210,60 192,90 Z" fill="#c9631f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体: 丸いマウンド型シルエット -->
  <path d="M75,300
           Q60,190 120,130
           Q150,100 180,100
           Q210,100 240,130
           Q300,190 285,300
           Q288,325 260,328
           L100,328
           Q72,325 75,300 Z"
        fill="#e8862f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 背中の縞模様(ダーク) -->
  <path d="M130,140 Q180,120 230,140" fill="none" stroke="#b85f1f" stroke-width="9" stroke-linecap="round"/>
  <path d="M115,190 Q180,165 245,190" fill="none" stroke="#b85f1f" stroke-width="9" stroke-linecap="round"/>

  <!-- おなか(クリーム色) -->
  <ellipse cx="180" cy="275" rx="95" ry="45" fill="#fbe3ae" stroke="#2d263c" stroke-width="6"/>

  <!-- ちいさい足(左右) -->
  <ellipse cx="110" cy="322" rx="26" ry="14" fill="#c9631f" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="250" cy="322" rx="26" ry="14" fill="#c9631f" stroke="#2d263c" stroke-width="7"/>

  <!-- 上あご -->
  <path d="M95,225 Q180,190 265,225 Q250,250 180,255 Q110,250 95,225 Z"
        fill="#e8862f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 巨大な下あご(シャベル状・特徴の核) -->
  <path d="M85,235
           Q75,275 100,300
           Q140,320 180,320
           Q220,320 260,300
           Q285,275 275,235
           Q220,270 180,272
           Q140,270 85,235 Z"
        fill="#fdeecb" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 目(小さい黒ビーズ目) -->
  <circle cx="148" cy="182" r="10" fill="#1e1a26" stroke="#2d263c" stroke-width="3"/>
  <circle cx="212" cy="182" r="10" fill="#1e1a26" stroke="#2d263c" stroke-width="3"/>
  <circle cx="151" cy="178" r="2.5" fill="#fff"/>
  <circle cx="215" cy="178" r="2.5" fill="#fff"/>
</svg>
