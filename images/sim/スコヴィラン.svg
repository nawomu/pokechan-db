<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 唐辛子のしっぽ(先端) -->
  <path d="M185 300 Q195 320 188 340 Q182 348 176 342 Q170 335 178 318 Q181 308 185 300Z" fill="#C0241A" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(赤いトウガラシ本体) -->
  <ellipse cx="182" cy="230" rx="72" ry="90" fill="#E8302A" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体の左のふくらみ(ちょっと非対称) -->
  <path d="M112 215 Q95 230 105 260 Q115 285 145 295 Q165 302 182 300 Q200 302 215 295 Q245 285 258 260 Q268 228 250 213 Q225 195 182 195 Q148 196 112 215Z" fill="#E8302A" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の明るい部分 -->
  <ellipse cx="183" cy="252" rx="44" ry="38" fill="#F06050" stroke="none"/>

  <!-- 左腕(葉っぱ手) -->
  <path d="M118 230 Q92 218 80 228 Q72 238 82 248 Q92 256 112 248 Q118 242 120 235Z" fill="#4A8C3A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="80" y1="228" x2="112" y2="245" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 右腕(葉っぱ手・ちょっとずれてる) -->
  <path d="M246 238 Q272 224 285 232 Q294 240 286 252 Q276 260 254 252 Q247 246 245 240Z" fill="#4A8C3A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="285" y1="232" x2="254" y2="250" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 左足 -->
  <path d="M152 295 Q145 310 140 325 Q138 334 148 336 Q158 337 162 325 Q164 313 160 298Z" fill="#C0241A" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 右足 -->
  <path d="M212 295 Q218 310 222 324 Q225 334 215 336 Q205 337 202 325 Q199 312 205 298Z" fill="#C0241A" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ヘタ/頭部の緑の部分ベース -->
  <ellipse cx="182" cy="162" rx="58" ry="42" fill="#3A7A2C" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 葉1(左大) -->
  <path d="M142 158 Q118 132 108 112 Q102 96 115 90 Q128 85 140 105 Q152 122 148 148Z" fill="#5CAF3E" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 葉1の葉脈 -->
  <line x1="115" y1="90" x2="146" y2="148" stroke="#3A7A2C" stroke-width="3" stroke-linecap="round"/>

  <!-- 葉2(右大) -->
  <path d="M222 155 Q248 130 260 110 Q268 93 255 87 Q242 82 228 103 Q215 122 218 148Z" fill="#5CAF3E" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 葉2の葉脈 -->
  <line x1="255" y1="87" x2="220" y2="148" stroke="#3A7A2C" stroke-width="3" stroke-linecap="round"/>

  <!-- 葉3(中央上) -->
  <path d="M175 138 Q172 112 175 92 Q178 76 185 75 Q193 75 196 92 Q199 112 192 138Z" fill="#5CAF3E" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 葉3の葉脈 -->
  <line x1="185" y1="75" x2="183" y2="138" stroke="#3A7A2C" stroke-width="3" stroke-linecap="round"/>

  <!-- 緑ヘタ前面 -->
  <ellipse cx="182" cy="168" rx="55" ry="36" fill="#4A8C3A" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 緑の顔(ヘタ側・穏やか風だが少しニヤリ) -->
  <!-- 緑顔の目左 -->
  <ellipse cx="165" cy="162" rx="9" ry="10" fill="white" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="167" cy="164" rx="5" ry="5" fill="#1a1a2e"/>
  <ellipse cx="168" cy="163" rx="2" ry="2" fill="white"/>
  <!-- 緑顔の目右 -->
  <ellipse cx="200" cy="160" rx="9" ry="11" fill="white" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="202" cy="162" rx="5" ry="6" fill="#1a1a2e"/>
  <ellipse cx="203" cy="161" rx="2" ry="2" fill="white"/>
  <!-- 緑顔の口(ニヤリ) -->
  <path d="M170 175 Q183 185 196 174" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 赤い体の顔(悪そう・怒り眉) -->
  <!-- 赤顔の目左 -->
  <ellipse cx="158" cy="228" rx="14" ry="15" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="162" cy="231" rx="8" ry="8" fill="#1a1a2e"/>
  <ellipse cx="164" cy="229" rx="3" ry="3" fill="white"/>
  <!-- 怒り眉左 -->
  <path d="M145 215 Q158 208 170 214" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- 赤顔の目右 -->
  <ellipse cx="207" cy="226" rx="14" ry="16" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="210" cy="229" rx="8" ry="9" fill="#1a1a2e"/>
  <ellipse cx="212" cy="227" rx="3" ry="3" fill="white"/>
  <!-- 怒り眉右 -->
  <path d="M197 212 Q210 207 222 214" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- 赤顔の口(ギザギザ歯) -->
  <path d="M155 256 Q165 268 183 270 Q200 268 212 256" fill="#8B1515" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 歯 -->
  <path d="M163 258 L166 270 L172 258 L177 270 L183 258 L189 270 L194 258 L199 270 L204 257" fill="white" stroke="#2d263c" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ほっぺ赤み(左) -->
  <ellipse cx="140" cy="242" rx="14" ry="10" fill="#FF6B5B" opacity="0.7"/>
  <!-- ほっぺ赤み(右) -->
  <ellipse cx="226" cy="240" rx="13" ry="10" fill="#FF6B5B" opacity="0.7"/>
</svg>