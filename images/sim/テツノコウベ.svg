  <!-- おなかパネル -->
  <ellipse cx="180" cy="252" rx="33" ry="48" fill="#3a4570"/>
  <!-- 首の継ぎ目ライン -->
  <path d="M150,178 Q180,188 210,178" fill="none" stroke="#3a4570" stroke-width="4" stroke-linecap="round"/>

  <!-- 頭(横に平たいブーメラン型) -->
