  <circle cx="150" cy="139" r="6" fill="#20121a"/>
  <circle cx="147.5" cy="136.5" r="2" fill="white"/>
  <!-- 右目 -->
  <circle cx="210" cy="139" r="6" fill="#20121a"/>
  <circle cx="207.5" cy="136.5" r="2" fill="white"/>

  <!-- 左うで -->
  <line x1="128" y1="220" x2="93" y2="246" stroke="#1c2340" stroke-width="10" stroke-linecap="round"/>
  <circle cx="88" cy="251" r="11" fill="#1c2340" stroke="#2d263c" stroke-width="6"/>
  <!-- 右うで -->
  <line x1="232" y1="220" x2="267" y2="246" stroke="#1c2340" stroke-width="10" stroke-linecap="round"/>
  <circle cx="272" cy="251" r="11" fill="#1c2340" stroke="#2d263c" stroke-width="6"/>

  <!-- 左あし -->
  <line x1="155" y1="300" x2="140" y2="323" stroke="#1c2340" stroke-width="11" stroke-linecap="round"/>
  <circle cx="137" cy="328" r="11" fill="#1c2340" stroke="#2d263c" stroke-width="7"/>
  <!-- 右あし -->
  <line x1="205" y1="300" x2="220" y2="323" stroke="#1c2340" stroke-width="11" stroke-linecap="round"/>
  <circle cx="223" cy="328" r="11" fill="#1c2340" stroke="#2d263c" stroke-width="7"/>

  <!-- しっぽ(ひれ) -->
  <path d="M175,295 Q159,318 168,334 Q180,322 190,334 Q199,318 185,295 Z" fill="#1c2340" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- しっぽ先の赤アクセント -->
  <path d="M172,326 L180,338 L188,326 Z" fill="#e8232f"/>
</svg>
