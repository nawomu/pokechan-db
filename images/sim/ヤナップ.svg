<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body) -->
  <path d="M225,255 Q290,250 300,190 Q308,140 270,120" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <path d="M225,255 Q290,250 300,190 Q308,140 270,120" fill="none" stroke="#5aa84a" stroke-width="22" stroke-linecap="round"/>
  <ellipse cx="266" cy="115" rx="22" ry="16" fill="#3f8f3a" stroke="#2d263c" stroke-width="7"/>

  <!-- back leg -->
  <ellipse cx="215" cy="285" rx="26" ry="34" fill="#4f9c42" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="212" cy="315" rx="20" ry="14" fill="#f3e3b0" stroke="#2d263c" stroke-width="7"/>

  <!-- body -->
  <ellipse cx="180" cy="230" rx="62" ry="70" fill="#5aac48" stroke="#2d263c" stroke-width="8"/>
  <!-- belly patch -->
  <ellipse cx="180" cy="245" rx="34" ry="42" fill="#f3e3b0" stroke="#2d263c" stroke-width="6"/>

  <!-- front leg -->
  <ellipse cx="150" cy="290" rx="26" ry="34" fill="#5aac48" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="148" cy="320" rx="20" ry="14" fill="#f3e3b0" stroke="#2d263c" stroke-width="7"/>

  <!-- back arm -->
  <ellipse cx="238" cy="210" rx="20" ry="42" fill="#4f9c42" stroke="#2d263c" stroke-width="7" transform="rotate(20 238 210)"/>
  <circle cx="252" cy="248" r="16" fill="#f3e3b0" stroke="#2d263c" stroke-width="7"/>

  <!-- front arm -->
  <ellipse cx="122" cy="205" rx="20" ry="42" fill="#5aac48" stroke="#2d263c" stroke-width="7" transform="rotate(-18 122 205)"/>
  <circle cx="108" cy="244" r="16" fill="#f3e3b0" stroke="#2d263c" stroke-width="7"/>

  <!-- ears -->
  <circle cx="128" cy="132" r="20" fill="#4f9c42" stroke="#2d263c" stroke-width="7"/>
  <circle cx="128" cy="132" r="10" fill="#f3e3b0"/>
  <circle cx="234" cy="132" r="20" fill="#4f9c42" stroke="#2d263c" stroke-width="7"/>
  <circle cx="234" cy="132" r="10" fill="#f3e3b0"/>

  <!-- head -->
  <circle cx="181" cy="150" r="66" fill="#5aac48" stroke="#2d263c" stroke-width="8"/>

  <!-- leaf hair cluster on top -->
  <path d="M181,95 Q160,55 178,30 Q186,60 190,90 Z" fill="#3f8f3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M181,98 Q205,50 236,45 Q220,80 196,100 Z" fill="#4f9c42" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M181,98 Q150,60 122,58 Q145,90 168,102 Z" fill="#4f9c42" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- face patch -->
  <ellipse cx="181" cy="172" rx="44" ry="36" fill="#f3e3b0" stroke="#2d263c" stroke-width="6"/>

  <!-- eyes -->
  <circle cx="163" cy="160" r="8" fill="#2d263c"/>
  <circle cx="200" cy="160" r="8" fill="#2d263c"/>

  <!-- nose/mouth -->
  <circle cx="181" cy="178" r="4" fill="#2d263c"/>
  <path d="M170,190 Q181,198 192,190" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
