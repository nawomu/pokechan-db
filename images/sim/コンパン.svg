<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.4枚の透き通った羽(上2枚大きめ・下2枚小さめ) 2.黄色と黒のしましま丸い体(ハチ風) 3.体の下にピンクのふわふわ綿毛のふち 4.顔の大部分を占める大きな青い複眼2つ 5.先が丸い細い触角2本 -->

  <!-- 後ろ: 羽(上側・大) -->
  <ellipse cx="108" cy="118" rx="52" ry="30" fill="#e8f7fb" stroke="#2d263c" stroke-width="6" transform="rotate(-25 108 118)"/>
  <ellipse cx="252" cy="118" rx="52" ry="30" fill="#e8f7fb" stroke="#2d263c" stroke-width="6" transform="rotate(25 252 118)"/>
  <!-- 後ろ: 羽(下側・小) -->
  <ellipse cx="98" cy="178" rx="36" ry="20" fill="#dcf1f8" stroke="#2d263c" stroke-width="6" transform="rotate(-15 98 178)"/>
  <ellipse cx="262" cy="178" rx="36" ry="20" fill="#dcf1f8" stroke="#2d263c" stroke-width="6" transform="rotate(15 262 178)"/>

  <!-- 触角 -->
  <path d="M150 100 Q135 55 120 40" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="118" cy="37" r="9" fill="#3a3550" stroke="#2d263c" stroke-width="6"/>
  <path d="M210 100 Q225 55 240 40" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="242" cy="37" r="9" fill="#3a3550" stroke="#2d263c" stroke-width="6"/>

  <!-- ピンクのふわふわ綿毛のふち(体の下) -->
  <circle cx="122" cy="270" r="26" fill="#f9c3da" stroke="#2d263c" stroke-width="6"/>
  <circle cx="160" cy="286" r="28" fill="#f9c3da" stroke="#2d263c" stroke-width="6"/>
  <circle cx="200" cy="286" r="28" fill="#f9c3da" stroke="#2d263c" stroke-width="6"/>
  <circle cx="238" cy="270" r="26" fill="#f9c3da" stroke="#2d263c" stroke-width="6"/>

  <!-- 体本体(黄色い丸・ハチ模様) -->
  <ellipse cx="180" cy="200" rx="95" ry="88" fill="#f7d84a" stroke="#2d263c" stroke-width="8"/>
  <!-- 黒しま -->
  <path d="M92 175 Q180 195 268 175 Q268 190 268 195 Q180 216 92 195 Q92 190 92 175 Z" fill="#2d263c"/>
  <path d="M97 235 Q180 253 263 235 Q261 249 259 254 Q180 272 101 254 Q99 249 97 235 Z" fill="#2d263c"/>

  <!-- 顔:大きな青い複眼2つ -->
  <ellipse cx="140" cy="182" rx="42" ry="46" fill="#3fa9dc" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="220" cy="182" rx="42" ry="46" fill="#3fa9dc" stroke="#2d263c" stroke-width="7"/>
  <!-- 目のハイライト -->
  <ellipse cx="128" cy="168" rx="12" ry="15" fill="#eaf8ff"/>
  <ellipse cx="208" cy="168" rx="12" ry="15" fill="#eaf8ff"/>
  <!-- 瞳 -->
  <circle cx="148" cy="190" r="9" fill="#1c2230"/>
  <circle cx="228" cy="190" r="9" fill="#1c2230"/>

  <!-- 小さな口 -->
  <path d="M172 232 Q180 238 188 232" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
