<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1) 白い犬(狼)のような細身の体・長い脚
  2) 背中〜尻尾にかけて青紫のリボン状の飾りが2本ひらめく
  3) 額に黄色いダイヤ(宝石)の飾り
  4) 背中と脚に青いV字(矢羽根)模様
  5) 首まわりに白いふわふわのたてがみ・尻尾の先は青い房
  -->

  <!-- 後ろ: リボン(紫)2本 -->
  <path d="M150 175 C 190 130, 175 90, 205 55 C 215 70, 195 95, 215 100 C 235 105, 225 75, 235 60"
        fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M150 175 C 190 130, 175 90, 205 55 C 215 70, 195 95, 215 100 C 235 105, 225 75, 235 60"
        fill="none" stroke="#7a4fb5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M160 185 C 210 150, 205 110, 240 85 C 248 100, 225 120, 248 128 C 268 135, 258 105, 270 92"
        fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M160 185 C 210 150, 205 110, 240 85 C 248 100, 225 120, 248 128 C 268 135, 258 105, 270 92"
        fill="none" stroke="#9b6fd1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 尻尾 -->
  <path d="M95 210 C 55 190, 45 150, 60 115 C 75 130, 70 155, 95 170"
        fill="#f4f6fb" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="58" cy="110" rx="26" ry="20" fill="#2a5fb0" stroke="#2d263c" stroke-width="8"/>

  <!-- 脚(奥側2本) -->
  <path d="M120 250 C 118 280, 116 305, 118 320 L 142 320 C 140 300, 142 275, 140 250 Z"
        fill="#f4f6fb" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M215 255 C 213 282, 212 305, 214 320 L 238 320 C 236 300, 238 278, 236 255 Z"
        fill="#f4f6fb" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <ellipse cx="175" cy="228" rx="98" ry="58" fill="#f4f6fb" stroke="#2d263c" stroke-width="8"/>

  <!-- 脚(手前側2本) -->
  <path d="M90 258 C 87 285, 85 308, 88 322 L 116 322 C 113 302, 115 278, 112 258 Z"
        fill="#f4f6fb" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M242 260 C 240 285, 239 308, 242 322 L 270 322 C 267 302, 269 280, 266 260 Z"
        fill="#f4f6fb" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 足首の青い模様 -->
  <path d="M118 300 L 142 300 L 140 314 L 120 314 Z" fill="#2a5fb0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M90 302 L 114 302 L 112 316 L 92 316 Z" fill="#2a5fb0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M244 304 L 268 304 L 266 318 L 246 318 Z" fill="#2a5fb0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 背中の青いV字模様 -->
  <path d="M110 205 L 135 190 L 160 205" fill="none" stroke="#2a5fb0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M155 200 L 182 183 L 209 200" fill="none" stroke="#2a5fb0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M205 205 L 230 190 L 250 205" fill="none" stroke="#2a5fb0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 首まわりのふわふわ白たてがみ -->
  <path d="M225 130 C 215 105, 235 95, 245 115 C 250 90, 275 92, 275 118 C 290 100, 308 115, 298 138 C 315 135, 320 158, 300 168 L 232 190 Z"
        fill="#ffffff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <circle cx="270" cy="148" r="56" fill="#f4f6fb" stroke="#2d263c" stroke-width="8"/>
  <!-- マズル -->
  <ellipse cx="305" cy="165" rx="30" ry="21" fill="#ffffff" stroke="#2d263c" stroke-width="7"/>

  <!-- 耳(青) -->
  <path d="M238 108 L 232 70 L 262 100 Z" fill="#2a5fb0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M282 96 L 292 58 L 306 92 Z" fill="#2a5fb0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 額のダイヤ(黄) -->
  <path d="M262 108 L 278 90 L 294 108 L 278 126 Z" fill="#f4cd4a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 顔の青ライン -->
  <path d="M278 126 C 285 140, 295 150, 310 155" fill="none" stroke="#2a5fb0" stroke-width="7" stroke-linecap="round"/>

  <!-- 目 -->
  <ellipse cx="292" cy="140" rx="11" ry="13" fill="#173a72" stroke="#2d263c" stroke-width="5"/>
  <circle cx="296" cy="135" r="3.5" fill="#ffffff"/>

  <!-- 鼻 -->
  <ellipse cx="328" cy="168" rx="6" ry="5" fill="#2d263c"/>
</svg>
