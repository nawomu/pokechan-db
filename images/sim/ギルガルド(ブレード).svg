  <ellipse cx="157" cy="80" rx="5" ry="4" fill="#cc0000" stroke="#2d263c" stroke-width="2.5"/>
  <!-- 王冠の宝石(右) -->
  <ellipse cx="203" cy="80" rx="5" ry="4" fill="#cc0000" stroke="#2d263c" stroke-width="2.5"/>
