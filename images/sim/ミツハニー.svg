<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.丸い黄色い頭+黒い目2つ+小さな触角 2.下にハチの巣模様(六角形)のハート型ボディ 3.背中に透明な羽根2枚 4.黄色地に焦げ茶の縞・斑点 5.脚がなく浮遊する丸っこいシルエット -->

  <!-- 後ろ: 透明な羽根 -->
  <ellipse cx="118" cy="150" rx="42" ry="66" fill="#eaf6ff" fill-opacity="0.55" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-18 118 150)"/>
  <ellipse cx="242" cy="150" rx="42" ry="66" fill="#eaf6ff" fill-opacity="0.55" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(18 242 150)"/>

  <!-- 体: ハート型のハチの巣ボディ(下半分) -->
  <path d="M180 190 C 120 150, 70 190, 90 245 C 105 285, 150 305, 180 335 C 210 305, 255 285, 270 245 C 290 190, 240 150, 180 190 Z"
        fill="#e0a83a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ハチの巣の六角形模様 -->
  <polygon points="150,215 163,208 176,215 176,229 163,236 150,229" fill="#c98a20" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="184,215 197,208 210,215 210,229 197,236 184,229" fill="#c98a20" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="167,245 180,238 193,245 193,259 180,266 167,259" fill="#c98a20" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="133,245 146,238 159,245 159,259 146,266 133,259" fill="#c98a20" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="201,245 214,238 227,245 227,259 214,266 201,259" fill="#c98a20" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="180,278 193,271 206,278 206,292 193,299 180,292" fill="#c98a20" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="154,278 167,271 180,278 180,292 167,299 154,292" fill="#c98a20" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 頭: 丸い黄色い顔 -->
  <circle cx="180" cy="140" r="88" fill="#f6cf4a" stroke="#2d263c" stroke-width="8"/>

  <!-- 触角 -->
  <path d="M150 68 C 140 45, 125 38, 112 40" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="110" cy="39" r="8" fill="#2d263c"/>
  <path d="M210 68 C 220 45, 235 38, 248 40" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="250" cy="39" r="8" fill="#2d263c"/>

  <!-- 頬の縞模様(焦げ茶) -->
  <path d="M96 150 C 96 120, 110 100, 130 92" fill="none" stroke="#c98a20" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <path d="M264 150 C 264 120, 250 100, 230 92" fill="none" stroke="#c98a20" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

  <!-- 目 -->
  <ellipse cx="150" cy="140" rx="16" ry="20" fill="#2d263c"/>
  <ellipse cx="210" cy="140" rx="16" ry="20" fill="#2d263c"/>
  <circle cx="155" cy="132" r="5" fill="#ffffff"/>
  <circle cx="215" cy="132" r="5" fill="#ffffff"/>

  <!-- ほっぺ -->
  <circle cx="128" cy="168" r="12" fill="#f39a6b" opacity="0.7"/>
  <circle cx="232" cy="168" r="12" fill="#f39a6b" opacity="0.7"/>

  <!-- 口 -->
  <path d="M168 178 Q180 190 192 178" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
