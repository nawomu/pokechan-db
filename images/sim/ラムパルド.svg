<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail -->
  <path d="M215 280 Q260 310 275 295 Q285 275 255 265 Q240 260 220 268" fill="#6b8499" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- left leg -->
  <path d="M148 255 Q138 270 130 295 Q128 308 140 310 Q155 312 162 295 Q165 278 160 262" fill="#7a8fa6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- left foot -->
  <path d="M130 305 Q118 318 126 325 Q134 330 148 318 Q158 308 155 300" fill="#5c7080" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- right leg -->
  <path d="M195 258 Q202 272 206 295 Q208 310 222 308 Q234 305 228 290 Q222 272 212 260" fill="#7a8fa6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- right foot -->
  <path d="M206 298 Q210 315 222 322 Q232 326 238 316 Q242 305 228 298" fill="#5c7080" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- body -->
  <ellipse cx="180" cy="245" rx="58" ry="52" fill="#7a8fa6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- belly -->
  <ellipse cx="178" cy="252" rx="34" ry="35" fill="#d8e8f0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- left arm -->
  <path d="M128 228 Q108 238 100 255 Q96 268 110 272 Q122 274 132 255 Q138 242 135 230" fill="#7a8fa6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- left hand claws -->
  <path d="M100 268 Q90 278 92 286 Q98 282 106 278" fill="#5c7080" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M108 273 Q102 284 106 290 Q112 284 116 276" fill="#5c7080" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- right arm -->
  <path d="M228 230 Q248 240 255 256 Q258 268 246 270 Q234 272 226 254 Q220 240 224 228" fill="#7a8fa6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- right hand claws -->
  <path d="M254 264 Q264 274 262 282 Q256 278 248 274" fill="#5c7080" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M246 270 Q252 280 248 286 Q242 280 240 272" fill="#5c7080" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- neck -->
  <path d="M158 200 Q155 218 152 232 Q165 236 180 235 Q194 235 205 230 Q202 216 200 200" fill="#7a8fa6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- HEAD dome - the big feature -->
  <ellipse cx="180" cy="148" rx="72" ry="65" fill="#7a8fa6" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>
  <!-- dome highlight (slightly darker flat zone on top) -->
  <ellipse cx="178" cy="128" rx="50" ry="38" fill="#8fafc4" stroke="none"/>
  <!-- face area / lower head lighter -->
  <ellipse cx="180" cy="182" rx="52" ry="30" fill="#8fafc4" stroke="none"/>
  <!-- rear spike left (back of dome) -->
  <path d="M128 122 Q112 92 118 72 Q124 60 134 75 Q140 90 138 118" fill="#e8eef2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- rear spike right -->
  <path d="M232 120 Q248 90 242 70 Q236 58 226 73 Q220 88 222 116" fill="#e8eef2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- front spike left (smaller, on brow) -->
  <path d="M150 112 Q138 86 146 72 Q152 64 158 78 Q162 92 158 110" fill="#e8eef2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- front spike right -->
  <path d="M210 112 Q222 86 214 72 Q208 64 202 78 Q198 92 202 110" fill="#e8eef2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- left eye white -->
  <ellipse cx="157" cy="182" rx="16" ry="14" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- right eye white -->
  <ellipse cx="204" cy="181" rx="15" ry="14" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- left eye red iris -->
  <ellipse cx="160" cy="183" rx="9" ry="10" fill="#e03030" stroke="#2d263c" stroke-width="3"/>
  <!-- right eye red iris -->
  <ellipse cx="206" cy="182" rx="9" ry="10" fill="#e03030" stroke="#2d263c" stroke-width="3"/>
  <!-- pupils -->
  <ellipse cx="162" cy="185" rx="4" ry="5" fill="#1a1a2e"/>
  <ellipse cx="208" cy="184" rx="4" ry="5" fill="#1a1a2e"/>
  <!-- eye shine -->
  <ellipse cx="165" cy="182" rx="2" ry="2" fill="white"/>
  <ellipse cx="211" cy="181" rx="2" ry="2" fill="white"/>
  <!-- red cheek marks -->
  <ellipse cx="144" cy="196" rx="11" ry="7" fill="#e05050" stroke="none" opacity="0.85"/>
  <ellipse cx="216" cy="195" rx="11" ry="7" fill="#e05050" stroke="none" opacity="0.85"/>
  <!-- mouth - slightly dumb open grin -->
  <path d="M168 204 Q180 214 192 204" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- tiny nostril -->
  <ellipse cx="175" cy="198" rx="3" ry="2" fill="#4a5e6e"/>
  <ellipse cx="185" cy="198" rx="3" ry="2" fill="#4a5e6e"/>
</svg>