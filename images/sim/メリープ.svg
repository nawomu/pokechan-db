<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (back) -->
  <path d="M260,225 Q290,235 300,262" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="308" cy="268" r="20" fill="#FFD84D" stroke="#2d263c" stroke-width="6"/>
  <circle cx="302" cy="262" r="7" fill="#FFF3B0"/>

  <!-- body: main wool silhouette -->
  <ellipse cx="180" cy="195" rx="100" ry="90" fill="#BFE6F2" stroke="#2d263c" stroke-width="8"/>

  <!-- wool bumps for fluffy edge -->
  <circle cx="95" cy="150" r="36" fill="#BFE6F2" stroke="#2d263c" stroke-width="7"/>
  <circle cx="135" cy="90" r="38" fill="#BFE6F2" stroke="#2d263c" stroke-width="7"/>
  <circle cx="185" cy="72" r="40" fill="#BFE6F2" stroke="#2d263c" stroke-width="7"/>
  <circle cx="235" cy="90" r="38" fill="#BFE6F2" stroke="#2d263c" stroke-width="7"/>
  <circle cx="275" cy="150" r="36" fill="#BFE6F2" stroke="#2d263c" stroke-width="7"/>
  <circle cx="285" cy="195" r="34" fill="#BFE6F2" stroke="#2d263c" stroke-width="7"/>
  <circle cx="85" cy="195" r="34" fill="#BFE6F2" stroke="#2d263c" stroke-width="7"/>
  <circle cx="250" cy="245" r="30" fill="#BFE6F2" stroke="#2d263c" stroke-width="7"/>
  <circle cx="110" cy="245" r="30" fill="#BFE6F2" stroke="#2d263c" stroke-width="7"/>

  <!-- floppy ears -->
  <path d="M125,130 C90,150 80,220 95,265 C115,250 130,190 125,130 Z" fill="#BFE6F2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M235,130 C270,150 280,220 265,265 C245,250 230,190 235,130 Z" fill="#BFE6F2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- legs -->
  <rect x="96" y="295" width="28" height="40" rx="14" fill="#F6DC6E" stroke="#2d263c" stroke-width="7"/>
  <rect x="136" y="295" width="28" height="40" rx="14" fill="#F6DC6E" stroke="#2d263c" stroke-width="7"/>
  <rect x="196" y="295" width="28" height="40" rx="14" fill="#F6DC6E" stroke="#2d263c" stroke-width="7"/>
  <rect x="236" y="295" width="28" height="40" rx="14" fill="#F6DC6E" stroke="#2d263c" stroke-width="7"/>

  <!-- face -->
  <ellipse cx="180" cy="225" rx="55" ry="55" fill="#F6DC6E" stroke="#2d263c" stroke-width="7"/>

  <!-- eyes -->
  <circle cx="160" cy="218" r="9" fill="#2d263c"/>
  <circle cx="200" cy="218" r="9" fill="#2d263c"/>
  <circle cx="163" cy="215" r="3" fill="#ffffff"/>
  <circle cx="203" cy="215" r="3" fill="#ffffff"/>

  <!-- mouth -->
  <path d="M168,248 Q180,256 192,248" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- cheeks -->
  <circle cx="145" cy="235" r="10" fill="#F7B8C4"/>
  <circle cx="215" cy="235" r="10" fill="#F7B8C4"/>
</svg>
