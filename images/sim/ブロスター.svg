<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尻尾 -->
  <ellipse cx="260" cy="255" rx="22" ry="13" fill="#4a7fc1" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="278" cy="248" rx="13" ry="9" fill="#3a6aaa" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 甲羅(後ろ・一番奥) -->
  <ellipse cx="182" cy="200" rx="90" ry="80" fill="#8b4513" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 甲羅の縁(やや明るい茶) -->
  <ellipse cx="182" cy="200" rx="82" ry="72" fill="#a0522d" stroke="none"/>
  <!-- 甲羅の模様(亀甲) -->
  <polygon points="182,140 210,163 200,195 164,195 154,163" fill="#7a3a10" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="182,200 210,195 225,220 182,235 139,220 154,195" fill="#7a3a10" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <line x1="182" y1="140" x2="182" y2="235" stroke="#2d263c" stroke-width="3"/>
  <line x1="154" y1="163" x2="139" y2="220" stroke="#2d263c" stroke-width="3"/>
  <line x1="210" y1="163" x2="225" y2="220" stroke="#2d263c" stroke-width="3"/>

  <!-- 左足(後ろ) -->
  <ellipse cx="128" cy="300" rx="28" ry="18" fill="#4a7fc1" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-10,128,300)"/>
  <!-- 左足つめ -->
  <ellipse cx="108" cy="310" rx="8" ry="5" fill="#3a6aaa" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="120" cy="315" rx="8" ry="5" fill="#3a6aaa" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="134" cy="316" rx="7" ry="5" fill="#3a6aaa" stroke="#2d263c" stroke-width="5"/>

  <!-- 右足 -->
  <ellipse cx="232" cy="300" rx="28" ry="18" fill="#4a7fc1" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(10,232,300)"/>
  <!-- 右足つめ -->
  <ellipse cx="215" cy="315" rx="7" ry="5" fill="#3a6aaa" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="230" cy="316" rx="8" ry="5" fill="#3a6aaa" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="245" cy="312" rx="8" ry="5" fill="#3a6aaa" stroke="#2d263c" stroke-width="5"/>

  <!-- 体(胴体) -->
  <ellipse cx="180" cy="245" rx="75" ry="72" fill="#5a8fd4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹(薄い青) -->
  <ellipse cx="180" cy="258" rx="48" ry="52" fill="#a8c8f0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左腕 -->
  <ellipse cx="110" cy="225" rx="22" ry="35" fill="#5a8fd4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-20,110,225)"/>
  <!-- 左腕つめ -->
  <ellipse cx="96" cy="252" rx="7" ry="5" fill="#3a6aaa" stroke="#2d263c" stroke-width="5" transform="rotate(-20,96,252)"/>
  <ellipse cx="107" cy="260" rx="7" ry="5" fill="#3a6aaa" stroke="#2d263c" stroke-width="5" transform="rotate(-10,107,260)"/>
  <ellipse cx="120" cy="263" rx="7" ry="5" fill="#3a6aaa" stroke="#2d263c" stroke-width="5"/>

  <!-- 右腕 -->
  <ellipse cx="250" cy="225" rx="22" ry="35" fill="#5a8fd4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(20,250,225)"/>
  <!-- 右腕つめ -->
  <ellipse cx="240" cy="263" rx="7" ry="5" fill="#3a6aaa" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="253" cy="260" rx="7" ry="5" fill="#3a6aaa" stroke="#2d263c" stroke-width="5" transform="rotate(10,253,260)"/>
  <ellipse cx="264" cy="252" rx="7" ry="5" fill="#3a6aaa" stroke="#2d263c" stroke-width="5" transform="rotate(20,264,252)"/>

  <!-- 首・頭ベース -->
  <ellipse cx="180" cy="172" rx="62" ry="58" fill="#5a8fd4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 耳(頭の両サイドの丸いコブ) -->
  <ellipse cx="128" cy="145" rx="18" ry="22" fill="#5a8fd4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="232" cy="142" rx="16" ry="20" fill="#5a8fd4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- キャノン左(大砲・甲羅から出てる) -->
  <rect x="82" y="160" width="32" height="52" rx="12" ry="12" fill="#7a7a7a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="98" cy="158" rx="18" ry="11" fill="#555" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="98" cy="159" rx="10" ry="6" fill="#222" stroke="none"/>

  <!-- キャノン右(大砲) -->
  <rect x="246" y="157" width="32" height="52" rx="12" ry="12" fill="#7a7a7a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="262" cy="155" rx="18" ry="11" fill="#555" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="262" cy="156" rx="10" ry="6" fill="#222" stroke="none"/>

  <!-- 顔 -->
  <!-- 眉毛(太くて険しい) -->
  <path d="M148,148 Q162,138 176,144" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M184,144 Q198,138 212,148" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 目(白目) -->
  <ellipse cx="162" cy="162" rx="16" ry="15" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="200" cy="160" rx="15" ry="15" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 黒目 -->
  <ellipse cx="165" cy="164" rx="9" ry="10" fill="#1a1a2e"/>
  <ellipse cx="203" cy="162" rx="8" ry="10" fill="#1a1a2e"/>
  <!-- ハイライト -->
  <ellipse cx="168" cy="160" rx="3" ry="3" fill="white"/>
  <ellipse cx="206" cy="158" rx="3" ry="3" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="181" cy="178" rx="5" ry="4" fill="#3a6aaa" stroke="#2d263c" stroke-width="3"/>

  <!-- 口 -->
  <path d="M158,190 Q180,200 204,190" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- 牙(左) -->
  <polygon points="163,192 158,205 170,200" fill="white" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- 牙(右) -->
  <polygon points="199,192 196,205 208,200" fill="white" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
</svg>