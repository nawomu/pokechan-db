<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
       1. しっぽ短め・水色でお尻からちょこんと出ている
       2. 頭〜体は明るい水色、頭の下からお腹にかけてクリーム色のパッチ
       3. お腹の前に「かいがら(貝殻)」=クリーム色で縁がゴールドの道具を両手で持つ
       4. 頭の両端に小さい丸い耳、耳の中は薄いクリーム色
       5. まん丸で真っ黒な目とハイライト、小さい鼻と口、ほっぺの赤み -->

  <!-- しっぽ(体より奥) -->
  <ellipse cx="292" cy="298" rx="26" ry="36" fill="#57B8E8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 耳(外側・奥) -->
  <circle cx="118" cy="76" r="27" fill="#57B8E8" stroke="#2d263c" stroke-width="7"/>
  <circle cx="242" cy="76" r="27" fill="#57B8E8" stroke="#2d263c" stroke-width="7"/>
  <!-- 耳の中 -->
  <circle cx="118" cy="80" r="12" fill="#FBEFC9"/>
  <circle cx="242" cy="80" r="12" fill="#FBEFC9"/>

  <!-- 腕 -->
  <ellipse cx="93" cy="262" rx="33" ry="48" fill="#57B8E8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="267" cy="262" rx="33" ry="48" fill="#57B8E8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <circle cx="180" cy="146" r="86" fill="#57B8E8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 顔のクリームパッチ -->
  <ellipse cx="180" cy="178" rx="62" ry="48" fill="#FBEFC9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <ellipse cx="180" cy="270" rx="96" ry="70" fill="#57B8E8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- お腹のクリームパッチ -->
  <ellipse cx="180" cy="282" rx="64" ry="58" fill="#FBEFC9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前足(手) -->
  <circle cx="100" cy="300" r="21" fill="#FBEFC9" stroke="#2d263c" stroke-width="6"/>
  <circle cx="260" cy="300" r="21" fill="#FBEFC9" stroke="#2d263c" stroke-width="6"/>

  <!-- かいがら(貝殻の道具) -->
  <rect x="140" y="266" width="80" height="52" rx="20" fill="#FCEFC0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M158,276 Q180,300 202,276" fill="none" stroke="#E0B23C" stroke-width="5" stroke-linecap="round"/>

  <!-- 足 -->
  <ellipse cx="140" cy="326" rx="28" ry="15" fill="#57B8E8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="220" cy="326" rx="28" ry="15" fill="#57B8E8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目 -->
  <circle cx="150" cy="150" r="11" fill="#221F2B"/>
  <circle cx="210" cy="150" r="11" fill="#221F2B"/>
  <circle cx="153" cy="146" r="3.5" fill="#FFFFFF"/>
  <circle cx="213" cy="146" r="3.5" fill="#FFFFFF"/>

  <!-- ほっぺ -->
  <circle cx="128" cy="182" r="11" fill="#F4A6A6" opacity="0.55"/>
  <circle cx="232" cy="182" r="11" fill="#F4A6A6" opacity="0.55"/>

  <!-- 鼻・口 -->
  <ellipse cx="180" cy="176" rx="5" ry="3.5" fill="#2d263c"/>
  <path d="M166,192 Q180,202 194,192" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
