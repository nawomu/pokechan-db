  <circle cx="244" cy="86" r="20" fill="#3a7dc4" stroke="#2d263c" stroke-width="7"/>
  <circle cx="128" cy="86" r="9" fill="#e8dcc0"/>
  <circle cx="244" cy="86" r="9" fill="#e8dcc0"/>
