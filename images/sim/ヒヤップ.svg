<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ヒヤップ (Panpour) - 水しぶき頭の青いおさるポケモン -->
  <!-- 特徴: 全身青+腹/顔/耳内側クリーム / 頭頂の波形紺ヘアー / 長い垂れ耳 / 葉先しっぽ / 丸い目とピンクほっぺ -->

  <!-- しっぽ(後ろ) -->
  <path d="M223,272 C262,260 286,212 268,165 C282,190 274,224 244,250 C230,262 224,268 223,272 Z"
    fill="#4A85D6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M268,165 Q286,140 272,118 Q258,142 268,165 Z"
    fill="#2A5FA0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 耳(後ろ・左右とも外側は青、内側はクリーム) -->
  <ellipse cx="108" cy="175" rx="26" ry="54" fill="#4A85D6" stroke="#2d263c" stroke-width="7" transform="rotate(-12 108 175)"/>
  <ellipse cx="110" cy="178" rx="13" ry="36" fill="#F3E2B0" stroke="#2d263c" stroke-width="4" transform="rotate(-12 110 178)"/>
  <ellipse cx="252" cy="175" rx="26" ry="54" fill="#4A85D6" stroke="#2d263c" stroke-width="7" transform="rotate(12 252 175)"/>
  <ellipse cx="250" cy="178" rx="13" ry="36" fill="#F3E2B0" stroke="#2d263c" stroke-width="4" transform="rotate(12 250 178)"/>

  <!-- 足(後ろ・体の下に少し覗く) -->
  <ellipse cx="155" cy="306" rx="24" ry="16" fill="#4A85D6" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="205" cy="306" rx="24" ry="16" fill="#4A85D6" stroke="#2d263c" stroke-width="6"/>

  <!-- 体(メイン) -->
  <path d="M132,188 C112,215 110,268 133,296 C152,318 208,318 227,296 C250,268 248,215 228,188 C214,168 146,168 132,188 Z"
    fill="#4A85D6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹パッチ(クリーム) -->
  <ellipse cx="180" cy="248" rx="40" ry="50" fill="#F3E2B0" stroke="#2d263c" stroke-width="5"/>

  <!-- 腕(左右) -->
  <path d="M136,196 C108,208 96,238 116,258 C127,268 144,264 150,252 Z"
    fill="#4A85D6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="120" cy="253" rx="16" ry="14" fill="#F3E2B0" stroke="#2d263c" stroke-width="5"/>
  <path d="M224,196 C252,208 264,238 244,258 C233,268 216,264 210,252 Z"
    fill="#4A85D6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="240" cy="253" rx="16" ry="14" fill="#F3E2B0" stroke="#2d263c" stroke-width="5"/>

  <!-- 体のツヤ(ハイライト) -->
  <ellipse cx="150" cy="210" rx="16" ry="9" fill="#ffffff" opacity="0.35" transform="rotate(-20 150 210)"/>

  <!-- 頭(メイン) -->
  <circle cx="180" cy="128" r="54" fill="#4A85D6" stroke="#2d263c" stroke-width="8"/>

  <!-- 顔まわりのクリームパッチ(口元) -->
  <ellipse cx="180" cy="155" rx="36" ry="28" fill="#F3E2B0" stroke="#2d263c" stroke-width="5"/>

  <!-- ほっぺ(ピンク) -->
  <ellipse cx="142" cy="148" rx="8" ry="5" fill="#FFB3C0" opacity="0.55"/>
  <ellipse cx="218" cy="148" rx="8" ry="5" fill="#FFB3C0" opacity="0.55"/>

  <!-- 目(左) -->
  <ellipse cx="160" cy="118" rx="12" ry="14" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="163" cy="121" r="6.5" fill="#241f33"/>
  <circle cx="166" cy="116" r="2.3" fill="#ffffff"/>

  <!-- 目(右) -->
  <ellipse cx="200" cy="118" rx="12" ry="14" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="197" cy="121" r="6.5" fill="#241f33"/>
  <circle cx="194" cy="116" r="2.3" fill="#ffffff"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="145" rx="5" ry="4" fill="#241f33"/>

  <!-- 口 -->
  <path d="M164,160 Q180,170 196,160" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 頭頂の波ヘアー(トレードマーク) -->
  <path d="M148,92 C154,58 168,42 180,54 C192,42 206,58 212,92 C202,76 192,88 180,68 C168,88 158,76 148,92 Z"
    fill="#2A5FA0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M164,66 Q175,54 186,64" fill="none" stroke="#8FC6F5" stroke-width="4" stroke-linecap="round"/>
</svg>
