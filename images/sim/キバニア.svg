<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail fin (behind body) -->
  <polygon points="95,195 38,138 80,196" fill="#3452b0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <polygon points="95,213 34,258 82,210" fill="#3452b0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- dorsal fin (behind/on back) -->
  <polygon points="150,120 183,52 217,113" fill="#3f63d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- pectoral fin (hangs below belly, drawn before body edge for layering) -->
  <polygon points="172,214 158,272 206,222" fill="#3452b0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- main body (torpedo shape) -->
  <path d="M90,205 C84,168 110,128 160,113 C202,101 262,99 297,124 C317,139 322,155 313,168 C306,180 296,190 301,205 C270,216 220,226 170,222 C130,220 100,216 90,205 Z"
        fill="#4f7de8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- belly patch -->
  <path d="M108,209 C140,226 200,229 250,219 C272,214 292,205 302,196 C296,207 280,217 250,224 C198,235 138,231 106,218 Z"
        fill="#fff6da" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- gill marks -->
  <path d="M228,155 C235,165 235,178 226,190" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M240,152 C248,164 248,180 238,193" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- belly texture lines -->
  <path d="M130,214 C155,222 180,222 200,218" fill="none" stroke="#e3c98f" stroke-width="4" stroke-linecap="round"/>
  <path d="M150,220 C175,226 205,225 225,220" fill="none" stroke="#e3c98f" stroke-width="4" stroke-linecap="round"/>

  <!-- open mouth -->
  <path d="M268,152 C286,144 306,148 314,165 C318,179 305,196 284,199 C264,201 253,185 257,171 C259,163 263,157 268,152 Z"
        fill="#8e1e2b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- teeth top -->
  <path d="M262,166 L270,179 L278,166 L286,179 L294,166 L302,177 L307,168 Z" fill="#ffffff" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <!-- teeth bottom -->
  <path d="M263,191 L271,179 L279,191 L287,179 L295,191 L302,181 L307,192 Z" fill="#ffffff" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- nostril -->
  <circle cx="301" cy="137" r="3.5" fill="#2d263c"/>

  <!-- angry eyebrow -->
  <path d="M232,118 L262,107" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- eye -->
  <circle cx="253" cy="139" r="17" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="256" cy="141" r="10" fill="#ff6b35" stroke="#2d263c" stroke-width="3"/>
  <circle cx="258" cy="142" r="4" fill="#241f30"/>
</svg>
