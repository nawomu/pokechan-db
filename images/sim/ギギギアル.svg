<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- left side gear (behind body) -->
  <circle cx="58" cy="192" r="36" fill="#6FB2D9" stroke="#2d263c" stroke-width="7"/>
  <rect x="42" y="146" width="32" height="18" rx="4" fill="#6FB2D9" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="42" y="222" width="32" height="18" rx="4" fill="#6FB2D9" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="20" y="176" width="18" height="32" rx="4" fill="#6FB2D9" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="58" cy="192" r="12" fill="#3E86AE" stroke="#2d263c" stroke-width="4"/>

  <!-- right side gear (behind body) -->
  <circle cx="302" cy="192" r="36" fill="#6FB2D9" stroke="#2d263c" stroke-width="7"/>
  <rect x="286" y="146" width="32" height="18" rx="4" fill="#6FB2D9" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="286" y="222" width="32" height="18" rx="4" fill="#6FB2D9" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="322" y="176" width="18" height="32" rx="4" fill="#6FB2D9" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="302" cy="192" r="12" fill="#3E86AE" stroke="#2d263c" stroke-width="4"/>

  <!-- connectors bridging side gears to body -->
  <rect x="86" y="178" width="28" height="28" rx="6" fill="#9BA8B2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <rect x="246" y="178" width="28" height="28" rx="6" fill="#9BA8B2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- main gear body -->
  <circle cx="180" cy="192" r="108" fill="#9BA8B2" stroke="#2d263c" stroke-width="9"/>
  <rect x="163" y="64" width="34" height="24" rx="5" fill="#9BA8B2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <rect x="250" y="114" width="30" height="26" rx="5" fill="#9BA8B2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <rect x="250" y="250" width="30" height="26" rx="5" fill="#9BA8B2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <rect x="163" y="278" width="34" height="24" rx="5" fill="#9BA8B2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <rect x="80" y="250" width="30" height="26" rx="5" fill="#9BA8B2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <rect x="80" y="114" width="30" height="26" rx="5" fill="#9BA8B2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- chest gear detail -->
  <circle cx="180" cy="205" r="50" fill="#2E2E36" stroke="#2d263c" stroke-width="7"/>
  <rect x="138" y="198" width="84" height="14" rx="5" fill="#C7D0D6" stroke="#2d263c" stroke-width="4"/>
  <rect x="173" y="163" width="14" height="84" rx="5" fill="#C7D0D6" stroke="#2d263c" stroke-width="4"/>
  <circle cx="180" cy="205" r="13" fill="#E8C547" stroke="#2d263c" stroke-width="4"/>

  <!-- face plate on top -->
  <ellipse cx="180" cy="108" rx="46" ry="40" fill="#C7D0D6" stroke="#2d263c" stroke-width="8"/>

  <!-- antenna spike -->
  <path d="M180 44 L166 72 L194 72 Z" fill="#C7D0D6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- eyes -->
  <circle cx="163" cy="104" r="9" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="197" cy="104" r="9" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="164" cy="105" r="3" fill="#1A2233"/>
  <circle cx="198" cy="105" r="3" fill="#1A2233"/>

  <!-- mouth -->
  <path d="M168 124 Q180 130 192 124" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
