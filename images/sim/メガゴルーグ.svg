<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 背後の翼(左) -->
  <polygon points="80,130 20,80 40,160 70,175" fill="#2a4a3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="75,150 10,130 30,200 65,195" fill="#2a4a3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 背後の翼(右) -->
  <polygon points="280,130 340,80 320,160 290,175" fill="#2a4a3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="285,150 350,130 330,200 295,195" fill="#2a4a3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <rect x="108" y="148" width="144" height="130" rx="22" ry="22" fill="#4a7a62" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹部パネル -->
  <ellipse cx="180" cy="210" rx="52" ry="48" fill="#3a6652" stroke="#2d263c" stroke-width="6"/>

  <!-- 胸のXクラック(光) -->
  <line x1="152" y1="175" x2="208" y2="225" stroke="#a0ffcc" stroke-width="5" stroke-linecap="round"/>
  <line x1="208" y1="175" x2="152" y2="225" stroke="#a0ffcc" stroke-width="5" stroke-linecap="round"/>
  <line x1="152" y1="175" x2="208" y2="225" stroke="#d0fff0" stroke-width="2" stroke-linecap="round"/>
  <line x1="208" y1="175" x2="152" y2="225" stroke="#d0fff0" stroke-width="2" stroke-linecap="round"/>

  <!-- 腰のベルト帯 -->
  <rect x="108" y="268" width="144" height="18" rx="5" fill="#2a4a3a" stroke="#2d263c" stroke-width="6"/>

  <!-- 左腕 -->
  <rect x="60" y="152" width="54" height="108" rx="18" fill="#4a7a62" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 左腕の帯 -->
  <rect x="60" y="228" width="54" height="16" rx="5" fill="#2a4a3a" stroke="#2d263c" stroke-width="5"/>
  <!-- 左こぶし -->
  <ellipse cx="87" cy="272" rx="26" ry="22" fill="#3a6a55" stroke="#2d263c" stroke-width="7"/>

  <!-- 右腕 -->
  <rect x="246" y="152" width="54" height="108" rx="18" fill="#4a7a62" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 右腕の帯 -->
  <rect x="246" y="228" width="54" height="16" rx="5" fill="#2a4a3a" stroke="#2d263c" stroke-width="5"/>
  <!-- 右こぶし -->
  <ellipse cx="273" cy="272" rx="26" ry="22" fill="#3a6a55" stroke="#2d263c" stroke-width="7"/>

  <!-- 左足 -->
  <rect x="122" y="272" width="48" height="62" rx="14" fill="#4a7a62" stroke="#2d263c" stroke-width="8"/>
  <!-- 左足の帯 -->
  <rect x="122" y="308" width="48" height="14" rx="5" fill="#2a4a3a" stroke="#2d263c" stroke-width="5"/>

  <!-- 右足 -->
  <rect x="190" y="272" width="48" height="62" rx="14" fill="#4a7a62" stroke="#2d263c" stroke-width="8"/>
  <!-- 右足の帯 -->
  <rect x="190" y="308" width="48" height="14" rx="5" fill="#2a4a3a" stroke="#2d263c" stroke-width="5"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="112" rx="64" ry="58" fill="#4a7a62" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭の左突起(耳) -->
  <polygon points="125,75 108,40 138,68" fill="#3a6652" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 頭の右突起(耳) -->
  <polygon points="235,75 252,40 222,68" fill="#3a6652" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭の模様ライン -->
  <line x1="148" y1="88" x2="148" y2="140" stroke="#2a4a3a" stroke-width="5" stroke-linecap="round"/>
  <line x1="212" y1="88" x2="212" y2="140" stroke="#2a4a3a" stroke-width="5" stroke-linecap="round"/>

  <!-- 左目(赤く光る) -->
  <ellipse cx="158" cy="108" rx="16" ry="15" fill="#cc1111" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="158" cy="108" rx="9" ry="8" fill="#ff4444"/>
  <ellipse cx="154" cy="104" rx="3" ry="3" fill="#ffaaaa"/>

  <!-- 右目(赤く光る) -->
  <ellipse cx="202" cy="108" rx="16" ry="15" fill="#cc1111" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="202" cy="108" rx="9" ry="8" fill="#ff4444"/>
  <ellipse cx="198" cy="104" rx="3" ry="3" fill="#ffaaaa"/>

  <!-- おでこの突起 -->
  <polygon points="172,62 180,42 188,62" fill="#3a6652" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
</svg>