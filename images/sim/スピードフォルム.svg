  <path d="M158 250 Q136 282 124 312 Q118 326 128 335 Q138 338 140 328 Q138 302 150 276 Q162 254 178 262 Z" fill="#6FA8E0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
