  <ellipse cx="90" cy="292" rx="8" ry="10" fill="#3E7BC0" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="270" cy="292" rx="8" ry="10" fill="#3E7BC0" stroke="#2d263c" stroke-width="4"/>

