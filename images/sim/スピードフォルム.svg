  <ellipse cx="230" cy="330" rx="9" ry="6" fill="#3E7BC0" stroke="#2d263c" stroke-width="4"/>

  <!-- 口もと(小さな線) -->
  <path d="M170 125 Q180 130 190 125" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
