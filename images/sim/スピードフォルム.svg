  <path d="M155 240 Q180 250 205 240" fill="none" stroke="#3E7BC0" stroke-width="5" stroke-linecap="round"/>

  <!-- しっぽの突起 -->
  <path d="M206 250 Q226 258 224 274 Q210 270 202 258Z" fill="#6FA8E0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左うで(細長いムチ状) -->
