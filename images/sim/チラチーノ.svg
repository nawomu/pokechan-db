<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 背中のスカーフ状の毛(左) -->
  <path d="M150 165 C110 145 70 150 50 190 C30 230 35 275 75 290 C105 300 120 265 100 240 C90 228 75 235 80 215 C85 195 115 190 150 165 Z" fill="#F0E4C8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 背中のスカーフ状の毛(右) -->
  <path d="M210 165 C250 145 290 150 310 190 C330 230 325 275 285 290 C255 300 240 265 260 240 C270 228 285 235 280 215 C275 195 245 190 210 165 Z" fill="#F0E4C8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 左脚 -->
  <ellipse cx="150" cy="305" rx="26" ry="32" fill="#A8A4B8" stroke="#2d263c" stroke-width="7"/>
  <!-- 右脚 -->
  <ellipse cx="210" cy="305" rx="26" ry="32" fill="#A8A4B8" stroke="#2d263c" stroke-width="7"/>
  <!-- 左足先(クリーム) -->
  <ellipse cx="150" cy="326" rx="20" ry="12" fill="#F0E4C8" stroke="#2d263c" stroke-width="5"/>
  <!-- 右足先(クリーム) -->
  <ellipse cx="210" cy="326" rx="20" ry="12" fill="#F0E4C8" stroke="#2d263c" stroke-width="5"/>

  <!-- 体 -->
  <ellipse cx="180" cy="225" rx="65" ry="80" fill="#A8A4B8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- お腹(クリーム) -->
  <ellipse cx="180" cy="235" rx="38" ry="55" fill="#F0E4C8" stroke="none"/>

  <!-- 左腕 -->
  <ellipse cx="112" cy="212" rx="18" ry="38" fill="#A8A4B8" stroke="#2d263c" stroke-width="6" transform="rotate(-18 112 212)"/>
  <!-- 右腕 -->
  <ellipse cx="248" cy="212" rx="18" ry="38" fill="#A8A4B8" stroke="#2d263c" stroke-width="6" transform="rotate(18 248 212)"/>
  <!-- 左手先(クリーム) -->
  <ellipse cx="96" cy="245" rx="13" ry="14" fill="#F0E4C8" stroke="#2d263c" stroke-width="4"/>
  <!-- 右手先(クリーム) -->
  <ellipse cx="264" cy="245" rx="13" ry="14" fill="#F0E4C8" stroke="#2d263c" stroke-width="4"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="115" rx="56" ry="55" fill="#A8A4B8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 左耳(外) -->
  <path d="M145 90 C130 60 138 35 158 38 C172 40 175 65 168 90 Z" fill="#A8A4B8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右耳(外) -->
  <path d="M215 90 C230 60 222 35 202 38 C188 40 185 65 192 90 Z" fill="#A8A4B8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 左耳(内・ピンク) -->
  <path d="M150 82 C142 62 147 46 158 48 C166 50 166 68 162 82 Z" fill="#F5B8C4" stroke="none"/>
  <!-- 右耳(内・ピンク) -->
  <path d="M210 82 C218 62 213 46 202 48 C194 50 194 68 198 82 Z" fill="#F5B8C4" stroke="none"/>

  <!-- 目 左 -->
  <ellipse cx="158" cy="118" rx="15" ry="16" fill="#2d263c"/>
  <ellipse cx="153" cy="112" rx="5" ry="5" fill="white"/>
  <!-- 目 右 -->
  <ellipse cx="202" cy="118" rx="15" ry="16" fill="#2d263c"/>
  <ellipse cx="197" cy="112" rx="5" ry="5" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="136" rx="7" ry="5" fill="#F5B8C4" stroke="#2d263c" stroke-width="2.5"/>

  <!-- 口 -->
  <path d="M168 148 Q180 156 192 148" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
</svg>
