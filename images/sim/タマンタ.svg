<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.平べったい丸いエイ型シルエット 2.薄い水色の体+白いお腹 3.頭から垂れる長いヒゲ2本(先がくるん) 4.背中の黄色い丸模様(星座っぽい斑点) 5.両側の翼のようなヒレ+小さい尻尾 -->

  <!-- 後ろ: 尻尾 -->
  <path d="M180 260 Q170 300 178 330 Q182 336 188 330 Q194 300 184 260 Z" fill="#6ec3ea" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 後ろ: 左ヒレ(翼) -->
  <path d="M90 170 Q30 190 24 250 Q22 270 40 258 Q80 225 110 195 Z" fill="#6ec3ea" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 後ろ: 右ヒレ(翼) -->
  <path d="M270 170 Q330 190 336 250 Q338 270 320 258 Q280 225 250 195 Z" fill="#6ec3ea" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体: 平べったい丸いエイ型の本体 -->
  <path d="M180 60
           C90 60 45 130 45 190
           C45 250 105 290 180 290
           C255 290 315 250 315 190
           C315 130 270 60 180 60 Z"
        fill="#8fd4f5" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹(白) -->
  <ellipse cx="180" cy="225" rx="95" ry="48" fill="#fdfaf0" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭の先端ヒレ(2枚・角のような突起) -->
  <path d="M130 70 Q110 40 88 46 Q100 66 118 84 Z" fill="#8fd4f5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M230 70 Q250 40 272 46 Q260 66 242 84 Z" fill="#8fd4f5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 背中の黄色い斑点模様(星座っぽく) -->
  <circle cx="140" cy="120" r="10" fill="#ffe45c" stroke="#2d263c" stroke-width="4"/>
  <circle cx="180" cy="105" r="8" fill="#ffe45c" stroke="#2d263c" stroke-width="4"/>
  <circle cx="222" cy="122" r="10" fill="#ffe45c" stroke="#2d263c" stroke-width="4"/>
  <circle cx="160" cy="150" r="6" fill="#ffe45c" stroke="#2d263c" stroke-width="3"/>
  <circle cx="205" cy="152" r="6" fill="#ffe45c" stroke="#2d263c" stroke-width="3"/>

  <!-- ヒゲ(左・くるんと丸まる) -->
  <path d="M148 160 Q100 175 90 210 Q84 232 104 236 Q118 238 112 220 Q106 202 128 192" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <!-- ヒゲ(右・くるんと丸まる) -->
  <path d="M212 160 Q260 175 270 210 Q276 232 256 236 Q242 238 248 220 Q254 202 232 192" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 目(大きい丸・かわいい) -->
  <circle cx="150" cy="185" r="20" fill="#fdfaf0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="210" cy="185" r="20" fill="#fdfaf0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="153" cy="188" r="10" fill="#2d263c"/>
  <circle cx="213" cy="188" r="10" fill="#2d263c"/>
  <circle cx="149" cy="183" r="3.5" fill="#ffffff"/>
  <circle cx="209" cy="183" r="3.5" fill="#ffffff"/>

  <!-- 口(小さいへの字) -->
  <path d="M168 215 Q180 224 192 215" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <circle cx="128" cy="205" r="9" fill="#ffb3c6" opacity="0.7"/>
  <circle cx="232" cy="205" r="9" fill="#ffb3c6" opacity="0.7"/>
</svg>
