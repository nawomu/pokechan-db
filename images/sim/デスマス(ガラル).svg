<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ:体のうしろ側の裾(奥の布のひらめき) -->
  <path d="M122 252 Q112 292 132 306 Q142 286 150 262 Z" fill="#8a7d6e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M238 252 Q250 290 230 308 Q220 287 212 262 Z" fill="#8a7d6e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(灰褐色の古びた布・すそが波打つ) -->
  <path d="M180 55
           C138 55 100 88 92 140
           C86 178 92 218 108 250
           C118 270 132 288 150 292
           C158 294 164 286 168 272
           C172 288 176 300 180 300
           C184 300 188 288 192 272
           C196 286 202 294 210 292
           C228 288 242 270 252 250
           C268 218 274 178 268 140
           C260 88 222 55 180 55 Z"
        fill="#9c8d7a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体のハイライト -->
  <ellipse cx="150" cy="110" rx="34" ry="26" fill="#b3a591" opacity="0.55"/>

  <!-- 頭の上の折れ目(布のシワ) -->
  <path d="M148 70 Q168 60 188 70" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M158 90 Q180 80 202 92" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 左手(壺のお面を持つ) -->
  <ellipse cx="112" cy="214" rx="20" ry="16" fill="#9c8d7a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-18 112 214)"/>
  <!-- 右手(壺のお面を持つ) -->
  <ellipse cx="250" cy="214" rx="20" ry="16" fill="#9c8d7a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(18 250 214)"/>

  <!-- 壺のお面(欠けた土器・クリーム色) -->
  <ellipse cx="181" cy="232" rx="74" ry="58" fill="#d9cba9" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お面のフチの影 -->
  <path d="M118 234 Q181 270 244 232 Q240 262 181 280 Q122 262 118 234 Z" fill="#bcac88" opacity="0.7"/>

  <!-- ひび割れ(縦横に走るクラック) -->
  <path d="M181 176 L172 210 L188 236 L166 268" fill="none" stroke="#4a3f2e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M230 200 L206 222" fill="none" stroke="#4a3f2e" stroke-width="4" stroke-linecap="round"/>
  <path d="M130 214 L152 230" fill="none" stroke="#4a3f2e" stroke-width="4" stroke-linecap="round"/>

  <!-- ひびから漏れる赤い光 -->
  <path d="M181 178 L173 208 L188 234 L167 266" fill="none" stroke="#d0402f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- 目穴(悲しげな垂れ目・黒い落ちくぼみ) -->
  <path d="M130 226 Q150 214 168 228 Q150 240 130 226 Z" fill="#1c1826" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M194 228 Q212 214 232 226 Q212 240 194 228 Z" fill="#1c1826" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目穴の奥の赤い光 -->
  <ellipse cx="148" cy="228" rx="5" ry="6" fill="#d0402f"/>
  <ellipse cx="214" cy="228" rx="5" ry="6" fill="#d0402f"/>

  <!-- 涙のようなひび模様(左右) -->
  <path d="M138 238 Q134 254 143 262 Q150 252 145 238 Z" fill="none" stroke="#4a3f2e" stroke-width="4" stroke-linejoin="round"/>
  <path d="M224 238 Q228 254 219 262 Q212 252 217 238 Z" fill="none" stroke="#4a3f2e" stroke-width="4" stroke-linejoin="round"/>

  <!-- 口(への字に曲がった悲しい表情) -->
  <path d="M160 262 Q181 250 202 262" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
