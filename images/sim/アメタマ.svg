  <ellipse cx="180" cy="222" rx="50" ry="40" fill="#cdf3ff"/>

  <!-- antennae -->
  <path d="M150,122 Q132,100 123,76" fill="none" stroke="#e6483c" stroke-width="9" stroke-linecap="round"/>
  <circle cx="121" cy="72" r="9" fill="#e6483c" stroke="#2d263c" stroke-width="5"/>
  <path d="M210,122 Q228,100 237,76" fill="none" stroke="#e6483c" stroke-width="9" stroke-linecap="round"/>
  <circle cx="239" cy="72" r="9" fill="#e6483c" stroke="#2d263c" stroke-width="5"/>

  <!-- eyes -->
  <ellipse cx="145" cy="175" rx="32" ry="37" fill="#e6483c" stroke="#2d263c" stroke-width="6"/>
  <circle cx="149" cy="180" r="11" fill="#241b2e"/>
  <circle cx="140" cy="165" r="5" fill="#ffffff"/>
  <ellipse cx="215" cy="175" rx="32" ry="37" fill="#e6483c" stroke="#2d263c" stroke-width="6"/>
  <circle cx="211" cy="180" r="11" fill="#241b2e"/>
  <circle cx="222" cy="165" r="5" fill="#ffffff"/>

  <!-- mouth -->
