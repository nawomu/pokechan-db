  <path d="M155,245 Q100,255 60,290" fill="none" stroke="#4fc3f7" stroke-width="7" stroke-linecap="round"/>
  <path d="M150,270 Q95,300 65,330" fill="none" stroke="#2d263c" stroke-width="14" stroke-linecap="round"/>
  <path d="M150,270 Q95,300 65,330" fill="none" stroke="#4fc3f7" stroke-width="7" stroke-linecap="round"/>
  <path d="M205,245 Q260,255 300,290" fill="none" stroke="#2d263c" stroke-width="14" stroke-linecap="round"/>
  <path d="M205,245 Q260,255 300,290" fill="none" stroke="#4fc3f7" stroke-width="7" stroke-linecap="round"/>
  <path d="M210,270 Q265,300 295,330" fill="none" stroke="#2d263c" stroke-width="14" stroke-linecap="round"/>
  <path d="M210,270 Q265,300 295,330" fill="none" stroke="#4fc3f7" stroke-width="7" stroke-linecap="round"/>

