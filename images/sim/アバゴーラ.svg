<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- back legs -->
  <path d="M215 260 Q225 290 215 310 L245 310 Q250 285 240 258 Z" fill="#2f6a8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M110 260 Q100 290 108 310 L138 310 Q140 285 132 258 Z" fill="#2f6a8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- tail -->
  <path d="M240 250 Q270 260 275 285 Q270 292 258 285 Q245 270 228 258 Z" fill="#2f6a8a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- body base (belly/neck skin) -->
  <path d="M105 175 Q95 220 130 250 Q170 275 210 255 Q250 225 245 180 Q240 145 175 140 Q120 140 105 175 Z"
        fill="#3a86ab" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- big front arms/claws -->
  <path d="M95 190 Q60 195 45 220 Q35 240 55 245 Q70 248 78 232 Q90 215 108 205 Z"
        fill="#2f6a8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M45 222 Q30 224 28 236 Q32 246 44 242" fill="#2f6a8a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <path d="M255 190 Q290 195 305 220 Q315 240 295 245 Q280 248 272 232 Q260 215 242 205 Z"
        fill="#2f6a8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M305 222 Q320 224 322 236 Q318 246 306 242" fill="#2f6a8a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- shell (dome, dark reddish) -->
  <path d="M115 195 Q100 140 175 108 Q250 90 285 155 Q300 195 270 220 Q220 245 175 235 Q125 225 115 195 Z"
        fill="#8a3a2e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- shell plate segments (tan outline circles) -->
  <circle cx="150" cy="150" r="24" fill="none" stroke="#d99b5b" stroke-width="6"/>
  <circle cx="215" cy="140" r="26" fill="none" stroke="#d99b5b" stroke-width="6"/>
  <circle cx="255" cy="180" r="22" fill="none" stroke="#d99b5b" stroke-width="6"/>
  <circle cx="180" cy="195" r="22" fill="none" stroke="#d99b5b" stroke-width="6"/>

  <!-- shell rim seam -->
  <path d="M118 195 Q170 232 210 232 Q255 226 272 200" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- head -->
  <path d="M100 200 Q70 185 65 155 Q62 130 90 122 Q118 116 130 140 Q140 165 125 195 Q115 205 100 200 Z"
        fill="#3a86ab" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- head rocky bumps -->
  <path d="M75 135 Q65 122 78 112 Q88 118 84 132 Z" fill="#2f6a8a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M105 122 Q100 108 114 105 Q122 115 114 126 Z" fill="#2f6a8a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- eyes -->
  <circle cx="88" cy="150" r="9" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="90" cy="151" r="3.4" fill="#c23b2a"/>

  <!-- mouth -->
  <path d="M70 178 Q90 190 112 180" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
