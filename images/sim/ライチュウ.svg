<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body) -->
  <polyline points="290,310 310,270 285,240 315,200 290,165 310,130" fill="none" stroke="#C05010" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- tail tip circle -->
  <ellipse cx="314" cy="122" rx="18" ry="12" fill="#C05010" stroke="#2d263c" stroke-width="6"/>

  <!-- left ear -->
  <polygon points="105,90 82,18 130,75" fill="#D06000" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- left ear inner -->
  <polygon points="107,84 89,30 125,72" fill="#1a0a00" stroke="none"/>

  <!-- right ear -->
  <polygon points="220,82 252,12 238,78" fill="#D06000" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- right ear inner -->
  <polygon points="222,76 248,22 236,73" fill="#1a0a00" stroke="none"/>

  <!-- body -->
  <ellipse cx="178" cy="230" rx="105" ry="95" fill="#E07020" stroke="#2d263c" stroke-width="8"/>

  <!-- belly -->
  <ellipse cx="174" cy="248" rx="62" ry="52" fill="#F5DFA0" stroke="#2d263c" stroke-width="5"/>

  <!-- back stripe -->
  <path d="M165,140 Q160,180 158,230" fill="none" stroke="#A04010" stroke-width="11" stroke-linecap="round"/>
  <path d="M188,138 Q186,178 185,228" fill="none" stroke="#A04010" stroke-width="11" stroke-linecap="round"/>

  <!-- head -->
  <ellipse cx="172" cy="150" rx="82" ry="72" fill="#E07020" stroke="#2d263c" stroke-width="8"/>

  <!-- left cheek pouch -->
  <ellipse cx="108" cy="168" rx="24" ry="20" fill="#FF6030" stroke="#2d263c" stroke-width="5"/>

  <!-- right cheek pouch -->
  <ellipse cx="240" cy="164" rx="24" ry="20" fill="#FF6030" stroke="#2d263c" stroke-width="5"/>

  <!-- left eye -->
  <ellipse cx="143" cy="140" rx="14" ry="16" fill="#1a1028" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="147" cy="136" rx="5" ry="5" fill="white" stroke="none"/>

  <!-- right eye -->
  <ellipse cx="203" cy="137" rx="13" ry="16" fill="#1a1028" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="207" cy="133" rx="5" ry="5" fill="white" stroke="none"/>

  <!-- nose -->
  <ellipse cx="173" cy="158" rx="6" ry="4" fill="#2d263c"/>

  <!-- mouth (slightly lopsided grin) -->
  <path d="M158,168 Q173,182 192,166" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- left arm -->
  <ellipse cx="88" cy="248" rx="22" ry="32" fill="#E07020" stroke="#2d263c" stroke-width="7" transform="rotate(-20,88,248)"/>

  <!-- right arm -->
  <ellipse cx="268" cy="244" rx="22" ry="32" fill="#E07020" stroke="#2d263c" stroke-width="7" transform="rotate(18,268,244)"/>

  <!-- left leg -->
  <ellipse cx="132" cy="315" rx="28" ry="22" fill="#E07020" stroke="#2d263c" stroke-width="7"/>
  <!-- left foot -->
  <ellipse cx="128" cy="332" rx="32" ry="14" fill="#C05010" stroke="#2d263c" stroke-width="6"/>

  <!-- right leg -->
  <ellipse cx="218" cy="313" rx="28" ry="22" fill="#E07020" stroke="#2d263c" stroke-width="7"/>
  <!-- right foot -->
  <ellipse cx="222" cy="330" rx="32" ry="14" fill="#C05010" stroke="#2d263c" stroke-width="6"/>

  <!-- lightning bolt on forehead (tiny, cheeky) -->
  <polygon points="172,108 165,122 172,118 163,134 180,116 172,121" fill="#FFE040" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
</svg>