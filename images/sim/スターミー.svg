<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろの星(少し大きく・36度回転) -->
  <polygon
    points="180,52 205,138 292,138 224,188 250,272 180,222 110,272 136,188 68,138 155,138"
    fill="#4a2a78"
    stroke="#2d263c"
    stroke-width="7"
    stroke-linejoin="round"
    transform="rotate(36 180 180)"
  />
  <!-- 前の星(メイン・紫) -->
  <polygon
    points="180,58 203,132 280,132 218,178 242,260 180,214 118,260 142,178 80,132 157,132"
    fill="#7a3fb5"
    stroke="#2d263c"
    stroke-width="8"
    stroke-linejoin="round"
  />
  <!-- 星の内側ハイライト(やや明るい紫・ゆるく手描き感) -->
  <polygon
    points="180,80 198,136 256,136 210,168 228,228 180,196 132,228 150,168 104,136 162,136"
    fill="#9155cc"
    stroke="none"
  />
  <!-- 後ろ星の内側 -->
  <polygon
    points="180,80 198,136 256,136 210,168 228,228 180,196 132,228 150,168 104,136 162,136"
    fill="none"
    stroke="none"
    transform="rotate(36 180 180)"
  />
  <!-- 宝石の金縁リング(大) -->
  <circle cx="180" cy="180" r="38" fill="#c8900a" stroke="#2d263c" stroke-width="6"/>
  <!-- 宝石の金縁リング(内) -->
  <circle cx="180" cy="180" r="31" fill="#e8b030" stroke="none"/>
  <!-- 赤い宝石コア -->
  <circle cx="180" cy="180" r="25" fill="#c0162a" stroke="#2d263c" stroke-width="4"/>
  <!-- 宝石の内側グラデ風ハイライト(フラット) -->
  <ellipse cx="172" cy="170" rx="10" ry="7" fill="#e84060" stroke="none"/>
  <!-- 宝石の小ハイライト点 -->
  <circle cx="185" cy="188" r="4" fill="#8a0010" stroke="none"/>
</svg>