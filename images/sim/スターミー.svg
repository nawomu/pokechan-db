<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ腕(下層・やや暗め) -->
  <!-- 腕1: 上左斜め -->
  <polygon points="180,175 148,95 165,108 155,80 170,100 160,75 178,105 182,130"
    fill="#9b35b0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 腕2: 上右斜め -->
  <polygon points="180,175 212,95 195,108 205,80 190,100 200,75 182,105 178,130"
    fill="#9b35b0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 腕: 左水平 -->
  <polygon points="178,182 95,152 110,168 82,158 102,172 78,162 108,178 133,180"
    fill="#9b35b0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 腕: 右水平 -->
  <polygon points="182,182 265,152 250,168 278,158 258,172 282,162 252,178 227,180"
    fill="#9b35b0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 腕: 左下 -->
  <polygon points="177,188 118,265 130,248 112,268 127,250 108,272 128,252 152,215"
    fill="#9b35b0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 腕: 右下 -->
  <polygon points="183,188 242,265 230,248 248,268 233,250 252,272 232,252 208,215"
    fill="#9b35b0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 腕: 真下 -->
  <polygon points="179,190 162,280 170,262 158,285 168,264 155,290 170,268 178,230 182,230 190,268 205,290 192,264 202,285 190,262 198,280 181,190"
    fill="#9b35b0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体の中心円(大) -->
  <ellipse cx="181" cy="181" rx="62" ry="60"
    fill="#c050d8" stroke="#2d263c" stroke-width="8"/>

  <!-- 体の腹側(薄い色・少し下に) -->
  <ellipse cx="183" cy="186" rx="44" ry="42"
    fill="#d87aee" stroke="none"/>

  <!-- コアの台座(六角形っぽく) -->
  <polygon points="181,148 203,161 203,187 181,200 159,187 159,161"
    fill="#cc2244" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- コアの光沢(内側明るく) -->
  <polygon points="181,154 199,165 199,183 181,194 163,183 163,165"
    fill="#ee3355" stroke="none"/>

  <!-- コアの十字模様 -->
  <line x1="181" y1="153" x2="181" y2="195" stroke="#ffeebb" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="159" y1="174" x2="203" y2="174" stroke="#ffeebb" stroke-width="4.5" stroke-linecap="round"/>

  <!-- コアのハイライト -->
  <ellipse cx="171" cy="163" rx="7" ry="5" fill="#ffaacc" opacity="0.7"/>

  <!-- 体の輪郭(もう一周) -->
  <ellipse cx="181" cy="181" rx="62" ry="60"
    fill="none" stroke="#2d263c" stroke-width="8"/>

  <!-- 腕のスジ(質感・各腕に1本) -->
  <!-- 上 -->
  <line x1="164" y1="135" x2="170" y2="110" stroke="#7a1a90" stroke-width="3" stroke-linecap="round"/>
  <line x1="196" y1="135" x2="190" y2="110" stroke="#7a1a90" stroke-width="3" stroke-linecap="round"/>
  <!-- 左 -->
  <line x1="130" y1="175" x2="105" y2="168" stroke="#7a1a90" stroke-width="3" stroke-linecap="round"/>
  <!-- 右 -->
  <line x1="230" y1="175" x2="255" y2="168" stroke="#7a1a90" stroke-width="3" stroke-linecap="round"/>
  <!-- 左下 -->
  <line x1="145" y1="212" x2="128" y2="248" stroke="#7a1a90" stroke-width="3" stroke-linecap="round"/>
  <!-- 右下 -->
  <line x1="215" y1="212" x2="232" y2="248" stroke="#7a1a90" stroke-width="3" stroke-linecap="round"/>
  <!-- 下 -->
  <line x1="178" y1="228" x2="176" y2="265" stroke="#7a1a90" stroke-width="3" stroke-linecap="round"/>

  <!-- ちょっとした光沢(体上部) -->
  <ellipse cx="170" cy="162" rx="18" ry="10" fill="#e070f5" opacity="0.5"/>
</svg>