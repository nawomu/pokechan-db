<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <g stroke="#2d263c" stroke-linejoin="round" stroke-linecap="round">
    <!-- back legs (behind body) -->
    <rect x="128" y="252" width="26" height="78" rx="10" fill="#262222" stroke-width="6"/>
    <rect x="206" y="252" width="26" height="78" rx="10" fill="#262222" stroke-width="6"/>
    <rect x="125" y="316" width="32" height="16" rx="6" fill="#141010" stroke-width="6"/>
    <rect x="203" y="316" width="32" height="16" rx="6" fill="#141010" stroke-width="6"/>
    <!-- tail tuft -->
    <ellipse cx="272" cy="205" rx="15" ry="19" fill="#efe2bd" stroke-width="6"/>
    <!-- body -->
    <ellipse cx="180" cy="218" rx="96" ry="63" fill="#332f2d" stroke-width="8"/>
    <ellipse cx="180" cy="238" rx="52" ry="26" fill="#443e3a" stroke-width="0"/>
    <!-- front legs (in front of body) -->
    <rect x="104" y="257" width="30" height="86" rx="12" fill="#302c2a" stroke-width="7"/>
    <rect x="226" y="257" width="30" height="86" rx="12" fill="#302c2a" stroke-width="7"/>
    <rect x="99" y="330" width="36" height="18" rx="7" fill="#141010" stroke-width="6"/>
    <rect x="221" y="330" width="36" height="18" rx="7" fill="#141010" stroke-width="6"/>
    <!-- ears peeking from mane -->
    <circle cx="108" cy="112" r="19" fill="#211d1c" stroke-width="6"/>
    <circle cx="252" cy="112" r="19" fill="#211d1c" stroke-width="6"/>
    <!-- head -->
    <circle cx="180" cy="122" r="68" fill="#332f2d" stroke-width="8"/>
    <!-- horns -->
    <path d="M150,68 C120,58 92,38 86,16 C108,20 140,36 157,58 Z" fill="#3a3530" stroke-width="6"/>
    <path d="M210,68 C240,58 268,38 274,16 C252,20 220,36 203,58 Z" fill="#3a3530" stroke-width="6"/>
    <!-- afro mane -->
    <circle cx="180" cy="56" r="44" fill="#f2e6c4" stroke-width="6"/>
    <circle cx="122" cy="78" r="37" fill="#f2e6c4" stroke-width="6"/>
    <circle cx="238" cy="78" r="37" fill="#f2e6c4" stroke-width="6"/>
    <circle cx="143" cy="118" r="30" fill="#f2e6c4" stroke-width="6"/>
    <circle cx="217" cy="118" r="30" fill="#f2e6c4" stroke-width="6"/>
    <!-- snout -->
    <rect x="152" y="150" width="56" height="36" rx="15" fill="#231f1e" stroke-width="6"/>
    <ellipse cx="167" cy="167" rx="5" ry="7" fill="#0d0b0b" stroke-width="0"/>
    <ellipse cx="193" cy="167" rx="5" ry="7" fill="#0d0b0b" stroke-width="0"/>
    <!-- eyes -->
    <ellipse cx="153" cy="126" rx="10" ry="12" fill="#b5241f" stroke-width="4"/>
    <ellipse cx="207" cy="126" rx="10" ry="12" fill="#b5241f" stroke-width="4"/>
    <circle cx="153" cy="129" r="3.5" fill="#140f0f" stroke-width="0"/>
    <circle cx="207" cy="129" r="3.5" fill="#140f0f" stroke-width="0"/>
  </g>
</svg>
