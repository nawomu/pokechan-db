  <path d="M225 108 L245 95 L248 118" fill="#e2691f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M135 108 L115 95 L112 118" fill="#e2691f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

