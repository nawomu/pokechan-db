  <path d="M205 300 L218 335" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M120 338 L140 335 L158 340" fill="#e79a4d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M198 340 L218 335 L238 338" fill="#e79a4d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

