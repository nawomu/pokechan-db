  <circle cx="210" cy="120" r="15" fill="#fff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="153" cy="123" r="7" fill="#2d263c"/>
  <circle cx="207" cy="123" r="7" fill="#2d263c"/>

  <!-- beak -->
