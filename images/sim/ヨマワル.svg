<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- body: round floating ghost with jagged robe-like bottom, dark purple-gray -->
  <path d="M100,125 C105,78 255,78 260,125 L268,235 L248,272 L228,238 L208,274 L188,238 L168,274 L148,238 L128,274 L108,238 L92,235 Z"
        fill="#33304a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- small ear-like bumps on sides of head -->
  <path d="M100,128 L78,110 L104,150 Z" fill="#33304a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M260,128 L282,110 L256,150 Z" fill="#33304a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- small horn/spike on top of head -->
  <path d="M168,82 L180,48 L192,82 Z" fill="#33304a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- pale skull-like face plate -->
  <path d="M120,152 C120,100 240,100 240,152 C240,192 200,208 180,208 C160,208 120,192 120,152 Z"
        fill="#f2e0a0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- single large red eye -->
  <circle cx="180" cy="150" r="30" fill="#d9403f" stroke="#2d263c" stroke-width="6"/>
  <circle cx="180" cy="150" r="11" fill="#2d263c"/>
  <circle cx="171" cy="141" r="5" fill="#ffffff"/>

  <!-- small nose/mouth cavity below eye -->
  <path d="M172,186 L188,186 L180,200 Z" fill="#2d263c"/>

  <!-- faint cheek shading dots for a hand-drawn feel -->
  <circle cx="135" cy="165" r="7" fill="#e8d38a" opacity="0.7"/>
  <circle cx="225" cy="165" r="7" fill="#e8d38a" opacity="0.7"/>

  <!-- soft belly-highlight on the body -->
  <ellipse cx="180" cy="230" rx="34" ry="14" fill="#3d3a58" opacity="0.6"/>
</svg>
