  <circle cx="164" cy="236" r="2.5" fill="#ffffff"/>
  <ellipse cx="200" cy="237" rx="7" ry="8" fill="#1a1a2e" stroke="#2d263c" stroke-width="2"/>
  <circle cx="202" cy="235" r="2.5" fill="#ffffff"/>

  <!-- 口(おおきなニコニコ) -->
  <path d="M 148 258 Q 155 278 180 282 Q 206 281 214 260" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- 舌 -->
  <ellipse cx="181" cy="276" rx="18" ry="10" fill="#f07080" stroke="#2d263c" stroke-width="4"/>

  <!-- ほっぺの赤み(左) -->
