<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <ellipse cx="180" cy="330" rx="70" ry="14" fill="#2d263c" opacity="0.15"/>
  <!-- leaf on top -->
  <path d="M180 55 C 150 35, 140 10, 168 20 C 178 30, 178 48, 180 60 Z" fill="#5fb86a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- stem -->
  <path d="M180 70 L178 40" stroke="#2d263c" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- apple shell (main body) -->
  <path d="M180 65
           C 240 65, 275 115, 270 175
           C 266 235, 225 275, 180 275
           C 135 275, 94 235, 90 175
           C 85 115, 120 65, 180 65 Z"
        fill="#e0483f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- shell shine -->
  <path d="M130 105 C 120 130, 118 160, 128 185" stroke="#f4837a" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.8"/>
  <!-- caramel drip body peeking from bottom of apple -->
  <path d="M140 250
           C 138 285, 145 320, 180 325
           C 215 320, 222 285, 220 250
           C 210 265, 150 265, 140 250 Z"
        fill="#c9822f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- caramel drips -->
  <path d="M150 258 C 148 275, 152 288, 158 292" stroke="#a8681f" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M210 258 C 212 275, 208 288, 202 292" stroke="#a8681f" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- little caramel arms -->
  <path d="M120 210 C 100 215, 90 230, 95 245" stroke="#c9822f" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M120 210 C 100 215, 90 230, 95 245" stroke="#2d263c" stroke-width="18" stroke-linecap="round" fill="none" opacity="0" />
  <path d="M240 210 C 260 215, 270 230, 265 245" stroke="#c9822f" stroke-width="16" stroke-linecap="round" fill="none"/>
  <!-- face -->
  <ellipse cx="150" cy="185" rx="10" ry="13" fill="#2d263c"/>
  <ellipse cx="210" cy="185" rx="10" ry="13" fill="#2d263c"/>
  <circle cx="146" cy="180" r="3.5" fill="#fff"/>
  <circle cx="206" cy="180" r="3.5" fill="#fff"/>
  <!-- blush -->
  <ellipse cx="130" cy="205" rx="12" ry="7" fill="#f4837a" opacity="0.6"/>
  <ellipse cx="230" cy="205" rx="12" ry="7" fill="#f4837a" opacity="0.6"/>
  <!-- mouth -->
  <path d="M165 210 Q 180 222 195 210" stroke="#2d263c" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- shell texture lines -->
  <path d="M180 75 L180 260" stroke="#2d263c" stroke-width="4" opacity="0.3" fill="none"/>
  <path d="M100 150 C 130 170, 230 170, 260 150" stroke="#2d263c" stroke-width="3" opacity="0.25" fill="none"/>
</svg>
