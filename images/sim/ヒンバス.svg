<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尾びれ(ヨレヨレ・不揃い) -->
  <path d="M 60 195 Q 30 165 25 150 Q 45 175 65 180 Q 40 195 30 220 Q 55 210 68 200 Z" fill="#b57a5f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 背びれ(小さくみすぼらしい) -->
  <path d="M 150 110 Q 145 85 155 65 Q 165 85 168 112 Q 158 108 150 110 Z" fill="#b57a5f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 205 108 Q 210 88 222 75 Q 225 92 220 112 Q 212 108 205 108 Z" fill="#b57a5f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 胸びれ -->
  <path d="M 130 210 Q 100 220 85 245 Q 110 240 135 228 Z" fill="#b57a5f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 245 210 Q 275 218 292 242 Q 267 238 242 226 Z" fill="#b57a5f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 胴体(ボテッと丸い魚型) -->
  <path d="M 195 90
           Q 260 95 280 150
           Q 295 195 260 235
           Q 220 265 180 265
           Q 130 263 100 230
           Q 70 195 85 150
           Q 100 100 165 90
           Q 180 87 195 90 Z"
        fill="#cf8f74" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹(薄い色) -->
  <path d="M 120 210 Q 150 245 190 245 Q 225 243 245 215 Q 220 250 180 253 Q 140 250 120 210 Z"
        fill="#ecd2bd" stroke="none"/>

  <!-- まだら模様(濃い茶色の斑点) -->
  <ellipse cx="140" cy="130" rx="12" ry="9" fill="#8a5a42" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="205" cy="120" rx="10" ry="8" fill="#8a5a42" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="240" cy="160" rx="11" ry="9" fill="#8a5a42" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="110" cy="175" rx="9" ry="8" fill="#8a5a42" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="175" cy="200" rx="10" ry="7" fill="#8a5a42" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="235" cy="205" rx="8" ry="7" fill="#8a5a42" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="95" cy="140" rx="7" ry="6" fill="#8a5a42" stroke="#2d263c" stroke-width="3"/>

  <!-- 目(大きくてしょぼくれた表情) -->
  <circle cx="150" cy="160" r="20" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="220" cy="160" r="20" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="153" cy="163" r="9" fill="#2d263c"/>
  <circle cx="217" cy="163" r="9" fill="#2d263c"/>

  <!-- しょぼくれた口(への字) -->
  <path d="M 165 205 Q 185 195 205 205" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
