  <!-- back legs -->
  <rect x="88" y="248" width="26" height="78" rx="12" fill="#f7f0dc" stroke="#2d263c" stroke-width="7"/>
  <rect x="128" y="252" width="26" height="76" rx="12" fill="#f7f0dc" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="101" cy="326" rx="15" ry="9" fill="#2d263c"/>
  <ellipse cx="141" cy="328" rx="15" ry="9" fill="#2d263c"/>
  <rect x="90" y="285" width="22" height="12" rx="5" fill="#242430"/>
  <rect x="130" y="288" width="22" height="12" rx="5" fill="#242430"/>

  <!-- body -->
  <ellipse cx="168" cy="218" rx="98" ry="56" fill="#f7f0dc" stroke="#2d263c" stroke-width="8"/>

  <!-- front legs (in front of body) -->
  <rect x="205" y="252" width="26" height="80" rx="12" fill="#f7f0dc" stroke="#2d263c" stroke-width="7"/>
  <rect x="238" y="248" width="26" height="82" rx="12" fill="#f7f0dc" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="218" cy="330" rx="15" ry="9" fill="#2d263c"/>
  <ellipse cx="251" cy="328" rx="15" ry="9" fill="#2d263c"/>
  <rect x="207" y="288" width="22" height="12" rx="5" fill="#242430"/>
  <rect x="240" y="284" width="22" height="12" rx="5" fill="#242430"/>

  <!-- zebra stripes on body -->
  <path d="M105,175 C118,205 96,242 112,278" stroke="#242430" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M138,168 C150,202 128,240 144,280" stroke="#242430" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M172,166 C184,200 162,240 176,280" stroke="#242430" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M205,172 C216,202 196,238 210,272" stroke="#242430" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- neck -->
  <polygon points="235,178 272,138 308,162 272,232" fill="#f7f0dc" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- head -->
  <circle cx="298" cy="168" r="42" fill="#f7f0dc" stroke="#2d263c" stroke-width="8"/>

  <!-- ears -->
  <polygon points="278,138 286,96 300,142" fill="#f7f0dc" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="303,136 314,94 322,140" fill="#f7f0dc" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="282,132 286,108 293,136" fill="#242430"/>
  <polygon points="307,130 314,106 318,136" fill="#242430"/>

  <!-- lightning-bolt mane (signature) -->
  <polygon points="292,98 308,132 292,140 312,172 278,150 298,144 282,112" fill="#ffd93b" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- muzzle -->
  <ellipse cx="333" cy="182" rx="18" ry="14" fill="#e8d9b8" stroke="#2d263c" stroke-width="6"/>
  <circle cx="339" cy="184" r="3" fill="#242430"/>

  <!-- eye -->
  <circle cx="308" cy="158" r="7" fill="#242430"/>
  <circle cx="310" cy="155" r="2.3" fill="#ffffff"/>
