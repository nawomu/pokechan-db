<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (back) -->
  <polygon points="78,215 48,192 55,218 35,235 62,238 80,228" fill="#f7f0dc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
