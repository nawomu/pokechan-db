<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ===== チャーレム 落書きSVG ===== -->

  <!-- 後ろ脚(左) -->
  <ellipse cx="148" cy="305" rx="22" ry="14" fill="#c8921a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="130" y="272" width="28" height="42" rx="10" fill="#c8921a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ脚(右) -->
  <ellipse cx="212" cy="308" rx="20" ry="13" fill="#c8921a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="196" y="270" width="30" height="45" rx="10" fill="#c8921a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- パンツ状の模様(下半身) -->
  <ellipse cx="180" cy="268" rx="46" ry="30" fill="#c8921a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <ellipse cx="180" cy="220" rx="38" ry="55" fill="#e8e0d4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体下部の接続(白) -->
  <rect x="148" y="240" width="64" height="32" rx="8" fill="#e8e0d4" stroke="none"/>

  <!-- 左腕 -->
  <path d="M152 200 Q128 195 118 220 Q112 235 122 242" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="118" cy="245" rx="13" ry="10" fill="#e8e0d4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 右腕 -->
  <path d="M208 200 Q234 192 244 218 Q250 233 238 240" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="240" cy="243" rx="13" ry="10" fill="#e8e0d4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 首 -->
  <rect x="166" y="153" width="28" height="22" rx="8" fill="#e8d8c0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="181" cy="130" rx="50" ry="48" fill="#e8d8c0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左角(V字・ゆがみ気味) -->
  <path d="M158 92 Q140 55 128 28" fill="none" stroke="#e8a020" stroke-width="9" stroke-linecap="round"/>
  <!-- 左角先端の膨らみ -->
  <circle cx="126" cy="25" r="8" fill="#e8a020" stroke="#2d263c" stroke-width="6"/>

  <!-- 右角(V字・少し長め) -->
  <path d="M200 90 Q220 52 236 24" fill="none" stroke="#e8a020" stroke-width="9" stroke-linecap="round"/>
  <!-- 右角先端の膨らみ -->
  <circle cx="238" cy="21" r="8" fill="#e8a020" stroke="#2d263c" stroke-width="6"/>

  <!-- 額のひし形マーク(赤) -->
  <polygon points="181,92 192,104 181,116 170,104" fill="#d63030" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左目 -->
  <ellipse cx="160" cy="132" rx="12" ry="8" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="162" cy="133" rx="6" ry="6" fill="#1a1a2e"/>
  <circle cx="164" cy="131" r="2" fill="white"/>
  <!-- 切れ長まぶた -->
  <path d="M148 128 Q160 123 172 128" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 右目(少し大きめ・子どもっぽいゆがみ) -->
  <ellipse cx="200" cy="131" rx="13" ry="9" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="202" cy="132" rx="7" ry="7" fill="#1a1a2e"/>
  <circle cx="204" cy="130" r="2" fill="white"/>
  <!-- 切れ長まぶた -->
  <path d="M188 127 Q200 122 214 127" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 鼻 -->
  <ellipse cx="181" cy="148" rx="4" ry="3" fill="#c0a080" stroke="#2d263c" stroke-width="3"/>

  <!-- 口(真一文字・凛とした) -->
  <path d="M170 160 Q181 157 192 160" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 頬のうっすら赤み(左) -->
  <ellipse cx="148" cy="148" rx="12" ry="7" fill="#e87070" opacity="0.35"/>
  <!-- 頬のうっすら赤み(右) -->
  <ellipse cx="214" cy="147" rx="11" ry="7" fill="#e87070" opacity="0.35"/>

  <!-- 耳(左・小さいどんぐり耳) -->
  <path d="M148 95 Q138 74 148 68 Q158 74 155 92" fill="#e8d8c0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 耳(右・少し高め) -->
  <path d="M212 93 Q220 70 230 68 Q236 76 222 94" fill="#e8d8c0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胸の白い部分 -->
  <ellipse cx="180" cy="205" rx="22" ry="18" fill="white" stroke="none"/>

</svg>