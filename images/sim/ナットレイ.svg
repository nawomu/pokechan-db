<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- curly vine stalk on top (behind body) -->
  <path d="M180 20 Q168 38 183 52 Q198 66 180 80 Q166 90 180 100" fill="none" stroke="#6b4a2f" stroke-width="8" stroke-linecap="round"/>

  <!-- left hanging vine arm -->
  <path d="M150 262 Q140 292 133 315" fill="none" stroke="#6b4a2f" stroke-width="9" stroke-linecap="round"/>
  <!-- right hanging vine arm -->
  <path d="M210 262 Q220 292 227 315" fill="none" stroke="#6b4a2f" stroke-width="9" stroke-linecap="round"/>

  <!-- big left thorn -->
  <path d="M100 150 L50 115 L128 168 Z" fill="#8a2e2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- big right thorn -->
  <path d="M260 150 L310 115 L232 168 Z" fill="#8a2e2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- main body -->
  <path d="M180 95 Q235 90 255 140 Q270 178 250 220 Q235 258 180 268 Q125 258 110 220 Q90 178 105 140 Q125 90 180 95 Z"
        fill="#4fa84a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- body shading highlight -->
  <path d="M135 130 Q150 110 175 108" fill="none" stroke="#7ec876" stroke-width="7" stroke-linecap="round"/>

  <!-- small lower-left thorn -->
  <path d="M115 228 L92 258 L142 244 Z" fill="#2f7a35" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- small lower-right thorn -->
  <path d="M245 228 L268 258 L218 244 Z" fill="#2f7a35" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- top crown thorn -->
  <path d="M160 100 L180 40 L200 100 Z" fill="#8a2e2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- left iron ball -->
  <circle cx="133" cy="322" r="17" fill="#4fa84a" stroke="#2d263c" stroke-width="6"/>
  <path d="M120 332 L108 344 L128 340 Z" fill="#8a2e2e" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- right iron ball -->
  <circle cx="227" cy="322" r="17" fill="#4fa84a" stroke="#2d263c" stroke-width="6"/>
  <path d="M240 332 L252 344 L232 340 Z" fill="#8a2e2e" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- face plate -->
  <ellipse cx="180" cy="205" rx="38" ry="27" fill="#6b1f1f" stroke="#2d263c" stroke-width="6"/>

  <!-- zigzag mouth -->
  <path d="M150 212 L160 197 L170 212 L180 197 L190 212 L200 197 L210 212" fill="none" stroke="#fff8ea" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- eyes -->
  <circle cx="158" cy="163" r="9" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="202" cy="163" r="9" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="158" cy="163" r="3" fill="#2d263c"/>
  <circle cx="202" cy="163" r="3" fill="#2d263c"/>
</svg>
