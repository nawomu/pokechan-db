<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 影 -->
  <ellipse cx="180" cy="325" rx="120" ry="16" fill="#3a2a1a" opacity="0.2"/>

  <!-- 体後ろ側(でっぱり・特大感) -->
  <path d="M 40 190 Q 30 260 60 305 Q 100 340 180 340 Q 260 340 300 305 Q 330 260 320 190 Q 300 150 180 148 Q 60 150 40 190 Z"
        fill="#9a5a1e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体メイン(かぼちゃ・特大) -->
  <path d="M 48 195 Q 36 262 66 302 Q 106 336 180 336 Q 254 336 294 302 Q 324 262 312 195 Q 296 158 180 155 Q 64 158 48 195 Z"
        fill="#d97b28" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 縦のくぼみ線(かぼちゃの筋・左端) -->
  <path d="M 92 172 Q 72 250 96 312" fill="none" stroke="#b5601c" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
  <!-- 縦のくぼみ線(左) -->
  <path d="M 138 160 Q 122 250 140 325" fill="none" stroke="#b5601c" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
  <!-- 縦のくぼみ線(中央やや右) -->
  <path d="M 222 160 Q 238 250 220 325" fill="none" stroke="#b5601c" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
  <!-- 縦のくぼみ線(右端) -->
  <path d="M 268 172 Q 288 250 264 312" fill="none" stroke="#b5601c" stroke-width="7" stroke-linecap="round" opacity="0.8"/>

  <!-- 顔まわりの明るいパッチ(彫った跡) -->
  <path d="M 118 210 Q 108 262 130 300 Q 155 322 180 322 Q 205 322 230 300 Q 252 262 242 210 Q 210 190 180 190 Q 150 190 118 210 Z"
        fill="#f0a94a" opacity="0.55"/>

  <!-- ヘタ(茎) -->
  <path d="M 165 152 Q 158 118 172 96 Q 180 82 192 80 Q 204 80 202 94 Q 198 112 182 128 Q 172 138 172 152 Z"
        fill="#6a8f3a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 茎から伸びるツル(カール) -->
  <path d="M 196 92 Q 214 82 218 64 Q 220 50 208 46 Q 196 44 196 58"
        fill="none" stroke="#4f7a2a" stroke-width="7" stroke-linecap="round"/>

  <!-- 葉っぱ(小) -->
  <path d="M 158 118 Q 132 110 122 122 Q 116 132 128 140 Q 144 146 160 132 Z"
        fill="#6a8f3a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(左・三角の彫り・ギザギザ) -->
  <path d="M 118 232 L 148 226 L 150 250 L 122 258 Z"
        fill="#3a2a10" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 目の光 -->
  <path d="M 126 236 L 140 233 L 141 244 L 128 248 Z" fill="#a8e878" opacity="0.85"/>

  <!-- 目(右・三角の彫り) -->
  <path d="M 242 232 L 212 226 L 210 250 L 238 258 Z"
        fill="#3a2a10" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 234 236 L 220 233 L 219 244 L 232 248 Z" fill="#a8e878" opacity="0.85"/>

  <!-- 鼻(小さな三角の彫り) -->
  <path d="M 172 268 L 188 268 L 180 282 Z" fill="#3a2a10" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 口(ギザギザのジャックオーランタン風) -->
  <path d="M 128 296 Q 140 316 155 300 Q 165 314 180 300 Q 195 314 205 300 Q 220 316 232 296 Q 224 320 180 324 Q 136 320 128 296 Z"
        fill="#3a2a10" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 口の中の光 -->
  <path d="M 148 300 Q 158 310 168 302" fill="none" stroke="#a8e878" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- 左のとげ(葉のような突起) -->
  <path d="M 48 200 Q 30 190 26 172 Q 24 160 36 160 Q 48 162 52 180 Q 54 192 48 200 Z"
        fill="#9a5a1e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 右のとげ -->
  <path d="M 312 200 Q 330 190 334 172 Q 336 160 324 160 Q 312 162 308 180 Q 306 192 312 200 Z"
        fill="#9a5a1e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

</svg>
