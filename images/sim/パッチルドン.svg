<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail -->
  <path d="M235 250 Q270 255 268 285 Q262 300 245 292 Q240 270 225 255 Z" fill="#3f6fc4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- back leg (small, blue, dino-like) -->
  <path d="M205 275 Q198 305 190 320 L222 320 Q228 300 224 275 Z" fill="#3f6fc4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M188 318 Q186 330 200 330 L222 330 Q224 320 220 318 Z" fill="#cfe6ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- front leg -->
  <path d="M140 275 Q133 305 126 320 L158 320 Q163 300 160 275 Z" fill="#3f6fc4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M124 318 Q122 330 136 330 L158 330 Q160 320 156 318 Z" fill="#cfe6ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- big fluffy orange body -->
  <path d="M115 160 Q95 220 130 265 Q165 300 200 280 Q245 255 245 200 Q245 140 195 115 Q140 100 115 160 Z"
        fill="#f2942f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

