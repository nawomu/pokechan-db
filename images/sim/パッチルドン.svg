  <path d="M118 175 Q108 168 108 155" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M230 175 Q242 168 244 152" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- cream belly patch -->
  <path d="M150 195 Q145 235 175 255 Q205 265 215 235 Q220 205 195 190 Q170 178 150 195 Z"
        fill="#fff3d6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- small nub arm left -->
  <path d="M112 195 Q90 200 80 215 Q92 222 105 212 Z" fill="#f2942f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- small nub arm right -->
  <path d="M248 195 Q270 200 280 215 Q268 222 255 212 Z" fill="#f2942f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- head -->
  <circle cx="180" cy="120" r="62" fill="#f2942f" stroke="#2d263c" stroke-width="8"/>

  <!-- head fluff / lightning tuft -->
  <path d="M180 60 Q168 30 188 15 Q178 40 195 45 Q210 30 205 55 Q200 68 182 65 Z"
        fill="#ffd93f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- cheek fluff -->
  <path d="M120 130 Q100 125 95 108" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M240 130 Q260 125 265 108" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- big round eyes -->
  <circle cx="158" cy="118" r="17" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="203" cy="118" r="17" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="161" cy="121" r="7" fill="#2d263c"/>
  <circle cx="206" cy="121" r="7" fill="#2d263c"/>

  <!-- small beak -->
  <path d="M172 142 Q180 152 188 142 Q180 148 172 142 Z" fill="#3f6fc4" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- ice crystal on chest -->
  <path d="M180 210 L188 225 L180 240 L172 225 Z" fill="#a9d8ff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
</svg>
