<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <ellipse cx="180" cy="300" rx="70" ry="14" fill="#2d263c" opacity="0.12"/>

  <!-- ghostly wispy lower body (fading tail/legs) -->
  <path d="M120 250 Q110 285 130 305 Q140 288 150 305 Q158 288 168 308 Q176 288 186 306 Q194 286 204 304 Q214 286 222 300 Q234 282 226 250 Z"
        fill="#f6e9cf" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- main body -->
  <ellipse cx="176" cy="215" rx="88" ry="72" fill="#f6e9cf" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- black back patch -->
  <path d="M110 175 Q150 130 210 145 Q248 155 250 195 Q230 175 190 172 Q145 170 118 205 Z"
        fill="#332c3f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ghost flame tail -->
  <path d="M258 220 Q300 205 296 170 Q292 195 278 190 Q292 165 280 140 Q275 168 260 175 Q268 148 250 130 Q252 165 236 178 Q244 200 258 220 Z"
        fill="#2d263c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ears (droopy) -->
  <path d="M112 165 Q80 175 78 225 Q80 255 104 250 Q94 210 112 165 Z"
        fill="#332c3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M228 150 Q262 152 272 195 Q276 225 254 226 Q252 188 228 150 Z"
        fill="#f6e9cf" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- head -->
  <circle cx="150" cy="165" r="66" fill="#f6e9cf" stroke="#2d263c" stroke-width="8"/>

  <!-- head black patch over one eye -->
  <path d="M96 130 Q118 100 156 108 Q170 118 160 140 Q135 128 110 140 Q98 138 96 130 Z"
        fill="#332c3f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- muzzle -->
  <ellipse cx="140" cy="196" rx="34" ry="24" fill="#fffaf0" stroke="#2d263c" stroke-width="6"/>

  <!-- nose -->
  <ellipse cx="122" cy="192" rx="9" ry="7" fill="#2d263c"/>

  <!-- eyes: sad round -->
  <circle cx="118" cy="152" r="12" fill="#2d263c"/>
  <circle cx="122" cy="148" r="3.5" fill="#f6e9cf"/>
  <circle cx="172" cy="158" r="11" fill="#2d263c"/>
  <circle cx="176" cy="154" r="3" fill="#f6e9cf"/>

  <!-- brow lines for sad look -->
  <path d="M100 130 Q112 122 128 128" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- mouth -->
  <path d="M126 208 Q140 216 154 206" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- little front paw nubs -->
  <ellipse cx="150" cy="272" rx="18" ry="12" fill="#f6e9cf" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="204" cy="270" rx="18" ry="12" fill="#332c3f" stroke="#2d263c" stroke-width="6"/>
</svg>
