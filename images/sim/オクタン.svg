<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- back tentacles (behind body) -->
  <path d="M110 235 Q90 270 100 310 Q104 320 112 314 Q108 280 122 240 Z" fill="#2c3a72" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M250 235 Q272 268 264 308 Q260 318 252 312 Q254 280 240 240 Z" fill="#2c3a72" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- dangling front tentacles -->
  <path d="M130 245 Q118 285 128 325 Q133 335 141 328 Q135 292 145 248 Z" fill="#3b4f9b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M158 252 Q150 296 158 332 Q163 340 170 334 Q166 298 172 254 Z" fill="#3b4f9b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M188 255 Q186 300 190 335 Q194 342 200 336 Q198 300 200 255 Z" fill="#3b4f9b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M216 252 Q222 296 216 332 Q212 340 206 333 Q210 298 202 254 Z" fill="#3b4f9b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M242 244 Q256 284 246 322 Q241 332 233 325 Q239 290 227 248 Z" fill="#3b4f9b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M100 230 Q80 260 84 292 Q87 300 95 294 Q92 266 108 236 Z" fill="#3b4f9b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M260 230 Q282 258 280 290 Q278 298 270 293 Q271 264 254 236 Z" fill="#3b4f9b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- suckers on a couple of tentacles -->
  <circle cx="134" cy="290" r="6" fill="#2c3a72"/>
  <circle cx="222" cy="292" r="6" fill="#2c3a72"/>

  <!-- main round body -->
  <ellipse cx="180" cy="175" rx="105" ry="95" fill="#3b4f9b" stroke="#2d263c" stroke-width="8"/>

  <!-- darker top shading -->
  <path d="M85 150 Q110 90 180 82 Q250 90 275 150 Q220 118 180 118 Q140 118 85 150 Z" fill="#31427f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- cream face/belly patch -->
  <ellipse cx="180" cy="205" rx="76" ry="62" fill="#f2e2b8" stroke="#2d263c" stroke-width="7"/>

  <!-- cannon nose -->
  <rect x="150" y="188" width="60" height="40" rx="18" fill="#c99a5b" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="205" cy="208" rx="16" ry="20" fill="#8a6335" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="205" cy="208" rx="6" ry="9" fill="#2d263c"/>

  <!-- eyes -->
  <circle cx="148" cy="175" r="24" fill="#fdfdf5" stroke="#2d263c" stroke-width="7"/>
  <circle cx="148" cy="178" r="11" fill="#2d263c"/>
  <circle cx="153" cy="173" r="4" fill="#fdfdf5"/>

  <!-- second eye slightly higher for a friendly tilt -->
  <circle cx="118" cy="168" r="20" fill="#fdfdf5" stroke="#2d263c" stroke-width="7"/>
  <circle cx="118" cy="171" r="9" fill="#2d263c"/>
  <circle cx="122" cy="167" r="3" fill="#fdfdf5"/>

  <!-- cheek blush -->
  <ellipse cx="130" cy="210" rx="12" ry="7" fill="#e8a9a0" opacity="0.7"/>

  <!-- small smile -->
  <path d="M150 222 Q168 234 186 222" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
