<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尾びれ(体の後ろ) -->
  <path d="M78,180 L26,103 Q14,180 26,258 L78,180 Z" fill="#f3d35e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 背びれ -->
  <path d="M150,140 L176,86 L202,140 Z" fill="#243361" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 胴体(魚雷型) -->
  <path d="M90,130 C150,88 232,94 272,130 C302,152 302,210 272,232 C232,268 150,272 90,232 C58,210 58,150 90,130 Z"
        fill="#33478d" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- しっぽ付け根の小さいひれ(尻びれ) -->
  <path d="M150,258 Q178,286 200,260 Q178,250 150,258 Z" fill="#243361" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 胸びれ -->
  <path d="M132,222 Q150,262 178,236 Q158,216 132,222 Z" fill="#243361" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- おなか(クリーム色) -->
  <path d="M112,222 C150,262 220,266 262,232 C258,250 210,262 170,260 C142,258 122,244 112,222 Z" fill="#f7eecb"/>

  <!-- 体の模様(しま) -->
  <path d="M128,112 Q108,180 130,246" fill="none" stroke="#1f2c54" stroke-width="6" stroke-linecap="round"/>
  <path d="M172,100 Q150,180 174,258" fill="none" stroke="#1f2c54" stroke-width="6" stroke-linecap="round"/>
  <path d="M214,106 Q194,180 216,252" fill="none" stroke="#1f2c54" stroke-width="6" stroke-linecap="round"/>

  <!-- 鉄砲のような口先(筒) -->
  <path d="M268,166 L318,172 Q336,180 318,196 L268,196 Q258,181 268,166 Z"
        fill="#556198" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 筒の先(黒っぽい銃口) -->
  <circle cx="329" cy="183" r="11" fill="#25243b" stroke="#2d263c" stroke-width="6"/>

  <!-- 目 -->
  <circle cx="252" cy="150" r="15" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="255" cy="150" r="7" fill="#1a1a1a"/>
  <circle cx="258" cy="145" r="3" fill="#ffffff"/>

  <!-- 口先の付け根の線 -->
  <path d="M263,184 Q272,190 280,188" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <ellipse cx="230" cy="176" rx="9" ry="6" fill="#ffb4c6"/>
</svg>
