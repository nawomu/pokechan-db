<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- wings back -->
  <ellipse cx="145" cy="155" rx="52" ry="28" fill="#d0e8f8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-30 145 155)" opacity="0.85"/>
  <ellipse cx="215" cy="155" rx="52" ry="28" fill="#d0e8f8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(30 215 155)" opacity="0.85"/>
  <ellipse cx="140" cy="170" rx="35" ry="18" fill="#c0ddf0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(-40 140 170)" opacity="0.8"/>
  <ellipse cx="220" cy="170" rx="35" ry="18" fill="#c0ddf0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(40 220 170)" opacity="0.8"/>

  <!-- abdomen / tail segment -->
  <ellipse cx="180" cy="295" rx="22" ry="38" fill="#1e2f5e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="180" cy="315" rx="14" ry="20" fill="#162248" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- body thorax -->
  <ellipse cx="180" cy="220" rx="38" ry="52" fill="#2a3a6e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- belly pale -->
  <ellipse cx="180" cy="225" rx="22" ry="35" fill="#f0ead2" stroke="none"/>
  <!-- belly stripe detail -->
  <line x1="168" y1="210" x2="168" y2="248" stroke="#d8d0b0" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="207" x2="180" y2="252" stroke="#d8d0b0" stroke-width="3" stroke-linecap="round"/>
  <line x1="192" y1="210" x2="192" y2="248" stroke="#d8d0b0" stroke-width="3" stroke-linecap="round"/>

  <!-- left scythe arm upper -->
  <path d="M155 200 Q115 175 90 155 Q65 130 72 108" fill="none" stroke="#2a3a6e" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M155 200 Q115 175 90 155 Q65 130 72 108" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- left scythe blade -->
  <path d="M72 108 Q48 88 58 65 Q72 45 95 62 Q78 80 80 100 Z" fill="#c8d8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- right scythe arm upper -->
  <path d="M205 200 Q245 175 270 155 Q295 130 288 108" fill="none" stroke="#2a3a6e" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M205 200 Q245 175 270 155 Q295 130 288 108" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- right scythe blade -->
  <path d="M288 108 Q312 88 302 65 Q288 45 265 62 Q282 80 280 100 Z" fill="#c8d8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- small legs left -->
  <line x1="162" y1="240" x2="128" y2="268" stroke="#2a3a6e" stroke-width="9" stroke-linecap="round"/>
  <line x1="128" y1="268" x2="110" y2="290" stroke="#2a3a6e" stroke-width="7" stroke-linecap="round"/>
  <line x1="162" y1="255" x2="132" y2="285" stroke="#2a3a6e" stroke-width="8" stroke-linecap="round"/>
  <line x1="132" y1="285" x2="118" y2="308" stroke="#2a3a6e" stroke-width="6" stroke-linecap="round"/>

  <!-- small legs right -->
  <line x1="198" y1="240" x2="232" y2="268" stroke="#2a3a6e" stroke-width="9" stroke-linecap="round"/>
  <line x1="232" y1="268" x2="250" y2="290" stroke="#2a3a6e" stroke-width="7" stroke-linecap="round"/>
  <line x1="198" y1="255" x2="228" y2="285" stroke="#2a3a6e" stroke-width="8" stroke-linecap="round"/>
  <line x1="228" y1="285" x2="242" y2="308" stroke="#2a3a6e" stroke-width="6" stroke-linecap="round"/>

  <!-- neck -->
  <rect x="168" y="162" width="24" height="20" rx="6" fill="#2a3a6e" stroke="#2d263c" stroke-width="6"/>

  <!-- head -->
  <ellipse cx="180" cy="145" rx="42" ry="38" fill="#2a3a6e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- horn top -->
  <polygon points="180,107 171,125 189,125" fill="#3a4f8e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- horn tip sharper -->
  <polygon points="180,100 175,118 185,118" fill="#4a62aa" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- left eye compound -->
  <ellipse cx="155" cy="142" rx="18" ry="16" fill="#6ec040" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="155" cy="142" rx="10" ry="9" fill="#4aa020" stroke="none"/>
  <circle cx="155" cy="142" r="4" fill="#2a3a6e"/>
  <circle cx="152" cy="139" r="2" fill="white" opacity="0.7"/>

  <!-- right eye compound -->
  <ellipse cx="205" cy="142" rx="18" ry="16" fill="#6ec040" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="205" cy="142" rx="10" ry="9" fill="#4aa020" stroke="none"/>
  <circle cx="205" cy="142" r="4" fill="#2a3a6e"/>
  <circle cx="208" cy="139" r="2" fill="white" opacity="0.7"/>

  <!-- mouth line -->
  <path d="M170 158 Q180 165 190 158" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- small antennae -->
  <path d="M168 110 Q155 90 148 78" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <circle cx="147" cy="76" r="5" fill="#6ec040" stroke="#2d263c" stroke-width="4"/>
  <path d="M192 110 Q205 90 212 78" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <circle cx="213" cy="76" r="5" fill="#6ec040" stroke="#2d263c" stroke-width="4"/>
</svg>