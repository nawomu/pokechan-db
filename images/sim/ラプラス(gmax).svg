<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- shadow -->
  <ellipse cx="180" cy="328" rx="110" ry="10" fill="#00000022"/>
  <!-- tail -->
  <path d="M300 235 L335 222 L315 255 Z" fill="#5aa8ce" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- back flippers -->
  <ellipse cx="90" cy="300" rx="50" ry="24" fill="#5aa8ce" stroke="#2d263c" stroke-width="7" transform="rotate(18 90 300)"/>
  <ellipse cx="290" cy="300" rx="50" ry="24" fill="#5aa8ce" stroke="#2d263c" stroke-width="7" transform="rotate(-18 290 300)"/>
  <!-- front flippers -->
  <ellipse cx="78" cy="255" rx="50" ry="28" fill="#8fd8f5" stroke="#2d263c" stroke-width="7" transform="rotate(24 78 255)"/>
  <ellipse cx="282" cy="255" rx="50" ry="28" fill="#8fd8f5" stroke="#2d263c" stroke-width="7" transform="rotate(-24 282 255)"/>
  <!-- neck -->
  <ellipse cx="110" cy="165" rx="38" ry="85" fill="#8fd8f5" stroke="#2d263c" stroke-width="7" transform="rotate(-25 110 165)"/>
  <!-- body -->
  <ellipse cx="200" cy="225" rx="120" ry="95" fill="#8fd8f5" stroke="#2d263c" stroke-width="9"/>
  <!-- belly -->
  <ellipse cx="200" cy="262" rx="95" ry="42" fill="#fef6df" stroke="#2d263c" stroke-width="6"/>
  <!-- gmax crystal armor plate -->
  <ellipse cx="200" cy="165" rx="112" ry="50" fill="#5c8fa8" stroke="#2d263c" stroke-width="7"/>
  <!-- gmax ice crystal spikes -->
  <path d="M115 165 L150 165 L132 95 Z" fill="#d5f0fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M150 160 L195 160 L172 68 Z" fill="#eaf7fd" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M195 158 L235 158 L214 80 Z" fill="#d5f0fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M235 163 L270 163 L252 100 Z" fill="#cfe8f5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- head -->
  <circle cx="95" cy="95" r="48" fill="#8fd8f5" stroke="#2d263c" stroke-width="8"/>
  <!-- head nubs -->
  <circle cx="75" cy="55" r="13" fill="#5c8fa8" stroke="#2d263c" stroke-width="6"/>
  <circle cx="110" cy="50" r="13" fill="#5c8fa8" stroke="#2d263c" stroke-width="6"/>
  <!-- eyes -->
  <circle cx="75" cy="90" r="13" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="112" cy="84" r="13" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="73" cy="93" r="5" fill="#2d263c"/>
  <circle cx="110" cy="87" r="5" fill="#2d263c"/>
  <!-- mouth -->
  <path d="M65 115 Q95 133 122 112" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- gmax dynamax energy marks -->
  <ellipse cx="90" cy="230" rx="18" ry="10" fill="#ff6b6b55" transform="rotate(20 90 230)"/>
  <ellipse cx="310" cy="230" rx="18" ry="10" fill="#ff6b6b55" transform="rotate(-20 310 230)"/>
