<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 左腕(後ろ) -->
  <ellipse cx="62" cy="195" rx="44" ry="38" fill="#b2e87a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左腕の輪っか区切り -->
  <ellipse cx="62" cy="195" rx="32" ry="26" fill="none" stroke="#2d263c" stroke-width="4" stroke-dasharray="6 4"/>
  <!-- 左手のひら -->
  <ellipse cx="38" cy="228" rx="28" ry="24" fill="#c8f08a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左手指1 -->
  <circle cx="22" cy="248" r="12" fill="#c8f08a" stroke="#2d263c" stroke-width="6"/>
  <!-- 左手指2 -->
  <circle cx="40" cy="256" r="11" fill="#c8f08a" stroke="#2d263c" stroke-width="6"/>
  <!-- 左手指3 -->
  <circle cx="57" cy="250" r="10" fill="#c8f08a" stroke="#2d263c" stroke-width="6"/>

  <!-- 右腕(後ろ) -->
  <ellipse cx="298" cy="193" rx="44" ry="38" fill="#b2e87a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右腕の輪っか区切り -->
  <ellipse cx="298" cy="193" rx="32" ry="26" fill="none" stroke="#2d263c" stroke-width="4" stroke-dasharray="6 4"/>
  <!-- 右手のひら -->
  <ellipse cx="322" cy="226" rx="28" ry="24" fill="#c8f08a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右手指1 -->
  <circle cx="338" cy="246" r="12" fill="#c8f08a" stroke="#2d263c" stroke-width="6"/>
  <!-- 右手指2 -->
  <circle cx="320" cy="255" r="11" fill="#c8f08a" stroke="#2d263c" stroke-width="6"/>
  <!-- 右手指3 -->
  <circle cx="303" cy="248" r="10" fill="#c8f08a" stroke="#2d263c" stroke-width="6"/>

  <!-- 体(メイン) -->
  <ellipse cx="181" cy="195" rx="98" ry="105" fill="#a8e060" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体の内側コア(半透明感の表現) -->
  <ellipse cx="181" cy="198" rx="68" ry="74" fill="#c8f28a" stroke="#2d263c" stroke-width="3" stroke-dasharray="8 5"/>

  <!-- 体の中のさらに内側(核) -->
  <ellipse cx="183" cy="204" rx="38" ry="42" fill="#d4f7a0" stroke="#2d263c" stroke-width="2.5" stroke-dasharray="5 5"/>

  <!-- 頭(体の上部、ちょっと丸く) -->
  <ellipse cx="181" cy="148" rx="72" ry="66" fill="#a8e060" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の内層 -->
  <ellipse cx="181" cy="148" rx="52" ry="48" fill="#c0ed78" stroke="#2d263c" stroke-width="2.5" stroke-dasharray="7 4"/>

  <!-- 目(左) 白目 -->
  <ellipse cx="157" cy="148" rx="20" ry="22" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 目(左) 黒瞳 -->
  <ellipse cx="160" cy="151" rx="11" ry="12" fill="#1a1a2e"/>
  <!-- 目(左) ハイライト -->
  <circle cx="154" cy="145" r="4" fill="white"/>

  <!-- 目(右) 白目 -->
  <ellipse cx="207" cy="146" rx="21" ry="23" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 目(右) 黒瞳 -->
  <ellipse cx="210" cy="149" rx="12" ry="13" fill="#1a1a2e"/>
  <!-- 目(右) ハイライト -->
  <circle cx="204" cy="143" r="4.5" fill="white"/>

  <!-- 口(ちょっとにやっと) -->
  <path d="M168 174 Q181 186 196 173" fill="none" stroke="#2d263c" stroke-width="5.5" stroke-linecap="round"/>

  <!-- ほっぺ(左) ちょっと赤み -->
  <ellipse cx="144" cy="170" rx="14" ry="9" fill="#f0c0c0" opacity="0.6"/>
  <!-- ほっぺ(右) -->
  <ellipse cx="220" cy="168" rx="15" ry="9" fill="#f0c0c0" opacity="0.6"/>

  <!-- 体下部のふくらみ -->
  <ellipse cx="181" cy="285" rx="70" ry="38" fill="#a8e060" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足(左) -->
  <ellipse cx="155" cy="312" rx="30" ry="20" fill="#b2e87a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 足(右) -->
  <ellipse cx="210" cy="316" rx="28" ry="19" fill="#b2e87a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体ハイライト(ぷよぷよ感) -->
  <ellipse cx="155" cy="120" rx="22" ry="14" fill="white" opacity="0.28"/>
</svg>