<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
<g id="mega-burst"><circle cx="180" cy="180" r="172" fill="#fff3c0"/><polygon points="180,180 450.0,180.0 444.8,232.7" fill="#ffd96b"/><polygon points="180,180 429.4,283.3 404.5,330.0" fill="#ffb13d"/><polygon points="180,180 370.9,370.9 330.0,404.5" fill="#ffd96b"/><polygon points="180,180 283.3,429.4 232.7,444.8" fill="#ffb13d"/><polygon points="180,180 180.0,450.0 127.3,444.8" fill="#ffd96b"/><polygon points="180,180 76.7,429.4 30.0,404.5" fill="#ffb13d"/><polygon points="180,180 -10.9,370.9 -44.5,330.0" fill="#ffd96b"/><polygon points="180,180 -69.4,283.3 -84.8,232.7" fill="#ffb13d"/><polygon points="180,180 -90.0,180.0 -84.8,127.3" fill="#ffd96b"/><polygon points="180,180 -69.4,76.7 -44.5,30.0" fill="#ffb13d"/><polygon points="180,180 -10.9,-10.9 30.0,-44.5" fill="#ffd96b"/><polygon points="180,180 76.7,-69.4 127.3,-84.8" fill="#ffb13d"/><polygon points="180,180 180.0,-90.0 232.7,-84.8" fill="#ffd96b"/><polygon points="180,180 283.3,-69.4 330.0,-44.5" fill="#ffb13d"/><polygon points="180,180 370.9,-10.9 404.5,30.0" fill="#ffd96b"/><polygon points="180,180 429.4,76.7 444.8,127.3" fill="#ffb13d"/><circle cx="180" cy="180" r="120" fill="#fff3c0" opacity="0.55"/></g>
  <!-- 外側の大きな星(5角星) 後ろレイヤー -->
  <polygon points="180,12 210,120 330,120 232,188 268,305 180,238 92,305 128,188 30,120 150,120"
    fill="#5A2DCF" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 外側の星 明るい面(右側の光) -->
  <polygon points="180,12 210,120 330,120 232,188"
    fill="#7038F8" stroke="none"/>
  <polygon points="268,305 180,238 92,305 128,188 30,120"
    fill="#6030E8" stroke="none"/>

  <!-- 外側の星 輪郭再描画 -->
  <polygon points="180,12 210,120 330,120 232,188 268,305 180,238 92,305 128,188 30,120 150,120"
    fill="none" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 内側の小さな星(回転45度でずらして重ねる) -->
  <polygon points="180,60 200,140 285,140 218,190 242,272 180,220 118,272 142,190 75,140 160,140"
    fill="#9060FF" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 内側の星 ハイライト -->
  <polygon points="180,60 200,140 285,140 218,190"
    fill="#A87EFF" stroke="none"/>
  <polygon points="180,60 160,140 75,140 142,190"
    fill="#8050F0" stroke="none"/>

  <!-- 内側の星 輪郭再 -->
  <polygon points="180,60 200,140 285,140 218,190 242,272 180,220 118,272 142,190 75,140 160,140"
    fill="none" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 中央の宝石コア(大きく) -->
  <circle cx="180" cy="178" r="52" fill="#CC0000" stroke="#2d263c" stroke-width="7"/>
  <!-- コア グラデーション代わりの重ね円 -->
  <circle cx="180" cy="178" r="40" fill="#EE2020" stroke="none"/>
  <circle cx="180" cy="178" r="28" fill="#FF4040" stroke="none"/>
  <!-- コア 光のハイライト -->
  <ellipse cx="168" cy="163" rx="14" ry="9" fill="#FF9090" stroke="none" opacity="0.85"/>
  <ellipse cx="174" cy="158" rx="6" ry="4" fill="white" stroke="none" opacity="0.7"/>

  <!-- コアの輝き 光の筋(4方向) -->
  <line x1="180" y1="118" x2="180" y2="132" stroke="#FF6060" stroke-width="4" stroke-linecap="round"/>
  <line x1="180" y1="224" x2="180" y2="238" stroke="#FF6060" stroke-width="4" stroke-linecap="round"/>
  <line x1="128" y1="178" x2="142" y2="178" stroke="#FF6060" stroke-width="4" stroke-linecap="round"/>
  <line x1="218" y1="178" x2="232" y2="178" stroke="#FF6060" stroke-width="4" stroke-linecap="round"/>

  <!-- 斜め光の筋 -->
  <line x1="142" y1="142" x2="153" y2="153" stroke="#FF8080" stroke-width="3" stroke-linecap="round"/>
  <line x1="218" y1="142" x2="207" y2="153" stroke="#FF8080" stroke-width="3" stroke-linecap="round"/>
  <line x1="142" y1="214" x2="153" y2="203" stroke="#FF8080" stroke-width="3" stroke-linecap="round"/>
  <line x1="218" y1="214" x2="207" y2="203" stroke="#FF8080" stroke-width="3" stroke-linecap="round"/>

  <!-- 目(赤い目 コア周囲 左右) -->
  <ellipse cx="152" cy="175" rx="9" ry="7" fill="#FF0000" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="208" cy="175" rx="9" ry="7" fill="#FF0000" stroke="#2d263c" stroke-width="3"/>
  <!-- 目 ハイライト -->
  <ellipse cx="149" cy="172" rx="3" ry="2" fill="white" stroke="none"/>
  <ellipse cx="205" cy="172" rx="3" ry="2" fill="white" stroke="none"/>

  <!-- メガ進化エネルギーライン(星の辺に沿って走る光) -->
  <line x1="180" y1="20" x2="148" y2="116" stroke="#C87EFF" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="180" y1="20" x2="212" y2="116" stroke="#C87EFF" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="320" y1="122" x2="236" y2="186" stroke="#C87EFF" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="260" y1="300" x2="186" y2="236" stroke="#C87EFF" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="100" y1="300" x2="174" y2="236" stroke="#C87EFF" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="40" y1="122" x2="124" y2="186" stroke="#C87EFF" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>

  <!-- 星の先端の小さな丸(ポイント強調) -->
  <circle cx="180" cy="14" r="6" fill="#B060FF" stroke="#2d263c" stroke-width="4"/>
  <circle cx="328" cy="122" r="6" fill="#B060FF" stroke="#2d263c" stroke-width="4"/>
  <circle cx="266" cy="304" r="6" fill="#B060FF" stroke="#2d263c" stroke-width="4"/>
  <circle cx="94" cy="304" r="6" fill="#B060FF" stroke="#2d263c" stroke-width="4"/>
  <circle cx="32" cy="122" r="6" fill="#B060FF" stroke="#2d263c" stroke-width="4"/>
</svg>