<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろの星の突起(裏面・影色) -->
  <!-- 上の突起(後ろ) -->
  <polygon points="180,22 195,75 165,75" fill="#3a2a7a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右上の突起(後ろ) -->
  <polygon points="320,80 268,112 255,82" fill="#3a2a7a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右下の突起(後ろ) -->
  <polygon points="318,278 255,248 268,218" fill="#3a2a7a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 左下の突起(後ろ) -->
  <polygon points="42,278 92,218 105,248" fill="#3a2a7a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 左上の突起(後ろ) -->
  <polygon points="40,80 105,82 92,112" fill="#3a2a7a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- メイン星形ボディ -->
  <polygon
    points="180,30 207,95 278,82 238,145 310,185 238,218 268,295 185,270 148,338 130,262 50,290 88,215 18,172 94,148 58,72 128,108"
    fill="#5548c0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ボディのうっすら模様(内側の星) -->
  <polygon
    points="180,72 198,118 248,110 216,148 234,196 182,176 134,200 148,150 112,115 164,120"
    fill="#6a5fd0" stroke="none"/>

  <!-- 腹面(下半分をやや薄く) -->
  <ellipse cx="180" cy="192" rx="68" ry="62" fill="#7060d8" stroke="none"/>

  <!-- コアの外枠(光る感じ) -->
  <circle cx="182" cy="184" r="48" fill="#c060e0" stroke="#2d263c" stroke-width="7"/>
  <!-- コアの内側グラデもどき(同心円で重ね) -->
  <circle cx="182" cy="184" r="36" fill="#e040b0" stroke="none"/>
  <circle cx="182" cy="184" r="24" fill="#ff4090" stroke="none"/>
  <!-- コアの核(輝き) -->
  <circle cx="182" cy="184" r="14" fill="#ffaadd" stroke="#2d263c" stroke-width="3"/>
  <!-- コアのキラっと -->
  <ellipse cx="174" cy="176" rx="5" ry="8" fill="white" stroke="none" opacity="0.85" transform="rotate(-20,174,176)"/>
  <circle cx="188" cy="172" r="3" fill="white" stroke="none" opacity="0.7"/>

  <!-- メガ進化の追加結晶突起(上) -->
  <polygon points="180,24 172,50 188,50" fill="#aa80ff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- メガ進化の追加結晶突起(右上) -->
  <polygon points="323,76 300,96 314,108" fill="#aa80ff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- メガ進化の追加結晶突起(右下) -->
  <polygon points="322,282 296,268 312,254" fill="#aa80ff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- メガ進化の追加結晶突起(左下) -->
  <polygon points="38,282 64,268 48,254" fill="#aa80ff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- メガ進化の追加結晶突起(左上) -->
  <polygon points="37,76 60,108 46,96" fill="#aa80ff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- コア周りの輝き線(放射状) -->
  <line x1="182" y1="184" x2="182" y2="140" stroke="#ff80cc" stroke-width="2.5" opacity="0.6"/>
  <line x1="182" y1="184" x2="218" y2="162" stroke="#ff80cc" stroke-width="2.5" opacity="0.6"/>
  <line x1="182" y1="184" x2="218" y2="206" stroke="#ff80cc" stroke-width="2.5" opacity="0.6"/>
  <line x1="182" y1="184" x2="182" y2="228" stroke="#ff80cc" stroke-width="2.5" opacity="0.6"/>
  <line x1="182" y1="184" x2="146" y2="206" stroke="#ff80cc" stroke-width="2.5" opacity="0.6"/>
  <line x1="182" y1="184" x2="146" y2="162" stroke="#ff80cc" stroke-width="2.5" opacity="0.6"/>

  <!-- コアの外リング -->
  <circle cx="182" cy="184" r="48" fill="none" stroke="#cc40a0" stroke-width="3" stroke-dasharray="8,5"/>
</svg>