<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 丸っこいゾウ型の小さな体(じめん複合の赤ちゃんポケモン風フォルム)
  2. 体色は黒ごまのようなこい紫がかったグレー(#4b4657)+背中にごま粒みたいなクリーム色の斑点
  3. 顔の下からたれる短めの巻いた鼻+左右に白い小さなキバ
  4. 左右にたれた丸いゾウの耳(内耳は少し明るい色)
  5. お腹はクリーム色の明るいパッチ・4本のずんぐりした足・後ろに小さなしっぽ
  -->

  <!-- しっぽ(奥) -->
  <path d="M 268 250 q 22 8 16 32 q -6 16 -22 10" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 後ろ足(奥) -->
  <ellipse cx="103" cy="288" rx="23" ry="20" fill="#3f3a4c" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="257" cy="288" rx="23" ry="20" fill="#3f3a4c" stroke="#2d263c" stroke-width="7"/>

  <!-- 前足 -->
  <ellipse cx="136" cy="302" rx="29" ry="25" fill="#3f3a4c" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="224" cy="302" rx="29" ry="25" fill="#3f3a4c" stroke="#2d263c" stroke-width="7"/>

  <!-- 体(メイン) -->
  <ellipse cx="180" cy="210" rx="98" ry="83" fill="#4b4657" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳 -->
  <ellipse cx="93" cy="168" rx="40" ry="50" fill="#3f3a4c" stroke="#2d263c" stroke-width="7" transform="rotate(-18 93 168)"/>
  <ellipse cx="267" cy="168" rx="40" ry="50" fill="#3f3a4c" stroke="#2d263c" stroke-width="7" transform="rotate(18 267 168)"/>
  <ellipse cx="97" cy="170" rx="20" ry="28" fill="#6b6478" transform="rotate(-18 97 170)"/>
  <ellipse cx="263" cy="170" rx="20" ry="28" fill="#6b6478" transform="rotate(18 263 170)"/>

  <!-- お腹の明るいパッチ -->
  <ellipse cx="180" cy="252" rx="55" ry="42" fill="#ded0b0" stroke="#2d263c" stroke-width="6"/>

  <!-- ごま模様の斑点 -->
  <ellipse cx="122" cy="158" rx="10" ry="7" fill="#f2e8cf" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="232" cy="152" rx="9" ry="7" fill="#f2e8cf" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="103" cy="212" rx="9" ry="6" fill="#f2e8cf" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="256" cy="205" rx="9" ry="6" fill="#f2e8cf" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="150" cy="135" rx="8" ry="5" fill="#f2e8cf" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="213" cy="132" rx="8" ry="5" fill="#f2e8cf" stroke="#2d263c" stroke-width="4"/>

  <!-- 鼻(トランク) -->
  <path d="M 166 198 C 150 214, 140 240, 145 270 C 147 286, 156 300, 171 304 C 182 307, 191 298, 188 287 C 186 277, 177 274, 171 266 C 163 256, 166 232, 178 212 C 183 202, 176 195, 166 198 Z" fill="#4b4657" stroke="#2d263c" stroke-width="7"/>

  <!-- キバ -->
  <path d="M 158 208 q -10 8 -4 20 q 8 2 12 -8 Z" fill="#fdfaf0" stroke="#2d263c" stroke-width="5"/>
  <path d="M 198 206 q 10 8 4 20 q -8 2 -12 -8 Z" fill="#fdfaf0" stroke="#2d263c" stroke-width="5"/>

  <!-- ほっぺ -->
  <ellipse cx="132" cy="205" rx="14" ry="9" fill="#f2a7ad" opacity="0.75"/>
  <ellipse cx="228" cy="205" rx="14" ry="9" fill="#f2a7ad" opacity="0.75"/>

  <!-- 目 -->
  <circle cx="150" cy="188" r="13" fill="#231f2e" stroke="#2d263c" stroke-width="4"/>
  <circle cx="210" cy="188" r="13" fill="#231f2e" stroke="#2d263c" stroke-width="4"/>
  <circle cx="146" cy="183" r="4" fill="#ffffff"/>
  <circle cx="206" cy="183" r="4" fill="#ffffff"/>
</svg>
