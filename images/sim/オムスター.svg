<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.渦巻きアンモナイト状の甲羅(紫) 2.甲羅ふちのギザギザ突起 3.腹側は淡い紫〜ピンク 4.前方に伸びる2本のハサミ状の腕 5.大きな丸い目と小さな口 -->

  <!-- 後ろ: 尻尾のとがり -->
  <path d="M180 300 L165 340 L195 340 Z" fill="#8a63b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腕(奥側・左) -->
  <path d="M110 230 Q55 235 45 200 Q40 180 60 175 Q55 195 80 200 Q100 205 118 250 Z" fill="#7a53a8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 腕(奥側・右) -->
  <path d="M250 230 Q305 235 315 200 Q320 180 300 175 Q305 195 280 200 Q260 205 242 250 Z" fill="#7a53a8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体(淡い紫、腹側) -->
  <ellipse cx="180" cy="255" rx="95" ry="80" fill="#e6c9ec" stroke="#2d263c" stroke-width="7"/>

  <!-- 甲羅(渦巻き・メイン) -->
  <ellipse cx="180" cy="150" rx="115" ry="105" fill="#7a53a8" stroke="#2d263c" stroke-width="8"/>

  <!-- 甲羅のふちのギザギザ -->
  <path d="M75 190 L60 210 L88 208 Z" fill="#9b78c9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M105 235 L92 258 L120 250 Z" fill="#9b78c9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M285 190 L300 210 L272 208 Z" fill="#9b78c9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M255 235 L268 258 L240 250 Z" fill="#9b78c9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 渦巻き模様(内側の巻き) -->
  <path d="M180 90 Q225 95 232 140 Q238 180 200 195 Q170 205 158 178 Q148 155 172 145" fill="none" stroke="#5a3a80" stroke-width="9" stroke-linecap="round"/>
  <path d="M180 120 Q205 122 208 148 Q210 170 188 176" fill="none" stroke="#5a3a80" stroke-width="7" stroke-linecap="round"/>

  <!-- 甲羅の縦すじ模様 -->
  <path d="M180 55 L180 245" fill="none" stroke="#5a3a80" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <path d="M120 70 Q100 150 130 235" fill="none" stroke="#5a3a80" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M240 70 Q260 150 230 235" fill="none" stroke="#5a3a80" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- 腕(手前側・左、ハサミ付き) -->
  <path d="M115 250 Q65 260 50 230 Q45 250 65 260 Q50 268 40 255 Q45 280 75 278 Q100 276 130 268 Z" fill="#8a63b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 腕(手前側・右、ハサミ付き) -->
  <path d="M245 250 Q295 260 310 230 Q315 250 295 260 Q310 268 320 255 Q315 280 285 278 Q260 276 230 268 Z" fill="#8a63b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 顔: 目 -->
  <circle cx="150" cy="255" r="24" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="210" cy="255" r="24" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="155" cy="258" r="10" fill="#2d263c"/>
  <circle cx="215" cy="258" r="10" fill="#2d263c"/>

  <!-- 顔: 口 -->
  <path d="M165 295 Q180 305 195 295" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
