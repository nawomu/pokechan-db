<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body, yellow angular fin) -->
  <polygon points="252,158 306,132 298,192 256,202" fill="#ffd93d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- legs -->
  <polygon points="146,268 168,268 164,302 142,300" fill="#4fb8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="204,268 226,268 222,300 200,302" fill="#4fb8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- arms / flippers -->
  <polygon points="112,188 88,198 94,228 116,222" fill="#4fb8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="256,188 280,198 274,228 252,222" fill="#4fb8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- main body: blocky low-poly shape -->
  <polygon points="120,160 152,128 220,128 252,156 258,232 228,272 142,272 108,232" fill="#5ec8f0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- chest polygon patch (pink) -->
  <polygon points="150,190 186,168 218,196 186,232 150,216" fill="#ff6fb0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- head: angular block -->
  <polygon points="140,92 202,80 232,110 216,152 148,152 122,120" fill="#5ec8f0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- beak / nose (pink triangle) -->
  <polygon points="124,120 92,130 128,148" fill="#ff6fb0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- eyes -->
  <circle cx="164" cy="123" r="7" fill="#2d263c"/>
  <circle cx="198" cy="120" r="7" fill="#2d263c"/>

  <!-- polygon facet seams (low-poly panel lines) -->
  <line x1="152" y1="128" x2="186" y2="168" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="220" y1="128" x2="186" y2="168" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="142" y1="272" x2="186" y2="232" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="228" y1="272" x2="186" y2="232" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="108" y1="232" x2="150" y2="216" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="258" y1="232" x2="218" y2="196" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
</svg>
