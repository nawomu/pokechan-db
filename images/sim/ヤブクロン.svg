<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 頭のてっぺん(結び目のギザギザ・後ろ側) -->
  <path d="M150,72 Q140,45 158,30 Q165,50 160,70 Z" fill="#5f7a3d" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M200,74 Q214,50 205,28 Q192,44 195,72 Z" fill="#5f7a3d" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M172,66 Q178,42 186,66 Z" fill="#7d8f52" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 赤いひも(結び目) -->
  <path d="M158,78 Q180,68 204,78" fill="none" stroke="#c0392b" stroke-width="6" stroke-linecap="round"/>
  <circle cx="156" cy="80" r="5" fill="#c0392b" stroke="#2d263c" stroke-width="2.5"/>
  <circle cx="206" cy="80" r="5" fill="#c0392b" stroke="#2d263c" stroke-width="2.5"/>

  <!-- 体(ゴミ袋のシルエット) -->
  <path d="M150,80
           Q120,90 100,118
           Q75,152 72,196
           Q68,242 96,276
           Q126,310 180,315
           Q234,310 264,276
           Q292,242 288,196
           Q285,152 260,118
           Q240,90 210,80
           Q195,73 180,74
           Q165,73 150,80 Z"
        fill="#e2e0b8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 左腕 -->
  <ellipse cx="80" cy="205" rx="16" ry="22" fill="#e2e0b8" stroke="#2d263c" stroke-width="6"/>
  <!-- 右腕 -->
  <ellipse cx="280" cy="205" rx="16" ry="22" fill="#e2e0b8" stroke="#2d263c" stroke-width="6"/>

  <!-- 体の模様(オリーブ色の斑点) -->
  <path d="M115,150 Q135,140 150,155 Q145,175 120,172 Q105,165 115,150Z" fill="#7d8f52" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M235,165 Q255,158 262,178 Q250,195 230,188 Q222,175 235,165Z" fill="#7d8f52" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M155,255 Q175,247 188,262 Q180,278 158,275 Q148,265 155,255Z" fill="#7d8f52" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <circle cx="215" cy="250" r="14" fill="#7d8f52" stroke="#2d263c" stroke-width="4"/>

  <!-- 顔(目) -->
  <circle cx="150" cy="200" r="15" fill="#2d263c"/>
  <circle cx="212" cy="200" r="15" fill="#2d263c"/>
  <circle cx="145" cy="195" r="4.5" fill="#ffffff"/>
  <circle cx="207" cy="195" r="4.5" fill="#ffffff"/>

  <!-- 口(ギザギザ笑顔) -->
  <path d="M150,222 Q165,236 180,226 Q195,236 210,222" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 足 -->
  <ellipse cx="140" cy="308" rx="18" ry="10" fill="#e2e0b8" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="222" cy="308" rx="18" ry="10" fill="#e2e0b8" stroke="#2d263c" stroke-width="6"/>
</svg>
