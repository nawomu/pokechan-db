<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- shadow -->
  <ellipse cx="180" cy="320" rx="80" ry="16" fill="#2d263c" opacity="0.18"/>

  <!-- back arm (behind body) -->
  <path d="M235 190 Q290 200 300 245 Q303 260 288 262 Q278 263 275 250 Q270 220 225 210 Z"
        fill="#6b6478" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M283 240 L300 235 M287 250 L306 250 M283 258 L299 264"
        stroke="#2d263c" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- body: bell/urn shape -->
  <path d="M180 60
           C130 60 100 100 95 150
           C90 210 100 260 130 295
           C150 318 210 318 230 295
           C260 260 270 210 265 150
           C260 100 230 60 180 60 Z"
        fill="#8079a0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- darker side shading -->
  <path d="M225 100 C250 130 258 200 245 260 C238 278 222 292 200 300
           C230 290 255 255 260 205 C263 155 248 115 225 100 Z"
        fill="#6b6478"/>

  <!-- hollow chest cavity -->
  <ellipse cx="180" cy="205" rx="46" ry="60" fill="#2d263c"/>
  <ellipse cx="180" cy="205" rx="34" ry="48" fill="#171226"/>

  <!-- head/face plate -->
  <ellipse cx="180" cy="128" rx="72" ry="62" fill="#2d263c"/>

  <!-- single big eye -->
  <circle cx="180" cy="132" r="30" fill="#f4e9c9"/>
  <circle cx="180" cy="132" r="20" fill="#d94b32"/>
  <circle cx="180" cy="132" r="9" fill="#3a1208"/>
  <circle cx="186" cy="125" r="4" fill="#ffffff" opacity="0.85"/>

  <!-- front arm reaching forward -->
  <path d="M120 195 Q65 205 55 250 Q52 266 68 268 Q79 269 82 254 Q88 222 130 213 Z"
        fill="#8079a0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M60 245 L42 240 M64 256 L45 258 M68 264 L52 272"
        stroke="#2d263c" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- stubby feet -->
  <path d="M145 292 Q140 312 150 316 Q165 320 168 305 Q170 295 160 290 Z"
        fill="#8079a0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M215 292 Q220 312 210 316 Q195 320 192 305 Q190 295 200 290 Z"
        fill="#8079a0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
</svg>
