<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ: 耳(頭の後ろに少し隠れる位置) -->
  <ellipse cx="128" cy="98" rx="26" ry="26" fill="#6b4a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="232" cy="98" rx="26" ry="26" fill="#6b4a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="128" cy="100" rx="12" ry="12" fill="#8a6440"/>
  <ellipse cx="232" cy="100" rx="12" ry="12" fill="#8a6440"/>

  <!-- 体: ずんぐりした丸い胴体 -->
  <path d="M180 155
           C 250 155, 280 210, 272 265
           C 266 312, 224 336, 180 336
           C 136 336, 94 312, 88 265
           C 80 210, 110 155, 180 155 Z"
        fill="#f3dfae" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- おなか(クリーム色の丸い模様) -->
  <ellipse cx="180" cy="255" rx="58" ry="66" fill="#fbeecb" stroke="#2d263c" stroke-width="6"/>

  <!-- 左腕 -->
  <path d="M96 220 C 62 228, 44 260, 52 292 C 58 314, 82 322, 100 310"
        fill="#f3dfae" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 右腕 -->
  <path d="M264 220 C 298 228, 316 260, 308 292 C 302 314, 278 322, 260 310"
        fill="#f3dfae" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 手先(こげ茶) -->
  <ellipse cx="62" cy="300" rx="20" ry="18" fill="#6b4a2e" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="298" cy="300" rx="20" ry="18" fill="#6b4a2e" stroke="#2d263c" stroke-width="7"/>

  <!-- 足(下)こげ茶 -->
  <ellipse cx="142" cy="330" rx="30" ry="20" fill="#6b4a2e" stroke="#2d263c" stroke-width="8"/>
  <ellipse cx="218" cy="330" rx="30" ry="20" fill="#6b4a2e" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭 -->
  <circle cx="180" cy="170" r="86" fill="#f3dfae" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳(前・頭の上に乗る丸い耳) -->
  <circle cx="126" cy="105" r="30" fill="#6b4a2e" stroke="#2d263c" stroke-width="7"/>
  <circle cx="234" cy="105" r="30" fill="#6b4a2e" stroke="#2d263c" stroke-width="7"/>
  <circle cx="126" cy="107" r="14" fill="#8a6440"/>
  <circle cx="234" cy="107" r="14" fill="#8a6440"/>

  <!-- おでこの三日月もよう(茶色クレセント) -->
  <path d="M150 132 C 158 110, 202 110, 210 132 C 196 124, 164 124, 150 132 Z"
        fill="#8a5a2e" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目 -->
  <circle cx="150" cy="178" r="15" fill="#2d263c"/>
  <circle cx="210" cy="178" r="15" fill="#2d263c"/>
  <circle cx="154" cy="173" r="4" fill="#fff"/>
  <circle cx="214" cy="173" r="4" fill="#fff"/>

  <!-- 鼻・口まわり(マズル) -->
  <ellipse cx="180" cy="205" rx="34" ry="24" fill="#fbeecb" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="180" cy="198" rx="14" ry="10" fill="#2d263c"/>
  <path d="M180 208 C 172 218, 188 218, 180 208" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
