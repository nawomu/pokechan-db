<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.氷雪をまとった白青い丸い体 2.背中に鋭い氷の刃(とげ)の並び 3.お腹は白 4.小さい丸耳と黒い丸目・青い鼻 5.白い手足に鋭い爪 -->

  <!-- しっぽ(後ろ) -->
  <ellipse cx="272" cy="288" rx="24" ry="15" transform="rotate(25 272 288)" fill="#EAF6FB" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="180" cy="228" rx="98" ry="92" fill="#CDEBF5" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹 -->
  <ellipse cx="180" cy="262" rx="54" ry="46" fill="#FAFEFF"/>

  <!-- 背中の氷の刃(とげ) -->
  <path d="M 108 172 L 100 140 L 122 164 Z" fill="#8FD4EC" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 150 154 L 146 118 L 172 148 Z" fill="#8FD4EC" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 196 150 L 202 114 L 220 146 Z" fill="#8FD4EC" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 238 166 L 252 134 L 258 168 Z" fill="#8FD4EC" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- うで -->
  <ellipse cx="84" cy="222" rx="27" ry="42" transform="rotate(-12 84 222)" fill="#CDEBF5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="276" cy="222" rx="27" ry="42" transform="rotate(12 276 222)" fill="#CDEBF5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- あし -->
  <ellipse cx="136" cy="306" rx="33" ry="36" fill="#CDEBF5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="224" cy="306" rx="33" ry="36" fill="#CDEBF5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 手の爪 -->
  <path d="M 62 250 L 56 264 M 72 256 L 68 270 M 84 256 L 84 270" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M 298 250 L 304 264 M 288 256 L 292 270 M 276 256 L 276 270" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 足の爪 -->
  <path d="M 112 335 L 106 350 M 128 340 L 126 354 M 146 340 L 148 354" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M 248 335 L 254 350 M 232 340 L 234 354 M 214 340 L 212 354" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 顔(頭) -->
  <circle cx="180" cy="112" r="70" fill="#CDEBF5" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳 -->
  <ellipse cx="123" cy="55" rx="20" ry="27" transform="rotate(-22 123 55)" fill="#CDEBF5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="237" cy="55" rx="20" ry="27" transform="rotate(22 237 55)" fill="#CDEBF5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="124" cy="58" rx="10" ry="15" transform="rotate(-22 124 58)" fill="#8FD4EC"/>
  <ellipse cx="236" cy="58" rx="10" ry="15" transform="rotate(22 236 58)" fill="#8FD4EC"/>

  <!-- ほお模様 -->
  <path d="M 116 122 Q 126 132 116 142" fill="none" stroke="#5FB8DA" stroke-width="4" stroke-linecap="round"/>
  <path d="M 244 122 Q 234 132 244 142" fill="none" stroke="#5FB8DA" stroke-width="4" stroke-linecap="round"/>

  <!-- 目 -->
  <circle cx="150" cy="106" r="9" fill="#2d263c"/>
  <circle cx="210" cy="106" r="9" fill="#2d263c"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="136" rx="11" ry="7" fill="#3A7CA5"/>

  <!-- 口 -->
  <path d="M 164 150 Q 180 160 196 150" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
