  <path d="M35 190 C25 140 60 95 115 100 C155 103 178 128 188 155 C198 128 228 98 268 93 C312 88 332 128 332 172 C332 212 302 242 262 247 C222 251 197 232 187 202 C177 232 147 255 108 257 C60 260 30 233 35 190 Z"
        fill="#F3DFAC" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭側の帯模様 -->
  <path d="M126 108 Q142 160 122 244" fill="none" stroke="#C9A15A" stroke-width="14" stroke-linecap="round"/>
  <!-- 尾側の帯模様 -->
  <path d="M228 96 Q244 170 224 246" fill="none" stroke="#C9A15A" stroke-width="14" stroke-linecap="round"/>

  <!-- くびれ(節の継ぎ目)のライン -->
