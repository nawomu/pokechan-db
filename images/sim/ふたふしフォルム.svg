  <ellipse cx="140" cy="262" rx="15" ry="10" fill="#F3DFAC" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="228" cy="256" rx="14" ry="10" fill="#F3DFAC" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="288" cy="248" rx="13" ry="9" fill="#F3DFAC" stroke="#2d263c" stroke-width="6"/>
