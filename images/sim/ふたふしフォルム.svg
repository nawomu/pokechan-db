<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尾のドリル先端(飾り渦) -->
  <path d="M300 150 Q322 148 328 168 Q332 186 314 192 Q298 196 292 180" fill="none" stroke="#8B6A3D" stroke-width="6" stroke-linecap="round"/>

