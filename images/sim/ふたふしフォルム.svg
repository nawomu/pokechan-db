  <circle cx="192" cy="150" r="3.5" fill="#8B6A3D"/>
  <circle cx="196" cy="170" r="3.5" fill="#8B6A3D"/>
  <circle cx="192" cy="190" r="3.5" fill="#8B6A3D"/>

  <!-- おなかの明るいライン -->
  <path d="M55 228 Q160 268 315 218" fill="none" stroke="#FBEFD8" stroke-width="12" stroke-linecap="round"/>

  <!-- 頭の上の小さな出っ張り -->
  <path d="M96 100 Q110 66 126 100Z" fill="#F3DFAC" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目 左 -->
  <ellipse cx="80" cy="150" rx="14" ry="16" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="80" cy="154" r="7" fill="#2d263c"/>
  <!-- 目 右 -->
  <ellipse cx="120" cy="144" rx="14" ry="16" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="120" cy="148" r="7" fill="#2d263c"/>

  <!-- 口もとのひげ模様 -->
  <path d="M55 188 Q90 200 125 186" fill="none" stroke="#8B6A3D" stroke-width="5" stroke-linecap="round"/>
  <!-- 口 -->
  <path d="M88 205 Q100 214 112 203" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 短い手足(4本) -->
