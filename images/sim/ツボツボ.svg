<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- shadow -->
  <ellipse cx="180" cy="326" rx="92" ry="16" fill="#2d263c" opacity="0.15"/>

  <!-- legs (stubby, poking from under the shell) -->
  <ellipse cx="112" cy="292" rx="26" ry="24" fill="#f6e08a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="248" cy="292" rx="26" ry="24" fill="#f6e08a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- arms (short nubs at the sides) -->
  <ellipse cx="86" cy="205" rx="22" ry="30" fill="#f6e08a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="274" cy="205" rx="22" ry="30" fill="#f6e08a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- head peeking out under the shell -->
  <circle cx="180" cy="268" r="50" fill="#f6e08a" stroke="#2d263c" stroke-width="7"/>

  <!-- big conical shell (main body of Shuckle) -->
  <path d="M78,248
           C66,186 92,104 180,70
           C268,104 294,186 282,248
           C283,258 262,268 236,258
           C208,272 152,272 124,258
           C98,268 77,258 78,248 Z"
        fill="#a8402e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ridge texture lines on shell -->
  <path d="M180,88 C176,140 178,190 180,232" fill="none" stroke="#7a2c1f" stroke-width="4" stroke-linecap="round"/>
  <path d="M112,175 C100,210 96,235 100,252" fill="none" stroke="#7a2c1f" stroke-width="4" stroke-linecap="round"/>
  <path d="M248,175 C260,210 264,235 260,252" fill="none" stroke="#7a2c1f" stroke-width="4" stroke-linecap="round"/>

  <!-- triangle/hex shell pattern -->
  <polygon points="180,96 156,146 204,146" fill="#f0d878" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="112,160 92,212 140,204" fill="#f0d878" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="248,160 268,212 220,204" fill="#f0d878" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="118,222 104,252 152,244" fill="#f0d878" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="242,222 256,252 208,244" fill="#f0d878" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- blush -->
  <circle cx="140" cy="286" r="11" fill="#f2a0a0" opacity="0.55"/>
  <circle cx="220" cy="286" r="11" fill="#f2a0a0" opacity="0.55"/>

  <!-- eyes -->
  <circle cx="160" cy="270" r="9" fill="#2d263c"/>
  <circle cx="200" cy="270" r="9" fill="#2d263c"/>
  <circle cx="163" cy="267" r="3" fill="#ffffff"/>
  <circle cx="203" cy="267" r="3" fill="#ffffff"/>

  <!-- mouth -->
  <path d="M165,292 Q180,302 195,292" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
