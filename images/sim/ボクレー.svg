<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)茶色の切り株が胴体 2)両側から枝の腕(小さな葉つき) 3)幽霊顔(黒い目・ピンク頬・波の口) 4)下から根っこ 5)切り口に年輪 -->

  <!-- 左の枝腕(葉つき) -->
  <path d="M135,190 Q95,175 70,185 Q66,195 75,202 Q110,205 135,200" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M70,185 Q58,170 55,158 M70,185 Q52,180 45,185" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M62,165 Q50,160 48,150 Q60,152 64,162 Z" fill="#8fbf6a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 右の枝腕 -->
  <path d="M225,190 Q265,175 290,185 Q294,195 285,202 Q250,205 225,200" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M290,185 Q302,170 305,158 M290,185 Q308,180 315,185" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M298,165 Q310,160 312,150 Q300,152 296,162 Z" fill="#8fbf6a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 根っこ(下) -->
  <path d="M150,270 Q140,295 130,310 M180,275 Q180,300 175,315 M210,270 Q220,295 230,310" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 切り株胴体 -->
  <path d="M125,175 Q115,250 145,275 Q180,282 215,275 Q245,250 235,175 Q180,160 125,175 Z" fill="#a8754a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 木の縦筋 -->
  <path d="M150,190 Q148,235 155,265 M200,190 Q205,235 198,265" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" opacity="0.6"/>

  <!-- 切り口(上部)・年輪 -->
  <ellipse cx="180" cy="175" rx="55" ry="20" fill="#d8a878" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="180" cy="175" rx="35" ry="12" fill="none" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="180" cy="175" rx="16" ry="6" fill="none" stroke="#2d263c" stroke-width="5"/>

  <!-- 左目(黒・幽霊) -->
  <ellipse cx="160" cy="215" rx="11" ry="14" fill="#2d263c"/>
  <circle cx="163" cy="211" r="3" fill="#ffffff"/>
  <!-- 右目 -->
  <ellipse cx="200" cy="215" rx="11" ry="14" fill="#2d263c"/>
  <circle cx="203" cy="211" r="3" fill="#ffffff"/>

  <!-- ピンクの頬 -->
  <ellipse cx="148" cy="232" rx="8" ry="6" fill="#e88aa8" opacity="0.8"/>
  <ellipse cx="212" cy="232" rx="8" ry="6" fill="#e88aa8" opacity="0.8"/>

  <!-- 口(波型・悲しげ) -->
  <path d="M168,242 Q174,236 180,242 Q186,248 192,242" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
