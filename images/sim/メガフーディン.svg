<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- しっぽ (後ろに描く) -->
  <path d="M 195 280 Q 240 310 250 340 Q 235 330 215 325 Q 230 310 210 295 Z" fill="#C8A020" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 195 280 Q 240 310 250 340" fill="none" stroke="#8B5E10" stroke-width="9" stroke-linecap="round"/>
  <!-- しっぽ縞 -->
  <path d="M 210 297 Q 230 303 240 315" fill="none" stroke="#8B5E10" stroke-width="6" stroke-linecap="round"/>
  <path d="M 218 313 Q 236 320 244 332" fill="none" stroke="#8B5E10" stroke-width="5" stroke-linecap="round"/>

  <!-- 左スプーン -->
  <ellipse cx="78" cy="230" rx="16" ry="10" fill="#E8C030" stroke="#2d263c" stroke-width="6"/>
  <line x1="88" y1="228" x2="118" y2="205" stroke="#E8C030" stroke-width="8" stroke-linecap="round"/>
  <!-- 右スプーン -->
  <ellipse cx="285" cy="215" rx="15" ry="9" fill="#E8C030" stroke="#2d263c" stroke-width="6"/>
  <line x1="275" y1="213" x2="248" y2="198" stroke="#E8C030" stroke-width="8" stroke-linecap="round"/>

  <!-- 体 -->
  <path d="M 140 185 Q 120 200 118 230 Q 120 265 155 275 Q 175 280 195 278 Q 220 272 228 255 Q 238 235 230 210 Q 222 190 205 183 Z" fill="#F5D560" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 腹の明るい部分 -->
  <ellipse cx="178" cy="232" rx="28" ry="35" fill="#FFF0A8" stroke="none"/>

  <!-- 肩の茶色模様 左 -->
  <ellipse cx="130" cy="198" rx="18" ry="11" fill="#C8860A" stroke="#2d263c" stroke-width="5" transform="rotate(-20 130 198)"/>
  <!-- 肩の茶色模様 右 -->
  <ellipse cx="228" cy="195" rx="17" ry="10" fill="#C8860A" stroke="#2d263c" stroke-width="5" transform="rotate(20 228 195)"/>

  <!-- 左腕 -->
  <path d="M 135 205 Q 108 215 95 225" stroke="#F5D560" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M 135 205 Q 108 215 95 225" stroke="#2d263c" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- 右腕 -->
  <path d="M 222 202 Q 248 200 260 210" stroke="#F5D560" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M 222 202 Q 248 200 260 210" stroke="#2d263c" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- 足 左 -->
  <path d="M 158 276 Q 148 295 142 310 Q 152 315 162 308 Q 165 295 168 278 Z" fill="#F5D560" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 足 右 -->
  <path d="M 198 277 Q 198 297 200 312 Q 211 316 218 308 Q 214 294 208 278 Z" fill="#F5D560" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="175" cy="130" rx="68" ry="72" fill="#F5D560" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 顔の白っぽい部分 -->
  <ellipse cx="175" cy="138" rx="48" ry="52" fill="#FFF0A8" stroke="none"/>

  <!-- 左耳(とんがり) -->
  <polygon points="120,88 108,42 138,78" fill="#F5D560" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右耳(とんがり) -->
  <polygon points="230,85 248,38 218,75" fill="#F5D560" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- メガ進化の角 中央 -->
