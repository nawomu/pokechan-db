  <!-- メガ進化の角 左 -->
  <polygon points="148,72 136,44 155,66" fill="#D4B020" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- メガ進化の角 右 -->
  <polygon points="202,70 220,44 205,65" fill="#D4B020" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 眉毛 左 -->
  <path d="M 140 118 Q 152 110 162 116" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <!-- 眉毛 右 -->
  <path d="M 188 116 Q 198 110 210 118" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 目 左 -->
  <ellipse cx="152" cy="133" rx="10" ry="7" fill="#2d263c"/>
  <ellipse cx="155" cy="131" rx="3" ry="2" fill="white"/>
  <!-- 目 右 -->
  <ellipse cx="200" cy="131" rx="10" ry="7" fill="#2d263c"/>
  <ellipse cx="203" cy="129" rx="3" ry="2" fill="white"/>

  <!-- 第三の目(メガ進化) -->
  <ellipse cx="175" cy="108" rx="8" ry="6" fill="#FF2020" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="175" cy="108" rx="4" ry="3" fill="#880000"/>
  <ellipse cx="177" cy="107" rx="1.5" ry="1" fill="white"/>

  <!-- 口 -->
  <path d="M 160 152 Q 175 162 190 152" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ひげ 左 (5本のうち左側) -->
  <line x1="155" y1="160" x2="88" y2="148" stroke="#FFFFF0" stroke-width="5" stroke-linecap="round"/>
  <line x1="152" y1="167" x2="82" y2="162" stroke="#FFFFF0" stroke-width="5" stroke-linecap="round"/>
  <line x1="150" y1="155" x2="90" y2="138" stroke="#FFFFF0" stroke-width="4" stroke-linecap="round"/>
  <!-- ひげ 右 -->
  <line x1="195" y1="160" x2="262" y2="148" stroke="#FFFFF0" stroke-width="5" stroke-linecap="round"/>
  <line x1="198" y1="167" x2="268" y2="162" stroke="#FFFFF0" stroke-width="5" stroke-linecap="round"/>

  <!-- ひげの輪郭線 -->
  <line x1="155" y1="160" x2="88" y2="148" stroke="#2d263c" stroke-width="2" stroke-linecap="round"/>
  <line x1="152" y1="167" x2="82" y2="162" stroke="#2d263c" stroke-width="2" stroke-linecap="round"/>
  <line x1="195" y1="160" x2="262" y2="148" stroke="#2d263c" stroke-width="2" stroke-linecap="round"/>
  <line x1="198" y1="167" x2="268" y2="162" stroke="#2d263c" stroke-width="2" stroke-linecap="round"/>

  <!-- 首のネックレス的な模様 -->
  <path d="M 148 185 Q 175 178 202 185" fill="none" stroke="#C8860A" stroke-width="6" stroke-linecap="round"/>
</svg>