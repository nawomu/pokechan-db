<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 脚1(左端の石柱) -->
  <path d="M105 250 L120 250 Q130 250 130 260 L130 290 Q130 300 120 300 L105 300 Q95 300 95 290 L95 260 Q95 250 105 250 Z" fill="#a89f83" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 脚2 -->
  <path d="M150 250 L165 250 Q175 250 175 260 L175 290 Q175 300 165 300 L150 300 Q140 300 140 290 L140 260 Q140 250 150 250 Z" fill="#a89f83" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 脚3 -->
  <path d="M195 250 L210 250 Q220 250 220 260 L220 290 Q220 300 210 300 L195 300 Q185 300 185 290 L185 260 Q185 250 195 250 Z" fill="#a89f83" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 脚4(右端の石柱) -->
  <path d="M240 250 L255 250 Q265 250 265 260 L265 290 Q265 300 255 300 L240 300 Q230 300 230 290 L230 260 Q230 250 240 250 Z" fill="#a89f83" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体(巨大な一枚岩・胴体) -->
  <path d="M110 60 L250 60 Q270 60 270 80 L270 240 Q270 260 250 260 L110 260 Q90 260 90 240 L90 80 Q90 60 110 60 Z" fill="#c7c0a4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 左腕(石の突起) -->
  <path d="M65 140 L77 140 Q92 140 92 155 L92 170 Q92 185 77 185 L65 185 Q50 185 50 170 L50 155 Q50 140 65 140 Z" fill="#b8b096" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右腕(石の突起) -->
  <path d="M283 140 L295 140 Q310 140 310 155 L310 170 Q310 185 295 185 L283 185 Q268 185 268 170 L268 155 Q268 140 283 140 Z" fill="#b8b096" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ハイライト(平らな岩面のツヤ) -->
  <ellipse cx="125" cy="85" rx="20" ry="10" fill="#e3ded0"/>
  <ellipse cx="225" cy="210" rx="16" ry="9" fill="#e3ded0"/>

  <!-- 岩のヒビ(模様) -->
  <line x1="115" y1="90" x2="125" y2="125" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="245" y1="95" x2="235" y2="130" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="180" y1="65" x2="183" y2="95" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 石のツブツブ模様 -->
  <circle cx="105" cy="225" r="6" fill="#8f8974"/>
  <circle cx="255" cy="230" r="6" fill="#8f8974"/>

  <!-- 目 左 -->
  <ellipse cx="145" cy="115" rx="10" ry="14" fill="#2d263c"/>
  <!-- 目 右 -->
  <ellipse cx="215" cy="115" rx="10" ry="14" fill="#2d263c"/>
  <!-- 目の光 左 -->
  <circle cx="141" cy="109" r="3" fill="#ffffff"/>
  <!-- 目の光 右 -->
  <circle cx="211" cy="109" r="3" fill="#ffffff"/>

  <!-- 口(平らな一文字) -->
  <path d="M145 158 Q180 172 215 158" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>
