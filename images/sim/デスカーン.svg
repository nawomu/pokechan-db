<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- Shadow ghost wisps leaking from bottom -->
  <ellipse cx="182" cy="330" rx="68" ry="18" fill="#3a1a5c" opacity="0.35"/>

  <!-- Ghost shadow seeping out bottom -->
  <path d="M148 300 Q130 320 125 340 Q135 335 145 345 Q152 332 158 344 Q165 330 172 342 Q178 328 185 340 Q192 332 198 345 Q204 334 212 344 Q218 334 213 318 Z" fill="#2e1248" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Main sarcophagus body - slightly lopsided rectangle -->
  <path d="M98 155 Q95 148 100 140 L118 108 Q122 100 132 98 L230 95 Q242 94 248 103 L265 136 Q270 145 268 155 L272 295 Q273 310 260 314 L102 316 Q88 314 87 300 Z" fill="#7b6fa0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- Inner sarcophagus face panel - darker recessed area -->
  <path d="M115 165 Q112 158 117 152 L131 124 Q134 118 142 116 L220 114 Q230 113 234 120 L249 150 Q252 157 250 165 L254 280 Q255 291 244 294 L116 295 Q105 293 104 282 Z" fill="#5a4d82" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- Gold decorative cross/ankh shape on coffin -->
  <!-- Vertical bar -->
  <rect x="172" y="175" width="18" height="70" rx="4" fill="#d4a820" stroke="#2d263c" stroke-width="4"/>
  <!-- Horizontal bar -->
  <rect x="152" y="195" width="58" height="17" rx="4" fill="#d4a820" stroke="#2d263c" stroke-width="4"/>
  <!-- Top circle of ankh -->
  <circle cx="181" cy="182" r="13" fill="none" stroke="#d4a820" stroke-width="7"/>
  <circle cx="181" cy="182" r="13" fill="none" stroke="#2d263c" stroke-width="4" opacity="0.6"/>

  <!-- Gold corner ornaments top-left -->
  <path d="M120 125 L138 125 L138 130 L125 130 L125 145 L120 145 Z" fill="#d4a820" stroke="#2d263c" stroke-width="3"/>
  <!-- top-right -->
  <path d="M225 123 L242 123 L242 143 L237 143 L237 128 L225 128 Z" fill="#d4a820" stroke="#2d263c" stroke-width="3"/>

  <!-- Gold border trim on lid top edge -->
  <path d="M118 108 L132 98 L230 95 L248 103 L265 136 L253 136 L240 106 L224 100 L138 102 L125 109 L108 136 L98 136 Z" fill="#c49a10" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- LEFT side handle -->
  <path d="M98 200 Q75 195 68 210 Q62 225 72 235 Q80 242 98 238" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M98 200 Q76 196 69 211 Q63 226 73 236 Q81 243 98 238" fill="none" stroke="#9a7bbb" stroke-width="5" stroke-linecap="round"/>

  <!-- RIGHT side handle -->
  <path d="M270 202 Q293 196 300 211 Q307 226 298 236 Q290 244 270 240" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M270 202 Q292 197 299 212 Q306 227 297 237 Q289 245 270 240" fill="none" stroke="#9a7bbb" stroke-width="5" stroke-linecap="round"/>

  <!-- FACE area on lid (upper portion) -->
  <!-- Left eye - sharp angry slant -->
  <path d="M135 148 Q140 138 153 139 Q162 140 163 150 Q162 158 153 159 Q141 159 135 148 Z" fill="#cc2020" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- Left eye shine -->
  <ellipse cx="150" cy="147" rx="4" ry="5" fill="#ff5555"/>
  <circle cx="155" cy="144" r="2" fill="#ffaaaa"/>

  <!-- Right eye - mirrored but slightly different (asymmetric!) -->
  <path d="M200 147 Q201 137 214 138 Q225 139 229 148 Q228 158 216 159 Q203 159 200 147 Z" fill="#cc2020" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- Right eye shine -->
  <ellipse cx="214" cy="146" rx="4" ry="5" fill="#ff5555"/>
  <circle cx="220" cy="143" r="2" fill="#ffaaaa"/>

  <!-- Angry eyebrows - thick and scowling -->
  <!-- Left brow -->
  <path d="M132 140 Q143 131 165 135" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- Right brow - slightly higher for asymmetry -->
  <path d="M197 134 Q210 128 232 136" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- Nose area - small shadow bumps -->
  <ellipse cx="181" cy="168" rx="5" ry="3" fill="#4a3870" opacity="0.7"/>

  <!-- Grimacing mouth - showing some teeth, weird grin -->
  <path d="M155 175 Q162 183 181 181 Q200 183 208 174" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- Teeth peek -->
  <path d="M167 178 L170 184 L175 178" fill="#e8e0cc" stroke="#2d263c" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M186 178 L190 184 L194 178" fill="#e8e0cc" stroke="#2d263c" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Ghostly wisp floating from top left -->
  <path d="M110 95 Q95 78 88 60 Q98 65 103 55 Q108 65 116 58 Q118 72 112 85 Z" fill="#9060c0" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" opacity="0.8"/>

  <!-- Ghostly wisp floating from top right -->
  <path d="M250 93 Q265 75 272 57 Q262 63 257 53 Q252 63 244 56 Q242 70 248 83 Z" fill="#9060c0" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" opacity="0.8"/>

  <!-- Small decorative dots on body sides -->
  <circle cx="108" cy="250" r="5" fill="#c49a10" stroke="#2d263c" stroke-width="2.5"/>
  <circle cx="255" cy="248" r="5" fill="#c49a10" stroke="#2d263c" stroke-width="2.5"/>
  <circle cx="108" cy="270" r="5" fill="#c49a10" stroke="#2d263c" stroke-width="2.5"/>
  <circle cx="255" cy="268" r="5" fill="#c49a10" stroke="#2d263c" stroke-width="2.5"/>

  <!-- Bottom gold trim -->
  <path d="M87 300 Q88 314 102 316 L260 314 Q273 310 272 295 L268 285 Q255 293 244 294 L116 295 Q105 293 104 282 Z" fill="#c49a10" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
</svg>