<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ガラガラの特徴:
    1. 頭にかぶった相棒の頭骨(クリーム色・ギザギザの下端・目の穴が黒い丸)
    2. ずんぐりした二足歩行の体(タン/茶色)・お腹はクリーム色
    3. 片手に持った白い骨のクラブ(両端が丸いこん棒)
    4. 短くて先が丸いしっぽ
    5. 三本指の足・短い腕
  -->

  <!-- しっぽ(体の後ろ) -->
  <path d="M135 250 Q88 268 96 308 Q116 288 148 268 Z" fill="#caa06e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足(奥) -->
  <ellipse cx="150" cy="308" rx="30" ry="22" fill="#c79968" stroke="#2d263c" stroke-width="7"/>
  <path d="M128 322 Q132 336 140 326" fill="#c79968" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M150 326 Q152 340 160 328" fill="#c79968" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 足(手前) -->
  <ellipse cx="228" cy="308" rx="30" ry="22" fill="#d2a679" stroke="#2d263c" stroke-width="7"/>
  <path d="M206 322 Q210 337 219 326" fill="#d2a679" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M230 327 Q233 341 241 329" fill="#d2a679" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 体(胴体) -->
  <path d="M118 195 Q95 245 128 296 Q180 328 250 296 Q283 245 258 195 Q228 150 188 150 Q148 150 118 195 Z"
        fill="#d2a679" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹(クリーム色の模様) -->
  <ellipse cx="188" cy="242" rx="46" ry="56" fill="#f3ead6" stroke="#2d263c" stroke-width="6"/>

  <!-- 左腕(奥) -->
  <ellipse cx="118" cy="228" rx="17" ry="30" fill="#c79968" stroke="#2d263c" stroke-width="7" transform="rotate(-18 118 228)"/>

  <!-- 骨のクラブ(棍棒) -->
  <g transform="rotate(32 272 190)">
    <path d="M264 165 Q264 150 272 150 Q280 150 280 165 L280 225 Q280 240 272 240 Q264 240 264 225 Z"
          fill="#f7f2e2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
    <circle cx="272" cy="148" r="16" fill="#f7f2e2" stroke="#2d263c" stroke-width="7"/>
    <circle cx="272" cy="242" r="16" fill="#f7f2e2" stroke="#2d263c" stroke-width="7"/>
  </g>

  <!-- 右腕(手前・骨を握る) -->
  <ellipse cx="262" cy="222" rx="18" ry="32" fill="#d2a679" stroke="#2d263c" stroke-width="7" transform="rotate(28 262 222)"/>

  <!-- 頭にかぶった頭骨マスク -->
  <path d="M138 152 Q136 88 188 82 Q240 88 238 152 L228 168 L216 150 L204 170 L192 150 L180 170 L168 150 L156 168 Z"
        fill="#f3ead6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭骨の小さな突起(左右) -->
  <path d="M144 118 Q128 108 132 92" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M232 118 Q248 108 244 92" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 目の穴(黒い丸) -->
  <circle cx="168" cy="126" r="13" fill="#2d263c"/>
  <circle cx="208" cy="126" r="13" fill="#2d263c"/>

  <!-- 頭骨の中央の縦筋 -->
  <path d="M188 95 L188 116" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
