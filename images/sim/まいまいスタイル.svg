<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- back fan wing (left) -->
  <path d="M180 180 C 90 150, 40 110, 45 55 C 95 70, 140 100, 165 150 Z" fill="#7a4fa8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- back fan wing (right) -->
  <path d="M180 180 C 270 150, 320 110, 315 55 C 265 70, 220 100, 195 150 Z" fill="#7a4fa8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- fan ribs left -->
  <path d="M170 165 C 130 135, 90 100, 60 65" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M175 158 C 145 120, 110 90, 85 60" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- fan ribs right -->
  <path d="M190 165 C 230 135, 270 100, 300 65" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M185 158 C 215 120, 250 90, 275 60" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- lower tail fan -->
  <path d="M180 250 C 150 280, 130 315, 140 335 C 165 320, 178 295, 180 265 C 182 295, 195 320, 220 335 C 230 315, 210 280, 180 250 Z" fill="#c99fe8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- body -->
  <ellipse cx="180" cy="210" rx="58" ry="64" fill="#8f5ec2" stroke="#2d263c" stroke-width="8"/>
  <!-- belly patch -->
  <ellipse cx="180" cy="222" rx="30" ry="34" fill="#e9d6f5" stroke="#2d263c" stroke-width="5"/>
  <!-- hood behind head -->
  <path d="M120 150 C 120 90, 150 55, 180 55 C 210 55, 240 90, 240 150 C 220 130, 200 122, 180 122 C 160 122, 140 130, 120 150 Z" fill="#5c3a8c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- head -->
  <circle cx="180" cy="150" r="46" fill="#f7eef7" stroke="#2d263c" stroke-width="8"/>
  <!-- purple cheek markings -->
  <path d="M136 150 C 132 140, 138 128, 150 128" fill="none" stroke="#7a4fa8" stroke-width="7" stroke-linecap="round"/>
  <path d="M224 150 C 228 140, 222 128, 210 128" fill="none" stroke="#7a4fa8" stroke-width="7" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="163" cy="150" r="6" fill="#2d263c"/>
  <circle cx="197" cy="150" r="6" fill="#2d263c"/>
  <!-- beak -->
  <path d="M172 165 L188 165 L180 178 Z" fill="#e8562f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- feet -->
  <path d="M160 268 L152 292 M160 268 L165 292" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M200 268 L208 292 M200 268 L195 292" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="152" cy="296" rx="10" ry="6" fill="#e8562f" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="208" cy="296" rx="10" ry="6" fill="#e8562f" stroke="#2d263c" stroke-width="5"/>
</svg>
