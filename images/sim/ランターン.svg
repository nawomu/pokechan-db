<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尾びれ(後ろ) -->
  <path d="M270 175 Q315 150 330 165 Q310 200 330 235 Q315 250 270 225 Z" fill="#6FA8DC" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 左右のヒレ(体より先に軽く配置) -->
  <path d="M85 190 Q40 175 35 205 Q45 225 90 220 Z" fill="#6FA8DC" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M85 245 Q45 260 50 285 Q70 295 95 270 Z" fill="#6FA8DC" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 提灯アンテナの軸(頭の後ろから) -->
  <path d="M155 145 Q120 100 118 70" fill="none" stroke="#1F3B63" stroke-width="9" stroke-linecap="round"/>
  <path d="M205 145 Q245 100 245 70" fill="none" stroke="#1F3B63" stroke-width="9" stroke-linecap="round"/>
  <path d="M155 145 Q120 100 118 70" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round" opacity="0"/>

  <!-- 体(メイン・紺色) -->
  <ellipse cx="185" cy="205" rx="110" ry="92" fill="#25508A" stroke="#2d263c" stroke-width="8"/>

  <!-- お腹(クリーム色) -->
  <path d="M95 235 Q185 320 275 235 Q270 285 185 300 Q100 285 95 235 Z" fill="#FCEAAF" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 提灯の玉(左右) -->
  <circle cx="115" cy="58" r="26" fill="#FFEB77" stroke="#2d263c" stroke-width="7"/>
  <circle cx="248" cy="58" r="26" fill="#FFEB77" stroke="#2d263c" stroke-width="7"/>
  <circle cx="106" cy="49" r="8" fill="#FFF9D6"/>
  <circle cx="239" cy="49" r="8" fill="#FFF9D6"/>

  <!-- 背中の小さな模様(丸2つ) -->
  <circle cx="150" cy="150" r="10" fill="#3A6FB0" stroke="#2d263c" stroke-width="5"/>
  <circle cx="220" cy="150" r="10" fill="#3A6FB0" stroke="#2d263c" stroke-width="5"/>

  <!-- 目 -->
  <circle cx="150" cy="205" r="17" fill="#221A2E" stroke="#2d263c" stroke-width="6"/>
  <circle cx="222" cy="205" r="17" fill="#221A2E" stroke="#2d263c" stroke-width="6"/>
  <circle cx="145" cy="199" r="5" fill="#FFFFFF"/>
  <circle cx="217" cy="199" r="5" fill="#FFFFFF"/>

  <!-- 口 -->
  <path d="M165 240 Q185 252 205 240" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>
