<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 二枚貝の殻(下がとがった扇形)で全身がほぼ殻に収まる
  2. 殻は薄いピンク〜藤色、扇状のギザギザ(帆立)の縁
  3. 殻の合わせ目(上部)から紫色の長い舌がにょきっと突き出る
  4. 舌の左右に真っ白で大きな2本の牙(三角形)が上向きに生える
  5. 舌の付け根あたりに小さな黒い目が2つ -->

  <!-- 後ろ側の殻半分(奥行き・影) -->
  <path d="M 180 322 C 108 320 78 268 82 205 C 84 178 96 156 118 150 C 128 162 138 168 150 160 L 150 300 C 150 315 165 322 180 322 Z"
        fill="#e08cc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 殻本体(手前) -->
  <path d="M 180 324
           C 96 322 62 258 68 196
           C 71 164 86 144 108 138
           Q 130 156 150 140
           Q 170 158 190 140
           Q 210 158 230 140
           Q 252 156 272 138
           C 294 144 309 164 312 196
           C 318 258 264 322 180 324 Z"
        fill="#f7bfe0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 殻の放射状スジ(帆立模様) -->
  <path d="M 130 150 C 118 200 118 262 150 308" fill="none" stroke="#e28fc3" stroke-width="6" stroke-linecap="round"/>
  <path d="M 180 148 L 180 314" fill="none" stroke="#e28fc3" stroke-width="6" stroke-linecap="round"/>
  <path d="M 230 150 C 242 200 242 262 210 308" fill="none" stroke="#e28fc3" stroke-width="6" stroke-linecap="round"/>
  <path d="M 108 138 C 92 190 92 250 118 300" fill="none" stroke="#e28fc3" stroke-width="5" stroke-linecap="round"/>
  <path d="M 272 138 C 288 190 288 250 262 300" fill="none" stroke="#e28fc3" stroke-width="5" stroke-linecap="round"/>

  <!-- 光沢ハイライト -->
  <path d="M 122 168 C 112 200 112 236 126 268" fill="none" stroke="#ffd7ee" stroke-width="7" stroke-linecap="round" opacity="0.7"/>

  <!-- 右の牙 -->
  <path d="M 208 150 L 232 95 L 244 156 Z" fill="#ffffff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 左の牙 -->
  <path d="M 152 150 L 128 95 L 116 156 Z" fill="#ffffff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 舌(にょきっと突き出た紫の舌) -->
  <path d="M 158 165 C 150 130 156 96 180 70 C 204 96 210 130 202 165 C 190 178 170 178 158 165 Z"
        fill="#8e44ad" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 舌のハイライト -->
  <path d="M 172 150 C 168 122 172 100 182 84" fill="none" stroke="#b57bd1" stroke-width="6" stroke-linecap="round" opacity="0.8"/>

  <!-- 目(左右) -->
  <ellipse cx="166" cy="148" rx="8" ry="10" fill="#2d263c"/>
  <ellipse cx="194" cy="148" rx="8" ry="10" fill="#2d263c"/>
  <!-- 目のハイライト -->
  <circle cx="163" cy="144" r="2.5" fill="#ffffff"/>
  <circle cx="191" cy="144" r="2.5" fill="#ffffff"/>
</svg>
