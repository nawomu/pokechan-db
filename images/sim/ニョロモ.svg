<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- しっぽ(後ろ) -->
  <path d="M100,230 Q60,215 55,175 Q75,195 108,205 Z" fill="#8FE0EE" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(ぷっくり水色のしずく型) -->
  <path d="M180,55
           C240,55 285,105 285,175
           C285,255 240,300 180,300
           C120,300 75,255 75,175
           C75,105 120,55 180,55 Z"
        fill="#8FE0EE" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- あし(左右) -->
  <ellipse cx="140" cy="292" rx="24" ry="16" fill="#8FE0EE" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="222" cy="292" rx="24" ry="16" fill="#8FE0EE" stroke="#2d263c" stroke-width="7"/>

  <!-- うで(左右) -->
  <ellipse cx="88" cy="205" rx="20" ry="14" fill="#8FE0EE" stroke="#2d263c" stroke-width="6" transform="rotate(-20 88 205)"/>
  <ellipse cx="272" cy="205" rx="20" ry="14" fill="#8FE0EE" stroke="#2d263c" stroke-width="6" transform="rotate(20 272 205)"/>

  <!-- おなかの渦巻き模様 -->
  <circle cx="180" cy="205" r="62" fill="#FFFFFF" stroke="#2d263c" stroke-width="7"/>
  <path d="M180,205 m0,-38
           a38,38 0 1 1 -27,65
           a24,24 0 1 1 17,-41
           a11,11 0 1 1 -8,19"
        fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 目(左右・大きく丸い) -->
  <circle cx="140" cy="130" r="26" fill="#FFFFFF" stroke="#2d263c" stroke-width="7"/>
  <circle cx="220" cy="130" r="26" fill="#FFFFFF" stroke="#2d263c" stroke-width="7"/>
  <circle cx="146" cy="134" r="12" fill="#2d263c"/>
  <circle cx="226" cy="134" r="12" fill="#2d263c"/>
  <circle cx="141" cy="128" r="4" fill="#FFFFFF"/>
  <circle cx="221" cy="128" r="4" fill="#FFFFFF"/>

  <!-- 口 -->
  <path d="M162,168 Q180,180 198,168" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
