<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尻尾の先端(ドリル状・後ろ) -->
  <path d="M222 316 Q246 322 252 340 Q256 354 240 352 Q220 350 208 336 Q202 324 222 316Z" fill="#8f8974" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体・尾側の岩ブロック(暗め) -->
  <circle cx="210" cy="320" r="24" fill="#96907c" stroke="#2d263c" stroke-width="7"/>
  <circle cx="185" cy="298" r="29" fill="#b8b3a0" stroke="#2d263c" stroke-width="7"/>
  <circle cx="160" cy="272" r="33" fill="#96907c" stroke="#2d263c" stroke-width="7"/>
  <circle cx="150" cy="240" r="36" fill="#b8b3a0" stroke="#2d263c" stroke-width="7"/>
  <circle cx="165" cy="208" r="38" fill="#96907c" stroke="#2d263c" stroke-width="7"/>
  <circle cx="198" cy="188" r="36" fill="#b8b3a0" stroke="#2d263c" stroke-width="7"/>

  <!-- 岩の割れ目(尾側) -->
  <line x1="140" y1="255" x2="152" y2="270" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="188" y1="300" x2="200" y2="312" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 体・中段のうねり -->
  <circle cx="214" cy="158" r="34" fill="#96907c" stroke="#2d263c" stroke-width="7"/>
  <circle cx="200" cy="126" r="32" fill="#b8b3a0" stroke="#2d263c" stroke-width="7"/>
  <circle cx="168" cy="108" r="30" fill="#96907c" stroke="#2d263c" stroke-width="7"/>

  <!-- 岩の割れ目(中段) -->
  <line x1="195" y1="145" x2="208" y2="160" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="178" y1="98" x2="190" y2="112" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 頭部(前・大きいブロック) -->
  <circle cx="163" cy="72" r="46" fill="#c2bda8" stroke="#2d263c" stroke-width="8"/>

  <!-- ハイライト(平面のツヤ) -->
  <ellipse cx="148" cy="55" rx="13" ry="8" fill="#dcd7c1"/>
  <ellipse cx="195" cy="140" rx="10" ry="6" fill="#dcd7c1"/>

  <!-- 口(横一文字・岩の裂け目) -->
  <path d="M130 95 Q163 116 196 92" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 目 左 -->
  <polygon points="142,60 150,69 142,78 134,69" fill="#cc3d3d" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 目 右 -->
  <polygon points="182,58 190,67 182,76 174,67" fill="#cc3d3d" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
</svg>
