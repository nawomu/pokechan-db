<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)全身青い毛色 2)頭の左右にヒレ状の耳 3)首元のクリーム色の浮き輪(フローター) 4)平たいクリーム色の尾 5)白いお腹と口元・丸い黒目 -->

  <!-- 尾(体の後ろ・平たいパドル状) -->
  <path d="M225 250 Q290 230 305 270 Q315 300 280 305 Q235 308 210 285 Z"
        fill="#eddcae" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足(後ろ) -->
  <ellipse cx="150" cy="320" rx="26" ry="18" fill="#3f6fb0" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="228" cy="320" rx="26" ry="18" fill="#3f6fb0" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="150" cy="326" rx="16" ry="9" fill="#eddcae" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="228" cy="326" rx="16" ry="9" fill="#eddcae" stroke="#2d263c" stroke-width="6"/>

  <!-- 体(青いずんどう体形) -->
  <path d="M118 175 Q108 260 140 305 Q180 330 220 305 Q252 260 244 175
           Q240 130 180 122 Q120 130 118 175 Z"
        fill="#4d80c4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹(白っぽいクリーム) -->
  <path d="M148 190 Q142 250 165 292 Q180 302 197 292 Q220 250 214 190
           Q210 165 181 162 Q152 165 148 190 Z"
        fill="#f7ecd6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 腕(左右) -->
  <ellipse cx="106" cy="215" rx="22" ry="34" fill="#4d80c4" stroke="#2d263c" stroke-width="7" transform="rotate(-15 106 215)"/>
  <ellipse cx="256" cy="215" rx="22" ry="34" fill="#4d80c4" stroke="#2d263c" stroke-width="7" transform="rotate(15 256 215)"/>
  <ellipse cx="98" cy="245" rx="15" ry="12" fill="#f7ecd6" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="264" cy="245" rx="15" ry="12" fill="#f7ecd6" stroke="#2d263c" stroke-width="6"/>

  <!-- 首元の浮き輪(フローター・ブイゼルの特徴) -->
  <path d="M128 150 Q180 178 234 150 Q236 172 180 186 Q124 172 128 150 Z"
        fill="#f0d98a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭のヒレ(左右) -->
  <path d="M118 85 Q90 40 108 20 Q128 55 135 95 Z"
        fill="#3f6fb0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M244 85 Q272 40 254 20 Q234 55 227 95 Z"
        fill="#3f6fb0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭(丸い青) -->
  <circle cx="181" cy="108" r="72" fill="#4d80c4" stroke="#2d263c" stroke-width="8"/>

  <!-- 口元・マズル(クリーム色) -->
  <ellipse cx="181" cy="132" rx="46" ry="34" fill="#f7ecd6" stroke="#2d263c" stroke-width="6"/>

  <!-- 目 -->
  <ellipse cx="153" cy="98" rx="13" ry="16" fill="#241f30"/>
  <ellipse cx="209" cy="98" rx="13" ry="16" fill="#241f30"/>
  <circle cx="157" cy="92" r="4" fill="#ffffff"/>
  <circle cx="213" cy="92" r="4" fill="#ffffff"/>

  <!-- 鼻 -->
  <ellipse cx="181" cy="126" rx="7" ry="5" fill="#241f30"/>

  <!-- ほほのライン(ヒゲ) -->
  <path d="M140 138 Q120 134 108 140" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M222 138 Q242 134 254 140" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
