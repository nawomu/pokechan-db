  <ellipse cx="305" cy="178" rx="18" ry="16" fill="#f5f2e8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 後ろ足(右) -->
  <ellipse cx="258" cy="272" rx="22" ry="18" fill="#f0ece0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="248" y="255" width="22" height="28" rx="8" fill="#e8e4d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ足(左) -->
  <ellipse cx="118" cy="274" rx="22" ry="18" fill="#f0ece0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="108" y="257" width="22" height="28" rx="8" fill="#e8e4d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

