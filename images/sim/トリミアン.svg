  <ellipse cx="198" cy="118" rx="3.5" ry="3.5" fill="#ffffff"/>
  <ellipse cx="200" cy="116" rx="1.8" ry="1.8" fill="#ffffff"/>

  <!-- 鼻 -->
  <ellipse cx="179" cy="138" rx="9" ry="7" fill="#e8a0b0" stroke="#2d263c" stroke-width="4"/>

  <!-- 口 -->
  <path d="M170 146 Q179 154 188 146" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ(左) -->
  <ellipse cx="148" cy="138" rx="11" ry="8" fill="#f0b0c0" opacity="0.65"/>
  <!-- ほっぺ(右) -->
  <ellipse cx="210" cy="140" rx="10" ry="8" fill="#f0b0c0" opacity="0.65"/>

  <!-- しっぽの軸 -->
  <path d="M263 205 Q285 195 298 185" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>