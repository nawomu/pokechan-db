  <ellipse cx="148" cy="198" rx="32" ry="30" fill="#ffffff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="222" cy="200" rx="30" ry="29" fill="#ffffff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="186" cy="192" rx="28" ry="27" fill="#fdfcf8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 首リボン -->
  <path d="M152 178 Q185 170 218 178 Q185 185 152 178 Z" fill="#e87070" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="185" cy="179" r="7" fill="#d44040" stroke="#2d263c" stroke-width="4"/>

  <!-- 前足(右) -->
  <ellipse cx="238" cy="270" rx="18" ry="16" fill="#f0ece0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="229" y="247" width="18" height="30" rx="7" fill="#e8e4d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 前足(左) -->
  <ellipse cx="138" cy="272" rx="18" ry="16" fill="#f0ece0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="129" y="249" width="18" height="30" rx="7" fill="#e8e4d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭の大きなもこもこ毛玉 -->
  <ellipse cx="178" cy="112" rx="62" ry="60" fill="#ffffff" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 頭毛のでこぼこ感 -->
  <ellipse cx="145" cy="90" rx="30" ry="28" fill="#fafaf8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="208" cy="88" rx="28" ry="27" fill="#fafaf8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="177" cy="75" rx="26" ry="24" fill="#ffffff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 耳(垂れ耳・左) -->
  <path d="M128 118 Q105 140 110 168 Q120 175 132 165 Q138 142 130 120 Z" fill="#f0ece0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 耳(垂れ耳・右) -->
  <path d="M228 115 Q250 138 245 167 Q234 174 222 163 Q218 140 226 117 Z" fill="#f0ece0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 顔(肌部分) -->
  <ellipse cx="178" cy="128" rx="42" ry="38" fill="#fdf9f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(左) -->
  <ellipse cx="161" cy="120" rx="12" ry="13" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="163" cy="117" rx="4" ry="4" fill="#ffffff"/>
  <ellipse cx="165" cy="115" rx="2" ry="2" fill="#ffffff"/>

  <!-- 目(右) - ちょっとずれてる落書き感 -->
