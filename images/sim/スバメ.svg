  <circle cx="199" cy="95" r="3" fill="#ffffff"/>

  <!-- くちばし -->
  <path d="M232 108 L262 116 L232 128 Z" fill="#f0a23a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

