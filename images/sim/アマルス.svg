<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)長い首の首長竜 2)水色の胴体 3)首と背中に黄色い帆(ヒレ) 4)大きな優しい目 5)四つ脚・右に尾 -->

  <!-- 尾(右へ) -->
  <path d="M250,250 Q300,250 318,235 Q322,250 308,265 Q265,272 248,265 Z" fill="#8fc6e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ脚(2本) -->
  <ellipse cx="210" cy="285" rx="22" ry="28" fill="#8fc6e8" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="255" cy="285" rx="20" ry="26" fill="#8fc6e8" stroke="#2d263c" stroke-width="7"/>
  <!-- 前脚(2本) -->
  <ellipse cx="155" cy="288" rx="18" ry="24" fill="#8fc6e8" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="185" cy="290" rx="16" ry="22" fill="#8fc6e8" stroke="#2d263c" stroke-width="7"/>

  <!-- 黄色い帆(背中〜首のヒレ・後ろ) -->
  <path d="M150,235 Q145,170 120,120 Q135,108 150,118 Q160,180 175,232 Q165,238 150,235 Z" fill="#ffd84d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 帆の模様(筋) -->
  <path d="M148,150 L138,150 M150,180 L140,180 M152,210 L143,210" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 胴体 -->
  <ellipse cx="205" cy="245" rx="58" ry="42" fill="#8fc6e8" stroke="#2d263c" stroke-width="7"/>

  <!-- 首(長い・左上へ) -->
  <path d="M165,238 Q130,210 110,170 Q100,145 120,128 Q140,120 150,140 Q150,180 175,220 Q180,235 165,238 Z" fill="#8fc6e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="112" cy="120" rx="38" ry="30" fill="#8fc6e8" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭の帆(小) -->
  <path d="M100,98 Q95,75 108,68 Q118,80 118,98 Z" fill="#ffd84d" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左目(大きい・優しい) -->
  <ellipse cx="98" cy="120" rx="16" ry="18" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="100" cy="124" r="8" fill="#2d263c"/>
  <circle cx="97" cy="120" r="3" fill="#ffffff"/>
  <!-- 右目(小) -->
  <ellipse cx="128" cy="118" rx="8" ry="10" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="129" cy="121" r="4" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M92,138 Q100,144 108,138" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
