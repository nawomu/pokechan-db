<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- リーシャン / Chingling -->

  <!-- 地面の影 -->
  <ellipse cx="180" cy="298" rx="76" ry="13" fill="#2d263c" opacity="0.15"/>

  <!-- メインボディ(丸い鈴型・水色) -->
  <path d="M100,185
           C97,132,132,95,180,95
           C228,95,263,132,260,185
           C262,225,246,255,218,268
           C205,275,193,278,180,278
           C167,278,155,275,142,268
           C114,255,98,225,100,185 Z"
        fill="#6FC6E8" stroke="#2d263c" stroke-width="8"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- お腹の薄い色(クリーム) -->
  <path d="M140,175
           C138,150,158,138,180,137
           C202,138,222,150,220,175
           C222,205,205,232,180,235
           C155,232,138,205,140,175 Z"
        fill="#FFF3D0" stroke="none"/>

  <!-- 左の小さな手 -->
  <ellipse cx="98" cy="210" rx="15" ry="10" fill="#57B4DA" stroke="#2d263c" stroke-width="6"
           stroke-linejoin="round" transform="rotate(-15 98 210)"/>
  <!-- 右の小さな手 -->
  <ellipse cx="262" cy="207" rx="14" ry="9" fill="#57B4DA" stroke="#2d263c" stroke-width="6"
           stroke-linejoin="round" transform="rotate(15 262 207)"/>

  <!-- 鈴の舌(ぶら下がる突起) -->
  <path d="M172,262 C170,278,172,292,180,300 C188,292,190,278,188,262 Z"
        fill="#F3D98A" stroke="#2d263c" stroke-width="7"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 舌の先の小さな点 -->
  <circle cx="180" cy="298" r="5" fill="#2d263c"/>

  <!-- 頭のアンテナ(茎) -->
  <path d="M180,96 C179,80,181,65,180,52"
        fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- アンテナ先のポンポン -->
  <circle cx="180" cy="44" r="13" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <!-- ポンポンのハイライト -->
  <circle cx="175" cy="40" r="4" fill="#f0f0f0"/>

  <!-- 左目(白目) -->
  <ellipse cx="148" cy="172" rx="20" ry="24" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <!-- 右目(白目・少し非対称) -->
  <ellipse cx="213" cy="170" rx="19" ry="23" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>

  <!-- 左瞳(赤茶色) -->
  <ellipse cx="151" cy="178" rx="11" ry="13" fill="#C8703C"/>
  <!-- 右瞳 -->
  <ellipse cx="210" cy="176" rx="10" ry="12" fill="#C8703C"/>

  <!-- 瞳のハイライト -->
  <circle cx="146" cy="173" r="4" fill="#ffffff"/>
  <circle cx="206" cy="171" r="3" fill="#ffffff"/>

  <!-- 瞳の黒目 -->
  <ellipse cx="153" cy="181" rx="5" ry="6" fill="#1a1a2e"/>
  <ellipse cx="212" cy="179" rx="5" ry="6" fill="#1a1a2e"/>

  <!-- 口(にっこり) -->
  <path d="M165,205 C169,212,191,212,195,205"
        fill="none" stroke="#2d263c" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ほっぺの赤み(左) -->
  <ellipse cx="126" cy="200" rx="14" ry="9" fill="#F5A0A8" opacity="0.6"/>
  <!-- ほっぺの赤み(右) -->
  <ellipse cx="234" cy="198" rx="13" ry="8" fill="#F5A0A8" opacity="0.6"/>
</svg>
