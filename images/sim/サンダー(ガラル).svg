<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- しっぽ(短い羽根の束・体の奥) -->
  <polygon points="160,222 145,255 168,240 165,272 182,250" fill="#2B3A4A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="150,258 145,268 160,260" fill="#E2472A" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 足(筋肉質なもも・左右) -->
  <ellipse cx="150" cy="250" rx="22" ry="32" fill="#37475C" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="210" cy="250" rx="22" ry="32" fill="#37475C" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 足先(するどいツメ・左右) -->
  <polygon points="136,275 130,315 148,292 150,320 160,296 170,312 162,275" fill="#232030" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="224,275 230,315 212,292 210,320 200,296 190,312 198,275" fill="#232030" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <ellipse cx="180" cy="195" rx="65" ry="60" fill="#37475C" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 胸元のハイライト -->
  <ellipse cx="180" cy="215" rx="30" ry="32" fill="#6E93AC"/>

  <!-- 左つばさ(小さくたたんだ羽) -->
  <polygon points="118,165 92,180 88,220 112,232 128,205 122,180" fill="#2B3A4A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="92,180 88,220 104,210" fill="#1B1B24" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 右つばさ(ミラー) -->
  <polygon points="242,165 268,180 272,220 248,232 232,205 238,180" fill="#2B3A4A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="268,180 272,220 256,210" fill="#1B1B24" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 背中に続く赤いとさか -->
  <polygon points="172,100 188,100 194,142 200,190 190,235 170,235 178,190 172,142" fill="#E2472A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 首 -->
  <polygon points="165,140 195,140 189,100 171,100" fill="#37475C" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="85" rx="38" ry="36" fill="#37475C" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭のかみなりモヒカン(赤) -->
  <polygon points="150,72 146,25 160,55 170,15 180,52 192,14 202,54 214,24 212,70" fill="#E2472A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- キリッとした眉(左右) -->
  <polygon points="150,68 172,66 168,74" fill="#1B1B24"/>
  <polygon points="210,68 188,66 192,74" fill="#1B1B24"/>

  <!-- 目(左) -->
  <ellipse cx="163" cy="82" rx="9" ry="10" fill="#F0A030" stroke="#2d263c" stroke-width="6"/>
  <circle cx="160" cy="79" r="4" fill="#1a1a2e"/>
  <circle cx="162" cy="78" r="1.4" fill="white"/>

  <!-- 目(右) -->
  <ellipse cx="197" cy="82" rx="9" ry="10" fill="#F0A030" stroke="#2d263c" stroke-width="6"/>
  <circle cx="194" cy="79" r="4" fill="#1a1a2e"/>
  <circle cx="196" cy="78" r="1.4" fill="white"/>

  <!-- くちばし -->
  <polygon points="168,98 192,98 180,118" fill="#1B1B24" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
</svg>
