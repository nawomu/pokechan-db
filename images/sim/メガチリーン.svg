<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 紐飾り(左) -->
  <path d="M105 115 Q88 145 95 175 Q88 195 100 215" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="100" cy="222" rx="10" ry="13" fill="#e8c840" stroke="#2d263c" stroke-width="6"/>
  <!-- 紐飾り(右) -->
  <path d="M255 115 Q272 145 265 175 Q272 195 260 215" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="260" cy="222" rx="10" ry="13" fill="#e8c840" stroke="#2d263c" stroke-width="6"/>

  <!-- 分身チリーン × 6 (赤・青・緑×2ずつ) -->
  <!-- 左紐から赤チリーン -->
  <line x1="130" y1="185" x2="128" y2="208" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="128" cy="221" rx="10" ry="13" fill="#e83020" stroke="#2d263c" stroke-width="5"/>
  <line x1="128" y1="234" x2="128" y2="246" stroke="#2d263c" stroke-width="3"/>
  <!-- 中央左 青チリーン -->
  <line x1="160" y1="185" x2="157" y2="208" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="157" cy="221" rx="10" ry="13" fill="#3880e0" stroke="#2d263c" stroke-width="5"/>
  <line x1="157" y1="234" x2="157" y2="246" stroke="#2d263c" stroke-width="3"/>
  <!-- 中央右 緑チリーン -->
  <line x1="200" y1="185" x2="203" y2="208" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="203" cy="221" rx="10" ry="13" fill="#38a840" stroke="#2d263c" stroke-width="5"/>
  <line x1="203" y1="234" x2="203" y2="246" stroke="#2d263c" stroke-width="3"/>
  <!-- 右側 赤チリーン -->
  <line x1="230" y1="185" x2="232" y2="208" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="232" cy="221" rx="10" ry="13" fill="#e83020" stroke="#2d263c" stroke-width="5"/>
  <line x1="232" y1="234" x2="232" y2="246" stroke="#2d263c" stroke-width="3"/>
  <!-- 追加 青チリーン小 -->
  <line x1="145" y1="260" x2="143" y2="278" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="143" cy="288" rx="8" ry="10" fill="#3880e0" stroke="#2d263c" stroke-width="5"/>
  <!-- 追加 緑チリーン小 -->
  <line x1="217" y1="260" x2="219" y2="278" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="219" cy="288" rx="8" ry="10" fill="#38a840" stroke="#2d263c" stroke-width="5"/>

  <!-- メガフレーム(リーシャン顔型・金属) 背面 -->
  <rect x="78" y="62" width="204" height="68" rx="16" fill="#b0a830" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- フレーム内装飾 -->
  <rect x="90" y="72" width="180" height="46" rx="10" fill="#d4c050" stroke="#2d263c" stroke-width="4"/>

  <!-- メガフレームの目(リーシャン風) -->
  <ellipse cx="138" cy="95" rx="18" ry="14" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="222" cy="95" rx="18" ry="14" fill="white" stroke="#2d263c" stroke-width="5"/>
  <circle cx="141" cy="96" r="9" fill="#2d263c"/>
  <circle cx="225" cy="96" r="9" fill="#2d263c"/>
  <circle cx="144" cy="93" r="3" fill="white"/>
  <circle cx="228" cy="93" r="3" fill="white"/>

  <!-- チリーン本体(白い風鈴) -->
  <ellipse cx="180" cy="178" rx="58" ry="65" fill="white" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 体の赤い模様(横縞2本) -->
  <path d="M130 165 Q155 158 180 160 Q205 158 230 165" fill="none" stroke="#e83020" stroke-width="7" stroke-linecap="round"/>
  <path d="M127 183 Q153 176 180 178 Q207 176 233 183" fill="none" stroke="#e83020" stroke-width="7" stroke-linecap="round"/>
  <!-- 体の赤点 -->
  <circle cx="157" cy="200" r="5" fill="#e83020"/>
  <circle cx="203" cy="200" r="5" fill="#e83020"/>

  <!-- 吸盤(頭上) -->
  <ellipse cx="180" cy="117" rx="22" ry="12" fill="#e8c840" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="180" cy="117" rx="12" ry="7" fill="#d4b030" stroke="#2d263c" stroke-width="3"/>

  <!-- チリーン顔 -->
  <!-- 目 -->
  <ellipse cx="162" cy="168" rx="13" ry="15" fill="white" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="198" cy="168" rx="13" ry="15" fill="white" stroke="#2d263c" stroke-width="6"/>
  <circle cx="165" cy="170" r="8" fill="#2d263c"/>
  <circle cx="201" cy="170" r="8" fill="#2d263c"/>
  <circle cx="167" cy="167" r="3" fill="white"/>
  <circle cx="203" cy="167" r="3" fill="white"/>
  <!-- 口(ニコっと) -->
  <path d="M168 196 Q180 205 192 196" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- チリーン下の尻尾紐 -->
  <path d="M170 242 Q165 262 172 278 Q168 290 175 302" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M190 242 Q195 262 188 278 Q192 290 185 302" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- 尻尾先端タグ -->
  <ellipse cx="174" cy="308" rx="9" ry="8" fill="#e8c840" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="186" cy="308" rx="9" ry="8" fill="#e8c840" stroke="#2d263c" stroke-width="5"/>
</svg>