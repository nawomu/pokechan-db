<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1) 体色は濃い紫がかったグレー(黒っぽい紫)
  2) 頭からしっぽの付け根にかけてクリーム色の帯模様
  3) 大きくふわっと持ち上がったしっぽ、先端は白っぽいクリーム色
  4) とがった三角の耳、丸い小さな目、鼻先はマズル(クリーム色)+濃い赤紫の鼻
  5) ずんぐりした4本の短い脚、足先はクリーム色の肉球
  -->

  <!-- しっぽ(体より奥) -->
  <path d="M 215 255 C 262 244 286 198 296 150 C 305 110 300 74 280 54 C 269 90 254 130 239 165 C 224 200 214 230 215 255 Z"
        fill="#4f3d55" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <path d="M 279 70 Q 264 110 249 150 Q 234 190 221 225"
        fill="none" stroke="#f2e2b8" stroke-width="14" stroke-linecap="round"/>
  <ellipse cx="281" cy="58" rx="24" ry="20" fill="#faf3df" stroke="#2d263c" stroke-width="7"/>

  <!-- 奥側の後ろ脚 -->
  <ellipse cx="145" cy="296" rx="20" ry="22" fill="#4f3d55" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="230" cy="296" rx="20" ry="22" fill="#4f3d55" stroke="#2d263c" stroke-width="7"/>

  <!-- 胴体 -->
  <ellipse cx="190" cy="240" rx="95" ry="68" fill="#4f3d55" stroke="#2d263c" stroke-width="8"/>

  <!-- 手前の前脚 -->
  <ellipse cx="110" cy="290" rx="18" ry="20" fill="#4f3d55" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="165" cy="295" rx="18" ry="20" fill="#4f3d55" stroke="#2d263c" stroke-width="7"/>

  <!-- 肉球 -->
  <ellipse cx="145" cy="317" rx="17" ry="9" fill="#f2e2b8" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="230" cy="317" rx="17" ry="9" fill="#f2e2b8" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="110" cy="309" rx="15" ry="8" fill="#f2e2b8" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="165" cy="314" rx="15" ry="8" fill="#f2e2b8" stroke="#2d263c" stroke-width="6"/>

  <!-- 背中のクリーム帯(頭からしっぽへ) -->
  <path d="M 100 150 Q 160 128 210 165 Q 235 190 220 230"
        fill="none" stroke="#f2e2b8" stroke-width="18" stroke-linecap="round"/>

  <!-- 頭 -->
  <circle cx="110" cy="190" r="65" fill="#4f3d55" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳 -->
  <path d="M 70 145 L 60 100 L 100 140 Z" fill="#4f3d55" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 125 135 L 135 90 L 160 130 Z" fill="#4f3d55" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- マズル -->
  <ellipse cx="60" cy="210" rx="35" ry="28" fill="#f2e2b8" stroke="#2d263c" stroke-width="7"/>

  <!-- 鼻 -->
  <circle cx="32" cy="210" r="10" fill="#7a2e3a" stroke="#2d263c" stroke-width="5"/>

  <!-- 目 -->
  <circle cx="85" cy="170" r="13" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="87" cy="172" r="6" fill="#2d263c"/>
  <circle cx="135" cy="165" r="13" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="137" cy="167" r="6" fill="#2d263c"/>
</svg>
