  <circle cx="177" cy="161" r="7" fill="#1a1a1a"/>
  <circle cx="180" cy="158" r="3" fill="white"/>

  <!-- 目(右) -->
  <ellipse cx="210" cy="162" rx="11" ry="13" fill="white" stroke="#2d263c" stroke-width="5"/>
  <circle cx="212" cy="161" r="7" fill="#1a1a1a"/>
  <circle cx="215" cy="158" r="3" fill="white"/>

  <!-- 口(かわいい小さい) -->
  <path d="M183,180 Q193,188 202,180" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ(ピンク) -->
  <ellipse cx="160" cy="175" rx="10" ry="8" fill="#FFB0C0" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="225" cy="175" rx="10" ry="8" fill="#FFB0C0" stroke="#2d263c" stroke-width="3"/>

</svg>
