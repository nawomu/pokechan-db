  <!-- 頭 -->
  <ellipse cx="192" cy="168" rx="52" ry="50" fill="#F8E060" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 小さな角(2本) -->
  <path d="M175,122 Q172,105 175,95 Q179,108 180,122 Z" fill="#2a1e3a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M208,122 Q205,105 208,95 Q212,108 213,122 Z" fill="#2a1e3a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 目(左) - かわいい -->
