  <!-- 脚(右) -->
  <ellipse cx="202" cy="298" rx="18" ry="12" fill="#F8E060" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="188" cy="238" rx="60" ry="68" fill="#F8E060" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹のクリーム色 -->
