<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 影 -->
  <ellipse cx="180" cy="315" rx="80" ry="18" fill="#00000022"/>

  <!-- 青い電気オーラ(背景) -->
  <ellipse cx="180" cy="200" rx="105" ry="100" fill="#60C0FF" opacity="0.25"/>
  <!-- オーラ電撃ライン -->
  <polyline points="90,160 78,145 95,135 80,118" fill="none" stroke="#60C0FF" stroke-width="5" stroke-linecap="round"/>
  <polyline points="270,155 282,138 265,130 278,112" fill="none" stroke="#60C0FF" stroke-width="5" stroke-linecap="round"/>
  <polyline points="130,105 118,90 130,80 115,65" fill="none" stroke="#60C0FF" stroke-width="5" stroke-linecap="round"/>
  <polyline points="230,102 242,88 228,78 244,62" fill="none" stroke="#60C0FF" stroke-width="5" stroke-linecap="round"/>

  <!-- しっぽ(稲妻ジグザグ) -->
  <polyline points="235,220 260,200 240,185 268,165 245,150 272,135 255,125"
            fill="none" stroke="#F0C830" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- しっぽ先端の黒い玉 -->
  <circle cx="255" cy="122" r="10" fill="#2d263c" stroke="#2d263c" stroke-width="3"/>

  <!-- 背中(茶色) -->
  <ellipse cx="178" cy="230" rx="72" ry="55" fill="#B07830" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体(黄色) -->
  <ellipse cx="175" cy="215" rx="65" ry="58" fill="#F0C830" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腕・左 -->
  <ellipse cx="110" cy="220" rx="20" ry="30" fill="#F0C830" stroke="#2d263c" stroke-width="7" transform="rotate(-20,110,220)" stroke-linejoin="round"/>
  <!-- 腕・右 -->
  <ellipse cx="245" cy="218" rx="20" ry="30" fill="#F0C830" stroke="#2d263c" stroke-width="7" transform="rotate(20,245,218)" stroke-linejoin="round"/>

  <!-- 耳・左(大きな丸耳) -->
  <ellipse cx="130" cy="130" rx="28" ry="40" fill="#F0C830" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 耳先端黒 -->
  <ellipse cx="130" cy="100" rx="18" ry="18" fill="#2d263c"/>

  <!-- 耳・右 -->
  <ellipse cx="228" cy="128" rx="28" ry="40" fill="#F0C830" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 耳先端黒 -->
  <ellipse cx="228" cy="98" rx="18" ry="18" fill="#2d263c"/>

  <!-- 頭部 -->
  <ellipse cx="178" cy="170" rx="62" ry="55" fill="#F0C830" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ほっぺの電気袋・左 -->
  <ellipse cx="128" cy="178" rx="20" ry="16" fill="#FF8888" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- ほっぺの電気袋・右 -->
  <ellipse cx="228" cy="178" rx="20" ry="16" fill="#FF8888" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 目・左(白目) -->
  <ellipse cx="158" cy="162" rx="14" ry="16" fill="white" stroke="#2d263c" stroke-width="4"/>
  <!-- 目・左(黒目) -->
  <ellipse cx="160" cy="164" rx="8" ry="9" fill="#2d263c"/>
  <!-- 目・左(ハイライト) -->
  <circle cx="163" cy="160" r="3" fill="white"/>

  <!-- 目・右(白目) -->
  <ellipse cx="198" cy="162" rx="14" ry="16" fill="white" stroke="#2d263c" stroke-width="4"/>
  <!-- 目・右(黒目) -->
  <ellipse cx="200" cy="164" rx="8" ry="9" fill="#2d263c"/>
  <!-- 目・右(ハイライト) -->
  <circle cx="203" cy="160" r="3" fill="white"/>

  <!-- 鼻・口 -->
  <ellipse cx="178" cy="182" rx="6" ry="4" fill="#B07830"/>
  <path d="M170,190 Q178,198 186,190" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- Xマーク(電気・胴体) -->
  <line x1="158" y1="205" x2="198" y2="240" stroke="#60C0FF" stroke-width="5" stroke-linecap="round"/>
  <line x1="198" y1="205" x2="158" y2="240" stroke="#60C0FF" stroke-width="5" stroke-linecap="round"/>

  <!-- 足・左 -->
  <ellipse cx="150" cy="282" rx="22" ry="18" fill="#B07830" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 足・右 -->
  <ellipse cx="208" cy="282" rx="22" ry="18" fill="#B07830" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
</svg>
