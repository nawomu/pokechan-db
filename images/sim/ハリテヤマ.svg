<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1) 丸くて大きい太鼓腹(だるま型シルエット)
  2) 胸〜腹に濃紺紫のジグザグ模様
  3) 左右に大きく広げた太い腕+平たい巨大な手のひら(相撲の突っ張りポーズ)
  4) 小さい丸顔に小さい黒目・キリッとした太い眉・小さい耳のでっぱり
  5) 短くて太い足に平たい大きな足 -->

  <!-- 後ろ(体の影・奥行き) -->
  <ellipse cx="180" cy="216" rx="124" ry="104" fill="#d99a63" stroke="none"/>

  <!-- 足(脚) -->
  <rect x="108" y="248" width="48" height="76" rx="20" fill="#f5cda0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="204" y="248" width="48" height="76" rx="20" fill="#f5cda0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足裏(平たい足) -->
  <ellipse cx="132" cy="322" rx="35" ry="17" fill="#8b93a8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="228" cy="322" rx="35" ry="17" fill="#8b93a8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体(太鼓腹) -->
  <ellipse cx="180" cy="205" rx="118" ry="98" fill="#f5cda0" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 腹の模様(濃紺紫のジグザグ) -->
  <path d="M112,183 Q142,225 180,193 Q218,225 248,183 L248,206 Q218,242 180,214 Q142,242 112,206 Z" fill="#3d3565" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="150" cy="245" rx="9" ry="7" fill="#3d3565" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="210" cy="245" rx="9" ry="7" fill="#3d3565" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 腕(左右に広げた突っ張りポーズ) -->
  <ellipse cx="78" cy="152" rx="50" ry="27" fill="#f5cda0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" transform="rotate(-38 78 152)"/>
  <ellipse cx="282" cy="152" rx="50" ry="27" fill="#f5cda0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" transform="rotate(38 282 152)"/>

  <!-- 手のひら(平たく大きい) -->
  <ellipse cx="55" cy="104" rx="34" ry="40" fill="#fbead4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="305" cy="104" rx="34" ry="40" fill="#fbead4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 手のひらの指の線 -->
  <path d="M40,76 L40,98" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M55,70 L55,96" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M70,76 L70,98" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M290,76 L290,98" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M305,70 L305,96" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M320,76 L320,98" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 頭 -->
  <circle cx="180" cy="78" r="44" fill="#f5cda0" stroke="#2d263c" stroke-width="9"/>

  <!-- 耳のでっぱり -->
  <circle cx="138" cy="72" r="11" fill="#f5cda0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="222" cy="72" r="11" fill="#f5cda0" stroke="#2d263c" stroke-width="6"/>

  <!-- 太い眉 -->
  <path d="M152,58 L172,64" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M208,58 L188,64" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 目 -->
  <circle cx="163" cy="76" r="6" fill="#2d263c"/>
  <circle cx="197" cy="76" r="6" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M160,100 Q180,110 200,100" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
