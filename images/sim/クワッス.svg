  <!-- arms -->
  <ellipse cx="98" cy="230" rx="20" ry="34" fill="#3a6fd8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="262" cy="230" rx="20" ry="34" fill="#3a6fd8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- neck feather crest -->
  <path d="M120 175 Q180 205 240 175 Q225 200 180 210 Q135 200 120 175 Z" fill="#fdfdfb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
