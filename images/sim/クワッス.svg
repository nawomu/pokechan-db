  <path d="M150 160 Q180 150 210 160 Q200 185 180 188 Q160 185 150 160 Z" fill="#2b2b3a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <line x1="180" y1="160" x2="180" y2="182" stroke="#4a4a5c" stroke-width="3"/>
  <!-- cheeks -->
  <circle cx="128" cy="158" r="9" fill="#ffb0a0" opacity="0.8"/>
  <circle cx="236" cy="158" r="9" fill="#ffb0a0" opacity="0.8"/>
