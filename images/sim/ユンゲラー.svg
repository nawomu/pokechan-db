<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- しっぽ（長く伸びて先が尖る） -->
  <path d="M190 265 Q225 280 245 255 Q258 238 250 225 Q244 240 225 250 Q205 260 188 250" fill="#C8A03C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 左足 -->
  <ellipse cx="150" cy="312" rx="22" ry="12" fill="#C8A03C" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右足 -->
  <ellipse cx="200" cy="315" rx="22" ry="12" fill="#C8A03C" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左脚 -->
  <path d="M145 270 Q140 292 150 312" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <!-- 右脚 -->
  <path d="M195 272 Q195 296 200 315" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 胴体 -->
  <path d="M135 165 Q120 205 128 250 Q135 278 168 285 Q195 288 212 272 Q225 255 218 225 Q212 195 205 165 Z" fill="#C8A03C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腹（クリーム色） -->
  <ellipse cx="172" cy="225" rx="30" ry="42" fill="#EFE0A0" stroke="#2d263c" stroke-width="5"/>

  <!-- 左腕（下げている・小さめ） -->
  <path d="M136 190 Q112 205 105 230 Q101 245 110 248 Q118 250 122 235 Q128 215 142 200" fill="#C8A03C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 右腕（スプーンを持って高く上げる） -->
  <path d="M205 188 Q235 175 255 148 Q265 132 260 122 Q253 116 245 130 Q230 152 200 170" fill="#C8A03C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- スプーンの柄 -->
  <line x1="258" y1="128" x2="278" y2="90" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- スプーンの先 -->
  <ellipse cx="283" cy="80" rx="12" ry="8" fill="#D6D6D6" stroke="#2d263c" stroke-width="5" transform="rotate(-30 283 80)"/>

  <!-- 頭（キツネ顔） -->
  <path d="M125 138 Q120 98 145 76 Q162 58 182 57 Q205 56 220 74 Q236 96 230 136 Q226 158 200 168 Q178 174 155 166 Q133 158 125 138 Z" fill="#C8A03C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 耳（左） -->
  <path d="M138 102 Q126 66 143 48 Q153 38 160 60 Q157 82 147 98 Z" fill="#C8A03C" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 耳内（左） -->
  <path d="M141 96 Q133 70 146 55 Q152 63 149 86 Z" fill="#E8844A" stroke="none"/>

  <!-- 耳（右） -->
  <path d="M212 100 Q226 62 213 46 Q203 36 196 58 Q198 80 206 96 Z" fill="#C8A03C" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 耳内（右） -->
  <path d="M209 94 Q220 68 211 53 Q205 61 206 84 Z" fill="#E8844A" stroke="none"/>

  <!-- 額の星マーク（銀色） -->
  <path d="M177 76 L180 67 L183 76 L192 76 L185 82 L188 91 L180 85 L172 91 L175 82 L168 76 Z" fill="#C0C0C0" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 目（左） -->
  <ellipse cx="156" cy="120" rx="12" ry="8" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="158" cy="121" rx="6" ry="6" fill="#7A3010"/>

  <!-- 目（右） -->
  <ellipse cx="200" cy="118" rx="12" ry="8" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="198" cy="119" rx="6" ry="6" fill="#7A3010"/>

  <!-- 鼻 -->
  <path d="M176 132 L179 136 L182 132" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 口 -->
  <path d="M168 141 Q179 148 190 141" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ひげ左（3本・白） -->
  <line x1="160" y1="136" x2="110" y2="126" stroke="#f5f5f5" stroke-width="4" stroke-linecap="round"/>
  <line x1="158" y1="141" x2="106" y2="138" stroke="#f5f5f5" stroke-width="4" stroke-linecap="round"/>
  <line x1="156" y1="147" x2="108" y2="153" stroke="#f5f5f5" stroke-width="4" stroke-linecap="round"/>

  <!-- ひげ右（3本・白） -->
  <line x1="198" y1="136" x2="248" y2="124" stroke="#f5f5f5" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="141" x2="252" y2="138" stroke="#f5f5f5" stroke-width="4" stroke-linecap="round"/>
  <line x1="198" y1="147" x2="250" y2="151" stroke="#f5f5f5" stroke-width="4" stroke-linecap="round"/>

</svg>
