<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 背面: 脚(後ろ) -->
  <rect x="112" y="272" width="46" height="58" rx="10" fill="#2e2b3d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="202" y="272" width="46" height="58" rx="10" fill="#2e2b3d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 背面: 足 -->
  <path d="M95,316 L175,316 L182,332 Q140,342 88,332 Z" fill="#232030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M185,316 L265,316 L272,332 Q220,342 178,332 Z" fill="#232030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 背面: 腕 -->
  <path d="M78,158 L104,150 L98,250 L58,262 L48,215 L58,178 Z" fill="#2e2b3d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M282,158 L256,150 L262,250 L302,262 L312,215 L302,178 Z" fill="#2e2b3d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腕の赤バンド -->
  <rect x="52" y="196" width="42" height="16" rx="4" fill="#c0392b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="266" y="196" width="42" height="16" rx="4" fill="#c0392b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 脚の赤バンド -->
  <rect x="112" y="296" width="46" height="14" rx="4" fill="#c0392b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="202" y="296" width="46" height="14" rx="4" fill="#c0392b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 胴体(本体) -->
  <path d="M95,140 L265,140 L282,178 L258,215 L272,255 L235,282 L125,282 L88,255 L102,215 L78,178 Z"
        fill="#dcc9a0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 肩のスタッド -->
  <circle cx="98" cy="158" r="13" fill="#9a9aa4" stroke="#2d263c" stroke-width="6"/>
  <circle cx="262" cy="158" r="13" fill="#9a9aa4" stroke="#2d263c" stroke-width="6"/>

  <!-- 胸のプレート -->
  <rect x="132" y="172" width="96" height="72" rx="14" fill="#ece0c2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胸の十字紋章 -->
  <rect x="170" y="182" width="20" height="52" fill="#6f6f7a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="152" y="200" width="56" height="18" fill="#6f6f7a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頭部(首なしで肩に直結) -->
  <rect x="128" y="66" width="104" height="82" rx="18" fill="#dcc9a0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の側面の突起(耳のような部分) -->
  <path d="M128,100 L104,108 L108,138 L128,132 Z" fill="#9a9aa4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M232,100 L256,108 L252,138 L232,132 Z" fill="#9a9aa4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(赤い長方形) -->
  <rect x="148" y="96" width="24" height="16" rx="3" fill="#b8321f" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="188" y="96" width="24" height="16" rx="3" fill="#b8321f" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 口(小さな灰色の点) -->
  <circle cx="180" cy="126" r="6" fill="#6f6f7a" stroke="#2d263c" stroke-width="4"/>
</svg>
