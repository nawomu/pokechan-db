<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 翅(背中・後ろレイヤー) -->
  <ellipse cx="148" cy="148" rx="22" ry="38" fill="#b0bec5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-30 148 148)"/>
  <ellipse cx="212" cy="148" rx="22" ry="38" fill="#b0bec5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(30 212 148)"/>

  <!-- 胴体(下半身) -->
  <ellipse cx="180" cy="235" rx="44" ry="52" fill="#c62828" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 腹面(クリーム) -->
  <ellipse cx="180" cy="242" rx="22" ry="38" fill="#f5deb3" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 腹節ライン -->
  <line x1="162" y1="235" x2="198" y2="235" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="248" x2="200" y2="248" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="163" y1="261" x2="197" y2="261" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 胸(上半身) -->
  <ellipse cx="180" cy="180" rx="48" ry="46" fill="#e53935" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 胸の腹面 -->
  <ellipse cx="180" cy="182" rx="20" ry="26" fill="#f5deb3" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 左脚 -->
  <line x1="158" y1="272" x2="142" y2="308" stroke="#c62828" stroke-width="10" stroke-linecap="round"/>
  <line x1="142" y1="308" x2="130" y2="320" stroke="#c62828" stroke-width="9" stroke-linecap="round"/>
  <!-- 右脚 -->
  <line x1="202" y1="272" x2="218" y2="308" stroke="#c62828" stroke-width="10" stroke-linecap="round"/>
  <line x1="218" y1="308" x2="230" y2="320" stroke="#c62828" stroke-width="9" stroke-linecap="round"/>
  <!-- 中央脚(小さめ) -->
  <line x1="174" y1="278" x2="165" y2="315" stroke="#c62828" stroke-width="8" stroke-linecap="round"/>
  <line x1="186" y1="278" x2="195" y2="315" stroke="#c62828" stroke-width="8" stroke-linecap="round"/>

  <!-- 左腕(ハサミ腕) -->
  <path d="M148 188 Q108 188 98 210" fill="none" stroke="#c62828" stroke-width="12" stroke-linecap="round"/>
  <!-- 左ハサミ本体 -->
  <ellipse cx="88" cy="222" rx="32" ry="22" fill="#e53935" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-20 88 222)"/>
  <!-- 左ハサミ上顎 -->
  <path d="M68 210 Q58 196 74 188 Q88 182 96 200" fill="#c62828" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 左ハサミ下顎 -->
  <path d="M68 228 Q54 240 68 250 Q82 258 96 244" fill="#c62828" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 左ハサミ目玉模様 -->
  <circle cx="85" cy="220" r="12" fill="#fdd835" stroke="#2d263c" stroke-width="4"/>
  <circle cx="86" cy="221" r="5" fill="#1a1a2e"/>
  <circle cx="83" cy="218" r="2" fill="white"/>

  <!-- 右腕(ハサミ腕) -->
  <path d="M212 188 Q252 188 262 210" fill="none" stroke="#c62828" stroke-width="12" stroke-linecap="round"/>
  <!-- 右ハサミ本体 -->
  <ellipse cx="272" cy="222" rx="32" ry="22" fill="#e53935" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(20 272 222)"/>
  <!-- 右ハサミ上顎 -->
  <path d="M292 210 Q302 196 286 188 Q272 182 264 200" fill="#c62828" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右ハサミ下顎 -->
  <path d="M292 228 Q306 240 292 250 Q278 258 264 244" fill="#c62828" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右ハサミ目玉模様 -->
  <circle cx="275" cy="220" r="12" fill="#fdd835" stroke="#2d263c" stroke-width="4"/>
  <circle cx="276" cy="221" r="5" fill="#1a1a2e"/>
  <circle cx="273" cy="218" r="2" fill="white"/>

  <!-- 頭部 -->
  <ellipse cx="180" cy="132" rx="38" ry="34" fill="#e53935" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 頭部の角(左) -->
  <path d="M162 106 Q156 88 164 80 Q170 86 168 102" fill="#c62828" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 頭部の角(右) -->
  <path d="M198 106 Q204 88 196 80 Q190 86 192 102" fill="#c62828" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 複眼(左) ちょっとずれてるのがご愛嬌 -->
  <ellipse cx="163" cy="132" rx="10" ry="9" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="161" cy="130" rx="3" ry="3" fill="#424242"/>
  <!-- 複眼(右) -->
  <ellipse cx="198" cy="130" rx="11" ry="9" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="200" cy="128" rx="3" ry="3" fill="#424242"/>

  <!-- 口(ちょっとへの字) -->
  <path d="M172 148 Q180 153 188 148" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 頭と体をつなぐ首 -->
  <rect x="170" y="155" width="20" height="18" rx="6" fill="#e53935" stroke="#2d263c" stroke-width="6"/>

  <!-- 胸の模様(丸ポチ) -->
  <circle cx="170" cy="170" r="5" fill="#b71c1c" stroke="#2d263c" stroke-width="3"/>
  <circle cx="190" cy="170" r="5" fill="#b71c1c" stroke="#2d263c" stroke-width="3"/>
</svg>