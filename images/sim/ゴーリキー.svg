  <path d="M232,155 C260,160 282,185 278,215 C276,235 260,248 238,245 C248,225 252,200 244,178 C240,168 236,160 232,155 Z" fill="#8496B8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
