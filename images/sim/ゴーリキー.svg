  <circle cx="262" cy="238" r="24" fill="#8496B8" stroke="#2d263c" stroke-width="7"/>
  <!-- wristbands -->
  <ellipse cx="100" cy="220" rx="17" ry="11" fill="#EDEAE2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="260" cy="220" rx="17" ry="11" fill="#EDEAE2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- trunks -->
  <path d="M138,232 C130,248 132,266 145,274 L215,274 C228,266 230,248 222,232 Z" fill="#413A4C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
