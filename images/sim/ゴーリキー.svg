  <path d="M140,240 L220,240 C222,246 222,252 220,258 L140,258 C138,252 138,246 140,240 Z" fill="#D6A85E" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- belt buckle -->
  <circle cx="180" cy="249" r="10" fill="#4A3A28" stroke="#2d263c" stroke-width="6"/>
  <!-- belt segment lines -->
  <path d="M158,241 L158,257" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M202,241 L202,257" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- chest muscle lines -->
  <path d="M140,168 C150,178 162,181 172,177" fill="none" stroke="#6B7FA0" stroke-width="6" stroke-linecap="round"/>
  <path d="M220,168 C210,178 198,181 188,177" fill="none" stroke="#6B7FA0" stroke-width="6" stroke-linecap="round"/>
  <!-- abs line -->
  <path d="M180,195 L180,228" fill="none" stroke="#6B7FA0" stroke-width="6" stroke-linecap="round"/>
  <!-- neck -->
  <path d="M163,128 L197,128 L193,150 L167,150 Z" fill="#8496B8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- ears -->
  <ellipse cx="130" cy="90" rx="12" ry="16" fill="#6B7FA0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="230" cy="90" rx="12" ry="16" fill="#6B7FA0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- head -->
  <ellipse cx="180" cy="88" rx="52" ry="50" fill="#8496B8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- crest -->
  <path d="M168,50 C178,15 210,15 220,48 C208,42 194,40 180,44 C174,46 170,48 168,50 Z" fill="#6B7FA0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- eyebrow ridge -->
  <path d="M150,72 C165,64 195,64 210,72" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="163" cy="88" rx="7" ry="9" fill="#221A2C"/>
  <ellipse cx="197" cy="88" rx="7" ry="9" fill="#221A2C"/>
  <!-- nose -->
  <ellipse cx="180" cy="102" rx="11" ry="7" fill="#7488AC" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="176" cy="102" r="2" fill="#2d263c"/>
  <circle cx="184" cy="102" r="2" fill="#2d263c"/>
  <!-- mouth -->
  <path d="M163,118 C172,124 188,124 197,118" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
