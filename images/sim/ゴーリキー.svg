  <path d="M115,150 C100,190 105,225 135,248 L225,248 C255,225 260,190 245,150 C230,120 205,108 180,108 C155,108 130,120 115,150 Z" fill="#8496B8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
