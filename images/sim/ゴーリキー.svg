  <path d="M132,240 C124,270 126,300 138,320 L162,320 C170,300 172,270 168,240 Z" fill="#8496B8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M192,240 C188,270 190,300 198,320 L222,320 C234,300 236,270 228,240 Z" fill="#8496B8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- ankle bands -->
  <ellipse cx="150" cy="308" rx="18" ry="9" fill="#EDEAE2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="210" cy="308" rx="18" ry="9" fill="#EDEAE2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
