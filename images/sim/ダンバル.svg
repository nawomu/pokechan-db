<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- back arm (left, behind body) -->
  <path d="M 95 190 C 55 190 40 220 45 250 C 48 270 65 278 78 268 C 70 255 72 235 88 222 C 100 213 108 205 105 195 Z"
        fill="#7f8fae" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- top horns/spikes -->
  <path d="M 148 92 C 140 68 148 48 162 40 C 168 55 168 78 160 98 Z"
        fill="#aab6cf" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 212 92 C 220 68 212 48 198 40 C 192 55 192 78 200 98 Z"
        fill="#aab6cf" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- main body: rounded floating torso -->
  <path d="M 180 82
           C 235 82 268 118 270 172
           C 272 222 252 262 210 282
           C 190 291 170 291 150 282
           C 108 262 88 222 90 172
           C 92 118 125 82 180 82 Z"
        fill="#9aa8c4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- lower belly shading -->
  <path d="M 118 230 C 130 262 155 282 180 286 C 205 282 230 262 242 230
           C 220 258 195 270 180 270 C 165 270 140 258 118 230 Z"
        fill="#7f8fae" stroke="none"/>

  <!-- front arm (right, in front of body) -->
  <path d="M 262 188 C 302 186 320 214 316 246 C 313 267 295 276 282 265 C 290 252 287 232 271 220 C 258 210 250 202 254 192 Z"
        fill="#9aa8c4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- claw tips on front arm -->
  <path d="M 283 264 C 279 273 279 282 285 288" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M 296 267 C 296 276 300 283 307 288" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- claw tips on back arm -->
  <path d="M 60 264 C 56 273 57 281 63 288" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M 74 268 C 73 276 76 283 82 288" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- chest rivet / screw cross mark -->
  <g stroke="#2d263c" stroke-width="6" stroke-linecap="round">
    <line x1="180" y1="228" x2="180" y2="252"/>
    <line x1="168" y1="240" x2="192" y2="240"/>
  </g>
  <circle cx="180" cy="240" r="14" fill="none" stroke="#2d263c" stroke-width="5"/>

  <!-- single big eye -->
  <ellipse cx="180" cy="168" rx="58" ry="46" fill="#2d263c"/>
  <ellipse cx="180" cy="168" rx="46" ry="36" fill="#e8443c" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="196" cy="152" rx="12" ry="9" fill="#ffffff" opacity="0.85"/>

  <!-- subtle body highlight -->
  <path d="M 128 110 C 118 130 112 152 116 172" fill="none" stroke="#c6d0e6" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
</svg>
