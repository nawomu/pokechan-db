<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 頭上に2つの丸いさくらんぼ状の実(片方ピンク)が茎でつながっている
  2. 頭の左右に葉っぱ(耳のような三角の葉)が出ている
  3. 緑色の丸い一体型の体(頭と胴体が一つのボール状)
  4. お腹はクリーム色の丸い模様
  5. 大きな丸い黒目(ハイライト付き)とニコッとした口、小さい手足
  -->

  <!-- 後ろ: 茎とさくらんぼ -->
  <path d="M158 118 C150 95, 140 82, 132 68" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M202 118 C212 95, 222 82, 232 66" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="128" cy="60" r="20" fill="#e85a8a" stroke="#2d263c" stroke-width="7"/>
  <circle cx="121" cy="53" r="6" fill="#ffb6cf"/>
  <circle cx="236" cy="58" r="20" fill="#d94a78" stroke="#2d263c" stroke-width="7"/>
  <circle cx="229" cy="51" r="6" fill="#ff9fbd"/>

  <!-- 頭の左右の葉っぱ -->
  <path d="M95 165 C60 150, 45 120, 55 90 C85 100, 105 130, 100 165 Z" fill="#5fae3e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M265 165 C300 150, 315 120, 305 90 C275 100, 255 130, 260 165 Z" fill="#5fae3e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M70 140 C78 122, 88 108, 100 100" fill="none" stroke="#3f7c2a" stroke-width="4" stroke-linecap="round"/>
  <path d="M290 140 C282 122, 272 108, 260 100" fill="none" stroke="#3f7c2a" stroke-width="4" stroke-linecap="round"/>

  <!-- 手(体の後ろ側で先に描く) -->
  <ellipse cx="90" cy="245" rx="22" ry="26" fill="#7bc350" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="270" cy="245" rx="22" ry="26" fill="#7bc350" stroke="#2d263c" stroke-width="7"/>

  <!-- 体(頭と胴体が一体の丸い形) -->
  <path d="M180 130
           C 245 130, 285 175, 285 235
           C 285 300, 240 335, 180 335
           C 120 335, 75 300, 75 235
           C 75 175, 115 130, 180 130 Z"
        fill="#7bc350" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の模様 -->
  <ellipse cx="180" cy="255" rx="70" ry="58" fill="#fbf2c8" stroke="#2d263c" stroke-width="6"/>

  <!-- 足 -->
  <ellipse cx="150" cy="330" rx="24" ry="16" fill="#5fae3e" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="212" cy="330" rx="24" ry="16" fill="#5fae3e" stroke="#2d263c" stroke-width="7"/>

  <!-- 顔: 目 -->
  <ellipse cx="150" cy="210" rx="20" ry="24" fill="#2d263c"/>
  <ellipse cx="212" cy="210" rx="20" ry="24" fill="#2d263c"/>
  <circle cx="144" cy="201" r="6" fill="#ffffff"/>
  <circle cx="206" cy="201" r="6" fill="#ffffff"/>

  <!-- ほっぺ -->
  <circle cx="122" cy="238" r="12" fill="#ff9fb0" opacity="0.7"/>
  <circle cx="240" cy="238" r="12" fill="#ff9fb0" opacity="0.7"/>

  <!-- 口 -->
  <path d="M164 244 C172 254, 190 254, 198 244" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
