<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴1: ずんぐりした四足のドラゴン体型、体色は暗い赤茶(マルーン) -->
  <!-- 特徴2: 喉〜腹はターコイズ(青緑)のうろこパッチ -->
  <!-- 特徴3: 口を閉じていても左右に飛び出す白い牙、赤い目つきの悪い目 -->
  <!-- 特徴4: 背中に沿ったギザギザの暗赤トゲ、小さめの腕とかぎ爪 -->
  <!-- 特徴5: 太くたくましい尻尾、ゴツゴツした岩のような質感 -->

  <!-- 尻尾(奥) -->
  <path d="M255 275 Q320 260 330 200 Q334 175 312 178 Q300 210 260 235 Z"
        fill="#8a3b3b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 後ろ足(奥・左) -->
  <path d="M110 270 Q100 300 95 320 Q108 328 122 320 Q128 298 130 272 Z"
        fill="#7a3232" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 後ろ足(手前・右) -->
  <path d="M225 275 Q222 302 218 322 Q232 330 246 322 Q246 300 240 274 Z"
        fill="#7a3232" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 前足(左) -->
  <path d="M118 268 Q108 292 104 312 Q117 320 131 312 Q135 292 136 268 Z"
        fill="#8a3b3b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 前足(右) -->
  <path d="M205 268 Q202 294 198 314 Q212 322 226 314 Q226 292 220 266 Z"
        fill="#8a3b3b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 胴体(メイン) -->
  <path d="M95 200 Q80 150 130 125 Q170 105 210 118 Q255 132 262 175 Q268 220 235 258 Q195 285 145 278 Q100 270 95 200 Z"
        fill="#9a4444" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 腹のターコイズパッチ -->
  <path d="M130 180 Q120 215 140 245 Q165 268 195 258 Q175 230 172 195 Q168 165 150 155 Q135 160 130 180 Z"
        fill="#3fb0a6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 背中のトゲ列 -->
  <path d="M140 122 L152 100 L162 124 L176 98 L186 126 L200 102 L212 128 L224 112 L232 134"
        fill="none" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M140 122 L152 100 L162 124 L176 98 L186 126 L200 102 L212 128 L224 112 L232 134 Z"
        fill="#6e2a2a"/>

  <!-- 左腕 -->
  <path d="M100 195 Q75 205 65 225 Q75 238 90 232 Q102 218 108 202 Z"
        fill="#8a3b3b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 左手のかぎ爪 -->
  <path d="M65 225 L52 232 M65 225 L55 222" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 右腕 -->
  <path d="M255 190 Q282 196 292 218 Q280 232 266 224 Q256 210 250 196 Z"
        fill="#8a3b3b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 右手のかぎ爪 -->
  <path d="M292 218 L305 224 M292 218 L302 214" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 頭部(ゴツいブロック型) -->
  <path d="M120 95 Q115 55 160 45 Q210 35 245 60 Q272 80 262 112 Q252 140 210 145 Q160 148 130 125 Q116 112 120 95 Z"
        fill="#9a4444" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭側面の小さい突起(角) -->
  <path d="M225 48 Q235 30 250 40 Q244 55 232 58 Z"
        fill="#6e2a2a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 目(赤・つり目) -->
  <path d="M175 82 Q188 70 205 78 Q192 90 175 82 Z" fill="#d92b2b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="192" cy="80" r="5" fill="#2d263c"/>

  <!-- 眉のシワ -->
  <path d="M172 70 Q188 60 206 68" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 鼻筋の溝 -->
  <path d="M225 90 Q235 100 228 112" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 口(への字の口元) -->
  <path d="M150 118 Q190 132 240 116" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 左の牙(閉じた口からはみ出す白い牙) -->
  <path d="M158 116 L150 138 L166 124 Z" fill="#f2ece0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 右の牙 -->
  <path d="M228 112 L238 134 L246 114 Z" fill="#f2ece0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
</svg>
