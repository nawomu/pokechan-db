<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- back vine tufts on head -->
  <path d="M120 70 Q100 40 110 20 Q120 45 130 65 Z" fill="#2f6b2a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M180 60 Q178 25 190 10 Q195 35 195 65 Z" fill="#2f6b2a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M235 75 Q255 45 250 22 Q235 48 225 70 Z" fill="#2f6b2a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- hanging vine arms (behind body) -->
  <path d="M95 150 Q55 190 65 250 Q45 275 60 300 Q80 285 75 255 Q95 220 100 175 Z" fill="#347a30" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M270 155 Q305 195 292 250 Q315 278 298 302 Q278 288 285 258 Q262 225 258 180 Z" fill="#347a30" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- legs/feet -->
  <ellipse cx="140" cy="320" rx="42" ry="28" fill="#c69a5c" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="225" cy="320" rx="42" ry="28" fill="#c69a5c" stroke="#2d263c" stroke-width="7"/>

  <!-- main body -->
  <path d="M180 60
           C260 60 300 130 295 200
           C292 260 260 310 180 315
           C100 310 68 260 65 200
           C60 130 100 60 180 60 Z"
        fill="#c69a5c" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- vine wrap patterns on body -->
  <path d="M85 140 Q140 120 190 145 Q240 165 275 140" fill="none" stroke="#2f6b2a" stroke-width="12" stroke-linecap="round"/>
  <path d="M78 190 Q130 210 190 195 Q250 180 282 205" fill="none" stroke="#2f6b2a" stroke-width="12" stroke-linecap="round"/>
  <path d="M90 240 Q140 260 190 245 Q235 232 268 250" fill="none" stroke="#2f6b2a" stroke-width="12" stroke-linecap="round"/>
  <path d="M120 100 Q100 160 115 220 Q100 260 125 290" fill="none" stroke="#2f6b2a" stroke-width="10" stroke-linecap="round"/>
  <path d="M245 100 Q262 160 250 220 Q262 260 238 290" fill="none" stroke="#2f6b2a" stroke-width="10" stroke-linecap="round"/>

  <!-- vine leaf tufts at arm tips -->
  <ellipse cx="65" cy="303" rx="18" ry="12" fill="#2f6b2a" stroke="#2d263c" stroke-width="6" transform="rotate(-20 65 303)"/>
  <ellipse cx="300" cy="306" rx="18" ry="12" fill="#2f6b2a" stroke="#2d263c" stroke-width="6" transform="rotate(20 300 306)"/>

  <!-- eyes -->
  <ellipse cx="150" cy="155" rx="9" ry="11" fill="#2d263c"/>
  <ellipse cx="212" cy="155" rx="9" ry="11" fill="#2d263c"/>

  <!-- big round nose -->
  <circle cx="181" cy="205" r="34" fill="#e8672c" stroke="#2d263c" stroke-width="8"/>
  <circle cx="170" cy="195" r="7" fill="#f6a05a" opacity="0.8"/>

  <!-- mouth -->
  <path d="M150 245 Q181 262 212 245" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>
