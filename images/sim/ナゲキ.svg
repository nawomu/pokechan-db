<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 奥の脚(股のあいだの影) -->
  <ellipse cx="180" cy="272" rx="28" ry="20" fill="#4a6f92" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左腕(奥) -->
  <ellipse cx="75" cy="205" rx="32" ry="55" fill="#6e93b3" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" transform="rotate(-8 75 205)"/>
  <ellipse cx="70" cy="258" rx="23" ry="20" fill="#4a6f92" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 右腕(奥) -->
  <ellipse cx="285" cy="205" rx="32" ry="55" fill="#6e93b3" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" transform="rotate(8 285 205)"/>
  <ellipse cx="290" cy="258" rx="23" ry="20" fill="#4a6f92" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体(胴) -->
  <ellipse cx="180" cy="205" rx="95" ry="80" fill="#6e93b3" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 左脚(手前) -->
  <rect x="118" y="260" width="56" height="62" rx="26" fill="#6e93b3" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="146" cy="322" rx="28" ry="13" fill="#4a6f92" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 右脚(手前) -->
  <rect x="186" y="260" width="56" height="62" rx="26" fill="#6e93b3" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="214" cy="322" rx="28" ry="13" fill="#4a6f92" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腰の太い帯 -->
  <path d="M85 222 Q180 248 275 222 Q275 250 180 276 Q85 250 85 222 Z" fill="#8a3a3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 帯の結び目 -->
  <rect x="160" y="232" width="40" height="28" rx="8" fill="#6b2a2a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 道着(左肩からのえんじ布) -->
  <path d="M118 145 Q88 175 98 215 Q135 235 165 205 Q152 170 140 145 Z" fill="#8a3a3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 拳(左手前) -->
  <ellipse cx="60" cy="255" rx="26" ry="24" fill="#6e93b3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 拳(右手前) -->
  <ellipse cx="300" cy="255" rx="26" ry="24" fill="#6e93b3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 首 -->
  <rect x="152" y="118" width="56" height="34" rx="14" fill="#6e93b3" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭 -->
  <circle cx="180" cy="90" r="56" fill="#6e93b3" stroke="#2d263c" stroke-width="9"/>

  <!-- 頭頂の小さなこぶ -->
  <ellipse cx="180" cy="36" rx="14" ry="9" fill="#4a6f92" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- あご下のしわ(段々) -->
  <path d="M150 136 Q180 148 210 136" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M158 126 Q180 136 202 126" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 眉の盛り上がり(左右) -->
  <path d="M138 76 Q155 64 172 74" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M188 74 Q205 64 222 76" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 目(白目・左右) -->
  <ellipse cx="155" cy="94" rx="11" ry="10" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="205" cy="94" rx="11" ry="10" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 瞳(左右) -->
  <ellipse cx="156" cy="96" rx="5" ry="6" fill="#2d263c"/>
  <ellipse cx="206" cy="96" rx="5" ry="6" fill="#2d263c"/>

  <!-- 口(への字・控えめ) -->
  <path d="M162 120 Q180 114 198 120" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
