<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: ①太めのぽっちゃり体型(ラベンダーグレー) ②頬の左右に大きく巻いた口ヒゲ状の毛(トレードマーク) ③吊り上がった細い目とピンクの鼻 ④頭の上に立った乱れ毛 ⑤細くて長い尻尾(先だけピンク)とピンクのお腹・耳 -->

  <!-- 尻尾(後ろ) -->
  <path d="M 268 250 Q 320 230 330 170 Q 335 140 318 130" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M 318 130 Q 300 128 308 148" fill="#f4a6c6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体(ぽっちゃり丸胴) -->
  <ellipse cx="182" cy="245" rx="98" ry="78" fill="#a99bc4" stroke="#2d263c" stroke-width="8"/>

  <!-- 足(4本の短い脚) -->
  <ellipse cx="120" cy="316" rx="24" ry="20" fill="#a99bc4" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="165" cy="322" rx="24" ry="20" fill="#a99bc4" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="210" cy="322" rx="24" ry="20" fill="#a99bc4" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="250" cy="314" rx="24" ry="20" fill="#a99bc4" stroke="#2d263c" stroke-width="7"/>

  <!-- お腹(ピンク) -->
  <ellipse cx="182" cy="262" rx="58" ry="46" fill="#f4c2d9" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭 -->
  <circle cx="182" cy="140" r="72" fill="#a99bc4" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭の上の乱れ毛 -->
  <path d="M 158 78 Q 150 48 168 62 Q 172 40 186 60 Q 196 42 200 66 Q 214 52 208 80" fill="#8c7ab0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 耳 -->
  <path d="M 128 100 Q 108 58 148 78 Q 150 100 128 100 Z" fill="#a99bc4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 236 100 Q 256 58 216 78 Q 214 100 236 100 Z" fill="#a99bc4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 130 92 Q 120 68 142 80" fill="#f4c2d9" stroke="none"/>
  <path d="M 234 92 Q 244 68 222 80" fill="#f4c2d9" stroke="none"/>

  <!-- 左ほおの大きく巻いた口ヒゲ毛(トレードマーク) -->
  <path d="M 120 152 Q 62 148 58 186 Q 54 222 92 214 Q 70 200 88 182 Q 100 168 120 168 Z" fill="#8c7ab0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 右ほおの大きく巻いた口ヒゲ毛 -->
  <path d="M 244 152 Q 302 148 306 186 Q 310 222 272 214 Q 294 200 276 182 Q 264 168 244 168 Z" fill="#8c7ab0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 吊り目(細くとがった不機嫌顔) -->
  <path d="M 138 130 Q 154 116 172 128" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M 226 130 Q 210 116 192 128" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 鼻(ピンク) -->
  <path d="M 174 156 Q 182 148 190 156 Q 184 166 174 156 Z" fill="#e8628f" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- への字口 -->
  <path d="M 168 172 Q 182 164 196 172" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
