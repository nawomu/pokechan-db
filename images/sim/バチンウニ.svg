<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: ①紺色の丸いウニ型の体 ②体の周りに黄色いトゲが放射状に生える ③体の下から伸びるオレンジ色のサンゴ状の触手(電気発生器官) ④胸に黄色いV字模様 ⑤大きな丸い黄色い目 -->

  <!-- ===== 下: サンゴ状の触手(電気器官) ===== -->
  <path d="M150,300 C140,315 138,332 145,345 C148,350 156,349 156,342 C155,330 158,318 165,306 Z" fill="#f3922e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M180,305 C178,320 180,336 188,348 C192,352 199,349 197,342 C193,331 193,318 188,304 Z" fill="#f3922e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M210,300 C222,313 228,330 224,345 C222,351 214,349 213,342 C212,330 207,319 198,308 Z" fill="#f3922e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ===== トゲ(体の周り放射状・後ろ側) ===== -->
  <path d="M180,60 L172,10 L190,10 Z" fill="#f6d43c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M120,80 L82,42 L96,60 Z" fill="#f6d43c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M240,80 L278,42 L264,60 Z" fill="#f6d43c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M95,135 L40,120 L52,142 Z" fill="#f6d43c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M265,135 L320,120 L308,142 Z" fill="#f6d43c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M90,205 L32,215 L48,232 Z" fill="#f6d43c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M270,205 L328,215 L312,232 Z" fill="#f6d43c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M140,255 L118,300 L142,285 Z" fill="#f6d43c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M220,255 L242,300 L218,285 Z" fill="#f6d43c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ===== 本体: 丸いウニ型の胴体 ===== -->
  <circle cx="180" cy="175" r="105" fill="#37456b" stroke="#2d263c" stroke-width="8"/>

  <!-- 前面の丸みの陰影(平ら気味に) -->
  <path d="M90,190 C95,240 135,270 180,270 C225,270 265,240 270,190 C255,230 215,258 180,258 C145,258 105,230 90,190 Z" fill="#2b3757" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ===== 胸のV字模様 ===== -->
  <path d="M140,210 L180,240 L220,210 L212,198 L180,222 L148,198 Z" fill="#f6d43c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ===== 顔: 目 ===== -->
  <circle cx="140" cy="150" r="30" fill="#fbe36a" stroke="#2d263c" stroke-width="7"/>
  <circle cx="220" cy="150" r="30" fill="#fbe36a" stroke="#2d263c" stroke-width="7"/>
  <circle cx="146" cy="154" r="12" fill="#221f2c"/>
  <circle cx="226" cy="154" r="12" fill="#221f2c"/>
  <circle cx="150" cy="149" r="4" fill="#fefaf1"/>
  <circle cx="230" cy="149" r="4" fill="#fefaf1"/>

  <!-- 口 -->
  <path d="M165,192 Q180,202 195,192" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
