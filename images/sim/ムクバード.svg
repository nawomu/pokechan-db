<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.灰青色の体+クリーム色の腹 2.頭のピンク(赤紫)のとさか羽 3.目のまわりの黒い仮面模様 4.黄色い鋭いくちばし 5.暗い青灰色の翼と黒い尾羽の先 -->
  <g stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round">
    <!-- 尾(背面) -->
    <path d="M160 290 L145 342 L182 318 L222 342 L202 288 Z" fill="#7b8296"/>
    <path d="M145 342 L156 320 L168 336 Z" fill="#2d263c"/>
    <path d="M222 342 L212 320 L200 336 Z" fill="#2d263c"/>
    <!-- 翼(背面・左右) -->
    <path d="M112 168 L58 235 L88 268 L132 235 L124 172 Z" fill="#525a70"/>
    <path d="M248 168 L302 235 L272 268 L228 235 L236 172 Z" fill="#525a70"/>
    <!-- 脚 -->
    <line x1="162" y1="298" x2="156" y2="336" stroke="#e8873a" stroke-width="11"/>
    <line x1="198" y1="298" x2="204" y2="336" stroke="#e8873a" stroke-width="11"/>
    <path d="M144 338 L156 336 L166 344 L150 348 Z" fill="#e8873a"/>
    <path d="M216 338 L204 336 L194 344 L210 348 Z" fill="#e8873a"/>
    <!-- 体 -->
    <ellipse cx="180" cy="218" rx="74" ry="94" fill="#7b8296"/>
    <ellipse cx="180" cy="238" rx="41" ry="63" fill="#f3e8d2"/>
    <!-- 頭 -->
    <circle cx="180" cy="112" r="55" fill="#7b8296"/>
    <!-- とさか(ピンク) -->
    <path d="M148 62 L158 20 L174 56 Z" fill="#c94a6b"/>
    <path d="M174 54 L186 14 L196 52 Z" fill="#c94a6b"/>
    <path d="M196 56 L212 24 L216 60 Z" fill="#c94a6b"/>
    <!-- 顔の黒い仮面模様 -->
    <path d="M140 92 Q128 122 145 152 Q162 142 156 112 Q152 96 140 92 Z" fill="#2d263c"/>
    <path d="M220 92 Q232 122 215 152 Q198 142 204 112 Q208 96 220 92 Z" fill="#2d263c"/>
    <!-- 目 -->
    <circle cx="151" cy="120" r="15" fill="#ffffff"/>
    <circle cx="209" cy="120" r="15" fill="#ffffff"/>
    <circle cx="154" cy="122" r="7" fill="#221c2e" stroke="none"/>
    <circle cx="206" cy="122" r="7" fill="#221c2e" stroke="none"/>
    <!-- くちばし -->
    <path d="M163 148 L197 148 L180 178 Z" fill="#f0b429"/>
  </g>
</svg>
