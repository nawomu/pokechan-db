  <!-- 左脚 -->
  <path d="M 138 312 Q 128 326 124 338 Q 120 348 134 350 Q 148 352 158 342 Q 165 334 162 318" fill="#eee6de" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 右脚 -->
  <path d="M 210 314 Q 220 328 224 340 Q 228 350 214 352 Q 200 354 190 344 Q 182 336 184 320" fill="#eee6de" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 目(左)眠そうな半目 -->
  <ellipse cx="156" cy="66" rx="12" ry="8" fill="#fff" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="156" cy="68" rx="8" ry="5" fill="#2d263c"/>
  <!-- 目の上まぶた(眠そう) -->
  <path d="M 144 62 Q 156 58 168 62" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 目(右)眠そうな半目 -->
  <ellipse cx="200" cy="64" rx="12" ry="8" fill="#fff" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="200" cy="66" rx="8" ry="5" fill="#2d263c"/>
  <!-- 目の上まぶた(眠そう) -->
  <path d="M 188 60 Q 200 56 212 60" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 口(小さくてぼんやり) -->
  <path d="M 170 82 Q 178 88 188 82" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ(ほんのりピンク) -->
  <ellipse cx="140" cy="76" rx="10" ry="7" fill="#f0a0b8" opacity="0.6" stroke="none"/>
  <ellipse cx="216" cy="74" rx="10" ry="7" fill="#f0a0b8" opacity="0.6" stroke="none"/>

  <!-- 岩肌のひび割れ感(体の線) -->
  <path d="M 155 110 Q 150 130 158 150" fill="none" stroke="#c8b8c0" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M 210 120 Q 220 145 212 165" fill="none" stroke="#c8b8c0" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M 175 180 Q 165 200 172 220" fill="none" stroke="#c8b8c0" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>