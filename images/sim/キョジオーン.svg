  <path d="M 68 170 Q 60 155 65 130 Q 70 108 85 100 Q 100 92 130 88 Q 155 85 180 87 Q 205 85 228 89 Q 258 95 272 112 Q 285 128 283 148 Q 285 175 278 200 Q 272 225 268 248 Q 262 272 252 288 Q 240 302 220 308 Q 198 314 178 313 Q 156 314 138 308 Q 118 300 108 286 Q 96 270 88 248 Q 76 220 68 170 Z" fill="#f0e8e0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

