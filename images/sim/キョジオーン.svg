  <ellipse cx="110" cy="220" rx="14" ry="10" fill="#e8b8cc" stroke="none" opacity="0.55"/>
  <ellipse cx="250" cy="230" rx="16" ry="11" fill="#e0a8bc" stroke="none" opacity="0.5"/>

