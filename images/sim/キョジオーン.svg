  <polygon points="185,38 178,8 196,38" fill="#d870a0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="212,48 206,22 220,48" fill="#e890b0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

