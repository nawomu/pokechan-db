  <!-- wing membrane lines right -->
  <path d="M 248 208 C 265 198 280 205 275 215" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M 255 212 C 270 204 283 210 280 220" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- LEFT WING (behind body) -->
