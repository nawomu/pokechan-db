<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- タルップル / Tart Apple Dragon -->

  <!-- TAIL -->
  <path d="M 230 255 C 265 260 285 245 278 225 C 272 210 255 218 258 230 C 261 240 250 248 235 242" fill="#b03020" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- RIGHT WING (behind body) -->
