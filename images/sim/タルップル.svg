  <path d="M 105 212 C 90 204 77 210 80 220" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- BODY - main apple shape -->
  <path d="M 180 95 C 145 90 108 108 95 140 C 82 172 85 205 95 228 C 108 255 130 272 158 278 C 168 280 175 282 180 282 C 185 282 192 280 202 278 C 230 272 252 255 265 228 C 275 205 278 172 265 140 C 252 108 215 90 180 95 Z" fill="#c8352a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- BELLY - cream/yellow -->
  <path d="M 180 155 C 158 155 142 168 138 188 C 134 208 138 230 148 248 C 156 262 168 272 180 273 C 192 272 204 262 212 248 C 222 230 226 208 222 188 C 218 168 202 155 180 155 Z" fill="#f5e6a0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- APPLE INDENT bottom -->
  <path d="M 168 276 C 172 285 178 288 180 288 C 182 288 188 285 192 276" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- STEM (ヘタ) -->
  <path d="M 178 95 C 175 75 172 58 177 45 C 179 40 182 38 185 40 C 188 42 188 50 186 60 C 183 72 182 82 182 95" fill="#5c3310" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- LEAF LEFT -->
  <path d="M 177 68 C 160 55 140 52 130 60 C 122 68 128 80 140 78 C 152 76 165 70 177 72" fill="#3a8a2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- leaf vein -->
  <path d="M 175 70 C 160 64 143 62 133 67" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- LEAF RIGHT (slightly smaller, asymmetric) -->
  <path d="M 183 60 C 198 45 220 43 228 53 C 234 60 228 72 218 71 C 207 70 194 64 183 65" fill="#3a8a2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- leaf vein -->
  <path d="M 185 62 C 200 56 218 55 226 60" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- LEFT EYE white -->
  <ellipse cx="158" cy="170" rx="16" ry="14" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- LEFT EYE pupil - droopy/sleepy -->
  <ellipse cx="160" cy="173" rx="8" ry="7" fill="#1a1a2e"/>
  <ellipse cx="162" cy="171" rx="3" ry="3" fill="white"/>
  <!-- LEFT EYELID droopy line -->
  <path d="M 143 166 C 150 162 166 162 174 167" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- RIGHT EYE white -->
  <ellipse cx="202" cy="168" rx="15" ry="13" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- RIGHT EYE pupil -->
  <ellipse cx="204" cy="171" rx="7" ry="7" fill="#1a1a2e"/>
  <ellipse cx="206" cy="169" rx="3" ry="3" fill="white"/>
  <!-- RIGHT EYELID droopy -->
  <path d="M 188 164 C 194 160 210 161 217 165" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- EYEBROW LEFT - furrowed grumpy -->
  <path d="M 143 155 C 151 150 165 151 173 155" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- EYEBROW RIGHT -->
  <path d="M 188 153 C 196 149 210 150 216 154" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- MOUTH - smug little smirk -->
  <path d="M 168 208 C 174 215 186 215 192 208" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- CHEEK BLUSH LEFT -->
  <ellipse cx="143" cy="195" rx="11" ry="7" fill="#e8706a" opacity="0.6"/>

  <!-- CHEEK BLUSH RIGHT -->
  <ellipse cx="218" cy="193" rx="10" ry="7" fill="#e8706a" opacity="0.6"/>

  <!-- LITTLE LEFT FOOT -->
  <path d="M 142 272 C 135 278 128 285 132 292 C 136 298 148 296 152 288 C 155 282 150 274 142 272 Z" fill="#c8352a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- LITTLE RIGHT FOOT -->
  <path d="M 218 272 C 225 278 232 285 228 292 C 224 298 212 296 208 288 C 205 282 210 274 218 272 Z" fill="#c8352a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- APPLE HIGHLIGHT (sheen on body) -->
  <path d="M 138 125 C 145 112 162 105 175 110" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.45"/>

</svg>