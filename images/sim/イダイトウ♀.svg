<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 霊魂の炎(後ろ・左) -->
  <ellipse cx="62" cy="155" rx="18" ry="28" fill="#a8d8f0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(-20 62 155)" opacity="0.85"/>
  <ellipse cx="48" cy="200" rx="13" ry="22" fill="#c0e8ff" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" transform="rotate(15 48 200)" opacity="0.8"/>
  <ellipse cx="80" cy="230" rx="10" ry="18" fill="#b0dcf5" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" transform="rotate(-10 80 230)" opacity="0.75"/>

  <!-- 尾びれ -->
  <polygon points="58,270 40,310 70,295 85,330 110,285 95,265" fill="#b8d8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 霊魂模様(尾びれ部分) -->
  <ellipse cx="70" cy="295" rx="12" ry="8" fill="#e8f4ff" stroke="#2d263c" stroke-width="3" opacity="0.6"/>

  <!-- 体 本体(胴) -->
  <ellipse cx="200" cy="210" rx="115" ry="85" fill="#c5e0ee" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹(オレンジがかった白) -->
  <ellipse cx="205" cy="235" rx="80" ry="52" fill="#f0c8a0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 体の斑点・霊模様 -->
  <ellipse cx="155" cy="185" rx="14" ry="10" fill="#d46060" stroke="#2d263c" stroke-width="3" transform="rotate(-15 155 185)" opacity="0.85"/>
  <ellipse cx="195" cy="175" rx="10" ry="7" fill="#c84040" stroke="#2d263c" stroke-width="3" transform="rotate(10 195 175)" opacity="0.8"/>
  <ellipse cx="230" cy="185" rx="12" ry="8" fill="#d45050" stroke="#2d263c" stroke-width="3" transform="rotate(-5 230 185)" opacity="0.8"/>

  <!-- 胸びれ(下) -->
  <polygon points="240,265 285,295 310,275 290,255 260,250" fill="#a8c8dc" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="155,270 120,305 145,300 130,320 165,290" fill="#a8c8dc" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 背びれ(ギザギザ) -->
  <polygon points="170,130 178,95 190,118 200,85 212,112 225,78 238,108 252,90 262,120 270,130" fill="#8ab8cc" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭部 -->
  <ellipse cx="290" cy="195" rx="70" ry="65" fill="#cce4f0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の模様(♀らしい淡い斑) -->
  <ellipse cx="310" cy="180" rx="18" ry="12" fill="#d86060" stroke="#2d263c" stroke-width="3" opacity="0.7" transform="rotate(20 310 180)"/>

  <!-- 口(大きくニヤッと) -->
  <path d="M 248,210 Q 270,250 310,248 Q 340,245 348,225" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- 口の内側 -->
  <path d="M 252,215 Q 272,242 310,240 Q 338,238 345,222" fill="#5a1a1a" stroke="none"/>

  <!-- 歯(上) -->
  <polygon points="265,218 270,230 280,217" fill="white" stroke="#2d263c" stroke-width="2"/>
  <polygon points="285,213 288,227 298,213" fill="white" stroke="#2d263c" stroke-width="2"/>
  <polygon points="305,211 307,226 317,212" fill="white" stroke="#2d263c" stroke-width="2"/>

  <!-- 歯(下) -->
  <polygon points="268,238 275,228 282,238" fill="white" stroke="#2d263c" stroke-width="2"/>
  <polygon points="295,238 300,226 308,238" fill="white" stroke="#2d263c" stroke-width="2"/>

  <!-- 目(ギョロッと) -->
  <ellipse cx="295" cy="178" rx="20" ry="22" fill="white" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="298" cy="181" rx="13" ry="14" fill="#e84040"/>
  <ellipse cx="300" cy="183" rx="7" ry="8" fill="#1a0a0a"/>
  <ellipse cx="303" cy="179" rx="4" ry="4" fill="white"/>

  <!-- 霊魂の炎(右側・体から漂う) -->
  <ellipse cx="330" cy="140" rx="15" ry="25" fill="#b8e0ff" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" transform="rotate(25 330 140)" opacity="0.8"/>
  <ellipse cx="345" cy="165" rx="10" ry="18" fill="#d0eeff" stroke="#2d263c" stroke-width="3" transform="rotate(-15 345 165)" opacity="0.75"/>

  <!-- ほっぺ(ちょっとかわいい) -->
  <ellipse cx="282" cy="205" rx="12" ry="8" fill="#f0a0a0" opacity="0.6"/>
</svg>