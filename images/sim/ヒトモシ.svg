<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 体色=暗い青紫グレーのローブ状(ロウソクの蝋のような丸みのある円錐形)
  2. 裾はギザギザの幽霊っぽい波形(足なし)
  3. 首元に白いフリル襟(ろうそくの縁取り)
  4. 頭の上に炎(先端は薄い黄緑〜ミント、根元は薄紫)
  5. 目は小さくつり上がった赤橙色の点(いたずらっぽい表情)
  -->

  <!-- 後ろの薄い炎グロー(後ろ→体→顔の順) -->
  <ellipse cx="180" cy="90" rx="46" ry="52" fill="#DFF7E6" stroke="none" opacity="0.55"/>

  <!-- 体(ロウソク状のローブ・裾は波形) -->
  <path d="M 150 150
           Q 118 190 112 250
           Q 108 280 122 300
           L 134 292
           L 146 306
           L 160 288
           L 176 308
           L 192 288
           L 206 306
           L 220 292
           L 232 300
           Q 246 280 242 250
           Q 236 190 210 150
           Q 200 132 180 130
           Q 160 132 150 150 Z"
        fill="#4E4A63" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体の内側の少し明るい面(立体感) -->
  <path d="M 165 165 Q 148 205 146 250 Q 145 268 152 282 Q 160 250 168 220 Q 174 190 178 165 Z"
        fill="#615D78" stroke="none" opacity="0.8"/>

  <!-- 首元の白いフリル襟 -->
  <path d="M 148 158
           Q 156 172 166 160
           Q 176 174 186 160
           Q 196 174 206 160
           Q 214 172 212 156
           Q 196 148 180 148
           Q 164 148 148 158 Z"
        fill="#F3EFE2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭の上のロウソクの炎(根元=紫, 先端=黄緑) -->
  <path d="M 180 138
           Q 158 118 168 92
           Q 172 78 164 60
           Q 186 66 190 88
           Q 194 70 184 48
           Q 210 62 208 92
           Q 206 112 196 130
           Q 190 140 180 138 Z"
        fill="#B79FE0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 186 92 Q 190 74 184 52 Q 204 64 202 90 Q 200 106 192 120 Q 197 104 186 92 Z"
        fill="#C9EFC0" stroke="none" opacity="0.9"/>

  <!-- 目 左(つり目・赤橙) -->
  <ellipse cx="163" cy="188" rx="10" ry="12" fill="#2d263c" stroke="none"/>
  <ellipse cx="163" cy="184" rx="4.5" ry="5" fill="#FF7A2E" stroke="none"/>
  <ellipse cx="165" cy="181" rx="1.8" ry="1.8" fill="#FFE8B0" stroke="none"/>

  <!-- 目 右(つり目・赤橙) -->
  <ellipse cx="199" cy="188" rx="10" ry="12" fill="#2d263c" stroke="none"/>
  <ellipse cx="199" cy="184" rx="4.5" ry="5" fill="#FF7A2E" stroke="none"/>
  <ellipse cx="201" cy="181" rx="1.8" ry="1.8" fill="#FFE8B0" stroke="none"/>

  <!-- 口(小さく開いたにやり口) -->
  <path d="M 172 208 Q 181 216 190 208" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 体の模様(縦のシワ・蝋が垂れた線) -->
  <path d="M 158 200 Q 152 235 156 270" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <path d="M 222 200 Q 228 235 224 270" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
</svg>
