<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ: 1.黄色い丸っこい体+白い胸 2.先がくるんと丸まった黒い耳 3.両頬の水色まる模様 4.星形の黒いしっぽ先 5.赤い丸い目に黒目がち -->

  <!-- 後ろ: しっぽ -->
  <polygon points="255,208 268,238 300,244 275,264 282,296 255,278 228,296 235,264 210,244 242,238"
    fill="#2d2b3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ足 -->
  <ellipse cx="138" cy="318" rx="30" ry="19" fill="#f7de3a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="202" cy="318" rx="30" ry="19" fill="#f7de3a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="170" cy="232" rx="78" ry="88" fill="#f7de3a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- おなか(白) -->
  <ellipse cx="170" cy="258" rx="42" ry="55" fill="#fff8e2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- うで -->
  <ellipse cx="86" cy="238" rx="22" ry="42" transform="rotate(-18 86 238)" fill="#f7de3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="254" cy="238" rx="22" ry="42" transform="rotate(18 254 238)" fill="#f7de3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 手 -->
  <circle cx="70" cy="276" r="15" fill="#f7de3a" stroke="#2d263c" stroke-width="7"/>
  <circle cx="270" cy="276" r="15" fill="#f7de3a" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭 -->
  <circle cx="170" cy="132" r="82" fill="#f7de3a" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳(黒・先がくるん) -->
  <path d="M125,75 C100,55 95,20 115,8 C130,0 145,10 140,30 C137,45 145,60 155,70 C145,85 132,85 125,75 Z"
    fill="#2d2b3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M215,75 C240,55 245,20 225,8 C210,0 195,10 200,30 C203,45 195,60 185,70 C195,85 208,85 215,75 Z"
    fill="#2d2b3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ほっぺ(水色) -->
  <circle cx="105" cy="155" r="20" fill="#6ec6ff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="235" cy="155" r="20" fill="#6ec6ff" stroke="#2d263c" stroke-width="6"/>

  <!-- 目 -->
  <circle cx="140" cy="118" r="17" fill="#fff8e2" stroke="#2d263c" stroke-width="7"/>
  <circle cx="200" cy="118" r="17" fill="#fff8e2" stroke="#2d263c" stroke-width="7"/>
  <circle cx="142" cy="120" r="9" fill="#e53935"/>
  <circle cx="202" cy="120" r="9" fill="#e53935"/>
  <circle cx="139" cy="115" r="3" fill="#fff8e2"/>
  <circle cx="199" cy="115" r="3" fill="#fff8e2"/>

  <!-- 鼻 -->
  <circle cx="170" cy="150" r="4" fill="#2d2b3a"/>

  <!-- 口 -->
  <path d="M150,168 C160,178 180,178 190,168" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
