<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尻尾(短くて太い・先がとがる) -->
  <path d="M268 218 Q300 208 314 186 Q318 174 308 170 Q298 182 286 198 Q276 208 266 224 Z" fill="#A8998C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体(胴体・岩のようにがっしり) -->
  <ellipse cx="200" cy="228" rx="92" ry="66" fill="#A8998C" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹(明るい色) -->
  <ellipse cx="205" cy="256" rx="58" ry="32" fill="#DED2BC" stroke="#2d263c" stroke-width="4"/>

  <!-- 脚4本(短くて太い) -->
  <rect x="122" y="272" width="32" height="56" rx="10" fill="#A8998C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="164" y="280" width="28" height="48" rx="9" fill="#A8998C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="214" y="280" width="28" height="48" rx="9" fill="#A8998C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="248" y="272" width="32" height="56" rx="10" fill="#A8998C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 足先(暗い岩色) -->
  <rect x="120" y="318" width="36" height="16" rx="6" fill="#5C5248" stroke="#2d263c" stroke-width="5"/>
  <rect x="162" y="316" width="32" height="16" rx="6" fill="#5C5248" stroke="#2d263c" stroke-width="5"/>
  <rect x="212" y="316" width="32" height="16" rx="6" fill="#5C5248" stroke="#2d263c" stroke-width="5"/>
  <rect x="246" y="318" width="36" height="16" rx="6" fill="#5C5248" stroke="#2d263c" stroke-width="5"/>

  <!-- 背中〜腰の岩プレート(節々) -->
  <path d="M150 172 Q200 150 250 175" fill="none" stroke="#5C5248" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="245" cy="210" rx="30" ry="20" fill="#8F8175" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="140" cy="215" rx="16" ry="12" fill="#8F8175" stroke="#2d263c" stroke-width="4"/>

  <!-- 首と頭のさかい目(プレートの割れ目) -->
  <path d="M118 185 Q112 210 128 232" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 頭(いかつい岩の頭) -->
  <ellipse cx="92" cy="192" rx="60" ry="52" fill="#A8998C" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 耳(小さめ・とがった三角) -->
  <path d="M70 148 Q60 122 72 108 Q86 122 82 150 Z" fill="#A8998C" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M110 146 Q112 120 100 106 Q90 122 96 148 Z" fill="#A8998C" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 角(鼻先から前に太く突き出る) -->
  <path d="M62 222 Q30 226 12 232 Q6 236 12 240 Q30 238 64 236 Z" fill="#E9DDC2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 鼻の穴 -->
  <ellipse cx="56" cy="205" rx="7" ry="9" fill="#3a3128"/>

  <!-- 目(小さく素朴) -->
  <ellipse cx="82" cy="175" rx="10" ry="11" fill="white" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="84" cy="177" rx="5" ry="6" fill="#1a1a1a"/>
  <ellipse cx="86" cy="173" rx="1.8" ry="1.8" fill="white"/>

  <!-- 口 -->
  <path d="M58 218 Q78 228 100 220" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 岩肌の質感(でこぼこ) -->
  <ellipse cx="185" cy="205" rx="12" ry="9" fill="#8F8175" opacity="0.7"/>
  <ellipse cx="220" cy="250" rx="10" ry="7" fill="#8F8175" opacity="0.6"/>
  <ellipse cx="112" cy="230" rx="9" ry="7" fill="#8F8175" opacity="0.6"/>
</svg>
