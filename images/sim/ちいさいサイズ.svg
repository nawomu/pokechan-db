<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: バケッチャ「ちいさいサイズ」= オレンジの丸いかぼちゃ胴体・縦の溝(節)・上に茶色い茎とくるくる蔓・幽霊の三角目とギザギザ口。ふつうサイズより胴体を一回り小さく描いて「ちいさい」を表現 -->

  <!-- 茎(上) -->
  <path d="M172,140 Q176,124 170,113 Q179,110 187,118 Q189,132 184,143 Z" fill="#6a4a2a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- くるくる蔓 -->
  <path d="M186,124 Q206,118 210,131 Q206,140 197,135 Q197,128 204,130" fill="none" stroke="#7a9a4a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- かぼちゃ胴体(丸い・小さめ) -->
  <ellipse cx="180" cy="222" rx="62" ry="55" fill="#e8842c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 縦の溝(節) -->
  <path d="M180,168 Q174,222 180,278 M148,180 Q160,222 148,262 M212,180 Q200,222 212,262 M120,222 Q126,222 130,222 M240,222 Q234,222 230,222" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" opacity="0.55"/>

  <!-- 左目(三角・黒) -->
  <path d="M152,210 L172,199 L168,224 Z" fill="#2d263c" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- 右目(三角・黒) -->
  <path d="M208,210 L188,199 L192,224 Z" fill="#2d263c" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 目のハイライト -->
  <circle cx="163" cy="209" r="2.5" fill="#ffd84d"/>
  <circle cx="197" cy="209" r="2.5" fill="#ffd84d"/>

  <!-- 口(ギザギザ・小さめ) -->
  <path d="M155,248 L163,240 L170,248 L178,240 L184,248 L191,240 L198,248 L206,240 L213,248" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 口の下もギザギザ -->
  <path d="M155,248 L163,256 L170,248 L178,256 L184,248 L191,256 L198,248 L206,256 L213,248" fill="#2d263c" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 頬の淡い影 -->
  <circle cx="140" cy="235" r="6" fill="#c46420" opacity="0.5"/>
  <circle cx="220" cy="235" r="6" fill="#c46420" opacity="0.5"/>
</svg>
