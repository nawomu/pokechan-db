<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)アクティブ=色鮮やかな枝角(金・宝石の先) 2)紺黒の鹿胴体 3)首に白い斑点 4)四つ脚で優雅に立つ 5)青い目 -->

  <!-- 尾(短い) -->
  <path d="M255,240 Q285,235 295,250 Q285,262 260,258 Z" fill="#2a3258" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ脚(2本) -->
  <path d="M215,250 Q210,290 220,310 L238,310 Q240,290 232,255 Z" fill="#2a3258" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M250,250 Q258,288 268,308 L285,308 Q280,288 268,253 Z" fill="#2a3258" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 前脚(2本) -->
  <path d="M150,250 Q145,290 155,310 L173,310 Q175,290 167,255 Z" fill="#2a3258" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M185,250 Q188,288 198,308 L215,308 Q210,288 200,253 Z" fill="#2a3258" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <ellipse cx="205" cy="225" rx="55" ry="48" fill="#2a3258" stroke="#2d263c" stroke-width="7"/>

  <!-- 首(長い) -->
  <path d="M165,222 Q135,195 125,160 Q120,135 140,125 Q160,128 162,150 Q165,185 185,215 Q188,225 165,222 Z" fill="#2a3258" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 首/胴の白い斑点 -->
  <circle cx="195" cy="210" r="5" fill="#f0ead8"/>
  <circle cx="215" cy="225" r="5" fill="#f0ead8"/>
  <circle cx="235" cy="215" r="5" fill="#f0ead8"/>
  <circle cx="155" cy="200" r="4" fill="#f0ead8"/>
  <circle cx="145" cy="175" r="4" fill="#f0ead8"/>
  <circle cx="175" cy="240" r="4" fill="#f0ead8"/>

  <!-- 頭 -->
  <path d="M140,118 Q110,125 108,150 Q115,168 145,168 Q165,165 168,145 Q162,120 140,118 Z" fill="#2a3258" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 枝角(アクティブ=金色・宝石先) -->
  <path d="M138,118 Q120,80 95,60 M138,118 Q110,95 80,95 M138,118 Q128,75 115,45" fill="none" stroke="#e8b840" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M155,118 Q175,80 200,60 M155,118 Q185,95 215,95 M155,118 Q168,75 185,45" fill="none" stroke="#e8b840" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 角の宝石の先(カラフル) -->
  <circle cx="95" cy="60" r="7" fill="#e85a8a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="80" cy="95" r="6" fill="#5ab8e8" stroke="#2d263c" stroke-width="5"/>
  <circle cx="115" cy="45" r="7" fill="#9be08a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="200" cy="60" r="7" fill="#e85a8a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="215" cy="95" r="6" fill="#5ab8e8" stroke="#2d263c" stroke-width="5"/>
  <circle cx="185" cy="45" r="7" fill="#9be08a" stroke="#2d263c" stroke-width="5"/>

  <!-- 左目(青) -->
  <ellipse cx="128" cy="148" rx="11" ry="13" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="130" cy="151" r="6" fill="#5ab8e8"/>
  <circle cx="130" cy="151" r="2.5" fill="#2d263c"/>
  <!-- 右目 -->
  <ellipse cx="155" cy="148" rx="8" ry="10" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="154" cy="150" r="4" fill="#5ab8e8"/>

  <!-- 鼻・口 -->
  <path d="M112,162 Q108,168 112,172" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M112,172 Q116,176 120,172" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
