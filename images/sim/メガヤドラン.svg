<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尻尾(一番後ろ) -->
  <path d="M 220 295 Q 260 310 272 340 Q 255 345 238 330 Q 228 318 215 308 Z" fill="#f4a8c0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 貝殻(シェルダー)本体・下部 大きな渦巻き貝 -->
  <ellipse cx="180" cy="270" rx="85" ry="68" fill="#e8e4f5" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 貝殻の縦縞模様 -->
  <path d="M 120 255 Q 122 285 130 302" fill="none" stroke="#b8a8d8" stroke-width="5" stroke-linecap="round"/>
  <path d="M 138 242 Q 140 278 148 305" fill="none" stroke="#b8a8d8" stroke-width="5" stroke-linecap="round"/>
  <path d="M 158 237 Q 160 272 165 308" fill="none" stroke="#b8a8d8" stroke-width="5" stroke-linecap="round"/>
  <path d="M 178 235 Q 180 270 182 310" fill="none" stroke="#b8a8d8" stroke-width="5" stroke-linecap="round"/>
  <path d="M 198 237 Q 200 272 202 308" fill="none" stroke="#b8a8d8" stroke-width="5" stroke-linecap="round"/>
  <path d="M 218 242 Q 220 275 222 304" fill="none" stroke="#b8a8d8" stroke-width="5" stroke-linecap="round"/>
  <path d="M 236 252 Q 237 280 238 298" fill="none" stroke="#b8a8d8" stroke-width="5" stroke-linecap="round"/>

  <!-- 貝殻の渦巻き中心装飾 -->
  <circle cx="155" cy="270" r="20" fill="none" stroke="#9988c8" stroke-width="5"/>
  <circle cx="155" cy="270" r="10" fill="none" stroke="#9988c8" stroke-width="4"/>
  <circle cx="155" cy="270" r="4" fill="#9988c8"/>

  <!-- 貝殻の上部縁 -->
  <path d="M 100 250 Q 95 225 110 210 Q 130 200 180 198 Q 230 198 248 210 Q 262 222 260 248" fill="#d8d0f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 右腕(貝の穴から出ている) -->
  <path d="M 248 240 Q 278 230 292 245 Q 298 258 285 268 Q 270 278 252 265" fill="#f4a8c0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 右手の指(ずんぐり3本) -->
  <circle cx="292" cy="248" r="8" fill="#f4a8c0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="299" cy="261" r="8" fill="#f4a8c0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="286" cy="271" r="8" fill="#f4a8c0" stroke="#2d263c" stroke-width="6"/>

  <!-- 左腕(貝の穴から出ている) -->
  <path d="M 112 240 Q 82 228 68 244 Q 62 258 76 268 Q 90 278 110 265" fill="#f4a8c0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 左手の指 -->
  <circle cx="67" cy="248" r="8" fill="#f4a8c0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="60" cy="261" r="8" fill="#f4a8c0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="74" cy="271" r="8" fill="#f4a8c0" stroke="#2d263c" stroke-width="6"/>

  <!-- 足(短いずんぐり) -->
  <ellipse cx="148" cy="328" rx="24" ry="14" fill="#f4a8c0" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="212" cy="328" rx="24" ry="14" fill="#f4a8c0" stroke="#2d263c" stroke-width="7"/>

  <!-- 体(ピンク・貝の上部) -->
  <ellipse cx="180" cy="185" rx="62" ry="58" fill="#f9b8cc" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹部の色(薄いクリーム) -->
  <ellipse cx="180" cy="200" rx="38" ry="35" fill="#fde8ee" stroke="none"/>

  <!-- 頭部 -->
  <ellipse cx="180" cy="118" rx="68" ry="62" fill="#f9b8cc" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の渦巻きツノ -->
  <path d="M 180 58 Q 168 38 172 22 Q 180 10 192 18 Q 204 28 198 45 Q 192 58 180 58 Z" fill="#f9b8cc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- ツノの渦巻き線 -->
  <path d="M 180 52 Q 172 40 176 28 Q 182 20 190 26 Q 196 34 192 46" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 耳(垂れ気味) -->
  <path d="M 118 100 Q 100 88 96 108 Q 94 125 112 130 Q 118 125 118 112 Z" fill="#f9b8cc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 242 100 Q 260 88 264 108 Q 266 125 248 130 Q 242 125 242 112 Z" fill="#f9b8cc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 耳の内側(薄い色) -->
  <path d="M 114 104 Q 104 96 102 110 Q 101 122 112 125" fill="#fcdde8" stroke="none"/>
  <path d="M 246 104 Q 256 96 258 110 Q 259 122 248 125" fill="#fcdde8" stroke="none"/>

  <!-- 目(ぼんやり半眼) -->
  <!-- 左目 -->
  <ellipse cx="158" cy="122" rx="14" ry="12" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="158" cy="126" rx="14" ry="7" fill="#2d263c"/>
  <ellipse cx="154" cy="121" rx="5" ry="4" fill="white"/>
  <!-- 右目 -->
  <ellipse cx="204" cy="120" rx="14" ry="12" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="205" cy="124" rx="14" ry="7" fill="#2d263c"/>
  <ellipse cx="200" cy="119" rx="5" ry="4" fill="white"/>

  <!-- ぼんやりした眉(少し下がっている) -->
  <path d="M 148 110 Q 158 106 168 109" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M 194 108 Q 204 104 214 107" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 鼻(小さい点2つ) -->
  <circle cx="175" cy="136" r="3.5" fill="#e07898"/>
  <circle cx="186" cy="136" r="3.5" fill="#e07898"/>

  <!-- ほっぺ(丸い赤み) -->
  <ellipse cx="142" cy="138" rx="14" ry="10" fill="#f08898" fill-opacity="0.55"/>
  <ellipse cx="218" cy="138" rx="14" ry="10" fill="#f08898" fill-opacity="0.55"/>

  <!-- 口(ぽかんと開いた間の抜けた口) -->
  <path d="M 168 148 Q 180 160 192 148" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- しっぽ先端の丸 -->
  <circle cx="258" cy="338" r="12" fill="#f4a8c0" stroke="#2d263c" stroke-width="6"/>
</svg>