<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ脚(左) -->
  <polyline points="150,225 100,265 65,305 40,335" fill="none" stroke="#e8632a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 後ろ脚(右) -->
  <polyline points="210,225 260,265 295,305 320,335" fill="none" stroke="#e8632a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 中後ろ脚(左) -->
  <polyline points="145,210 85,235 45,260 25,290" fill="none" stroke="#e8632a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 中後ろ脚(右) -->
  <polyline points="215,210 275,235 315,260 335,290" fill="none" stroke="#e8632a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 中前脚(左) -->
  <polyline points="145,195 90,205 50,215 22,235" fill="none" stroke="#e8632a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 中前脚(右) -->
  <polyline points="215,195 270,205 310,215 338,235" fill="none" stroke="#e8632a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 前脚(左) -->
  <polyline points="150,178 105,172 65,168 30,178" fill="none" stroke="#e8632a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 前脚(右) -->
  <polyline points="210,178 255,172 295,168 330,178" fill="none" stroke="#e8632a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 関節ぽち -->
  <circle cx="100" cy="265" r="6" fill="#c44e1a" stroke="#2d263c" stroke-width="3"/>
  <circle cx="260" cy="265" r="6" fill="#c44e1a" stroke="#2d263c" stroke-width="3"/>
  <circle cx="105" cy="172" r="6" fill="#c44e1a" stroke="#2d263c" stroke-width="3"/>
  <circle cx="255" cy="172" r="6" fill="#c44e1a" stroke="#2d263c" stroke-width="3"/>

  <!-- 胴体(大きな丸い腹部) -->
  <ellipse cx="180" cy="235" rx="70" ry="62" fill="#f5f2e8" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>
  <!-- 腹部の縞模様 -->
  <path d="M122,222 Q152,215 180,218 Q208,215 238,222" fill="none" stroke="#7ecbe8" stroke-width="6" stroke-linecap="round"/>
  <path d="M118,238 Q152,230 180,232 Q208,230 242,238" fill="none" stroke="#7ecbe8" stroke-width="6" stroke-linecap="round"/>
  <path d="M122,253 Q152,247 180,249 Q208,247 238,253" fill="none" stroke="#7ecbe8" stroke-width="6" stroke-linecap="round"/>
  <!-- 腹部下半分の青み -->
  <ellipse cx="180" cy="256" rx="64" ry="37" fill="#b8e4f0" stroke="none"/>

  <!-- 頭の大きな水の泡 -->
  <circle cx="180" cy="130" r="90" fill="#c2eaf7" fill-opacity="0.84" stroke="#2d263c" stroke-width="9"/>
  <!-- 泡のハイライト -->
  <ellipse cx="150" cy="92" rx="26" ry="16" fill="white" fill-opacity="0.55" stroke="none" transform="rotate(-20,150,92)"/>

  <!-- 泡と体をつなぐ首 -->
  <path d="M160,178 Q166,198 163,206" fill="none" stroke="#d4efe8" stroke-width="6" stroke-linecap="round"/>
  <path d="M200,178 Q194,198 197,206" fill="none" stroke="#d4efe8" stroke-width="6" stroke-linecap="round"/>

  <!-- 目(左) -->
  <ellipse cx="155" cy="132" rx="15" ry="17" fill="white" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="158" cy="136" rx="9" ry="10" fill="#2d4a8a" stroke="none"/>
  <circle cx="161" cy="130" r="3" fill="white"/>
  <!-- 目(右) -->
  <ellipse cx="205" cy="132" rx="15" ry="17" fill="white" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="202" cy="136" rx="9" ry="10" fill="#2d4a8a" stroke="none"/>
  <circle cx="199" cy="130" r="3" fill="white"/>

  <!-- とてもキリッとした眉(totemの迫力) -->
  <path d="M128,110 L153,124" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M232,110 L207,124" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- 口 -->
  <path d="M163,167 Q180,180 197,167" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 頭上の触角 -->
  <path d="M158,44 Q150,30 144,20" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <circle cx="143" cy="20" r="6" fill="#7ecbe8" stroke="#2d263c" stroke-width="3"/>
  <path d="M202,44 Q210,30 216,20" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <circle cx="217" cy="20" r="6" fill="#7ecbe8" stroke="#2d263c" stroke-width="3"/>

  <!-- totemの力=キラキラ(4方) -->
  <path d="M55,36 L60,43 L69,50 L60,57 L55,64 L50,57 L41,50 L50,43 Z" fill="#ffe066" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M305,36 L300,43 L291,50 L300,57 L305,64 L310,57 L319,50 L310,43 Z" fill="#ffe066" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M35,136 L40,143 L49,150 L40,157 L35,164 L30,157 L21,150 L30,143 Z" fill="#ffe066" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M325,136 L320,143 L311,150 L320,157 L325,164 L330,157 L339,150 L330,143 Z" fill="#ffe066" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
</svg>
