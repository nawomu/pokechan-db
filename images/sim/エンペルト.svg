<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尻尾 -->
  <ellipse cx="210" cy="295" rx="22" ry="13" fill="#1a3a6b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体 (胴体) -->
  <ellipse cx="180" cy="230" rx="78" ry="95" fill="#1a3a6b" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹(水色) -->
  <ellipse cx="178" cy="242" rx="48" ry="65" fill="#7fb8d8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 腹の菱形模様 -->
  <polygon points="178,190 205,230 178,270 151,230" fill="#4a8ab5" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 左脚 -->
  <ellipse cx="153" cy="320" rx="20" ry="12" fill="#1a3a6b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="143" y="300" width="20" height="25" rx="6" fill="#1a3a6b" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 左足先 -->
  <ellipse cx="148" cy="328" rx="18" ry="9" fill="#f0c030" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 右脚 -->
  <rect x="197" y="300" width="20" height="25" rx="6" fill="#1a3a6b" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右足先 -->
  <ellipse cx="212" cy="328" rx="18" ry="9" fill="#f0c030" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左ヒレ(トライデント状) -->
  <polygon points="102,195 88,148 96,145 105,170 112,140 120,138 115,172 126,145 133,148 122,196 110,210" fill="#1a3a6b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左ヒレ金属光沢ライン -->
  <line x1="105" y1="195" x2="96" y2="148" stroke="#5588bb" stroke-width="3" stroke-linecap="round"/>

  <!-- 右ヒレ(トライデント状) -->
  <polygon points="258,195 272,148 264,145 255,170 248,140 240,138 245,172 234,145 227,148 238,196 250,210" fill="#1a3a6b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右ヒレ金属光沢ライン -->
  <line x1="255" y1="195" x2="264" y2="148" stroke="#5588bb" stroke-width="3" stroke-linecap="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="148" rx="62" ry="58" fill="#1a3a6b" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の中央角(大きく・少し曲がり気味) -->
  <polygon points="180,92 170,108 190,108" fill="#d4a520" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="180,80 172,102 188,102" fill="#f0c030" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 左の角 -->
  <polygon points="143,105 133,88 148,92 152,112" fill="#d4a520" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 右の角 -->
  <polygon points="217,105 227,88 212,92 208,112" fill="#d4a520" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 顔の白いマスク部分 -->
  <ellipse cx="180" cy="158" rx="42" ry="36" fill="#d0e8f0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左目(少しやる気なさそう・ゆがみあり) -->
  <ellipse cx="160" cy="148" rx="13" ry="14" fill="white" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="162" cy="150" rx="8" ry="9" fill="#1a1a2e"/>
  <ellipse cx="164" cy="147" rx="3" ry="3" fill="white"/>
  <!-- 左まゆ(怒り気味) -->
  <line x1="149" y1="136" x2="168" y2="139" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 右目(少し大きめ・非対称) -->
  <ellipse cx="200" cy="146" rx="14" ry="13" fill="white" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="202" cy="148" rx="9" ry="8" fill="#1a1a2e"/>
  <ellipse cx="205" cy="145" rx="3" ry="3" fill="white"/>
  <!-- 右まゆ -->
  <line x1="191" y1="134" x2="211" y2="137" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- くちばし(黄色・大きめ) -->
  <polygon points="168,166 192,166 185,186 175,186" fill="#f0c030" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- くちばし中央線 -->
  <line x1="180" y1="166" x2="180" y2="186" stroke="#c49010" stroke-width="3" stroke-linecap="round"/>

  <!-- ほっぺの青みがかった丸 -->
  <ellipse cx="147" cy="168" rx="10" ry="8" fill="#4a88c0" opacity="0.7"/>
  <ellipse cx="213" cy="166" rx="10" ry="8" fill="#4a88c0" opacity="0.7"/>
</svg>