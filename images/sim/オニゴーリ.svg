  <polygon points="212,80 220,34 198,70" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 氷の突起(体の外周・後ろ) -->
  <polygon points="100,170 76,152 88,185" fill="#c8eaf7" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="258,155 284,138 272,170" fill="#b0d8ef" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="120,268 96,278 118,250" fill="#c8eaf7" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="240,272 264,265 243,250" fill="#b0d8ef" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 胴体メイン(黒球体) -->
