  <!-- 表面の氷結晶突起(前面) -->
  <polygon points="155,100 149,82 163,88" fill="#ddf0fa" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="210,108 216,90 222,106" fill="#c5e6f5" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="110,195 96,188 107,208" fill="#ddf0fa" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="250,200 266,194 252,218" fill="#c5e6f5" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="138,252 126,260 134,238" fill="#ddf0fa" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="222,255 234,262 226,240" fill="#c5e6f5" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 頭頂の2本角(前) -->
  <polygon points="152,88 144,44 168,80" fill="#2a2a3e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="208,86 216,40 192,78" fill="#2a2a3e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 小さな手(左) -->
  <ellipse cx="72" cy="222" rx="22" ry="14" fill="#1c1c2b" stroke="#2d263c" stroke-width="6"/>
  <!-- 爪(左) -->
  <line x1="55" y1="220" x2="48" y2="212" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="60" y1="232" x2="52" y2="228" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 小さな手(右) -->
  <ellipse cx="288" cy="220" rx="22" ry="14" fill="#1c1c2b" stroke="#2d263c" stroke-width="6"/>
  <!-- 爪(右) -->
  <line x1="305" y1="218" x2="313" y2="210" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="300" y1="230" x2="308" y2="227" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 足(左) -->
  <ellipse cx="145" cy="300" rx="20" ry="13" fill="#1c1c2b" stroke="#2d263c" stroke-width="6"/>
  <line x1="130" y1="310" x2="122" y2="320" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="144" y1="313" x2="140" y2="324" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 足(右) -->
  <ellipse cx="215" cy="300" rx="20" ry="13" fill="#1c1c2b" stroke="#2d263c" stroke-width="6"/>
  <line x1="230" y1="310" x2="238" y2="320" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="216" y1="313" x2="220" y2="324" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 目(氷の割れ目状・左) — 黄色い瞳 -->
  <ellipse cx="148" cy="168" rx="20" ry="24" fill="#f7e44a" stroke="#2d263c" stroke-width="5"/>
  <!-- 瞳の縦スリット(左) -->
  <ellipse cx="148" cy="168" rx="6" ry="16" fill="#2d1a00"/>
  <!-- 目の周り氷割れ目(左) -->
  <polyline points="128,155 122,148 130,160" fill="none" stroke="#8ad4f0" stroke-width="3" stroke-linecap="round"/>
  <polyline points="168,158 176,150 169,165" fill="none" stroke="#8ad4f0" stroke-width="3" stroke-linecap="round"/>

  <!-- 目(右) -->
  <ellipse cx="212" cy="165" rx="20" ry="24" fill="#f7e44a" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="212" cy="165" rx="6" ry="16" fill="#2d1a00"/>
  <polyline points="192,152 185,144 193,157" fill="none" stroke="#8ad4f0" stroke-width="3" stroke-linecap="round"/>
  <polyline points="232,155 240,147 232,162" fill="none" stroke="#8ad4f0" stroke-width="3" stroke-linecap="round"/>

  <!-- 大きな口(氷の割れ目状) -->
  <path d="M 128,218 Q 135,210 148,224 Q 162,236 180,228 Q 198,220 212,232 Q 226,244 232,238" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 口の内側(暗い) -->
  <path d="M 132,222 Q 148,238 180,232 Q 212,226 228,240 L 228,248 Q 212,252 180,248 Q 148,252 132,238 Z" fill="#0a0a18" stroke="none"/>
  <!-- ギザギザ牙 -->
  <polygon points="150,226 156,240 162,224" fill="#ddf0fa" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="176,228 182,244 188,228" fill="#ddf0fa" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="202,228 208,240 214,226" fill="#ddf0fa" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
</svg>