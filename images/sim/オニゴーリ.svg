<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ:尻尾っぽい突起 -->
  <ellipse cx="185" cy="285" rx="18" ry="26" fill="#b8e4f7" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体 (メインボディ・丸い雪玉) -->
  <ellipse cx="180" cy="210" rx="110" ry="105" fill="#e8f8ff" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体の縞模様 (水色横帯) -->
  <path d="M85,195 Q180,182 275,195 Q272,210 275,215 Q180,200 85,215 Z" fill="#7acded" opacity="0.7"/>
  <path d="M90,230 Q180,218 270,230 Q268,244 270,248 Q180,234 90,248 Z" fill="#7acded" opacity="0.6"/>
  <path d="M100,160 Q180,149 260,160 Q258,172 260,175 Q180,163 100,175 Z" fill="#7acded" opacity="0.5"/>

  <!-- 左ヒレ腕 -->
  <ellipse cx="72" cy="225" rx="32" ry="22" fill="#b8e4f7" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-20,72,225)"/>
  <!-- 左ヒレの縞 -->
  <path d="M55,218 Q72,212 88,220" fill="none" stroke="#7acded" stroke-width="4" stroke-linecap="round"/>

  <!-- 右ヒレ腕 (少し非対称) -->
  <ellipse cx="292" cy="220" rx="34" ry="20" fill="#b8e4f7" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(15,292,220)"/>
  <!-- 右ヒレの縞 -->
  <path d="M276,214 Q292,209 308,217" fill="none" stroke="#7acded" stroke-width="4" stroke-linecap="round"/>

  <!-- 頭部 -->
  <ellipse cx="180" cy="145" rx="75" ry="72" fill="#e8f8ff" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の縞 -->
  <path d="M118,128 Q180,118 242,128 Q240,138 242,141 Q180,130 118,141 Z" fill="#7acded" opacity="0.45"/>

  <!-- 左角(触角) -->
  <path d="M148,80 Q138,55 142,38 Q148,50 155,70 Z" fill="#b8e4f7" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 右角(触角) (少し曲がってる) -->
  <path d="M210,76 Q225,50 218,34 Q213,48 206,68 Z" fill="#b8e4f7" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 目の周りの青みシャドウ -->
  <ellipse cx="155" cy="148" rx="22" ry="20" fill="#9bd8f0" opacity="0.5"/>
  <ellipse cx="205" cy="145" rx="20" ry="21" fill="#9bd8f0" opacity="0.5"/>

  <!-- 目(白目) -->
  <ellipse cx="155" cy="148" rx="16" ry="17" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="207" cy="145" rx="15" ry="16" fill="white" stroke="#2d263c" stroke-width="5"/>

  <!-- 瞳 -->
  <ellipse cx="157" cy="150" rx="8" ry="9" fill="#2d263c"/>
  <ellipse cx="208" cy="147" rx="7" ry="8" fill="#2d263c"/>

  <!-- 瞳のハイライト -->
  <circle cx="161" cy="146" r="3" fill="white"/>
  <circle cx="212" cy="143" r="3" fill="white"/>

  <!-- ほっぺ(ピンクっぽい) -->
  <ellipse cx="135" cy="165" rx="14" ry="10" fill="#f0b8c8" opacity="0.7"/>
  <ellipse cx="225" cy="162" rx="13" ry="10" fill="#f0b8c8" opacity="0.7"/>

  <!-- 口(にやけた感じ) -->
  <path d="M163,172 Q181,186 199,172" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- 口の中 -->
  <path d="M167,177 Q181,188 196,177" fill="#e87898" stroke="none"/>

  <!-- 小さい歯 -->
  <rect x="176" y="177" width="9" height="7" rx="2" fill="white" stroke="#2d263c" stroke-width="2"/>

  <!-- 足(小さい) -->
  <ellipse cx="155" cy="306" rx="28" ry="16" fill="#b8e4f7" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="210" cy="308" rx="26" ry="15" fill="#b8e4f7" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足の爪っぽいライン -->
  <path d="M140,310 Q155,316 170,310" fill="none" stroke="#2d263c" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M196,312 Q210,318 224,312" fill="none" stroke="#2d263c" stroke-width="3.5" stroke-linecap="round"/>
</svg>