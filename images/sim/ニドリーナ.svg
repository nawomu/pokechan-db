<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- しっぽ(後ろ・太くて先が丸い) -->
  <path d="M238 268 Q285 255 300 195 Q308 160 288 148 Q278 175 258 205 Q240 238 232 262 Z" fill="#b4c6ee" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 左耳(奥・頭より先に描いて背後に) -->
  <path d="M140 118 Q100 95 92 45 Q100 25 125 35 Q145 60 150 105 Q148 115 140 118 Z" fill="#b4c6ee" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="180" cy="225" rx="85" ry="62" fill="#b4c6ee" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- お腹(クリーム色) -->
  <ellipse cx="180" cy="252" rx="48" ry="36" fill="#f0ecd8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 後ろ脚(左) -->
  <rect x="108" y="265" width="36" height="55" rx="15" fill="#b4c6ee" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="126" cy="323" rx="25" ry="13" fill="#b4c6ee" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 後ろ脚(右) -->
  <rect x="225" y="268" width="34" height="53" rx="15" fill="#b4c6ee" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="242" cy="324" rx="23" ry="12" fill="#b4c6ee" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前脚(左) -->
  <rect x="148" y="272" width="32" height="56" rx="14" fill="#b4c6ee" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="164" cy="330" rx="23" ry="13" fill="#b4c6ee" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前脚(右) -->
  <rect x="192" y="272" width="32" height="56" rx="14" fill="#b4c6ee" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="208" cy="330" rx="23" ry="13" fill="#b4c6ee" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 背中の小さなトゲ(首〜しっぽの付け根まで並ぶ) -->
  <path d="M150 172 L158 140 L168 172 Z" fill="#7686c4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M172 168 L182 132 L194 168 Z" fill="#7686c4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M198 172 L210 138 L222 172 Z" fill="#7686c4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M222 182 L236 150 L246 185 Z" fill="#7686c4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M240 200 L254 172 L262 205 Z" fill="#7686c4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="118" rx="60" ry="54" fill="#b4c6ee" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 右耳(手前) -->
  <path d="M220 118 Q260 95 268 45 Q260 25 235 35 Q215 60 210 105 Q212 115 220 118 Z" fill="#b4c6ee" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ほっぺの毛(左右のふわっとした房) -->
  <path d="M128 150 Q112 140 118 122 Q132 122 134 140 Q132 148 128 150 Z" fill="#dbe4f7" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M232 150 Q248 140 242 122 Q228 122 226 140 Q228 148 232 150 Z" fill="#dbe4f7" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(白目) -->
  <ellipse cx="155" cy="118" rx="15" ry="14" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="205" cy="118" rx="15" ry="14" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 瞳(赤み) -->
  <ellipse cx="158" cy="120" rx="9" ry="10" fill="#d94a4a"/>
  <ellipse cx="202" cy="120" rx="9" ry="10" fill="#d94a4a"/>
  <!-- 瞳孔 -->
  <ellipse cx="159" cy="122" rx="4.5" ry="5.5" fill="#2d263c"/>
  <ellipse cx="201" cy="122" rx="4.5" ry="5.5" fill="#2d263c"/>
  <!-- 瞳の光 -->
  <ellipse cx="153" cy="114" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="197" cy="114" rx="3" ry="3.5" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="138" rx="5" ry="3.5" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M168 148 Q180 158 192 148" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺの赤み -->
  <ellipse cx="138" cy="135" rx="11" ry="7" fill="#f0a8a8" opacity="0.55"/>
  <ellipse cx="222" cy="135" rx="11" ry="7" fill="#f0a8a8" opacity="0.55"/>
</svg>
