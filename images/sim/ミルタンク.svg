  <ellipse cx="240" cy="295" rx="24" ry="38" fill="#ffffff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- tail -->
  <path d="M270 175 Q305 185 302 220 Q300 245 280 250" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="282" cy="253" r="15" fill="#f6bfd6" stroke="#2d263c" stroke-width="6"/>

  <!-- lower body / pants base (white) -->
  <ellipse cx="180" cy="235" rx="98" ry="60" fill="#ffffff" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- upper body (pink) -->
  <ellipse cx="180" cy="165" rx="98" ry="75" fill="#f6bfd6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- black stripes/spots on the pants -->
  <ellipse cx="140" cy="265" rx="18" ry="10" fill="#2d263c"/>
  <ellipse cx="180" cy="278" rx="20" ry="11" fill="#2d263c"/>
  <ellipse cx="220" cy="265" rx="18" ry="10" fill="#2d263c"/>

  <!-- front legs -->
  <ellipse cx="150" cy="305" rx="20" ry="32" fill="#ffffff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="210" cy="305" rx="20" ry="32" fill="#ffffff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="136" y="323" width="28" height="14" rx="6" fill="#2d263c"/>
  <rect x="196" y="323" width="28" height="14" rx="6" fill="#2d263c"/>

  <!-- udder -->
  <ellipse cx="180" cy="288" rx="30" ry="22" fill="#fce0ee" stroke="#2d263c" stroke-width="6"/>
  <circle cx="170" cy="304" r="5" fill="#f6bfd6" stroke="#2d263c" stroke-width="3"/>
  <circle cx="190" cy="304" r="5" fill="#f6bfd6" stroke="#2d263c" stroke-width="3"/>

  <!-- ears (drooping) -->
  <path d="M120 95 Q93 130 100 178 Q106 198 122 190 Q114 150 132 108 Z" fill="#f7e8c2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M240 95 Q267 130 260 178 Q254 198 238 190 Q246 150 228 108 Z" fill="#f7e8c2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- head -->
  <circle cx="180" cy="100" r="58" fill="#f7e8c2" stroke="#2d263c" stroke-width="8"/>

  <!-- horns -->
  <path d="M150 55 Q138 33 155 28 Q167 34 158 56 Z" fill="#eadfc0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M210 55 Q222 33 205 28 Q193 34 202 56 Z" fill="#eadfc0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- eyes -->
  <ellipse cx="160" cy="95" rx="7" ry="10" fill="#2d263c"/>
  <ellipse cx="200" cy="95" rx="7" ry="10" fill="#2d263c"/>

  <!-- cheeks -->
  <ellipse cx="140" cy="120" rx="14" ry="9" fill="#f4a0be"/>
  <ellipse cx="220" cy="120" rx="14" ry="9" fill="#f4a0be"/>

  <!-- snout -->
  <ellipse cx="180" cy="130" rx="30" ry="20" fill="#fcf2dd" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="172" cy="132" rx="3" ry="5" fill="#2d263c"/>
  <ellipse cx="188" cy="132" rx="3" ry="5" fill="#2d263c"/>

  <!-- mouth -->
  <path d="M165 145 Q180 152 195 145" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
