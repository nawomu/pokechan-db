  <path d="M140 232 Q108 292 130 336 Q150 288 160 250Z" fill="#fb7fae" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M182 240 Q182 300 182 340 Q198 296 198 244Z" fill="#f6a0c0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M222 232 Q252 292 232 336 Q212 288 204 250Z" fill="#fb7fae" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M252 210 Q302 260 284 310 Q262 270 234 240Z" fill="#f6a0c0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左つばさ -->
  <path d="M92 180 Q46 190 40 226 Q78 234 108 210Z" fill="#fb7fae" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右つばさ -->
  <path d="M268 180 Q314 190 320 226 Q282 234 252 210Z" fill="#fb7fae" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

