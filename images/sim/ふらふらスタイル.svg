  <!-- 足（左右・オレンジピンク） -->
  <path d="M158 276 L152 306" fill="none" stroke="#e8698a" stroke-width="9" stroke-linecap="round"/>
  <path d="M202 276 L208 306" fill="none" stroke="#e8698a" stroke-width="9" stroke-linecap="round"/>
  <path d="M138 308 L166 308" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M194 308 L222 308" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 頭 -->
  <circle cx="180" cy="112" r="66" fill="#fdc7dc" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭上のピンクの花かざり -->
  <circle cx="180" cy="42" r="20" fill="#fb7fae" stroke="#2d263c" stroke-width="6"/>
  <circle cx="160" cy="52" r="16" fill="#f6a0c0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="200" cy="52" r="16" fill="#f6a0c0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="180" cy="46" r="9" fill="#ffe27a" stroke="#2d263c" stroke-width="4"/>

  <!-- くちばし -->
  <path d="M162 128 Q180 146 198 128 Q180 138 162 128Z" fill="#ffce6b" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目（左） -->
  <ellipse cx="156" cy="106" rx="14" ry="16" fill="#3a2b3c" stroke="#2d263c" stroke-width="4"/>
  <circle cx="160" cy="100" r="4" fill="white"/>

  <!-- 目（右） -->
  <ellipse cx="204" cy="106" rx="14" ry="16" fill="#3a2b3c" stroke="#2d263c" stroke-width="4"/>
  <circle cx="208" cy="100" r="4" fill="white"/>

  <!-- ほっぺ -->
  <circle cx="132" cy="126" r="11" fill="#ff9fc0" opacity="0.7"/>
  <circle cx="228" cy="126" r="11" fill="#ff9fc0" opacity="0.7"/>
