<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)ずんぐり丸い茶色の体とクリーム色のお腹 2)常に見える大きな出っ歯 3)額の濃い茶色のとがった模様(前髪) 4)小さく丸い耳と小さい黒目・頬ヒゲ 5)平たいビーバーのようなしっぽ -->

  <!-- 後ろ: しっぽ -->
  <ellipse cx="252" cy="258" rx="58" ry="34" transform="rotate(-18 252 258)" fill="#8a5a34" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="180" cy="228" rx="102" ry="94" fill="#c99361" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腕 -->
  <ellipse cx="92" cy="235" rx="24" ry="32" fill="#c99361" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="268" cy="235" rx="24" ry="32" fill="#c99361" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 足 -->
  <ellipse cx="138" cy="312" rx="30" ry="18" fill="#c99361" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="222" cy="312" rx="30" ry="18" fill="#c99361" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- お腹 -->
  <ellipse cx="180" cy="262" rx="56" ry="50" fill="#f3e4c0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭 -->
  <circle cx="180" cy="140" r="78" fill="#c99361" stroke="#2d263c" stroke-width="7"/>

  <!-- 耳 -->
  <circle cx="118" cy="92" r="20" fill="#c99361" stroke="#2d263c" stroke-width="6"/>
  <circle cx="242" cy="92" r="20" fill="#c99361" stroke="#2d263c" stroke-width="6"/>
  <circle cx="118" cy="92" r="9" fill="#f3e4c0"/>
  <circle cx="242" cy="92" r="9" fill="#f3e4c0"/>

  <!-- 頭の濃い茶色の模様(前髪の三角) -->
  <path d="M100,128 A80,80 0 0 1 260,128 Q180,90 100,128 Z" fill="#8a5a34" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ほっぺ(赤み) -->
  <circle cx="124" cy="168" r="12" fill="#e8a07a" opacity="0.7"/>
  <circle cx="236" cy="168" r="12" fill="#e8a07a" opacity="0.7"/>

  <!-- 目 -->
  <ellipse cx="154" cy="140" rx="9" ry="12" fill="#2d263c"/>
  <ellipse cx="206" cy="140" rx="9" ry="12" fill="#2d263c"/>
  <circle cx="157" cy="136" r="2.5" fill="#ffffff"/>
  <circle cx="209" cy="136" r="2.5" fill="#ffffff"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="158" rx="7" ry="5" fill="#4a2f1d" stroke="#2d263c" stroke-width="3"/>

  <!-- 出っ歯 -->
  <rect x="159" y="167" width="42" height="30" rx="9" fill="#ffffff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <line x1="180" y1="167" x2="180" y2="197" stroke="#2d263c" stroke-width="4"/>

  <!-- ヒゲ -->
  <line x1="70" y1="150" x2="110" y2="156" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="66" y1="164" x2="108" y2="166" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="178" x2="110" y2="174" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="290" y1="150" x2="250" y2="156" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="294" y1="164" x2="252" y2="166" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="290" y1="178" x2="250" y2="174" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
</svg>
