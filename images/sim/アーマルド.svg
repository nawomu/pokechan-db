  <path d="M195 250 Q190 285 175 300 L210 300 Q220 275 220 250 Z" fill="#2f8078" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M172 298 Q170 312 185 312 Q210 312 212 298 Z" fill="#e04a2f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- front leg -->
  <path d="M135 250 Q130 285 118 300 L152 300 Q160 273 160 250 Z" fill="#2f8078" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M116 298 Q114 312 129 312 Q152 312 154 298 Z" fill="#e04a2f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- body -->
  <path d="M110 175 Q100 240 150 260 Q210 275 235 235 Q255 195 225 150 Q195 110 150 120 Q118 128 110 175 Z"
