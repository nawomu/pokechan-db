  <path d="M120 160 Q90 145 75 115" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <path d="M92 85 Q65 78 52 100 Q45 115 62 122 Q52 133 68 143 Q83 150 92 135 Q106 118 92 85 Z"
