  <!-- eyes -->
  <circle cx="185" cy="106" r="7" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="205" cy="104" r="7" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="186" cy="107" r="2.6" fill="#2d263c"/>
  <circle cx="206" cy="105" r="2.6" fill="#2d263c"/>

  <!-- mouth line -->
  <path d="M182 122 Q195 128 208 120" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
