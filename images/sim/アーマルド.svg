  <path d="M140 175 Q170 190 205 178" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M135 205 Q170 222 215 208" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M145 232 Q175 245 205 233" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- right arm to big claw -->
  <path d="M225 165 Q265 155 285 130" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <path d="M270 100 Q300 95 315 115 Q322 130 305 138 Q315 148 300 158 Q285 165 275 150 Q260 135 270 100 Z"
