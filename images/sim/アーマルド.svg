<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body) -->
  <path d="M225 265 Q290 250 305 195 Q310 175 295 180 Q285 220 225 235 Z" fill="#3a9d94" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

