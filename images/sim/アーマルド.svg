  <!-- head crest spikes -->
  <path d="M195 78 Q198 55 215 48 Q210 68 205 82 Z" fill="#2f8078" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M170 82 Q165 60 180 48 Q182 68 182 86 Z" fill="#2f8078" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- face plate -->
  <path d="M168 95 Q160 118 180 130 Q205 140 218 118 Q222 100 205 90 Q185 82 168 95 Z"
