<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- からだ(枯れ枝の玉・トゲトゲ丸) -->
  <path d="M300,150 L258,195 L240,254 L180,240 L120,254 L102,195 L60,150 L102,105 L120,46 L180,60 L240,46 L258,105 Z" fill="#B58A4A" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 内側の影(奥行き) -->
  <path d="M180,240 Q210,235 230,210 Q235,180 215,165 Q225,200 205,225 Q195,238 180,240Z" fill="#8B6A34"/>

  <!-- 枝の模様 -->
  <path d="M110,120 Q150,140 190,110" fill="none" stroke="#5A3F1E" stroke-width="4" stroke-linecap="round"/>
  <path d="M140,200 Q170,215 210,195" fill="none" stroke="#5A3F1E" stroke-width="4" stroke-linecap="round"/>
  <path d="M90,160 Q130,150 160,170" fill="none" stroke="#5A3F1E" stroke-width="4" stroke-linecap="round"/>

  <!-- 頭に生えた草(グラス感) -->
  <path d="M110,60 Q100,28 85,18 Q105,34 118,55Z" fill="#6FAE4A" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M245,55 Q258,24 276,14 Q260,34 250,58Z" fill="#6FAE4A" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M175,50 Q173,22 163,8 Q185,20 185,48Z" fill="#6FAE4A" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目(左・ぼんやり光る) -->
  <ellipse cx="150" cy="165" rx="18" ry="20" fill="#FFB13D" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="150" cy="168" rx="7" ry="9" fill="#2d263c"/>

  <!-- 目(右) -->
  <ellipse cx="215" cy="160" rx="18" ry="20" fill="#FFB13D" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="215" cy="163" rx="7" ry="9" fill="#2d263c"/>

  <!-- 口(ギザギザの笑み) -->
  <path d="M160,205 Q170,215 182,206 Q194,216 206,204" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 手(幽霊の手・ほうきを持つように玉を支える/裾はもやもや) -->
  <path d="M120,255 Q100,285 115,315 Q135,335 160,330 Q180,340 200,330 Q225,335 245,315 Q260,285 240,255 Q210,270 180,268 Q150,270 120,255Z" fill="#D3CDE6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 指1(左) -->
  <path d="M125,255 Q118,225 135,215 Q150,225 145,250 Q135,258 125,255Z" fill="#D3CDE6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 指2(中) -->
  <path d="M165,258 Q160,220 180,210 Q200,220 195,258 Q180,265 165,258Z" fill="#D3CDE6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 指3(右) -->
  <path d="M215,255 Q210,225 227,215 Q245,225 237,250 Q225,258 215,255Z" fill="#D3CDE6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 指の境目 -->
  <path d="M148,250 Q155,235 160,222" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <path d="M200,222 Q205,235 212,250" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
</svg>
