<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ドリュウズ - もぐらポケモン / 全身・正面やや斜め -->

  <!-- 後ろ足 (左右) -->
  <ellipse cx="135" cy="295" rx="28" ry="18" fill="#c8a060" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="225" cy="295" rx="28" ry="18" fill="#c8a060" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 尻尾 -->
  <path d="M215 270 Q260 285 255 305 Q248 315 235 308" fill="#c8a060" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 胴体 -->
  <ellipse cx="180" cy="230" rx="78" ry="88" fill="#c8a060" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹の白い部分 -->
  <ellipse cx="178" cy="245" rx="46" ry="60" fill="#f0e4c0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 胴体の赤い縞 (上) -->
  <path d="M118 195 Q178 185 242 198" fill="none" stroke="#b03020" stroke-width="8" stroke-linecap="round"/>
  <!-- 胴体の赤い縞 (中) -->
  <path d="M112 225 Q178 215 248 228" fill="none" stroke="#b03020" stroke-width="8" stroke-linecap="round"/>

  <!-- 左腕(ドリル爪) -->
  <path d="M110 210 Q80 215 72 230" fill="#c8a060" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- ドリル爪 左・3本 -->
  <path d="M85 218 L58 190 L70 222" fill="#d0c090" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M78 228 L48 208 L65 232" fill="#d0c090" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M80 238 L50 228 L68 243" fill="#d0c090" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 右腕(ドリル爪) -->
  <path d="M250 210 Q278 215 286 232" fill="#c8a060" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- ドリル爪 右・3本 -->
  <path d="M273 220 L302 193 L290 224" fill="#d0c090" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M280 230 L312 212 L294 235" fill="#d0c090" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M278 240 L308 232 L291 247" fill="#d0c090" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="148" rx="68" ry="62" fill="#c8a060" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の赤い縞 -->
  <path d="M118 130 Q180 118 242 132" fill="none" stroke="#b03020" stroke-width="9" stroke-linecap="round"/>
  <path d="M122 155 Q180 143 238 157" fill="none" stroke="#b03020" stroke-width="8" stroke-linecap="round"/>

  <!-- 耳(左) -->
  <ellipse cx="122" cy="98" rx="18" ry="14" fill="#c8a060" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 耳(右) -->
  <ellipse cx="238" cy="96" rx="18" ry="14" fill="#c8a060" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 鼻周り(白) -->
  <ellipse cx="180" cy="168" rx="38" ry="28" fill="#f0e4c0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目(左) - つぶらな小さい目 -->
  <ellipse cx="155" cy="150" rx="10" ry="11" fill="white" stroke="#2d263c" stroke-width="5"/>
  <circle cx="157" cy="151" r="6" fill="#1a1020"/>
  <circle cx="159" cy="149" r="2" fill="white"/>

  <!-- 目(右) - ちょっと大きさ違う(落書き感) -->
  <ellipse cx="205" cy="148" rx="11" ry="10" fill="white" stroke="#2d263c" stroke-width="5"/>
  <circle cx="207" cy="149" r="6" fill="#1a1020"/>
  <circle cx="209" cy="147" r="2" fill="white"/>

  <!-- ドリル鼻 (メインの特徴!) -->
  <!-- ドリル基部 -->
  <ellipse cx="180" cy="178" rx="22" ry="14" fill="#b8b0a0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- ドリル本体 -->
  <path d="M158 172 Q162 145 180 82 Q198 145 202 172 Z" fill="#a0a898" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- ドリルの螺旋ライン -->
  <path d="M166 162 Q180 148 194 155" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M163 145 Q180 132 197 139" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M165 128 Q180 116 195 122" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <path d="M168 112 Q180 102 192 107" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- 口 (ちょっとニヤッとした感じ) -->
  <path d="M168 182 Q180 192 192 182" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>