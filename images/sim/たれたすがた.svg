<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- たれたすがたの特徴:
    1. 白っぽいクリーム色の丸いおにぎり型の体(すし・にぎりモチーフ)
    2. 頭の上に赤ピンク色のネタ(魚)のような模様
    3. だらーんと垂れ下がった長い舌(たれ舌)が特徴
    4. 眠そうな半目のたれ目、しょんぼりした口
    5. 小さな丸いヒレ状の手、小さな尾ビレ
  -->

  <!-- 尾ビレ(体の後ろ) -->
  <path d="M275 230 Q315 220 320 190 Q300 220 265 215 Z" fill="#f2967f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(丸いおにぎり型・クリーム色) -->
  <ellipse cx="175" cy="200" rx="105" ry="90" fill="#f8ecd8" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭上のネタ(赤ピンクの帯) -->
  <path d="M90 150 Q175 95 260 150 Q255 195 175 200 Q95 195 90 150 Z" fill="#e8624a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 小さな丸いヒレ手 -->
  <ellipse cx="90" cy="230" rx="26" ry="20" fill="#f8ecd8" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="260" cy="230" rx="26" ry="20" fill="#f8ecd8" stroke="#2d263c" stroke-width="7"/>

  <!-- たれ目(眠そうな半目・下がり眉のような線) -->
  <path d="M118 195 Q135 210 152 197" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M198 197 Q215 210 232 195" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="132" cy="182" rx="5" ry="4" fill="#2d263c"/>
  <ellipse cx="218" cy="182" rx="5" ry="4" fill="#2d263c"/>

  <!-- しょんぼりした小さな口 -->
  <path d="M160 235 Q175 227 190 235" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- だらーんと垂れ下がる長い舌(たれ舌) -->
  <path d="M172 238 Q160 270 166 300 Q169 318 156 324" fill="none" stroke="#2d263c" stroke-width="26" stroke-linecap="round"/>
  <path d="M172 238 Q160 270 166 300 Q169 318 156 324" fill="none" stroke="#e8624a" stroke-width="14" stroke-linecap="round"/>

  <!-- 頬の赤み -->
  <circle cx="112" cy="212" r="9" fill="#f2967f" opacity="0.6"/>
  <circle cx="238" cy="212" r="9" fill="#f2967f" opacity="0.6"/>
</svg>
