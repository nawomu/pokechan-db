<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail feathers (back layer) -->
  <ellipse cx="180" cy="310" rx="80" ry="28" fill="#b05a2a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="130" cy="305" rx="28" ry="14" fill="#d4843a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-25 130 305)"/>
  <ellipse cx="230" cy="305" rx="28" ry="14" fill="#d4843a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(25 230 305)"/>
  <ellipse cx="180" cy="318" rx="20" ry="12" fill="#c0602e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- cape/wings left -->
  <path d="M165 175 Q110 190 70 230 Q55 260 75 280 Q100 295 130 270 Q150 250 160 220 Z" fill="#2d7a6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- wing stripe left -->
  <path d="M150 200 Q115 225 95 255" fill="none" stroke="#a8d8ce" stroke-width="5" stroke-linecap="round"/>
  <path d="M140 215 Q108 238 90 265" fill="none" stroke="#a8d8ce" stroke-width="4" stroke-linecap="round"/>

  <!-- cape/wings right -->
  <path d="M195 175 Q250 190 290 235 Q305 265 283 282 Q258 297 228 272 Q208 252 200 220 Z" fill="#2d7a6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- wing stripe right -->
  <path d="M210 200 Q245 228 265 258" fill="none" stroke="#a8d8ce" stroke-width="5" stroke-linecap="round"/>
  <path d="M220 215 Q252 242 270 268" fill="none" stroke="#a8d8ce" stroke-width="4" stroke-linecap="round"/>

  <!-- body -->
  <ellipse cx="180" cy="230" rx="52" ry="72" fill="#c8e8e0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- belly patch -->
  <ellipse cx="180" cy="250" rx="30" ry="42" fill="#eef7f4" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- legs -->
  <rect x="155" y="288" width="18" height="32" rx="6" fill="#c8e8e0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="187" y="288" width="18" height="32" rx="6" fill="#c8e8e0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- feet -->
  <ellipse cx="164" cy="322" rx="16" ry="8" fill="#e8c46a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="196" cy="322" rx="16" ry="8" fill="#e8c46a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- neck -->
  <rect x="165" y="152" width="30" height="30" rx="10" fill="#c8e8e0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- head base -->
  <ellipse cx="180" cy="128" rx="42" ry="38" fill="#c8e8e0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- hat / head cap feathers -->
  <path d="M138 118 Q130 80 155 58 Q175 42 180 55 Q185 42 205 58 Q230 80 222 118 Z" fill="#2d7a6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- hat highlight stripe -->
  <path d="M162 110 Q168 78 180 60" fill="none" stroke="#a8d8ce" stroke-width="4" stroke-linecap="round"/>

  <!-- top tuft (white pompom) -->
  <ellipse cx="180" cy="50" rx="14" ry="12" fill="#f0f8f6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="172" cy="46" rx="8" ry="7" fill="#f0f8f6" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="188" cy="46" rx="8" ry="7" fill="#f0f8f6" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- face: eyes -->
  <!-- left eye (slightly bigger for character) -->
  <ellipse cx="163" cy="126" rx="10" ry="11" fill="#fff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="164" cy="127" rx="6" ry="7" fill="#cc2222" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="165" cy="125" rx="2.5" ry="2.5" fill="#fff"/>

  <!-- right eye -->
  <ellipse cx="197" cy="125" rx="9" ry="10" fill="#fff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="198" cy="126" rx="5.5" ry="6.5" fill="#cc2222" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="199" cy="124" rx="2" ry="2" fill="#fff"/>

  <!-- beak -->
  <path d="M172 142 Q180 158 188 142" fill="#e8c46a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="172" y1="142" x2="188" y2="142" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- cheek fluffs -->
  <ellipse cx="150" cy="138" rx="11" ry="8" fill="#eef7f4" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="210" cy="137" rx="11" ry="8" fill="#eef7f4" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- collar/scarf white ruff -->
  <path d="M150 162 Q165 148 180 152 Q195 148 210 162 Q200 175 180 172 Q160 175 150 162 Z" fill="#f0f8f6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- bow on collar -->
  <path d="M175 162 Q173 157 168 156 Q163 158 165 163 Z" fill="#2d7a6e" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M185 162 Q187 157 192 156 Q197 158 195 163 Z" fill="#2d7a6e" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
</svg>