<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- crossbow-shaped tail/bow behind body -->
  <path d="M180 230 Q120 210 90 150 Q80 128 95 122 Q108 118 112 140 Q125 195 190 210 Z" fill="#8a95a8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M180 235 Q245 222 280 165 Q292 144 278 137 Q265 132 258 155 Q240 205 175 215 Z" fill="#8a95a8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M95 125 Q185 130 278 140" fill="none" stroke="#5c6678" stroke-width="5" stroke-linecap="round"/>

  <!-- lower fin/leg left -->
  <path d="M148 270 Q140 300 122 312 Q140 318 158 308 Q162 288 158 268 Z" fill="#3f6fb0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- lower fin/leg right -->
  <path d="M212 270 Q222 300 240 312 Q222 318 204 308 Q200 288 204 268 Z" fill="#3f6fb0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- tail fin small -->
  <path d="M180 275 Q170 300 180 315 Q190 300 180 275 Z" fill="#3f6fb0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- main body -->
  <path d="M120 165 Q100 210 130 250 Q160 280 200 275 Q245 268 255 220 Q262 175 230 140 Q195 105 155 118 Q128 128 120 165 Z"
        fill="#4a7fc9" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- pale belly patch -->
  <path d="M150 200 Q160 235 195 240 Q225 238 232 210 Q220 225 195 222 Q165 218 150 200 Z" fill="#eef3ea" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- head crest fin on top -->
  <path d="M170 118 Q160 85 185 65 Q205 50 220 68 Q225 90 205 105 Q188 118 170 118 Z" fill="#3a5f9e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- long snout/jaw shape (fossil fish head) -->
  <path d="M230 150 Q275 140 300 155 Q310 162 300 172 Q270 165 232 172 Z" fill="#4a7fc9" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- big teeth -->
  <path d="M240 160 L250 175 L258 160 Z" fill="#fff8ea" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M262 158 L270 172 L278 158 Z" fill="#fff8ea" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M285 157 L292 169 L299 157 Z" fill="#fff8ea" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- eye -->
  <circle cx="195" cy="150" r="12" fill="#fff8ea" stroke="#2d263c" stroke-width="6"/>
  <circle cx="197" cy="152" r="4.5" fill="#2d263c"/>

  <!-- cheek marking -->
  <path d="M175 175 Q190 185 205 178" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
</svg>
