<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ: 座布団のような影 -->
  <ellipse cx="180" cy="300" rx="90" ry="18" fill="#5b6b8c" opacity="0.35"/>

  <!-- 体(あぐらで座る・卵型の下半身) -->
  <path d="M100 300 Q90 230 130 210 Q150 198 180 198 Q210 198 230 210 Q270 230 260 300 Q260 315 180 315 Q100 315 100 300 Z"
        fill="#8b98c0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 組んだ脚(左右にちょこんと出るピンクの足) -->
  <ellipse cx="118" cy="288" rx="30" ry="20" fill="#f0a8c8" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="242" cy="288" rx="30" ry="20" fill="#f0a8c8" stroke="#2d263c" stroke-width="7"/>

  <!-- 胸のピンクの模様(卵型) -->
  <ellipse cx="180" cy="240" rx="34" ry="42" fill="#f0a8c8" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="180" cy="244" rx="18" ry="26" fill="#e37fac"/>

  <!-- 腕(組んで前で構える) -->
  <path d="M132 220 Q100 235 108 268 Q112 282 140 280" fill="#8b98c0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M228 220 Q260 235 252 268 Q248 282 220 280" fill="#8b98c0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 手(ピンクのこぶし) -->
  <circle cx="140" cy="278" r="16" fill="#f0a8c8" stroke="#2d263c" stroke-width="6"/>
  <circle cx="220" cy="278" r="16" fill="#f0a8c8" stroke="#2d263c" stroke-width="6"/>

  <!-- 首〜頭 -->
  <circle cx="180" cy="150" r="66" fill="#8b98c0" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭頂のピンクのツンツン(2本) -->
  <path d="M150 100 Q145 70 165 60 Q160 82 168 100 Z" fill="#f0a8c8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M210 100 Q215 70 195 60 Q200 82 192 100 Z" fill="#f0a8c8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(瞑想で細く閉じた赤い目) -->
  <path d="M150 150 Q160 156 172 150" fill="none" stroke="#7a2038" stroke-width="6" stroke-linecap="round"/>
  <path d="M188 150 Q200 156 210 150" fill="none" stroke="#7a2038" stroke-width="6" stroke-linecap="round"/>

  <!-- 口(小さな微笑み) -->
  <path d="M170 172 Q180 178 190 172" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <circle cx="142" cy="163" r="8" fill="#e8a0a8" opacity="0.7"/>
  <circle cx="218" cy="163" r="8" fill="#e8a0a8" opacity="0.7"/>
</svg>
