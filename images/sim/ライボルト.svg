<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ライボルト: 黒い電気犬。やや正面斜め・全身 -->
  <!-- レイヤー: しっぽ → 後ろ足 → 体 → 前足 → 頭 → 耳 → 顔パーツ -->

  <!-- しっぽ(稲妻型ジグザグ) -->
  <polyline points="265,220 285,195 268,178 292,158 275,140 298,122" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="265,220 285,195 268,178 292,158 275,140 298,122" fill="none" stroke="#FFD700" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- しっぽ先端 星っぽい丸 -->
  <circle cx="298" cy="120" r="9" fill="#FFD700" stroke="#2d263c" stroke-width="5"/>

  <!-- 後ろ右足 -->
  <ellipse cx="242" cy="278" rx="18" ry="28" fill="#1a1a2e" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="242" cy="300" rx="22" ry="10" fill="#1a1a2e" stroke="#2d263c" stroke-width="6"/>
  <!-- 後ろ右足 稲妻マーク -->
  <polyline points="236,265 245,273 238,282 248,288" fill="none" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 後ろ左足 -->
  <ellipse cx="148" cy="278" rx="18" ry="28" fill="#1a1a2e" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="148" cy="300" rx="22" ry="10" fill="#1a1a2e" stroke="#2d263c" stroke-width="6"/>

  <!-- 体(メイン) -->
  <ellipse cx="190" cy="230" rx="80" ry="60" fill="#1a1a2e" stroke="#2d263c" stroke-width="8"/>

  <!-- 腹の稲妻模様(黄色縞) -->
  <polygon points="162,205 178,198 172,218 190,212 184,232 202,226 196,248 210,242 204,260 185,260 178,242 190,238 184,220 170,224 176,205" fill="#FFD700" stroke="#2d263c" stroke-width="2.5"/>

  <!-- 前右足 -->
  <ellipse cx="228" cy="280" rx="15" ry="26" fill="#1a1a2e" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="230" cy="302" rx="19" ry="9" fill="#2a2a3e" stroke="#2d263c" stroke-width="5"/>

  <!-- 前左足 -->
  <ellipse cx="155" cy="280" rx="15" ry="26" fill="#1a1a2e" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="153" cy="302" rx="19" ry="9" fill="#2a2a3e" stroke="#2d263c" stroke-width="5"/>

  <!-- 首 -->
  <ellipse cx="175" cy="188" rx="35" ry="25" fill="#1a1a2e" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭 -->
  <ellipse cx="168" cy="155" rx="52" ry="48" fill="#1a1a2e" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳(左・大きな三角) -->
  <polygon points="108,148 88,68 138,118" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 耳内側(青紫) -->
  <polygon points="110,138 95,84 130,116" fill="#7B5EA7" stroke="#2d263c" stroke-width="3"/>

  <!-- 耳(右・少し非対称) -->
  <polygon points="210,142 228,65 192,120" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 耳内側(右) -->
  <polygon points="208,134 222,80 196,118" fill="#7B5EA7" stroke="#2d263c" stroke-width="3"/>

  <!-- 頭の稲妻模様(黄色) -->
  <polyline points="148,125 158,138 145,148 158,160" fill="none" stroke="#FFD700" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 目(右・赤くギラついた) -->
  <ellipse cx="185" cy="150" rx="13" ry="11" fill="#CC2222" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="188" cy="148" rx="5" ry="5" fill="#FF4444"/>
  <circle cx="190" cy="146" r="2.5" fill="white"/>
  <!-- 目(左) -->
  <ellipse cx="148" cy="152" rx="12" ry="10" fill="#CC2222" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="151" cy="150" rx="4.5" ry="4.5" fill="#FF4444"/>
  <circle cx="153" cy="148" r="2" fill="white"/>

  <!-- まゆげ(鋭い・険しい表情) -->
  <line x1="138" y1="138" x2="158" y2="143" stroke="#FFD700" stroke-width="5" stroke-linecap="round"/>
  <line x1="176" y1="137" x2="197" y2="142" stroke="#FFD700" stroke-width="5" stroke-linecap="round"/>

  <!-- 鼻 -->
  <ellipse cx="168" cy="168" rx="7" ry="5" fill="#2d263c" stroke="#2d263c" stroke-width="2"/>

  <!-- 口(ちょっとニヤリ) -->
  <path d="M155,176 Q168,186 182,176" fill="none" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>

  <!-- 電気エフェクト(体の周りにピリピリ) -->
  <polyline points="110,200 100,188 112,182" fill="none" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <polyline points="255,190 268,178 260,170" fill="none" stroke="#FFD700" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <polyline points="125,310 118,298 128,292" fill="none" stroke="#FFD700" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>