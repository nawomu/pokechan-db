<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.顔の周りに黄色い花びら(ひまわり)が円形に並ぶ 2.顔は緑色の丸(葉っぱ質感) 3.体は黄色くて下がすぼまる鉢/根っこ状 4.目は丸くて黒目大きめ、口は小さくにっこり 5.左右に緑の葉(腕)が出ている -->

  <!-- 後ろ: 花びら(ひまわり) -->
  <g stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round" fill="#f7d637">
    <ellipse cx="180" cy="70" rx="30" ry="42"/>
    <ellipse cx="250" cy="95" rx="30" ry="42" transform="rotate(45 250 95)"/>
    <ellipse cx="285" cy="160" rx="30" ry="42" transform="rotate(90 285 160)"/>
    <ellipse cx="265" cy="230" rx="30" ry="42" transform="rotate(135 265 230)"/>
    <ellipse cx="200" cy="255" rx="30" ry="42" transform="rotate(180 200 255)"/>
    <ellipse cx="130" cy="245" rx="30" ry="42" transform="rotate(210 130 245)"/>
    <ellipse cx="80" cy="195" rx="30" ry="42" transform="rotate(260 80 195)"/>
    <ellipse cx="85" cy="120" rx="30" ry="42" transform="rotate(-45 85 120)"/>
    <ellipse cx="140" cy="80" rx="30" ry="42" transform="rotate(-15 140 80)"/>
  </g>

  <!-- 左右の葉っぱ(腕) -->
  <g stroke="#2d263c" stroke-width="7" stroke-linejoin="round" fill="#5fae3c">
    <path d="M75 235 Q20 220 30 270 Q60 300 100 265 Z"/>
    <path d="M285 235 Q340 220 330 270 Q300 300 260 265 Z"/>
  </g>

  <!-- 体(黄色い鉢型・下すぼまり) -->
  <path d="M120 250 Q110 300 130 330 Q180 350 230 330 Q250 300 240 250 Q180 275 120 250 Z"
        fill="#f7d637" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体の模様線(鉢の節) -->
  <path d="M130 295 Q180 315 230 295" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 顔(緑の丸) -->
  <circle cx="180" cy="200" r="80" fill="#5fae3c" stroke="#2d263c" stroke-width="8"/>

  <!-- ほほの模様 -->
  <circle cx="130" cy="220" r="14" fill="#8fd05f" stroke="#2d263c" stroke-width="4"/>
  <circle cx="230" cy="220" r="14" fill="#8fd05f" stroke="#2d263c" stroke-width="4"/>

  <!-- 目 -->
  <circle cx="150" cy="190" r="16" fill="#2d263c"/>
  <circle cx="210" cy="190" r="16" fill="#2d263c"/>
  <circle cx="154" cy="184" r="5" fill="#ffffff"/>
  <circle cx="214" cy="184" r="5" fill="#ffffff"/>

  <!-- 口(にっこり) -->
  <path d="M155 225 Q180 245 205 225" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>
