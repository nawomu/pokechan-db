           C232 148 270 180 274 226
           C278 270 234 306 182 309
           C128 312 84 272 88 224
           C90 176 128 156 180 152 Z"
        fill="#8BCB9E" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- tiny head nubs -->
  <path d="M124 168 C114 154 116 138 128 132 C136 144 136 160 128 172 Z" fill="#8BCB9E" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M238 166 C250 152 248 136 236 130 C228 142 228 158 236 170 Z" fill="#8BCB9E" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- front legs, drawn in front of body bottom -->
  <path d="M112 272 C98 278 92 298 104 312 C118 320 138 316 140 298 C142 284 128 270 112 272 Z"
