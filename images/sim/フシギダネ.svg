  <path d="M250 274 C264 278 270 298 258 312 C244 320 224 316 222 298 C220 284 234 272 250 274 Z"
        fill="#8BCB9E" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- toes -->
  <path d="M104 312 Q108 320 114 313" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M122 316 Q126 324 132 317" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M258 312 Q254 320 248 313" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M240 316 Q236 324 230 317" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- belly patch -->
  <path d="M126 258 C150 288 214 288 236 260 C230 292 196 304 180 302 C154 300 130 284 126 258 Z"
        fill="#D9F2E0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- body spots -->
  <ellipse cx="106" cy="220" rx="12" ry="15" fill="#5FA85A" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="256" cy="228" rx="13" ry="16" fill="#5FA85A" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="218" cy="256" rx="10" ry="8" fill="#5FA85A" stroke="#2d263c" stroke-width="5"/>

  <!-- face: eyes -->
  <ellipse cx="148" cy="212" rx="27" ry="29" fill="#FFFFFF" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="216" cy="210" rx="25" ry="27" fill="#FFFFFF" stroke="#2d263c" stroke-width="7"/>
  <circle cx="155" cy="218" r="11" fill="#2d263c"/>
  <circle cx="210" cy="216" r="10" fill="#2d263c"/>
  <circle cx="150" cy="210" r="3.5" fill="#ffffff"/>
  <circle cx="206" cy="208" r="3" fill="#ffffff"/>

  <!-- nostrils -->
  <circle cx="174" cy="246" r="3.5" fill="#2d263c"/>
  <circle cx="190" cy="246" r="3.5" fill="#2d263c"/>

  <!-- mouth -->
  <path d="M160 236 Q182 248 204 236" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
