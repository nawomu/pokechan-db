  <ellipse cx="288" cy="266" rx="25" ry="20" fill="#6FB588" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- bulb on the back, peeking up behind/above the head -->
  <path d="M180 52
           C226 48 262 76 268 116
           C274 154 250 186 208 190
           C168 194 132 172 128 132
           C124 92 148 58 180 52 Z"
        fill="#57A247" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="163" cy="108" rx="13" ry="10" fill="#3D7A32" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="212" cy="98" rx="11" ry="9" fill="#3D7A32" stroke="#2d263c" stroke-width="5"/>
