  <!-- 腰の緑の装飾ライン -->
  <path d="M 140 232 Q 180 245 220 232" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 左足先 -->
  <ellipse cx="142" cy="331" rx="16" ry="8" fill="#dddddd" stroke="#2d263c" stroke-width="5"/>
  <!-- 右足先 -->
  <ellipse cx="218" cy="331" rx="16" ry="8" fill="#dddddd" stroke="#2d263c" stroke-width="5"/>
</svg>