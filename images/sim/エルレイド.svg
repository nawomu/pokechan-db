  <!-- 頭の兜(緑・逆三角) -->
  <path d="M 158 88 Q 180 60 202 88 Q 192 95 180 92 Q 168 95 158 88 Z" fill="#3a8c3a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 兜の先端の突起 -->
  <polygon points="180,58 172,82 188,82" fill="#3a8c3a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左ほっぺ(赤) -->
  <path d="M 147 118 Q 140 112 138 122 Q 137 133 148 135 Q 158 135 160 124 Q 160 115 147 118 Z" fill="#e03030" stroke="#2d263c" stroke-width="4"/>
  <!-- 右ほっぺ(赤) -->
  <path d="M 213 118 Q 220 112 222 122 Q 223 133 212 135 Q 202 135 200 124 Q 200 115 213 118 Z" fill="#e03030" stroke="#2d263c" stroke-width="4"/>

  <!-- 左目 -->
  <ellipse cx="163" cy="110" rx="8" ry="5" fill="#2d263c"/>
  <ellipse cx="161" cy="108" rx="2.5" ry="2" fill="white"/>
  <!-- 右目 -->
  <ellipse cx="197" cy="110" rx="8" ry="5" fill="#2d263c"/>
  <ellipse cx="195" cy="108" rx="2.5" ry="2" fill="white"/>

  <!-- 口(ちょっとキリッと) -->
  <path d="M 172 128 Q 180 134 188 128" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 鼻 -->
