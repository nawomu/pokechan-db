<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body) -->
  <path d="M255 235 Q 320 220 328 165 Q 332 130 305 120 Q 320 145 305 175 Q 290 205 245 215 Z"
        fill="#f6c9d6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="312" cy="140" rx="16" ry="22" fill="#efe3c8" stroke="#2d263c" stroke-width="6"/>

  <!-- back legs -->
  <ellipse cx="240" cy="300" rx="26" ry="22" fill="#f4a9c1" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="238" cy="316" rx="22" ry="12" fill="#efe3c8" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="130" cy="300" rx="26" ry="22" fill="#f4a9c1" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="128" cy="316" rx="22" ry="12" fill="#efe3c8" stroke="#2d263c" stroke-width="6"/>

  <!-- body -->
  <ellipse cx="185" cy="240" rx="95" ry="72" fill="#f7b6cb" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- belly -->
  <ellipse cx="185" cy="262" rx="55" ry="38" fill="#f3e6c9" stroke="#2d263c" stroke-width="6"/>

  <!-- front legs -->
  <ellipse cx="255" cy="290" rx="24" ry="20" fill="#f4a9c1" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="253" cy="304" rx="20" ry="11" fill="#efe3c8" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="118" cy="290" rx="24" ry="20" fill="#f4a9c1" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="116" cy="304" rx="20" ry="11" fill="#efe3c8" stroke="#2d263c" stroke-width="6"/>

  <!-- ears -->
  <path d="M120 105 Q 108 68 132 62 Q 128 92 140 108 Z" fill="#f4a9c1" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M235 105 Q 250 66 226 60 Q 228 92 216 108 Z" fill="#f4a9c1" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- head -->
  <ellipse cx="178" cy="150" rx="88" ry="78" fill="#f7b6cb" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- muzzle / snout -->
  <ellipse cx="170" cy="188" rx="46" ry="30" fill="#f3e6c9" stroke="#2d263c" stroke-width="7"/>

  <!-- eyes (droopy, vacant) -->
  <path d="M135 128 Q 150 118 165 130" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="148" cy="140" r="7" fill="#2d263c"/>
  <path d="M195 128 Q 210 118 225 130" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="208" cy="140" r="7" fill="#2d263c"/>

  <!-- blank dopey mouth -->
  <path d="M148 200 Q 170 212 192 200" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- cheek blush (soft, minimal) -->
  <circle cx="112" cy="172" r="10" fill="#ef8fac" opacity="0.6"/>
  <circle cx="230" cy="172" r="10" fill="#ef8fac" opacity="0.6"/>
</svg>
