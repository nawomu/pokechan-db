<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴5項目
  1. 体色: 水色〜青緑(#5FD3D8系)の丸いボール状の体
  2. シルエット: 手足がほぼ無く、まん丸胴体に小さな翼が左右についただけの浮遊シルエット
  3. 模様: お腹はやや明るい水色、背中側は濃い水色の塗り分け
  4. 顔: 大きな三日月形(半月)の目が2つ、中央にハート型の大きな鼻
  5. その他: 左右に小さな菱形っぽい翼、下にちょこんと小さい足2本
  -->

  <!-- 後ろ: 左右の翼(体の後ろ側) -->
  <path d="M70 190 C40 170, 30 200, 45 225 C60 245, 90 235, 100 210 Z"
        fill="#3FB0BC" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M290 190 C320 170, 330 200, 315 225 C300 245, 270 235, 260 210 Z"
        fill="#3FB0BC" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体: まん丸胴体 -->
  <circle cx="180" cy="200" r="105" fill="#63D6DD" stroke="#2d263c" stroke-width="8"/>

  <!-- お腹の明るい水色パッチ -->
  <ellipse cx="180" cy="235" rx="62" ry="48" fill="#A9EEF0" stroke="#2d263c" stroke-width="6"/>

  <!-- 背中側の濃い水色の塗り分け(頭頂〜背中) -->
  <path d="M95 150 C120 95, 240 95, 265 150 C230 130, 130 130, 95 150 Z"
        fill="#2E9AA6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 小さい足2本 -->
  <path d="M150 295 Q148 315 140 320" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M210 295 Q212 315 220 320" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="137" cy="323" rx="10" ry="6" fill="#3FB0BC" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="223" cy="323" rx="10" ry="6" fill="#3FB0BC" stroke="#2d263c" stroke-width="6"/>

  <!-- 顔: 大きな三日月形の目(左右) -->
  <path d="M120 175 C130 160, 155 160, 160 178 C150 172, 128 172, 120 175 Z"
        fill="#2d263c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M240 175 C230 160, 205 160, 200 178 C210 172, 232 172, 240 175 Z"
        fill="#2d263c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔: 中央の大きなハート型の鼻 -->
  <path d="M180 215
           C165 195, 135 200, 135 222
           C135 242, 165 255, 180 268
           C195 255, 225 242, 225 222
           C225 200, 195 195, 180 215 Z"
        fill="#F06D8E" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ほっぺの丸い赤み(左右) -->
  <circle cx="112" cy="205" r="12" fill="#F7A8B8" opacity="0.9"/>
  <circle cx="248" cy="205" r="12" fill="#F7A8B8" opacity="0.9"/>
</svg>
