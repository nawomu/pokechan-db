<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ノクタス(Cacturne)の特徴:
    1. 麦わら帽子のようなとがった三角帽(茶色・房飾りつき)
    2. 濃い緑のサボテン体・全身にトゲトゲ
    3. かかしのように横に伸びた腕(先端は針状に尖る)
    4. 光る赤い目と小さい口(不気味な案山子顔)
    5. 帽子の下から出るワラ(ひげ)状の毛・細い脚
  -->
  <!-- 後ろ: 帽子の陰影 -->
  <ellipse cx="180" cy="150" rx="98" ry="26" fill="#8a6a3a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 脚(体の後ろ側扱い・先に描く) -->
  <path d="M150 260 L140 320 L165 322 L168 265 Z" fill="#3f6b32" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M210 260 L222 320 L197 323 L192 265 Z" fill="#3f6b32" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 腕(左・かかしのように横に伸びる、先端トゲ) -->
  <path d="M130 200 L48 175 L60 160 L135 178 Z" fill="#3f6b32" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M48 175 L28 158" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M50 178 L32 172" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M55 190 L38 196" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 腕(右) -->
  <path d="M230 200 L312 175 L300 160 L225 178 Z" fill="#3f6b32" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M312 175 L332 158" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M310 178 L328 172" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M305 190 L322 196" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 体(サボテン・ずんぐり台形) -->
  <path d="M138 195 Q180 178 222 195 L232 275 Q180 300 128 275 Z" fill="#4a7c3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体のトゲ模様(縦スジ・列) -->
  <path d="M180 195 L180 292" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M155 198 L150 285" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M205 198 L210 285" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M143 210 L154 205" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M217 210 L206 205" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M140 240 L152 236" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M220 240 L208 236" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- ワラ状の毛(帽子の下から出るひげ) -->
  <path d="M150 168 L140 195" stroke="#c9a24a" stroke-width="6" stroke-linecap="round"/>
  <path d="M165 165 L160 192" stroke="#c9a24a" stroke-width="6" stroke-linecap="round"/>
  <path d="M195 165 L200 192" stroke="#c9a24a" stroke-width="6" stroke-linecap="round"/>
  <path d="M210 168 L220 195" stroke="#c9a24a" stroke-width="6" stroke-linecap="round"/>

  <!-- 顔(帽子のすき間から見える暗い顔) -->
  <ellipse cx="180" cy="182" rx="45" ry="26" fill="#2f5426" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(光る赤い目) -->
  <ellipse cx="163" cy="180" rx="9" ry="11" fill="#e6362b" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="197" cy="180" rx="9" ry="11" fill="#e6362b" stroke="#2d263c" stroke-width="5"/>

  <!-- 口(小さくギザギザ) -->
  <path d="M168 196 L174 200 L180 195 L186 200 L192 196" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 帽子(麦わら・とがった三角) -->
  <path d="M180 60 L246 158 L114 158 Z" fill="#c9a24a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="180" cy="158" rx="80" ry="16" fill="#d9b869" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 帽子の房飾り(左右にワラ) -->
  <path d="M118 155 L104 172" stroke="#a9832f" stroke-width="6" stroke-linecap="round"/>
  <path d="M242 155 L256 172" stroke="#a9832f" stroke-width="6" stroke-linecap="round"/>
</svg>
