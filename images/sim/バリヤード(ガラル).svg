<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)氷色の体・ドレス状の下半身 2)頭からとがる氷のツンツン髪 3)胸のピンクのひし形ジェム 4)先がとがった氷の手 5)ニヤッと笑う口元 -->

  <!-- 後ろ髪(左右にとがる氷色の髪) -->
  <path d="M116,74 Q84,152 100,234 Q126,188 140,110 Q128,88 116,74 Z" fill="#a7d8ec" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M244,74 Q276,152 260,234 Q234,188 220,110 Q232,88 244,74 Z" fill="#a7d8ec" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ドレス本体(体・氷色) -->
  <path d="M148,128 Q104,182 74,300 Q180,336 286,300 Q256,182 212,128 Q180,150 148,128 Z" fill="#dff3fa" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ドレス裾のライン(濃い氷色) -->
  <path d="M74,300 Q180,336 286,300 Q280,314 180,330 Q80,314 74,300 Z" fill="#7cc4de" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胸元の切込み -->
  <path d="M164,132 Q180,150 196,132 Q188,168 180,178 Q172,168 164,132 Z" fill="#7cc4de" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左腕(氷のとがった手) -->
  <path d="M148,150 Q106,182 96,236" fill="none" stroke="#2d263c" stroke-width="15" stroke-linecap="round"/>
  <path d="M148,150 Q106,182 96,236" fill="none" stroke="#dff3fa" stroke-width="10" stroke-linecap="round"/>
  <polygon points="80,224 100,232 96,254 76,246" fill="#a7d8ec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 右腕(氷のとがった手) -->
  <path d="M212,150 Q254,182 264,236" fill="none" stroke="#2d263c" stroke-width="15" stroke-linecap="round"/>
  <path d="M212,150 Q254,182 264,236" fill="none" stroke="#dff3fa" stroke-width="10" stroke-linecap="round"/>
  <polygon points="280,224 260,232 264,254 284,246" fill="#a7d8ec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胸のピンクのひし形ジェム -->
  <polygon points="180,158 198,206 180,232 162,206" fill="#f4a0c0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <line x1="180" y1="158" x2="180" y2="216" stroke="#d97fa4" stroke-width="4" stroke-linecap="round"/>

  <!-- 首 -->
  <rect x="168" y="118" width="24" height="20" rx="6" fill="#dff3fa" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭 -->
  <circle cx="180" cy="92" r="46" fill="#dff3fa" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭頂のとがった氷ヘア(左右に鋭くツンツン) -->
  <path d="M134,84 Q126,36 158,34 Q168,58 180,52 Q192,58 202,34 Q234,36 226,84 Q214,50 180,50 Q146,50 134,84 Z" fill="#a7d8ec" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 片目を隠す氷の房(とがった形) -->
  <path d="M150,66 Q126,122 148,178 Q170,124 160,68 Z" fill="#a7d8ec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 見えている方の目(ニヤリとした細目) -->
  <path d="M194,90 Q202,82 212,90" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <circle cx="203" cy="98" r="3" fill="#2d263c"/>

  <!-- ニヤッと笑う口元 -->
  <path d="M190,114 Q202,126 216,112" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
