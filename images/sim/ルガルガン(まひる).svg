<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- Shadow under body -->
  <!-- Body (main torso) - four-legged wolf standing, slightly angled -->
  <!-- Back legs -->
  <polygon points="240,240 255,240 265,295 248,298 238,270" fill="#8B3A1A" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <polygon points="265,295 248,298 252,310 270,310" fill="#C8936A" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- back leg 2 -->
  <polygon points="215,242 230,242 240,292 224,296 215,268" fill="#9E4520" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <polygon points="240,292 224,296 228,308 244,308" fill="#C8936A" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Tail with rock spike at tip -->
  <path d="M245,220 C270,210 295,195 305,175 C315,158 308,148 298,152 C288,156 280,170 265,182 C252,192 245,205 243,218" fill="#A0522D" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- tail rock spikes -->
  <polygon points="298,152 308,138 318,148 308,158" fill="#E8E0D0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="304,144 314,132 322,142 312,152" fill="#D8D0C0" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- Main body torso -->
  <ellipse cx="185" cy="228" rx="78" ry="42" fill="#C17B3A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- Belly white patch -->
  <ellipse cx="170" cy="240" rx="42" ry="22" fill="#F0EAD8" stroke="none"/>

  <!-- Front legs -->
  <!-- front leg back -->
  <polygon points="130,248 144,248 150,300 133,304 124,274" fill="#8B3A1A" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <polygon points="150,300 133,304 137,314 153,312" fill="#C8936A" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- front leg front -->
  <polygon points="108,245 122,245 128,298 112,302 103,272" fill="#9E4520" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <polygon points="128,298 112,302 116,312 132,310" fill="#C8936A" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Neck -->
  <path d="M125,215 C118,205 115,192 118,180 C121,168 132,162 145,160 C158,158 168,162 172,172 C176,182 172,198 165,210 C155,222 138,222 125,215Z" fill="#C17B3A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- White rock spikes around neck - mane! -->
  <!-- spike 1 front-bottom -->
  <polygon points="120,215 108,228 118,238 130,222" fill="#EEEAE0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- spike 2 -->
  <polygon points="112,202 98,210 106,222 120,214" fill="#E8E4D8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- spike 3 top-front -->
  <polygon points="115,188 100,192 105,206 118,200" fill="#F2EEE4" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- spike 4 top -->
  <polygon points="128,170 118,158 128,152 140,162" fill="#EEEAE0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- spike 5 top-back -->
  <polygon points="145,165 142,150 154,148 158,162" fill="#E8E4D8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- spike 6 back -->
  <polygon points="162,172 165,158 176,162 172,176" fill="#F0EDE3" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- spike 7 back-lower -->
  <polygon points="168,188 175,178 184,185 178,198" fill="#EEEAE0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- small spike fill -->
  <polygon points="108,218 95,222 100,232 112,226" fill="#E8E4D8" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- Head -->
  <ellipse cx="148" cy="148" rx="42" ry="36" fill="#C17B3A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- Long muzzle - pointing slightly right/forward -->
  <path d="M158,155 C170,150 198,148 212,152 C222,155 224,163 218,170 C212,177 196,178 180,176 C164,174 154,168 154,162Z" fill="#D4895A" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- Nose tip -->
  <ellipse cx="215" cy="158" rx="9" ry="7" fill="#3A1A0A" stroke="#2d263c" stroke-width="4"/>
  <!-- Nostril highlight -->
  <ellipse cx="213" cy="156" rx="3" ry="2" fill="#5A3020"/>

  <!-- Mouth line -->
  <path d="M212,164 C208,170 200,174 192,173" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- small fang -->
  <polygon points="200,170 204,178 196,178" fill="#F5F2E8" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- Ears - pointy and large -->
  <!-- left ear (back) -->
  <polygon points="120,132 108,88 138,98 136,132" fill="#A0522D" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="122,128 114,98 134,106 132,128" fill="#E8A090" stroke="none"/>
  <!-- right ear -->
  <polygon points="152,126 148,80 175,92 170,128" fill="#C17B3A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="154,122 152,90 170,100 167,124" fill="#E8A090" stroke="none"/>

  <!-- Eyes - fierce orange-red -->
  <!-- eye socket -->
  <ellipse cx="163" cy="143" rx="12" ry="10" fill="#1A0A05" stroke="#2d263c" stroke-width="4"/>
  <!-- iris orange-red -->
  <ellipse cx="164" cy="143" rx="9" ry="8" fill="#E84820"/>
  <!-- pupil -->
  <ellipse cx="165" cy="143" rx="5" ry="6" fill="#1A0A05"/>
  <!-- eye shine -->
  <ellipse cx="162" cy="140" rx="2.5" ry="2" fill="#FFFFFF"/>

  <!-- eyebrow line - stern expression -->
  <path d="M155,134 C159,130 168,130 174,133" stroke="#5A2810" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Forehead rock / gem marking -->
  <polygon points="148,118 142,108 152,104 160,110 156,120" fill="#E8E0D0" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- Back line / spine ridge -->
  <path d="M148,186 C160,182 185,185 210,190 C230,194 245,205 248,218" stroke="#8B3A1A" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- leg fur markings (darker bands) -->
  <path d="M112,260 C115,258 122,258 125,260" stroke="#7A2810" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M133,262 C136,260 143,260 146,262" stroke="#7A2810" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M220,260 C224,258 232,258 235,260" stroke="#7A2810" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M242,262 C246,260 252,260 255,262" stroke="#7A2810" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>