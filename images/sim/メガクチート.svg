<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 影 -->
  <ellipse cx="180" cy="310" rx="55" ry="12" fill="#00000022"/>

  <!-- 顎1 (左上方向) -->
  <g stroke="#2d263c" stroke-linejoin="round" stroke-linecap="round">
    <path d="M160,155 Q80,80 60,40 Q40,10 70,20 Q100,30 120,60 L140,100 Z"
          fill="#1a1a1a" stroke-width="7"/>
    <!-- 歯1 -->
    <path d="M70,22 L80,45 L90,22 L100,48 L110,22 L120,50 L130,25"
          fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- 顎2 (右上方向) -->
  <g stroke="#2d263c" stroke-linejoin="round" stroke-linecap="round">
    <path d="M200,155 Q270,75 300,35 Q325,5 300,18 Q270,32 248,62 L228,100 Z"
          fill="#1a1a1a" stroke-width="7"/>
    <!-- 歯2 -->
    <path d="M298,20 L285,44 L274,18 L262,46 L250,20 L240,47 L228,22"
          fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- 黒い長い団子ヘア -->
  <ellipse cx="180" cy="140" rx="18" ry="28" fill="#1a1a1a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="180" cy="108" rx="12" ry="14" fill="#1a1a1a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="180" cy="258" rx="38" ry="45" fill="#fffef0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="185" rx="32" ry="30" fill="#fffcc0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 目 -->
  <!-- 左目 -->
  <circle cx="168" cy="183" r="7" fill="white" stroke="#2d263c" stroke-width="3"/>
  <circle cx="169" cy="184" r="4" fill="#111111"/>
  <circle cx="171" cy="182" r="1.5" fill="white"/>
  <!-- 右目 -->
  <circle cx="192" cy="183" r="7" fill="white" stroke="#2d263c" stroke-width="3"/>
  <circle cx="193" cy="184" r="4" fill="#111111"/>
  <circle cx="195" cy="182" r="1.5" fill="white"/>

  <!-- 口 (小さなかわいい口) -->
  <path d="M175,196 Q180,201 185,196" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- 腕 左 -->
  <ellipse cx="143" cy="265" rx="13" ry="10" fill="#fffef0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-20,143,265)"/>
  <!-- 腕 右 -->
  <ellipse cx="217" cy="265" rx="13" ry="10" fill="#fffef0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(20,217,265)"/>

  <!-- 足 左 -->
  <ellipse cx="163" cy="300" rx="12" ry="9" fill="#fffef0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 足 右 -->
  <ellipse cx="197" cy="300" rx="12" ry="9" fill="#fffef0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
</svg>
