  <!-- lower jaw (white) -->
  <path d="M226 92 Q244 112 270 108 Q258 122 236 118 Q222 112 226 92 Z"
        fill="#eef8fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ice horn on head -->
  <path d="M244 44 Q241 30 256 26 Q266 38 259 52 Z" fill="#eef8fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- signature crossed ice tusks -->
  <path d="M232 96 Q210 118 176 128 Q206 116 218 132 Q198 138 168 150 Q204 132 226 108 Z"
        fill="#eaf7fc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M252 100 Q246 130 218 156 Q244 136 258 148 Q234 158 210 176 Q244 154 260 122 Z"
        fill="#eaf7fc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- eye -->
  <ellipse cx="258" cy="58" rx="9" ry="7" fill="#fff3b0" stroke="#2d263c" stroke-width="5"/>
  <circle cx="260" cy="58" r="3" fill="#2d263c"/>

  <!-- nostril -->
  <circle cx="286" cy="62" r="3" fill="#2d263c"/>
</svg>
