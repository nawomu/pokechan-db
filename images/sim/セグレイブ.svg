  <path d="M168 172 Q188 160 210 176 Q222 210 202 244 Q182 258 164 240 Q150 206 168 172 Z"
        fill="#eef8fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- back spikes -->
  <path d="M170 122 Q166 100 182 90 Q186 112 182 128 Z" fill="#5f9fc9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M200 116 Q198 92 216 82 Q222 106 214 124 Z" fill="#5f9fc9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M232 128 Q233 104 252 96 Q256 120 244 136 Z" fill="#5f9fc9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- neck -->
  <path d="M215 128 Q228 96 245 78 Q252 108 240 138 Z"
        fill="#bfe4f2" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- head -->
  <path d="M212 62 Q206 40 226 30 Q262 18 288 38 Q304 52 298 76 Q292 100 264 108 Q238 114 220 96 Q206 82 212 62 Z"
