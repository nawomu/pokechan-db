  <path d="M196 310 Q191 326 212 326 Q233 326 230 310 Z"
        fill="#3f6f95" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- front leg -->
  <path d="M132 258 Q128 288 122 312 L152 312 Q157 288 153 258 Z"
