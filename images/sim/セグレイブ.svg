  <!-- small arm -->
  <path d="M136 200 Q108 210 92 232" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="88" cy="237" rx="12" ry="10" fill="#8fc6de" stroke="#2d263c" stroke-width="6"/>

  <!-- body -->
  <path d="M120 258 Q88 220 100 175 Q112 130 165 118 Q222 106 252 148 Q278 184 258 226 Q236 268 185 272 Q145 274 120 258 Z"
        fill="#bfe4f2" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

