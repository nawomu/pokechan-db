<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 1 leek blade (green, held behind/beside body) -->
  <polygon points="251,175 273,175 266,50 258,50" fill="#8FC93A" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 2 leek vein line -->
  <path d="M262,172 L263,58" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 3 leek white base -->
  <rect x="250" y="175" width="22" height="45" rx="10" fill="#F5F0DE" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 4 tail -->
  <polygon points="140,295 122,322 158,312" fill="#C99B5C" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 5 body -->
  <ellipse cx="180" cy="225" rx="75" ry="85" fill="#FBEFD1" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 6 left wing -->
  <path d="M108,195 Q88,225 102,265 Q128,255 132,215 Z" fill="#C99B5C" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 7 right wing (holds leek) -->
  <path d="M252,185 Q278,205 268,245 Q246,240 242,205 Z" fill="#C99B5C" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 8 left wing feather detail -->
  <path d="M105,212 Q115,230 108,250" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 9 right wing feather detail -->
  <path d="M255,202 Q262,220 258,238" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 10 left leg -->
  <line x1="160" y1="305" x2="160" y2="325" stroke="#F0932B" stroke-width="14" stroke-linecap="round"/>
  <!-- 11 right leg -->
  <line x1="200" y1="305" x2="200" y2="325" stroke="#F0932B" stroke-width="14" stroke-linecap="round"/>
  <!-- 12 left foot -->
  <path d="M146,323 Q160,338 174,323 Q160,331 146,323 Z" fill="#F0932B" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 13 right foot -->
  <path d="M186,323 Q200,338 214,323 Q200,331 186,323 Z" fill="#F0932B" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 14 head -->
  <circle cx="180" cy="110" r="55" fill="#C99B5C" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 15 face overlay -->
  <ellipse cx="180" cy="132" rx="42" ry="38" fill="#FBEFD1" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 16 left eye -->
  <circle cx="161" cy="120" r="7" fill="#2d263c"/>
  <!-- 17 right eye -->
  <circle cx="199" cy="120" r="7" fill="#2d263c"/>
  <!-- 18 left eye highlight -->
  <circle cx="164" cy="117" r="2.4" fill="#FFFFFF"/>
  <!-- 19 right eye highlight -->
  <circle cx="202" cy="117" r="2.4" fill="#FFFFFF"/>
  <!-- 20 beak -->
  <polygon points="162,148 198,148 193,168 167,168" fill="#F0932B" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 21 beak line -->
  <path d="M164,158 L196,158" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
