  <!-- shell segment lines -->
  <path d="M112,175 Q180,150 248,175" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M100,215 Q180,235 260,215" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M180,105 L180,300" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" opacity="0.55"/>

  <!-- shell spots -->
  <circle cx="135" cy="195" r="9" fill="#33459a"/>
  <circle cx="225" cy="195" r="9" fill="#33459a"/>
  <circle cx="180" cy="245" r="9" fill="#33459a"/>

  <!-- front legs -->
  <path d="M118,265 Q80,285 68,320 Q65,330 75,332 Q88,334 95,318 Q108,295 128,282" fill="#241f33" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M242,265 Q280,285 292,320 Q295,330 285,332 Q272,334 265,318 Q252,295 232,282" fill="#241f33" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- yellow belly -->
