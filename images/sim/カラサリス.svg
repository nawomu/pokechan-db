  <path d="M163,245 Q180,270 197,245" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" opacity="0.6"/>

  <!-- eyes -->
  <circle cx="150" cy="168" r="15" fill="#e63946" stroke="#2d263c" stroke-width="6"/>
  <circle cx="210" cy="168" r="15" fill="#e63946" stroke="#2d263c" stroke-width="6"/>
  <circle cx="154" cy="164" r="4" fill="#241f33"/>
  <circle cx="214" cy="164" r="4" fill="#241f33"/>

  <!-- tiny mandibles -->
  <path d="M165,205 Q180,215 195,205" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
