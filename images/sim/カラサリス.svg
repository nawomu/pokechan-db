<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- back legs -->
  <path d="M100,235 Q60,240 45,270 Q42,278 50,280 Q62,282 70,268 Q85,250 108,250" fill="#241f33" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M260,235 Q300,240 315,270 Q318,278 310,280 Q298,282 290,268 Q275,250 252,250" fill="#241f33" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- body shell (drawn before front details) -->
