<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- カットロトム: 芝刈り機に憑依したロトム -->

  <!-- 回転ブレード(後ろ層)左 -->
  <ellipse cx="120" cy="270" rx="48" ry="16" fill="#5db836" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-30 120 270)"/>
  <!-- 回転ブレード 右 -->
  <ellipse cx="240" cy="270" rx="48" ry="16" fill="#5db836" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(30 240 270)"/>

  <!-- 芝刈り機ベース部分 -->
  <rect x="108" y="255" width="144" height="40" rx="14" ry="14" fill="#4caa28" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- ベースのディテール線 -->
  <line x1="150" y1="258" x2="150" y2="292" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="210" y1="258" x2="210" y2="292" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 中央ブレードハブ -->
  <circle cx="180" cy="275" r="14" fill="#78d840" stroke="#2d263c" stroke-width="6"/>
  <circle cx="180" cy="275" r="6" fill="#2d263c"/>

  <!-- 体(メインボディ) -->
  <ellipse cx="180" cy="178" rx="78" ry="86" fill="#78d840" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の色(少し明るめ) -->
  <ellipse cx="180" cy="195" rx="48" ry="52" fill="#a0e860"/>

  <!-- 体の縞模様 -->
  <path d="M148 155 Q180 148 212 155" fill="none" stroke="#4caa28" stroke-width="5" stroke-linecap="round"/>
  <path d="M142 175 Q180 167 218 175" fill="none" stroke="#4caa28" stroke-width="5" stroke-linecap="round"/>

  <!-- プラズマ模様(体内の紫光) -->
  <ellipse cx="165" cy="210" rx="10" ry="16" fill="#c080f0" opacity="0.6"/>
  <ellipse cx="195" cy="215" rx="8" ry="13" fill="#c080f0" opacity="0.6"/>

  <!-- 腕(左) ぷにっとした感じ -->
  <path d="M110 165 Q78 148 68 172 Q62 192 88 200 Q106 205 118 190" fill="#78d840" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 腕先の爪(左) -->
  <path d="M75 178 Q60 168 62 155" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M68 188 Q50 182 55 169" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 腕(右) ちょっと非対称 -->
  <path d="M250 170 Q285 152 295 178 Q300 200 272 206 Q254 208 244 192" fill="#78d840" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 腕先の爪(右) -->
  <path d="M287 182 Q302 170 298 158" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M292 194 Q308 188 305 174" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 頭の角(触角っぽい左) ちょっと曲がって味のある形 -->
  <path d="M155 105 Q140 72 128 55 Q120 44 132 42 Q145 40 148 65 Q152 85 158 98" fill="#78d840" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 角先の光玉 -->
  <circle cx="129" cy="50" r="9" fill="#e0ff80" stroke="#2d263c" stroke-width="5"/>

  <!-- 頭の角(右) -->
  <path d="M205 100 Q222 65 238 50 Q248 40 255 48 Q260 58 245 65 Q228 74 218 95" fill="#78d840" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 角先の光玉 -->
  <circle cx="250" cy="52" r="9" fill="#e0ff80" stroke="#2d263c" stroke-width="5"/>

  <!-- 耳みたいな突起(左頭) -->
  <path d="M140 118 Q118 100 122 88 Q128 78 142 92 Q150 104 148 115" fill="#78d840" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 耳突起(右) ちょっと大きめ非対称 -->
  <path d="M220 112 Q245 92 248 82 Q254 72 244 76 Q232 82 226 100 Q222 108 220 112" fill="#78d840" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔:目(左) ギョロ目 -->
  <ellipse cx="158" cy="170" rx="22" ry="24" fill="white" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="161" cy="172" rx="14" ry="15" fill="#ff4040"/>
  <ellipse cx="161" cy="172" rx="8" ry="9" fill="#1a0a2e"/>
  <!-- 目の光 -->
  <circle cx="155" cy="167" r="4" fill="white"/>
  <circle cx="165" cy="175" r="2" fill="white"/>

  <!-- 顔:目(右) 少し違うサイズで落書き感 -->
  <ellipse cx="202" cy="168" rx="20" ry="22" fill="white" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="205" cy="170" rx="13" ry="14" fill="#ff4040"/>
  <ellipse cx="205" cy="170" rx="7" ry="8" fill="#1a0a2e"/>
  <!-- 目の光 -->
  <circle cx="199" cy="165" r="3" fill="white"/>
  <circle cx="209" cy="173" r="2" fill="white"/>

  <!-- 顔:ニヤリ口 悪そうな笑い -->
  <path d="M162 200 Q172 212 180 215 Q190 218 200 210 Q206 204 208 198" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- 歯(ギザギザ少し) -->
  <path d="M170 206 L173 213 L177 206 L181 213 L185 206 L189 213 L193 207" fill="none" stroke="#2d263c" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ほっぺの電気マーク(左) -->
  <ellipse cx="138" cy="190" rx="13" ry="10" fill="#ffe030" opacity="0.85" stroke="#2d263c" stroke-width="3"/>
  <!-- ほっぺ(右) -->
  <ellipse cx="224" cy="188" rx="12" ry="9" fill="#ffe030" opacity="0.85" stroke="#2d263c" stroke-width="3"/>

  <!-- 眉毛(ちょっとへの字で意地悪顔) -->
  <path d="M145 152 Q160 145 172 150" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M190 148 Q202 143 215 150" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>