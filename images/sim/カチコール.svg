<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)角張った氷の塊胴体 2)白水色で面(ファセット)が見える 3)頭上と横に氷の尖角 4)2本の短い脚 5)正面に顔(目・口) -->

  <!-- 左の尖角(横) -->
  <path d="M95,180 L60,160 L100,195 Z" fill="#bfe6f2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右の尖角(横) -->
  <path d="M265,180 L300,160 L260,195 Z" fill="#bfe6f2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 頭上の尖角 -->
  <path d="M165,95 L180,55 L195,95 Z" fill="#bfe6f2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 脚(2本・短い氷) -->
  <path d="M145,265 L140,305 L165,305 L168,268 Z" fill="#d8eef5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M215,265 L195,268 L195,305 L220,305 Z" fill="#d8eef5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体(氷の塊・角張り) -->
  <path d="M120,105 L240,105 L265,180 L255,250 Q180,275 105,250 L95,180 Z" fill="#d8eef5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ファセット(面の線) -->
  <path d="M120,105 L180,180 L240,105 M180,180 L105,250 M180,180 L255,250 M180,180 L180,105" fill="none" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" opacity="0.5"/>

  <!-- てかり(光沢) -->
  <path d="M140,125 L165,115 L155,150 Z" fill="#ffffff" opacity="0.7"/>

  <!-- 左目 -->
  <ellipse cx="158" cy="205" rx="13" ry="15" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="160" cy="208" r="6" fill="#2d263c"/>
  <circle cx="158" cy="205" r="2.5" fill="#ffffff"/>
  <!-- 右目 -->
  <ellipse cx="202" cy="205" rx="13" ry="15" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="200" cy="208" r="6" fill="#2d263c"/>
  <circle cx="198" cy="205" r="2.5" fill="#ffffff"/>

  <!-- 口(小) -->
  <path d="M172,235 Q180,242 188,235" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
