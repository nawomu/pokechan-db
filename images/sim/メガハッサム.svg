<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 翼(後ろ) 左右 -->
  <polygon points="180,130 110,60 90,120 140,150" fill="#BB1111" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="180,130 250,60 270,120 220,150" fill="#BB1111" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 翼 小さい下の対 -->
  <polygon points="170,155 105,150 95,185 150,175" fill="#CC2222" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="190,155 255,150 265,185 210,175" fill="#CC2222" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <ellipse cx="180" cy="210" rx="52" ry="65" fill="#CC2222" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹部の模様(縦線) -->
  <line x1="165" y1="185" x2="163" y2="255" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="180" y1="182" x2="180" y2="258" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="195" y1="185" x2="197" y2="255" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- お腹の明るい部分 -->
  <ellipse cx="180" cy="222" rx="28" ry="38" fill="#F0E8C0" stroke="#2d263c" stroke-width="6"/>

  <!-- 首 -->
  <rect x="163" y="148" width="34" height="28" rx="8" fill="#CC2222" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭部 -->
  <ellipse cx="180" cy="128" rx="45" ry="40" fill="#CC2222" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 触角 左 -->
  <line x1="152" y1="100" x2="118" y2="58" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="115" cy="55" r="7" fill="#CC2222" stroke="#2d263c" stroke-width="5"/>
  <!-- 触角 右(ちょっとずれてバランス悪く) -->
  <line x1="210" y1="98" x2="248" y2="60" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="252" cy="57" r="7" fill="#CC2222" stroke="#2d263c" stroke-width="5"/>

  <!-- 複眼 左 -->
  <ellipse cx="160" cy="125" rx="16" ry="14" fill="#111111" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="157" cy="121" rx="5" ry="4" fill="#444444"/>
  <!-- 複眼 右(微妙に大きさ違う=子ども感) -->
  <ellipse cx="202" cy="126" rx="18" ry="13" fill="#111111" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="199" cy="122" rx="5" ry="4" fill="#444444"/>

  <!-- 口(ちょっとニヤリ) -->
  <path d="M168,143 Q180,152 192,143" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 左腕 -->
  <path d="M133,195 Q95,185 78,210" fill="none" stroke="#CC2222" stroke-width="20" stroke-linecap="round"/>
  <!-- 左ハサミ 上の刃 -->
  <path d="M78,210 Q45,175 28,188 Q55,215 78,218" fill="#CC2222" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左ハサミ 下の刃 -->
  <path d="M78,218 Q42,228 35,248 Q62,238 82,228" fill="#BB1111" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左ハサミの目玉模様 -->
  <circle cx="55" cy="205" r="13" fill="#F0E8C0" stroke="#2d263c" stroke-width="5"/>
  <circle cx="55" cy="205" r="6" fill="#1a1a1a"/>
  <circle cx="51" cy="201" r="2.5" fill="white"/>

  <!-- 右腕 -->
  <path d="M227,195 Q265,183 282,208" fill="none" stroke="#CC2222" stroke-width="20" stroke-linecap="round"/>
  <!-- 右ハサミ 上の刃 -->
  <path d="M282,208 Q315,172 334,186 Q308,214 282,217" fill="#CC2222" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右ハサミ 下の刃 -->
  <path d="M282,217 Q320,225 328,246 Q300,235 278,226" fill="#BB1111" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右ハサミの目玉模様(ちょっとズレた位置=ゆるさ) -->
  <circle cx="308" cy="202" r="14" fill="#F0E8C0" stroke="#2d263c" stroke-width="5"/>
  <circle cx="310" cy="203" r="7" fill="#1a1a1a"/>
  <circle cx="306" cy="199" r="2.5" fill="white"/>

  <!-- 脚 左 -->
  <path d="M158,268 Q148,300 138,320" stroke="#CC2222" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M138,320 Q125,330 115,325 Q130,313 135,308" fill="#BB1111" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 脚 右 -->
  <path d="M202,268 Q212,300 222,320" stroke="#CC2222" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M222,320 Q235,330 245,325 Q230,313 225,308" fill="#BB1111" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

</svg>