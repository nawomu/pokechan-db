<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.白くふわふわの丸い体(天使/鳩のような姿) 2.頭の上に緑のドーム状のかぶと 3.顔の両脇に垂れた緑の羽根飾り(耳のよう) 4.おでこに赤×青の三角の宝石模様 5.体の横に大きく広がる白×水色の翼、小さいオレンジの脚とくちばし -->

  <!-- 後ろ: 翼 -->
  <path d="M150,225 C95,205 40,165 55,100 C68,58 122,68 142,112 C156,143 152,190 150,225 Z"
        fill="#ffffff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M210,225 C265,205 320,165 305,100 C292,58 238,68 218,112 C204,143 208,190 210,225 Z"
        fill="#ffffff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="63" cy="108" rx="22" ry="36" fill="#5aabe0" stroke="#2d263c" stroke-width="6"
           transform="rotate(-18 63 108)"/>
  <ellipse cx="297" cy="108" rx="22" ry="36" fill="#5aabe0" stroke="#2d263c" stroke-width="6"
           transform="rotate(18 297 108)"/>

  <!-- しっぽ -->
  <path d="M162,285 C168,310 192,310 198,285 Z" fill="#ffffff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="180" cy="228" rx="80" ry="68" fill="#ffffff" stroke="#2d263c" stroke-width="8"/>
  <ellipse cx="150" cy="292" rx="18" ry="11" fill="#f0a030" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="210" cy="292" rx="18" ry="11" fill="#f0a030" stroke="#2d263c" stroke-width="6"/>

  <!-- 顔: 緑のかぶと -->
  <path d="M120,140 C120,85 148,55 180,55 C212,55 240,85 240,140 Z"
        fill="#8ecb5c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 顔まわりの垂れた緑の飾り(左右) -->
  <path d="M128,138 C108,158 100,182 118,196 C132,178 138,156 128,138 Z"
        fill="#8ecb5c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M232,138 C252,158 260,182 242,196 C228,178 222,156 232,138 Z"
        fill="#8ecb5c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 白い顔 -->
  <ellipse cx="180" cy="163" rx="60" ry="52" fill="#ffffff" stroke="#2d263c" stroke-width="7"/>

  <!-- おでこの宝石模様(赤+青) -->
  <path d="M168,80 L192,80 L180,104 Z" fill="#e5473e" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M172,102 L188,102 L180,120 Z" fill="#33489a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目 -->
  <circle cx="158" cy="168" r="9" fill="#1a1a2a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="202" cy="168" r="9" fill="#1a1a2a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="161" cy="165" r="3" fill="#ffffff"/>
  <circle cx="205" cy="165" r="3" fill="#ffffff"/>

  <!-- くちばし -->
  <path d="M170,188 L190,188 L180,203 Z" fill="#f0a030" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
</svg>
