<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴:
  1. 体色=赤オレンジ(#e8492a)の毛並み、顔・お腹・手足はクリーム色(#f7dfb0)
  2. 頭の上に赤い炎のようなタテガミ(逆立った葉/炎形)
  3. まん丸の頭に丸い耳、耳の中はクリーム色
  4. 長い尻尾がくるんとカーブ(体と同じ赤オレンジ)
  5. 黒い丸い目とクリーム色マズル、サルらしい愛嬌のある顔
  -->

  <!-- 尻尾(後ろ) -->
  <path d="M255 235 C 300 230, 320 190, 300 155 C 288 132, 262 128, 250 145"
        fill="#e8492a" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 後ろ足 -->
  <ellipse cx="140" cy="300" rx="30" ry="22" fill="#e8492a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="222" cy="300" rx="30" ry="22" fill="#e8492a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="140" cy="304" rx="14" ry="9" fill="#f7dfb0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="222" cy="304" rx="14" ry="9" fill="#f7dfb0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="181" cy="225" rx="72" ry="70" fill="#e8492a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹 -->
  <ellipse cx="181" cy="238" rx="42" ry="45" fill="#f7dfb0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腕 -->
  <ellipse cx="103" cy="212" rx="24" ry="46" transform="rotate(-18 103 212)" fill="#e8492a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="259" cy="212" rx="24" ry="46" transform="rotate(18 259 212)" fill="#e8492a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 手 -->
  <circle cx="90" cy="252" r="17" fill="#f7dfb0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="272" cy="252" r="17" fill="#f7dfb0" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭 -->
  <circle cx="181" cy="128" r="62" fill="#e8492a" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳 -->
  <circle cx="118" cy="108" r="22" fill="#e8492a" stroke="#2d263c" stroke-width="7"/>
  <circle cx="244" cy="108" r="22" fill="#e8492a" stroke="#2d263c" stroke-width="7"/>
  <circle cx="118" cy="108" r="10" fill="#f7dfb0" stroke="#2d263c" stroke-width="5"/>
  <circle cx="244" cy="108" r="10" fill="#f7dfb0" stroke="#2d263c" stroke-width="5"/>

  <!-- 頭の炎タテガミ -->
  <path d="M140 82 C 148 50, 168 40, 181 62 C 194 38, 216 48, 220 80 C 228 55, 246 58, 240 90 C 220 78, 205 68, 181 74 C 158 66, 148 76, 140 82 Z"
        fill="#f0812f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- マズル -->
  <ellipse cx="181" cy="150" rx="38" ry="30" fill="#f7dfb0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目 -->
  <circle cx="157" cy="122" r="11" fill="#2d263c"/>
  <circle cx="205" cy="122" r="11" fill="#2d263c"/>
  <circle cx="160" cy="118" r="3" fill="#ffffff"/>
  <circle cx="208" cy="118" r="3" fill="#ffffff"/>

  <!-- 鼻 -->
  <ellipse cx="181" cy="146" rx="6" ry="4" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M164 162 Q181 172 198 162" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
