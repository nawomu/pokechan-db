  <ellipse cx="126" cy="188" rx="18" ry="21" fill="#b490dc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="130" cy="270" rx="15" ry="13" fill="#b490dc" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M120 276 Q117 288 112 292 M130 280 Q130 292 130 296 M140 276 Q144 288 148 292" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

