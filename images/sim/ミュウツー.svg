  <ellipse cx="210" cy="84" rx="10" ry="8" fill="#8c5cc0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 首 -->
  <rect x="160" y="150" width="44" height="36" rx="14" fill="#a078c8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <path d="M182 44 Q246 50 250 118 Q252 156 214 176 Q188 190 158 176 Q118 156 118 112 Q120 52 182 44 Z" fill="#b490dc" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

