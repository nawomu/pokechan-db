  <ellipse cx="222" cy="336" rx="24" ry="12" fill="#8c5cc0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前脚(手前) -->
  <ellipse cx="150" cy="308" rx="28" ry="36" fill="#b490dc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="150" cy="340" rx="26" ry="13" fill="#8c5cc0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

