  <path d="M240 190 Q272 210 262 250 Q258 268 236 274" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="240" cy="190" rx="17" ry="20" fill="#a078c8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="236" cy="274" rx="14" ry="12" fill="#b490dc" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M226 280 Q224 292 220 296 M236 284 Q236 296 236 300 M246 280 Q249 292 253 296" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

