  <!-- 目(左) -->
  <ellipse cx="150" cy="112" rx="19" ry="16" fill="#3a2554" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="146" cy="107" rx="6" ry="5" fill="#c896f0"/>
  <!-- 目(右) -->
  <ellipse cx="212" cy="112" rx="19" ry="16" fill="#3a2554" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="216" cy="107" rx="6" ry="5" fill="#c896f0"/>

  <!-- 口もと -->
  <path d="M170 158 Q182 165 194 158" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
