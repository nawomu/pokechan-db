  <path d="M122 228 Q150 270 180 260 Q210 270 238 228 L216 250 L200 232 L180 270 L160 232 L144 250 Z" fill="#6db84f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- feet -->
  <ellipse cx="160" cy="292" rx="13" ry="9" fill="#a85f8c" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="200" cy="292" rx="13" ry="9" fill="#a85f8c" stroke="#2d263c" stroke-width="6"/>
</svg>
