<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- leafy calyx crown -->
  <path d="M180 38 L158 72 L172 75 L150 92 L168 93 L148 110 L180 98 L212 110 L192 93 L210 92 L188 75 L202 72 Z" fill="#6db84f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- head -->
  <ellipse cx="180" cy="142" rx="50" ry="48" fill="#c978a8" stroke="#2d263c" stroke-width="8"/>
  <!-- eyes -->
  <circle cx="162" cy="138" r="9" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="198" cy="138" r="9" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="163" cy="140" r="4" fill="#2d263c"/>
  <circle cx="199" cy="140" r="4" fill="#2d263c"/>
  <!-- cheeks -->
  <circle cx="151" cy="155" r="7" fill="#ef9fc0" stroke="#2d263c" stroke-width="4"/>
  <circle cx="209" cy="155" r="7" fill="#ef9fc0" stroke="#2d263c" stroke-width="4"/>
  <!-- smile -->
  <path d="M170 162 Q180 172 190 162" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- body -->
  <path d="M143 178 Q138 235 180 248 Q222 235 217 178 Z" fill="#c978a8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
