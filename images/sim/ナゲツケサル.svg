<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body) -->
  <path d="M200 260 Q240 290 250 320 Q255 340 240 345 Q228 350 225 335 Q222 320 215 305 Q205 285 200 270Z" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- tail pom-pom -->
  <ellipse cx="234" cy="344" rx="13" ry="11" fill="#f5f5f5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- green leaf belt -->
  <path d="M140 220 Q160 212 180 210 Q200 208 220 213 Q230 216 225 228 Q210 222 180 222 Q155 222 140 230Z" fill="#4a9c3f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M148 222 Q155 210 165 205 Q170 218 162 225Z" fill="#3a7c30" stroke="#2d263c" stroke-width="4"/>
  <path d="M178 210 Q182 198 192 196 Q194 210 185 216Z" fill="#3a7c30" stroke="#2d263c" stroke-width="4"/>
  <path d="M208 213 Q215 202 224 203 Q223 216 214 220Z" fill="#3a7c30" stroke="#2d263c" stroke-width="4"/>

  <!-- left leg -->
  <path d="M148 255 Q138 285 132 310 Q128 325 140 328 Q152 330 156 315 Q160 298 162 272Z" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- left foot -->
  <ellipse cx="138" cy="326" rx="18" ry="10" fill="#1a1a2e" stroke="#2d263c" stroke-width="6"/>
  <!-- right leg -->
  <path d="M200 258 Q210 288 215 312 Q218 327 206 330 Q194 332 190 317 Q187 300 185 274Z" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- right foot -->
  <ellipse cx="210" cy="328" rx="18" ry="10" fill="#1a1a2e" stroke="#2d263c" stroke-width="6"/>

  <!-- left arm (reaching out, holding berry) -->
  <path d="M142 175 Q112 185 95 200 Q80 215 84 228 Q88 235 98 230 Q110 215 128 204 Q148 192 158 182Z" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- left berry (green spiky ball) -->
  <circle cx="88" cy="234" r="17" fill="#5cb85c" stroke="#2d263c" stroke-width="6"/>
  <circle cx="88" cy="234" r="11" fill="#4a9c3f" stroke="none"/>
  <!-- berry spikes -->
  <line x1="88" y1="217" x2="88" y2="210" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="105" y1="234" x2="112" y2="234" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="71" y1="234" x2="64" y2="234" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="88" y1="251" x2="88" y2="258" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="222" x2="105" y2="216" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="76" y1="222" x2="71" y2="216" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- right arm (up, throwing pose) -->
  <path d="M215 170 Q248 150 268 138 Q282 128 288 140 Q292 150 278 158 Q258 168 238 180 Q222 190 210 185Z" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- right berry (being thrown) -->
  <circle cx="292" cy="136" r="15" fill="#5cb85c" stroke="#2d263c" stroke-width="6"/>
  <circle cx="292" cy="136" r="9" fill="#4a9c3f" stroke="none"/>
  <line x1="292" y1="121" x2="292" y2="114" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="307" y1="136" x2="314" y2="136" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="277" y1="136" x2="270" y2="136" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="292" y1="151" x2="292" y2="158" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- body -->
  <path d="M145 175 Q132 200 130 230 Q128 255 148 265 Q168 272 183 272 Q200 272 215 262 Q230 250 228 225 Q226 198 215 178 Q200 162 180 160 Q162 160 145 175Z" fill="#1a1a2e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- white chest/vest patch -->
  <path d="M155 188 Q158 180 180 178 Q202 178 205 188 Q212 210 208 235 Q205 248 183 250 Q162 250 157 236 Q152 218 155 188Z" fill="#f5f5f5" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- head (white face base) -->
  <ellipse cx="180" cy="135" rx="52" ry="50" fill="#f5f5f5" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- black mask / head top -->
  <path d="M130 120 Q133 85 165 74 Q180 68 195 74 Q228 85 230 120 Q228 110 215 105 Q198 98 180 98 Q162 98 145 105 Q132 110 130 120Z" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- left ear -->
  <ellipse cx="132" cy="112" rx="13" ry="16" fill="#1a1a2e" stroke="#2d263c" stroke-width="7"/>
  <!-- right ear -->
  <ellipse cx="228" cy="112" rx="13" ry="16" fill="#1a1a2e" stroke="#2d263c" stroke-width="7"/>

  <!-- black eye mask patch (around eyes, slightly lopsided for character) -->
  <ellipse cx="162" cy="130" rx="22" ry="17" fill="#1a1a2e" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="200" cy="128" rx="21" ry="18" fill="#1a1a2e" stroke="#2d263c" stroke-width="5"/>

  <!-- eyes (red, sharp) -->
  <ellipse cx="162" cy="129" rx="12" ry="11" fill="#d63030" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="200" cy="127" rx="11" ry="12" fill="#d63030" stroke="#2d263c" stroke-width="4"/>
  <!-- eye shine -->
  <ellipse cx="157" cy="124" rx="4" ry="3" fill="#ffffff" stroke="none"/>
  <ellipse cx="195" cy="122" rx="4" ry="3" fill="#ffffff" stroke="none"/>
  <!-- pupils -->
  <ellipse cx="164" cy="131" rx="5" ry="6" fill="#1a1a2e" stroke="none"/>
  <ellipse cx="202" cy="129" rx="5" ry="6" fill="#1a1a2e" stroke="none"/>

  <!-- nose (small, round) -->
  <ellipse cx="181" cy="148" rx="7" ry="5" fill="#c0a080" stroke="#2d263c" stroke-width="4"/>
  <!-- nostrils -->
  <ellipse cx="178" cy="149" rx="2" ry="2" fill="#8a6050" stroke="none"/>
  <ellipse cx="184" cy="149" rx="2" ry="2" fill="#8a6050" stroke="none"/>

  <!-- mouth (slightly lopsided grin for character) -->
  <path d="M168 158 Q180 167 194 157" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- motion lines near thrown berry -->
  <line x1="305" y1="120" x2="318" y2="112" stroke="#2d263c" stroke-width="4" stroke-linecap="round" stroke-dasharray="4,4"/>
  <line x1="308" y1="130" x2="322" y2="126" stroke="#2d263c" stroke-width="3" stroke-linecap="round" stroke-dasharray="3,4"/>
</svg>