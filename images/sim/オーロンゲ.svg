<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 影 -->
  <ellipse cx="180" cy="325" rx="80" ry="16" fill="#00000022"/>

  <!-- 巨大な青緑の髪(体全体を包む) -->
  <!-- 左の髪の塊 -->
  <path d="M48,210 Q28,182 35,148 Q42,115 68,102 Q92,90 118,98 Q138,105 148,128 Q158,152 152,178 Q145,205 125,218 Q98,230 72,222 Z" fill="#30C0A0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 右の髪の塊 -->
  <path d="M312,210 Q332,182 325,148 Q318,115 292,102 Q268,90 242,98 Q222,105 212,128 Q202,152 208,178 Q215,205 235,218 Q262,230 288,222 Z" fill="#30C0A0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の上の髪の束 -->
  <path d="M140,90 Q120,52 115,22 Q132,45 140,68 Q135,42 148,28 Q150,52 152,75 Q160,45 170,32 Q168,58 165,82 Z" fill="#30C0A0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M218,90 Q238,52 244,22 Q228,45 220,68 Q225,42 212,28 Q210,52 208,75 Q200,45 190,32 Q192,58 195,82 Z" fill="#30C0A0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 髪の先端の丸い塊(棍棒のよう) -->
  <ellipse cx="72" cy="150" rx="42" ry="38" fill="#28B095" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="288" cy="150" rx="42" ry="38" fill="#28B095" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 髪の模様(白い点) -->
  <circle cx="65" cy="145" r="8" fill="#A0FFE8" stroke="#2d263c" stroke-width="3"/>
  <circle cx="82" cy="160" r="6" fill="#A0FFE8" stroke="#2d263c" stroke-width="3"/>
  <circle cx="285" cy="145" r="8" fill="#A0FFE8" stroke="#2d263c" stroke-width="3"/>
  <circle cx="268" cy="160" r="6" fill="#A0FFE8" stroke="#2d263c" stroke-width="3"/>

  <!-- 体(暗紫) -->
  <path d="M138,195 Q130,222 135,258 Q142,282 178,292 Q215,280 222,255 Q228,220 220,192 Q210,168 178,162 Q147,168 138,195 Z" fill="#3A1060" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹の薄紫 -->
  <ellipse cx="178" cy="230" rx="32" ry="45" fill="#5A2888" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="178" cy="155" rx="52" ry="50" fill="#3A1060" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 口(ニヤリ + 牙) -->
  <path d="M152,168 Q165,182 178,185 Q192,182 205,168" fill="#1a1428" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 牙(上) -->
  <path d="M162,169 L158,182 M175,170 L174,183 M190,170 L193,182 M202,169 L206,182" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- 目(左) - 鋭い -->
  <ellipse cx="158" cy="145" rx="14" ry="13" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="160" cy="146" rx="9" ry="10" fill="#1a1a1a"/>
  <circle cx="163" cy="143" r="4" fill="white"/>

  <!-- 目(右) -->
  <ellipse cx="198" cy="145" rx="14" ry="13" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="200" cy="146" rx="9" ry="10" fill="#1a1a1a"/>
  <circle cx="203" cy="143" r="4" fill="white"/>

  <!-- 眉(つり上がり) -->
  <path d="M148,135 L160,128" stroke="#2d263c" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M208,135 L196,128" stroke="#2d263c" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- 鼻 -->
  <ellipse cx="178" cy="158" rx="6" ry="4" fill="#2d263c"/>

  <!-- 足(左) -->
  <path d="M152,282 Q145,300 148,315 Q158,318 168,315 Q172,300 170,283" fill="#3A1060" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 足(右) -->
  <path d="M205,282 Q212,300 210,315 Q200,318 190,315 Q186,300 188,283" fill="#3A1060" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

</svg>
