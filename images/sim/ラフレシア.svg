<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 影 -->
  <ellipse cx="180" cy="300" rx="60" ry="14" fill="#00000022"/>

  <!-- 茎(首) -->
  <rect x="168" y="185" width="24" height="40" rx="10" ry="10"
        fill="#3a8a30" stroke="#2d263c" stroke-width="5"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(緑の丸いボディ) -->
  <ellipse cx="180" cy="248" rx="58" ry="52"
           fill="#4ab040" stroke="#2d263c" stroke-width="8"
           stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 腹の薄い部分 -->
  <ellipse cx="180" cy="255" rx="36" ry="34"
           fill="#6ac85a" stroke="#2d263c" stroke-width="3"/>

  <!-- 腕(左) -->
  <ellipse cx="125" cy="252" rx="20" ry="13" transform="rotate(-30 125 252)"
           fill="#4ab040" stroke="#2d263c" stroke-width="6"
           stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 腕(右) -->
  <ellipse cx="235" cy="252" rx="20" ry="13" transform="rotate(30 235 252)"
           fill="#4ab040" stroke="#2d263c" stroke-width="6"
           stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 足(左) -->
  <ellipse cx="158" cy="293" rx="16" ry="10" transform="rotate(10 158 293)"
           fill="#3a8a30" stroke="#2d263c" stroke-width="5"
           stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 足(右) -->
  <ellipse cx="202" cy="293" rx="16" ry="10" transform="rotate(-10 202 293)"
           fill="#3a8a30" stroke="#2d263c" stroke-width="5"
           stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 花びら1 (上) -->
  <ellipse cx="180" cy="75" rx="42" ry="56"
           fill="#D63B3B" stroke="#2d263c" stroke-width="7"
           stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 花びら1 水玉 -->
  <circle cx="178" cy="68" r="7" fill="white" opacity="0.75"/>
  <circle cx="190" cy="88" r="5" fill="white" opacity="0.65"/>
  <circle cx="168" cy="86" r="4" fill="white" opacity="0.6"/>

  <!-- 花びら2 (右上) -->
  <ellipse cx="263" cy="108" rx="42" ry="56" transform="rotate(60 263 108)"
           fill="#D63B3B" stroke="#2d263c" stroke-width="7"
           stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 花びら2 水玉 -->
  <circle cx="268" cy="100" r="7" fill="white" opacity="0.75"/>
  <circle cx="256" cy="116" r="4" fill="white" opacity="0.6"/>

  <!-- 花びら3 (右下) -->
  <ellipse cx="248" cy="192" rx="42" ry="56" transform="rotate(120 248 192)"
           fill="#D63B3B" stroke="#2d263c" stroke-width="7"
           stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 花びら3 水玉 -->
  <circle cx="252" cy="185" r="6" fill="white" opacity="0.7"/>
  <circle cx="240" cy="198" r="4" fill="white" opacity="0.6"/>

  <!-- 花びら4 (下) -->
  <ellipse cx="180" cy="205" rx="42" ry="56" transform="rotate(180 180 205)"
           fill="#D63B3B" stroke="#2d263c" stroke-width="7"
           stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 花びら4 水玉 -->
  <circle cx="176" cy="212" r="7" fill="white" opacity="0.75"/>
  <circle cx="190" cy="196" r="5" fill="white" opacity="0.65"/>

  <!-- 花びら5 (左下) -->
  <ellipse cx="112" cy="192" rx="42" ry="56" transform="rotate(240 112 192)"
           fill="#D63B3B" stroke="#2d263c" stroke-width="7"
           stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 花びら5 水玉 -->
  <circle cx="108" cy="185" r="6" fill="white" opacity="0.7"/>
  <circle cx="120" cy="200" r="4" fill="white" opacity="0.6"/>

  <!-- 花びら6 (左上) -->
  <ellipse cx="97" cy="108" rx="42" ry="56" transform="rotate(300 97 108)"
           fill="#D63B3B" stroke="#2d263c" stroke-width="7"
           stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 花びら6 水玉 -->
  <circle cx="92" cy="100" r="7" fill="white" opacity="0.75"/>
  <circle cx="104" cy="116" r="4" fill="white" opacity="0.6"/>

  <!-- 花の中心(黄色い丸) -->
  <circle cx="180" cy="140" r="40"
          fill="#F5D020" stroke="#2d263c" stroke-width="7"
          stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 花粉粒(オレンジ) -->
  <circle cx="168" cy="128" r="6" fill="#E07030" stroke="#2d263c" stroke-width="2"/>
  <circle cx="188" cy="122" r="5" fill="#E07030" stroke="#2d263c" stroke-width="2"/>
  <circle cx="200" cy="138" r="6" fill="#E07030" stroke="#2d263c" stroke-width="2"/>
  <circle cx="190" cy="154" r="5" fill="#E07030" stroke="#2d263c" stroke-width="2"/>
  <circle cx="170" cy="156" r="6" fill="#E07030" stroke="#2d263c" stroke-width="2"/>
  <circle cx="160" cy="142" r="5" fill="#E07030" stroke="#2d263c" stroke-width="2"/>
  <circle cx="180" cy="140" r="4" fill="#E07030" stroke="#2d263c" stroke-width="2"/>

  <!-- 顔(目・左 白目) -->
  <ellipse cx="162" cy="240" rx="13" ry="14"
           fill="white" stroke="#2d263c" stroke-width="4"/>
  <!-- 顔(目・左 黒目) -->
  <circle cx="165" cy="242" r="7" fill="#2d263c"/>
  <!-- 顔(目・左 ハイライト) -->
  <circle cx="163" cy="239" r="3" fill="white"/>

  <!-- 顔(目・右 白目) -->
  <ellipse cx="198" cy="240" rx="13" ry="14"
           fill="white" stroke="#2d263c" stroke-width="4"/>
  <!-- 顔(目・右 黒目) -->
  <circle cx="201" cy="242" r="7" fill="#2d263c"/>
  <!-- 顔(目・右 ハイライト) -->
  <circle cx="199" cy="239" r="3" fill="white"/>

  <!-- 口 -->
  <path d="M168,264 Q180,278 192,264"
        fill="none" stroke="#2d263c" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"/>

</svg>
