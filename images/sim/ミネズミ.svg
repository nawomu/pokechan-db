<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ミネズミの見た目の特徴
  1. コーギーのような、ずんぐり丸い胴に短い脚(体高より胴が長い)
  2. 体色はオレンジ~黄色(#F4A93B系)、耳の先・しっぽの先・両手足が黒い
  3. お腹とマズル(口まわり)はクリーム色~白
  4. 顔は丸くて大きな黒目、鼻先はとがり気味で黒い鼻
  5. 三角の立ち耳(先端が黒)、くるんと丸まった短いしっぽ(先端が黒)
  -->

  <!-- 後ろ:しっぽ -->
  <path d="M270 230 Q 315 220 312 255 Q 308 285 275 275 Q 260 268 262 245 Z"
        fill="#F4A93B" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M300 232 Q 320 235 313 260 Q 308 278 288 272 Q 285 258 295 245 Z"
        fill="#2b2320" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 後ろ足(奥側) -->
  <rect x="235" y="255" width="34" height="46" rx="14" fill="#F4A93B" stroke="#2d263c" stroke-width="7"/>
  <rect x="232" y="286" width="38" height="24" rx="11" fill="#2b2320" stroke="#2d263c" stroke-width="7"/>

  <!-- 胴体(ずんぐり長め) -->
  <ellipse cx="185" cy="215" rx="105" ry="68" fill="#F4A93B" stroke="#2d263c" stroke-width="8"/>

  <!-- お腹(クリーム色) -->
  <ellipse cx="180" cy="245" rx="70" ry="38" fill="#FCEFCF" stroke="#2d263c" stroke-width="6"/>

  <!-- 手前の後ろ足 -->
  <rect x="205" y="258" width="36" height="48" rx="14" fill="#F4A93B" stroke="#2d263c" stroke-width="7"/>
  <rect x="202" y="290" width="40" height="26" rx="12" fill="#2b2320" stroke="#2d263c" stroke-width="7"/>

  <!-- 前足(奥) -->
  <rect x="95" y="250" width="32" height="50" rx="13" fill="#F4A93B" stroke="#2d263c" stroke-width="7"/>
  <rect x="92" y="284" width="36" height="24" rx="11" fill="#2b2320" stroke="#2d263c" stroke-width="7"/>

  <!-- 前足(手前) -->
  <rect x="128" y="253" width="34" height="52" rx="14" fill="#F4A93B" stroke="#2d263c" stroke-width="7"/>
  <rect x="124" y="288" width="38" height="26" rx="12" fill="#2b2320" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭部 -->
  <circle cx="120" cy="150" r="72" fill="#F4A93B" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳(左右・先端黒) -->
  <path d="M70 95 Q 55 35 100 55 Q 108 90 92 112 Z" fill="#F4A93B" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M68 68 Q 62 42 88 52 Q 90 68 82 82 Z" fill="#2b2320" stroke="#2d263c" stroke-width="0"/>

  <path d="M150 90 Q 152 30 190 62 Q 178 96 155 108 Z" fill="#F4A93B" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M158 62 Q 160 38 182 60 Q 176 78 162 86 Z" fill="#2b2320" stroke="#2d263c" stroke-width="0"/>

  <!-- マズル(クリーム色) -->
  <ellipse cx="98" cy="175" rx="42" ry="32" fill="#FCEFCF" stroke="#2d263c" stroke-width="6"/>

  <!-- 鼻 -->
  <ellipse cx="66" cy="172" rx="9" ry="7" fill="#2b2320" stroke="#2d263c" stroke-width="3"/>

  <!-- 目(大きな丸目) -->
  <circle cx="110" cy="140" r="15" fill="#2b2320" stroke="#2d263c" stroke-width="3"/>
  <circle cx="115" cy="135" r="4.5" fill="#ffffff"/>
  <circle cx="163" cy="140" r="15" fill="#2b2320" stroke="#2d263c" stroke-width="3"/>
  <circle cx="168" cy="135" r="4.5" fill="#ffffff"/>

  <!-- ほっぺ(ピンク) -->
  <circle cx="85" cy="185" r="10" fill="#F9B8A6" opacity="0.8"/>
  <circle cx="150" cy="185" r="10" fill="#F9B8A6" opacity="0.8"/>

  <!-- 口 -->
  <path d="M90 195 Q 98 202 108 195" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
