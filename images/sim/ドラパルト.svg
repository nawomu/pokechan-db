<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尻尾の先のヒレ3本(一番後ろ) -->
  <ellipse cx="290" cy="300" rx="18" ry="7" fill="#7ecfc0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(30 290 300)"/>
  <ellipse cx="308" cy="285" rx="16" ry="6" fill="#7ecfc0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(10 308 285)"/>
  <ellipse cx="300" cy="315" rx="14" ry="6" fill="#7ecfc0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(50 300 315)"/>

  <!-- しっぽ(細長く曲がる) -->
  <path d="M 210 240 Q 260 260 285 295 Q 305 320 295 330" fill="none" stroke="#3a5a8c" stroke-width="22" stroke-linecap="round"/>
  <path d="M 210 240 Q 260 260 285 295 Q 305 320 295 330" fill="none" stroke="#5a8abf" stroke-width="14" stroke-linecap="round"/>

  <!-- 翼(左・後ろ) -->
  <path d="M 150 170 Q 90 130 60 90 Q 80 110 75 145 Q 95 130 110 165 Z" fill="#7ecfc0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 翼の黄緑膜模様 -->
  <path d="M 140 175 Q 85 145 70 110 Q 90 130 105 162" fill="none" stroke="#b5f0a0" stroke-width="3"/>

  <!-- 翼(右・後ろ) -->
  <path d="M 215 170 Q 275 130 305 90 Q 285 110 290 145 Q 270 130 255 165 Z" fill="#7ecfc0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 225 175 Q 280 145 295 110 Q 275 130 260 162" fill="none" stroke="#b5f0a0" stroke-width="3"/>

  <!-- 胴体(少しゆがんだ楕円) -->
  <ellipse cx="183" cy="210" rx="58" ry="72" fill="#3a5a8c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 腹の薄い色 -->
  <ellipse cx="183" cy="218" rx="34" ry="50" fill="#b8d4e8" stroke="#2d263c" stroke-width="4"/>

  <!-- 左腕(細くて短い) -->
  <path d="M 140 200 Q 108 215 100 235 Q 105 230 118 238 Q 125 222 145 210 Z" fill="#3a5a8c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右腕 -->
  <path d="M 226 200 Q 258 215 265 235 Q 260 230 248 238 Q 240 222 222 210 Z" fill="#3a5a8c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 首 -->
  <path d="M 162 148 Q 158 170 155 185" stroke="#3a5a8c" stroke-width="26" stroke-linecap="round" fill="none"/>
  <path d="M 204 148 Q 208 170 210 185" stroke="#3a5a8c" stroke-width="26" stroke-linecap="round" fill="none"/>
  <rect x="160" y="148" width="47" height="38" rx="8" fill="#3a5a8c"/>

  <!-- 頭(三日月型・ステルス機フォルム) -->
  <!-- 頭の後ろ部分まず -->
  <path d="M 58 120 Q 75 70 183 58 Q 291 70 308 120 Q 300 145 260 155 Q 230 162 183 160 Q 136 162 106 155 Q 66 145 58 120 Z" fill="#3a5a8c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の穴(ドラメシヤが入るくぼみ) 左 -->
  <ellipse cx="98" cy="112" rx="24" ry="19" fill="#1a2a4a" stroke="#2d263c" stroke-width="5"/>
  <!-- 右 -->
  <ellipse cx="268" cy="112" rx="24" ry="19" fill="#1a2a4a" stroke="#2d263c" stroke-width="5"/>

  <!-- ドラメシヤ(左) ちっこくて目だけある -->
  <ellipse cx="98" cy="113" rx="16" ry="14" fill="#7ecfc0" stroke="#2d263c" stroke-width="4"/>
  <circle cx="94" cy="110" r="5" fill="#ff3a3a" stroke="#2d263c" stroke-width="2"/>
  <circle cx="103" cy="110" r="5" fill="#ff3a3a" stroke="#2d263c" stroke-width="2"/>
  <circle cx="94" cy="110" r="2" fill="#fff"/>
  <circle cx="103" cy="110" r="2" fill="#fff"/>

  <!-- ドラメシヤ(右) -->
  <ellipse cx="268" cy="113" rx="16" ry="14" fill="#7ecfc0" stroke="#2d263c" stroke-width="4"/>
  <circle cx="264" cy="110" r="5" fill="#ff3a3a" stroke="#2d263c" stroke-width="2"/>
  <circle cx="273" cy="110" r="5" fill="#ff3a3a" stroke="#2d263c" stroke-width="2"/>
  <circle cx="264" cy="110" r="2" fill="#fff"/>
  <circle cx="273" cy="110" r="2" fill="#fff"/>

  <!-- 頭の角(上に出る2本) -->
  <path d="M 155 68 Q 148 42 140 28 Q 150 38 162 34 Q 168 50 163 68 Z" fill="#3a5a8c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 211 68 Q 218 42 226 28 Q 216 38 204 34 Q 198 50 203 68 Z" fill="#3a5a8c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔(目) - 赤くてでかい目 -->
  <ellipse cx="160" cy="128" rx="20" ry="18" fill="#ff2222" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="206" cy="126" rx="19" ry="17" fill="#ff2222" stroke="#2d263c" stroke-width="5"/>
  <!-- 瞳孔 -->
  <ellipse cx="163" cy="128" rx="9" ry="10" fill="#8b0000"/>
  <ellipse cx="209" cy="126" rx="8" ry="10" fill="#8b0000"/>
  <!-- 目のハイライト -->
  <circle cx="158" cy="122" r="4" fill="#ffffff" opacity="0.85"/>
  <circle cx="204" cy="120" r="4" fill="#ffffff" opacity="0.85"/>

  <!-- 口(ちょっとにやっと) -->
  <path d="M 170 148 Q 183 155 196 148" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 体の黄色いひし形マーク -->
  <polygon points="183,185 192,196 183,207 174,196" fill="#f5e84a" stroke="#2d263c" stroke-width="3"/>

  <!-- ほっぺの丸(薄い青) -->
  <ellipse cx="148" cy="140" rx="12" ry="9" fill="#8dc0e8" opacity="0.6"/>
  <ellipse cx="218" cy="138" rx="11" ry="8" fill="#8dc0e8" opacity="0.6"/>
</svg>