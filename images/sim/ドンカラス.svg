  <path d="M190 260 Q210 305 235 335 Q205 310 185 290 Z" fill="#2a2a3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M170 260 Q170 310 175 340 Q182 310 185 265 Z" fill="#39394a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- back/left wing -->
  <path d="M115 170 Q40 190 30 250 Q60 245 80 260 Q65 230 100 210 Q90 195 115 190 Z" fill="#26263a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- body -->
  <ellipse cx="180" cy="210" rx="75" ry="90" fill="#33334a" stroke="#2d263c" stroke-width="8"/>

  <!-- grey chest patch -->
  <path d="M155 200 Q180 190 205 200 Q210 250 180 290 Q150 250 155 200 Z" fill="#b9b9c6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

