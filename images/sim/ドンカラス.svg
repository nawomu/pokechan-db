  <!-- eyes -->
  <ellipse cx="162" cy="122" rx="13" ry="15" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="160" cy="124" r="6" fill="#d81c2c"/>
  <ellipse cx="205" cy="122" rx="13" ry="15" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="207" cy="124" r="6" fill="#d81c2c"/>
</svg>
