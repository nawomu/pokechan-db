  <path d="M205 290 L195 320 M205 290 L210 322 M205 290 L220 316" stroke="#e8a23c" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- head -->
  <circle cx="180" cy="125" r="58" fill="#33334a" stroke="#2d263c" stroke-width="8"/>

  <!-- dark navy pompadour crest -->
  <path d="M135 100 Q150 40 185 55 Q170 70 178 90 Q195 55 220 75 Q205 90 200 105 Q225 90 232 110 Q210 115 200 128 Q225 120 222 140 Q195 138 178 122 Q160 130 150 118 Q135 115 135 100 Z" fill="#20203a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- beak -->
