  <ellipse cx="272" cy="210" rx="38" ry="34" fill="#d94b3f" stroke="#2d263c" stroke-width="8"/>
  <path d="M260 188 L260 232 M276 190 L276 230" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 胴のライン模様 -->
  <path d="M120 226 Q180 246 240 226" fill="none" stroke="#3f5fb0" stroke-width="7" stroke-linecap="round"/>

  <!-- 足 -->
  <ellipse cx="150" cy="300" rx="26" ry="16" fill="#3f5fb0" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="210" cy="300" rx="26" ry="16" fill="#3f5fb0" stroke="#2d263c" stroke-width="7"/>
