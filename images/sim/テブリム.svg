  <!-- 目 -->
  <ellipse cx="156" cy="148" rx="10" ry="13" fill="#2d263c"/>
  <ellipse cx="204" cy="148" rx="10" ry="13" fill="#2d263c"/>
  <circle cx="159" cy="144" r="2.6" fill="#fff"/>
  <circle cx="207" cy="144" r="2.6" fill="#fff"/>

  <!-- ほっぺ -->
  <ellipse cx="140" cy="168" rx="8" ry="6" fill="#f4a6b0" opacity="0.8"/>
  <ellipse cx="220" cy="168" rx="8" ry="6" fill="#f4a6b0" opacity="0.8"/>

  <!-- 口 -->
  <path d="M170 176 Q180 184 190 176" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 左手（大きい赤いこぶし） -->
  <ellipse cx="88" cy="210" rx="38" ry="34" fill="#d94b3f" stroke="#2d263c" stroke-width="8"/>
  <path d="M84 190 L84 230 M100 188 L100 232" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

