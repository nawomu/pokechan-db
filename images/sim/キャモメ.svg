<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- キャモメの特徴: 1.体は上半身が青、下半身(お腹)が白の丸っこい体型 2.頭にブーメラン状の大きな灰色のくちばし(舵のような形) 3.左右に大きく広げた青い翼(先端は白) 4.丸くて赤い目 5.オレンジ色の水かき付きの小さな足で立つ -->

  <!-- 後ろ:尾羽 -->
  <path d="M180 250 L150 300 L185 280 L210 305 L190 255 Z" fill="#3b7ec4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左翼(奥) -->
  <path d="M140 190 C90 175 45 190 25 230 C55 235 90 230 120 215 C150 235 170 240 175 235 C165 210 160 195 140 190 Z"
        fill="#4a8fd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M55 208 C45 218 35 225 25 230 C45 232 65 228 80 220" fill="#eef6ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 右翼(奥) -->
  <path d="M220 190 C270 175 315 190 335 230 C305 235 270 230 240 215 C210 235 190 240 185 235 C195 210 200 195 220 190 Z"
        fill="#4a8fd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M305 208 C315 218 325 225 335 230 C315 232 295 228 280 220" fill="#eef6ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 足(オレンジ・水かき) -->
  <path d="M165 310 L160 335 L145 348 L175 348 L170 322" fill="#f2a13c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M195 310 L200 335 L215 348 L185 348 L190 322" fill="#f2a13c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(白いお腹) -->
  <ellipse cx="180" cy="235" rx="70" ry="65" fill="#fdfdfb" stroke="#2d263c" stroke-width="8"/>

  <!-- 上半身(青) -->
  <path d="M110 220 C105 165 140 120 180 118 C220 120 255 165 250 220 C240 250 220 265 180 265 C140 265 120 250 110 220 Z"
        fill="#4a8fd6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 顔の白いエリア -->
  <ellipse cx="180" cy="165" rx="58" ry="52" fill="#fdfdfb" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭の青いキャップ -->
  <path d="M128 150 C130 105 155 78 180 78 C205 78 230 105 232 150 C210 125 195 118 180 118 C165 118 150 125 128 150 Z"
        fill="#3b7ec4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ブーメラン状の大きなくちばし(舵) -->
  <path d="M180 150 C150 135 120 140 95 165 C120 175 150 172 168 160 C175 178 172 205 155 225 C185 220 205 195 200 165 C222 172 245 168 262 152 C240 138 210 135 180 150 Z"
        fill="#c9ced6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目(丸くて赤) -->
  <circle cx="155" cy="160" r="15" fill="#fdfdfb" stroke="#2d263c" stroke-width="6"/>
  <circle cx="155" cy="162" r="8" fill="#e2432a"/>
  <circle cx="205" cy="160" r="15" fill="#fdfdfb" stroke="#2d263c" stroke-width="6"/>
  <circle cx="205" cy="162" r="8" fill="#e2432a"/>

  <!-- ほっぺの淡い赤み -->
  <ellipse cx="135" cy="185" rx="10" ry="7" fill="#f4a6a0"/>
  <ellipse cx="225" cy="185" rx="10" ry="7" fill="#f4a6a0"/>
</svg>
