<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 地面の影 -->
  <ellipse cx="180" cy="326" rx="110" ry="10" fill="#000000" opacity="0.13"/>

  <!-- しっぽびれ(ハートの下のとがり部分から出る小さいひれ) -->
  <path d="M162,282 Q180,335 198,282 Q180,300 162,282 Z"
        fill="#ffd0dd" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左むなびれ -->
  <ellipse cx="52" cy="172" rx="26" ry="14" fill="#ffc3d4" stroke="#2d263c" stroke-width="6" transform="rotate(-25 52 172)"/>
  <!-- 右むなびれ -->
  <ellipse cx="308" cy="172" rx="26" ry="14" fill="#ffc3d4" stroke="#2d263c" stroke-width="6" transform="rotate(25 308 172)"/>

  <!-- 体(ハートの形のさかな) -->
  <path d="M180,300
           C180,300 60,215 60,150
           C60,95 105,65 140,68
           C165,70 178,90 180,112
           C182,90 195,70 220,68
           C255,65 300,95 300,150
           C300,215 180,300 180,300 Z"
        fill="#ffabc6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- おなかの淡いハートもよう(シェーディング) -->
  <path d="M180,262
           C180,262 132,220 132,187
           C132,163 151,149 165,151
           C174,152 180,161 180,170
           C180,161 186,152 195,151
           C209,149 228,163 228,187
           C228,220 180,262 180,262 Z"
        fill="#ffe1ea" opacity="0.75"/>

  <!-- ほっぺの赤み(左) -->
  <ellipse cx="122" cy="132" rx="14" ry="9" fill="#ff8fae" opacity="0.55"/>
  <!-- ほっぺの赤み(右) -->
  <ellipse cx="238" cy="132" rx="14" ry="9" fill="#ff8fae" opacity="0.55"/>

  <!-- 左目(白目) -->
  <circle cx="140" cy="103" r="17" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <!-- 左目(ひとみ) -->
  <circle cx="140" cy="107" r="8" fill="#201c28"/>
  <!-- 左目ハイライト -->
  <circle cx="135" cy="100" r="3.5" fill="#ffffff"/>

  <!-- 右目(白目) -->
  <circle cx="220" cy="103" r="17" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <!-- 右目(ひとみ) -->
  <circle cx="220" cy="107" r="8" fill="#201c28"/>
  <!-- 右目ハイライト -->
  <circle cx="215" cy="100" r="3.5" fill="#ffffff"/>

  <!-- 口もと(ハートのくぼみにちいさな笑み) -->
  <path d="M170,115 Q180,124 190,115" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
