  <path d="M 180 80 L 172 55 L 183 72 L 185 45 L 192 68 L 198 50 L 200 74 L 208 58 L 205 80" fill="#ffe000" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

