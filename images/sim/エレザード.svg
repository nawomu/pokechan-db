  <ellipse cx="207" cy="107" rx="12" ry="13" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <!-- 目のハイライト -->
  <circle cx="168" cy="103" r="4" fill="white"/>
  <circle cx="202" cy="102" r="3.5" fill="white"/>
  <circle cx="176" cy="114" r="2" fill="white" opacity="0.7"/>

  <!-- 鼻(小さいドット) -->
  <circle cx="186" cy="118" r="2.5" fill="#2d263c"/>
  <circle cx="193" cy="117" r="2.5" fill="#2d263c"/>

  <!-- 口(ゆるっとした笑い) -->
  <path d="M 176 128 Q 190 140 204 127" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 体の縞模様(黄色の濃い帯) -->
  <path d="M 160 190 Q 185 185 210 190" fill="none" stroke="#d4a800" stroke-width="4" stroke-linecap="round"/>
  <path d="M 158 207 Q 183 202 208 207" fill="none" stroke="#d4a800" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 163 224 Q 183 220 203 224" fill="none" stroke="#d4a800" stroke-width="3" stroke-linecap="round"/>

  <!-- しっぽのオレンジ縞 -->
  <path d="M 268 222 Q 280 230 286 244" fill="none" stroke="#f08c00" stroke-width="5" stroke-linecap="round"/>
  <path d="M 295 256 Q 305 268 304 282" fill="none" stroke="#f08c00" stroke-width="4" stroke-linecap="round"/>
</svg>