  <ellipse cx="222" cy="126" rx="13" ry="10" fill="#f07030" stroke="#2d263c" stroke-width="4"/>
  <!-- ほっぺ内側ハイライト -->
  <ellipse cx="158" cy="127" rx="6" ry="4" fill="#f8a060" opacity="0.6"/>
  <ellipse cx="222" cy="125" rx="5" ry="4" fill="#f8a060" opacity="0.6"/>

  <!-- 目(大きくてくりっとした) -->
