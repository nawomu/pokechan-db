<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)紫〜青紫の体に白い腹 2)先端が雷雲(ギザギザ)状の長い尻尾 3)背中〜頭に立つトゲトゲの紫のたてがみ 4)額に黄色いダイヤ(宝石)模様 5)体側面に黄色い稲妻ストライプ、赤い目 -->

  <!-- 後ろ: 尻尾(雷雲状の先端) -->
  <path d="M290 250 C 320 230, 335 200, 320 175 C 340 178, 350 205, 335 230 C 350 220, 358 195, 345 170 C 330 145, 300 150, 290 175 Z"
        fill="#5b4a9e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M290 250 C 270 230, 268 210, 280 195" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 後ろ足(左右) -->
  <rect x="248" y="235" width="26" height="60" rx="10" fill="#6a58ad" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="150" y="240" width="26" height="60" rx="10" fill="#4c3f8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="261" cy="298" rx="17" ry="9" fill="#efe9ff" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="163" cy="303" rx="17" ry="9" fill="#efe9ff" stroke="#2d263c" stroke-width="6"/>

  <!-- 前足(左右) -->
  <rect x="205" y="240" width="26" height="65" rx="10" fill="#6a58ad" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="112" y="245" width="26" height="65" rx="10" fill="#5b4a9e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="218" cy="308" rx="17" ry="9" fill="#efe9ff" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="125" cy="313" rx="17" ry="9" fill="#efe9ff" stroke="#2d263c" stroke-width="6"/>

  <!-- 胴体(トラのような体) -->
  <path d="M110 220 C 95 175, 130 140, 190 140 C 245 140, 275 165, 270 210 C 268 245, 230 260, 180 258 C 135 256, 118 250, 110 220 Z"
        fill="#5b4a9e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 白い腹 -->
  <path d="M130 225 C 128 200, 150 190, 190 192 C 225 194, 245 205, 240 225 C 235 245, 200 250, 170 248 C 145 246, 133 240, 130 225 Z"
        fill="#f5f1ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体側面の黄色い稲妻ストライプ -->
  <path d="M150 165 L 165 190 L 152 190 L 168 215" fill="none" stroke="#f6d227" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M215 160 L 230 185 L 217 185 L 233 210" fill="none" stroke="#f6d227" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 首〜頭 -->
  <path d="M75 175 C 60 150, 68 115, 100 100 C 130 86, 165 90, 178 118 C 190 143, 175 175, 140 190 C 110 202, 88 198, 75 175 Z"
        fill="#6a58ad" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- たてがみ(トゲトゲ、紫) -->
  <path d="M95 100 L 80 55 L 100 88 L 96 40 L 118 82 L 122 32 L 138 80 L 150 45 L 152 88 L 168 60 L 160 100 Z"
        fill="#4c3f8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 額の黄色いダイヤ(宝石) -->
  <path d="M108 118 L 120 105 L 132 118 L 120 131 Z" fill="#f6d227" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 耳 -->
  <path d="M70 130 C 55 122, 48 105, 55 92 C 65 100, 74 112, 78 128 Z" fill="#5b4a9e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- マズル(鼻先・白) -->
  <path d="M60 165 C 48 158, 45 175, 55 188 C 65 198, 82 196, 88 182 C 92 172, 78 168, 60 165 Z"
        fill="#f5f1ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(赤) -->
  <ellipse cx="100" cy="145" rx="9" ry="11" fill="#e63b3b" stroke="#2d263c" stroke-width="5"/>
  <circle cx="97" cy="141" r="2.5" fill="#ffffff"/>

  <!-- 鼻 -->
  <circle cx="56" cy="176" r="4" fill="#2d263c"/>
</svg>
