<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: ①紺色の体+黄色いお腹で直立したトーテムポール体型 ②顔と胸は赤茶色 ③黄色いくちばしと目つき(白目に黒い点でじっと動かない目) ④体の横にマントのような三角の翼をたたんでいる ⑤しっぽが虹色の帯(赤黄青)で扇のように広がる -->

  <!-- 後ろ:マントのような翼(左右) -->
  <path d="M 110 150 Q 55 190 60 280 Q 62 310 100 300 L 130 250 Z" fill="#2c3f6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 250 150 Q 305 190 300 280 Q 298 310 260 300 L 230 250 Z" fill="#2c3f6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- しっぽ(扇状・虹色の帯) -->
  <path d="M 180 300 L 130 345 L 150 340 L 180 320 L 210 340 L 230 345 Z" fill="#e6444c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 180 300 L 145 335 L 165 332 L 180 316 L 195 332 L 215 335 Z" fill="#f4d43c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M 180 300 L 162 325 L 180 313 L 198 325 Z" fill="#2c3f6e" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 足(黄色い細い足) -->
  <rect x="150" y="285" width="16" height="45" rx="6" fill="#f4c94c" stroke="#2d263c" stroke-width="6"/>
  <rect x="194" y="285" width="16" height="45" rx="6" fill="#f4c94c" stroke="#2d263c" stroke-width="6"/>
  <path d="M 140 328 L 176 328 L 170 340 L 146 340 Z" fill="#f4c94c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 184 328 L 220 328 L 214 340 L 190 340 Z" fill="#f4c94c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体(紺色・縦長のトーテムポール型) -->
  <path d="M 140 130 Q 130 230 140 295 Q 180 310 220 295 Q 230 230 220 130 Q 180 110 140 130 Z" fill="#2c3f6e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹(黄色) -->
  <path d="M 158 165 Q 150 235 160 285 Q 180 295 200 285 Q 210 235 202 165 Q 180 155 158 165 Z" fill="#f4d94c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胸〜首(赤茶色) -->
  <path d="M 152 115 Q 145 150 158 168 Q 180 178 202 168 Q 215 150 208 115 Q 180 95 152 115 Z" fill="#c85a3c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭(赤茶色) -->
  <ellipse cx="180" cy="90" rx="58" ry="48" fill="#c85a3c" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭上の紺色の羽飾り -->
  <path d="M 150 55 Q 140 25 155 15 Q 165 35 168 55 Z" fill="#2c3f6e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 180 48 Q 178 15 195 5 Q 200 30 195 50 Z" fill="#2c3f6e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 208 55 Q 215 25 235 20 Q 232 45 218 58 Z" fill="#2c3f6e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- くちばし(黄色) -->
  <path d="M 160 100 Q 155 118 172 122 Q 178 108 172 96 Z" fill="#f4c94c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(白目に黒い点・じっと動かない静止した目つき) -->
  <ellipse cx="163" cy="82" rx="15" ry="16" fill="#fff8ec" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="201" cy="82" rx="15" ry="16" fill="#fff8ec" stroke="#2d263c" stroke-width="5"/>
  <circle cx="166" cy="84" r="5" fill="#2d263c"/>
  <circle cx="204" cy="84" r="5" fill="#2d263c"/>
</svg>
