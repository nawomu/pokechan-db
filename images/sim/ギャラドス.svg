<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail tip -->
  <path d="M290 320 Q310 340 295 355 Q280 345 275 330 Z" fill="#1a6bb5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- body snake curve - back section -->
  <path d="M250 310 Q300 290 310 250 Q320 210 290 195 Q260 180 240 200 Q220 215 230 245 Q240 270 220 285 Q200 300 180 310 Q160 320 140 305 Q120 290 125 265 Q130 240 155 230 Q180 220 190 200 Q200 180 185 160 Q170 140 145 145 Q120 150 110 170" fill="#1a6bb5" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- belly stripe on tail section -->
  <path d="M250 305 Q285 285 295 250 Q302 220 282 210 Q265 202 252 215 Q242 228 248 250 Q255 270 238 283 Q218 298 198 308" fill="none" stroke="#f0d060" stroke-width="5" stroke-linecap="round"/>

  <!-- dorsal fins on back -->
  <path d="M290 200 L305 178 L298 198" fill="#1a6bb5" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M270 192 L282 165 L276 190" fill="#1a6bb5" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M248 188 L255 160 L252 186" fill="#1a6bb5" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M228 192 L230 163 L228 190" fill="#1a6bb5" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- side fin/wing left -->
  <path d="M160 175 Q130 155 118 165 Q110 175 125 185 Q140 195 158 188 Z" fill="#1a6bb5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- neck/body upper -->
  <path d="M110 170 Q95 155 90 135 Q88 115 100 105 Q115 95 130 100 Q145 105 148 125 Q152 145 145 160" fill="#1a6bb5" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- neck belly color -->
  <path d="M108 168 Q97 155 96 138 Q97 122 107 116 Q120 112 132 118 Q140 127 138 143 Q136 156 143 166" fill="#f0d060" stroke="none"/>

  <!-- head base (red gyarados coloring) -->
  <ellipse cx="105" cy="88" rx="42" ry="32" fill="#cc2222" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- top horn/spike on head -->
  <path d="M98 60 Q102 38 108 30 Q112 40 110 62" fill="#1a6bb5" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M118 62 Q124 42 130 36 Q132 48 126 64" fill="#1a6bb5" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- brow/angry eyebrow -->
  <path d="M80 72 Q95 65 110 68" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- eye white -->
  <ellipse cx="84" cy="82" rx="12" ry="10" fill="#f5f0e0" stroke="#2d263c" stroke-width="4"/>
  <!-- eye pupil - small and angry -->
  <ellipse cx="86" cy="84" rx="6" ry="7" fill="#1a1a1a"/>
  <!-- eye glint -->
  <circle cx="83" cy="81" r="2" fill="white"/>

  <!-- snout/jaw area -->
  <path d="M63 90 Q55 100 58 116 Q62 130 80 133 Q100 136 120 128 Q140 120 143 108 Q145 95 135 88" fill="#cc2222" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- lower jaw / yellow chin -->
  <path d="M65 115 Q70 128 85 132 Q100 136 118 129 Q132 122 135 114 Q118 120 100 122 Q80 122 65 115 Z" fill="#f0d060" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- upper fangs -->
  <path d="M82 118 L78 132 L88 120" fill="white" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <path d="M102 120 L100 134 L108 122" fill="white" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- lower fang -->
  <path d="M90 125 L88 138 L96 126" fill="white" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- left whisker 1 -->
  <path d="M68 100 Q40 88 15 92" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- left whisker 2 -->
  <path d="M65 108 Q38 105 12 115" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- right whisker 1 -->
  <path d="M138 98 Q162 88 188 94" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- right whisker 2 -->
  <path d="M137 108 Q160 108 184 118" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- scale pattern dots on body -->
  <circle cx="270" cy="230" r="5" fill="#1557a0" stroke="none"/>
  <circle cx="255" cy="245" r="4" fill="#1557a0" stroke="none"/>
  <circle cx="285" cy="248" r="4" fill="#1557a0" stroke="none"/>
  <circle cx="240" cy="262" r="4" fill="#1557a0" stroke="none"/>
  <circle cx="260" cy="268" r="5" fill="#1557a0" stroke="none"/>
</svg>