<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ドドゲザン: 鉄鎧サムライポケモン 落書き風 -->

  <!-- 足 左 -->
  <ellipse cx="148" cy="318" rx="28" ry="18" fill="#2a2e42" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 足 右 -->
  <ellipse cx="212" cy="322" rx="26" ry="16" fill="#2a2e42" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 脚 左 -->
  <rect x="130" y="268" width="34" height="55" rx="8" fill="#3a3f5c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 脚 右 -->
  <rect x="196" y="272" width="32" height="52" rx="8" fill="#3a3f5c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腰プレート -->
  <rect x="120" y="252" width="120" height="28" rx="10" fill="#1e2130" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体 胴体 -->
  <ellipse cx="180" cy="210" rx="72" ry="80" fill="#3a3f5c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 胸の赤Xマーク 左斜め -->
  <line x1="142" y1="170" x2="190" y2="240" stroke="#cc2222" stroke-width="13" stroke-linecap="round"/>
  <!-- 胸の赤Xマーク 右斜め -->
  <line x1="218" y1="170" x2="170" y2="240" stroke="#cc2222" stroke-width="13" stroke-linecap="round"/>

  <!-- 胸プレート(黒鉄) -->
  <polygon points="155,168 205,168 218,200 180,215 142,200" fill="#1e2130" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胸プレートの赤X(プレート上) -->
  <line x1="158" y1="172" x2="195" y2="208" stroke="#cc2222" stroke-width="8" stroke-linecap="round"/>
  <line x1="202" y1="172" x2="165" y2="208" stroke="#cc2222" stroke-width="8" stroke-linecap="round"/>

  <!-- 左腕 -->
  <ellipse cx="96" cy="205" rx="20" ry="48" fill="#3a3f5c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-12 96 205)"/>
  <!-- 左腕の刃 -->
  <polygon points="62,232 88,258 74,278 48,248" fill="#c8ccd4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 左腕の刃エッジ光沢 -->
  <line x1="62" y1="232" x2="88" y2="258" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- 右腕 -->
  <ellipse cx="264" cy="208" rx="20" ry="46" fill="#3a3f5c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(10 264 208)"/>
  <!-- 右腕の刃 -->
  <polygon points="298,238 272,262 286,282 312,255" fill="#c8ccd4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右腕の刃エッジ光沢 -->
  <line x1="298" y1="238" x2="272" y2="262" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- 肩プレート 左 -->
  <ellipse cx="112" cy="170" rx="28" ry="18" fill="#1e2130" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-20 112 170)"/>
  <!-- 肩プレート 右 -->
  <ellipse cx="248" cy="173" rx="28" ry="18" fill="#1e2130" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(20 248 173)"/>

  <!-- 首 -->
  <rect x="162" y="122" width="36" height="28" rx="8" fill="#3a3f5c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 (大きい円) -->
  <circle cx="180" cy="100" r="68" fill="#3a3f5c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の兜プレート 前面 -->
  <polygon points="148,72 212,72 218,115 180,122 142,115" fill="#1e2130" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 額の大刃(かたな) -->
  <polygon points="175,30 185,30 192,72 168,72" fill="#c8ccd4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 額の刃 先端シャープ -->
  <polygon points="175,30 185,30 180,12" fill="#e8eaf0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 刃の光沢 -->
  <line x1="179" y1="16" x2="184" y2="68" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- 頭の左の小角 -->
  <polygon points="118,65 130,80 112,88" fill="#c8ccd4" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 頭の右の小角 -->
  <polygon points="242,68 230,82 248,90" fill="#c8ccd4" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目 左(ギョロっと) -->
  <ellipse cx="158" cy="100" rx="16" ry="14" fill="#f0f0f0" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="161" cy="101" rx="9" ry="10" fill="#1a1a2e" stroke="#2d263c" stroke-width="2"/>
  <circle cx="164" cy="97" r="3" fill="#ffffff"/>

  <!-- 目 右(ちょっとずれてる=落書き感) -->
  <ellipse cx="203" cy="98" rx="15" ry="15" fill="#f0f0f0" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="206" cy="100" rx="9" ry="10" fill="#1a1a2e" stroke="#2d263c" stroke-width="2"/>
  <circle cx="209" cy="96" r="3" fill="#ffffff"/>

  <!-- 眉(威厳あるへの字) -->
  <path d="M144,84 Q158,78 170,82" fill="none" stroke="#1e2130" stroke-width="5" stroke-linecap="round"/>
  <path d="M190,80 Q204,76 218,82" fill="none" stroke="#1e2130" stroke-width="5" stroke-linecap="round"/>

  <!-- 口(への字・不機嫌そう) -->
  <path d="M162,118 Q180,112 198,118" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 顎プレート -->
  <ellipse cx="180" cy="122" rx="26" ry="10" fill="#1e2130" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
</svg>