  <path d="M187 130 L192 145 L197 130 Z" fill="#f4f1e6" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M202 128 L207 143 L212 128 Z" fill="#f4f1e6" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

