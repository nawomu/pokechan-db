  <!-- ear fins -->
  <path d="M145 75 Q122 63 118 42 Q135 53 152 70 Z" fill="#4a6fa8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M230 75 Q253 63 257 42 Q240 53 223 70 Z" fill="#4a6fa8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- eyes -->
  <ellipse cx="172" cy="90" rx="9" ry="7" fill="#d64a3a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="172" cy="91" r="2.8" fill="#1c1620"/>
  <ellipse cx="205" cy="88" rx="9" ry="7" fill="#d64a3a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="205" cy="89" r="2.8" fill="#1c1620"/>

  <!-- mouth line -->
