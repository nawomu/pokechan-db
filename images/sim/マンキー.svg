<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尻尾(後ろ・体の右から伸びてくるっと巻く) -->
  <path d="M238 250 Q285 245 298 205 Q308 172 285 155 Q268 143 258 160 Q250 174 262 182 Q274 190 270 202 Q266 214 248 216 Q225 218 222 245Z" fill="#B9793C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 脚(左右・後ろ寄りに先に配置) -->
  <path d="M138 288 Q128 312 132 330 Q136 342 152 342 Q166 340 166 322 Q166 302 160 286Z" fill="#B9793C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M222 288 Q232 312 228 330 Q224 342 208 342 Q194 340 194 322 Q194 302 200 286Z" fill="#B9793C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(丸くもこもこした胴) -->
  <path d="M180 128 Q245 130 258 200 Q266 250 232 286 Q200 310 160 300 Q118 290 106 246 Q96 200 118 160 Q140 130 180 128Z" fill="#C6874A" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 腕(左・握りこぶしを胸の前で構える) -->
  <path d="M120 190 Q92 200 82 228 Q76 246 94 254 Q112 260 122 244 Q130 230 122 210Z" fill="#C6874A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="98" cy="240" rx="20" ry="18" fill="#C6874A" stroke="#2d263c" stroke-width="7"/>

  <!-- 腕(右・握りこぶし) -->
  <path d="M240 190 Q268 200 278 228 Q284 246 266 254 Q248 260 238 244 Q230 230 238 210Z" fill="#C6874A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="262" cy="240" rx="20" ry="18" fill="#C6874A" stroke="#2d263c" stroke-width="7"/>

  <!-- 耳(左右・丸くて小さい) -->
  <ellipse cx="132" cy="98" rx="18" ry="22" fill="#B9793C" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="228" cy="98" rx="18" ry="22" fill="#B9793C" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭(丸みのある顔の土台) -->
  <path d="M180 68 Q234 70 244 118 Q250 154 218 176 Q196 190 164 188 Q128 184 116 152 Q106 118 128 90 Q150 68 180 68Z" fill="#C6874A" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭のトゲトゲの毛(逆立ったクリーム色の房) -->
  <path d="M164 76 Q158 48 170 30 Q176 44 178 68Z" fill="#F2E6B0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M182 70 Q184 40 200 24 Q200 46 196 72Z" fill="#F2E6B0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M200 76 Q210 52 228 42 Q222 62 212 80Z" fill="#F2E6B0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 顔まわりのクリーム色パッチ(鼻口まわり) -->
  <path d="M150 132 Q180 122 210 132 Q222 150 210 168 Q180 182 150 168 Q138 150 150 132Z" fill="#F2E6B0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 目(左・怒った吊り目) -->
  <path d="M144 112 Q156 100 170 108" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="158" cy="120" rx="10" ry="12" fill="#2d263c"/>
  <ellipse cx="161" cy="115" rx="3" ry="4" fill="#fff"/>

  <!-- 目(右・怒った吊り目) -->
  <path d="M216 112 Q204 100 190 108" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="202" cy="120" rx="10" ry="12" fill="#2d263c"/>
  <ellipse cx="205" cy="115" rx="3" ry="4" fill="#fff"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="140" rx="6" ry="5" fill="#2d263c"/>

  <!-- 口(への字・むすっとした表情) -->
  <path d="M160 158 Q180 150 200 158" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
