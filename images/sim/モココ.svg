<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- モココの見た目の特徴:
    1. 全身がもこもこの毛(丸いふわふわの塊がたくさん集まった雲のようなシルエット)
    2. 体色は白〜クリーム色
    3. 顔まわりだけ少し毛が短く、丸い顔パッチが見える
    4. 目は小さい黒の点(離れすぎず中央寄り)・頬はピンクの丸
    5. 脚は毛に埋もれて短く黒っぽい・お尻に小さい毛の房(尻尾)
  -->

  <!-- しっぽの毛(体の後ろに少し覗く) -->
  <circle cx="298" cy="232" r="30" fill="#fdfbf2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 背面のもこもこ(体の後ろ) -->
  <circle cx="70" cy="190" r="42" fill="#fdfbf2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="292" cy="185" r="40" fill="#fdfbf2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 本体 -->
  <ellipse cx="180" cy="205" rx="128" ry="103" fill="#fdfbf2" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 横のふわふわ(シルエットの凹凸) -->
  <circle cx="92" cy="262" r="32" fill="#fdfbf2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="268" cy="262" r="32" fill="#fdfbf2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭のもこもこ(6つの毛玉で王冠状に) -->
  <circle cx="98" cy="142" r="38" fill="#fdfbf2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="134" cy="104" r="42" fill="#fdfbf2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="180" cy="88" r="46" fill="#fdfbf2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="226" cy="104" r="42" fill="#fdfbf2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="262" cy="142" r="38" fill="#fdfbf2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="205" cy="98" r="30" fill="#fdfbf2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 顔パッチ(短い毛で覆われた部分) -->
  <ellipse cx="180" cy="218" rx="80" ry="64" fill="#fff8e6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目 -->
  <ellipse cx="150" cy="207" rx="10" ry="14" fill="#2d263c"/>
  <ellipse cx="210" cy="207" rx="10" ry="14" fill="#2d263c"/>

  <!-- ほっぺ -->
  <circle cx="124" cy="228" r="15" fill="#ffb3c6"/>
  <circle cx="236" cy="228" r="15" fill="#ffb3c6"/>

  <!-- 口 -->
  <path d="M 164 236 Q 180 250 196 236" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 脚 -->
  <ellipse cx="146" cy="302" rx="17" ry="22" fill="#3a3244" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="214" cy="302" rx="17" ry="22" fill="#3a3244" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
</svg>
