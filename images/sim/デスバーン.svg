<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 青白い魂の炎 (後ろ) -->
  <ellipse cx="130" cy="195" rx="18" ry="28" fill="#9de8f0" opacity="0.55" transform="rotate(-18 130 195)"/>
  <ellipse cx="232" cy="190" rx="16" ry="24" fill="#9de8f0" opacity="0.55" transform="rotate(15 232 190)"/>
  <ellipse cx="180" cy="290" rx="12" ry="20" fill="#b0eef5" opacity="0.45" transform="rotate(5 180 290)"/>

  <!-- 壺の底(丸い) -->
  <ellipse cx="180" cy="285" rx="68" ry="22" fill="#d6c89a" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 壺の胴体(体) -->
  <path d="M112 250 Q105 220 108 185 Q112 148 140 132 Q160 122 180 122 Q202 122 222 132 Q250 148 254 185 Q258 220 250 250 Q235 272 180 275 Q125 272 112 250 Z" fill="#d9ca98" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 壺の模様(横ライン) -->
  <path d="M120 210 Q180 218 242 210" fill="none" stroke="#b8a86c" stroke-width="4" stroke-linecap="round"/>
  <path d="M116 230 Q180 240 246 230" fill="none" stroke="#b8a86c" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M123 190 Q180 197 238 190" fill="none" stroke="#b8a86c" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- 壺の腹部の模様(ぽつっとした暗い斑点) -->
  <ellipse cx="155" cy="170" rx="7" ry="5" fill="#c4aa72" opacity="0.6"/>
  <ellipse cx="210" cy="168" rx="6" ry="5" fill="#c4aa72" opacity="0.6"/>
  <ellipse cx="180" cy="155" rx="5" ry="4" fill="#c4aa72" opacity="0.5"/>

  <!-- くびれ(首) -->
  <rect x="161" y="107" width="38" height="22" rx="10" fill="#d9ca98" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 蓋(頭部) - 濃い青紫 -->
  <path d="M138 112 Q142 78 165 66 Q180 60 196 66 Q218 78 222 112 Q205 120 180 122 Q155 120 138 112 Z" fill="#4a3b6b" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 蓋の上のとんがり装飾 -->
  <path d="M168 66 Q175 40 180 30 Q185 40 192 66" fill="#4a3b6b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- とんがり先端の光っぽい丸 -->
  <circle cx="180" cy="28" r="7" fill="#b8a8e8" stroke="#2d263c" stroke-width="5"/>

  <!-- 蓋のふち飾り(ギザギザっぽい線) -->
  <path d="M138 112 Q148 105 158 108 Q168 111 178 107 Q188 103 198 107 Q208 111 222 112" fill="none" stroke="#6b5a9b" stroke-width="4" stroke-linecap="round"/>

  <!-- 左の幽霊腕 -->
  <path d="M115 185 Q85 170 72 150 Q62 132 75 118 Q88 108 100 122 Q105 130 98 142 Q95 150 104 158 Q118 168 122 182" fill="#4a3b6b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 左腕の先の炎ひらひら -->
  <path d="M75 118 Q65 100 72 85 Q78 75 85 90 Q89 100 80 108" fill="#6b5a9b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M88 108 Q78 90 88 76 Q95 68 100 82 Q103 92 95 100" fill="#8870c0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 右の幽霊腕 -->
  <path d="M247 182 Q278 168 290 148 Q300 130 288 116 Q276 104 264 118 Q258 128 265 140 Q268 150 258 158 Q244 168 240 182" fill="#4a3b6b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 右腕の先の炎ひらひら -->
  <path d="M288 116 Q298 98 292 83 Q285 73 278 88 Q274 98 283 106" fill="#6b5a9b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M275 104 Q285 86 274 72 Q267 64 262 78 Q260 88 268 96" fill="#8870c0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 顔(壺の胴体に描かれた顔) -->
  <!-- 目 左 - 細くギョロっと -->
  <path d="M148 165 Q155 158 163 162 Q158 170 148 165 Z" fill="#1a1230" stroke="#2d263c" stroke-width="2"/>
  <ellipse cx="155" cy="162" rx="7" ry="5" fill="#1a1230" stroke="#2d263c" stroke-width="3"/>
  <!-- 目 右 -->
  <ellipse cx="207" cy="162" rx="8" ry="5" fill="#1a1230" stroke="#2d263c" stroke-width="3"/>
  <!-- 目の光 -->
  <circle cx="152" cy="160" r="2" fill="white"/>
  <circle cx="204" cy="160" r="2" fill="white"/>

  <!-- 口 - ニヤリと歯むき出し -->
  <path d="M152 182 Q166 178 180 180 Q194 178 210 182 Q200 196 180 198 Q160 196 152 182 Z" fill="#1a1230" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- 歯 -->
  <path d="M160 182 L162 191" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M170 180 L171 192" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M180 180 L180 193" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M190 180 L190 192" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M200 181 L199 191" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- 壺の口から漏れる青い炎 (上) -->
  <path d="M165 122 Q162 112 165 100 Q170 90 172 102 Q174 112 170 120" fill="#7ad4e8" stroke="none" opacity="0.7"/>
  <path d="M178 122 Q175 108 180 95 Q184 85 186 98 Q188 110 184 122" fill="#9de8f5" stroke="none" opacity="0.75"/>
  <path d="M191 122 Q192 110 196 100 Q200 90 200 103 Q199 113 194 121" fill="#7ad4e8" stroke="none" opacity="0.65"/>

</svg>