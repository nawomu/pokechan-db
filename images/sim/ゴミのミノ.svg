<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 頭からせなかにかけてまとった「ゴミ袋・ボロ布」のずた袋みのグレーのマント(すそがギザギザ)
  2. マントの上に、金属のかけら(さびたクギ・鉄くず)が2本、耳/角のように飛び出ている
  3. マントのところどころに継ぎはぎ(暗い灰色の四角いパッチ)
  4. マントの下からのぞく丸い黒目とちいさな口(すこし困った顔)
  5. マントの下にちらっと見えるクリーム色の胴体と、小さな2本の足
  -->

  <!-- 後ろ: 左右の足(体より奥・マントの下からのぞく) -->
  <ellipse cx="152" cy="308" rx="16" ry="12" fill="#e9dfc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="208" cy="308" rx="16" ry="12" fill="#e9dfc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体: クリーム色の胴体(マントの下にちらっと見える丸み) -->
  <ellipse cx="180" cy="270" rx="58" ry="50" fill="#f0e6c8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 金属のかけら(さびたクギ状・頭の左右から飛び出る) -->
  <path d="M146,56 L138,24 L157,52 Z" fill="#b7b0a4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M214,56 L226,22 L221,54 Z" fill="#9a9488" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体: ずた袋のマント(すそがギザギザ) -->
  <path d="M180,62
           L126,80
           L86,116
           L64,150
           L84,168
           L60,196
           L82,208
           L66,238
           L92,250
           L86,278
           L120,296
           L180,258
           L240,296
           L274,278
           L268,250
           L294,238
           L278,208
           L300,196
           L276,168
           L296,150
           L274,116
           L234,80
           Z"
        fill="#9c9284" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 継ぎはぎパッチ(暗い灰色の四角) -->
  <rect x="98" y="150" width="34" height="26" fill="#787060" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(-8 115 163)"/>
  <rect x="226" y="176" width="30" height="24" fill="#787060" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(10 241 188)"/>
  <rect x="150" y="234" width="30" height="20" fill="#787060" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(4 165 244)"/>

  <!-- 縫い目のステッチ(点線ふう) -->
  <path d="M132,150 L96,238" fill="none" stroke="#6b6357" stroke-width="4" stroke-linecap="round" stroke-dasharray="3 10"/>
  <path d="M228,150 L268,238" fill="none" stroke="#6b6357" stroke-width="4" stroke-linecap="round" stroke-dasharray="3 10"/>

  <!-- 顔: 目(マントの下からのぞく・すこし困り目) -->
  <circle cx="152" cy="186" r="23" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="208" cy="186" r="23" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="157" cy="192" r="11" fill="#2d263c"/>
  <circle cx="203" cy="192" r="11" fill="#2d263c"/>
  <circle cx="152" cy="187" r="4" fill="#ffffff"/>
  <circle cx="198" cy="187" r="4" fill="#ffffff"/>

  <!-- こまり眉 -->
  <path d="M134,164 L168,172" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M226,164 L192,172" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 口 -->
  <path d="M168,222 Q180,214 192,222" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
