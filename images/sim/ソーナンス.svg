<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail-face peeking out behind body (drawn first = back) -->
  <ellipse cx="180" cy="150" rx="34" ry="30" fill="#2d2b3a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="167" cy="145" r="6" fill="#e8433f"/>
  <circle cx="193" cy="145" r="6" fill="#e8433f"/>

  <!-- legs -->
  <ellipse cx="140" cy="315" rx="26" ry="18" fill="#8fc1e3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="220" cy="315" rx="26" ry="18" fill="#8fc1e3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- arms -->
  <ellipse cx="82" cy="230" rx="24" ry="34" fill="#8fc1e3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-18 82 230)"/>
  <ellipse cx="278" cy="230" rx="24" ry="34" fill="#8fc1e3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(18 278 230)"/>

  <!-- main body: rounded bean/darum shape -->
  <path d="M 180 60
           C 235 60 268 105 268 165
           C 268 235 245 300 180 300
           C 115 300 92 235 92 165
           C 92 105 125 60 180 60 Z"
        fill="#8fc1e3" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- pale belly patch -->
  <ellipse cx="180" cy="205" rx="62" ry="55" fill="#c9e6f5" stroke="#2d263c" stroke-width="0"/>

  <!-- small head fuzz -->
  <path d="M 168 62 C 166 48 172 40 178 44" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M 192 62 C 194 48 188 40 182 44" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- eyebrow-ish worry lines -->
  <path d="M 130 130 Q 145 118 160 128" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M 230 130 Q 215 118 200 128" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- eyes: big teardrop dots -->
  <ellipse cx="148" cy="160" rx="12" ry="15" fill="#2d263c"/>
  <ellipse cx="212" cy="160" rx="12" ry="15" fill="#2d263c"/>
  <circle cx="151" cy="155" r="3" fill="#ffffff"/>
  <circle cx="215" cy="155" r="3" fill="#ffffff"/>

  <!-- open surprised mouth -->
  <ellipse cx="180" cy="205" rx="26" ry="20" fill="#5b3a44" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 160 205 Q 180 218 200 205" fill="none" stroke="#e08a99" stroke-width="4" stroke-linecap="round"/>
</svg>
