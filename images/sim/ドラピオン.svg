<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ①後ろ: 背中から弧を描いて頭上を越える毒針つきの尾 -->
  <g>
    <path d="M262,205 C312,183 322,118 274,78 C238,48 188,42 163,66 C148,80 138,99 130,123" fill="none" stroke="#2d263c" stroke-width="34" stroke-linecap="round"/>
    <path d="M262,205 C312,183 322,118 274,78 C238,48 188,42 163,66 C148,80 138,99 130,123" fill="none" stroke="#4a2f73" stroke-width="22" stroke-linecap="round"/>
    <ellipse cx="298" cy="163" rx="16" ry="14" fill="#35204f" stroke="#2d263c" stroke-width="6"/>
    <ellipse cx="266" cy="88" rx="15" ry="13" fill="#35204f" stroke="#2d263c" stroke-width="6"/>
    <ellipse cx="196" cy="51" rx="14" ry="12" fill="#35204f" stroke="#2d263c" stroke-width="6"/>
    <path d="M130,123 L104,148 L138,153 Z" fill="#241830" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  </g>

  <!-- ②体: 濃い紫のずんぐりしたシルエット・脚・ハサミ -->
  <g>
    <!-- 脚(左3本+ミラーで右3本) -->
    <g id="legsL">
      <path d="M120,210 L86,226 L68,252" fill="none" stroke="#3a2560" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M112,236 L78,249 L60,274" fill="none" stroke="#3a2560" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M118,260 L85,272 L66,296" fill="none" stroke="#3a2560" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <use href="#legsL" transform="translate(360,0) scale(-1,1)"/>

    <!-- 胴体 -->
    <path d="M100,235 C88,190 105,145 148,128 C168,120 202,120 222,128 C265,145 282,190 270,235 C266,262 232,283 185,285 C138,283 104,262 100,235 Z" fill="#4a2f73" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

    <!-- 腹の明るい装甲パーツ -->
    <path d="M158,178 C148,206 150,240 178,262 C206,240 208,206 198,178 C188,168 168,168 158,178 Z" fill="#cdb6ea" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
    <path d="M126,222 Q185,238 244,222" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
    <path d="M132,250 Q185,264 238,250" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

    <!-- 肩のトゲ(左+ミラーで右) -->
    <polygon id="spikeL" points="100,150 84,129 106,140" fill="#3a2560" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
    <use href="#spikeL" transform="translate(360,0) scale(-1,1)"/>

    <!-- 大きなハサミ(左腕+ハサミ・ミラーで右) -->
    <g id="clawL">
      <path d="M100,176 C75,168 55,150 42,128 C50,120 61,118 69,122 C83,138 96,153 113,161 Z" fill="#4a2f73" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
      <path d="M46,100 C30,94 14,100 9,119 C6,132 17,144 32,145 C43,146 51,139 53,129 L40,123 C35,119 35,111 41,107 C46,103 47,100 46,100 Z" fill="#3a2560" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
    </g>
    <use href="#clawL" transform="translate(360,0) scale(-1,1)"/>
  </g>

  <!-- ③顔: 頭のトゲ・赤い目・口 -->
  <g>
    <polygon points="148,128 137,97 162,123" fill="#4a2f73" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
    <polygon points="183,120 183,86 200,117" fill="#4a2f73" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
    <polygon points="222,128 233,97 208,123" fill="#4a2f73" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

    <ellipse cx="158" cy="156" rx="16" ry="12" fill="#e0303f" stroke="#2d263c" stroke-width="6"/>
    <ellipse cx="212" cy="156" rx="16" ry="12" fill="#e0303f" stroke="#2d263c" stroke-width="6"/>
    <circle cx="159" cy="158" r="6" fill="#1a0f26"/>
    <circle cx="213" cy="158" r="6" fill="#1a0f26"/>
    <circle cx="153" cy="152" r="3" fill="#ffffff"/>
    <circle cx="207" cy="152" r="3" fill="#ffffff"/>

    <path d="M170,180 Q185,189 200,180" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
