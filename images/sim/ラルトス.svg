<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 白くて丸っこい体、下にいくほど細まりローブのような裾
  2. 頭の上に緑の角(ツノ)が2本、前に曲がって赤い先端
  3. 目は赤くて丸い(黒目なし・つぶらな赤い瞳)
  4. 胸に小さい緑のダイヤ(角と同じ緑)
  5. 手足は短く白い、足先は裾に隠れて見えない
  -->

  <!-- 後ろの角(頭より奥) -->
  <path d="M140 90 C 100 60, 90 20, 108 26 C 128 40, 138 66, 148 96 Z" fill="#5fbf6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M220 90 C 260 60, 270 20, 252 26 C 232 40, 222 66, 212 96 Z" fill="#5fbf6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 角の赤い先端 -->
  <ellipse cx="107" cy="27" rx="9" ry="8" fill="#e6483c" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="253" cy="27" rx="9" ry="8" fill="#e6483c" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 体(裾広がりのローブ形) -->
  <path d="M132 168 C 118 220, 100 270, 118 316 C 145 336, 215 336, 242 316 C 260 270, 242 220, 228 168 C 210 148, 150 148, 132 168 Z"
        fill="#f6f4ea" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 腕(左右の短い手) -->
  <path d="M126 210 C 100 214, 84 236, 92 256 C 100 268, 116 264, 122 250" fill="#f6f4ea" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M234 210 C 260 214, 276 236, 268 256 C 260 268, 244 264, 238 250" fill="#f6f4ea" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 胸の緑のダイヤ -->
  <path d="M180 214 L 196 232 L 180 250 L 164 232 Z" fill="#5fbf6e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭(丸い顔) -->
  <circle cx="180" cy="118" r="62" fill="#f6f4ea" stroke="#2d263c" stroke-width="8"/>

  <!-- 前の角(顔の手前・前方に曲がる) -->
  <path d="M150 80 C 128 56, 122 30, 138 32 C 156 36, 166 60, 168 88 Z" fill="#5fbf6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M210 80 C 232 56, 238 30, 222 32 C 204 36, 194 60, 192 88 Z" fill="#5fbf6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="138" cy="33" rx="8" ry="7" fill="#e6483c" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="222" cy="33" rx="8" ry="7" fill="#e6483c" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 目(赤くて丸い) -->
  <circle cx="156" cy="120" r="15" fill="#e6483c" stroke="#2d263c" stroke-width="6"/>
  <circle cx="204" cy="120" r="15" fill="#e6483c" stroke="#2d263c" stroke-width="6"/>
  <circle cx="152" cy="115" r="4" fill="#fffdf5"/>
  <circle cx="200" cy="115" r="4" fill="#fffdf5"/>

  <!-- 口(小さく笑う) -->
  <path d="M168 148 Q 180 158, 192 148" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺの緑ライン(髪の分け目っぽい模様) -->
  <path d="M150 96 Q 180 84, 210 96" fill="none" stroke="#3f9e52" stroke-width="6" stroke-linecap="round"/>
</svg>
