<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body) -->
  <path d="M195 235 Q260 245 280 210 Q265 250 300 265 Q255 270 220 250 Z" fill="#8fce4a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- vestigial stub wings (behind body) -->
  <ellipse cx="130" cy="175" rx="26" ry="14" fill="#cdeeb0" stroke="#2d263c" stroke-width="6" transform="rotate(-25 130 175)"/>
  <ellipse cx="235" cy="175" rx="26" ry="14" fill="#cdeeb0" stroke="#2d263c" stroke-width="6" transform="rotate(25 235 175)"/>

  <!-- legs -->
  <path d="M140 260 Q130 285 118 305 Q135 308 150 300 Q150 280 155 262 Z" fill="#8fce4a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M215 262 Q222 285 232 305 Q215 310 200 300 Q202 280 198 262 Z" fill="#8fce4a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- arms -->
  <path d="M110 190 Q75 200 65 225 Q80 232 95 222 Q110 208 122 200 Z" fill="#8fce4a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M250 190 Q285 200 295 225 Q280 232 265 222 Q250 208 238 200 Z" fill="#8fce4a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- body -->
  <path d="M180 130 Q245 140 250 200 Q255 245 200 268 Q180 276 160 268 Q105 245 110 200 Q115 140 180 130 Z" fill="#a8d84a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- belly -->
  <ellipse cx="180" cy="215" rx="46" ry="42" fill="#e7f6cf" stroke="#2d263c" stroke-width="6"/>

  <!-- back ridge stripes -->
  <path d="M170 145 Q180 165 170 185" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M190 145 Q200 165 190 185" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- head -->
  <ellipse cx="180" cy="120" rx="62" ry="52" fill="#a8d84a" stroke="#2d263c" stroke-width="8"/>

  <!-- antennae -->
  <path d="M150 80 Q120 55 110 25" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M210 80 Q240 55 250 25" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- eyes (large red compound eyes) -->
  <ellipse cx="150" cy="115" rx="30" ry="26" fill="#e6392b" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="210" cy="115" rx="30" ry="26" fill="#e6392b" stroke="#2d263c" stroke-width="7"/>
  <circle cx="140" cy="105" r="6" fill="#fff2c0"/>
  <circle cx="200" cy="105" r="6" fill="#fff2c0"/>

  <!-- small mouth -->
  <path d="M165 148 Q180 156 195 148" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
