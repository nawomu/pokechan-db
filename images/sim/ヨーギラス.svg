<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
    1. ずんぐりした卵型の体、オリーブ緑の岩肌(#7f9a45)
    2. お腹〜胸元はクリーム色のベージュ(#e8d9a8)
    3. 頭頂に赤茶色(#8a3f2c)の三角クレスト(とさか状の突起)
    4. 丸くて赤い目(#c0392b)がやや離れ気味について愛嬌がある
    5. 背中とお尻に小さな三角の突起(とげ)が並ぶ、太くて短いしっぽ
  -->

  <!-- 後ろ: 太くて短いしっぽ -->
  <path d="M 245 250 Q 300 235 305 195 Q 300 240 250 275 Z"
        fill="#7f9a45" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ: 後ろ足(左右) -->
  <ellipse cx="130" cy="288" rx="30" ry="24" fill="#7f9a45" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="220" cy="290" rx="32" ry="26" fill="#7f9a45" stroke="#2d263c" stroke-width="7"/>

  <!-- 体(ずんぐりした卵型) -->
  <path d="M 178 130
           C 100 130 70 200 90 255
           C 108 300 155 305 180 305
           C 205 305 252 300 268 255
           C 288 198 258 130 178 130 Z"
        fill="#7f9a45" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹のベージュ模様 -->
  <path d="M 130 210 C 130 260 155 288 180 288 C 205 288 228 262 228 212
           C 210 240 190 250 178 250 C 166 250 146 238 130 210 Z"
        fill="#e8d9a8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 背中のとげ(3つ) -->
  <path d="M 140 138 L 130 108 L 155 128 Z" fill="#5f7a33" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 178 128 L 172 96 L 198 122 Z" fill="#5f7a33" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 218 138 L 222 108 L 240 132 Z" fill="#5f7a33" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前足(左右) -->
  <ellipse cx="98" cy="240" rx="22" ry="18" fill="#7f9a45" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="262" cy="240" rx="22" ry="18" fill="#7f9a45" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭(丸い岩顔) -->
  <circle cx="180" cy="150" r="88" fill="#7f9a45" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭頂の三角クレスト(赤茶色) -->
  <path d="M 150 78 Q 180 30 210 78 Q 195 65 180 68 Q 165 65 150 78 Z"
        fill="#8a3f2c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 顔の下半分(ベージュのマズル) -->
  <path d="M 118 168 Q 180 215 242 168 Q 225 195 180 200 Q 135 195 118 168 Z"
        fill="#e8d9a8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(赤・離れ気味) -->
  <circle cx="145" cy="145" r="17" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="215" cy="145" r="17" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="148" cy="147" r="9" fill="#c0392b"/>
  <circle cx="212" cy="147" r="9" fill="#c0392b"/>
  <circle cx="151" cy="144" r="2.5" fill="#ffffff"/>
  <circle cx="215" cy="144" r="2.5" fill="#ffffff"/>

  <!-- 口 -->
  <path d="M 158 182 Q 180 195 202 182" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
