<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴:
    1. 体色: 濃紺(#232c5c)の丸っこいずんぐり体型
    2. 頭の左右から伸びる薄水色(#b9c9ec)のくるんとしたポニーテール状の触角2本
    3. 目のまわりを横断する薄水色のバイザー(仮面)模様
    4. 小さい濃い赤紫の丸い目(白ハイライトつき)
    5. 短い手足としっぽ(すべて濃紺)
  -->
  <!-- しっぽ(体の後ろ) -->
  <ellipse cx="180" cy="290" rx="26" ry="20" fill="#232c5c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左ポニーテール(くるん) -->
  <path d="M148,110 C120,90 82,78 72,102 C63,124 88,138 112,124 C128,115 138,112 150,118 Z"
        fill="#b9c9ec" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 右ポニーテール(くるん) -->
  <path d="M212,110 C240,90 278,78 288,102 C297,124 272,138 248,124 C232,115 222,112 210,118 Z"
        fill="#b9c9ec" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 手(左右・体の横のずんぐり手) -->
  <ellipse cx="98" cy="240" rx="22" ry="26" fill="#232c5c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="262" cy="240" rx="22" ry="26" fill="#232c5c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足(左右・下のずんぐり足) -->
  <ellipse cx="140" cy="316" rx="24" ry="18" fill="#232c5c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="220" cy="316" rx="24" ry="18" fill="#232c5c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体・頭が一体化した丸いシルエット -->
  <ellipse cx="180" cy="210" rx="98" ry="105" fill="#232c5c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 目のバイザー(横断する薄水色の帯) -->
  <path d="M108,178 C140,160 220,160 252,178 C250,200 235,208 216,196 C200,186 160,186 144,196 C125,208 110,200 108,178 Z"
        fill="#dbe6f8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(左右・濃い赤紫の丸) -->
  <circle cx="150" cy="182" r="17" fill="#5f2140" stroke="#2d263c" stroke-width="6"/>
  <circle cx="210" cy="182" r="17" fill="#5f2140" stroke="#2d263c" stroke-width="6"/>
  <!-- 目のハイライト -->
  <circle cx="145" cy="176" r="4.5" fill="#ffffff"/>
  <circle cx="205" cy="176" r="4.5" fill="#ffffff"/>

  <!-- 口(小さいへの字) -->
  <path d="M170,222 Q180,230 190,222" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺの丸み(小さい薄色マーク) -->
  <ellipse cx="122" cy="215" rx="10" ry="7" fill="#3a4680"/>
  <ellipse cx="238" cy="215" rx="10" ry="7" fill="#3a4680"/>
</svg>
