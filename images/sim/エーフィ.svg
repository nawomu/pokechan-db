<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 二又しっぽ (後ろ) -->
  <path d="M195 270 Q230 310 260 330 Q275 340 265 325 Q250 305 240 285 Q255 315 270 335 Q280 348 268 332 Q252 308 235 270" fill="#c89acd" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体 -->
  <ellipse cx="180" cy="255" rx="68" ry="55" fill="#d4a8d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 前脚 左 -->
  <ellipse cx="148" cy="302" rx="16" ry="22" fill="#c89acd" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 前脚 右 -->
  <ellipse cx="212" cy="305" rx="15" ry="20" fill="#c89acd" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 首 -->
  <ellipse cx="180" cy="205" rx="30" ry="22" fill="#d4a8d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 耳 左 (後ろ) -->
  <polygon points="140,165 122,100 158,142" fill="#c089b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 耳内側 左 -->
  <polygon points="140,160 127,112 152,145" fill="#f0b8c8" stroke="none"/>

  <!-- 耳 右 -->
  <polygon points="222,162 245,97 208,140" fill="#c089b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 耳内側 右 -->
  <polygon points="220,158 240,110 212,143" fill="#f0b8c8" stroke="none"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="168" rx="58" ry="52" fill="#d4a8d8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 額の飾りふさ -->
  <path d="M165 128 Q180 108 195 128" fill="none" stroke="#c089b8" stroke-width="5" stroke-linecap="round"/>
  <path d="M172 125 Q180 105 188 125" fill="none" stroke="#b07ab0" stroke-width="4" stroke-linecap="round"/>

  <!-- 目 左 -->
  <ellipse cx="160" cy="168" rx="14" ry="16" fill="#fff" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="161" cy="169" rx="9" ry="11" fill="#6644aa"/>
  <ellipse cx="159" cy="167" rx="4" ry="5" fill="#2d1855"/>
  <circle cx="163" cy="164" r="3" fill="white"/>

  <!-- 目 右 -->
  <ellipse cx="200" cy="166" rx="13" ry="15" fill="#fff" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="201" cy="167" rx="8" ry="10" fill="#6644aa"/>
  <ellipse cx="199" cy="165" rx="3.5" ry="4.5" fill="#2d1855"/>
  <circle cx="203" cy="163" r="2.5" fill="white"/>

  <!-- 額の宝石 -->
  <ellipse cx="180" cy="148" rx="9" ry="8" fill="#e03040" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="177" cy="145" rx="3" ry="2.5" fill="#ff7088" stroke="none"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="185" rx="5" ry="3.5" fill="#c080a8" stroke="#2d263c" stroke-width="3"/>

  <!-- 口 -->
  <path d="M172 193 Q180 202 188 193" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ (頬の丸み・淡い色) -->
  <ellipse cx="148" cy="186" rx="13" ry="9" fill="#e8b8d0" stroke="none" opacity="0.7"/>
  <ellipse cx="212" cy="184" rx="12" ry="8" fill="#e8b8d0" stroke="none" opacity="0.7"/>

  <!-- ヒゲ 左 -->
  <line x1="148" y1="188" x2="102" y2="178" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="148" y1="193" x2="100" y2="192" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="148" y1="198" x2="104" y2="207" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- ヒゲ 右 -->
  <line x1="212" y1="186" x2="258" y2="175" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="212" y1="191" x2="260" y2="190" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="212" y1="196" x2="256" y2="205" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- しっぽ根本〜幹 -->
  <path d="M230 262 Q255 250 265 240 Q270 232 258 228" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- しっぽ先端Y字 右枝 -->
  <path d="M258 228 Q275 212 278 195" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- しっぽ先端Y字 左枝 -->
  <path d="M258 228 Q268 208 258 192" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- しっぽ塗り (幹) -->
  <path d="M232 258 Q258 246 268 235 Q276 224 260 220 Q250 218 248 228 Q255 235 252 248 Q240 256 225 265 Z" fill="#c89acd" stroke="none"/>
</svg>