<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 水色(ターコイズ)の3つの頭が水面/砂地から生えているように並ぶ(手足なし・ダグトリオ型)
  2. 頭のてっぺんにオタマジャクシのしっぽのような渦巻き(くるん)が付いている
  3. 大きな丸い目(黒目+白ハイライト)・下にエラのような小さな筋
  4. 中央の頭が一番大きく前・左右はやや小さく後ろに控える
  5. 足元は波打つ水のライン
  -->

  <!-- 足元の水面ライン -->
  <path d="M56 292 Q100 306 150 296 Q180 290 210 296 Q260 306 304 292" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 左の頭(後ろ) -->
  <path d="M104 118 Q80 124 70 156 Q60 194 66 234 Q72 262 90 278 Q102 288 120 284 Q136 278 142 256 Q150 210 142 162 Q136 126 104 118Z" fill="#7FDCD4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M96 128 Q84 116 90 100 Q98 108 100 122 Q108 106 118 108 Q116 122 108 132Z" fill="#3AA8A0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="98" cy="192" rx="12" ry="14" fill="#2d263c"/>
  <ellipse cx="101" cy="188" rx="4" ry="5" fill="#fff"/>
  <path d="M84 226 Q90 234 98 228" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M90 246 Q102 254 116 246" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 右の頭(後ろ) -->
  <path d="M256 118 Q280 124 290 156 Q300 194 294 234 Q288 262 270 278 Q258 288 240 284 Q224 278 218 256 Q210 210 218 162 Q224 126 256 118Z" fill="#7FDCD4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M264 128 Q276 116 270 100 Q262 108 260 122 Q252 106 242 108 Q244 122 252 132Z" fill="#3AA8A0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="262" cy="192" rx="12" ry="14" fill="#2d263c"/>
  <ellipse cx="265" cy="188" rx="4" ry="5" fill="#fff"/>
  <path d="M276 226 Q270 234 262 228" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M244 246 Q256 254 270 246" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 中央の頭(前・一番大きい) -->
  <path d="M180 66 Q146 74 132 122 Q118 178 128 234 Q136 270 158 292 Q168 302 180 302 Q192 302 202 292 Q224 270 232 234 Q242 178 228 122 Q214 74 180 66Z" fill="#5FCFC6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭頂のオタマジャクシしっぽ(渦巻き) -->
  <path d="M180 70 Q160 54 168 32 Q182 44 184 66 Q198 46 214 52 Q210 70 192 78Z" fill="#3AA8A0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 中央 目 左右 -->
  <ellipse cx="158" cy="178" rx="17" ry="19" fill="#2d263c"/>
  <ellipse cx="162" cy="172" rx="6" ry="7" fill="#fff"/>
  <ellipse cx="202" cy="178" rx="17" ry="19" fill="#2d263c"/>
  <ellipse cx="206" cy="172" rx="6" ry="7" fill="#fff"/>

  <!-- エラのような筋 -->
  <path d="M138 214 Q146 222 138 230" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M222 214 Q214 222 222 230" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 中央 口 -->
  <path d="M160 248 Q180 262 200 248" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺの水玉(かわいさ) -->
  <ellipse cx="144" cy="222" rx="8" ry="6" fill="#C7F3EC" opacity="0.7"/>
  <ellipse cx="216" cy="222" rx="8" ry="6" fill="#C7F3EC" opacity="0.7"/>
</svg>
