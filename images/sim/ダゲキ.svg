<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ脚(奥) -->
  <rect x="210" y="255" width="34" height="70" rx="14" fill="#2c3a63" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="227" cy="330" rx="24" ry="12" fill="#e8e6ec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前脚(奥) -->
  <rect x="118" y="255" width="34" height="70" rx="14" fill="#2c3a63" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="135" cy="330" rx="24" ry="12" fill="#e8e6ec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胴体(逆三角の筋肉質) -->
  <path d="M132 150 Q180 130 228 150 Q240 210 218 258 Q180 278 142 258 Q120 210 132 150 Z"
        fill="#33447a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 白い帯(斜めサッシュ) -->
  <path d="M138 158 L228 236 Q222 250 208 254 L128 176 Q126 164 138 158 Z"
        fill="#f0eef4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 腹の筋(ライン) -->
  <path d="M180 190 L180 250" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 右腕(奥・下げ) -->
  <path d="M222 168 Q252 190 250 232 Q248 256 226 260 Q220 236 224 210 Q216 190 222 168 Z"
        fill="#2c3a63" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="234" cy="256" rx="22" ry="19" fill="#f0eef4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左腕(手前・構え上げ) -->
  <path d="M138 170 Q100 176 92 140 Q88 118 108 108 Q120 130 122 156 Q132 168 138 170 Z"
        fill="#33447a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="100" cy="112" rx="24" ry="21" fill="#f8f7fa" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 首 -->
  <rect x="164" y="118" width="32" height="34" rx="12" fill="#33447a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="90" rx="58" ry="52" fill="#33447a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭頂の赤い炎型トサカ -->
  <path d="M140 58 Q150 10 182 4 Q210 2 214 34 Q198 26 186 38 Q188 20 170 24 Q158 34 162 54 Z"
        fill="#d8352f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 太い一本眉(への字) -->
  <path d="M138 78 Q160 62 182 78" stroke="#232030" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- 目(白目・左) -->
  <ellipse cx="152" cy="96" rx="15" ry="13" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 目(白目・右) -->
  <ellipse cx="200" cy="96" rx="15" ry="13" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 瞳(左) -->
  <ellipse cx="156" cy="98" rx="6" ry="8" fill="#1c1c24"/>
  <!-- 瞳(右) -->
  <ellipse cx="196" cy="98" rx="6" ry="8" fill="#1c1c24"/>

  <!-- 口(への字・気合) -->
  <path d="M162 122 Q180 112 198 122" stroke="#2d263c" stroke-width="6" stroke-linecap="round" fill="none"/>
</svg>
