<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (back) -->
  <path d="M250,235 C300,225 318,150 268,92" fill="none" stroke="#2d263c" stroke-width="40" stroke-linecap="round"/>
  <path d="M250,235 C300,225 318,150 268,92" fill="none" stroke="#A879C7" stroke-width="26" stroke-linecap="round"/>
  <circle cx="266" cy="90" r="22" fill="#2d263c" stroke="#2d263c" stroke-width="7"/>

  <!-- back legs -->
  <rect x="118" y="255" width="28" height="55" rx="14" fill="#A879C7" stroke="#2d263c" stroke-width="7"/>
  <rect x="214" y="255" width="28" height="55" rx="14" fill="#A879C7" stroke="#2d263c" stroke-width="7"/>

  <!-- body -->
  <ellipse cx="180" cy="222" rx="88" ry="62" fill="#A879C7" stroke="#2d263c" stroke-width="8"/>
  <ellipse cx="182" cy="250" rx="52" ry="34" fill="#F6E8C8" stroke="#2d263c" stroke-width="7"/>

  <!-- front legs -->
  <rect x="142" y="268" width="28" height="58" rx="14" fill="#A879C7" stroke="#2d263c" stroke-width="7"/>
  <rect x="192" y="268" width="28" height="58" rx="14" fill="#A879C7" stroke="#2d263c" stroke-width="7"/>

  <!-- head -->
  <circle cx="180" cy="140" r="70" fill="#A879C7" stroke="#2d263c" stroke-width="8"/>

  <!-- ears -->
  <path d="M128,98 L96,34 L152,92 Z" fill="#A879C7" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M232,98 L264,34 L208,92 Z" fill="#A879C7" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M132,90 L112,50 L146,86 Z" fill="#7A4FA0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M228,90 L248,50 L214,86 Z" fill="#7A4FA0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- muzzle -->
  <ellipse cx="180" cy="165" rx="38" ry="27" fill="#F6E8C8" stroke="#2d263c" stroke-width="7"/>

  <!-- eyes -->
  <ellipse cx="152" cy="136" rx="16" ry="20" fill="#E8536B" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="208" cy="136" rx="16" ry="20" fill="#E8536B" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="152" cy="140" rx="6" ry="9" fill="#2d263c"/>
  <ellipse cx="208" cy="140" rx="6" ry="9" fill="#2d263c"/>

  <!-- nose -->
  <path d="M175,152 L185,152 L180,160 Z" fill="#2d263c"/>

  <!-- mouth (smirk) -->
  <path d="M160,178 Q180,192 200,174" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- whiskers left -->
  <line x1="145" y1="162" x2="100" y2="150" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="143" y1="170" x2="98" y2="170" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="145" y1="178" x2="100" y2="190" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- whiskers right -->
  <line x1="215" y1="162" x2="260" y2="150" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="217" y1="170" x2="262" y2="170" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="215" y1="178" x2="260" y2="190" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
