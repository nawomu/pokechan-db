<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ヒスイのかけら風背景結晶(うしろ) -->
  <polygon points="290,60 310,40 325,70 305,85" fill="#b8d4c0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="300,75 320,55 338,90 315,100" fill="#cce8d8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="38,55 55,35 72,65 50,80" fill="#b8d4c0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="28,72 50,50 68,82 42,95" fill="#cce8d8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <ellipse cx="182" cy="210" rx="68" ry="75" fill="#c8a46e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- おなかの薄いベージュ -->
  <ellipse cx="182" cy="218" rx="44" ry="52" fill="#e8d4a8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左腕(石斧・左) 大きく -->
  <polygon points="60,130 30,95 55,70 85,85 110,140 95,165" fill="#c8a46e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 左斧刃(ヒスイ石) -->
  <polygon points="30,95 10,60 55,50 70,85" fill="#b0d4be" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="10,60 25,30 58,42 55,50" fill="#cce8d8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 右腕(石斧・右) 大きく -->
  <polygon points="300,130 332,92 308,68 278,82 254,138 270,162" fill="#c8a46e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 右斧刃(ヒスイ石) -->
  <polygon points="332,92 352,56 308,46 292,80" fill="#b0d4be" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="352,56 338,26 304,38 308,46" fill="#cce8d8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 背中の結晶翼(左) -->
  <polygon points="140,155 105,120 120,95 155,130 158,158" fill="#aacfba" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 背中の結晶翼(右) -->
  <polygon points="224,155 260,118 245,93 208,128 205,158" fill="#aacfba" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭部 -->
  <ellipse cx="183" cy="148" rx="52" ry="48" fill="#c8a46e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ツノ(頭頂部・石っぽく割れてる) -->
  <polygon points="165,108 158,78 175,65 180,90 183,108" fill="#9b8060" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="196,108 188,78 204,65 212,82 208,108" fill="#9b8060" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 複眼(左) ちょっとグリグリ -->
  <ellipse cx="162" cy="148" rx="18" ry="16" fill="#8b4a2a" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="158" cy="144" rx="7" ry="7" fill="#c06030" stroke="none"/>
  <ellipse cx="156" cy="142" rx="3" ry="3" fill="#ffffff" stroke="none"/>

  <!-- 複眼(右) -->
  <ellipse cx="204" cy="148" rx="18" ry="16" fill="#8b4a2a" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="200" cy="144" rx="7" ry="7" fill="#c06030" stroke="none"/>
  <ellipse cx="198" cy="142" rx="3" ry="3" fill="#ffffff" stroke="none"/>

  <!-- 口・アゴ(前に出た感じ) -->
  <path d="M165,168 Q183,185 202,168" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <rect x="168" y="166" width="30" height="10" rx="4" fill="#9b8060" stroke="#2d263c" stroke-width="5"/>

  <!-- 胴体のヒスイ結晶パッチ(肩あたり) -->
  <polygon points="148,195 132,178 148,168 162,180" fill="#b8d4c0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="218,195 235,176 218,166 205,180" fill="#b8d4c0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 脚(左) ずんぐり -->
  <rect x="148" y="272" width="34" height="50" rx="10" fill="#b89050" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="144" y="310" width="42" height="18" rx="8" fill="#9b8060" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 脚(右) ずんぐり -->
  <rect x="182" y="272" width="34" height="50" rx="10" fill="#b89050" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="178" y="310" width="42" height="18" rx="8" fill="#9b8060" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- おなかの縦線(カブトムシっぽい分節) -->
  <line x1="182" y1="188" x2="182" y2="262" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="230" x2="205" y2="230" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="156" y1="250" x2="208" y2="250" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
</svg>