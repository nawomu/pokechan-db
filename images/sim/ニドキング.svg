  <ellipse cx="207" cy="92" rx="12" ry="15" fill="#D6483C" stroke="#2d263c" stroke-width="6"/>
  <circle cx="151" cy="87" r="3.5" fill="#fff"/>
  <circle cx="203" cy="87" r="3.5" fill="#fff"/>

  <!-- nostrils -->
