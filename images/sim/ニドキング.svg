  <path d="M180,110 Q235,112 245,175 Q252,225 225,260 Q205,278 180,278 Q155,278 135,260 Q108,225 115,175 Q125,112 180,110 Z" fill="#9B72C4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

