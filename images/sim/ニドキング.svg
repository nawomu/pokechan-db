  <path d="M240,165 Q270,182 278,216 Q283,236 268,241 Q256,243 253,226 Q246,196 224,178 Z" fill="#9B72C4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="93" cy="228" r="20" fill="#9B72C4" stroke="#2d263c" stroke-width="7"/>
  <circle cx="269" cy="229" r="20" fill="#9B72C4" stroke="#2d263c" stroke-width="7"/>

