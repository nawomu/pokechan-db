<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: ①上半身は丸くずんぐりしただるま型シルエット(頭と胴が一体) ②体色は鮮やかなオレンジ〜赤(#e8541e) ③腰から下は黒い袴のような模様 ④白いもじゃもじゃの眉毛と口ひげ ⑤怒ったような吊り目とへの字口・小さい丸耳と黒い手足 -->

  <!-- 耳(体の後ろ) -->
  <circle cx="112" cy="78" r="20" fill="#e8541e" stroke="#2d263c" stroke-width="7"/>
  <circle cx="248" cy="78" r="20" fill="#e8541e" stroke="#2d263c" stroke-width="7"/>

  <!-- 腕(黒・体の後ろに軸) -->
  <ellipse cx="58" cy="205" rx="26" ry="42" transform="rotate(-18 58 205)" fill="#302c38" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="302" cy="205" rx="26" ry="42" transform="rotate(18 302 205)" fill="#302c38" stroke="#2d263c" stroke-width="7"/>

  <!-- 足(黒) -->
  <ellipse cx="142" cy="318" rx="30" ry="20" fill="#302c38" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="218" cy="318" rx="30" ry="20" fill="#302c38" stroke="#2d263c" stroke-width="7"/>

  <!-- 胴＋頭(一体のだるま型シルエット) -->
  <path d="M132,70 C95,70 72,112 66,160 C60,208 56,252 74,282 C92,312 132,322 180,322 C228,322 268,312 286,282 C304,252 300,208 294,160 C288,112 265,70 228,70 C208,54 152,54 132,70 Z"
        fill="#e8541e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腰から下の黒い模様(袴) -->
  <path d="M78,238 C72,266 76,296 98,310 C130,324 230,324 262,310 C284,296 288,266 282,238 C262,256 98,256 78,238 Z"
        fill="#2b2731" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 眉毛(白いもじゃもじゃ・炎のような房) -->
  <path d="M96,142 C104,120 130,110 152,120 C142,132 136,148 140,164 C118,168 100,160 96,142 Z"
        fill="#fbf7ec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M264,142 C256,120 230,110 208,120 C218,132 224,148 220,164 C242,168 260,160 264,142 Z"
        fill="#fbf7ec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 口ひげ(白いもじゃもじゃ) -->
  <path d="M132,214 C140,200 168,196 180,206 C192,196 220,200 228,214 C220,236 200,246 180,240 C160,246 140,236 132,214 Z"
        fill="#fbf7ec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(吊り目・怒った表情) -->
  <circle cx="140" cy="168" r="15" fill="#221e29" stroke="#2d263c" stroke-width="6"/>
  <circle cx="220" cy="168" r="15" fill="#221e29" stroke="#2d263c" stroke-width="6"/>
  <circle cx="135" cy="163" r="4" fill="#fbf7ec"/>
  <circle cx="215" cy="163" r="4" fill="#fbf7ec"/>

  <!-- 口(への字・怒った口) -->
  <path d="M158,232 Q180,220 202,232" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>
