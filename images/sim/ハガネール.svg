<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 胴体ブロック4（一番下・細い） -->
  <rect x="148" y="295" width="64" height="38" rx="10" ry="10" fill="#7A7E96" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <line x1="162" y1="300" x2="162" y2="328" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="198" y1="300" x2="198" y2="328" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- しっぽ先端 -->
  <ellipse cx="180" cy="336" rx="22" ry="11" fill="#6A6E85" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胴体ブロック3 -->
  <rect x="138" y="250" width="84" height="50" rx="11" ry="11" fill="#8B8FA8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <line x1="155" y1="256" x2="155" y2="294" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="205" y1="256" x2="205" y2="294" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <!-- 菱形模様 -->
  <polygon points="180,262 192,275 180,288 168,275" fill="none" stroke="#2d263c" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 胴体ブロック2 -->
  <rect x="128" y="198" width="104" height="57" rx="12" ry="12" fill="#8B8FA8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <line x1="148" y1="205" x2="148" y2="248" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="212" y1="205" x2="212" y2="248" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <polygon points="180,208 196,224 180,240 164,224" fill="none" stroke="#2d263c" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 胴体ブロック1（頭の直下・大きめ） -->
  <rect x="115" y="140" width="130" height="64" rx="14" ry="14" fill="#8B8FA8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <line x1="138" y1="148" x2="138" y2="196" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="222" y1="148" x2="222" y2="196" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <polygon points="180,148 200,166 180,184 160,166" fill="none" stroke="#2d263c" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 頭部・顎（下あご）後ろ側 -->
  <path d="M108,128 Q80,148 72,168 Q78,176 108,170 Q140,180 180,182 Q220,180 252,170 Q282,176 288,168 Q280,148 252,128 Z" fill="#7A7E96" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭部メイン -->
  <path d="M95,70 Q88,52 100,40 Q120,28 180,30 Q240,28 260,40 Q272,52 265,70 Q268,100 265,128 Q250,140 180,142 Q110,140 95,128 Z" fill="#8B8FA8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭部の角（4本）– 左外・左内・右内・右外 -->
  <polygon points="108,58 96,28 112,32 118,56" fill="#7A7E96" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="140,48 132,20 148,24 150,46" fill="#7A7E96" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="220,48 210,46 212,24 228,20" fill="#7A7E96" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="252,58 242,56 248,32 264,28" fill="#7A7E96" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顎（大きく張り出したアゴ）– 下部 -->
  <path d="M100,128 Q82,136 78,160 Q82,172 108,172 Q140,180 180,182 Q220,180 252,172 Q278,172 282,160 Q278,136 260,128 Q230,150 180,152 Q130,150 100,128 Z" fill="#6A6E85" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 牙（左） -->
  <polygon points="136,170 124,196 148,190" fill="#E8E4D4" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 牙（右） -->
  <polygon points="224,170 212,190 236,196" fill="#E8E4D4" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目（左）– 鋭く怒った赤い目 -->
  <ellipse cx="135" cy="88" rx="16" ry="13" fill="#CC2222" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="135" cy="91" rx="8" ry="7" fill="#880000"/>
  <!-- 眉（左・怒り） -->
  <line x1="120" y1="76" x2="148" y2="80" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 目（右）– 少し非対称 -->
  <ellipse cx="225" cy="86" rx="15" ry="14" fill="#CC2222" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="225" cy="89" rx="7" ry="8" fill="#880000"/>
  <!-- 眉（右・怒り） -->
  <line x1="212" y1="74" x2="240" y2="79" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 鼻の穴（2つ） -->
  <ellipse cx="168" cy="112" rx="6" ry="4" fill="#5A5E75" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="192" cy="112" rx="6" ry="4" fill="#5A5E75" stroke="#2d263c" stroke-width="3"/>

  <!-- 口の線 -->
  <path d="M112,130 Q180,125 248,130" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>