<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)ずんぐりした魚形の体(オレンジ系) 2)紺色の不規則なまだら模様 3)4本の長いひげ 4)くりっとした目と横に広い口 5)小さいひれと尾びれ(青灰色) -->

  <!-- 後ろ: 尾びれ -->
  <ellipse cx="300" cy="190" rx="42" ry="30" fill="#6f8faf" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ: 背びれ -->
  <path d="M150,90 Q190,40 250,80 Q210,100 190,110 Z" fill="#6f8faf" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 後ろ: 下側の腹びれ -->
  <path d="M180,280 Q210,320 250,300 Q225,285 210,270 Z" fill="#6f8faf" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体: ずんぐりした魚型 -->
  <path d="M70,190
           C70,120 140,80 210,85
           C270,88 320,130 320,190
           C320,250 265,295 195,292
           C130,290 70,255 70,190 Z"
        fill="#eaa746" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の明るい部分 -->
  <path d="M110,230 C140,270 200,282 240,265 C200,285 140,280 110,230 Z" fill="#fbdca0" stroke="none"/>

  <!-- 紺色のまだら模様 -->
  <ellipse cx="150" cy="130" rx="26" ry="18" fill="#33447a" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="225" cy="115" rx="20" ry="15" fill="#33447a" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="255" cy="180" rx="24" ry="20" fill="#33447a" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="180" cy="220" rx="22" ry="16" fill="#33447a" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="120" cy="200" rx="18" ry="14" fill="#33447a" stroke="#2d263c" stroke-width="6"/>

  <!-- 胸びれ -->
  <path d="M110,215 Q90,250 110,275 Q135,255 130,225 Z" fill="#6f8faf" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ひげ 上2本 -->
  <path d="M95,155 Q50,140 20,110" fill="none" stroke="#8a8f9c" stroke-width="8" stroke-linecap="round"/>
  <path d="M100,175 Q55,180 25,165" fill="none" stroke="#8a8f9c" stroke-width="8" stroke-linecap="round"/>
  <!-- ひげ 下2本 -->
  <path d="M100,200 Q55,220 30,245" fill="none" stroke="#8a8f9c" stroke-width="8" stroke-linecap="round"/>
  <path d="M110,220 Q70,250 45,280" fill="none" stroke="#8a8f9c" stroke-width="8" stroke-linecap="round"/>

  <!-- 口(横に広い) -->
  <path d="M85,195 Q130,220 175,198" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 目 -->
  <circle cx="120" cy="150" r="20" fill="#fff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="124" cy="153" r="10" fill="#2d263c"/>
  <circle cx="127" cy="149" r="3" fill="#fff"/>

  <circle cx="185" cy="140" r="18" fill="#fff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="189" cy="143" r="9" fill="#2d263c"/>
  <circle cx="192" cy="139" r="3" fill="#fff"/>

  <!-- ほほの丸み(かわいさ) -->
  <circle cx="105" cy="180" r="10" fill="#f6b96b" opacity="0.7"/>
</svg>
