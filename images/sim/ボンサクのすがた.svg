  <path d="M95 205 Q180 232 265 205" fill="none" stroke="#2d263c" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
  <!-- lid -->
  <ellipse cx="180" cy="140" rx="50" ry="22" fill="#6e5236" stroke="#2d263c" stroke-width="7"/>
  <!-- knob -->
  <circle cx="180" cy="128" r="10" fill="#6e5236" stroke="#2d263c" stroke-width="6"/>
  <!-- unkempt whisk twigs -->
  <path d="M180 128 Q160 85 140 50" fill="none" stroke="#b7a06a" stroke-width="6" stroke-linecap="round"/>
  <path d="M180 128 Q170 80 158 40" fill="none" stroke="#b7a06a" stroke-width="6" stroke-linecap="round"/>
  <path d="M180 128 Q180 75 180 35" fill="none" stroke="#b7a06a" stroke-width="6" stroke-linecap="round"/>
  <path d="M180 128 Q190 80 202 40" fill="none" stroke="#b7a06a" stroke-width="6" stroke-linecap="round"/>
  <path d="M180 128 Q200 85 220 50" fill="none" stroke="#b7a06a" stroke-width="6" stroke-linecap="round"/>
  <path d="M180 128 Q210 95 235 70" fill="none" stroke="#b7a06a" stroke-width="6" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="150" cy="190" rx="9" ry="10" fill="#2d263c"/>
  <circle cx="153" cy="186" r="3" fill="#ffffff"/>
  <ellipse cx="210" cy="190" rx="9" ry="10" fill="#2d263c"/>
  <circle cx="213" cy="186" r="3" fill="#ffffff"/>
  <!-- neutral wavy mouth -->
  <path d="M158 215 Q169 222 180 215 Q191 222 202 215" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- matcha tea stain spots -->
  <circle cx="158" cy="238" r="6" fill="#8a9a5b" opacity="0.5"/>
  <circle cx="202" cy="242" r="5" fill="#8a9a5b" opacity="0.5"/>
  <circle cx="180" cy="256" r="4" fill="#8a9a5b" opacity="0.5"/>
</svg>
