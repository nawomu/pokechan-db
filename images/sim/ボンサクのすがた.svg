<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ghostly wispy trailing bottom -->
  <path d="M115 250 Q125 300 145 255 Q155 305 175 255 Q185 308 205 255 Q220 300 245 250 Q225 272 180 276 Q135 272 115 250 Z" fill="#cfe0a8" opacity="0.6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- teapot handle (left loop) -->
  <path d="M95 175 Q45 175 45 215 Q45 255 95 245" fill="none" stroke="#2d263c" stroke-width="12" stroke-linecap="round"/>
  <path d="M95 175 Q52 178 52 215 Q52 252 95 245" fill="none" stroke="#a8895f" stroke-width="7" stroke-linecap="round"/>
