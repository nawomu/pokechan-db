<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
    1. 頭上に3枚の尖った緑の葉(左右斜め+中央)
    2. 丸っこい種(たね)型の胴体、クリーム〜薄黄色
    3. 胴体下部がややすぼまる(涙滴/木の実シルエット)
    4. 顔は胴体上部にシンプルな丸い目2つ+小さな口、手足なし
    5. 胴体に縦の薄茶色スジ模様(種っぽいテクスチャ)
  -->

  <!-- 後ろ: 葉っぱ(奥の左右) -->
  <path d="M150 90 C120 60 90 40 70 45 C85 65 100 90 130 105 Z" fill="#6fae3e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M210 90 C240 60 270 40 290 45 C275 65 260 90 230 105 Z" fill="#6fae3e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体: 種っぽい丸みのある形(下すぼまり) -->
  <path d="M180 90
           C240 90 275 140 270 205
           C266 260 230 300 180 300
           C130 300 94 260 90 205
           C85 140 120 90 180 90 Z"
        fill="#f3e6a3" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体の下側の陰(すぼまり感を強調) -->
  <path d="M105 230 C120 275 150 296 180 298 C210 296 240 275 255 230
           C230 265 205 280 180 280 C155 280 130 265 105 230 Z"
        fill="#e6cf7a" stroke="none"/>

  <!-- 種のスジ模様(縦ライン) -->
  <path d="M140 130 C125 175 125 235 150 285" fill="none" stroke="#c9a24a" stroke-width="6" stroke-linecap="round"/>
  <path d="M220 130 C235 175 235 235 210 285" fill="none" stroke="#c9a24a" stroke-width="6" stroke-linecap="round"/>
  <path d="M180 110 L180 300" fill="none" stroke="#c9a24a" stroke-width="5" stroke-linecap="round"/>

  <!-- 頭上: 中央の葉(手前) -->
  <path d="M180 95 C165 55 165 20 180 10 C195 20 195 55 180 95 Z"
        fill="#8bc34a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M180 20 L180 90" fill="none" stroke="#5d8f2e" stroke-width="4" stroke-linecap="round"/>

  <!-- 手前の左右の葉 -->
  <path d="M155 100 C120 75 95 60 78 68 C95 85 110 105 145 118 Z"
        fill="#8bc34a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M205 100 C240 75 265 60 282 68 C265 85 250 105 215 118 Z"
        fill="#8bc34a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 顔: 目 -->
  <circle cx="150" cy="175" r="11" fill="#2d263c"/>
  <circle cx="210" cy="175" r="11" fill="#2d263c"/>
  <circle cx="153" cy="171" r="3" fill="#ffffff"/>
  <circle cx="213" cy="171" r="3" fill="#ffffff"/>

  <!-- 顔: ほっぺ -->
  <circle cx="128" cy="200" r="10" fill="#f6b98a" opacity="0.7"/>
  <circle cx="232" cy="200" r="10" fill="#f6b98a" opacity="0.7"/>

  <!-- 顔: 口 -->
  <path d="M165 205 C172 213 188 213 195 205" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
