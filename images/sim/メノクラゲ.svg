<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ: 触手(体の後ろに垂れる紫の足) -->
  <path d="M 130 210 Q 118 260 128 300 Q 132 320 122 340" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M 130 210 Q 118 260 128 300 Q 132 320 122 340" fill="none" stroke="#7a4fb0" stroke-width="5" stroke-linecap="round"/>
  <path d="M 160 220 Q 150 270 158 305 Q 162 325 152 345" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M 160 220 Q 150 270 158 305 Q 162 325 152 345" fill="none" stroke="#8a5cc0" stroke-width="5" stroke-linecap="round"/>
  <path d="M 200 220 Q 210 270 202 305 Q 198 325 208 345" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M 200 220 Q 210 270 202 305 Q 198 325 208 345" fill="none" stroke="#8a5cc0" stroke-width="5" stroke-linecap="round"/>
  <path d="M 230 210 Q 242 260 232 300 Q 228 320 238 340" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M 230 210 Q 242 260 232 300 Q 228 320 238 340" fill="none" stroke="#7a4fb0" stroke-width="5" stroke-linecap="round"/>

  <!-- 体: 丸いベル型(ドーム) -->
  <path d="M 90 210
           C 90 130 130 70 180 70
           C 230 70 270 130 270 210
           C 270 225 255 225 245 220
           C 230 235 210 235 195 222
           C 180 235 160 235 145 220
           C 130 232 110 228 100 218
           C 92 216 90 213 90 210 Z"
        fill="#5fb8e0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体の縦スジ模様 -->
  <path d="M 130 90 Q 120 150 125 205" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <path d="M 230 90 Q 240 150 235 205" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" opacity="0.55"/>

  <!-- 頭のてっぺんの赤い宝石 -->
  <circle cx="180" cy="82" r="16" fill="#e2402a" stroke="#2d263c" stroke-width="6"/>
  <circle cx="175" cy="77" r="4" fill="#ffffff" opacity="0.8"/>

  <!-- 体下部の丸い赤い模様(左右対称) -->
  <circle cx="120" cy="200" r="12" fill="#e2402a" stroke="#2d263c" stroke-width="6"/>
  <circle cx="240" cy="200" r="12" fill="#e2402a" stroke="#2d263c" stroke-width="6"/>

  <!-- 目(左右の大きな赤い目) -->
  <circle cx="150" cy="150" r="24" fill="#ffffff" stroke="#2d263c" stroke-width="7"/>
  <circle cx="210" cy="150" r="24" fill="#ffffff" stroke="#2d263c" stroke-width="7"/>
  <circle cx="150" cy="152" r="14" fill="#e2402a"/>
  <circle cx="210" cy="152" r="14" fill="#e2402a"/>
  <circle cx="150" cy="152" r="6" fill="#241a1a"/>
  <circle cx="210" cy="152" r="6" fill="#241a1a"/>
  <circle cx="146" cy="147" r="3" fill="#ffffff"/>
  <circle cx="206" cy="147" r="3" fill="#ffffff"/>

  <!-- 口 -->
  <path d="M 168 190 Q 180 198 192 190" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
