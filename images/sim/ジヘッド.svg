<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <g stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round">
    <!-- tail (back) -->
    <path d="M258,268 Q292,278 278,302 Q260,292 253,270 Z" fill="#3d3760"/>
    <!-- body -->
    <ellipse cx="180" cy="235" rx="95" ry="65" fill="#3d3760"/>
    <!-- legs -->
    <ellipse cx="152" cy="303" rx="15" ry="23" fill="#3d3760"/>
    <ellipse cx="208" cy="303" rx="15" ry="23" fill="#3d3760"/>
    <!-- necks -->
    <path d="M150,200 C130,172 100,152 85,122 C100,106 120,100 135,106 C145,136 150,166 165,200 Z" fill="#3d3760"/>
    <path d="M210,200 C230,172 260,152 275,122 C260,106 240,100 225,106 C215,136 210,166 195,200 Z" fill="#3d3760"/>
    <!-- heads -->
    <ellipse cx="95" cy="100" rx="42" ry="36" fill="#524b7a"/>
    <ellipse cx="265" cy="100" rx="42" ry="36" fill="#524b7a"/>
    <!-- horns -->
    <path d="M95,45 L83,72 L107,72 Z" fill="#d9d5e8"/>
    <path d="M265,45 L253,72 L277,72 Z" fill="#d9d5e8"/>
    <!-- eyes -->
    <circle cx="78" cy="95" r="9" fill="#f2d24d" stroke-width="3"/>
    <circle cx="76" cy="95" r="4" fill="#241f30" stroke="none"/>
    <circle cx="282" cy="95" r="9" fill="#f2d24d" stroke-width="3"/>
    <circle cx="284" cy="95" r="4" fill="#241f30" stroke="none"/>
  </g>
  <!-- belly patch (no stroke) -->
  <ellipse cx="180" cy="265" rx="55" ry="32" fill="#8f8fb0" stroke="none"/>
  <!-- chin markings -->
  <path d="M70,115 Q95,140 120,115 Q95,128 70,115 Z" fill="#a83a3a" stroke="none"/>
  <path d="M240,115 Q265,140 290,115 Q265,128 240,115 Z" fill="#a83a3a" stroke="none"/>
  <!-- feet claws -->
  <path d="M140,323 L138,331 M152,326 L152,335 M164,323 L166,331" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M196,323 L194,331 M208,326 L208,335 M220,323 L222,331" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <!-- mouths -->
  <path d="M70,122 Q95,133 118,122" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M242,122 Q265,133 290,122" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
