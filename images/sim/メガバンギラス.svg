  <polygon points="315,268 330,250 340,275 320,278" fill="#3a4f38" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体(胴体) -->
  <ellipse cx="180" cy="240" rx="85" ry="95" fill="#4d6e47" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹の色(青紫) -->
  <ellipse cx="178" cy="252" rx="52" ry="68" fill="#7080b8" stroke="#2d263c" stroke-width="6"/>

  <!-- 腹のウロコ模様 -->
  <polygon points="178,195 163,210 170,228 186,228 193,210" fill="#5d6ea8" stroke="#2d263c" stroke-width="4"/>
  <polygon points="178,230 160,244 167,265 189,265 196,244" fill="#5d6ea8" stroke="#2d263c" stroke-width="4"/>
  <polygon points="178,268 163,282 170,298 186,298 193,282" fill="#5d6ea8" stroke="#2d263c" stroke-width="4"/>

  <!-- 左腕 -->
  <ellipse cx="106" cy="235" rx="22" ry="38" fill="#4a6741" stroke="#2d263c" stroke-width="7" transform="rotate(-15,106,235)"/>
  <!-- 左手の爪 -->
  <polygon points="92,265 80,280 90,286 96,272" fill="#2d3a2c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="100,270 88,287 100,290 104,275" fill="#2d3a2c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 右腕 -->
  <ellipse cx="254" cy="235" rx="22" ry="38" fill="#4a6741" stroke="#2d263c" stroke-width="7" transform="rotate(15,254,235)"/>
  <!-- 右手の爪 -->
  <polygon points="262,268 278,281 268,288 261,274" fill="#2d3a2c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="254,272 268,290 256,292 252,277" fill="#2d3a2c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 背中の岩棘 -->
  <polygon points="148,158 138,122 158,140" fill="#3a4f38" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="178,152 172,112 190,136" fill="#3a4f38" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="208,158 202,122 220,142" fill="#3a4f38" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 首 -->
  <rect x="158" y="148" width="44" height="35" rx="10" fill="#4a6741" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="120" rx="58" ry="52" fill="#4a6741" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭の角(左) -->
  <polygon points="138,90 118,45 155,78" fill="#3a4f38" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 頭の角(右) -->
  <polygon points="222,90 242,45 205,78" fill="#3a4f38" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 顎のゴツゴツ -->
  <polygon points="155,148 148,162 162,165 170,150" fill="#3e5a3a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="205,148 212,162 198,165 190,150" fill="#3e5a3a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左目 -->
  <ellipse cx="158" cy="112" rx="14" ry="11" fill="#cc2222" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="160" cy="111" rx="6" ry="5" fill="#880000"/>
  <!-- 怒り眉(左) -->
  <line x1="144" y1="100" x2="170" y2="105" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 右目 -->
  <ellipse cx="202" cy="112" rx="14" ry="11" fill="#cc2222" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="200" cy="111" rx="6" ry="5" fill="#880000"/>
  <!-- 怒り眉(右) -->
  <line x1="216" y1="100" x2="190" y2="105" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 鼻孔 -->
  <ellipse cx="172" cy="128" rx="5" ry="4" fill="#2d3a2c"/>
  <ellipse cx="188" cy="128" rx="5" ry="4" fill="#2d3a2c"/>

  <!-- 口 -->
  <path d="M158,138 Q180,152 202,138" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- 牙 -->
  <polygon points="168,140 163,155 173,152" fill="#e8e0c8" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="192,140 197,155 187,152" fill="#e8e0c8" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 足(左) -->
  <ellipse cx="148" cy="325" rx="28" ry="22" fill="#4a6741" stroke="#2d263c" stroke-width="7"/>
  <!-- 足爪(左) -->
  <polygon points="128,330 114,345 124,350 132,338" fill="#2d3a2c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="142,335 132,352 144,355 148,340" fill="#2d3a2c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 足(右) -->
  <ellipse cx="212" cy="325" rx="28" ry="22" fill="#4a6741" stroke="#2d263c" stroke-width="7"/>
  <!-- 足爪(右) -->
  <polygon points="232,330 246,345 236,350 228,338" fill="#2d3a2c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="218,335 228,352 216,355 212,340" fill="#2d3a2c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 胴とつなぐ足首(左) -->
  <rect x="132" y="300" width="32" height="30" rx="6" fill="#4a6741" stroke="#2d263c" stroke-width="6"/>
  <!-- 胴とつなぐ足首(右) -->
  <rect x="196" y="300" width="32" height="30" rx="6" fill="#4a6741" stroke="#2d263c" stroke-width="6"/>

  <!-- 肩の岩斑紋(左) -->
  <ellipse cx="116" cy="210" rx="14" ry="10" fill="#3a4f38" stroke="#2d263c" stroke-width="5" transform="rotate(-20,116,210)"/>
  <!-- 肩の岩斑紋(右) -->
  <ellipse cx="244" cy="210" rx="14" ry="10" fill="#3a4f38" stroke="#2d263c" stroke-width="5" transform="rotate(20,244,210)"/>
</svg>