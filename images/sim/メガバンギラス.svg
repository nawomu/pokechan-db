<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 背中の翼(左) -->
  <polygon points="100,90 55,40 40,110 70,130" fill="#3a4f38" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="90,100 35,70 28,140 65,145" fill="#3a4f38" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 背中の翼(右) -->
  <polygon points="260,90 305,40 320,110 290,130" fill="#3a4f38" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="270,100 325,70 332,140 295,145" fill="#3a4f38" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- しっぽ -->
  <ellipse cx="285" cy="290" rx="28" ry="18" fill="#4a6b45" stroke="#2d263c" stroke-width="7"/>
  <polygon points="275,285 305,270 320,300 290,308" fill="#4a6b45" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
