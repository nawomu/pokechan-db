<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 後ろの腕（左右の上の腕）-->
  <!-- 左後ろ上腕 -->
  <ellipse cx="82" cy="148" rx="28" ry="22" fill="#b8b0cc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左後ろ前腕 -->
  <ellipse cx="52" cy="178" rx="22" ry="18" fill="#c4bcd8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左後ろこぶし -->
  <ellipse cx="36" cy="205" rx="20" ry="17" fill="#d4ccdc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 右後ろ上腕 -->
  <ellipse cx="278" cy="148" rx="28" ry="22" fill="#b8b0cc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右後ろ前腕 -->
  <ellipse cx="308" cy="178" rx="22" ry="18" fill="#c4bcd8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右後ろこぶし -->
  <ellipse cx="324" cy="205" rx="20" ry="17" fill="#d4ccdc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体（大きな逆三角形っぽいボディ）-->
  <path d="M125,90 Q180,78 235,90 Q258,130 252,200 Q232,230 180,238 Q128,230 108,200 Q102,130 125,90 Z"
        fill="#9e96b8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹（クリーム色） -->
  <ellipse cx="180" cy="185" rx="42" ry="46" fill="#e8dfc0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 腰・下半身 -->
  <path d="M148,228 Q180,240 212,228 Q218,260 212,290 Q180,300 148,290 Q142,260 148,228 Z"
        fill="#9e96b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左足 -->
  <path d="M150,288 Q138,310 132,330 Q148,336 162,330 Q164,310 158,288 Z"
        fill="#9e96b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左足先 -->
  <ellipse cx="147" cy="334" rx="19" ry="10" fill="#7a7294" stroke="#2d263c" stroke-width="6"/>

  <!-- 右足 -->
  <path d="M210,288 Q222,310 228,330 Q212,336 198,330 Q196,310 202,288 Z"
        fill="#9e96b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右足先 -->
  <ellipse cx="213" cy="334" rx="19" ry="10" fill="#7a7294" stroke="#2d263c" stroke-width="6"/>

  <!-- 前の腕（手前・左） -->
  <!-- 左前上腕 -->
  <path d="M128,122 Q96,138 88,168 Q94,178 108,175 Q116,152 142,140 Z"
        fill="#a89ec8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左前前腕 -->
  <path d="M94,170 Q68,190 62,218 Q72,228 84,222 Q90,200 112,178 Z"
        fill="#b0a8d0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左前こぶし -->
  <ellipse cx="70" cy="228" rx="22" ry="19" fill="#c8c0d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 前の腕（手前・右） -->
  <!-- 右前上腕 -->
  <path d="M232,122 Q264,138 272,168 Q266,178 252,175 Q244,152 218,140 Z"
        fill="#a89ec8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右前前腕 -->
  <path d="M266,170 Q292,190 298,218 Q288,228 276,222 Q270,200 248,178 Z"
        fill="#b0a8d0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右前こぶし -->
  <ellipse cx="290" cy="228" rx="22" ry="19" fill="#c8c0d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="82" rx="52" ry="46" fill="#9e96b8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 顔のクリーム色部分（顔の下半分） -->
  <ellipse cx="180" cy="92" rx="36" ry="32" fill="#e8dfc0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目（左）→ちょっと小さめでキリっと -->
  <ellipse cx="162" cy="76" rx="9" ry="9" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="164" cy="77" rx="5" ry="5" fill="#1a1226"/>
  <!-- 目の光 -->
  <ellipse cx="166" cy="75" rx="2" ry="2" fill="white"/>

  <!-- 目（右）-->
  <ellipse cx="198" cy="76" rx="9" ry="9" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="196" cy="77" rx="5" ry="5" fill="#1a1226"/>
  <ellipse cx="198" cy="75" rx="2" ry="2" fill="white"/>

  <!-- 眉（ちょっと険しく） -->
  <path d="M154,66 Q162,62 170,65" stroke="#2d263c" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M190,65 Q198,62 206,66" stroke="#2d263c" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- 口ひげ（左） -->
  <path d="M158,98 Q164,96 172,100" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M155,104 Q164,101 172,105" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 口ひげ（右） -->
  <path d="M188,100 Q196,96 202,98" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M188,105 Q196,101 205,104" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 口（真剣な一文字） -->
  <path d="M170,110 Q180,114 190,110" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="93" rx="5" ry="4" fill="#c8b898" stroke="#2d263c" stroke-width="3"/>

</svg>