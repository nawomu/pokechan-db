<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ: 城壁の歯(マーロン)3本 -->
  <rect x="62" y="38" width="52" height="72" rx="7" ry="5" fill="#6b6b7e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="150" y="22" width="60" height="82" rx="7" ry="5" fill="#6b6b7e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="244" y="38" width="52" height="72" rx="7" ry="5" fill="#6b6b7e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体メイン -->
  <rect x="44" y="95" width="272" height="200" rx="18" ry="14" fill="#7a7a8c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 胴体正面(明るい石灰) -->
  <rect x="72" y="115" width="216" height="165" rx="12" ry="10" fill="#b0afc0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- レンガ模様: 横線3本 -->
  <line x1="48" y1="155" x2="312" y2="155" stroke="#2d263c" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="48" y1="200" x2="312" y2="200" stroke="#2d263c" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="48" y1="245" x2="312" y2="245" stroke="#2d263c" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <!-- レンガ縦線(互い違い) -->
  <line x1="130" y1="155" x2="130" y2="200" stroke="#2d263c" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="230" y1="155" x2="230" y2="200" stroke="#2d263c" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="180" y1="200" x2="180" y2="245" stroke="#2d263c" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="100" y1="200" x2="100" y2="245" stroke="#2d263c" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="260" y1="200" x2="260" y2="245" stroke="#2d263c" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- 左腕 -->
  <ellipse cx="34" cy="222" rx="26" ry="34" fill="#7a7a8c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左手の指っぽいコブ -->
  <ellipse cx="20" cy="210" rx="11" ry="9" fill="#6b6b7e" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="16" cy="228" rx="11" ry="9" fill="#6b6b7e" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="22" cy="245" rx="10" ry="8" fill="#6b6b7e" stroke="#2d263c" stroke-width="5"/>

  <!-- 右腕 -->
  <ellipse cx="326" cy="222" rx="26" ry="34" fill="#7a7a8c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右手の指っぽいコブ -->
  <ellipse cx="340" cy="210" rx="11" ry="9" fill="#6b6b7e" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="344" cy="228" rx="11" ry="9" fill="#6b6b7e" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="338" cy="245" rx="10" ry="8" fill="#6b6b7e" stroke="#2d263c" stroke-width="5"/>

  <!-- 足(左右) -->
  <rect x="90" y="282" width="60" height="52" rx="14" ry="18" fill="#6b6b7e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="210" y="282" width="60" height="52" rx="14" ry="18" fill="#6b6b7e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 口の背景(暗い穴) -->
  <path d="M98 238 Q102 232 118 228 Q180 220 242 228 Q258 232 262 238 Q268 260 262 272 Q245 290 180 293 Q115 290 98 272 Z" fill="#3a1830" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 歯(上) -->
  <polygon points="115,232 128,232 122,248" fill="#e8e4f0" stroke="#2d263c" stroke-width="3"/>
  <polygon points="142,228 157,227 150,244" fill="#e8e4f0" stroke="#2d263c" stroke-width="3"/>
  <polygon points="170,225 186,225 178,242" fill="#e8e4f0" stroke="#2d263c" stroke-width="3"/>
  <polygon points="200,227 215,228 207,244" fill="#e8e4f0" stroke="#2d263c" stroke-width="3"/>
  <polygon points="226,232 240,232 233,248" fill="#e8e4f0" stroke="#2d263c" stroke-width="3"/>

  <!-- 目(左) -->
  <ellipse cx="128" cy="175" rx="30" ry="28" fill="white" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="133" cy="178" rx="16" ry="16" fill="#2d263c"/>
  <ellipse cx="138" cy="173" rx="6" ry="6" fill="white"/>

  <!-- 目(右) -->
  <ellipse cx="232" cy="175" rx="30" ry="28" fill="white" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="227" cy="178" rx="16" ry="16" fill="#2d263c"/>
  <ellipse cx="232" cy="173" rx="6" ry="6" fill="white"/>

  <!-- 眉(左・ちょっとイカツい) -->
  <path d="M100 152 Q118 142 155 150" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- 眉(右) -->
  <path d="M205 150 Q242 142 260 152" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>