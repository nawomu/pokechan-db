<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 炎(後ろ/下) -->
  <ellipse cx="180" cy="310" rx="38" ry="18" fill="#5bc8f0" opacity="0.55" stroke="none"/>
  <ellipse cx="155" cy="298" rx="18" ry="28" fill="#7ad4f7" opacity="0.45" stroke="none"/>
  <ellipse cx="205" cy="302" rx="14" ry="22" fill="#7ad4f7" opacity="0.45" stroke="none"/>

  <!-- 刀身(後ろ) -->
  <polygon points="230,80 245,60 255,75 238,290 220,290" fill="#c8d8f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 刀身 光沢ライン -->
  <line x1="237" y1="72" x2="227" y2="270" stroke="#e8f4ff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- 柄(刀の持ち手) -->
  <rect x="213" y="268" width="32" height="52" rx="7" fill="#7b3fbf" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 柄巻き模様 -->
  <line x1="215" y1="282" x2="243" y2="282" stroke="#f0c040" stroke-width="3"/>
  <line x1="215" y1="295" x2="243" y2="295" stroke="#f0c040" stroke-width="3"/>
  <line x1="215" y1="308" x2="243" y2="308" stroke="#f0c040" stroke-width="3"/>

  <!-- 鍔(つば) -->
  <ellipse cx="229" cy="272" rx="28" ry="10" fill="#f0c040" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体(胴体メイン) -->
  <ellipse cx="160" cy="205" rx="58" ry="72" fill="#4a2d82" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹部(明るい紫) -->
  <ellipse cx="158" cy="225" rx="32" ry="42" fill="#7c5bbf" stroke="none"/>

  <!-- 左腕 -->
  <ellipse cx="102" cy="220" rx="18" ry="10" fill="#4a2d82" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-30 102 220)"/>
  <!-- 右腕(刀持ち) -->
  <ellipse cx="212" cy="215" rx="20" ry="10" fill="#4a2d82" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(25 212 215)"/>

  <!-- 首 -->
  <rect x="148" y="145" width="24" height="22" rx="6" fill="#4a2d82" stroke="none"/>

  <!-- 頭部 -->
  <ellipse cx="161" cy="130" rx="52" ry="48" fill="#5a3a9a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- たてがみ/炎ヘア(左) -->
  <path d="M118,115 Q100,80 112,55 Q120,75 125,100 Z" fill="#f05050" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M125,108 Q108,68 122,42 Q132,62 134,92 Z" fill="#f07820" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- たてがみ/炎ヘア(右) -->
  <path d="M195,112 Q215,74 208,48 Q200,70 194,96 Z" fill="#f05050" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M185,108 Q198,65 195,40 Q188,60 185,90 Z" fill="#f07820" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頭頂の炎 -->
  <path d="M158,85 Q152,58 162,38 Q170,58 168,80 Z" fill="#f0c040" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 左目 -->
  <ellipse cx="140" cy="132" rx="16" ry="17" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="143" cy="135" rx="9" ry="10" fill="#1a0a2e"/>
  <ellipse cx="146" cy="132" rx="4" ry="4" fill="white"/>

  <!-- 右目 -->
  <ellipse cx="182" cy="130" rx="15" ry="18" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="184" cy="133" rx="9" ry="10" fill="#1a0a2e"/>
  <ellipse cx="187" cy="130" rx="4" ry="4" fill="white"/>

  <!-- 眉(ちょっとキリッと) -->
  <path d="M128,117 Q138,111 152,115" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M170,113 Q180,108 196,113" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 口(少しへの字) -->
  <path d="M148,158 Q162,165 175,157" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ赤み -->
  <ellipse cx="126" cy="148" rx="10" ry="7" fill="#e06070" opacity="0.5" stroke="none"/>
  <ellipse cx="196" cy="146" rx="10" ry="7" fill="#e06070" opacity="0.5" stroke="none"/>

  <!-- 体から漏れ出す魂の炎(左) -->
  <path d="M108,195 Q90,178 98,160 Q106,175 110,188 Z" fill="#5bc8f0" opacity="0.7" stroke="none"/>
  <!-- 体から漏れ出す魂の炎(右) -->
  <path d="M215,190 Q232,172 228,155 Q220,170 216,183 Z" fill="#5bc8f0" opacity="0.7" stroke="none"/>

  <!-- 足(ゆるい感じ) -->
  <ellipse cx="142" cy="272" rx="20" ry="12" fill="#4a2d82" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(10 142 272)"/>
  <ellipse cx="178" cy="278" rx="19" ry="11" fill="#4a2d82" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-8 178 278)"/>
</svg>