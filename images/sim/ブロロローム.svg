<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <ellipse cx="180" cy="300" rx="120" ry="16" fill="#2d263c" opacity="0.15"/>

  <!-- rear exhaust pipes -->
  <rect x="48" y="210" width="26" height="40" rx="10" fill="#6b6478" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="286" y="210" width="26" height="40" rx="10" fill="#6b6478" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="61" cy="248" r="7" fill="#2d263c"/>
  <circle cx="299" cy="248" r="7" fill="#2d263c"/>

  <!-- wheels -->
  <ellipse cx="108" cy="272" rx="34" ry="30" fill="#1f1b29" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="252" cy="272" rx="34" ry="30" fill="#1f1b29" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <circle cx="108" cy="272" r="12" fill="#8a8398"/>
  <circle cx="252" cy="272" r="12" fill="#8a8398"/>

  <!-- main body -->
  <path d="M 50 260 Q 40 150 90 110 Q 130 70 180 68 Q 230 70 270 110 Q 320 150 310 260 Q 250 280 180 280 Q 110 280 50 260 Z"
        fill="#4b3f6e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- hood / lighter panel -->
  <path d="M 95 150 Q 130 100 180 98 Q 230 100 265 150 Q 260 190 180 195 Q 100 190 95 150 Z"
        fill="#8478ab" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- side stripe accents -->
  <path d="M 60 210 Q 120 230 180 232 Q 240 230 300 210" fill="none" stroke="#3a3155" stroke-width="7" stroke-linecap="round"/>

  <!-- headlights -->
  <circle cx="128" cy="150" r="24" fill="#fff2c2" stroke="#2d263c" stroke-width="7"/>
  <circle cx="232" cy="150" r="24" fill="#fff2c2" stroke="#2d263c" stroke-width="7"/>
  <circle cx="128" cy="150" r="9" fill="#2d263c"/>
  <circle cx="232" cy="150" r="9" fill="#2d263c"/>

  <!-- angry brow lines -->
  <path d="M 104 122 L 140 132" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M 256 122 L 220 132" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- grille mouth -->
  <path d="M 150 200 L 210 200 L 200 232 Q 180 244 160 232 Z" fill="#2d263c"/>
  <path d="M 158 208 L 202 208" stroke="#6b6478" stroke-width="5" stroke-linecap="round"/>
  <path d="M 155 218 L 205 218" stroke="#6b6478" stroke-width="5" stroke-linecap="round"/>
  <path d="M 160 227 L 200 227" stroke="#6b6478" stroke-width="5" stroke-linecap="round"/>

  <!-- top ridge fin -->
  <path d="M 170 70 Q 180 48 190 70" fill="#8478ab" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
</svg>
