<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: ①だるま型の丸っこい赤い体(頭と体が一体) ②お腹のクリーム色パッチ+濃い赤の渦巻き模様(だるまの紋) ③小さい黒目+赤みがかった頬 ④短い炎っぽい尻尾(背後にちらり) ⑤丸い小さな耳と、体の横にちょこんと出た手足のスタブ -->

  <!-- 後ろ: 炎っぽい尻尾(背後にちらり) -->
  <path d="M258 158 Q296 132 284 92 Q262 108 246 142 Q248 154 258 158 Z" fill="#b8291c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体(だるま型・丸い) -->
  <ellipse cx="180" cy="228" rx="100" ry="90" fill="#e2432e" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 手(体の横のスタブ) -->
  <ellipse cx="86" cy="222" rx="22" ry="28" fill="#c8331f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="274" cy="222" rx="22" ry="28" fill="#c8331f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足(下のスタブ) -->
  <ellipse cx="138" cy="304" rx="24" ry="18" fill="#c8331f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="222" cy="304" rx="24" ry="18" fill="#c8331f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭(体と一体・丸い) -->
  <ellipse cx="180" cy="136" rx="82" ry="78" fill="#e2432e" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 耳(丸い小さな耳) -->
  <ellipse cx="122" cy="82" rx="18" ry="22" fill="#c8331f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-18 122 82)"/>
  <ellipse cx="238" cy="82" rx="18" ry="22" fill="#c8331f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(18 238 82)"/>

  <!-- お腹のクリーム色パッチ -->
  <ellipse cx="180" cy="258" rx="58" ry="46" fill="#f6e8c8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- だるまの渦巻き紋(お腹の模様) -->
  <path d="M162 232 Q178 210 196 230 Q206 248 186 262 Q168 260 160 244 Q158 236 162 232 Z" fill="#b8291c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M172 240 Q182 232 190 242" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 頬の赤み -->
  <ellipse cx="128" cy="150" rx="15" ry="10" fill="#ff8a72"/>
  <ellipse cx="232" cy="150" rx="15" ry="10" fill="#ff8a72"/>

  <!-- 目(白目) -->
  <ellipse cx="150" cy="120" rx="16" ry="18" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="210" cy="120" rx="16" ry="18" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 瞳(黒) -->
  <ellipse cx="150" cy="125" rx="8" ry="10" fill="#2d263c"/>
  <ellipse cx="210" cy="125" rx="8" ry="10" fill="#2d263c"/>
  <!-- 瞳のハイライト -->
  <ellipse cx="146" cy="119" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="206" cy="119" rx="3" ry="3.5" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="147" rx="6" ry="4" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M165 158 Q180 168 195 158" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
