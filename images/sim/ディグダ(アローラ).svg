<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.地面から出た金色っぽいクリーム色の円錐形の体 2.顔を覆う灰色の太いヒゲ(6本、鉄分入りの土) 3.小さく丸い黒い鼻 4.ヒゲの下に覗く小さな丸い黒目 5.地面の土盛りと体下部の影 -->

  <!-- 後ろ: 地面の土盛り -->
  <ellipse cx="180" cy="300" rx="140" ry="34" fill="#8a5a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M60 300 q10 22 40 26 q60 10 160 0 q30 -4 40 -26 z" fill="#6e4423" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体: 円錐形(頭頂がややとがる・アローラ色=クリーム/金色) -->
  <path d="M180 46
           C 150 46 118 150 104 230
           C 96 272 116 300 180 300
           C 244 300 264 272 256 230
           C 242 150 210 46 180 46 Z"
        fill="#e8d190" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体下部の濃い影 -->
  <path d="M112 226 C 104 268 122 296 180 296 C 238 296 256 268 248 226
            C 240 258 216 274 180 274 C 144 274 120 258 112 226 Z"
        fill="#c9ad66"/>

  <!-- 体の丸みハイライト -->
  <path d="M150 90 C 138 130 128 176 122 216" stroke="#f5e6b8" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- ヒゲ(左右3本ずつ、太く垂れ下がる灰色・鉄分の土) -->
  <path d="M110 150 C 92 190 84 232 88 268" stroke="#8b8b93" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M136 140 C 122 186 116 234 122 276" stroke="#a3a3ab" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M164 134 C 156 182 154 234 158 280" stroke="#8b8b93" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M250 150 C 268 190 276 232 272 268" stroke="#8b8b93" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M224 140 C 238 186 244 234 238 276" stroke="#a3a3ab" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M196 134 C 204 182 206 234 202 280" stroke="#8b8b93" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- ヒゲの根元の輪郭強調(顔まわり) -->
  <path d="M108 148 C 90 190 82 234 86 270" stroke="#2d263c" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M252 148 C 270 190 278 234 274 270" stroke="#2d263c" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- 目(2つ、ヒゲの下に覗く小さな丸い黒目) -->
  <circle cx="152" cy="196" r="9" fill="#2d263c"/>
  <circle cx="208" cy="196" r="9" fill="#2d263c"/>
  <circle cx="149" cy="193" r="3" fill="#ffffff"/>
  <circle cx="205" cy="193" r="3" fill="#ffffff"/>

  <!-- 小さく丸い黒い鼻 -->
  <ellipse cx="180" cy="238" rx="18" ry="15" fill="#3a3540" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="176" cy="234" rx="6" ry="4" fill="#5c5568"/>
</svg>
