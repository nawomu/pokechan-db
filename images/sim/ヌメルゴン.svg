  <!-- 左手の指っぽい丸 -->
  <circle cx="86" cy="262" r="9" fill="#6a8fa8" stroke="#2d263c" stroke-width="5"/>
  <circle cx="96" cy="272" r="8" fill="#6a8fa8" stroke="#2d263c" stroke-width="5"/>

  <!-- ===== 右腕 ===== -->
