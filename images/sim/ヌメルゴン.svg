  <circle cx="265" cy="270" r="8" fill="#6a8fa8" stroke="#2d263c" stroke-width="5"/>

  <!-- ===== 頭部 (大きめ・ちょっと傾いた感じ) ===== -->
  <ellipse cx="183" cy="138" rx="78" ry="72"
    fill="#7bb8d4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ===== 左耳たぶ(ドロっとした長い耳) ===== -->
  <path d="M118 130 Q90 118 70 148 Q55 175 72 192 Q88 205 108 185 Q125 165 120 145Z"
