  <!-- ぬめり垂れ -->
  <path d="M294 182 Q302 202 300 220 Q298 228 293 225 Q288 221 290 203 Q292 192 294 182Z"
    fill="#8ac4db" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- ===== 角(触角/突起 2本) ===== -->
  <!-- 左角 -->
  <path d="M155 75 Q145 48 138 30 Q136 24 143 26 Q152 30 158 55 Q162 68 158 80Z"
    fill="#5a7a9a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 右角 -->
  <path d="M208 72 Q218 44 224 28 Q226 22 232 25 Q236 30 228 52 Q222 66 216 78Z"
    fill="#5a7a9a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ===== 目(大きくてつぶら・少しズレてて愛嬌あり) ===== -->
  <!-- 左目 白目 -->
  <ellipse cx="158" cy="142" rx="20" ry="22" fill="white" stroke="#2d263c" stroke-width="6"/>
  <!-- 左目 瞳 -->
  <ellipse cx="161" cy="145" rx="12" ry="14" fill="#2d263c"/>
  <!-- 左目 ハイライト -->
  <circle cx="155" cy="139" r="5" fill="white"/>

  <!-- 右目 白目 -->
  <ellipse cx="208" cy="140" rx="19" ry="21" fill="white" stroke="#2d263c" stroke-width="6"/>
  <!-- 右目 瞳 -->
  <ellipse cx="210" cy="143" rx="11" ry="13" fill="#2d263c"/>
  <!-- 右目 ハイライト -->
  <circle cx="205" cy="138" r="4" fill="white"/>

  <!-- ===== ほっぺ(ぷっくり) ===== -->
  <ellipse cx="142" cy="165" rx="16" ry="12" fill="#a8cfe0" stroke="#2d263c" stroke-width="4" opacity="0.7"/>
  <ellipse cx="224" cy="163" rx="15" ry="11" fill="#a8cfe0" stroke="#2d263c" stroke-width="4" opacity="0.7"/>

  <!-- ===== 鼻・口 ===== -->
  <!-- 鼻 小さな三角 -->
  <path d="M180 158 L176 165 L184 165Z" fill="#2d263c"/>
  <!-- 口 にっこり -->
  <path d="M170 174 Q182 185 196 173"
    fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ===== 体のぬめり感(腹に縦の薄い模様) ===== -->
  <path d="M172 200 Q175 230 173 260" fill="none" stroke="#ccd8a0" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <path d="M182 198 Q185 228 183 262" fill="none" stroke="#ccd8a0" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <path d="M192 200 Q195 230 193 260" fill="none" stroke="#ccd8a0" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
</svg>