<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ===== しっぽ (後ろ) ===== -->
  <path d="M195 295 Q240 320 255 305 Q268 290 250 275 Q235 265 215 278 Q205 285 195 295Z"
