<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- しっぽ(後ろ) -->
  <path d="M 250 250 q 30 5 28 -22 q -2 -18 -20 -12" fill="#FFB6D9" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 耳っぽい出っ張り(左右・頭の後ろに少し覗く) -->
  <path d="M 118 108 Q 108 82 132 86 Q 128 104 118 108 Z" fill="#FFC6E2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 242 108 Q 252 82 228 86 Q 232 104 242 108 Z" fill="#FFC6E2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体(丸い風船シルエット) -->
  <ellipse cx="180" cy="205" rx="98" ry="100" fill="#FFB6D9" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- おなか(淡いクリーム色の丸) -->
  <ellipse cx="180" cy="235" rx="58" ry="48" fill="#FFE8F2" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭のてっぺんのカール(巻き毛) -->
  <path d="M 178 96 q -14 -18 2 -30 q 16 -10 18 8 q 2 14 -12 18 q 10 2 8 12" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 手(左右・短くて丸い) -->
  <ellipse cx="96" cy="222" rx="22" ry="26" fill="#FFB6D9" stroke="#2d263c" stroke-width="7" transform="rotate(-18 96 222)"/>
  <ellipse cx="264" cy="222" rx="22" ry="26" fill="#FFB6D9" stroke="#2d263c" stroke-width="7" transform="rotate(18 264 222)"/>

  <!-- 足(左右・短くて丸い) -->
  <ellipse cx="140" cy="298" rx="26" ry="20" fill="#FFB6D9" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="220" cy="298" rx="26" ry="20" fill="#FFB6D9" stroke="#2d263c" stroke-width="7"/>

  <!-- 目(大きい青い瞳・中央寄り) -->
  <circle cx="152" cy="188" r="26" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="208" cy="188" r="26" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="156" cy="192" r="15" fill="#3aa0e8"/>
  <circle cx="204" cy="192" r="15" fill="#3aa0e8"/>
  <circle cx="156" cy="192" r="8" fill="#20304a"/>
  <circle cx="204" cy="192" r="8" fill="#20304a"/>
  <circle cx="150" cy="184" r="4" fill="#ffffff"/>
  <circle cx="198" cy="184" r="4" fill="#ffffff"/>

  <!-- ほっぺ -->
  <ellipse cx="126" cy="216" rx="14" ry="9" fill="#ff9ec7" opacity="0.85"/>
  <ellipse cx="234" cy="216" rx="14" ry="9" fill="#ff9ec7" opacity="0.85"/>

  <!-- 口(小さくてかわいい) -->
  <path d="M 168 224 q 12 10 24 0" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
