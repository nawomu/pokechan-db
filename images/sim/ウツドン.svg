<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 黄緑〜黄色の細長いつぼ(壺)型の胴体、下すぼまり
  2. 胴体の左右に細いつる状のうねる腕が伸びる
  3. 首元にピンクの花びら(襟)が数枚つく
  4. 顔は胴体上部にあり、大きな丸い目2つ+大きく開いた口(内側ピンク)
  5. 胴体後ろに小さな葉っぱ状のしっぽ、下端に小さな根っこの突起
  -->

  <!-- 後ろ: つる状の腕(左右にうねる) -->
  <path d="M 100 190 Q 40 170 45 120 Q 48 90 75 85" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <path d="M 100 190 Q 40 170 45 120 Q 48 90 75 85" fill="none" stroke="#6fae2e" stroke-width="6" stroke-linecap="round"/>

  <path d="M 260 190 Q 320 175 318 125 Q 316 95 290 88" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <path d="M 260 190 Q 320 175 318 125 Q 316 95 290 88" fill="none" stroke="#6fae2e" stroke-width="6" stroke-linecap="round"/>

  <!-- 後ろの葉っぱ状しっぽ -->
  <path d="M 190 300 Q 220 320 215 345 Q 195 335 188 312 Z" fill="#6fae2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胴体(つぼ型) -->
  <path d="M 180 55
           C 130 55 108 100 112 150
           C 116 210 130 250 145 290
           C 155 315 165 330 180 330
           C 195 330 205 315 215 290
           C 230 250 244 210 248 150
           C 252 100 230 55 180 55 Z"
        fill="#d7de3a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 胴体の濃い模様(縦のライン) -->
  <path d="M 150 110 C 145 170 150 230 168 285" fill="none" stroke="#a6c22a" stroke-width="7" stroke-linecap="round"/>
  <path d="M 210 110 C 215 170 210 230 192 285" fill="none" stroke="#a6c22a" stroke-width="7" stroke-linecap="round"/>

  <!-- 首元のピンクの花びら(襟) -->
  <path d="M 128 105 Q 108 88 118 65 Q 138 78 140 100 Z" fill="#f2a7c8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 232 105 Q 252 88 242 65 Q 222 78 220 100 Z" fill="#f2a7c8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 180 90 Q 165 65 180 45 Q 195 65 180 90 Z" fill="#f7c2d9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 下端の根っこ突起 -->
  <path d="M 160 322 Q 155 340 165 348" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M 200 322 Q 205 340 195 348" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 大きく開いた口(ピンクの内側) -->
  <ellipse cx="180" cy="180" rx="62" ry="46" fill="#7a2340" stroke="#2d263c" stroke-width="8"/>
  <ellipse cx="180" cy="188" rx="48" ry="32" fill="#e8709a"/>

  <!-- 上下のギザギザ牙 -->
  <path d="M 135 150 L 145 165 L 155 150 Z" fill="#fff8ec" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M 205 150 L 215 165 L 225 150 Z" fill="#fff8ec" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 目(大きな丸) -->
  <circle cx="140" cy="112" r="19" fill="#fff8ec" stroke="#2d263c" stroke-width="7"/>
  <circle cx="220" cy="112" r="19" fill="#fff8ec" stroke="#2d263c" stroke-width="7"/>
  <circle cx="144" cy="116" r="8" fill="#2d263c"/>
  <circle cx="224" cy="116" r="8" fill="#2d263c"/>
</svg>
