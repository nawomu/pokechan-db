<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)黄色いヒダ襟(太陽のフリル)が首を囲む 2)青灰のトカゲ胴体で二足立ち 3)大きな丸い目 4)尖った頭・小さな口 5)黄色と黒の縞が背中/尾 -->

  <!-- 尾(後ろ・黄色と黒縞) -->
  <path d="M205,250 Q250,255 280,235 Q288,250 275,265 Q240,275 205,268 Z" fill="#8aa0b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M250,252 L256,268 M268,250 L272,266" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 後ろ脚(左) -->
  <path d="M165,265 Q158,295 170,310 L188,310 Q190,295 182,268 Z" fill="#8aa0b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 後ろ脚(右) -->
  <path d="M200,268 Q205,295 220,310 L238,310 Q238,293 218,265 Z" fill="#8aa0b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 前腕(小) 左 -->
  <path d="M168,205 Q150,225 145,245" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- 前腕(小) 右 -->
  <path d="M210,205 Q228,225 232,245" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 胴体 -->
  <ellipse cx="188" cy="225" rx="42" ry="48" fill="#8aa0b8" stroke="#2d263c" stroke-width="7"/>

  <!-- 黄色いヒダ襟(太陽フリル・首周り) -->
  <path d="M188,175 Q120,168 105,195 Q120,212 150,205 Q170,200 188,202 Q206,200 226,205 Q256,212 271,195 Q256,168 188,175 Z" fill="#ffd84d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 襟の切れ目(太陽の光線) -->
  <path d="M130,182 L120,170 M160,178 L155,163 M218,178 L222,163 M248,182 L258,170" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 頭 -->
  <path d="M188,108 Q150,112 142,150 Q150,178 188,180 Q226,178 234,150 Q226,112 188,108 Z" fill="#8aa0b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭の黄色い縞 -->
  <path d="M168,120 Q172,132 166,145 M208,120 Q204,132 210,145" fill="none" stroke="#ffd84d" stroke-width="7" stroke-linecap="round"/>

  <!-- 左目 -->
  <circle cx="170" cy="150" r="16" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="172" cy="152" r="7" fill="#2d263c"/>
  <circle cx="169" cy="149" r="3" fill="#ffffff"/>
  <!-- 右目 -->
  <circle cx="206" cy="150" r="16" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="208" cy="152" r="7" fill="#2d263c"/>
  <circle cx="205" cy="149" r="3" fill="#ffffff"/>

  <!-- 口(小さな吻) -->
  <path d="M188,168 Q196,176 188,182" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
