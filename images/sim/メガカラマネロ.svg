  <circle cx="210" cy="195" r="14" fill="#8050c0" stroke="none"/>
  <circle cx="210" cy="195" r="8" fill="white" stroke="none"/>
  <!-- 右目: 黒い瞳 -->
  <circle cx="210" cy="195" r="4" fill="#1a1a1a" stroke="none"/>
  <!-- 右目: 白ハイライト -->
  <circle cx="215" cy="190" r="3" fill="white" stroke="none"/>

  <!-- 目(左): 催眠渦巻き大きな目 -->
