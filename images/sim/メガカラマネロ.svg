  <!-- メガ特有: 目の催眠オーラ -->
  <circle cx="210" cy="195" r="36" fill="none" stroke="#c080ff" stroke-width="2" opacity="0.6"/>
  <circle cx="150" cy="195" r="36" fill="none" stroke="#c080ff" stroke-width="2" opacity="0.6"/>

