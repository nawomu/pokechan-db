<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail -->
  <path d="M245 235 Q290 250 300 210 Q285 235 250 220 Z" fill="#8fd3f4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- back legs -->
  <ellipse cx="235" cy="278" rx="26" ry="20" fill="#5bb8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="135" cy="278" rx="26" ry="20" fill="#5bb8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- body -->
  <ellipse cx="180" cy="215" rx="95" ry="70" fill="#8fd3f4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- belly -->
  <ellipse cx="180" cy="235" rx="55" ry="40" fill="#eaf9ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- front legs -->
  <ellipse cx="120" cy="260" rx="22" ry="26" fill="#5bb8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="240" cy="260" rx="22" ry="26" fill="#5bb8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- head -->
  <circle cx="150" cy="140" r="78" fill="#8fd3f4" stroke="#2d263c" stroke-width="8"/>
  <!-- ice crystal horn on head -->
  <path d="M150 62 L168 30 L178 60 L200 45 L188 78 L150 90 Z" fill="#d7f4ff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M168 55 L178 40" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <!-- ear fins -->
  <path d="M95 105 Q70 85 78 55 Q100 75 108 100 Z" fill="#5bb8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- snout / lower jaw -->
  <ellipse cx="128" cy="172" rx="45" ry="30" fill="#eaf9ff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- mouth line -->
  <path d="M95 178 Q128 195 165 175" stroke="#2d263c" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- fangs -->
  <path d="M112 190 L108 202 L118 194 Z" fill="#ffffff" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M150 190 L152 203 L160 192 Z" fill="#ffffff" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- eyes -->
  <circle cx="118" cy="128" r="13" fill="#2d263c"/>
  <circle cx="122" cy="123" r="4" fill="#ffffff"/>
  <circle cx="178" cy="128" r="13" fill="#2d263c"/>
  <circle cx="182" cy="123" r="4" fill="#ffffff"/>
  <!-- cheek marks -->
  <circle cx="100" cy="150" r="7" fill="#5bb8e8" opacity="0.6"/>
  <circle cx="196" cy="150" r="7" fill="#5bb8e8" opacity="0.6"/>
</svg>
