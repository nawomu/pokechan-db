<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)黒っぽい細身の巨体 2)背中から広がる大きな翼(緑の六角形セル) 3)胸に白いパネルと緑の六角形コア 4)顔は白マスクに赤い目 5)頭から伸びる触角(先端が緑) -->

  <!-- 尾 -->
  <path d="M215,255 C258,270 288,298 276,326 C258,336 235,318 225,295 C218,280 213,265 215,255 Z" fill="#3a3540" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左翼(大きく広がる) -->
  <path d="M150,150 C92,112 48,72 36,38 C60,82 56,132 76,176 C96,210 130,215 155,195 Z" fill="#3a3540" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <polygon points="70,112 78,100 92,100 100,112 92,124 78,124" fill="#5fa848" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="56,150 62,140 74,140 80,150 74,160 62,160" fill="#7cc85a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 右翼 -->
  <path d="M210,150 C268,112 312,72 324,38 C300,82 304,132 284,176 C264,210 230,215 205,195 Z" fill="#3a3540" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <polygon points="290,112 298,100 312,100 320,112 312,124 298,124" fill="#5fa848" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="304,150 310,140 322,140 328,150 322,160 310,160" fill="#7cc85a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 脚(左) -->
  <path d="M155,260 C145,285 140,305 148,325 C158,332 168,325 168,308 C168,290 165,272 162,258 Z" fill="#3a3540" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 脚(右) -->
  <path d="M205,260 C215,285 220,305 212,325 C202,332 192,325 192,308 C192,290 195,272 198,258 Z" fill="#3a3540" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <path d="M140,175 C130,210 132,245 150,265 C165,278 195,278 210,265 C228,245 230,210 220,175 C205,155 155,155 140,175 Z" fill="#3a3540" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 胸(白) -->
  <path d="M155,190 C150,212 152,235 162,248 C172,255 188,255 198,248 C208,235 210,212 205,190 C190,178 170,178 155,190 Z" fill="#e8e6e0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 胸の緑六角形コア -->
  <polygon points="172,208 178,198 190,198 196,208 190,218 178,218" fill="#5fa848" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 腕(左) -->
  <path d="M142,190 C118,205 105,230 108,255 C112,265 122,262 126,250 C132,230 138,210 148,195 Z" fill="#3a3540" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腕(右) -->
  <path d="M218,190 C242,205 255,230 252,255 C248,265 238,262 234,250 C228,230 222,210 212,195 Z" fill="#3a3540" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 首(襟) -->
  <path d="M158,158 C150,148 152,138 162,132 C175,126 185,126 198,132 C208,138 210,148 202,158 C185,166 172,166 158,158 Z" fill="#3a3540" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="105" rx="42" ry="38" fill="#3a3540" stroke="#2d263c" stroke-width="8"/>

  <!-- 顔(白マスク) -->
  <path d="M155,100 C158,90 168,84 180,84 C192,84 202,90 205,100 C207,112 200,122 180,124 C160,122 153,112 155,100 Z" fill="#e8e6e0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目(赤) -->
  <circle cx="168" cy="100" r="7" fill="#e0432f" stroke="#2d263c" stroke-width="3"/>
  <circle cx="192" cy="100" r="7" fill="#e0432f" stroke="#2d263c" stroke-width="3"/>

  <!-- 口 -->
  <path d="M165,116 L180,122 L195,116" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 触角(左・先端が緑) -->
  <path d="M155,75 C140,56 135,38 145,26" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M145,26 C150,31 152,38 148,44" fill="none" stroke="#5fa848" stroke-width="5" stroke-linecap="round"/>

  <!-- 触角(右・先端が緑) -->
  <path d="M205,75 C220,56 225,38 215,26" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M215,26 C210,31 208,38 212,44" fill="none" stroke="#5fa848" stroke-width="5" stroke-linecap="round"/>
</svg>
