<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 漂う毒ガスのモヤ(後ろ) -->
  <circle cx="45" cy="205" r="18" fill="#C79BE0" opacity="0.4"/>
  <circle cx="325" cy="150" r="16" fill="#C79BE0" opacity="0.4"/>
  <circle cx="300" cy="290" r="14" fill="#C79BE0" opacity="0.35"/>
  <circle cx="55" cy="290" r="15" fill="#C79BE0" opacity="0.35"/>

  <!-- 左の頭の雲状こぶ(輪郭) -->
  <circle cx="90" cy="140" r="42" fill="#8A5BA8" stroke="#2d263c" stroke-width="7"/>
  <circle cx="95" cy="255" r="45" fill="#8A5BA8" stroke="#2d263c" stroke-width="7"/>
  <circle cx="185" cy="112" r="36" fill="#8A5BA8" stroke="#2d263c" stroke-width="7"/>

  <!-- 右の頭の雲状こぶ(輪郭) -->
  <circle cx="262" cy="112" r="40" fill="#8A5BA8" stroke="#2d263c" stroke-width="7"/>
  <circle cx="282" cy="235" r="42" fill="#8A5BA8" stroke="#2d263c" stroke-width="7"/>

  <!-- 左の頭(本体) -->
  <circle cx="140" cy="195" r="85" fill="#8A5BA8" stroke="#2d263c" stroke-width="8"/>
  <!-- 右の頭(本体) -->
  <circle cx="232" cy="182" r="80" fill="#8A5BA8" stroke="#2d263c" stroke-width="8"/>

  <!-- つなぎ目(結合部を滑らかに) -->
  <ellipse cx="185" cy="188" rx="42" ry="55" fill="#8A5BA8" stroke="#2d263c" stroke-width="6"/>

  <!-- 影の模様(体の濃淡) -->
  <ellipse cx="105" cy="235" rx="30" ry="24" fill="#6B4287" opacity="0.45"/>
  <ellipse cx="265" cy="220" rx="28" ry="22" fill="#6B4287" opacity="0.45"/>

  <!-- 頭頂部の噴出口(左) -->
  <circle cx="115" cy="102" r="15" fill="#5F3672" stroke="#2d263c" stroke-width="6"/>
  <!-- 頭頂部の噴出口(右) -->
  <circle cx="242" cy="90" r="15" fill="#5F3672" stroke="#2d263c" stroke-width="6"/>

  <!-- 左の目 -->
  <path d="M100 175 Q118 160 138 175 Q120 192 100 175Z" fill="#241730" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <!-- 右の目(左頭・2つ目) -->
  <path d="M148 168 Q166 155 184 168 Q168 184 148 168Z" fill="#241730" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 右頭の左目 -->
  <path d="M198 160 Q216 147 234 160 Q218 176 198 160Z" fill="#241730" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <!-- 右頭の右目 -->
  <path d="M248 165 Q266 152 284 165 Q268 181 248 165Z" fill="#241730" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 左顔の口(ニヤけ) -->
  <path d="M95 220 Q140 262 178 218" fill="none" stroke="#241730" stroke-width="9" stroke-linecap="round"/>
  <!-- 左顔の牙 -->
  <path d="M122 236 L116 258 L131 240Z" fill="#FFF6E4" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <path d="M150 240 L156 260 L142 244Z" fill="#FFF6E4" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 右顔の口(ニヤけ) -->
  <path d="M195 205 Q235 245 270 202" fill="none" stroke="#241730" stroke-width="9" stroke-linecap="round"/>
  <!-- 右顔の牙 -->
  <path d="M218 222 L213 242 L227 226Z" fill="#FFF6E4" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <path d="M244 224 L250 244 L236 228Z" fill="#FFF6E4" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 光沢ハイライト -->
  <ellipse cx="105" cy="150" rx="18" ry="12" fill="#C79BE0" opacity="0.35"/>
  <ellipse cx="205" cy="140" rx="16" ry="10" fill="#C79BE0" opacity="0.35"/>
</svg>
