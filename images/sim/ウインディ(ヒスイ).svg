<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- Hisuian Arcanine - hand-drawn style illustration -->

  <!-- Tails (behind body) - multiple fluffy tails -->
  <ellipse cx="268" cy="230" rx="38" ry="20" fill="#c8d4e0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-20 268 230)"/>
  <ellipse cx="280" cy="250" rx="40" ry="18" fill="#dce6f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(5 280 250)"/>
  <ellipse cx="258" cy="258" rx="38" ry="17" fill="#c8d4e0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(25 258 258)"/>
  <ellipse cx="240" cy="252" rx="34" ry="15" fill="#dce6f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(40 240 252)"/>

  <!-- Wings (ice crystal style) behind body -->
  <!-- Left wing -->
  <polygon points="85,130 45,85 60,145 30,110 55,165 35,150 70,175" fill="#b8cfe8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- Right wing -->
  <polygon points="278,120 310,70 295,140 325,100 300,158 320,148 285,170" fill="#b8cfe8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- Body - main grey-cream body -->
  <ellipse cx="185" cy="225" rx="90" ry="70" fill="#d6dfe8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- Grey stripe markings on body -->
  <ellipse cx="165" cy="215" rx="18" ry="28" fill="#8fa4b8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(-15 165 215)"/>
  <ellipse cx="205" cy="220" rx="16" ry="25" fill="#8fa4b8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(10 205 220)"/>
  <ellipse cx="185" cy="240" rx="12" ry="18" fill="#8fa4b8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- Front legs -->
  <rect x="135" y="270" width="28" height="55" rx="12" fill="#c8d4e0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-5 135 270)"/>
  <rect x="200" y="272" width="28" height="55" rx="12" fill="#c8d4e0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(5 200 272)"/>

  <!-- Paws -->
  <ellipse cx="148" cy="323" rx="18" ry="10" fill="#b8c8d8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="213" cy="325" rx="18" ry="10" fill="#b8c8d8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- Mane / chest fur - fluffy white -->
  <ellipse cx="185" cy="180" rx="55" ry="45" fill="#eef2f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- Mane fluff bumps -->
  <ellipse cx="148" cy="168" rx="22" ry="18" fill="#eef2f5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="222" cy="170" rx="20" ry="17" fill="#eef2f5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="178" cy="155" rx="18" ry="16" fill="#f5f7f9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- Head -->
  <ellipse cx="185" cy="135" rx="52" ry="48" fill="#d6dfe8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- Head stripe markings -->
  <ellipse cx="170" cy="128" rx="10" ry="18" fill="#8fa4b8" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" transform="rotate(-10 170 128)"/>
  <ellipse cx="200" cy="130" rx="9" ry="16" fill="#8fa4b8" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" transform="rotate(8 200 130)"/>

  <!-- Ears - pointed -->
  <polygon points="155,98 140,55 170,90" fill="#d6dfe8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="215,96 228,52 202,88" fill="#d6dfe8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- Inner ear -->
  <polygon points="155,95 144,65 166,88" fill="#c0a8b8" stroke="none"/>
  <polygon points="214,93 225,63 203,86" fill="#c0a8b8" stroke="none"/>

  <!-- Eyes - sharp, determined look -->
  <ellipse cx="164" cy="138" rx="12" ry="10" fill="#2d263c" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="206" cy="138" rx="12" ry="10" fill="#2d263c" stroke="#2d263c" stroke-width="3"/>
  <!-- Eye glint -->
  <circle cx="168" cy="134" r="3.5" fill="white"/>
  <circle cx="210" cy="134" r="3.5" fill="white"/>
  <!-- Angry eyebrow lines -->
  <line x1="154" y1="125" x2="172" y2="128" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <line x1="216" y1="125" x2="198" y2="128" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- Snout -->
  <ellipse cx="185" cy="158" rx="28" ry="18" fill="#c8c0b8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- Nose -->
  <ellipse cx="185" cy="152" rx="9" ry="6" fill="#2d263c"/>

  <!-- Mouth with fang -->
  <path d="M172,163 Q185,172 198,163" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- Left fang -->
  <polygon points="174,165 170,178 180,167" fill="white" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- Right fang -->
  <polygon points="196,165 200,177 190,167" fill="white" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- Cheek marking hint -->
  <ellipse cx="148" cy="148" rx="9" ry="6" fill="#c0afc0" opacity="0.6"/>
  <ellipse cx="222" cy="148" rx="9" ry="6" fill="#c0afc0" opacity="0.6"/>

</svg>