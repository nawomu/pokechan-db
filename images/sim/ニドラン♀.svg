<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- しっぽ(後ろ) -->
  <ellipse cx="270" cy="255" rx="26" ry="18" fill="#a8dcec" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(20 270 255)"/>

  <!-- 後ろ脚(奥) -->
  <ellipse cx="235" cy="300" rx="24" ry="20" fill="#8fcbe0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="120" cy="300" rx="24" ry="20" fill="#8fcbe0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 耳(頭の後ろ側) -->
  <path d="M120 130 Q90 40 130 55 Q150 90 145 140 Z" fill="#aee0f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M235 130 Q265 40 225 55 Q205 90 210 140 Z" fill="#aee0f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M124 122 Q108 62 128 68 Q140 92 137 125 Z" fill="#5aa9c9" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M231 122 Q247 62 227 68 Q215 92 218 125 Z" fill="#5aa9c9" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="180" cy="235" rx="98" ry="78" fill="#b6e4f2" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- お腹(白っぽい) -->
  <ellipse cx="180" cy="260" rx="62" ry="45" fill="#eef9fc" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 背中の斑点(紺色の楕円) -->
  <ellipse cx="140" cy="195" rx="18" ry="12" fill="#33517f" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(-15 140 195)"/>
  <ellipse cx="200" cy="185" rx="22" ry="14" fill="#33517f" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(10 200 185)"/>
  <ellipse cx="235" cy="215" rx="16" ry="11" fill="#33517f" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(20 235 215)"/>

  <!-- 前脚 -->
  <ellipse cx="140" cy="308" rx="22" ry="19" fill="#aee0f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="222" cy="308" rx="22" ry="19" fill="#aee0f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="140" rx="70" ry="62" fill="#b6e4f2" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 角(控えめ・クリーム色) -->
  <path d="M172 84 Q178 56 190 82 Q182 96 172 92 Z" fill="#f5efd8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ほっぺ(ピンク) -->
  <ellipse cx="130" cy="152" rx="14" ry="9" fill="#f7b8c6" opacity="0.85"/>
  <ellipse cx="230" cy="152" rx="14" ry="9" fill="#f7b8c6" opacity="0.85"/>

  <!-- 目 -->
  <ellipse cx="152" cy="135" rx="17" ry="20" fill="#2d263c"/>
  <ellipse cx="208" cy="135" rx="17" ry="20" fill="#2d263c"/>
  <circle cx="157" cy="127" r="6" fill="#ffffff"/>
  <circle cx="213" cy="127" r="6" fill="#ffffff"/>

  <!-- 口 -->
  <path d="M170 168 Q180 176 190 168" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
