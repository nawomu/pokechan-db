<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- forked tail (behind body) -->
  <path d="M180 260 L150 335 L180 305 L210 335 Z" fill="#e9eef2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- wings (behind body, big fin shapes) -->
  <path d="M112 165 L34 118 L46 168 L30 200 L60 218 L52 250 L88 232 L108 210 Z" fill="#e9eef2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M248 165 L326 118 L314 168 L330 200 L300 218 L308 250 L272 232 L252 210 Z" fill="#e9eef2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- wing navy ridge stripes -->
  <path d="M108 170 L44 128 L54 168" fill="none" stroke="#233a68" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M252 170 L316 128 L306 168" fill="none" stroke="#233a68" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- legs -->
  <path d="M156 275 L150 320" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M204 275 L210 320" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M136 322 L150 320 L166 328" fill="#e9eef2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M194 328 L210 320 L224 322" fill="#e9eef2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- body -->
  <ellipse cx="180" cy="215" rx="72" ry="92" fill="#e9eef2" stroke="#2d263c" stroke-width="7"/>
  <!-- pale belly -->
  <ellipse cx="180" cy="235" rx="42" ry="60" fill="#f8f4e6" stroke="#2d263c" stroke-width="0"/>

  <!-- neck -->
  <path d="M154 150 C150 110 155 85 172 68 L188 68 C205 85 210 110 206 150 C196 165 164 165 154 150 Z" fill="#e9eef2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- back navy ridge chevrons -->
  <path d="M164 92 L180 78 L196 92" fill="none" stroke="#233a68" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M160 122 L180 106 L200 122" fill="none" stroke="#233a68" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M156 152 L180 134 L204 152" fill="none" stroke="#233a68" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- head -->
  <ellipse cx="180" cy="63" rx="34" ry="27" fill="#e9eef2" stroke="#2d263c" stroke-width="7"/>
  <!-- beak -->
  <path d="M164 78 L180 96 L196 78" fill="#e9eef2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- eyes -->
  <circle cx="166" cy="58" r="6" fill="#d43b3b" stroke="#2d263c" stroke-width="4"/>
  <circle cx="194" cy="58" r="6" fill="#d43b3b" stroke="#2d263c" stroke-width="4"/>
</svg>
