<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 左翼 -->
  <path d="M100,180 Q40,120 30,60 Q60,90 80,110 Q50,70 70,30 Q90,80 100,120 Q80,60 110,50 Q115,100 110,150 Z" fill="#2a1a45" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 右翼 -->
  <path d="M260,180 Q320,120 330,60 Q300,90 280,110 Q310,70 290,30 Q270,80 260,120 Q280,60 250,50 Q245,100 250,150 Z" fill="#2a1a45" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- しっぽ -->
  <path d="M170,290 Q150,330 140,350 Q160,335 180,340 Q200,335 220,350 Q210,330 190,290 Z" fill="#cc2244" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M175,285 Q170,320 180,340 Q190,320 185,285 Z" fill="#2a1a45" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体 -->
  <ellipse cx="180" cy="230" rx="62" ry="75" fill="#2a1a45" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 腹 -->
  <ellipse cx="180" cy="245" rx="38" ry="52" fill="#6a5a7a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左耳(大きなスピーカー耳) -->
  <ellipse cx="118" cy="145" rx="42" ry="52" fill="#2a1a45" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" transform="rotate(-12,118,145)"/>
  <!-- 左耳内側リング外 -->
  <ellipse cx="118" cy="145" rx="33" ry="42" fill="#d4c020" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" transform="rotate(-12,118,145)"/>
  <!-- 左耳内側リング中 -->
  <ellipse cx="118" cy="145" rx="22" ry="29" fill="#60c8d8" stroke="#2d263c" stroke-width="3" stroke-linejoin="round" transform="rotate(-12,118,145)"/>
  <!-- 左耳内側中心 -->
  <ellipse cx="118" cy="145" rx="10" ry="13" fill="#2a1a45" stroke="#2d263c" stroke-width="2" stroke-linejoin="round" transform="rotate(-12,118,145)"/>

  <!-- 右耳(大きなスピーカー耳) -->
  <ellipse cx="242" cy="145" rx="42" ry="52" fill="#2a1a45" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" transform="rotate(12,242,145)"/>
  <!-- 右耳内側リング外 -->
  <ellipse cx="242" cy="145" rx="33" ry="42" fill="#d4c020" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" transform="rotate(12,242,145)"/>
  <!-- 右耳内側リング中 -->
  <ellipse cx="242" cy="145" rx="22" ry="29" fill="#60c8d8" stroke="#2d263c" stroke-width="3" stroke-linejoin="round" transform="rotate(12,242,145)"/>
  <!-- 右耳内側中心 -->
  <ellipse cx="242" cy="145" rx="10" ry="13" fill="#2a1a45" stroke="#2d263c" stroke-width="2" stroke-linejoin="round" transform="rotate(12,242,145)"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="165" rx="52" ry="48" fill="#2a1a45" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 左目 -->
  <ellipse cx="158" cy="158" rx="14" ry="16" fill="#44dd55" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="158" cy="158" rx="7" ry="9" fill="#112211" stroke="none"/>
  <ellipse cx="155" cy="154" rx="3" ry="3" fill="#ffffff" stroke="none"/>

  <!-- 右目(ちょっとズレてる落書き感) -->
  <ellipse cx="203" cy="156" rx="13" ry="17" fill="#44dd55" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="203" cy="156" rx="6" ry="9" fill="#112211" stroke="none"/>
  <ellipse cx="200" cy="152" rx="3" ry="3" fill="#ffffff" stroke="none"/>

  <!-- 鼻 -->
  <ellipse cx="179" cy="175" rx="5" ry="4" fill="#1a0f30" stroke="#2d263c" stroke-width="3"/>

  <!-- 口(ワイルドな笑い顔・牙あり) -->
  <path d="M155,188 Q170,205 180,207 Q190,205 205,188" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- 牙左 -->
  <path d="M163,192 L159,205 L166,198 Z" fill="#f0f0e0" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <!-- 牙右 -->
  <path d="M197,192 L201,205 L194,198 Z" fill="#f0f0e0" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 頬のほんのりピンク -->
  <ellipse cx="147" cy="178" rx="10" ry="7" fill="#cc6688" opacity="0.5"/>
  <ellipse cx="213" cy="178" rx="10" ry="7" fill="#cc6688" opacity="0.5"/>

  <!-- 足(小さくてかわいい) -->
  <ellipse cx="163" cy="298" rx="14" ry="9" fill="#2a1a45" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="197" cy="298" rx="14" ry="9" fill="#2a1a45" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- つめ左 -->
  <path d="M152,302 L147,312 M162,303 L160,313 M172,302 L175,311" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <!-- つめ右 -->
  <path d="M186,302 L183,312 M196,303 L196,313 M207,302 L211,311" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
</svg>