<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ゴースの特徴: 1)紫色のガス状の丸い体 2)輪郭がぼこぼこ波打つ煙のような下端 3)白目に黒い大きな瞳(にんまり) 4)ギザギザの歯を見せる大きな口 5)手足が無く後ろに煙の切れ端が漂う -->

  <!-- 背後の漂う煙のかけら -->
  <circle cx="92" cy="292" r="20" fill="#6b4093" stroke="#2d263c" stroke-width="6"/>
  <circle cx="182" cy="308" r="16" fill="#6b4093" stroke="#2d263c" stroke-width="6"/>
  <circle cx="258" cy="288" r="18" fill="#6b4093" stroke="#2d263c" stroke-width="6"/>

  <!-- 体本体(ガス状ボディ・下端が波打つ) -->
  <path d="M180,55
           C130,55 92,85 80,133
           C72,163 84,188 76,213
           C68,238 86,254 80,274
           C97,266 100,289 116,281
           C123,299 136,289 144,299
           C151,309 163,299 169,307
           C176,315 186,315 193,307
           C199,299 211,309 218,299
           C226,289 239,299 246,281
           C262,289 267,266 284,274
           C278,254 296,238 288,213
           C280,188 292,163 284,133
           C272,85 230,55 180,55 Z"
        fill="#9b6fcb" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- もやっとした濃淡パッチ(質感) -->
  <ellipse cx="138" cy="105" rx="32" ry="20" fill="#b48fde"/>
  <ellipse cx="228" cy="128" rx="24" ry="16" fill="#b48fde"/>
  <ellipse cx="182" cy="235" rx="42" ry="20" fill="#7a4fae"/>

  <!-- 左目 -->
  <ellipse cx="144" cy="155" rx="23" ry="27" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="148" cy="162" r="12" fill="#231c30"/>

  <!-- 右目 -->
  <ellipse cx="216" cy="155" rx="23" ry="27" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="212" cy="162" r="12" fill="#231c30"/>

  <!-- にんまり口 -->
  <path d="M124,186 C150,232 210,232 236,186 C212,208 148,208 124,186 Z"
        fill="#2d1f3d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ギザギザの歯 -->
  <polygon points="140,192 150,192 145,208" fill="#ffffff"/>
  <polygon points="165,196 175,196 170,212" fill="#ffffff"/>
  <polygon points="192,196 202,196 197,212" fill="#ffffff"/>
  <polygon points="217,192 227,192 222,208" fill="#ffffff"/>
</svg>
