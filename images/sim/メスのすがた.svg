  <path d="M240 115 Q272 87 264 52 Q254 28 224 38 Q212 58 217 98 Q220 116 234 128 Z" fill="#f4f0f8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
