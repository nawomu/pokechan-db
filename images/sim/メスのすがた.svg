  <ellipse cx="240" cy="75" rx="10" ry="12" fill="#f4f0f8" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="240" cy="76" rx="5" ry="6" fill="#1a1060"/>

  <!-- Forehead gem -->
  <ellipse cx="186" cy="126" rx="9" ry="6" fill="#4a6ccc" stroke="#2d263c" stroke-width="3"/>

