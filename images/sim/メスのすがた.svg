  <line x1="150" y1="176" x2="114" y2="180" stroke="#2d263c" stroke-width="2" stroke-linecap="round"/>
  <line x1="222" y1="172" x2="257" y2="167" stroke="#2d263c" stroke-width="2" stroke-linecap="round"/>
  <line x1="222" y1="176" x2="258" y2="180" stroke="#2d263c" stroke-width="2" stroke-linecap="round"/>

  <!-- Collar -->
  <path d="M168 190 Q186 185 204 190 Q200 203 186 205 Q172 203 168 190 Z" fill="#3a2d7a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
