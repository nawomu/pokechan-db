<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- Tail -->
  <path d="M225 275 Q262 300 268 280 Q272 258 248 252 Q235 250 228 262 Z" fill="#f0eaf7" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
