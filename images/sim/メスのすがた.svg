  <path d="M154 156 Q161 148 173 152 Q175 160 167 165 Q158 167 154 161 Z" fill="#4a6ccc" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <ellipse cx="164" cy="158" rx="4" ry="5" fill="#1a1060"/>
  <path d="M200 152 Q211 148 218 155 Q218 162 210 166 Q201 166 198 160 Z" fill="#4a6ccc" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <ellipse cx="209" cy="157" rx="4" ry="5" fill="#1a1060"/>

  <!-- Nose & mouth -->
