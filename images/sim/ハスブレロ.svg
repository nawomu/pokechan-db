<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ: 1.頭に大きな蓮の葉の帽子(濃い緑・ふちがギザギザ垂れ下がる) 2.全身丸っこい青い体 3.お腹はクリーム色でぽっこり 4.大きな赤い丸鼻がチャームポイント 5.眠たげな半月まゆ・小さい手足で直立 -->

  <!-- 足(奥・後ろ) -->
  <ellipse cx="140" cy="326" rx="30" ry="18" fill="#3f7fd8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="222" cy="326" rx="30" ry="18" fill="#3f7fd8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左腕 -->
  <path d="M96 210 Q56 226 54 266 Q52 288 74 288 Q92 286 92 262 Q96 232 112 216Z" fill="#4a8ce0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右腕 -->
  <path d="M266 210 Q306 226 308 266 Q310 288 288 288 Q270 286 270 262 Q266 232 250 216Z" fill="#4a8ce0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体(青) -->
  <path d="M180 168 Q252 168 258 250 Q262 312 180 314 Q98 312 102 250 Q108 168 180 168Z" fill="#4a8ce0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹クリーム色 -->
  <path d="M180 206 Q228 206 232 258 Q234 292 180 294 Q126 292 128 258 Q132 206 180 206Z" fill="#f5ecc9" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 頭(青丸) -->
  <circle cx="180" cy="140" r="76" fill="#4a8ce0" stroke="#2d263c" stroke-width="8"/>

  <!-- 蓮の葉の帽子(後ろの垂れ・濃い緑) -->
  <path d="M92 118 Q60 150 78 190 Q96 168 116 150Z" fill="#2f8f4e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M268 118 Q300 150 282 190 Q264 168 244 150Z" fill="#2f8f4e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 蓮の葉の帽子(本体・上から丸くかぶさる) -->
  <path d="M90 96 Q180 34 270 96 Q288 118 250 138 Q214 116 180 116 Q146 116 110 138 Q72 118 90 96Z" fill="#3aa860" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 帽子のぎざぎざ縁 -->
  <path d="M110 138 Q118 150 130 140 Q140 152 152 142 Q160 154 172 144" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M250 138 Q242 150 230 140 Q220 152 208 142 Q200 154 188 144" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 帽子の切れ込み(前中央) -->
  <path d="M180 116 L180 92" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 左目(眠たげな半月) -->
  <path d="M136 140 Q150 122 168 138" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <!-- 右目(眠たげな半月) -->
  <path d="M192 138 Q210 122 224 140" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 大きな赤い丸鼻 -->
  <circle cx="180" cy="168" r="20" fill="#e6483c" stroke="#2d263c" stroke-width="7"/>
  <circle cx="173" cy="161" r="5" fill="#ff9a90"/>

  <!-- 口(小さくにっこり) -->
  <path d="M164 190 Q180 200 196 190" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <ellipse cx="128" cy="164" rx="10" ry="7" fill="#7fc3ff" opacity="0.7"/>
  <ellipse cx="232" cy="164" rx="10" ry="7" fill="#7fc3ff" opacity="0.7"/>
</svg>
