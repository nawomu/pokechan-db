<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- メガチャーレム - 子ども落書き風 -->

  <!-- 首の黄色いマフラー(後ろ) -->
  <ellipse cx="183" cy="158" rx="32" ry="14" fill="#f5d63a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <ellipse cx="182" cy="220" rx="42" ry="55" fill="#b8b4c8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹の模様(黒帯) -->
  <ellipse cx="182" cy="228" rx="24" ry="18" fill="#8c8aa0" stroke="none"/>

  <!-- 左腕(後ろ側) -->
  <path d="M148,195 Q118,210 108,250 Q104,265 112,272 Q122,278 130,268 Q138,248 148,225" fill="#b8b4c8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 左手首リング -->
  <ellipse cx="115" cy="268" rx="12" ry="6" fill="#e8e4f0" stroke="#2d263c" stroke-width="5" transform="rotate(-20,115,268)"/>

  <!-- 右腕 -->
  <path d="M216,195 Q248,212 260,252 Q264,267 255,274 Q244,280 236,269 Q226,248 216,226" fill="#b8b4c8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 右手首リング -->
  <ellipse cx="253" cy="270" rx="12" ry="6" fill="#e8e4f0" stroke="#2d263c" stroke-width="5" transform="rotate(20,253,270)"/>

  <!-- 左足 -->
  <path d="M160,268 Q154,295 148,318 Q145,330 158,334 Q170,336 174,322 Q178,302 178,272" fill="#b8b4c8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 左足首リング -->
  <ellipse cx="153" cy="320" rx="14" ry="6" fill="#e8e4f0" stroke="#2d263c" stroke-width="5" transform="rotate(-8,153,320)"/>

  <!-- 右足 -->
  <path d="M202,268 Q208,295 215,318 Q218,330 206,335 Q194,337 190,322 Q186,302 186,272" fill="#b8b4c8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 右足首リング -->
  <ellipse cx="210" cy="321" rx="14" ry="6" fill="#e8e4f0" stroke="#2d263c" stroke-width="5" transform="rotate(8,210,321)"/>

  <!-- 頭 -->
  <ellipse cx="183" cy="120" rx="46" ry="44" fill="#b8b4c8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 首の黄色いマフラー(前) -->
  <path d="M152,152 Q183,168 214,152 Q220,145 215,138 Q183,148 151,138 Q146,145 152,152Z" fill="#f5d63a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- メガ角飾り(Y字) - ピンク -->
  <!-- 中央縦棒 -->
  <path d="M183,82 L183,55" fill="none" stroke="#e0409a" stroke-width="9" stroke-linecap="round"/>
  <!-- 左枝 -->
  <path d="M183,65 Q168,50 158,36" fill="none" stroke="#e0409a" stroke-width="9" stroke-linecap="round"/>
  <!-- 右枝 -->
  <path d="M183,65 Q198,50 210,37" fill="none" stroke="#e0409a" stroke-width="9" stroke-linecap="round"/>
  <!-- Y字の先端マル -->
  <circle cx="157" cy="34" r="7" fill="#e0409a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="211" cy="35" r="7" fill="#e0409a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="183" cy="53" r="7" fill="#e0409a" stroke="#2d263c" stroke-width="5"/>

  <!-- 目(細い・真剣な顔) -->
  <!-- 左目 -->
  <ellipse cx="168" cy="118" rx="9" ry="6" fill="#3a3060" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="170" cy="116" rx="3" ry="2" fill="white"/>
  <!-- 右目 -->
  <ellipse cx="199" cy="116" rx="9" ry="6" fill="#3a3060" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="201" cy="114" rx="3" ry="2" fill="white"/>

  <!-- まゆげ(真剣) -->
  <path d="M160,110 Q168,106 176,110" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M192,108 Q200,104 208,108" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 口(引き結び・小さい) -->
  <path d="M177,136 Q183,133 190,136" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 鼻すじ -->
  <path d="M183,126 L182,133" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 頬のほんのりピンク -->
  <ellipse cx="158" cy="128" rx="10" ry="7" fill="#e8a0c0" opacity="0.5"/>
  <ellipse cx="208" cy="126" rx="10" ry="7" fill="#e8a0c0" opacity="0.5"/>

</svg>