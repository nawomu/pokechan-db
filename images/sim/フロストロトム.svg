<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 背景なし(透明) -->

  <!-- ===== 後ろ: オーラ/グロー ===== -->
  <ellipse cx="182" cy="195" rx="118" ry="128" fill="#b8eaff" opacity="0.35" stroke="none"/>

  <!-- ===== 冷蔵庫本体(白い扉パネル) ===== -->
  <rect x="108" y="118" width="144" height="172" rx="18" ry="22"
        fill="#eaf6ff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 冷蔵庫の仕切り線 -->
  <line x1="112" y1="202" x2="248" y2="200"
        stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 取っ手 上段 -->
  <rect x="225" y="145" width="14" height="42" rx="7"
        fill="#cce8f8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 取っ手 下段 -->
  <rect x="225" y="212" width="14" height="38" rx="7"
        fill="#cce8f8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 冷蔵庫内 霜/氷 の模様(上段) -->
  <line x1="132" y1="158" x2="155" y2="158" stroke="#90cfe8" stroke-width="4" stroke-linecap="round"/>
  <line x1="132" y1="170" x2="148" y2="170" stroke="#90cfe8" stroke-width="4" stroke-linecap="round"/>
  <!-- 下段 氷ブロック -->
  <rect x="128" y="215" width="30" height="22" rx="5"
        fill="#b8e8ff" stroke="#5ab8e0" stroke-width="3"/>
  <rect x="163" y="220" width="22" height="16" rx="4"
        fill="#b8e8ff" stroke="#5ab8e0" stroke-width="3"/>

  <!-- ===== ロトムの体(冷蔵庫から溢れ出るゴースト) ===== -->
  <!-- 頭部ゴースト体 -->
  <ellipse cx="183" cy="100" rx="68" ry="62"
           fill="#5ecce8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭頂の角っぽい突起(ロトムらしい) -->
  <polygon points="160,46 168,22 178,44"
           fill="#5ecce8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="195,40 206,16 214,42"
           fill="#5ecce8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ===== 左ヒレ腕 (ゆるく非対称) ===== -->
  <path d="M118,148 C88,138 68,118 72,148 C76,172 92,178 116,172"
        fill="#5ecce8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ===== 右ヒレ腕 ===== -->
  <path d="M248,144 C278,132 300,114 295,146 C290,170 272,176 250,170"
        fill="#5ecce8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ===== 下のゴースト尾(ふわふわ) ===== -->
  <path d="M140,282 C130,308 148,324 168,310 C176,330 196,334 204,314 C218,332 238,326 236,304 C248,312 256,298 244,284"
        fill="#5ecce8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ===== 電気プラグ尾突起 ===== -->
  <rect x="172" y="318" width="10" height="18" rx="3"
        fill="#2d263c" stroke="#2d263c" stroke-width="2"/>
  <rect x="188" y="318" width="10" height="18" rx="3"
        fill="#2d263c" stroke="#2d263c" stroke-width="2"/>

  <!-- ===== 顔 ===== -->
  <!-- 左目 白め -->
  <ellipse cx="162" cy="96" rx="20" ry="21"
           fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 左目 瞳(オレンジ黄色) -->
  <ellipse cx="164" cy="98" rx="11" ry="12"
           fill="#f5b800" stroke="#2d263c" stroke-width="3"/>
  <!-- 左目 ハイライト -->
  <circle cx="158" cy="92" r="4" fill="white" stroke="none"/>

  <!-- 右目 白め -->
  <ellipse cx="204" cy="94" rx="19" ry="22"
           fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 右目 瞳 -->
  <ellipse cx="205" cy="96" rx="10" ry="13"
           fill="#f5b800" stroke="#2d263c" stroke-width="3"/>
  <!-- 右目 ハイライト -->
  <circle cx="200" cy="89" r="4" fill="white" stroke="none"/>

  <!-- 眉毛(太め・やや怒り) -->
  <path d="M144,74 C152,67 168,68 175,72"
        fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M194,70 C202,65 216,66 222,72"
        fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 口(ニヤリ・ちょっとバカっぽく) -->
  <path d="M162,118 C170,130 196,132 208,120"
        fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- 口角のちょい牙 -->
  <line x1="162" y1="118" x2="158" y2="126" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="208" y1="120" x2="212" y2="128" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ(ロトム電気紋) -->
  <ellipse cx="138" cy="110" rx="12" ry="8"
           fill="#ffe066" opacity="0.75" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="228" cy="108" rx="12" ry="8"
           fill="#ffe066" opacity="0.75" stroke="#2d263c" stroke-width="3"/>

  <!-- 電気スパーク小 (左) -->
  <path d="M82,130 L90,122 L86,132 L95,124"
        fill="none" stroke="#ffe066" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 電気スパーク小 (右) -->
  <path d="M278,126 L286,118 L282,128 L291,120"
        fill="none" stroke="#ffe066" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>