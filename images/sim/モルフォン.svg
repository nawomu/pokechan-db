<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)左右に大きく広がる4枚の羽(上=赤茶に黒斑点/下=淡い羽) 2)紫色でずんぐりふわふわの胴体 3)顔の左右に大きな赤い複眼 4)頭から伸びる羽毛状のフサフサ触角 5)胴体下からのびる細い6本脚 -->

  <!-- 後ろばね(淡色・背面) -->
  <path d="M150,180 Q85,195 60,255 Q65,300 115,292 Q150,268 150,215 Z" fill="#ece2f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M210,180 Q275,195 300,255 Q295,300 245,292 Q210,268 210,215 Z" fill="#ece2f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 前ばね(赤茶・前面) -->
  <path d="M158,150 Q85,133 48,175 Q42,213 85,220 Q140,212 162,175 Z" fill="#a85c42" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M202,150 Q275,133 312,175 Q318,213 275,220 Q220,212 198,175 Z" fill="#a85c42" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 前ばねの黒い斑点 -->
  <ellipse cx="92" cy="172" rx="10" ry="13" fill="#2d263c"/>
  <ellipse cx="128" cy="195" rx="7" ry="9" fill="#2d263c"/>
  <ellipse cx="268" cy="172" rx="10" ry="13" fill="#2d263c"/>
  <ellipse cx="232" cy="195" rx="7" ry="9" fill="#2d263c"/>

  <!-- 脚(細い6本) -->
  <path d="M135,225 Q112,250 100,275 M133,245 Q108,268 95,292 M138,260 Q115,285 105,305" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M225,225 Q248,250 260,275 M227,245 Q252,268 265,292 M222,260 Q245,285 255,305" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 胴体(腹部) -->
  <ellipse cx="180" cy="248" rx="55" ry="63" fill="#9a6cc4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胸部(ふわふわ) -->
  <ellipse cx="180" cy="185" rx="47" ry="34" fill="#8358b0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <circle cx="180" cy="138" r="40" fill="#9a6cc4" stroke="#2d263c" stroke-width="7"/>

  <!-- 触角(羽毛状フサフサ) -->
  <path d="M167,105 Q150,78 128,52 M142,88 L120,80 M136,70 L112,66 M130,55 L108,55" fill="none" stroke="#5a3f82" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M193,105 Q210,78 232,52 M218,88 L240,80 M224,70 L248,66 M230,55 L252,55" fill="none" stroke="#5a3f82" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 左目 -->
  <circle cx="152" cy="130" r="20" fill="#e2402c" stroke="#2d263c" stroke-width="6"/>
  <circle cx="150" cy="128" r="6" fill="#2d263c"/>
  <circle cx="156" cy="123" r="3" fill="#ffffff"/>

  <!-- 右目 -->
  <circle cx="208" cy="130" r="20" fill="#e2402c" stroke="#2d263c" stroke-width="6"/>
  <circle cx="206" cy="128" r="6" fill="#2d263c"/>
  <circle cx="212" cy="123" r="3" fill="#ffffff"/>

  <!-- 口(小さな吻) -->
  <path d="M172,162 Q182,178 174,192" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
