<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: ①白くふわふわの丸い体(頭と体が一体の卵型) ②小さな三角の羽(先端に青/赤の模様) ③頭の上に赤青交互のとんがり冠(3枚) ④大きな丸い目とほっぺの赤み ⑤小さな手足の突起 -->

  <!-- 後ろ: 左羽 -->
  <path d="M95 195 C 55 182 28 155 22 112 C 55 128 88 152 108 188 C 104 194 100 197 95 195 Z" fill="#EAF4FF" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 後ろ: 右羽 -->
  <path d="M265 195 C 305 182 332 155 338 112 C 305 128 272 152 252 188 C 256 194 260 197 265 195 Z" fill="#EAF4FF" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 羽先の模様(左=青) -->
  <path d="M38 122 L58 104 L62 140 Z" fill="#3F72C9" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- 羽先の模様(右=赤) -->
  <path d="M322 122 L302 104 L298 140 Z" fill="#E8434B" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 体(頭〜体が一体の丸い卵型シルエット) -->
  <path d="M180 112 C 143 112 106 142 98 186 C 91 226 99 272 136 302 C 157 317 203 317 224 302 C 261 272 269 226 262 186 C 254 142 217 112 180 112 Z" fill="#FFFFFF" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭の冠(左=青) -->
  <path d="M145 114 L131 54 L164 110 Z" fill="#3F72C9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 頭の冠(中央=赤・一番高い) -->
  <path d="M167 111 L180 34 L198 111 Z" fill="#E8434B" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 頭の冠(右=青) -->
  <path d="M200 111 L217 54 L231 114 Z" fill="#3F72C9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左手(小さな突起) -->
  <ellipse cx="99" cy="238" rx="19" ry="15" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <!-- 右手(小さな突起) -->
  <ellipse cx="261" cy="238" rx="19" ry="15" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <!-- 左足 -->
  <ellipse cx="153" cy="308" rx="17" ry="12" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <!-- 右足 -->
  <ellipse cx="207" cy="308" rx="17" ry="12" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>

  <!-- 顔: 左目白目 -->
  <ellipse cx="147" cy="196" rx="23" ry="27" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <!-- 顔: 右目白目 -->
  <ellipse cx="213" cy="196" rx="23" ry="27" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <!-- 左目玉 -->
  <circle cx="150" cy="202" r="12" fill="#2d263c"/>
  <!-- 右目玉 -->
  <circle cx="216" cy="202" r="12" fill="#2d263c"/>
  <!-- 左目ハイライト -->
  <circle cx="142" cy="190" r="5" fill="#FFFFFF"/>
  <!-- 右目ハイライト -->
  <circle cx="208" cy="190" r="5" fill="#FFFFFF"/>
  <!-- 左ほっぺ -->
  <ellipse cx="115" cy="222" rx="13" ry="9" fill="#FFB6C1"/>
  <!-- 右ほっぺ -->
  <ellipse cx="245" cy="222" rx="13" ry="9" fill="#FFB6C1"/>
  <!-- 口 -->
  <path d="M167 234 Q180 243 193 234" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
