<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- チリーン / Chingling -->

  <!-- 体の影(少し後ろにずらしたベースシルエット) -->
  <ellipse cx="183" cy="202" rx="78" ry="82" fill="#e8a820" stroke="none"/>

  <!-- メインボディ(鈴型・少し左右非対称にゆがんだ感じ) -->
  <path d="M112 185
           C110 148, 128 115, 182 112
           C237 110, 258 145, 256 183
           C258 225, 245 258, 228 272
           C215 283, 198 288, 182 287
           C165 288, 148 283, 136 272
           C118 258, 110 222, 112 185 Z"
        fill="#F8C840" stroke="#2d263c" stroke-width="7"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- お腹の薄い色(クリーム) -->
  <path d="M148 210
           C146 198, 155 178, 183 175
           C210 174, 221 194, 220 208
           C222 230, 212 260, 183 263
           C154 263, 145 232, 148 210 Z"
        fill="#FDEEA0" stroke="none"/>

  <!-- 鈴の底のとがり部分 -->
  <path d="M160 283 C162 295, 172 308, 183 312 C194 308, 203 295, 204 283"
        fill="#F8C840" stroke="#2d263c" stroke-width="7"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 鈴の底の穴(黒い点) -->
  <ellipse cx="183" cy="310" rx="7" ry="5" fill="#2d263c"/>

  <!-- 頭のアンテナ(茎) -->
  <path d="M183 113 C181 96, 179 84, 183 70"
        fill="none" stroke="#2d263c" stroke-width="6"
        stroke-linecap="round"/>

  <!-- アンテナの先のポンポン -->
  <circle cx="183" cy="62" r="12" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>

  <!-- 小さなハイライト(ポンポン) -->
  <circle cx="178" cy="58" r="4" fill="#f0f0f0" stroke="none"/>

  <!-- 左目(白目) -->
  <ellipse cx="155" cy="178" rx="19" ry="21" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <!-- 右目(白目) - 少し大きくして非対称 -->
  <ellipse cx="212" cy="176" rx="17" ry="20" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>

  <!-- 左瞳(赤みがかった茶色) -->
  <ellipse cx="158" cy="182" rx="11" ry="13" fill="#C84040"/>
  <!-- 右瞳 -->
  <ellipse cx="213" cy="180" rx="10" ry="12" fill="#C84040"/>

  <!-- 瞳のハイライト -->
  <circle cx="153" cy="178" r="4" fill="#ffffff"/>
  <circle cx="208" cy="176" r="3" fill="#ffffff"/>

  <!-- 瞳の黒目 -->
  <ellipse cx="160" cy="184" rx="6" ry="7" fill="#1a1a2e"/>
  <ellipse cx="215" cy="182" rx="5" ry="6" fill="#1a1a2e"/>

  <!-- 鼻の渦巻きマーク(赤いぐるぐる・左) -->
  <path d="M166 208 C164 204, 161 202, 162 206 C163 210, 168 212, 171 208 C174 204, 172 198, 166 197 C160 196, 155 200, 155 207"
        fill="none" stroke="#E03030" stroke-width="4" stroke-linecap="round"/>

  <!-- 鼻の渦巻きマーク(赤いぐるぐる・右) -->
  <path d="M197 208 C199 204, 202 202, 201 206 C200 210, 195 212, 192 208 C189 204, 191 198, 197 197 C203 196, 208 200, 208 207"
        fill="none" stroke="#E03030" stroke-width="4" stroke-linecap="round"/>

  <!-- 口(にっこり) -->
  <path d="M172 228 C176 236, 191 237, 195 228"
        fill="none" stroke="#2d263c" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ほっぺの赤み(左) -->
  <ellipse cx="132" cy="215" rx="16" ry="10" fill="#F08080" opacity="0.6"/>
  <!-- ほっぺの赤み(右) -->
  <ellipse cx="234" cy="213" rx="14" ry="9" fill="#F08080" opacity="0.6"/>

  <!-- 左の小さな手 -->
  <ellipse cx="104" cy="228" rx="16" ry="11" fill="#F8C840" stroke="#2d263c" stroke-width="6"
           stroke-linejoin="round" transform="rotate(-20 104 228)"/>

  <!-- 右の小さな手 -->
  <ellipse cx="262" cy="225" rx="15" ry="10" fill="#F8C840" stroke="#2d263c" stroke-width="6"
           stroke-linejoin="round" transform="rotate(18 262 225)"/>

  <!-- 鈴の横線(装飾) -->
  <path d="M124 240 C150 248, 218 248, 242 240"
        fill="none" stroke="#2d263c" stroke-width="5"
        stroke-linecap="round" opacity="0.5"/>
</svg>