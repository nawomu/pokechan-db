<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1) 銀〜青灰の金属ボディ(はがねタイプ)で全身がひし形っぽいシルエット
  2) 頭が2つくっついた双頭シルエット=上部に2つの山(ツノ状の出っぱり)と真ん中の谷
  3) クチバシ状/かぎ爪状の腕が体の左右にとがって伸びる(脚は無い・宙に浮く)
  4) 顔の中心に大きな赤い一つ目(メタモン的な単眼)
  5) 頭頂部にネジ(リベット)の金属ディテール、下半身は少し暗い金属シェード
  -->

  <!-- 後ろ: 左右のかぎ爪状の腕 -->
  <polygon points="60,155 20,115 28,170 55,205" fill="#9aa4b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="300,155 340,115 332,170 305,205" fill="#9aa4b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体: 双頭ひし形の金属ボディ -->
  <polygon points="140,60 180,85 220,60 300,175 180,325 60,175" fill="#b7c1d6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 下半身の暗い金属シェード -->
  <polygon points="95,182 265,182 180,320" fill="#8b96ab"/>

  <!-- 真ん中の継ぎ目ライン(双頭のジョイント) -->
  <path d="M180,90 L180,225" stroke="#6d7789" stroke-width="5" stroke-linecap="round"/>

  <!-- 頭頂部のネジ -->
  <circle cx="140" cy="60" r="11" fill="#7c8092" stroke="#2d263c" stroke-width="6"/>
  <circle cx="220" cy="60" r="11" fill="#7c8092" stroke="#2d263c" stroke-width="6"/>

  <!-- 顔: 明るいフェイスプレート -->
  <circle cx="180" cy="178" r="68" fill="#dbe3f0" stroke="#2d263c" stroke-width="7"/>

  <!-- 顔: 大きな赤い一つ目 -->
  <circle cx="180" cy="176" r="42" fill="#d6423a" stroke="#2d263c" stroke-width="7"/>
  <circle cx="180" cy="182" r="20" fill="#221f2b"/>
  <circle cx="165" cy="163" r="8" fill="#fbfaf6"/>
</svg>
