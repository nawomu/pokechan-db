<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.体色=薄いピンクのゼリー状の丸い体 2.シルエット=単細胞生物のような一つの大きな球 3.模様=中央のやや濃いピンクの核(ネオン風の楕円) 4.顔=まん丸の黒目二つ+小さい口 5.下=黒い小さな台座(足)で床についている -->

  <!-- 影 -->
  <ellipse cx="180" cy="322" rx="60" ry="14" fill="#2d263c" opacity="0.18" stroke="none"/>

  <!-- 台座(足) -->
  <path d="M160 300 Q158 280 165 268 L195 268 Q202 280 200 300 Z" fill="#3a3550" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="180" cy="302" rx="28" ry="12" fill="#221d33" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体(大きな丸・ゼリー質) -->
  <circle cx="180" cy="168" r="118" fill="#f8b8d3" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 体の縁の少し濃いふち(半透明の膜っぽさ) -->
  <circle cx="180" cy="168" r="100" fill="none" stroke="#f199c0" stroke-width="6" opacity="0.6"/>

  <!-- ハイライト(つや) -->
  <ellipse cx="132" cy="118" rx="34" ry="22" fill="#ffe3ef" opacity="0.85" stroke="none" transform="rotate(-25 132 118)"/>

  <!-- 中央の核(ネオン風の模様) -->
  <ellipse cx="180" cy="188" rx="46" ry="34" fill="#e0568f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="180" cy="188" rx="24" ry="16" fill="#c23a72" stroke="none"/>

  <!-- ほっぺ -->
  <circle cx="118" cy="168" r="14" fill="#ff9fc3" opacity="0.8" stroke="none"/>
  <circle cx="242" cy="168" r="14" fill="#ff9fc3" opacity="0.8" stroke="none"/>

  <!-- 目(まん丸・黒目がち) -->
  <circle cx="150" cy="140" r="17" fill="#221d33" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="210" cy="140" r="17" fill="#221d33" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="145" cy="134" r="5" fill="#ffffff" stroke="none"/>
  <circle cx="205" cy="134" r="5" fill="#ffffff" stroke="none"/>

  <!-- 口(小さい丸) -->
  <circle cx="180" cy="150" r="6" fill="#2d263c" stroke="none"/>
</svg>
