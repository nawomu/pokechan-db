  <ellipse cx="165" cy="108" rx="5" ry="6" fill="#0d4a7a"/>
  <circle cx="168" cy="105" r="2.5" fill="white"/>
  <!-- 目 右(少し違う大きさ=非対称) -->
  <ellipse cx="196" cy="107" rx="8" ry="9" fill="#1a6aa8" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="196" cy="107" rx="4.5" ry="5.5" fill="#0d4a7a"/>
  <circle cx="199" cy="104" r="2" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="118" rx="4" ry="2.5" fill="#2d263c"/>

  <!-- 口(おだやかな微笑み) -->
  <path d="M 172 124 Q 180 130 188 124" fill="none" stroke="#2d263c" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ほっぺ(うっすらピンク) -->
  <ellipse cx="158" cy="120" rx="7" ry="4" fill="#ffb8c8" opacity="0.6"/>
  <ellipse cx="202" cy="119" rx="6" ry="4" fill="#ffb8c8" opacity="0.6"/>
</svg>