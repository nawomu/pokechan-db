  <!-- クリスタルのハイライト -->
  <line x1="185" y1="70" x2="188" y2="76" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 顔 -->
  <!-- 目 左(大きくてきゅっとした目) -->
