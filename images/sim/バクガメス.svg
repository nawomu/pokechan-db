<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- legs -->
  <ellipse cx="130" cy="290" rx="24" ry="30" fill="#c84a30" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="230" cy="290" rx="24" ry="30" fill="#c84a30" stroke="#2d263c" stroke-width="7"/>
  <!-- shell back -->
  <path d="M80 200 Q100 110 180 105 Q260 110 280 200 Q260 250 180 255 Q100 250 80 200 Z" fill="#d8542a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- shell spikes -->
  <path d="M108 128 L118 98 L128 128 Z" fill="#a83820" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M232 128 L242 98 L252 128 Z" fill="#a83820" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M88 175 L70 165 L92 185 Z" fill="#a83820" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M272 175 L290 165 L268 185 Z" fill="#a83820" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- yellow belly -->
  <ellipse cx="180" cy="240" rx="75" ry="32" fill="#f5d04a" stroke="#2d263c" stroke-width="7"/>
  <!-- shell scute line -->
  <path d="M105 180 Q180 200 255 180" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- head -->
  <ellipse cx="180" cy="135" rx="40" ry="35" fill="#e8a040" stroke="#2d263c" stroke-width="8"/>
  <!-- cannon snout -->
  <path d="M168 95 Q168 90 172 90 L188 90 Q192 90 192 95 L192 125 L168 125 Z" fill="#c87820" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="180" cy="95" rx="13" ry="6" fill="#2d263c"/>
  <!-- eyes -->
  <circle cx="160" cy="138" r="8" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="200" cy="138" r="8" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="161" cy="140" r="4" fill="#2d263c"/>
  <circle cx="201" cy="140" r="4" fill="#2d263c"/>
  <!-- mouth -->
  <path d="M165 152 Q180 160 195 152" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- tail -->
  <path d="M280 240 Q312 248 305 275 L295 263 Q302 253 280 250 Z" fill="#d8542a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
</svg>
