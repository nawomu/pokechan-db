  <path d="M188 134 Q198 130 208 136" stroke="#2d263c" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- 口(いかつい表情) -->
  <path d="M170 172 Q180 180 190 172" stroke="#2d263c" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- 頭の甲殻模様 -->
