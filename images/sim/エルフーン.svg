<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろの綿毛(背景層) -->
  <ellipse cx="180" cy="210" rx="88" ry="72" fill="#f5f5f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  
  <!-- しっぽ綿毛(右側後ろ) -->
  <ellipse cx="262" cy="248" rx="34" ry="28" fill="#efefef" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(15 262 248)"/>
  <ellipse cx="285" cy="232" rx="22" ry="18" fill="#efefef" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(25 285 232)"/>
  <ellipse cx="294" cy="212" rx="16" ry="14" fill="#efefef" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 脚(左) -->
  <ellipse cx="150" cy="282" rx="18" ry="22" fill="#7ec87a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="148" cy="300" rx="14" ry="9" fill="#6ab868" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 脚(右) -->
  <ellipse cx="210" cy="282" rx="18" ry="22" fill="#7ec87a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="212" cy="300" rx="14" ry="9" fill="#6ab868" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 腕(左) -->
  <ellipse cx="110" cy="230" rx="16" ry="26" fill="#7ec87a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-20 110 230)"/>
  <!-- 腕(右) -->
  <ellipse cx="252" cy="235" rx="16" ry="24" fill="#7ec87a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(18 252 235)"/>

  <!-- 体本体(緑) -->
  <ellipse cx="180" cy="228" rx="52" ry="58" fill="#7ec87a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 胸の白い綿毛(大きめ) -->
  <ellipse cx="180" cy="208" rx="48" ry="38" fill="#ffffff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 綿毛のモコモコ凸凹 -->
  <circle cx="148" cy="200" r="20" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="168" cy="190" r="22" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="192" cy="188" r="20" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="212" cy="198" r="20" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="220" cy="215" r="16" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="142" cy="216" r="15" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>

  <!-- 頭(緑) -->
  <ellipse cx="180" cy="148" rx="46" ry="44" fill="#7ec87a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 左耳 -->
  <ellipse cx="138" cy="128" rx="14" ry="20" fill="#6ab868" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-18 138 128)"/>
  <!-- 右耳(ちょい非対称) -->
  <ellipse cx="224" cy="126" rx="13" ry="21" fill="#6ab868" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(22 224 126)"/>

  <!-- 額のツノ(角) -->
  <polygon points="180,88 170,118 190,118" fill="#5aac56" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目(左) ちょっとずれてる感じ -->
  <circle cx="162" cy="152" r="12" fill="#2d263c"/>
  <circle cx="160" cy="150" r="4" fill="#ffffff"/>

  <!-- 目(右) -->
  <circle cx="200" cy="150" r="11" fill="#2d263c"/>
  <circle cx="202" cy="148" r="3.5" fill="#ffffff"/>

  <!-- ほっぺ(左) -->
  <ellipse cx="146" cy="162" rx="10" ry="7" fill="#f9a8c0" stroke="none" opacity="0.75"/>
  <!-- ほっぺ(右) -->
  <ellipse cx="216" cy="160" rx="9" ry="7" fill="#f9a8c0" stroke="none" opacity="0.75"/>

  <!-- 口(いたずらっぽい小さなくちびる) -->
  <path d="M172,168 Q180,176 189,168" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 頭上の小さな綿毛ぽこぽこ -->
  <circle cx="160" cy="108" r="13" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="178" cy="100" r="15" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="200" cy="106" r="13" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
</svg>