<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body), cream with dark curled tip -->
  <path d="M 220,296 Q 292,286 296,214 Q 300,158 258,136 Q 246,152 256,172 Q 270,214 236,252 Q 214,274 202,288 Z" fill="#f6e0ac" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="262" cy="136" rx="27" ry="24" fill="#6b4423" stroke="#2d263c" stroke-width="7"/>

  <!-- body torso -->
  <path d="M 130,300 L 130,212 Q 130,176 180,176 Q 230,176 230,212 L 230,300 Q 230,317 208,320 L 152,320 Q 130,317 130,300 Z" fill="#f6e0ac" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- feet -->
  <ellipse cx="155" cy="315" rx="23" ry="14" fill="#f6e0ac" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="207" cy="315" rx="23" ry="14" fill="#f6e0ac" stroke="#2d263c" stroke-width="7"/>

  <!-- right arm (down) -->
  <path d="M 227,214 Q 252,230 252,258" fill="none" stroke="#2d263c" stroke-width="20" stroke-linecap="round"/>
  <ellipse cx="252" cy="260" rx="18" ry="16" fill="#f6e0ac" stroke="#2d263c" stroke-width="7"/>

  <!-- left arm (raised, playful) -->
  <path d="M 135,212 Q 100,195 92,160" fill="none" stroke="#2d263c" stroke-width="20" stroke-linecap="round"/>
  <ellipse cx="90" cy="158" rx="19" ry="17" fill="#f6e0ac" stroke="#2d263c" stroke-width="7"/>

  <!-- head -->
  <circle cx="180" cy="142" r="64" fill="#f6e0ac" stroke="#2d263c" stroke-width="7"/>

  <!-- ears, solid dark brown -->
  <path d="M 128,108 L 100,42 L 158,92 Z" fill="#6b4423" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 232,108 L 260,42 L 202,92 Z" fill="#6b4423" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- forehead zigzag marking -->
  <path d="M 160,108 L 170,124 L 180,106 L 190,124 L 200,108" fill="none" stroke="#6b4423" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- eye masks (upswept marks) -->
  <path d="M 138,138 Q 150,120 168,128" fill="none" stroke="#6b4423" stroke-width="6" stroke-linecap="round"/>
  <path d="M 222,138 Q 210,120 192,128" fill="none" stroke="#6b4423" stroke-width="6" stroke-linecap="round"/>

  <!-- eyes -->
  <ellipse cx="155" cy="152" rx="15" ry="19" fill="#dcec6e" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="205" cy="152" rx="15" ry="19" fill="#dcec6e" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="155" cy="155" rx="4" ry="13" fill="#2d263c"/>
  <ellipse cx="205" cy="155" rx="4" ry="13" fill="#2d263c"/>

  <!-- nose -->
  <path d="M 174,180 L 186,180 L 180,190 Z" fill="#e08a9b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- smug mouth -->
  <path d="M 160,192 Q 180,204 200,190" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- whiskers -->
  <path d="M 120,168 L 70,160" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M 122,180 L 72,182" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M 240,168 L 290,160" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M 238,180 L 288,182" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
