<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.クリーム色の丸くもさっとした体 2.顔の周りに焦げ茶色のマスク(たれ目) 3.半目でいつも眠そう 4.長い腕をだらんと下げる 5.短いしっぽ、猫背でだらけた立ち姿 -->

  <!-- 後ろ: しっぽ -->
  <path d="M225 275 Q260 290 250 320 Q235 305 215 290 Z" fill="#d8c896" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ足 -->
  <ellipse cx="150" cy="320" rx="26" ry="18" fill="#d8c896" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="220" cy="322" rx="26" ry="18" fill="#d8c896" stroke="#2d263c" stroke-width="7"/>

  <!-- 体(猫背の丸い胴体) -->
  <path d="M110 170 Q90 230 120 290 Q150 320 200 318 Q250 315 260 270 Q270 210 235 160 Q200 120 150 130 Q120 138 110 170 Z"
        fill="#efe3ba" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の明るいライン -->
  <path d="M140 200 Q135 250 165 285 Q195 300 220 280" fill="none" stroke="#f7efd6" stroke-width="14" stroke-linecap="round"/>

  <!-- 左うで(だらんと垂れる・長い) -->
  <path d="M120 175 Q80 210 75 265 Q73 295 95 305 Q110 308 108 288 Q100 260 115 225 Q130 200 140 190 Z"
        fill="#efe3ba" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="90" cy="298" rx="20" ry="16" fill="#d8c896" stroke="#2d263c" stroke-width="6"/>

  <!-- 右うで(だらんと垂れる) -->
  <path d="M235 175 Q272 205 278 260 Q280 292 258 302 Q244 305 246 285 Q252 258 240 222 Q228 198 218 188 Z"
        fill="#efe3ba" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="264" cy="294" rx="20" ry="16" fill="#d8c896" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="120" rx="78" ry="68" fill="#efe3ba" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭のふさふさ毛 -->
  <path d="M140 58 Q150 30 175 45 Q185 25 200 48 Q220 32 220 60" fill="#efe3ba" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 顔まわりの焦げ茶マスク模様 -->
  <path d="M120 108 Q112 145 145 160 Q170 168 175 145 Q178 120 155 105 Q135 95 120 108 Z" fill="#7a5a3a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M240 108 Q248 145 215 160 Q190 168 185 145 Q182 120 205 105 Q225 95 240 108 Z" fill="#7a5a3a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- たれ目(半目・眠そう) -->
  <path d="M133 122 Q145 132 158 124" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M202 124 Q215 132 227 122" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="145" cy="130" rx="4" ry="4" fill="#2d263c"/>
  <ellipse cx="215" cy="130" rx="4" ry="4" fill="#2d263c"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="150" rx="8" ry="6" fill="#7a5a3a" stroke="#2d263c" stroke-width="4"/>

  <!-- 口(だらっと開いた眠そうな口) -->
  <path d="M162 165 Q180 182 198 165" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
