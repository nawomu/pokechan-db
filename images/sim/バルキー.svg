<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.筋肉質な二足歩行の体 2.グレーがかった青みの体色 3.頭の上に3本の茶色いトサカ状の突起 4.腰に茶色いパンツ(ベルト)模様 5.小さい丸い目とキリッとした顔つき -->

  <!-- 後ろの足(奥) -->
  <ellipse cx="230" cy="290" rx="34" ry="28" fill="#8C99B8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 手前の足 -->
  <ellipse cx="140" cy="292" rx="36" ry="30" fill="#98A4C0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <path d="M 120 150 Q 100 220 130 270 Q 180 300 230 270 Q 258 220 236 150 Q 190 118 120 150 Z"
        fill="#9BA7C4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腰の茶色いパンツ模様 -->
  <path d="M 122 235 Q 178 262 234 235 L 232 262 Q 178 288 124 262 Z"
        fill="#6B4A34" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胸の筋肉ライン -->
  <path d="M 150 165 Q 178 185 206 165" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M 178 165 L 178 210" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 奥の腕(曲げて力こぶ) -->
  <path d="M 232 165 Q 275 175 278 215 Q 280 240 258 248 Q 268 218 250 195 Q 240 178 224 175 Z"
        fill="#8C99B8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 手前の腕(曲げて力こぶ・拳) -->
  <path d="M 122 168 Q 78 178 74 220 Q 72 248 96 256 Q 84 224 104 200 Q 116 182 130 178 Z"
        fill="#A3AFC9" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="88" cy="248" r="20" fill="#A3AFC9" stroke="#2d263c" stroke-width="7"/>

  <!-- 首 -->
  <rect x="158" y="128" width="42" height="30" rx="10" fill="#9BA7C4" stroke="#2d263c" stroke-width="7"/>

  <!-- 顔(頭) -->
  <circle cx="178" cy="98" r="62" fill="#9BA7C4" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭の3本のトサカ(茶色) -->
  <path d="M 150 46 Q 148 14 168 30 Q 170 48 160 58 Z" fill="#6B4A34" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 178 40 Q 178 6 198 26 Q 196 46 184 54 Z" fill="#6B4A34" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 204 48 Q 210 18 226 38 Q 220 54 208 60 Z" fill="#6B4A34" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目 -->
  <circle cx="156" cy="100" r="9" fill="#2d263c"/>
  <circle cx="198" cy="100" r="9" fill="#2d263c"/>

  <!-- 眉(キリッと) -->
  <path d="M 142 82 Q 156 74 170 82" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M 186 82 Q 200 74 214 82" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 口 -->
  <path d="M 162 128 Q 178 138 194 128" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
