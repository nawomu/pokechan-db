  <ellipse cx="200" cy="85" rx="3" ry="4" fill="#ffffff"/>

  <!-- 口 -->
  <path d="M168 122 Q180 130 192 122" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
