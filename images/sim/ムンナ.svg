<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ: 浮遊感を出す影(楕円・薄く) -->
  <ellipse cx="180" cy="300" rx="80" ry="16" fill="#5b6b8c" opacity="0.25"/>

  <!-- 体(タピオカのようなずんぐり丸い胴体) -->
  <path d="M96 200 Q90 130 180 118 Q270 130 264 200 Q272 268 180 278 Q88 268 96 200 Z"
        fill="#e8b8e0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹のもや模様(濃いピンク〜紫・左右非対称の雲形) -->
  <path d="M130 200 Q120 178 145 168 Q170 160 178 180 Q186 158 210 168 Q236 178 224 202 Q232 226 205 232 Q182 244 168 226 Q140 232 130 200 Z"
        fill="#c47ec4" opacity="0.8"/>
  <ellipse cx="150" cy="192" rx="10" ry="8" fill="#a85ab0" opacity="0.7"/>
  <ellipse cx="205" cy="210" rx="8" ry="7" fill="#a85ab0" opacity="0.6"/>

  <!-- 小さい手(左右にちょこんと) -->
  <ellipse cx="104" cy="212" rx="16" ry="20" fill="#e8b8e0" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="256" cy="212" rx="16" ry="20" fill="#e8b8e0" stroke="#2d263c" stroke-width="7"/>

  <!-- 小さい足(下にちょこんと) -->
  <ellipse cx="146" cy="270" rx="18" ry="12" fill="#e8b8e0" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="214" cy="270" rx="18" ry="12" fill="#e8b8e0" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭頂のアンテナ状の小さな突起 -->
  <path d="M172 122 Q170 100 180 90 Q190 100 188 122 Z" fill="#f0cdec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(うとうと半分閉じた丸い目) -->
  <path d="M136 168 Q146 156 158 168 Q148 176 136 168 Z" fill="#2d263c"/>
  <path d="M202 168 Q212 156 224 168 Q214 176 202 168 Z" fill="#2d263c"/>
  <circle cx="150" cy="164" r="3" fill="#fff"/>
  <circle cx="216" cy="164" r="3" fill="#fff"/>

  <!-- 口(小さくうとうとした口) -->
  <path d="M172 188 Q180 194 188 188" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <circle cx="126" cy="180" r="9" fill="#f0a0c8" opacity="0.6"/>
  <circle cx="234" cy="180" r="9" fill="#f0a0c8" opacity="0.6"/>
</svg>
