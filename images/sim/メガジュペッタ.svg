  <ellipse cx="118" cy="158" rx="14" ry="10" fill="#7755aa" opacity="0.6"/>
  <!-- ほっぺの丸(右) -->
  <ellipse cx="246" cy="158" rx="14" ry="10" fill="#7755aa" opacity="0.6"/>
