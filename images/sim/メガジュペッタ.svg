  <line x1="197" y1="181" x2="197" y2="173" stroke="#e8c43a" stroke-width="4" stroke-linecap="round"/>
  <line x1="210" y1="177" x2="210" y2="169" stroke="#e8c43a" stroke-width="4" stroke-linecap="round"/>
  <line x1="223" y1="171" x2="223" y2="163" stroke="#e8c43a" stroke-width="4" stroke-linecap="round"/>

