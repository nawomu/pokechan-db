  <line x1="145" y1="172" x2="145" y2="164" stroke="#e8c43a" stroke-width="4" stroke-linecap="round"/>
  <line x1="158" y1="178" x2="158" y2="170" stroke="#e8c43a" stroke-width="4" stroke-linecap="round"/>
  <line x1="171" y1="182" x2="171" y2="174" stroke="#e8c43a" stroke-width="4" stroke-linecap="round"/>
