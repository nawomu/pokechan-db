<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)水色のエビのような丸まった胴体 2)右に巨大なハサミ(大爪) 3)目玉が2本の柄に乗って突出 4)頭から2本の長い触角 5)胴体に節・尾びれ -->

  <!-- 触角(2本・長い) -->
  <path d="M165,120 Q150,80 130,55 M175,118 Q170,75 158,45" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 尾びれ(扇形・後ろ) -->
  <path d="M250,235 Q278,210 300,225 Q300,250 278,262 Q260,260 250,250 Z" fill="#5fa8d6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体(エビ・丸まる) -->
  <path d="M255,210 Q258,160 220,138 Q175,128 150,150 Q140,185 165,210 Q200,228 230,225 Q250,222 255,210 Z" fill="#7fc3e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体の節ライン -->
  <path d="M170,165 Q185,175 180,195 M200,150 Q215,162 212,185 M225,155 Q238,170 236,195" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 小さい左ハサミ(手前・小) -->
  <path d="M150,200 Q120,205 112,225 Q118,240 138,236 Q150,225 150,210 Z" fill="#7fc3e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M112,222 L92,218 M112,230 L90,235" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 巨大右ハサミ(本体) -->
  <path d="M250,210 Q300,195 320,215 Q325,245 300,258 Q265,258 245,240 Z" fill="#7fc3e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- ハサミ上側 -->
  <path d="M318,215 Q335,210 335,228 Q325,236 308,232" fill="#5fa8d6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- ハサミ下側 -->
  <path d="M300,258 Q318,262 322,250 Q318,238 300,238" fill="#5fa8d6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- ハサミの節 -->
  <path d="M270,222 Q282,232 272,245" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 頭部(目玉の台) -->
  <ellipse cx="168" cy="142" rx="32" ry="26" fill="#7fc3e8" stroke="#2d263c" stroke-width="7"/>

  <!-- 目玉柄 -->
  <path d="M155,128 Q150,108 148,95 M182,128 Q184,108 188,95" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 左目玉 -->
  <circle cx="148" cy="92" r="15" fill="#ffd84d" stroke="#2d263c" stroke-width="6"/>
  <circle cx="148" cy="93" r="5" fill="#2d263c"/>
  <!-- 右目玉 -->
  <circle cx="188" cy="92" r="15" fill="#ffd84d" stroke="#2d263c" stroke-width="6"/>
  <circle cx="188" cy="93" r="5" fill="#2d263c"/>
</svg>
