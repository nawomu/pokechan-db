<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 1: green leaf-tail behind body -->
  <path d="M180 230 C 220 250, 250 235, 275 260 C 260 265, 250 280, 260 295 C 240 290, 225 300, 220 315 C 210 300, 195 300, 185 310 C 190 290, 180 270, 165 260 Z"
        fill="#5fa93c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M260 260 L 285 255" stroke="#c0392b" stroke-width="7" stroke-linecap="round"/>
  <path d="M262 292 L 285 300" stroke="#c0392b" stroke-width="7" stroke-linecap="round"/>
  <path d="M218 316 L 222 340" stroke="#c0392b" stroke-width="7" stroke-linecap="round"/>

  <!-- 2: genie lower body tapering to a point (no legs) -->
  <path d="M140 220 C 130 260, 150 300, 180 330 C 210 300, 232 260, 222 220 Z"
        fill="#d97a3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 3: main torso -->
  <path d="M120 150 C 110 190, 118 220, 145 235 C 165 246, 200 246, 220 235 C 246 220, 252 190, 240 150
           C 232 115, 200 95, 180 95 C 158 95, 130 115, 120 150 Z"
        fill="#e08643" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 4: white fluffy chest/collar fur -->
  <path d="M140 150 C 150 140, 165 148, 172 160 C 178 148, 190 148, 196 160 C 203 148, 216 140, 228 150
           C 234 165, 230 185, 218 198 C 210 205, 150 205, 142 198 C 130 185, 134 165, 140 150 Z"
        fill="#f6ead4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 5: left arm -->
  <path d="M120 165 C 95 175, 75 200, 68 225 C 66 233, 74 238, 80 232 C 92 210, 108 195, 128 185 Z"
        fill="#d97a3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- claw hand left -->
  <path d="M68 225 L 55 222 M70 230 L 58 232 M74 236 L 64 242" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 6: right arm -->
  <path d="M240 165 C 265 175, 285 200, 292 225 C 294 233, 286 238, 280 232 C 268 210, 252 195, 232 185 Z"
        fill="#d97a3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- claw hand right -->
  <path d="M292 225 L 305 222 M290 230 L 302 232 M286 236 L 296 242" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 7: shoulder pauldron shapes (small orange bumps) -->
  <path d="M118 148 C 108 140, 100 142, 96 152 C 100 160, 112 162, 122 156 Z" fill="#c96a30" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M242 148 C 252 140, 260 142, 264 152 C 260 160, 248 162, 238 156 Z" fill="#c96a30" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 8: head -->
  <path d="M132 90 C 128 60, 150 35, 180 35 C 210 35, 232 60, 228 90 C 226 112, 205 128, 180 128
           C 155 128, 134 112, 132 90 Z"
        fill="#e08643" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 9: pointed ear/horn left -->
  <path d="M138 55 C 120 40, 110 20, 116 5 C 132 12, 145 28, 150 48 Z"
        fill="#e08643" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 10: pointed ear/horn right -->
  <path d="M222 55 C 240 40, 250 20, 244 5 C 228 12, 215 28, 210 48 Z"
        fill="#e08643" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 11: small top spike / crest -->
  <path d="M170 40 C 172 25, 178 15, 180 12 C 182 15, 188 25, 190 40 Z" fill="#c96a30" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 12: white fur tuft under chin/ears -->
  <path d="M140 78 C 148 70, 160 68, 168 74 C 172 68, 188 68, 192 74 C 200 68, 212 70, 220 78
           C 222 88, 214 96, 200 98 C 190 100, 170 100, 160 98 C 146 96, 138 88, 140 78 Z"
        fill="#f6ead4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 13: eyes -->
  <ellipse cx="160" cy="82" rx="12" ry="14" fill="#fff" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="200" cy="82" rx="12" ry="14" fill="#fff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="162" cy="84" r="6" fill="#c0392b"/>
  <circle cx="202" cy="84" r="6" fill="#c0392b"/>

  <!-- 14: small nose/mouth -->
  <path d="M172 104 C 176 108, 184 108, 188 104" stroke="#2d263c" stroke-width="6" stroke-linecap="round" fill="none"/>
  <circle cx="180" cy="96" r="3" fill="#2d263c"/>

  <!-- 15: cheek marks -->
  <circle cx="146" cy="98" r="5" fill="#c96a30"/>
  <circle cx="214" cy="98" r="5" fill="#c96a30"/>
</svg>
