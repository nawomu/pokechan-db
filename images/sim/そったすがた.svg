<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- そったすがた(タツギリ)の特徴:
    1. お寿司のシャリのような白っぽいピンク色のずんぐりした魚の体
    2. 体の真ん中に海苔を巻いたような緑色の帯(すし巻き)
    3. 大きくて丸い目、口はへの字の小さな受け口
    4. 尾びれが渦巻き状にくるっと丸まっている(そったすがた=カールした尾)
    5. 背中と体側に小さなヒレ
  -->

  <!-- くるっと巻いた尾(体の後ろに渦巻き) -->
  <path d="M255 205 Q305 195 310 155 Q313 120 285 110 Q305 130 300 155 Q294 185 255 195 Z"
        fill="#ff9fb0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M285 110 Q270 108 262 125 Q272 118 285 122 Z"
        fill="#ff9fb0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体側の下ヒレ -->
  <path d="M100 275 Q90 305 120 310 Q112 290 128 272 Z" fill="#ff8399" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M225 278 Q235 306 210 312 Q216 292 202 274 Z" fill="#ff8399" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体(ずんぐりした魚体・シャリ色) -->
  <ellipse cx="175" cy="215" rx="105" ry="82" fill="#ffd7de" stroke="#2d263c" stroke-width="8"/>

  <!-- お腹(白いお腹) -->
  <ellipse cx="175" cy="248" rx="70" ry="42" fill="#fff6f2" stroke="#2d263c" stroke-width="6"/>

  <!-- 海苔巻き(緑の帯) -->
  <path d="M75 190 Q175 168 275 190 Q275 215 175 222 Q75 215 75 190 Z"
        fill="#3f9463" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M75 190 Q175 210 275 190" fill="none" stroke="#276b45" stroke-width="4" stroke-linecap="round"/>

  <!-- 背中の小さなヒレ -->
  <path d="M150 138 Q160 108 185 118 Q175 138 168 150 Z" fill="#ff8399" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭部(丸い顔) -->
  <ellipse cx="120" cy="175" rx="78" ry="72" fill="#ffd7de" stroke="#2d263c" stroke-width="8"/>

  <!-- 頬の白い受け口まわり -->
  <ellipse cx="95" cy="205" rx="42" ry="30" fill="#fff6f2" stroke="#2d263c" stroke-width="6"/>

  <!-- 小さな口(への字の受け口) -->
  <path d="M65 205 Q90 220 118 208" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 目(大きく丸い) -->
  <circle cx="100" cy="155" r="26" fill="#ffffff" stroke="#2d263c" stroke-width="7"/>
  <circle cx="100" cy="160" r="13" fill="#2d263c"/>
  <circle cx="105" cy="153" r="5" fill="#ffffff"/>

  <circle cx="160" cy="150" r="17" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="160" cy="154" r="8" fill="#2d263c"/>

  <!-- 頬の赤み(可愛さ用) -->
  <circle cx="70" cy="180" r="11" fill="#ff6f8c" opacity="0.5"/>
</svg>
