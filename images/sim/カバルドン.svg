<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尻尾 -->
  <path d="M268 210 Q295 195 305 210 Q298 230 280 228 Z" fill="#c9a96e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 後ろ足(左・右奥) -->
  <ellipse cx="108" cy="272" rx="30" ry="22" fill="#b89050" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="255" cy="272" rx="30" ry="22" fill="#c9a96e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <path d="M68 175 Q60 240 88 268 Q120 290 180 292 Q240 292 272 268 Q300 240 292 175 Q285 130 245 118 Q210 108 180 110 Q148 110 115 120 Q72 134 68 175 Z" fill="#c9a96e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 背中の斑点模様(穴) -->
  <ellipse cx="145" cy="140" rx="16" ry="12" fill="#7a5c2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="195" cy="128" rx="14" ry="10" fill="#7a5c2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="240" cy="145" rx="13" ry="10" fill="#7a5c2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="175" cy="158" rx="11" ry="8" fill="#7a5c2e" stroke="#2d263c" stroke-width="3"/>

  <!-- 前足(左) -->
  <path d="M95 235 Q72 238 68 262 Q70 284 100 286 Q120 286 122 268 Q124 248 108 238 Z" fill="#b89050" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 前足(右) -->
  <path d="M265 235 Q288 238 292 262 Q290 284 260 286 Q240 286 238 268 Q236 248 252 238 Z" fill="#c9a96e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭部(大きく前に張り出した丸い頭) -->
  <path d="M95 155 Q88 90 140 62 Q180 45 222 62 Q270 82 272 148 Q275 178 245 190 Q210 200 180 198 Q148 198 115 185 Q90 175 95 155 Z" fill="#c9a96e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 耳(丸っこい小さな耳) -->
  <ellipse cx="128" cy="58" rx="20" ry="15" fill="#c9a96e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-18 128 58)"/>
  <ellipse cx="232" cy="55" rx="20" ry="15" fill="#c9a96e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(15 232 55)"/>
  <!-- 耳内側 -->
  <ellipse cx="129" cy="59" rx="11" ry="8" fill="#e8b87a" stroke="none" transform="rotate(-18 129 59)"/>
  <ellipse cx="231" cy="56" rx="11" ry="8" fill="#e8b87a" stroke="none" transform="rotate(15 231 56)"/>

  <!-- 鼻づら(大きく突き出た部分) -->
  <path d="M120 158 Q118 185 130 200 Q155 220 180 222 Q205 220 230 200 Q242 185 240 158 Q235 138 215 130 Q196 124 180 124 Q162 124 144 132 Q122 142 120 158 Z" fill="#d4b080" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 鼻の穴 -->
  <ellipse cx="160" cy="152" rx="12" ry="9" fill="#8b6a30" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="200" cy="152" rx="12" ry="9" fill="#8b6a30" stroke="#2d263c" stroke-width="4"/>

  <!-- 目(小さくてギョロっとした) -->
  <ellipse cx="148" cy="118" rx="14" ry="12" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="213" cy="116" rx="14" ry="12" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 瞳 -->
  <circle cx="152" cy="120" r="7" fill="#2d263c"/>
  <circle cx="217" cy="118" r="7" fill="#2d263c"/>
  <!-- ハイライト -->
  <circle cx="155" cy="117" r="3" fill="white"/>
  <circle cx="220" cy="115" r="3" fill="white"/>

  <!-- 眉毛(むっつりした感じ) -->
  <path d="M136 106 Q148 100 162 106" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M200 104 Q213 98 227 103" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 口(大きくにやりと開いた) -->
  <path d="M132 190 Q155 215 180 218 Q205 215 228 190" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- 歯(下側の大きな牙) -->
  <path d="M150 208 L148 226 Q152 230 158 226 L158 210 Z" fill="white" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M205 208 L207 226 Q203 230 197 226 L197 210 Z" fill="white" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- お腹の明るい色 -->
  <path d="M118 245 Q120 278 148 286 Q180 292 210 286 Q238 278 240 245 Q230 232 180 230 Q128 232 118 245 Z" fill="#e8c888" stroke="none"/>

  <!-- 砂のつぶ(飾り) -->
  <circle cx="155" cy="95" r="4" fill="#d4b080" stroke="#2d263c" stroke-width="2"/>
  <circle cx="205" cy="90" r="3" fill="#d4b080" stroke="#2d263c" stroke-width="2"/>
  <circle cx="178" cy="85" r="3.5" fill="#c9a96e" stroke="#2d263c" stroke-width="2"/>
</svg>