  <!-- neck -->
  <path d="M195 143 Q214 116 239 96 Q254 83 269 90 Q259 110 244 130 Q221 150 199 158 Z"
        fill="#9089b0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

