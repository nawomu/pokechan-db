  <path d="M191 300 Q187 314 204 314 Q221 314 219 300 Z" fill="#5c5480" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- front leg -->
  <path d="M140 255 Q136 282 128 302 L155 302 Q160 282 158 255 Z" fill="#7b7299" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M126 300 Q122 314 139 314 Q156 314 154 300 Z" fill="#5c5480" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- tiny arm -->
