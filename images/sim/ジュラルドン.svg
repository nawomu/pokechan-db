  <!-- eyes -->
  <circle cx="262" cy="66" r="7" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="286" cy="60" r="7" fill="#fff8ea" stroke="#2d263c" stroke-width="5"/>
  <circle cx="263" cy="67" r="2.6" fill="#2d263c"/>
  <circle cx="287" cy="61" r="2.6" fill="#2d263c"/>

  <!-- head crest fins -->
  <path d="M250 46 Q245 28 259 25 Q265 42 261 54 Z" fill="#3b6fc4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M277 43 Q274 26 289 24 Q293 40 286 53 Z" fill="#3b6fc4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M302 46 Q301 28 316 25 Q318 44 308 56 Z" fill="#3b6fc4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
</svg>
