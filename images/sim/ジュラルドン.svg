  <ellipse cx="110" cy="237" rx="11" ry="9" fill="#7b7299" stroke="#2d263c" stroke-width="6"/>

  <!-- body -->
  <path d="M112 202 Q94 163 129 138 Q161 116 201 128 Q243 141 247 183 Q251 220 211 242 Q164 262 121 240 Q99 226 112 202 Z"
