<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail behind body -->
  <path d="M 230 270 Q 290 240 300 200 Q 310 165 285 155 Q 270 150 265 165 Q 275 175 268 195 Q 255 225 220 250 Z" fill="#F08098" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- tail tip circle -->
  <circle cx="287" cy="153" r="14" fill="#F08098" stroke="#2d263c" stroke-width="7"/>

  <!-- body -->
  <ellipse cx="175" cy="248" rx="82" ry="78" fill="#F08098" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- belly -->
  <ellipse cx="170" cy="262" rx="48" ry="44" fill="#F8E8C8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- left arm -->
  <path d="M 105 240 Q 72 235 65 258 Q 60 275 80 280 Q 100 283 115 265 Z" fill="#F08098" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- right arm -->
  <path d="M 238 248 Q 272 240 280 262 Q 285 278 265 282 Q 245 285 232 268 Z" fill="#F08098" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- left leg -->
  <path d="M 135 316 Q 120 320 118 338 Q 118 350 140 350 Q 162 350 163 336 Q 162 320 150 315 Z" fill="#F08098" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- right leg -->
  <path d="M 188 318 Q 178 322 178 340 Q 179 352 200 352 Q 220 350 220 337 Q 218 322 205 316 Z" fill="#F08098" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- neck -->
  <ellipse cx="174" cy="192" rx="38" ry="28" fill="#F08098" stroke="#2d263c" stroke-width="7"/>

  <!-- Galarian Shellder hat - main dark purple body -->
  <path d="M 115 155 Q 110 105 130 72 Q 150 42 174 38 Q 198 36 218 62 Q 238 88 238 135 Q 238 162 220 170 Q 174 185 128 168 Z" fill="#5B2D8E" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- hat stripe 1 -->
  <path d="M 120 148 Q 125 118 140 95 Q 155 73 174 68 Q 193 68 208 88 Q 222 108 226 138" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>

  <!-- hat stripe 2 -->
  <path d="M 128 160 Q 132 130 148 105 Q 163 80 174 75" fill="none" stroke="#1a0a2e" stroke-width="5" stroke-linecap="round"/>

  <!-- hat eye left -->
  <ellipse cx="148" cy="138" rx="13" ry="16" fill="#F8E8C8" stroke="#2d263c" stroke-width="5"/>
  <circle cx="150" cy="140" r="6" fill="#2d263c"/>
  <circle cx="152" cy="137" r="2" fill="white"/>

  <!-- hat eye right -->
  <ellipse cx="200" cy="135" rx="13" ry="16" fill="#F8E8C8" stroke="#2d263c" stroke-width="5"/>
  <circle cx="202" cy="137" r="6" fill="#2d263c"/>
  <circle cx="204" cy="134" r="2" fill="white"/>

  <!-- hat teeth / bottom fringe -->
  <path d="M 122 168 Q 130 178 142 173 Q 150 182 162 174 Q 170 183 182 175 Q 192 183 204 175 Q 214 182 224 170" fill="#5B2D8E" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Slowking face -->
  <!-- left eye (sleepy half-closed) -->
  <ellipse cx="156" cy="200" rx="12" ry="10" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="157" cy="202" rx="7" ry="6" fill="#2d263c"/>
  <circle cx="159" cy="200" r="2" fill="white"/>
  <!-- eyelid droopy -->
  <path d="M 144 198 Q 156 194 168 198" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- right eye (sleepy half-closed) -->
  <ellipse cx="193" cy="199" rx="12" ry="10" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="194" cy="201" rx="7" ry="6" fill="#2d263c"/>
  <circle cx="196" cy="199" r="2" fill="white"/>
  <!-- eyelid droopy -->
  <path d="M 181 197 Q 193 193 205 197" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- nose -->
  <ellipse cx="174" cy="213" rx="5" ry="3" fill="#d06878"/>

  <!-- mouth (slightly open dumb expression) -->
  <path d="M 161 222 Q 174 232 188 222" fill="#d06878" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M 163 225 Q 174 232 186 225" fill="#c05060" stroke="none"/>

  <!-- cheek blush left -->
  <ellipse cx="140" cy="216" rx="11" ry="7" fill="#F8A0B0" opacity="0.7"/>

  <!-- cheek blush right -->
  <ellipse cx="209" cy="215" rx="11" ry="7" fill="#F8A0B0" opacity="0.7"/>

  <!-- hat tip / point at top -->
  <path d="M 162 38 Q 174 18 186 38" fill="#5B2D8E" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="174" cy="16" r="9" fill="#9B4FC8" stroke="#2d263c" stroke-width="6"/>
</svg>