<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後方の噴射炎(青白) -->
  <path d="M150 300 Q140 320 150 338 Q160 322 165 305Z" fill="#7fd8ff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M195 302 Q205 322 195 340 Q184 323 180 305Z" fill="#7fd8ff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M172 306 Q168 328 172 344 Q178 328 176 306Z" fill="#e8f8ff" stroke="none"/>

  <!-- 左ウイング(平たい滑空板) -->
  <path d="M115 210 Q40 220 25 250 Q22 265 40 268 Q80 262 130 240Z" fill="#e0301e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 右ウイング -->
  <path d="M245 210 Q320 220 335 250 Q338 265 320 268 Q280 262 230 240Z" fill="#e0301e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- ウイング裏地(黒) -->
  <path d="M40 262 Q75 258 122 238" fill="none" stroke="#1c1c22" stroke-width="6" stroke-linecap="round"/>
  <path d="M320 262 Q285 258 238 238" fill="none" stroke="#1c1c22" stroke-width="6" stroke-linecap="round"/>

  <!-- 平たい胴体(滑空フォーム) -->
  <path d="M180 150 Q255 165 265 220 Q270 260 235 285 Q205 300 180 300 Q155 300 125 285 Q90 260 95 220 Q105 165 180 150Z" fill="#e0301e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹の黒パネル -->
  <path d="M180 205 Q215 212 220 240 Q222 262 200 275 Q188 280 180 280 Q172 280 160 275 Q138 262 140 240 Q145 212 180 205Z" fill="#1c1c22" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 金の太陽コア模様(胸) -->
  <circle cx="180" cy="238" r="20" fill="#f0b400" stroke="#2d263c" stroke-width="5"/>
  <circle cx="180" cy="238" r="9" fill="#fff08a" stroke="#2d263c" stroke-width="3"/>

  <!-- 背中の黄色ライン(左右) -->
  <path d="M140 195 Q120 220 128 250" fill="none" stroke="#f0b400" stroke-width="7" stroke-linecap="round"/>
  <path d="M220 195 Q240 220 232 250" fill="none" stroke="#f0b400" stroke-width="7" stroke-linecap="round"/>

  <!-- 短い後脚(たたまれた状態・左右わずかに見える) -->
  <ellipse cx="140" cy="278" rx="18" ry="12" fill="#1c1c22" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="220" cy="278" rx="18" ry="12" fill="#1c1c22" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭(前方に突き出す) -->
  <path d="M180 150 Q150 100 158 68 Q163 48 180 46 Q197 48 202 68 Q210 100 180 150Z" fill="#e0301e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の黒い顎パーツ(機械的な口) -->
  <path d="M162 100 Q180 92 198 100 Q196 118 180 124 Q164 118 162 100Z" fill="#1c1c22" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 金のセンサー帯(額) -->
  <path d="M164 72 Q180 62 196 72 Q192 82 180 84 Q168 82 164 72Z" fill="#f0b400" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目(左右・金色) -->
  <ellipse cx="167" cy="88" rx="8" ry="9" fill="#fff08a" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="193" cy="88" rx="8" ry="9" fill="#fff08a" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="167" cy="90" rx="3" ry="4" fill="#1a1420"/>
  <ellipse cx="193" cy="90" rx="3" ry="4" fill="#1a1420"/>

  <!-- 頭頂の小さな角 -->
  <path d="M172 50 Q170 36 176 30" stroke="#f0b400" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M188 50 Q190 36 184 30" stroke="#f0b400" stroke-width="6" fill="none" stroke-linecap="round"/>
</svg>
