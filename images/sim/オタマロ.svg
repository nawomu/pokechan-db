<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 体色: 青(#4d78b5)の体、腹は水色っぽい薄い青
  2. シルエット: ずんぐり丸い二足歩行、大きな丸い頭、短い手足
  3. 模様: 頭のオレンジのひれ(三角・ギザギザ)、両ほっぺのオレンジの模様(えら風の波形)
  4. 顔: 大きな丸い黒目+白ハイライト、小さな口
  5. 尾: 背中側にオレンジの平たいひれ状の尾
  -->

  <!-- 後ろ: 影 -->
  <ellipse cx="180" cy="304" rx="86" ry="16" fill="#3a5a8c" opacity="0.3"/>

  <!-- 尾びれ(体の後ろに少し見える・オレンジ) -->
  <path d="M244 260 Q290 246 296 210 Q300 250 270 278 Q258 286 244 280 Z"
        fill="#e8843c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足(2本・青いずんぐり) -->
  <ellipse cx="140" cy="292" rx="34" ry="24" fill="#4d78b5" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="220" cy="292" rx="34" ry="24" fill="#4d78b5" stroke="#2d263c" stroke-width="7"/>

  <!-- 体(丸くずんぐり) -->
  <path d="M110 260 Q98 190 140 170 Q160 160 180 160 Q200 160 220 170 Q262 190 250 260
           Q250 290 180 292 Q110 290 110 260 Z"
        fill="#4d78b5" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の薄い模様 -->
  <ellipse cx="180" cy="238" rx="42" ry="46" fill="#a9c7e8" opacity="0.85"/>

  <!-- 腕(短く丸い) -->
  <ellipse cx="112" cy="228" rx="24" ry="30" fill="#4d78b5" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="248" cy="228" rx="24" ry="30" fill="#4d78b5" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭(大きな丸) -->
  <circle cx="180" cy="140" r="78" fill="#4d78b5" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭の上のオレンジびれ(三角でギザギザ) -->
  <path d="M140 78 Q150 40 180 30 Q170 62 176 84
           Q188 58 210 44 Q216 68 200 90
           Q222 76 236 84 Q220 100 196 104
           Q160 108 140 96 Z"
        fill="#e8843c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 両ほっぺのオレンジ模様(えら風・波形) -->
  <path d="M108 138 Q92 132 88 148 Q100 148 104 158 Q90 160 90 176 Q106 176 112 164 Q116 176 128 176
           Q120 160 122 146 Q116 138 108 138 Z"
        fill="#e8843c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M252 138 Q268 132 272 148 Q260 148 256 158 Q270 160 270 176 Q254 176 248 164 Q244 176 232 176
           Q240 160 238 146 Q244 138 252 138 Z"
        fill="#e8843c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(大きな丸い黒目) -->
  <circle cx="152" cy="140" r="17" fill="#1c1c22" stroke="#2d263c" stroke-width="4"/>
  <circle cx="208" cy="140" r="17" fill="#1c1c22" stroke="#2d263c" stroke-width="4"/>
  <circle cx="147" cy="134" r="5" fill="#ffffff"/>
  <circle cx="203" cy="134" r="5" fill="#ffffff"/>

  <!-- 口(小さな微笑み) -->
  <path d="M168 172 Q180 180 192 172" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
