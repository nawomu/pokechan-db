<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 背景の特徴メモ(コード外): 1.丸くて分厚い装甲ボディ(鋼青灰色) 2.背中に三角のトゲトゲが並ぶ 3.平たい顔に白い2本のキバ 4.太くて短い4本足 5.先端が丸い棍棒状のしっぽ -->

  <!-- 後ろ: しっぽ(棍棒状) -->
  <path d="M262 205 C300 195 332 210 330 242 C329 260 308 270 292 258 C276 246 266 226 262 205 Z"
        fill="#93a4bd" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <circle cx="316" cy="246" r="20" fill="#5e6a82" stroke="#2d263c" stroke-width="7"/>
  <polygon points="300,232 314,220 320,236" fill="#5e6a82" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="318,262 330,250 332,268" fill="#5e6a82" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 後ろ足(奥・少し覗く) -->
  <ellipse cx="100" cy="300" rx="34" ry="40" fill="#5e6a82" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="260" cy="300" rx="34" ry="40" fill="#5e6a82" stroke="#2d263c" stroke-width="7"/>

  <!-- 体 -->
  <ellipse cx="180" cy="190" rx="115" ry="100" fill="#93a4bd" stroke="#2d263c" stroke-width="8"/>
  <ellipse cx="180" cy="225" rx="62" ry="58" fill="#f2e8cd" stroke="#2d263c" stroke-width="6"/>

  <!-- 前足(手前) -->
  <ellipse cx="128" cy="305" rx="38" ry="44" fill="#93a4bd" stroke="#2d263c" stroke-width="8"/>
  <ellipse cx="232" cy="305" rx="38" ry="44" fill="#93a4bd" stroke="#2d263c" stroke-width="8"/>
  <ellipse cx="128" cy="335" rx="30" ry="14" fill="#5e6a82" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="232" cy="335" rx="30" ry="14" fill="#5e6a82" stroke="#2d263c" stroke-width="6"/>

  <!-- 背中のトゲトゲ(装甲) -->
  <polygon points="90,100 120,100 105,60" fill="#5e6a82" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="128,95 158,95 143,55" fill="#5e6a82" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="165,90 195,90 180,48" fill="#5e6a82" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="203,95 233,95 218,55" fill="#5e6a82" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="240,100 270,100 255,60" fill="#5e6a82" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 耳 -->
  <circle cx="95" cy="115" r="22" fill="#93a4bd" stroke="#2d263c" stroke-width="7"/>
  <circle cx="265" cy="115" r="22" fill="#93a4bd" stroke="#2d263c" stroke-width="7"/>

  <!-- 顔 -->
  <ellipse cx="180" cy="235" rx="78" ry="62" fill="#7f90a8" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="180" cy="275" rx="46" ry="30" fill="#8a97ad" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="162" cy="275" rx="6" ry="9" fill="#2d263c"/>
  <ellipse cx="198" cy="275" rx="6" ry="9" fill="#2d263c"/>

  <!-- キバ -->
  <path d="M135 258 C110 250 98 228 100 210 C101 202 110 205 118 218 C126 232 133 246 140 262 Z"
        fill="#faf3df" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M225 258 C250 250 262 228 260 210 C259 202 250 205 242 218 C234 232 227 246 220 262 Z"
        fill="#faf3df" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目 -->
  <ellipse cx="145" cy="195" rx="11" ry="14" fill="#2d263c"/>
  <ellipse cx="215" cy="195" rx="11" ry="14" fill="#2d263c"/>
  <circle cx="141" cy="189" r="3.5" fill="#ffffff"/>
  <circle cx="211" cy="189" r="3.5" fill="#ffffff"/>

  <!-- 口 -->
  <path d="M160 300 Q180 308 200 300" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
