  <path d="M35,195 C35,140 95,105 190,105 C270,105 320,145 320,195 C320,245 270,282 190,282 C95,282 35,248 35,195 Z" fill="#5b93d1" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- おなか(クリーム色) -->
