  <!-- 背中の模様(丸模様) -->
  <circle cx="140" cy="130" r="10" fill="#38618f"/>
  <circle cx="190" cy="122" r="12" fill="#38618f"/>
  <circle cx="240" cy="132" r="9" fill="#38618f"/>
  <circle cx="165" cy="152" r="7" fill="#38618f"/>
  <circle cx="215" cy="150" r="8" fill="#38618f"/>
  <!-- 胸びれ(上) -->
  <path d="M95,180 C60,170 40,180 45,205 C65,210 95,205 105,190 Z" fill="#4d84c4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 胸びれ(下) -->
  <path d="M100,235 C75,255 60,270 78,285 C100,278 112,258 112,238 Z" fill="#4d84c4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 顔まわりの薄い縁取り -->
  <path d="M40,190 C40,165 55,150 70,150 C60,175 60,205 72,225 C55,220 40,210 40,190 Z" fill="#f3ecc4" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- 目 -->
  <circle cx="78" cy="168" r="9" fill="#2d263c"/>
  <circle cx="81" cy="165" r="3" fill="#ffffff"/>
  <!-- ほっぺ -->
  <circle cx="95" cy="195" r="10" fill="#f4a6b6" opacity="0.7"/>
  <!-- 大きな丸い口 -->
  <circle cx="60" cy="205" r="22" fill="#f3ecc4" stroke="#2d263c" stroke-width="6"/>
  <path d="M45,205 C50,215 70,215 75,205" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
