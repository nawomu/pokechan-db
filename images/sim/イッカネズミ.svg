<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- しっぽ (後ろ) -->
  <path d="M230 270 Q310 230 320 170 Q328 120 290 110 Q260 102 255 130 Q252 150 270 155 Q285 160 280 175 Q272 195 240 200" fill="#e8d8b0" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- しっぽ先ふさふさ -->
  <ellipse cx="292" cy="107" rx="18" ry="14" fill="white" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="304" cy="116" rx="12" ry="10" fill="white" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="283" cy="98" rx="10" ry="9" fill="white" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 体 (メイン) -->
  <ellipse cx="175" cy="230" rx="95" ry="80" fill="#f0e6c0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の白い部分 -->
  <ellipse cx="170" cy="245" rx="58" ry="52" fill="#faf5e4" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 首元ふわふわマフラー -->
  <path d="M118 175 Q140 155 175 152 Q210 150 232 168 Q248 180 242 192 Q225 185 200 180 Q175 176 148 180 Q130 183 118 175Z" fill="white" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M122 178 Q145 188 175 185 Q205 183 235 178" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 左耳 -->
  <ellipse cx="130" cy="115" rx="32" ry="40" fill="#f0e6c0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左耳内側ピンク -->
  <ellipse cx="130" cy="118" rx="20" ry="28" fill="#f4a0b0" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 右耳 (ちょっと非対称にする) -->
  <ellipse cx="218" cy="110" rx="28" ry="42" fill="#f0e6c0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(8, 218, 110)"/>
  <!-- 右耳内側ピンク -->
  <ellipse cx="218" cy="113" rx="17" ry="29" fill="#f4a0b0" stroke="#2d263c" stroke-width="3" stroke-linejoin="round" transform="rotate(8, 218, 113)"/>

  <!-- 頭 -->
  <ellipse cx="175" cy="155" rx="72" ry="65" fill="#f0e6c0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭上の茶色ライン(模様) -->
  <path d="M145 100 Q175 88 210 98 Q205 120 175 125 Q148 122 145 100Z" fill="#c8a870" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 目 (左) — ちょっと大きめで丸い -->
  <circle cx="153" cy="148" r="14" fill="white" stroke="#2d263c" stroke-width="5"/>
  <circle cx="155" cy="149" r="9" fill="#1a1a2e" stroke="#2d263c" stroke-width="2"/>
  <circle cx="158" cy="145" r="3" fill="white"/>

  <!-- 目 (右) — 少し上にズレて非対称 -->
  <circle cx="198" cy="145" r="13" fill="white" stroke="#2d263c" stroke-width="5"/>
  <circle cx="200" cy="146" r="8" fill="#1a1a2e" stroke="#2d263c" stroke-width="2"/>
  <circle cx="203" cy="142" r="3" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="177" cy="163" rx="5" ry="4" fill="#c06080" stroke="#2d263c" stroke-width="3"/>

  <!-- 口 (ゆるい笑顔) -->
  <path d="M163 172 Q177 183 192 172" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 左ほっぺ -->
  <ellipse cx="140" cy="168" rx="16" ry="11" fill="#f08098" opacity="0.7"/>

  <!-- 右ほっぺ -->
  <ellipse cx="213" cy="165" rx="15" ry="10" fill="#f08098" opacity="0.7"/>

  <!-- 前足 左 -->
  <ellipse cx="120" cy="295" rx="28" ry="22" fill="#f0e6c0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 前足左 指 -->
  <path d="M98 295 Q95 310 100 315" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M112 305 Q112 318 116 320" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M126 307 Q129 320 132 321" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 前足 右 -->
  <ellipse cx="228" cy="298" rx="26" ry="21" fill="#f0e6c0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 前足右 指 -->
  <path d="M210 300 Q207 313 211 317" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M222 308 Q222 321 226 322" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M236 306 Q240 318 243 319" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>