<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.頭上に伸びる緑の三角ホーン 2.顔の両脇を包む緑の髪(ボブ状) 3.白い細身の体+スカート状の裾広がり 4.細い緑の脚と白い腕(先端は緑) 5.胸元の赤い小さな三角ホーン+赤い目 -->

  <!-- 背後: 頭のてっぺんの三角ホーン -->
  <polygon points="180,20 152,80 208,80" fill="#7FCB74" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体: 白いドレス状の胴体+裾広がり -->
  <path d="M150,140 C138,180 124,224 106,270 C96,294 120,313 180,315 C240,313 264,294 254,270 C236,224 222,180 210,140 Z" fill="#FFFFFF" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 脚(緑・細い) -->
  <rect x="155" y="296" width="14" height="34" rx="7" fill="#7FCB74" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <rect x="191" y="296" width="14" height="34" rx="7" fill="#7FCB74" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 足先 -->
  <ellipse cx="162" cy="332" rx="14" ry="7" fill="#7FCB74" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="198" cy="332" rx="14" ry="7" fill="#7FCB74" stroke="#2d263c" stroke-width="6"/>

  <!-- 腕(白・しなやかに広がる) -->
  <path d="M150,148 Q110,160 100,196 Q120,198 132,182 Q148,168 150,148 Z" fill="#FFFFFF" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M210,148 Q250,160 260,196 Q240,198 228,182 Q212,168 210,148 Z" fill="#FFFFFF" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 手先(緑) -->
  <ellipse cx="98" cy="200" rx="10" ry="9" fill="#7FCB74" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="262" cy="200" rx="10" ry="9" fill="#7FCB74" stroke="#2d263c" stroke-width="6"/>

  <!-- 胸元の赤い小ホーン -->
  <polygon points="180,152 172,170 188,170" fill="#E2503F" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔: 白い丸顔 -->
  <circle cx="180" cy="95" r="52" fill="#FFFFFF" stroke="#2d263c" stroke-width="7"/>

  <!-- 顔まわりの緑の髪(ボブ状) -->
  <path d="M140,58 Q108,92 116,152 Q136,120 154,88 Q150,72 140,58 Z" fill="#7FCB74" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M220,58 Q252,92 244,152 Q224,120 206,88 Q210,72 220,58 Z" fill="#7FCB74" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(赤みの濃いダーク) -->
  <ellipse cx="163" cy="94" rx="7" ry="11" fill="#2d263c"/>
  <ellipse cx="197" cy="94" rx="7" ry="11" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M170,116 Q180,122 190,116" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺの赤み -->
  <ellipse cx="147" cy="108" rx="10" ry="6" fill="#FF9FB2" opacity="0.55"/>
  <ellipse cx="213" cy="108" rx="10" ry="6" fill="#FF9FB2" opacity="0.55"/>
</svg>
