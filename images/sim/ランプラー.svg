<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 頭頂の炎(後ろ層) -->
  <ellipse cx="178" cy="70" rx="26" ry="38" fill="#9b59d0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="176" cy="60" rx="14" ry="24" fill="#c8a5f0"/>
  <ellipse cx="168" cy="52" rx="6" ry="12" fill="#e8e0ff"/>
  <!-- 炎の横のゆらぎ(小さな炎の飛び出し) -->
  <ellipse cx="200" cy="86" rx="11" ry="18" fill="#9b59d0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="202" cy="80" rx="5" ry="10" fill="#c8a5f0"/>

  <!-- ランタンの取っ手(アーチ状ハンドル) -->
  <path d="M142 118 Q120 72 150 48 Q180 30 210 48 Q240 72 222 118" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 首の襟(炎の根元・胴体との接合部) -->
  <ellipse cx="180" cy="113" rx="20" ry="11" fill="#2a2440" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胴体(壺型・下は波打って消えるゴーストの裾) -->
  <path d="M138 126 C110 142 100 180 108 214 C112 238 124 258 140 274 L150 300 Q165 320 180 300 Q195 320 210 300 L220 274 C236 258 248 238 252 214 C260 180 250 142 222 126 C205 114 155 114 138 126 Z" fill="#4a4460" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 胴体のハイライト -->
  <ellipse cx="150" cy="172" rx="16" ry="24" fill="#6e6690" opacity="0.55"/>

  <!-- 胴体側面のリベット(継ぎ目模様) -->
  <circle cx="124" cy="192" r="6" fill="#241f36" stroke="#2d263c" stroke-width="2.5"/>
  <circle cx="236" cy="192" r="6" fill="#241f36" stroke="#2d263c" stroke-width="2.5"/>

  <!-- 左目 -->
  <ellipse cx="160" cy="200" rx="15" ry="13" fill="#fefaf0" stroke="#2d263c" stroke-width="4.5"/>
  <ellipse cx="163" cy="202" rx="7" ry="7" fill="#1a1a2e"/>
  <ellipse cx="157" cy="197" rx="2.5" ry="2.5" fill="white"/>

  <!-- 右目 -->
  <ellipse cx="202" cy="199" rx="14" ry="13" fill="#fefaf0" stroke="#2d263c" stroke-width="4.5"/>
  <ellipse cx="205" cy="201" rx="6.5" ry="7" fill="#1a1a2e"/>
  <ellipse cx="199" cy="196" rx="2.5" ry="2.5" fill="white"/>

  <!-- 眉(つり上がり) -->
  <path d="M144 184 Q156 176 170 182" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M192 181 Q206 175 218 183" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 口(ニヤリ) -->
  <path d="M162 222 Q172 230 180 231 Q188 230 198 222" fill="none" stroke="#2d263c" stroke-width="4.5" stroke-linecap="round"/>
  <!-- 牙 -->
  <line x1="171" y1="223" x2="169" y2="229" stroke="#2d263c" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="189" y1="223" x2="191" y2="229" stroke="#2d263c" stroke-width="3.5" stroke-linecap="round"/>

</svg>
