  <polygon points="140,305 168,328 145,336" fill="#ffdd44" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体(長い胴体・輪っかのようにうねる) -->
  <ellipse cx="105" cy="95" rx="42" ry="34" transform="rotate(-30 105 95)" fill="#3fa34d" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="155" cy="72" rx="40" ry="32" transform="rotate(-10 155 72)" fill="#3fa34d" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="210" cy="80" rx="38" ry="32" transform="rotate(15 210 80)" fill="#3fa34d" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="255" cy="110" rx="36" ry="32" transform="rotate(45 255 110)" fill="#3fa34d" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="282" cy="162" rx="34" ry="32" transform="rotate(80 282 162)" fill="#3fa34d" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="272" cy="215" rx="32" ry="30" transform="rotate(130 272 215)" fill="#3fa34d" stroke="#2d263c" stroke-width="7"/>
