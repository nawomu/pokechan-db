  <ellipse cx="162" cy="85" rx="20" ry="11" transform="rotate(-5 162 85)" fill="#ffdd44" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="213" cy="95" rx="19" ry="11" transform="rotate(15 213 95)" fill="#ffdd44" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="253" cy="128" rx="18" ry="11" transform="rotate(45 253 128)" fill="#ffdd44" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="278" cy="175" rx="17" ry="11" transform="rotate(80 278 175)" fill="#ffdd44" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="258" cy="222" rx="16" ry="10" transform="rotate(130 258 222)" fill="#ffdd44" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="208" cy="255" rx="15" ry="9" transform="rotate(160 208 255)" fill="#ffdd44" stroke="#2d263c" stroke-width="3"/>

  <!-- 背中の小さなトゲ -->
  <polygon points="175,68 187,48 198,70" fill="#2d263c"/>
  <polygon points="255,120 268,102 278,124" fill="#2d263c"/>

  <!-- 体の赤い模様(黄色ふち) -->
  <polygon points="235,95 255,85 268,105 248,115" fill="#e0432f" stroke="#ffdd44" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="268,175 288,167 296,188 276,196" fill="#e0432f" stroke="#ffdd44" stroke-width="3" stroke-linejoin="round"/>

  <!-- 小さい腕(かぎ爪) -->
  <path d="M150,145 C168,150 175,175 160,195 C150,205 138,200 140,182 C142,165 145,152 150,145 Z" fill="#3fa34d" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <line x1="152" y1="196" x2="145" y2="212" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 顔 -->
  <ellipse cx="100" cy="88" rx="48" ry="40" fill="#3fa34d" stroke="#2d263c" stroke-width="7"/>

  <!-- ツノ -->
  <polygon points="78,63 66,25 92,66" fill="#2d263c"/>
  <polygon points="122,60 136,22 108,63" fill="#2d263c"/>

  <!-- 目のまわりの黄色いリング -->
  <circle cx="78" cy="90" r="14" fill="#ffdd44" stroke="#2d263c" stroke-width="3"/>
  <circle cx="112" cy="82" r="13" fill="#ffdd44" stroke="#2d263c" stroke-width="3"/>

  <!-- 目 -->
  <circle cx="78" cy="90" r="7" fill="#1a1a1a"/>
  <circle cx="112" cy="82" r="6" fill="#1a1a1a"/>

  <!-- 鼻 -->
  <circle cx="100" cy="112" r="3" fill="#1a1a1a"/>

  <!-- 口 -->
  <path d="M75,115 Q100,130 128,112" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- あご(黄色) -->
  <ellipse cx="100" cy="120" rx="20" ry="9" fill="#ffdd44" stroke="#2d263c" stroke-width="4"/>
</svg>
