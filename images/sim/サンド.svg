<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.砂色(黄褐色)の丸い体 2.背中に鎧のような環状の筋(節模様) 3.お腹はクリーム色 4.小さい丸耳と黒い丸目・小さい鼻 5.ずんぐりした手足に短い爪 -->

  <!-- しっぽ(後ろ) -->
  <ellipse cx="272" cy="288" rx="24" ry="15" transform="rotate(25 272 288)" fill="#E8C878" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="180" cy="228" rx="98" ry="92" fill="#E8C878" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹 -->
  <ellipse cx="180" cy="262" rx="54" ry="46" fill="#F5E8CC"/>

  <!-- 背中の節模様(鎧っぽいリング) -->
  <path d="M 92 168 Q 180 148 268 168" fill="none" stroke="#B5842F" stroke-width="6" stroke-linecap="round"/>
  <path d="M 86 198 Q 180 178 274 198" fill="none" stroke="#B5842F" stroke-width="6" stroke-linecap="round"/>
  <path d="M 84 228 Q 180 208 276 228" fill="none" stroke="#B5842F" stroke-width="6" stroke-linecap="round"/>
  <path d="M 90 258 Q 180 240 270 258" fill="none" stroke="#B5842F" stroke-width="6" stroke-linecap="round"/>

  <!-- うで -->
  <ellipse cx="84" cy="222" rx="27" ry="42" transform="rotate(-12 84 222)" fill="#E8C878" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="276" cy="222" rx="27" ry="42" transform="rotate(12 276 222)" fill="#E8C878" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- あし -->
  <ellipse cx="136" cy="306" rx="33" ry="36" fill="#E8C878" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="224" cy="306" rx="33" ry="36" fill="#E8C878" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 手の爪 -->
  <path d="M 62 250 L 56 264 M 72 256 L 68 270 M 84 256 L 84 270" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M 298 250 L 304 264 M 288 256 L 292 270 M 276 256 L 276 270" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 足の爪 -->
  <path d="M 112 335 L 106 350 M 128 340 L 126 354 M 146 340 L 148 354" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M 248 335 L 254 350 M 232 340 L 234 354 M 214 340 L 212 354" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 顔(頭) -->
  <circle cx="180" cy="112" r="70" fill="#E8C878" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳 -->
  <ellipse cx="123" cy="55" rx="20" ry="27" transform="rotate(-22 123 55)" fill="#E8C878" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="237" cy="55" rx="20" ry="27" transform="rotate(22 237 55)" fill="#E8C878" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="124" cy="58" rx="10" ry="15" transform="rotate(-22 124 58)" fill="#CE9760"/>
  <ellipse cx="236" cy="58" rx="10" ry="15" transform="rotate(22 236 58)" fill="#CE9760"/>

  <!-- ほお模様 -->
  <path d="M 116 122 Q 126 132 116 142" fill="none" stroke="#B5842F" stroke-width="4" stroke-linecap="round"/>
  <path d="M 244 122 Q 234 132 244 142" fill="none" stroke="#B5842F" stroke-width="4" stroke-linecap="round"/>

  <!-- 目 -->
  <circle cx="150" cy="106" r="9" fill="#2d263c"/>
  <circle cx="210" cy="106" r="9" fill="#2d263c"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="136" rx="11" ry="7" fill="#5C3A22"/>

  <!-- 口 -->
  <path d="M 164 150 Q 180 160 196 150" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
