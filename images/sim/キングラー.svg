<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ===== 特徴メモ =====
  1. 全身が赤オレンジの硬い甲羅(こうら)でおおわれた カニ型
  2. 右に巨大なはさみ(片方だけ超大きい)、左に小さめのはさみ
  3. 甲羅は横に張り出した六角形っぽいシルエット、ふちがギザギザ
  4. 頭の上に棒状の目(黒いまん丸い目)が2本ニョキッと出ている
  5. 甲羅の下にとがった小さい脚が左右にたくさん生えている
  ================== -->

  <!-- 後ろ:左小さいはさみ(腕) -->
  <path d="M120 210 Q80 220 62 245 Q50 262 60 278" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <path d="M40 258 Q30 240 48 228 Q66 218 78 232 Q86 244 74 258 Q60 272 46 268 Q36 264 40 258Z" fill="#D8362A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M40 258 Q34 274 50 284 Q64 290 70 276" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 後ろ足(奥側の脚シルエット) -->
  <path d="M110 285 Q80 300 55 320" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M245 285 Q272 302 292 322" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 甲羅(体)本体 -->
  <path d="M100 150 Q66 130 76 178 Q58 220 92 258 Q130 296 180 296 Q230 296 268 258 Q302 220 284 178 Q294 130 260 150 Q222 116 180 116 Q138 116 100 150Z"
        fill="#E2402E" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 甲羅の濃い縁取り模様 -->
  <path d="M92 168 Q180 200 268 168" fill="none" stroke="#B82818" stroke-width="7" stroke-linecap="round"/>
  <path d="M84 205 Q180 240 276 205" fill="none" stroke="#B82818" stroke-width="7" stroke-linecap="round"/>

  <!-- おなか側クリーム模様 -->
  <ellipse cx="180" cy="240" rx="52" ry="34" fill="#F5E1A4" stroke="none"/>
  <path d="M138 232 Q180 254 222 232" fill="none" stroke="#D8B25A" stroke-width="4" stroke-linecap="round"/>

  <!-- 甲羅の左右トゲ -->
  <path d="M76 178 Q56 172 62 190 Q70 200 82 192Z" fill="#B82818" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M284 178 Q304 172 298 190 Q290 200 278 192Z" fill="#B82818" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 前脚(左3本) -->
  <path d="M100 250 Q72 268 50 296" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M108 272 Q86 296 70 322" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M126 288 Q112 314 104 338" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 前脚(右2本・大ハサミ側は本数少なめ) -->
  <path d="M234 288 Q248 314 256 338" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M252 272 Q274 296 290 322" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 巨大な右はさみ:腕 -->
  <path d="M255 195 Q292 172 305 132 Q314 100 300 70" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <path d="M235 205 Q280 190 302 150 Q316 122 306 90"
        fill="#E2402E" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 巨大ハサミ 下側パーツ -->
  <path d="M280 95 Q300 78 328 84 Q346 92 340 112 Q332 128 310 122 Q288 116 280 95Z"
        fill="#E2402E" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 巨大ハサミ 上側パーツ(開いた形) -->
  <path d="M278 78 Q296 52 326 52 Q348 54 344 76 Q338 92 314 90 Q292 88 278 78Z"
        fill="#D8362A" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ハサミの関節ハイライト -->
  <ellipse cx="286" cy="88" rx="9" ry="10" fill="#B82818" stroke="#2d263c" stroke-width="3"/>

  <!-- 頭の目(棒目)左 -->
  <path d="M158 120 Q152 96 158 76" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="158" cy="70" rx="15" ry="16" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="160" cy="70" rx="7" ry="8" fill="#1a0a0a"/>
  <ellipse cx="163" cy="65" rx="3" ry="3" fill="#FFFFFF"/>

  <!-- 頭の目(棒目)右 -->
  <path d="M202 120 Q208 96 202 76" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="202" cy="70" rx="15" ry="16" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="204" cy="70" rx="7" ry="8" fill="#1a0a0a"/>
  <ellipse cx="207" cy="65" rx="3" ry="3" fill="#FFFFFF"/>

  <!-- 口元(小さいマウスパーツ) -->
  <path d="M164 172 Q180 184 196 172" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="180" cy="176" rx="10" ry="6" fill="#B82818" stroke="#2d263c" stroke-width="3"/>
</svg>
