<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 翼(左・後ろ) -->
  <ellipse cx="85" cy="190" rx="62" ry="30" fill="#2a2a3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-20 85 190)"/>
  <!-- 翼(右・後ろ) -->
  <ellipse cx="278" cy="192" rx="60" ry="28" fill="#2a2a3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(18 278 192)"/>
  <!-- 翼先端 白 左 -->
  <ellipse cx="62" cy="204" rx="28" ry="12" fill="#f0f0f0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(-22 62 204)"/>
