  <circle cx="148" cy="108" r="10" fill="white" stroke="#2d263c" stroke-width="3"/>
  <circle cx="150" cy="110" r="6" fill="#1a1a2e" stroke="none"/>
  <circle cx="153" cy="107" r="2" fill="white" stroke="none"/>

  <!-- 目(右) - 黄色アイリング -->
  <circle cx="212" cy="107" r="16" fill="#f0d800" stroke="#2d263c" stroke-width="5"/>
  <circle cx="212" cy="107" r="10" fill="white" stroke="#2d263c" stroke-width="3"/>
  <circle cx="214" cy="109" r="6" fill="#1a1a2e" stroke="none"/>
  <circle cx="217" cy="106" r="2" fill="white" stroke="none"/>

  <!-- 頭のてっぺんの羽根 -->
  <path d="M175,60 Q170,42 182,35 Q190,42 185,60 Z" fill="#2a2a3a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M189,65 Q188,46 198,38 Q205,47 199,65 Z" fill="#2a2a3a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M161,67 Q157,50 168,44 Q174,53 169,67 Z" fill="#2a2a3a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 足(左) -->
  <path d="M152,290 Q148,308 145,322" fill="none" stroke="#f09020" stroke-width="9" stroke-linecap="round"/>
  <!-- 足の指(左) -->
  <path d="M145,322 Q130,330 120,326" fill="none" stroke="#f09020" stroke-width="7" stroke-linecap="round"/>
  <path d="M145,322 Q140,335 133,334" fill="none" stroke="#f09020" stroke-width="7" stroke-linecap="round"/>
  <path d="M145,322 Q150,336 158,334" fill="none" stroke="#f09020" stroke-width="7" stroke-linecap="round"/>
  <path d="M145,322 Q158,329 168,326" fill="none" stroke="#f09020" stroke-width="7" stroke-linecap="round"/>

  <!-- 足(右) -->
  <path d="M210,288 Q214,306 218,320" fill="none" stroke="#f09020" stroke-width="9" stroke-linecap="round"/>
  <!-- 足の指(右) -->
  <path d="M218,320 Q230,330 242,326" fill="none" stroke="#f09020" stroke-width="7" stroke-linecap="round"/>
  <path d="M218,320 Q222,335 230,333" fill="none" stroke="#f09020" stroke-width="7" stroke-linecap="round"/>
  <path d="M218,320 Q212,336 204,334" fill="none" stroke="#f09020" stroke-width="7" stroke-linecap="round"/>
  <path d="M218,320 Q204,330 192,327" fill="none" stroke="#f09020" stroke-width="7" stroke-linecap="round"/>

  <!-- ほっぺ(赤みピンク) -->
  <ellipse cx="135" cy="130" rx="13" ry="9" fill="#ffaaaa" stroke="none" opacity="0.7"/>
  <ellipse cx="225" cy="129" rx="13" ry="9" fill="#ffaaaa" stroke="none" opacity="0.7"/>
