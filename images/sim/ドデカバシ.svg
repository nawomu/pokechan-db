  <!-- 頭(白) -->
  <ellipse cx="180" cy="120" rx="68" ry="62" fill="#f5f5f5" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 超巨大くちばし(下半分・オレンジ) - 後ろ -->
