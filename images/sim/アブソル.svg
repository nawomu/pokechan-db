<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- しっぽ(後ろ) -->
  <ellipse cx="280" cy="230" rx="48" ry="28" fill="#e8e8ee" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-30 280 230)"/>
  <ellipse cx="300" cy="210" rx="30" ry="18" fill="#d0ccd8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-45 300 210)"/>

  <!-- 体 -->
  <ellipse cx="190" cy="255" rx="80" ry="62" fill="#f0f0f0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 後ろ脚 -->
  <rect x="230" y="295" width="28" height="48" rx="10" fill="#f0f0f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="244" cy="346" rx="20" ry="10" fill="#f0f0f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前脚 -->
  <rect x="130" y="290" width="26" height="52" rx="10" fill="#3a3044" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="143" cy="344" rx="19" ry="10" fill="#3a3044" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- もう一本前脚(奥) -->
  <rect x="160" y="295" width="24" height="46" rx="10" fill="#f0f0f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="172" cy="342" rx="17" ry="9" fill="#f0f0f0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 胸のふさふさたてがみ -->
  <ellipse cx="175" cy="228" rx="52" ry="44" fill="#f8f8f8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="162" cy="220" rx="28" ry="36" fill="#f8f8f8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="185" cy="215" rx="20" ry="32" fill="#ffffff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 首 -->
  <rect x="160" y="185" width="38" height="38" rx="14" fill="#f0f0f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="178" cy="158" rx="60" ry="52" fill="#f0f0f0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 顔の黒い半分(右側=向かって右が黒) -->
  <path d="M178 110 Q230 112 235 158 Q234 200 178 208 Q178 110 178 110 Z" fill="#3a3044" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 耳(白・左) -->
  <path d="M138 128 Q128 92 148 80 Q158 90 155 128 Z" fill="#f0f0f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 耳(黒・右) -->
  <path d="M215 128 Q218 90 235 80 Q248 92 238 130 Z" fill="#3a3044" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 大きな鎌状の角(左から右上へ湾曲) -->
  <path d="M152 138 Q110 80 148 42 Q178 20 185 60 Q160 78 162 108 Z" fill="#3a3044" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 目(白目・左) -->
  <ellipse cx="157" cy="162" rx="14" ry="12" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 目(白目・右) -->
  <ellipse cx="207" cy="160" rx="13" ry="11" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 瞳(赤・左) -->
  <ellipse cx="160" cy="163" rx="7" ry="9" fill="#e63030" stroke="#2d263c" stroke-width="3"/>
  <!-- 瞳(赤・右) -->
  <ellipse cx="210" cy="161" rx="6" ry="8" fill="#e63030" stroke="#2d263c" stroke-width="3"/>
  <!-- 瞳光 -->
  <ellipse cx="157" cy="160" rx="2.5" ry="3" fill="white"/>
  <ellipse cx="207" cy="158" rx="2" ry="2.5" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="182" cy="178" rx="5" ry="3" fill="#3a3044"/>

  <!-- 口(ちょっとニヤッと) -->
  <path d="M170 186 Q182 195 195 186" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ赤み(左) -->
  <ellipse cx="143" cy="175" rx="11" ry="7" fill="#e8a0a0" opacity="0.6"/>
</svg>