  <ellipse cx="250" cy="68" rx="17" ry="19" fill="#d0eef8" stroke="none"/>
  <!-- 右耳の黒丸模様 -->
  <ellipse cx="252" cy="74" rx="8" ry="9" fill="#2d263c"/>

  <!-- 左目 -->
  <ellipse cx="152" cy="138" rx="16" ry="18" fill="#1a1a2e" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="147" cy="133" rx="5" ry="5" fill="white"/>

  <!-- 右目 (少し斜め気味でゆるく) -->
  <ellipse cx="210" cy="135" rx="15" ry="17" fill="#1a1a2e" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="205" cy="130" rx="5" ry="5" fill="white"/>

  <!-- 鼻 -->
