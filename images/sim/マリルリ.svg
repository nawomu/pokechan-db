  <ellipse cx="110" cy="72" rx="16" ry="18" fill="#d0eef8" stroke="none"/>
  <!-- 左耳の黒丸模様 -->
  <ellipse cx="110" cy="78" rx="8" ry="9" fill="#2d263c"/>

  <!-- 右耳 -->
