  <ellipse cx="308" cy="245" rx="22" ry="20" fill="#5bc8e8" stroke="#2d263c" stroke-width="7"/>
  <!-- しっぽ球の縞 -->
  <path d="M 290 238 Q 308 230 326 238" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M 288 248 Q 308 240 328 248" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 左うで(後ろ) -->
  <ellipse cx="95" cy="238" rx="20" ry="28" fill="#5bc8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 右うで -->
  <ellipse cx="265" cy="238" rx="20" ry="28" fill="#5bc8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="180" cy="220" rx="100" ry="95" fill="#5bc8e8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 白いおなか -->
