  <!-- 左ほっぺ -->
  <ellipse cx="134" cy="162" rx="20" ry="16" fill="white" stroke="#2d263c" stroke-width="4" opacity="0.9"/>

  <!-- 右ほっぺ -->
  <ellipse cx="228" cy="158" rx="22" ry="17" fill="white" stroke="#2d263c" stroke-width="4" opacity="0.9"/>
