  <!-- 左足 -->
  <ellipse cx="140" cy="305" rx="28" ry="18" fill="#5bc8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右足 -->
  <ellipse cx="218" cy="308" rx="28" ry="17" fill="#5bc8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="138" rx="88" ry="82" fill="#5bc8e8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 左耳 -->
