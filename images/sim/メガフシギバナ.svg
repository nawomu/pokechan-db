<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 背後の葉(大) -->
  <ellipse cx="180" cy="155" rx="110" ry="55" fill="#3a8c2f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="100" cy="170" rx="55" ry="28" fill="#3a8c2f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-30 100 170)"/>
  <ellipse cx="265" cy="165" rx="52" ry="25" fill="#3a8c2f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(25 265 165)"/>

  <!-- 大きな花びら(後ろ列) -->
  <ellipse cx="148" cy="108" rx="30" ry="42" fill="#d9558a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-30 148 108)"/>
  <ellipse cx="215" cy="106" rx="30" ry="42" fill="#c94e7c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(28 215 106)"/>
  <ellipse cx="180" cy="90" rx="28" ry="44" fill="#e05f90" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 大きな花びら(前列) -->
  <ellipse cx="135" cy="128" rx="28" ry="40" fill="#e8709e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-50 135 128)"/>
  <ellipse cx="228" cy="124" rx="28" ry="40" fill="#de6895" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(48 228 124)"/>
  <ellipse cx="180" cy="118" rx="26" ry="38" fill="#f07aaa" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(10 180 118)"/>

  <!-- 花の中心 -->
  <circle cx="180" cy="135" r="28" fill="#f5d63d" stroke="#2d263c" stroke-width="7"/>
  <circle cx="180" cy="135" r="14" fill="#e8a800" stroke="#2d263c" stroke-width="4"/>

  <!-- 体(メイン) -->
  <ellipse cx="180" cy="248" rx="112" ry="88" fill="#4fb84a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹の明るい色 -->
  <ellipse cx="180" cy="258" rx="70" ry="55" fill="#a5d96b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 腹のシワ線(ゆるく) -->
  <path d="M148 248 Q180 238 212 248" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M155 265 Q180 256 205 265" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- 左前足 -->
  <rect x="82" y="295" width="44" height="42" rx="16" fill="#4fb84a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左前足 爪 -->
  <path d="M88 337 Q86 347 83 350 M100 338 Q100 349 99 352 M112 337 Q115 347 116 350" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 右前足 -->
  <rect x="234" y="295" width="44" height="42" rx="16" fill="#4fb84a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右前足 爪 -->
  <path d="M240 337 Q238 347 235 350 M252 338 Q252 349 251 352 M264 337 Q267 347 268 350" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- しっぽ(短い・右後ろ) -->
  <path d="M265 280 Q295 275 302 260 Q308 248 298 242" fill="#4fb84a" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 首 -->
  <rect x="155" y="195" width="50" height="42" rx="18" fill="#4fb84a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="192" rx="58" ry="46" fill="#4fb84a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 耳(左・尖り) -->
  <polygon points="128,178 115,148 140,160" fill="#4fb84a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 耳(右・尖り) -->
  <polygon points="232,178 245,148 220,160" fill="#4fb84a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 額の小さな花(メガ固有) -->
  <circle cx="165" cy="165" r="9" fill="#f4b8d0" stroke="#2d263c" stroke-width="4"/>
  <circle cx="165" cy="165" r="5" fill="#f5d63d" stroke="#2d263c" stroke-width="3"/>

  <!-- 眉毛(太くてどっしり) -->
  <path d="M150 185 Q163 178 174 183" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M186 183 Q197 178 210 185" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 目(赤・大きめ) -->
  <ellipse cx="158" cy="195" rx="13" ry="12" fill="#e83030" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="202" cy="195" rx="13" ry="12" fill="#e83030" stroke="#2d263c" stroke-width="5"/>
  <!-- 目の光 -->
  <circle cx="163" cy="191" r="4" fill="white"/>
  <circle cx="207" cy="191" r="4" fill="white"/>

  <!-- 鼻孔 -->
  <ellipse cx="172" cy="207" rx="5" ry="4" fill="#2d6b28" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="188" cy="207" rx="5" ry="4" fill="#2d6b28" stroke="#2d263c" stroke-width="3"/>

  <!-- 口(幅広・ゆるっと笑顔) -->
  <path d="M152 215 Q170 226 180 224 Q190 226 208 215" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺの丸み(斑点) -->
  <circle cx="140" cy="208" r="8" fill="#6ad65a" stroke="#2d263c" stroke-width="3" opacity="0.7"/>
  <circle cx="220" cy="208" r="8" fill="#6ad65a" stroke="#2d263c" stroke-width="3" opacity="0.7"/>
</svg>