<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尾羽(後ろ・扇状に3枚) -->
  <polygon points="168,248 88,336 138,258" fill="#8A5222" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <polygon points="182,252 128,348 162,262" fill="#9C5F27" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <polygon points="198,250 170,340 190,258" fill="#8A5222" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 後ろ側の羽(奥) -->
  <path d="M112 160 Q68 190 82 240 Q96 272 138 266 Q120 210 112 160Z" fill="#9C5F27" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M96 220 Q86 246 106 260 Q114 236 96 220Z" fill="#6E3E17"/>

  <!-- 首(体と頭をつなぐ) -->
  <polygon points="152,142 212,142 182,116 130,118" fill="#B3712F" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(胴体) -->
  <ellipse cx="186" cy="216" rx="72" ry="92" fill="#B3712F" stroke="#2d263c" stroke-width="8"/>

  <!-- お腹の模様(クリーム色) -->
  <ellipse cx="192" cy="238" rx="34" ry="58" fill="#F2DFB8"/>

  <!-- 前側の羽(手前) -->
  <path d="M256 168 Q302 194 288 246 Q272 276 230 266 Q248 214 256 168Z" fill="#B3712F" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M268 228 Q284 250 262 264 Q252 240 268 228Z" fill="#6E3E17"/>

  <!-- 脚 -->
  <path d="M168 296 Q162 316 160 336" fill="none" stroke="#E0A83C" stroke-width="10" stroke-linecap="round"/>
  <path d="M206 296 Q210 316 213 336" fill="none" stroke="#E0A83C" stroke-width="10" stroke-linecap="round"/>

  <!-- 足の爪 -->
  <path d="M148 347 L160 335 L173 347" fill="none" stroke="#E0A83C" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M200 347 L213 335 L226 347" fill="none" stroke="#E0A83C" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭 -->
  <circle cx="150" cy="100" r="37" fill="#B3712F" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭のトサカ羽(赤茶・3枚) -->
  <path d="M122 90 Q92 42 108 24 Q126 44 136 78Z" fill="#8C3A41" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M142 84 Q130 30 148 18 Q160 40 156 72Z" fill="#A0454D" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M160 86 Q166 34 182 28 Q182 52 174 80Z" fill="#8C3A41" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- くちばし(細長い槍状) -->
  <polygon points="180,82 187,120 320,148" fill="#D9A066" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M188 108 Q250 122 305 143" fill="none" stroke="#7A4A1F" stroke-width="6" stroke-linecap="round"/>

  <!-- 目 -->
  <circle cx="140" cy="90" r="11" fill="#FFFFFF" stroke="#2d263c" stroke-width="5"/>
  <circle cx="142" cy="90" r="5" fill="#221A15"/>
</svg>
