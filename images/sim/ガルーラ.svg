  <path d="M254 198 Q285 215 278 255 Q275 268 262 270" fill="#D4B87A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 右手指 -->
  <circle cx="270" cy="272" r="9" fill="#D4B87A" stroke="#2d263c" stroke-width="6"/>
  <circle cx="282" cy="266" r="8" fill="#D4B87A" stroke="#2d263c" stroke-width="6"/>
