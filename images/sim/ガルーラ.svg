<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- しっぽ -->
  <ellipse cx="252" cy="272" rx="28" ry="18" fill="#D4B87A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

