  <ellipse cx="183" cy="140" rx="10" ry="7" fill="#B89450" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="180" cy="140" rx="4" ry="3" fill="#2d263c"/>
  <ellipse cx="187" cy="140" rx="4" ry="3" fill="#2d263c"/>

  <!-- 口(にやっとした感じ) -->
  <path d="M160 158 Q183 172 206 156" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺの赤み -->
  <ellipse cx="142" cy="148" rx="14" ry="10" fill="#F0A098" opacity="0.6"/>
  <ellipse cx="224" cy="146" rx="13" ry="9" fill="#F0A098" opacity="0.6"/>
