  <circle cx="84" cy="268" r="8" fill="#D4B87A" stroke="#2d263c" stroke-width="6"/>
  <circle cx="106" cy="282" r="8" fill="#D4B87A" stroke="#2d263c" stroke-width="6"/>

  <!-- 赤ちゃんガルーラの体 -->
