  <!-- 赤ちゃんの顔 -->
  <circle cx="183" cy="240" r="26" fill="#E8D298" stroke="#2d263c" stroke-width="5"/>
  <!-- 赤ちゃんの耳 -->
  <ellipse cx="163" cy="222" rx="9" ry="10" fill="#E8D298" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="203" cy="222" rx="9" ry="10" fill="#E8D298" stroke="#2d263c" stroke-width="4"/>
  <!-- 赤ちゃんの目 -->
  <circle cx="177" cy="240" r="4" fill="#2d263c"/>
  <circle cx="191" cy="241" r="4" fill="#2d263c"/>
