  <ellipse cx="162" cy="30" rx="7" ry="9" fill="#C8A855" stroke="#2d263c" stroke-width="6"/>
  <path d="M196 55 Q198 38 202 30" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="202" cy="28" rx="7" ry="9" fill="#C8A855" stroke="#2d263c" stroke-width="6"/>

