  <circle cx="179" cy="238" r="1.5" fill="white"/>
  <circle cx="193" cy="239" r="1.5" fill="white"/>
  <!-- 赤ちゃんの口 -->
  <path d="M180 249 Q183 252 187 249" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

