  <ellipse cx="126" cy="72" rx="18" ry="22" fill="#D4B87A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="126" cy="73" rx="9" ry="13" fill="#E8B8B0" stroke="none"/>

