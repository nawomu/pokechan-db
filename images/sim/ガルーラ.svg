  <circle cx="162" cy="120" r="11" fill="#2d263c"/>
  <circle cx="209" cy="118" r="10" fill="#2d263c"/>

  <!-- 目のハイライト -->
  <circle cx="158" cy="116" r="4" fill="white"/>
  <circle cx="205" cy="114" r="3.5" fill="white"/>

