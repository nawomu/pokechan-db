<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)茶色い子ティーレックス胴体 2)大きな下顎・白い歯 3)白い腹 4)小さな前腕・太い後ろ脚 5)背中に黒い斑点/縞 -->

  <!-- 尾(太い・後ろ) -->
  <path d="M235,250 Q285,250 300,225 Q308,238 295,262 Q255,275 230,268 Z" fill="#9c6b3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ脚(左) -->
  <path d="M150,250 Q138,295 158,312 L185,312 Q188,290 178,255 Z" fill="#9c6b3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M158,312 L150,322 M168,312 L165,324 M180,312 L185,322" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- 後ろ脚(右) -->
  <path d="M200,255 Q205,290 220,312 L245,312 Q243,290 228,250 Z" fill="#9c6b3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M220,312 L215,324 M232,312 L235,324 M244,312 L250,322" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 胴体 -->
  <ellipse cx="195" cy="220" rx="50" ry="55" fill="#9c6b3f" stroke="#2d263c" stroke-width="7"/>
  <!-- 白い腹 -->
  <ellipse cx="195" cy="232" rx="28" ry="38" fill="#f2ead8" stroke="#2d263c" stroke-width="6"/>

  <!-- 前腕(小さく) 左 -->
  <path d="M168,210 Q150,232 145,255" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M145,255 L138,260 M145,255 L143,265" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- 前腕(小さく) 右 -->
  <path d="M222,210 Q240,232 245,255" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M245,255 L252,260 M245,255 L247,265" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 背中の黒い斑点/縞 -->
  <ellipse cx="170" cy="195" rx="6" ry="9" fill="#2d263c"/>
  <ellipse cx="220" cy="200" rx="6" ry="9" fill="#2d263c"/>
  <ellipse cx="195" cy="178" rx="6" ry="9" fill="#2d263c"/>

  <!-- 頭 -->
  <path d="M195,108 Q150,112 138,155 Q145,180 195,182 Q245,180 252,155 Q240,112 195,108 Z" fill="#9c6b3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 大きな下顎(口) -->
  <path d="M150,168 Q195,200 240,168 Q235,185 195,190 Q155,185 150,168 Z" fill="#f2ead8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 歯 -->
  <path d="M165,178 L170,190 L175,178 M200,178 L205,190 L210,178 M222,178 L226,188" fill="#ffffff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左目 -->
  <circle cx="172" cy="148" r="14" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="174" cy="150" r="6" fill="#e2402c"/>
  <circle cx="174" cy="150" r="2.5" fill="#2d263c"/>
  <!-- 右目 -->
  <circle cx="218" cy="148" r="14" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="216" cy="150" r="6" fill="#e2402c"/>
  <circle cx="216" cy="150" r="2.5" fill="#2d263c"/>

  <!-- 鼻孔 -->
  <circle cx="195" cy="128" r="3" fill="#2d263c"/>
</svg>
