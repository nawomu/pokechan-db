<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.地面から出た円錐形の茶色い体 2.先端がとがった頭頂 3.大きくて丸いピンクの鼻 4.小さく丸い黒い目が2つ(離れ気味) 5.地面(土)の盛り上がりと体下部の濃い茶色の影 -->

  <!-- 後ろ: 地面の土盛り -->
  <ellipse cx="180" cy="300" rx="140" ry="34" fill="#8a5a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M60 300 q10 22 40 26 q60 10 160 0 q30 -4 40 -26 z" fill="#6e4423" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体: 円錐形(頭頂がややとがる) -->
  <path d="M180 46
           C 150 46 118 150 104 230
           C 96 272 116 300 180 300
           C 244 300 264 272 256 230
           C 242 150 210 46 180 46 Z"
        fill="#c9955a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体下部の濃い影 -->
  <path d="M112 226 C 104 268 122 296 180 296 C 238 296 256 268 248 226
            C 240 258 216 274 180 274 C 144 274 120 258 112 226 Z"
        fill="#a8703c"/>

  <!-- 体の丸みハイライト -->
  <path d="M150 90 C 138 130 128 176 122 216" stroke="#e0b478" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- 目(2つ、離れ気味の丸い黒目) -->
  <circle cx="150" cy="178" r="13" fill="#2d263c"/>
  <circle cx="210" cy="178" r="13" fill="#2d263c"/>
  <circle cx="146" cy="174" r="4" fill="#ffffff"/>
  <circle cx="206" cy="174" r="4" fill="#ffffff"/>

  <!-- 大きな丸いピンクの鼻 -->
  <ellipse cx="180" cy="222" rx="34" ry="28" fill="#f2a3b3" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="180" cy="222" rx="16" ry="12" fill="#d97a90"/>

  <!-- ほっぺの赤み -->
  <ellipse cx="120" cy="210" rx="10" ry="7" fill="#e8879a" opacity="0.6"/>
  <ellipse cx="240" cy="210" rx="10" ry="7" fill="#e8879a" opacity="0.6"/>
</svg>
