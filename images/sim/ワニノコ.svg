<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.青いずんぐり体+黄色いお腹 2.大きな口とギザギザの白い歯 3.頭の赤いギザギザとさか 4.丸くて大きな目(黒目がち) 5.短い手足と尻尾・つめ -->

  <!-- 後ろ: 尻尾 -->
  <path d="M225 300 Q270 290 275 250 Q260 280 220 285 Z" fill="#2f6fc4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ足 -->
  <ellipse cx="235" cy="322" rx="30" ry="20" fill="#2f6fc4" stroke="#2d263c" stroke-width="7"/>

  <!-- 体(ずんぐり) -->
  <path d="M180 150 Q245 155 250 235 Q252 300 180 320 Q108 300 110 235 Q115 155 180 150 Z" fill="#3d7fd6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の黄色パッチ -->
  <ellipse cx="180" cy="245" rx="55" ry="65" fill="#ffe066" stroke="#2d263c" stroke-width="6"/>

  <!-- 前足(左) -->
  <ellipse cx="118" cy="325" rx="28" ry="20" fill="#3d7fd6" stroke="#2d263c" stroke-width="7"/>
  <!-- 前足(右) -->
  <ellipse cx="242" cy="325" rx="28" ry="20" fill="#3d7fd6" stroke="#2d263c" stroke-width="7"/>

  <!-- 腕(左) -->
  <path d="M115 210 Q75 225 70 260 Q68 280 90 285 Q95 255 125 235 Z" fill="#3d7fd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- つめ -->
  <path d="M72 268 L60 272 M76 278 L64 285 M84 284 L75 293" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 腕(右) -->
  <path d="M245 210 Q285 225 290 260 Q292 280 270 285 Q265 255 235 235 Z" fill="#3d7fd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- つめ -->
  <path d="M288 268 L300 272 M284 278 L296 285 M276 284 L285 293" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="130" rx="95" ry="90" fill="#3d7fd6" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭の赤いギザギザ(さか) -->
  <path d="M105 70 L120 40 L138 68 L155 35 L172 68 L188 35 L205 68 L222 40 L238 70 Q195 55 180 60 Q135 50 105 70 Z" fill="#e8433d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 大きな口(あご)は下方に開く -->
  <path d="M95 145 Q100 195 180 200 Q260 195 265 145 Q220 190 180 190 Q140 190 95 145 Z" fill="#1f4f9e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 口の中(赤) -->
  <path d="M105 150 Q180 200 255 150 Q250 175 180 180 Q110 175 105 150 Z" fill="#c8362e" stroke="none"/>

  <!-- 白い歯(ギザギザ) -->
  <path d="M112 150 L122 165 L132 150 L142 165 L152 150 L162 165 L172 150 L182 165 L192 150 L202 165 L212 150 L222 165 L232 150 L245 155" fill="#ffffff" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 目(大きく丸い・黒目がち) -->
  <circle cx="140" cy="105" r="26" fill="#ffffff" stroke="#2d263c" stroke-width="7"/>
  <circle cx="220" cy="105" r="26" fill="#ffffff" stroke="#2d263c" stroke-width="7"/>
  <circle cx="146" cy="110" r="14" fill="#1a1a1a"/>
  <circle cx="226" cy="110" r="14" fill="#1a1a1a"/>
  <circle cx="150" cy="104" r="4" fill="#ffffff"/>
  <circle cx="230" cy="104" r="4" fill="#ffffff"/>

  <!-- 鼻の穴 -->
  <ellipse cx="168" cy="140" rx="4" ry="6" fill="#2d263c"/>
  <ellipse cx="192" cy="140" rx="4" ry="6" fill="#2d263c"/>
</svg>
