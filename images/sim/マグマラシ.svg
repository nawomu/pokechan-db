<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尻尾(後ろ・体より奥) -->
  <path d="M66 236 Q44 244 48 268 Q52 286 72 282 Q86 278 82 258 Q79 244 66 236Z" fill="#EAC98C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 後ろ足(奥側・2本) -->
  <rect x="108" y="248" width="36" height="76" rx="17" fill="#DDB077" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="176" y="252" width="36" height="76" rx="17" fill="#DDB077" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="126" cy="322" rx="21" ry="12" fill="#4B3524" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="194" cy="326" rx="21" ry="12" fill="#4B3524" stroke="#2d263c" stroke-width="6"/>

  <!-- 体(ふっくら楕円) -->
  <ellipse cx="196" cy="232" rx="116" ry="76" fill="#EFCE92" stroke="#2d263c" stroke-width="8"/>

  <!-- お腹の丸み線 -->
  <path d="M120 258 Q195 296 268 254" fill="none" stroke="#D9AD6E" stroke-width="6" stroke-linecap="round"/>

  <!-- 背中の火山こぶ(マグマラシの特徴・岩っぽい赤茶) -->
  <path d="M140 178 Q126 108 176 74 Q208 52 240 78 Q266 100 256 148 Q250 170 222 180 Q180 194 140 178Z" fill="#8A4432" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M168 128 Q192 100 224 118" fill="none" stroke="#623322" stroke-width="6" stroke-linecap="round"/>

  <!-- 前足(手前側・2本) -->
  <rect x="232" y="246" width="38" height="82" rx="18" fill="#EFCE92" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <rect x="284" y="240" width="38" height="88" rx="18" fill="#EFCE92" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="251" cy="330" rx="22" ry="13" fill="#4B3524" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="303" cy="330" rx="22" ry="13" fill="#4B3524" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭 -->
  <ellipse cx="292" cy="164" rx="62" ry="58" fill="#EFCE92" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳(小さめ丸) -->
  <ellipse cx="262" cy="118" rx="17" ry="20" fill="#DDB077" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="312" cy="112" rx="17" ry="20" fill="#DDB077" stroke="#2d263c" stroke-width="6"/>

  <!-- マズル(鼻づら・明るいクリーム色) -->
  <ellipse cx="322" cy="188" rx="34" ry="27" fill="#F7E1B4" stroke="#2d263c" stroke-width="7"/>

  <!-- 鼻の穴 -->
  <ellipse cx="330" cy="184" rx="4" ry="5" fill="#4B3524"/>
  <ellipse cx="341" cy="190" rx="4" ry="5" fill="#4B3524"/>

  <!-- 眠たそうな半目(マグマラシの特徴的な垂れ目) -->
  <path d="M258 150 Q270 160 282 150" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M296 144 Q308 155 320 145" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 口 -->
  <path d="M300 208 Q318 216 334 206" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
