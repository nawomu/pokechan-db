<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.浮遊する丸い体(下半身は紫のローブ状で座禅の脚を表現) 2.上半身は水色〜灰青 3.閉じた目で瞑想する穏やかな表情 4.細い腕を胸の前で組む 5.尖った小さな耳と頭頂の突起 -->

  <!-- 後ろ: 浮遊オーラ -->
  <ellipse cx="180" cy="300" rx="90" ry="18" fill="#b9a8e0" opacity="0.35"/>
  <ellipse cx="180" cy="190" rx="130" ry="120" fill="#dcd2f2" opacity="0.25"/>

  <!-- 下半身: 紫のローブ(座禅の脚を丸くまとめた形) -->
  <path d="M100,210
           C90,255 95,300 130,320
           C150,332 160,300 180,300
           C200,300 210,332 230,320
           C265,300 270,255 260,210
           C245,175 115,175 100,210 Z"
        fill="#7a4fae" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- ローブの模様 -->
  <path d="M155,230 C165,245 195,245 205,230" fill="none" stroke="#5a3480" stroke-width="6" stroke-linecap="round"/>
  <circle cx="180" cy="260" r="10" fill="#5a3480"/>

  <!-- 腕(胸の前で組む) -->
  <path d="M115,205 C90,215 85,235 100,250 C112,258 130,250 138,235"
        fill="#9fb8d8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M245,205 C270,215 275,235 260,250 C248,258 230,250 222,235"
        fill="#9fb8d8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 手(組んだ指) -->
  <ellipse cx="118" cy="243" rx="14" ry="11" fill="#9fb8d8" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="242" cy="243" rx="14" ry="11" fill="#9fb8d8" stroke="#2d263c" stroke-width="6"/>

  <!-- 上半身(頭〜胴体はひと続きの卵形) -->
  <ellipse cx="180" cy="150" rx="80" ry="90" fill="#9fb8d8" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭頂の小さな突起 -->
  <path d="M170,68 C172,52 188,52 190,68 Z" fill="#9fb8d8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 耳(とがった三角) -->
  <path d="M108,120 C92,108 92,88 108,80 C112,98 112,110 108,120 Z" fill="#9fb8d8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M252,120 C268,108 268,88 252,80 C248,98 248,110 252,120 Z" fill="#9fb8d8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胸の紫のしるし -->
  <path d="M180,160 L165,185 L180,205 L195,185 Z" fill="#7a4fae" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔: 閉じた目(瞑想の穏やかな弧) -->
  <path d="M138,148 C146,140 160,140 168,148" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M192,148 C200,140 214,140 222,148" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 小さな口 -->
  <path d="M172,178 C178,184 182,184 188,178" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺの丸み -->
  <circle cx="135" cy="168" r="9" fill="#c9dcee" opacity="0.7"/>
  <circle cx="225" cy="168" r="9" fill="#c9dcee" opacity="0.7"/>
</svg>
