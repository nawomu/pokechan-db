<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body) -->
  <circle cx="278" cy="248" r="16" fill="#F9AFC7" stroke="#2d263c" stroke-width="6"/>

  <!-- back ear (behind head, slightly drooping) -->
  <path d="M234 78 C 262 46, 270 8, 254 22 C 240 34, 224 70, 214 92 Z"
        fill="#F9AFC7" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- feet -->
  <ellipse cx="140" cy="318" rx="30" ry="18" fill="#F491B2" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="222" cy="318" rx="30" ry="18" fill="#F491B2" stroke="#2d263c" stroke-width="7"/>

  <!-- arms -->
  <ellipse cx="78" cy="222" rx="24" ry="34" fill="#FBB8CE" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="282" cy="222" rx="22" ry="32" fill="#FBB8CE" stroke="#2d263c" stroke-width="7"/>

  <!-- main body -->
  <ellipse cx="180" cy="196" rx="118" ry="112" fill="#FBB8CE" stroke="#2d263c" stroke-width="8"/>

  <!-- front ear (upright) -->
  <path d="M126 82 C 100 42, 96 -2, 118 18 C 138 36, 152 78, 158 100 Z"
        fill="#F9AFC7" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- belly fluff patch (jagged edge) -->
  <path d="M96 220
           C 90 250, 100 280, 122 296
           L 132 280 L 146 300 L 160 282 L 176 302 L 192 282 L 206 300 L 220 280 L 232 296
           C 254 280, 264 250, 258 220
           C 240 246, 210 258, 180 258
           C 150 258, 114 246, 96 220 Z"
        fill="#FFFFFF" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- forehead curl -->
  <path d="M180 96 C 186 90, 196 90, 198 100 C 200 110, 190 114, 184 108"
        fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- eyes -->
  <ellipse cx="150" cy="176" rx="24" ry="28" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="212" cy="176" rx="24" ry="28" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <circle cx="152" cy="182" r="13" fill="#3F8FE0"/>
  <circle cx="214" cy="182" r="13" fill="#3F8FE0"/>
  <circle cx="152" cy="186" r="6" fill="#20233A"/>
  <circle cx="214" cy="186" r="6" fill="#20233A"/>
  <circle cx="147" cy="170" r="3.5" fill="#FFFFFF"/>
  <circle cx="209" cy="170" r="3.5" fill="#FFFFFF"/>

  <!-- cheeks -->
  <ellipse cx="118" cy="214" rx="12" ry="8" fill="#FF8FAE" opacity="0.7"/>
  <ellipse cx="244" cy="214" rx="12" ry="8" fill="#FF8FAE" opacity="0.7"/>

  <!-- mouth -->
  <path d="M164 222 Q 181 236 198 222" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
