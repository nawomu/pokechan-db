<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろの耳(左・垂れ耳・茶色先端) -->
  <path d="M130 90 C115 60 100 30 108 15 C112 8 122 10 128 20 C138 38 142 70 138 100" fill="#c8a46e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
