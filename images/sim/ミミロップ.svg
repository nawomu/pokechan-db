  <!-- 口(ニコッ) -->
  <path d="M170 186 C175 192 188 192 193 186" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ(赤チーク・左) -->
  <ellipse cx="144" cy="176" rx="14" ry="10" fill="#f08080" opacity="0.75"/>
  <!-- ほっぺ(赤チーク・右) -->
  <ellipse cx="218" cy="174" rx="13" ry="9" fill="#f08080" opacity="0.75"/>
</svg>