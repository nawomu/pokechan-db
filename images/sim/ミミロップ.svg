  <ellipse cx="248" cy="248" rx="22" ry="18" fill="#7a4f2a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="255" cy="238" rx="14" ry="12" fill="#7a4f2a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

