  <ellipse cx="212" cy="302" rx="28" ry="15" fill="#8b5e3c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 上半身(クリームベージュ) -->
  <ellipse cx="180" cy="210" rx="62" ry="55" fill="#f0d9a8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腕(左・クリーム) -->
  <path d="M122 215 C105 220 95 240 102 255 C108 265 122 262 130 250 C138 238 135 220 122 215 Z" fill="#f0d9a8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 腕(右) -->
  <path d="M238 215 C255 220 266 240 258 255 C252 265 238 262 230 250 C222 238 225 220 238 215 Z" fill="#f0d9a8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭(クリームベージュ・まるっと) -->
  <ellipse cx="180" cy="158" rx="65" ry="58" fill="#f0d9a8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 耳の前面(左・ベージュ内側) -->
  <path d="M142 105 C130 78 122 48 128 25 C130 18 136 16 140 22 C148 38 150 72 148 105" fill="#f0d9a8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭のふわふわ毛 -->
  <ellipse cx="163" cy="108" rx="15" ry="10" fill="#f0d9a8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="180" cy="104" rx="14" ry="9" fill="#f0d9a8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="197" cy="108" rx="13" ry="9" fill="#f0d9a8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目(左・くりくり) -->
  <ellipse cx="160" cy="162" rx="13" ry="15" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="157" cy="158" rx="4" ry="4" fill="white"/>

  <!-- 目(右・やや大きめ・ゆるさ) -->
  <ellipse cx="202" cy="160" rx="14" ry="13" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="199" cy="156" rx="4" ry="4" fill="white"/>

  <!-- 鼻(小さな三角) -->
