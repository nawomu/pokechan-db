<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
    1. 水色〜青灰色のずんぐりした両生類っぽい体
    2. お腹はクリーム色の丸い模様
    3. 頭の両脇にピンクの外えら(枝分かれ3本ずつ)
    4. 半目でいつも不機嫌そうな下向きの口(フニャッとした一文字〜への字口)
    5. 太くて丸っこい短い手足と小さいしっぽ -->

  <!-- しっぽ(体の後ろに少し覗く) -->
  <ellipse cx="182" cy="298" rx="34" ry="22" fill="#8FC2D6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 奥側の足(後ろ足) -->
  <ellipse cx="92" cy="284" rx="24" ry="18" fill="#8FC2D6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="268" cy="284" rx="24" ry="18" fill="#8FC2D6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="180" cy="222" rx="98" ry="92" fill="#A9D9E8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 手前の足 -->
  <ellipse cx="118" cy="308" rx="26" ry="19" fill="#A9D9E8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="242" cy="308" rx="26" ry="19" fill="#A9D9E8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- お腹の模様 -->
  <ellipse cx="180" cy="250" rx="58" ry="62" fill="#F8ECC8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="140" rx="88" ry="78" fill="#A9D9E8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 左の外えら(3本) -->
  <path d="M96,110 C68,98 58,84 64,68" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="62" cy="66" rx="12" ry="16" fill="#F4A3B4" stroke="#2d263c" stroke-width="6" transform="rotate(-25 62 66)"/>
  <path d="M92,138 C60,132 46,122 46,104" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="46" cy="100" rx="13" ry="17" fill="#F4A3B4" stroke="#2d263c" stroke-width="6" transform="rotate(-10 46 100)"/>
  <path d="M96,166 C66,168 50,162 44,146" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="42" cy="144" rx="13" ry="17" fill="#F4A3B4" stroke="#2d263c" stroke-width="6" transform="rotate(20 42 144)"/>

  <!-- 右の外えら(3本・左右対称) -->
  <path d="M264,110 C292,98 302,84 296,68" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="298" cy="66" rx="12" ry="16" fill="#F4A3B4" stroke="#2d263c" stroke-width="6" transform="rotate(25 298 66)"/>
  <path d="M268,138 C300,132 314,122 314,104" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="314" cy="100" rx="13" ry="17" fill="#F4A3B4" stroke="#2d263c" stroke-width="6" transform="rotate(10 314 100)"/>
  <path d="M264,166 C294,168 310,162 316,146" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="318" cy="144" rx="13" ry="17" fill="#F4A3B4" stroke="#2d263c" stroke-width="6" transform="rotate(-20 318 144)"/>

  <!-- ほっぺ(ほんのり赤み) -->
  <ellipse cx="130" cy="160" rx="14" ry="9" fill="#F6C6CE"/>
  <ellipse cx="230" cy="160" rx="14" ry="9" fill="#F6C6CE"/>

  <!-- 目(半目でぼんやりした表情) -->
  <ellipse cx="150" cy="124" rx="12" ry="15" fill="#2d263c"/>
  <ellipse cx="210" cy="124" rx="12" ry="15" fill="#2d263c"/>
  <circle cx="146" cy="118" r="3.5" fill="#ffffff"/>
  <circle cx="206" cy="118" r="3.5" fill="#ffffff"/>

  <!-- 鼻の穴 -->
  <ellipse cx="170" cy="152" rx="3" ry="4" fill="#2d263c"/>
  <ellipse cx="190" cy="152" rx="3" ry="4" fill="#2d263c"/>

  <!-- いつも困った顔の口(への字) -->
  <path d="M126,180 C150,196 210,196 234,180" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>
