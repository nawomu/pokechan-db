  <!-- 体(丸くてぽってり) -->
  <ellipse cx="180" cy="230" rx="90" ry="95" fill="#AACEE3" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- おなか(クリーム色パッチ) -->
  <path d="M140 175 Q180 160 220 175 Q235 230 220 285 Q180 305 140 285 Q125 230 140 175Z" fill="#F5EEDD" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M155 205 Q180 195 205 205" fill="none" stroke="#D8CBA8" stroke-width="4" stroke-linecap="round"/>
  <path d="M150 250 Q180 262 210 250" fill="none" stroke="#D8CBA8" stroke-width="4" stroke-linecap="round"/>

  <!-- 左うで(ちいさいひれ) -->
  <ellipse cx="95" cy="210" rx="22" ry="30" fill="#AACEE3" stroke="#2d263c" stroke-width="7"/>
  <!-- 右うで(ちいさいひれ) -->
  <ellipse cx="265" cy="210" rx="22" ry="30" fill="#AACEE3" stroke="#2d263c" stroke-width="7"/>

  <!-- 左あし -->
  <ellipse cx="140" cy="317" rx="26" ry="15" fill="#AACEE3" stroke="#2d263c" stroke-width="7"/>
  <!-- 右あし -->
  <ellipse cx="220" cy="317" rx="26" ry="15" fill="#AACEE3" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭 -->
  <circle cx="180" cy="100" r="55" fill="#AACEE3" stroke="#2d263c" stroke-width="9"/>

  <!-- 頭のふわっとした毛(トレードマーク) -->
  <path d="M160 46 Q150 28 170 23 Q194 18 190 40 Q186 50 168 50 Q160 50 160 46Z" fill="#6F9BC0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 潮ふき穴 -->
  <ellipse cx="180" cy="62" rx="6" ry="4" fill="#3A4A5C"/>

  <!-- ほっぺ(赤み) -->
  <ellipse cx="138" cy="118" rx="12" ry="7" fill="#F7C6CE"/>
  <ellipse cx="222" cy="118" rx="12" ry="7" fill="#F7C6CE"/>

  <!-- 目 左 -->
  <circle cx="160" cy="100" r="9" fill="#2d263c"/>
  <circle cx="157" cy="97" r="3" fill="#FFFFFF"/>
  <!-- 目 右 -->
  <circle cx="200" cy="100" r="9" fill="#2d263c"/>
  <circle cx="197" cy="97" r="3" fill="#FFFFFF"/>

  <!-- 口(にっこり) -->
  <path d="M164 128 Q180 138 196 128" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
