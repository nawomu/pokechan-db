  <path d="M308 136 Q318 125 325 118 Q328 112 322 110 Q315 115 310 122 Q305 130 308 136" fill="#d4c89a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- body -->
  <ellipse cx="195" cy="205" rx="100" ry="72" fill="#8B7355" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- belly -->
  <ellipse cx="185" cy="225" rx="58" ry="40" fill="#c9b98a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- neck -->
  <path d="M130 175 Q115 155 112 135 Q110 115 125 108 Q142 100 158 112 Q170 122 165 145 Q162 162 155 178" fill="#8B7355" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- mane on neck -->
  <path d="M112 135 Q105 125 100 118 Q95 128 98 138 Q103 145 112 148" fill="#d4c89a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M115 118 Q108 106 106 95 Q112 98 118 108 Q120 118 118 128" fill="#d4c89a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M125 108 Q120 95 122 82 Q130 88 133 100 Q133 112 128 118" fill="#d4c89a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- head -->
  <ellipse cx="138" cy="108" rx="52" ry="48" fill="#8B7355" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- head dark face patch -->
  <ellipse cx="138" cy="115" rx="36" ry="32" fill="#6b5540" stroke="none"/>

  <!-- left ear -->
  <path d="M100 75 Q88 48 95 35 Q105 28 115 40 Q122 52 118 72" fill="#8B7355" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M103 70 Q95 52 99 42 Q106 38 112 48 Q115 58 112 70" fill="#c07070" stroke="none"/>

  <!-- right ear -->
  <path d="M162 72 Q168 45 178 35 Q188 30 193 44 Q195 58 182 72" fill="#8B7355" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M165 68 Q168 50 175 40 Q182 38 184 50 Q184 62 175 70" fill="#c07070" stroke="none"/>

  <!-- forelock/bangs -->
  <path d="M115 68 Q108 55 110 45 Q118 42 122 52 Q120 62 118 70" fill="#d4c89a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M128 65 Q124 50 128 42 Q136 40 138 52 Q136 62 132 68" fill="#d4c89a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M142 66 Q140 50 146 44 Q154 44 155 56 Q153 66 148 70" fill="#d4c89a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- left eye (droopy/sleepy) -->
  <ellipse cx="118" cy="105" rx="11" ry="9" fill="#f5f0e8" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="119" cy="107" rx="7" ry="6" fill="#3a2a1a" stroke="none"/>
  <ellipse cx="117" cy="105" rx="3" ry="3" fill="#1a1010" stroke="none"/>
  <ellipse cx="115" cy="104" rx="1.5" ry="1.5" fill="#ffffff" stroke="none"/>
  <!-- droopy eyelid left -->
  <path d="M107 101 Q118 96 130 102" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- right eye (droopy/sleepy) -->
  <ellipse cx="158" cy="105" rx="11" ry="9" fill="#f5f0e8" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="159" cy="107" rx="7" ry="6" fill="#3a2a1a" stroke="none"/>
  <ellipse cx="157" cy="105" rx="3" ry="3" fill="#1a1010" stroke="none"/>
  <ellipse cx="155" cy="104" rx="1.5" ry="1.5" fill="#ffffff" stroke="none"/>
  <!-- droopy eyelid right -->
  <path d="M147 101 Q158 96 170 102" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- big nose -->
  <ellipse cx="136" cy="132" rx="26" ry="18" fill="#5a4030" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- nostrils -->
  <ellipse cx="126" cy="133" rx="7" ry="5" fill="#3a2520" stroke="none"/>
  <ellipse cx="148" cy="133" rx="7" ry="5" fill="#3a2520" stroke="none"/>

  <!-- mouth line (slightly goofy) -->
  <path d="M120 146 Q136 152 153 146" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- front left leg -->
  <path d="M148 268 Q142 285 140 305 Q138 318 140 325" fill="#4a3728" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- front left hoof -->
  <ellipse cx="140" cy="328" rx="14" ry="8" fill="#2d1e14" stroke="#2d263c" stroke-width="5"/>

  <!-- front right leg -->
  <path d="M172 268 Q170 285 172 305 Q173 318 172 325" fill="#4a3728" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- front right hoof -->
  <ellipse cx="172" cy="328" rx="14" ry="8" fill="#2d1e14" stroke="#2d263c" stroke-width="5"/>

  <!-- back left leg -->
  <path d="M225 265 Q220 283 220 305 Q220 318 220 325" fill="#4a3728" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- back left hoof -->
  <ellipse cx="220" cy="328" rx="14" ry="8" fill="#2d1e14" stroke="#2d263c" stroke-width="5"/>

  <!-- back right leg (slightly behind) -->
  <path d="M248 260 Q246 278 248 300 Q249 315 248 323" fill="#4a3728" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- back right hoof -->
  <ellipse cx="248" cy="326" rx="13" ry="7" fill="#2d1e14" stroke="#2d263c" stroke-width="5"/>

  <!-- mud splatters on body for earthy feel -->
  <ellipse cx="220" cy="195" rx="10" ry="7" fill="#6b5030" stroke="none" transform="rotate(-15 220 195)"/>
  <ellipse cx="240" cy="215" rx="7" ry="5" fill="#6b5030" stroke="none" transform="rotate(20 240 215)"/>
  <ellipse cx="200" cy="185" rx="6" ry="4" fill="#6b5030" stroke="none"/>
</svg>