<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail -->
  <path d="M285 195 Q305 175 315 155 Q320 140 310 135 Q300 130 295 145 Q288 165 280 185" fill="#4a3728" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
