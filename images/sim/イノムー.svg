<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (back) -->
  <path d="M78 235 C60 225 60 250 78 250 C68 255 70 268 84 262" fill="#7a4b2e" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- back legs (peeking behind body) -->
  <rect x="118" y="255" width="30" height="58" rx="14" fill="#7a4b2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="205" y="258" width="30" height="55" rx="14" fill="#7a4b2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- body -->
  <ellipse cx="170" cy="215" rx="95" ry="72" fill="#d1996a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- belly patch -->
  <ellipse cx="160" cy="245" rx="55" ry="34" fill="#f4dfb4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- front legs -->
  <rect x="128" y="262" width="32" height="60" rx="15" fill="#8a5a3b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="238" y="260" width="32" height="60" rx="15" fill="#8a5a3b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- head -->
  <circle cx="252" cy="182" r="58" fill="#d1996a" stroke="#2d263c" stroke-width="8"/>
  <!-- ears -->
  <path d="M215 138 L200 100 L235 128 Z" fill="#7a4b2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M262 128 L275 92 L292 132 Z" fill="#7a4b2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- snout -->
  <ellipse cx="308" cy="215" rx="38" ry="24" fill="#b97a4d" stroke="#2d263c" stroke-width="7"/>
  <!-- nose tip -->
  <circle cx="338" cy="220" r="14" fill="#5a3a28" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="333" cy="218" rx="2.5" ry="4" fill="#2d263c"/>
  <ellipse cx="343" cy="222" rx="2.5" ry="4" fill="#2d263c"/>
  <!-- fringe hair over eyes -->
  <path d="M210 158 C222 138 238 132 252 138 C266 130 282 136 292 152 C280 168 268 172 256 166 C244 176 228 174 218 162 Z" fill="#6b4426" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- tiny peeking eyes -->
  <circle cx="234" cy="176" r="4" fill="#2d263c"/>
  <circle cx="262" cy="172" r="4" fill="#2d263c"/>
  <!-- mouth -->
  <path d="M295 235 Q305 244 316 236" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
