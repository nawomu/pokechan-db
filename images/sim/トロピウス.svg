<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body) -->
  <ellipse cx="298" cy="248" rx="38" ry="24" transform="rotate(18 298 248)" fill="#caa066" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- leaf wings (behind body, attached at shoulders) -->
  <g transform="translate(130,178) rotate(-135)">
    <path d="M0,0 Q60,-45 130,0 Q60,45 0,0 Z" fill="#7ab72e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
    <line x1="12" y1="0" x2="118" y2="0" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g transform="translate(230,178) rotate(-45)">
    <path d="M0,0 Q60,-45 130,0 Q60,45 0,0 Z" fill="#7ab72e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
    <line x1="12" y1="0" x2="118" y2="0" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- legs -->
  <ellipse cx="115" cy="290" rx="18" ry="30" fill="#caa066" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="155" cy="298" rx="18" ry="30" fill="#caa066" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="205" cy="298" rx="18" ry="30" fill="#caa066" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="245" cy="290" rx="18" ry="30" fill="#caa066" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- feet -->
  <ellipse cx="115" cy="312" rx="20" ry="11" fill="#f2e2b8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="155" cy="320" rx="20" ry="11" fill="#f2e2b8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="205" cy="320" rx="20" ry="11" fill="#f2e2b8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="245" cy="312" rx="20" ry="11" fill="#f2e2b8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- body -->
  <ellipse cx="180" cy="235" rx="95" ry="62" fill="#caa066" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- belly -->
  <ellipse cx="180" cy="252" rx="62" ry="34" fill="#f2e2b8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- neck -->
  <path d="M155,190 C130,150 125,100 140,70 C148,55 165,50 180,58 C175,80 172,120 172,160 C172,175 168,185 160,195 Z" fill="#caa066" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- banana bunch hanging under chin -->
  <path d="M158,95 L158,108" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="140" cy="112" rx="10" ry="16" transform="rotate(-15 140 112)" fill="#e8d24a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="158" cy="120" rx="10" ry="17" fill="#e8d24a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="176" cy="112" rx="10" ry="16" transform="rotate(15 176 112)" fill="#e8d24a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="148" cy="140" rx="9" ry="15" transform="rotate(-10 148 140)" fill="#e8d24a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="168" cy="138" rx="9" ry="15" transform="rotate(10 168 138)" fill="#e8d24a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- head -->
  <circle cx="190" cy="60" r="32" fill="#caa066" stroke="#2d263c" stroke-width="8"/>
  <!-- head leaf crest -->
  <polygon points="176,32 165,6 197,22" fill="#7ab72e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- snout -->
  <ellipse cx="170" cy="76" rx="20" ry="13" fill="#f2e2b8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- mouth -->
  <path d="M155,80 Q170,90 187,79" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- nostril -->
  <circle cx="157" cy="69" r="3" fill="#2d263c"/>
  <!-- eye -->
  <circle cx="207" cy="50" r="11" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="210" cy="50" r="5.5" fill="#2d263c"/>
</svg>
