<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ: 影 -->
  <ellipse cx="180" cy="310" rx="70" ry="14" fill="#5b6b8c" opacity="0.3"/>

  <!-- 足(左右にちょこんと) -->
  <ellipse cx="150" cy="292" rx="20" ry="12" fill="#fdf6df" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="210" cy="292" rx="20" ry="12" fill="#fdf6df" stroke="#2d263c" stroke-width="6"/>

  <!-- 体(クリーム色の丸い胴) -->
  <path d="M108 280 Q98 205 140 175 Q160 162 180 162 Q200 162 220 175 Q262 205 252 280 Q252 296 180 296 Q108 296 108 280 Z"
        fill="#fdf6df" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腕(小さく丸い) -->
  <ellipse cx="112" cy="232" rx="20" ry="26" fill="#fdf6df" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="248" cy="232" rx="20" ry="26" fill="#fdf6df" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭(緑) -->
  <circle cx="180" cy="150" r="62" fill="#7bc043" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭頂の葉っぱ(左右の大きな葉) -->
  <path d="M180 96 Q120 60 108 20 Q160 30 182 78 Z" fill="#5da62e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M180 96 Q240 60 252 20 Q200 30 178 78 Z" fill="#5da62e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 中央の小さな葉 -->
  <path d="M180 92 Q168 55 180 24 Q192 55 180 92 Z" fill="#8fd960" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 葉脈 -->
  <path d="M180 90 Q150 62 118 30" fill="none" stroke="#2d263c" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <path d="M180 90 Q210 62 242 30" fill="none" stroke="#2d263c" stroke-width="3" opacity="0.5" stroke-linecap="round"/>

  <!-- 目 -->
  <circle cx="158" cy="152" r="8" fill="#2d263c"/>
  <circle cx="202" cy="152" r="8" fill="#2d263c"/>

  <!-- 口(小さな微笑み) -->
  <path d="M168 176 Q180 184 192 176" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <circle cx="146" cy="166" r="9" fill="#f2a0a0" opacity="0.6"/>
  <circle cx="214" cy="166" r="9" fill="#f2a0a0" opacity="0.6"/>
</svg>
