<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 頭からせなかにかけてかぶった大きな「くさの葉っぱ」のフード(先がとがった三角の葉)
  2. 葉フードの両サイドに耳のようにとがった葉のポイントが飛び出ている
  3. フードの下からのぞく大きな丸い黒目(のんびりした顔)
  4. フードの下からちらっと見えるクリーム色/黄色の胴体と、小さな2本の足
  5. 葉のてっぺんに小さな茎(ヘタ)と、中心に葉脈のスジ
  -->

  <!-- 後ろ: 左右の足(体より奥・フードの下からのぞく) -->
  <ellipse cx="152" cy="308" rx="16" ry="12" fill="#f3e2a0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="208" cy="308" rx="16" ry="12" fill="#f3e2a0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体: クリーム色の胴体(フードの下にちらっと見える丸み) -->
  <ellipse cx="180" cy="270" rx="58" ry="50" fill="#f7ecb8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 茎(ヘタ) -->
  <path d="M172,50 L180,26 L190,50 Z" fill="#4a8f34" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体: 大きな葉っぱフード(とがった横のポイント+下2つのとがり) -->
  <path d="M180,58
           L128,78
           L88,118
           L62,176
           L96,206
           L102,244
           L138,296
           L180,258
           L222,296
           L258,244
           L264,206
           L298,176
           L272,118
           L232,78
           Z"
        fill="#6fbf4a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 葉脈スジ(中心) -->
  <path d="M180,70 L180,240" fill="none" stroke="#4a8f34" stroke-width="5" stroke-linecap="round"/>
  <!-- 葉脈スジ(左右のとがりへ) -->
  <path d="M150,100 L96,206" fill="none" stroke="#4a8f34" stroke-width="4" stroke-linecap="round"/>
  <path d="M210,100 L264,206" fill="none" stroke="#4a8f34" stroke-width="4" stroke-linecap="round"/>

  <!-- 顔: 目(フードの下からのぞく) -->
  <circle cx="152" cy="188" r="24" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="208" cy="188" r="24" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="156" cy="192" r="12" fill="#2d263c"/>
  <circle cx="204" cy="192" r="12" fill="#2d263c"/>
  <circle cx="151" cy="187" r="4" fill="#ffffff"/>
  <circle cx="199" cy="187" r="4" fill="#ffffff"/>

  <!-- 口 -->
  <path d="M166,224 Q180,236 194,224" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <circle cx="138" cy="212" r="9" fill="#f7a9a0" opacity="0.7"/>
  <circle cx="222" cy="212" r="9" fill="#f7a9a0" opacity="0.7"/>
</svg>
