<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- back leaves (behind body) -->
  <path d="M110 230 C70 220 55 190 60 160 C90 175 105 200 118 225 Z" fill="#3fa85a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M250 230 C290 220 305 190 300 160 C270 175 255 200 242 225 Z" fill="#3fa85a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- main round bud body -->
  <ellipse cx="180" cy="215" rx="88" ry="82" fill="#4ec06b" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- belly shading patch -->
  <ellipse cx="180" cy="245" rx="46" ry="34" fill="#7fdc8f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- little feet leaves at bottom -->
  <path d="M140 290 C128 305 130 320 145 326 C150 312 152 300 152 290 Z" fill="#3fa85a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M220 290 C232 305 230 320 215 326 C210 312 208 300 208 290 Z" fill="#3fa85a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- closed flower bud petals wrapping the head, pointed at top -->
  <path d="M180 55 C150 70 128 100 122 135 C118 160 128 178 150 188 L165 150 C168 120 172 85 180 55 Z" fill="#f45fa0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M180 55 C210 70 232 100 238 135 C242 160 232 178 210 188 L195 150 C192 120 188 85 180 55 Z" fill="#f45fa0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M180 55 C168 90 165 125 168 160 L192 160 C195 125 192 90 180 55 Z" fill="#ff7fb8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- face area (front of bud, lighter green) -->
  <ellipse cx="180" cy="195" rx="55" ry="48" fill="#5fce78" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- eyes -->
  <circle cx="158" cy="192" r="15" fill="#fff6d8" stroke="#2d263c" stroke-width="6"/>
  <circle cx="202" cy="192" r="15" fill="#fff6d8" stroke="#2d263c" stroke-width="6"/>
  <circle cx="160" cy="195" r="6" fill="#2d263c"/>
  <circle cx="204" cy="195" r="6" fill="#2d263c"/>

  <!-- small smile mouth -->
  <path d="M168 216 Q180 226 192 216" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- blush dots -->
  <circle cx="145" cy="212" r="7" fill="#ffb2c9"/>
  <circle cx="215" cy="212" r="7" fill="#ffb2c9"/>
</svg>
