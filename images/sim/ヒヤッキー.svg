<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ヒヤッキー (Cryogonal) - 六角形の雪の結晶ポケモン -->
  
  <!-- チェーン触手(後ろ/下) -->
  <line x1="158" y1="262" x2="140" y2="310" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <line x1="202" y1="262" x2="220" y2="310" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  
  <!-- チェーン触手の輪(左) -->
  <ellipse cx="148" cy="282" rx="10" ry="7" fill="#B0E0FF" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="141" cy="298" rx="10" ry="7" fill="#B0E0FF" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="136" cy="312" rx="9" ry="6" fill="#B0E0FF" stroke="#2d263c" stroke-width="5"/>
  <!-- チェーン触手の輪(右) -->
  <ellipse cx="213" cy="282" rx="10" ry="7" fill="#B0E0FF" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="220" cy="298" rx="10" ry="7" fill="#B0E0FF" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="224" cy="312" rx="9" ry="6" fill="#B0E0FF" stroke="#2d263c" stroke-width="5"/>
  
  <!-- 六角形の体(メイン) -->
  <polygon 
    points="180,42 282,100 285,222 180,275 75,222 75,100"
    fill="#C8EEFF"
    stroke="#2d263c"
    stroke-width="8"
    stroke-linejoin="round"
  />
  
  <!-- 体の内側の六角形模様(結晶) -->
  <polygon 
    points="180,72 248,112 250,192 180,230 110,192 112,112"
    fill="#A8DCFF"
    stroke="#5599CC"
    stroke-width="3"
    stroke-linejoin="round"
    opacity="0.7"
  />
  
  <!-- 六芒星の線(結晶の腕) - 中心から6方向 -->
  <line x1="180" y1="155" x2="180" y2="75" stroke="#78BBEE" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="155" x2="180" y2="235" stroke="#78BBEE" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="155" x2="250" y2="115" stroke="#78BBEE" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="155" x2="110" y2="115" stroke="#78BBEE" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="155" x2="250" y2="195" stroke="#78BBEE" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="155" x2="110" y2="195" stroke="#78BBEE" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 六芒星の小さな六角形(中心) -->
  <polygon
    points="180,138 193,146 193,162 180,170 167,162 167,146"
    fill="#4A90D9"
    stroke="#2d263c"
    stroke-width="4"
  />

  <!-- 目(つり目・左) -->
  <ellipse cx="148" cy="138" rx="14" ry="9" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="151" cy="138" rx="7" ry="7" fill="#1a1a3a"/>
  <ellipse cx="154" cy="136" rx="2" ry="2" fill="white"/>
  
  <!-- 目(つり目・右) -->
  <ellipse cx="214" cy="138" rx="14" ry="9" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="211" cy="138" rx="7" ry="7" fill="#1a1a3a"/>
  <ellipse cx="214" cy="136" rx="2" ry="2" fill="white"/>
  
  <!-- 眉毛(つり上がり・左) -->
  <path d="M132,122 Q148,112 162,118" stroke="#2d263c" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- 眉毛(つり上がり・右) -->
  <path d="M200,118 Q214,112 228,122" stroke="#2d263c" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- 口(ギザギザでちょっとバカっぽい) -->
  <path d="M138,176 L148,170 L158,180 L168,168 L180,178 L192,166 L202,178 L213,170 L223,176"
    fill="none"
    stroke="#2d263c"
    stroke-width="6"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  
  <!-- 歯(上) -->
  <path d="M148,170 L150,162 L155,170" fill="white" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <path d="M163,168 L166,160 L171,168" fill="white" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <path d="M192,166 L195,158 L200,166" fill="white" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- ほっぺのキラキラ(結晶っぽく) -->
  <path d="M108,155 L112,148 L116,155 L112,162 Z" fill="#88CCFF" stroke="#5599CC" stroke-width="2"/>
  <path d="M244,155 L248,148 L252,155 L248,162 Z" fill="#88CCFF" stroke="#5599CC" stroke-width="2"/>
  
  <!-- 体の輝き(白いハイライト) -->
  <ellipse cx="145" cy="98" rx="22" ry="12" fill="white" opacity="0.45" transform="rotate(-20,145,98)"/>
</svg>