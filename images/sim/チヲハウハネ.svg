  <circle cx="180" cy="118" r="46" fill="#5a2a2e" stroke="#2d263c" stroke-width="9"/>
  <!-- eyes -->
  <circle cx="163" cy="112" r="13" fill="#d81e2c" stroke="#2d263c" stroke-width="6"/>
  <circle cx="199" cy="112" r="13" fill="#d81e2c" stroke="#2d263c" stroke-width="6"/>
  <circle cx="160" cy="108" r="3" fill="#2d263c"/>
  <circle cx="196" cy="108" r="3" fill="#2d263c"/>
  <!-- antennae -->
  <path d="M160 78 Q150 55 132 48" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M200 78 Q210 55 228 48" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="132" cy="48" r="7" fill="#f5ecd8" stroke="#2d263c" stroke-width="5"/>
  <circle cx="228" cy="48" r="7" fill="#f5ecd8" stroke="#2d263c" stroke-width="5"/>
  <!-- small legs -->
  <path d="M150 288 Q146 305 156 316" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M210 288 Q214 305 204 316" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M180 292 Q180 308 180 318" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <!-- wing dot pattern -->
  <circle cx="80" cy="180" r="7" fill="#c99b3f"/>
  <circle cx="104" cy="205" r="6" fill="#c99b3f"/>
  <circle cx="280" cy="180" r="7" fill="#c99b3f"/>
  <circle cx="256" cy="205" r="6" fill="#c99b3f"/>
</svg>
