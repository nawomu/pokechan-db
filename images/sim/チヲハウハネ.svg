  <path d="M60 150 Q50 140 60 130 Q72 122 80 132" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M52 190 Q40 190 44 178" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- right wing -->
  <ellipse cx="272" cy="190" rx="58" ry="66" fill="#f5ecd8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <path d="M300 150 Q310 140 300 130 Q288 122 280 132" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M308 190 Q320 190 316 178" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
