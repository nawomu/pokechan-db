  <path d="M132 148 Q140 132 152 144 Q160 128 172 142 Q180 126 188 142 Q196 128 208 144 Q220 132 228 148" fill="#f5ecd8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
