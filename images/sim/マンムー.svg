<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ足 (奥) -->
  <ellipse cx="105" cy="295" rx="32" ry="24" fill="#6b4c2a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="258" cy="298" rx="30" ry="22" fill="#6b4c2a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="181" cy="230" rx="120" ry="95" fill="#8b6340" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹の明るい部分 -->
  <ellipse cx="181" cy="248" rx="72" ry="55" fill="#c49a6c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 前足 (左) -->
  <rect x="72" y="278" width="52" height="46" rx="18" ry="18" fill="#7a5530" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 前足 (右) -->
  <rect x="236" y="281" width="50" height="44" rx="18" ry="18" fill="#7a5530" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ひづめ(前足左) -->
  <ellipse cx="98" cy="324" rx="26" ry="10" fill="#3d2910" stroke="#2d263c" stroke-width="5"/>
  <!-- ひづめ(前足右) -->
  <ellipse cx="261" cy="326" rx="25" ry="10" fill="#3d2910" stroke="#2d263c" stroke-width="5"/>
  <!-- ひづめ(後ろ足左) -->
  <ellipse cx="105" cy="317" rx="28" ry="9" fill="#3d2910" stroke="#2d263c" stroke-width="4"/>
  <!-- ひづめ(後ろ足右) -->
  <ellipse cx="258" cy="318" rx="27" ry="9" fill="#3d2910" stroke="#2d263c" stroke-width="4"/>

  <!-- 頭 -->
  <ellipse cx="181" cy="145" rx="85" ry="75" fill="#8b6340" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の毛もじゃ部分(暗め) -->
  <ellipse cx="181" cy="108" rx="60" ry="30" fill="#5c3d1e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 角 左 -->
  <path d="M155 98 Q140 60 148 32 Q154 50 162 72 Z" fill="#c8a05a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 角 右 -->
  <path d="M207 96 Q218 56 212 28 Q206 48 198 70 Z" fill="#c8a05a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 耳っぽい小さな突起 -->
  <ellipse cx="108" cy="120" rx="18" ry="14" fill="#7a5530" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="254" cy="118" rx="18" ry="14" fill="#7a5530" stroke="#2d263c" stroke-width="6"/>

  <!-- 鼻(大きめ丸鼻・豚鼻) -->
  <ellipse cx="181" cy="178" rx="34" ry="26" fill="#a87050" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 鼻の穴 左 -->
  <ellipse cx="169" cy="176" rx="9" ry="8" fill="#3d2910"/>
  <!-- 鼻の穴 右 -->
  <ellipse cx="193" cy="176" rx="9" ry="8" fill="#3d2910"/>

  <!-- 目 左 (少しアホっぽくずらす) -->
  <ellipse cx="150" cy="148" rx="13" ry="14" fill="#f5f0e0" stroke="#2d263c" stroke-width="5"/>
  <circle cx="153" cy="150" r="7" fill="#1a1008"/>
  <circle cx="156" cy="147" r="2.5" fill="#ffffff"/>

  <!-- 目 右 -->
  <ellipse cx="214" cy="146" rx="13" ry="14" fill="#f5f0e0" stroke="#2d263c" stroke-width="5"/>
  <circle cx="217" cy="148" r="7" fill="#1a1008"/>
  <circle cx="220" cy="145" r="2.5" fill="#ffffff"/>

  <!-- 牙 左(大きく湾曲) -->
  <path d="M148 188 Q108 210 88 248 Q98 252 112 250 Q126 220 158 200 Z" fill="#f2ede0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 牙 右(大きく湾曲) -->
  <path d="M214 188 Q254 210 274 248 Q264 252 250 250 Q236 220 204 200 Z" fill="#f2ede0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- しっぽ(小さいまるっこい) -->
  <ellipse cx="295" cy="222" rx="18" ry="14" fill="#7a5530" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ほっぺの赤み(左) -->
  <ellipse cx="123" cy="168" rx="14" ry="9" fill="#d4826a" opacity="0.6"/>
  <!-- ほっぺの赤み(右) -->
  <ellipse cx="239" cy="166" rx="14" ry="9" fill="#d4826a" opacity="0.6"/>
</svg>