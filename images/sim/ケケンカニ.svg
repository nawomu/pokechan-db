  <!-- 甲羅の筋(模様) -->
  <path d="M 180 82 Q 180 150 180 220" fill="none" stroke="#c03a10" stroke-width="3" stroke-linecap="round"/>
  <path d="M 148 90 Q 145 155 148 210" fill="none" stroke="#c03a10" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 212 90 Q 215 155 212 210" fill="none" stroke="#c03a10" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 甲羅の額の出っ張り -->
  <path d="M 162 82 Q 180 64 198 82" fill="#e84c1a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腹(クリーム色) -->
