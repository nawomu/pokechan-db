<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ脚(左奥) -->
  <line x1="110" y1="230" x2="60" y2="285" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <line x1="100" y1="245" x2="52" y2="305" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <line x1="95" y1="262" x2="55" y2="325" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- 後ろ脚(右奥) -->
  <line x1="248" y1="230" x2="300" y2="285" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <line x1="258" y1="245" x2="308" y2="305" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <line x1="263" y1="262" x2="305" y2="325" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 左ハサミ(大きい方) -->
