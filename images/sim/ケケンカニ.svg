  <path d="M 52 105 L 60 95 L 68 105 L 76 90 L 84 103" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 右ハサミ(少し小さめ・非対称) -->
