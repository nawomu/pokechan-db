  <!-- 腹の縞 -->
  <path d="M 148 198 Q 180 194 212 198" fill="none" stroke="#e6a84a" stroke-width="3" stroke-linecap="round"/>
  <path d="M 145 210 Q 180 207 215 210" fill="none" stroke="#e6a84a" stroke-width="3" stroke-linecap="round"/>

  <!-- 目(左) -->
  <circle cx="157" cy="145" r="16" fill="white" stroke="#2d263c" stroke-width="6"/>
  <circle cx="160" cy="143" r="9" fill="#1a1a1a"/>
  <circle cx="163" cy="140" r="3" fill="white"/>

  <!-- 目(右) -->
  <circle cx="203" cy="145" r="16" fill="white" stroke="#2d263c" stroke-width="6"/>
  <circle cx="200" cy="143" r="9" fill="#1a1a1a"/>
  <circle cx="203" cy="140" r="3" fill="white"/>

  <!-- 眉毛(吊り目気味に) -->
  <path d="M 144 132 Q 157 126 168 130" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M 192 130 Q 203 126 216 132" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 口(広くて威勢いい) -->
  <path d="M 162 168 Q 180 180 198 168" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺ(赤みのオレンジ) -->
  <ellipse cx="148" cy="162" rx="10" ry="7" fill="#ff7744" opacity="0.55"/>
  <ellipse cx="212" cy="162" rx="10" ry="7" fill="#ff7744" opacity="0.55"/>

  <!-- 触角(ちょこんと) -->
  <line x1="168" y1="80" x2="158" y2="58" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <circle cx="157" cy="55" r="5" fill="#e84c1a" stroke="#2d263c" stroke-width="4"/>
  <line x1="192" y1="80" x2="202" y2="58" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <circle cx="203" cy="55" r="5" fill="#e84c1a" stroke="#2d263c" stroke-width="4"/>
</svg>