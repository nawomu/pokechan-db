<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" stroke="#2d263c" stroke-linejoin="round" stroke-linecap="round">

  <!-- 足元の影 -->
  <ellipse cx="180" cy="330" rx="85" ry="18" fill="#00000022" stroke="none"/>

  <!-- 体(黒い熊体型) -->
  <ellipse cx="180" cy="225" rx="80" ry="75" fill="#2a2a2a" stroke="#2d263c" stroke-width="7"/>

  <!-- 腹(白い腹) -->
  <ellipse cx="180" cy="240" rx="52" ry="55" fill="#f5f5f5" stroke="#2d263c" stroke-width="4"/>

  <!-- 左腕 -->
  <ellipse cx="90" cy="230" rx="28" ry="20" fill="#2a2a2a" stroke="#2d263c" stroke-width="7" transform="rotate(-30 90 230)"/>
  <ellipse cx="62" cy="250" rx="24" ry="16" fill="#2a2a2a" stroke="#2d263c" stroke-width="7" transform="rotate(-40 62 250)"/>
  <!-- 左腕の紫オーラ -->
  <ellipse cx="60" cy="255" rx="18" ry="10" fill="#7b3fbe" stroke="none" opacity="0.55"/>

  <!-- 右腕 -->
  <ellipse cx="270" cy="230" rx="28" ry="20" fill="#2a2a2a" stroke="#2d263c" stroke-width="7" transform="rotate(30 270 230)"/>
  <ellipse cx="298" cy="250" rx="24" ry="16" fill="#2a2a2a" stroke="#2d263c" stroke-width="7" transform="rotate(40 298 250)"/>
  <!-- 右腕の紫オーラ -->
  <ellipse cx="300" cy="255" rx="18" ry="10" fill="#7b3fbe" stroke="none" opacity="0.55"/>

  <!-- 左足 -->
  <ellipse cx="145" cy="300" rx="24" ry="20" fill="#2a2a2a" stroke="#2d263c" stroke-width="7"/>
  <!-- 右足 -->
  <ellipse cx="215" cy="300" rx="24" ry="20" fill="#2a2a2a" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭(大きな丸い頭) -->
  <ellipse cx="180" cy="135" rx="68" ry="62" fill="#2a2a2a" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳(左) -->
  <ellipse cx="126" cy="83" rx="18" ry="18" fill="#2a2a2a" stroke="#2d263c" stroke-width="6"/>
  <!-- 耳(右) -->
  <ellipse cx="234" cy="83" rx="18" ry="18" fill="#2a2a2a" stroke="#2d263c" stroke-width="6"/>

  <!-- パンダ目パッチ(左) -->
  <ellipse cx="152" cy="135" rx="25" ry="22" fill="#1a1a1a" stroke="#2d263c" stroke-width="3"/>
  <!-- パンダ目パッチ(右) -->
  <ellipse cx="208" cy="135" rx="25" ry="22" fill="#1a1a1a" stroke="#2d263c" stroke-width="3"/>

  <!-- 目(左): 白目 -->
  <ellipse cx="152" cy="133" rx="13" ry="13" fill="white" stroke="#2d263c" stroke-width="3"/>
  <!-- 目(左): 黒い瞳 -->
  <ellipse cx="154" cy="134" rx="7" ry="7" fill="#1a1a1a" stroke="none"/>
  <!-- 目(左): 白ハイライト -->
  <ellipse cx="158" cy="130" rx="3" ry="3" fill="white" stroke="none"/>

  <!-- 目(右): 白目 -->
  <ellipse cx="208" cy="133" rx="13" ry="13" fill="white" stroke="#2d263c" stroke-width="3"/>
  <!-- 目(右): 黒い瞳 -->
  <ellipse cx="210" cy="134" rx="7" ry="7" fill="#1a1a1a" stroke="none"/>
  <!-- 目(右): 白ハイライト -->
  <ellipse cx="214" cy="130" rx="3" ry="3" fill="white" stroke="none"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="152" rx="10" ry="7" fill="#1a1a1a" stroke="#2d263c" stroke-width="3"/>

  <!-- 口に咥えた葉っぱ -->
  <path d="M170,162 Q155,155 130,148 Q140,165 155,168 Q165,170 170,162 Z" fill="#40a040" stroke="#2d263c" stroke-width="3"/>
  <path d="M130,148 Q120,143 105,150 Q118,162 130,158 Q140,155 130,148 Z" fill="#40a040" stroke="#2d263c" stroke-width="3"/>
  <!-- 葉の葉脈 -->
  <line x1="170" y1="162" x2="108" y2="150" stroke="#2a7a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="150" y1="157" x2="148" y2="168" stroke="#2a7a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- メガ特有: 体の筋肉質な線 -->
  <path d="M160,210 Q180,200 200,210" fill="none" stroke="#444" stroke-width="3"/>
  <path d="M155,225 Q180,215 205,225" fill="none" stroke="#444" stroke-width="3"/>

</svg>
