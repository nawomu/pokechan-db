<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: ①白い毛並みの直立した体(氷タイプ) ②頭の後ろに炎のように逆立つ水色のたてがみ ③赤い目+濃い眉(いかつい顔) ④口から突き出た白い牙(タスク)左右2本 ⑤手首・足首の水色の毛タフト ⑥お腹のクリーム色パッチ -->

  <!-- 水色の炎状たてがみ(頭の後ろ・先に描いて頭の下に敷く) -->
  <path d="M118 92 Q96 50 118 22 Q132 46 140 30 Q150 8 172 20 Q176 42 188 24 Q206 6 224 26 Q222 48 238 34 Q256 20 264 46 Q268 70 246 92 Q210 66 170 78 Q142 84 118 92 Z" fill="#6fb9dc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足(下のスタブ) -->
  <ellipse cx="140" cy="308" rx="30" ry="26" fill="#f2efe6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="222" cy="308" rx="30" ry="26" fill="#f2efe6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 足首の水色タフト -->
  <ellipse cx="140" cy="286" rx="20" ry="10" fill="#6fb9dc" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="222" cy="286" rx="20" ry="10" fill="#6fb9dc" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 体(直立した丸い胴) -->
  <ellipse cx="181" cy="232" rx="88" ry="82" fill="#f2efe6" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- お腹のクリーム色パッチ -->
  <ellipse cx="181" cy="252" rx="46" ry="50" fill="#faf3df" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 腕(体の横のスタブ) -->
  <ellipse cx="90" cy="216" rx="26" ry="34" fill="#f2efe6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="272" cy="216" rx="26" ry="34" fill="#f2efe6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 手首の水色タフト -->
  <ellipse cx="86" cy="242" rx="16" ry="12" fill="#6fb9dc" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="276" cy="242" rx="16" ry="12" fill="#6fb9dc" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頭(白い丸顔) -->
  <ellipse cx="180" cy="120" rx="76" ry="70" fill="#f2efe6" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 頬の赤み -->
  <ellipse cx="122" cy="140" rx="14" ry="9" fill="#ff9a86"/>
  <ellipse cx="238" cy="140" rx="14" ry="9" fill="#ff9a86"/>

  <!-- 濃い眉(いかつい顔) -->
  <path d="M126 96 Q150 82 172 96" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <path d="M188 96 Q210 82 234 96" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>

  <!-- 目(白目) -->
  <ellipse cx="150" cy="118" rx="15" ry="17" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="210" cy="118" rx="15" ry="17" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 瞳(赤) -->
  <ellipse cx="150" cy="123" rx="8" ry="10" fill="#d8342a"/>
  <ellipse cx="210" cy="123" rx="8" ry="10" fill="#d8342a"/>
  <!-- 瞳のハイライト -->
  <ellipse cx="146" cy="117" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="206" cy="117" rx="3" ry="3.5" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="148" rx="7" ry="5" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M158 162 Q180 172 202 162" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 牙(タスク・左右) -->
  <path d="M156 166 Q150 184 162 190 Q168 176 166 164 Z" fill="#fffdf6" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M204 166 Q210 184 198 190 Q192 176 194 164 Z" fill="#fffdf6" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
</svg>
