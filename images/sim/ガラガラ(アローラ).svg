<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ガラガラ(アローラ)の特徴:
    1. 頭にかぶった相棒の頭骨(白っぽい・ギザギザの下端・目の穴が青く光る)
    2. ずんぐりした二足歩行の体(黒っぽい灰紫)・お腹に水色の炎もようの縦線
    3. 片手に持った白い骨のクラブ・先端が青白い炎で燃えている
    4. 短くて先が丸いしっぽ(黒っぽい灰紫)
    5. 三本指の足(黒)・短い腕
  -->

  <!-- しっぽ(体の後ろ) -->
  <path d="M135 250 Q88 268 96 308 Q116 288 148 268 Z" fill="#4a4356" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足(奥) -->
  <ellipse cx="150" cy="308" rx="30" ry="22" fill="#3a3446" stroke="#2d263c" stroke-width="7"/>
  <path d="M128 322 Q132 336 140 326" fill="#3a3446" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M150 326 Q152 340 160 328" fill="#3a3446" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 足(手前) -->
  <ellipse cx="228" cy="308" rx="30" ry="22" fill="#463f52" stroke="#2d263c" stroke-width="7"/>
  <path d="M206 322 Q210 337 219 326" fill="#463f52" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M230 327 Q233 341 241 329" fill="#463f52" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 体(胴体) -->
  <path d="M118 195 Q95 245 128 296 Q180 328 250 296 Q283 245 258 195 Q228 150 188 150 Q148 150 118 195 Z"
        fill="#4a4356" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の炎もよう(水色の縦じま) -->
  <path d="M170 210 Q160 240 172 270 Q178 290 188 300 Q198 290 204 270 Q216 240 206 210 Q188 235 170 210 Z"
        fill="#8fd8f0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左腕(奥) -->
  <ellipse cx="118" cy="228" rx="17" ry="30" fill="#3a3446" stroke="#2d263c" stroke-width="7" transform="rotate(-18 118 228)"/>

  <!-- 骨のクラブ(棍棒・先端が青い炎) -->
  <g transform="rotate(32 272 190)">
    <path d="M264 175 Q264 160 272 160 Q280 160 280 175 L280 225 Q280 240 272 240 Q264 240 264 225 Z"
          fill="#f7f2e2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
    <circle cx="272" cy="242" r="16" fill="#f7f2e2" stroke="#2d263c" stroke-width="7"/>
    <path d="M256 160 Q260 138 250 120 Q268 128 272 108 Q280 128 292 122 Q286 140 292 160 Q280 148 272 160 Q264 148 256 160 Z"
          fill="#a8e6ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- 右腕(手前・骨を握る) -->
  <ellipse cx="262" cy="222" rx="18" ry="32" fill="#463f52" stroke="#2d263c" stroke-width="7" transform="rotate(28 262 222)"/>

  <!-- 頭にかぶった頭骨マスク -->
  <path d="M138 152 Q136 88 188 82 Q240 88 238 152 L228 168 L216 150 L204 170 L192 150 L180 170 L168 150 L156 168 Z"
        fill="#ece8e0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭骨の小さな突起(左右) -->
  <path d="M144 118 Q128 108 132 92" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M232 118 Q248 108 244 92" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 目の穴(青く光る) -->
  <circle cx="168" cy="126" r="13" fill="#2d263c"/>
  <circle cx="208" cy="126" r="13" fill="#2d263c"/>
  <circle cx="168" cy="126" r="6" fill="#7fd6ff"/>
  <circle cx="208" cy="126" r="6" fill="#7fd6ff"/>

  <!-- 頭骨の中央の縦筋 -->
  <path d="M188 95 L188 116" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
