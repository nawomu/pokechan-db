<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- kicking leg (raised, capoeira kick pose) -->
  <ellipse cx="130.5" cy="210" rx="17" ry="35" transform="rotate(110 130.5 210)" fill="#D79B5C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="98" cy="198" r="16" fill="#D79B5C" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="78" cy="163" rx="15" ry="41" transform="rotate(150 78 163)" fill="#D79B5C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="56" cy="122" rx="19" ry="14" transform="rotate(150 56 122)" fill="#8E6BB5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- standing leg -->
  <ellipse cx="203.5" cy="272.5" rx="18" ry="48" transform="rotate(-4 203.5 272.5)" fill="#D79B5C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="208" cy="322" rx="20" ry="14" transform="rotate(-5 208 322)" fill="#8E6BB5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- arms -->
  <ellipse cx="120" cy="181" rx="14" ry="37" transform="rotate(51 120 181)" fill="#D79B5C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="92" cy="206" r="18" fill="#8E6BB5" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="241" cy="180" rx="14" ry="37" transform="rotate(-53 241 180)" fill="#D79B5C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="270" cy="204" r="18" fill="#8E6BB5" stroke="#2d263c" stroke-width="7"/>

  <!-- torso -->
  <path d="M140,148 Q180,138 220,148 C240,176 234,206 210,231 Q180,242 150,231 C126,206 120,176 140,148 Z"
        fill="#D79B5C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="180" cy="192" rx="27" ry="33" fill="#F2E0B8"/>

  <!-- head -->
  <ellipse cx="180" cy="105" rx="50" ry="46" fill="#D79B5C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- spinning-top swirl hair -->
  <path d="M152,66 Q180,18 208,66 Q180,82 152,66 Z" fill="#F2E0B8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M165,58 Q180,44 176,32 Q168,40 173,50" fill="none" stroke="#C9884C" stroke-width="4" stroke-linecap="round"/>

  <!-- face -->
  <ellipse cx="163" cy="104" rx="6" ry="9" fill="#2d263c"/>
  <ellipse cx="197" cy="104" rx="6" ry="9" fill="#2d263c"/>
  <path d="M154,90 L172,86" stroke="#2d263c" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M188,86 L206,90" stroke="#2d263c" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M167,123 Q180,133 193,123" stroke="#2d263c" stroke-width="5" stroke-linecap="round" fill="none"/>
</svg>
