<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.黄色の丸いポテ腹の体 2.腹に青黒の怖い顔もよう(丸目+ジグザグ口) 3.頭に小さな丸目とちいさい口 4.オレンジのほっぺ電気ぶくろ 5.水かき付きの短い手足でカエル/オタマ体型 -->

  <!-- 後ろ足(奥) -->
  <ellipse cx="120" cy="290" rx="34" ry="24" fill="#f4c430" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="240" cy="290" rx="34" ry="24" fill="#f4c430" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 大きな丸い胴体(ポテ腹) -->
  <ellipse cx="180" cy="205" rx="118" ry="105" fill="#ffd23f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腕(体の横から) -->
  <ellipse cx="66" cy="200" rx="26" ry="40" fill="#f4c430" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="294" cy="200" rx="26" ry="40" fill="#f4c430" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 手の水かき指 -->
  <path d="M50 232 q-6 14 -2 22 M64 238 q0 14 4 20 M78 232 q6 14 4 22" stroke="#2d263c" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M310 232 q6 14 2 22 M296 238 q0 14 -4 20 M282 232 q-6 14 -4 22" stroke="#2d263c" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- 足の水かき指 -->
  <path d="M100 306 q-6 12 -2 18 M120 310 q0 12 2 18 M140 306 q6 12 2 18" stroke="#2d263c" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M220 306 q-6 12 -2 18 M240 310 q0 12 2 18 M260 306 q6 12 2 18" stroke="#2d263c" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- おなかのベルトもよう(帯) -->
  <path d="M78 210 q102 46 204 0 l0 30 q-102 46 -204 0 z" fill="#2b3a67" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- おなかの怖い顔もよう -->
  <circle cx="150" cy="185" r="15" fill="#2b3a67" stroke="#2d263c" stroke-width="4"/>
  <circle cx="210" cy="185" r="15" fill="#2b3a67" stroke="#2d263c" stroke-width="4"/>
  <circle cx="150" cy="185" r="5" fill="#fff5cc"/>
  <circle cx="210" cy="185" r="5" fill="#fff5cc"/>
  <path d="M140 245 l10 -10 l10 10 l10 -10 l10 10 l10 -10 l10 10" stroke="#2d263c" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 頭のてっぺん -->
  <ellipse cx="180" cy="118" rx="74" ry="52" fill="#ffd23f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ほっぺの電気ぶくろ(オレンジ) -->
  <circle cx="112" cy="140" r="26" fill="#ff8c1a" stroke="#2d263c" stroke-width="6"/>
  <circle cx="248" cy="140" r="26" fill="#ff8c1a" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭の小さな丸目 -->
  <circle cx="152" cy="108" r="13" fill="#2d263c"/>
  <circle cx="208" cy="108" r="13" fill="#2d263c"/>
  <circle cx="156" cy="103" r="4" fill="#fff"/>
  <circle cx="212" cy="103" r="4" fill="#fff"/>

  <!-- 小さな口 -->
  <path d="M164 140 q16 12 32 0" stroke="#2d263c" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- 頭のギザギザ模様 -->
  <path d="M130 78 l10 18 l10 -18 l10 18 l10 -18 l10 18 l10 -18" stroke="#2d263c" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
