<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 長いしっぽ羽(奥・シアン) -->
  <path d="M225 240 Q300 250 330 210 Q345 188 330 178 Q315 172 308 192 Q298 216 260 222 Q235 226 220 224Z" fill="#4fc9c9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 長いしっぽ羽(手前・マゼンタ) -->
  <path d="M220 260 Q295 285 320 250 Q332 232 318 224 Q305 219 297 236 Q286 258 248 258 Q228 258 216 250Z" fill="#e84fa0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- しっぽ羽先端の丸 -->
  <circle cx="326" cy="196" r="9" fill="#2d9090" stroke="#2d263c" stroke-width="4"/>
  <circle cx="317" cy="238" r="9" fill="#c02f78" stroke="#2d263c" stroke-width="4"/>

  <!-- 翼(左) -->
  <path d="M108 200 Q60 205 48 240 Q42 262 68 264 Q100 266 118 240 Q126 222 118 208Z" fill="#2a3a7a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M62 232 Q80 230 100 222" fill="none" stroke="#4fc9c9" stroke-width="6" stroke-linecap="round"/>

  <!-- 体(お腹) -->
  <ellipse cx="175" cy="230" rx="70" ry="78" fill="#2a3a7a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="175" cy="250" rx="40" ry="48" fill="#f4e6c8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 首の金の首輪 -->
  <ellipse cx="175" cy="170" rx="46" ry="18" fill="#e8b830" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 首輪の赤い宝石 -->
  <path d="M163 178 L175 200 L187 178Z" fill="#d8324a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="175" cy="186" r="6" fill="#f06070"/>

  <!-- 頭 -->
  <circle cx="175" cy="120" r="58" fill="#2a3a7a" stroke="#2d263c" stroke-width="8"/>
  <!-- ピンクの顔マスク -->
  <ellipse cx="175" cy="128" rx="38" ry="30" fill="#f070b0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頭上ピンク羽冠(左右対称にトサカ状) -->
  <path d="M140 78 Q120 40 95 34 Q100 62 118 82Z" fill="#f070b0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M165 66 Q158 22 138 8 Q136 42 150 72Z" fill="#f070b0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M195 62 Q205 18 228 6 Q226 40 210 68Z" fill="#f070b0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M215 78 Q238 42 262 38 Q254 66 234 84Z" fill="#f070b0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 羽冠のシアン差し色 -->
  <path d="M150 66 Q147 34 138 12" fill="none" stroke="#4fc9c9" stroke-width="5" stroke-linecap="round"/>
  <path d="M203 60 Q210 28 224 10" fill="none" stroke="#4fc9c9" stroke-width="5" stroke-linecap="round"/>

  <!-- 目(左右とも黄色い瞳) -->
  <circle cx="155" cy="120" r="12" fill="#f8e850" stroke="#2d263c" stroke-width="5"/>
  <circle cx="156" cy="121" r="6" fill="#1a1a2e"/>
  <circle cx="195" cy="120" r="12" fill="#f8e850" stroke="#2d263c" stroke-width="5"/>
  <circle cx="196" cy="121" r="6" fill="#1a1a2e"/>

  <!-- くちばし -->
  <path d="M164 138 Q175 155 186 138 Q178 132 175 132 Q172 132 164 138Z" fill="#f0902a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 翼(右・手前) -->
  <path d="M242 200 Q290 202 306 236 Q314 258 288 262 Q256 266 236 240 Q228 222 236 208Z" fill="#2a3a7a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M288 230 Q270 230 250 222" fill="none" stroke="#e84fa0" stroke-width="6" stroke-linecap="round"/>

  <!-- 足(左) -->
  <path d="M155 305 L150 335" fill="none" stroke="#f0902a" stroke-width="9" stroke-linecap="round"/>
  <path d="M150 335 Q142 342 136 340" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M150 335 Q152 344 150 348" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M150 335 Q160 342 165 338" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 足(右) -->
  <path d="M196 306 L202 336" fill="none" stroke="#f0902a" stroke-width="9" stroke-linecap="round"/>
  <path d="M202 336 Q194 344 188 342" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M202 336 Q204 346 202 350" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M202 336 Q212 344 217 340" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
