  <path d="M152 155 Q163 145 174 155 Q163 162 152 155Z" fill="#e8482c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M208 155 Q197 145 186 155 Q197 162 208 155Z" fill="#e8482c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 口もと小さな線 -->
  <path d="M172 178 Q180 182 188 178" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
