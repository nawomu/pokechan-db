  <ellipse cx="180" cy="228" rx="34" ry="34" fill="#f4c542" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭(とがった三角シルエット・忍者っぽい) -->
  <path d="M180 70 L230 165 Q230 195 180 200 Q130 195 130 165 Z" fill="#3a6bd6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
