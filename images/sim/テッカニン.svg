  <rect x="202" y="255" width="18" height="45" rx="9" fill="#3a6bd6" stroke="#2d263c" stroke-width="6"/>

  <!-- 腕(細い) -->
  <path d="M120 190 Q90 210 85 245" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M240 190 Q270 210 275 245" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <circle cx="83" cy="248" r="10" fill="#3a6bd6" stroke="#2d263c" stroke-width="6"/>
  <circle cx="277" cy="248" r="10" fill="#3a6bd6" stroke="#2d263c" stroke-width="6"/>

  <!-- 胴体 -->
  <ellipse cx="180" cy="215" rx="62" ry="55" fill="#3a6bd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
