<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail behind body -->
  <ellipse cx="270" cy="240" rx="38" ry="22" fill="#1e2d5a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="292" cy="255" rx="22" ry="14" fill="#2b3a6e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- back leg left -->
  <rect x="118" y="265" width="32" height="50" rx="14" fill="#2b3a6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="130" cy="316" rx="22" ry="11" fill="#1e2d5a" stroke="#2d263c" stroke-width="6"/>

  <!-- back leg right -->
  <rect x="202" y="265" width="32" height="50" rx="14" fill="#2b3a6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="218" cy="316" rx="22" ry="11" fill="#1e2d5a" stroke="#2d263c" stroke-width="6"/>

  <!-- body -->
  <ellipse cx="180" cy="230" rx="78" ry="85" fill="#2b3a6e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- belly -->
  <ellipse cx="180" cy="248" rx="48" ry="58" fill="#c8cede" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- belt / waist band -->
  <rect x="138" y="258" width="84" height="18" rx="8" fill="#e8e0c8" stroke="#2d263c" stroke-width="5"/>
  <rect x="168" y="256" width="24" height="22" rx="5" fill="#d4c89a" stroke="#2d263c" stroke-width="4"/>

  <!-- shoulder shell plate left -->
  <ellipse cx="108" cy="198" rx="28" ry="20" fill="#e8e8f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-18 108 198)"/>

  <!-- shoulder shell plate right -->
  <ellipse cx="252" cy="198" rx="28" ry="20" fill="#e8e8f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(18 252 198)"/>

  <!-- left arm -->
  <rect x="82" y="200" width="34" height="60" rx="14" fill="#2b3a6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- shell sword on left arm -->
  <ellipse cx="99" cy="252" rx="18" ry="12" fill="#f0ece0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="92" y="260" width="14" height="38" rx="5" fill="#ddd8c0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- blade tip -->
  <polygon points="92,298 106,298 99,326" fill="#c8c4b0" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- right arm -->
  <rect x="244" y="200" width="34" height="60" rx="14" fill="#2b3a6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- shell plate on right arm -->
  <ellipse cx="261" cy="252" rx="18" ry="12" fill="#f0ece0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- neck -->
  <rect x="162" y="138" width="36" height="28" rx="10" fill="#2b3a6e" stroke="#2d263c" stroke-width="7"/>

  <!-- head -->
  <ellipse cx="180" cy="118" rx="58" ry="52" fill="#2b3a6e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- face plate / forehead armor -->
  <ellipse cx="180" cy="100" rx="40" ry="24" fill="#e0ddd0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- horn -->
  <polygon points="164,90 196,90 180,42" fill="#f5f0e0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- left ear -->
  <polygon points="130,82 118,52 148,74" fill="#2b3a6e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- left ear inner -->
  <polygon points="130,80 122,60 142,74" fill="#4a5a8e" stroke="none"/>

  <!-- right ear -->
  <polygon points="230,82 242,52 212,74" fill="#2b3a6e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- right ear inner -->
  <polygon points="230,80 238,60 218,74" fill="#4a5a8e" stroke="none"/>

  <!-- left eye -->
  <ellipse cx="155" cy="118" rx="14" ry="13" fill="#cc2200" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="155" cy="118" rx="7" ry="8" fill="#880000"/>
  <ellipse cx="152" cy="115" rx="3" ry="3" fill="#ffffff"/>

  <!-- right eye -->
  <ellipse cx="205" cy="118" rx="14" ry="13" fill="#cc2200" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="205" cy="118" rx="7" ry="8" fill="#880000"/>
  <ellipse cx="202" cy="115" rx="3" ry="3" fill="#ffffff"/>

  <!-- nose -->
  <ellipse cx="180" cy="133" rx="10" ry="7" fill="#7a4e38" stroke="#2d263c" stroke-width="4"/>

  <!-- whiskers left long -->
  <line x1="152" y1="130" x2="88" y2="118" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="152" y1="136" x2="86" y2="132" stroke="#e8e8e8" stroke-width="4" stroke-linecap="round"/>

  <!-- whiskers right long -->
  <line x1="208" y1="130" x2="272" y2="118" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="208" y1="136" x2="274" y2="132" stroke="#e8e8e8" stroke-width="4" stroke-linecap="round"/>

  <!-- mouth small grumpy line -->
  <path d="M172 144 Q180 150 188 144" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>