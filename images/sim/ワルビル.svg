<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail -->
  <path d="M 95,235 Q 55,215 30,232 Q 12,246 22,262 Q 32,278 60,272 Q 82,266 100,250 Z" fill="#d9a441" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- back ridges on tail -->
  <path d="M 55,222 L 62,210 L 70,224 Z" fill="#c48a2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 35,236 L 41,225 L 49,238 Z" fill="#c48a2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- back legs -->
  <ellipse cx="128" cy="278" rx="22" ry="30" fill="#d9a441" stroke="#2d263c" stroke-width="7"/>
  <path d="M 112,300 L 108,312" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M 128,304 L 128,316" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M 144,300 L 148,312" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- body -->
  <ellipse cx="195" cy="238" rx="105" ry="58" fill="#d9a441" stroke="#2d263c" stroke-width="8"/>

  <!-- back ridges on body -->
  <path d="M 150,182 L 158,166 L 168,184 Z" fill="#c48a2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 185,175 L 194,158 L 204,177 Z" fill="#c48a2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 222,178 L 230,163 L 240,180 Z" fill="#c48a2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- belly patch -->
  <ellipse cx="190" cy="262" rx="72" ry="26" fill="#f5e6c0" stroke="#2d263c" stroke-width="5"/>

  <!-- body spots -->
  <ellipse cx="160" cy="225" rx="9" ry="6" fill="#c48a2e"/>
  <ellipse cx="210" cy="215" rx="9" ry="6" fill="#c48a2e"/>
  <ellipse cx="235" cy="240" rx="8" ry="6" fill="#c48a2e"/>

  <!-- front legs -->
  <ellipse cx="248" cy="282" rx="23" ry="31" fill="#d9a441" stroke="#2d263c" stroke-width="7"/>
  <path d="M 232,305 L 228,317" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M 248,309 L 248,321" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M 264,305 L 268,317" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- head -->
  <ellipse cx="280" cy="212" rx="58" ry="38" fill="#d9a441" stroke="#2d263c" stroke-width="8"/>

  <!-- snout -->
  <path d="M 325,198 Q 350,196 342,222 Q 336,232 320,230 Q 318,212 325,198 Z" fill="#d9a441" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- mouth line with teeth -->
  <path d="M 250,232 Q 285,244 330,224" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M 268,235 L 272,246 L 278,236" fill="#ffffff" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 296,240 L 300,251 L 306,239" fill="#ffffff" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- nostril -->
  <circle cx="336" cy="207" r="4" fill="#2d263c"/>

  <!-- dark eye band (sunglasses mark) -->
  <path d="M 246,182 Q 285,168 322,186 Q 324,202 314,206 Q 280,190 250,200 Z" fill="#241f2e" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- eyes -->
  <circle cx="262" cy="193" r="6" fill="#c23b3b" stroke="#2d263c" stroke-width="3"/>
  <circle cx="298" cy="189" r="6" fill="#c23b3b" stroke="#2d263c" stroke-width="3"/>
</svg>
