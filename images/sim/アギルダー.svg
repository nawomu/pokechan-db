<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- legs (small stubs under body) -->
  <ellipse cx="150" cy="298" rx="20" ry="15" fill="#3d5a99" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="212" cy="298" rx="20" ry="15" fill="#3d5a99" stroke="#2d263c" stroke-width="7"/>

  <!-- lance A: shoulder(left) to tip(bottom-right), crossing behind body edge -->
  <path d="M92 142 L112 128 L282 282 L262 300 Z" fill="#e8c840" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M262 300 L288 288 L300 305 L272 316 Z" fill="#cfd3dc" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- lance B: shoulder(right) to tip(bottom-left), crossing -->
  <path d="M268 142 L248 128 L78 282 L98 300 Z" fill="#e8c840" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M98 300 L72 288 L60 305 L88 316 Z" fill="#cfd3dc" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- gems on crossing lances -->
  <circle cx="170" cy="205" r="11" fill="#e0432f" stroke="#2d263c" stroke-width="6"/>
  <circle cx="196" cy="222" r="11" fill="#e0432f" stroke="#2d263c" stroke-width="6"/>

  <!-- body torso -->
  <path d="M122 160 Q80 192 90 236 Q102 276 181 281 Q260 276 271 236 Q281 192 239 160 Q210 136 181 139 Q151 136 122 160 Z"
        fill="#3d5a99" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- chest plate -->
  <path d="M142 176 Q130 214 150 246 Q180 262 211 246 Q231 214 219 176 Q200 156 181 159 Q161 156 142 176 Z"
        fill="#eee6d2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- shoulder pauldron left -->
  <path d="M74 150 L98 128 L114 154 L131 143 L122 176 L86 182 Z" fill="#d8a83a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- shoulder pauldron right -->
  <path d="M287 150 L263 128 L247 154 L230 143 L239 176 L275 182 Z" fill="#d8a83a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- neck spikes -->
  <path d="M158 146 L166 124 L174 146 Z" fill="#e8c840" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M172 148 L181 122 L190 148 Z" fill="#e8c840" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M188 146 L196 124 L204 146 Z" fill="#e8c840" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- head -->
  <circle cx="181" cy="96" r="55" fill="#3d5a99" stroke="#2d263c" stroke-width="8"/>

  <!-- head top spike -->
  <path d="M170 46 L181 20 L192 46 Z" fill="#2c3f74" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- visor band -->
  <path d="M136 83 Q181 69 226 83 Q229 98 226 108 Q181 122 136 108 Q133 98 136 83 Z"
        fill="#232b4a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- eyes -->
  <ellipse cx="161" cy="95" rx="10" ry="6" fill="#e8532f" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="201" cy="95" rx="10" ry="6" fill="#e8532f" stroke="#2d263c" stroke-width="5"/>

  <!-- handlebar mustache -->
  <path d="M151 109 Q131 119 123 106 Q119 96 131 99 Q146 101 156 113 Z" fill="#e8c840" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M211 109 Q231 119 239 106 Q243 96 231 99 Q216 101 206 113 Z" fill="#e8c840" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
</svg>
