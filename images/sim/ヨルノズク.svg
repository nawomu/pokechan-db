<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body) -->
  <path d="M150,300 L210,300 L182,342 L178,342 Z" fill="#7A4E2A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- wings (behind/beside body) -->
  <path d="M100,160 C58,182 46,252 80,296 C102,262 112,214 106,168 Z" fill="#8B5A2B" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M260,160 C302,182 314,252 280,296 C258,262 248,214 254,168 Z" fill="#8B5A2B" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="78" cy="272" rx="15" ry="24" fill="#5C3A1E" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="282" cy="272" rx="15" ry="24" fill="#5C3A1E" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- body -->
  <ellipse cx="180" cy="215" rx="88" ry="95" fill="#A9713F" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="180" cy="238" rx="52" ry="62" fill="#F7E7C4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- chest chevron markings -->
  <path d="M150,222 L180,248 L210,222" fill="none" stroke="#C99B5F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M155,262 L180,286 L205,262" fill="none" stroke="#C99B5F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- legs -->
  <rect x="150" y="288" width="18" height="34" rx="8" fill="#F4C430" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <rect x="192" y="288" width="18" height="34" rx="8" fill="#F4C430" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- talons -->
  <path d="M144,322 L152,338 L160,322 M160,322 L168,338 M152,338 L152,326" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M194,322 L202,338 L210,322 M210,322 L218,338 M202,338 L202,326" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- head -->
  <circle cx="180" cy="112" r="70" fill="#A9713F" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="180" cy="120" rx="55" ry="50" fill="#F5E9D0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- eyebrow arches -->
  <path d="M133,92 Q155,74 178,92" fill="none" stroke="#6B4423" stroke-width="7" stroke-linecap="round"/>
  <path d="M182,92 Q205,74 227,92" fill="none" stroke="#6B4423" stroke-width="7" stroke-linecap="round"/>

  <!-- eyes -->
  <circle cx="155" cy="112" r="27" fill="#FFFFFF" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="205" cy="112" r="27" fill="#FFFFFF" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="155" cy="115" r="17" fill="#E8871E"/>
  <circle cx="205" cy="115" r="17" fill="#E8871E"/>
  <circle cx="155" cy="117" r="8" fill="#201a1a"/>
  <circle cx="205" cy="117" r="8" fill="#201a1a"/>
  <circle cx="149" cy="105" r="4" fill="#FFFFFF"/>
  <circle cx="199" cy="105" r="4" fill="#FFFFFF"/>

  <!-- beak -->
  <path d="M170,148 L190,148 L180,164 Z" fill="#F4C430" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- head feather crest (swirl) -->
  <path d="M188,52 C204,40 228,46 224,66 C221,82 200,84 194,70 C191,62 189,57 188,52 Z" fill="#6B4423" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
