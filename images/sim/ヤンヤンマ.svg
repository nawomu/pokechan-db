<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 特徴メモ:
  1. 頭の大部分を占める黄緑色の大きな複眼(左右つながって見える)
  2. 透明感のある4枚の羽(黒い羽脈入り)を左右に大きく広げる
  3. 赤茶色の丸い胸部(頭と腹の間)
  4. 黒と黄色の縞模様が入る、細長く先細りの尾(腹部)
  5. 胸の下に控えめに生える小さな6本の脚
  -->

  <!-- 羽(後ろ・奥の2枚) -->
  <path d="M160,170 Q88,152 24,176 Q86,198 162,188 Z" fill="#eaf6fb" opacity="0.85" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <line x1="160" y1="176" x2="34" y2="178" stroke="#8fb8c9" stroke-width="2" opacity="0.8"/>
  <path d="M200,170 Q272,152 336,176 Q274,198 198,188 Z" fill="#eaf6fb" opacity="0.85" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <line x1="200" y1="176" x2="326" y2="178" stroke="#8fb8c9" stroke-width="2" opacity="0.8"/>

  <!-- 羽(前・手前の2枚) -->
  <path d="M156,136 Q86,112 22,92 Q94,120 158,150 Z" fill="#eaf6fb" opacity="0.9" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <line x1="150" y1="132" x2="32" y2="96" stroke="#8fb8c9" stroke-width="2" opacity="0.8"/>
  <path d="M204,136 Q274,112 338,92 Q266,120 202,150 Z" fill="#eaf6fb" opacity="0.9" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <line x1="210" y1="132" x2="328" y2="96" stroke="#8fb8c9" stroke-width="2" opacity="0.8"/>

  <!-- 脚(小さく6本) -->
  <polyline points="148,182 128,196" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <polyline points="152,192 134,210" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <polyline points="158,200 142,220" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <polyline points="212,182 232,196" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <polyline points="208,192 226,210" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <polyline points="202,200 218,220" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 胸部(赤茶色・丸い) -->
  <ellipse cx="180" cy="155" rx="44" ry="40" fill="#b5451f" stroke="#2d263c" stroke-width="8"/>

  <!-- 腹部ベース(先細りの尾・こげ茶) -->
  <path d="M150,186 C144,222 142,258 150,292 C160,312 180,317 180,317 C180,317 200,312 210,292 C218,258 216,222 210,186 C196,196 164,196 150,186 Z" fill="#5a2412" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腹部の黄色い縞(節) -->
  <ellipse cx="180" cy="206" rx="31" ry="10" fill="#f2d94e" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="180" cy="231" rx="27" ry="9" fill="#f2d94e" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="180" cy="254" rx="23" ry="8" fill="#f2d94e" stroke="#2d263c" stroke-width="2.5"/>
  <ellipse cx="180" cy="275" rx="18" ry="7" fill="#f2d94e" stroke="#2d263c" stroke-width="2.5"/>
  <ellipse cx="180" cy="293" rx="13" ry="6" fill="#f2d94e" stroke="#2d263c" stroke-width="2"/>

  <!-- 尾びれ(先端) -->
  <path d="M164,300 L180,332 L196,300 L180,309 Z" fill="#7a2a12" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頭(顔のベース・クリーム色) -->
  <ellipse cx="180" cy="95" rx="47" ry="41" fill="#e8c48a" stroke="#2d263c" stroke-width="8"/>

  <!-- 大きな複眼(黄緑色・中央でつながる) -->
  <ellipse cx="152" cy="88" rx="38" ry="34" fill="#a8c93a" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="208" cy="88" rx="38" ry="34" fill="#a8c93a" stroke="#2d263c" stroke-width="6"/>

  <!-- 瞳 -->
  <ellipse cx="145" cy="80" rx="6" ry="8" fill="#2d263c"/>
  <ellipse cx="215" cy="80" rx="6" ry="8" fill="#2d263c"/>
  <ellipse cx="140" cy="74" rx="3" ry="4" fill="#ffffff" opacity="0.85"/>
  <ellipse cx="210" cy="74" rx="3" ry="4" fill="#ffffff" opacity="0.85"/>

  <!-- 口 -->
  <path d="M168,120 Q180,126 192,120" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

</svg>
