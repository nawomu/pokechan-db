<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.体は黒紫のカラス型で丸くふっくら 2.頭に3本の乱れた羽毛(寝癖)が立つ 3.マゼンタ~赤紫の下向きに曲がった尖ったくちばし 4.黄色い丸目に黒い縦長瞳孔 5.黄橙色の3本指の鳥の足 -->
  <ellipse cx="185" cy="300" rx="34" ry="10" fill="#000000" opacity="0.15"/>

  <!-- 尾羽(後ろ) -->
  <path d="M120 230 Q60 245 45 290 Q80 270 110 250 Z" fill="#2d2740" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左翼(後ろ側) -->
  <path d="M100 170 Q40 190 35 250 Q75 240 105 210 Q115 190 100 170 Z" fill="#372f4d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 右翼(後ろ側) -->
  <path d="M250 175 Q305 200 300 255 Q265 235 235 210 Q235 190 250 175 Z" fill="#372f4d" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足(右) -->
  <path d="M205 285 L210 320" stroke="#e8952a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M210 320 L196 335 M210 320 L212 337 M210 320 L226 333" stroke="#e8952a" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- 足(左) -->
  <path d="M160 285 L155 320" stroke="#e8952a" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M155 320 L141 333 M155 320 L153 337 M155 320 L169 335" stroke="#e8952a" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- 体(丸くふっくら) -->
  <ellipse cx="184" cy="215" rx="88" ry="80" fill="#2b2440" stroke="#2d263c" stroke-width="8"/>

  <!-- お腹の少し明るい部分 -->
  <ellipse cx="184" cy="240" rx="46" ry="42" fill="#463a63" opacity="0.9"/>

  <!-- 頭(体と一体、少し前寄り上) -->
  <circle cx="184" cy="150" r="72" fill="#2b2440" stroke="#2d263c" stroke-width="8"/>

  <!-- 寝癖の羽毛3本(頭の上に乱立) -->
  <path d="M140 95 Q120 45 105 20 Q135 55 148 90 Z" fill="#2b2440" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M178 82 Q170 25 178 5 Q195 40 190 88 Z" fill="#2b2440" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M218 95 Q245 50 265 28 Q235 65 222 100 Z" fill="#2b2440" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目(白目) -->
  <ellipse cx="152" cy="150" rx="24" ry="26" fill="#fff6d8" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="220" cy="150" rx="24" ry="26" fill="#fff6d8" stroke="#2d263c" stroke-width="6"/>

  <!-- 黄色い虹彩 -->
  <ellipse cx="152" cy="150" rx="15" ry="18" fill="#ffd23f"/>
  <ellipse cx="220" cy="150" rx="15" ry="18" fill="#ffd23f"/>

  <!-- 縦長の瞳孔 -->
  <ellipse cx="152" cy="152" rx="4" ry="12" fill="#2d263c"/>
  <ellipse cx="220" cy="152" rx="4" ry="12" fill="#2d263c"/>

  <!-- ハイライト -->
  <circle cx="147" cy="143" r="3.5" fill="#ffffff"/>
  <circle cx="215" cy="143" r="3.5" fill="#ffffff"/>

  <!-- くちばし(マゼンタ~赤紫、下に曲がった尖り) -->
  <path d="M160 178 Q184 170 210 178 Q198 205 184 232 Q170 205 160 178 Z" fill="#c23e78" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M170 195 Q184 190 198 195" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
</svg>
