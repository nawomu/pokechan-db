<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: ①頭〜肩を覆う雪だるまのようなモコモコ雪帽子(白・波打つ裾) ②雪帽子の下からのぞく丸くて幼い茶色い顔と丸い黒目 ③下半身は緑色のベル状(木の葉/針葉樹)の体 ④木の枝のような細い茶色い腕(左右に伸びる小枝) ⑤裾の下からのぞく小さな茶色い根っこ状の足 -->

  <!-- 後ろ: 影 -->
  <ellipse cx="180" cy="330" rx="95" ry="14" fill="#2d263c" opacity="0.15"/>

  <!-- 体: 緑のベル状シルエット -->
  <path d="M132,225 Q118,270 105,318 Q180,344 255,318 Q242,270 228,225 Q180,244 132,225 Z"
        fill="#3f8f4c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 体の陰影ライン -->
  <path d="M150,250 Q140,280 132,310" fill="none" stroke="#2e6d3a" stroke-width="6" stroke-linecap="round"/>
  <path d="M210,250 Q222,280 230,310" fill="none" stroke="#2e6d3a" stroke-width="6" stroke-linecap="round"/>

  <!-- 足(根っこ) -->
  <ellipse cx="150" cy="326" rx="20" ry="12" fill="#6b4a2f" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="212" cy="326" rx="20" ry="12" fill="#6b4a2f" stroke="#2d263c" stroke-width="6"/>

  <!-- 腕(小枝) -->
  <path d="M115,208 Q75,200 55,175" fill="none" stroke="#6b4a2f" stroke-width="9" stroke-linecap="round"/>
  <path d="M60,178 L45,165 M58,182 L42,182" fill="none" stroke="#6b4a2f" stroke-width="6" stroke-linecap="round"/>
  <path d="M245,208 Q285,200 305,175" fill="none" stroke="#6b4a2f" stroke-width="9" stroke-linecap="round"/>
  <path d="M300,178 L315,165 M302,182 L318,182" fill="none" stroke="#6b4a2f" stroke-width="6" stroke-linecap="round"/>

  <!-- 雪帽子: 頭と肩を覆うモコモコ白い雪(波打つ裾) -->
  <path d="M180,88
           C126,84 92,124 88,170
           C86,196 96,208 112,202
           C110,222 128,234 148,220
           C150,238 168,244 180,224
           C192,244 210,238 212,220
           C232,234 250,222 248,202
           C264,208 274,196 272,170
           C268,124 234,84 180,88 Z"
        fill="#ffffff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M115,140 Q150,110 180,108 Q210,110 245,140" fill="none" stroke="#d7e9f2" stroke-width="6" stroke-linecap="round"/>

  <!-- 顔: 雪帽子の下からのぞく丸い茶色い顔 -->
  <circle cx="180" cy="205" r="52" fill="#e3b784" stroke="#2d263c" stroke-width="7"/>

  <!-- ほっぺ -->
  <circle cx="146" cy="222" r="10" fill="#f2a89f"/>
  <circle cx="214" cy="222" r="10" fill="#f2a89f"/>

  <!-- 目 -->
  <circle cx="160" cy="200" r="9" fill="#231f20"/>
  <circle cx="200" cy="200" r="9" fill="#231f20"/>
  <circle cx="163" cy="197" r="2.5" fill="#ffffff"/>
  <circle cx="203" cy="197" r="2.5" fill="#ffffff"/>

  <!-- 口 -->
  <path d="M168,222 Q180,230 192,222" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
