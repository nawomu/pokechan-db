<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (back layer) -->
  <path d="M 250 235 Q 300 235 320 270 Q 335 295 310 305 Q 285 312 275 285 Q 268 260 250 250 Z"
        fill="#f2a79c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="303" cy="288" rx="16" ry="14" fill="#fbe3d3" stroke="#2d263c" stroke-width="6"/>

  <!-- back legs -->
  <ellipse cx="120" cy="290" rx="26" ry="22" fill="#f2a79c" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="245" cy="292" rx="26" ry="22" fill="#f2a79c" stroke="#2d263c" stroke-width="7"/>

  <!-- body -->
  <ellipse cx="182" cy="230" rx="95" ry="75" fill="#f2a79c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- front legs -->
  <ellipse cx="130" cy="298" rx="27" ry="23" fill="#f2a79c" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="235" cy="300" rx="27" ry="23" fill="#f2a79c" stroke="#2d263c" stroke-width="7"/>

  <!-- belly patch -->
  <ellipse cx="182" cy="250" rx="55" ry="42" fill="#fbe3d3" stroke="#2d263c" stroke-width="6"/>

  <!-- ears -->
  <ellipse cx="130" cy="90" rx="20" ry="18" fill="#f2a79c" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="232" cy="90" rx="20" ry="18" fill="#f2a79c" stroke="#2d263c" stroke-width="7"/>

  <!-- head -->
  <circle cx="180" cy="140" r="82" fill="#f2a79c" stroke="#2d263c" stroke-width="8"/>

  <!-- muzzle -->
  <ellipse cx="180" cy="168" rx="42" ry="30" fill="#fbe3d3" stroke="#2d263c" stroke-width="6"/>

  <!-- eyes: sleepy half-lidded -->
  <path d="M 138 128 Q 150 118 164 128" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M 196 128 Q 210 118 222 128" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="151" cy="136" r="7" fill="#2d263c"/>
  <circle cx="209" cy="136" r="7" fill="#2d263c"/>

  <!-- vacant smile -->
  <path d="M 158 178 Q 180 190 202 178" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- cheek dots (dopey blush) -->
  <circle cx="122" cy="160" r="9" fill="#f7c3ba" opacity="0.8"/>
  <circle cx="240" cy="160" r="9" fill="#f7c3ba" opacity="0.8"/>
</svg>
