<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 左あし(茶色の岩・体の下からちょこん) -->
  <ellipse cx="140" cy="298" rx="18" ry="16" fill="#8a5a34" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右あし(茶色の岩) -->
  <ellipse cx="220" cy="298" rx="18" ry="16" fill="#8a5a34" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体(こい青のごつごつ岩・面取りされた形) -->
  <polygon points="180,88 252,108 288,178 258,252 180,288 102,252 68,178 104,108" fill="#33507e" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 岩の面のすじ(左上→中心→右上) -->
  <path d="M104,108 L180,190 L252,108" fill="none" stroke="#22385c" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- 岩の面のすじ(左→中心→右) -->
  <path d="M68,178 L180,190 L288,178" fill="none" stroke="#22385c" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- つやハイライト -->
  <ellipse cx="128" cy="140" rx="34" ry="20" fill="#7f9dcf" opacity="0.45" transform="rotate(-20 128 140)"/>

  <!-- 頭の上にのっかった茶色い岩のかけら(体とはつながっていない) -->
  <polygon points="150,95 138,55 172,38 214,55 202,96 178,82" fill="#9c6b3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体の真ん中の黄色い六角形(耳のあな・目とまちがえられやすい) -->
  <polygon points="218,195 199,228 161,228 142,195 161,162 199,162" fill="#f5d233" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 六角形の内側(かげ) -->
  <polygon points="201,195 190,213 170,213 159,195 170,177 190,177" fill="#dba821"/>

  <!-- ほんとうの目(左・小さい) -->
  <circle cx="157" cy="136" r="10" fill="#201b16" stroke="#2d263c" stroke-width="3"/>
  <!-- ほんとうの目(右・小さい) -->
  <circle cx="203" cy="136" r="10" fill="#201b16" stroke="#2d263c" stroke-width="3"/>

  <!-- 口 -->
  <path d="M165 250 Q180 258 195 250" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
