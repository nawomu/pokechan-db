  <ellipse cx="80" cy="122" rx="20" ry="22" fill="#efe2c0" stroke="#2d263c" stroke-width="6"/>

  <!-- back legs -->
  <path d="M130 260 L128 315 Q128 325 140 325 L158 325 Q166 325 164 314 L156 262 Z" fill="#4b4058" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M215 262 L212 316 Q212 326 224 326 L242 326 Q250 326 248 315 L238 260 Z" fill="#4b4058" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- body -->
  <ellipse cx="185" cy="225" rx="95" ry="62" fill="#4b4058" stroke="#2d263c" stroke-width="8"/>

  <!-- front legs -->
  <path d="M150 265 L146 320 Q146 330 158 330 L174 330 Q182 330 180 319 L176 262 Z" fill="#4b4058" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M245 262 L242 318 Q242 328 254 328 L270 328 Q278 328 276 317 L268 258 Z" fill="#4b4058" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- chest/belly cream patch -->
  <ellipse cx="200" cy="245" rx="55" ry="35" fill="#efe2c0" stroke="#2d263c" stroke-width="6"/>

  <!-- head -->
  <circle cx="260" cy="165" r="66" fill="#4b4058" stroke="#2d263c" stroke-width="8"/>

  <!-- ears -->
  <path d="M215 120 L200 45 L250 105 Z" fill="#4b4058" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M290 105 L320 45 L305 120 Z" fill="#4b4058" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M212 108 L203 66 L233 100 Z" fill="#2d263c"/>
  <path d="M293 100 L312 66 L303 108 Z" fill="#2d263c"/>

  <!-- muzzle -->
