  <!-- eyes -->
  <ellipse cx="270" cy="150" rx="13" ry="16" fill="#8c1f2c" stroke="#2d263c" stroke-width="5"/>
  <circle cx="273" cy="145" r="4" fill="#efe2c0"/>

  <!-- eyebrow marking -->
  <path d="M245 122 Q265 112 285 124" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- mouth -->
  <path d="M295 212 Q305 220 318 214" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
