<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- タツベイの特徴:
    1. 丸くて大きい兜のような頭部(体より頭が大きい)
    2. 濃い青紺色の体、顔と喉元・お腹はクリーム色
    3. 大きな口(顎)としっかりした白い歯
    4. 小さくて丸い黒目、頭頂に小さな2つの突起(角のようなでっぱり)
    5. 短くて丸っこい手足、小さく尖った尻尾
  -->

  <!-- 尻尾(体の後ろ) -->
  <path d="M240 260 Q290 250 300 210 Q285 245 235 245 Z" fill="#274a86" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 後ろ足 -->
  <ellipse cx="235" cy="290" rx="30" ry="24" fill="#274a86" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="130" cy="292" rx="30" ry="24" fill="#274a86" stroke="#2d263c" stroke-width="7"/>

  <!-- 体(丸っこいずんぐり体型) -->
  <ellipse cx="182" cy="235" rx="95" ry="78" fill="#2d5aa0" stroke="#2d263c" stroke-width="8"/>

  <!-- お腹(クリーム色) -->
  <ellipse cx="182" cy="255" rx="58" ry="46" fill="#f3e6c2" stroke="#2d263c" stroke-width="6"/>

  <!-- 前足(小さく丸い) -->
  <ellipse cx="108" cy="255" rx="26" ry="22" fill="#2d5aa0" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="256" cy="255" rx="26" ry="22" fill="#2d5aa0" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭部(大きい兜型・体より前方&上に張り出す) -->
  <ellipse cx="180" cy="145" rx="118" ry="100" fill="#2d5aa0" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭頂の小さな突起2つ -->
  <path d="M130 55 Q125 25 145 35 Q140 55 132 62 Z" fill="#2d5aa0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M225 58 Q232 28 250 40 Q243 60 233 65 Z" fill="#2d5aa0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔まわり クリーム色の面(あご〜口周り) -->
  <path d="M90 140 Q90 210 180 220 Q270 210 270 140 Q270 205 180 200 Q90 205 90 140 Z" fill="#f3e6c2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 大きな口(開いた顎) -->
  <path d="M105 155 Q180 205 255 155 Q250 185 180 195 Q110 185 105 155 Z" fill="#c8402f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 白い歯 -->
  <path d="M130 158 L142 172 L154 158 Z" fill="#ffffff" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M205 158 L217 172 L229 158 Z" fill="#ffffff" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 目(小さく丸い黒目) -->
  <circle cx="135" cy="118" r="15" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="135" cy="120" r="7" fill="#2d263c"/>
  <circle cx="228" cy="118" r="15" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="228" cy="120" r="7" fill="#2d263c"/>

  <!-- 頬の丸み(可愛さ用ハイライト) -->
  <circle cx="118" cy="150" r="10" fill="#5b86c8" opacity="0.6"/>
  <circle cx="245" cy="150" r="10" fill="#5b86c8" opacity="0.6"/>
</svg>
