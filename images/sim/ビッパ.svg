<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (flat beaver tail, behind body) -->
  <path d="M 250 230 Q 320 210 330 260 Q 335 300 285 300 Q 250 295 235 265 Z"
        fill="#8a5a35" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- legs / feet -->
  <ellipse cx="140" cy="292" rx="28" ry="20" fill="#8a5a35" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="222" cy="292" rx="28" ry="20" fill="#8a5a35" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- arms -->
  <ellipse cx="92" cy="215" rx="22" ry="38" fill="#a97c50" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="270" cy="215" rx="22" ry="38" fill="#a97c50" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- body -->
  <ellipse cx="180" cy="215" rx="92" ry="82" fill="#a97c50" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- belly -->
  <ellipse cx="180" cy="232" rx="52" ry="50" fill="#f2e2c0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ears -->
  <circle cx="128" cy="62" r="24" fill="#8a5a35" stroke="#2d263c" stroke-width="7"/>
  <circle cx="232" cy="62" r="24" fill="#8a5a35" stroke="#2d263c" stroke-width="7"/>
  <circle cx="128" cy="64" r="11" fill="#f2e2c0"/>
  <circle cx="232" cy="64" r="11" fill="#f2e2c0"/>

  <!-- head -->
  <circle cx="180" cy="115" r="72" fill="#a97c50" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- face patch -->
  <ellipse cx="180" cy="140" rx="54" ry="46" fill="#f2e2c0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- eyes -->
  <circle cx="153" cy="108" r="10" fill="#2d263c"/>
  <circle cx="207" cy="108" r="10" fill="#2d263c"/>
  <circle cx="150" cy="105" r="3" fill="#ffffff"/>
  <circle cx="204" cy="105" r="3" fill="#ffffff"/>

  <!-- nose -->
  <ellipse cx="180" cy="126" rx="11" ry="8" fill="#4a3323" stroke="#2d263c" stroke-width="4"/>

  <!-- cheeks -->
  <circle cx="128" cy="140" r="12" fill="#e8a37a" opacity="0.7"/>
  <circle cx="232" cy="140" r="12" fill="#e8a37a" opacity="0.7"/>

  <!-- big front teeth -->
  <rect x="163" y="148" width="16" height="30" rx="4" fill="#fffbe8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <rect x="181" y="148" width="16" height="30" rx="4" fill="#fffbe8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
</svg>
