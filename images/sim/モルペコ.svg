<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body) -->
  <ellipse cx="268" cy="238" rx="28" ry="18" fill="#F8D030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="274" cy="231" rx="16" ry="10" fill="#3D2B1F" stroke="none"/>
  <ellipse cx="282" cy="248" rx="14" ry="9" fill="#3D2B1F" stroke="none"/>

  <!-- left ear (behind head) -->
  <ellipse cx="118" cy="110" rx="26" ry="34" fill="#3D2B1F" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-12 118 110)"/>
  <ellipse cx="118" cy="112" rx="16" ry="22" fill="#F8D030" stroke="none"/>

  <!-- right ear -->
  <ellipse cx="244" cy="107" rx="26" ry="34" fill="#3D2B1F" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(10 244 107)"/>
  <ellipse cx="243" cy="110" rx="16" ry="22" fill="#F8D030" stroke="none"/>

  <!-- body -->
  <ellipse cx="183" cy="242" rx="95" ry="82" fill="#F8D030" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- dark hood/cape on body -->
  <path d="M 108 210 Q 130 180 183 175 Q 236 180 258 210 Q 245 195 183 192 Q 121 195 108 210 Z" fill="#3D2B1F" stroke="none"/>

  <!-- belly (cream) -->
  <ellipse cx="184" cy="268" rx="52" ry="44" fill="#F5F0C0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- head -->
  <ellipse cx="183" cy="175" rx="80" ry="72" fill="#F8D030" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- dark hood on head -->
  <path d="M 116 158 Q 120 115 183 108 Q 246 115 250 158 Q 235 135 183 130 Q 131 135 116 158 Z" fill="#3D2B1F" stroke="none"/>

  <!-- left cheek pouch (purple electric) -->
  <ellipse cx="128" cy="188" rx="24" ry="20" fill="#9966CC" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- cheek shine -->
  <ellipse cx="122" cy="182" rx="7" ry="5" fill="#C49EE8" stroke="none"/>

  <!-- right cheek pouch (purple electric) -->
  <ellipse cx="238" cy="186" rx="24" ry="20" fill="#9966CC" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="232" cy="180" rx="7" ry="5" fill="#C49EE8" stroke="none"/>

  <!-- left eye (angled, grumpy) -->
  <ellipse cx="158" cy="164" rx="14" ry="13" fill="#2d263c" stroke="#2d263c" stroke-width="3"/>
  <!-- eye angry upper lid left -->
  <path d="M 145 156 Q 158 150 171 157" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- eye shine -->
  <circle cx="163" cy="160" r="4" fill="white"/>

  <!-- right eye (angled, grumpy) -->
  <ellipse cx="208" cy="162" rx="14" ry="13" fill="#2d263c" stroke="#2d263c" stroke-width="3"/>
  <path d="M 195 154 Q 208 148 221 155" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <circle cx="213" cy="158" r="4" fill="white"/>

  <!-- nose (small) -->
  <ellipse cx="183" cy="185" rx="7" ry="5" fill="#3D2B1F" stroke="none"/>

  <!-- mouth with slightly showing teeth (hungry expression) -->
  <path d="M 162 200 Q 183 215 204 200" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- tiny teeth nubs -->
  <rect x="174" y="200" width="9" height="8" rx="2" fill="white" stroke="#2d263c" stroke-width="3"/>
  <rect x="186" y="200" width="9" height="8" rx="2" fill="white" stroke="#2d263c" stroke-width="3"/>

  <!-- body dark stripe accent (seed shape on belly) -->
  <ellipse cx="184" cy="260" rx="18" ry="14" fill="#F8D030" stroke="#2d263c" stroke-width="4"/>

  <!-- tiny feet -->
  <ellipse cx="152" cy="315" rx="28" ry="14" fill="#F8D030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="214" cy="318" rx="28" ry="13" fill="#F8D030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- toe lines left foot -->
  <line x1="136" y1="315" x2="134" y2="322" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="152" y1="317" x2="151" y2="325" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="168" y1="315" x2="168" y2="323" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- toe lines right foot -->
  <line x1="198" y1="318" x2="197" y2="325" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="214" y1="320" x2="214" y2="328" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="230" y1="318" x2="231" y2="326" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- tiny arms/hands -->
  <ellipse cx="103" cy="258" rx="18" ry="12" fill="#F8D030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-30 103 258)"/>
  <ellipse cx="263" cy="255" rx="18" ry="12" fill="#F8D030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(30 263 255)"/>
</svg>