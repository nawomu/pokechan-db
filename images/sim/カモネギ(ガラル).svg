<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 1 battle-leek blade (dark jagged/frayed, worn from use) -->
  <polygon points="244,188 274,188 281,150 271,92 283,54 263,28 251,54 257,94 240,150" fill="#5C7A2E" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 2 leek vein -->
  <path d="M259,180 L261,58" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 3 leek handle (bat grip) -->
  <rect x="244" y="188" width="28" height="52" rx="10" fill="#E6D9B4" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 4 grip wrap line 1 -->
  <line x1="246" y1="203" x2="270" y2="203" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- 5 grip wrap line 2 -->
  <line x1="246" y1="219" x2="270" y2="219" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- 6 tail feather 1 -->
  <polygon points="132,300 112,326 150,318" fill="#7C5C39" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 7 tail feather 2 -->
  <polygon points="150,305 140,332 168,320" fill="#7C5C39" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 8 body -->
  <ellipse cx="180" cy="228" rx="72" ry="82" fill="#C7A96D" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 9 left wing -->
  <path d="M106,198 Q84,230 100,270 Q128,260 132,218 Z" fill="#7C5C39" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 10 right wing (gripping leek handle) -->
  <path d="M248,205 Q272,215 264,255 Q244,250 240,213 Z" fill="#7C5C39" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 11 left wing feather detail -->
  <path d="M103,216 Q113,234 106,254" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 12 right wing feather detail -->
  <path d="M250,222 Q258,236 252,250" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 13 left leg -->
  <line x1="158" y1="308" x2="155" y2="328" stroke="#8C8C8C" stroke-width="15" stroke-linecap="round"/>
  <!-- 14 right leg -->
  <line x1="202" y1="308" x2="205" y2="328" stroke="#8C8C8C" stroke-width="15" stroke-linecap="round"/>
  <!-- 15 left foot -->
  <path d="M140,326 Q155,341 170,326 Q155,334 140,326 Z" fill="#8C8C8C" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 16 right foot -->
  <path d="M190,326 Q205,341 220,326 Q205,334 190,326 Z" fill="#8C8C8C" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 17 head -->
  <circle cx="180" cy="112" r="54" fill="#7C5C39" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 18 face overlay (lighter mask) -->
  <ellipse cx="180" cy="136" rx="40" ry="35" fill="#D9C49C" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 19 fierce brow (iconic angled unibrow) -->
  <path d="M148,104 Q164,90 180,100 Q196,90 212,104" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 20 left eye -->
  <circle cx="163" cy="122" r="6.5" fill="#2d263c"/>
  <!-- 21 right eye -->
  <circle cx="197" cy="122" r="6.5" fill="#2d263c"/>
  <!-- 22 left eye highlight -->
  <circle cx="165" cy="119" r="2.2" fill="#FFFFFF"/>
  <!-- 23 right eye highlight -->
  <circle cx="199" cy="119" r="2.2" fill="#FFFFFF"/>
  <!-- 24 beak -->
  <polygon points="163,150 197,150 192,170 168,170" fill="#E8A33D" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 25 beak line -->
  <path d="M165,160 L195,160" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
