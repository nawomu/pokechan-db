<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.海馬(タツノオトシゴ)状の体で下半身がくるっと渦を巻く尾 2.体は青(#4a7fc9系)で背に濃い青のギザギザ背びれ 3.口元は竜のように長い鼻先(スナウト) 4.鼻先から2本の長いひげ(触角)がくるんと伸びる 5.あご下に赤いえら(ひれ) -->

  <!-- 後ろ: 渦を巻く尾 -->
  <path d="M195,215 C220,218 245,230 255,255 C263,278 255,300 230,310 C205,320 178,310 172,288 C168,270 182,255 200,258 C212,260 216,272 208,280"
        fill="none" stroke="#2d263c" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M195,215 C220,218 245,230 255,255 C263,278 255,300 230,310 C205,320 178,310 172,288 C168,270 182,255 200,258 C212,260 216,272 208,280"
        fill="none" stroke="#4a7fc9" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 体: 頭〜胴 -->
  <path d="M95,110 C100,85 115,65 130,60 C145,55 155,53 165,55 C185,58 200,65 200,75 C215,85 228,95 225,110 C230,125 232,140 230,150 C228,168 222,180 215,190 C208,202 200,210 195,215 C185,222 175,215 170,205 C160,195 155,190 150,180 C140,165 135,158 130,150 C120,135 112,140 105,125 C100,118 97,113 95,110 Z"
        fill="#4a7fc9" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- おなか(クリーム色) -->
  <path d="M108,130 C120,150 135,165 150,180 C160,192 170,200 178,208 C165,215 150,210 138,198 C122,182 108,160 100,140 C102,133 105,130 108,130 Z"
        fill="#f5e6a8" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 背びれ(ギザギザ) -->
  <path d="M150,58 L165,35 L178,60 L192,32 L205,58 L218,38 L228,65 L210,72 L195,58 L180,72 Z"
        fill="#2f5aa8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- あご下の赤いえら -->
  <path d="M108,135 C120,130 135,138 138,155 C140,168 128,178 112,172 C100,168 98,150 108,135 Z"
        fill="#e05a4e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 鼻先(明るい青) -->
  <ellipse cx="100" cy="112" rx="15" ry="11" fill="#7fb3e8" stroke="#2d263c" stroke-width="6"/>

  <!-- 鼻の穴 -->
  <circle cx="95" cy="107" r="3" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M92,118 Q100,127 114,120" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ひげ1 -->
  <path d="M108,88 C100,70 110,55 125,58 C140,61 138,78 125,80" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <circle cx="125" cy="80" r="5" fill="#7fb3e8" stroke="#2d263c" stroke-width="3"/>

  <!-- ひげ2 -->
  <path d="M120,75 C118,55 132,42 148,48 C160,53 155,68 142,68" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <circle cx="142" cy="68" r="5" fill="#7fb3e8" stroke="#2d263c" stroke-width="3"/>

  <!-- 目 -->
  <circle cx="140" cy="95" r="14" fill="#ffffff" stroke="#2d263c" stroke-width="4"/>
  <circle cx="144" cy="93" r="7" fill="#2d263c"/>
  <circle cx="141" cy="90" r="2.5" fill="#ffffff"/>

  <!-- 背中の模様 -->
  <circle cx="178" cy="112" r="6" fill="#2f5aa8"/>
  <circle cx="192" cy="142" r="6" fill="#2f5aa8"/>
  <circle cx="172" cy="162" r="5" fill="#2f5aa8"/>
</svg>
