<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- マスカーニャ (Meowscarada) - マジシャン猫 -->

  <!-- しっぽ (後ろ) -->
  <path d="M210 280 Q260 310 280 350 Q270 340 255 330 Q240 310 220 295 Z"
        fill="#1a3d24" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- しっぽの花つぼみ -->
  <ellipse cx="278" cy="348" rx="12" ry="8" fill="#e84aaa" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="278" cy="344" rx="7" ry="5" fill="#f580c0"/>

  <!-- マント(ケープ後ろ側) -->
  <path d="M130 175 Q90 220 85 300 Q100 310 115 300 Q120 250 140 210 Z"
        fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M225 175 Q265 215 268 295 Q255 308 242 298 Q238 248 218 212 Z"
        fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体(胴体) -->
  <ellipse cx="180" cy="245" rx="52" ry="68" fill="#2d6b3c" stroke="#2d263c" stroke-width="7"/>

  <!-- 胸フリル(白) -->
  <path d="M155 205 Q168 215 180 205 Q192 215 205 205 Q198 230 180 228 Q162 230 155 205 Z"
        fill="#f0ede8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- フリルのギザギザ -->
  <path d="M157 208 Q162 218 168 210 Q173 220 178 212 Q183 220 188 210 Q194 220 200 208"
        fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- 左腕 -->
  <path d="M130 220 Q100 235 88 265 Q95 270 105 268 Q115 245 138 238 Z"
        fill="#2d6b3c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 左袖フリル -->
  <path d="M88 262 Q82 270 90 278 Q100 275 105 265 Z"
        fill="#f0ede8" stroke="#2d263c" stroke-width="5"/>
  <!-- 左手の花(ローズ) -->
  <circle cx="80" cy="283" r="16" fill="#e84aaa" stroke="#2d263c" stroke-width="6"/>
  <circle cx="80" cy="283" r="9" fill="#f580c0"/>
  <circle cx="80" cy="283" r="4" fill="#e84aaa"/>

  <!-- 右腕 -->
  <path d="M228 218 Q260 228 272 258 Q265 265 255 262 Q244 240 222 232 Z"
        fill="#2d6b3c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右袖フリル -->
  <path d="M272 255 Q280 262 272 272 Q262 270 257 260 Z"
        fill="#f0ede8" stroke="#2d263c" stroke-width="5"/>

  <!-- 足 -->
  <path d="M155 305 Q150 330 145 345 Q155 350 165 345 Q168 328 170 308 Z"
        fill="#1a3d24" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M205 305 Q210 330 215 345 Q205 350 195 345 Q192 328 190 308 Z"
        fill="#1a3d24" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 首〜頭部ベース -->
  <ellipse cx="180" cy="145" rx="58" ry="65" fill="#2d6b3c" stroke="#2d263c" stroke-width="7"/>

  <!-- フード/マント前部(黒い部分) -->
  <path d="M125 140 Q122 105 135 85 Q155 70 180 68 Q205 70 225 85 Q238 105 235 140 Q220 128 180 125 Q140 128 125 140 Z"
        fill="#1a1a2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 耳(左) -->
  <path d="M138 88 Q128 55 140 38 Q152 48 155 75 Z"
        fill="#2d6b3c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M141 82 Q135 62 143 50 Q150 58 151 74 Z"
        fill="#1a1a2e"/>

  <!-- 耳(右) - ちょっと非対称でいい感じ -->
  <path d="M222 85 Q232 52 222 36 Q210 46 208 73 Z"
        fill="#2d6b3c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M219 79 Q225 59 218 48 Q211 57 210 71 Z"
        fill="#1a1a2e"/>

  <!-- 顔 -->
  <ellipse cx="180" cy="155" rx="46" ry="42" fill="#2d6b3c" stroke="#2d263c" stroke-width="6"/>

  <!-- マスク模様(ピンク〜マゼンタ) -->
  <path d="M137 148 Q145 135 165 138 Q178 140 180 148 Q182 140 195 138 Q215 135 223 148 Q218 162 205 165 Q192 168 180 162 Q168 168 155 165 Q142 162 137 148 Z"
        fill="#c0175a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- マスクのハイライト -->
  <path d="M142 148 Q150 138 165 141 Q176 142 180 148"
        fill="none" stroke="#e84aaa" stroke-width="3" stroke-linecap="round"/>
  <path d="M218 148 Q210 138 195 141 Q184 142 180 148"
        fill="none" stroke="#e84aaa" stroke-width="3" stroke-linecap="round"/>

  <!-- 目(左) - 切れ長 -->
  <path d="M150 150 Q158 144 168 148 Q162 155 152 154 Z"
        fill="#f5e642" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M152 150 Q158 146 166 149 Q160 154 153 153 Z"
        fill="#1a8c3a"/>
  <ellipse cx="159" cy="150" rx="3" ry="3.5" fill="#0a0a14"/>
  <!-- 目(右) - ちょっとサイズ違いでゆるく -->
  <path d="M192 149 Q202 143 212 147 Q207 155 195 154 Z"
        fill="#f5e642" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M194 150 Q202 145 210 148 Q205 154 196 153 Z"
        fill="#1a8c3a"/>
  <ellipse cx="202" cy="150" rx="3.5" ry="3.5" fill="#0a0a14"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="162" rx="5" ry="3.5" fill="#c0175a" stroke="#2d263c" stroke-width="3"/>

  <!-- 口 - ちょっとニヤリ -->
  <path d="M168 168 Q175 174 180 172 Q185 174 192 168"
        fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- ひげ(左) -->
  <line x1="145" y1="163" x2="115" y2="158" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="145" y1="167" x2="113" y2="168" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <!-- ひげ(右) -->
  <line x1="215" y1="163" x2="245" y2="158" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="215" y1="167" x2="247" y2="168" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

</svg>