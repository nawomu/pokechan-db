<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろの葉(中央・大きい・後ろ側) -->
  <path d="M180 130 Q168 70 180 26 Q192 70 180 130Z" fill="#4CAF3C" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 後ろの葉(左) -->
  <path d="M172 138 Q118 108 88 66 Q136 78 176 116Z" fill="#57BA46" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 後ろの葉(右) -->
  <path d="M188 138 Q242 108 272 66 Q224 78 184 116Z" fill="#57BA46" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 葉脈 -->
  <path d="M180 120 L180 40" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M168 122 Q136 100 108 78" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M192 122 Q224 100 252 78" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 足(葉っぱ状・体の下から少し覗く 左右) -->
  <path d="M120 300 Q90 300 76 320 Q100 330 128 316Z" fill="#57BA46" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M240 300 Q270 300 284 320 Q260 330 232 316Z" fill="#57BA46" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(丸い球根型) -->
  <path d="M180 118 Q262 118 268 210 Q272 290 180 300 Q88 290 92 210 Q98 118 180 118Z" fill="#6FA3D6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 腹の模様(下部の丸み陰影) -->
  <path d="M120 250 Q180 280 240 250 Q235 280 180 290 Q125 280 120 250Z" fill="#4E86BE" stroke="none"/>

  <!-- 体の斑点模様 -->
  <ellipse cx="130" cy="200" rx="12" ry="9" fill="#4E86BE"/>
  <ellipse cx="232" cy="205" rx="12" ry="9" fill="#4E86BE"/>
  <ellipse cx="180" cy="245" rx="10" ry="8" fill="#4E86BE"/>

  <!-- 目 左 -->
  <ellipse cx="150" cy="190" rx="16" ry="18" fill="#2d263c"/>
  <ellipse cx="155" cy="184" rx="5" ry="6" fill="#ffffff"/>

  <!-- 目 右 -->
  <ellipse cx="210" cy="190" rx="16" ry="18" fill="#2d263c"/>
  <ellipse cx="215" cy="184" rx="5" ry="6" fill="#ffffff"/>

  <!-- 口 -->
  <path d="M164 222 Q180 234 196 222" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
