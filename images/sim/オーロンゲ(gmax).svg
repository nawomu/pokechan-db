<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 影 -->
  <ellipse cx="180" cy="326" rx="85" ry="14" fill="#00000022"/>

  <!-- 巨大な胴体(タワーのようにそびえる) -->
  <path d="M140,330 Q95,320 92,270 Q85,210 100,150 Q112,105 145,90 Q180,78 215,90 Q248,105 260,150 Q275,210 268,270 Q265,320 220,330 Q180,340 140,330 Z" fill="#2a0d4a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹の薄紫 -->
  <ellipse cx="180" cy="245" rx="34" ry="78" fill="#5a2888" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 体のリング模様(ダイマックスの巨大感) -->
  <path d="M108,198 Q180,214 252,198" fill="none" stroke="#7a4fae" stroke-width="9" stroke-linecap="round"/>
  <path d="M103,256 Q180,272 257,256" fill="none" stroke="#7a4fae" stroke-width="9" stroke-linecap="round"/>

  <!-- 左の巨大な髪の拳 -->
  <ellipse cx="72" cy="210" rx="46" ry="44" fill="#1f8f7a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="58" cy="196" rx="13" ry="11" fill="#57cdb4"/>

  <!-- 右の巨大な髪の拳 -->
  <ellipse cx="288" cy="210" rx="46" ry="44" fill="#1f8f7a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="302" cy="196" rx="13" ry="11" fill="#57cdb4"/>

  <!-- 拳の関節の模様 -->
  <circle cx="56" cy="222" r="9" fill="#a8fff0" stroke="#2d263c" stroke-width="3"/>
  <circle cx="84" cy="228" r="7" fill="#a8fff0" stroke="#2d263c" stroke-width="3"/>
  <circle cx="304" cy="222" r="9" fill="#a8fff0" stroke="#2d263c" stroke-width="3"/>
  <circle cx="276" cy="228" r="7" fill="#a8fff0" stroke="#2d263c" stroke-width="3"/>

  <!-- 頭上の髪の束(左右+中央、王冠のように) -->
  <path d="M150,92 Q140,58 130,26 Q142,52 153,68 Q147,44 160,30 Q159,56 156,80 Z" fill="#1f8f7a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M210,92 Q220,58 230,26 Q218,52 207,68 Q213,44 200,30 Q201,56 204,80 Z" fill="#1f8f7a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M180,84 Q174,50 170,22 Q182,46 186,66 Q190,40 198,24 Q193,52 188,78 Z" fill="#1f8f7a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 目(左) -->
  <ellipse cx="150" cy="146" rx="16" ry="15" fill="white" stroke="#2d263c" stroke-width="5"/>
  <circle cx="153" cy="148" r="10" fill="#1a1a1a"/>
  <circle cx="157" cy="142" r="4" fill="white"/>

  <!-- 目(右) -->
  <ellipse cx="210" cy="146" rx="16" ry="15" fill="white" stroke="#2d263c" stroke-width="5"/>
  <circle cx="207" cy="148" r="10" fill="#1a1a1a"/>
  <circle cx="203" cy="142" r="4" fill="white"/>

  <!-- 眉(つり上がり) -->
  <path d="M132,128 L154,120" stroke="#2d263c" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M228,128 L206,120" stroke="#2d263c" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="162" rx="6" ry="4" fill="#2d263c"/>

  <!-- 口(ニヤリ) -->
  <path d="M128,178 Q150,204 180,207 Q210,204 232,178" fill="#1a1428" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 牙 -->
  <path d="M142,184 L138,198 M160,192 L158,205 M180,194 L180,207 M200,192 L202,205 M218,184 L222,198" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- 足(左) -->
  <path d="M150,326 Q144,336 152,340 Q162,342 168,336 Q166,326 158,324 Z" fill="#2a0d4a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 足(右) -->
  <path d="M210,326 Q216,336 208,340 Q198,342 192,336 Q194,326 202,324 Z" fill="#2a0d4a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

</svg>
