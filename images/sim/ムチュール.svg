<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
       1. 丸くて太った巨体(頭と胴体の境目がほぼ無い)
       2. 全身うすい青みがかったグレー(ラベンダーグレー)
       3. お腹に大きなクリーム色の模様(渦巻き模様入り)
       4. 短い手足・寸胴・お尻をついて座ったポーズ
       5. 丸い目と丸い耳、しっぽの先はクリーム色
  -->
  <!-- しっぽ(後ろ・体に隠れる根本) -->
  <ellipse cx="303" cy="232" rx="20" ry="26" fill="#A9BEDD" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="309" cy="220" rx="11" ry="13" fill="#F5ECD2" stroke="#2d263c" stroke-width="6"/>

  <!-- 耳(後ろ) -->
  <circle cx="100" cy="72" r="32" fill="#A9BEDD" stroke="#2d263c" stroke-width="7"/>
  <circle cx="260" cy="72" r="32" fill="#A9BEDD" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="100" cy="80" rx="13" ry="17" fill="#F5ECD2" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="260" cy="80" rx="13" ry="17" fill="#F5ECD2" stroke="#2d263c" stroke-width="5"/>

  <!-- 胴体+頭(一体化した丸い体) -->
  <path d="M180,38 C230,38 275,55 292,110 C305,150 302,200 295,240 C285,290 240,322 180,322 C120,322 75,290 65,240 C58,200 55,150 68,110 C85,55 130,38 180,38 Z"
        fill="#A9BEDD" stroke="#2d263c" stroke-width="8"/>

  <!-- うで -->
  <ellipse cx="66" cy="195" rx="27" ry="35" fill="#A9BEDD" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="294" cy="195" rx="27" ry="35" fill="#A9BEDD" stroke="#2d263c" stroke-width="7"/>

  <!-- あし -->
  <ellipse cx="128" cy="308" rx="34" ry="27" fill="#A9BEDD" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="232" cy="308" rx="34" ry="27" fill="#A9BEDD" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="128" cy="320" rx="20" ry="11" fill="#F5ECD2" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="232" cy="320" rx="20" ry="11" fill="#F5ECD2" stroke="#2d263c" stroke-width="5"/>

  <!-- おなかの模様(クリーム色) -->
  <ellipse cx="180" cy="235" rx="72" ry="80" fill="#F5ECD2" stroke="#2d263c" stroke-width="7"/>
  <path d="M180,205 C200,205 208,220 195,232 C185,240 168,236 168,222"
        fill="none" stroke="#C9A86A" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <ellipse cx="118" cy="210" rx="15" ry="10" fill="#F7B8C6" stroke="none"/>
  <ellipse cx="242" cy="210" rx="15" ry="10" fill="#F7B8C6" stroke="none"/>

  <!-- 目 -->
  <circle cx="145" cy="180" r="23" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <circle cx="215" cy="180" r="23" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <circle cx="149" cy="184" r="10" fill="#2d263c"/>
  <circle cx="211" cy="184" r="10" fill="#2d263c"/>
  <circle cx="145" cy="180" r="3" fill="#FFFFFF"/>
  <circle cx="207" cy="180" r="3" fill="#FFFFFF"/>

  <!-- はな -->
  <ellipse cx="180" cy="205" rx="9" ry="6" fill="#2d263c"/>

  <!-- くち -->
  <path d="M158,222 Q180,238 202,222" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>
