<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: ①ぷっくり丸い水色の半透明ボディ ②頭の上のピンクの耳のようなヒレ(左右2本・先が丸い) ③体の左右にピンクの花びら状フリッパー(中に濃いピンクの模様) ④大きな黒目の素朴な顔 ⑤下にひらひらした小さな尾ビレ -->

  <!-- 後ろ: 頭の上のピンクの耳ヒレ2本 -->
  <path d="M150 90 C130 55, 118 40, 128 28 C145 30, 162 55, 168 92 Z" fill="#f6a9cf" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M210 90 C230 55, 242 40, 232 28 C215 30, 198 55, 192 92 Z" fill="#f6a9cf" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 尾びれ(体の下) -->
  <path d="M160 300 C165 325, 178 338, 180 320 C182 338, 195 325, 200 300 Z" fill="#aee7ef" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左フリッパー(花びら状ヒレ) -->
  <path d="M95 190 C60 175, 45 190, 52 215 C60 240, 90 245, 105 225 C112 212, 108 198, 95 190 Z" fill="#f6a9cf" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="76" cy="212" rx="14" ry="16" fill="#e8639f"/>

  <!-- 右フリッパー(花びら状ヒレ) -->
  <path d="M265 190 C300 175, 315 190, 308 215 C300 240, 270 245, 255 225 C248 212, 252 198, 265 190 Z" fill="#f6a9cf" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="284" cy="212" rx="14" ry="16" fill="#e8639f"/>

  <!-- メインボディ(ぷっくり丸い半透明水色) -->
  <ellipse cx="180" cy="205" rx="95" ry="100" fill="#aee7ef" stroke="#2d263c" stroke-width="8"/>

  <!-- お腹のハイライト -->
  <ellipse cx="180" cy="235" rx="55" ry="45" fill="#d7f4f8" opacity="0.7"/>

  <!-- 前脚っぽい小さな下ヒレ左右 -->
  <ellipse cx="130" cy="270" rx="18" ry="24" fill="#aee7ef" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="230" cy="270" rx="18" ry="24" fill="#aee7ef" stroke="#2d263c" stroke-width="6"/>

  <!-- 顔: 大きな丸い目 -->
  <circle cx="155" cy="185" r="17" fill="#2d263c"/>
  <circle cx="205" cy="185" r="17" fill="#2d263c"/>
  <circle cx="150" cy="179" r="5" fill="#ffffff"/>
  <circle cx="200" cy="179" r="5" fill="#ffffff"/>

  <!-- ほっぺ -->
  <ellipse cx="140" cy="210" rx="10" ry="7" fill="#f6a9cf" opacity="0.8"/>
  <ellipse cx="220" cy="210" rx="10" ry="7" fill="#f6a9cf" opacity="0.8"/>

  <!-- 口 -->
  <path d="M168 215 Q180 226 192 215" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
