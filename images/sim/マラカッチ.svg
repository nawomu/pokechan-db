<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ: 影 -->
  <ellipse cx="180" cy="322" rx="88" ry="16" fill="#5b6b8c" opacity="0.3"/>

  <!-- 体(ずんぐりした緑のサボテン型) -->
  <path d="M100 300 Q85 210 100 140 Q115 70 180 65 Q245 70 260 140 Q275 210 260 300 Q258 313 180 313 Q102 313 100 300 Z"
        fill="#8bc34a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 胴に巻いた麦わら色の帯(上) -->
  <path d="M100 148 Q180 172 260 148 L260 172 Q180 196 100 172 Z"
        fill="#e3c07a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 胴に巻いた麦わら色の帯(下) -->
  <path d="M96 232 Q180 256 264 232 L264 254 Q180 278 96 254 Z"
        fill="#e3c07a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 帯の赤い粒模様 -->
  <circle cx="140" cy="163" r="7" fill="#c0392b"/>
  <circle cx="180" cy="167" r="7" fill="#c0392b"/>
  <circle cx="220" cy="163" r="7" fill="#c0392b"/>
  <circle cx="140" cy="247" r="7" fill="#c0392b"/>
  <circle cx="180" cy="251" r="7" fill="#c0392b"/>
  <circle cx="220" cy="247" r="7" fill="#c0392b"/>

  <!-- 足 -->
  <ellipse cx="140" cy="316" rx="26" ry="13" fill="#6b9c3a" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="220" cy="316" rx="26" ry="13" fill="#6b9c3a" stroke="#2d263c" stroke-width="6"/>

  <!-- 腕(左右のずんぐり突起) -->
  <path d="M100 185 Q64 192 60 216 Q58 236 90 232 Q100 224 100 204 Z"
        fill="#8bc34a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M260 185 Q296 192 300 216 Q302 236 270 232 Q260 224 260 204 Z"
        fill="#8bc34a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 手先(丸いこぶ) -->
  <circle cx="70" cy="216" r="15" fill="#6b9c3a" stroke="#2d263c" stroke-width="6"/>
  <circle cx="290" cy="216" r="15" fill="#6b9c3a" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭上の花火のような赤いトゲ(中央) -->
  <path d="M150 68 L160 25 L170 55 L180 18 L190 55 L200 25 L210 68 Z"
        fill="#e2574c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 頭上のトゲ(左上斜め) -->
  <path d="M118 88 Q92 62 78 28 Q100 52 122 76 Z"
        fill="#e2574c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 頭上のトゲ(右上斜め) -->
  <path d="M242 88 Q268 62 282 28 Q260 52 238 76 Z"
        fill="#e2574c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 横のトゲ(左) -->
  <path d="M98 138 Q56 128 28 112 Q58 142 100 156 Z"
        fill="#e2574c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 横のトゲ(右) -->
  <path d="M262 138 Q304 128 332 112 Q302 142 260 156 Z"
        fill="#e2574c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔: 目 -->
  <circle cx="152" cy="150" r="9" fill="#2d263c"/>
  <circle cx="208" cy="150" r="9" fill="#2d263c"/>

  <!-- 顔: 口 -->
  <path d="M165 180 Q180 190 195 180" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <circle cx="132" cy="165" r="9" fill="#f4a7a7" opacity="0.6"/>
  <circle cx="228" cy="165" r="9" fill="#f4a7a7" opacity="0.6"/>
</svg>
