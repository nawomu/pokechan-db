<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- しっぽ(後ろ・平たいヒレ状) -->
  <path d="M250 260 Q302 248 312 208 Q322 250 292 288 Q268 302 244 290 Z" fill="#3a6883" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M260 254 Q290 246 298 220 Q302 248 280 270 Z" fill="#5f97b5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 後ろ脚(2本) -->
  <rect x="140" y="288" width="34" height="56" rx="14" fill="#4d84a1" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="188" y="288" width="34" height="56" rx="14" fill="#4d84a1" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足(平たい水かき) -->
  <ellipse cx="157" cy="345" rx="27" ry="14" fill="#e0763a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="207" cy="345" rx="27" ry="14" fill="#e0763a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="180" cy="228" rx="80" ry="95" fill="#4d84a1" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腕(2本・左右外側へ) -->
  <rect x="88" y="205" width="32" height="70" rx="16" fill="#4d84a1" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-14 104 205)"/>
  <rect x="240" y="205" width="32" height="70" rx="16" fill="#4d84a1" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(14 256 205)"/>

  <!-- 手 -->
  <ellipse cx="90" cy="282" rx="20" ry="16" fill="#3a6883" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="270" cy="282" rx="20" ry="16" fill="#3a6883" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- お腹の模様(クリーム色) -->
  <ellipse cx="180" cy="252" rx="46" ry="62" fill="#f2e6c9" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="120" rx="62" ry="58" fill="#4d84a1" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 頬のオレンジのエラ(左右) -->
  <ellipse cx="106" cy="126" rx="24" ry="17" fill="#e8823c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-16 106 126)"/>
  <ellipse cx="254" cy="126" rx="24" ry="17" fill="#e8823c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(16 254 126)"/>
  <path d="M93 119 Q106 129 121 121" fill="none" stroke="#c85f1e" stroke-width="5" stroke-linecap="round"/>
  <path d="M239 121 Q254 129 267 119" fill="none" stroke="#c85f1e" stroke-width="5" stroke-linecap="round"/>

  <!-- 頭の上のオレンジのトサカ -->
  <path d="M128 88 Q138 26 180 32 Q222 26 232 88 Q206 66 196 82 Q180 50 164 82 Q154 66 128 88 Z" fill="#e8823c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <path d="M144 80 Q180 58 216 80" fill="none" stroke="#c85f1e" stroke-width="6" stroke-linecap="round"/>

  <!-- 目(白目) -->
  <ellipse cx="154" cy="112" rx="16" ry="18" fill="white" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="206" cy="112" rx="16" ry="18" fill="white" stroke="#2d263c" stroke-width="6"/>
  <!-- 瞳 -->
  <ellipse cx="157" cy="117" rx="8" ry="10" fill="#1a1a1a"/>
  <ellipse cx="209" cy="117" rx="8" ry="10" fill="#1a1a1a"/>
  <!-- 瞳の光 -->
  <ellipse cx="153" cy="110" rx="3" ry="4" fill="white"/>
  <ellipse cx="205" cy="110" rx="3" ry="4" fill="white"/>

  <!-- 鼻の穴 -->
  <ellipse cx="172" cy="136" rx="3" ry="2" fill="#2d263c"/>
  <ellipse cx="188" cy="136" rx="3" ry="2" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M162 150 Q180 160 198 150" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
