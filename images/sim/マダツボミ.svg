<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 黄色い細長い筒状の体(下は少し細く上でふくらむ)
  2. 根元は茶色の壺(ポット)型
  3. 頭の左右から伸びる緑の尖った葉っぱ2枚
  4. 顔の下半分を占める大きなピンク色の丸い唇
  5. 小さい丸い目(白目+黒目)
  -->

  <!-- 葉っぱ(奥) -->
  <path d="M178 235 C125 218 82 176 62 122 C106 132 150 165 178 205 Z" fill="#5cb85c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M182 235 C235 218 278 176 298 122 C254 132 210 165 182 205 Z" fill="#5cb85c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M120 165 L70 128" fill="none" stroke="#3f8a44" stroke-width="4" stroke-linecap="round"/>
  <path d="M240 165 L290 128" fill="none" stroke="#3f8a44" stroke-width="4" stroke-linecap="round"/>

  <!-- 壺(根元) -->
  <path d="M118 258 L96 322 L264 322 L242 258 Z" fill="#8a5a2b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="180" cy="258" rx="62" ry="15" fill="#6e451f" stroke="#2d263c" stroke-width="6"/>
  <path d="M130 300 L100 320 M180 305 L180 322 M230 300 L260 320" fill="none" stroke="#5a3a1c" stroke-width="5" stroke-linecap="round"/>

  <!-- 体(黄色い茎) -->
  <path d="M143 258 C132 195 132 138 152 92 C163 68 197 68 208 92 C228 138 228 195 217 258 Z" fill="#f6d43c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭 -->
  <circle cx="180" cy="98" r="58" fill="#f6d43c" stroke="#2d263c" stroke-width="8"/>

  <!-- 目 -->
  <circle cx="153" cy="88" r="11" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="207" cy="88" r="11" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="156" cy="90" r="4.5" fill="#2d263c"/>
  <circle cx="204" cy="90" r="4.5" fill="#2d263c"/>

  <!-- 大きな丸い唇 -->
  <path d="M136 118 C136 155 224 155 224 118 C224 168 136 168 136 118 Z" fill="#ef6d94" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="180" cy="142" rx="34" ry="14" fill="#8a2b4a"/>
</svg>
