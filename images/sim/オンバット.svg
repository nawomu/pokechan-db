<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)紫色の小さなコウモリ胴体 2)巨大な耳(内側は淡色) 3)広がる翼膜 4)首のふわふわ襟 5)大きな目と2本の牙 -->

  <!-- 左翼(後ろ・広がる) -->
  <path d="M150,195 Q90,165 55,195 Q50,225 80,235 Q120,238 155,220 Z" fill="#7a5aa8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M150,210 Q105,200 80,225 M120,215 L100,232" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <!-- 右翼 -->
  <path d="M210,195 Q270,165 305,195 Q310,225 280,235 Q240,238 205,220 Z" fill="#7a5aa8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M210,210 Q255,200 280,225 M240,215 L260,232" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" opacity="0.6"/>

  <!-- 巨大な左耳 -->
  <path d="M165,140 Q130,95 120,55 Q140,60 168,110 Z" fill="#9a78c4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M158,128 Q138,98 132,72 Q148,78 162,112 Z" fill="#d8b8e8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 巨大な右耳 -->
  <path d="M195,140 Q230,95 240,55 Q220,60 192,110 Z" fill="#9a78c4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M202,128 Q222,98 228,72 Q212,78 198,112 Z" fill="#d8b8e8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <ellipse cx="180" cy="210" rx="42" ry="45" fill="#9a78c4" stroke="#2d263c" stroke-width="7"/>

  <!-- 首のふわふわ襟 -->
  <path d="M148,185 Q180,178 212,185 Q210,200 180,202 Q150,200 148,185 Z" fill="#f2e8d8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M156,188 L154,198 M170,186 L168,200 M190,186 L192,200 M204,188 L206,198" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 頭 -->
  <circle cx="180" cy="155" r="35" fill="#9a78c4" stroke="#2d263c" stroke-width="7"/>

  <!-- 左目(大) -->
  <ellipse cx="166" cy="152" rx="13" ry="15" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="168" cy="155" r="6" fill="#2d263c"/>
  <circle cx="165" cy="152" r="2.5" fill="#ffffff"/>
  <!-- 右目(大) -->
  <ellipse cx="194" cy="152" rx="13" ry="15" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="192" cy="155" r="6" fill="#2d263c"/>
  <circle cx="189" cy="152" r="2.5" fill="#ffffff"/>

  <!-- 鼻 -->
  <path d="M178,168 Q180,172 182,168" fill="#2d263c" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 牙(2本) -->
  <path d="M172,176 L170,188 L176,180 Z" fill="#ffffff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M188,176 L190,188 L184,180 Z" fill="#ffffff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 足(2本) -->
  <path d="M165,250 L160,265 M195,250 L200,265" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
