<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 剣(後ろ側・盾の裏) -->
  <rect x="168" y="60" width="18" height="200" rx="4" fill="#8B7BA8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="168,60 186,60 177,30" fill="#C0B0D0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="155" y="150" width="45" height="12" rx="3" fill="#D4A017" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左リボン腕 -->
  <path d="M 108 195 Q 72 210 58 250 Q 52 270 62 275 Q 78 280 90 260 Q 100 238 112 220" fill="#5a3a7a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 左リボン先端(広がり) -->
  <path d="M 62 275 Q 45 285 40 300 Q 48 310 68 298 Q 80 288 90 260" fill="#5a3a7a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 右リボン腕 -->
  <path d="M 248 195 Q 285 208 300 248 Q 308 268 298 274 Q 282 280 268 260 Q 256 238 244 220" fill="#5a3a7a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 右リボン先端(広がり) -->
  <path d="M 298 274 Q 316 283 320 298 Q 312 310 292 300 Q 278 290 268 260" fill="#5a3a7a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 盾本体(メイン) -->
  <!-- 盾の外枠(金色) -->
  <path d="M 177 62 L 258 98 L 272 190 L 218 268 L 177 282 L 136 268 L 84 190 L 96 98 Z" fill="#D4A017" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 盾の内側(紫) -->
  <path d="M 177 80 L 245 112 L 257 192 L 210 258 L 177 270 L 144 258 L 99 192 L 111 112 Z" fill="#6B4F8C" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 盾内側の中央パネル(少し明るい紫) -->
  <path d="M 177 100 L 230 126 L 240 194 L 200 244 L 177 252 L 154 244 L 116 194 L 126 126 Z" fill="#8B6AAC" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 盾の十字リベット模様 -->
  <!-- 縦リベット -->
  <ellipse cx="177" cy="138" rx="7" ry="8" fill="#D4A017" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="177" cy="170" rx="7" ry="8" fill="#D4A017" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="177" cy="202" rx="7" ry="8" fill="#D4A017" stroke="#2d263c" stroke-width="3"/>
  <!-- 横リベット -->
  <ellipse cx="145" cy="170" rx="8" ry="7" fill="#D4A017" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="209" cy="170" rx="8" ry="7" fill="#D4A017" stroke="#2d263c" stroke-width="3"/>
  <!-- 中央大リベット -->
  <circle cx="177" cy="170" r="12" fill="#C89A10" stroke="#2d263c" stroke-width="4"/>
  <circle cx="177" cy="170" r="6" fill="#F0C830" stroke="#2d263c" stroke-width="2"/>

  <!-- 盾の上部の突起(王冠っぽい飾り) -->
  <polygon points="155,82 162,62 169,80" fill="#D4A017" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="175,78 177,54 179,78" fill="#D4A017" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="199,82 194,62 187,80" fill="#D4A017" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 顔: 赤い目(盾の上部) -->
  <!-- 左目 -->
  <ellipse cx="157" cy="122" rx="10" ry="14" fill="#CC2222" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="157" cy="122" rx="5" ry="8" fill="#FF4444"/>
  <ellipse cx="154" cy="118" rx="2" ry="3" fill="#FF9999"/>
  <!-- 右目 -->
  <ellipse cx="197" cy="122" rx="10" ry="14" fill="#CC2222" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="197" cy="122" rx="5" ry="8" fill="#FF4444"/>
  <ellipse cx="194" cy="118" rx="2" ry="3" fill="#FF9999"/>

  <!-- 眉っぽいライン(キリッと感) -->
  <path d="M 148 108 Q 157 104 167 108" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M 187 108 Q 197 104 207 108" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 盾の下の小さいとがり -->
  <polygon points="165,280 177,310 189,280" fill="#D4A017" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
</svg>