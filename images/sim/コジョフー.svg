<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body) -->
  <path d="M216,272 Q258,258 274,214 Q292,172 282,142 Q270,168 254,200 Q234,240 214,270 Z"
        fill="#B9803F" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="298" cy="150" rx="24" ry="20" fill="#F3E4C4" stroke="#2d263c" stroke-width="6"/>

  <!-- feet -->
  <ellipse cx="150" cy="322" rx="24" ry="18" fill="#B9803F" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="210" cy="322" rx="24" ry="18" fill="#B9803F" stroke="#2d263c" stroke-width="7"/>

  <!-- body -->
  <ellipse cx="180" cy="220" rx="64" ry="80" fill="#B9803F" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- belly patch -->
  <path d="M180,168 L150,232 Q180,262 210,232 Z"
        fill="#F3E4C4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- left arm (bent at side, fist down) -->
  <path d="M132,192 Q108,215 108,252 L128,258 Q126,222 148,198 Z"
        fill="#B9803F" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="112" cy="258" rx="18" ry="16" fill="#B9803F" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="118" cy="234" rx="14" ry="10" fill="#F3E4C4" stroke="#2d263c" stroke-width="5"/>

  <!-- right arm (raised guard, fist near head) -->
  <path d="M228,188 Q252,168 252,132 L232,126 Q228,162 210,182 Z"
        fill="#B9803F" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="252" cy="130" rx="18" ry="16" fill="#B9803F" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="246" cy="156" rx="14" ry="10" fill="#F3E4C4" stroke="#2d263c" stroke-width="5"/>

  <!-- head -->
  <ellipse cx="180" cy="112" rx="58" ry="52" fill="#B9803F" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ears -->
  <path d="M150,96 Q134,62 128,42 Q152,58 168,90 Z"
        fill="#B9803F" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M210,96 Q226,62 232,42 Q208,58 192,90 Z"
        fill="#B9803F" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M150,90 Q142,68 138,52 Q152,64 160,84 Z" fill="#8C5A28"/>
  <path d="M210,90 Q218,68 222,52 Q208,64 200,84 Z" fill="#8C5A28"/>

  <!-- face muzzle -->
  <ellipse cx="180" cy="138" rx="42" ry="32" fill="#F3E4C4" stroke="#2d263c" stroke-width="6"/>

  <!-- cheek fu-manchu tufts -->
  <path d="M152,132 Q130,140 136,166 Q152,156 158,138 Z"
        fill="#F3E4C4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M208,132 Q230,140 224,166 Q208,156 202,138 Z"
        fill="#F3E4C4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- eyebrows -->
  <path d="M148,90 Q160,78 173,90" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M187,90 Q200,78 212,90" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- eyes -->
  <ellipse cx="160" cy="108" rx="10" ry="13" fill="#C0392B" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="200" cy="108" rx="10" ry="13" fill="#C0392B" stroke="#2d263c" stroke-width="5"/>
  <circle cx="163" cy="103" r="3" fill="#F3E4C4"/>
  <circle cx="203" cy="103" r="3" fill="#F3E4C4"/>

  <!-- nose -->
  <ellipse cx="180" cy="126" rx="7" ry="5" fill="#3B2A1A" stroke="#2d263c" stroke-width="4"/>

  <!-- mouth -->
  <path d="M168,148 Q180,156 192,148" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
