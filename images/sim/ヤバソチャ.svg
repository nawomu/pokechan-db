<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ：呪いの液体たれ(底部) -->
  <ellipse cx="178" cy="295" rx="38" ry="14" fill="#7a3e10" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M148 275 Q140 290 145 300 Q158 312 178 313 Q198 312 213 300 Q218 290 210 275" fill="#7a3e10" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 取っ手(右) -->
  <path d="M245 195 Q278 188 282 215 Q285 242 258 248" fill="none" stroke="#3a2560" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M245 195 Q276 190 279 216 Q281 240 258 248" fill="#3a2560" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 注ぎ口(左) -->
  <path d="M118 192 Q88 178 75 162 Q68 150 76 143 Q85 136 96 145 Q104 152 112 168" fill="#3a2560" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
