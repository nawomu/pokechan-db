  <path d="M76 148 Q66 155 70 165 Q74 172 82 168" fill="#a04e15" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 胴体メイン(急須の丸い体) -->
  <ellipse cx="182" cy="215" rx="90" ry="82" fill="#2e1d52" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 胴体の模様(呪いの紋様っぽいライン) -->
  <path d="M138 200 Q155 190 182 195 Q210 190 226 200" fill="none" stroke="#4a2d7a" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M132 220 Q155 212 182 217 Q210 212 232 220" fill="none" stroke="#4a2d7a" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 茶色の液体(胴体内からあふれる感じ・上部) -->
  <path d="M158 158 Q168 148 182 150 Q196 148 205 158 Q210 165 205 172 Q196 162 182 163 Q168 162 158 172 Q153 165 158 158Z" fill="#8b4513" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 蓋(フタ) -->
  <path d="M148 162 Q160 148 182 145 Q204 148 216 162 Q220 170 216 175 Q204 168 182 166 Q160 168 148 175 Q144 170 148 162Z" fill="#4a3570" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 蓋のつまみ -->
  <ellipse cx="182" cy="140" rx="14" ry="9" fill="#5a3f82" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="182" cy="133" rx="8" ry="5" fill="#6b4e96" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目(左) — 大きくてぎょろっとした不気味な目 -->
  <ellipse cx="161" cy="208" rx="20" ry="22" fill="white" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="163" cy="210" rx="13" ry="15" fill="#cc0000" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="164" cy="211" rx="8" ry="9" fill="#1a0a2a"/>
  <ellipse cx="158" cy="206" rx="4" ry="4" fill="white"/>

  <!-- 目(右) — 少し小さくてずらす(ゆるさ演出) -->
  <ellipse cx="203" cy="206" rx="17" ry="20" fill="white" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="205" cy="208" rx="11" ry="13" fill="#cc0000" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="206" cy="209" rx="7" ry="8" fill="#1a0a2a"/>
  <ellipse cx="200" cy="204" rx="3" ry="3" fill="white"/>

  <!-- 口(ニヤッとした歪み笑い) -->
  <path d="M158 240 Q168 250 182 252 Q198 250 212 238" fill="none" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M158 240 Q162 246 168 244" fill="none" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M212 238 Q208 244 202 242" fill="none" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 口内の暗い色 -->
  <path d="M161 241 Q168 249 182 251 Q197 249 210 239 Q205 255 182 258 Q160 255 161 241Z" fill="#1a0a2a"/>

  <!-- 手のような触手(左) -->
  <path d="M138 240 Q118 255 108 248 Q102 240 112 235" fill="#2e1d52" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M108 248 Q98 260 104 268 Q110 264 112 256" fill="#2e1d52" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M112 235 Q100 230 98 238 Q100 245 110 244" fill="#2e1d52" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 手のような触手(右) -->
  <path d="M226 242 Q248 255 258 246 Q264 237 253 232" fill="#2e1d52" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M258 246 Q268 258 262 267 Q256 262 254 254" fill="#2e1d52" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 底からたれる液体のしずく -->
  <path d="M168 294 Q165 308 170 318 Q176 325 180 318 Q182 308 178 294Z" fill="#7a3e10" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M190 297 Q188 310 192 320 Q197 326 200 320 Q202 310 198 297Z" fill="#8b4513" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 霊体のモヤ(左上) -->
  <path d="M118 168 Q108 155 115 145 Q120 138 128 148 Q132 155 125 162Z" fill="#3d2568" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" opacity="0.75"/>
  <!-- 霊体のモヤ(右上) -->
  <path d="M242 160 Q252 148 260 155 Q265 163 256 170 Q248 174 242 168Z" fill="#3d2568" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" opacity="0.75"/>
</svg>