<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail leaf -->
  <path d="M240 260 Q285 250 280 290 Q260 300 235 280 Z" fill="#3f9c6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- back legs -->
  <ellipse cx="140" cy="300" rx="18" ry="28" fill="#e9dcc0" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="215" cy="300" rx="18" ry="28" fill="#e9dcc0" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="140" cy="322" rx="16" ry="9" fill="#2d263c"/>
  <ellipse cx="215" cy="322" rx="16" ry="9" fill="#2d263c"/>
  <!-- front legs -->
  <ellipse cx="110" cy="290" rx="16" ry="30" fill="#f5edd6" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="245" cy="290" rx="16" ry="30" fill="#f5edd6" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="110" cy="314" rx="14" ry="8" fill="#2d263c"/>
  <ellipse cx="245" cy="314" rx="14" ry="8" fill="#2d263c"/>
  <!-- leaf cape behind body -->
  <path d="M95 190 Q60 210 75 260 Q90 240 110 250 Z" fill="#2f7a52" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M262 190 Q300 205 288 258 Q272 238 250 248 Z" fill="#2f7a52" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- body -->
  <ellipse cx="180" cy="225" rx="90" ry="75" fill="#f5edd6" stroke="#2d263c" stroke-width="8"/>
  <!-- belly patch -->
  <ellipse cx="180" cy="250" rx="45" ry="35" fill="#fffaf0" stroke="#2d263c" stroke-width="6"/>
  <!-- neck leaf collar -->
  <path d="M120 190 Q180 220 240 190 Q225 235 180 240 Q135 235 120 190 Z" fill="#3f9c6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- head -->
  <circle cx="180" cy="140" r="78" fill="#f5edd6" stroke="#2d263c" stroke-width="8"/>
  <!-- ears poking above mask -->
  <path d="M130 80 Q120 40 145 55 Q150 80 145 100 Z" fill="#f5edd6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M230 80 Q240 40 215 55 Q210 80 215 100 Z" fill="#f5edd6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- mask (green) covering upper face -->
  <path d="M105 130 Q95 70 150 60 Q180 50 210 60 Q265 70 255 130 Q245 165 180 172 Q115 165 105 130 Z" fill="#3f9c6e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- mask horn tips -->
  <path d="M150 60 Q145 30 165 45 Z" fill="#2f7a52" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M210 60 Q215 30 195 45 Z" fill="#2f7a52" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- mask gem -->
  <path d="M180 95 L192 112 L180 129 L168 112 Z" fill="#e8c468" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- eye holes in mask -->
  <ellipse cx="145" cy="118" rx="14" ry="16" fill="#fffaf0" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="215" cy="118" rx="14" ry="16" fill="#fffaf0" stroke="#2d263c" stroke-width="6"/>
  <!-- eyes -->
  <circle cx="147" cy="120" r="7" fill="#d94040"/>
  <circle cx="213" cy="120" r="7" fill="#d94040"/>
  <circle cx="149" cy="117" r="2.5" fill="#fffaf0"/>
  <circle cx="215" cy="117" r="2.5" fill="#fffaf0"/>
  <!-- cheek leaf marks -->
  <path d="M110 155 Q100 165 112 175" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M250 155 Q260 165 248 175" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- nose/mouth -->
  <path d="M172 165 Q180 172 188 165" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
