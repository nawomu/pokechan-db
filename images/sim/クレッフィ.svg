<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 鍵束チェーン(後ろレイヤー) -->
  <line x1="172" y1="238" x2="145" y2="275" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="182" y1="242" x2="182" y2="282" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="192" y1="238" x2="218" y2="272" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 鍵1(左・ハート型ビット) -->
  <rect x="126" y="274" width="14" height="22" rx="3" fill="#f5c842" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="133" y="268" width="8" height="12" rx="4" fill="#f5c842" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="130" y="288" width="4" height="7" rx="1" fill="#2d263c"/>

  <!-- 鍵2(中・シンプル) -->
  <rect x="173" y="280" width="13" height="24" rx="3" fill="#f5c842" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="179" cy="277" rx="7" ry="7" fill="#f5c842" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="179" cy="277" rx="3" ry="3" fill="#2d263c"/>
  <rect x="181" y="291" width="5" height="5" rx="1" fill="#2d263c"/>

  <!-- 鍵3(右・ギザビット) -->
  <rect x="209" y="271" width="13" height="22" rx="3" fill="#f5c842" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="209" y="264" width="8" height="12" rx="4" fill="#f5c842" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="215" y="282" width="5" height="5" rx="1" fill="#2d263c"/>
  <rect x="215" y="291" width="5" height="5" rx="1" fill="#2d263c"/>

  <!-- 本体リング(鍵の輪) — 外形 -->
  <ellipse cx="182" cy="148" rx="82" ry="88" fill="#e8e4f0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 本体リング 内側の穴 -->
  <ellipse cx="182" cy="148" rx="48" ry="52" fill="#b8b0d8" stroke="#2d263c" stroke-width="6"/>

  <!-- 鍵の棒(リング下部) -->
  <rect x="168" y="225" width="30" height="22" rx="5" fill="#f5c842" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 耳(左) — ちょっと傾いた三角 -->
  <polygon points="112,90 98,60 130,72" fill="#e8e4f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 耳(右) — 右は少し大きめ非対称 -->
  <polygon points="248,86 262,55 234,70" fill="#e8e4f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔 — 目(左)くりくり -->
  <ellipse cx="160" cy="145" rx="13" ry="15" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="162" cy="147" rx="8" ry="9" fill="#1a1230"/>
  <ellipse cx="158" cy="143" rx="3" ry="3" fill="white"/>

  <!-- 顔 — 目(右) ちょっとたれ目気味 -->
  <ellipse cx="205" cy="148" rx="12" ry="13" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="207" cy="150" rx="7" ry="8" fill="#1a1230"/>
  <ellipse cx="203" cy="146" rx="3" ry="3" fill="white"/>

  <!-- ほっぺ(左) -->
  <ellipse cx="143" cy="165" rx="11" ry="8" fill="#f0a0b0" opacity="0.75"/>

  <!-- ほっぺ(右) -->
  <ellipse cx="222" cy="168" rx="10" ry="7" fill="#f0a0b0" opacity="0.75"/>

  <!-- 口 — ゆるい笑顔 -->
  <path d="M174,172 Q182,182 192,172" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- リングのメタリック光沢ライン -->
  <path d="M130,108 Q148,98 168,104" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

</svg>