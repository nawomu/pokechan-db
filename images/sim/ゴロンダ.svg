<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ: 尻尾なし・足 -->
  <!-- 左足 -->
  <ellipse cx="135" cy="308" rx="32" ry="22" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右足 -->
  <ellipse cx="225" cy="312" rx="34" ry="20" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体 本体 (黒) -->
  <path d="M90 210 C82 280 100 320 140 328 C158 334 195 336 220 330 C260 320 278 285 274 218 C278 170 268 130 250 115 C232 100 118 98 108 118 C90 140 88 175 90 210 Z" fill="#1a1a2e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹 (白い楕円もふもふ) -->
  <ellipse cx="180" cy="245" rx="52" ry="62" fill="#f0ece0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左腕 (太くゴツい) -->
  <path d="M100 155 C68 160 52 185 50 218 C48 240 60 258 80 262 C95 265 108 252 112 235 C118 210 115 180 110 165 Z" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左手の爪 -->
  <path d="M58 248 C48 254 44 264 50 270" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M68 260 C60 268 58 278 65 282" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M82 265 C76 274 76 284 83 286" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 右腕 -->
  <path d="M260 158 C292 165 308 190 308 220 C308 244 295 260 275 264 C260 267 248 254 245 238 C240 215 242 182 250 165 Z" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右手の爪 -->
  <path d="M300 248 C310 256 314 266 308 272" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M290 262 C298 270 298 280 292 283" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M276 267 C282 276 282 286 275 288" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 頭 (黒ベース) -->
  <ellipse cx="180" cy="122" rx="72" ry="68" fill="#1a1a2e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 耳 左 (丸・少し非対称) -->
  <circle cx="122" cy="64" r="26" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="122" cy="65" r="14" fill="#3d2a2a" stroke="#2d263c" stroke-width="4"/>

  <!-- 耳 右 (少し大きめ) -->
  <circle cx="240" cy="60" r="28" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="240" cy="61" r="16" fill="#3d2a2a" stroke="#2d263c" stroke-width="4"/>

  <!-- 顔 白い部分 -->
  <ellipse cx="180" cy="132" rx="55" ry="52" fill="#f0ece0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目まわりの黒いクマ模様 左 -->
  <ellipse cx="157" cy="118" rx="20" ry="17" fill="#1a1a2e" stroke="#2d263c" stroke-width="3"/>
  <!-- 目まわりの黒いクマ模様 右 -->
  <ellipse cx="205" cy="116" rx="21" ry="18" fill="#1a1a2e" stroke="#2d263c" stroke-width="3"/>

  <!-- 目 白 左 -->
  <ellipse cx="156" cy="117" rx="11" ry="10" fill="#f0f0f0" stroke="#2d263c" stroke-width="2"/>
  <!-- 目 黒目 左 -->
  <circle cx="158" cy="118" r="6" fill="#1a1a2e"/>
  <circle cx="160" cy="115" r="2" fill="#ffffff"/>

  <!-- 目 白 右 -->
  <ellipse cx="204" cy="115" rx="12" ry="10" fill="#f0f0f0" stroke="#2d263c" stroke-width="2"/>
  <!-- 目 黒目 右 -->
  <circle cx="206" cy="116" r="6" fill="#1a1a2e"/>
  <circle cx="208" cy="113" r="2" fill="#ffffff"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="135" rx="14" ry="10" fill="#3d2233" stroke="#2d263c" stroke-width="4"/>

  <!-- 口 (への字・厳つい) -->
  <path d="M162 152 C168 148 180 147 192 148 C200 153 204 156 200 160" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 口角下がり気味 -->
  <path d="M162 152 C158 156 156 162 160 164" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- くわえた笹(草) -->
  <path d="M192 154 C215 148 248 136 268 118" fill="none" stroke="#3a7d44" stroke-width="7" stroke-linecap="round"/>
  <!-- 笹の葉っぱ -->
  <ellipse cx="238" cy="130" rx="14" ry="7" fill="#4caf60" stroke="#2d263c" stroke-width="3" transform="rotate(-30 238 130)"/>
  <ellipse cx="256" cy="122" rx="13" ry="6" fill="#4caf60" stroke="#2d263c" stroke-width="3" transform="rotate(-40 256 122)"/>
  <ellipse cx="262" cy="118" rx="11" ry="5" fill="#3a7d44" stroke="#2d263c" stroke-width="3" transform="rotate(-50 262 118)"/>

  <!-- 足の指の線 -->
  <line x1="118" y1="322" x2="112" y2="330" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="132" y1="325" x2="130" y2="334" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="148" y1="326" x2="148" y2="334" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="212" y1="324" x2="207" y2="332" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="226" y1="327" x2="224" y2="336" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="240" y1="326" x2="240" y2="334" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
</svg>