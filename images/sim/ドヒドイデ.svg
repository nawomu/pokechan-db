  <polygon points="213,130  205,125  217,108" fill="#b8559a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="225,140  218,138  228,120" fill="#b8559a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="135,140  132,120  142,138" fill="#b8559a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 顔パーツ: 眉(不機嫌そうな黒い模様) -->
