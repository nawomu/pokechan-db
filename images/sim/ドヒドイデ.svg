  <polygon points="278,268  257,258  255,274" fill="#1a3a7a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="265,290  246,277  242,293" fill="#1a3a7a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

