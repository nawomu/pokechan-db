  <circle cx="197" cy="177" r="9" fill="#e84040"/>
  <circle cx="161" cy="175" r="4" fill="#2d263c"/>
  <circle cx="195" cy="175" r="4" fill="#2d263c"/>
  <!-- 目の光 -->
  <circle cx="164" cy="173" r="2" fill="white" opacity="0.8"/>
  <circle cx="198" cy="173" r="2" fill="white" opacity="0.8"/>

  <!-- 顔パーツ: 口(への字・不機嫌) -->
  <path d="M168,195 Q180,188 192,195" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 頭の側面小トゲ -->
  <polygon points="128,172  132,185  143,178" fill="#b8559a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="232,172  228,185  217,178" fill="#b8559a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

</svg>