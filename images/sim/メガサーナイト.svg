<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 背後の翼（左） -->
  <ellipse cx="105" cy="155" rx="55" ry="90" fill="#e8e8f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-18 105 155)"/>
  <!-- 背後の翼（右） -->
  <ellipse cx="258" cy="150" rx="55" ry="90" fill="#e8e8f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(22 258 150)"/>

  <!-- ドレス（スカート・下半身） -->
  <ellipse cx="182" cy="290" rx="98" ry="58" fill="#f0f0f8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- ドレス上部 -->
  <path d="M115 230 Q130 195 182 190 Q235 195 250 230 Q255 260 182 275 Q110 265 115 230Z" fill="#f0f0f8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胸の突起（前に出た角） -->
  <path d="M175 215 Q180 200 185 215 Q188 235 182 248 Q178 235 175 215Z" fill="#2e8b57" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 首 -->
  <rect x="170" y="160" width="25" height="38" rx="10" fill="#f0f0f8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 緑の胸元 -->
  <ellipse cx="182" cy="205" rx="18" ry="12" fill="#3cb371" stroke="#2d263c" stroke-width="5"/>

  <!-- 頭部 -->
  <ellipse cx="182" cy="140" rx="38" ry="42" fill="#f0f0f8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭頂部の緑パーツ -->
  <path d="M158 118 Q182 105 205 118 Q198 108 182 100 Q167 108 158 118Z" fill="#3cb371" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頭の角（メガ進化の大きな角） -->
  <path d="M178 103 Q182 68 186 103" fill="none" stroke="#2e8b57" stroke-width="10" stroke-linecap="round"/>
  <path d="M182 68 Q178 50 182 32 Q186 50 182 68Z" fill="#2e8b57" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左目 -->
  <ellipse cx="165" cy="143" rx="9" ry="11" fill="#e03030" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="165" cy="145" rx="4" ry="5" fill="#8b0000"/>
  <ellipse cx="163" cy="142" rx="2" ry="2" fill="white"/>

  <!-- 右目 -->
  <ellipse cx="200" cy="143" rx="9" ry="11" fill="#e03030" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="200" cy="145" rx="4" ry="5" fill="#8b0000"/>
  <ellipse cx="198" cy="142" rx="2" ry="2" fill="white"/>

  <!-- 小さな口 -->
  <path d="M178 162 Q182 166 187 162" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 左うで -->
  <path d="M142 220 Q118 225 110 245 Q115 248 120 245 Q125 235 148 228Z" fill="#f0f0f8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 右うで -->
  <path d="M222 220 Q248 225 255 245 Q250 248 245 245 Q240 235 218 228Z" fill="#f0f0f8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ドレスの裾ライン（装飾） -->
  <path d="M115 268 Q182 282 250 268" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M100 285 Q182 305 265 285" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 翼の内側のライン（左） -->
  <path d="M118 130 Q108 158 115 190" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- 翼の内側のライン（右） -->
  <path d="M245 125 Q255 155 248 190" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- ほっぺのピンク -->
  <ellipse cx="155" cy="158" rx="8" ry="6" fill="#ffb6c1" opacity="0.7"/>
  <ellipse cx="210" cy="158" rx="8" ry="6" fill="#ffb6c1" opacity="0.7"/>
</svg>