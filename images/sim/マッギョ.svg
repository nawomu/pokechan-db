<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 体の影（後ろに敷く） -->
  <ellipse cx="184" cy="222" rx="138" ry="88" fill="#7a5c2e" opacity="0.18"/>

  <!-- 体本体（平べったい楕円） -->
  <ellipse cx="180" cy="210" rx="135" ry="84" fill="#c8973a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腹の明るい部分 -->
  <ellipse cx="180" cy="228" rx="90" ry="52" fill="#e8c96a"/>

  <!-- 体の縞模様（まだらな斑） -->
  <ellipse cx="125" cy="190" rx="22" ry="14" fill="#7a5018" opacity="0.7" transform="rotate(-18,125,190)"/>
  <ellipse cx="165" cy="178" rx="16" ry="10" fill="#7a5018" opacity="0.7" transform="rotate(5,165,178)"/>
  <ellipse cx="215" cy="185" rx="19" ry="12" fill="#7a5018" opacity="0.7" transform="rotate(-10,215,185)"/>
  <ellipse cx="248" cy="200" rx="15" ry="10" fill="#7a5018" opacity="0.65" transform="rotate(15,248,200)"/>
  <ellipse cx="145" cy="230" rx="14" ry="9" fill="#7a5018" opacity="0.55" transform="rotate(-5,145,230)"/>
  <ellipse cx="200" cy="238" rx="12" ry="8" fill="#7a5018" opacity="0.5" transform="rotate(8,200,238)"/>

  <!-- 側びれ 左上 -->
  <ellipse cx="52" cy="192" rx="26" ry="12" fill="#b07f28" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-25,52,192)"/>
  <!-- 側びれ 左下 -->
  <ellipse cx="62" cy="235" rx="22" ry="10" fill="#b07f28" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(20,62,235)"/>
  <!-- 側びれ 右上 -->
  <ellipse cx="308" cy="190" rx="26" ry="12" fill="#b07f28" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(25,308,190)"/>
  <!-- 側びれ 右下 -->
  <ellipse cx="300" cy="234" rx="22" ry="10" fill="#b07f28" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-20,300,234)"/>

  <!-- 背びれ（頭の上のトゲ） -->
  <polygon points="148,138 158,98 168,138" fill="#d4a030" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="168,132 180,86 192,132" fill="#d4a030" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="192,138 204,95 214,138" fill="#d4a030" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体の輪郭を再描画（前面） -->
  <ellipse cx="180" cy="210" rx="135" ry="84" fill="none" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目 左（大きく飛び出た感じ） -->
  <ellipse cx="148" cy="198" rx="22" ry="24" fill="#f0e020" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="148" cy="200" rx="13" ry="15" fill="#2a8a10" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="148" cy="200" rx="7" ry="9" fill="#1a1a1a"/>
  <ellipse cx="144" cy="195" rx="4" ry="3" fill="white" opacity="0.8"/>

  <!-- 目 右（ちょっとズレてバカっぽく） -->
  <ellipse cx="216" cy="196" rx="21" ry="23" fill="#f0e020" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="217" cy="198" rx="12" ry="14" fill="#2a8a10" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="217" cy="198" rx="7" ry="8" fill="#1a1a1a"/>
  <ellipse cx="213" cy="193" rx="4" ry="3" fill="white" opacity="0.8"/>

  <!-- ほっぺ（赤い電気袋） -->
  <ellipse cx="128" cy="228" rx="16" ry="11" fill="#e84040" opacity="0.8" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="236" cy="225" rx="16" ry="11" fill="#e84040" opacity="0.8" stroke="#2d263c" stroke-width="3"/>

  <!-- 口（ニヤけた分厚い唇） -->
  <path d="M155 240 Q180 262 207 239" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M158 242 Q180 256 204 241" fill="#c03030" stroke="none"/>
  <!-- 口の端のニヤリ -->
  <path d="M155 240 Q148 244 152 250" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M207 239 Q214 243 210 249" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- しっぽびれ（下部） -->
  <ellipse cx="180" cy="290" rx="48" ry="15" fill="#b07f28" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="180" cy="294" rx="30" ry="9" fill="#c8973a"/>
</svg>