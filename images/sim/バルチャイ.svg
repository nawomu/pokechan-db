<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- back: small tail feathers -->
  <path d="M130 265 Q100 285 75 320 Q108 312 138 292 Z" fill="#232741" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M155 275 Q135 305 122 338 Q150 322 165 298 Z" fill="#2b3050" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- wings behind body -->
  <ellipse cx="108" cy="205" rx="34" ry="54" fill="#2b3050" stroke="#2d263c" stroke-width="7" transform="rotate(-18 108 205)"/>
  <ellipse cx="252" cy="205" rx="34" ry="54" fill="#2b3050" stroke="#2d263c" stroke-width="7" transform="rotate(18 252 205)"/>

  <!-- body -->
  <ellipse cx="180" cy="222" rx="96" ry="88" fill="#363c60" stroke="#2d263c" stroke-width="8"/>

  <!-- cream belly patch -->
  <ellipse cx="180" cy="252" rx="54" ry="44" fill="#f5ecd6" stroke="#2d263c" stroke-width="6"/>

  <!-- legs -->
  <path d="M150 300 L143 332" stroke="#f0a83c" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M212 300 L219 332" stroke="#f0a83c" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M128 332 L156 332" stroke="#f0a83c" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M204 332 L232 332" stroke="#f0a83c" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- head -->
  <circle cx="180" cy="140" r="82" fill="#363c60" stroke="#2d263c" stroke-width="8"/>

  <!-- head tuft feathers -->
  <path d="M158 68 Q170 26 190 62" fill="#363c60" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M188 60 Q206 18 220 62" fill="#2b3050" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- beak -->
  <path d="M158 160 L180 195 L202 160 Q180 172 158 160 Z" fill="#f2a93c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- eyes -->
  <circle cx="148" cy="130" r="19" fill="#211f2e" stroke="#2d263c" stroke-width="5"/>
  <circle cx="212" cy="130" r="19" fill="#211f2e" stroke="#2d263c" stroke-width="5"/>
  <circle cx="142" cy="123" r="6" fill="#ffffff"/>
  <circle cx="206" cy="123" r="6" fill="#ffffff"/>

  <!-- cheek blush -->
  <ellipse cx="118" cy="158" rx="13" ry="9" fill="#e08a7a" opacity="0.55"/>
  <ellipse cx="242" cy="158" rx="13" ry="9" fill="#e08a7a" opacity="0.55"/>
</svg>
