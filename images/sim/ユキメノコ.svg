<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろの翼飾り（左） -->
  <ellipse cx="92" cy="155" rx="38" ry="62" transform="rotate(-22 92 155)" fill="#c8e8f8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 後ろの翼飾り（右） -->
  <ellipse cx="268" cy="152" rx="38" ry="62" transform="rotate(20 268 152)" fill="#c8e8f8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体（着物シルエット・下すぼまり） -->
  <path d="M 118 170 Q 108 200 105 240 Q 103 290 130 315 Q 155 332 180 333 Q 207 332 230 315 Q 257 290 255 240 Q 252 200 242 170 Q 220 155 180 153 Q 143 155 118 170 Z" fill="#eef6fb" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 着物の胸元・襟ライン -->
  <path d="M 155 172 Q 180 185 205 172" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 胴模様（菱形っぽい紫ピンク帯） -->
  <path d="M 128 210 Q 155 200 180 203 Q 205 200 232 210 Q 228 235 180 240 Q 132 235 128 210 Z" fill="#d47faa" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 内側 薄いピンク菱形 -->
  <path d="M 148 212 Q 180 207 212 212 Q 208 230 180 233 Q 152 230 148 212 Z" fill="#f0aac8"/>

  <!-- 左袖 -->
  <path d="M 118 195 Q 90 205 78 230 Q 72 250 85 262 Q 100 270 118 255 Q 125 240 122 215 Z" fill="#eef6fb" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左手 -->
  <ellipse cx="84" cy="258" rx="14" ry="10" transform="rotate(-10 84 258)" fill="#b0d8ee" stroke="#2d263c" stroke-width="5"/>

  <!-- 右袖 -->
  <path d="M 242 195 Q 270 205 282 230 Q 288 250 275 262 Q 260 270 242 255 Q 235 240 238 215 Z" fill="#eef6fb" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右手 -->
  <ellipse cx="276" cy="258" rx="14" ry="10" transform="rotate(10 276 258)" fill="#b0d8ee" stroke="#2d263c" stroke-width="5"/>

  <!-- 頭部（ちょっと大きめ・ゆるいまる） -->
  <ellipse cx="180" cy="120" rx="58" ry="55" fill="#eef6fb" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の角（左） -->
  <path d="M 138 80 Q 125 48 140 32 Q 148 55 145 78 Z" fill="#eef6fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 頭の角（右） -->
  <path d="M 222 80 Q 235 48 220 32 Q 212 55 215 78 Z" fill="#eef6fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 額の赤い宝石（菱形） -->
  <path d="M 180 72 L 191 83 L 180 94 L 169 83 Z" fill="#e03040" stroke="#2d263c" stroke-width="4"/>
  <!-- 宝石のハイライト -->
  <path d="M 176 76 L 183 80" stroke="#ff8090" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 目（左・空洞っぽい黒穴） -->
  <ellipse cx="158" cy="118" rx="16" ry="19" fill="#1a1228" stroke="#2d263c" stroke-width="5"/>
  <!-- 目の中の薄い光（少し生気） -->
  <ellipse cx="163" cy="113" rx="4" ry="5" fill="#4a3a6a"/>

  <!-- 目（右・少しずれてゆるい） -->
  <ellipse cx="203" cy="120" rx="15" ry="18" fill="#1a1228" stroke="#2d263c" stroke-width="5"/>
  <!-- 右目の光 -->
  <ellipse cx="208" cy="115" rx="3.5" ry="4.5" fill="#4a3a6a"/>

  <!-- 口（小さくへにゃ） -->
  <path d="M 173 140 Q 180 148 187 140" fill="none" stroke="#2d263c" stroke-width="4.5" stroke-linecap="round"/>

  <!-- ほっぺ（ほんのり赤） -->
  <ellipse cx="147" cy="135" rx="11" ry="7" fill="#f0a0b8" opacity="0.6"/>
  <ellipse cx="213" cy="136" rx="11" ry="7" fill="#f0a0b8" opacity="0.6"/>

  <!-- 腰の赤い飾り（菱形） -->
  <path d="M 180 295 L 193 308 L 180 321 L 167 308 Z" fill="#e03040" stroke="#2d263c" stroke-width="4"/>

  <!-- 体のちょっとした影ライン（着物のしわ感） -->
  <path d="M 165 200 Q 168 235 167 270" fill="none" stroke="#c0d8e8" stroke-width="3" stroke-linecap="round"/>
  <path d="M 195 200 Q 192 235 193 270" fill="none" stroke="#c0d8e8" stroke-width="3" stroke-linecap="round"/>

  <!-- 翼の内側模様（左） -->
  <path d="M 95 130 Q 90 155 93 175" fill="none" stroke="#a8cce0" stroke-width="3" stroke-linecap="round"/>
  <!-- 翼の内側模様（右） -->
  <path d="M 265 130 Q 270 155 267 175" fill="none" stroke="#a8cce0" stroke-width="3" stroke-linecap="round"/>

  <!-- 小さな雪の結晶っぽいドット（周囲） -->
  <circle cx="62" cy="100" r="4" fill="#b0d8ee" stroke="#2d263c" stroke-width="2"/>
  <circle cx="72" cy="88" r="3" fill="#b0d8ee" stroke="#2d263c" stroke-width="2"/>
  <circle cx="295" cy="95" r="4" fill="#b0d8ee" stroke="#2d263c" stroke-width="2"/>
  <circle cx="308" cy="108" r="3" fill="#b0d8ee" stroke="#2d263c" stroke-width="2"/>
  <circle cx="55" cy="285" r="3" fill="#b0d8ee" stroke="#2d263c" stroke-width="2"/>
  <circle cx="305" cy="290" r="3.5" fill="#b0d8ee" stroke="#2d263c" stroke-width="2"/>
</svg>