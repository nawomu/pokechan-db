<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 全身うすい水色(ライトシアン)の体色、おなかはさらに白っぽい水色
  2. 頭が大きく体は小さい丸っこいシルエット(あかちゃん体型)
  3. 頭の上から2本の触角(アンテナ)が左右に弧を描いて伸び、間にハート形のすきまができる
  4. 触角の先端と首まわりのえりだけ濃い青の差し色
  5. まん丸で真っ黒な大きい目とちいさな口、手足は短いひれ状
  -->

  <!-- 触角(後ろ) -->
  <path d="M175,92 C150,74 115,76 98,108 C88,126 92,148 108,152 C114,130 126,108 148,100 C158,96 167,94 175,92 Z"
        fill="#7ed9f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M185,92 C210,74 245,76 262,108 C272,126 268,148 252,152 C246,130 234,108 212,100 C202,96 193,94 185,92 Z"
        fill="#7ed9f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="104" cy="149" r="12" fill="#2f8cc4" stroke="#2d263c" stroke-width="6"/>
  <circle cx="256" cy="149" r="12" fill="#2f8cc4" stroke="#2d263c" stroke-width="6"/>

  <!-- 足(体の後ろ) -->
  <ellipse cx="146" cy="304" rx="27" ry="18" fill="#7ed9f0" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="216" cy="304" rx="27" ry="18" fill="#7ed9f0" stroke="#2d263c" stroke-width="7"/>

  <!-- 腕(体の後ろ) -->
  <ellipse cx="102" cy="228" rx="23" ry="33" fill="#7ed9f0" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="260" cy="228" rx="23" ry="33" fill="#7ed9f0" stroke="#2d263c" stroke-width="7"/>

  <!-- 体 -->
  <ellipse cx="181" cy="252" rx="72" ry="58" fill="#7ed9f0" stroke="#2d263c" stroke-width="8"/>
  <!-- おなかの明るい模様 -->
  <ellipse cx="181" cy="268" rx="38" ry="34" fill="#eafdff" stroke="#2d263c" stroke-width="4"/>
  <!-- えり(濃い青の差し色) -->
  <path d="M124,206 C145,224 218,224 238,206 C232,222 152,222 124,206 Z" fill="#2f8cc4" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頭 -->
  <circle cx="181" cy="150" r="76" fill="#7ed9f0" stroke="#2d263c" stroke-width="8"/>

  <!-- 目 -->
  <ellipse cx="153" cy="155" rx="19" ry="23" fill="#241f30" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="209" cy="155" rx="19" ry="23" fill="#241f30" stroke="#2d263c" stroke-width="5"/>
  <circle cx="147" cy="146" r="6" fill="#ffffff"/>
  <circle cx="203" cy="146" r="6" fill="#ffffff"/>

  <!-- 口 -->
  <path d="M168,186 Q181,196 194,186" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <circle cx="130" cy="178" r="9" fill="#bdeeff" opacity="0.8"/>
  <circle cx="232" cy="178" r="9" fill="#bdeeff" opacity="0.8"/>
</svg>
