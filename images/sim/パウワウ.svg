<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.水色(#AEE3F5系)の丸くふっくらしたアザラシ体型 2.頭にツノのような白い突起 3.おなかは白っぽい薄色 4.小さな丸い黒目とちいさな口 5.後ろに小さな尾びれ、左右に小さなヒレ(手) -->

  <!-- 後ろ: 尾びれ -->
  <ellipse cx="180" cy="300" rx="34" ry="20" fill="#8FD3F0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ: 左右のヒレ(体の後ろに少しはみ出す) -->
  <ellipse cx="90" cy="230" rx="28" ry="42" fill="#9BD9F4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-18 90 230)"/>
  <ellipse cx="270" cy="230" rx="28" ry="42" fill="#9BD9F4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(18 270 230)"/>

  <!-- 体: ふっくら丸い胴体 -->
  <path d="M180 130
           C 260 130, 300 190, 295 250
           C 290 300, 240 330, 180 330
           C 120 330, 70 300, 65 250
           C 60 190, 100 130, 180 130 Z"
        fill="#AEE3F5" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- おなかの薄い模様 -->
  <ellipse cx="180" cy="255" rx="70" ry="65" fill="#EAF8FF" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭 -->
  <circle cx="180" cy="120" r="80" fill="#AEE3F5" stroke="#2d263c" stroke-width="8"/>

  <!-- ほっぺの薄いピンク -->
  <ellipse cx="130" cy="140" rx="14" ry="10" fill="#FFD3E0" opacity="0.85"/>
  <ellipse cx="230" cy="140" rx="14" ry="10" fill="#FFD3E0" opacity="0.85"/>

  <!-- ツノ(頭の上の白い突起) -->
  <path d="M180 45 C 172 55, 172 75, 182 90 C 192 75, 192 55, 180 45 Z"
        fill="#FFF7E6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目 -->
  <circle cx="150" cy="115" r="11" fill="#2d263c"/>
  <circle cx="210" cy="115" r="11" fill="#2d263c"/>
  <circle cx="154" cy="111" r="3" fill="#ffffff"/>
  <circle cx="214" cy="111" r="3" fill="#ffffff"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="140" rx="6" ry="4" fill="#2d263c"/>

  <!-- 口(にっこり) -->
  <path d="M160 155 Q180 172 200 155" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 前の小さいヒレ(手) -->
  <ellipse cx="105" cy="205" rx="24" ry="34" fill="#AEE3F5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-15 105 205)"/>
  <ellipse cx="255" cy="205" rx="24" ry="34" fill="#AEE3F5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(15 255 205)"/>
</svg>
