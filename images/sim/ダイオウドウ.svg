<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. ずんぐりして超巨大などっしりしたゾウ型(はがね複合の進化後・ゴマゾウの成体)
  2. 体色はこい紫がかったグレー(#5f5a70)・太い4本の柱のような足
  3. 顔まわりに銅(あかがね)色のよろい状プレート+頭の上に3本の銅色のトサカ(クラウン)
  4. 白く大きく湾曲したキバ2本・鼻(トランク)は体と同じグレーで先端だけ銅色の輪
  5. プレートの奥にのぞく小さい黒目・たれた丸い耳
  -->

  <!-- しっぽ -->
  <path d="M 280 225 q 26 6 22 30 q -4 18 -22 14" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 後ろ足(奥) -->
  <ellipse cx="92" cy="292" rx="27" ry="25" fill="#4f4a60" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="268" cy="292" rx="27" ry="25" fill="#4f4a60" stroke="#2d263c" stroke-width="7"/>

  <!-- 前足 -->
  <ellipse cx="121" cy="306" rx="35" ry="32" fill="#4f4a60" stroke="#2d263c" stroke-width="8"/>
  <ellipse cx="239" cy="306" rx="35" ry="32" fill="#4f4a60" stroke="#2d263c" stroke-width="8"/>

  <!-- 体(メイン) -->
  <ellipse cx="180" cy="205" rx="108" ry="86" fill="#5f5a70" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳 -->
  <ellipse cx="88" cy="178" rx="36" ry="46" fill="#4f4a60" stroke="#2d263c" stroke-width="7" transform="rotate(-16 88 178)"/>
  <ellipse cx="272" cy="178" rx="36" ry="46" fill="#4f4a60" stroke="#2d263c" stroke-width="7" transform="rotate(16 272 178)"/>
  <ellipse cx="92" cy="180" rx="17" ry="25" fill="#78728a" transform="rotate(-16 92 180)"/>
  <ellipse cx="268" cy="180" rx="17" ry="25" fill="#78728a" transform="rotate(16 268 180)"/>

  <!-- お腹の明るいパッチ -->
  <ellipse cx="180" cy="252" rx="60" ry="38" fill="#8f8aa0" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭上の銅色クラウン(3本) -->
  <path d="M 142 122 Q 132 92 116 62 Q 138 82 150 116 Z" fill="#c17b3f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 181 114 Q 178 74 180 42 Q 191 74 188 116 Z" fill="#c17b3f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 220 122 Q 230 92 246 62 Q 224 82 212 116 Z" fill="#c17b3f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔の銅色プレート -->
  <ellipse cx="180" cy="152" rx="68" ry="50" fill="#c17b3f" stroke="#2d263c" stroke-width="8"/>

  <!-- 目 -->
  <circle cx="156" cy="150" r="10" fill="#231f2e" stroke="#2d263c" stroke-width="4"/>
  <circle cx="204" cy="150" r="10" fill="#231f2e" stroke="#2d263c" stroke-width="4"/>
  <circle cx="152" cy="145" r="3.5" fill="#ffffff"/>
  <circle cx="200" cy="145" r="3.5" fill="#ffffff"/>

  <!-- キバ -->
  <path d="M 132 196 Q 100 210 93 242 Q 90 264 108 258 Q 120 252 122 224 Q 124 206 132 196 Z" fill="#fdfaf0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 228 196 Q 260 210 267 242 Q 270 264 252 258 Q 240 252 238 224 Q 236 206 228 196 Z" fill="#fdfaf0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 鼻(トランク) -->
  <path d="M 168 192 C 148 214, 138 252, 146 286 C 150 306, 164 320, 181 322 C 196 323, 205 311, 198 299 C 192 289, 179 284, 172 271 C 161 254, 165 224, 180 202 C 187 191, 178 187, 168 192 Z" fill="#5f5a70" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- トランク先端の銅色リング -->
  <ellipse cx="176" cy="303" rx="19" ry="12" fill="#c17b3f" stroke="#2d263c" stroke-width="6"/>
</svg>
