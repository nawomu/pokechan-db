  <path d="M222 133 Q230 92 252 106 Q250 128 224 140 Z" fill="#c9a876" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- むなびれ(肉厚・葉状=特徴) -->
  <path d="M238 198 Q278 210 272 248 Q254 254 232 222 Z" fill="#c9a876" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

