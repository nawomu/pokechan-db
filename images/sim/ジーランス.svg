  <!-- うろこ模様(体表の筋) -->
  <path d="M115 148 Q190 128 258 152" fill="none" stroke="#2d263c" stroke-width="3" opacity="0.45"/>
  <path d="M108 178 Q190 164 268 182" fill="none" stroke="#2d263c" stroke-width="3" opacity="0.45"/>
  <path d="M115 208 Q190 222 262 212" fill="none" stroke="#2d263c" stroke-width="3" opacity="0.4"/>

  <!-- えらの筋 -->
  <path d="M228 150 Q234 188 222 222" fill="none" stroke="#2d263c" stroke-width="4" opacity="0.55"/>

  <!-- 目(白目) -->
  <circle cx="252" cy="163" r="21" fill="#fdf6e0" stroke="#2d263c" stroke-width="6"/>
  <!-- ひとみ -->
  <circle cx="256" cy="161" r="11" fill="#2d2015"/>
  <!-- 目の光 -->
  <circle cx="249" cy="155" r="3.5" fill="white"/>

  <!-- 鼻の穴 -->
