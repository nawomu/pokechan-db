<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- コーン胴体(後ろ) -->
  <polygon points="180,310 110,195 250,195" fill="#D4A540" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- コーンのワッフル線 -->
  <line x1="127" y1="215" x2="168" y2="305" stroke="#8B6010" stroke-width="4" stroke-linecap="round"/>
  <line x1="148" y1="200" x2="180" y2="308" stroke="#8B6010" stroke-width="4" stroke-linecap="round"/>
  <line x1="168" y1="197" x2="180" y2="308" stroke="#8B6010" stroke-width="3" stroke-linecap="round"/>
  <line x1="213" y1="215" x2="175" y2="305" stroke="#8B6010" stroke-width="4" stroke-linecap="round"/>
  <line x1="233" y1="197" x2="185" y2="307" stroke="#8B6010" stroke-width="3" stroke-linecap="round"/>
  <line x1="118" y1="215" x2="237" y2="215" stroke="#8B6010" stroke-width="3"/>
  <line x1="113" y1="228" x2="247" y2="228" stroke="#8B6010" stroke-width="3"/>

  <!-- 左のソフトクリーム体(やや後ろ) -->
  <!-- 左アイス球(下) -->
  <ellipse cx="148" cy="195" rx="46" ry="42" fill="#C8EEF8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左アイス球(中) -->
  <ellipse cx="152" cy="148" rx="42" ry="40" fill="#DAEEFA" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左ソフトクリームのねじれ頂点 -->
  <path d="M128,120 Q130,94 152,88 Q170,83 168,108 Q165,88 152,90 Q136,95 136,116 Z" fill="#EAF8FF" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M152,88 Q162,72 158,58 Q156,44 150,42 Q144,40 143,55 Q141,68 152,88 Z" fill="#F4FBFF" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 右のソフトクリーム体(手前・少し大きい) -->
  <!-- 右アイス球(下) -->
  <ellipse cx="212" cy="188" rx="50" ry="46" fill="#BEE8F6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 右アイス球(中) -->
  <ellipse cx="216" cy="138" rx="46" ry="44" fill="#D4F0FA" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 右ソフトクリームのねじれ頂点 -->
  <path d="M192,110 Q196,82 216,76 Q236,71 234,98 Q230,76 216,79 Q200,85 200,107 Z" fill="#E8F8FF" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M216,76 Q228,58 224,42 Q221,28 214,26 Q207,24 206,40 Q204,56 216,76 Z" fill="#F6FCFF" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 左の顔パーツ -->
  <!-- 左目(白目) -->
  <ellipse cx="136" cy="162" rx="13" ry="14" fill="white" stroke="#2d263c" stroke-width="4"/>
  <!-- 左目(黒目) -->
  <circle cx="138" cy="163" r="8" fill="#1a1a2e"/>
  <!-- 左目ハイライト -->
  <circle cx="141" cy="160" r="3" fill="white"/>
  <!-- 左眉(険しめ) -->
  <path d="M124,148 Q134,143 148,146" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- 左口 -->
  <path d="M130,175 Q137,180 148,177" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <!-- 左ほっぺ赤み -->
  <ellipse cx="125" cy="170" rx="9" ry="6" fill="#F4AABB" opacity="0.7"/>

  <!-- 右の顔パーツ -->
  <!-- 右目(白目) -->
  <ellipse cx="202" cy="154" rx="15" ry="16" fill="white" stroke="#2d263c" stroke-width="4"/>
  <!-- 右目(黒目) -->
  <circle cx="204" cy="155" r="10" fill="#1a1a2e"/>
  <!-- 右目ハイライト -->
  <circle cx="208" cy="151" r="4" fill="white"/>
  <!-- 右眉(ドヤ気味に上がってる) -->
  <path d="M189,138 Q202,131 218,135" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- 右口(ニヤっと) -->
  <path d="M196,168 Q206,175 220,170" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- 右ほっぺ赤み -->
  <ellipse cx="227" cy="164" rx="10" ry="7" fill="#F4AABB" opacity="0.7"/>

  <!-- 氷の結晶たち -->
  <!-- 結晶1(左上) -->
  <g transform="translate(72,90) rotate(20)">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#7ECDE8" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12" y1="-7" x2="12" y2="7" stroke="#7ECDE8" stroke-width="3" stroke-linecap="round"/>
    <line x1="-12" y1="7" x2="12" y2="-7" stroke="#7ECDE8" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- 結晶2(右上) -->
  <g transform="translate(288,75) rotate(-15)">
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#7ECDE8" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="-6" x2="10" y2="6" stroke="#7ECDE8" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="6" x2="10" y2="-6" stroke="#7ECDE8" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- 結晶3(左下) -->
  <g transform="translate(88,255) rotate(5)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#A0D8EC" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9" y1="-5" x2="9" y2="5" stroke="#A0D8EC" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9" y1="5" x2="9" y2="-5" stroke="#A0D8EC" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- 結晶4(右) -->
  <g transform="translate(295,185) rotate(30)">
    <line x1="0" y1="-11" x2="0" y2="11" stroke="#7ECDE8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-10" y1="-5" x2="10" y2="5" stroke="#7ECDE8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-10" y1="5" x2="10" y2="-5" stroke="#7ECDE8" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- 雪の点々 -->
  <circle cx="60" cy="155" r="4" fill="#A8D8EC" opacity="0.8"/>
  <circle cx="305" cy="130" r="5" fill="#A8D8EC" opacity="0.8"/>
  <circle cx="318" cy="240" r="3" fill="#C0E4F0" opacity="0.7"/>
  <circle cx="50" cy="210" r="3.5" fill="#C0E4F0" opacity="0.7"/>

  <!-- 口から出る氷の息(左) -->
  <path d="M130,178 Q110,188 98,195 Q90,202 95,208" fill="none" stroke="#B8E8F8" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <path d="M130,178 Q112,192 102,205" fill="none" stroke="#D8F4FF" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

</svg>