<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ルチャブル 落書き風 -->

  <!-- 翼(後ろ・左) -->
  <path d="M100 180 Q40 130 30 80 Q60 100 90 140 Q70 90 80 50 Q110 90 105 150 Z"
        fill="#c0392b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 翼(後ろ・右) -->
  <path d="M255 180 Q320 130 335 80 Q305 100 275 140 Q295 90 285 50 Q255 90 258 150 Z"
        fill="#c0392b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- しっぽ -->
  <path d="M195 265 Q215 285 210 310 Q195 295 185 310 Q178 285 190 265 Z"
        fill="#2d8a4e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(胴体) -->
  <ellipse cx="180" cy="220" rx="62" ry="70"
           fill="#2d8a4e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹の黄色い部分 -->
  <ellipse cx="180" cy="235" rx="38" ry="48"
           fill="#f5d020" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左腕(翼前面) -->
  <path d="M120 195 Q80 175 60 210 Q55 240 85 255 Q105 250 118 230 Z"
        fill="#2d8a4e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 右腕(翼前面) -->
  <path d="M240 195 Q278 175 298 210 Q305 240 275 255 Q255 250 242 230 Z"
        fill="#2d8a8e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 右腕(翼前面) 色修正 -->
  <path d="M242 195 Q280 175 300 210 Q307 240 277 255 Q255 250 243 230 Z"
        fill="#2d8a4e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 首 -->
  <rect x="165" y="153" width="32" height="28" rx="8"
        fill="#2d8a4e" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭(全体) -->
  <ellipse cx="180" cy="130" rx="55" ry="52"
           fill="#2d8a4e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ルチャマスク(白・顔全体) -->
  <path d="M140 115 Q145 88 180 85 Q215 88 222 115 Q225 140 210 155 Q195 165 180 166 Q165 165 150 155 Q138 140 140 115 Z"
        fill="#f0f0f0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- マスクの緑模様(額) -->
  <path d="M162 90 Q180 83 198 90 Q192 105 180 107 Q168 105 162 90 Z"
        fill="#2d8a4e" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- マスクの緑模様(左頬) -->
  <path d="M141 118 Q148 108 157 115 Q155 130 148 135 Q140 128 141 118 Z"
        fill="#2d8a4e" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- マスクの緑模様(右頬) -->
  <path d="M221 118 Q214 108 205 115 Q207 130 214 135 Q222 128 221 118 Z"
        fill="#2d8a4e" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 左目(鋭い) -->
  <path d="M155 120 Q162 114 170 118 Q168 128 161 130 Q153 127 155 120 Z"
        fill="#1a1a2e" stroke="#2d263c" stroke-width="3"/>
  <!-- 左目光 -->
  <circle cx="164" cy="121" r="3" fill="white"/>

  <!-- 右目(鋭い) -->
  <path d="M207 120 Q200 114 192 118 Q194 128 201 130 Q209 127 207 120 Z"
        fill="#1a1a2e" stroke="#2d263c" stroke-width="3"/>
  <!-- 右目光 -->
  <circle cx="198" cy="121" r="3" fill="white"/>

  <!-- くちばし -->
  <path d="M172 142 Q180 148 188 142 Q184 158 180 160 Q176 158 172 142 Z"
        fill="#e8a020" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左足 -->
  <path d="M155 283 Q148 290 140 310 Q135 325 148 328 Q160 325 162 310 L165 285 Z"
        fill="#2d8a4e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 左足の爪 -->
  <path d="M138 320 Q130 330 135 336 Q143 334 148 326 Z"
        fill="#1a5c2e" stroke="#2d263c" stroke-width="4"/>
  <path d="M150 326 Q148 338 155 340 Q160 335 160 326 Z"
        fill="#1a5c2e" stroke="#2d263c" stroke-width="4"/>

  <!-- 右足 -->
  <path d="M207 283 Q214 290 222 310 Q227 325 214 328 Q202 325 200 310 L197 285 Z"
        fill="#2d8a4e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 右足の爪 -->
  <path d="M224 320 Q232 330 227 336 Q219 334 214 326 Z"
        fill="#1a5c2e" stroke="#2d263c" stroke-width="4"/>
  <path d="M212 326 Q214 338 207 340 Q202 335 202 326 Z"
        fill="#1a5c2e" stroke="#2d263c" stroke-width="4"/>

  <!-- ほっぺの赤み(元気な感じ) -->
  <ellipse cx="148" cy="138" rx="10" ry="7" fill="#e8777a" opacity="0.6"/>
  <ellipse cx="212" cy="138" rx="10" ry="7" fill="#e8777a" opacity="0.6"/>

  <!-- 頭の羽飾り(トサカ風) -->
  <path d="M165 83 Q170 65 180 60 Q190 65 197 83"
        fill="none" stroke="#c0392b" stroke-width="8" stroke-linecap="round"/>
  <path d="M175 80 Q177 62 183 58"
        fill="none" stroke="#f5d020" stroke-width="5" stroke-linecap="round"/>
</svg>