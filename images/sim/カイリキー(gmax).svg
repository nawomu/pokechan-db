  <ellipse cx="24" cy="188" rx="26" ry="20" fill="#c4bcd8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <ellipse cx="302" cy="150" rx="34" ry="26" fill="#b8b0cc" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="336" cy="188" rx="26" ry="20" fill="#c4bcd8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

