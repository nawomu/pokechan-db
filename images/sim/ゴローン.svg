  <path d="M122,132 Q108,182 126,232" fill="none" stroke="#5a4a38" stroke-width="5"/>
  <path d="M238,132 Q252,182 234,232" fill="none" stroke="#5a4a38" stroke-width="5"/>
  <path d="M158,262 Q180,278 202,262" fill="none" stroke="#5a4a38" stroke-width="5"/>

