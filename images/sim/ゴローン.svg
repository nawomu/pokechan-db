  <path d="M55,288 Q65,300 78,296" fill="none" stroke="#5a4a38" stroke-width="5"/>
  <path d="M305,288 Q295,300 282,296" fill="none" stroke="#5a4a38" stroke-width="5"/>

  <!-- stubby feet -->
  <ellipse cx="145" cy="308" rx="30" ry="19" fill="#7a6b56" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="215" cy="308" rx="30" ry="19" fill="#7a6b56" stroke="#2d263c" stroke-width="7"/>

  <!-- face -->
  <ellipse cx="150" cy="170" rx="17" ry="19" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="210" cy="170" rx="17" ry="19" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="150" cy="176" r="7" fill="#2d263c"/>
  <circle cx="210" cy="176" r="7" fill="#2d263c"/>
  <path d="M130,150 L166,160" fill="none" stroke="#2d263c" stroke-width="8"/>
  <path d="M230,150 L194,160" fill="none" stroke="#2d263c" stroke-width="8"/>
  <path d="M163,206 Q180,218 197,206" fill="none" stroke="#2d263c" stroke-width="7" fill-opacity="0"/>
