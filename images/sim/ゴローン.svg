<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" stroke-linecap="round" stroke-linejoin="round">
  <!-- back arms (behind body) -->
  <ellipse cx="60" cy="168" rx="30" ry="44" transform="rotate(-18 60 168)" fill="#7a6b56" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="300" cy="168" rx="30" ry="44" transform="rotate(18 300 168)" fill="#7a6b56" stroke="#2d263c" stroke-width="7"/>

  <!-- body base (light lower rock) -->
  <path d="M180,95 C225,95 265,105 275,145 C285,175 292,205 290,230 C288,260 265,290 215,300 C190,312 170,312 145,300 C95,290 72,260 70,230 C68,205 75,175 85,145 C95,105 135,95 180,95 Z"
        fill="#cdb98f" stroke="#2d263c" stroke-width="8"/>

  <!-- upper dark cap (rock texture, no outline needed - interior color) -->
  <path d="M85,145 C95,105 135,95 180,95 C225,95 265,105 275,145 C250,200 220,182 235,178 C215,198 225,158 190,205 C170,188 195,215 160,192 C140,210 150,175 130,208 C110,190 95,175 85,145 Z"
