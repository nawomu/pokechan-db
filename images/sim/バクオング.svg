<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尾(体の後ろ・オレンジの丸い先端) -->
  <path d="M248,246 C286,258 306,232 308,196 C309,180 300,168 288,174 C288,196 274,222 248,246 Z" fill="#b0a4d4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="300" cy="184" r="17" fill="#eb8c3e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 耳(頭の後ろに大きく垂れる) -->
  <path d="M138,85 C100,95 78,150 88,205 C93,225 115,232 132,222 C120,190 112,140 148,105 Z" fill="#8a7ab0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M222,85 C260,95 282,150 272,205 C267,225 245,232 228,222 C240,190 248,140 212,105 Z" fill="#8a7ab0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 足 -->
  <rect x="139" y="280" width="40" height="42" rx="18" fill="#b0a4d4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="181" y="280" width="40" height="42" rx="18" fill="#b0a4d4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="159" cy="322" rx="28" ry="13" fill="#8a7ab0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="201" cy="322" rx="28" ry="13" fill="#8a7ab0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体(丸くどっしり) -->
  <ellipse cx="180" cy="225" rx="85" ry="72" fill="#b0a4d4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- おなか(クリーム色) -->
  <ellipse cx="180" cy="240" rx="50" ry="40" fill="#f7eed9" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 模様(オレンジの斑点) -->
  <circle cx="132" cy="205" r="9" fill="#eb8c3e" stroke="#2d263c" stroke-width="4"/>
  <circle cx="228" cy="198" r="8" fill="#eb8c3e" stroke="#2d263c" stroke-width="4"/>
  <circle cx="150" cy="272" r="7" fill="#eb8c3e" stroke="#2d263c" stroke-width="4"/>
  <circle cx="212" cy="278" r="8" fill="#eb8c3e" stroke="#2d263c" stroke-width="4"/>
  <circle cx="100" cy="175" r="6" fill="#eb8c3e" stroke="#2d263c" stroke-width="4"/>
  <circle cx="260" cy="175" r="6" fill="#eb8c3e" stroke="#2d263c" stroke-width="4"/>

  <!-- うで -->
  <ellipse cx="93" cy="232" rx="26" ry="38" transform="rotate(-22 93 232)" fill="#b0a4d4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="267" cy="232" rx="26" ry="38" transform="rotate(22 267 232)" fill="#b0a4d4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <circle cx="180" cy="105" r="58" fill="#b0a4d4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 大きく開けた口(咆哮) -->
  <ellipse cx="180" cy="155" rx="55" ry="34" fill="#8a2e40" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="180" cy="162" rx="34" ry="17" fill="#d9647a"/>

  <!-- 歯 -->
  <path d="M150,128 L162,128 L156,144 Z" fill="#ffffff" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <path d="M198,128 L210,128 L204,144 Z" fill="#ffffff" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 目 -->
  <circle cx="153" cy="90" r="8" fill="#2d263c"/>
  <circle cx="207" cy="90" r="8" fill="#2d263c"/>
</svg>
