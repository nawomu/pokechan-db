<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろの葉っぱの腕(奥・左) -->
  <path d="M115 200 Q60 170 55 120 Q80 118 110 155 Q135 178 140 210 Z" fill="#6fae2c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 下半身(芋虫状の体節) -->
  <ellipse cx="185" cy="290" rx="66" ry="46" fill="#8fc93a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="185" cy="252" rx="58" ry="38" fill="#9ad84a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- お腹(クリーム色) -->
  <ellipse cx="185" cy="278" rx="34" ry="26" fill="#f5eecb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前の葉っぱの腕(手前・右、鎌状) -->
  <path d="M232 195 Q290 165 300 108 Q272 108 245 148 Q222 175 218 205 Z" fill="#7bbf30" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 首元の葉フード(下側の葉・胴に重なる) -->
  <path d="M150 210 Q185 235 220 210 Q215 175 185 168 Q155 175 150 210 Z" fill="#6fae2c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="185" cy="140" rx="52" ry="46" fill="#9ad84a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 左の大きな葉っぱフード -->
  <path d="M148 118 Q80 95 70 40 Q120 45 155 90 Q168 105 158 130 Z" fill="#6fae2c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右の大きな葉っぱフード -->
  <path d="M222 118 Q290 95 300 40 Q250 45 215 90 Q202 105 212 130 Z" fill="#7bbf30" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 葉脈(左) -->
  <path d="M120 75 Q140 90 150 112" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <!-- 葉脈(右) -->
  <path d="M250 75 Q230 90 220 112" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 触角(左・先端ピンク) -->
  <path d="M168 100 Q158 65 145 48" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="144" cy="45" rx="8" ry="8" fill="#e8637a" stroke="#2d263c" stroke-width="5"/>
  <!-- 触角(右・先端ピンク) -->
  <path d="M202 100 Q212 65 225 48" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="226" cy="45" rx="8" ry="8" fill="#e8637a" stroke="#2d263c" stroke-width="5"/>

  <!-- 目(左) -->
  <ellipse cx="163" cy="140" rx="15" ry="14" fill="#e8637a" stroke="#2d263c" stroke-width="5"/>
  <!-- 目(右) -->
  <ellipse cx="207" cy="140" rx="15" ry="14" fill="#e8637a" stroke="#2d263c" stroke-width="5"/>
  <!-- 瞳光(左) -->
  <ellipse cx="158" cy="135" rx="4" ry="4.5" fill="white"/>
  <!-- 瞳光(右) -->
  <ellipse cx="202" cy="135" rx="4" ry="4.5" fill="white"/>

  <!-- 口 -->
  <path d="M172 165 Q185 173 198 165" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
