  <!-- ===== 頭部（黒い巨大球体） ===== -->
  <!-- 頭のメイン：黒球体 -->
  <circle cx="180" cy="165" r="138" fill="#1a1420" stroke="#2d263c" stroke-width="8"/>
  <!-- 頭のわずかな光沢 -->
  <ellipse cx="148" cy="108" rx="30" ry="18" fill="#2e2840" opacity="0.6"/>

  <!-- ===== 角（メガ進化・巨大な氷の角） ===== -->
  <!-- 左の大きな角（前） -->
  <polygon points="82,90 62,18 105,70" fill="#88d8f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左の大きな角（後ろ気味） -->
  <polygon points="95,78 60,8 118,62" fill="#aaeaff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 左の小さな角 -->
  <polygon points="68,112 38,58 82,98" fill="#88d8f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右の大きな角（前） -->
  <polygon points="278,90 298,18 255,70" fill="#88d8f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右の大きな角（後ろ気味） -->
  <polygon points="265,78 300,8 242,62" fill="#aaeaff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右の小さな角 -->
  <polygon points="292,112 322,58 278,98" fill="#88d8f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 頭頂の角 -->
  <polygon points="165,32 178,2 195,32" fill="#aaeaff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ===== 眉（怒り・白） ===== -->
  <!-- 左眉（分厚く斜め・V字気味） -->
  <path d="M112 128 Q128 116 148 122" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <!-- 右眉 -->
  <path d="M248 128 Q232 116 212 122" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>

  <!-- ===== 目（赤・怒り目） ===== -->
  <!-- 左目 -->
  <ellipse cx="130" cy="148" rx="20" ry="22" fill="#d42020"/>
  <ellipse cx="130" cy="148" rx="20" ry="22" fill="none" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="130" cy="150" rx="11" ry="13" fill="#8b0000"/>
  <circle cx="124" cy="143" r="5" fill="#ffffff"/>
  <!-- 右目 -->
  <ellipse cx="230" cy="148" rx="20" ry="22" fill="#d42020"/>
  <ellipse cx="230" cy="148" rx="20" ry="22" fill="none" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="230" cy="150" rx="11" ry="13" fill="#8b0000"/>
  <circle cx="224" cy="143" r="5" fill="#ffffff"/>

