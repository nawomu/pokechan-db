<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ側の岩破片（左） -->
  <polygon points="42,110 18,68 65,58 80,100" fill="#b0bec5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 後ろ側の岩破片（右） -->
  <polygon points="318,110 342,68 295,58 280,100" fill="#b0bec5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 岩の破片 左上（メガの特徴） -->
  <polygon points="60,90 28,44 90,30 105,78" fill="#cfd8dc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 岩の破片 右上 -->
  <polygon points="300,90 332,44 270,30 255,78" fill="#cfd8dc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体（大きな岩丸い頭体） -->
  <ellipse cx="180" cy="195" rx="145" ry="138" fill="#dde4ea" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 岩のひび割れライン(体) -->
  <polyline points="120,100 110,145 125,175" fill="none" stroke="#8fa3b0" stroke-width="5" stroke-linecap="round"/>
  <polyline points="245,105 252,150 238,180" fill="none" stroke="#8fa3b0" stroke-width="5" stroke-linecap="round"/>
  <polyline points="155,310 162,290 152,270" fill="none" stroke="#8fa3b0" stroke-width="4" stroke-linecap="round"/>
  <polyline points="205,315 200,294 212,275" fill="none" stroke="#8fa3b0" stroke-width="4" stroke-linecap="round"/>

  <!-- 額の赤い亀裂（メガの特徴） -->
  <polyline points="160,82 168,100 180,90 192,108 200,88" fill="none" stroke="#c62828" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="175,90 173,112 180,108" fill="none" stroke="#c62828" stroke-width="5" stroke-linecap="round"/>

  <!-- 下顎（異常に大きく開く・メガの特徴） -->
  <path d="M80,215 Q78,310 180,330 Q282,310 280,215 Z" fill="#c8d4db" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 口の中（赤） -->
  <path d="M92,218 Q90,298 180,315 Q270,298 268,218 Z" fill="#b71c1c"/>

  <!-- 上の牙 -->
  <polygon points="115,220 108,268 132,220" fill="#f5f5f5" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="148,218 143,255 165,218" fill="#f5f5f5" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="212,218 207,255 232,218" fill="#f5f5f5" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="245,220 240,268 262,220" fill="#f5f5f5" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 下の牙 -->
  <polygon points="118,308 108,265 138,305" fill="#f5f5f5" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="165,315 162,278 185,315" fill="#f5f5f5" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="222,308 218,272 244,305" fill="#f5f5f5" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 目の周り黒いくぼみ(左) -->
  <ellipse cx="128" cy="170" rx="32" ry="28" fill="#37474f" stroke="#2d263c" stroke-width="6"/>
  <!-- 目の周り黒いくぼみ(右) -->
  <ellipse cx="232" cy="170" rx="32" ry="28" fill="#37474f" stroke="#2d263c" stroke-width="6"/>

  <!-- 目(黄色い三角っぽい目・左) -->
  <polygon points="110,162 128,148 146,162 136,184 120,184" fill="#ffd600" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- 目(右) -->
  <polygon points="214,162 232,148 250,162 242,184 222,184" fill="#ffd600" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 瞳(左) -->
  <ellipse cx="128" cy="168" rx="9" ry="11" fill="#1a237e"/>
  <ellipse cx="124" cy="164" rx="3" ry="3" fill="#fff"/>
  <!-- 瞳(右) -->
  <ellipse cx="234" cy="168" rx="9" ry="11" fill="#1a237e"/>
  <ellipse cx="230" cy="164" rx="3" ry="3" fill="#fff"/>

  <!-- 鼻穴（岩の凹み） -->
  <ellipse cx="168" cy="205" rx="7" ry="5" fill="#8fa3b0" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="192" cy="205" rx="7" ry="5" fill="#8fa3b0" stroke="#2d263c" stroke-width="3"/>

  <!-- 左側 小さな岩のトゲ -->
  <polygon points="52,160 30,138 58,130 70,155" fill="#b0bec5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右側 小さな岩のトゲ -->
  <polygon points="308,160 330,138 302,130 290,155" fill="#b0bec5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
</svg>