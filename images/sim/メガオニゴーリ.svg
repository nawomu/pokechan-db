  <path d="M90 192 Q95 175 180 172 Q265 175 270 192 Q268 248 250 268 Q215 288 180 290 Q145 288 110 268 Q92 248 90 192 Z" fill="#0a0a0a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

