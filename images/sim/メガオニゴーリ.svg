  <!-- ===== MEGA GLALIE ===== -->
  <!-- 冷気エフェクト（最背面） -->
  <ellipse cx="180" cy="275" rx="85" ry="22" fill="#b8e8f8" opacity="0.45"/>
  <ellipse cx="180" cy="268" rx="60" ry="15" fill="#d6f4ff" opacity="0.55"/>

  <!-- 口の冷気ブレス（頭の下から溢れる） -->
  <path d="M115 222 Q90 260 70 300 Q105 275 110 310 Q135 265 130 300 Q155 255 150 290 Q170 248 175 285 Q185 248 195 290 Q208 255 205 298 Q225 265 228 302 Q248 272 245 310 Q260 278 265 300 Q270 260 250 222" fill="#c8f0ff" opacity="0.7" stroke="none"/>
  <path d="M120 228 Q100 265 85 295 Q115 268 118 295 Q140 260 138 290 Q162 252 160 282 Q178 250 178 278 Q196 252 198 282 Q220 260 218 290 Q240 268 242 295 Q258 270 252 295 Q262 262 242 228" fill="#e8faff" opacity="0.55" stroke="none"/>

  <!-- 胴体（小さい・白） -->
  <ellipse cx="180" cy="298" rx="38" ry="28" fill="#f0f8ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 胴体のライン -->
  <path d="M158 282 Q180 275 202 282" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 足（左） -->
  <path d="M155 312 Q140 330 128 342 Q145 338 155 345 Q162 330 162 320" fill="#f0f8ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
