  <path d="M105 218 Q142 208 180 206 Q218 208 255 218" fill="none" stroke="#caf2ff" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M102 238 Q140 226 180 224 Q220 226 258 238" fill="none" stroke="#d0f4ff" stroke-width="2" stroke-linecap="round"/>
  <!-- 氷柱（上） -->
  <polygon points="140,184 148,210 132,210" fill="#e8fbff" stroke="#88d8f0" stroke-width="2"/>
  <polygon points="162,182 170,216 154,216" fill="#e8fbff" stroke="#88d8f0" stroke-width="2"/>
  <polygon points="180,181 188,215 172,215" fill="#e8fbff" stroke="#88d8f0" stroke-width="2"/>
  <polygon points="198,182 206,216 190,216" fill="#e8fbff" stroke="#88d8f0" stroke-width="2"/>
  <polygon points="218,184 226,210 210,210" fill="#e8fbff" stroke="#88d8f0" stroke-width="2"/>
  <!-- 氷柱（下） -->
  <polygon points="145,280 152,252 138,252" fill="#d0f0ff" stroke="#88d8f0" stroke-width="2"/>
  <polygon points="165,284 172,255 158,255" fill="#d0f0ff" stroke="#88d8f0" stroke-width="2"/>
  <polygon points="180,285 187,256 173,256" fill="#d0f0ff" stroke="#88d8f0" stroke-width="2"/>
  <polygon points="195,284 202,255 188,255" fill="#d0f0ff" stroke="#88d8f0" stroke-width="2"/>
  <polygon points="215,280 222,252 208,252" fill="#d0f0ff" stroke="#88d8f0" stroke-width="2"/>

  <!-- ===== 顔の輪郭（黒球体の縁を強調） ===== -->
  <!-- 頬の突起（メガ進化の氷片） -->
  <polygon points="46,168 22,150 52,188" fill="#88d8f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="314,168 338,150 308,188" fill="#88d8f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 額の氷クラック模様 -->
  <path d="M175 72 Q180 85 185 72" fill="none" stroke="#3a3060" stroke-width="3" stroke-linecap="round"/>
  <path d="M158 80 Q165 95 170 80" fill="none" stroke="#3a3060" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M190 80 Q195 95 202 80" fill="none" stroke="#3a3060" stroke-width="2.5" stroke-linecap="round"/>
</svg>