<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 翼(後ろ) 左 -->
  <ellipse cx="88" cy="178" rx="52" ry="28" fill="#6CDCF5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-18 88 178)"/>
  <!-- 翼(後ろ) 右 -->
  <ellipse cx="272" cy="178" rx="52" ry="28" fill="#6CDCF5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(18 272 178)"/>

  <!-- 体(胴) -->
  <path d="M 130 240 Q 110 260 118 285 Q 128 305 180 308 Q 232 305 242 285 Q 250 260 230 240 Z" fill="#89E8FF" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体メイン -->
  <ellipse cx="180" cy="188" rx="78" ry="88" fill="#A2EEFF" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹の色(内側の明るい部分) -->
  <ellipse cx="180" cy="200" rx="48" ry="55" fill="#C8F6FF" stroke="none"/>

  <!-- 角 左 -->
  <path d="M 152 118 L 138 72 L 155 92 L 148 55 L 170 90 L 163 108 Z" fill="#A2EEFF" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 角 右 -->
  <path d="M 208 115 L 228 68 L 212 90 L 222 52 L 198 88 L 204 108 Z" fill="#A2EEFF" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体の稲妻マーク -->
  <path d="M 192 162 L 175 195 L 186 195 L 168 228 L 195 200 L 182 200 Z" fill="#FFD820" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 目 左(大きめ赤目・つり目) -->
  <ellipse cx="155" cy="168" rx="18" ry="16" fill="#FF2222" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="155" cy="165" rx="9" ry="8" fill="#FF6666" stroke="none"/>
  <ellipse cx="157" cy="163" rx="4" ry="4" fill="white" stroke="none"/>
  <!-- 目 右(少し大きい) -->
  <ellipse cx="207" cy="165" rx="20" ry="17" fill="#FF2222" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="207" cy="162" rx="10" ry="9" fill="#FF6666" stroke="none"/>
  <ellipse cx="210" cy="160" rx="4" ry="4" fill="white" stroke="none"/>

  <!-- まぶた(つり目ライン 左) -->
  <path d="M 138 160 Q 155 153 172 162" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- まぶた(つり目ライン 右) -->
  <path d="M 188 158 Q 207 150 226 160" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 口(ジグザグ稲妻ニヤリ) -->
  <path d="M 150 212 L 160 222 L 170 210 L 180 222 L 190 210 L 200 222 L 210 210 L 214 218" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 口の内側黄色 -->
  <path d="M 152 214 L 161 222 L 171 211 L 181 222 L 191 211 L 200 222 L 209 211 L 212 217" fill="none" stroke="#FFD820" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ほっぺ 左(うっすらピンク) -->
  <ellipse cx="132" cy="192" rx="14" ry="9" fill="#FFB0C8" stroke="none" opacity="0.7"/>
  <!-- ほっぺ 右 -->
  <ellipse cx="228" cy="190" rx="13" ry="9" fill="#FFB0C8" stroke="none" opacity="0.7"/>

  <!-- 足 左 -->
  <path d="M 152 298 Q 140 308 138 322 Q 148 330 160 324 Q 165 314 162 300 Z" fill="#89E8FF" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 足 右 -->
  <path d="M 208 298 Q 220 308 222 322 Q 212 330 200 324 Q 195 314 198 300 Z" fill="#89E8FF" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体の電気もれエフェクト(小さい稲妻) 左上 -->
  <path d="M 114 148 L 107 138 L 112 142 L 105 130" fill="none" stroke="#FFD820" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 右上 -->
  <path d="M 248 144 L 256 134 L 250 139 L 258 126" fill="none" stroke="#FFD820" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>