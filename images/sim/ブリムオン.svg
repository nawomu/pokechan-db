<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 帽子の後ろつば（広いつば・後ろ側） -->
  <ellipse cx="180" cy="148" rx="105" ry="22" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 帽子の本体（コーン部分） -->
  <path d="M130 148 Q138 80 180 42 Q222 80 230 148 Z" fill="#1a1a2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 帽子のリボン（黄色） -->
  <rect x="128" y="138" width="104" height="18" rx="6" fill="#f5c518" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- リボンの結び目 -->
  <ellipse cx="180" cy="147" rx="12" ry="10" fill="#f0b000" stroke="#2d263c" stroke-width="4"/>
  <!-- リボン左ひらひら -->
  <path d="M168 143 Q148 130 145 148 Q150 160 168 155 Z" fill="#f5c518" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- リボン右ひらひら -->
  <path d="M192 143 Q212 130 215 148 Q210 160 192 155 Z" fill="#f5c518" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 体（大きな白っぽいまる） -->
  <ellipse cx="180" cy="240" rx="78" ry="75" fill="#f0ede8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の淡いクリーム色 -->
  <ellipse cx="180" cy="250" rx="50" ry="50" fill="#faf6f0" stroke="none"/>

  <!-- 頭（帽子の下のふわふわ白部分） -->
  <ellipse cx="180" cy="175" rx="52" ry="44" fill="#f5f2ee" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左ほっぺ -->
  <ellipse cx="148" cy="182" rx="14" ry="10" fill="#f4a0b0" stroke="none" opacity="0.7"/>
  <!-- 右ほっぺ（少し高さ違えてゆるく） -->
  <ellipse cx="214" cy="180" rx="13" ry="9" fill="#f4a0b0" stroke="none" opacity="0.7"/>

  <!-- 目（左）：赤い目 -->
  <ellipse cx="162" cy="172" rx="8" ry="9" fill="#e03050" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="160" cy="170" rx="3" ry="3" fill="white"/>

  <!-- 目（右）：ちょっとサイズ違えてゆるく -->
  <ellipse cx="200" cy="171" rx="9" ry="8" fill="#e03050" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="198" cy="169" rx="3" ry="3" fill="white"/>

  <!-- 口（小さくてかわいい） -->
  <path d="M174 190 Q180 196 188 190" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 左うで（小さいぷよっとした腕） -->
  <ellipse cx="104" cy="230" rx="18" ry="26" fill="#ede8e0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-20 104 230)"/>

  <!-- 右うで（ちょっと上がってる） -->
  <ellipse cx="256" cy="222" rx="17" ry="25" fill="#ede8e0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(15 256 222)"/>

  <!-- 左あし -->
  <ellipse cx="158" cy="308" rx="20" ry="14" fill="#ede8e0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 右あし -->
  <ellipse cx="204" cy="311" rx="20" ry="13" fill="#ede8e0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 帽子先端の小さい丸（ちょっとゆがんで） -->
  <circle cx="182" cy="46" r="8" fill="#f5c518" stroke="#2d263c" stroke-width="4"/>

</svg>