<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 背景の葉っぱヒレ(体の後ろ側) -->
  <ellipse cx="200" cy="130" rx="22" ry="52" fill="#3A8A3A" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(20 200 130)"/>
  <ellipse cx="220" cy="115" rx="18" ry="44" fill="#3A8A3A" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(35 220 115)"/>

  <!-- しっぽ(大きな葉っぱ) -->
  <path d="M 248 230 C 280 210 310 190 300 160 C 290 130 265 155 258 175 C 268 148 260 120 240 130 C 222 140 235 175 245 200 Z" fill="#3A8A3A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="248" y1="230" x2="272" y2="148" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- 後ろ足 -->
  <ellipse cx="228" cy="278" rx="20" ry="28" fill="#A8D878" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="228" cy="300" rx="22" ry="12" fill="#8DC060" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <ellipse cx="185" cy="235" rx="72" ry="58" fill="#A8D878" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の薄い色 -->
  <ellipse cx="175" cy="248" rx="42" ry="32" fill="#C8F0A8" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 前足(左) -->
  <ellipse cx="138" cy="280" rx="18" ry="26" fill="#A8D878" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="138" cy="300" rx="20" ry="11" fill="#8DC060" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前足(右) -->
  <ellipse cx="210" cy="285" rx="17" ry="24" fill="#A8D878" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="210" cy="303" rx="19" ry="10" fill="#8DC060" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 首 -->
  <ellipse cx="162" cy="195" rx="32" ry="28" fill="#A8D878" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="152" cy="158" rx="52" ry="48" fill="#A8D878" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 耳(左・葉っぱ形) -->
  <path d="M 112 130 C 90 95 80 62 100 48 C 118 36 130 68 125 105 Z" fill="#3A8A3A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 112 130 C 95 100 90 72 103 58" stroke="#5AB05A" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- 耳(右・葉っぱ形・少し傾いた) -->
  <path d="M 185 122 C 200 85 215 55 200 42 C 184 30 172 62 178 98 Z" fill="#3A8A3A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 185 122 C 198 90 208 62 200 48" stroke="#5AB05A" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- 額の角(葉っぱ形の角) -->
  <path d="M 148 118 C 140 92 144 65 155 55 C 165 46 170 72 165 100 Z" fill="#3A8A3A" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="150" y1="116" x2="160" y2="62" stroke="#2d263c" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 額のラインしもよう -->
  <path d="M 138 145 C 148 140 162 140 172 145" stroke="#7AAA50" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- 目(左・くりくり) -->
  <circle cx="132" cy="162" r="13" fill="#1a1a2e" stroke="#2d263c" stroke-width="5"/>
  <circle cx="135" cy="158" r="4" fill="white"/>
  <circle cx="130" cy="166" r="2" fill="white"/>

  <!-- 目(右・少し大きめ・バカっぽいゆがみ) -->
  <circle cx="168" cy="160" r="14" fill="#1a1a2e" stroke="#2d263c" stroke-width="5"/>
  <circle cx="171" cy="156" r="4.5" fill="white"/>
  <circle cx="165" cy="165" r="2" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="150" cy="178" rx="7" ry="5" fill="#8B6040" stroke="#2d263c" stroke-width="3"/>

  <!-- 口(ゆるい笑顔) -->
  <path d="M 140 187 C 148 196 162 196 168 188" stroke="#2d263c" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- ほっぺのうすいピンク -->
  <ellipse cx="122" cy="176" rx="11" ry="7" fill="#FFB8B8" opacity="0.55"/>
  <ellipse cx="178" cy="174" rx="10" ry="7" fill="#FFB8B8" opacity="0.55"/>
</svg>