  <circle cx="135" cy="195" r="6" fill="#E0B0FF" stroke="#2d263c" stroke-width="3"/>
  <circle cx="225" cy="195" r="6" fill="#E0B0FF" stroke="#2d263c" stroke-width="3"/>
  <circle cx="148" cy="232" r="6" fill="#E0B0FF" stroke="#2d263c" stroke-width="3"/>
  <circle cx="212" cy="232" r="6" fill="#E0B0FF" stroke="#2d263c" stroke-width="3"/>

