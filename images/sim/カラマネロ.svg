  <circle cx="207" cy="264" r="4" fill="white" opacity="0.8"/>

  <!-- 口 -->
  <path d="M168,292 Q180,302 192,292" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ひれ(体の横) -->
