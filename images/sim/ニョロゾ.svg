<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 見た目の特徴メモ:
    1. 全身まるっこい水色(ターコイズ寄り青)のオタマジャクシ体型
    2. お腹に白(クリーム)地の丸い模様+黒い渦巻き(シッポではなくお腹の渦)
    3. 大きな丸い目に黒い瞳(たれ目気味・かわいい)
    4. 短い両腕と、下に伸びる短い両足(先端は少し濃い青)
    5. 口は控えめなへの字〜ニコッとした小さな曲線
  -->

  <!-- 後ろ足(奥・重なり感) -->
  <ellipse cx="120" cy="300" rx="30" ry="19" fill="#3D86A8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="240" cy="300" rx="30" ry="19" fill="#3D86A8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 両腕 -->
  <ellipse cx="66" cy="198" rx="27" ry="19" fill="#4FA8CE" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="294" cy="198" rx="27" ry="19" fill="#4FA8CE" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 前足 -->
  <ellipse cx="146" cy="312" rx="34" ry="21" fill="#3D86A8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="214" cy="312" rx="34" ry="21" fill="#3D86A8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体・頭(一体型のまるいシルエット) -->
  <path d="M120 68 Q180 38 240 68 Q292 98 286 170 Q280 242 238 278 Q200 306 180 306 Q160 306 122 278 Q80 242 74 170 Q68 98 120 68Z"
        fill="#4FA8CE" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- お腹の白丸模様 -->
  <ellipse cx="182" cy="212" rx="80" ry="86" fill="#F5EFDD" stroke="#2d263c" stroke-width="6"/>

  <!-- お腹の渦巻き模様 -->
  <path d="M182 138
           C 224 138, 244 164, 244 196
           C 244 232, 214 254, 182 254
           C 154 254, 132 234, 132 208
           C 132 188, 147 174, 166 174
           C 181 174, 192 185, 192 199
           C 192 209, 184 215, 175 215"
        fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 目 左 -->
  <ellipse cx="140" cy="114" rx="22" ry="24" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="140" cy="122" rx="10" ry="12" fill="#2d263c"/>
  <circle cx="135" cy="113" r="4" fill="#FFFFFF"/>

  <!-- 目 右 -->
  <ellipse cx="222" cy="114" rx="22" ry="24" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="222" cy="122" rx="10" ry="12" fill="#2d263c"/>
  <circle cx="217" cy="113" r="4" fill="#FFFFFF"/>

  <!-- 口 -->
  <path d="M155 164 Q181 178 207 164" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
