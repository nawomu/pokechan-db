<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)オレンジの丸いかぼちゃ胴体 2)縦の溝(節)が何本か 3)上に茶い茎とくるくる蔓 4)幽霊顔(黒い三角目・ギザギザ口) 5)ふつうサイズ=中くらい -->

  <!-- 茎(上) -->
  <path d="M170,95 Q175,75 168,62 Q178,58 188,68 Q190,85 185,98 Z" fill="#6a4a2a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- くるくる蔓 -->
  <path d="M185,80 Q210,72 215,88 Q210,98 200,92 Q200,84 208,86" fill="none" stroke="#7a9a4a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- かぼちゃ胴体(丸い) -->
  <ellipse cx="180" cy="210" rx="95" ry="85" fill="#e8842c" stroke="#2d263c" stroke-width="7"/>

  <!-- 縦の溝(節) -->
  <path d="M180,128 Q172,210 180,292 M120,150 Q140,210 120,270 M240,150 Q220,210 240,270 M92,210 Q100,210 105,210 M268,210 Q260,210 255,210" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" opacity="0.55"/>

  <!-- 左目(三角・黒) -->
  <path d="M138,195 L168,180 L162,215 Z" fill="#2d263c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 右目(三角・黒) -->
  <path d="M222,195 L192,180 L198,215 Z" fill="#2d263c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目のハイライト -->
  <circle cx="158" cy="195" r="3" fill="#ffd84d"/>
  <circle cx="202" cy="195" r="3" fill="#ffd84d"/>

  <!-- 口(ギザギザ) -->
  <path d="M138,245 L150,235 L160,245 L172,235 L180,245 L188,235 L200,245 L212,235 L222,245" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 口の下もギザギザ -->
  <path d="M138,245 L150,255 L160,245 L172,255 L180,245 L188,255 L200,245 L212,255 L222,245" fill="#2d263c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頬の淡い影 -->
  <circle cx="120" cy="230" r="8" fill="#c46420" opacity="0.5"/>
  <circle cx="240" cy="230" r="8" fill="#c46420" opacity="0.5"/>
</svg>
