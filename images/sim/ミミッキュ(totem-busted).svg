<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <g stroke="#2d263c" stroke-linejoin="round" stroke-linecap="round">
    <!-- tail: sticks out upper-left from the body -->
    <path d="M128 195 L98 175 L70 150 L38 120 L52 98 L88 122 L80 135 L106 158 L140 182 Z" fill="#6B4B33" stroke-width="6"/>
    <path d="M45 105 L25 122 L35 138 L58 120 Z" fill="#52382A" stroke="none"/>

    <!-- torso: standing body, scalloped hem (reused proportions from normal form), rounded open shoulders on top -->
    <path d="M208 188
             C226 206 240 232 248 264
             C253 286 252 306 242 318
             C236 326 226 328 218 320
             C212 330 198 333 189 324
             C181 333 167 334 159 325
             C151 333 137 332 130 323
             C123 331 111 330 104 320
             C94 306 90 284 92 258
             C94 232 102 210 116 192
             C128 168 148 150 172 150
             C194 150 204 166 208 188 Z"
          fill="#EFE0BC" stroke-width="7"/>

    <!-- real black eyes peeking through a gap in the fabric on the chest, now that the head has flopped away -->
    <ellipse cx="150" cy="222" rx="4.5" ry="5.5" fill="#443C46" stroke="none"/>
    <ellipse cx="167" cy="227" rx="4.5" ry="5.5" fill="#443C46" stroke="none"/>

    <!-- folded / broken neck: thick floppy tube bending sharply sideways then drooping down to the head -->
    <path d="M186 158 C 198 143 216 136 232 142 C 244 148 248 162 240 174 L 190 180"
          fill="none" stroke="#2d263c" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M186 158 C 198 143 216 136 232 142 C 244 148 248 162 240 174 L 190 180"
          fill="none" stroke="#EFE0BC" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- fold crease wrinkles at the bend -->
    <path d="M204 138 C 210 146 212 153 208 160" fill="none" stroke="#2d263c" stroke-width="3.5"/>
    <path d="M230 152 C 238 157 241 165 236 172" fill="none" stroke="#2d263c" stroke-width="3.5"/>

    <!-- dangling head group: pivots at the neck joint (190,180) and lolls down-sideways, ears drooping too, tip of head pointing down -->
    <g transform="translate(190 180) rotate(135) scale(0.78) translate(0 -54)">
      <!-- left ear (drooping) -->
      <path d="M-45 -60 C-60 -75 -75 -95 -72 -115 C-70 -128 -58 -130 -50 -120 C-40 -105 -35 -88 -30 -70 C-35 -63 -40 -60 -45 -60 Z"
            fill="#EFE0BC" stroke-width="5.5"/>
      <path d="M-58 -95 C-62 -105 -60 -115 -54 -120 C-50 -110 -48 -100 -50 -92 C-53 -90 -56 -92 -58 -95 Z"
            fill="#4B3C36" stroke="none"/>
      <!-- right ear (drooping) -->
      <path d="M45 -60 C60 -75 75 -95 72 -115 C70 -128 58 -130 50 -120 C40 -105 35 -88 30 -70 C35 -63 40 -60 45 -60 Z"
            fill="#EFE0BC" stroke-width="5.5"/>
      <path d="M58 -95 C62 -105 60 -115 54 -120 C50 -110 48 -100 50 -92 C53 -90 56 -92 58 -95 Z"
            fill="#4B3C36" stroke="none"/>
      <!-- head dome -->
      <path d="M-58 8 C-64 -30 -40 -66 0 -72 C40 -66 64 -30 58 8 C56 32 32 50 0 54 C-32 50 -56 32 -58 8 Z"
            fill="#EFE0BC" stroke-width="6.5"/>
      <!-- drawn crayon face: worried curved eyes, cheeks, zigzag mouth -->
      <path d="M-32 -14 C-27 -22 -17 -21 -13 -13" fill="none" stroke-width="4.5"/>
      <path d="M14 -16 C19 -24 29 -23 33 -15" fill="none" stroke-width="4.5"/>
      <ellipse cx="-36" cy="10" rx="9" ry="7.5" fill="#F6A23B" stroke="none"/>
      <ellipse cx="38" cy="8" rx="9" ry="7.5" fill="#F6A23B" stroke="none"/>
      <path d="M-18 20 C-13 12 -6 12 -2 19 C2 26 9 26 13 19 C17 12 24 12 29 19" fill="none" stroke-width="4.5"/>
    </g>
  </g>
</svg>
