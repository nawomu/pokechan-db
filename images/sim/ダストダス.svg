<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- ゴミ袋の影(後ろ) -->
  <ellipse cx="185" cy="310" rx="88" ry="18" fill="#3a3040" opacity="0.25"/>

  <!-- 体の後ろ側(膨らみ感) -->
  <path d="M 82 175 Q 75 255 88 295 Q 115 335 182 338 Q 252 338 272 295 Q 288 255 278 175 Z"
        fill="#5c5566" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体メイン -->
  <path d="M 88 178 Q 80 260 92 298 Q 118 332 183 334 Q 248 332 268 298 Q 280 260 272 178 Q 255 160 183 157 Q 112 160 88 178 Z"
        fill="#7a6e82" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の汚れた白い部分 -->
  <path d="M 125 210 Q 118 268 128 300 Q 148 320 183 322 Q 218 320 236 300 Q 245 268 238 210 Q 222 198 183 196 Q 145 198 125 210 Z"
        fill="#ddd4bf" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- ゴミ袋の口(上部・黄色い縛り目) -->
  <path d="M 115 162 Q 118 140 135 128 Q 155 118 183 116 Q 210 118 228 128 Q 244 140 246 162"
        fill="none" stroke="#c8a820" stroke-width="11" stroke-linecap="round"/>

  <!-- 袋の口ひらひら左 -->
  <path d="M 115 162 Q 100 148 90 128 Q 82 108 95 98 Q 108 90 118 105 Q 125 120 122 142 Q 120 155 115 162 Z"
        fill="#d4b822" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 袋の口ひらひら中 -->
  <path d="M 155 118 Q 150 96 158 78 Q 165 62 178 60 Q 192 60 198 76 Q 205 94 198 118"
        fill="#d4b822" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 袋の口ひらひら右 -->
  <path d="M 246 162 Q 258 148 268 128 Q 276 108 264 97 Q 251 88 240 103 Q 233 118 237 142 Q 239 155 246 162 Z"
        fill="#d4b822" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目(左)・ぼんやり顔 -->
  <ellipse cx="158" cy="238" rx="18" ry="20" fill="white" stroke="#2d263c" stroke-width="6"/>
  <circle cx="161" cy="241" r="10" fill="#2d263c"/>
  <circle cx="164" cy="237" r="4" fill="white"/>

  <!-- 目(右) -->
  <ellipse cx="210" cy="235" rx="16" ry="19" fill="white" stroke="#2d263c" stroke-width="6"/>
  <circle cx="213" cy="238" r="9" fill="#2d263c"/>
  <circle cx="216" cy="234" r="3.5" fill="white"/>

  <!-- まゆげ(左・へたれ気味) -->
  <path d="M 145 222 Q 155 215 170 220" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- まゆげ(右・左右非対称) -->
  <path d="M 198 216 Q 210 212 224 218" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 鼻 -->
  <ellipse cx="183" cy="262" rx="7" ry="5" fill="#5a5060" stroke="#2d263c" stroke-width="4"/>

  <!-- 口(ちょっとへの字) -->
  <path d="M 162 280 Q 172 290 183 288 Q 196 290 204 280"
        fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- ほっぺ(左・赤みがかった染み) -->
  <ellipse cx="140" cy="270" rx="14" ry="10" fill="#c07878" opacity="0.55"/>

  <!-- ほっぺ(右) -->
  <ellipse cx="226" cy="267" rx="13" ry="9" fill="#c07878" opacity="0.55"/>

  <!-- 体の染み・汚れ1 -->
  <ellipse cx="150" cy="308" rx="11" ry="7" fill="#9e8e6a" opacity="0.5" transform="rotate(-15 150 308)"/>

  <!-- 体の染み・汚れ2 -->
  <ellipse cx="215" cy="315" rx="9" ry="6" fill="#8a7a5a" opacity="0.45" transform="rotate(10 215 315)"/>

  <!-- 体の染み3(小さめ) -->
  <circle cx="240" cy="280" r="5" fill="#9e8e6a" opacity="0.4"/>

  <!-- 体の線(袋のシワ・左) -->
  <path d="M 100 200 Q 96 240 100 275" fill="none" stroke="#5a5066" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- 体の線(袋のシワ・右) -->
  <path d="M 264 205 Q 268 242 263 278" fill="none" stroke="#5a5066" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- 底の結び目 -->
  <path d="M 155 332 Q 183 342 210 332" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M 175 334 Q 183 348 192 334" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

</svg>