<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind, peeking above/behind head - signature black face on tail) -->
  <ellipse cx="248" cy="105" rx="42" ry="40" fill="#241f30" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="235" cy="98" r="5" fill="#2d263c"/>
  <circle cx="260" cy="98" r="5" fill="#2d263c"/>
  <path d="M228 118 Q236 128 244 118 Q252 128 260 118" fill="none" stroke="#e2434a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- body -->
  <ellipse cx="180" cy="215" rx="95" ry="108" fill="#5fa8d8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- arms -->
  <ellipse cx="93" cy="215" rx="26" ry="42" fill="#5fa8d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-8 93 215)"/>
  <ellipse cx="267" cy="215" rx="26" ry="42" fill="#5fa8d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(8 267 215)"/>

  <!-- legs / feet -->
  <ellipse cx="140" cy="322" rx="32" ry="22" fill="#5fa8d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="220" cy="322" rx="32" ry="22" fill="#5fa8d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- blush -->
  <circle cx="132" cy="168" r="12" fill="#ffb3c6" opacity="0.8"/>
  <circle cx="228" cy="168" r="12" fill="#ffb3c6" opacity="0.8"/>

  <!-- eyes (closed, curved) with lashes - girlish variant -->
  <path d="M118 145 Q145 130 172 145" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M188 145 Q215 130 242 145" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M118 145 l-8 -10" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M242 145 l8 -10" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- mouth -->
  <path d="M155 178 Q180 195 205 178" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- pink bow on head (marks the "girl" variant vs plain Wobbuffet) -->
  <path d="M145 108 L115 88 L128 110 L115 130 Z" fill="#ff6fa0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M145 108 L175 90 L162 108 L175 128 Z" fill="#ff6fa0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="145" cy="108" r="9" fill="#ff4f8f" stroke="#2d263c" stroke-width="5"/>
</svg>
