<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail -->
  <path d="M 268 250 Q 320 235 315 190 Q 312 165 285 175" fill="#e2662f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 300 168 L 322 150 L 316 178 Z" fill="#e24a2f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 306 168 L 318 158 L 314 176 Z" fill="#ffcf4d"/>

  <!-- legs -->
  <ellipse cx="128" cy="305" rx="30" ry="24" fill="#e2662f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="122" cy="320" rx="26" ry="14" fill="#fbead0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="232" cy="305" rx="30" ry="24" fill="#e2662f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="238" cy="320" rx="26" ry="14" fill="#fbead0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- body -->
  <ellipse cx="180" cy="235" rx="98" ry="82" fill="#e2662f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <ellipse cx="180" cy="252" rx="56" ry="56" fill="#fbead0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- back spikes -->
  <path d="M 118 168 L 132 138 L 146 168 Z" fill="#d3402d" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 150 158 L 164 126 L 178 158 Z" fill="#d3402d" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 182 156 L 196 124 L 210 156 Z" fill="#d3402d" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- arms -->
  <ellipse cx="86" cy="228" rx="22" ry="30" fill="#e2662f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="274" cy="228" rx="22" ry="30" fill="#e2662f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- head -->
  <circle cx="180" cy="150" r="86" fill="#e2662f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- snout -->
  <ellipse cx="180" cy="204" rx="60" ry="42" fill="#fbead0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- flame on snout -->
  <path d="M 180 168 Q 160 190 172 210 Q 180 222 188 210 Q 200 190 180 168 Z" fill="#f0862f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 180 182 Q 170 196 178 208 Q 182 214 186 208 Q 192 196 180 182 Z" fill="#ffcf4d"/>

  <!-- eyes -->
  <ellipse cx="146" cy="130" rx="20" ry="24" fill="#fff8ec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="150" cy="134" r="10" fill="#2d263c"/>
  <ellipse cx="214" cy="130" rx="20" ry="24" fill="#fff8ec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="210" cy="134" r="10" fill="#2d263c"/>

  <!-- blush -->
  <circle cx="116" cy="176" r="12" fill="#f07a5a" opacity="0.55"/>
  <circle cx="244" cy="176" r="12" fill="#f07a5a" opacity="0.55"/>

  <!-- mouth -->
  <path d="M 150 224 Q 180 244 210 224" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M 172 226 L 180 238 L 188 226 Z" fill="#fff8ec" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
</svg>
