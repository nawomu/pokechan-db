  <path d="M155 95 Q130 50 108 28 Q105 22 112 20 Q128 35 148 75 Z" fill="#2555b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="108" cy="22" r="11" fill="#2555b8" stroke="#2d263c" stroke-width="6"/>

  <!-- 右の大ツノ -->
  <path d="M205 95 Q230 50 252 28 Q255 22 248 20 Q232 35 212 75 Z" fill="#2555b8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="252" cy="22" r="11" fill="#2555b8" stroke="#2d263c" stroke-width="6"/>

  <!-- ツノ交差部分の装飾 -->
  <path d="M148 78 Q180 60 212 78" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 体(胴体) -->
