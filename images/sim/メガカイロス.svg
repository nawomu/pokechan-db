  <!-- 左こぶし -->
  <ellipse cx="76" cy="242" rx="18" ry="14" fill="#3060c8" stroke="#2d263c" stroke-width="6"/>

  <!-- 右前脚(大きなこぶし) -->
  <path d="M248 195 Q280 200 292 225 Q295 245 280 248 Q265 252 255 235 Q248 218 248 200Z" fill="#2a52b5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右こぶし -->
  <ellipse cx="284" cy="242" rx="18" ry="14" fill="#3060c8" stroke="#2d263c" stroke-width="6"/>

  <!-- 左中脚 -->
  <path d="M125 240 Q95 252 88 272 Q86 280 95 278 Q108 272 120 258Z" fill="#2a52b5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

