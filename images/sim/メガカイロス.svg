  <ellipse cx="180" cy="138" rx="62" ry="55" fill="#2a52b5" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の甲羅ライン -->
  <path d="M128 125 Q180 108 232 125" fill="none" stroke="#1a3ea0" stroke-width="4" stroke-linecap="round"/>

  <!-- 腹部(クリーム色) -->
  <ellipse cx="180" cy="228" rx="52" ry="45" fill="#e8d890" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 腹の縦線(甲虫の腹節) -->
  <path d="M158 198 Q162 225 160 255" fill="none" stroke="#c8b870" stroke-width="3" stroke-linecap="round"/>
  <path d="M180 195 Q180 225 180 258" fill="none" stroke="#c8b870" stroke-width="3" stroke-linecap="round"/>
  <path d="M202 198 Q198 225 200 255" fill="none" stroke="#c8b870" stroke-width="3" stroke-linecap="round"/>

  <!-- メガカイロスの大きなピンク吸盤(腹先端) -->
  <circle cx="180" cy="278" r="32" fill="#e8557a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <circle cx="180" cy="278" r="20" fill="#f07090" stroke="#2d263c" stroke-width="4"/>
  <circle cx="180" cy="278" r="9" fill="#ff90aa" stroke="#2d263c" stroke-width="3"/>

