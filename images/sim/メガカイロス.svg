  <path d="M138 268 Q118 285 115 305 Q114 312 122 308 Q132 298 140 280Z" fill="#2a52b5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 右後脚 -->
  <path d="M222 268 Q242 285 245 305 Q246 312 238 308 Q228 298 220 280Z" fill="#2a52b5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左目 -->
  <ellipse cx="156" cy="138" rx="16" ry="17" fill="white" stroke="#2d263c" stroke-width="5"/>
  <circle cx="159" cy="138" r="10" fill="#1a1a2e"/>
  <circle cx="163" cy="133" r="4" fill="white"/>

  <!-- 右目 -->
  <ellipse cx="204" cy="138" rx="16" ry="17" fill="white" stroke="#2d263c" stroke-width="5"/>
  <circle cx="207" cy="138" r="10" fill="#1a1a2e"/>
  <circle cx="211" cy="133" r="4" fill="white"/>

  <!-- 口(ニコっと) -->
  <path d="M166 162 Q180 175 194 162" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺの赤み -->
  <ellipse cx="140" cy="155" rx="12" ry="8" fill="#e86080" opacity="0.6"/>
  <ellipse cx="220" cy="155" rx="12" ry="8" fill="#e86080" opacity="0.6"/>

  <!-- 頭の小触角 -->
  <path d="M160 90 Q152 70 148 58" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <circle cx="146" cy="55" r="7" fill="#3060c8" stroke="#2d263c" stroke-width="4"/>
  <path d="M200 90 Q208 70 212 58" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <circle cx="214" cy="55" r="7" fill="#3060c8" stroke="#2d263c" stroke-width="4"/>
</svg>