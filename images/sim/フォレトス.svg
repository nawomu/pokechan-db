<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ脚(左右) -->
  <line x1="110" y1="265" x2="75" y2="305" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <line x1="130" y1="278" x2="95" y2="320" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <line x1="250" y1="265" x2="285" y2="305" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <line x1="230" y1="278" x2="265" y2="320" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <!-- 前脚 -->
  <line x1="170" y1="285" x2="148" y2="325" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <line x1="190" y1="285" x2="212" y2="325" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 殻の外輪郭(ゆがんだまんまる) -->
  <ellipse cx="182" cy="210" rx="138" ry="128" fill="#2a5e1e" stroke="#2d263c" stroke-width="8"/>

  <!-- 殻 本体(深緑) -->
  <ellipse cx="180" cy="208" rx="132" ry="122" fill="#3d7a2e" stroke="#2d263c" stroke-width="7"/>

  <!-- 殻の赤リング(外) -->
  <ellipse cx="180" cy="208" rx="105" ry="98" fill="none" stroke="#cc2222" stroke-width="14"/>

  <!-- 殻の赤リング(中) -->
  <ellipse cx="181" cy="207" rx="75" ry="70" fill="#c41a1a" stroke="#2d263c" stroke-width="6"/>

  <!-- 殻の中心(濃い赤) -->
  <ellipse cx="181" cy="207" rx="48" ry="45" fill="#8b0000" stroke="#2d263c" stroke-width="5"/>

  <!-- 殻のへそ(一番中心) -->
  <ellipse cx="181" cy="207" rx="18" ry="17" fill="#3d0000" stroke="#2d263c" stroke-width="4"/>

  <!-- 頭(小さめ・ちょこんと乗ってる) -->
  <ellipse cx="183" cy="95" rx="42" ry="38" fill="#3d7a2e" stroke="#2d263c" stroke-width="7"/>

  <!-- 首(頭と体をつなぐ) -->
  <path d="M162,118 Q180,130 200,117" fill="#3d7a2e" stroke="none"/>

  <!-- 目(左) ぼーっとした黒目 -->
  <ellipse cx="167" cy="90" rx="9" ry="10" fill="#1a1a1a" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="164" cy="87" rx="3" ry="3" fill="white"/>

  <!-- 目(右) 少しずれてる -->
  <ellipse cx="200" cy="88" rx="8" ry="10" fill="#1a1a1a" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="198" cy="85" rx="3" ry="3" fill="white"/>

  <!-- 口(にへら笑い) -->
  <path d="M172,107 Q183,118 196,107" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 頬(ほっぺ) -->
  <ellipse cx="155" cy="103" rx="10" ry="7" fill="#ff9999" opacity="0.7"/>
  <ellipse cx="210" cy="101" rx="10" ry="7" fill="#ff9999" opacity="0.7"/>

  <!-- アンテナ(触角) 左 -->
  <path d="M172,60 Q160,35 148,22" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <circle cx="146" cy="20" r="6" fill="#3d7a2e" stroke="#2d263c" stroke-width="4"/>

  <!-- アンテナ(触角) 右 ちょっとくにゃっとしてる -->
  <path d="M194,59 Q208,33 222,18" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <circle cx="224" cy="16" r="6" fill="#3d7a2e" stroke="#2d263c" stroke-width="4"/>

  <!-- 小さい腕(左) -->
  <path d="M82,200 Q60,215 55,238" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="54" cy="243" rx="10" ry="8" fill="#3d7a2e" stroke="#2d263c" stroke-width="5"/>

  <!-- 小さい腕(右) -->
  <path d="M278,200 Q300,215 305,237" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <ellipse cx="306" cy="242" rx="10" ry="8" fill="#3d7a2e" stroke="#2d263c" stroke-width="5"/>
</svg>