<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尻尾ヒレ(後ろ) -->
  <ellipse cx="295" cy="230" rx="52" ry="22" fill="#5bbcd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-18 295 230)"/>
  <ellipse cx="308" cy="210" rx="38" ry="16" fill="#6ec6e0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-35 308 210)"/>
  <ellipse cx="300" cy="248" rx="42" ry="14" fill="#6ec6e0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-5 300 248)"/>

  <!-- 体 -->
  <ellipse cx="175" cy="230" rx="100" ry="78" fill="#5bbcd6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹(クリーム) -->
  <ellipse cx="168" cy="245" rx="62" ry="48" fill="#ddf0f7" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 後ろ足左 -->
  <ellipse cx="110" cy="295" rx="28" ry="18" fill="#5bbcd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="100" cy="310" rx="22" ry="12" fill="#5bbcd6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 後ろ足右 -->
  <ellipse cx="230" cy="292" rx="26" ry="17" fill="#5bbcd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="238" cy="308" rx="20" ry="11" fill="#5bbcd6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前足左 -->
  <ellipse cx="118" cy="285" rx="20" ry="28" fill="#5bbcd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-10 118 285)"/>
  <ellipse cx="108" cy="308" rx="18" ry="10" fill="#5bbcd6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前足右 -->
  <ellipse cx="210" cy="283" rx="19" ry="26" fill="#5bbcd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(8 210 283)"/>
  <ellipse cx="218" cy="305" rx="17" ry="10" fill="#5bbcd6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 首のえり(もふもふ・白) -->
  <ellipse cx="162" cy="182" rx="58" ry="28" fill="#e8f8ff" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="145" cy="176" rx="38" ry="22" fill="#f0fbff" stroke="none"/>
  <!-- えりのぎざぎざ感 -->
  <path d="M118 172 Q128 158 140 170 Q150 156 162 168 Q172 154 184 167 Q196 155 205 168" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="162" cy="148" rx="62" ry="56" fill="#5bbcd6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 耳(左) -->
  <polygon points="115,120 100,72 138,105" fill="#5bbcd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="118,116 106,80 134,108" fill="#c8ecf8" stroke="none"/>

  <!-- 耳(右) -->
  <polygon points="205,115 218,68 195,106" fill="#5bbcd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="202,112 215,76 198,108" fill="#c8ecf8" stroke="none"/>

  <!-- 頭のヒレ/フリル(後ろへ流れる感じ) -->
  <path d="M145 105 Q138 80 150 65 Q162 50 172 68 Q180 82 170 100" fill="#e0f6ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔: 目(左) - ちょっと大きくてかわいい -->
  <ellipse cx="143" cy="152" rx="16" ry="17" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="148" cy="147" rx="5" ry="6" fill="white"/>
  <ellipse cx="146" cy="145" rx="2" ry="2" fill="white"/>

  <!-- 顔: 目(右) - 少しズレてゆる感 -->
  <ellipse cx="183" cy="150" rx="15" ry="16" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="188" cy="145" rx="5" ry="5" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="163" cy="168" rx="6" ry="4" fill="#2d84a0" stroke="#2d263c" stroke-width="3"/>

  <!-- 口(ゆるいにっこり) -->
  <path d="M150 178 Q162 188 176 177" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 額の菱形宝石 -->
  <polygon points="162,108 154,122 162,134 170,122" fill="#3b9ec8" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="162,113 156,122 162,129 168,122" fill="#7dd4f0" stroke="none"/>

  <!-- ほっぺの丸み(ピンクっぽい光) -->
  <ellipse cx="130" cy="167" rx="11" ry="8" fill="#a0ddf0" opacity="0.6"/>
  <ellipse cx="196" cy="165" rx="10" ry="8" fill="#a0ddf0" opacity="0.6"/>

  <!-- 背びれ(背中に小さく) -->
  <path d="M195 200 Q210 178 220 190 Q215 205 200 210 Z" fill="#4aaec8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 水しぶきっぽい小丸(シャワーズらしさ) -->
  <circle cx="58" cy="155" r="8" fill="#6ec6e0" stroke="#2d263c" stroke-width="4"/>
  <circle cx="42" cy="138" r="5" fill="#9edcee" stroke="#2d263c" stroke-width="3"/>
  <circle cx="68" cy="132" r="6" fill="#6ec6e0" stroke="#2d263c" stroke-width="3"/>
  <circle cx="300" cy="170" r="7" fill="#6ec6e0" stroke="#2d263c" stroke-width="3"/>
  <circle cx="316" cy="155" r="4" fill="#9edcee" stroke="#2d263c" stroke-width="3"/>
</svg>