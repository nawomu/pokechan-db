<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- しっぽ(後ろ) -->
  <path d="M255 240 Q285 210 278 185 Q270 165 255 172 Q242 180 248 200 Q254 218 245 232 Z" fill="#f5e6d0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 左足 -->
  <ellipse cx="148" cy="298" rx="28" ry="18" fill="#f5e6d0" stroke="#2d263c" stroke-width="7"/>
  <!-- 右足 -->
  <ellipse cx="212" cy="300" rx="26" ry="17" fill="#f5e6d0" stroke="#2d263c" stroke-width="7"/>

  <!-- 体 -->
  <ellipse cx="185" cy="248" rx="78" ry="72" fill="#f5e6d0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹のピンク帯(エプロン) -->
  <path d="M155 230 Q158 278 165 298 Q185 308 205 295 Q212 274 214 228 Q200 238 185 238 Q170 240 155 230 Z" fill="#f9c9d4" stroke="none"/>
  <path d="M155 230 Q170 240 185 238 Q200 238 214 228" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 左腕 -->
  <path d="M118 242 Q98 245 90 260 Q86 275 100 278 Q115 280 122 265 Z" fill="#f5e6d0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右腕 -->
  <path d="M248 245 Q268 248 275 262 Q278 276 264 278 Q250 279 244 264 Z" fill="#f5e6d0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="183" cy="168" rx="72" ry="68" fill="#f5e6d0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 耳(左) -->
  <path d="M130 128 Q115 95 125 75 Q138 58 152 78 Q160 95 148 118 Z" fill="#f5e6d0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 耳内側(左) -->
  <path d="M134 122 Q122 97 130 80 Q140 67 150 82 Q156 96 146 115 Z" fill="#f9c9d4" stroke="none"/>

  <!-- 耳(右) -->
  <path d="M236 125 Q250 92 242 72 Q230 56 216 75 Q208 92 220 116 Z" fill="#f5e6d0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 耳内側(右) -->
  <path d="M232 120 Q244 96 237 78 Q228 65 218 78 Q212 93 222 114 Z" fill="#f9c9d4" stroke="none"/>

  <!-- 頭のクリーム飾り(ソフトクリーム渦巻き) -->
  <path d="M183 105 Q168 90 172 75 Q178 60 190 65 Q200 70 196 84 Q192 96 180 100 Q168 104 165 115 Q162 128 175 132 Q190 135 198 122 Q205 110 200 98" fill="none" stroke="#f9c9d4" stroke-width="14" stroke-linecap="round"/>
  <path d="M183 105 Q168 90 172 75 Q178 60 190 65 Q200 70 196 84 Q192 96 180 100 Q168 104 165 115 Q162 128 175 132 Q190 135 198 122 Q205 110 200 98" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 顔パーツ: ほっぺ(左) -->
  <ellipse cx="148" cy="182" rx="18" ry="11" fill="#ffb3c6" opacity="0.7"/>
  <!-- ほっぺ(右) -->
  <ellipse cx="218" cy="180" rx="17" ry="10" fill="#ffb3c6" opacity="0.7"/>

  <!-- 鼻(大きくてピンク・のっぺり) -->
  <ellipse cx="184" cy="168" rx="20" ry="13" fill="#f48fb1" stroke="#2d263c" stroke-width="5"/>

  <!-- 目(左): ぼんやり大きな黒目 -->
  <ellipse cx="157" cy="155" rx="14" ry="15" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="153" cy="151" rx="4" ry="4" fill="white"/>

  <!-- 目(右): 少し違う形(非対称・落書き感) -->
  <ellipse cx="211" cy="153" rx="13" ry="14" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="207" cy="149" rx="3.5" ry="3.5" fill="white"/>

  <!-- 口: ちょっとあほっぽいにやけ顔 -->
  <path d="M168 183 Q183 196 200 184" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 舌(ペロリームらしく少し出てる) -->
  <path d="M176 192 Q183 202 190 193" fill="#f48fb1" stroke="#2d263c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>