<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. まるっとした黒い卵型の体・虫っぽいシルエット・直立姿勢
  2. 頭の左右から太く波打つ黒いアンテナ(お下げ髪のような房)が外向きにカール
  3. 大きな丸い赤い目とちいさい口
  4. 胸〜おなかは白っぽいクリーム色、背中に小さな黒い羽(はね)
  5. 小さい黒い手足(棒状)がおなかの脇についている
  -->

  <!-- 後ろ: 影 -->
  <ellipse cx="180" cy="315" rx="70" ry="14" fill="#2d263c" opacity="0.15"/>

  <!-- 後ろ: 背中の小さい羽 -->
  <path d="M120 165 Q80 150 78 185 Q95 215 128 205 Z" fill="#3a3550" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M240 165 Q280 150 282 185 Q265 215 232 205 Z" fill="#3a3550" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭のアンテナ(左右の波打つ房) -->
  <path d="M140 110 Q95 95 100 130 Q108 160 85 175 Q120 175 128 150 Q136 130 140 110 Z"
        fill="#161320" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M220 110 Q265 95 260 130 Q252 160 275 175 Q240 175 232 150 Q224 130 220 110 Z"
        fill="#161320" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 小さい手(左右) -->
  <path d="M110 235 Q85 240 82 262" fill="none" stroke="#161320" stroke-width="9" stroke-linecap="round"/>
  <path d="M250 235 Q275 240 278 262" fill="none" stroke="#161320" stroke-width="9" stroke-linecap="round"/>

  <!-- 小さい足(左右) -->
  <ellipse cx="150" cy="322" rx="20" ry="12" fill="#161320" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="210" cy="322" rx="20" ry="12" fill="#161320" stroke="#2d263c" stroke-width="6"/>

  <!-- 体(丸い卵形・黒) -->
  <path d="M180 120
           C 240 120 262 175 258 230
           C 254 285 220 312 180 312
           C 140 312 106 285 102 230
           C 98 175 120 120 180 120 Z"
        fill="#232030" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- おなか(クリーム色) -->
  <path d="M180 175
           C 215 175 232 205 228 245
           C 224 280 205 296 180 296
           C 155 296 136 280 132 245
           C 128 205 145 175 180 175 Z"
        fill="#f3ead0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- おなかの黄色い光る模様(発光ライン) -->
  <path d="M150 235 Q180 250 210 235" fill="none" stroke="#ffe066" stroke-width="8" stroke-linecap="round"/>
  <path d="M155 260 Q180 272 205 260" fill="none" stroke="#ffe066" stroke-width="7" stroke-linecap="round"/>

  <!-- 顔まわりの白いふち(ほお) -->
  <path d="M180 130 C 210 130 225 150 220 175 C 205 195 155 195 140 175 C 135 150 150 130 180 130 Z"
        fill="#f3ead0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(大きい赤丸) -->
  <circle cx="152" cy="165" r="17" fill="#e8352f" stroke="#2d263c" stroke-width="6"/>
  <circle cx="208" cy="165" r="17" fill="#e8352f" stroke="#2d263c" stroke-width="6"/>
  <circle cx="147" cy="160" r="5" fill="#ffffff"/>
  <circle cx="203" cy="160" r="5" fill="#ffffff"/>

  <!-- 口(ちいさい弧) -->
  <path d="M167 188 Q180 198 193 188" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <circle cx="138" cy="182" r="7" fill="#ffb3b0" opacity="0.8"/>
  <circle cx="222" cy="182" r="7" fill="#ffb3b0" opacity="0.8"/>
</svg>
