<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 影 -->
  <ellipse cx="180" cy="318" rx="62" ry="13" fill="#00000022"/>

  <!-- 尾羽 -->
  <g stroke="#2d263c" stroke-linejoin="round" stroke-linecap="round">
    <path d="M180,250 Q155,290 130,320 Q145,305 160,315 Q170,295 180,285 Q190,295 200,315 Q215,305 230,320 Q205,290 180,250Z"
          fill="#888090" stroke-width="5"/>
    <!-- 尾羽の白いライン -->
    <path d="M160,315 Q170,300 180,285 Q190,300 200,315"
          fill="white" stroke-width="3"/>
  </g>

  <!-- 翼 左 -->
  <path d="M115,195 Q60,160 40,200 Q50,230 80,235 Q100,238 120,225 Z"
        fill="#5a4030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 翼羽先 左 -->
  <path d="M40,200 Q35,220 50,240 Q65,235 80,235"
        fill="#4a3020" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 翼 右 -->
  <path d="M245,195 Q300,160 320,200 Q310,230 280,235 Q260,238 240,225 Z"
        fill="#5a4030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 翼羽先 右 -->
  <path d="M320,200 Q325,220 310,240 Q295,235 280,235"
        fill="#4a3020" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <ellipse cx="180" cy="222" rx="65" ry="70" fill="#888090" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 胸毛 (白いスカーフ状) -->
  <ellipse cx="180" cy="190" rx="40" ry="28" fill="white" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="135" rx="45" ry="42" fill="#888090" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 顔の白い丸 -->
  <circle cx="180" cy="140" r="22" fill="white" stroke="#2d263c" stroke-width="4"/>

  <!-- 赤い冠羽 -->
  <path d="M165,100 Q170,60 180,45 Q190,60 195,100 Q185,90 180,88 Q175,90 165,100Z"
        fill="#cc2222" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M150,105 Q148,65 158,52 Q168,68 165,100Z"
        fill="#cc2222" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 目 左 (白い丸の中) -->
  <circle cx="171" cy="138" r="8" fill="white" stroke="#2d263c" stroke-width="3"/>
  <circle cx="171" cy="138" r="5" fill="#d0a020"/>
  <circle cx="171" cy="138" r="3" fill="#111111"/>
  <circle cx="173" cy="136" r="1.2" fill="white"/>

  <!-- 目 右 (白い丸の中) -->
  <circle cx="189" cy="138" r="8" fill="white" stroke="#2d263c" stroke-width="3"/>
  <circle cx="189" cy="138" r="5" fill="#d0a020"/>
  <circle cx="189" cy="138" r="3" fill="#111111"/>
  <circle cx="191" cy="136" r="1.2" fill="white"/>

  <!-- くちばし -->
  <path d="M168,152 Q180,148 192,152 L185,168 Q180,178 175,168 Z"
        fill="#d0a020" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- くちばし先端の鉤 -->
  <path d="M175,168 Q172,178 168,176 Q170,170 175,168Z"
        fill="#b08010" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 足 左 -->
  <path d="M155,288 L148,315" stroke="#d0a020" stroke-width="7" stroke-linecap="round"/>
  <path d="M148,315 L132,322 M148,315 L142,328 M148,315 L155,326"
        stroke="#d0a020" stroke-width="5" stroke-linecap="round"/>

  <!-- 足 右 -->
  <path d="M205,288 L212,315" stroke="#d0a020" stroke-width="7" stroke-linecap="round"/>
  <path d="M212,315 L196,322 M212,315 L206,328 M212,315 L219,326"
        stroke="#d0a020" stroke-width="5" stroke-linecap="round"/>
</svg>
