<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)銀白の機械竜ボディ 2)左右に大きく広げた翼(すべて全開=コンプリート) 3)胸の光る核(マゼンタ) 4)体中に走るマゼンタの光の回路 5)青いたてがみ状の角 6)赤く光る目 -->

  <!-- 尾 -->
  <path d="M212,228 Q258,252 276,292 Q286,308 266,314 Q250,304 238,278 Q222,252 206,232 Z" fill="#eef0f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M262,288 Q284,300 268,316 Q252,306 260,290 Z" fill="#ff3d94" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 脚と足(車輪状) -->
  <path d="M142,222 Q136,255 142,280 L160,280 Q163,252 158,222 Z" fill="#3a3a48" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="151" cy="284" r="11" fill="#eef0f5" stroke="#2d263c" stroke-width="6"/>
  <circle cx="151" cy="284" r="4" fill="#ff3d94"/>
  <path d="M206,222 Q212,255 206,280 L224,280 Q227,252 222,222 Z" fill="#3a3a48" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="215" cy="284" r="11" fill="#eef0f5" stroke="#2d263c" stroke-width="6"/>
  <circle cx="215" cy="284" r="4" fill="#ff3d94"/>

  <!-- 胴体 -->
  <ellipse cx="185" cy="195" rx="58" ry="48" fill="#eef0f5" stroke="#2d263c" stroke-width="8"/>

  <!-- 胸の核(光る) -->
  <circle cx="185" cy="195" r="18" fill="#ff3d94" stroke="#2d263c" stroke-width="6"/>
  <circle cx="185" cy="195" r="8" fill="#ffd9ec"/>

  <!-- 体の光の回路 -->
  <path d="M150,175 Q172,192 150,216" fill="none" stroke="#ff3d94" stroke-width="5" stroke-linecap="round"/>
  <path d="M220,175 Q198,192 220,216" fill="none" stroke="#ff3d94" stroke-width="5" stroke-linecap="round"/>

  <!-- 首 -->
  <path d="M150,165 Q120,140 108,115 Q126,107 146,120 Q156,145 166,168 Z" fill="#eef0f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- たてがみ(青い光の線) -->
  <path d="M95,100 Q130,132 150,172" fill="none" stroke="#5ab8e8" stroke-width="6" stroke-linecap="round"/>
  <path d="M80,106 Q116,146 140,187" fill="none" stroke="#5ab8e8" stroke-width="5" stroke-linecap="round"/>

  <!-- 頭 -->
  <path d="M108,115 Q75,95 55,100 Q40,110 45,130 Q55,146 80,140 Q100,138 112,120 Z" fill="#eef0f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- あご -->
  <path d="M55,120 Q44,133 50,143 Q65,151 86,142 Q76,128 55,120 Z" fill="#c9ccd6" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 角(青) -->
  <path d="M85,100 Q90,70 74,44 Q64,72 72,98 Z" fill="#5ab8e8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M100,98 Q116,68 136,49 Q120,80 108,102 Z" fill="#5ab8e8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目 -->
  <ellipse cx="66" cy="113" rx="9" ry="10" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="66" cy="114" r="5" fill="#ff3348"/>
  <ellipse cx="90" cy="108" rx="6" ry="7" fill="#ffffff" stroke="#2d263c" stroke-width="4"/>
  <circle cx="90" cy="109" r="3.5" fill="#ff3348"/>

  <!-- 口 -->
  <path d="M50,136 Q60,143 72,137" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 左翼(全開) -->
  <path d="M150,168 Q95,120 40,75 Q65,146 96,196 Q126,219 152,205 Z" fill="#eef0f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M66,130 Q96,158 122,186" fill="none" stroke="#ff3d94" stroke-width="6" stroke-linecap="round"/>

  <!-- 右翼(全開) -->
  <path d="M220,168 Q276,120 330,75 Q306,146 274,196 Q244,219 218,205 Z" fill="#eef0f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M304,130 Q274,158 248,186" fill="none" stroke="#ff3d94" stroke-width="6" stroke-linecap="round"/>
</svg>
