  <path d="M 163 202 Q 178 212 193 202" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺの丸み(うっすら赤) -->
  <ellipse cx="148" cy="196" rx="10" ry="7" fill="#e87878" opacity="0.55"/>
  <ellipse cx="208" cy="194" rx="10" ry="7" fill="#e87878" opacity="0.55"/>
