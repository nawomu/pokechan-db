  <polygon points="84,268 82,240 92,264" fill="#aee8f5" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="96,275 96,248 104,272" fill="#aee8f5" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

