<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- back: gas wisps -->
  <path d="M75 90 Q60 65 80 55 Q95 70 90 95 Q105 75 120 85 Q110 105 90 110" fill="#c9a8e0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>
  <path d="M270 70 Q290 45 305 55 Q300 78 280 85 Q298 90 295 108 Q272 108 262 92" fill="#c9a8e0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>
  <path d="M180 45 Q170 25 185 20 Q200 30 195 48" fill="#c9a8e0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" opacity="0.8"/>

  <!-- neck connecting the two balls -->
  <path d="M148 195 Q188 160 232 175 L232 245 Q188 260 148 240 Z" fill="#9166ab" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- left ball body -->
  <circle cx="128" cy="220" r="88" fill="#9a6fb5" stroke="#2d263c" stroke-width="8"/>
  <!-- right ball body (bigger, higher) -->
  <circle cx="245" cy="180" r="98" fill="#a377bd" stroke="#2d263c" stroke-width="8"/>

  <!-- pipe stub on left ball -->
  <rect x="95" y="118" width="34" height="34" rx="8" fill="#d8c9a3" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="112" cy="120" rx="17" ry="9" fill="#efe3c3" stroke="#2d263c" stroke-width="5"/>
  <!-- pipe stub on right ball -->
  <rect x="222" y="70" width="38" height="38" rx="9" fill="#d8c9a3" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="241" cy="72" rx="19" ry="10" fill="#efe3c3" stroke="#2d263c" stroke-width="5"/>

  <!-- gas puffs rising from pipes -->
  <circle cx="105" cy="90" r="14" fill="#c9a8e0" stroke="#2d263c" stroke-width="5" opacity="0.9"/>
  <circle cx="238" cy="38" r="16" fill="#c9a8e0" stroke="#2d263c" stroke-width="5" opacity="0.9"/>
  <circle cx="262" cy="55" r="10" fill="#c9a8e0" stroke="#2d263c" stroke-width="5" opacity="0.9"/>

  <!-- left face: pale skull-ish patch -->
  <ellipse cx="120" cy="235" rx="52" ry="46" fill="#c9a8e0" opacity="0.35"/>
  <circle cx="98" cy="222" r="15" fill="#fdf9f0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="98" cy="225" r="6" fill="#2d263c"/>
  <circle cx="148" cy="222" r="15" fill="#fdf9f0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="148" cy="225" r="6" fill="#2d263c"/>
  <path d="M95 258 Q123 280 152 258" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- right face: pale patch with grin & teeth -->
  <ellipse cx="248" cy="200" rx="60" ry="52" fill="#c9a8e0" opacity="0.35"/>
  <circle cx="222" cy="182" r="16" fill="#fdf9f0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="222" cy="185" r="6" fill="#2d263c"/>
  <circle cx="278" cy="182" r="16" fill="#fdf9f0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="278" cy="185" r="6" fill="#2d263c"/>
  <path d="M215 222 Q250 250 285 220 L278 238 Q250 254 222 236 Z" fill="#5c3d6b" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M234 226 L238 240 M250 232 L250 246 M266 226 L262 240" stroke="#fdf9f0" stroke-width="5" stroke-linecap="round"/>
</svg>
