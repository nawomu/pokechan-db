<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)浮遊する灰色の岩 2)周りに青い菱形の宝石(首飾り) 3)頭上に2つの尖った耳宝石 4)岩に顔(目・口) 5)下部はとがった岩 -->

  <!-- 下部の岩(尖った台) -->
  <path d="M120,235 Q180,330 240,235 Q250,260 230,275 Q180,300 130,275 Q110,260 120,235 Z" fill="#9aa0a8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 岩の節 -->
  <path d="M150,265 Q160,280 155,295 M195,265 Q190,282 200,295" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 上部の岩(丸い頭部) -->
  <ellipse cx="180" cy="200" rx="65" ry="55" fill="#b8bdc4" stroke="#2d263c" stroke-width="7"/>

  <!-- 青い宝石の首飾り(周囲に並ぶ) -->
  <path d="M118,205 L128,195 L138,205 L128,215 Z" fill="#5fb8d6" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M222,205 L232,195 L242,205 L232,215 Z" fill="#5fb8d6" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M115,225 L125,217 L135,225 L125,233 Z" fill="#7fd0e8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M225,225 L235,217 L245,225 L235,233 Z" fill="#7fd0e8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M170,252 L180,244 L190,252 L180,260 Z" fill="#5fb8d6" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頭上の尖った耳宝石(2本) -->
  <path d="M150,150 L156,108 L165,148 Z" fill="#5fb8d6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M210,150 L204,108 L195,148 Z" fill="#5fb8d6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左目 -->
  <ellipse cx="158" cy="195" rx="13" ry="15" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="160" cy="198" r="6" fill="#2d263c"/>
  <circle cx="157" cy="195" r="2.5" fill="#ffffff"/>
  <!-- 右目 -->
  <ellipse cx="202" cy="195" rx="13" ry="15" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="200" cy="198" r="6" fill="#2d263c"/>
  <circle cx="197" cy="195" r="2.5" fill="#ffffff"/>

  <!-- 口(小) -->
  <path d="M172,220 Q180,226 188,220" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 頬の淡い光 -->
  <circle cx="138" cy="215" r="6" fill="#e8d0e8" opacity="0.6"/>
  <circle cx="222" cy="215" r="6" fill="#e8d0e8" opacity="0.6"/>
</svg>
