  <ellipse cx="178" cy="268" rx="36" ry="42" fill="#ffffff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 背中の赤いたてがみ(頭から尾まで一続き) -->
  <path d="M178 96 Q206 92 210 130 Q222 170 240 195 Q252 215 235 232 Q210 200 195 165 Q182 130 178 96 Z" fill="#c2402f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左うで(下げ・かぎ爪) -->
  <path d="M132 218 Q104 240 96 268 Q92 282 100 292" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <path d="M132 218 Q108 236 100 262 Q96 276 104 288 Q98 274 106 258 Q116 236 138 224 Z" fill="#f5f2e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M92 285 L78 300 M99 292 L86 308 M107 296 L96 312" stroke="#7a2020" stroke-width="7" stroke-linecap="round"/>

  <!-- 右うで(振り上げ・かぎ爪) -->
  <path d="M222 205 Q252 190 262 158 Q266 142 258 128" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <path d="M222 205 Q250 194 260 164 Q265 148 260 132 Q262 150 250 168 Q236 190 216 208 Z" fill="#f5f2e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M262 130 L272 112 M256 126 L264 106 M250 124 L256 104" stroke="#7a2020" stroke-width="7" stroke-linecap="round"/>

  <!-- 首 -->
  <rect x="163" y="178" width="36" height="34" rx="14" fill="#f5f2e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="150" rx="54" ry="50" fill="#f5f2e8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 耳(左右) -->
  <path d="M144 122 Q132 92 148 78 Q160 90 156 122 Z" fill="#f5f2e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M206 120 Q206 90 220 76 Q234 88 222 122 Z" fill="#f5f2e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目まわりの赤い模様(左右・三日月マスク) -->
  <path d="M138 150 Q150 128 172 138 Q158 146 152 166 Q142 164 138 150 Z" fill="#c2402f" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M222 148 Q210 126 190 136 Q204 144 210 164 Q220 162 222 148 Z" fill="#c2402f" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目(白目) -->
  <ellipse cx="157" cy="156" rx="12" ry="11" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="204" cy="154" rx="12" ry="11" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 瞳(赤) -->
  <ellipse cx="160" cy="157" rx="6" ry="7" fill="#c2402f" stroke="#2d263c" stroke-width="2.5"/>
  <ellipse cx="201" cy="155" rx="6" ry="7" fill="#c2402f" stroke="#2d263c" stroke-width="2.5"/>
  <ellipse cx="157" cy="154" rx="2" ry="2.5" fill="white"/>
  <ellipse cx="198" cy="152" rx="2" ry="2.5" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="182" cy="172" rx="5" ry="3" fill="#3a3044"/>

  <!-- 口(にやりと) -->
  <path d="M168 180 Q182 190 198 179" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
