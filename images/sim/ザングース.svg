  <ellipse cx="283" cy="165" rx="13" ry="22" fill="#9a5a34" stroke="#2d263c" stroke-width="4" transform="rotate(35 283 165)"/>
  <ellipse cx="293" cy="128" rx="11" ry="18" fill="#9a5a34" stroke="#2d263c" stroke-width="4" transform="rotate(20 293 128)"/>

  <!-- 後ろ足 -->
  <rect x="196" y="298" width="30" height="46" rx="12" fill="#f5f2e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="211" cy="345" rx="22" ry="11" fill="#f5f2e8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前足(左) -->
  <rect x="144" y="300" width="28" height="44" rx="12" fill="#f5f2e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="158" cy="345" rx="20" ry="10" fill="#f5f2e8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

