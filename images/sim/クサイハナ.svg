<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ: 大きな葉っぱ(頭の左右から) -->
  <path d="M100 130 Q40 100 45 55 Q90 60 115 105 Z" fill="#5fb84a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M260 130 Q320 100 315 55 Q270 60 245 105 Z" fill="#6cc457" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M108 122 Q75 100 70 68" fill="none" stroke="#3f8f34" stroke-width="4" stroke-linecap="round"/>
  <path d="M252 122 Q285 100 290 68" fill="none" stroke="#3f8f34" stroke-width="4" stroke-linecap="round"/>

  <!-- 体: まるいクリーム色の体 -->
  <ellipse cx="180" cy="245" rx="105" ry="90" fill="#f3e3a8" stroke="#2d263c" stroke-width="8"/>

  <!-- 足(スタビー) -->
  <ellipse cx="130" cy="325" rx="26" ry="16" fill="#e8cf7e" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="230" cy="325" rx="26" ry="16" fill="#e8cf7e" stroke="#2d263c" stroke-width="7"/>

  <!-- 体の茶色い斑点 -->
  <ellipse cx="120" cy="255" rx="18" ry="14" fill="#c9924a"/>
  <ellipse cx="240" cy="260" rx="16" ry="13" fill="#c9924a"/>
  <ellipse cx="180" cy="300" rx="15" ry="11" fill="#c9924a"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="150" rx="95" ry="80" fill="#f3e3a8" stroke="#2d263c" stroke-width="8"/>

  <!-- めしべ(頭からピロンと垂れる紫のパーツ) -->
  <path d="M180 78 Q205 60 200 30 Q195 15 182 20 Q188 45 175 70 Z" fill="#c77fd6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <circle cx="187" cy="26" r="7" fill="#8a3ea3" stroke="#2d263c" stroke-width="4"/>

  <!-- 頭の茶色い模様 -->
  <ellipse cx="140" cy="110" rx="14" ry="10" fill="#c9924a"/>
  <ellipse cx="225" cy="120" rx="12" ry="9" fill="#c9924a"/>

  <!-- 目(垂れ目・半目) -->
  <path d="M118 150 Q140 135 162 150 Q141 158 118 150 Z" fill="#2d263c"/>
  <path d="M198 150 Q220 135 242 150 Q221 158 198 150 Z" fill="#2d263c"/>

  <!-- ほっぺの赤み -->
  <ellipse cx="108" cy="180" rx="14" ry="9" fill="#f2a0a0" opacity="0.8"/>
  <ellipse cx="252" cy="180" rx="14" ry="9" fill="#f2a0a0" opacity="0.8"/>

  <!-- 大きな口(だらんと開いた口+よだれ) -->
  <path d="M130 195 Q180 245 230 195 Q205 235 155 235 Q135 220 130 195 Z" fill="#7a2f3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M150 220 Q160 240 152 258" fill="none" stroke="#d7e8f0" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
</svg>
