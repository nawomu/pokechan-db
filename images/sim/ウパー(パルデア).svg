<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <ellipse cx="180" cy="290" rx="90" ry="18" fill="#2d263c" opacity="0.12"/>
  <!-- tail -->
  <path d="M255 235 Q300 220 295 250 Q288 275 250 260 Z" fill="#8a7a63" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- back legs -->
  <ellipse cx="230" cy="285" rx="22" ry="16" fill="#6e6151" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="120" cy="285" rx="22" ry="16" fill="#6e6151" stroke="#2d263c" stroke-width="7"/>
  <!-- front legs -->
  <ellipse cx="255" cy="240" rx="18" ry="14" fill="#6e6151" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="105" cy="240" rx="18" ry="14" fill="#6e6151" stroke="#2d263c" stroke-width="7"/>
  <!-- body -->
  <path d="M180 110
           C240 108 268 150 262 205
           C258 250 220 278 180 278
           C140 278 102 250 98 205
           C92 150 120 108 180 110 Z"
        fill="#8a7a63" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- mud-clay collar / crown ridges -->
  <path d="M120 150 Q112 128 128 118 Q126 140 140 150 Z" fill="#6e6151" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M155 128 Q152 100 168 92 Q168 118 178 128 Z" fill="#6e6151" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M205 128 Q192 100 178 92 Q192 112 195 128 Z" fill="#6e6151" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M240 150 Q248 126 234 116 Q236 138 222 150 Z" fill="#6e6151" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- belly patch -->
  <ellipse cx="180" cy="225" rx="55" ry="42" fill="#c9bda7" stroke="#2d263c" stroke-width="6"/>
  <!-- dark spots on back -->
  <circle cx="150" cy="170" r="9" fill="#544a3d"/>
  <circle cx="215" cy="175" r="8" fill="#544a3d"/>
  <circle cx="180" cy="150" r="7" fill="#544a3d"/>
  <!-- eyes -->
  <circle cx="152" cy="178" r="14" fill="#fff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="208" cy="178" r="14" fill="#fff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="154" cy="180" r="6" fill="#2d263c"/>
  <circle cx="210" cy="180" r="6" fill="#2d263c"/>
  <!-- red external gills -->
  <path d="M118 195 Q98 188 100 208 Q112 210 122 200 Z" fill="#d84a3a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M242 195 Q262 188 260 208 Q248 210 238 200 Z" fill="#d84a3a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- mouth -->
  <path d="M158 210 Q180 222 202 210" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
