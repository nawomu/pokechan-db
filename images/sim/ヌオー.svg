<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body) -->
  <path d="M235 250 Q290 240 300 200 Q305 250 275 285 Q260 300 225 290 Z" fill="#9fc8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- back legs -->
  <ellipse cx="140" cy="310" rx="30" ry="20" fill="#8fbfe4" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="235" cy="310" rx="30" ry="20" fill="#8fbfe4" stroke="#2d263c" stroke-width="7"/>

  <!-- arms -->
  <ellipse cx="95" cy="230" rx="26" ry="34" fill="#a8d0ec" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="278" cy="225" rx="26" ry="34" fill="#a8d0ec" stroke="#2d263c" stroke-width="7"/>

  <!-- body -->
  <path d="M110 160 Q95 260 150 305 Q185 325 220 305 Q272 262 258 165 Q250 90 185 75 Q118 88 110 160 Z"
        fill="#a8d0ec" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- cream belly -->
  <ellipse cx="185" cy="230" rx="58" ry="70" fill="#f5edc9" stroke="#2d263c" stroke-width="6"/>

  <!-- head -->
  <ellipse cx="185" cy="130" rx="95" ry="80" fill="#a8d0ec" stroke="#2d263c" stroke-width="8"/>

  <!-- cheek/jowl blush -->
  <ellipse cx="120" cy="150" rx="16" ry="12" fill="#f3b7c4" opacity="0.8"/>
  <ellipse cx="252" cy="150" rx="16" ry="12" fill="#f3b7c4" opacity="0.8"/>

  <!-- barbels near mouth -->
  <path d="M108 158 Q95 172 100 190" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M262 158 Q276 172 270 190" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- eyes: small sleepy dots -->
  <ellipse cx="150" cy="118" rx="8" ry="10" fill="#2d263c"/>
  <ellipse cx="222" cy="118" rx="8" ry="10" fill="#2d263c"/>

  <!-- eyelid lines (derpy sleepy look) -->
  <path d="M136 105 Q150 98 165 106" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M207 106 Q222 98 236 105" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- big flat wide derpy mouth -->
  <path d="M118 168 Q185 205 252 168 Q245 195 185 200 Q125 195 118 168 Z"
        fill="#e88fa0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M118 168 Q185 200 252 168" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- back fin bumps -->
  <path d="M150 78 Q160 55 175 76" fill="#a8d0ec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M200 76 Q215 55 225 80" fill="#a8d0ec" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
</svg>
