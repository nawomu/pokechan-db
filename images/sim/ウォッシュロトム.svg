<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 洗濯機本体(後ろ・影) -->
  <rect x="72" y="118" width="220" height="198" rx="18" ry="18"
        fill="#c8c8d8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 洗濯機本体 -->
  <rect x="68" y="112" width="220" height="198" rx="18" ry="18"
        fill="#eeeef5" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 操作パネル上部 -->
  <rect x="68" y="112" width="220" height="44" rx="16" ry="16"
        fill="#d8d8e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- パネルのボタン群 -->
  <circle cx="106" cy="134" r="9" fill="#6dd8f0" stroke="#2d263c" stroke-width="4"/>
  <circle cx="132" cy="134" r="7" fill="#f0e86d" stroke="#2d263c" stroke-width="4"/>
  <rect x="152" y="126" width="34" height="16" rx="6"
        fill="#f08080" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- ダイヤル -->
  <circle cx="246" cy="134" r="14" fill="#b0b0c8" stroke="#2d263c" stroke-width="5"/>
  <line x1="246" y1="122" x2="246" y2="130" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- ドラム窓 外枠 -->
  <circle cx="178" cy="218" r="74"
          fill="#b0cce0" stroke="#2d263c" stroke-width="9"/>
  <!-- ドラム窓 ゴム枠 -->
  <circle cx="178" cy="218" r="66"
          fill="#7ab8d0" stroke="#2d263c" stroke-width="6"/>
  <!-- ドラム内部 -->
  <circle cx="178" cy="218" r="56"
          fill="#3ac8f0" stroke="#2d263c" stroke-width="5"/>

  <!-- ロトムの体(ゴースト・窓の中に浮かぶ) -->
  <ellipse cx="178" cy="215" rx="38" ry="44"
           fill="#6de8ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ロトムの稲妻型耳(左) -->
  <polygon points="148,182 136,160 144,166 138,148 152,162 144,168 156,175"
           fill="#6de8ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- ロトムの稲妻型耳(右) -->
  <polygon points="208,182 222,160 214,166 220,148 206,162 214,168 202,175"
           fill="#6de8ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 目(左) ギザギザ稲妻形 -->
  <polygon points="155,205 162,196 167,205 162,200"
           fill="#f8f040" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <!-- 目(右) ギザギザ稲妻形 -->
  <polygon points="189,205 196,196 201,205 196,200"
           fill="#f8f040" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 口(いたずらっぽいニヤリ) -->
  <path d="M163,228 Q178,242 193,228" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M163,228 Q166,234 170,232" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M193,228 Q190,234 186,232" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 腕・触手(左、洗濯機から飛び出す) -->
  <path d="M70,195 Q42,188 30,210 Q26,228 46,230 Q38,240 55,242"
        fill="none" stroke="#6de8ff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M70,195 Q42,188 30,210 Q26,228 46,230 Q38,240 55,242"
        fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.18"/>
  <!-- 腕の輪郭 -->
  <path d="M70,195 Q42,188 30,210 Q26,228 46,230 Q38,240 55,242"
        fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 腕・触手(右) -->
  <path d="M286,195 Q314,188 326,210 Q330,228 310,232 Q318,242 301,244"
        fill="none" stroke="#6de8ff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M286,195 Q314,188 326,210 Q330,228 310,232 Q318,242 301,244"
        fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 電気スパーク(左上) -->
  <polyline points="84,118 92,106 98,114 106,98 112,110"
            fill="none" stroke="#f8f040" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 電気スパーク(右上) -->
  <polyline points="246,118 254,104 260,112 266,100 272,110"
            fill="none" stroke="#f8f040" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- コード(下から垂れる) -->
  <path d="M178,310 Q190,326 182,340 Q174,352 186,358"
        fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- コードのプラグ -->
  <rect x="182" y="354" width="16" height="10" rx="3"
        fill="#555568" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <line x1="186" y1="364" x2="186" y2="370" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="194" y1="364" x2="194" y2="370" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- 洗濯機下部の足 -->
  <rect x="92" y="302" width="24" height="12" rx="4"
        fill="#c8c8d8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <rect x="240" y="302" width="24" height="12" rx="4"
        fill="#c8c8d8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- ほっぺの光(ロトムらしい発光感) -->
  <ellipse cx="154" cy="224" rx="8" ry="5" fill="#aaf4ff" opacity="0.7"/>
  <ellipse cx="202" cy="224" rx="8" ry="5" fill="#aaf4ff" opacity="0.7"/>
</svg>