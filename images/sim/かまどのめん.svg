    <!-- legs -->
    <rect x="140" y="285" width="30" height="42" rx="12" fill="#e8c98a"/>
    <rect x="190" y="285" width="30" height="42" rx="12" fill="#e8c98a"/>

    <!-- arms -->
    <path d="M112,210 C90,215 78,240 90,262" fill="none"/>
    <path d="M248,210 C270,215 282,240 270,262" fill="none"/>

