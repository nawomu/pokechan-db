    <!-- mask cheek flame trim -->
    <path d="M126,120 C118,132 118,146 130,156" fill="none" stroke-width="6"/>
    <path d="M234,120 C242,132 242,146 230,156" fill="none" stroke-width="6"/>

    <!-- eye holes -->
    <ellipse cx="158" cy="106" rx="12" ry="16" fill="#2d263c"/>
    <ellipse cx="202" cy="106" rx="12" ry="16" fill="#2d263c"/>

    <!-- mouth guard line -->
    <path d="M154,140 C166,150 194,150 206,140" fill="none" stroke-width="6"/>
