    <path d="M156,255 C170,266 190,266 204,255" fill="none" stroke-width="6"/>

    <!-- head -->
    <circle cx="180" cy="110" r="66" fill="#4f8f3a"/>

    <!-- leaf hair -->
    <path d="M132,64 C110,53 96,35 100,24 C118,29 138,41 144,57 Z" fill="#3a7228"/>
    <path d="M228,64 C250,53 264,35 260,24 C242,29 222,41 216,57 Z" fill="#3a7228"/>
    <path d="M170,44 C169,34 174,26 180,23 C186,26 191,34 190,44 Z" fill="#3a7228"/>

    <!-- acorn cap band -->
    <path d="M126,86 C140,68 220,68 234,86" fill="none" stroke="#6b4a2b" stroke-width="10"/>

    <!-- mask flame spikes on top -->
    <path d="M150,72 L160,34 L172,64 Z" fill="#ff9b3d"/>
    <path d="M188,64 L200,30 L212,72 Z" fill="#ff9b3d"/>
    <path d="M170,68 L182,24 L196,66 Z" fill="#c73a2e"/>

