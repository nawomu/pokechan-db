    <path d="M120,285 L100,250 L114,208 L82,178 L108,150 L86,112 L124,122 L112,80 L152,112 L154,72 L180,108 L206,72 L208,112 L248,80 L236,122 L274,112 L250,150 L276,178 L244,208 L258,250 L240,285 Z"
