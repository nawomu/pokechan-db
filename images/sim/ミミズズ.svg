<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 影(しっぽ棒) 後ろに描く -->
  <rect x="198" y="82" width="18" height="88" rx="7" ry="7"
        fill="#1a1228" stroke="#2d263c" stroke-width="7"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- しっぽ先の黒丸 -->
  <circle cx="207" cy="80" r="13"
          fill="#1a1228" stroke="#2d263c" stroke-width="7"/>

  <!-- 布の裾ギザギザ(後ろ) -->
  <polygon points="100,248 118,270 136,248 154,274 172,248 190,276 208,248 226,271 244,248 262,267 272,248"
           fill="#d4b832" stroke="#2d263c" stroke-width="6"
           stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(布本体) -->
  <path d="M108,150 Q98,130 105,108 Q115,78 148,70 Q168,64 190,66 Q222,66 238,90 Q252,112 248,148 Q246,188 244,220 Q242,248 216,256 Q200,262 180,262 Q158,262 140,256 Q118,248 112,220 Q106,192 108,150 Z"
        fill="#e0c03a" stroke="#2d263c" stroke-width="8"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 左耳(三角、ちょっと傾いてる) -->
  <polygon points="128,88 112,40 158,68"
           fill="#e0c03a" stroke="#2d263c" stroke-width="7"
           stroke-linejoin="round"/>
  <!-- 右耳(三角、少し大きめ非対称) -->
  <polygon points="210,84 232,34 252,76"
           fill="#e0c03a" stroke="#2d263c" stroke-width="7"
           stroke-linejoin="round"/>

  <!-- 布のしわ線 -->
  <path d="M138,130 Q142,140 138,150" fill="none" stroke="#b8961e" stroke-width="4" stroke-linecap="round"/>
  <path d="M218,128 Q214,138 220,152" fill="none" stroke="#b8961e" stroke-width="4" stroke-linecap="round"/>
  <path d="M160,240 Q178,246 198,240" fill="none" stroke="#b8961e" stroke-width="4" stroke-linecap="round"/>

  <!-- 布の目:左(偽の目・黒い丸、すこし雑) -->
  <ellipse cx="152" cy="152" rx="22" ry="19"
           fill="#1a1228" stroke="#2d263c" stroke-width="5"/>
  <!-- 布の目:右(偽の目、少し小さい) -->
  <ellipse cx="210" cy="148" rx="18" ry="20"
           fill="#1a1228" stroke="#2d263c" stroke-width="5"/>

  <!-- 偽の目のハイライト(子どもっぽく) -->
  <circle cx="144" cy="146" r="5" fill="#e0c03a"/>
  <circle cx="204" cy="142" r="4" fill="#e0c03a"/>

  <!-- 布の口(波線) -->
  <path d="M148,188 Q158,196 168,188 Q178,180 188,188 Q198,196 208,188"
        fill="none" stroke="#1a1228" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 布の腹の染み(影っぽい不気味模様) -->
  <ellipse cx="182" cy="220" rx="28" ry="16"
           fill="#c4a020" stroke="none" opacity="0.6"/>

  <!-- 中から見えるホンモノの目(左・赤くてちょっと怖い) -->
  <circle cx="155" cy="154" r="7" fill="#cc2222"/>
  <circle cx="158" cy="152" r="2" fill="#ffffff"/>

  <!-- 中から見えるホンモノの目(右) -->
  <circle cx="212" cy="150" r="6" fill="#cc2222"/>
  <circle cx="215" cy="148" r="2" fill="#ffffff"/>

  <!-- 布の端のほつれ線 左 -->
  <path d="M110,210 Q102,218 106,228" fill="none" stroke="#b8961e" stroke-width="4" stroke-linecap="round"/>
  <path d="M114,232 Q104,238 110,248" fill="none" stroke="#b8961e" stroke-width="4" stroke-linecap="round"/>
  <!-- 布の端のほつれ線 右 -->
  <path d="M246,214 Q254,222 250,232" fill="none" stroke="#b8961e" stroke-width="4" stroke-linecap="round"/>

  <!-- しっぽ棒の縫い目ライン -->
  <line x1="207" y1="92" x2="207" y2="158" stroke="#2d1a4a" stroke-width="2" stroke-dasharray="6,5" stroke-linecap="round"/>
</svg>