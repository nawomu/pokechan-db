<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- しっぽびれ(一番後ろ) -->
  <ellipse cx="290" cy="185" rx="48" ry="28" fill="#3a2e6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-12 290 185)"/>
  <ellipse cx="300" cy="210" rx="40" ry="20" fill="#3a2e6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(10 300 210)"/>

  <!-- 体(胴体メイン) -->
  <ellipse cx="165" cy="190" rx="130" ry="78" fill="#2e4a9e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹部(クリーム色) -->
  <ellipse cx="170" cy="215" rx="90" ry="45" fill="#e8dfc0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 背びれ(上) -->
  <polygon points="120,115 105,70 140,80 165,110 155,120" fill="#1e3580" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胸びれ左(手前) -->
  <polygon points="95,220 55,245 45,270 75,258 100,240" fill="#253e8c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 尻びれ下 -->
  <polygon points="200,255 215,280 240,285 225,265 205,255" fill="#253e8c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 霊魂模様(体側の白いゆらゆら) -->
  <path d="M130,170 Q145,155 160,170 Q175,185 190,170 Q205,155 220,170" fill="none" stroke="#c8d8f8" stroke-width="4" stroke-linecap="round"/>
  <path d="M125,195 Q140,178 158,195 Q176,212 195,195" fill="none" stroke="#c8d8f8" stroke-width="3.5" stroke-linecap="round"/>
  <!-- 小さい霊魂円 -->
  <circle cx="145" cy="155" r="6" fill="none" stroke="#c8d8f8" stroke-width="3"/>
  <circle cx="220" cy="160" r="4" fill="none" stroke="#c8d8f8" stroke-width="2.5"/>

  <!-- 頭部 -->
  <ellipse cx="75" cy="175" rx="68" ry="58" fill="#2e4a9e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭部の腹色(下あご) -->
  <ellipse cx="68" cy="205" rx="45" ry="28" fill="#e8dfc0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目の下の青い隈取り模様(♂の特徴) -->
  <path d="M55,185 Q62,195 75,192 Q85,190 90,182" fill="#1a3070" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 目(黄色・鋭い) -->
  <ellipse cx="68" cy="165" rx="16" ry="13" fill="#f0d020" stroke="#2d263c" stroke-width="5"/>
  <!-- 眼球 -->
  <ellipse cx="71" cy="165" rx="7" ry="8" fill="#1a1040"/>
  <!-- 目のハイライト -->
  <circle cx="74" cy="161" r="3" fill="white"/>

  <!-- 眉毛(♂らしい太くつり上がった眉) -->
  <path d="M52,150 Q62,140 82,145" fill="none" stroke="#1a1040" stroke-width="7" stroke-linecap="round"/>

  <!-- 大きな口(横に裂けた感じ) -->
  <path d="M28,200 Q48,225 75,228 Q105,230 118,218" fill="#c8a870" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 口の中 -->
  <path d="M35,205 Q55,218 78,220 Q100,222 112,214" fill="#8b3030" stroke="none"/>
  <!-- 歯(ごつい) -->
  <rect x="42" y="205" width="10" height="12" rx="2" fill="#f5f0e0" stroke="#2d263c" stroke-width="3"/>
  <rect x="60" y="208" width="10" height="11" rx="2" fill="#f5f0e0" stroke="#2d263c" stroke-width="3"/>
  <rect x="79" y="209" width="9" height="10" rx="2" fill="#f5f0e0" stroke="#2d263c" stroke-width="3"/>

  <!-- 上あご鼻先部分のごつさ -->
  <path d="M22,185 Q15,178 22,168 Q30,158 42,160" fill="#263d8a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- しっぽびれの線(扇形感) -->
  <line x1="278" y1="175" x2="308" y2="162" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="282" y1="185" x2="318" y2="183" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="285" y1="200" x2="315" y2="205" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="283" y1="215" x2="308" y2="222" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
</svg>