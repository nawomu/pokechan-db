<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
    1. 紫色の丸っこい体(サソリ型)
    2. 背中から前に大きくカーブする節々の尻尾+先端に黒い毒針
    3. 前に2本の大きなハサミ(ペンチ状)
    4. 黄色い三日月型の目つきの悪い目
    5. お腹はクリーム色の板状模様、細い6本足
  -->

  <!-- 後ろ: 尻尾(輪郭) -->
  <path d="M 228,198 C 265,180 285,135 268,95 C 255,65 212,55 188,72 C 172,84 172,100 182,112"
        fill="none" stroke="#2d263c" stroke-width="42" stroke-linecap="round"/>
  <!-- 尻尾(塗り) -->
  <path d="M 228,198 C 265,180 285,135 268,95 C 255,65 212,55 188,72 C 172,84 172,100 182,112"
        fill="none" stroke="#8455AC" stroke-width="30" stroke-linecap="round"/>
  <!-- 尻尾の節模様 -->
  <ellipse cx="255" cy="163" rx="10" ry="6" transform="rotate(-30 255 163)" fill="#5D3A82" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="278" cy="117" rx="9" ry="6" transform="rotate(-65 278 117)" fill="#5D3A82" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="238" cy="70" rx="9" ry="6" transform="rotate(-110 238 70)" fill="#5D3A82" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="195" cy="63" rx="8" ry="6" transform="rotate(150 195 63)" fill="#5D3A82" stroke="#2d263c" stroke-width="4"/>
  <!-- 毒針 -->
  <path d="M 186,104 L 206,92 L 172,130 Z" fill="#332740" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体(本体) -->
  <ellipse cx="180" cy="222" rx="72" ry="54" fill="#8455AC" stroke="#2d263c" stroke-width="8"/>
  <!-- お腹 -->
  <ellipse cx="180" cy="245" rx="44" ry="27" fill="#F3E7C4" stroke="#2d263c" stroke-width="6"/>
  <path d="M 150,236 Q 180,248 210,236" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M 156,256 Q 180,264 204,256" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 左ハサミ -->
  <ellipse cx="98" cy="232" rx="32" ry="17" transform="rotate(-18 98 232)" fill="#8455AC" stroke="#2d263c" stroke-width="8"/>
  <path d="M 68,222 L 38,204 L 58,232 Z" fill="#8455AC" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 68,234 L 36,250 L 58,240 Z" fill="#8455AC" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 右ハサミ -->
  <ellipse cx="262" cy="232" rx="32" ry="17" transform="rotate(18 262 232)" fill="#8455AC" stroke="#2d263c" stroke-width="8"/>
  <path d="M 292,222 L 322,204 L 302,232 Z" fill="#8455AC" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 292,234 L 324,250 L 302,240 Z" fill="#8455AC" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足(左3本) -->
  <path d="M 128,268 L 106,288 L 90,304" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M 148,280 L 132,304 L 118,322" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M 168,285 L 160,310 L 152,328" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <!-- 足(右3本) -->
  <path d="M 232,268 L 254,288 L 270,304" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M 212,280 L 228,304 L 242,322" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M 192,285 L 200,310 L 208,328" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 顔: 目(三日月・意地悪そう) -->
  <path d="M 150,190 A 14,14 0 1 1 150,218 A 9,11 0 1 0 150,190 Z" fill="#F4E04D" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M 210,190 A 14,14 0 1 0 210,218 A 9,11 0 1 1 210,190 Z" fill="#F4E04D" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 口 -->
  <path d="M 168,236 Q 180,242 192,236" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
