<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.青いドラゴンの体に赤〜橙のかぎ爪状の翼(羽ではなく硬い翼) 2.胸〜腹が赤橙色 3.頭に小さい角とギザギザの赤いクレスト 4.鋭い歯と黄色い目 5.長いしっぽと4本の脚に鋭いツメ -->
  <!-- しっぽ(後ろ) -->
  <path d="M235 250 Q300 260 320 300 Q300 290 275 285 Q295 305 300 330 Q270 310 250 285 Q245 300 230 300 Z"
        fill="#3f6bc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左翼(後ろ側) -->
  <path d="M120 150 Q60 110 40 60 Q65 95 95 105 Q55 70 45 30 Q90 65 120 100 Q120 90 130 85 Q140 120 130 155 Z"
        fill="#e2472f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 右翼(後ろ側) -->
  <path d="M230 150 Q290 110 310 60 Q285 95 255 105 Q295 70 305 30 Q260 65 230 100 Q230 90 220 85 Q210 120 220 155 Z"
        fill="#e2472f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ脚 -->
  <path d="M150 270 Q140 300 135 320 L120 320 Q125 295 135 265 Z" fill="#3f6bc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M225 270 Q235 300 240 320 L255 320 Q250 295 240 265 Z" fill="#3f6bc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 前脚(体の前) -->
  <path d="M140 230 Q120 260 110 290 L95 290 Q108 255 128 225 Z" fill="#3f6bc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M235 230 Q255 260 265 290 L280 290 Q267 255 247 225 Z" fill="#3f6bc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ツメ -->
  <path d="M95 290 L88 305 M102 290 L98 306 M110 290 L108 306" stroke="#f4efe1" stroke-width="6" stroke-linecap="round"/>
  <path d="M280 290 L287 305 M273 290 L277 306 M265 290 L267 306" stroke="#f4efe1" stroke-width="6" stroke-linecap="round"/>
  <path d="M120 320 L114 335 M128 320 L126 336 M136 320 L138 336" stroke="#f4efe1" stroke-width="6" stroke-linecap="round"/>
  <path d="M255 320 L261 335 M247 320 L249 336 M240 320 L238 336" stroke="#f4efe1" stroke-width="6" stroke-linecap="round"/>

  <!-- 体(胴体) -->
  <ellipse cx="187" cy="210" rx="72" ry="65" fill="#3f6bc0" stroke="#2d263c" stroke-width="8"/>

  <!-- 胸〜腹の赤橙模様 -->
  <path d="M150 190 Q187 175 224 190 Q235 235 187 265 Q139 235 150 190 Z" fill="#e2472f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 首 -->
  <path d="M160 165 Q170 120 187 100 Q204 120 214 165 Z" fill="#3f6bc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="187" cy="90" rx="58" ry="52" fill="#3f6bc0" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭のクレスト(赤ギザギザ) -->
  <path d="M150 55 Q145 30 155 15 Q160 35 168 45 Z" fill="#e2472f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M187 45 Q185 18 195 5 Q198 25 205 38 Z" fill="#e2472f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M222 55 Q228 30 220 15 Q214 35 208 45 Z" fill="#e2472f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- マズル(鼻先) -->
  <path d="M160 108 Q187 130 214 108 Q205 100 187 100 Q169 100 160 108 Z" fill="#dfe6f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 歯 -->
  <path d="M172 112 L176 122 L180 112 M194 112 L198 122 L202 112" fill="#ffffff" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 目 -->
  <ellipse cx="162" cy="82" rx="14" ry="16" fill="#ffe14d" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="212" cy="82" rx="14" ry="16" fill="#ffe14d" stroke="#2d263c" stroke-width="6"/>
  <circle cx="162" cy="86" r="5" fill="#2d263c"/>
  <circle cx="212" cy="86" r="5" fill="#2d263c"/>
</svg>
