<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail -->
  <path d="M245 265 Q285 250 275 210 Q270 240 235 250 Z" fill="#c9975c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- back cheek fur tufts (fluffy sideburns) -->
  <path d="M108 120 Q80 110 78 140 Q92 132 100 145 Q90 155 78 165 Q100 168 112 150 Z" fill="#9a5a2c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M252 120 Q280 110 282 140 Q268 132 260 145 Q270 155 282 165 Q260 168 248 150 Z" fill="#9a5a2c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- ears -->
  <ellipse cx="120" cy="88" rx="20" ry="28" fill="#c9975c" stroke="#2d263c" stroke-width="7" transform="rotate(-25 120 88)"/>
  <ellipse cx="240" cy="88" rx="20" ry="28" fill="#c9975c" stroke="#2d263c" stroke-width="7" transform="rotate(25 240 88)"/>
  <!-- legs / feet -->
  <ellipse cx="145" cy="305" rx="34" ry="26" fill="#c9975c" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="215" cy="305" rx="34" ry="26" fill="#c9975c" stroke="#2d263c" stroke-width="7"/>
  <path d="M120 300 Q128 315 138 302" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M225 300 Q235 315 243 300" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- body -->
  <path d="M120 190 Q112 260 145 300 Q180 320 215 300 Q248 260 240 190 Q230 150 180 148 Q130 150 120 190 Z"
        fill="#d9a668" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- belly/chest red patch -->
  <ellipse cx="180" cy="235" rx="42" ry="48" fill="#e2604c" stroke="#2d263c" stroke-width="6"/>
  <!-- left arm raised, fist clenched -->
  <path d="M118 200 Q70 190 55 140 Q50 120 68 118 Q80 118 82 140 Q92 170 128 185 Z"
        fill="#c9975c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <circle cx="62" cy="122" r="24" fill="#9a5a2c" stroke="#2d263c" stroke-width="7"/>
  <!-- right arm raised, fist clenched -->
  <path d="M242 200 Q290 190 305 140 Q310 120 292 118 Q280 118 278 140 Q268 170 232 185 Z"
        fill="#c9975c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <circle cx="298" cy="122" r="24" fill="#9a5a2c" stroke="#2d263c" stroke-width="7"/>
  <!-- head -->
  <circle cx="180" cy="110" r="58" fill="#d9a668" stroke="#2d263c" stroke-width="8"/>
  <!-- red muzzle/face patch -->
  <ellipse cx="180" cy="128" rx="36" ry="26" fill="#e2604c" stroke="#2d263c" stroke-width="6"/>
  <!-- angry brow -->
  <path d="M140 90 Q160 78 172 92" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <path d="M220 90 Q200 78 188 92" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="158" cy="102" rx="9" ry="11" fill="#fff" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="202" cy="102" rx="9" ry="11" fill="#fff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="158" cy="104" r="4" fill="#c0392b"/>
  <circle cx="202" cy="104" r="4" fill="#c0392b"/>
  <!-- mouth gritted teeth -->
  <path d="M160 140 Q180 150 200 140" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>
