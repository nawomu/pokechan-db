<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- オーラ(メガ感の光) -->
  <ellipse cx="180" cy="180" rx="150" ry="150" fill="#eaf7c4" opacity="0.35"/>
  <!-- 左上翅(後ろ) -->
  <polygon points="158,148 130,95 80,55 42,58 55,100 95,140 135,162" fill="#e2f6ef" opacity="0.62" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右上翅(後ろ) -->
  <polygon points="202,148 230,95 280,55 318,58 305,100 265,140 225,162" fill="#e2f6ef" opacity="0.62" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左下翅(後ろ) -->
  <polygon points="165,178 125,150 75,160 40,190 55,225 100,215 140,195" fill="#dcf2ea" opacity="0.58" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右下翅(後ろ) -->
  <polygon points="195,178 235,150 285,160 320,190 305,225 260,215 220,195" fill="#dcf2ea" opacity="0.58" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 羽脈 -->
  <line x1="155" y1="150" x2="55" y2="72" stroke="#8fcdbe" stroke-width="4" stroke-linecap="round"/>
  <line x1="205" y1="150" x2="305" y2="72" stroke="#8fcdbe" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="180" x2="55" y2="200" stroke="#8fcdbe" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="180" x2="305" y2="200" stroke="#8fcdbe" stroke-width="4" stroke-linecap="round"/>
  <!-- 尻尾(腹部) -->
  <polygon points="166,200 194,200 186,335 174,335" fill="#c4e05a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 尻尾の節模様 -->
  <ellipse cx="180" cy="225" rx="13" ry="5" fill="#6a9a24"/>
  <ellipse cx="180" cy="260" rx="11" ry="5" fill="#6a9a24"/>
  <ellipse cx="180" cy="295" rx="9" ry="4" fill="#6a9a24"/>
  <!-- 尻尾の先端 -->
  <polygon points="176,328 184,328 180,338" fill="#4a7a1a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 胸(体) -->
  <ellipse cx="180" cy="168" rx="40" ry="48" fill="#9dc93a" stroke="#2d263c" stroke-width="8"/>
  <!-- 胸の側面プレート -->
  <ellipse cx="150" cy="165" rx="14" ry="22" fill="#7cb82f" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="210" cy="165" rx="14" ry="22" fill="#7cb82f" stroke="#2d263c" stroke-width="5"/>
  <!-- 脚 -->
  <line x1="155" y1="195" x2="140" y2="215" stroke="#5a8a1f" stroke-width="7" stroke-linecap="round"/>
  <line x1="160" y1="205" x2="150" y2="228" stroke="#5a8a1f" stroke-width="7" stroke-linecap="round"/>
  <line x1="205" y1="195" x2="220" y2="215" stroke="#5a8a1f" stroke-width="7" stroke-linecap="round"/>
  <line x1="200" y1="205" x2="210" y2="228" stroke="#5a8a1f" stroke-width="7" stroke-linecap="round"/>
  <!-- 頭 -->
  <ellipse cx="180" cy="95" rx="42" ry="40" fill="#c8e85a" stroke="#2d263c" stroke-width="8"/>
  <!-- メガ結晶(頭頂トゲ) -->
  <polygon points="170,58 165,32 178,55" fill="#5a8a1f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="190,58 195,32 182,55" fill="#5a8a1f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 巨大複眼(左) -->
  <ellipse cx="150" cy="92" rx="34" ry="36" fill="#ff6b35" stroke="#2d263c" stroke-width="7"/>
  <!-- 巨大複眼(右) -->
  <ellipse cx="210" cy="92" rx="34" ry="36" fill="#ff6b35" stroke="#2d263c" stroke-width="7"/>
  <!-- 目の継ぎ目(中央で接する) -->
  <line x1="180" y1="62" x2="180" y2="122" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <!-- 目のハイライト -->
  <ellipse cx="140" cy="80" rx="8" ry="10" fill="#ffe29a" opacity="0.85"/>
  <ellipse cx="200" cy="80" rx="8" ry="10" fill="#ffe29a" opacity="0.85"/>
  <!-- 目の陰影 -->
  <ellipse cx="155" cy="112" rx="20" ry="14" fill="#cc3d10" opacity="0.5"/>
  <ellipse cx="205" cy="112" rx="20" ry="14" fill="#cc3d10" opacity="0.5"/>
  <!-- 口 -->
  <polygon points="170,128 190,128 184,140 176,140" fill="#4a3a2a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
</svg>
