  <ellipse cx="205" cy="114" rx="14" ry="17" fill="#c0392b" stroke="#2d263c" stroke-width="5"/>
  <circle cx="159" cy="107" r="5" fill="#ffffff"/>
  <circle cx="209" cy="107" r="5" fill="#ffffff"/>

  <!-- 鼻の穴 -->
  <circle cx="172" cy="142" r="3" fill="#2d263c"/>
  <circle cx="188" cy="142" r="3" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M164 160 Q180 170 196 160" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
