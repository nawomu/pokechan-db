  <!-- うで -->
  <ellipse cx="98" cy="228" rx="23" ry="42" fill="#a98ad0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-14 98 228)"/>
  <ellipse cx="262" cy="228" rx="23" ry="42" fill="#a98ad0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(14 262 228)"/>
  <ellipse cx="87" cy="271" rx="19" ry="15" fill="#9678c4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="273" cy="271" rx="19" ry="15" fill="#9678c4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

