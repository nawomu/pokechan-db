  <!-- 耳(外側) -->
  <path d="M142 96 Q104 62 100 30 Q140 42 158 100 Z" fill="#8fa0c9" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M218 96 Q256 62 260 30 Q220 42 202 100 Z" fill="#8fa0c9" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
