<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 霊体のモヤ(左上・右上、ゆらゆら) -->
  <path d="M96 100 Q86 88 93 78 Q99 71 106 80 Q110 87 103 93Z" fill="#4a3f2a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" opacity="0.55"/>
  <path d="M272 96 Q283 84 278 74 Q273 67 265 75 Q260 82 267 89Z" fill="#4a3f2a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" opacity="0.55"/>

  <!-- 茶せん(泡立て器)の穂・不揃いでみすぼらしい -->
  <path d="M140 170 Q120 110 110 55" fill="none" stroke="#a8895c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M155 168 Q140 100 130 45" fill="none" stroke="#c2a578" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M168 165 Q160 95 155 42" fill="none" stroke="#a8895c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M180 163 Q178 90 180 40" fill="none" stroke="#c2a578" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M192 165 Q200 95 205 42" fill="none" stroke="#a8895c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M205 168 Q220 100 230 45" fill="none" stroke="#c2a578" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M220 170 Q240 110 250 55" fill="none" stroke="#a8895c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M150 172 Q130 132 118 92" fill="none" stroke="#c2a578" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M210 172 Q232 132 245 94" fill="none" stroke="#c2a578" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 穂をまとめる輪(粗雑な結び目) -->
  <ellipse cx="180" cy="171" rx="42" ry="12" fill="#8f7550" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- とっての取っ手(歪んでいて安っぽい) -->
  <path d="M258 195 Q290 189 293 214 Q295 239 267 246" fill="none" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 茶わん(本体)・上が広がった器の形、裾は幽霊らしい波形 -->
  <path d="M100 175 Q95 160 120 158 L240 158 Q265 160 260 175 L255 270 L255 288 Q236 312 217.5 288 Q198.5 312 180 288 Q161 312 142.5 288 Q123.5 312 105 288 L105 270 Z" fill="#d4c19c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 器の口の縁(内側が見えるハイライト) -->
  <ellipse cx="180" cy="160" rx="78" ry="11" fill="#b89e72" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 安物ゆえの継ぎ接ぎパッチ(左下) -->
  <path d="M122 232 Q118 222 130 218 Q148 214 156 224 Q160 236 150 246 Q136 252 126 244 Q120 240 122 232Z" fill="#a89878" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- パッチの縫い目(バツ印) -->
  <path d="M129 226 L136 232 M136 226 L129 232" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <path d="M141 234 L148 240 M148 234 L141 240" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- 表面のひび(欠けた偽物感) -->
  <path d="M215 180 L222 190 L217 198 L224 208" fill="none" stroke="#2d263c" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 目(左・大きめでややずれた不揃いな目) -->
  <ellipse cx="153" cy="212" rx="12" ry="14" fill="#1a1626" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <ellipse cx="150" cy="207" rx="3" ry="3" fill="#e8dcc0"/>

  <!-- 目(右・少し小さい) -->
  <ellipse cx="205" cy="215" rx="9" ry="11" fill="#1a1626" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <ellipse cx="203" cy="211" rx="2.5" ry="2.5" fill="#e8dcc0"/>

  <!-- 口(まっすぐで無表情・作り物感) -->
  <path d="M162 248 Q180 253 198 246" fill="none" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 茶葉のしみ(安っぽい模様の代わりの点々) -->
  <ellipse cx="210" cy="255" rx="5" ry="4" fill="#9a8058" opacity="0.7"/>
  <ellipse cx="190" cy="270" rx="4" ry="3" fill="#9a8058" opacity="0.7"/>
  <ellipse cx="235" cy="235" rx="4" ry="3" fill="#9a8058" opacity="0.7"/>
</svg>
