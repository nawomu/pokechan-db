  <ellipse cx="180" cy="124" rx="62" ry="55" fill="#5090D8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 左目 -->
  <ellipse cx="154" cy="112" rx="16" ry="14" fill="white" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="157" cy="113" rx="9" ry="9" fill="#E03020" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="160" cy="110" rx="4" ry="4" fill="#1a1020"/>
