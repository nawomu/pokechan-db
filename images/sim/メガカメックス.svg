  <polygon points="205,175 222,187 222,207 205,217 188,207 188,187" fill="none" stroke="#6B4F10" stroke-width="3.5"/>
  <polygon points="155,175 172,187 172,207 155,217 138,207 138,187" fill="none" stroke="#6B4F10" stroke-width="3.5"/>
  <polygon points="180,195 197,207 197,227 180,237 163,227 163,207" fill="none" stroke="#6B4F10" stroke-width="3.5"/>

