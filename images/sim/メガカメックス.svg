  <path d="M140,100 Q153,92 168,98" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>
  <!-- 太眉右 -->
  <path d="M192,98 Q207,92 220,100" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round"/>

  <!-- 口(ニヤリ系) -->
