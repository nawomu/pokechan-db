  <ellipse cx="206" cy="112" rx="16" ry="14" fill="white" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="203" cy="113" rx="9" ry="9" fill="#E03020" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="200" cy="110" rx="4" ry="4" fill="#1a1020"/>
  <ellipse cx="198" cy="108" rx="2" ry="2" fill="white"/>

