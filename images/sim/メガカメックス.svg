  <!-- 口の左牙 -->
  <polygon points="160,143 152,155 165,150" fill="white" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 口の右牙 -->
  <polygon points="200,143 208,155 195,150" fill="white" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 鼻孔 -->
  <ellipse cx="172" cy="130" rx="5" ry="4" fill="#3A70B0"/>
  <ellipse cx="188" cy="130" rx="5" ry="4" fill="#3A70B0"/>

