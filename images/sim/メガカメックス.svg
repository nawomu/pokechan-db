  <ellipse cx="72" cy="268" rx="10" ry="8" fill="#5090D8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="84" cy="278" rx="10" ry="8" fill="#5090D8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="98" cy="282" rx="10" ry="8" fill="#5090D8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

