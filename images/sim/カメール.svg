<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 大きくフサフサの白いしっぽ(カメールの一番の特徴・くるっと渦巻き)
  2. 先の尖った長い耳が2本ピンと立つ
  3. こい青の体+こん色の甲羅(クリーム色のフチ)
  4. お腹はクリーム色、丸い大きな目とほっぺ
  5. 短い手足に3本のツメ、まるっとした亀の姿勢 -->

  <!-- しっぽ(フサフサ・後ろに配置) -->
  <path d="M255 235 C 300 220, 330 250, 320 285 C 340 275, 350 300, 330 320 C 345 320, 350 345, 320 350 C 300 355, 275 340, 270 315 C 255 320, 240 300, 250 275 Z"
        fill="#f2ecd8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 左うで(奥) -->
  <ellipse cx="98" cy="235" rx="30" ry="24" fill="#4a8fc2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 右うで(奥) -->
  <ellipse cx="272" cy="238" rx="30" ry="24" fill="#4a8fc2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- あし(左) -->
  <ellipse cx="130" cy="305" rx="34" ry="24" fill="#3f7db0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- あし(右) -->
  <ellipse cx="235" cy="308" rx="34" ry="24" fill="#3f7db0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 甲羅(本体) -->
  <path d="M95 165 C 90 110, 150 80, 183 82 C 218 78, 278 108, 272 168 C 280 210, 250 265, 182 262 C 112 268, 88 208, 95 165 Z"
        fill="#233a63" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 甲羅ふち(クリーム) -->
  <path d="M108 170 C 104 122, 155 96, 183 98 C 212 95, 262 118, 258 168 C 264 202, 240 242, 182 240 C 122 244, 103 205, 108 170 Z"
        fill="#e9dca4" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 甲羅もよう -->
  <path d="M183 100 L183 232 M140 118 L155 220 M226 118 L211 220" stroke="#233a63" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- おなか(クリーム) -->
  <ellipse cx="182" cy="238" rx="58" ry="34" fill="#f5eec8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 首・胴の青い部分がのぞく -->
  <path d="M130 150 C 128 190, 140 220, 182 224 C 224 220, 238 188, 235 150 L 205 150 C 205 175, 160 175, 158 150 Z"
        fill="#4a8fc2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔(頭) -->
  <ellipse cx="182" cy="110" rx="70" ry="62" fill="#4a8fc2" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 耳(左・とがった長い耳) -->
  <path d="M140 75 C 115 30, 100 -5, 118 20 C 108 45, 122 78, 145 92 Z"
        fill="#4a8fc2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 耳(右) -->
  <path d="M226 75 C 252 28, 268 -6, 250 20 C 262 46, 246 80, 222 92 Z"
        fill="#4a8fc2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 耳のうちがわ -->
  <path d="M133 55 C 124 35, 120 20, 124 32 C 122 48, 128 62, 138 70 Z" fill="#233a63"/>
  <path d="M233 55 C 242 35, 246 20, 242 32 C 244 48, 238 62, 228 70 Z" fill="#233a63"/>

  <!-- ほっぺ -->
  <ellipse cx="140" cy="128" rx="14" ry="10" fill="#7fc4e8" opacity="0.8"/>
  <ellipse cx="224" cy="128" rx="14" ry="10" fill="#7fc4e8" opacity="0.8"/>

  <!-- 目(左) -->
  <circle cx="150" cy="100" r="17" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="153" cy="103" r="8" fill="#2d263c"/>
  <!-- 目(右) -->
  <circle cx="214" cy="100" r="17" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="217" cy="103" r="8" fill="#2d263c"/>

  <!-- 鼻あな -->
  <circle cx="172" cy="128" r="3" fill="#2d263c"/>
  <circle cx="192" cy="128" r="3" fill="#2d263c"/>

  <!-- くち -->
  <path d="M158 140 C 170 152, 194 152, 206 140" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 手前のうで(右) -->
  <ellipse cx="118" cy="205" rx="26" ry="30" fill="#4a8fc2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M100 220 L96 232 M112 226 L110 238 M126 224 L128 236" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <ellipse cx="250" cy="205" rx="26" ry="30" fill="#4a8fc2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M234 220 L232 232 M246 226 L248 238 M260 222 L264 234" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- あしのツメ -->
  <path d="M112 322 L106 332 M130 328 L128 340 M148 322 L152 334" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M218 325 L214 336 M235 330 L235 342 M252 324 L258 335" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
