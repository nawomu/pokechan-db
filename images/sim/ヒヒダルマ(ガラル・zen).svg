<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: ①ガラルのすがた=氷色(青白)の毛並み ②ダルマモード(zen)=顔まわりに白いもふもふのたてがみ+あご下から燃え上がる赤い炎(ほのおタイプ複合の象徴) ③吊り上がった赤い怒り目と濃い眉 ④拳を握って構える猛々しいポーズ ⑤肩とお腹にも赤い炎、頭上に凍った氷のとげ -->

  <!-- 後ろ髪(たてがみ・背後にちらり) -->
  <path d="M100 95 Q70 70 78 35 Q100 55 112 88 Z" fill="#eef4fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M260 95 Q290 70 282 35 Q260 55 248 88 Z" fill="#eef4fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 脚(下の太いスタブ) -->
  <path d="M132 275 Q124 315 118 335 L168 335 Q168 305 162 272 Z" fill="#3a7dc4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <path d="M198 272 Q192 305 192 335 L242 335 Q236 315 228 275 Z" fill="#3a7dc4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <path d="M114 333 Q140 344 168 333" fill="none" stroke="#1f3f66" stroke-width="6" stroke-linecap="round"/>
  <path d="M192 333 Q218 344 244 333" fill="none" stroke="#1f3f66" stroke-width="6" stroke-linecap="round"/>

  <!-- 体(丸くたくましい胴体) -->
  <ellipse cx="180" cy="222" rx="98" ry="92" fill="#5aa8e0" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 肩の氷のとげ -->
  <path d="M88 190 Q60 175 58 145 Q84 155 100 182 Z" fill="#dff0fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M272 190 Q300 175 302 145 Q276 155 260 182 Z" fill="#dff0fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 腕(握りこぶしを胸の前で構える) -->
  <path d="M108 205 Q78 220 70 250 Q66 272 90 278 Q112 282 118 260 Q124 232 138 212 Z" fill="#3a7dc4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <path d="M252 205 Q282 220 290 250 Q294 272 270 278 Q248 282 242 260 Q236 232 222 212 Z" fill="#3a7dc4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <circle cx="86" cy="262" r="20" fill="#eef4fb" stroke="#2d263c" stroke-width="6"/>
  <circle cx="274" cy="262" r="20" fill="#eef4fb" stroke="#2d263c" stroke-width="6"/>

  <!-- お腹の赤い炎(ほのお複合の証) -->
  <path d="M150 250 Q160 220 180 232 Q195 218 205 245 Q215 265 195 280 Q180 288 165 280 Q148 268 150 250 Z" fill="#e0432b" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M170 258 Q180 245 190 258" fill="none" stroke="#b8291c" stroke-width="4" stroke-linecap="round"/>

  <!-- 頭(丸い) -->
  <circle cx="180" cy="118" r="80" fill="#5aa8e0" stroke="#2d263c" stroke-width="9"/>

  <!-- 顔まわりの白いたてがみ(もふもふ・ぎざぎざ) -->
  <path d="M100 118 Q78 100 84 68 Q104 60 116 82 Q104 96 100 118 Z" fill="#eef4fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M260 118 Q282 100 276 68 Q256 60 244 82 Q256 96 260 118 Z" fill="#eef4fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M132 52 Q150 30 180 32 Q210 30 228 52 Q206 46 180 46 Q154 46 132 52 Z" fill="#eef4fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭のてっぺんの氷のとげ -->
  <path d="M168 42 Q170 15 182 8 Q186 28 182 46 Z" fill="#dff0fb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- あごから燃え上がる赤い炎(ひげのよう) -->
  <path d="M140 168 Q150 210 178 218 Q170 190 168 165 Z" fill="#e0432b" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M220 168 Q210 210 182 218 Q190 190 192 165 Z" fill="#e0432b" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M178 190 Q180 205 182 190" fill="none" stroke="#b8291c" stroke-width="4" stroke-linecap="round"/>

  <!-- 濃い眉(怒り) -->
  <path d="M132 96 Q150 82 172 92" fill="none" stroke="#1f3f66" stroke-width="8" stroke-linecap="round"/>
  <path d="M228 96 Q210 82 188 92" fill="none" stroke="#1f3f66" stroke-width="8" stroke-linecap="round"/>

  <!-- 目(吊り上がった赤い目) -->
  <path d="M138 112 Q152 100 168 110 Q158 122 142 122 Q136 118 138 112 Z" fill="#ff4b34" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M222 112 Q208 100 192 110 Q202 122 218 122 Q224 118 222 112 Z" fill="#ff4b34" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="153" cy="114" r="4" fill="#2d263c"/>
  <circle cx="207" cy="114" r="4" fill="#2d263c"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="140" rx="7" ry="5" fill="#1f3f66"/>

  <!-- 口(牙をむき出す) -->
  <path d="M158 156 Q180 172 202 156" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M168 158 L164 170 L174 162 Z" fill="#fff8ea" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <path d="M192 158 L196 170 L186 162 Z" fill="#fff8ea" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
</svg>
