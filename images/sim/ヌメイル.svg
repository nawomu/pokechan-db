<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)紫のカタツムリ胴体 2)背中に茶紫の渦巻き殻 3)頭から2本の長い触角(先が緑に光る) 4)柔らかい顔に小さな目 5)ぬるぬる下敷き -->

  <!-- 殻(背中・渦巻き) -->
  <path d="M250,170 Q300,165 305,215 Q300,265 250,262 Q215,258 215,220 Q220,185 250,180 Q275,180 278,205 Q275,228 255,228 Q242,228 242,212 Q248,202 258,205" fill="none" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M250,170 Q300,165 305,215 Q300,265 250,262 Q215,258 215,220 Q220,185 250,180 Q275,180 278,205 Q275,228 255,228 Q242,228 242,212 Q248,202 258,205 L255,212" fill="#8a6aa8" opacity="0.5"/>

  <!-- 胴体(カタツムリ・柔らかい) -->
  <path d="M90,250 Q85,200 120,185 Q160,170 210,178 Q250,188 255,215 Q255,255 215,265 Q150,275 110,268 Q88,262 90,250 Z" fill="#b89bd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ぬるぬる光沢 -->
  <ellipse cx="140" cy="210" rx="22" ry="11" fill="#d6c4e8" opacity="0.7"/>

  <!-- 触角(2本・長い・先が緑に光る) -->
  <path d="M150,178 Q138,130 128,95" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="128" cy="92" r="10" fill="#9be08a" stroke="#2d263c" stroke-width="6"/>
  <circle cx="125" cy="89" r="3" fill="#ffffff" opacity="0.8"/>
  <path d="M190,178 Q205,130 215,95" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="215" cy="92" r="10" fill="#9be08a" stroke="#2d263c" stroke-width="6"/>
  <circle cx="212" cy="89" r="3" fill="#ffffff" opacity="0.8"/>

  <!-- 左目(小) -->
  <ellipse cx="155" cy="225" rx="9" ry="11" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="157" cy="228" r="4" fill="#2d263c"/>
  <!-- 右目(小) -->
  <ellipse cx="195" cy="225" rx="9" ry="11" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="193" cy="228" r="4" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M168,250 Q175,256 184,250" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 下敷きの濡れ -->
  <path d="M105,265 Q160,278 230,265" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
</svg>
