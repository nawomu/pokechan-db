  <polygon points="282,225 322,200 285,210" fill="#5a2080" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="272,160 300,125 270,148" fill="#5a2080" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- Back spikes (top center) -->
  <polygon points="180,58 165,20 195,55" fill="#5a2080" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="148,68 128,30 155,65" fill="#5a2080" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="212,68 232,30 205,65" fill="#5a2080" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- Main body — large, crouching, frame-filling -->
  <path d="M95,270 C80,240 72,205 75,175 C78,140 95,110 118,92 C138,76 158,68 180,68 C202,68 222,76 242,92 C265,110 282,140 285,175 C288,205 280,240 265,270 C245,278 215,282 180,282 C145,282 115,278 95,270 Z" fill="#5c2d8c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

