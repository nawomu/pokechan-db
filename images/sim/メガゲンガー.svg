  <polygon points="92,190 55,155 88,170" fill="#5a2080" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="78,225 38,200 75,210" fill="#5a2080" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="88,160 60,125 90,148" fill="#5a2080" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

