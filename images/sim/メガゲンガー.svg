  <path d="M130 260 Q100 290 118 310 Q138 328 160 308 Q172 340 182 310 Q192 342 202 308 Q224 330 242 308 Q258 290 234 262"
        fill="#5c3a8a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体の背中スパイク群(後ろに出る) -->
  <polygon points="148,130 140,90 155,125" fill="#4a2d6b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="182,118 178,72 190,115" fill="#4a2d6b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="215,128 218,84 228,122" fill="#4a2d6b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="238,148 248,110 255,146" fill="#4a2d6b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="128,148 116,114 124,150" fill="#4a2d6b" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- メイン体 -->
  <path d="M122 268 Q96 240 92 200 Q88 160 108 142 Q124 120 162 118 Q182 116 200 118 Q238 120 254 142 Q274 162 270 202 Q266 242 240 268 Q210 285 182 284 Q154 285 122 268 Z"
        fill="#7b52a8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

