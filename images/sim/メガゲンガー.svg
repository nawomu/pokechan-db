  <path d="M138,152 C148,168 163,176 180,177 C197,176 212,168 222,152" fill="#1a0028" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- Jagged teeth -->
  <polygon points="142,154 147,166 152,154" fill="white" stroke="#2d263c" stroke-width="2"/>
  <polygon points="152,158 157,172 162,158" fill="white" stroke="#2d263c" stroke-width="2"/>
  <polygon points="162,160 167,175 172,160" fill="white" stroke="#2d263c" stroke-width="2"/>
  <polygon points="172,161 177,177 182,161" fill="white" stroke="#2d263c" stroke-width="2"/>
  <polygon points="182,161 187,177 192,161" fill="white" stroke="#2d263c" stroke-width="2"/>
  <polygon points="192,160 197,175 202,160" fill="white" stroke="#2d263c" stroke-width="2"/>
  <polygon points="202,157 207,171 212,157" fill="white" stroke="#2d263c" stroke-width="2"/>
  <polygon points="212,154 216,165 220,154" fill="white" stroke="#2d263c" stroke-width="2"/>

  <!-- Cheek blobs / Gengar cheek circles -->
  <circle cx="130" cy="140" r="12" fill="#7a3daa" stroke="#2d263c" stroke-width="4"/>
  <circle cx="230" cy="140" r="12" fill="#7a3daa" stroke="#2d263c" stroke-width="4"/>

  <!-- Extra sharp back spikes on body sides for more menace -->
  <polygon points="95,195 62,175 90,185" fill="#4a1870" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="265,195 298,175 270,185" fill="#4a1870" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- Ghost wisps / energy from body -->
  <path d="M110,290 C100,305 95,318 98,328" fill="none" stroke="#7a3daa" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <path d="M250,290 C260,305 265,318 262,328" fill="none" stroke="#7a3daa" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
</svg>