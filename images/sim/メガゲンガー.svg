  <path d="M298,258 C304,270 308,282 305,290" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M290,264 C294,276 296,288 292,295" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- Right hand base -->
  <ellipse cx="302" cy="266" rx="22" ry="14" fill="#5c2d8c" stroke="#2d263c" stroke-width="6"/>

