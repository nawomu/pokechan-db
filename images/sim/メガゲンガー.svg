  <!-- 胸の黒い星模様 -->
  <polygon points="182,210 188,222 202,222 192,230 196,244 182,236 168,244 172,230 162,222 176,222"
           fill="#2d1a40" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 左腕(ゆがんだ鉤爪) -->
  <path d="M110 178 Q80 165 62 148 Q52 138 58 126 Q66 116 78 128 Q72 110 82 104 Q94 98 100 116 Q96 98 108 96 Q120 96 118 116 Q116 168 118 180"
        fill="#7b52a8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 右腕(ゆがんだ鉤爪) -->
  <path d="M252 178 Q282 162 300 146 Q312 134 306 122 Q298 112 286 124 Q292 106 282 100 Q270 96 266 114 Q268 96 256 94 Q244 94 246 116 Q248 168 246 180"
        fill="#7b52a8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 顔の土台(少し明るい) -->
  <ellipse cx="182" cy="162" rx="58" ry="52" fill="#8c60b8" stroke="#2d263c" stroke-width="7"/>

  <!-- 左目白目 -->
  <ellipse cx="160" cy="158" rx="20" ry="22" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 右目白目 -->
  <ellipse cx="206" cy="155" rx="18" ry="21" fill="white" stroke="#2d263c" stroke-width="5"/>

  <!-- 左目瞳(やや飛び出た感じ) -->
  <ellipse cx="163" cy="162" rx="11" ry="13" fill="#1a0a2e"/>
  <ellipse cx="166" cy="158" rx="4" ry="4" fill="white" opacity="0.7"/>

  <!-- 右目瞳 -->
  <ellipse cx="203" cy="159" rx="10" ry="12" fill="#1a0a2e"/>
  <ellipse cx="206" cy="155" rx="3.5" ry="3.5" fill="white" opacity="0.7"/>

  <!-- 第三の目(額・赤い・メガ進化の証) -->
  <ellipse cx="184" cy="128" rx="14" ry="16" fill="#e8003c" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="184" cy="128" rx="7" ry="8" fill="#8b0020"/>
  <ellipse cx="187" cy="124" rx="3" ry="3" fill="white" opacity="0.6"/>

  <!-- 第三の目のまつげ的なトゲ -->
  <line x1="184" y1="110" x2="184" y2="102" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="172" y1="114" x2="167" y2="107" stroke="#2d263c" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="196" y1="114" x2="201" y2="107" stroke="#2d263c" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ほっぺの縞(左) -->
  <line x1="132" y1="160" x2="144" y2="164" stroke="#d44070" stroke-width="4" stroke-linecap="round"/>
  <line x1="130" y1="170" x2="143" y2="172" stroke="#d44070" stroke-width="4" stroke-linecap="round"/>

  <!-- ほっぺの縞(右) -->
  <line x1="232" y1="158" x2="220" y2="162" stroke="#d44070" stroke-width="4" stroke-linecap="round"/>
  <line x1="234" y1="168" x2="221" y2="170" stroke="#d44070" stroke-width="4" stroke-linecap="round"/>

  <!-- 口(ニヤリ・ゆがんだ) -->
  <path d="M155 182 Q162 196 182 198 Q204 197 210 182"
        fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 牙(左右) -->
  <path d="M162 190 L158 204 L168 198 Z" fill="white" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <path d="M204 188 L208 202 L198 196 Z" fill="white" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 口の中の暗い部分 -->
  <path d="M162 192 Q182 208 204 192 Q196 202 182 204 Q168 202 162 192 Z" fill="#2d1a40"/>

  <!-- 頭頂スパイク(でかめ) -->
  <path d="M168 120 Q158 94 168 70 Q178 86 178 120" fill="#5c3a8a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M196 118 Q210 90 204 66 Q194 82 190 118" fill="#5c3a8a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
</svg>