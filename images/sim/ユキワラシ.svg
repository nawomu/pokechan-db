<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 体: 上がとがった円錐(アイスクリーム型)シルエット -->
  <path d="M180,85 C142,85 122,138 116,188 C111,235 102,262 100,293 L260,293 C258,262 249,235 244,188 C238,138 218,85 180,85 Z"
        fill="#8fd8ef" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体の内側のハイライト(左側・淡い水色) -->
  <ellipse cx="146" cy="150" rx="24" ry="46" fill="#c8eefb"/>
  <!-- 体の内側の影(右下・少し濃い水色) -->
  <ellipse cx="222" cy="250" rx="22" ry="40" fill="#6cc2e4"/>

  <!-- 頭の上のこおりのトゲ(左右) -->
  <path d="M148,100 L134,68 L160,92 Z" fill="#eaf9ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M212,100 L226,68 L200,92 Z" fill="#eaf9ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 裾の白いふわふわリング(ギザギザ) -->
  <polygon points="88,268 272,268 272,274 250,318 228,274 206,318 184,274 162,318 140,274 118,318 96,274 88,274"
           fill="#ffffff" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 足(裾の下からちょこっと見える) -->
  <ellipse cx="150" cy="322" rx="20" ry="13" fill="#8fd8ef" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="210" cy="322" rx="20" ry="13" fill="#8fd8ef" stroke="#2d263c" stroke-width="7"/>

  <!-- 目(黒目だけの点目) -->
  <circle cx="150" cy="178" r="12" fill="#2d263c"/>
  <circle cx="210" cy="178" r="12" fill="#2d263c"/>
  <circle cx="153" cy="174" r="3" fill="#ffffff"/>
  <circle cx="213" cy="174" r="3" fill="#ffffff"/>

  <!-- ほっぺの赤み -->
  <circle cx="132" cy="205" r="9" fill="#ffb3c6" opacity="0.6"/>
  <circle cx="228" cy="205" r="9" fill="#ffb3c6" opacity="0.6"/>

  <!-- 小さな口 -->
  <path d="M168,208 Q180,215 192,208" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
