<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 左うで(岩のこぶし) -->
  <ellipse cx="60" cy="205" rx="36" ry="30" fill="#8b8fa3" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" transform="rotate(-12 60 205)"/>
  <!-- 右うで(岩のこぶし) -->
  <ellipse cx="300" cy="205" rx="36" ry="30" fill="#8b8fa3" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" transform="rotate(12 300 205)"/>

  <!-- こぶしの節の線(左) -->
  <path d="M42 190 Q56 205 42 222" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- こぶしの節の線(右) -->
  <path d="M318 190 Q304 205 318 222" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 体(丸い岩・グレー系) -->
  <ellipse cx="180" cy="200" rx="108" ry="103" fill="#8b8fa3" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 岩肌の模様(暗いしみ) -->
  <ellipse cx="118" cy="238" rx="22" ry="16" fill="#666b82" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" transform="rotate(-15 118 238)"/>
  <ellipse cx="246" cy="230" rx="20" ry="15" fill="#666b82" stroke="#2d263c" stroke-width="4" stroke-linejoin="round" transform="rotate(10 246 230)"/>
  <ellipse cx="180" cy="132" rx="20" ry="12" fill="#666b82" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- ひび割れ -->
  <path d="M96 150 Q116 180 104 218" fill="none" stroke="#4a4d63" stroke-width="4" stroke-linecap="round"/>
  <path d="M262 145 Q272 175 258 205" fill="none" stroke="#4a4d63" stroke-width="4" stroke-linecap="round"/>

  <!-- 電気を帯びた青いむらさきの結晶(左肩) -->
  <path d="M92 148 L104 118 L118 150 L104 176 Z" fill="#7ecbe8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 電気を帯びた青いむらさきの結晶(右肩) -->
  <path d="M268 148 L256 118 L242 150 L256 176 Z" fill="#7ecbe8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 頭の上の小さな結晶 -->
  <path d="M164 100 L180 78 L196 100 L180 116 Z" fill="#a6dcf0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 底の小石ぼこぼこ(左下) -->
  <circle cx="122" cy="290" r="12" fill="#8b8fa3" stroke="#2d263c" stroke-width="5"/>
  <!-- 底の小石ぼこぼこ(右下) -->
  <circle cx="238" cy="288" r="13" fill="#8b8fa3" stroke="#2d263c" stroke-width="5"/>

  <!-- 光沢ハイライト -->
  <ellipse cx="140" cy="120" rx="30" ry="18" fill="#c3c7d6" opacity="0.55" transform="rotate(-20 140 120)"/>

  <!-- まゆの岩のでっぱり(左) -->
  <path d="M126 158 Q148 142 172 156" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- まゆの岩のでっぱり(右) -->
  <path d="M188 156 Q212 142 234 158" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 目(白目・左) -->
  <circle cx="150" cy="184" r="16" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 目(白目・右) -->
  <circle cx="210" cy="184" r="16" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- ひとみ(左) -->
  <circle cx="153" cy="188" r="8" fill="#241f1a"/>
  <!-- ひとみ(右) -->
  <circle cx="207" cy="188" r="8" fill="#241f1a"/>

  <!-- 口 -->
  <path d="M160 226 Q180 236 200 226" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ぱちぱち電気の火花(右上) -->
  <path d="M270 108 L278 122 L268 122 L276 138" fill="none" stroke="#f2e34c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
