<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 甲羅(こうら)がドーム型で青緑(ターコイズ)色・三葉虫のような節目模様
  2. 頭・4本のヒレ足は赤茶色(マルーン)
  3. 頭は丸くて大きい目・くちばし風の小さい口
  4. ずんぐりむっくりした体型・尻尾は小さく短い
  5. 甲羅の縁は少し薄い色の帯・全体に丸みのあるゆるいシルエット
  -->

  <!-- 後ろ側ヒレ足(奥) -->
  <ellipse cx="52" cy="185" rx="34" ry="22" fill="#7a3626" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-25 52 185)"/>
  <ellipse cx="308" cy="185" rx="34" ry="22" fill="#7a3626" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(25 308 185)"/>

  <!-- 尻尾 -->
  <path d="M180 300 Q170 322 180 335 Q190 322 180 300 Z" fill="#7a3626" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 甲羅(体) -->
  <ellipse cx="180" cy="165" rx="120" ry="98" fill="#3fa8a4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 甲羅の縁の帯 -->
  <path d="M70 200 Q180 260 290 200 Q290 235 180 258 Q70 235 70 200 Z" fill="#2f8b88" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 甲羅の節目模様(三葉虫っぽい線) -->
  <path d="M110 95 Q180 130 250 95" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M85 135 Q180 175 275 135" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M78 175 Q180 210 282 175" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <line x1="180" y1="70" x2="180" y2="245" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 前側ヒレ足(手前) -->
  <ellipse cx="80" cy="255" rx="42" ry="26" fill="#8b3f2c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-35 80 255)"/>
  <ellipse cx="280" cy="255" rx="42" ry="26" fill="#8b3f2c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(35 280 255)"/>

  <!-- 頭 -->
  <path d="M115 235 Q110 285 150 300 Q180 310 210 300 Q250 285 245 235 Q245 195 180 195 Q115 195 115 235 Z" fill="#8b3f2c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 目(白目) -->
  <circle cx="152" cy="240" r="22" fill="#fbf6ea" stroke="#2d263c" stroke-width="6"/>
  <circle cx="208" cy="240" r="22" fill="#fbf6ea" stroke="#2d263c" stroke-width="6"/>

  <!-- 目(黒目) -->
  <circle cx="155" cy="246" r="10" fill="#2d263c"/>
  <circle cx="211" cy="246" r="10" fill="#2d263c"/>

  <!-- 目のハイライト -->
  <circle cx="151" cy="241" r="3.5" fill="#fbf6ea"/>
  <circle cx="207" cy="241" r="3.5" fill="#fbf6ea"/>

  <!-- 口(小さくてくちばし風) -->
  <path d="M165 278 Q180 288 195 278" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
