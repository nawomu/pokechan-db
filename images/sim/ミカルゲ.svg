<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- キーストーン(奇石) - 下の紫の石板 -->
  <ellipse cx="182" cy="305" rx="58" ry="18" fill="#5a2d7a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="132,298 142,265 178,258 222,260 235,268 232,300 182,308" fill="#7a3fa0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 石板のひび -->
  <path d="M170 262 L165 285 M195 260 L198 280" stroke="#2d263c" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- 石板の模様点 -->
  <circle cx="160" cy="277" r="4" fill="#5a2d7a"/>
  <circle cx="205" cy="275" r="3" fill="#5a2d7a"/>

  <!-- ガス体のすそ(もやもや・後ろ) -->
  <path d="M130,290 Q108,270 112,240 Q105,215 118,200 Q108,185 120,170" fill="#3a5040" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M232,288 Q255,268 248,238 Q258,210 242,195 Q252,178 238,165" fill="#3a5040" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 体のメインガス部分 -->
  <path d="M130,290
    Q112,275 108,250
    Q100,225 115,205
    Q105,185 118,168
    Q122,148 140,138
    Q148,120 165,115
    Q178,108 195,112
    Q215,110 228,125
    Q245,135 248,155
    Q262,170 255,192
    Q268,212 258,238
    Q265,262 248,278
    Q238,292 220,298
    Q200,305 182,305
    Q160,306 145,298
    Z"
    fill="#4a6050" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 渦巻きの背景光彩(緑) -->
  <ellipse cx="180" cy="200" rx="55" ry="60" fill="#7aac50" opacity="0.25"/>

  <!-- 大きな渦巻き1(左目的渦) -->
  <path d="M155,185 Q148,175 155,168 Q164,160 175,168 Q184,176 178,188 Q170,198 160,192 Q152,185 158,178 Q164,172 172,178" fill="none" stroke="#a8e060" stroke-width="5" stroke-linecap="round"/>

  <!-- 大きな渦巻き2(右目的渦) -->
  <path d="M205,182 Q198,172 205,165 Q214,157 225,165 Q234,173 228,185 Q220,195 210,189 Q202,182 208,175 Q214,169 222,175" fill="none" stroke="#a8e060" stroke-width="5" stroke-linecap="round"/>

  <!-- 体の小渦巻き装飾 -->
  <path d="M145,230 Q138,224 143,218 Q150,212 158,219 Q162,226 156,232" fill="none" stroke="#a8e060" stroke-width="4" stroke-linecap="round"/>
  <path d="M215,225 Q208,219 213,213 Q220,207 228,214 Q232,221 226,227" fill="none" stroke="#a8e060" stroke-width="4" stroke-linecap="round"/>
  <path d="M175,248 Q170,242 175,237 Q182,231 190,238 Q194,245 188,251" fill="none" stroke="#a8e060" stroke-width="4" stroke-linecap="round"/>
  <path d="M155,162 Q150,156 155,151 Q162,145 168,152 Q171,158 166,163" fill="none" stroke="#a8e060" stroke-width="3" stroke-linecap="round"/>
  <path d="M205,160 Q200,154 205,149 Q212,143 218,150 Q221,156 216,161" fill="none" stroke="#a8e060" stroke-width="3" stroke-linecap="round"/>

  <!-- 目(いびつな三角っぽい目) -->
  <!-- 左目 -->
  <path d="M148,185 Q152,175 162,173 Q172,171 176,180 Q178,188 170,194 Q160,197 152,192 Z" fill="#c8f070" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M153,183 Q158,177 165,176 Q171,177 173,182 Q172,188 165,191 Q158,192 153,188 Z" fill="#2d8a20" stroke="none"/>
  <circle cx="162" cy="183" r="4" fill="#1a5010"/>
  <circle cx="159" cy="181" r="2" fill="white" opacity="0.7"/>

  <!-- 右目 -->
  <path d="M196,183 Q200,173 210,171 Q220,169 226,178 Q229,186 221,193 Q211,197 202,192 Z" fill="#c8f070" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M201,181 Q206,175 213,174 Q219,175 222,180 Q221,186 214,190 Q207,191 201,187 Z" fill="#2d8a20" stroke="none"/>
  <circle cx="212" cy="180" r="4" fill="#1a5010"/>
  <circle cx="209" cy="178" r="2" fill="white" opacity="0.7"/>

  <!-- 鼻(小さい点) -->
  <circle cx="188" cy="205" r="3" fill="#2d263c"/>

  <!-- 口(ギザギザ歯あり・いびつ) -->
  <path d="M162,215 Q168,210 175,216 Q180,220 187,213 Q193,208 200,215 Q206,220 212,214 Q218,210 222,216"
    fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 口の中塗り -->
  <path d="M165,217 Q175,225 187,218 Q198,225 218,217 Q215,232 205,235 Q190,240 175,235 Q163,232 Z" fill="#1a1428" stroke="#2d263c" stroke-width="4"/>
  <!-- ギザギザ歯 -->
  <path d="M172,219 L169,230 M182,217 L181,229 M193,217 L193,229 M204,218 L205,230 M212,219 L214,230" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- 体の外側にもやもや突起(幽霊っぽく) -->
  <path d="M112,210 Q95,205 90,218 Q88,232 102,235 Q108,236 112,228" fill="#4a6050" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M248,208 Q265,202 270,216 Q272,230 258,233 Q252,234 248,226" fill="#4a6050" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M148,115 Q140,100 148,90 Q156,82 162,92 Q165,100 158,110" fill="#4a6050" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M210,112 Q215,96 225,92 Q234,90 236,102 Q236,112 224,116" fill="#4a6050" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- キーストーン上部の亀裂光(石から出るオーラ) -->
  <path d="M165,258 Q170,245 180,240 M195,258 Q192,244 182,240" stroke="#a8e060" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>

</svg>