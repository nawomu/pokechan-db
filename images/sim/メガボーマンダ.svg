<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
<g id="mega-burst"><circle cx="180" cy="180" r="172" fill="#fff3c0"/><polygon points="180,180 450.0,180.0 444.8,232.7" fill="#ffd96b"/><polygon points="180,180 429.4,283.3 404.5,330.0" fill="#ffb13d"/><polygon points="180,180 370.9,370.9 330.0,404.5" fill="#ffd96b"/><polygon points="180,180 283.3,429.4 232.7,444.8" fill="#ffb13d"/><polygon points="180,180 180.0,450.0 127.3,444.8" fill="#ffd96b"/><polygon points="180,180 76.7,429.4 30.0,404.5" fill="#ffb13d"/><polygon points="180,180 -10.9,370.9 -44.5,330.0" fill="#ffd96b"/><polygon points="180,180 -69.4,283.3 -84.8,232.7" fill="#ffb13d"/><polygon points="180,180 -90.0,180.0 -84.8,127.3" fill="#ffd96b"/><polygon points="180,180 -69.4,76.7 -44.5,30.0" fill="#ffb13d"/><polygon points="180,180 -10.9,-10.9 30.0,-44.5" fill="#ffd96b"/><polygon points="180,180 76.7,-69.4 127.3,-84.8" fill="#ffb13d"/><polygon points="180,180 180.0,-90.0 232.7,-84.8" fill="#ffd96b"/><polygon points="180,180 283.3,-69.4 330.0,-44.5" fill="#ffb13d"/><polygon points="180,180 370.9,-10.9 404.5,30.0" fill="#ffd96b"/><polygon points="180,180 429.4,76.7 444.8,127.3" fill="#ffb13d"/><circle cx="180" cy="180" r="120" fill="#fff3c0" opacity="0.55"/></g>
  <!-- メガボーマンダ: 1.濃い青のドラゴン体+橙のかぎ爪状の翼が超巨大化 2.胸の橙模様も拡大 3.頭のクレストが後方に長く鋭くスイープ 4.体側面に暗い筋模様 5.鋭い黄色い目と牙 -->
  <!-- しっぽ -->
  <path d="M228 248 Q292 258 328 292 Q302 282 280 277 Q306 302 312 328 Q280 306 258 280 Q250 292 236 288 Z"
        fill="#33538e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左翼(超巨大化・後方) -->
  <path d="M128 165 Q58 132 26 68 Q56 100 92 115 Q46 68 36 24 Q92 55 126 100 Q120 84 130 74 Q148 116 136 168 Z"
        fill="#26407a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 右翼(超巨大化・後方) -->
  <path d="M232 165 Q302 132 334 68 Q304 100 268 115 Q314 68 324 24 Q268 55 234 100 Q240 84 230 74 Q212 116 224 168 Z"
        fill="#26407a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 翼の橙アクセント -->
  <path d="M70 100 Q50 78 44 46 Q66 66 82 92 Z" fill="#e2472f" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M290 100 Q310 78 316 46 Q294 66 278 92 Z" fill="#e2472f" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 後ろ脚 -->
  <path d="M152 278 Q140 305 134 328 L118 328 Q125 302 136 273 Z" fill="#33538e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M226 278 Q238 305 244 328 L260 328 Q253 302 242 273 Z" fill="#33538e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 前脚 -->
  <path d="M140 236 Q118 266 107 298 L90 298 Q104 262 126 231 Z" fill="#33538e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M238 236 Q260 266 271 298 L288 298 Q274 262 252 231 Z" fill="#33538e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ツメ -->
  <path d="M90 298 L82 313 M98 298 L94 314 M106 298 L104 314" stroke="#f4efe1" stroke-width="6" stroke-linecap="round"/>
  <path d="M288 298 L296 313 M280 298 L284 314 M272 298 L274 314" stroke="#f4efe1" stroke-width="6" stroke-linecap="round"/>
  <path d="M118 328 L112 342 M126 328 L124 343 M134 328 L136 343" stroke="#f4efe1" stroke-width="6" stroke-linecap="round"/>
  <path d="M260 328 L266 342 M252 328 L254 343 M244 328 L242 343" stroke="#f4efe1" stroke-width="6" stroke-linecap="round"/>

  <!-- 体(胴体・大きめ) -->
  <ellipse cx="187" cy="215" rx="76" ry="66" fill="#33538e" stroke="#2d263c" stroke-width="9"/>

  <!-- 胸〜腹の橙模様(拡大) -->
  <path d="M144 192 Q187 172 230 192 Q244 240 187 274 Q130 240 144 192 Z" fill="#e2472f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 側面の暗い筋 -->
  <path d="M116 200 Q106 212 110 228" fill="none" stroke="#20345f" stroke-width="5" stroke-linecap="round"/>
  <path d="M258 200 Q268 212 264 228" fill="none" stroke="#20345f" stroke-width="5" stroke-linecap="round"/>

  <!-- 首 -->
  <path d="M158 175 Q168 128 187 103 Q206 128 216 175 Z" fill="#33538e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="187" cy="95" rx="53" ry="47" fill="#33538e" stroke="#2d263c" stroke-width="9"/>

  <!-- 頭のクレスト(後方へ長くスイープ・メガ化で鋭く巨大) -->
  <path d="M152 60 Q95 40 62 22 Q100 50 122 72 Q140 66 152 60 Z" fill="#e2472f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M187 50 Q182 22 190 20 Q198 40 200 58 Q193 55 187 50 Z" fill="#e2472f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M222 60 Q279 40 312 22 Q274 50 252 72 Q234 66 222 60 Z" fill="#e2472f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- マズル(鼻先) -->
  <path d="M160 112 Q187 134 214 112 Q205 104 187 104 Q169 104 160 112 Z" fill="#dfe6f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 牙 -->
  <path d="M172 116 L176 127 L180 116 M194 116 L198 127 L202 116" fill="#ffffff" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 目(鋭くつり上がる) -->
  <ellipse cx="160" cy="86" rx="14" ry="15" fill="#ffe14d" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="214" cy="86" rx="14" ry="15" fill="#ffe14d" stroke="#2d263c" stroke-width="6"/>
  <circle cx="163" cy="89" r="5" fill="#2d263c"/>
  <circle cx="211" cy="89" r="5" fill="#2d263c"/>
</svg>
