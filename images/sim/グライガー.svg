<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.紫の体色と扁平な体 2.コウモリ状の耳/翼ヒレ 3.サソリのような尻尾+赤い針 4.赤いハサミ状の手 5.小さい黒目と赤い鼻先 -->

  <!-- 背景要素: 翼(左右) -->
  <path d="M95,195 Q40,178 28,232 Q46,266 102,244 Q108,218 95,195 Z" fill="#7c5aa8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M265,195 Q320,178 332,232 Q314,266 258,244 Q252,218 265,195 Z" fill="#7c5aa8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 尻尾+針 -->
  <path d="M252,268 Q300,292 306,240 Q310,188 338,172" fill="none" stroke="#7c5aa8" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M338,172 L352,150 L336,186 Z" fill="#e8483c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体 -->
  <ellipse cx="180" cy="228" rx="102" ry="76" fill="#9b7ec4" stroke="#2d263c" stroke-width="8"/>
  <ellipse cx="180" cy="244" rx="54" ry="42" fill="#d9c8f0" stroke="#2d263c" stroke-width="6"/>

  <!-- 足 -->
  <circle cx="148" cy="318" r="22" fill="#9b7ec4" stroke="#2d263c" stroke-width="7"/>
  <circle cx="212" cy="318" r="22" fill="#9b7ec4" stroke="#2d263c" stroke-width="7"/>

  <!-- 腕とハサミ -->
  <ellipse cx="104" cy="250" rx="24" ry="17" fill="#9b7ec4" stroke="#2d263c" stroke-width="7"/>
  <circle cx="76" cy="262" r="17" fill="#e8483c" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="256" cy="250" rx="24" ry="17" fill="#9b7ec4" stroke="#2d263c" stroke-width="7"/>
  <circle cx="284" cy="262" r="17" fill="#e8483c" stroke="#2d263c" stroke-width="7"/>

  <!-- 顔(耳付き頭) -->
  <path d="M118,112 Q106,58 138,52 Q150,92 180,86 Q210,92 222,52 Q254,58 242,112 Q244,152 180,158 Q116,152 118,112 Z" fill="#9b7ec4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 鼻先 -->
  <ellipse cx="180" cy="142" rx="17" ry="11" fill="#e8483c" stroke="#2d263c" stroke-width="6"/>

  <!-- 目 -->
  <circle cx="153" cy="108" r="9" fill="#2d263c"/>
  <circle cx="207" cy="108" r="9" fill="#2d263c"/>
</svg>
