<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 茶色い3つの頭が地面から生えているように並ぶ(手足なし)
  2. 頭のてっぺんは尖った卵形・上部に濃い茶色のライン模様
  3. 大きな丸い目(左右2つずつ・黒目)
  4. 小さな口・鼻は目立たない
  5. 中央の頭が一番大きく前・左右はやや小さく後ろに控える
  -->

  <!-- 左の頭(後ろ) -->
  <path d="M108 112 Q84 118 74 152 Q64 190 70 232 Q76 262 92 280 Q104 292 122 288 Q140 282 146 258 Q154 210 146 160 Q140 122 108 112Z" fill="#B9873F" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M104 116 Q86 126 78 154 Q92 148 112 150 Q132 154 144 166 Q140 128 104 116Z" fill="#8A5C28" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="100" cy="188" rx="12" ry="14" fill="#2d263c"/>
  <ellipse cx="103" cy="184" rx="4" ry="5" fill="#fff"/>
  <path d="M92 244 Q104 252 118 244" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 右の頭(後ろ) -->
  <path d="M252 112 Q276 118 286 152 Q296 190 290 232 Q284 262 268 280 Q256 292 238 288 Q220 282 214 258 Q206 210 214 160 Q220 122 252 112Z" fill="#B9873F" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M256 116 Q274 126 282 154 Q268 148 248 150 Q228 154 216 166 Q220 128 256 116Z" fill="#8A5C28" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="260" cy="188" rx="12" ry="14" fill="#2d263c"/>
  <ellipse cx="263" cy="184" rx="4" ry="5" fill="#fff"/>
  <path d="M242 244 Q256 252 268 244" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 中央の頭(前・一番大きい) -->
  <path d="M180 58 Q144 66 130 116 Q116 176 126 236 Q134 274 156 296 Q168 306 180 306 Q192 306 204 296 Q226 274 234 236 Q244 176 230 116 Q216 66 180 58Z" fill="#CB9A4E" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭頂の濃い模様(土の帽子) -->
  <path d="M180 62 Q150 70 136 112 Q160 100 180 100 Q200 100 224 112 Q210 70 180 62Z" fill="#8A5C28" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 中央 目 左右 -->
  <ellipse cx="158" cy="176" rx="16" ry="18" fill="#2d263c"/>
  <ellipse cx="162" cy="170" rx="6" ry="7" fill="#fff"/>
  <ellipse cx="202" cy="176" rx="16" ry="18" fill="#2d263c"/>
  <ellipse cx="206" cy="170" rx="6" ry="7" fill="#fff"/>

  <!-- 中央 口 -->
  <path d="M162 244 Q180 258 198 244" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 中央 ほっぺの丸み(かわいさ) -->
  <ellipse cx="146" cy="220" rx="8" ry="6" fill="#E8B96B" opacity="0.6"/>
  <ellipse cx="214" cy="220" rx="8" ry="6" fill="#E8B96B" opacity="0.6"/>
</svg>
