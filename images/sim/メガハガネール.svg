  <ellipse cx="168" cy="152" rx="5" ry="3.5" fill="#5c6e82" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="192" cy="152" rx="5" ry="3.5" fill="#5c6e82" stroke="#2d263c" stroke-width="3"/>
