  <polygon points="162,196 154,232 172,230" fill="#d0e0ea" stroke="#2d263c" stroke-width="5.5" stroke-linejoin="round"/>
  <polygon points="188,196 182,232 200,230" fill="#d0e0ea" stroke="#2d263c" stroke-width="5.5" stroke-linejoin="round"/>
  <polygon points="214,196 206,228 224,226" fill="#c8d8e4" stroke="#2d263c" stroke-width="5.5" stroke-linejoin="round"/>

