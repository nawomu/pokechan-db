<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尾の青い炎(奥) -->
  <path d="M255 205 Q300 170 285 120 Q320 140 300 90 Q330 105 305 65 Q290 100 275 95 Q285 130 255 140 Q270 165 240 175 Z"
        fill="#3d7fe0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M290 130 Q305 110 298 85" fill="none" stroke="#8fc3ff" stroke-width="6" stroke-linecap="round"/>

  <!-- 灰色の背中の装甲(奥) -->
  <path d="M150 165 Q120 130 90 145 Q115 170 130 185 Z" fill="#c7cbd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M195 170 Q225 135 260 150 Q235 175 215 190 Z" fill="#c7cbd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ足 -->
  <path d="M235 245 Q245 275 235 300 Q225 300 220 280 Q218 260 220 245 Z" fill="#f5f5f8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="228" cy="300" rx="16" ry="9" fill="#c7cbd6" stroke="#2d263c" stroke-width="6"/>

  <!-- 前足 -->
  <path d="M135 250 Q130 280 138 305 Q150 305 152 282 Q153 262 148 248 Z" fill="#f5f5f8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="143" cy="305" rx="16" ry="9" fill="#c7cbd6" stroke="#2d263c" stroke-width="6"/>

  <!-- 胴体 -->
  <path d="M110 220 Q95 175 140 155 Q195 135 235 165 Q265 190 245 230 Q220 265 165 260 Q120 258 110 220 Z"
        fill="#f7f7fa" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- お腹の線 -->
  <path d="M135 220 Q170 240 210 218" fill="none" stroke="#c7cbd6" stroke-width="5" stroke-linecap="round"/>

  <!-- 首 -->
  <path d="M120 190 Q100 165 100 140 Q115 130 135 145 Q140 175 135 200 Z" fill="#f7f7fa" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の後ろの角(灰色・大きい) -->
  <path d="M75 120 Q55 90 70 55 Q95 75 90 100 Q100 90 110 65 Q120 95 100 125 Z" fill="#c7cbd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="90" cy="140" rx="48" ry="42" fill="#f7f7fa" stroke="#2d263c" stroke-width="8"/>

  <!-- 鼻先(マズル) -->
  <path d="M45 145 Q20 150 15 168 Q25 178 45 172 Q55 165 55 150 Z" fill="#f7f7fa" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- あご下のひげ(白いギザギザ) -->
  <path d="M55 175 Q45 195 55 210 Q65 198 62 180 Z" fill="#f7f7fa" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M75 185 Q68 205 78 218 Q88 205 82 188 Z" fill="#f7f7fa" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 鼻先の小さい灰色角 -->
  <path d="M35 148 Q30 135 40 128 Q48 138 42 150 Z" fill="#c7cbd6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目 -->
  <ellipse cx="78" cy="130" rx="10" ry="12" fill="#e53935" stroke="#2d263c" stroke-width="6"/>
  <circle cx="80" cy="128" r="3.5" fill="#2d263c"/>

  <!-- 頬の小さい丸(装飾) -->
  <circle cx="60" cy="152" r="4" fill="#c7cbd6" stroke="#2d263c" stroke-width="4"/>
</svg>
