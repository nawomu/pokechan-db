  <!-- 体の光沢ハイライト(ぷにぷに感) -->
  <path d="M 120 90 C 140 78, 165 74, 188 80 C 170 86, 148 90, 128 98 Z"
    fill="#e8ccf0" opacity="0.6"/>
  <ellipse cx="145" cy="100" rx="18" ry="11" fill="#eeddff" opacity="0.45" transform="rotate(-18 145 100)"/>

  <!-- 左のびよーんと腕(ぐにょ) -->
  <path d="M 82 198 C 55 195, 38 185, 42 170 C 44 158, 58 152, 72 158 C 62 162, 60 172, 74 178 C 72 185, 76 192, 82 198 Z"
    fill="#cc99dd" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 右のびよーんと腕(ぐにょ) -->
  <path d="M 280 204 C 306 196, 322 183, 316 168 C 312 156, 298 151, 286 158 C 296 163, 298 174, 284 180 C 284 188, 280 196, 280 204 Z"
    fill="#cc99dd" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 左目(ちょっとずれた点目) -->
  <ellipse cx="148" cy="162" rx="14" ry="13" fill="#2d263c"/>
  <ellipse cx="143" cy="157" rx="4" ry="4" fill="#ffffff" opacity="0.75"/>

  <!-- 右目(ちょっと大きめにして非対称) -->
  <ellipse cx="214" cy="160" rx="12" ry="14" fill="#2d263c"/>
  <ellipse cx="210" cy="155" rx="3.5" ry="3.5" fill="#ffffff" opacity="0.75"/>

  <!-- ニタ〜っとした口(ちょっとゆがんでる) -->
  <path d="M 148 196 C 158 208, 174 214, 190 213 C 206 212, 220 206, 228 196"
    fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 口の中(薄暗く) -->
  <path d="M 153 199 C 163 210, 178 215, 192 214 C 207 213, 220 207, 225 199"
    fill="#9966bb" opacity="0.4"/>

  <!-- 眉毛っぽい線(左・ちょっとへにょり) -->
  <path d="M 136 148 C 142 143, 152 142, 160 145"
    fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 眉毛っぽい線(右・まっすぐ気味) -->
  <path d="M 205 143 C 212 140, 220 141, 226 146"
    fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 体の右下あたりのぷにっとしたゆがみ強調 -->
  <path d="M 260 248 C 270 238, 275 225, 272 215" fill="none" stroke="#b878cc" stroke-width="3" opacity="0.4" stroke-linecap="round"/>

  <!-- つやつや丸(体右上) -->
  <circle cx="240" cy="108" r="8" fill="#e8d0f8" opacity="0.5"/>
</svg>