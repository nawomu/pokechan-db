    C 62 185, 58 148, 68 122
    C 74 104, 82 95, 96 90
    C 108 75, 122 70, 140 72
    C 150 62, 162 58, 178 60
    C 192 57, 207 62, 218 70
    C 234 68, 252 76, 264 92
    C 280 100, 290 115, 292 136
    C 298 155, 294 178, 286 200
    C 280 222, 268 240, 252 254
    C 238 268, 222 276, 204 280
    C 192 285, 178 286, 164 283
    C 146 279, 130 270, 116 256
    C 100 240, 86 228, 80 210 Z"
