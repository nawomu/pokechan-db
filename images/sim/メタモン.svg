<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 影(体の下) -->
  <ellipse cx="182" cy="318" rx="88" ry="18" fill="#c0a0d8" opacity="0.35"/>

  <!-- 体のメインシルエット(ぐにゃぐにゃ不整形) -->
