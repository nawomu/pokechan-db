<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 左耳 (後ろ) -->
  <ellipse cx="118" cy="95" rx="22" ry="68" fill="#F4A8B8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-12 118 95)"/>
  <!-- 左耳センサーリング -->
  <circle cx="107" cy="42" r="18" fill="none" stroke="#F47AA0" stroke-width="8"/>
  <circle cx="107" cy="42" r="9" fill="#F47AA0"/>

  <!-- 右耳 (後ろ) -->
  <ellipse cx="244" cy="92" rx="22" ry="70" fill="#F4A8B8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(10 244 92)"/>
  <!-- 右耳センサーリング -->
  <circle cx="253" cy="38" r="18" fill="none" stroke="#F47AA0" stroke-width="8"/>
  <circle cx="253" cy="38" r="9" fill="#F47AA0"/>

  <!-- 体 -->
  <ellipse cx="181" cy="245" rx="88" ry="98" fill="#F9D6D6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- おなか (白っぽいゾーン) -->
  <ellipse cx="183" cy="262" rx="55" ry="62" fill="#FFECEC"/>

  <!-- 頭 -->
  <ellipse cx="181" cy="158" rx="72" ry="68" fill="#F9D6D6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 左腕 -->
  <ellipse cx="104" cy="255" rx="20" ry="33" fill="#F4B8C4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(18 104 255)"/>

  <!-- 右腕 -->
  <ellipse cx="260" cy="252" rx="20" ry="33" fill="#F4B8C4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-15 260 252)"/>

  <!-- 左足 -->
  <ellipse cx="148" cy="330" rx="26" ry="18" fill="#F4B8C4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 右足 -->
  <ellipse cx="218" cy="333" rx="26" ry="18" fill="#F4B8C4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 耳の内側 (前) -->
  <ellipse cx="120" cy="97" rx="13" ry="50" fill="#FFCDE0" stroke="none" transform="rotate(-12 120 97)"/>
  <ellipse cx="242" cy="94" rx="13" ry="52" fill="#FFCDE0" stroke="none" transform="rotate(10 242 94)"/>

  <!-- 左目 -->
  <ellipse cx="158" cy="152" rx="13" ry="15" fill="#2d263c"/>
  <circle cx="162" cy="147" r="4" fill="white"/>

  <!-- 右目 (ちょっとズレてゆるい感じ) -->
  <ellipse cx="207" cy="150" rx="12" ry="14" fill="#2d263c"/>
  <circle cx="211" cy="145" r="4" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="183" cy="170" rx="5" ry="4" fill="#C97090"/>

  <!-- 口 (Vの字っぽく) -->
  <path d="M173 180 Q183 190 194 180" stroke="#C97090" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 左ほっぺ -->
  <ellipse cx="138" cy="170" rx="20" ry="16" fill="#F08098" opacity="0.75"/>

  <!-- 右ほっぺ -->
  <ellipse cx="229" cy="168" rx="20" ry="16" fill="#F08098" opacity="0.75"/>

  <!-- 胸元の渦巻き模様 -->
  <path d="M183 238 Q191 228 183 222 Q174 216 167 225 Q161 234 170 241 Q181 250 190 240" stroke="#E08098" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 頭のつむじ (ちょこんと) -->
  <path d="M181 95 Q185 85 181 78 Q177 85 181 95" stroke="#C97090" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>