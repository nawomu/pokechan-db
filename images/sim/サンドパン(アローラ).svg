<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.白い体毛のずんぐりボディ 2.背中に長い氷の刃(とげ)が並ぶ 3.頭の両脇にも短い氷のとげ 4.白い丸耳・黒い目・青い鼻 5.鋭い爪の手足 -->

  <!-- しっぽ(後ろ・氷のとげ) -->
  <path d="M 250 262 Q 296 250 306 202 Q 312 180 298 192 Q 286 214 266 224 Q 256 234 250 262 Z" fill="#EAF6FB" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 背中の長い氷のとげ -->
  <polygon points="118,150 128,104 138,150 149,96 160,150 171,92 182,150 193,92 204,150 215,96 226,150 237,104 246,150" fill="#EAF6FB" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- あし -->
  <ellipse cx="150" cy="300" rx="28" ry="35" fill="#DDF2FA" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="216" cy="300" rx="28" ry="35" fill="#DDF2FA" stroke="#2d263c" stroke-width="7"/>
  <path d="M130 325 L124 340 M145 331 L145 346 M162 327 L167 341" stroke="#2d263c" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M196 325 L192 340 M211 331 L211 346 M230 327 L234 341" stroke="#2d263c" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- 体 -->
  <ellipse cx="180" cy="215" rx="85" ry="95" fill="#DDF2FA" stroke="#2d263c" stroke-width="8"/>
  <ellipse cx="180" cy="238" rx="50" ry="58" fill="#FAFEFF" stroke="#2d263c" stroke-width="6"/>

  <!-- うで -->
  <ellipse cx="95" cy="222" rx="25" ry="45" fill="#DDF2FA" stroke="#2d263c" stroke-width="7" transform="rotate(-15 95 222)"/>
  <ellipse cx="266" cy="222" rx="25" ry="45" fill="#DDF2FA" stroke="#2d263c" stroke-width="7" transform="rotate(15 266 222)"/>
  <path d="M74 256 L64 266 M85 266 L79 279 M100 261 L97 276" stroke="#2d263c" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M286 256 L296 266 M275 266 L281 279 M260 261 L263 276" stroke="#2d263c" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- 頭 -->
  <circle cx="180" cy="120" r="62" fill="#DDF2FA" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭の氷のとげ -->
  <polygon points="150,55 158,22 166,55" fill="#EAF6FB" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="195,55 203,19 211,55" fill="#EAF6FB" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 耳 -->
  <circle cx="128" cy="80" r="24" fill="#DDF2FA" stroke="#2d263c" stroke-width="7"/>
  <circle cx="232" cy="80" r="24" fill="#DDF2FA" stroke="#2d263c" stroke-width="7"/>
  <circle cx="128" cy="83" r="12" fill="#8FD4EC"/>
  <circle cx="232" cy="83" r="12" fill="#8FD4EC"/>

  <!-- 口まわり -->
  <ellipse cx="180" cy="150" rx="38" ry="26" fill="#FAFEFF" stroke="#2d263c" stroke-width="7"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="153" rx="6" ry="4" fill="#3A7CA5"/>

  <!-- 目 -->
  <circle cx="150" cy="105" r="8" fill="#2d263c"/>
  <circle cx="210" cy="105" r="8" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M165 166 Q180 173 195 166" stroke="#2d263c" stroke-width="6" stroke-linecap="round" fill="none"/>
</svg>
