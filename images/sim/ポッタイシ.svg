  <ellipse cx="160" cy="128" rx="13" ry="14" fill="white" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="162" cy="130" rx="8" ry="9" fill="#1a1a2e"/>
  <ellipse cx="164" cy="126" rx="3" ry="3" fill="white"/>

  <!-- 右目 -->
  <ellipse cx="200" cy="128" rx="13" ry="14" fill="white" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="202" cy="130" rx="8" ry="9" fill="#1a1a2e"/>
  <ellipse cx="204" cy="126" rx="3" ry="3" fill="white"/>

  <!-- くちばし -->
  <polygon points="168,145 192,145 180,165" fill="#3a3a3a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- ほっぺ -->
  <ellipse cx="147" cy="145" rx="9" ry="7" fill="#7fc8e8" opacity="0.6"/>
  <ellipse cx="213" cy="145" rx="9" ry="7" fill="#7fc8e8" opacity="0.6"/>
