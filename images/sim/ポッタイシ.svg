<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尻尾 -->
  <ellipse cx="180" cy="300" rx="20" ry="12" fill="#1e4a73" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- マントのような背中の羽根(左) -->
  <path d="M120,175 C95,200 88,240 100,270 L128,255 C120,225 122,195 132,175 Z" fill="#1e4a73" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- マントのような背中の羽根(右) -->
  <path d="M240,175 C265,200 272,240 260,270 L232,255 C240,225 238,195 228,175 Z" fill="#1e4a73" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(胴体) -->
  <ellipse cx="180" cy="235" rx="82" ry="92" fill="#3a6ea8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- おなか(白っぽい水色) -->
  <ellipse cx="178" cy="245" rx="50" ry="65" fill="#eaf6fb" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

