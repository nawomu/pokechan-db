  <!-- 右足 -->
  <ellipse cx="205" cy="320" rx="20" ry="11" fill="#f0a030" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="128" rx="62" ry="58" fill="#3a6ea8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭のトサカ(黄色い一本角) -->
