<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: ①二枚貝が上でハート型に開いた青いシルエット ②中央の開き目からのぞく丸い顔 ③貝殻上部にはさまる白い真珠 ④貝の表面に扇状の年輪(リブ)模様 ⑤薄いピンクのほっぺ -->

  <!-- 本体(貝殻・淡い水色) -->
  <path d="M180,325 C95,325 55,235 65,170 C72,125 112,98 150,112 L180,150 L210,112 C248,98 288,125 295,170 C305,235 265,325 180,325 Z"
        fill="#a9dff2" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 貝殻の筋模様(扇状リブ) 左 -->
  <path d="M172,298 Q112,255 78,182" fill="none" stroke="#6cbde0" stroke-width="6" stroke-linecap="round"/>
  <path d="M178,304 Q136,266 110,205" fill="none" stroke="#6cbde0" stroke-width="6" stroke-linecap="round"/>

  <!-- 貝殻の筋模様(扇状リブ) 右 -->
  <path d="M188,298 Q248,255 282,182" fill="none" stroke="#6cbde0" stroke-width="6" stroke-linecap="round"/>
  <path d="M182,304 Q224,266 250,205" fill="none" stroke="#6cbde0" stroke-width="6" stroke-linecap="round"/>

  <!-- 成長線(下側の弧) -->
  <path d="M108,286 Q180,308 252,286" fill="none" stroke="#6cbde0" stroke-width="6" stroke-linecap="round"/>

  <!-- 真珠(貝の開き目にはさまる) -->
  <circle cx="180" cy="122" r="33" fill="#fdf3d8" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="169" cy="109" rx="10" ry="6" fill="#ffffff"/>

  <!-- ほっぺ -->
  <ellipse cx="122" cy="216" rx="13" ry="8" fill="#ffc9d6" opacity="0.8"/>
  <ellipse cx="238" cy="216" rx="13" ry="8" fill="#ffc9d6" opacity="0.8"/>

  <!-- 目 -->
  <circle cx="150" cy="196" r="17" fill="#2d263c"/>
  <circle cx="210" cy="196" r="17" fill="#2d263c"/>
  <circle cx="144" cy="190" r="5" fill="#ffffff"/>
  <circle cx="204" cy="190" r="5" fill="#ffffff"/>

  <!-- 口(にっこり) -->
  <path d="M160,236 Q180,252 200,236" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>
