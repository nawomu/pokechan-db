  <ellipse cx="260" cy="270" rx="10" ry="5" fill="none" stroke="#d4a843" stroke-width="4" transform="rotate(15 260 270)"/>

  <!-- 頭 -->
  <ellipse cx="200" cy="148" rx="52" ry="45" fill="#222235" stroke="#2d263c" stroke-width="8"/>

