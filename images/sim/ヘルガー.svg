  <path d="M 170 133 Q 178 128 190 131" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 目(右・つり目) -->
  <ellipse cx="220" cy="143" rx="10" ry="9" fill="#cc2200" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="219" cy="143" rx="5" ry="5" fill="#1a0000"/>
  <ellipse cx="221" cy="140" rx="2" ry="2" fill="white"/>
  <!-- 眉(右) -->
  <path d="M 210 131 Q 222 128 230 133" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 口・牙 -->
  <path d="M 185 192 Q 192 200 200 200 Q 208 200 215 192" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- 牙(左) -->
  <path d="M 188 196 L 186 210 L 192 208 Z" fill="white" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>
  <!-- 牙(右) -->
  <path d="M 212 196 L 214 210 L 208 208 Z" fill="white" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 炎のにおいっぽいほっぺの模様 -->
  <ellipse cx="163" cy="158" rx="8" ry="6" fill="#cc4400" opacity="0.6"/>
  <ellipse cx="237" cy="158" rx="8" ry="6" fill="#cc4400" opacity="0.6"/>
</svg>