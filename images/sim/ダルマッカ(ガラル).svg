<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: ①だるま型の丸い白い体 ②下顔面の黒いマスク状の模様 ③目の上の赤い炎みたいな眉マーク ④お腹の氷色パッチ+紺の渦巻き紋 ⑤小さい黒耳と手足のスタブ -->

  <!-- 体(だるま型・白) -->
  <ellipse cx="180" cy="228" rx="100" ry="90" fill="#f4f2ee" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 手(体の横のスタブ) -->
  <ellipse cx="86" cy="222" rx="22" ry="28" fill="#e2ded4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="274" cy="222" rx="22" ry="28" fill="#e2ded4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足(下のスタブ) -->
  <ellipse cx="138" cy="304" rx="24" ry="18" fill="#e2ded4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="222" cy="304" rx="24" ry="18" fill="#e2ded4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭(体と一体・丸い・白) -->
  <ellipse cx="180" cy="136" rx="82" ry="78" fill="#f4f2ee" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 耳(黒い小さな耳) -->
  <ellipse cx="122" cy="82" rx="18" ry="22" fill="#2d263c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-18 122 82)"/>
  <ellipse cx="238" cy="82" rx="18" ry="22" fill="#2d263c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(18 238 82)"/>

  <!-- 下顔面の黒マスク模様 -->
  <path d="M126 148 Q180 200 234 148 Q238 178 200 194 Q180 200 160 194 Q122 178 126 148 Z" fill="#2d263c" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- お腹の氷色パッチ -->
  <ellipse cx="180" cy="258" rx="58" ry="46" fill="#cfe9f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- だるまの渦巻き紋(お腹の模様・紺) -->
  <path d="M162 232 Q178 210 196 230 Q206 248 186 262 Q168 260 160 244 Q158 236 162 232 Z" fill="#3d6f9e" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M172 240 Q182 232 190 242" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 目の上の赤い炎眉マーク -->
  <path d="M118 108 Q134 92 152 104" fill="none" stroke="#d8382a" stroke-width="8" stroke-linecap="round"/>
  <path d="M208 104 Q226 92 242 108" fill="none" stroke="#d8382a" stroke-width="8" stroke-linecap="round"/>

  <!-- 目(白目) -->
  <ellipse cx="150" cy="122" rx="16" ry="18" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="210" cy="122" rx="16" ry="18" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 瞳(黒) -->
  <ellipse cx="150" cy="127" rx="8" ry="10" fill="#2d263c"/>
  <ellipse cx="210" cy="127" rx="8" ry="10" fill="#2d263c"/>
  <!-- 瞳のハイライト -->
  <ellipse cx="146" cy="121" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="206" cy="121" rx="3" ry="3.5" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="162" rx="6" ry="4" fill="#f4f2ee" stroke="#2d263c" stroke-width="3"/>

  <!-- 口 -->
  <path d="M165 178 Q180 186 195 178" fill="none" stroke="#f4f2ee" stroke-width="5" stroke-linecap="round"/>
</svg>
