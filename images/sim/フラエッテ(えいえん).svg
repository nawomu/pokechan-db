<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 後ろの大きな赤い花(えいえんの花) -->
  <!-- 花びら1 上 -->
  <ellipse cx="180" cy="108" rx="28" ry="42" fill="#e03040" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-10 180 108)"/>
  <!-- 花びら2 右上 -->
  <ellipse cx="218" cy="122" rx="28" ry="42" fill="#e03040" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(62 218 122)"/>
  <!-- 花びら3 右下 -->
  <ellipse cx="208" cy="162" rx="28" ry="40" fill="#d02a38" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(125 208 162)"/>
  <!-- 花びら4 左下 -->
  <ellipse cx="152" cy="162" rx="28" ry="40" fill="#d02a38" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-125 152 162)"/>
  <!-- 花びら5 左上 -->
  <ellipse cx="142" cy="122" rx="28" ry="42" fill="#e03040" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-62 142 122)"/>

  <!-- 花びらの白いふち(先端) -->
  <ellipse cx="180" cy="74" rx="10" ry="14" fill="#f8e8ea" stroke="none"/>
  <ellipse cx="221" cy="108" rx="10" ry="14" fill="#f8e8ea" stroke="none" transform="rotate(62 221 108)"/>
  <ellipse cx="206" cy="170" rx="10" ry="13" fill="#f8e8ea" stroke="none" transform="rotate(125 206 170)"/>
  <ellipse cx="154" cy="170" rx="10" ry="13" fill="#f8e8ea" stroke="none" transform="rotate(-125 154 170)"/>
  <ellipse cx="139" cy="108" rx="10" ry="14" fill="#f8e8ea" stroke="none" transform="rotate(-62 139 108)"/>

  <!-- 花の中心(黄色) -->
  <circle cx="180" cy="140" r="22" fill="#f5d020" stroke="#2d263c" stroke-width="6"/>
  <circle cx="180" cy="140" r="13" fill="#f8e050" stroke="none"/>

  <!-- 茎(腕のように持っている) -->
  <path d="M180 162 Q185 195 183 215" fill="none" stroke="#3a8a2a" stroke-width="7" stroke-linecap="round"/>

  <!-- ガク(下半身・萼状) -->
  <path d="M155 255 Q148 235 162 228 Q170 220 180 222 Q190 220 198 228 Q212 235 205 255 Z" fill="#4aaa30" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- ガクの葉っぱ -->
  <path d="M162 240 Q148 228 145 215 Q158 218 165 232 Z" fill="#3a9020" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M198 240 Q212 228 215 215 Q202 218 195 232 Z" fill="#3a9020" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 体(白クリーム・ふわっと丸い) -->
  <ellipse cx="180" cy="248" rx="38" ry="32" fill="#f5f0e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腕 左 (小さな葉っぱ手) -->
  <path d="M145 240 Q128 232 122 220 Q130 215 140 225 Q145 230 147 238 Z" fill="#a8d870" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 腕 右 -->
  <path d="M215 240 Q232 232 238 220 Q230 215 220 225 Q215 230 213 238 Z" fill="#a8d870" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 葉っぱの耳 左(大きい緑) -->
  <path d="M158 210 Q138 185 145 162 Q160 170 165 195 Z" fill="#5aba38" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 葉耳の葉脈 -->
  <path d="M158 207 Q150 185 149 168" fill="none" stroke="#3a8a20" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 葉っぱの耳 右 -->
  <path d="M202 210 Q222 185 215 162 Q200 170 195 195 Z" fill="#5aba38" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M202 207 Q210 185 211 168" fill="none" stroke="#3a8a20" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="218" rx="32" ry="28" fill="#f5f0e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭の上の小さな葉っぱ飾り -->
  <path d="M175 193 Q168 178 174 168 Q181 176 180 192 Z" fill="#5aba38" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M185 191 Q192 178 186 168 Q179 176 180 192 Z" fill="#5aba38" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- ほっぺ(薄ピンク) -->
  <ellipse cx="158" cy="225" rx="10" ry="7" fill="#f0a0b0" opacity="0.7"/>
  <ellipse cx="202" cy="225" rx="10" ry="7" fill="#f0a0b0" opacity="0.7"/>

  <!-- 目 左(大きな青い目) -->
  <ellipse cx="168" cy="216" rx="9" ry="10" fill="#4890e8" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="168" cy="216" rx="5" ry="6" fill="#1a5ab8"/>
  <circle cx="170" cy="213" r="2.5" fill="white"/>

  <!-- 目 右 -->
  <ellipse cx="192" cy="216" rx="9" ry="10" fill="#4890e8" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="192" cy="216" rx="5" ry="6" fill="#1a5ab8"/>
  <circle cx="194" cy="213" r="2.5" fill="white"/>

  <!-- 口(小さくかわいい) -->
  <path d="M176 228 Q180 233 184 228" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 下のひらひら(ガクの下端) -->
  <path d="M155 268 Q160 285 170 290 Q175 295 180 292 Q185 295 190 290 Q200 285 205 268" fill="#c8f0a0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M163 272 Q158 295 152 305 Q158 308 165 296 Z" fill="#b0e088" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M180 278 Q178 300 180 312 Q182 300 180 278 Z" fill="#b0e088" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M197 272 Q202 295 208 305 Q202 308 195 296 Z" fill="#b0e088" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

</svg>