<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ガラガラ(totem)の特徴:
    1. 頭にかぶった相棎の頭骨(白っぽい・ギザギザの下端・目の穴が青く光る)
    2. ずんぐりした二足歩行の体(黒っぽい灰紫)・お腹に水色の炎もようの縦線
    3. 片手に持った白い骨のクラブ・先端が青白い炎で燃えている
    4. 短くて先が丸いしっぽ(黒っぽい灰紫)
    5. 三本指の足(黒)・totem(ボス)印=まわりを飛ぶ小さな青白い光の粒(オーラ)で強調
  -->

  <!-- totemオーラ(体の周りの光の粒) -->
  <circle cx="70" cy="120" r="7" fill="#a8e6ff" stroke="#2d263c" stroke-width="3"/>
  <circle cx="300" cy="140" r="6" fill="#a8e6ff" stroke="#2d263c" stroke-width="3"/>
  <circle cx="90" cy="300" r="6" fill="#a8e6ff" stroke="#2d263c" stroke-width="3"/>
  <circle cx="286" cy="290" r="7" fill="#a8e6ff" stroke="#2d263c" stroke-width="3"/>
  <circle cx="180" cy="45" r="6" fill="#a8e6ff" stroke="#2d263c" stroke-width="3"/>

  <!-- しっぽ(体の後ろ) -->
  <path d="M130 250 Q80 270 90 312 Q112 290 146 268 Z" fill="#4a4356" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足(奥) -->
  <ellipse cx="148" cy="310" rx="32" ry="23" fill="#3a3446" stroke="#2d263c" stroke-width="7"/>
  <path d="M124 325 Q128 340 137 328" fill="#3a3446" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M148 329 Q150 344 159 331" fill="#3a3446" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 足(手前) -->
  <ellipse cx="230" cy="310" rx="32" ry="23" fill="#463f52" stroke="#2d263c" stroke-width="7"/>
  <path d="M206 325 Q210 341 220 329" fill="#463f52" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M232 330 Q235 345 244 332" fill="#463f52" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 体(胴体・totemは一回り大きめ) -->
  <path d="M112 192 Q86 246 122 300 Q180 335 256 300 Q292 246 264 192 Q230 144 188 144 Q146 144 112 192 Z"
        fill="#4a4356" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の炎もよう(水色の縦じま) -->
  <path d="M170 212 Q158 244 172 276 Q178 296 188 308 Q198 296 204 276 Q218 244 206 212 Q188 238 170 212 Z"
        fill="#8fd8f0" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 左腕(奥) -->
  <ellipse cx="114" cy="228" rx="18" ry="31" fill="#3a3446" stroke="#2d263c" stroke-width="7" transform="rotate(-18 114 228)"/>

  <!-- 骨のクラブ(棍棒・先端が青い炎) -->
  <g transform="rotate(32 278 190)">
    <path d="M270 174 Q270 158 278 158 Q286 158 286 174 L286 226 Q286 242 278 242 Q270 242 270 226 Z"
          fill="#f7f2e2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
    <circle cx="278" cy="244" r="17" fill="#f7f2e2" stroke="#2d263c" stroke-width="7"/>
    <path d="M262 158 Q266 134 256 114 Q276 122 280 100 Q288 122 302 116 Q296 136 302 158 Q288 146 280 158 Q272 146 262 158 Z"
          fill="#a8e6ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- 右腕(手前・骨を握る) -->
  <ellipse cx="266" cy="222" rx="19" ry="33" fill="#463f52" stroke="#2d263c" stroke-width="7" transform="rotate(28 266 222)"/>

  <!-- 頭にかぶった頭骨マスク -->
  <path d="M134 150 Q132 82 188 76 Q244 82 242 150 L230 168 L217 148 L204 170 L191 148 L178 170 L165 148 L152 168 Z"
        fill="#ece8e0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭骨の小さな突起(左右) -->
  <path d="M141 114 Q124 104 128 86" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M235 114 Q252 104 248 86" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 目の穴(青く光る) -->
  <circle cx="167" cy="124" r="14" fill="#2d263c"/>
  <circle cx="209" cy="124" r="14" fill="#2d263c"/>
  <circle cx="167" cy="124" r="6" fill="#7fd6ff"/>
  <circle cx="209" cy="124" r="6" fill="#7fd6ff"/>

  <!-- 頭骨の中央の縦筋 -->
  <path d="M188 88 L188 112" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
