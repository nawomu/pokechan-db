<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- Tail behind body -->
  <path d="M220 280 Q260 310 270 290 Q280 265 255 255 Q240 248 230 260 Z" fill="#e8e0f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M255 255 Q270 245 265 235 Q258 230 250 240 Z" fill="#3a2d7a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Left leg -->
  <ellipse cx="165" cy="298" rx="18" ry="12" fill="#e8e0f0" stroke="#2d263c" stroke-width="6"/>
  <!-- Right leg -->
  <ellipse cx="207" cy="302" rx="18" ry="11" fill="#e8e0f0" stroke="#2d263c" stroke-width="6"/>

  <!-- Body -->
  <ellipse cx="187" cy="248" rx="55" ry="62" fill="#f4f0f8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- Chest/belly indigo patch -->
  <ellipse cx="185" cy="258" rx="30" ry="38" fill="#3a2d7a"/>

  <!-- Arms -->
  <path d="M138 240 Q118 255 122 275 Q128 285 140 278 Q150 270 148 255 Z" fill="#e8e0f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M236 243 Q255 258 252 278 Q246 288 235 281 Q224 273 226 258 Z" fill="#e8e0f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="170" y="183" width="34" height="28" rx="10" fill="#f4f0f8" stroke="#2d263c" stroke-width="6"/>

  <!-- Head base -->
  <ellipse cx="186" cy="163" rx="58" ry="54" fill="#f4f0f8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- Left ear outer (big square-ish, open upward - female style) -->
  <path d="M128 130 Q118 75 130 55 Q142 38 162 48 Q170 95 165 130 Z" fill="#f4f0f8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Left ear inner (indigo) -->
  <path d="M133 122 Q126 82 135 64 Q143 50 158 58 Q163 90 160 122 Z" fill="#3a2d7a"/>
  <!-- Left ear eye (inner eye marking) -->
  <ellipse cx="146" cy="90" rx="11" ry="13" fill="#f4f0f8" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="146" cy="91" rx="6" ry="7" fill="#1a1060"/>
  <ellipse cx="148" cy="89" rx="2.5" ry="2.5" fill="white"/>
  <!-- left ear lashes -->
  <line x1="137" y1="80" x2="133" y2="74" stroke="#2d263c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="141" y1="77" x2="139" y2="70" stroke="#2d263c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="147" y1="77" x2="146" y2="70" stroke="#2d263c" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right ear outer -->
  <path d="M244 127 Q254 72 244 52 Q233 36 212 46 Q205 92 210 127 Z" fill="#f4f0f8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Right ear inner (indigo) -->
  <path d="M239 120 Q247 78 238 60 Q230 46 215 54 Q211 86 213 120 Z" fill="#3a2d7a"/>
  <!-- Right ear eye marking -->
  <ellipse cx="226" cy="88" rx="11" ry="13" fill="#f4f0f8" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="226" cy="89" rx="6" ry="7" fill="#1a1060"/>
  <ellipse cx="228" cy="87" rx="2.5" ry="2.5" fill="white"/>
  <!-- right ear lashes -->
  <line x1="232" y1="77" x2="237" y2="71" stroke="#2d263c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="228" y1="75" x2="230" y2="68" stroke="#2d263c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="222" y1="75" x2="222" y2="68" stroke="#2d263c" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Forehead gem -->
  <ellipse cx="186" cy="128" rx="10" ry="7" fill="#4a6ccc" stroke="#2d263c" stroke-width="3"/>
  <ellipse cx="184" cy="126" rx="3" ry="2" fill="#8aa8f0" opacity="0.7"/>

  <!-- Eyes (cut-corner almond shape, blue, haughty) -->
  <!-- Left eye -->
  <path d="M155 158 Q162 150 173 154 Q175 161 168 166 Q160 168 155 163 Z" fill="#4a6ccc" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <ellipse cx="165" cy="159" rx="4" ry="4.5" fill="#1a1060"/>
  <ellipse cx="167" cy="157" rx="1.5" ry="1.5" fill="white"/>
  <!-- Left eyelash upper -->
  <path d="M155 158 Q150 153 148 148" stroke="#2d263c" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M159 154 Q157 148 156 143" stroke="#2d263c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Right eye -->
  <path d="M199 154 Q210 150 217 157 Q217 163 210 167 Q201 167 198 161 Z" fill="#4a6ccc" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <ellipse cx="208" cy="159" rx="4" ry="4.5" fill="#1a1060"/>
  <ellipse cx="210" cy="157" rx="1.5" ry="1.5" fill="white"/>
  <!-- Right eyelash upper -->
  <path d="M217 157 Q222 152 224 147" stroke="#2d263c" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M213 153 Q215 148 216 143" stroke="#2d263c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nose (small, cat) -->
  <path d="M182 174 Q186 170 190 174 Q186 179 182 174 Z" fill="#c9b0d8" stroke="#2d263c" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Mouth (slightly smug) -->
  <path d="M183 179 Q186 184 189 179" stroke="#2d263c" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="152" cy="170" rx="10" ry="6" fill="#e8a0c8" opacity="0.55"/>
  <ellipse cx="220" cy="170" rx="10" ry="6" fill="#e8a0c8" opacity="0.55"/>

  <!-- Whiskers left -->
  <line x1="152" y1="172" x2="120" y2="168" stroke="#2d263c" stroke-width="2" stroke-linecap="round"/>
  <line x1="152" y1="175" x2="119" y2="177" stroke="#2d263c" stroke-width="2" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="220" y1="172" x2="252" y2="168" stroke="#2d263c" stroke-width="2" stroke-linecap="round"/>
  <line x1="220" y1="175" x2="253" y2="177" stroke="#2d263c" stroke-width="2" stroke-linecap="round"/>

  <!-- Collar-like neck ring (indigo) -->
  <path d="M168 192 Q186 187 204 192 Q200 205 186 207 Q172 205 168 192 Z" fill="#3a2d7a" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
</svg>