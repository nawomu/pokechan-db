<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- クルマユ特徴メモ:
  1. 丸っこい甲虫型シルエット(カブトムシ+背負い籠風のコブ)
  2. 体色は濃紺〜ダークブルー(RGB約 40,50,90)、腹側は少し明るい紺
  3. 顔まわりとツノは橙〜黄土色(RGB約 220,150,60)
  4. 頭の先に小さい橙色のツノが1本
  5. 目は小さく赤み(RGB約 200,40,40)がかった丸、口元に小さな牙2本
  -->

  <!-- 後ろ足(奥) -->
  <ellipse cx="120" cy="270" rx="20" ry="14" fill="#26304a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="240" cy="270" rx="20" ry="14" fill="#26304a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 背中のコブ(丸い甲羅の盛り上がり) -->
  <ellipse cx="180" cy="150" rx="95" ry="80" fill="#33406b" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 甲羅の分割線(左右2枚) -->
  <path d="M180 90 L180 220" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 甲羅の丸い模様(黄土のポイント) -->
  <circle cx="140" cy="140" r="14" fill="#e0a15a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="220" cy="140" r="14" fill="#e0a15a" stroke="#2d263c" stroke-width="5"/>

  <!-- 体(下半身・お腹) -->
  <ellipse cx="180" cy="235" rx="80" ry="55" fill="#3a4a78" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 前足(手前・小さめの2本) -->
  <ellipse cx="105" cy="245" rx="18" ry="26" fill="#33406b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="255" cy="245" rx="18" ry="26" fill="#33406b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 顔プレート(橙・カブトムシの顔面) -->
  <ellipse cx="180" cy="150" rx="55" ry="48" fill="#e5a95f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ツノ(頭上に1本) -->
  <path d="M180 105 L165 60 L195 60 Z" fill="#e5a95f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目(小さく赤み) -->
  <circle cx="160" cy="150" r="11" fill="#20202a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="200" cy="150" r="11" fill="#20202a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="163" cy="147" r="3" fill="#d84a3a"/>
  <circle cx="203" cy="147" r="3" fill="#d84a3a"/>

  <!-- 小さな牙(口元) -->
  <path d="M165 178 L172 190 L178 178" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M195 178 L188 190 L182 178" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
