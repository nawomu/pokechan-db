  <ellipse cx="155" cy="105" rx="22" ry="14" fill="white" fill-opacity="0.55" stroke="none" transform="rotate(-20,155,105)"/>
  <ellipse cx="168" cy="98" rx="8" ry="5" fill="white" fill-opacity="0.7" stroke="none" transform="rotate(-20,168,98)"/>

  <!-- 顔(泡の中) -->
  <!-- 目(左) -->
  <ellipse cx="158" cy="138" rx="13" ry="15" fill="white" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="160" cy="140" rx="8" ry="9" fill="#2d4a8a" stroke="none"/>
