  <ellipse cx="180" cy="222" rx="62" ry="55" fill="none" stroke="#2d263c" stroke-width="8"/>

  <!-- 水の泡(メイン・大きい球) -->
  <circle cx="180" cy="135" r="78" fill="#c2eaf7" fill-opacity="0.82" stroke="#2d263c" stroke-width="7"/>
