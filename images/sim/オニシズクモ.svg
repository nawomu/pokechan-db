  <ellipse cx="205" cy="138" rx="8" ry="9" fill="#2d4a8a" stroke="none"/>
  <circle cx="208" cy="135" r="3" fill="white"/>
  <!-- 困り眉(左) -->
  <path d="M151,124 Q160,119 168,122" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <!-- 困り眉(右) -->
  <path d="M196,121 Q204,117 212,121" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <!-- 口(小さいV字) -->
  <path d="M174,158 Q181,165 188,158" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- ほっぺ(左) -->
  <ellipse cx="147" cy="153" rx="10" ry="7" fill="#f4a0b0" fill-opacity="0.6" stroke="none"/>
  <!-- ほっぺ(右) -->
  <ellipse cx="214" cy="152" rx="10" ry="7" fill="#f4a0b0" fill-opacity="0.6" stroke="none"/>

  <!-- 体と泡をつなぐ首 -->
  <path d="M165,190 Q170,210 168,215" fill="none" stroke="#d4efe8" stroke-width="5" stroke-linecap="round"/>
  <path d="M196,190 Q191,210 193,215" fill="none" stroke="#d4efe8" stroke-width="5" stroke-linecap="round"/>

  <!-- 小さな触角ぽい突起(頭上) -->
  <path d="M163,58 Q158,42 152,30" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <circle cx="151" cy="28" r="5" fill="#7ecbe8" stroke="#2d263c" stroke-width="3"/>
  <path d="M196,57 Q202,41 208,29" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <circle cx="209" cy="27" r="5" fill="#7ecbe8" stroke="#2d263c" stroke-width="3"/>
</svg>