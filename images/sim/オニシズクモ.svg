<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ脚(左奥) -->
  <polyline points="160,220 130,255 105,285 88,310" fill="none" stroke="#e8632a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
