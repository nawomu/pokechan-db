  <circle cx="252" cy="242" r="5" fill="#c44e1a" stroke="#2d263c" stroke-width="3"/>
  <!-- 関節ぽち(左中前) -->
  <circle cx="102" cy="215" r="5" fill="#c44e1a" stroke="#2d263c" stroke-width="3"/>
  <circle cx="258" cy="216" r="5" fill="#c44e1a" stroke="#2d263c" stroke-width="3"/>
  <!-- 関節ぽち(前) -->
  <circle cx="112" cy="188" r="5" fill="#c44e1a" stroke="#2d263c" stroke-width="3"/>
  <circle cx="248" cy="188" r="5" fill="#c44e1a" stroke="#2d263c" stroke-width="3"/>

  <!-- 胴体(丸い腹部) -->
  <ellipse cx="180" cy="222" rx="62" ry="55" fill="#f5f2e8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 腹部の縞模様 -->
  <path d="M135,215 Q155,210 180,212 Q205,210 225,215" fill="none" stroke="#7ecbe8" stroke-width="5" stroke-linecap="round"/>
  <path d="M130,228 Q155,222 180,224 Q205,222 230,228" fill="none" stroke="#7ecbe8" stroke-width="5" stroke-linecap="round"/>
  <path d="M132,241 Q155,236 180,238 Q205,236 228,241" fill="none" stroke="#7ecbe8" stroke-width="5" stroke-linecap="round"/>
