  <polyline points="208,184 248,188 282,193 305,210" fill="none" stroke="#e8632a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 関節ぽち(左後) -->
  <circle cx="130" cy="255" r="5" fill="#c44e1a" stroke="#2d263c" stroke-width="3"/>
  <circle cx="232" cy="258" r="5" fill="#c44e1a" stroke="#2d263c" stroke-width="3"/>
  <!-- 関節ぽち(左中後) -->
