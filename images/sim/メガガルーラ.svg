  <ellipse cx="178" cy="230" rx="85" ry="95" fill="#B8A060" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- Belly / pouch area -->
  <ellipse cx="172" cy="245" rx="55" ry="65" fill="#E8D898" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- Pouch opening -->
  <path d="M138 245 Q145 210 172 208 Q200 210 207 245" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- Baby Kangaskhan inside pouch -->
  <ellipse cx="172" cy="238" rx="28" ry="22" fill="#C8AA68" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- Baby head -->
  <circle cx="172" cy="220" r="16" fill="#C8AA68" stroke="#2d263c" stroke-width="5"/>
  <!-- Baby ears -->
  <ellipse cx="161" cy="212" rx="7" ry="9" fill="#C8AA68" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="183" cy="212" rx="7" ry="9" fill="#C8AA68" stroke="#2d263c" stroke-width="4"/>
  <!-- Baby inner ears -->
  <ellipse cx="161" cy="212" rx="3" ry="5" fill="#E8A0A0"/>
  <ellipse cx="183" cy="212" rx="3" ry="5" fill="#E8A0A0"/>
  <!-- Baby eyes -->
  <circle cx="166" cy="219" r="4" fill="#2d263c"/>
  <circle cx="178" cy="219" r="4" fill="#2d263c"/>
  <circle cx="167" cy="218" r="1.5" fill="white"/>
  <circle cx="179" cy="218" r="1.5" fill="white"/>
  <!-- Baby smile -->
  <path d="M168 225 Q172 229 176 225" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- Left arm -->
  <path d="M100 200 Q72 215 65 250 Q68 268 82 262 Q90 240 105 225" fill="#B8A060" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Left claws -->
  <path d="M65 250 Q55 260 52 270" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M70 258 Q62 270 60 280" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M78 263 Q73 276 72 287" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- Right arm -->
  <path d="M253 195 Q278 208 290 238 Q292 258 278 255 Q268 235 250 218" fill="#B8A060" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Right claws -->
  <path d="M290 238 Q300 248 304 258" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M284 250 Q296 260 298 272" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M276 256 Q284 268 284 280" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- Legs -->
  <path d="M135 308 Q128 330 122 348" fill="#B8A060" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <path d="M215 310 Q220 332 226 348" fill="#B8A060" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <!-- Feet -->
  <path d="M115 345 Q122 355 140 352 Q148 350 145 345" fill="#9E8A5A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M220 345 Q226 355 244 352 Q252 350 248 344" fill="#9E8A5A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Neck -->
  <path d="M148 145 Q142 162 140 180" fill="#B8A060" stroke="none"/>
  <path d="M205 142 Q212 160 215 180" fill="#B8A060" stroke="none"/>
  <rect x="143" y="145" width="67" height="42" rx="8" fill="#B8A060"/>

  <!-- Head -->
  <ellipse cx="178" cy="120" rx="68" ry="62" fill="#B8A060" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- Mega Kangaskhan bone ring / horn on head -->
  <ellipse cx="178" cy="70" rx="42" ry="12" fill="none" stroke="#F0F0E8" stroke-width="11" stroke-linejoin="round"/>
  <ellipse cx="178" cy="70" rx="42" ry="12" fill="none" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <!-- Bone ring side knobs -->
  <circle cx="136" cy="70" r="9" fill="#F0F0E8" stroke="#2d263c" stroke-width="4"/>
  <circle cx="220" cy="70" r="9" fill="#F0F0E8" stroke="#2d263c" stroke-width="4"/>
  <circle cx="178" cy="58" r="7" fill="#F0F0E8" stroke="#2d263c" stroke-width="4"/>

  <!-- Ears -->
  <ellipse cx="122" cy="95" rx="18" ry="24" fill="#B8A060" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="234" cy="92" rx="18" ry="24" fill="#B8A060" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- Inner ears -->
  <ellipse cx="122" cy="96" rx="9" ry="14" fill="#D8888A"/>
  <ellipse cx="234" cy="93" rx="9" ry="14" fill="#D8888A"/>

  <!-- Face - snout -->
  <ellipse cx="178" cy="136" rx="34" ry="26" fill="#C8AA68" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- Nose -->
  <ellipse cx="178" cy="128" rx="13" ry="10" fill="#8A6840" stroke="#2d263c" stroke-width="5"/>
  <circle cx="173" cy="127" r="3" fill="#2d263c"/>
  <circle cx="183" cy="127" r="3" fill="#2d263c"/>

  <!-- Eyes - stern/intimidating look -->
  <ellipse cx="150" cy="108" rx="15" ry="13" fill="white" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="206" cy="106" rx="15" ry="13" fill="white" stroke="#2d263c" stroke-width="6"/>
  <!-- Pupils -->
  <circle cx="152" cy="110" r="7" fill="#2d263c"/>
  <circle cx="208" cy="108" r="7" fill="#2d263c"/>
  <circle cx="154" cy="108" r="2.5" fill="white"/>
  <circle cx="210" cy="106" r="2.5" fill="white"/>

  <!-- Angry eyebrows -->
  <path d="M137 98 Q150 91 162 96" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M195 94 Q207 89 220 95" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- Mouth - stern downward -->
  <path d="M163 148 Q172 143 178 144 Q184 143 194 148" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M163 148 Q158 152 162 156" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M194 148 Q199 152 196 157" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>