<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- Tail -->
  <path d="M230 270 Q270 290 280 320 Q275 335 255 330 Q240 310 225 295" fill="#9E8A5A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

