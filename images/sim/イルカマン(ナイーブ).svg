<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尾びれ(後ろ) -->
  <path d="M 255 230 C 280 200 310 190 320 170 C 330 150 305 145 285 160 C 270 140 265 125 285 115 C 300 108 295 90 270 100 C 245 110 240 145 245 170 C 248 185 250 205 255 230 Z" fill="#4aaad4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体の主部 -->
  <ellipse cx="165" cy="195" rx="120" ry="78" fill="#5bb8e8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹の白い部分 -->
  <ellipse cx="155" cy="215" rx="80" ry="48" fill="#eeeade" stroke="none"/>

  <!-- 腹の輪郭線だけ -->
  <path d="M 85 220 C 95 248 130 262 165 260 C 195 258 225 245 235 220" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 左の胸びれ -->
  <path d="M 110 230 C 80 255 55 270 45 255 C 38 242 60 225 85 215 Z" fill="#4aaad4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 右の胸びれ -->
  <path d="M 210 235 C 235 265 255 275 262 258 C 268 244 248 225 225 218 Z" fill="#4aaad4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 背びれ -->
  <path d="M 170 120 C 165 90 155 70 148 58 C 142 47 152 42 162 55 C 168 40 178 38 182 52 C 188 70 185 98 180 120 Z" fill="#3d98c2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭部 -->
  <ellipse cx="118" cy="168" rx="72" ry="68" fill="#5bb8e8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の上の突起(ナイーブ特徴・噴水口風) -->
  <path d="M 108 102 C 104 82 100 65 106 55 C 110 48 116 50 118 60 C 120 50 126 48 130 55 C 136 65 132 82 128 102 Z" fill="#5bb8e8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 突起の先端の小さい飾り(水みたいなもこもこ) -->
  <circle cx="106" cy="52" r="7" fill="#8dd4f0" stroke="#2d263c" stroke-width="4"/>
  <circle cx="119" cy="46" r="8" fill="#8dd4f0" stroke="#2d263c" stroke-width="4"/>
  <circle cx="131" cy="52" r="7" fill="#8dd4f0" stroke="#2d263c" stroke-width="4"/>

  <!-- 吻部(くちばし・口先) -->
  <path d="M 55 178 C 46 172 44 165 50 160 C 56 155 70 158 85 162 C 70 165 58 170 55 178 Z" fill="#5bb8e8" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 口 -->
  <path d="M 50 168 C 58 176 72 180 88 178" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <!-- 口角の小さなニヤリ -->
  <path d="M 88 178 C 92 176 93 172 90 170" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 左目(大きくてつぶら) -->
  <ellipse cx="98" cy="152" rx="17" ry="18" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="100" cy="154" rx="11" ry="12" fill="#1a1228"/>
  <circle cx="104" cy="149" r="4" fill="white"/>
  <circle cx="97" cy="157" r="2" fill="white"/>

  <!-- ほっぺの白い丸 -->
  <circle cx="80" cy="174" r="9" fill="#d8f0f8" stroke="#2d263c" stroke-width="3"/>

  <!-- 体の背中側の濃い色ライン -->
  <path d="M 110 120 C 140 112 185 115 230 130 C 240 134 242 140 235 142 C 210 128 175 124 140 128 C 128 130 118 128 110 120 Z" fill="#3d98c2" stroke="none"/>

  <!-- しっぽの付け根をつなぐ線 -->
  <path d="M 248 195 C 252 210 254 222 255 230" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>