<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)くすんだ茶褐色のカタツムリ胴体 2)背中に灰色の岩(鋼)の突起 3)頭から2本の触角(先が銀灰色) 4)柔らかい顔に小さな目 5)ヒスイ地方らしいごつごつ感 -->

  <!-- 背中の岩(鋼)の塊 -->
  <path d="M245,165 Q290,150 302,190 Q310,225 280,245 Q250,260 225,240 Q210,225 218,200 Q225,180 245,165 Z" fill="#8a8580" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <path d="M252,180 Q272,172 282,192 Q288,210 270,222" fill="none" stroke="#6b6660" stroke-width="5" stroke-linecap="round"/>
  <path d="M240,215 Q255,225 268,218" fill="none" stroke="#6b6660" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="260" cy="195" rx="6" ry="4" fill="#c9c4bc" opacity="0.7"/>

  <!-- 胴体(カタツムリ・柔らかい・茶褐色) -->
  <path d="M88,252 Q82,200 118,183 Q160,166 208,176 Q248,186 253,215 Q253,256 213,266 Q148,278 108,270 Q86,264 88,252 Z" fill="#a08a6c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ぬめり光沢 -->
  <ellipse cx="138" cy="212" rx="22" ry="11" fill="#c4b19a" opacity="0.7"/>

  <!-- 触角(2本・先が銀灰色) -->
  <path d="M148,178 Q136,128 126,92" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="126" cy="89" r="10" fill="#b0b0ac" stroke="#2d263c" stroke-width="6"/>
  <circle cx="123" cy="86" r="3" fill="#ffffff" opacity="0.8"/>
  <path d="M190,178 Q206,128 216,92" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="216" cy="89" r="10" fill="#b0b0ac" stroke="#2d263c" stroke-width="6"/>
  <circle cx="213" cy="86" r="3" fill="#ffffff" opacity="0.8"/>

  <!-- 左目(小) -->
  <ellipse cx="154" cy="228" rx="9" ry="11" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="156" cy="231" r="4" fill="#2d263c"/>
  <!-- 右目(小) -->
  <ellipse cx="194" cy="228" rx="9" ry="11" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="192" cy="231" r="4" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M166,252 Q174,258 183,252" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 岩の小さな破片(足元) -->
  <path d="M228,258 Q238,250 246,258 Q240,268 228,266 Z" fill="#8a8580" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 下敷きの濡れ -->
  <path d="M103,267 Q158,280 228,267" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
</svg>
