<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 影 -->
  <ellipse cx="180" cy="318" rx="95" ry="18" fill="#00000022"/>

  <!-- 脚(4本 - 後ろ2本) -->
  <path d="M108,240 Q85,258 82,278 Q90,285 102,282 Q110,272 118,262" fill="#4055a8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M252,240 Q275,258 278,278 Q270,285 258,282 Q250,272 242,262" fill="#4055a8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 脚(前2本) -->
  <path d="M120,255 Q100,272 98,295 Q108,302 120,298 Q128,285 132,270" fill="#506ac0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M240,255 Q260,272 262,295 Q252,302 240,298 Q232,285 228,270" fill="#506ac0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(六角形っぽいディスク) -->
  <path d="M90,200 Q88,165 110,148 Q135,132 180,130 Q225,132 250,148 Q272,165 270,200 Q268,238 246,258 Q220,275 180,276 Q140,275 114,258 Q92,238 90,200 Z" fill="#5870c8" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 体の光沢 -->
  <ellipse cx="180" cy="195" rx="75" ry="65" fill="#6888e0" opacity="0.5"/>

  <!-- Xマーク - 縦 -->
  <rect x="170" y="148" width="20" height="110" rx="8" fill="#C0D0FF" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- Xマーク - 横 -->
  <rect x="105" y="190" width="150" height="20" rx="8" fill="#C0D0FF" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- Xの交点 -->
  <circle cx="180" cy="200" r="22" fill="#2d263c" stroke="#2d263c" stroke-width="4"/>
  <circle cx="180" cy="200" r="15" fill="#4055a8"/>

  <!-- 4つの目(X の先端4か所 - 赤) -->
  <!-- 左 -->
  <circle cx="115" cy="200" r="12" fill="#1a1428" stroke="#2d263c" stroke-width="4"/>
  <circle cx="115" cy="200" r="7" fill="#DD2020"/>
  <circle cx="117" cy="198" r="3" fill="#FF6060" opacity="0.8"/>

  <!-- 右 -->
  <circle cx="245" cy="200" r="12" fill="#1a1428" stroke="#2d263c" stroke-width="4"/>
  <circle cx="245" cy="200" r="7" fill="#DD2020"/>
  <circle cx="247" cy="198" r="3" fill="#FF6060" opacity="0.8"/>

  <!-- 上 -->
  <circle cx="180" cy="160" r="12" fill="#1a1428" stroke="#2d263c" stroke-width="4"/>
  <circle cx="180" cy="160" r="7" fill="#DD2020"/>
  <circle cx="182" cy="158" r="3" fill="#FF6060" opacity="0.8"/>

  <!-- 下 -->
  <circle cx="180" cy="242" r="12" fill="#1a1428" stroke="#2d263c" stroke-width="4"/>
  <circle cx="180" cy="242" r="7" fill="#DD2020"/>
  <circle cx="182" cy="240" r="3" fill="#FF6060" opacity="0.8"/>

  <!-- 体の縁の金属的な光沢ライン -->
  <path d="M108,170 Q130,150 180,145 Q228,150 252,170" fill="none" stroke="#A0B0E8" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

</svg>
