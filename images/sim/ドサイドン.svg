<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- ドサイドン落書き風SVG -->

  <!-- しっぽ -->
  <ellipse cx="270" cy="255" rx="22" ry="14" fill="#c4652a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="290" cy="262" rx="13" ry="9" fill="#c4652a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 背中の岩突起(後ろ) -->
  <ellipse cx="168" cy="118" rx="18" ry="24" fill="#8a8a8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="210" cy="108" rx="15" ry="20" fill="#8a8a8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="145" cy="128" rx="13" ry="17" fill="#9a9a9a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胴体 -->
  <ellipse cx="185" cy="220" rx="88" ry="95" fill="#c4652a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹(クリーム色) -->
  <ellipse cx="185" cy="238" rx="54" ry="62" fill="#e8c98a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左腕 -->
  <ellipse cx="100" cy="215" rx="28" ry="42" fill="#b85c25" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-12 100 215)"/>
  <!-- 左手 -->
  <ellipse cx="88" cy="272" rx="32" ry="26" fill="#b85c25" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 左手の穴 -->
  <circle cx="88" cy="272" r="11" fill="#7a3b15" stroke="#2d263c" stroke-width="5"/>

  <!-- 右腕 -->
  <ellipse cx="268" cy="215" rx="28" ry="42" fill="#b85c25" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(12 268 215)"/>
  <!-- 右手 -->
  <ellipse cx="278" cy="272" rx="32" ry="26" fill="#b85c25" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右手の穴 -->
  <circle cx="278" cy="272" r="11" fill="#7a3b15" stroke="#2d263c" stroke-width="5"/>

  <!-- 左足 -->
  <ellipse cx="143" cy="306" rx="30" ry="22" fill="#b85c25" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右足 -->
  <ellipse cx="228" cy="306" rx="30" ry="22" fill="#b85c25" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="183" cy="138" rx="66" ry="62" fill="#c4652a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 顔の明るい部分(額〜顎) -->
  <ellipse cx="183" cy="148" rx="44" ry="46" fill="#d97840" stroke="none"/>

  <!-- 耳(左) -->
  <ellipse cx="122" cy="104" rx="16" ry="22" fill="#c4652a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-18 122 104)"/>
  <!-- 耳(右) -->
  <ellipse cx="244" cy="104" rx="16" ry="22" fill="#c4652a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(18 244 104)"/>

  <!-- 額の角(短い) -->
  <polygon points="183,78 176,100 190,100" fill="#8a8a8a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 鼻の角(長い・メイン) -->
  <polygon points="183,118 174,152 192,152" fill="#8a8a8a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左目 -->
  <ellipse cx="157" cy="145" rx="14" ry="12" fill="#e8c98a" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="159" cy="146" rx="7" ry="8" fill="#1a1a1a" stroke="none"/>
  <circle cx="162" cy="143" r="2.5" fill="white"/>

  <!-- 右目 -->
  <ellipse cx="208" cy="145" rx="14" ry="12" fill="#e8c98a" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="206" cy="146" rx="7" ry="8" fill="#1a1a1a" stroke="none"/>
  <circle cx="209" cy="143" r="2.5" fill="white"/>

  <!-- 鼻孔(ちょっとバカっぽく大きめ) -->
  <ellipse cx="175" cy="162" rx="7" ry="5" fill="#7a3b15" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="192" cy="162" rx="7" ry="5" fill="#7a3b15" stroke="#2d263c" stroke-width="4"/>

  <!-- 口(への字でどっしり顔に) -->
  <path d="M168 178 Q183 172 198 178" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 肩の岩突起(前面) -->
  <ellipse cx="132" cy="172" rx="17" ry="14" fill="#8a8a8a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="236" cy="172" rx="17" ry="14" fill="#8a8a8a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
</svg>