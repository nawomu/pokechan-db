<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
<g id="mega-burst"><circle cx="180" cy="180" r="172" fill="#fff3c0"/><polygon points="180,180 450.0,180.0 444.8,232.7" fill="#ffd96b"/><polygon points="180,180 429.4,283.3 404.5,330.0" fill="#ffb13d"/><polygon points="180,180 370.9,370.9 330.0,404.5" fill="#ffd96b"/><polygon points="180,180 283.3,429.4 232.7,444.8" fill="#ffb13d"/><polygon points="180,180 180.0,450.0 127.3,444.8" fill="#ffd96b"/><polygon points="180,180 76.7,429.4 30.0,404.5" fill="#ffb13d"/><polygon points="180,180 -10.9,370.9 -44.5,330.0" fill="#ffd96b"/><polygon points="180,180 -69.4,283.3 -84.8,232.7" fill="#ffb13d"/><polygon points="180,180 -90.0,180.0 -84.8,127.3" fill="#ffd96b"/><polygon points="180,180 -69.4,76.7 -44.5,30.0" fill="#ffb13d"/><polygon points="180,180 -10.9,-10.9 30.0,-44.5" fill="#ffd96b"/><polygon points="180,180 76.7,-69.4 127.3,-84.8" fill="#ffb13d"/><polygon points="180,180 180.0,-90.0 232.7,-84.8" fill="#ffd96b"/><polygon points="180,180 283.3,-69.4 330.0,-44.5" fill="#ffb13d"/><polygon points="180,180 370.9,-10.9 404.5,30.0" fill="#ffd96b"/><polygon points="180,180 429.4,76.7 444.8,127.3" fill="#ffb13d"/><circle cx="180" cy="180" r="120" fill="#fff3c0" opacity="0.55"/></g>
  <!-- 後ろの氷翼（左・大） -->
  <polygon points="180,160 60,80 30,170 100,200" fill="#b8eef8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="180,160 40,110 20,60 90,120" fill="#cdf3fc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 後ろの氷翼（右・大） -->
  <polygon points="180,160 300,80 330,170 260,200" fill="#b8eef8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="180,160 320,110 340,60 270,120" fill="#cdf3fc" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 肩の氷スパイク（左） -->
  <polygon points="115,175 70,150 85,195" fill="#d6f5ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 肩の氷スパイク（右） -->
  <polygon points="245,175 290,150 275,195" fill="#d6f5ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体（着物・白） -->
  <ellipse cx="180" cy="220" rx="68" ry="80" fill="#f0f6ff" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 着物の帯（赤紫） -->
  <rect x="130" y="235" width="100" height="22" rx="8" fill="#c0405a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 裾のフェードアウト部分（着物の下部、ぼんやり消える幽霊） -->
  <ellipse cx="175" cy="298" rx="48" ry="18" fill="#dceeff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="183" cy="318" rx="30" ry="11" fill="#c9e6f8" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 水色の前飾り（胸元） -->
  <polygon points="163,215 180,195 197,215 188,238 172,238" fill="#7acfe4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前の小翼（左） -->
  <polygon points="130,200 90,175 105,220 135,225" fill="#aee8f5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 前の小翼（右） -->
  <polygon points="230,200 270,175 255,220 225,225" fill="#aee8f5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔（白い楕円） -->
  <ellipse cx="180" cy="155" rx="58" ry="52" fill="#f5faff" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭の逆三角形飾り（赤紫） -->
  <polygon points="180,90 148,130 212,130" fill="#c0405a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 飾りの縦ライン -->
  <line x1="180" y1="92" x2="180" y2="128" stroke="#2d263c" stroke-width="4"/>

  <!-- 頭の氷結晶（小） -->
  <polygon points="180,72 173,90 180,86 187,90" fill="#d6f5ff" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- ほっぺ（左・ピンク） -->
  <ellipse cx="145" cy="168" rx="14" ry="10" fill="#f4b8c8" opacity="0.85"/>
  <!-- ほっぺ（右・ピンク） -->
  <ellipse cx="215" cy="168" rx="14" ry="10" fill="#f4b8c8" opacity="0.85"/>

  <!-- 目（左）吊り上がった細目 -->
  <path d="M150,152 Q158,143 167,152" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="158" cy="157" rx="7" ry="8" fill="#2d263c"/>
  <ellipse cx="160" cy="155" rx="2.5" ry="2.5" fill="white"/>

  <!-- 目（右）吊り上がった細目 -->
  <path d="M193,152 Q202,143 210,152" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="202" cy="157" rx="7" ry="8" fill="#2d263c"/>
  <ellipse cx="204" cy="155" rx="2.5" ry="2.5" fill="white"/>

  <!-- 口（小さくちょっとへの字） -->
  <path d="M174,175 Q180,180 186,175" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 氷の装飾ドット（体） -->
  <circle cx="162" cy="252" r="4" fill="#7acfe4" stroke="#2d263c" stroke-width="3"/>
  <circle cx="198" cy="252" r="4" fill="#7acfe4" stroke="#2d263c" stroke-width="3"/>

  <!-- 手（腕・左） -->
  <ellipse cx="125" cy="245" rx="14" ry="9" fill="#f0f6ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-20,125,245)"/>
  <!-- 手（腕・右） -->
  <ellipse cx="235" cy="245" rx="14" ry="9" fill="#f0f6ff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(20,235,245)"/>
</svg>