<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- タマザラシの特徴:
  1. 丸いボールみたいな体(薄い水色) 2. 顔まわりの濃い青のマスク模様(たれ目風の丸い縁取り)
  3. 小さい前ヒレと後ろの小さい尾ビレ 4. お腹の白いまるい模様
  5. 黒くて丸い大きな目と小さい黒い鼻、ヒゲ3本ずつ -->

  <!-- 後ろ: 尾ビレ -->
  <ellipse cx="180" cy="300" rx="34" ry="18" fill="#7fc7e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ足ヒレ左右 -->
  <ellipse cx="108" cy="270" rx="26" ry="34" fill="#a9dcf2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="252" cy="270" rx="26" ry="34" fill="#a9dcf2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 前ヒレ左右 -->
  <ellipse cx="80" cy="200" rx="24" ry="40" transform="rotate(-18 80 200)" fill="#8fd0ec" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="280" cy="200" rx="24" ry="40" transform="rotate(18 280 200)" fill="#8fd0ec" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体(丸いボール型) -->
  <circle cx="180" cy="200" r="110" fill="#b7e4f7" stroke="#2d263c" stroke-width="8"/>

  <!-- お腹の白い模様 -->
  <ellipse cx="180" cy="235" rx="62" ry="55" fill="#fdfdfb" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔の濃い青マスク(たれ目風) -->
  <path d="M 108 150
           Q 100 110 140 95
           Q 180 82 220 95
           Q 260 110 252 150
           Q 250 190 210 200
           Q 180 208 150 200
           Q 110 190 108 150 Z"
        fill="#5b9fd6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目(白目) -->
  <circle cx="150" cy="150" r="24" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="210" cy="150" r="24" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>

  <!-- 黒目 -->
  <circle cx="153" cy="154" r="13" fill="#2d263c"/>
  <circle cx="213" cy="154" r="13" fill="#2d263c"/>
  <circle cx="157" cy="149" r="4" fill="#ffffff"/>
  <circle cx="217" cy="149" r="4" fill="#ffffff"/>

  <!-- 鼻 -->
  <path d="M 172 178 L 188 178 L 180 192 Z" fill="#2d263c" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- ヒゲ左 -->
  <path d="M 130 190 L 90 182" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 128 200 L 88 200" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- ヒゲ右 -->
  <path d="M 230 190 L 270 182" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 232 200 L 272 200" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 口 -->
  <path d="M 168 198 Q 180 205 192 198" stroke="#2d263c" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- ほっぺの丸み -->
  <circle cx="128" cy="182" r="10" fill="#f7b8c2" opacity="0.7"/>
  <circle cx="232" cy="182" r="10" fill="#f7b8c2" opacity="0.7"/>
</svg>
