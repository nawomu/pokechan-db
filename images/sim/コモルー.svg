<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- コモルーの特徴:
    1. ずんぐりむっくりの丸い二足歩行の体
    2. 緑色の体に、頭・首まわり・背中にトゲトゲの茶色い装甲(スパイク)
    3. お腹と顔まわりはクリーム色(黄土色)
    4. 頭のてっぺんに大きな一本の角のようなトゲ
    5. つぶらな丸い目と小さいまる口、丸い手足に小さな爪
  -->

  <!-- 後ろ:影 -->
  <ellipse cx="180" cy="322" rx="92" ry="16" fill="#3a3350" opacity="0.18" stroke="none"/>

  <!-- 尻尾側の背びれトゲ(後ろ) -->
  <path d="M96 210 L60 178 L104 196 Z" fill="#8a6a3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M264 210 L300 178 L256 196 Z" fill="#8a6a3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 足 -->
  <ellipse cx="132" cy="300" rx="34" ry="26" fill="#5f9e4a" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="228" cy="300" rx="34" ry="26" fill="#5f9e4a" stroke="#2d263c" stroke-width="7"/>
  <path d="M118 306 q14 14 28 0" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M214 306 q14 14 28 0" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- 胴体(緑・丸っこい) -->
  <ellipse cx="180" cy="220" rx="98" ry="90" fill="#5f9e4a" stroke="#2d263c" stroke-width="8"/>

  <!-- お腹(クリーム色) -->
  <ellipse cx="180" cy="238" rx="60" ry="58" fill="#f3e4bf" stroke="#2d263c" stroke-width="7"/>

  <!-- 背中〜肩のトゲ(装甲) -->
  <path d="M96 178 L70 140 L118 160 Z" fill="#8a6a3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M264 178 L290 140 L242 160 Z" fill="#8a6a3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M150 140 L140 108 L168 132 Z" fill="#8a6a3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M210 140 L220 108 L192 132 Z" fill="#8a6a3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 腕 -->
  <ellipse cx="94" cy="232" rx="28" ry="40" fill="#5f9e4a" stroke="#2d263c" stroke-width="7" transform="rotate(-18 94 232)"/>
  <ellipse cx="266" cy="232" rx="28" ry="40" fill="#5f9e4a" stroke="#2d263c" stroke-width="7" transform="rotate(18 266 232)"/>
  <ellipse cx="82" cy="270" rx="20" ry="16" fill="#f3e4bf" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="278" cy="270" rx="20" ry="16" fill="#f3e4bf" stroke="#2d263c" stroke-width="6"/>
  <path d="M70 272 l-8 8 M82 278 l-3 10 M94 272 l4 9" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M290 272 l8 8 M278 278 l3 10 M266 272 l-4 9" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 頭部(緑) -->
  <circle cx="180" cy="132" r="76" fill="#5f9e4a" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭頂の大きな一本トゲ(角) -->
  <path d="M180 56 L156 12 L204 12 Z" fill="#8a6a3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭まわりの小トゲ(左右) -->
  <path d="M110 118 L74 100 L112 148 Z" fill="#8a6a3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M250 118 L286 100 L248 148 Z" fill="#8a6a3f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 顔まわり(クリーム色パッチ) -->
  <ellipse cx="180" cy="150" rx="54" ry="42" fill="#f3e4bf" stroke="#2d263c" stroke-width="7"/>

  <!-- 目 -->
  <circle cx="156" cy="140" r="15" fill="#fff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="204" cy="140" r="15" fill="#fff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="158" cy="142" r="7" fill="#2d263c"/>
  <circle cx="206" cy="142" r="7" fill="#2d263c"/>

  <!-- 口 -->
  <path d="M166 172 q14 12 28 0" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
