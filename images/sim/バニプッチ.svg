<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 特徴メモ:
  1. 体色=淡い水色〜白のアイスクリーム玉(単玉・進化後バイバニラより小さい丸いフォルム)
  2. コーン(タン色・ワッフル格子模様)の上に丸い頭がのった一頭身シルエット
  3. 頭頂に小さい氷のとんがり(ソフトクリームの渦の芯)
  4. 顔は正面向き・つぶらな目+ほっぺの赤み・口から白い息(氷の吐息)
  5. 両脇に小さい氷の結晶の「うで」が飛び出ている
  -->

  <!-- コーン(後ろ・下半身) -->
  <polygon points="180,300 140,205 220,205" fill="#D9A94A" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <line x1="152" y1="222" x2="172" y2="292" stroke="#93670F" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="215" x2="180" y2="296" stroke="#93670F" stroke-width="3" stroke-linecap="round"/>
  <line x1="208" y1="222" x2="188" y2="292" stroke="#93670F" stroke-width="3" stroke-linecap="round"/>
  <line x1="147" y1="232" x2="213" y2="232" stroke="#93670F" stroke-width="3"/>
  <line x1="143" y1="250" x2="217" y2="250" stroke="#93670F" stroke-width="3"/>

  <!-- 左うで(氷の結晶) -->
  <g transform="translate(104,205) rotate(-25)">
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#7ECDE8" stroke-width="6" stroke-linecap="round"/>
    <line x1="-13" y1="-8" x2="13" y2="8" stroke="#7ECDE8" stroke-width="6" stroke-linecap="round"/>
    <line x1="-13" y1="8" x2="13" y2="-8" stroke="#7ECDE8" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- 右うで(氷の結晶) -->
  <g transform="translate(256,205) rotate(25)">
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#7ECDE8" stroke-width="6" stroke-linecap="round"/>
    <line x1="-13" y1="-8" x2="13" y2="8" stroke="#7ECDE8" stroke-width="6" stroke-linecap="round"/>
    <line x1="-13" y1="8" x2="13" y2="-8" stroke="#7ECDE8" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- アイス玉(体・大きい丸) -->
  <ellipse cx="180" cy="185" rx="78" ry="72" fill="#CDEBF7" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- アイス玉の内側ハイライト帯 -->
  <ellipse cx="180" cy="150" rx="60" ry="42" fill="#E4F6FF" stroke="none" opacity="0.8"/>

  <!-- 頭頂の氷のとんがり(ソフトクリームの芯) -->
  <path d="M150,120 Q152,88 180,78 Q206,70 202,100 Q198,80 180,84 Q160,90 162,116 Z" fill="#EEF9FF" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M180,84 Q192,64 186,48 Q182,36 176,36 Q170,37 171,52 Q172,66 180,84 Z" fill="#F7FCFF" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 目(白目) -->
  <ellipse cx="150" cy="185" rx="17" ry="19" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="210" cy="185" rx="17" ry="19" fill="white" stroke="#2d263c" stroke-width="5"/>
  <!-- 目(黒目) -->
  <circle cx="153" cy="187" r="9" fill="#1a1a2e"/>
  <circle cx="213" cy="187" r="9" fill="#1a1a2e"/>
  <!-- 目のハイライト -->
  <circle cx="157" cy="182" r="3.5" fill="white"/>
  <circle cx="217" cy="182" r="3.5" fill="white"/>

  <!-- ほっぺの赤み -->
  <ellipse cx="134" cy="205" rx="11" ry="7" fill="#F4AABB" opacity="0.7"/>
  <ellipse cx="226" cy="205" rx="11" ry="7" fill="#F4AABB" opacity="0.7"/>

  <!-- 口 -->
  <path d="M168,215 Q180,224 192,215" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 口から出る氷の息 -->
  <path d="M180,224 Q178,238 168,246" fill="none" stroke="#C8EEFA" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

  <!-- 周りの雪の点々 -->
  <circle cx="72" cy="150" r="4" fill="#A8D8EC" opacity="0.8"/>
  <circle cx="290" cy="140" r="5" fill="#A8D8EC" opacity="0.8"/>
  <circle cx="296" cy="230" r="3.5" fill="#C0E4F0" opacity="0.7"/>

</svg>
