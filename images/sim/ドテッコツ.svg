  <!-- fists -->
  <circle cx="82" cy="72" r="24" fill="#5A6B87" stroke="#2d263c" stroke-width="7"/>
  <circle cx="278" cy="72" r="24" fill="#5A6B87" stroke="#2d263c" stroke-width="7"/>
  <!-- knuckle lines -->
  <path d="M70,68 L94,68" fill="none" stroke="#47566F" stroke-width="5" stroke-linecap="round"/>
  <path d="M266,68 L290,68" fill="none" stroke="#47566F" stroke-width="5" stroke-linecap="round"/>
  <!-- girder beam -->
  <path d="M64,50 L296,50 C300,50 302,54 302,60 L302,80 C302,86 300,90 296,90 L64,90 C60,90 58,86 58,80 L58,60 C58,54 60,50 64,50 Z" fill="#9BA3AC" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- beam top/bottom flange lines -->
  <path d="M64,58 L296,58" fill="none" stroke="#6B7178" stroke-width="5" stroke-linecap="round"/>
  <path d="M64,82 L296,82" fill="none" stroke="#6B7178" stroke-width="5" stroke-linecap="round"/>
  <!-- truss zigzag -->
  <path d="M96,58 L118,82 L140,58 L162,82 L184,58 L206,82 L228,58 L250,82" fill="none" stroke="#6B7178" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- rivets -->
  <circle cx="72" cy="70" r="6" fill="#6B7178" stroke="#2d263c" stroke-width="4"/>
  <circle cx="288" cy="70" r="6" fill="#6B7178" stroke="#2d263c" stroke-width="4"/>
  <!-- neck -->
  <path d="M164,120 L196,120 L192,140 L168,140 Z" fill="#5A6B87" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- head -->
  <ellipse cx="180" cy="150" rx="50" ry="46" fill="#5A6B87" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- mohawk -->
  <path d="M148,110 C150,84 160,64 168,52 C170,68 176,80 180,86 C184,80 190,68 192,52 C200,64 210,84 212,110 C198,100 182,96 168,100 C160,102 154,106 148,110 Z" fill="#E4592D" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M172,72 L176,96" fill="none" stroke="#C24A20" stroke-width="5" stroke-linecap="round"/>
  <path d="M188,72 L184,96" fill="none" stroke="#C24A20" stroke-width="5" stroke-linecap="round"/>
  <!-- eyebrow ridge -->
  <path d="M148,138 C160,128 172,126 180,130 C188,126 200,128 212,138" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="163" cy="152" rx="6" ry="8" fill="#221A2C"/>
  <ellipse cx="197" cy="152" rx="6" ry="8" fill="#221A2C"/>
  <!-- mouth -->
  <path d="M164,178 C172,184 188,184 196,178" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <!-- cheek shading -->
  <path d="M138,160 C136,168 138,176 144,182" fill="none" stroke="#47566F" stroke-width="5" stroke-linecap="round"/>
  <path d="M222,160 C224,168 222,176 216,182" fill="none" stroke="#47566F" stroke-width="5" stroke-linecap="round"/>
</svg>
