<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- feet -->
  <ellipse cx="150" cy="330" rx="28" ry="12" fill="#47566F" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="210" cy="330" rx="28" ry="12" fill="#47566F" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- legs -->
  <path d="M138,250 C128,278 130,305 140,322 L166,322 C172,300 172,275 166,250 Z" fill="#5A6B87" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M194,250 C188,275 188,300 194,322 L220,322 C230,305 232,278 222,250 Z" fill="#5A6B87" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
