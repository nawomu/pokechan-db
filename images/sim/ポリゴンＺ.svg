<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ: 尻尾の突起 -->
  <polygon points="180,235 150,290 170,270 180,300 195,265 210,285" fill="#2f6fd0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体: ブロック状シルエット -->
  <polygon points="130,90 210,80 245,120 250,190 235,255 200,290 160,290 120,255 105,185 95,130"
    fill="#f2a8c6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体の下部・脚のブロック -->
  <polygon points="140,270 165,268 170,300 150,305 138,290" fill="#f2a8c6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="195,268 222,270 225,290 205,305 192,298" fill="#f2a8c6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 左うで(青い羽状) -->
  <polygon points="105,150 60,140 55,175 95,190" fill="#2f6fd0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右うで(青い羽状) -->
  <polygon points="245,150 292,138 298,172 250,190" fill="#2f6fd0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 胸のギザギザ青模様(グリッチ感) -->
  <polygon points="145,150 175,140 165,175 190,165 175,205 150,210 160,180" fill="#1f3f78" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <polygon points="200,150 225,145 232,175 210,190" fill="#1f3f78" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頭のとがり(アンテナ状) -->
  <polygon points="150,95 165,50 178,92" fill="#f2a8c6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="195,90 210,48 222,95" fill="#f2a8c6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="165" cy="48" r="6" fill="#2f6fd0" stroke="#2d263c" stroke-width="5"/>
  <circle cx="211" cy="46" r="6" fill="#2f6fd0" stroke="#2d263c" stroke-width="5"/>

  <!-- 顔: バイザー状の赤い目 -->
  <polygon points="120,150 240,150 235,175 125,175" fill="#e0233c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="150" y="153" width="24" height="18" fill="#2d263c"/>
  <rect x="195" y="153" width="24" height="18" fill="#2d263c"/>

  <!-- ほお・くちばし風の小さいライン -->
  <polygon points="165,200 195,200 185,215 175,215" fill="#1f3f78" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
</svg>
