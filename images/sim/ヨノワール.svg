<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴1: フワッと浮くローブ状のシルエット、下端はギザギザの裾 -->
  <!-- 特徴2: 濃い紫〜黒の体色 -->
  <!-- 特徴3: 頭の両脇にカールしたリボン状の突起(耳のような渦巻き) -->
  <!-- 特徴4: 赤く光る目、口は無し -->
  <!-- 特徴5: 胸元に赤い宝石模様＋薄紫の縦ライン模様、首元に薄紫のえり飾り -->

  <!-- 後ろ: 淡いオーラの影 -->
  <ellipse cx="180" cy="185" rx="95" ry="115" fill="#2a2140" opacity="0.35"/>

  <!-- 左のカール(耳・巻き毛) -->
  <path d="M148,100 C118,88 88,62 96,38 C102,20 126,20 132,38 C137,52 122,58 113,50 C108,45 112,40 118,42"
        fill="#5b3f86" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="107" cy="42" r="7" fill="#5b3f86" stroke="#2d263c" stroke-width="6"/>

  <!-- 右のカール(耳・巻き毛) -->
  <path d="M212,100 C242,88 272,62 264,38 C258,20 234,20 228,38 C223,52 238,58 247,50 C252,45 248,40 242,42"
        fill="#5b3f86" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="253" cy="42" r="7" fill="#5b3f86" stroke="#2d263c" stroke-width="6"/>

  <!-- 体(ローブ)本体: 上は丸く、下はギザギザの裾 -->
  <path d="M180,58
           C228,58 258,92 258,150
           C258,196 250,232 254,268
           L234,248 L214,278 L194,252 L180,282
           L166,252 L146,278 L126,248 L106,268
           C110,232 102,196 102,150
           C102,92 132,58 180,58 Z"
        fill="#3b2a5c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 裾のギザギザの影(立体感) -->
  <path d="M126,248 L146,278 L140,270 L128,255 Z" fill="#2a1e45"/>
  <path d="M166,252 L180,282 L176,272 L170,258 Z" fill="#2a1e45"/>
  <path d="M214,278 L194,252 L200,258 L208,272 Z" fill="#2a1e45"/>

  <!-- 首元のえり飾り(薄紫) -->
  <path d="M138,108 C160,128 200,128 222,108 C220,124 200,138 180,138 C160,138 140,124 138,108 Z"
        fill="#9b7dc4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体の縦ライン模様 -->
  <path d="M155,150 C150,190 152,230 148,262" fill="none" stroke="#6b4a99" stroke-width="5" stroke-linecap="round"/>
  <path d="M205,150 C210,190 208,230 212,262" fill="none" stroke="#6b4a99" stroke-width="5" stroke-linecap="round"/>

  <!-- 胸の宝石模様 -->
  <path d="M180,190 L196,208 L180,228 L164,208 Z" fill="#ff4d6d" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M180,196 L188,208 L180,220" fill="none" stroke="#ffb3c1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 左目(赤く光る) -->
  <path d="M138,142 C148,132 166,132 172,144 C164,150 146,150 138,142 Z"
        fill="#ff3355" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- 右目(赤く光る) -->
  <path d="M222,142 C212,132 194,132 188,144 C196,150 214,150 222,142 Z"
        fill="#ff3355" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 体のハイライト(丸みの光沢) -->
  <ellipse cx="150" cy="120" rx="18" ry="26" fill="#ffffff" opacity="0.15"/>
</svg>
