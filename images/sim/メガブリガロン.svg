  <ellipse cx="180" cy="268" rx="40" ry="40" fill="#d4c47a" stroke="none"/>

  <!-- 前足(左) - 太くて短い -->
  <rect x="85" y="248" width="44" height="52" rx="18" fill="#3a6b3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
