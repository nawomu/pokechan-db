  <polygon points="90,130 72,48 108,120" fill="#1e4a1e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 背中トゲ2(左中) -->
  <polygon points="112,105 100,22 138,98" fill="#1e4a1e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 背中トゲ3(中央左) -->
  <polygon points="145,88 140,12 165,82" fill="#264e26" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 背中トゲ4(中央) -->
  <polygon points="175,80 178,8 200,78" fill="#1e4a1e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 背中トゲ5(中央右) -->
  <polygon points="205,88 218,14 225,84" fill="#264e26" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 背中トゲ6(右中) -->
  <polygon points="235,102 252,20 258,96" fill="#1e4a1e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 背中トゲ7(右後ろ) -->
  <polygon points="258,122 278,45 282,118" fill="#1e4a1e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 後ろ足(左) -->
  <ellipse cx="118" cy="292" rx="34" ry="22" fill="#3a6b3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 後ろ足(右) -->
  <ellipse cx="248" cy="296" rx="34" ry="22" fill="#3a6b3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体の本体 -->
  <ellipse cx="180" cy="240" rx="92" ry="82" fill="#3a6b3a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹(クリーム色) -->
  <ellipse cx="180" cy="256" rx="58" ry="58" fill="#e8d89a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
