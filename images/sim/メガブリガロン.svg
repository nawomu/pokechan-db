  <!-- フード右 -->
  <polygon points="224,168 240,122 208,162" fill="#e8e8d0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔の地肌 -->
  <ellipse cx="180" cy="182" rx="42" ry="40" fill="#7ab87a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 目(左) つり上がった強面 -->
  <ellipse cx="162" cy="174" rx="11" ry="9" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="164" cy="173" rx="4" ry="3" fill="#ffffff"/>
  <!-- 眉(左) つり上がり -->
  <path d="M148,162 Q162,155 170,160" fill="none" stroke="#1e4a1e" stroke-width="6" stroke-linecap="round"/>

  <!-- 目(右) -->
  <ellipse cx="198" cy="174" rx="11" ry="9" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="200" cy="173" rx="4" ry="3" fill="#ffffff"/>
  <!-- 眉(右) つり上がり -->
  <path d="M192,160 Q198,155 212,162" fill="none" stroke="#1e4a1e" stroke-width="6" stroke-linecap="round"/>

  <!-- 鼻(丸い) -->
  <ellipse cx="180" cy="188" rx="9" ry="7" fill="#2d5e2d" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="177" cy="186" rx="2.5" ry="2" fill="#4a8a4a"/>

  <!-- 口(強面だけどちょっとゆるい) -->
  <path d="M166,198 Q180,208 194,198" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ(少し赤み) -->
  <ellipse cx="150" cy="190" rx="10" ry="7" fill="#c88a8a" opacity="0.5"/>
  <ellipse cx="210" cy="190" rx="10" ry="7" fill="#c88a8a" opacity="0.5"/>
</svg>