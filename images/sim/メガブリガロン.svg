<g id="mega-burst"><circle cx="180" cy="180" r="172" fill="#fff3c0"/><polygon points="180,180 450.0,180.0 444.8,232.7" fill="#ffd96b"/><polygon points="180,180 429.4,283.3 404.5,330.0" fill="#ffb13d"/><polygon points="180,180 370.9,370.9 330.0,404.5" fill="#ffd96b"/><polygon points="180,180 283.3,429.4 232.7,444.8" fill="#ffb13d"/><polygon points="180,180 180.0,450.0 127.3,444.8" fill="#ffd96b"/><polygon points="180,180 76.7,429.4 30.0,404.5" fill="#ffb13d"/><polygon points="180,180 -10.9,370.9 -44.5,330.0" fill="#ffd96b"/><polygon points="180,180 -69.4,283.3 -84.8,232.7" fill="#ffb13d"/><polygon points="180,180 -90.0,180.0 -84.8,127.3" fill="#ffd96b"/><polygon points="180,180 -69.4,76.7 -44.5,30.0" fill="#ffb13d"/><polygon points="180,180 -10.9,-10.9 30.0,-44.5" fill="#ffd96b"/><polygon points="180,180 76.7,-69.4 127.3,-84.8" fill="#ffb13d"/><polygon points="180,180 180.0,-90.0 232.7,-84.8" fill="#ffd96b"/><polygon points="180,180 283.3,-69.4 330.0,-44.5" fill="#ffb13d"/><polygon points="180,180 370.9,-10.9 404.5,30.0" fill="#ffd96b"/><polygon points="180,180 429.4,76.7 444.8,127.3" fill="#ffb13d"/><circle cx="180" cy="180" r="120" fill="#fff3c0" opacity="0.55"/></g>
  <!-- 背景の大きなトゲ殻(後ろレイヤー) -->
  <!-- 背中の巨大トゲ群 -->
  <ellipse cx="178" cy="155" rx="105" ry="88" fill="#2a5c2a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
