  <ellipse cx="107" cy="308" rx="28" ry="16" fill="#2d5e2d" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前足(右) -->
  <rect x="231" y="248" width="44" height="52" rx="18" fill="#3a6b3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
