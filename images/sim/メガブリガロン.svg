  <polygon points="272,248 292,190 252,240" fill="#1e4a1e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 右手のひら -->
  <ellipse cx="253" cy="308" rx="28" ry="16" fill="#2d5e2d" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- しっぽ(短い) -->
  <ellipse cx="180" cy="328" rx="20" ry="12" fill="#2d5e2d" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 首/頭の土台 -->
  <ellipse cx="180" cy="178" rx="54" ry="48" fill="#5a8f5a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭のトゲフード(白いトゲ状) -->
  <!-- フード左 -->
  <polygon points="134,168 122,120 156,162" fill="#e8e8d0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- フード中央左 -->
  <polygon points="155,155 148,102 175,152" fill="#f0f0e0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- フード中央 -->
  <polygon points="180,150 178,95 202,150" fill="#e8e8d0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- フード中央右 -->
