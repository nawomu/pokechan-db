<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろの甲羅スパイク（背景） -->
  <polygon points="130,95 118,45 142,80" fill="#2e6b2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="155,82 148,30 168,72" fill="#2e6b2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="182,78 180,25 198,70" fill="#2e6b2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="208,83 212,32 225,75" fill="#2e6b2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="228,95 238,46 248,85" fill="#2e6b2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体(胴体) -->
  <ellipse cx="182" cy="230" rx="82" ry="95" fill="#c8a96e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹部クリーム色 -->
  <ellipse cx="182" cy="245" rx="52" ry="65" fill="#e8d9b0" stroke="#2d263c" stroke-width="5"/>

  <!-- 背中の甲羅本体 -->
  <ellipse cx="182" cy="195" rx="85" ry="75" fill="#3a8a3a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 頭部甲羅(帽子風) -->
  <ellipse cx="182" cy="118" rx="70" ry="42" fill="#3a8a3a" stroke="#2d263c" stroke-width="8"/>
  <!-- 帽子のひさし -->
  <path d="M112,130 Q182,160 252,130 Q252,145 182,152 Q112,145 112,130Z" fill="#2e6b2e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 頭部甲羅スパイク(上面) -->
  <polygon points="155,98 148,60 168,90" fill="#2e6b2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="182,92 180,52 200,86" fill="#2e6b2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="208,98 212,60 226,88" fill="#2e6b2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 顔(肌色) -->
  <ellipse cx="182" cy="155" rx="46" ry="42" fill="#d4a96e" stroke="#2d263c" stroke-width="7"/>

  <!-- 白いほっぺの毛 -->
  <ellipse cx="148" cy="162" rx="18" ry="14" fill="#f0eee0" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="216" cy="162" rx="18" ry="14" fill="#f0eee0" stroke="#2d263c" stroke-width="5"/>

  <!-- 目 -->
  <ellipse cx="166" cy="148" rx="10" ry="11" fill="white" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="198" cy="148" rx="10" ry="11" fill="white" stroke="#2d263c" stroke-width="4"/>
  <circle cx="169" cy="150" r="6" fill="#2d263c"/>
  <circle cx="201" cy="150" r="6" fill="#2d263c"/>
  <!-- 目のハイライト -->
  <circle cx="171" cy="147" r="2.5" fill="white"/>
  <circle cx="203" cy="147" r="2.5" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="183" cy="165" rx="7" ry="5" fill="#b07040" stroke="#2d263c" stroke-width="3"/>

  <!-- 口(ちょっとへの字) -->
  <path d="M170,175 Q183,182 196,175" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 左腕 -->
  <ellipse cx="105" cy="235" rx="28" ry="38" fill="#c8a96e" stroke="#2d263c" stroke-width="8" transform="rotate(-12,105,235)"/>
  <!-- 左爪 -->
  <path d="M82,255 Q70,268 75,278" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M88,265 Q78,280 82,290" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M96,270 Q90,287 93,298" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 右腕 -->
  <ellipse cx="259" cy="235" rx="28" ry="38" fill="#c8a96e" stroke="#2d263c" stroke-width="8" transform="rotate(12,259,235)"/>
  <!-- 右爪 -->
  <path d="M278,255 Q290,268 285,278" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M272,265 Q282,280 278,290" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M264,270 Q270,287 267,298" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 左脚 -->
  <ellipse cx="152" cy="315" rx="30" ry="26" fill="#c8a96e" stroke="#2d263c" stroke-width="8"/>
  <!-- 左足先 -->
  <ellipse cx="142" cy="338" rx="26" ry="12" fill="#b07040" stroke="#2d263c" stroke-width="6"/>

  <!-- 右脚 -->
  <ellipse cx="212" cy="315" rx="30" ry="26" fill="#c8a96e" stroke="#2d263c" stroke-width="8"/>
  <!-- 右足先 -->
  <ellipse cx="222" cy="338" rx="26" ry="12" fill="#b07040" stroke="#2d263c" stroke-width="6"/>

  <!-- ほっぺの茶色模様 -->
  <ellipse cx="148" cy="162" rx="9" ry="7" fill="#b07040" opacity="0.45"/>
  <ellipse cx="216" cy="162" rx="9" ry="7" fill="#b07040" opacity="0.45"/>

  <!-- 甲羅の線模様(ちょっとした質感) -->
  <path d="M135,115 Q182,108 229,115" fill="none" stroke="#2e6b2e" stroke-width="4" opacity="0.6"/>
  <path d="M128,128 Q182,120 236,128" fill="none" stroke="#2e6b2e" stroke-width="4" opacity="0.6"/>
</svg>