<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
    1. 細長い胴体で背が低い(イタチ・マングースのような伏せ姿勢)
    2. 体色はクリーム色(薄黄色)がベース
    3. 目の周りに焦げ茶色の仮面のような模様、耳の先も焦げ茶色
    4. 鼻先はとがっていて黒い、耳は小さく丸い
    5. 尻尾は太くふわっとしていて体と同じクリーム色
  -->

  <!-- 尻尾(後ろ・ふわっと大きい) -->
  <path d="M275,225 Q330,210 320,140 Q315,110 285,100 Q305,150 275,190 Z" fill="#f6e2a4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 胴体(長い楕円) -->
  <ellipse cx="205" cy="235" rx="105" ry="52" fill="#f6e2a4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- お腹の明るい部分 -->
  <ellipse cx="215" cy="262" rx="65" ry="20" fill="#fdf3d4" stroke="#2d263c" stroke-width="4"/>

  <!-- 後ろ脚(奥・遠い方) -->
  <rect x="255" y="270" width="30" height="55" rx="14" fill="#e3c77e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="270" cy="328" rx="19" ry="9" fill="#8a5a2e" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 後ろ脚(手前) -->
  <rect x="222" y="272" width="26" height="50" rx="12" fill="#f6e2a4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="235" cy="325" rx="18" ry="8" fill="#8a5a2e" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 前脚(奥・遠い方) -->
  <rect x="150" y="268" width="26" height="58" rx="13" fill="#e3c77e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="163" cy="329" rx="18" ry="9" fill="#8a5a2e" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 前脚(手前) -->
  <rect x="118" y="272" width="28" height="54" rx="14" fill="#f6e2a4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="132" cy="329" rx="19" ry="8" fill="#8a5a2e" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頭 -->
  <ellipse cx="110" cy="175" rx="68" ry="58" fill="#f6e2a4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- とがった鼻先(マズル) -->
  <ellipse cx="55" cy="196" rx="27" ry="18" fill="#f6e2a4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 耳(奥) -->
  <path d="M75,130 Q65,92 90,82 Q107,98 96,136 Z" fill="#f6e2a4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M84,110 Q83,94 90,86 Q98,96 92,118 Z" fill="#8a5a2e" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 耳(手前) -->
  <path d="M130,128 Q146,88 170,90 Q176,112 156,136 Z" fill="#f6e2a4" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M144,112 Q150,96 160,92 Q164,104 150,122 Z" fill="#8a5a2e" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目のまわりの仮面模様 -->
  <path d="M75,148 Q112,126 148,150 Q142,180 108,184 Q75,178 75,148 Z" fill="#8a5a2e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(白目) -->
  <ellipse cx="91" cy="160" rx="14" ry="15" fill="#ffffff" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="129" cy="158" rx="13" ry="14" fill="#ffffff" stroke="#2d263c" stroke-width="4"/>
  <!-- ひとみ -->
  <circle cx="94" cy="164" r="7" fill="#2d263c"/>
  <circle cx="132" cy="161" r="6" fill="#2d263c"/>
  <!-- 目のハイライト -->
  <circle cx="97" cy="160" r="2.5" fill="#ffffff"/>
  <circle cx="134" cy="157" r="2" fill="#ffffff"/>

  <!-- 鼻 -->
  <ellipse cx="33" cy="193" rx="10" ry="7" fill="#2d263c" stroke="#2d263c" stroke-width="2"/>

  <!-- 口もと -->
  <path d="M33,201 Q28,212 40,215" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M46,210 Q60,220 78,208" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
