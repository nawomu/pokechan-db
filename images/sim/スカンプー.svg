<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 紫〜濃紫のずんぐりした体、クリーム色の腹の縞
  2. 顔の中心を上から下に走るクリーム色の縞(額から鼻先まで)
  3. しっぽが大きくモコモコで、先端がスプレーのノズルのように丸く黒っぽい・紫とクリームの縞
  4. 丸くて小さい耳、つぶらな黒目、赤いまんまるの鼻
  5. 四本の短いずんぐりした脚、たれ気味の丸い体型
  -->

  <!-- 後ろ:しっぽ(モコモコ・スプレーのノズル状の先端) -->
  <path d="M 240 210
           C 300 190, 320 140, 300 95
           C 288 68, 258 55, 240 65
           C 255 80, 265 105, 258 130
           C 268 120, 285 118, 292 100
           C 296 130, 280 165, 250 190
           C 262 200, 260 215, 240 225 Z"
        fill="#6b4a8f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- しっぽの縞(クリーム) -->
  <path d="M 252 100 C 262 90, 278 88, 288 100 C 280 112, 264 114, 252 100 Z"
        fill="#f3e3b8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- しっぽ先端のノズル(黒っぽい丸) -->
  <ellipse cx="272" cy="80" rx="20" ry="17" fill="#3c3450" stroke="#2d263c" stroke-width="6"/>

  <!-- 脚(4本・短くずんぐり) -->
  <ellipse cx="128" cy="298" rx="26" ry="24" fill="#5b3f7d" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="190" cy="303" rx="27" ry="24" fill="#5b3f7d" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="235" cy="290" rx="24" ry="22" fill="#5b3f7d" stroke="#2d263c" stroke-width="7"/>

  <!-- 胴体(丸みのある紫のかたまり) -->
  <path d="M 95 235
           C 90 180, 130 150, 190 150
           C 250 148, 285 185, 278 240
           C 272 285, 225 300, 175 298
           C 125 297, 100 275, 95 235 Z"
        fill="#6b4a8f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- お腹のクリーム色の縞 -->
  <path d="M 150 190 C 140 220, 142 260, 165 285
           C 185 292, 200 288, 210 275
           C 195 250, 192 215, 185 188
           C 172 182, 160 183, 150 190 Z"
        fill="#f3e3b8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 頭(丸い) -->
  <circle cx="178" cy="128" r="72" fill="#6b4a8f" stroke="#2d263c" stroke-width="8"/>

  <!-- 耳(小さい丸) -->
  <ellipse cx="128" cy="72" rx="18" ry="16" fill="#5b3f7d" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="228" cy="72" rx="18" ry="16" fill="#5b3f7d" stroke="#2d263c" stroke-width="6"/>

  <!-- 顔中央のクリーム色の縞(額から鼻先) -->
  <path d="M 178 62 C 165 90, 163 120, 172 150
           C 178 158, 186 158, 190 150
           C 196 120, 193 90, 182 62 Z"
        fill="#f3e3b8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目(黒い丸) -->
  <circle cx="150" cy="118" r="9" fill="#2d263c"/>
  <circle cx="208" cy="118" r="9" fill="#2d263c"/>

  <!-- 鼻(赤い丸) -->
  <circle cx="178" cy="150" r="12" fill="#e05a4f" stroke="#2d263c" stroke-width="5"/>
</svg>
