  <!-- 左腕 -->
  <path d="M 162 205 Q 138 215 130 238" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- 左手(緑) -->
  <ellipse cx="127" cy="243" rx="13" ry="10" fill="#3db86a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(15 127 243)"/>

