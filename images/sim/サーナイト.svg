  <ellipse cx="183" cy="236" rx="42" ry="18" fill="#3db86a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胴体(白) -->
  <ellipse cx="183" cy="202" rx="34" ry="46" fill="#f9f9f9" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

