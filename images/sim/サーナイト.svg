  <path d="M 204 207 Q 228 218 236 240" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- 右手(緑) -->
  <ellipse cx="239" cy="246" rx="13" ry="10" fill="#3db86a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-12 239 246)"/>

  <!-- 首 -->
  <rect x="175" y="156" width="18" height="26" rx="8" fill="#f2f2f2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭の緑帽子(ベース) -->
  <ellipse cx="183" cy="130" rx="52" ry="56" fill="#3db86a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 顔(白い部分) -->
  <ellipse cx="186" cy="140" rx="36" ry="32" fill="#f6f6f6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 額のホーン(赤) -->
  <path d="M 178 102 Q 183 82 188 102" fill="#e84040" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 目(左) — 切れ長 -->
  <ellipse cx="173" cy="138" rx="9" ry="5" fill="#2d263c" stroke="#2d263c" stroke-width="2"/>
  <ellipse cx="173" cy="137" rx="4" ry="3" fill="#c04040"/>
  <!-- 目のハイライト(左) -->
  <circle cx="175" cy="136" r="1.5" fill="white"/>

  <!-- 目(右) — 少し上がってる(ゆるさ) -->
  <ellipse cx="199" cy="136" rx="9" ry="5" fill="#2d263c" stroke="#2d263c" stroke-width="2"/>
  <ellipse cx="199" cy="135" rx="4" ry="3" fill="#c04040"/>
  <!-- 目のハイライト(右) -->
  <circle cx="201" cy="134" r="1.5" fill="white"/>

  <!-- 小さな口(ちょっとゆがんでる) -->
  <path d="M 181 152 Q 186 156 192 153" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- 帽子の緑の前垂れ(左) -->
  <path d="M 138 128 Q 128 148 135 165 Q 148 172 158 162 Q 155 142 158 128" fill="#3db86a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 帽子の緑の前垂れ(右) -->
  <path d="M 228 126 Q 238 146 232 163 Q 219 171 210 160 Q 212 140 210 126" fill="#3db86a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 足(緑の突起・左) -->
  <ellipse cx="162" cy="322" rx="22" ry="12" fill="#3db86a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(8 162 322)"/>
  <!-- 足(緑の突起・右) -->
  <ellipse cx="204" cy="325" rx="22" ry="11" fill="#3db86a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-6 204 325)"/>
