  <!-- 背中の翼フィン(右) -->
  <ellipse cx="218" cy="144" rx="16" ry="48" fill="#3db86a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(18 218 144)"/>

