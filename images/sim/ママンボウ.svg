<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 背びれ的な左右の小ヒレ(体の後ろに少し覗く) -->
  <path d="M60 195 Q28 178 22 198 Q32 220 66 208Z" fill="#e8558f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M300 195 Q332 178 338 198 Q328 220 294 208Z" fill="#e8558f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭の上のリボン状ヒレ -->
  <path d="M180 96 Q148 48 108 30 Q116 66 144 92Z" fill="#e8558f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M180 96 Q212 48 252 30 Q244 66 216 92Z" fill="#e8558f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="180" cy="92" r="15" fill="#e8558f" stroke="#2d263c" stroke-width="6"/>

  <!-- 体(平たい丸い胴体) -->
  <ellipse cx="180" cy="200" rx="126" ry="106" fill="#ffc2d6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹の淡いパッチ -->
  <ellipse cx="180" cy="220" rx="78" ry="66" fill="#ffe4ef" opacity="0.6"/>

  <!-- 体の模様(濃いピンクの斑) -->
  <ellipse cx="115" cy="150" rx="13" ry="9" fill="#e8558f" opacity="0.55"/>
  <ellipse cx="245" cy="150" rx="13" ry="9" fill="#e8558f" opacity="0.55"/>
  <ellipse cx="130" cy="255" rx="12" ry="8" fill="#e8558f" opacity="0.5"/>
  <ellipse cx="230" cy="255" rx="12" ry="8" fill="#e8558f" opacity="0.5"/>

  <!-- 口の下のヒゲ状ヒレ(手前) -->
  <path d="M160 262 Q128 276 122 302 Q150 296 168 274Z" fill="#e8558f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M200 262 Q232 276 238 302 Q210 296 192 274Z" fill="#e8558f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目(左) -->
  <circle cx="138" cy="150" r="23" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="143" cy="150" r="13" fill="#3a2545"/>
  <circle cx="148" cy="144" r="4" fill="#ffffff"/>

  <!-- 目(右) -->
  <circle cx="222" cy="150" r="23" fill="#ffffff" stroke="#2d263c" stroke-width="5"/>
  <circle cx="217" cy="150" r="13" fill="#3a2545"/>
  <circle cx="212" cy="144" r="4" fill="#ffffff"/>

  <!-- まつ毛 -->
  <path d="M120 132 Q112 122 106 128" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <path d="M240 132 Q248 122 254 128" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- ほっぺ -->
  <ellipse cx="105" cy="180" rx="14" ry="9" fill="#ff8fae" opacity="0.6"/>
  <ellipse cx="255" cy="180" rx="14" ry="9" fill="#ff8fae" opacity="0.6"/>

  <!-- タラコ唇(特徴の分厚い唇) -->
  <ellipse cx="180" cy="205" rx="48" ry="30" fill="#d43f6a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M136 205 Q180 218 224 205" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="165" cy="195" rx="14" ry="7" fill="#ef7a9c" opacity="0.7"/>
</svg>
