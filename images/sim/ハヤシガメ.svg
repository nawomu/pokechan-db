<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. ずんぐりした緑色のカメの体(手足は太くて短い)
  2. 背中に茶色いドーム状の甲羅(こげ茶の縁取り模様)
  3. 甲羅の上に小さな木(こんもりした緑の茂み+茶色い幹)が生えている
  4. 黄色い目に黒目玉・短い鼻先に小さな鼻の穴
  5. 太い4本足の先に小さな爪が2本ずつ
  -->

  <!-- 後ろ足(奥) -->
  <ellipse cx="108" cy="272" rx="26" ry="22" fill="#4f8a4a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="252" cy="272" rx="26" ry="22" fill="#4f8a4a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体(緑) -->
  <ellipse cx="180" cy="228" rx="98" ry="70" fill="#63a25a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 前足 -->
  <ellipse cx="100" cy="290" rx="28" ry="24" fill="#5a9752" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="260" cy="290" rx="28" ry="24" fill="#5a9752" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 爪 -->
  <path d="M86 306 l-6 10 M100 310 l0 12 M114 306 l6 10" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M246 306 l-6 10 M260 310 l0 12 M274 306 l6 10" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 甲羅(茶色ドーム) -->
  <path d="M70 220 C70 130 130 90 195 90 C260 90 300 140 292 210 C285 250 250 258 195 258 C130 258 70 260 70 220 Z"
        fill="#a9784f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 甲羅の縁取り模様(こげ茶) -->
  <path d="M85 210 C85 145 135 108 195 108 C250 108 282 150 276 205"
        fill="none" stroke="#7a4f2c" stroke-width="9" stroke-linecap="round"/>
  <!-- 甲羅の模様の丸 -->
  <circle cx="150" cy="150" r="14" fill="#7a4f2c"/>
  <circle cx="205" cy="140" r="14" fill="#7a4f2c"/>
  <circle cx="245" cy="175" r="13" fill="#7a4f2c"/>
  <circle cx="120" cy="185" r="12" fill="#7a4f2c"/>

  <!-- 甲羅の上の木(茂み) -->
  <path d="M175 100 C160 100 150 112 150 120 C150 108 138 100 128 108 C120 114 122 128 132 132 C124 140 128 154 142 156 C136 168 148 182 165 178 C170 190 190 190 196 178 C212 184 224 168 216 156 C230 152 232 136 220 130 C228 122 222 108 210 108 C210 96 194 88 182 96 C178 96 176 98 175 100 Z"
        fill="#3f8a44" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 幹 -->
  <path d="M178 150 L178 178" stroke="#6b4a2a" stroke-width="10" stroke-linecap="round"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="260" rx="58" ry="46" fill="#63a25a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 目 -->
  <ellipse cx="155" cy="248" rx="15" ry="17" fill="#f4d23a" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="207" cy="248" rx="15" ry="17" fill="#f4d23a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="157" cy="250" r="6" fill="#2d263c"/>
  <circle cx="209" cy="250" r="6" fill="#2d263c"/>

  <!-- 鼻先/鼻の穴 -->
  <path d="M164 282 C170 292 190 292 196 282" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <circle cx="172" cy="278" r="3" fill="#2d263c"/>
  <circle cx="188" cy="278" r="3" fill="#2d263c"/>
</svg>
