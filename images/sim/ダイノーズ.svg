  <circle cx="55" cy="124" r="7" fill="#cc3d3d" stroke="#2d263c" stroke-width="3"/>

  <!-- 後ろ: 小磁石(右) -->
  <line x1="270" y1="150" x2="300" y2="130" stroke="#5a5568" stroke-width="8" stroke-linecap="round"/>
  <circle cx="305" cy="124" r="18" fill="#8f8974" stroke="#2d263c" stroke-width="7"/>
  <circle cx="305" cy="124" r="7" fill="#cc3d3d" stroke="#2d263c" stroke-width="3"/>

  <!-- 後ろ: 小磁石(頭上) -->
