<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail -->
  <path d="M 255 225 C 276 208, 282 236, 261 241 C 250 243, 247 226, 255 225 Z" fill="#d9a86a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- back legs (peeking behind body) -->
  <rect x="108" y="272" width="28" height="48" rx="12" fill="#c2925c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="228" y="272" width="28" height="48" rx="12" fill="#c2925c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- body -->
  <ellipse cx="180" cy="225" rx="92" ry="78" fill="#d9a86a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- belly patch -->
  <ellipse cx="180" cy="252" rx="50" ry="36" fill="#f0d9b5" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- front legs -->
  <rect x="123" y="276" width="30" height="52" rx="13" fill="#d9a86a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="207" y="276" width="30" height="52" rx="13" fill="#d9a86a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- hooves -->
  <ellipse cx="138" cy="326" rx="17" ry="10" fill="#3d2b1f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="222" cy="326" rx="17" ry="10" fill="#3d2b1f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- head -->
  <ellipse cx="180" cy="145" rx="78" ry="68" fill="#d9a86a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- ears -->
  <path d="M 118 100 L 98 54 L 141 96 Z" fill="#b9854f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 242 100 L 262 54 L 219 96 Z" fill="#b9854f" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- dark facial mask -->
  <path d="M 122 112 C 140 94, 160 132, 180 104 C 200 132, 220 94, 238 112 C 234 148, 208 158, 180 152 C 152 158, 126 148, 122 112 Z" fill="#5c3a21" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- eyes -->
  <circle cx="155" cy="141" r="9" fill="#241c15"/>
  <circle cx="205" cy="141" r="9" fill="#241c15"/>
  <!-- snout -->
  <ellipse cx="180" cy="176" rx="38" ry="27" fill="#f0c9a0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- nostrils -->
  <ellipse cx="168" cy="173" rx="6" ry="9" fill="#3d2b1f"/>
  <ellipse cx="192" cy="173" rx="6" ry="9" fill="#3d2b1f"/>
  <!-- mouth -->
  <path d="M 165 197 Q 180 207 195 197" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- tusks -->
  <path d="M 150 191 L 137 171 L 159 186 Z" fill="#fff8ec" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M 210 191 L 223 171 L 201 186 Z" fill="#fff8ec" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
</svg>
