  <circle cx="212" cy="108" r="12" fill="#e63946" stroke="#2d263c" stroke-width="5"/>
  <circle cx="148" cy="108" r="4" fill="#22202a"/>
  <circle cx="212" cy="108" r="4" fill="#22202a"/>

