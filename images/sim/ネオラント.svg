<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ: アンテナ+発光器(頭より奥) -->
  <path d="M150 70 Q130 30 110 20" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="108" cy="18" r="16" fill="#ffe066" stroke="#2d263c" stroke-width="7"/>
  <circle cx="103" cy="13" r="5" fill="#fff7d6"/>

  <path d="M205 70 Q222 28 240 16" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <circle cx="243" cy="14" r="14" fill="#ffe066" stroke="#2d263c" stroke-width="7"/>
  <circle cx="238" cy="9" r="5" fill="#fff7d6"/>

  <!-- 尾びれ(体の後ろ) -->
  <path d="M300 200 Q335 185 340 210 Q335 235 300 225 Z" fill="#8fd9f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 胸びれ 左右 -->
  <path d="M95 220 Q55 210 50 245 Q75 260 105 240 Z" fill="#8fd9f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M260 220 Q300 210 305 245 Q280 260 250 240 Z" fill="#8fd9f0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 体: 丸くぷっくりした提灯アンコウシルエット -->
  <path d="M180 55
           C 260 55 310 110 310 190
           C 310 275 250 320 180 320
           C 110 320 50 275 50 190
           C 50 110 100 55 180 55 Z"
        fill="#3b63c4" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お腹(明るい水色) -->
  <path d="M180 150
           C 235 150 268 195 268 240
           C 268 288 228 312 180 312
           C 132 312 92 288 92 240
           C 92 195 125 150 180 150 Z"
        fill="#bdeeff" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- お腹の縦模様ライン -->
  <path d="M150 165 Q140 240 150 300" fill="none" stroke="#8fd9f0" stroke-width="7" stroke-linecap="round"/>
  <path d="M210 165 Q220 240 210 300" fill="none" stroke="#8fd9f0" stroke-width="7" stroke-linecap="round"/>

  <!-- 目 -->
  <circle cx="140" cy="200" r="26" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="145" cy="205" r="13" fill="#2d263c"/>
  <circle cx="150" cy="199" r="4" fill="#ffffff"/>

  <circle cx="220" cy="200" r="26" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="215" cy="205" r="13" fill="#2d263c"/>
  <circle cx="210" cy="199" r="4" fill="#ffffff"/>

  <!-- 口 -->
  <path d="M158 255 Q180 270 202 255" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
</svg>
