  <ellipse cx="203" cy="138" rx="9" ry="9" fill="#80ccff"/>
  <ellipse cx="203" cy="138" rx="5" ry="6" fill="#b8eeff"/>
  <ellipse cx="201" cy="135" rx="2.5" ry="2.5" fill="white" opacity="0.9"/>

  <!-- 目の青白い光(外側グロー) -->
