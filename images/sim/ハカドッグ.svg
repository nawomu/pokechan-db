  <path d="M180 138 L180 148 M176 142 L184 142" fill="none" stroke="#555555" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ゴーストオーラ(前面・薄) -->
  <ellipse cx="155" cy="138" rx="20" ry="18" fill="#80ccff" opacity="0.08"/>
  <ellipse cx="203" cy="138" rx="20" ry="18" fill="#80ccff" opacity="0.08"/>

