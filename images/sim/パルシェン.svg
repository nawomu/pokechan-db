<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. 二枚貝(シェル)が体全体を覆う紫色の殻・左右対称
  2. 殻のふちから生える大きな白い巨大トゲ(左右に長く突き出す)+殻上部の小さいトゲの列
  3. 殻の間から水色の丸い顔がのぞく
  4. 口から下に伸びる2本の白く鋭い巨大な牙
  5. 小さくつぶらな目・下側にも紫の殻(土台)がのぞく -->

  <!-- 後ろ側の小さいトゲ(奥・殻の陰から) -->
  <polygon points="70,140 33,104 90,172" fill="#c9a3e6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="290,140 327,104 270,172" fill="#c9a3e6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 下側の殻(土台) -->
  <ellipse cx="180" cy="258" rx="98" ry="44" fill="#6a3480" stroke="#2d263c" stroke-width="7"/>

  <!-- 上側の殻(メインの体) -->
  <path d="M70,212 Q70,80 180,64 Q290,80 290,212 Q290,234 250,240 Q180,254 110,240 Q70,234 70,212 Z" fill="#7b3fa3" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 殻の模様(すじ) -->
  <path d="M100,152 Q180,122 260,152" fill="none" stroke="#5c2e78" stroke-width="6" stroke-linecap="round"/>
  <path d="M90,192 Q180,170 270,192" fill="none" stroke="#5c2e78" stroke-width="6" stroke-linecap="round"/>

  <!-- 上部の小さいトゲの列 -->
  <polygon points="95,160 120,146 76,112" fill="#f5f0e6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="135,112 160,97 127,57" fill="#f5f0e6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="165,74 195,74 180,26" fill="#f5f0e6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="200,97 225,112 233,57" fill="#f5f0e6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="240,146 265,160 284,112" fill="#f5f0e6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左右の大きな巨大トゲ(パルシェンの象徴) -->
  <polygon points="72,196 78,227 26,206" fill="#f5f0e6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="288,196 282,227 334,206" fill="#f5f0e6" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 下の小さめトゲ -->
  <polygon points="78,227 90,246 46,240" fill="#f5f0e6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="282,227 270,246 314,240" fill="#f5f0e6" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 殻の間からのぞく水色の顔 -->
  <ellipse cx="180" cy="206" rx="62" ry="52" fill="#a9e4f8" stroke="#2d263c" stroke-width="8"/>

  <!-- 2本の巨大な牙 -->
  <path d="M156,238 Q148,270 128,292 Q150,286 166,258 Q168,246 156,238Z" fill="#fdfaf3" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M204,238 Q212,270 232,292 Q210,286 194,258 Q192,246 204,238Z" fill="#fdfaf3" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 目 -->
  <ellipse cx="160" cy="196" rx="9" ry="11" fill="#241f30"/>
  <ellipse cx="204" cy="196" rx="9" ry="11" fill="#241f30"/>

  <!-- 口 -->
  <path d="M160,226 Q180,236 200,226" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
