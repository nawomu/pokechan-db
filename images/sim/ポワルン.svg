<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 影っぽい足元 -->
  <ellipse cx="182" cy="318" rx="55" ry="12" fill="#c8c0d4" opacity="0.45"/>

  <!-- 体（ずんぐりした丸）-->
  <path d="M108 230 C100 190 105 155 130 135 C148 120 168 115 182 116 C197 115 218 120 236 135 C260 155 264 192 258 232 C252 268 226 295 183 298 C140 298 114 265 108 230 Z" fill="#d8d4e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- お腹の薄い色 -->
  <ellipse cx="183" cy="230" rx="42" ry="50" fill="#eeeaf8" stroke="none"/>

  <!-- 左腕 -->
  <path d="M116 195 C95 185 82 196 84 213 C86 228 102 232 115 222" fill="#d8d4e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 右腕 -->
  <path d="M250 195 C272 184 285 196 283 212 C280 228 265 231 252 221" fill="#d8d4e8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭の雲パーツ（後ろ側） -->
  <circle cx="155" cy="105" r="30" fill="#f0eef8" stroke="#2d263c" stroke-width="6"/>
  <circle cx="213" cy="100" r="28" fill="#f0eef8" stroke="#2d263c" stroke-width="6"/>
  <circle cx="183" cy="88" r="34" fill="#f0eef8" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭（雲の根本につながる部分・体の上） -->
  <ellipse cx="183" cy="125" rx="48" ry="22" fill="#d8d4e8" stroke="none"/>

  <!-- 雲の中央核（光る球みたいなやつ） -->
  <circle cx="183" cy="88" r="20" fill="#e8e0f8" stroke="#2d263c" stroke-width="6"/>
  <circle cx="177" cy="82" r="5" fill="#ffffff" opacity="0.7" stroke="none"/>

  <!-- 顔エリア -->
  <!-- 左目（白目） -->
  <ellipse cx="157" cy="172" rx="18" ry="20" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <!-- 右目（白目）ちょっとズレてバカっぽく -->
  <ellipse cx="210" cy="169" rx="17" ry="21" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>

  <!-- 左目（黒目） -->
  <circle cx="161" cy="175" r="10" fill="#2d263c"/>
  <!-- 右目（黒目） -->
  <circle cx="213" cy="172" r="10" fill="#2d263c"/>

  <!-- 目の光 -->
  <circle cx="164" cy="171" r="4" fill="#ffffff"/>
  <circle cx="216" cy="168" r="4" fill="#ffffff"/>

  <!-- 口（ちょっとゆるい笑顔） -->
  <path d="M168 206 C173 215 193 217 199 207" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ほっぺ（薄ピンク） -->
  <ellipse cx="143" cy="196" rx="13" ry="9" fill="#f0b8c8" opacity="0.65" stroke="none"/>
  <ellipse cx="224" cy="194" rx="13" ry="9" fill="#f0b8c8" opacity="0.65" stroke="none"/>

  <!-- 足（丸っこい小さい足） -->
  <ellipse cx="158" cy="302" rx="22" ry="14" fill="#c8c4dc" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="208" cy="302" rx="22" ry="14" fill="#c8c4dc" stroke="#2d263c" stroke-width="6"/>

</svg>