  <circle cx="212" cy="115" r="24" fill="#FFFFFF" stroke="#2d263c" stroke-width="6"/>
  <circle cx="148" cy="118" r="15" fill="#C0392B"/>
  <circle cx="212" cy="118" r="15" fill="#C0392B"/>
  <circle cx="148" cy="118" r="6.5" fill="#2d263c"/>
  <circle cx="212" cy="118" r="6.5" fill="#2d263c"/>
  <circle cx="142" cy="109" r="4" fill="#FFFFFF"/>
  <circle cx="206" cy="109" r="4" fill="#FFFFFF"/>

  <!-- mouth -->
