  <ellipse cx="230" cy="305" rx="42" ry="24" fill="#4F7FC9" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- toes -->
  <path d="M115,315 L115,326" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M145,315 L145,326" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M215,315 L215,326" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M245,315 L245,326" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- body torso -->
  <path d="M115,190 C100,200 95,240 100,270 C105,300 130,315 180,317 C230,315 255,300 260,270 C265,240 260,200 245,190 C225,175 135,175 115,190 Z" fill="#4F7FC9" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- belly patch -->
