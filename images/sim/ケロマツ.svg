  <!-- arms -->
  <ellipse cx="98" cy="225" rx="24" ry="42" fill="#4F7FC9" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="262" cy="225" rx="24" ry="42" fill="#4F7FC9" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

