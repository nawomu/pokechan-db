  <ellipse cx="92" cy="258" rx="15" ry="17" fill="#F5EFE0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="268" cy="258" rx="15" ry="17" fill="#F5EFE0" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- foam scarf -->
  <path d="M88,175 Q110,155 132,172 Q150,185 168,170 Q180,160 192,170 Q210,185 228,172 Q250,155 272,175 L268,205 Q245,222 222,206 Q200,195 180,206 Q160,195 138,206 Q115,222 92,205 Z" fill="#FFFFFF" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- head -->
