<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.クリーム色の馬体+たてがみと同色の四肢 2.首〜背に流れる炎のたてがみ(オレンジ+黄) 3.同じく燃える尻尾 4.額のらせん状の金の角 5.脚の付け根に小さな炎(足首の飾り)と尖った耳・黒い瞳 -->
  <!-- 後ろ脚(奥) -->
  <path d="M 248 214 L 267 209 L 284 273 L 293 303 L 268 306 L 256 276 Z" fill="#f6dda3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 後ろ脚(手前) -->
  <path d="M 274 219 L 294 215 L 308 278 L 318 305 L 293 308 L 281 280 Z" fill="#f6dda3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 後ろ蹄 -->
  <ellipse cx="278" cy="304" rx="16" ry="9" fill="#3a2a20" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="303" cy="307" rx="17" ry="9" fill="#3a2a20" stroke="#2d263c" stroke-width="6"/>
  <!-- 後ろ足首の炎 -->
  <path d="M 262 278 Q 250 268 258 256 Q 266 266 272 260 Q 270 274 262 278 Z" fill="#ff7a1a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 尻尾の炎(外側/内側) -->
  <path d="M 262 168 Q 296 152 300 108 Q 316 128 330 92 Q 316 140 328 156 Q 292 152 262 168 Z" fill="#ff7a1a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 272 158 Q 292 148 297 118 Q 306 132 314 108 Q 300 138 306 148 Q 286 145 272 158 Z" fill="#ffd23f" stroke="#2d263c" stroke-width="0"/>
  <!-- 胴体 -->
  <ellipse cx="208" cy="196" rx="93" ry="57" fill="#f8e3ab" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 前脚(奥) -->
  <path d="M 148 228 L 167 224 L 174 298 L 183 324 L 158 327 L 147 298 Z" fill="#f6dda3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 前脚(手前) -->
  <path d="M 174 234 L 195 231 L 205 305 L 214 329 L 188 332 L 178 306 Z" fill="#f6dda3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 前蹄 -->
  <ellipse cx="170" cy="325" rx="16" ry="9" fill="#3a2a20" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="198" cy="330" rx="17" ry="9" fill="#3a2a20" stroke="#2d263c" stroke-width="6"/>
  <!-- 前足首の炎 -->
  <path d="M 186 300 Q 174 290 182 278 Q 190 288 196 282 Q 194 296 186 300 Z" fill="#ff7a1a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- たてがみ(外側/内側) -->
  <path d="M 128 102 Q 148 68 176 92 Q 192 72 213 96 Q 230 78 250 100 Q 238 128 212 138 Q 192 118 172 132 Q 150 112 128 102 Z" fill="#ff7a1a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 140 105 Q 158 82 178 100 Q 194 86 208 103 Q 222 92 236 106 Q 224 120 210 126 Q 195 113 180 122 Q 163 108 140 105 Z" fill="#ffd23f" stroke="#2d263c" stroke-width="0"/>
  <!-- 首 -->
  <path d="M 133 92 L 176 128 L 166 188 L 118 158 Z" fill="#f8e3ab" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 頭 -->
  <ellipse cx="97" cy="116" rx="46" ry="39" fill="#f8e3ab" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- 鼻づら -->
  <ellipse cx="54" cy="132" rx="24" ry="19" fill="#f8e3ab" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 頭の炎の飾り -->
  <path d="M 84 78 Q 96 52 112 62 Q 102 78 108 88 L 88 88 Z" fill="#ff7a1a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 角 -->
  <path d="M 78 88 L 98 88 L 84 34 Z" fill="#e8c34a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 84 82 Q 92 68 84 56 Q 78 46 86 38" fill="none" stroke="#b8862e" stroke-width="4" stroke-linecap="round"/>
  <!-- 耳 -->
  <path d="M 92 82 L 108 46 L 118 84 Z" fill="#f6dda3" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M 72 78 L 80 50 L 92 82 Z" fill="#f6dda3" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <!-- 目 -->
  <circle cx="100" cy="112" r="7" fill="#1a1a1a"/>
  <circle cx="103" cy="109" r="2.4" fill="#ffffff"/>
  <!-- 鼻の穴 -->
  <ellipse cx="42" cy="136" rx="4" ry="3" fill="#3a2a20"/>
  <!-- 口 -->
  <path d="M 36 148 Q 48 154 60 147" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
