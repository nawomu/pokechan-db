<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body), thick and curling upward -->
  <path d="M 232 258 C 278 248 298 200 292 155 C 289 128 274 100 252 82 C 264 108 270 140 262 172 C 255 200 240 226 222 250 Z" fill="#b39ddb" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <polygon points="252,82 272,60 278,92 258,104" fill="#7e57c2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- back legs (behind body) -->
  <ellipse cx="122" cy="300" rx="27" ry="21" fill="#b39ddb" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="238" cy="300" rx="27" ry="21" fill="#b39ddb" stroke="#2d263c" stroke-width="7"/>

  <!-- body -->
  <ellipse cx="180" cy="248" rx="80" ry="62" fill="#b39ddb" stroke="#2d263c" stroke-width="8"/>
  <ellipse cx="180" cy="260" rx="44" ry="34" fill="#d8cdf0" stroke="#2d263c" stroke-width="4"/>

  <!-- front legs -->
  <ellipse cx="140" cy="310" rx="24" ry="22" fill="#b39ddb" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="220" cy="310" rx="24" ry="22" fill="#b39ddb" stroke="#2d263c" stroke-width="7"/>

  <!-- row of back spikes -->
  <polygon points="150,102 162,72 172,104" fill="#7e57c2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="172,112 184,84 196,114" fill="#7e57c2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="196,128 208,102 220,132" fill="#7e57c2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="212,160 226,136 236,166" fill="#7e57c2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="222,196 236,174 244,204" fill="#7e57c2" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- head -->
  <circle cx="180" cy="148" r="63" fill="#b39ddb" stroke="#2d263c" stroke-width="8"/>

  <!-- ears (outer, pointed, laid slightly outward) -->
  <path d="M 148 132 Q 96 100 72 52 Q 94 108 128 150 Q 140 146 148 132 Z" fill="#b39ddb" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 212 132 Q 264 100 288 52 Q 266 108 232 150 Q 220 146 212 132 Z" fill="#b39ddb" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- ear inner pink -->
  <path d="M 140 128 Q 106 104 88 70 Q 104 112 132 140 Z" fill="#ffb6c1" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M 220 128 Q 254 104 272 70 Q 256 112 228 140 Z" fill="#ffb6c1" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- forehead horn -->
  <polygon points="168,98 192,98 180,58" fill="#7e57c2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- eyes -->
  <circle cx="153" cy="148" r="13" fill="#2d263c"/>
  <circle cx="207" cy="148" r="13" fill="#2d263c"/>
  <circle cx="149" cy="143" r="4" fill="#ffffff"/>
  <circle cx="203" cy="143" r="4" fill="#ffffff"/>

  <!-- nose -->
  <ellipse cx="180" cy="172" rx="5" ry="4" fill="#2d263c"/>

  <!-- mouth -->
  <path d="M 163 186 Q 180 198 197 186" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
