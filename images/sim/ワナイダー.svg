<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 脚(左・4本) -->
  <polyline points="150,150 90,120 50,100" fill="none" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="140,170 70,175 30,200" fill="none" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="140,192 65,215 35,255" fill="none" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="145,212 80,255 55,300" fill="none" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 脚(右・4本) -->
  <polyline points="210,150 270,120 310,100" fill="none" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="220,170 290,175 330,200" fill="none" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="220,192 295,215 325,255" fill="none" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <polyline points="215,212 280,255 305,300" fill="none" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 脚のオレンジの節(帯模様) -->
  <line x1="82" y1="128" x2="98" y2="112" stroke="#e8722c" stroke-width="5" stroke-linecap="round"/>
  <line x1="278" y1="128" x2="262" y2="112" stroke="#e8722c" stroke-width="5" stroke-linecap="round"/>
  <line x1="62" y1="222" x2="68" y2="208" stroke="#e8722c" stroke-width="5" stroke-linecap="round"/>
  <line x1="298" y1="222" x2="292" y2="208" stroke="#e8722c" stroke-width="5" stroke-linecap="round"/>

  <!-- 腹部の甲羅(トラップの蓋・メイン) -->
  <ellipse cx="180" cy="190" rx="95" ry="80" fill="#3d3548" stroke="#2d263c" stroke-width="8"/>

  <!-- 甲羅の内側の丸(蓋のふち) -->
  <ellipse cx="180" cy="172" rx="56" ry="46" fill="#554a66" stroke="#2d263c" stroke-width="5"/>

  <!-- 蓋の割れ目模様(オレンジ) -->
  <line x1="180" y1="128" x2="180" y2="216" stroke="#e8722c" stroke-width="4" stroke-linecap="round"/>
  <line x1="128" y1="172" x2="232" y2="172" stroke="#e8722c" stroke-width="4" stroke-linecap="round"/>
  <line x1="146" y1="140" x2="180" y2="172" stroke="#e8722c" stroke-width="3" stroke-linecap="round"/>
  <line x1="214" y1="140" x2="180" y2="172" stroke="#e8722c" stroke-width="3" stroke-linecap="round"/>

  <!-- 触肢(頭のわきの短い脚) -->
  <polyline points="152,232 128,222 112,210" fill="none" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="115" cy="212" r="6" fill="#e8722c" stroke="#2d263c" stroke-width="2.5"/>
  <polyline points="208,232 232,222 248,210" fill="none" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="245" cy="212" r="6" fill="#e8722c" stroke="#2d263c" stroke-width="2.5"/>

  <!-- 頭部(前面) -->
  <ellipse cx="180" cy="248" rx="38" ry="32" fill="#3d3548" stroke="#2d263c" stroke-width="7"/>

  <!-- 大きな目 -->
  <ellipse cx="164" cy="244" rx="12" ry="10" fill="#ff4d3d" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="196" cy="244" rx="12" ry="10" fill="#ff4d3d" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="160" cy="240" rx="3.5" ry="3" fill="#ffd9c9" opacity="0.8"/>
  <ellipse cx="192" cy="240" rx="3.5" ry="3" fill="#ffd9c9" opacity="0.8"/>

  <!-- 小さな目(左右) -->
  <circle cx="148" cy="252" r="5" fill="#ff4d3d" stroke="#2d263c" stroke-width="2.5"/>
  <circle cx="212" cy="252" r="5" fill="#ff4d3d" stroke="#2d263c" stroke-width="2.5"/>

  <!-- 牙 -->
  <path d="M170,268 L166,280 L175,271" fill="#2d263c" stroke="#2d263c" stroke-width="2" stroke-linejoin="round"/>
  <path d="M190,268 L194,280 L185,271" fill="#2d263c" stroke="#2d263c" stroke-width="2" stroke-linejoin="round"/>

</svg>
