<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- back wings (lower, larger) -->
  <ellipse cx="95" cy="230" rx="72" ry="90" fill="#c9a2e0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="265" cy="230" rx="72" ry="90" fill="#c9a2e0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- front wings (upper) -->
  <path d="M180 150 C 120 110, 40 120, 30 210 C 22 275, 70 320, 140 300 C 175 288, 185 220, 180 150 Z"
        fill="#e6c9f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M180 150 C 240 110, 320 120, 330 210 C 338 275, 290 320, 220 300 C 185 288, 175 220, 180 150 Z"
        fill="#e6c9f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- eye-spot markings on front wings -->
  <circle cx="80" cy="210" r="30" fill="#7d4fa8" stroke="#2d263c" stroke-width="6"/>
  <circle cx="80" cy="210" r="13" fill="#e6c9f5" stroke="#2d263c" stroke-width="4"/>
  <circle cx="280" cy="210" r="30" fill="#7d4fa8" stroke="#2d263c" stroke-width="6"/>
  <circle cx="280" cy="210" r="13" fill="#e6c9f5" stroke="#2d263c" stroke-width="4"/>

  <!-- small purple dots decorating wings -->
  <circle cx="120" cy="270" r="9" fill="#7d4fa8" stroke="#2d263c" stroke-width="4"/>
  <circle cx="240" cy="270" r="9" fill="#7d4fa8" stroke="#2d263c" stroke-width="4"/>

  <!-- body: segmented fuzzy abdomen -->
  <ellipse cx="180" cy="255" rx="34" ry="46" fill="#a074c4" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="180" cy="215" rx="30" ry="26" fill="#a074c4" stroke="#2d263c" stroke-width="7"/>

  <!-- small legs -->
  <path d="M160 275 L 138 300" stroke="#2d263c" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M200 275 L 222 300" stroke="#2d263c" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- head -->
  <circle cx="180" cy="150" r="42" fill="#a074c4" stroke="#2d263c" stroke-width="7"/>

  <!-- feathery antennae -->
  <path d="M165 118 C 150 90, 120 78, 100 90" stroke="#2d263c" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M195 118 C 210 90, 240 78, 260 90" stroke="#2d263c" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M150 96 L 138 84 M155 105 L 140 96 M144 108 L 128 102" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M210 96 L 222 84 M205 105 L 220 96 M216 108 L 232 102" stroke="#2d263c" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- big red compound eyes -->
  <ellipse cx="160" cy="148" rx="18" ry="22" fill="#e23b3b" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="200" cy="148" rx="18" ry="22" fill="#e23b3b" stroke="#2d263c" stroke-width="6"/>
  <circle cx="155" cy="140" r="4" fill="#fff"/>
  <circle cx="195" cy="140" r="4" fill="#fff"/>

  <!-- small mouth -->
  <path d="M172 172 Q 180 178 188 172" stroke="#2d263c" stroke-width="5" fill="none" stroke-linecap="round"/>
</svg>
