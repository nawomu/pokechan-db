  <!-- leafy sprout on top (araucaria-seed motif) -->
  <ellipse cx="180" cy="85" rx="15" ry="11" fill="#8a6a42" stroke="#2d263c" stroke-width="6"/>
  <path d="M170,88 Q175,45 180,24 Q186,45 191,88 Z" fill="#6fa84f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M151,96 Q123,58 109,32 Q137,55 160,92 Z" fill="#6fa84f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M209,96 Q237,58 251,32 Q223,55 200,92 Z" fill="#6fa84f" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- main round body -->
  <circle cx="180" cy="190" r="110" fill="#f2ead6" stroke="#2d263c" stroke-width="8"/>
  <!-- lower half in muted red-brown, split by the seam -->
  <path d="M70,190 A110,110 0 0 0 290,190 Z" fill="#a8402f" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- center button (classic ball-family mark) -->
