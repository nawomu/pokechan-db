  <path d="M279,289 L245,280.5 L270.5,255 Z" fill="#e6dcc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M180,330 L162,300 L198,300 Z" fill="#e6dcc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M81,289 L89.5,255.1 L114.9,280.5 Z" fill="#e6dcc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M40,190 L70,172 L70,208 Z" fill="#e6dcc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M81,91 L114.9,99.5 L89.5,124.9 Z" fill="#e6dcc0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
