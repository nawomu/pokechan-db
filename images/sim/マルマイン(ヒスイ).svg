  <circle cx="180" cy="190" r="9" fill="#2d263c"/>

  <!-- shine -->
  <ellipse cx="140" cy="138" rx="17" ry="9" fill="#ffffff" opacity="0.55"/>

  <!-- doodle face on the pale top -->
  <circle cx="143" cy="150" r="15" fill="#fdf9f0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="145" cy="153" r="6" fill="#2d263c"/>
  <circle cx="217" cy="150" r="15" fill="#fdf9f0" stroke="#2d263c" stroke-width="6"/>
  <circle cx="215" cy="153" r="6" fill="#2d263c"/>
  <path d="M158,175 Q180,190 202,175" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
