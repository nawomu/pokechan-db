<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 尾びれ (後ろ) -->
  <path d="M 155 295 Q 130 330 110 315 Q 140 295 145 270 Z" fill="#1e3a70" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M 205 295 Q 230 330 250 315 Q 220 295 215 270 Z" fill="#1e3a70" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 背びれ -->
  <path d="M 172 90 Q 165 45 185 30 Q 195 55 200 90 Z" fill="#2a4b8c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 胸びれ 左 -->
  <path d="M 95 195 Q 55 210 50 240 Q 80 225 110 220 Z" fill="#2a4b8c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 胸びれ 右 -->
  <path d="M 265 195 Q 305 210 310 240 Q 280 225 250 220 Z" fill="#2a4b8c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体本体 -->
  <ellipse cx="180" cy="200" rx="88" ry="115" fill="#2a4b8c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹部 (クリーム色) -->
  <ellipse cx="180" cy="220" rx="58" ry="85" fill="#f5e6c8" stroke="#2d263c" stroke-width="5"/>

  <!-- 腹の縦線 -->
  <line x1="180" y1="148" x2="180" y2="295" stroke="#e8d0a0" stroke-width="3"/>

  <!-- 体の白いドット模様 -->
  <circle cx="120" cy="190" r="7" fill="#e8f0ff" stroke="#2d263c" stroke-width="3"/>
  <circle cx="108" cy="225" r="5" fill="#e8f0ff" stroke="#2d263c" stroke-width="3"/>
  <circle cx="125" cy="255" r="6" fill="#e8f0ff" stroke="#2d263c" stroke-width="3"/>
  <circle cx="240" cy="190" r="7" fill="#e8f0ff" stroke="#2d263c" stroke-width="3"/>
  <circle cx="252" cy="225" r="5" fill="#e8f0ff" stroke="#2d263c" stroke-width="3"/>
  <circle cx="235" cy="258" r="6" fill="#e8f0ff" stroke="#2d263c" stroke-width="3"/>

  <!-- 顔エリア (頭) -->
  <ellipse cx="180" cy="145" rx="72" ry="62" fill="#2a4b8c" stroke="#2d263c" stroke-width="8"/>

  <!-- 額の黄色い星 -->
  <polygon points="180,88 184,100 197,100 187,108 191,121 180,113 169,121 173,108 163,100 176,100" fill="#f7d44c" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 目 左 (白目+瞳) -->
  <ellipse cx="152" cy="138" rx="14" ry="15" fill="white" stroke="#2d263c" stroke-width="5"/>
  <circle cx="155" cy="140" r="8" fill="#1a1a2e"/>
  <circle cx="158" cy="137" r="3" fill="white"/>

  <!-- 目 右 (白目+瞳) - ちょっとズレてる -->
  <ellipse cx="208" cy="136" rx="13" ry="16" fill="white" stroke="#2d263c" stroke-width="5"/>
  <circle cx="211" cy="139" r="8" fill="#1a1a2e"/>
  <circle cx="214" cy="136" r="3" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="156" rx="8" ry="5" fill="#1e3a70" stroke="#2d263c" stroke-width="3"/>

  <!-- 大きな口 -->
  <path d="M 128 168 Q 148 185 180 188 Q 212 185 232 168" fill="#cc2222" stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 上の歯 -->
  <polygon points="140,170 145,183 150,170" fill="white" stroke="#2d263c" stroke-width="3"/>
  <polygon points="155,174 160,188 165,174" fill="white" stroke="#2d263c" stroke-width="3"/>
  <polygon points="170,176 175,191 180,176" fill="white" stroke="#2d263c" stroke-width="3"/>
  <polygon points="185,176 190,191 195,176" fill="white" stroke="#2d263c" stroke-width="3"/>
  <polygon points="200,174 205,188 210,174" fill="white" stroke="#2d263c" stroke-width="3"/>
  <polygon points="215,170 220,183 225,170" fill="white" stroke="#2d263c" stroke-width="3"/>

  <!-- 下の歯 (ちょっとはみ出てる) -->
  <polygon points="148,187 153,175 158,187" fill="white" stroke="#2d263c" stroke-width="3"/>
  <polygon points="172,190 177,177 182,190" fill="white" stroke="#2d263c" stroke-width="3"/>
  <polygon points="202,187 207,175 212,187" fill="white" stroke="#2d263c" stroke-width="3"/>

  <!-- ほっぺのトゲ感 (小さい突起) -->
  <path d="M 112 155 L 100 148 L 115 158 Z" fill="#2a4b8c" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M 248 155 L 260 148 L 245 158 Z" fill="#2a4b8c" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
</svg>