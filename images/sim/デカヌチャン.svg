  <ellipse cx="224" cy="167" rx="12" ry="8" fill="#f4a0a0" opacity="0.6"/>

  <!-- 鼻 -->
  <ellipse cx="182" cy="168" rx="9" ry="7" fill="#e88a8a" stroke="#2d263c" stroke-width="4"/>

