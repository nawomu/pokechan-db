  <polygon points="214,118 204,88 228,104" fill="#f5e88a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 顔パーツ -->
  <!-- 左目 -->
  <ellipse cx="158" cy="154" rx="16" ry="18" fill="white" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="161" cy="156" rx="9" ry="10" fill="#1a1a2e"/>
