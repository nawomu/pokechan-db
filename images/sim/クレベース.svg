<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- チェーン(後ろ) -->
  <g stroke="#7cc8e8" stroke-width="7" stroke-linecap="round" fill="none">
    <line x1="105" y1="230" x2="62" y2="265"/>
    <line x1="62" y1="265" x2="48" y2="300"/>
    <line x1="48" y1="300" x2="34" y2="328"/>
  </g>
  <ellipse cx="62" cy="265" rx="12" ry="8" fill="#aee6f8" stroke="#7cc8e8" stroke-width="5" transform="rotate(-30 62 265)"/>
  <ellipse cx="48" cy="300" rx="12" ry="8" fill="#aee6f8" stroke="#7cc8e8" stroke-width="5" transform="rotate(-15 48 300)"/>
  <ellipse cx="34" cy="328" rx="11" ry="7" fill="#aee6f8" stroke="#7cc8e8" stroke-width="5" transform="rotate(-20 34 328)"/>

  <g stroke="#7cc8e8" stroke-width="7" stroke-linecap="round" fill="none">
    <line x1="258" y1="232" x2="300" y2="268"/>
    <line x1="300" y1="268" x2="316" y2="304"/>
    <line x1="316" y1="304" x2="328" y2="330"/>
  </g>
  <ellipse cx="300" cy="268" rx="12" ry="8" fill="#aee6f8" stroke="#7cc8e8" stroke-width="5" transform="rotate(30 300 268)"/>
  <ellipse cx="316" cy="304" rx="12" ry="8" fill="#aee6f8" stroke="#7cc8e8" stroke-width="5" transform="rotate(20 316 304)"/>
  <ellipse cx="328" cy="330" rx="11" ry="7" fill="#aee6f8" stroke="#7cc8e8" stroke-width="5" transform="rotate(15 328 330)"/>

  <!-- 体の影(六角形・少しずらして立体感) -->
  <polygon points="182,62 272,112 275,218 183,272 95,220 90,112" fill="#9dd8f0" stroke="none"/>

  <!-- 体(六角形・メイン) ちょっといびつ -->
  <polygon points="180,55 268,108 270,214 180,268 92,216 88,106"
    fill="#c4edfc" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 体の内側 六角形模様(ひびっぽく) -->
  <polygon points="180,82 243,116 244,186 180,222 116,188 114,116"
    fill="none" stroke="#7cc8e8" stroke-width="4" stroke-linejoin="round" stroke-dasharray="6,4"/>

  <!-- 体の中央小六角形 -->
  <polygon points="180,128 208,143 208,173 180,188 152,173 152,143"
    fill="#daf4ff" stroke="#7cc8e8" stroke-width="3" stroke-linejoin="round"/>

  <!-- ひびのライン -->
  <line x1="180" y1="82" x2="180" y2="128" stroke="#7cc8e8" stroke-width="3" stroke-linecap="round"/>
  <line x1="243" y1="116" x2="208" y2="143" stroke="#7cc8e8" stroke-width="3" stroke-linecap="round"/>
  <line x1="244" y1="186" x2="208" y2="173" stroke="#7cc8e8" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="222" x2="180" y2="188" stroke="#7cc8e8" stroke-width="3" stroke-linecap="round"/>
  <line x1="116" y1="188" x2="152" y2="173" stroke="#7cc8e8" stroke-width="3" stroke-linecap="round"/>
  <line x1="114" y1="116" x2="152" y2="143" stroke="#7cc8e8" stroke-width="3" stroke-linecap="round"/>

  <!-- 顔エリア(白っぽい楕円) -->
  <ellipse cx="180" cy="162" rx="58" ry="50" fill="#e8f9ff" stroke="none"/>

  <!-- 眉毛(への字・太くて怖い) -->
  <path d="M148,128 Q160,120 172,126" stroke="#2d263c" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M188,124 Q200,118 214,126" stroke="#2d263c" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- 目(逆三角形っぽい怖い目) 左 -->
  <polygon points="148,135 170,135 159,155" fill="#2d263c" stroke="#2d263c" stroke-width="2"/>
  <!-- 目の白ハイライト -->
  <circle cx="153" cy="142" r="4" fill="white"/>

  <!-- 目(逆三角形っぽい怖い目) 右(少しずれてる・いびつ感) -->
  <polygon points="190,133 213,133 200,155" fill="#2d263c" stroke="#2d263c" stroke-width="2"/>
  <circle cx="194" cy="141" r="4" fill="white"/>

  <!-- 口(ギザギザ・怖い) -->
  <path d="M148,178 L157,168 L166,180 L174,166 L182,178 L190,165 L199,178 L208,167 L214,178"
    stroke="#2d263c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 口の中(暗い) -->
  <path d="M150,178 Q180,198 212,178 L208,167 L199,178 L190,165 L182,178 L174,166 L166,180 L157,168 Z"
    fill="#4a6fa5" stroke="none"/>

  <!-- 歯(鋭い) -->
  <polygon points="157,168 162,178 152,178" fill="white" stroke="none"/>
  <polygon points="174,166 179,178 169,178" fill="white" stroke="none"/>
  <polygon points="190,165 195,177 185,177" fill="white" stroke="none"/>
  <polygon points="208,167 213,178 203,178" fill="white" stroke="none"/>

  <!-- 口の輪郭 -->
  <path d="M148,178 L157,168 L166,180 L174,166 L182,178 L190,165 L199,178 L208,167 L214,178"
    stroke="#2d263c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ほっぺ(うっすら赤) -->
  <ellipse cx="132" cy="168" rx="14" ry="10" fill="#f4b8c8" opacity="0.55"/>
  <ellipse cx="228" cy="166" rx="13" ry="9" fill="#f4b8c8" opacity="0.55"/>

  <!-- 体の表面のキラキラ小六角形 -->
  <polygon points="108,155 116,160 116,170 108,175 100,170 100,160" fill="#daf4ff" stroke="#7cc8e8" stroke-width="2"/>
  <polygon points="248,140 256,145 256,155 248,160 240,155 240,145" fill="#daf4ff" stroke="#7cc8e8" stroke-width="2"/>
  <polygon points="120,218 126,222 126,230 120,234 114,230 114,222" fill="#daf4ff" stroke="#7cc8e8" stroke-width="2"/>
  <polygon points="238,212 244,216 244,224 238,228 232,224 232,216" fill="#daf4ff" stroke="#7cc8e8" stroke-width="2"/>
</svg>