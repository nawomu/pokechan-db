<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ(アローラのすがた):
  1. 灰茶色の3つの頭が地面から生えているように並ぶ(手足なし)
  2. 頭のてっぺんから金色の髪(ポンパドール)が同じ向きに流れる
  3. 鼻の下に金色の立派なひげ(マスタッシュ)
  4. 大きな丸い目(左右2つずつ・黒目)
  -->

  <!-- 左の頭(後ろ) -->
  <path d="M108 112 Q84 118 74 152 Q64 190 70 232 Q76 262 92 280 Q104 292 122 288 Q140 282 146 258 Q154 210 146 160 Q140 122 108 112Z" fill="#AE9A80" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M84 122 Q68 94 96 78 Q126 64 134 98 Q138 122 112 130 Q94 136 84 122Z" fill="#F1E4AC" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="100" cy="188" rx="12" ry="14" fill="#2d263c"/>
  <ellipse cx="103" cy="184" rx="4" ry="5" fill="#fff"/>
  <path d="M86 246 Q80 236 90 230 Q98 240 104 244 Q110 240 118 230 Q128 236 122 246 Q112 256 104 252 Q96 256 86 246Z" fill="#F1E4AC" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 右の頭(後ろ) -->
  <path d="M252 112 Q276 118 286 152 Q296 190 290 232 Q284 262 268 280 Q256 292 238 288 Q220 282 214 258 Q206 210 214 160 Q220 122 252 112Z" fill="#AE9A80" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M276 122 Q292 94 264 78 Q234 64 226 98 Q222 122 248 130 Q266 136 276 122Z" fill="#F1E4AC" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="260" cy="188" rx="12" ry="14" fill="#2d263c"/>
  <ellipse cx="263" cy="184" rx="4" ry="5" fill="#fff"/>
  <path d="M274 246 Q280 236 270 230 Q262 240 256 244 Q250 240 242 230 Q232 236 238 246 Q248 256 256 252 Q264 256 274 246Z" fill="#F1E4AC" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 中央の頭(前・一番大きい) -->
  <path d="M180 58 Q144 66 130 116 Q116 176 126 236 Q134 274 156 296 Q168 306 180 306 Q192 306 204 296 Q226 274 234 236 Q244 176 230 116 Q216 66 180 58Z" fill="#BBA588" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 頭頂の金髪ポンパドール(片側へ流れる) -->
  <path d="M150 72 Q118 42 154 18 Q198 -6 220 34 Q234 62 200 82 Q170 98 150 72Z" fill="#F3E6AE" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M162 66 Q150 46 170 34 Q192 22 204 42" fill="none" stroke="#D8C378" stroke-width="4" stroke-linecap="round"/>

  <!-- 中央 目 左右 -->
  <ellipse cx="158" cy="176" rx="16" ry="18" fill="#2d263c"/>
  <ellipse cx="162" cy="170" rx="6" ry="7" fill="#fff"/>
  <ellipse cx="202" cy="176" rx="16" ry="18" fill="#2d263c"/>
  <ellipse cx="206" cy="170" rx="6" ry="7" fill="#fff"/>

  <!-- 中央 金色のひげ(マスタッシュ) -->
  <path d="M150 250 Q138 236 152 224 Q166 242 180 248 Q194 242 208 224 Q222 236 210 250 Q194 264 180 258 Q166 264 150 250Z" fill="#F3E6AE" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 中央 ほっぺの丸み(かわいさ) -->
  <ellipse cx="146" cy="220" rx="8" ry="6" fill="#D8C378" opacity="0.5"/>
  <ellipse cx="214" cy="220" rx="8" ry="6" fill="#D8C378" opacity="0.5"/>
</svg>
