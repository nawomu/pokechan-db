<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail -->
  <path d="M255 235 Q 320 240 330 200 Q 300 215 250 210 Z" fill="#f4c542" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- back legs -->
  <ellipse cx="235" cy="285" rx="26" ry="34" fill="#f4c542" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="150" cy="288" rx="26" ry="34" fill="#f4c542" stroke="#2d263c" stroke-width="7"/>
  <!-- feet -->
  <ellipse cx="235" cy="315" rx="24" ry="12" fill="#2b3a67" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="150" cy="318" rx="24" ry="12" fill="#2b3a67" stroke="#2d263c" stroke-width="6"/>
  <!-- body -->
  <ellipse cx="195" cy="220" rx="90" ry="60" fill="#f6d066" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- belly pattern -->
  <ellipse cx="195" cy="245" rx="55" ry="28" fill="#fce8a8" stroke="#2d263c" stroke-width="5"/>
  <!-- small arm -->
  <path d="M130 210 Q 100 220 95 250" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="94" cy="253" rx="12" ry="9" fill="#f4c542" stroke="#2d263c" stroke-width="6"/>
  <!-- neck -->
  <path d="M150 185 Q 120 150 100 110" fill="none" stroke="#2d263c" stroke-width="9" stroke-linecap="round"/>
  <path d="M150 185 Q 120 150 100 110" fill="#2b3a67" stroke="none" stroke-width="0"/>
  <path d="M160 195 Q 130 150 108 105 L 138 100 Q 165 150 175 195 Z" fill="#2b3a67" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- head -->
  <ellipse cx="95" cy="90" rx="55" ry="42" fill="#2b3a67" stroke="#2d263c" stroke-width="8"/>
  <!-- lightning crest -->
  <path d="M105 50 L 85 78 L 100 78 L 78 112 L 118 68 L 100 68 Z" fill="#f4e04d" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- lower jaw -->
  <path d="M45 100 Q 55 128 100 128 Q 130 128 140 108" fill="#dfe6f0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- teeth -->
  <path d="M60 115 L 65 128 L 70 115 Z" fill="#ffffff" stroke="#2d263c" stroke-width="3"/>
  <path d="M85 120 L 90 132 L 95 120 Z" fill="#ffffff" stroke="#2d263c" stroke-width="3"/>
  <!-- eye -->
  <circle cx="70" cy="82" r="12" fill="#ffffff" stroke="#2d263c" stroke-width="6"/>
  <circle cx="72" cy="83" r="5" fill="#2d263c"/>
  <!-- yellow spot on head -->
  <circle cx="118" cy="95" r="10" fill="#f4c542" stroke="#2d263c" stroke-width="4"/>
</svg>
