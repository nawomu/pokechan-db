<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- tail (behind body) -->
  <path d="M 210 280 Q 290 260 310 210 Q 330 160 300 130 Q 275 110 260 140 Q 250 165 270 175 Q 290 185 280 210 Q 265 240 220 260 Z"
        fill="#2d1b4e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- tail rings -->
  <path d="M 287 148 Q 270 138 262 152 Q 258 163 270 170" fill="none" stroke="#f0e8f8" stroke-width="5" stroke-linecap="round"/>
  <path d="M 297 168 Q 285 155 272 162 Q 268 170 278 178" fill="none" stroke="#f0e8f8" stroke-width="5" stroke-linecap="round"/>

  <!-- body -->
  <ellipse cx="180" cy="240" rx="72" ry="80"
           fill="#2d1b4e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- belly -->
  <ellipse cx="178" cy="252" rx="42" ry="52" fill="#e0ccf0"/>

  <!-- belly spots -->
  <ellipse cx="170" cy="240" rx="8" ry="9" fill="#f5e6a3" opacity="0.85"/>
  <ellipse cx="192" cy="255" rx="7" ry="8" fill="#f5e6a3" opacity="0.85"/>
  <ellipse cx="165" cy="268" rx="6" ry="7" fill="#f5e6a3" opacity="0.80"/>

  <!-- body spots -->
  <ellipse cx="128" cy="235" rx="9" ry="8" fill="#f5e6a3" opacity="0.8"/>
  <ellipse cx="230" cy="225" rx="8" ry="7" fill="#f5e6a3" opacity="0.8"/>
  <ellipse cx="235" cy="255" rx="7" ry="9" fill="#f5e6a3" opacity="0.75"/>
  <ellipse cx="122" cy="262" rx="8" ry="7" fill="#f5e6a3" opacity="0.75"/>

  <!-- left leg -->
  <path d="M 135 300 Q 120 310 118 330 Q 118 342 132 342 Q 146 342 148 328 Q 150 312 155 300 Z"
        fill="#2d1b4e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- right leg -->
  <path d="M 220 300 Q 235 310 237 330 Q 238 342 224 342 Q 210 342 208 328 Q 206 312 200 300 Z"
        fill="#2d1b4e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- left arm -->
  <path d="M 120 240 Q 90 245 84 268 Q 82 282 95 285 Q 110 287 120 268 Z"
        fill="#2d1b4e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- right arm -->
  <path d="M 238 235 Q 268 238 276 260 Q 280 274 268 278 Q 253 281 240 260 Z"
        fill="#2d1b4e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- head -->
  <ellipse cx="180" cy="155" rx="65" ry="58"
           fill="#2d1b4e" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- face cream area -->
  <ellipse cx="180" cy="165" rx="42" ry="36" fill="#e8d5f0"/>

  <!-- left ear -->
  <path d="M 128 110 Q 112 68 125 50 Q 138 35 148 70 Q 152 90 145 108 Z"
        fill="#2d1b4e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 132 102 Q 122 75 130 60 Q 136 50 141 72 Q 144 86 140 100 Z"
        fill="#d9a0c8"/>

  <!-- right ear (slightly asymmetric) -->
  <path d="M 230 108 Q 242 65 232 47 Q 220 33 212 68 Q 208 88 215 106 Z"
        fill="#2d1b4e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 226 100 Q 234 74 228 58 Q 222 48 218 70 Q 216 84 219 98 Z"
        fill="#d9a0c8"/>

  <!-- forehead diamond mark -->
  <path d="M 180 118 L 172 130 L 180 140 L 188 130 Z" fill="#9b59c0"/>

  <!-- head spots -->
  <ellipse cx="148" cy="145" rx="8" ry="7" fill="#f5e6a3" opacity="0.85"/>
  <ellipse cx="214" cy="143" rx="8" ry="7" fill="#f5e6a3" opacity="0.85"/>

  <!-- eyes - sly narrow slits -->
  <ellipse cx="163" cy="158" rx="14" ry="6" fill="#1a0d2e"/>
  <ellipse cx="197" cy="157" rx="14" ry="6" fill="#1a0d2e"/>
  <!-- eye shine -->
  <ellipse cx="158" cy="156" rx="4" ry="3" fill="#a07ec8"/>
  <ellipse cx="192" cy="155" rx="4" ry="3" fill="#a07ec8"/>
  <!-- eyelid lines (sneaky look) -->
  <path d="M 149 157 Q 163 150 177 157" fill="none" stroke="#2d263c" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 183 156 Q 197 149 211 156" fill="none" stroke="#2d263c" stroke-width="3.5" stroke-linecap="round"/>

  <!-- nose -->
  <ellipse cx="180" cy="172" rx="5" ry="4" fill="#c0506a"/>

  <!-- smirk mouth -->
  <path d="M 165 182 Q 178 194 196 184" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- whiskers left -->
  <line x1="152" y1="175" x2="108" y2="168" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="152" y1="180" x2="106" y2="178" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="152" y1="185" x2="110" y2="190" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- whiskers right -->
  <line x1="208" y1="175" x2="252" y2="166" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="208" y1="180" x2="254" y2="178" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>
  <line x1="208" y1="185" x2="250" y2="190" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

</svg>