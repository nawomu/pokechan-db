<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1. どんぐりの帽子のような茶色いフード(頭を覆い、先端がとがって前に垂れる)
  2. 緑色でずんぐりした細長い体(イモムシ体型・ピル型)
  3. 大きな丸い黒目とオレンジの小さな鼻
  4. お腹はクリーム色でやわらかい丸模様
  5. 体の下からちょこんと出た小さなオレンジの足 -->

  <!-- 足(体の下から覗く・後ろに配置) -->
  <ellipse cx="140" cy="322" rx="20" ry="15" fill="#D98A4A" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="220" cy="322" rx="20" ry="15" fill="#D98A4A" stroke="#2d263c" stroke-width="6"/>

  <!-- 体(緑・ピル型) -->
  <path d="M95 240 Q80 160 180 155 Q280 160 265 240 Q258 300 180 340 Q102 300 95 240 Z" fill="#7BC142" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体節の線(イモムシっぽさ) -->
  <path d="M108 235 Q180 260 252 235" fill="none" stroke="#5A9A2E" stroke-width="5" stroke-linecap="round"/>
  <path d="M112 275 Q180 300 248 275" fill="none" stroke="#5A9A2E" stroke-width="5" stroke-linecap="round"/>

  <!-- お腹の模様 -->
  <ellipse cx="180" cy="303" rx="52" ry="42" fill="#F6EFC8"/>

  <!-- フード(どんぐりの帽子・頭を覆う) -->
  <path d="M85 270 Q65 200 90 130 Q120 55 180 40 Q240 55 270 130 Q295 200 275 270 Q245 235 205 242 Q180 248 155 242 Q115 235 85 270 Z" fill="#9C6B3E" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- フードの葉脈模様 -->
  <path d="M150 90 Q160 150 150 200" fill="none" stroke="#6E4726" stroke-width="5" stroke-linecap="round"/>
  <path d="M210 90 Q200 150 210 200" fill="none" stroke="#6E4726" stroke-width="5" stroke-linecap="round"/>
  <path d="M180 55 L180 215" fill="none" stroke="#6E4726" stroke-width="5" stroke-linecap="round"/>

  <!-- ほっぺ(赤らみ) -->
  <ellipse cx="132" cy="272" rx="12" ry="8" fill="#F6B8B0"/>
  <ellipse cx="228" cy="272" rx="12" ry="8" fill="#F6B8B0"/>

  <!-- 目 左 -->
  <ellipse cx="152" cy="258" rx="17" ry="19" fill="#2d263c" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="147" cy="251" rx="5" ry="6" fill="#FFFFFF"/>

  <!-- 目 右 -->
  <ellipse cx="208" cy="258" rx="17" ry="19" fill="#2d263c" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="203" cy="251" rx="5" ry="6" fill="#FFFFFF"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="277" rx="9" ry="7" fill="#E8965A" stroke="#2d263c" stroke-width="4"/>

  <!-- 口 -->
  <path d="M164 292 Q180 302 196 292" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
