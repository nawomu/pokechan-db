<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
    1. 全身が淡いピンク(丸っこい卵型のボディ)
    2. 頭の左右に大きく尖った耳、先端が黒い
    3. 頭のてっぺんにくるんとした巻き毛(カール)
    4. 背中に小さな羽のようなヒレ状の突起が左右にある
    5. つぶらな黒い丸目、小さな口、頬にほんのりチーク、短い手足で尻尾がちょこん
  -->

  <!-- ===== 後ろ (尻尾・耳・羽) ===== -->
  <path d="M232,308 C248,296 262,304 259,322 C256,338 240,336 233,322 C229,314 228,312 232,308 Z"
        fill="#FAD1E3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <path d="M150,128 C122,112 96,80 88,34 C108,44 132,56 152,72 C170,86 178,108 172,128 Z"
        fill="#FAD1E3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M210,128 C238,112 264,80 272,34 C252,44 228,56 208,72 C190,86 182,108 188,128 Z"
        fill="#FAD1E3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <ellipse cx="92" cy="42" rx="15" ry="19" fill="#2d263c"/>
  <ellipse cx="268" cy="42" rx="15" ry="19" fill="#2d263c"/>

  <path d="M108,168 C82,156 62,170 66,196 C70,214 94,210 102,190 C106,180 108,174 108,168 Z"
        fill="#FAD1E3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M252,168 C278,156 298,170 294,196 C290,214 266,210 258,190 C254,180 252,174 252,168 Z"
        fill="#FAD1E3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ===== 体 ===== -->
  <path d="M180,102 C226,102 248,140 253,180 C258,228 250,286 220,316 C200,336 160,336 140,316 C110,286 102,228 107,180 C112,140 134,102 180,102 Z"
        fill="#FBD8E6" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腕 -->
  <ellipse cx="92" cy="222" rx="27" ry="42" transform="rotate(-18 92 222)"
           fill="#FBD8E6" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="268" cy="222" rx="27" ry="42" transform="rotate(18 268 222)"
           fill="#FBD8E6" stroke="#2d263c" stroke-width="7"/>

  <!-- 脚 -->
  <ellipse cx="152" cy="322" rx="30" ry="22" fill="#FBD8E6" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="208" cy="322" rx="30" ry="22" fill="#FBD8E6" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭のカール -->
  <path d="M168,96 C156,86 158,68 172,64 C186,60 196,72 188,82 C182,90 172,86 174,78"
        fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- ===== 顔 ===== -->
  <ellipse cx="150" cy="192" rx="15" ry="19" fill="#2d263c"/>
  <ellipse cx="212" cy="192" rx="15" ry="19" fill="#2d263c"/>
  <ellipse cx="145" cy="186" rx="4.5" ry="5" fill="#ffffff"/>
  <ellipse cx="207" cy="186" rx="4.5" ry="5" fill="#ffffff"/>

  <ellipse cx="180" cy="212" rx="4" ry="3" fill="#2d263c"/>

  <path d="M162,226 Q181,238 200,226" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <ellipse cx="128" cy="210" rx="13" ry="8" fill="#F49CC0"/>
  <ellipse cx="234" cy="210" rx="13" ry="8" fill="#F49CC0"/>
</svg>
