<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- あし1(左はしの岩の柱) -->
  <rect x="73" y="195" width="44" height="135" rx="16" fill="#c9b48c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- あし2(左よりの岩の柱) -->
  <rect x="133" y="195" width="44" height="135" rx="16" fill="#c9b48c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- あし3(右よりの岩の柱) -->
  <rect x="183" y="195" width="44" height="135" rx="16" fill="#c9b48c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- あし4(右はしの岩の柱) -->
  <rect x="243" y="195" width="44" height="135" rx="16" fill="#c9b48c" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- あしの節目の線(1〜4) -->
  <path d="M79 295 L111 295" fill="none" stroke="#8a6e48" stroke-width="4" stroke-linecap="round"/>
  <path d="M139 295 L171 295" fill="none" stroke="#8a6e48" stroke-width="4" stroke-linecap="round"/>
  <path d="M189 295 L221 295" fill="none" stroke="#8a6e48" stroke-width="4" stroke-linecap="round"/>
  <path d="M249 295 L281 295" fill="none" stroke="#8a6e48" stroke-width="4" stroke-linecap="round"/>

  <!-- 体(ストーンサークルのような大きな四角い岩) -->
  <rect x="50" y="60" width="260" height="195" rx="50" fill="#c9b48c" stroke="#2d263c" stroke-width="9" stroke-linejoin="round"/>

  <!-- 頭上の岩の出っぱり(左) -->
  <rect x="100" y="25" width="34" height="46" rx="12" fill="#c9b48c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 頭上の岩の出っぱり(右) -->
  <rect x="226" y="25" width="34" height="46" rx="12" fill="#c9b48c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 岩肌のしみ(左) -->
  <ellipse cx="92" cy="112" rx="26" ry="18" fill="#a3895f" transform="rotate(-10 92 112)"/>
  <!-- 岩肌のしみ(右) -->
  <ellipse cx="268" cy="126" rx="24" ry="17" fill="#a3895f" transform="rotate(12 268 126)"/>

  <!-- ひび割れ(左) -->
  <path d="M112 82 Q100 128 118 168" fill="none" stroke="#6b4a30" stroke-width="4" stroke-linecap="round"/>
  <!-- ひび割れ(右) -->
  <path d="M250 86 Q262 128 246 164" fill="none" stroke="#6b4a30" stroke-width="4" stroke-linecap="round"/>

  <!-- こけ(左上) -->
  <ellipse cx="72" cy="78" rx="16" ry="10" fill="#7fa851" transform="rotate(-20 72 78)"/>
  <!-- こけ(右下) -->
  <ellipse cx="292" cy="212" rx="14" ry="10" fill="#7fa851" transform="rotate(15 292 212)"/>
  <!-- こけ(あしの上) -->
  <ellipse cx="262" cy="300" rx="10" ry="8" fill="#7fa851"/>

  <!-- 光沢ハイライト -->
  <ellipse cx="118" cy="96" rx="34" ry="20" fill="#e8d9b8" opacity="0.5" transform="rotate(-15 118 96)"/>

  <!-- まゆの岩の出っぱり(左) -->
  <path d="M140 178 Q156 164 172 178" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <!-- まゆの岩の出っぱり(右) -->
  <path d="M188 178 Q204 164 220 178" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>

  <!-- 目(左・小さく無表情) -->
  <ellipse cx="156" cy="196" rx="11" ry="13" fill="#241f1a"/>
  <!-- 目(右・小さく無表情) -->
  <ellipse cx="204" cy="196" rx="11" ry="13" fill="#241f1a"/>

  <!-- 口(まっすぐな無表情の口) -->
  <path d="M163 222 Q180 227 197 222" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
</svg>
