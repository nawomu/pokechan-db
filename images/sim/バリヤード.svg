<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1)白いドレス状の下半身 2)頭から伸びる緑の三角ヘアと片目を隠す前髪 3)胸の赤い角(V字) 4)細い白い腕 5)赤い瞳がのぞく穏やかな顔 -->

  <!-- 後ろ髪(左右に流れる緑の髪) -->
  <path d="M118,72 Q86,150 104,232 Q124,190 138,112 Q126,90 118,72 Z" fill="#4caf6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M242,72 Q274,150 256,232 Q236,190 222,112 Q234,90 242,72 Z" fill="#4caf6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- ドレス本体(体) -->
  <path d="M148,128 Q104,180 74,300 Q180,336 286,300 Q256,180 212,128 Q180,150 148,128 Z" fill="#f2f7f0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ドレス裾の緑ライン -->
  <path d="M74,300 Q180,336 286,300 Q280,314 180,330 Q80,314 74,300 Z" fill="#4caf6e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ドレス胸元の切込み(緑) -->
  <path d="M164,132 Q180,150 196,132 Q188,168 180,178 Q172,168 164,132 Z" fill="#4caf6e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左腕 -->
  <path d="M148,150 Q108,182 100,240" fill="none" stroke="#2d263c" stroke-width="15" stroke-linecap="round"/>
  <path d="M148,150 Q108,182 100,240" fill="none" stroke="#f2f7f0" stroke-width="10" stroke-linecap="round"/>

  <!-- 右腕 -->
  <path d="M212,150 Q252,182 260,240" fill="none" stroke="#2d263c" stroke-width="15" stroke-linecap="round"/>
  <path d="M212,150 Q252,182 260,240" fill="none" stroke="#f2f7f0" stroke-width="10" stroke-linecap="round"/>

  <!-- 胸の赤い角(V字ホーン) -->
  <polygon points="180,158 198,210 180,236 162,210" fill="#e34b3c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <line x1="180" y1="158" x2="180" y2="220" stroke="#c23528" stroke-width="4" stroke-linecap="round"/>

  <!-- 首 -->
  <rect x="168" y="118" width="24" height="20" rx="6" fill="#f2f7f0" stroke="#2d263c" stroke-width="6"/>

  <!-- 頭 -->
  <circle cx="180" cy="92" r="46" fill="#f2f7f0" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭頂の緑ヘア(横に流れるツノ状) -->
  <path d="M134,84 Q120,44 168,40 Q180,54 192,40 Q240,44 226,84 Q214,56 180,54 Q146,56 134,84 Z" fill="#4caf6e" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 片目を隠す前髪(緑の房) -->
  <path d="M152,66 Q132,124 150,176 Q168,126 162,70 Z" fill="#4caf6e" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 見えている方の赤い瞳 -->
  <ellipse cx="202" cy="94" rx="8" ry="10" fill="#e34b3c" stroke="#2d263c" stroke-width="4"/>
  <circle cx="204" cy="90" r="2.5" fill="#fff"/>

  <!-- 穏やかな口元 -->
  <path d="M192,116 Q202,122 212,116" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
