<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.体は黒×灰色 2.右背中に巨大な灰色のドリル状の腕(ゼクロムの尾が変化した武器) 3.尻尾は黒く大きい氷柱ギザギザ 4.あご下は白いツララひげ 5.瞳は赤(ゼクロムの目) -->

  <!-- 後ろ: 巨大な灰色ドリル腕(右) -->
  <path d="M255,150 Q310,120 335,150 Q345,165 325,175 Q345,185 328,200 Q345,205 322,222 Q332,235 305,235 Q270,232 250,205 Z"
    fill="#8f99a3" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M300,150 Q322,158 325,175 Q328,190 315,200 Q325,205 312,222" fill="none" stroke="#5c636b" stroke-width="4" stroke-linecap="round"/>

  <!-- 後ろ: 尻尾(黒い氷柱ギザギザ・大きめ) -->
  <polygon points="245,238 300,222 285,245 322,235 300,258 332,255 298,278 250,268"
    fill="#26262c" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 後ろ: 左肩の小さな氷の翼 -->
  <polygon points="95,150 55,112 70,150 40,140 62,175 45,185 90,190"
    fill="#4a5158" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体: 胴体(黒) -->
  <ellipse cx="180" cy="215" rx="88" ry="68" fill="#26262c" stroke="#2d263c" stroke-width="8"/>

  <!-- 体: 下腹(灰色) -->
  <path d="M100,235 Q100,290 150,300 Q180,308 210,300 Q260,290 260,235 Q220,270 180,270 Q140,270 100,235 Z"
    fill="#5c636b" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体: 胸の模様ライン(灰白) -->
  <path d="M150,175 Q180,195 210,175" fill="none" stroke="#9aa0a8" stroke-width="6" stroke-linecap="round"/>

  <!-- 脚(左右・黒) -->
  <ellipse cx="140" cy="292" rx="22" ry="16" fill="#26262c" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="222" cy="292" rx="22" ry="16" fill="#26262c" stroke="#2d263c" stroke-width="6"/>
  <!-- 爪 -->
  <polygon points="125,300 133,300 129,312" fill="#eef1f3" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="148,304 156,304 152,316" fill="#eef1f3" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="207,304 215,304 211,316" fill="#eef1f3" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="230,300 238,300 234,312" fill="#eef1f3" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 首(灰色) -->
  <rect x="160" y="120" width="40" height="45" rx="14" fill="#8f99a3" stroke="#2d263c" stroke-width="7"/>

  <!-- 頭(灰白) -->
  <ellipse cx="180" cy="105" rx="58" ry="46" fill="#c7cdd3" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭上の角(黒) -->
  <polygon points="150,65 160,25 172,63" fill="#26262c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <polygon points="210,65 200,25 188,63" fill="#26262c" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- あご下のツララひげ -->
  <polygon points="150,130 158,168 168,140 178,172 188,140 198,168 206,130"
    fill="#eef1f3" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 口(黒い裂け目) -->
  <path d="M148,118 Q180,132 212,118" fill="none" stroke="#26262c" stroke-width="6" stroke-linecap="round"/>

  <!-- 目(赤・ゼクロムの瞳) -->
  <ellipse cx="158" cy="98" rx="12" ry="10" fill="#e8332a" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="205" cy="98" rx="12" ry="10" fill="#e8332a" stroke="#2d263c" stroke-width="5"/>
  <circle cx="158" cy="98" r="4" fill="#3a0a08"/>
  <circle cx="205" cy="98" r="4" fill="#3a0a08"/>

  <!-- 鼻の穴 -->
  <circle cx="172" cy="118" r="2.5" fill="#26262c"/>
  <circle cx="190" cy="118" r="2.5" fill="#26262c"/>
</svg>
