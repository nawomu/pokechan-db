<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">

  <!-- 後ろの翼(下翼)左右 -->
  <!-- 左下翼 -->
  <path d="M165 210 C130 220 80 260 75 310 C70 340 100 345 125 325 C150 305 160 270 168 240 Z"
        fill="#7b5ea7" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右下翼 -->
  <path d="M195 210 C230 220 280 260 285 310 C290 340 260 345 235 325 C210 305 200 270 192 240 Z"
        fill="#7b5ea7" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 下翼の模様(白斑点) -->
  <ellipse cx="115" cy="298" rx="13" ry="10" fill="white" opacity="0.85"/>
  <ellipse cx="140" cy="318" rx="9" ry="7" fill="white" opacity="0.75"/>
  <ellipse cx="245" cy="298" rx="13" ry="10" fill="white" opacity="0.85"/>
  <ellipse cx="220" cy="318" rx="9" ry="7" fill="white" opacity="0.75"/>

  <!-- 後ろの翼(上翼)左右 -->
  <!-- 左上翼 -->
  <path d="M162 185 C140 160 90 120 50 95 C20 78 10 100 18 125 C30 158 75 175 118 192 C138 200 158 200 162 185 Z"
        fill="#5b9bd5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 右上翼 -->
  <path d="M198 185 C220 160 270 120 310 95 C340 78 350 100 342 125 C330 158 285 175 242 192 C222 200 202 200 198 185 Z"
        fill="#5b9bd5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 上翼の縁取り黒帯(不規則) -->
  <path d="M162 185 C140 162 95 125 55 100 C40 92 22 103 18 125 C30 158 75 175 118 192"
        fill="none" stroke="#2d263c" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
  <path d="M198 185 C220 162 265 125 305 100 C320 92 338 103 342 125 C330 158 285 175 242 192"
        fill="none" stroke="#2d263c" stroke-width="14" stroke-linecap="round" opacity="0.7"/>

  <!-- 上翼の白斑点 -->
  <ellipse cx="90" cy="143" rx="16" ry="12" fill="white" opacity="0.9"/>
  <ellipse cx="62" cy="130" rx="10" ry="8" fill="white" opacity="0.8"/>
  <ellipse cx="270" cy="143" rx="16" ry="12" fill="white" opacity="0.9"/>
  <ellipse cx="298" cy="130" rx="10" ry="8" fill="white" opacity="0.8"/>
  <!-- 上翼の青い内側丸 -->
  <ellipse cx="130" cy="158" rx="18" ry="14" fill="#a8d4f5" opacity="0.7"/>
  <ellipse cx="230" cy="158" rx="18" ry="14" fill="#a8d4f5" opacity="0.7"/>

  <!-- 触角(体の後ろに見える部分) -->
  <!-- 左触角 -->
  <path d="M163 135 C155 105 140 80 128 58" stroke="#2d263c" stroke-width="6" fill="none" stroke-linecap="round"/>
  <circle cx="125" cy="53" r="9" fill="#5b9bd5" stroke="#2d263c" stroke-width="5"/>
  <!-- 右触角 -->
  <path d="M197 135 C205 105 220 80 232 58" stroke="#2d263c" stroke-width="6" fill="none" stroke-linecap="round"/>
  <circle cx="235" cy="53" r="9" fill="#5b9bd5" stroke="#2d263c" stroke-width="5"/>

  <!-- 白えり(カラー) -->
  <ellipse cx="180" cy="195" rx="42" ry="22" fill="white" stroke="#2d263c" stroke-width="6"/>

  <!-- 体(黄緑) -->
  <ellipse cx="180" cy="200" rx="35" ry="45" fill="#8ecf5a" stroke="#2d263c" stroke-width="7"/>

  <!-- 腹部(白っぽい) -->
  <ellipse cx="180" cy="220" rx="22" ry="28" fill="#dff0c0" stroke="#2d263c" stroke-width="4"/>

  <!-- 頭 -->
  <ellipse cx="180" cy="155" rx="38" ry="34" fill="#8ecf5a" stroke="#2d263c" stroke-width="7"/>

  <!-- ほっぺ(ピンク) -->
  <ellipse cx="156" cy="163" rx="11" ry="8" fill="#f5a0b0" opacity="0.75"/>
  <ellipse cx="204" cy="163" rx="11" ry="8" fill="#f5a0b0" opacity="0.75"/>

  <!-- 複眼(左右) 少しずれてバカっぽく -->
  <ellipse cx="164" cy="150" rx="15" ry="17" fill="#1a2a4a" stroke="#2d263c" stroke-width="5"/>
  <ellipse cx="197" cy="148" rx="14" ry="16" fill="#1a2a4a" stroke="#2d263c" stroke-width="5"/>
  <!-- 眼のハイライト -->
  <ellipse cx="169" cy="145" rx="5" ry="6" fill="white" opacity="0.6"/>
  <ellipse cx="201" cy="143" rx="4" ry="5" fill="white" opacity="0.6"/>

  <!-- くちばし(小さくとがった) -->
  <path d="M175 170 L180 178 L185 170 Z" fill="#f0d060" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 細い脚(3対・昆虫) -->
  <line x1="160" y1="230" x2="135" y2="252" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="162" y1="238" x2="132" y2="265" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="165" y1="246" x2="138" y2="275" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="200" y1="230" x2="225" y2="252" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <line x1="198" y1="238" x2="228" y2="265" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
  <line x1="195" y1="246" x2="222" y2="275" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>

  <!-- お尻の丸(下部) -->
  <ellipse cx="180" cy="244" rx="18" ry="14" fill="#8ecf5a" stroke="#2d263c" stroke-width="6"/>

</svg>