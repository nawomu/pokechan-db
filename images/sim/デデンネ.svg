<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- しっぽ (一番後ろ) -->
  <path d="M 245 230 Q 290 210 305 240 Q 315 260 295 268 Q 275 275 265 255 Q 258 242 245 235" fill="#F08030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- しっぽの先端ひし形 -->
  <polygon points="305,240 316,228 328,245 314,257" fill="#F08030" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 前足 左 -->
  <ellipse cx="128" cy="272" rx="22" ry="15" fill="#F08030" stroke="#2d263c" stroke-width="7"/>
  <!-- 前足 右 -->
  <ellipse cx="228" cy="275" rx="22" ry="14" fill="#F08030" stroke="#2d263c" stroke-width="7"/>

  <!-- 後ろ足 左 -->
  <ellipse cx="148" cy="298" rx="28" ry="16" fill="#F08030" stroke="#2d263c" stroke-width="7"/>
  <!-- 後ろ足 右 -->
  <ellipse cx="215" cy="300" rx="27" ry="15" fill="#F08030" stroke="#2d263c" stroke-width="7"/>

  <!-- 体 -->
  <ellipse cx="182" cy="230" rx="82" ry="75" fill="#F08030" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- おなか -->
  <ellipse cx="182" cy="245" rx="52" ry="48" fill="#F5DEB3" stroke="#2d263c" stroke-width="5"/>

  <!-- 耳 左 (少しゆがませる) -->
  <ellipse cx="135" cy="108" rx="30" ry="38" fill="#F08030" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" transform="rotate(-12, 135, 108)"/>
  <!-- 耳 左 内側 -->
  <ellipse cx="135" cy="110" rx="17" ry="24" fill="#F4A0C0" stroke="#2d263c" stroke-width="4" transform="rotate(-12, 135, 110)"/>

  <!-- 耳 右 (少し大きめ・非対称) -->
  <ellipse cx="228" cy="106" rx="32" ry="36" fill="#F08030" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" transform="rotate(10, 228, 106)"/>
  <!-- 耳 右 内側 -->
  <ellipse cx="228" cy="108" rx="19" ry="22" fill="#F4A0C0" stroke="#2d263c" stroke-width="4" transform="rotate(10, 228, 108)"/>

  <!-- 頭 -->
  <ellipse cx="182" cy="168" rx="70" ry="65" fill="#F08030" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- ほっぺ 左 (電気袋) -->
  <ellipse cx="132" cy="185" rx="22" ry="18" fill="#FFCC00" stroke="#2d263c" stroke-width="5"/>
  <!-- ほっぺ 右 (電気袋) -->
  <ellipse cx="233" cy="186" rx="23" ry="17" fill="#FFCC00" stroke="#2d263c" stroke-width="5"/>

  <!-- 目 左 -->
  <ellipse cx="158" cy="162" rx="13" ry="15" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <!-- 目 左 ハイライト -->
  <ellipse cx="162" cy="157" rx="4" ry="5" fill="white"/>
  <!-- 目 右 (少し大きめ) -->
  <ellipse cx="207" cy="160" rx="14" ry="16" fill="#1a1a2e" stroke="#2d263c" stroke-width="4"/>
  <!-- 目 右 ハイライト -->
  <ellipse cx="212" cy="155" rx="4" ry="5" fill="white"/>

  <!-- 鼻 -->
  <ellipse cx="182" cy="177" rx="6" ry="4" fill="#1a1a2e"/>

  <!-- 口 (ちょっとゆがんだ笑顔) -->
  <path d="M 170 186 Q 181 196 196 185" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- ひげ 左 -->
  <line x1="130" y1="182" x2="155" y2="180" stroke="#2d263c" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="128" y1="190" x2="154" y2="186" stroke="#2d263c" stroke-width="3.5" stroke-linecap="round"/>
  <!-- ひげ 右 -->
  <line x1="210" y1="180" x2="235" y2="181" stroke="#2d263c" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="209" y1="188" x2="233" y2="189" stroke="#2d263c" stroke-width="3.5" stroke-linecap="round"/>

  <!-- 体の模様ライン (おなかの上の縞っぽいやつ) -->
  <path d="M 148 218 Q 160 212 182 213 Q 204 212 218 218" fill="none" stroke="#E8C99A" stroke-width="3" stroke-linecap="round"/>
</svg>