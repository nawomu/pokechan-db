<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail (behind body) -->
  <ellipse cx="255" cy="265" rx="28" ry="22" fill="#F8D030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <circle cx="272" cy="252" r="16" fill="#F8D030" stroke="#2d263c" stroke-width="7"/>
  <!-- tail tip red orb -->
  <circle cx="284" cy="240" r="13" fill="#E0201A" stroke="#2d263c" stroke-width="6"/>
  <circle cx="279" cy="235" r="4" fill="#ff6666" stroke="none"/>

  <!-- body -->
  <ellipse cx="175" cy="240" rx="78" ry="85" fill="#F8D030" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- belly -->
  <ellipse cx="170" cy="255" rx="44" ry="52" fill="#fffbe8" stroke="none"/>

  <!-- black ring stripes on body -->
  <path d="M108 220 Q175 205 243 218" fill="none" stroke="#2d263c" stroke-width="7" stroke-linecap="round"/>
  <path d="M112 238 Q175 225 238 236" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- left arm -->
  <ellipse cx="102" cy="265" rx="18" ry="28" fill="#F8D030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-18 102 265)"/>
  <!-- right arm -->
  <ellipse cx="248" cy="268" rx="18" ry="27" fill="#F8D030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(20 248 268)"/>

  <!-- left leg -->
  <ellipse cx="143" cy="315" rx="22" ry="18" fill="#F8D030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- right leg -->
  <ellipse cx="208" cy="318" rx="22" ry="18" fill="#F8D030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- neck -->
  <rect x="150" y="148" width="52" height="48" rx="18" fill="#F8D030" stroke="#2d263c" stroke-width="7"/>
  <!-- neck ring stripe -->
  <path d="M150 172 Q176 165 202 170" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>

  <!-- head -->
  <ellipse cx="176" cy="118" rx="68" ry="65" fill="#F8D030" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- left ear -->
  <ellipse cx="118" cy="70" rx="18" ry="28" fill="#F8D030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-12 118 70)"/>
  <ellipse cx="118" cy="70" rx="9" ry="16" fill="#fffbe8" stroke="none" transform="rotate(-12 118 70)"/>
  <!-- left ear tip red dot -->
  <circle cx="113" cy="48" r="9" fill="#E0201A" stroke="#2d263c" stroke-width="5"/>

  <!-- right ear -->
  <ellipse cx="234" cy="72" rx="18" ry="28" fill="#F8D030" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(14 234 72)"/>
  <ellipse cx="234" cy="72" rx="9" ry="16" fill="#fffbe8" stroke="none" transform="rotate(14 234 72)"/>
  <!-- right ear tip red dot -->
  <circle cx="240" cy="49" r="9" fill="#E0201A" stroke="#2d263c" stroke-width="5"/>

  <!-- forehead red orb -->
  <circle cx="176" cy="88" r="13" fill="#E0201A" stroke="#2d263c" stroke-width="6"/>
  <circle cx="171" cy="84" r="4" fill="#ff6666" stroke="none"/>

  <!-- eyes - big and slightly derpy -->
  <ellipse cx="152" cy="120" rx="16" ry="18" fill="white" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="200" cy="122" rx="15" ry="17" fill="white" stroke="#2d263c" stroke-width="6"/>
  <!-- pupils - slightly cross-eyed for charm -->
  <circle cx="156" cy="123" r="9" fill="#2d263c"/>
  <circle cx="196" cy="125" r="8" fill="#2d263c"/>
  <!-- eye shine -->
  <circle cx="152" cy="118" r="4" fill="white"/>
  <circle cx="192" cy="120" r="3" fill="white"/>

  <!-- cheeks blush -->
  <ellipse cx="136" cy="135" rx="14" ry="9" fill="#f5a0a0" stroke="none" opacity="0.7"/>
  <ellipse cx="216" cy="137" rx="14" ry="9" fill="#f5a0a0" stroke="none" opacity="0.7"/>

  <!-- nose - tiny dot -->
  <circle cx="175" cy="138" r="4" fill="#2d263c"/>

  <!-- mouth - slight goofy open smile -->
  <path d="M158 148 Q176 162 194 148" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M160 150 Q176 165 192 150 Q183 172 176 172 Q168 172 160 150" fill="white" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- little lightning bolt accent near tail -->
  <path d="M262 272 L270 260 L264 260 L272 248" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>