<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ足 -->
  <ellipse cx="255" cy="310" rx="28" ry="18" fill="#b8dff0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="235" y="285" width="40" height="35" rx="12" fill="#c5e8f5" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- しっぽ -->
  <path d="M260 295 Q295 280 305 255 Q310 235 295 230" fill="none" stroke="#c5e8f5" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M260 295 Q295 280 305 255 Q310 235 295 230" fill="none" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill-opacity="0"/>

  <!-- 体 -->
  <ellipse cx="205" cy="275" rx="80" ry="58" fill="#c8ecf8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 腹 -->
  <ellipse cx="195" cy="288" rx="52" ry="36" fill="#e8f7ff" stroke="none"/>

  <!-- 前足 左 -->
  <rect x="138" y="290" width="36" height="38" rx="14" fill="#b8dff0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="156" cy="325" rx="22" ry="14" fill="#b8dff0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 前足 右 -->
  <rect x="188" y="295" width="34" height="36" rx="13" fill="#c0e4f2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <ellipse cx="205" cy="328" rx="20" ry="13" fill="#c0e4f2" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 背中の突起 -->
  <ellipse cx="222" cy="222" rx="9" ry="18" fill="#a8d8ee" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(-15 222 222)"/>
  <ellipse cx="200" cy="217" rx="8" ry="16" fill="#a8d8ee" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(-10 200 217)"/>
  <ellipse cx="178" cy="220" rx="7" ry="14" fill="#a8d8ee" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(-5 178 220)"/>

  <!-- 首 -->
  <path d="M165 255 Q148 210 138 175 Q130 145 132 120" stroke="#c8ecf8" stroke-width="54" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M165 255 Q148 210 138 175 Q130 145 132 120" stroke="#2d263c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 首の腹側 -->
  <path d="M172 252 Q157 208 148 178 Q142 152 143 128" stroke="#e0f4ff" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 首の突起(左側) -->
  <ellipse cx="120" cy="185" rx="7" ry="13" fill="#a8d8ee" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(30 120 185)"/>
  <ellipse cx="117" cy="155" rx="6" ry="11" fill="#a8d8ee" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" transform="rotate(25 117 155)"/>

  <!-- 頭 -->
  <ellipse cx="142" cy="100" rx="48" ry="40" fill="#c8ecf8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 口まわり(鼻先が伸びる) -->
  <path d="M165 100 Q185 105 192 112 Q196 120 190 126" fill="#c0e4f2" stroke="#2d263c" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 鼻の穴 -->
  <ellipse cx="184" cy="110" rx="4" ry="3" fill="#2d263c"/>

  <!-- 目 左(大きくて丸い) -->
  <ellipse cx="130" cy="93" rx="14" ry="16" fill="white" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="133" cy="95" rx="8" ry="9" fill="#4a9bc8"/>
  <ellipse cx="135" cy="96" rx="4" ry="5" fill="#1a3a52"/>
  <ellipse cx="137" cy="93" rx="2" ry="2" fill="white"/>

  <!-- 目 右(少し小さめ・落書き感) -->
  <ellipse cx="156" cy="91" rx="11" ry="13" fill="white" stroke="#2d263c" stroke-width="6"/>
  <ellipse cx="158" cy="93" rx="6" ry="7" fill="#4a9bc8"/>
  <ellipse cx="160" cy="94" rx="3" ry="4" fill="#1a3a52"/>
  <ellipse cx="162" cy="92" rx="2" ry="2" fill="white"/>

  <!-- ほっぺの丸み(右) -->
  <ellipse cx="168" cy="110" rx="10" ry="8" fill="#d0f0ff" stroke="none" opacity="0.7"/>

  <!-- 耳/角(頭頂の角ペア) -->
  <path d="M128 65 Q118 38 122 22 Q130 35 136 60" fill="#a8d8ee" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M148 62 Q145 36 152 20 Q158 35 158 60" fill="#a8d8ee" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頬のヒレ 左 (半透明の青い飾り) -->
  <path d="M108 88 Q82 68 74 50 Q88 62 100 75 Q85 55 92 38 Q102 58 108 82" fill="#7ecbef" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" opacity="0.82"/>
  <!-- ヒレの光る線 -->
  <path d="M90 54 Q98 68 106 82" stroke="#cdf1ff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- 頬のヒレ 右 -->
  <path d="M170 84 Q196 65 206 46 Q194 60 182 73 Q197 53 192 36 Q183 56 172 79" fill="#7ecbef" stroke="#2d263c" stroke-width="5" stroke-linejoin="round" opacity="0.82"/>
  <path d="M194 50 Q186 65 174 80" stroke="#cdf1ff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- 体の青い斑点模様 -->
  <ellipse cx="220" cy="265" rx="10" ry="7" fill="#9dd4ec" stroke="none" opacity="0.6"/>
  <ellipse cx="195" cy="255" rx="7" ry="5" fill="#9dd4ec" stroke="none" opacity="0.5"/>
  <ellipse cx="240" cy="280" rx="8" ry="5" fill="#9dd4ec" stroke="none" opacity="0.5"/>

  <!-- 口の線 -->
  <path d="M174 117 Q180 121 186 118" stroke="#2d263c" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- しっぽ先の青い色 -->
  <ellipse cx="295" cy="228" rx="13" ry="10" fill="#7ecbef" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" transform="rotate(-30 295 228)"/>
</svg>