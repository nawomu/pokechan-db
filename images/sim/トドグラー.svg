<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴: 1.青い丸くて大きいアザラシ体型(トド) 2.頭〜背中にかけての紺色のまだら模様(帽子のよう) 3.鼻先にのせた赤いボール 4.顔まわりのクリーム色のまだら+長い口ひげ 5.左右の大きなヒレと小さな尾びれ -->

  <!-- 尾びれ(後ろ) -->
  <ellipse cx="180" cy="322" rx="42" ry="18" fill="#5B9BD8" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 体(青い丸い胴体) -->
  <ellipse cx="180" cy="245" rx="120" ry="90" fill="#5B9BD8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 背中〜肩の紺色のまだら -->
  <ellipse cx="180" cy="188" rx="103" ry="55" fill="#274C77" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- おなかのクリーム色 -->
  <ellipse cx="180" cy="278" rx="66" ry="58" fill="#F5E7C4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 左右の大きなヒレ -->
  <ellipse cx="66" cy="255" rx="30" ry="56" fill="#4A8CCB" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-25 66 255)"/>
  <ellipse cx="294" cy="255" rx="30" ry="56" fill="#4A8CCB" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(25 294 255)"/>

  <!-- 頭(青) -->
  <circle cx="180" cy="112" r="68" fill="#5B9BD8" stroke="#2d263c" stroke-width="8"/>

  <!-- 頭の紺色の帽子まだら -->
  <path d="M116 100 Q180 40 244 100 L244 132 Q180 152 116 132 Z"
        fill="#274C77" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- 顔まわりのクリーム色 -->
  <ellipse cx="180" cy="152" rx="52" ry="42" fill="#F5E7C4" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- ほっぺの薄いピンク -->
  <ellipse cx="140" cy="160" rx="12" ry="9" fill="#FFC9D6" opacity="0.85"/>
  <ellipse cx="220" cy="160" rx="12" ry="9" fill="#FFC9D6" opacity="0.85"/>

  <!-- 目 -->
  <circle cx="156" cy="140" r="10" fill="#2d263c"/>
  <circle cx="204" cy="140" r="10" fill="#2d263c"/>
  <circle cx="159" cy="136" r="3" fill="#ffffff"/>
  <circle cx="207" cy="136" r="3" fill="#ffffff"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="160" rx="7" ry="5" fill="#2d263c"/>

  <!-- 口ひげ(左右) -->
  <path d="M150 168 Q118 190 128 226 Q142 202 162 178 Z"
        fill="#E3C98F" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M210 168 Q242 190 232 226 Q218 202 198 178 Z"
        fill="#E3C98F" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 口 -->
  <path d="M164 182 Q180 192 196 182" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 鼻先にのせたボール -->
  <ellipse cx="180" cy="88" rx="14" ry="6" fill="#274C77" opacity="0.35"/>
  <circle cx="180" cy="66" r="26" fill="#E2482E" stroke="#2d263c" stroke-width="7"/>
  <ellipse cx="171" cy="58" rx="7" ry="5" fill="#ffffff" opacity="0.85"/>
</svg>
