<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 特徴メモ:
  1) 全身こい青(インディゴ)の毛並み・がっしりした四足のライオンの子ども体型
  2) 背中〜しっぽにかけて黒いギザギザ模様(すじ)が一本通っている
  3) 胸元に小さな黒いふさふさの毛(たてがみの生えかけ)
  4) おでこに黄色い星マーク、しっぽの先も黄色い星形
  5) 目は黄色くするどい・足先は黒い -->

  <!-- しっぽ(体の後ろ・星の先端) -->
  <path d="M258,235 Q300,215 315,175 Q325,145 308,122 Q297,110 288,120 Q302,138 294,163 Q285,192 244,213" fill="#2c48a0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <polygon points="303,110 309,122 322,118 312,128 318,141 303,133 290,141 296,128 285,118 298,122" fill="#f4d03f" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 後ろ足 左 -->
  <path d="M138,258 Q124,275 122,300 Q121,313 134,313" fill="#2c48a0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="132" cy="316" rx="17" ry="9" fill="#20202a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 後ろ足 右 -->
  <path d="M222,258 Q236,275 238,300 Q239,313 226,313" fill="#2c48a0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="228" cy="316" rx="17" ry="9" fill="#20202a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 体(丸みのあるがっしりした胴体) -->
  <path d="M112,205 Q106,165 128,138 Q150,112 180,110 Q210,112 232,138 Q254,165 248,205 Q244,245 224,270 Q205,288 180,288 Q155,288 136,270 Q116,245 112,205 Z" fill="#3a5aa8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- おなかの薄い色 -->
  <ellipse cx="180" cy="220" rx="44" ry="52" fill="#8fa3d4" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 背中の黒いギザギザすじ -->
  <path d="M180,112 L172,130 L186,142 L168,158 L184,174 L166,192 L182,208" fill="none" stroke="#20202a" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 前足 左 -->
  <path d="M132,238 Q116,252 112,278 Q110,292 123,293" fill="#2c48a0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="120" cy="296" rx="16" ry="9" fill="#20202a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 前足 右 -->
  <path d="M228,238 Q244,252 248,278 Q250,292 237,293" fill="#2c48a0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <ellipse cx="240" cy="296" rx="16" ry="9" fill="#20202a" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 胸元の黒いふさふさ(たてがみの生えかけ) -->
  <path d="M155,192 Q165,178 180,180 Q195,178 205,192 Q198,204 180,206 Q162,204 155,192 Z" fill="#20202a" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- 頭 -->
  <path d="M133,108 Q130,68 155,48 Q168,36 180,35 Q193,36 205,48 Q230,68 227,108 Q225,128 180,132 Q135,128 133,108 Z" fill="#3a5aa8" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- 耳 左 -->
  <polygon points="140,92 128,38 158,63" fill="#2c48a0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- 耳 右 -->
  <polygon points="220,90 232,34 202,60" fill="#2c48a0" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>

  <!-- おでこの星マーク -->
  <polygon points="180,48 184,60 197,60 187,68 191,80 180,72 169,80 173,68 163,60 176,60" fill="#f4d03f" stroke="#2d263c" stroke-width="3" stroke-linejoin="round"/>

  <!-- 目 左 -->
  <ellipse cx="159" cy="90" rx="13" ry="10" fill="#f4d03f" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="159" cy="92" rx="6" ry="6" fill="#20202a"/>
  <ellipse cx="156" cy="88" rx="2.5" ry="2.5" fill="#ffffff"/>

  <!-- 目 右 -->
  <ellipse cx="201" cy="90" rx="13" ry="10" fill="#f4d03f" stroke="#2d263c" stroke-width="4"/>
  <ellipse cx="201" cy="92" rx="6" ry="6" fill="#20202a"/>
  <ellipse cx="198" cy="88" rx="2.5" ry="2.5" fill="#ffffff"/>

  <!-- 鼻 -->
  <ellipse cx="180" cy="108" rx="6" ry="4" fill="#20202a" stroke="#2d263c" stroke-width="3"/>

  <!-- 口 -->
  <path d="M168,118 Q180,127 192,118" fill="none" stroke="#2d263c" stroke-width="4" stroke-linecap="round"/>
</svg>
