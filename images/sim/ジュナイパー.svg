<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- tail / leaf tail behind body -->
  <ellipse cx="200" cy="305" rx="38" ry="16" fill="#4a7a3a" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <path d="M170 300 Q185 275 195 258 Q205 275 215 300 Z" fill="#5a9a48" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M185 298 Q192 278 198 265" fill="none" stroke="#2d263c" stroke-width="3" stroke-linecap="round"/>

  <!-- left wing/arm (back, drawn first) -->
  <path d="M90 175 Q55 155 40 125 Q60 118 80 135 Q95 148 105 165" fill="#3d6e35" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- left wing leaf feathers -->
  <path d="M55 128 Q48 108 58 95 Q68 112 65 130 Z" fill="#5a9a48" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M70 120 Q65 100 78 88 Q85 106 80 122 Z" fill="#5a9a48" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M42 138 Q32 120 44 107 Q56 122 52 140 Z" fill="#4a8840" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- right wing/arm (back) -->
  <path d="M270 175 Q305 155 320 125 Q300 118 280 135 Q265 148 255 165" fill="#3d6e35" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- right wing leaf feathers -->
  <path d="M305 128 Q312 108 302 95 Q292 112 295 130 Z" fill="#5a9a48" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M290 120 Q295 100 282 88 Q275 106 280 122 Z" fill="#5a9a48" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M318 138 Q328 120 316 107 Q304 122 308 140 Z" fill="#4a8840" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- body -->
  <ellipse cx="180" cy="235" rx="62" ry="72" fill="#3d6e35" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- belly / chest cream -->
  <ellipse cx="180" cy="250" rx="38" ry="50" fill="#f0ead8" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- legs -->
  <rect x="150" y="295" width="22" height="30" rx="8" fill="#3d6e35" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <rect x="188" y="295" width="22" height="30" rx="8" fill="#3d6e35" stroke="#2d263c" stroke-width="7" stroke-linejoin="round"/>
  <!-- feet -->
  <ellipse cx="161" cy="325" rx="16" ry="9" fill="#2d5228" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <ellipse cx="199" cy="325" rx="16" ry="9" fill="#2d5228" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- hood / cloak red-brown -->
  <path d="M118 165 Q108 148 118 125 Q135 100 165 92 Q180 88 195 92 Q225 100 242 125 Q252 148 242 165 Q225 158 180 155 Q135 158 118 165 Z" fill="#8b3a2a" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>
  <!-- hood inner shadow/opening -->
  <path d="M145 148 Q155 138 180 135 Q205 138 215 148 Q205 162 180 164 Q155 162 145 148 Z" fill="#c9613e" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- head / white face -->
  <ellipse cx="180" cy="145" rx="42" ry="44" fill="#f5f0e0" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- red feather plume on top left -->
  <path d="M148 112 Q138 90 145 72 Q152 85 158 105 Z" fill="#cc4422" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M155 108 Q142 88 152 70 Q161 84 164 108 Z" fill="#ee5533" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- eyes - sharp narrow -->
  <ellipse cx="163" cy="143" rx="11" ry="7" fill="#2a5c22" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <ellipse cx="197" cy="143" rx="11" ry="7" fill="#2a5c22" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <!-- eye shine -->
  <ellipse cx="159" cy="141" rx="3" ry="2" fill="#ffffff"/>
  <ellipse cx="193" cy="141" rx="3" ry="2" fill="#ffffff"/>
  <!-- sharp brow lines -->
  <path d="M153 135 Q163 129 175 132" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M187 132 Q199 129 209 135" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- beak / small pointed beak -->
  <path d="M175 157 L180 165 L185 157 Z" fill="#c8a830" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- front arm-wings overlapping body -->
  <path d="M115 200 Q95 185 88 165 Q105 160 120 178 Q130 190 135 205" fill="#3d6e35" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M245 200 Q265 185 272 165 Q255 160 240 178 Q230 190 225 205" fill="#3d6e35" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- leaf bow on left arm -->
  <path d="M93 168 Q83 152 90 138 Q100 150 98 168 Z" fill="#72b858" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M101 162 Q90 148 99 134 Q110 146 107 162 Z" fill="#5a9a48" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
</svg>