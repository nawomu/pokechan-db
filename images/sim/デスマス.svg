<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360">
  <!-- 後ろ:体のうしろ側の裾(奥の布のひらめき) -->
  <path d="M120 250 Q110 290 130 305 Q140 285 148 260 Z" fill="#332f45" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="M240 250 Q252 288 232 306 Q222 285 214 260 Z" fill="#332f45" stroke="#2d263c" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体(黒っぽい浮遊する布・すそが3つ波打つ) -->
  <path d="M180 55
           C138 55 100 88 92 140
           C86 178 92 218 108 250
           C118 270 132 288 150 292
           C158 294 164 286 168 272
           C172 288 176 300 180 300
           C184 300 188 288 192 272
           C196 286 202 294 210 292
           C228 288 242 270 252 250
           C268 218 274 178 268 140
           C260 88 222 55 180 55 Z"
        fill="#312c46" stroke="#2d263c" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 体のハイライト(左上、少し明るい影) -->
  <ellipse cx="150" cy="110" rx="34" ry="26" fill="#463f60" opacity="0.55"/>

  <!-- 頭の上の折れ目(布のシワ) -->
  <path d="M148 70 Q168 60 188 70" fill="none" stroke="#2d263c" stroke-width="6" stroke-linecap="round"/>
  <path d="M158 90 Q180 80 202 92" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- 左手(お面を持つ) -->
  <ellipse cx="112" cy="212" rx="20" ry="16" fill="#312c46" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(-18 112 212)"/>
  <!-- 右手(お面を持つ) -->
  <ellipse cx="250" cy="212" rx="20" ry="16" fill="#312c46" stroke="#2d263c" stroke-width="7" stroke-linejoin="round" transform="rotate(18 250 212)"/>

  <!-- お面(金色・顔の下で両手に持たれている) -->
  <ellipse cx="181" cy="230" rx="72" ry="56" fill="#e2b855" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- お面のフチの影 -->
  <path d="M120 232 Q181 268 244 230 Q240 260 181 278 Q122 260 120 232 Z" fill="#c99f45" opacity="0.7"/>

  <!-- 目穴(黒・アーモンド形) -->
  <path d="M132 220 Q152 202 172 220 Q152 236 132 220 Z" fill="#1c1826" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>
  <path d="M190 220 Q210 202 230 220 Q210 236 190 220 Z" fill="#1c1826" stroke="#2d263c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 目穴の奥の赤い光 -->
  <ellipse cx="152" cy="220" rx="6" ry="7" fill="#e63030"/>
  <ellipse cx="210" cy="220" rx="6" ry="7" fill="#e63030"/>

  <!-- 涙のような赤い模様(左右) -->
  <path d="M140 232 Q136 250 146 258 Q154 248 148 232 Z" fill="#d0402f" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M222 232 Q226 250 216 258 Q208 248 214 232 Z" fill="#d0402f" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 額の赤い印 -->
  <path d="M172 196 Q181 186 190 196 Q181 204 172 196 Z" fill="#d0402f" stroke="#2d263c" stroke-width="4" stroke-linejoin="round"/>

  <!-- 口(お面の小さな三日月形の口) -->
  <path d="M164 252 Q181 262 198 252" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
</svg>
