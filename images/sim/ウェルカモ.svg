  <!-- head -->
  <circle cx="188" cy="112" r="58" fill="#F7F1E1" stroke="#2d263c" stroke-width="8"/>

  <!-- blue head crest / bandana feather -->
  <path d="M150,78 Q140,42 168,26 Q160,54 172,74 Z"
