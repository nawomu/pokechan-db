  <!-- blue cheek/eye patch swirl -->
  <path d="M140,120 Q128,104 140,90 Q158,92 162,110 Q156,124 140,120 Z"
        fill="#4C93BE" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>
  <path d="M236,120 Q248,104 236,90 Q218,92 214,110 Q220,124 236,120 Z"
        fill="#4C93BE" stroke="#2d263c" stroke-width="6" stroke-linejoin="round"/>

  <!-- eyes -->
  <ellipse cx="164" cy="114" rx="11" ry="13" fill="#2d263c"/>
  <ellipse cx="212" cy="114" rx="11" ry="13" fill="#2d263c"/>
  <circle cx="167" cy="109" r="3.5" fill="#F7F1E1"/>
  <circle cx="215" cy="109" r="3.5" fill="#F7F1E1"/>

  <!-- bill -->
  <path d="M168,134 Q188,148 208,134 Q206,152 188,160 Q170,152 168,134 Z"
