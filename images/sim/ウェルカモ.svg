  <!-- body -->
  <ellipse cx="188" cy="228" rx="72" ry="86" fill="#F7F1E1" stroke="#2d263c" stroke-width="8" stroke-linejoin="round"/>

  <!-- fluffy chest detail lines -->
  <path d="M162,236 Q178,246 162,258" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M188,242 Q204,252 188,264" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>
  <path d="M214,236 Q228,246 214,258" fill="none" stroke="#2d263c" stroke-width="5" stroke-linecap="round"/>

  <!-- left wing -->
  <path d="M124,206 Q100,232 108,270 Q130,266 140,238 Q142,220 132,204 Z"
