<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; overflow:hidden; }
  body {
    position:relative;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    background:
      radial-gradient(circle at 50% 38%, rgba(255,203,5,0.22), rgba(255,203,5,0) 46%),
      linear-gradient(160deg, #112a5e 0%, #0c1b3d 55%, #0a1430 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#fff;
  }
  /* チャンピオン感の放射ライン */
  .rays { position:absolute; inset:0; overflow:hidden; opacity:.10; }
  .rays::before {
    content:""; position:absolute; left:50%; top:38%; width:1700px; height:1700px;
    transform:translate(-50%,-50%);
    background:repeating-conic-gradient(from 0deg, #FFCB05 0deg 6deg, transparent 6deg 12deg);
    -webkit-mask-image:radial-gradient(circle, #000 0%, transparent 62%);
            mask-image:radial-gradient(circle, #000 0%, transparent 62%);
  }
  /* 上下のアクセントバー */
  .top-bar { position:absolute; top:0; left:0; right:0; height:10px;
    background:linear-gradient(90deg,#FF7A00,#FFCB05 50%,#1E5BB8); }
  .bottom-bar { position:absolute; bottom:0; left:0; right:0; height:10px;
    background:linear-gradient(90deg,#1E5BB8,#FFCB05 50%,#FF7A00); }

  .logo { width:760px; max-width:64%; height:auto; display:block;
    filter:drop-shadow(0 14px 30px rgba(0,0,0,.45)); position:relative; z-index:2; }

  .sub { position:relative; z-index:2; margin-top:30px;
    font-size:30px; font-weight:800; letter-spacing:.16em; color:#FFE38A;
    text-transform:uppercase; text-shadow:0 2px 10px rgba(0,0,0,.5); }

  .tagline { position:relative; z-index:2; margin-top:14px;
    font-size:26px; font-weight:700; color:#dce6ff; letter-spacing:.02em; }

  /* タイプカラーのドット帯 */
  .chips { position:relative; z-index:2; margin-top:30px; display:flex; gap:12px; }
  .chips i { width:16px; height:16px; border-radius:50%; display:block;
    box-shadow:0 2px 6px rgba(0,0,0,.4); }

  .url { position:absolute; z-index:2; bottom:30px; right:40px;
    font-size:24px; font-weight:800; color:#9fb6e8; letter-spacing:.04em; }
</style>
</head>
<body>
  <div class="rays"></div>
  <div class="top-bar"></div>
  <div class="bottom-bar"></div>

  <img class="logo" src="../branding/logo/logo_main_clean.png" alt="PchamDB">
  <div class="sub">Unofficial Pokémon Champions Database</div>
  <div class="tagline" id="tagline">ポケモンチャンピオンズ 非公式ファンDB</div>
  <div class="chips">
    <i style="background:#EE6B2F"></i><i style="background:#3592DC"></i>
    <i style="background:#7AC74C"></i><i style="background:#F7D02C"></i>
    <i style="background:#D685AD"></i><i style="background:#6F35FC"></i>
    <i style="background:#B7B7CE"></i><i style="background:#A6B91A"></i>
  </div>
  <div class="url">pchamdb.com</div>
</body>
</html>
