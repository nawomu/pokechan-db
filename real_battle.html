<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="real_battle.page_title">リアルバトル — PchamDB</title>
<script defer src="i18n/runtime.js?v=20260622"></script>
<script src="pokechan_data.js?v=20260702u"></script>
<script src="battle_log_i18n.js?v=20260625a"></script>
<style>
/* 実機風バトルページ(2026-06-12 阿部さん: 検証用シミュレーターとは別ページ・実機の画面とテンポで) */
*{box-sizing:border-box}
body{margin:0;background:#0c1322;color:#e6edf3;font-family:"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  display:flex;flex-direction:column;align-items:center;min-height:100vh}
header{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;padding:10px 14px 0}
header h1{font-size:15px;margin:0;color:#dbe3f2}
header a{color:#58a6ff;font-size:12px;text-decoration:none}
#game{width:100%;max-width:760px;padding:8px 14px 30px}
/* バトル中は左右2カラムのぶん横幅を広げる(設定画面は760pxのまま) */
/* S1: 盤面560+ログ460+gap14+余白 = 1060px を維持 */
body.in-battle #game,body.in-battle header{max-width:1060px}

/* ===== チーム編成 ===== */
#setup{background:#141927;border:1px solid #232a3a;border-radius:14px;padding:18px}
#setup h2{font-size:14px;margin:0 0 10px;color:#9fb4d8}
.team-row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.team-row .tlabel{font-size:12px;font-weight:700;width:64px}
.team-row .slot{flex:1;min-width:130px;background:#0c1322;color:#e6edf3;border:1px solid #2a3450;border-radius:8px;
  padding:6px 8px;cursor:pointer;display:flex;align-items:center;gap:7px;font-size:13px;text-align:left}
.team-row .slot:hover{border-color:#58a6ff}
.team-row .slot img{width:30px;height:30px;object-fit:contain;flex:0 0 auto}
/* ポケモン検索モーダル */
#poke-picker{position:fixed;inset:0;background:#000a;display:none;align-items:flex-start;justify-content:center;z-index:50;padding:40px 14px}
#poke-picker .pp-box{background:#141927;border:1px solid #2a3450;border-radius:14px;width:100%;max-width:560px;
  max-height:80vh;display:flex;flex-direction:column;padding:14px}
#poke-picker input{background:#0c1322;color:#e6edf3;border:1px solid #2a3450;border-radius:9px;padding:9px 12px;
  font-size:15px;margin-bottom:10px;width:100%}
#pp-list{overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
#pp-list button{background:#0c1322;border:1px solid #232a3a;border-radius:9px;color:#e6edf3;cursor:pointer;
  padding:7px 5px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px}
#pp-list button:hover{border-color:#58a6ff;background:#1b2540}
#pp-list img{width:54px;height:54px;object-fit:contain}
#pp-close{margin-top:10px;background:#1a2030;border:1px solid #2a3450;border-radius:9px;color:#8b94a7;padding:8px;cursor:pointer}
/* くわしく編成(技・持ち物の編集) */
#detail-setup{margin-top:12px;border-top:1px solid #232a3a;padding-top:10px;display:none}
#detail-setup.open{display:block}
.ds-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.ds-row .ds-name{width:130px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px}
.ds-row .ds-name img{width:26px;height:26px;object-fit:contain}
.ds-row .mv-chip{font-size:10.5px;padding:4px 8px;border-radius:8px;border:1px solid #2a3450;background:#0c1322;
  color:#e6edf3;cursor:pointer;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ds-row .mv-chip:hover{border-color:#58a6ff}
.ds-row select{background:#0c1322;color:#e6edf3;border:1px solid #2a3450;border-radius:8px;padding:4px;font-size:11px;max-width:150px}
#detail-toggle{margin-top:10px;background:#1a2030;border:1px solid #2a3450;border-radius:8px;color:#9fb4d8;
  padding:6px 12px;cursor:pointer;font-size:12px;width:100%}
/* わざ検索モーダル(ポケモン検索と同型) */
#move-picker{position:fixed;inset:0;background:#000a;display:none;align-items:flex-start;justify-content:center;z-index:50;padding:40px 14px}
#move-picker .mp-box{background:#141927;border:1px solid #2a3450;border-radius:14px;width:100%;max-width:560px;
  max-height:80vh;display:flex;flex-direction:column;padding:14px}
#move-picker input{background:#0c1322;color:#e6edf3;border:1px solid #2a3450;border-radius:9px;padding:9px 12px;
  font-size:15px;margin-bottom:10px;width:100%}
#mp-list{overflow-y:auto;display:flex;flex-direction:column;gap:4px}
#mp-list button{background:#0c1322;border:1px solid #232a3a;border-radius:8px;color:#e6edf3;cursor:pointer;
  padding:7px 10px;text-align:left;font-size:12px}
#mp-list button:hover{border-color:#58a6ff;background:#1b2540}
#mp-close{margin-top:10px;background:#1a2030;border:1px solid #2a3450;border-radius:9px;color:#8b94a7;padding:8px;cursor:pointer}
#setup .btns{display:flex;gap:10px;margin-top:14px}
#setup button{flex:1;padding:12px;border-radius:10px;border:1px solid #2a3450;cursor:pointer;font-weight:800;font-size:14px;
  background:linear-gradient(90deg,#1c2a3a,#2a1c3a);color:#fff}
#setup button.sub{flex:0 0 auto;font-weight:600;font-size:12px;background:#1a2030}
#setup button:hover{border-color:#58a6ff}

/* ===== バトル画面 ===== */
/* S1: 3ブロックレイアウト化・盤面560×360/ログ460×362 (Showdown実測値) */
#battle{display:none;gap:14px;align-items:flex-start}
/* S1: 盤面サイズ 600×430 → 560×360 に変更(Showdown準拠) */
/* font-familyはShowdown準拠でVerdanaを盤面内に限定適用(body全体は日本語フォントを維持) */
#field{position:relative;height:360px;border:1px solid #2a3550;border-radius:14px;overflow:hidden;
  font-family:Verdana,sans-serif;
  background:
    radial-gradient(150% 70% at 50% 118%, #7ec25a 0%, #6db04c 30%, transparent 58%),
    linear-gradient(180deg,#a9e0f5 0%,#cbecfb 28%,#e2f4e3 45%,#a9d57f 46.5%,#8cc35e 72%,#74b350 100%);
  box-shadow:inset 0 -40px 60px #3a6e2f33, inset 0 18px 40px #ffffff22}
#field::after{content:"";position:absolute;left:0;right:0;top:44%;height:3px;background:linear-gradient(90deg,#0000,#ffffff44,#0000);pointer-events:none}
#weather-fx{position:absolute;inset:0;pointer-events:none;opacity:.22;font-size:34px;letter-spacing:18px;line-height:1.3;text-align:center}
.fighter{position:absolute;width:300px;transition:transform .2s}
.fighter .platform{position:absolute;left:50%;transform:translateX(-50%);bottom:-6px;width:200px;height:34px;border-radius:50%;
  background:radial-gradient(ellipse at center,#3f6f2caa 0%,#3f6f2c55 55%,transparent 72%)}
.fighter .sprite{position:relative;display:flex;justify-content:center;align-items:flex-end;height:120px}
.fighter .sprite img{max-height:118px;max-width:150px;filter:drop-shadow(0 6px 6px #0009);transition:transform .15s}
.fighter .sprite .circ{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;color:#fff;background:#3a4660;box-shadow:inset 0 -8px 16px #0007,0 5px 8px #000a}
#f-opp{top:52px;right:78px;transform:scale(.82);transform-origin:center bottom}
#f-self{bottom:42px;left:64px;transform:scale(1.08);transform-origin:center bottom}
#f-opp .platform{width:150px;height:24px}
#f-self .platform{width:236px;height:40px}
#turn-badge{position:absolute;top:10px;left:12px;z-index:7;background:#fffffff2;color:#1b2438;font-weight:900;
  font-size:13px;padding:3px 12px;border-radius:11px;box-shadow:0 2px 5px #0004;border:1px solid #0002}
.trainer{position:absolute;z-index:6;display:flex;align-items:center;gap:5px;font-weight:800;font-size:12px;color:#26331f;
  background:#ffffffcc;padding:2px 9px 2px 4px;border-radius:13px;box-shadow:0 1px 3px #0003}
.trainer .ava{font-size:15px;line-height:1}
.tn-opp{top:12px;right:14px}
.tn-self{bottom:14px;left:14px}
.pbox{position:absolute;background:#141927ee;border:1px solid #2a3450;border-radius:10px;padding:8px 12px;min-width:215px}
#pb-opp{top:26px;left:24px}
#pb-self{bottom:18px;right:24px}
.pbox .who{position:absolute;top:-9px;left:10px;font-size:9px;font-weight:800;padding:1px 8px;border-radius:8px}
.pbox .who.self{background:#11331f;color:#4ade80;border:1px solid #4ade8044}
.pbox .who.opp{background:#3a1518;color:#f87171;border:1px solid #f8717144}
.pbox .row1{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.pbox .nm{font-weight:800;font-size:14px}
.pbox .lv{font-size:10px;color:#8b94a7}
.pbox .hpbar{height:9px;background:#1d2433;border-radius:5px;margin:5px 0 3px;overflow:hidden;border:1px solid #2a3450}
.pbox .hpfill{height:100%;background:#4ade80;width:100%;transition:width .5s}
.pbox .hpfill.mid{background:#fbbf24}.pbox .hpfill.low{background:#f87171}
.pbox .hptext{font-size:10px;color:#8b94a7;text-align:right}
.pbox .sts{margin-top:3px;min-height:14px;display:flex;gap:3px;flex-wrap:wrap}
.pbox .sts .bdg{font-size:9px;padding:1px 6px;border-radius:7px;background:#3a2518;color:#fbbf24;border:1px solid #fbbf2444}
.pbox .balls{margin-top:4px;display:flex;gap:3px;align-items:center}
.pbox .balls .tball{width:20px;height:20px;border-radius:50%;background:#0003;border:1px solid #ffffff33;
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.pbox .balls .tball img{width:18px;height:18px;object-fit:contain}
.pbox .balls .tball.dead{opacity:.3;filter:grayscale(1)}
.pbox .balls .tball.empty{background:#0001;border-style:dashed}

/* ===== ステージ演出v3(2026-06-12 阿部さん「演出強化」) ===== */
.popnum{position:absolute;left:50%;top:8px;transform:translateX(-50%);font-weight:900;font-size:20px;
  text-shadow:0 2px 4px #000c;pointer-events:none;animation:rbPop 1s forwards;z-index:5;white-space:nowrap}
@keyframes rbPop{0%{opacity:0;transform:translateX(-50%) translateY(6px) scale(.6)}18%{opacity:1;transform:translateX(-50%) translateY(-6px) scale(1.18)}100%{opacity:0;transform:translateX(-50%) translateY(-46px) scale(1)}}
.burst{position:absolute;left:50%;top:46%;width:120px;height:120px;margin:-60px 0 0 -60px;border-radius:50%;
  pointer-events:none;animation:rbBurst .55s forwards;z-index:4}
@keyframes rbBurst{0%{transform:scale(.15);opacity:.9}100%{transform:scale(1.8);opacity:0}}
#fx-flash{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:6}
#fx-flash.on{animation:rbFlash .5s forwards}
#fx-flash.mega{animation:rbMega 1s forwards}
@keyframes rbFlash{0%{opacity:.75}100%{opacity:0}}
@keyframes rbMega{0%{opacity:0}25%{opacity:.95}55%{opacity:.6}100%{opacity:0}}
@keyframes rbWeather{0%{transform:translateY(-8px)}100%{transform:translateY(8px)}}
#weather-fx.live{animation:rbWeather 2.2s ease-in-out infinite alternate}
@keyframes rbShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(4px)}}
@keyframes rbLunge{0%{transform:none}40%{transform:translate(14px,-10px) scale(1.05)}100%{transform:none}}
@keyframes rbLungeOpp{0%{transform:none}40%{transform:translate(-14px,10px) scale(1.05)}100%{transform:none}}
@keyframes rbFaint{0%{opacity:1;transform:none}100%{opacity:0;transform:translateY(40px)}}
@keyframes rbEnter{0%{opacity:0;transform:translateY(30px) scale(.5)}70%{transform:translateY(-6px) scale(1.06)}100%{opacity:1;transform:none}}
.fighter.hit .sprite{animation:rbShake .5s}
.fighter.lunge-self .sprite{animation:rbLunge .45s}
.fighter.lunge-opp .sprite{animation:rbLungeOpp .45s}
.fighter.faint .sprite{animation:rbFaint .7s forwards}
.fighter.enter .sprite{animation:rbEnter .5s}

/* メッセージ+コマンド */
/* メッセージ欄=盤面の外・下部(6行ぶん縦長・直近の履歴が薄く見える) */
#msgbox{position:relative;margin-top:10px;background:#0b1020;border:1px solid #2a3450;border-radius:12px;
  padding:11px 14px 22px;cursor:pointer}
#msg-lines{height:9.6em;overflow-y:auto;line-height:1.6;font-size:14.5px;
  display:flex;flex-direction:column;justify-content:flex-end}
#msg-lines .ml-line{margin:1px 0;color:#7e889c}      /* 前のログ=薄め */
#msg-lines .ml-line:last-child{color:#fff;font-weight:600}  /* いまのメッセージ=白く強調 */
#msgbox .next{position:absolute;right:12px;bottom:5px;color:#9ec5ff;animation:blink 1s infinite;font-size:12px}
/* S1: 2カラム配置。ログは右配置(Showdown準拠)。
 * 注: 過去に「ログは左」という独自化の経緯があったが、今回の方針「Showdownと完全に同じに再現」により
 * Showdown準拠の右配置へ変更。order指定で左=盤面(order:0)/右=ログ(order:1)に揃える。 */
#battle-main{flex:0 0 560px;max-width:560px;min-width:0;order:0}
/* S1: ログパネル 460×362px / bg:#eef2f5(Showdown実測値) / フォントVerdana限定指定 */
#battle-log-panel{flex:0 0 460px;min-width:460px;height:362px;display:flex;flex-direction:column;order:1;
  background:#eef2f5;border:1px solid #aaaaaa;border-radius:0;
  font-family:Verdana,sans-serif;color:#000;overflow:hidden}
/* S1: ログヘッダーをShowdown配色に合わせる(bg:#e0e7ea=ターン見出し色で統一) */
#log-head{flex:0 0 auto;padding:8px 12px;font-weight:800;font-size:13px;color:#000;
  background:#e0e7ea;border-bottom:1px solid #aaaaaa}
/* S1: ログスクロール領域・文字色をShowdown準拠の黒に */
#log-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;padding:6px 12px 12px;font-size:13px;line-height:1.55;
  color:#000}
/* S1: ターン見出し → Showdown準拠のh2スタイル(bg:#e0e7ea/17px/height:31px)。
 * JSではまだdiv.log-turnのまま(S4で h2.battle-history に移行予定)。
 * S1ではlog-turnのCSSをShowdown h2に近い見た目に更新する。 */
#log-scroll .log-turn{display:block;margin:0 -12px 0;padding:0 12px;
  background:#e0e7ea;color:#000;font-size:17px;font-weight:bold;
  height:31px;line-height:31px;border-radius:0}
#log-scroll .log-turn:first-child{margin-top:0}
/* S1: ログ本文行の文字色を黒に(ダーク#cdd6e4 → #000) */
#log-scroll .log-line{color:#000;margin:2px 0}
/* S1: スマホ縦積み維持(≤880px。不変条件) */
@media(max-width:880px){
  #battle{flex-direction:column}
  #battle-main{flex:1 1 auto;width:100%;max-width:100%;order:0}
  #battle-log-panel{flex:0 0 auto;width:100%;height:auto;max-height:240px;min-width:0;order:1}
}
@keyframes blink{50%{opacity:0}}
#cmd{margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
#cmd button{padding:14px;border-radius:10px;border:1px solid #2a3450;background:#161d2e;color:#e6edf3;
  font-size:14px;font-weight:800;cursor:pointer}
#cmd button:hover:not(:disabled){border-color:#58a6ff;background:#1b2540}
#cmd button:disabled{opacity:.35;cursor:default}
#cmd button.mega-armed{border-color:#fbbf24;color:#fbbf24}
#moves{margin-top:10px;display:none;grid-template-columns:1fr 1fr;gap:8px}
#moves button{padding:12px 12px 10px;border-radius:10px;border:1px solid #2a3450;background:#161d2e;color:#e6edf3;
  text-align:left;cursor:pointer}
#moves button:hover:not(:disabled){filter:brightness(1.1);box-shadow:0 0 0 2px #ffffff55 inset}
#moves button.tcol:not(:disabled){color:#fff;text-shadow:0 1px 2px #0007}
#moves button.tcol:not(:disabled) .mv-sub{color:#ffffffdd}
#moves .mv-name{font-weight:800;font-size:14px}
#moves .mv-sub{font-size:10.5px;color:#8b94a7;margin-top:2px}
#moves .t-pill{display:inline-block;font-size:9px;padding:1px 7px;border-radius:7px;color:#fff;margin-right:6px}
#moves button.back{text-align:center;color:#8b94a7;font-weight:700}
#party{margin-top:10px;display:none;grid-template-columns:1fr 1fr;gap:8px}
#party button{padding:12px;border-radius:10px;border:1px solid #2a3450;background:#161d2e;color:#e6edf3;text-align:left;cursor:pointer}
#party button:hover:not(:disabled){border-color:#58a6ff}
#party button:disabled{opacity:.4;cursor:default}
#speed-row{margin-top:8px;font-size:11px;color:#8b94a7;display:flex;gap:14px;align-items:center}
</style>
</head>
<body>
<header>
  <h1 data-i18n="real_battle.header_title">🎮 リアルバトル</h1>
  <a href="real_battle_simulator.html" data-i18n="real_battle.header_link_simulator">🔧 検証用シミュレーターへ</a>
</header>
<div id="game">

  <!-- チーム編成 -->
  <div id="setup">
    <h2 data-i18n="real_battle.setup_heading">チームをえらんで バトルスタート！(技は自動セット・⚙くわしく編成で変更OK)</h2>
    <div style="margin-bottom:8px;font-size:12px;color:#9fb4d8"><span data-i18n="real_battle.team_size_label">人数:</span>
      <select id="team-size" style="background:#0c1322;color:#e6edf3;border:1px solid #2a3450;border-radius:8px;padding:4px">
        <option value="3" selected data-i18n="real_battle.team_size_option_3">3体ずつ</option><option value="6" data-i18n="real_battle.team_size_option_6">6体ずつ(フルバトル)</option>
      </select></div>
    <div class="team-row" id="row-self"><span class="tlabel" data-i18n="real_battle.team_label_self">自分</span></div>
    <div class="team-row" id="row-opp"><span class="tlabel" data-i18n="real_battle.team_label_opp">相手</span></div>
    <button id="detail-toggle" data-i18n="real_battle.detail_toggle_button">⚙ くわしく編成(わざ・もちもの をえらぶ)</button>
    <div id="detail-setup"></div>
    <div class="btns">
      <button class="sub" id="btn-random" data-i18n="real_battle.btn_random">🎲 おまかせ編成</button>
      <button id="btn-start" data-i18n="real_battle.btn_start">▶ バトルスタート！</button>
    </div>
  </div>

  <!-- バトル画面 -->
  <div id="battle">
    <div id="battle-main">
    <div id="field">
      <div id="weather-fx"></div>
      <div id="fx-flash"></div>
      <div id="turn-badge">Turn 1</div>
      <div class="trainer tn-opp"><span class="ava">🤖</span><span class="tnm" data-i18n="real_battle.pbox_label_opp">あいて</span></div>
      <div class="trainer tn-self"><span class="ava">🧑</span><span class="tnm" data-i18n="real_battle.pbox_label_self">じぶん</span></div>
      <div class="fighter" id="f-opp"><div class="platform"></div><div class="sprite"></div></div>
      <div class="fighter" id="f-self"><div class="platform"></div><div class="sprite"></div></div>
      <div class="pbox" id="pb-opp"><span class="who opp" data-i18n="real_battle.pbox_label_opp">あいて</span><div class="row1"><span class="nm">—</span><span class="lv">Lv.50</span></div>
        <div class="hpbar"><div class="hpfill"></div></div><div class="sts"></div><div class="balls"></div></div>
      <div class="pbox" id="pb-self"><span class="who self" data-i18n="real_battle.pbox_label_self">じぶん</span><div class="row1"><span class="nm">—</span><span class="lv">Lv.50</span></div>
        <div class="hpbar"><div class="hpfill"></div></div><div class="hptext">—</div><div class="sts"></div><div class="balls"></div></div>
    </div>
    <div id="msgbox"><div id="msg-lines"></div><span class="next" style="display:none" data-i18n="real_battle.msgbox_next_prompt">▼ クリックでつぎへ</span></div>
    <div id="cmd">
      <button id="c-fight" data-i18n="real_battle.cmd_fight">⚔ たたかう</button>
      <button id="c-party" data-i18n="real_battle.cmd_party">🔄 ポケモン</button>
      <button id="c-mega" data-i18n="real_battle.cmd_mega">⬡ メガシンカ</button>
      <button id="c-run" data-i18n="real_battle.cmd_run">🏃 にげる(編成にもどる)</button>
    </div>
    <div id="moves"></div>
    <div id="party"></div>
    <div id="speed-row">
      <label><input type="checkbox" id="auto-msg" checked> <span data-i18n="real_battle.auto_msg_label">自動でメッセージ送り</span></label>

<!-- エンジン共有: 検証用シミュレーターを非表示で読み込み、window.__sim を使う(エンジン無改変) -->
<iframe id="engine-frame" src="real_battle_simulator.html" style="display:none"></iframe>

<script>
let S = null;           // __sim ブリッジ
let busy = false;       // メッセージ再生中
let msgQueue = [];      // 表示待ちのログ行
let logPos = 0;         // battleLog の読み取り位置
let gameOver = false;
let turnNo = 1;         // ターン数(Showdown風 Turn バッジ表示用)
function updateTurnBadge(){ const b = document.getElementById('turn-badge'); if (b) b.textContent = 'Turn ' + turnNo; }
// ===== 流れるバトルログ(Showdown風・右カラム。履歴が積み上がって残る) =====
let lastLogTurn = 0;
function clearLog(){ const s = document.getElementById('log-scroll'); if (s) s.innerHTML = ''; lastLogTurn = 0; }
function logTurnHeader(n){ const s = document.getElementById('log-scroll'); if (!s || n === lastLogTurn) return; lastLogTurn = n;
  const d = document.createElement('div'); d.className = 'log-turn'; d.textContent = 'Turn ' + n; s.appendChild(d); s.scrollTop = s.scrollHeight; }
function logLine(text){ const s = document.getElementById('log-scroll'); if (!s || !text) return;
  const d = document.createElement('div'); d.className = 'log-line'; d.textContent = text; s.appendChild(d); s.scrollTop = s.scrollHeight; }
// メッセージ欄(下部・6行)に1行積む。直近が薄く残って見える
function pushMsgLine(text){ const ml = document.getElementById('msg-lines'); if (!ml || text == null) return;
  const d = document.createElement('div'); d.className = 'ml-line'; d.textContent = text; ml.appendChild(d);
  while (ml.children.length > 40) ml.removeChild(ml.firstChild);
  ml.scrollTop = ml.scrollHeight; }
function clearMsg(){ const ml = document.getElementById('msg-lines'); if (ml) ml.innerHTML = ''; }

const $ = id => document.getElementById(id);

// I18N 表示ヘルパー(マスターDBの固有名詞は直書きせずDB辞書から描画。jaや未登録はjaにフォールバック)
const tPokeName = nm => (window.I18N && window.I18N.pokemon) ? window.I18N.pokemon(nm) : nm;
const tMoveName = m  => (window.I18N && window.I18N.move) ? window.I18N.move(m.key, m.name) : m.name;
const tItemName = it => (window.I18N && window.I18N.item) ? window.I18N.item(it.name) : it.name;
const tItemDesc = it => ((window.I18N && window.I18N.itemDesc && window.I18N.itemDesc(it.name)) || it.effect || '');
const tTypeName = ty => (window.I18N && window.I18N.type) ? window.I18N.type(ty) : ty;
// 技の分類(物理/特殊/変化)の表示語。値はマスターのまま保持し、表示時だけ共有語彙キーで翻訳。
const _CAT_KEY = {'物理':'common.cat_phys', '特殊':'common.cat_spec', '変化':'common.cat_stat'};
const tCatName = c => (window.I18N && window.I18N.t) ? window.I18N.t(_CAT_KEY[c] || '', c) : c;
// 言語切替・i18n初期化時に「くわしく編成」を作り直す(option等の一度きり構築JS部品を追従させる。Sが未準備なら何もしない=冪等)
['i18n:changed', 'i18n:ready'].forEach(ev => document.addEventListener(ev, () => { if (typeof S !== 'undefined' && S) renderDetailSetup(); }));

document.getElementById('engine-frame').addEventListener('load', () => {
  const w = $('engine-frame').contentWindow;
  const wait = setInterval(() => {
    if (w.__sim){
      clearInterval(wait);
      S = w.__sim;
      // ひんし時の死に出し: 控えが2匹以上ならエンジンは保留し、ターン後にプレイヤーがUIで選ぶ
      // (1匹なら __rbSwitchPick=先頭 で自動。promptは出さない。デモ自動バトル中は全自動)
      w.__rbSwitchPick = idxs => idxs[0];
      w.__rbDeferFaintReplace = !location.search.includes('demo');
      initSetup();
    }
  }, 100);
});

// ===== チーム編成 =====
let teamSize = 3;      // 3体 or 6体(フルバトル)
const selfIds = () => Array.from({length: teamSize}, (_, i) => 's' + (i + 1));
const oppIds  = () => Array.from({length: teamSize}, (_, i) => 'o' + (i + 1));
// バトル中の変身でしか現れない姿=最初から手持ちに置けない(イルカマン=ナイーブ始動/ギルガルド=シールド始動)。
// メガと同じく抽選・選択プールから除外する。
const BATTLE_ONLY_FORMS = new Set(['イルカマン(マイティ)', 'ギルガルド(ブレード)']);
const isPickable = p => !p.mega && !BATTLE_ONLY_FORMS.has(p.name);
// 変身結果の姿を「始動の姿」へ戻す(保存データ/引き継ぎに古い姿が残っていても矯正)
const FORM_REVERT = {'イルカマン(マイティ)': 'イルカマン(ナイーブ)', 'ギルガルド(ブレード)': 'ギルガルド(シールド)'};
let winStreak = 0;     // 連戦モードの連勝数
const slotVal = {};    // 各スロットの選択ポケモン名(selectをやめて検索モーダルにしたので自前で持つ)
const slotMoves = {};  // 各スロットの技4つ(くわしく編成で変更可。ポケモンを変えると自動選定に戻る)
const slotItem = {};   // 各スロットの持ち物key(既定=汎用メガストーン)
const slotGender = {}; // 各スロットの性別 '♂'/'♀'/'—'(2026-06-13 ビルダー連携)
const slotNature = {}; // 各スロットの性格名(ビルダー由来。手動選択は'まじめ'=無補正)
const slotEffort = {}; // 各スロットの努力値(Champions点 {hp,atk,...})。既定=全0
const ZERO_EV = () => ({hp:0,atk:0,def:0,spatk:0,spdef:0,spd:0});
// 無性別ポケモン(party_checkerと同じ。相手チーム=ランダム編成にも性別を割り振るため)
const GENDERLESS_RB = new Set(["メタモン","ロトム","ヒートロトム","ウォッシュロトム","フロストロトム","スピンロトム",
  "カットロトム","ギルガルド(シールド)","ギルガルド(ブレード)","クレッフィ","ゴルーグ","メガゴルーグ",
  "ポットデス","ブリジュラス","ミミズズ","キョジオーン"]);
function genderOfRB(name){
  if (!name) return '';
  if (GENDERLESS_RB.has(name)) return '—';
  if (name.includes('♂')) return '♂';
  if (name.includes('♀')) return '♀';
  return Math.random() < 0.5 ? '♂' : '♀';
}
let pickerSlot = null;
let movePick = null;   // {slotId, idx} わざモーダルの編集先
// ひらがな→カタカナ(検索用正規化。「ぴかちゅう」でピカチュウにヒット)
const toKata = s => s.replace(/[ぁ-ゖ]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
function setSlot(id, name, keepCustom){
  name = FORM_REVERT[name] || name;   // 変身でしか出ない姿は始動の姿に矯正(イルカマン=ナイーブ/ギルガルド=シールド)
  slotVal[id] = name;
  if (!keepCustom) slotMoves[id] = autoMoves(S.pokeByName(name));   // ポケモンを変えたら技は自動選定に戻す
  if (!slotItem[id]) slotItem[id] = 'mega_stone_any';
  if (!keepCustom || !slotGender[id]) slotGender[id] = genderOfRB(name);   // 性別(ビルダー由来は復元側でセット)
  if (!keepCustom){ slotNature[id] = 'まじめ'; slotEffort[id] = ZERO_EV(); }   // 手動選択は無補正・努力値0
  const enc = encodeURIComponent(name);
  $(id).innerHTML = `<img src="images/sim/${enc}.svg" alt="" onerror="this.remove()"><span>${tPokeName(name)}</span>`;
  renderDetailSetup();
  saveTeam();
}
// 編成の保存/復元(localStorage): ポケモン名・技名・持ち物キー・人数(リロードしても残る)
function saveTeam(){
  try {
    const data = { size: teamSize, val: slotVal, item: slotItem, gender: slotGender, nature: slotNature, effort: slotEffort,
      moves: Object.fromEntries(Object.entries(slotMoves).map(([k, arr]) => [k, (arr || []).map(m => m && m.name)])) };
    localStorage.setItem('rb_team', JSON.stringify(data));
  } catch (e) {}
}
function loadTeam(){
  try {
    const d = JSON.parse(localStorage.getItem('rb_team') || 'null');
    if (!d || !d.val || !d.val.s1) return false;
    teamSize = d.size || 3;
    $('team-size').value = String(teamSize);
    renderTeamRows();
    selfIds().concat(oppIds()).forEach(id => {
      if (!d.val[id] || !S.pokeByName(d.val[id])) return;
      slotItem[id] = d.item && d.item[id] != null ? d.item[id] : 'mega_stone_any';
      slotGender[id] = (d.gender && d.gender[id]) || genderOfRB(d.val[id]);
      slotNature[id] = (d.nature && d.nature[id]) || 'まじめ';
      slotEffort[id] = { ...ZERO_EV(), ...((d.effort && d.effort[id]) || {}) };
      const poke = S.pokeByName(d.val[id]);
      const all = S.usableMoves(poke);
      const names = (d.moves && d.moves[id]) || [];
      const mvs = names.map(n => all.find(m => m.name === n)).filter(Boolean);
      slotMoves[id] = mvs.length === 4 ? mvs : autoMoves(poke);
      setSlot(id, d.val[id], true);
    });
    return true;
  } catch (e) { return false; }
}
// チームビルダー(party_checker.html)からの受け取り(2026-06-13)。自分チームだけ反映・相手はランダム。
// 一度読んだら handoff キーは消す(リロードで毎回上書きしないため。rb_teamには保存される)
function loadHandoff(){
  try {
    const d = JSON.parse(localStorage.getItem('pokechan_realbattle_handoff_v1') || 'null');
    if (!d || !Array.isArray(d.party)) return false;
    const picks = d.party.filter(e => e && e.name && S.pokeByName(e.name)).slice(0, 6);
    if (!picks.length) return false;
    localStorage.removeItem('pokechan_realbattle_handoff_v1');
    teamSize = picks.length > 3 ? 6 : 3;
    $('team-size').value = String(teamSize);
    renderTeamRows();
    const pokes = S.pokeList().filter(isPickable);
    const rnd = () => pokes[Math.floor(Math.random() * pokes.length)].name;
    // 自分チーム = ビルダーの編成(技keyを解決・足りなければ自動補完)
    selfIds().forEach((id, i) => {
      const e = picks[i];
      if (!e){ setSlot(id, rnd()); return; }
      const poke = S.pokeByName(e.name);
      const all = S.usableMoves(poke);
      const byKey = (e.moves || []).map(k => all.find(m => m && (m.key === k || m.name === k))).filter(Boolean);
      slotMoves[id] = byKey.length ? byKey.slice(0, 4) : autoMoves(poke);
      slotItem[id] = e.item || 'mega_stone_any';
      slotGender[id] = e.gender || genderOfRB(e.name);
      slotNature[id] = e.nature || 'まじめ';
      slotEffort[id] = { ...ZERO_EV(), ...(e.effort || {}) };
      setSlot(id, e.name, true);
    });
    // 相手チームはランダム
    oppIds().forEach(id => setSlot(id, rnd()));
    return true;
  } catch (e) { return false; }
}
// くわしく編成: 6スロットぶんの技チップ+持ち物セレクト
function renderDetailSetup(){
  const box = $('detail-setup');
  if (!box) return;
  const tc = S.typeColors();
  const items = S.itemsList().filter(it => it.category !== 'mega_stone' || it.key === 'mega_stone_any' || /リザードナイト/.test(it.name));
  box.innerHTML = selfIds().concat(oppIds()).map(id => {
    const nm = slotVal[id]; if (!nm) return '';
    const mvs = slotMoves[id] || [];
    const chips = [0,1,2,3].map(i => {
      const m = mvs[i];
      return `<button class="mv-chip" data-slot="${id}" data-i="${i}" title="${m ? tMoveName(m) : I18N.t('real_battle.move_slot_empty_title','わざを えらぶ')}"
        style="${m ? `border-left:4px solid ${tc[m.type] || '#3a4660'}` : ''}">${m ? tMoveName(m) : '—'}</button>`;
    }).join('');
    const opts = items.map(it => `<option value="${it.key}" ${slotItem[id] === it.key ? 'selected' : ''} title="${tItemDesc(it)}">${tItemName(it)}</option>`).join('');
    return `<div class="ds-row"><span class="ds-name"><img src="images/sim/${encodeURIComponent(nm)}.svg" onerror="this.remove()">${id.startsWith('s') ? '🟢' : '🔴'}${tPokeName(nm)}</span>
      ${chips}<select data-item="${id}"><option value="">${I18N.t('real_battle.item_none_option','もちもの なし')}</option>${opts}</select></div>`;
  }).join('');
  box.querySelectorAll('.mv-chip').forEach(b => b.addEventListener('click', () => {
    SE.select();
    openMovePicker(b.dataset.slot, +b.dataset.i);
  }));
  box.querySelectorAll('select[data-item]').forEach(sel => sel.addEventListener('change', () => {
    slotItem[sel.dataset.item] = sel.value;
    saveTeam();
  }));
}
// わざモーダル(ひらがな検索→クリックでそのスロットの技を差し替え)
function openMovePicker(slotId, idx){
  movePick = { slotId, idx };
  $('move-picker').style.display = 'flex';
  $('mp-q').value = '';
  renderMovePickList('');
  $('mp-q').focus();
}
function closeMovePicker(){ $('move-picker').style.display = 'none'; movePick = null; }
function renderMovePickList(query){
  if (!movePick) return;
  const poke = S.pokeByName(slotVal[movePick.slotId]);
  const all = S.usableMoves(poke);
  const tc = S.typeColors();
  const k = toKata(query.trim());
  const hits = k ? all.filter(m => m.name.includes(k) || m.name.includes(query.trim())) : all;
  $('mp-list').innerHTML = hits.slice(0, 80).map(m =>
    `<button data-n="${m.name}"><span style="color:${tc[m.type] || '#9fb4d8'};font-weight:700">[${tTypeName(m.type)}]</span>
     ${tMoveName(m)} <span style="color:#8b94a7">${I18N.t('real_battle.move_power_label','威力')}${m.power ?? '—'} / ${I18N.t('real_battle.move_accuracy_label','命中')}${m.accuracy ?? '—'} / ${tCatName(m.category)} / ${I18N.t('real_battle.move_pp_label','PP')}${m.pp ?? '—'}</span></button>`
  ).join('') || `<div style="color:#8b94a7;padding:8px">${I18N.t('real_battle.move_not_found','みつからない…')}</div>`;
  $('mp-list').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    SE.select();
    const mv = all.find(m => m.name === b.dataset.n);
    if (mv && movePick){
      const arr = slotMoves[movePick.slotId];
      // 同じ技を2枠に入れない(既にある場合は入れ替え)
      const dup = arr.findIndex(m => m && m.name === mv.name);
      if (dup >= 0 && dup !== movePick.idx) arr[dup] = arr[movePick.idx];
      arr[movePick.idx] = mv;
      renderDetailSetup();
      saveTeam();
    }
    closeMovePicker();
  }));
}
function openPicker(id){
  pickerSlot = id;
  $('poke-picker').style.display = 'flex';
  const q = $('pp-q');
  q.value = '';
  renderPickerList('');
  q.focus();
}
function closePicker(){ $('poke-picker').style.display = 'none'; pickerSlot = null; }
function renderPickerList(query){
  const pokes = S.pokeList().filter(isPickable);
  const k = toKata(query.trim());
  const hits = k ? pokes.filter(p => p.name.includes(k) || p.name.includes(query.trim())) : pokes;
  $('pp-list').innerHTML = hits.slice(0, 120).map(p => {
    const enc = encodeURIComponent(p.name);
    return `<button data-n="${p.name}"><img loading="lazy" src="images/sim/${enc}.svg" onerror="this.remove()">${tPokeName(p.name)}</button>`;
  }).join('') || `<div style="color:#8b94a7;padding:10px">${I18N.t('real_battle.poke_not_found','みつからない…')}</div>`;
  $('pp-list').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    SE.select();
    setSlot(pickerSlot, b.dataset.n);
    closePicker();
  }));
}
function renderTeamRows(){
  // 人数ぶんのスロットボタンを作り直す(既存の選択は引き継ぐ)
  [['row-self', selfIds()], ['row-opp', oppIds()]].forEach(([rowId, ids]) => {
    const row = $(rowId);
    row.querySelectorAll('.slot').forEach(b => b.remove());
    ids.forEach(id => {
      const b = document.createElement('button');
      b.className = 'slot'; b.id = id;
      b.addEventListener('click', () => openPicker(id));
      row.appendChild(b);
    });
  });
}
function initSetup(){
  const pokes = S.pokeList().filter(isPickable);   // メガフォームは直接選ばない(ストーンで変身)
  renderTeamRows();
  $('team-size').addEventListener('change', () => {
    teamSize = +$('team-size').value;
    renderTeamRows();
    randomize();   // 枠が変わるので選び直し(おまかせで埋める)
  });
  $('pp-q').addEventListener('input', () => renderPickerList($('pp-q').value));
  $('pp-close').addEventListener('click', closePicker);
  $('poke-picker').addEventListener('click', e => { if (e.target === $('poke-picker')) closePicker(); });
  $('detail-toggle').addEventListener('click', () => { SE.select(); $('detail-setup').classList.toggle('open'); });
  $('mp-q').addEventListener('input', () => renderMovePickList($('mp-q').value));
  $('mp-close').addEventListener('click', closeMovePicker);
  $('move-picker').addEventListener('click', e => { if (e.target === $('move-picker')) closeMovePicker(); });
  if (loadHandoff()) { /* ビルダーから来た自分チームを反映済み */ }
  else if (!loadTeam()) randomize();   // 保存済み編成があれば復元(なければおまかせ)
  $('btn-random').addEventListener('click', randomize);
  $('btn-start').addEventListener('click', startBattle);
  $('msgbox').addEventListener('click', advanceMsg);
  document.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') advanceMsg(); });
  $('c-fight').addEventListener('click', () => { SE.select(); showMoves(); });
  $('c-party').addEventListener('click', () => { SE.select(); showParty(); });
  $('c-mega').addEventListener('click', () => { SE.select(); toggleMega(); });
  $('c-run').addEventListener('click', () => { bgmStop(); document.body.classList.remove('in-battle'); $('battle').style.display = 'none'; $('setup').style.display = 'block'; });
  // 音オン/オフ(設定はlocalStorageに保存)
  updateSndBtn();
  $('snd-toggle').addEventListener('click', () => {
    sndOn = !sndOn;
    localStorage.setItem('rb_snd', sndOn ? 'on' : 'off');
    updateSndBtn();
    if (sndOn){ SE.select(); if ($('battle').style.display !== 'none' && !gameOver) bgmStart(); }
    else bgmStop();
  });
  function randomize(){
    const pick = () => pokes[Math.floor(Math.random() * pokes.length)].name;
    selfIds().concat(oppIds()).forEach(id => setSlot(id, pick()));
  }
  window.__randomizeOpp = () => {   // 連戦モード: 相手チームだけ引き直す
    const pick = () => pokes[Math.floor(Math.random() * pokes.length)].name;
    oppIds().forEach(id => setSlot(id, pick()));
  };
  // デモ自動バトル(?demo=1): 演出確認用。おまかせ編成で開始し、技0を選び続ける
  if (location.search.includes('demo')){
    $('auto-msg').checked = true;
    $('msg-speed').value = '600';
    startBattle();
    setInterval(() => { if (!busy && !gameOver && $('battle').style.display !== 'none') doTurn(0); }, 1200);
  }
}

// 技の自動セット: 覚える技から「タイプかぶりなしで威力上位」を4つ(変化技は1つまで混ぜる)
function autoMoves(poke){
  const all = S.usableMoves(poke);
  const dmg = all.filter(m => m.category !== '変化' && typeof m.power === 'number' && m.power > 0)
                 .sort((a, b) => b.power - a.power);
  const picked = [], types = new Set();
  for (const m of dmg){ if (!types.has(m.type)){ picked.push(m); types.add(m.type); } if (picked.length === 4) break; }
  for (const m of dmg){ if (picked.length >= 4) break; if (!picked.includes(m)) picked.push(m); }
  return picked.slice(0, 4);
}

function buildSide(sideKey, ids){
  const st = S.makeSideState();
  const lead = S.pokeByName(slotVal[ids[0]]);
  st.poke = lead;
  st.moves = (slotMoves[ids[0]] || autoMoves(lead)).filter(Boolean);
  st.selectedMoveIdx = 0;
  st.item = slotItem[ids[0]] != null ? slotItem[ids[0]] : 'mega_stone_any';   // くわしく編成で変更可(既定=汎用メガストーン)
  st.gender = slotGender[ids[0]] || genderOfRB(slotVal[ids[0]]);
  st.natureIdx = S.natureIdxOf(slotNature[ids[0]] || 'まじめ');   // 性格(ビルダー由来 or 無補正)
  st.effort = { ...ZERO_EV(), ...(slotEffort[ids[0]] || {}) };    // 努力値(Champions点)
  st.bench = ids.slice(1).map(id => {
    const p = S.pokeByName(slotVal[id]);
    return { poke: p, effort: { ...ZERO_EV(), ...(slotEffort[id] || {}) }, natureIdx: S.natureIdxOf(slotNature[id] || 'まじめ'),
      ability: p.ab1 || '', item: slotItem[id] != null ? slotItem[id] : 'mega_stone_any',
      moves: (slotMoves[id] || autoMoves(p)).filter(Boolean), gender: slotGender[id] || genderOfRB(slotVal[id]),
      currentHp: null, fainted: false, status: 'none', sleepTurns: null, lastConsumedItem: null, megaBase: null };
  });
  st.ability = lead.ab1 || '';
  // PP管理(段129): 場の技+控えの技のPPを初期化(エンジンはst.ppがある時だけPPを見る)
  st.pp = st.moves.map(m => (m && m.pp) ? m.pp : 0);
  st.bench.forEach(e => { e.pp = (e.moves || []).map(m => (m && m.pp) ? m.pp : 0); });
  S.sides[sideKey] = st;
}

// ===== ターン実行→ログを1行ずつ実機テンポで再生 =====
function doTurn(moveIdx){
  if (busy || gameOver) return;
  if (S.sides.self.fainted) return;   // 死に出しの選択待ち中はターンを進めない
  const self = S.sides.self, opp = S.sides.opp;
  if (moveIdx != null) self.selectedMoveIdx = moveIdx;
  // 相手はAI v2(段118): 技だけでなく不利な時の交代も選ぶ
  if (opp.poke && !opp.fainted){
    const act = S.aiChooseAction ? S.aiChooseAction('opp') : {type: 'move', index: S.aiChooseMove('opp')};
    if (act.type === 'switch') opp.switchChoice = act.index;
    else opp.selectedMoveIdx = act.index;
  }
  logPos = S.battleLog.length;
  S.runTurn();
  const fresh = S.battleLog.slice(logPos).filter(e => !/^───/.test(e.msg));
  const lines = fresh.map(e => lineWithFx(e.msg));
  logTurnHeader(turnNo);   // 右ログに「Turn N」見出し
  say(lines, endOfTurn);
}
// ===== サウンド(Web Audio合成・ファミコン風 — ファイル不要・全部自作波形=権利フリー) =====
// 2026-06-12 阿部さん「音とBGM入れたらそれっぽくなる」。autoplay制限があるので初回クリックで解錠。
let AC = null, sndOn = localStorage.getItem('rb_snd') !== 'off';
let bgmTimer = null, bgmStep = 0, masterBgm = null;
function ac(){
  if (!AC){ AC = new (window.AudioContext || window.webkitAudioContext)(); }
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
// 単音(波形・周波数・長さ・音量・ピッチスライド先)
function tone(type, freq, dur, vol, slideTo, when){
  if (!sndOn) return;
  const ctx = ac(), t = when != null ? when : ctx.currentTime;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
// ノイズ(打撃用)
function noise(dur, vol, lowpass){
  if (!sndOn) return;
  const ctx = ac(), t = ctx.currentTime;
  const len = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain(); g.gain.value = vol;
  const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lowpass || 1200;
  src.connect(f); f.connect(g); g.connect(ctx.destination); src.start(t);
}
// 効果音いろいろ
const SE = {
  select(){ tone('square', 880, 0.06, 0.12); },
  hit(){ noise(0.16, 0.5, 900); tone('square', 180, 0.12, 0.2, 70); },
  superEff(){ noise(0.25, 0.6, 2200); tone('square', 320, 0.22, 0.25, 60); tone('square', 480, 0.18, 0.18, 90); },
  weak(){ noise(0.1, 0.25, 500); tone('triangle', 140, 0.14, 0.18, 90); },
  crit(){ tone('sawtooth', 1400, 0.1, 0.22, 500); noise(0.2, 0.5, 3000); tone('square', 250, 0.2, 0.2, 60); },
  faint(){ tone('square', 520, 0.5, 0.22, 65); tone('triangle', 260, 0.55, 0.18, 40); },
  heal(){ [523, 659, 784, 1047].forEach((f, i) => tone('square', f, 0.12, 0.14, null, ac().currentTime + i * 0.09)); },
  status(){ tone('square', 330, 0.1, 0.16, 392); tone('square', 392, 0.1, 0.16, 330, null); },
  mega(){ [440, 554, 659, 880, 1109].forEach((f, i) => tone('square', f, 0.16, 0.16, null, ac().currentTime + i * 0.08)); noise(0.5, 0.25, 4000); },
  enter(){ tone('square', 392, 0.07, 0.14, 784); },
  win(){ [523, 523, 523, 659, 784, 1047].forEach((f, i) => tone('square', f, i === 5 ? 0.5 : 0.13, 0.16, null, ac().currentTime + i * 0.13)); },
  lose(){ [392, 370, 349, 330].forEach((f, i) => tone('triangle', f, 0.3, 0.18, null, ac().currentTime + i * 0.28)); },
};
// バトルBGM: 8bit風2小節ループ(Am)。スケジューラで16分音符を先読み再生
const BGM_BASS = [110, 0, 110, 0, 165, 0, 110, 0, 131, 0, 131, 0, 98, 0, 98, 123];           // A E C G…
const BGM_LEAD = [440, 0, 523, 587, 659, 0, 587, 523, 440, 0, 392, 440, 523, 440, 392, 330]; // 戦闘っぽい旋律
function bgmStart(){
  if (!sndOn || bgmTimer) return;
  const ctx = ac();
  masterBgm = ctx.createGain(); masterBgm.gain.value = 0.10; masterBgm.connect(ctx.destination);
  let next = ctx.currentTime + 0.05;
  const SPB = 0.13;   // 16分音符の長さ(≒115bpmの16ビート)
  bgmStep = 0;
  bgmTimer = setInterval(() => {
    if (!sndOn){ bgmStop(); return; }
    while (next < ctx.currentTime + 0.2){
      const i = bgmStep % 16;
      const b = BGM_BASS[i], l = BGM_LEAD[i];
      if (b){ const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'triangle'; o.frequency.value = b;
        g.gain.setValueAtTime(0.9, next); g.gain.exponentialRampToValueAtTime(0.001, next + SPB * 0.9);
        o.connect(g); g.connect(masterBgm); o.start(next); o.stop(next + SPB); }
      if (l){ const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'square'; o.frequency.value = l;
        g.gain.setValueAtTime(0.35, next); g.gain.exponentialRampToValueAtTime(0.001, next + SPB * 0.85);
        o.connect(g); g.connect(masterBgm); o.start(next); o.stop(next + SPB); }
      if (i % 4 === 0){ // ハイハット代わりのノイズチック
        const len = Math.floor(ctx.sampleRate * 0.03), buf = ctx.createBuffer(1, len, ctx.sampleRate);
        const d = buf.getChannelData(0); for (let k = 0; k < len; k++) d[k] = (Math.random() * 2 - 1) * (1 - k / len);
        const s = ctx.createBufferSource(); s.buffer = buf;
        const g = ctx.createGain(); g.gain.value = 0.12; s.connect(g); g.connect(masterBgm); s.start(next); }
      next += SPB; bgmStep++;
    }
  }, 40);
}
function bgmStop(){
  if (bgmTimer){ clearInterval(bgmTimer); bgmTimer = null; }
  if (masterBgm){ try { masterBgm.disconnect(); } catch (e) {} masterBgm = null; }
}

// ログ1行 → テキスト+演出(HPバー同期・タイプ色バースト・ダメージ数字・こうか/急所・状態異常・天候・メガ)
function lineWithFx(msg){
  const fx = () => {
    const hpM = msg.match(/\(残HP (\d+)(?:\/(\d+))?\)/);
    const subjOpp = msg.startsWith('相手の');   // 行の主語(先頭)が相手側か
    // ① 攻撃のダメージ行: 「A の 技！ … ダメージ！」(対象=攻撃側の反対。連続ヒット・みがわりも同じ形)
    const atkLine = msg.match(/^(相手の )?\S+ の (\S+)！/);
    if (atkLine && /ダメージ！/.test(msg) && !/で \d+ ダメージ/.test(msg)){
      const atkSide = atkLine[1] ? 'opp' : 'self';
      const tgt = atkSide === 'self' ? 'opp' : 'self';
      lastTgt = tgt;
      if (hpM){
        const max = hpM[2] ? +hpM[2] : (S.realStat(S.sides[tgt], 'hp') || 1);
        setHpBar(tgt, +hpM[1], max);   // 1発ごとにターゲット側のバーを減らす
      }
      const mv = (S.sides[atkSide].moves || []).find(m => m && m.name === atkLine[2]);
      burstFx(tgt, mv ? (S.typeColors()[mv.type] || '#9fb4d8') : '#9fb4d8');
      const d = msg.match(/(?:に|合計) (\d+) ダメージ/);
      if (d) popText(tgt, '−' + d[1], '#fff');
      flash(tgt, 'hit');
      flash(atkSide, atkSide === 'self' ? 'lunge-self' : 'lunge-opp');
      SE.hit();
    } else {
      // ② スリップ系の残HP行(やけど/すなあらし/さめはだ等): 主語側が減る
      if (hpM){
        const side = subjOpp ? 'opp' : 'self';
        const max = hpM[2] ? +hpM[2] : (S.realStat(S.sides[side], 'hp') || 1);
        setHpBar(side, +hpM[1], max);
        const d = msg.match(/で (\d+) ダメージ/);
        if (d){ popText(side, '−' + d[1], '#f87171', 15); flash(side, 'hit'); }
      }
    }
    // ③ こうか・急所(直前のダメージ対象に重ねる)
    if (msg === 'こうかは ばつぐんだ！'){ screenFlash('#ffffff'); popText(lastTgt || 'opp', 'ばつぐん!', '#fbbf24', 18); SE.superEff(); }
    else if (msg === 'こうかは いまひとつのようだ…'){ popText(lastTgt || 'opp', 'いまひとつ…', '#8b94a7', 13); SE.weak(); }
    else if (msg === 'きゅうしょに あたった！'){ screenFlash('#ffd96b'); popText(lastTgt || 'opp', '急所!', '#ff8866', 17); SE.crit(); }
    // ④ 状態異常・こんらん: 絵文字を浮かべる
    // メロメロ(段139)の演出
    if (/メロメロに なった！/.test(msg)){ popText(msg.includes('相手の') ? 'opp' : 'self', '💕', null, 26); renderAll(); }
    if (/は メロメロだ！|メロメロで 技が だせなかった/.test(msg)){ popText(msg.startsWith('相手の') ? 'opp' : 'self', '💕', null, 22); }
    const stM = msg.match(/は (もうどく|どく|まひ|やけど|こおり|ねむり|ねむけ) 状態になった！|は (こんらん)した！/);
    if (stM){
      const side = subjOpp ? 'opp' : 'self';
      const emo = {もうどく:'💜', どく:'💜', まひ:'⚡', やけど:'🔥', こおり:'❄️', ねむり:'💤', ねむけ:'💤', こんらん:'💫'}[stM[1] || stM[2]];
      if (emo){ popText(side, emo, null, 24); SE.status(); }
      renderAll();
    }
    // ⑤ 天候(開始で常時オーバーレイ・終了で消す)
    if (/日差しが強くなった|天気が にほんばれ/.test(msg)) setWeatherFx('sun');
    else if (/あめが降り始めた|天気が あめ に/.test(msg)) setWeatherFx('rain');
    else if (/すなあらしが舞い始めた|天気が すなあらし/.test(msg)) setWeatherFx('sand');
    else if (/ゆきが降り始めた|天気が ゆき に/.test(msg)) setWeatherFx('snow');
    else if (/天気が 元に戻った/.test(msg)) setWeatherFx(null);
    // ⑥ ひんし・登場・メガシンカ
    if (/は ひんしになった！/.test(msg)){
      const side = subjOpp ? 'opp' : 'self';
      setHpBar(side, 0, S.realStat(S.sides[side], 'hp') || 1);   // バーも0に(こんらん自傷等で同期漏れした時の保険)
      flash(side, 'faint');
      SE.faint();
    }
    if (/が 場に出た！/.test(msg)){ renderAll(); flash(subjOpp ? 'opp' : 'self', 'enter'); SE.enter(); }
    if (/メガシンカした！/.test(msg)){
      screenFlash('#ffd96b', true);
      renderAll();
      flash(subjOpp ? 'opp' : 'self', 'enter');
      SE.mega();
    }
    // バトルスイッチ(ギルガルド): フォルムチェンジでスプライト・能力表示を更新
    if (/フォルム チェンジ！/.test(msg)){
      const side = msg.includes('相手の') ? 'opp' : 'self';
      renderAll();
      flash(side, 'enter');
      SE.enter();
    }
    // イリュージョン解除(ゾロアーク): 正体バレで姿を戻す
    if (/イリュージョンが とけた！/.test(msg)){
      renderAll();
      flash(msg.includes('相手の') ? 'opp' : 'self', 'enter');
      SE.status();
    }
    // マイティチェンジ(イルカマン): ヒーロー初登場はメガ並みの演出で
    if (/変身して 帰ってきた！/.test(msg)){
      screenFlash('#7dd3fc', true);
      renderAll();
      flash(subjOpp ? 'opp' : 'self', 'enter');
      SE.mega();
    }
    if (/回復/.test(msg)){ renderAll(); if (hpM){ popText(subjOpp ? 'opp' : 'self', '＋', '#4ade80', 18); SE.heal(); } }
  };
  return { text: (window.translateLogLine ? translateLogLine(msg) : msg), fx };
}
function flash(side, cls){
  const f = $('f-' + side);
  f.classList.remove(cls);
  void f.offsetWidth;
  f.classList.add(cls);
  setTimeout(() => f.classList.remove(cls), 800);
}
// 連戦モード(段: 連戦): 勝利後にコマンド欄を「つぎの相手」に差し替える
function showNextOpponentButton(){
  const cmd = $('cmd');
  cmd.style.display = 'grid';
  cmd.querySelectorAll('button').forEach(b => b.disabled = true);
  let nb = $('c-next');
  if (!nb){
    nb = document.createElement('button');
    nb.id = 'c-next';
    nb.style.gridColumn = '1 / -1';
    nb.style.borderColor = '#4ade80';
    nb.style.color = '#4ade80';
    cmd.prepend(nb);
    nb.addEventListener('click', () => {
      SE.select();
      window.__randomizeOpp();   // 相手だけ引き直し
      gameOver = false;
      nb.remove();
      cmd.querySelectorAll('button').forEach(b => b.disabled = false);
      startBattle();             // buildSideが自分チームも作り直す=全回復
    });
  }
  nb.textContent = `${I18N.t('real_battle.next_opponent_button','⚔ つぎの相手と たたかう！(連勝: ')}${winStreak})`;
}
function endOfTurn(){
  renderAll();
  const dead = side => {
    const st = S.sides[side];
    const all = [st].concat(st.bench || []);
    return all.every(e => !e || !e.poke || e.fainted || (e.currentHp != null && e.currentHp <= 0));
  };
  if (dead('opp') || dead('self')){
    gameOver = true;
    bgmStop();
    const won = dead('opp');
    if (won){ SE.win(); winStreak++; } else { SE.lose(); winStreak = 0; }
    say([won ? `${I18N.t('real_battle.win_message1','🎉 相手のポケモンは ぜんぶ たおれた！ きみの かち！(連勝: ')}${winStreak})` : I18N.t('real_battle.lose_message1','😵 自分のポケモンは ぜんぶ たおれた… まけてしまった…'),
         won ? I18N.t('real_battle.win_message2','「つぎの相手」で 連戦できます(チームは 全回復)') : I18N.t('real_battle.lose_message2','「にげる」から 編成にもどって もういちど あそべます')],
        () => { showCmd(true); if (won) showNextOpponentButton(); });
    return;
  }
  // 死に出し(自分側): エンジンが保留した交代先をプレイヤーが選ぶ(控え2匹以上の時だけ保留される)
  if (S.sides.self.fainted){
    pushMsgLine(`${tPokeName(S.sides.self.poke.name)} ${I18N.t('real_battle.faint_replace_prompt','は たおれてしまった… つぎのポケモンを えらんでね')}`);
    showParty(true);
    return;
  }
  turnNo++; updateTurnBadge();   // 次のターンへ(Showdown風 Turnバッジ)
  showCmd(true);
}
</script>
