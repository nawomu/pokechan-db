      const searchStr = ((r.name || '') + ' ' + (r.desc || '')).replace(/<[^>]*>/g, '');
      if (r.info)   // 情報行(選択不可): メガシンカ後の特性表示など(2026-07-10 阿部さん)
        return `<div class="cm-inforow" data-cmg="${gi}" data-search="${searchStr.replace(/"/g, '')}"><b>${r.icon || ''}${r.name}</b>${r.desc ? `<span>${r.desc}</span>` : ''}</div>`;

    }).join('')
  ).join('');
  cm.querySelector('.cm-body').innerHTML = bodyHtml;
  // 項目が多い時(もちもの等)は文字検索をヘッダー行に出す=縦幅節約(2026-07-07 阿部さん)
  const head = cm.querySelector('.cm-head');

  if (totalRows > 12){
    const inp = document.createElement('input');
    inp.className = 'cm-search';
    inp.placeholder = I18N.t('real_battle.item_search_placeholder','なまえで さがす(ひらがなでもOK)…');
    head.insertBefore(inp, head.querySelector('.cm-x'));
  }
  cm.style.display = 'block';
  // 検索フィルタ: 名前/説明にマッチしない行を隠す。空になったグループ見出しも隠す(検索はヘッダー行)
  const sInput = cm.querySelector('.cm-head .cm-search');
  if (sInput){
    const applyFilter = () => {
      const q = sInput.value.trim();
      const k = (typeof toKata === 'function') ? toKata(q) : q;
      const groupHas = {};
      cm.querySelectorAll('.cm-row').forEach(row => {
        const hit = !q || row.dataset.search.includes(q) || (k && row.dataset.search.includes(k));
        row.style.display = hit ? '' : 'none';

      cm.querySelectorAll('.cm-group').forEach(gl => { gl.style.display = groupHas[gl.dataset.cmgroup] ? '' : 'none'; });
    };
    sInput.addEventListener('input', applyFilter);
    // 自動フォーカスしない=キーボードが勝手に出るのを防ぐ(タップで出す)(2026-07-07 阿部さん)
  }
  // 押したボタンの上に出す(マウス移動を最小に=2026-07-06 阿部さん)。入り切らなければ下/画面内にクランプ
  const w = box.offsetWidth, h = box.offsetHeight, vw = innerWidth, vh = innerHeight;
  let left = vw / 2 - w / 2, top = 60;
  if (anchor && anchor.getBoundingClientRect){
    const a = anchor.getBoundingClientRect();
    left = Math.max(8, Math.min(a.left + a.width / 2 - w / 2, vw - w - 8));

    if (top < 8) top = 8;   // 入り切らない時は画面上部に出す(下に落とさない=2026-07-06 阿部さん)

}

// 読込/おまかせ後の重複持ち物を矯正(先勝ち・後のスロットは汎用メガストーンへ)
function dedupeItemsRB(){
  [selfIds(), oppIds()].forEach(ids => {
    const seen = new Set();
    ids.forEach(id => {
      const k = slotItem[id];
      if (!k || k === 'mega_stone_any') return;
      if (seen.has(k)) slotItem[id] = 'mega_stone_any';
      else seen.add(k);
    });
  });
}

const ITEMCAT_BUCKET = {attack_boost:'attack', type_boost:'attack', speed_boost:'speed',
  defense_boost:'defense', survival:'defense', berry_resist:'heal', berry_status_cure:'heal', berry_hp_cure:'heal', hp_drain:'heal'};
function openItemModal(current, onPick, anchor, usedKeys){
  const buckets = {attack:[], speed:[], defense:[], heal:[], other:[]};
  // 同サイドで使用中の持ち物は出さない=1種類1個(メガストーンだけ共有可・2026-07-06 阿部さん)
  itemChoicesRB().filter(it => it.key === 'mega_stone_any' || !(usedKeys && usedKeys.has(it.key)))
    .forEach(it => { buckets[ITEMCAT_BUCKET[it.category] || 'other'].push(it); });
  const g = [{label:'', rows:[{key:'', name:I18N.t('real_battle.item_none_option','もちもの なし'), desc:'', selected:!current}]}];
  [['attack','itemcat_attack','こうげき強化'],['speed','itemcat_speed','すばやさ'],['defense','itemcat_defense','ぼうぎょ・たいきゅう'],
   ['heal','itemcat_heal','きのみ・かいふく'],['other','itemcat_other','そのほか']].forEach(([b, k, ja]) => {
    if (!buckets[b].length) return;
    g.push({label:I18N.t('real_battle.' + k, ja), rows:buckets[b].map(it => ({key:it.key, name:tItemName(it), desc:tItemDesc(it), icon:itemIconHtml(it), selected:current === it.key}))});
  });
  openChoiceModal(I18N.t('real_battle.sel_item','もちもの'), g, onPick, anchor);
}
// 中央詳細パネル(本家の能力タブ風): タイプ/技4つ(クリックで変更)/特性・持ち物(セレクトで変更=2026-07-05 阿部さん)
function renderSelDetail(id){
  const box = $('sel-detail');
  if (!box) return;
  // 相手スロット選択中はパネルを相手色(クリムゾン)に(どちら側を見ているか一目で分かるように=2026-07-05 阿部さん)
  box.classList.toggle('opp', String(id).startsWith('o'));
  box.classList.toggle('bx', id === 'bx');   // ボックスプレビュー中は破線枠で区別
  const nm = slotVal[id];
  if (!nm){ box.innerHTML = `<div class="sd-empty">${I18N.t('real_battle.sel_empty','ポケモンを えらんでね')}</div>`; return; }
  const p = S.pokeByName(nm);
  if (!p){ box.innerHTML = ''; return; }
  const tc = S.typeColors();
  const types = [p.type1, p.type2].filter(Boolean).map(t =>
    `<span class="sd-type" style="background:${tc[t] || '#3a4660'}">${tTypeName(t)}</span>`).join('');
  const curAb = slotAbility[id] || defaultAbilityRB(p);
  const abilities = [p.ab1, p.ab2, p.ab3].filter(Boolean).filter((v, i, a) => a.indexOf(v) === i);
  const mvs = (slotMoves[id] || autoMoves(p)).filter(Boolean);
  const src = setupSpriteSrc(nm, true);   // 詳細パネルも大きい画像=homeモードで3D(2026-07-10)
  const weakRow = (typeof weakChipsFor === 'function') ? weakChipsFor([p.type1, p.type2].filter(Boolean)) : '';
  // ★おすすめビルド(実戦58〜60ビルド)を1タップで反映(タスクB①・2026-07-11)。この種にプリセットがある時だけ出す
  const presetMatches = findPresetsForSpecies(nm);
  box.innerHTML =
    `<div class="sd-head"><img src="${src}" alt="" onerror="this.remove()"><div><strong>${tPokeName(nm)}</strong><div class="sd-types">${types}</div></div></div>` +
    (weakRow ? `<div class="sd-weak"><span class="sd-weak-l">${I18N.t('online_battle.weak_label', '弱点')}:</span>${weakRow}</div>` : '') +
    (presetMatches.length ? `<button class="sd-preset-btn" type="button">${I18N.t('real_battle.preset_btn','⭐おすすめビルド')}</button>` : '') +
    `<div class="sd-moves">` + mvs.map((m, i) => {
      const col = tc[m.type] || '#3a4660';
      return `<button class="sd-move" data-i="${i}" style="background:linear-gradient(135deg,${col}dd,${col}99)">` +
        `<span class="t-pill" style="background:${col}">${tTypeName(m.type)}</span>${tMoveName(m)}` +
        `<span class="sd-pp">${m.pp || 0}/${m.pp || 0}</span></button>`;
    }).join('') + `</div>` +
    `<div class="sd-row"><span>${I18N.t('real_battle.sel_ability','特性')}</span><button class="sd-ab sd-pick">${(window.I18N && I18N.ability) ? I18N.ability(curAb) : curAb} ▾</button></div>` +
    `<div class="sd-row"><span>${I18N.t('real_battle.sel_item','もちもの')}</span><button class="sd-item sd-pick">${(S.itemByKey(slotItem[id]) ? tItemName(S.itemByKey(slotItem[id])) : I18N.t('real_battle.item_none_option','もちもの なし'))} ▾</button></div>` +
    `<div class="sd-ev"></div>`;
  // 能力値エディタ(パネル下段に一体・自動確定=2026-07-05 阿部さん)
  renderEvEditor(box.querySelector('.sd-ev'), {
    poke: p,
    getEff: () => slotEffort[id] || ZERO_EV(),
    getNature: () => slotNature[id],
    apply: (eff, nature) => { slotEffort[id] = eff; slotNature[id] = nature; saveTeam(); },
  });
  box.querySelectorAll('.sd-move').forEach(b => b.addEventListener('click', () => { SE.select(); openMovePicker(id, +b.dataset.i); }));
  // おすすめビルドボタン(候補が複数ある種=メガX/Y違い等は選択モーダル経由)
  { const presetBtn = box.querySelector('.sd-preset-btn');
    if (presetBtn) presetBtn.addEventListener('click', e => applyRecommendedBuild(id, presetMatches, e.currentTarget)); }
  // 特性/持ち物=説明つきモーダルで選ぶ(2026-07-06 阿部さん・ビルダー方式)
  box.querySelector('.sd-ab').addEventListener('click', e => {
    SE.select();
    // メガシンカ後の特性も情報表示(選べない=バトル中にストーンで変身するだけ・2026-07-10 阿部さん)
    const megas = S.pokeList().filter(x => x.mega && x.name.replace(/[XY]$/, '') === 'メガ' + nm);
    const megaGroup = megas.length ? [{ label: I18N.t('online_battle.mega_ab_group', '⬡ メガシンカすると(バトル中に変身)'),
      rows: megas.map(mp => ({ info: true, key: '',
        name: `${tPokeName(mp.name)}: ${(window.I18N && I18N.ability) ? I18N.ability(mp.ab1) : mp.ab1}`,
        desc: (window.I18N && I18N.abilityDesc && I18N.abilityDesc(mp.ab1)) || (S.abilityDescJa ? S.abilityDescJa(mp.ab1) : '') || '' })) }] : [];
    openChoiceModal(I18N.t('real_battle.sel_ability','特性'),
      [{label:'', rows:abilities.map(a => ({key:a, name:(window.I18N && I18N.ability) ? I18N.ability(a) : a,
        desc:(window.I18N && I18N.abilityDesc && I18N.abilityDesc(a)) || (S.abilityDescJa ? S.abilityDescJa(a) : '') || '', selected:a === curAb}))}].concat(megaGroup),
      k => { slotAbility[id] = k; saveTeam(); renderSelDetail(id); }, e.currentTarget);
  });
  box.querySelector('.sd-item').addEventListener('click', e => {
    SE.select();
    openItemModal(slotItem[id], k => {
      slotItem[id] = k;
      if ($(id)) $(id).innerHTML = slotCapsuleHtml(id);
      saveTeam(); renderSelDetail(id);
      refreshPickMineCards();   // 選出画面(#pick-screen)が開いていれば左カードのもちもの表示も同期(2026-07-13)
    }, e.currentTarget, usedItemsRB(id));
  });
  if (id === 'bx') decorateBoxPreview();   // ボックスプレビュー装飾(帯+「わくに いれる」ボタン)は再描画のたび付け直す
}
// 編成の保存/復元(localStorage): ポケモン名・技名・持ち物キー・人数(リロードしても残る)
// キーはreal_battle.html('rb_team')とは別の名前空間にする(オンラインは常に6体固定=teamSizeが食い違う事故を避ける)
function saveTeam(){
  try {
    const data = { size: teamSize, lead: leadSlot, val: slotVal, item: slotItem, ability: slotAbility, gender: slotGender, nature: slotNature, effort: slotEffort,
      moves: Object.fromEntries(Object.entries(slotMoves).map(([k, arr]) => [k, (arr || []).map(m => m && m.name)])) };
    localStorage.setItem('rb_team_online', JSON.stringify(data));
  } catch (e) {}
  // ★選出中(チーム送信後〜開戦前)の編集は相手へ自動再送信(両者が同じチームデータで戦うロックステップ整合)
  try {
    if (window.RB_ONLINE && RB_ONLINE.active && !RB_ONLINE.started && RB_ONLINE.myTeamSent && !RB_ONLINE.applying) onlineScheduleTeamResend();
  } catch (e) {}
  // ★種ビルド記憶を常に最新化(チーム内の編集も、bxプレビュー編集も、保存のたびmemoへ)
  try {
    selfIds().forEach(id => { if (slotVal[id]) captureSpecies(id); });
    if (slotVal['bx']) captureSpecies('bx');
    saveSpeciesMemo();
    refreshBoxMemoTint();   // ボックスマスの「ビルド済み=黄色」を追従(classだけ更新=軽量)
  } catch (e) {}
}
function refreshBoxMemoTint(){
  const grid = $('box-grid'); if (!grid) return;
  grid.querySelectorAll('button[data-n]').forEach(b =>
    b.classList.toggle('memo', !!(speciesMemo[b.dataset.n] && speciesMemo[b.dataset.n].custom)));
}
function loadTeam(){
  try {
    const d = JSON.parse(localStorage.getItem('rb_team_online') || 'null');
    // 空きスロット許容(本家トグルで枠を空けられる=2026-07-10)。自分側に1体も居ない保存だけ不採用
    if (!d || !d.val || !selfIds().some(id => d.val[id] && S.pokeByName(d.val[id]))) return false;
    teamSize = 6;   // オンライン専用=常に6体固定(保存データのsizeは無視)
    leadSlot = {
      self: (d.lead && d.lead.self && selfIds().includes(d.lead.self)) ? d.lead.self : 's1',
      opp:  (d.lead && d.lead.opp && oppIds().includes(d.lead.opp))   ? d.lead.opp  : 'o1'
    };
    renderTeamRows();
    selfIds().concat(oppIds()).forEach(id => {
      // 保存チームにメガのすがたが残っていたら基本のすがたへ矯正(メガはバトル中のみ=2026-07-05 阿部さん)
      const _p0 = d.val[id] && S.pokeByName(d.val[id]);
      if (_p0 && (_p0.mega || _p0.form === 'メガ進化')){
        const _base = d.val[id].replace(/^メガ/, '').replace(/[XY]$/, '');
        if (S.pokeByName(_base)) d.val[id] = _base;
      }
      if (!d.val[id] || !S.pokeByName(d.val[id])){   // 空き枠として復元(＋表示)
        slotVal[id] = null;
        if ($(id)) $(id).innerHTML = slotCapsuleHtml(id);
        return;
      }
      slotItem[id] = d.item && d.item[id] != null ? d.item[id] : 'mega_stone_any';
      slotGender[id] = (d.gender && d.gender[id]) || genderOfRB(d.val[id]);
      slotNature[id] = (d.nature && d.nature[id]) || 'まじめ';
      // 旧モーダル時代の252等が残っていても仕様値にクランプ(各32・計66=ビルダー仕様)
      slotEffort[id] = clampEffortRB((d.effort && d.effort[id]) || {});
      const poke = S.pokeByName(d.val[id]);
      // 特性: 保存値がその子の特性候補(ab1〜ab3)なら復元、でなければ既定
      const _abSaved = d.ability && d.ability[id];
      slotAbility[id] = (_abSaved && [poke.ab1, poke.ab2, poke.ab3].includes(_abSaved)) ? _abSaved : defaultAbilityRB(poke);
      const all = S.usableMoves(poke);
      const names = (d.moves && d.moves[id]) || [];
      const mvs = names.map(n => all.find(m => m.name === n)).filter(Boolean);
      slotMoves[id] = mvs.length === 4 ? mvs : autoMoves(poke);
      setSlot(id, d.val[id], true);
    });
    dedupeTeams();   // 過去の保存に同種重複が残っていたら引き直す
    dedupeItemsRB(); // 過去の保存に持ち物重複が残っていたら矯正(1種類1個)
    return true;
  } catch (e) { return false; }
}
// 同じポケモンは1チーム1体まで(2026-07-06 阿部さん)。重複していた2体目以降をランダムな未使用種に引き直す
function dedupeTeams(){
  const all = S.pokeList().filter(isPickable).map(p => p.name);
  [selfIds(), oppIds()].forEach(ids => {
    const seen = new Set();
    ids.forEach(id => {
      const nm = slotVal[id];
      if (!nm) return;
      if (seen.has(nm)){
        const pool = all.filter(n => !seen.has(n) && !ids.some(x => slotVal[x] === n));
        if (pool.length) setSlot(id, pool[Math.floor(Math.random() * pool.length)]);
      }
      seen.add(slotVal[id]);
    });
  });
}
// チームビルダー(party_checker.html)からの受け取り(2026-06-13)。自分チームだけ反映・相手はランダム。
// 一度読んだら handoff キーは消す(リロードで毎回上書きしないため。rb_teamには保存される)
function loadHandoff(){
  try {
    const d = JSON.parse(localStorage.getItem('pokechan_realbattle_handoff_v1') || 'null');
    if (!d || !Array.isArray(d.party)) return false;
    const picks = d.party.filter(e => e && e.name && S.pokeByName(e.name)).slice(0, 6);
    if (!picks.length) return false;
    localStorage.removeItem('pokechan_realbattle_handoff_v1');
    teamSize = 6;   // オンライン専用=常に6体固定(ビルダーの手持ちが6未満でも残り枠はランダム補完)
    renderTeamRows();
    const pokes = S.pokeList().filter(isPickable);
    // 重複なしランダム(同名2体は交代リストで紛らわしい): 使った名前を除外しながら引く
    const used = new Set(picks.map(e => e && e.name).filter(Boolean));
    const rnd = () => {
      const cand = pokes.filter(p => !used.has(p.name));
      const nm = (cand.length ? cand : pokes)[Math.floor(Math.random() * (cand.length ? cand.length : pokes.length))].name;
      used.add(nm);
      return nm;
    };
    // 自分チーム = ビルダーの編成(技keyを解決・足りなければ自動補完)
    selfIds().forEach((id, i) => {
      const e = picks[i];
      if (!e){ setSlot(id, rnd()); return; }
      const poke = S.pokeByName(e.name);
      const all = S.usableMoves(poke);
      const byKey = (e.moves || []).map(k => all.find(m => m && (m.key === k || m.name === k))).filter(Boolean);
      slotMoves[id] = byKey.length ? byKey.slice(0, 4) : autoMoves(poke);
      slotItem[id] = e.item || 'mega_stone_any';
      slotGender[id] = e.gender || genderOfRB(e.name);
      slotNature[id] = e.nature || 'まじめ';
      slotEffort[id] = clampEffortRB(e.effort || {});
      slotAbility[id] = null;   // ビルダーhandoffは特性を持たない→setSlot(keepCustom)内で既定を補完
      setSlot(id, e.name, true);
    });
    dedupeItemsRB();
    // 相手チームはランダム
    oppIds().forEach(id => setSlot(id, rnd()));
    dedupeTeams();   // ビルダー側に同種が居ても1チーム1体に矯正
    return true;
  } catch (e) { return false; }
}
// ===== 能力値コンパクトエディタ(中央パネル直下に一体化・2026-07-05 阿部さん) =====
// ルールはビルダー準拠(合計66pt/1能力32pt/1pt=実数値+1・性格補正)。UIは指示どおりコンパクト独自:
// ポケモン名なし/メーター4目盛り(1目盛り=8pt)/MIN⇔MAXトグル1個/適用・キャンセルなし=触った瞬間に確定保存
const EV_LETTER = {hp:'H', atk:'A', def:'B', spatk:'C', spdef:'D', spd:'S'};
const EV_LABEL_KEY = {hp:'stats.hp_full', atk:'stats.atk_full', def:'stats.def_full',
  spatk:'stats.sp_atk_full', spdef:'stats.sp_def_full', spd:'stats.spd_full'};
const tNature = n => (window.I18N && I18N.nature) ? I18N.nature(n) : n;
// ctx = { poke, getEff(), getNature(), apply(eff, nature) } — applyは変更のたびに即呼ばれる(自動確定)
function renderEvEditor(container, ctx){
  if (!container || !ctx.poke) return;
  const eff = clampEffortRB(ctx.getEff());
  const natureName = ctx.getNature() || 'まじめ';
  const nat = S.natureList().find(n => n[0] === natureName) || ['まじめ','—','—'];
  const total = EFFORT_KEYS.reduce((s, k) => s + eff[k], 0);
  const maxFor = k => Math.min(32, 66 - (total - eff[k]));
  const tmp = S.makeSideState();
  tmp.poke = ctx.poke; tmp.effort = eff; tmp.natureIdx = S.natureIdxOf(natureName);
  // 性格表記=名前をやめて補正だけ(2026-07-10 阿部さん「ずぶとい→B↑A↓だけでいい」)。補正なし(がんばりや等)=±0。
  // 名前はtitle(ホバー)に残す
  const natFx = n => n[1] !== '—' ? `${EV_LETTER[n[1]]}↑${EV_LETTER[n[2]]}↓` : '±0';
  const curNat = S.natureList().find(n => n[0] === natureName) || ['まじめ','—','—'];
  container.classList.toggle('full', total >= 66);
  container.innerHTML =
    `<div class="sd-ev-top"><button class="sd-nature sd-pick" title="${tNature(natureName)}">${natFx(curNat)} ▾</button>` +
    `<span class="sd-ev-budget"><b>${total}</b>/66</span>` +
    `<button class="sd-ev-reset">${I18N.t('buttons.reset','リセット')}</button></div>` +
    EFFORT_KEYS.map(k => {
      const pts = eff[k], mx = maxFor(k);
      const isMin = pts > 0 && pts >= mx;   // これ以上盛れない→MINに切り替わる(1ボタントグル)
      return `<div class="sd-ev-row${pts >= 32 ? ' maxed' : pts > 0 ? ' has' : ''}" data-k="${k}">` +
        `<span class="evl${nat[1] === k ? ' up' : nat[2] === k ? ' down' : ''}">${EV_LETTER[k]}<small>${I18N.t(EV_LABEL_KEY[k], k)}</small></span>` +
        `<span class="real">${S.realStat(tmp, k)}</span><span class="sp"></span>` +
        `<button class="dec" ${pts <= 0 ? 'disabled' : ''}>◀</button><span class="pts">${pts}</span>` +
        `<button class="inc" ${pts >= mx ? 'disabled' : ''}>▶</button>` +
        `<button class="mm" ${!isMin && mx <= pts ? 'disabled' : ''}>${isMin ? 'MIN' : 'MAX'}</button></div>`;
    }).join('');
  // どの操作も即確定(適用ボタン無し=他のポケモンに移っても設定が残る)
  const commit = (newEff, newNature) => {
    ctx.apply(clampEffortRB(newEff || eff), newNature || natureName);
    renderEvEditor(container, ctx);
  };
  container.querySelector('.sd-nature').addEventListener('click', e => {
    SE.select();
    openNatureModal(natureName, k => commit(eff, k), e.currentTarget);
  });
  container.querySelector('.sd-ev-reset').addEventListener('click', () => { SE.select(); commit(ZERO_EV()); });
  container.querySelectorAll('.sd-ev-row').forEach(row => {
    const k = row.dataset.k;
    const set = v => commit({ ...eff, [k]: Math.max(0, Math.min(maxFor(k), Math.round(v))) });
    row.querySelector('.dec').addEventListener('click', () => set(eff[k] - 1));
    row.querySelector('.inc').addEventListener('click', () => set(eff[k] + 1));
    row.querySelector('.mm').addEventListener('click', () => { SE.select(); set(eff[k] > 0 && eff[k] >= maxFor(k) ? 0 : maxFor(k)); });
    // メーター(bar)は廃止=ドラッグ入力も廃止(2026-07-07 阿部さん)
  });
}
// わざモーダル(ひらがな検索→クリックでそのスロットの技を差し替え)
let mpCat = null;   // 分類フィルター(null=すべて / '物理' / '特殊' / '変化')

function closeMovePicker(){ $('move-picker').style.display = 'none'; movePick = null; }
function renderMovePickList(query){
  if (!movePick) return;
  const poke = S.pokeByName(slotVal[movePick.slotId]);
  const all = S.usableMoves(poke);
  const tc = S.typeColors();
  const k = toKata(query.trim());
  let hits = k ? all.filter(m => m.name.includes(k) || m.name.includes(query.trim())) : all;
  if (mpCat) hits = hits.filter(m => m.category === mpCat);
  // 並び: 攻撃技(物理/特殊混合)を威力の強い順→変化技は末尾(2026-07-06 阿部さん)
  const sorted = hits.slice().sort((a, b) => {
    const av = a.category === '変化' ? -1 : (a.power || 0);
    const bv = b.category === '変化' ? -1 : (b.power || 0);
    return bv - av;
  });
  $('mp-list').innerHTML = sorted.slice(0, 120).map(m => {
    const col = tc[m.type] || '#3a4660';
    const pri = (m.battle_data && m.battle_data.priority) || m.priority || 0;

function renderBoxGrid(query){
  // 自分チームに既にいる種=薄く表示(タップでその枠を空けるトグル=本家挙動・2026-07-10)
  const used = new Set(selfIds().map(id => slotVal[id]).filter(Boolean));
  // メガのすがたも「見るだけ」で載せる(選べない=暗いマス・クリックで能力値/特性の確認だけ=2026-07-10 阿部さん)
  let pokes = S.pokeList().filter(p => isPickable(p) || p.mega);
  if (boxType) pokes = pokes.filter(p => p.type1 === boxType || p.type2 === boxType);
  if (boxSort === 'name'){   // 公式風ソート: ずかん順(既定)/なまえ順(表示言語で)/調整済み(ビルド済み=黄色マスを先頭に)
    const lang = (window.I18N && I18N.lang) || 'ja';
    pokes = pokes.slice().sort((a, b) => tPokeName(a.name).localeCompare(tPokeName(b.name), lang));
  } else if (boxSort === 'memo'){
    const cu = p2 => (!p2.mega && speciesMemo[p2.name] && speciesMemo[p2.name].custom) ? 1 : 0;
    pokes = pokes.slice().sort((a, b) => cu(b) - cu(a));   // 安定ソート=同グループ内はずかん順のまま
  }
  const q = (query || '').trim();
  const k = toKata(q);
  const hits = k ? pokes.filter(p => p.name.includes(k) || p.name.includes(q)) : pokes;
  // 密度アップ(2026-07-10): マスはスプライト+名前のみ(タイプバッジは撤去)。名前はtitle属性にも入れて省略時も分かるように
  $('box-grid').innerHTML = hits.map(p => {
    const enc = encodeURIComponent(p.name);
    const apiId = (typeof SPRITE_API_ID !== 'undefined') ? SPRITE_API_ID[p.name] : null;
    const src = (spriteSrc !== 'original' && apiId) ? `images/poke/${apiId}.png` : `images/sim/${enc}.svg`;
    const isUsed = used.has(p.name);
    const isCustom = !!(speciesMemo[p.name] && speciesMemo[p.name].custom);   // ビルド済み=黄色系マスで判別(2026-07-10 阿部さん)
    const isMega = !!p.mega;   // メガ=見るだけ(暗いマス)
    const dispName = tPokeName(p.name);
    return `<button data-n="${p.name}" class="${isUsed ? 'used' : ''}${isCustom && !isMega ? ' memo' : ''}${isMega ? ' megaview' : ''}" title="${dispName}">` +
      `<img loading="lazy" src="${src}" onerror="this.remove()">` +
      `<span class="bx-name">${dispName}</span></button>`;
  }).join('') || `<div style="grid-column:1/-1;color:#ffffffaa;padding:10px;text-align:center">${I18N.t('real_battle.poke_not_found','みつからない…')}</div>`;
  syncBoxHeight();   // フィルタ/ソートで件数が変わっても高さは中央列に追従(伸縮バグ根治=2026-07-10 阿部さん)
  $('box-grid').querySelectorAll('button[data-n]').forEach(b => b.addEventListener('click', () => {
    SE.select();
    const nm = b.dataset.n;
    if (b.classList.contains('megaview')){ previewBoxPoke(nm); return; }   // メガ=確認だけ(チームに入れられない)
    // チームに居る種をボックスでタップ: いきなり外さず、そのスロットを選択(中央にステータス)+
    // 「ボックスに もどす？」確認(ただ見たかっただけでも困らない=2026-07-10 阿部さんFB)
    const inSlot = selfIds().find(id => slotVal[id] === nm);
    if (inSlot){ const rect = b.getBoundingClientRect(); setSelectedSlot(inSlot); openUnsetConfirm(rect, inSlot); return; }
    // チームに居ない種=すぐ入れず中央にプレビュー(パラメータ表示+ビルド編集)。配置は左スロットタップ or 投入ボタン
    previewBoxPoke(nm);
  }));
}

// 盤面(内部640×360)をビューポートに合わせて相似拡大。デスクトップは最大1.55・スマホ横は幅/高さに収める(2026-07-07 阿部さん)
// 選出画面の3カラムを狭い端末に合わせて縮小(配置は維持=デスクトップと同じ並び)。iPhone横(844)はほぼ等倍
function fitSetup(){
  const cols = document.getElementById('setup-cols');
  const game = document.getElementById('game');
  if (!cols || !game) return;
  cols.style.zoom = '';  // いったん戻して自然幅を測る
  const avail = Math.max(280, game.clientWidth - 40);
  const natural = 760;   // 3カラムが窮屈にならない目安幅
  cols.style.zoom = avail < natural ? Math.max(0.5, avail / natural) : '';
}
// ★オンライン専用: 常設ボックスパネルの下端を中央の詳細パネル(#sel-detail)の下端に揃える(2026-07-10 阿部さん
// 「高さも真ん中の欄と縦幅揃えたら見た目が整う」)。グリッドにheightを直接与える=内容が少なくても下端一致。
// 縦積み(縦持ちスマホ=1カラム)ではCSS既定(max-height:440px)に戻す
function syncBoxHeight(){
  const det = $('setup-center'), grid = $('box-grid'), cols = $('setup-cols');   // 基準=中央列ぜんぶ(詳細+キャラ画像ボタン)
  if (!det || !grid || !cols) return;
  if (!grid.offsetParent || matchMedia('(max-width:880px) and (orientation:portrait)').matches){
    grid.style.height = grid.style.maxHeight = ''; return;
  }
  const zoom = parseFloat(cols.style.zoom) || 1;   // fitSetup縮小中はrectがzoom後座標になるため割り戻す
  const h = Math.max(180, Math.round((det.getBoundingClientRect().bottom - grid.getBoundingClientRect().top) / zoom) - 9);
  if (Math.abs((parseInt(grid.style.height) || 0) - h) < 2) return;   // 冪等(ResizeObserverループ防止)
  grid.style.height = h + 'px'; grid.style.maxHeight = h + 'px';   // -9 = #box-panelの下padding8+border1
}
function fitField(){
  const f = document.getElementById('field');
  const game = document.getElementById('game');
  if (!f || !game) return;
  const availW = Math.max(200, game.clientWidth - 4);
  // バトル中はヘッダー/コントロール/最小ログ分を除いた高さを盤面に回す(横向きスマホで盤面を大きく)
  const reserve = document.body.classList.contains('in-battle') ? 96 : 120;
  const availH = Math.max(180, window.innerHeight - reserve);
  let z = Math.min(availW / 640, availH / 360);
  z = Math.max(0.42, Math.min(1.55, z));
  f.style.zoom = z;
}
let _fitTimer = null;
function scheduleFit(){ if (_fitTimer) cancelAnimationFrame(_fitTimer); _fitTimer = requestAnimationFrame(() => { fitField(); fitSetup(); syncBoxHeight(); }); }
window.addEventListener('resize', scheduleFit);
window.addEventListener('orientationchange', () => setTimeout(() => { fitField(); fitSetup(); syncBoxHeight(); }, 200));

  const pokes = S.pokeList().filter(isPickable);   // メガフォームは直接選ばない(ストーンで変身)
  loadSpeciesMemo();   // 種ごとのビルド記憶(入れ替えても能力値等を保持=2026-07-10 阿部さん)
  initBackdrop();   // S6: 背景プリセット初期化(localStorageから復元・セレクト配線)
  renderTeamRows();
  // ★オンライン専用: 人数セレクタは廃止(常に6体固定)。相手列モーダル(poke-picker)の代わりに
  // 常設ボックスパネル(#box-panel)を配線する。selectedSlotが変わるたびrenderBoxGridも呼ぶ(setSelectedSlot内)
  renderBoxTypeChips();
  renderBoxSortChips();
  renderBoxGrid('');
  $('box-q').addEventListener('input', () => renderBoxGrid($('box-q').value));
  // フィルター/ソートのチップ列は既定で畳んでおく(密度アップ)。検索欄横の小トグルで開閉(同時に開くのは片方だけ)
  const _boxToggle = (btnId, panelId, otherBtnId, otherPanelId) => {
    $(btnId).addEventListener('click', () => {
      SE.select();
      const open = $(panelId).classList.toggle('open');
      $(btnId).classList.toggle('on', open);
      if (open){ $(otherPanelId).classList.remove('open'); $(otherBtnId).classList.remove('on'); }
      syncBoxHeight();   // チップ展開ぶんグリッドを縮めて下端を中央パネルに揃えたまま保つ
    });

  _boxToggle('box-typef-toggle', 'box-typef', 'box-sort-toggle', 'box-sort');
  _boxToggle('box-sort-toggle', 'box-sort', 'box-typef-toggle', 'box-typef');
  $('pp-q').addEventListener('input', () => renderPickerList($('pp-q').value));
  $('pp-sort').addEventListener('change', () => renderPickerList($('pp-q').value));
  $('pp-close').addEventListener('click', closePicker);
  $('poke-picker').addEventListener('click', e => { if (e.target === $('poke-picker')) closePicker(); });
  $('mp-q').addEventListener('input', () => renderMovePickList($('mp-q').value));
  $('mp-close').addEventListener('click', closeMovePicker);
  $('move-picker').addEventListener('click', e => { if (e.target === $('move-picker')) closeMovePicker(); });
  $('stats-modal').addEventListener('click', e => { if (e.target === $('stats-modal')) $('stats-modal').style.display = 'none'; });
  $('choice-modal').addEventListener('click', e => { if (e.target === $('choice-modal')) $('choice-modal').style.display = 'none'; });
  document.querySelector('#choice-modal .cm-x').addEventListener('click', () => { $('choice-modal').style.display = 'none'; });
  if (loadHandoff()) { /* ビルダーから来た自分チームを反映済み */ }
  else if (!loadTeam()) randomize();   // 保存済み編成があれば復元(なければおまかせ)
  setSelectedSlot('s1');   // CH: 初期選択=自分の先頭(中央に詳細パネルを出す)
  // ★HOME画像などが後から読み込まれて中央列が伸びると、初回のsyncBoxHeightが小さい値で固まる
  // →遅延で数回재同期+読み込み完了でも同期(2026-07-10 阿部さん「ボックスが小さくなった」根治)
  [400, 1200, 2600].forEach(ms => setTimeout(syncBoxHeight, ms));

  // ★中央列のサイズ変化(画像読込/言語切替/パネル差し替え)を常時追従=伸縮バグの構造的根治
  try {
    if (window.ResizeObserver){
      const ro = new ResizeObserver(() => { try { syncBoxHeight(); } catch (e) {} });
      ro.observe($('setup-center'));

  $('btn-start').addEventListener('click', startBattle);
  // CH: msgboxが盤面内に入ったので、盤面のどこをタップしてもメッセージ送りできるようにする
  // (busy時のみ作用。msgbox個別のリスナーは二重発火するため廃止)
  $('field').addEventListener('click', advanceMsg);
  document.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') advanceMsg(); });
  $('c-fight').addEventListener('click', () => { SE.select(); showMoves(); });
  $('c-party').addEventListener('click', () => { SE.select(); showParty(); });
  $('c-run').addEventListener('click', () => {
    // オンライン中の「にげる」=降参を相手へ通知して切断(2026-07-10)。
    // 切断はresign送信が流れるまで少し待つ(即disconnectだとメッセージが届かず相手が待ち続ける)
    if (window.RB_ONLINE && RB_ONLINE.active){
      if (RB_ONLINE.started && !gameOver && window.RBOnline){ try { RBOnline.resign(); } catch(e) {} }
      setTimeout(() => onlineLeave(), 600);
    }
    bgmStop(); document.body.classList.remove('in-battle'); $('battle').style.display = 'none'; $('setup').style.display = 'block';
  });
  // バトル終了(左上の常設ボタン=にげると同じ動作。メッセージ中でも押せる)
  $('btn-exit').addEventListener('click', e => {
    e.stopPropagation();
    if (window.RB_ONLINE && RB_ONLINE.active){   // オンライン中は「にげる」と同じ(降参通知→切断→ロビー復帰)
      if (RB_ONLINE.started && !gameOver && window.RBOnline){ try { RBOnline.resign(); } catch (e2) {} }
      setTimeout(() => onlineLeave(), 600);
    }
    bgmStop(); document.body.classList.remove('in-battle'); $('battle').style.display = 'none'; $('setup').style.display = 'block';
  });
  // 音オン/オフ(設定はlocalStorageに保存)
  updateSndBtn();
  // 音量スライダー(2026-07-06 阿部さん): 全SE/BGM共通のマスターゲイン。保存して次回も同じ音量
  const volEl = $('snd-vol');
  if (volEl){
    volEl.value = String(sndVol);
    volEl.addEventListener('input', () => {
      sndVol = +volEl.value;
      localStorage.setItem('rb_vol', String(sndVol));
      if (masterVol) masterVol.gain.value = sndVol;
    });
    volEl.addEventListener('change', () => SE.select());   // 手を離したら試し音
  }
  // キャラ画像ソース(編成=見本つき3ボタン/バトル中=セレクト。保存・即反映で同期)
  { const el = $('sprite-src'); if (el){ el.value = spriteSrc; el.addEventListener('change', () => setSpriteSrc(el.value)); } }
  document.querySelectorAll('#sprite-src-btns button').forEach(b =>
    b.addEventListener('click', () => { SE.select(); setSpriteSrc(b.dataset.v); }));
  setSpriteSrc(spriteSrc);   // クレジット表示・ボタン強調等の初期反映
  $('snd-toggle').addEventListener('click', () => {
    sndOn = !sndOn;
    localStorage.setItem('rb_snd', sndOn ? 'on' : 'off');
    updateSndBtn();
    if (sndOn){ SE.select(); if ($('battle').style.display !== 'none' && !gameOver) bgmStart(); }
    else bgmStop();
  });
  // 同じポケモンを1チームに2体引かない(重複すると交代リストで「HP満タンの同名」が出て混乱する=2026-07-05 阿部さん)
  function sampleUnique(n){
    const arr = pokes.slice();
    for (let i = arr.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
    return arr.slice(0, n).map(p => p.name);
  }
  function randomize(){
    const mine = sampleUnique(teamSize);
    selfIds().forEach((id, i) => setSlot(id, mine[i]));
    randomizeOppTeam();
  }
  // 相手(AI)チーム=実戦プリセット58ビルドを優先して埋める(タスクB②)。
  // プリセットが尽きた/種の解決に失敗した枠だけランダム種+自動技でフォールバック補充する
  // (フォールバック分もプリセットで既に使った種と重ならないよう除外する)。
  function randomizeOppTeam(){
    const builds = pickPresetBuildsRB(teamSize);
    const usedNames = new Set();
    oppIds().forEach((id, i) => {
      if (applyPresetToSlot(id, builds[i])){ usedNames.add(slotVal[id]); return; }
      const fallback = pokes.filter(p => !usedNames.has(p.name));
      const pick = fallback.length ? fallback[Math.floor(Math.random() * fallback.length)].name : sampleUnique(1)[0];
      usedNames.add(pick);
      setSlot(id, pick);
    });
  }
  window.__randomizeOpp = randomizeOppTeam;   // 連戦モード: 相手チームだけ引き直す(プリセット優先・重複なし)
  // デモ自動バトル(?demo=1): 演出確認用。おまかせ編成で開始し、技0を選び続ける
  if (location.search.includes('demo')){
    $('auto-msg').checked = true;
    $('msg-speed').value = '600';
    startBattle();
    setInterval(() => { if (!busy && !gameOver && $('battle').style.display !== 'none') doTurn(0); }, 1200);
  }
}

// 技の自動セット: 覚える技から「タイプかぶりなしで威力上位」を4つ(変化技は1つまで混ぜる)
// 自動選出で避けたい「一発の不利技」: 自分瀕死(だいばくはつ)/反動で次ターン動けない(はかいこうせん)/溜め技(ソーラービーム等)。
// 威力は高いが初手セットには不向き=ある分だけ後回しにして、埋まらない時だけ使う(2026-07-06 阿部さん)
function isDisadvMove(m){
  const bd = m.battle_data || {};
  return !!(bd.self_faint || bd.recharge || bd.charge);
}
function autoMoves(poke){
  const all = S.usableMoves(poke);
  const dmgAll = all.filter(m => m.category !== '変化' && typeof m.power === 'number' && m.power > 0)
                    .sort((a, b) => b.power - a.power);
  // 不利技を除いた候補を優先。足りなければ不利技も威力順で足す
  const good = dmgAll.filter(m => !isDisadvMove(m));
  const bad  = dmgAll.filter(isDisadvMove);
  const pickFrom = (list, picked, types, typeFirst) => {
    if (typeFirst) for (const m of list){ if (picked.length >= 4) break; if (!types.has(m.type)){ picked.push(m); types.add(m.type); } }
    for (const m of list){ if (picked.length >= 4) break; if (!picked.includes(m)) picked.push(m); }
  };
  const picked = [], types = new Set();
  pickFrom(good, picked, types, true);    // まず不利でない技をタイプ多様→威力順で
  pickFrom(bad,  picked, types, false);   // それでも4未満なら不利技(だいばくはつ等)を威力順で補完
  // 攻撃技を1つも覚えない子(メタモン=へんしんのみ)は変化技で埋める(技ゼロで出ると毎ターン棒立ちになる)
  if (!picked.length) return all.slice(0, 4);
  return picked.slice(0, 4);
}
// 初手(1番目)に出すスロット。self/opp両方選べる(2026-07-06 阿部さん)。既定=各サイド先頭
let leadSlot = {self: 's1', opp: 'o1'};
function orderedIds(side){
  // オンライン選出(6体から3体えらぶ)の確定後は、選出した3体だけでバトルを組む(2026-07-10 阿部さん仕様)
  if (window._pickOverride && _pickOverride[side]) return _pickOverride[side];
  const ids = side === 'self' ? selfIds() : oppIds();
  const lead = leadSlot[side];
  if (!ids.includes(lead) || !slotVal[lead]) return ids;
  return [lead].concat(ids.filter(id => id !== lead));
}
// 既定の特性: 基本は特性1。メタモンは隠れ特性かわりもの(シングル実戦の確定特性・チャンピオンズWiki準拠。
// じゅうなん既定だと1ターン目にへんしんするだけの的になるため)
function defaultAbilityRB(p){
  if (p && p.name === 'メタモン') return p.ab3 || p.ab2 || p.ab1 || '';
  return (p && p.ab1) || '';
}

function buildSide(sideKey, ids){
  const st = S.makeSideState();
  const lead = S.pokeByName(slotVal[ids[0]]);
  st.poke = lead;
  st.moves = (slotMoves[ids[0]] || autoMoves(lead)).filter(Boolean);
  st.selectedMoveIdx = 0;
  st.item = slotItem[ids[0]] != null ? slotItem[ids[0]] : 'mega_stone_any';   // 中央パネルで変更可(既定=汎用メガストーン)
  st.gender = slotGender[ids[0]] || genderOfRB(slotVal[ids[0]]);
  st.natureIdx = S.natureIdxOf(slotNature[ids[0]] || 'まじめ');   // 性格(ビルダー由来 or 無補正)
  st.effort = clampEffortRB(slotEffort[ids[0]]);    // 努力値(Champions点・各32/計66に矯正)
  st.bench = ids.slice(1).map(id => {
    const p = S.pokeByName(slotVal[id]);
    return { poke: p, effort: clampEffortRB(slotEffort[id]), natureIdx: S.natureIdxOf(slotNature[id] || 'まじめ'),
      ability: slotAbility[id] || defaultAbilityRB(p), item: slotItem[id] != null ? slotItem[id] : 'mega_stone_any',
      moves: (slotMoves[id] || autoMoves(p)).filter(Boolean), gender: slotGender[id] || genderOfRB(slotVal[id]),
      currentHp: null, fainted: false, status: 'none', sleepTurns: null, lastConsumedItem: null, megaBase: null };
  })
  // 保存チームに現プール外の名前が残っていた場合(pokeByName=null)の抜け殻エントリを捨てる。
  // 残すと「見えない控え」で実質人数が減る+ボールマーク欠け(2026-07-04 深掘りPDCAで発見)
  .filter(e => e.poke);
  st.ability = slotAbility[ids[0]] || defaultAbilityRB(lead);   // 中央パネルで選んだ特性(既定=特性1/メタモンはかわりもの)
  // PP管理(段129): 場の技+控えの技のPPを初期化(エンジンはst.ppがある時だけPPを見る)
  st.pp = st.moves.map(m => (m && m.pp) ? m.pp : 0);
  st.bench.forEach(e => { e.pp = (e.moves || []).map(m => (m && m.pp) ? m.pp : 0); });
  S.sides[sideKey] = st;
}

function startBattle(){
  try { window.scrollTo(0, 0); } catch (e) {}   // モバイル横: 編成下部から開始するとスクロール残りで相手HPバーが画面外(検証WF #6)
  // 前試合の残骸を掃除: 勝敗で無効化したボタンを戻し、「つぎの相手」ボタンが残っていれば消す
  // (勝利→にげる→再スタートの経路では c-next のクリックハンドラを通らないため)
  const _nb = $('c-next'); if (_nb) _nb.remove();
  ['c-fight','c-party','c-run'].forEach(id => { const b = $(id); if (b) { b.disabled = false; b.style.display = ''; } });
  ['f-self','f-opp'].forEach(id => { const f = $(id); if (f) f.classList.remove('gone','faint','rb-wall-reflect','rb-wall-screen','rb-wall-veil'); });   // 前試合のひんし退場/壁パネルを解除
  window._idSnap = null;   // 表示個体スナップも初期化(初回登場から素直に描く)
  hideResultBanner();   // 前試合の勝敗バナーを消す
  buildSide('self', orderedIds('self'));   // 1番目に選んだ子を先頭に
  buildSide('opp',  orderedIds('opp'));
  // ★AI戦(選出画面経由)も交代画面の相手開示ルールをオンラインと同じ形で使う(2026-07-11 阿部さん)。
  // オンライン中(RB_ONLINE.started)はonlineBegin側で既にセット済みなので上書きしない。
  // 「つぎの相手」連戦(__randomizeOppで相手を引き直してstartBattleを直接呼ぶ経路)でも古いfullTeamsが
  // 残らないよう、選出フロー経由(_pickOverrideあり)なら毎回ここで最新のslotValから作り直す。
  if (!RB_ONLINE.started && window._pickOverride){
    RB_ONLINE.fullTeams = {
      self: selfIds().map(id => slotVal[id]).filter(Boolean),
      opp:  oppIds().map(id => slotVal[id]).filter(Boolean),
    };
    RB_ONLINE.revealed = { self: new Set(), opp: new Set() };
  }
  S.battleLog.length = 0;
  logPos = 0; gameOver = false;
  turnNo = 1; updateTurnBadge(); clearLog(); clearMsg();
  document.body.classList.add('in-battle');
  $('setup').style.display = 'none';
  $('battle').style.display = 'flex';
  fitField();
  // 開始メッセージの名前はへんしん(かわりもの)前に確定させる(いけっ！はメタモンの名前で言う)
  const selfName0 = tPokeName(S.sides.self.poke.name), oppName0 = tPokeName(S.sides.opp.poke.name);
  // Init-A: バトル開始時の登場特性(いかく/天候/かわりもの=メタモンのへんしん等)を発動(実機準拠)。
  // 交代・死に出しはエンジンのattemptSwitch内で発動済み=開始時だけここで呼ぶ
  if (S.phaseInitA) S.phaseInitA();
  const initLines = S.battleLog.filter(e => !/^───/.test(e.msg)).flatMap(e => splitBattleLines(e.msg).map(lineWithFx));
  logPos = S.battleLog.length;
  renderAll();   // renderAll内でrenderSideBarsも呼ばれる(へんしん済みのすがたで描画)
  setWeatherFx(null);
  bgmStart();
  say([I18N.t('real_battle.battle_start_self','バトルスタート！ いけっ！ {n}！').replace('{n}', selfName0), I18N.t('real_battle.battle_start_opp','相手は {n} を くりだした！').replace('{n}', oppName0)].concat(initLines), () => showActionUI());
}

// ===== 描画 =====
// キャラ画像ソース設定(2026-07-05 阿部さん): 'original'=うちの落書きSVG / 'api'=PokeAPIスプライト
// APIモードは通常フォームのみ(メガ/特殊フォームは名前→フォームID対応が未整備なので自作SVG継続)
let spriteSrc = localStorage.getItem('rb_sprite_src') || 'home';   // 既定=公式3D(Pokémon HOME)。「かっこいい、これ使いましょう」(2026-07-06 阿部さん)。小さいアイコン類はドット絵のまま
// 編成画面の画像src(2026-07-10 阿部さん「3Dとドットが切り替わらない」根治=homeを区別)。
// bigな画像(カプセル84px/詳細96px)だけHOME 3Dを使い、小さいマス(ボックス30px等)はドット絵のまま(490体の遠隔読込を避ける)
function setupSpriteSrc(nm, big){
  const apiId = (typeof SPRITE_API_ID !== 'undefined') ? SPRITE_API_ID[nm] : null;
  if (!apiId || spriteSrc === 'original') return `images/sim/${encodeURIComponent(nm)}.svg`;
  if (spriteSrc === 'home' && big) return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/home/${apiId}.png`;
  return `images/poke/${apiId}.png`;
}
function setSpriteSrc(v){
  spriteSrc = (v === 'api' || v === 'home') ? v : 'original';
  localStorage.setItem('rb_sprite_src', spriteSrc);
  const el = $('sprite-src'); if (el && el.value !== spriteSrc) el.value = spriteSrc;   // バトル中セレクトと同期
  document.querySelectorAll('#sprite-src-btns button').forEach(b => b.classList.toggle('on', b.dataset.v === spriteSrc));
  const cr = $('sprite-credit'); if (cr) cr.style.display = spriteSrc !== 'original' ? 'inline' : 'none';
  if (document.body.classList.contains('in-battle')){ try { renderAll(); } catch(e) {} }
  // 選出画面のカプセル/詳細パネル/ボックスのスプライトも追従
  try {
    selfIds().concat(oppIds()).forEach(id => { if (slotVal[id] && $(id)) $(id).innerHTML = slotCapsuleHtml(id); });
    if (typeof selectedSlot !== 'undefined') setSelectedSlot(selectedSlot);
    if ($('box-grid')) renderBoxGrid($('box-q') ? $('box-q').value : '');
  } catch(e) {}
}
// 小アイコン(HPボックス/控えバー/交代/選出)= 公式ドット絵優先・無ければ自作SVG
function apiIdOf(nm){
  if (typeof SPRITE_API_ID === 'undefined') return null;
  if (SPRITE_API_ID[nm]) return SPRITE_API_ID[nm];
  // Champions独自メガ(公式画像なし・自作SVGも未描画の38体)はベースの姿で代用
  if (nm && nm.startsWith('メガ')){
    const base = nm.replace(/^メガ/, '').replace(/[XY♂♀]$/, '');
    if (SPRITE_API_ID[base]) return SPRITE_API_ID[base];
  }
  return null;
}
function pokeIconSrc(nm){
  const apiId = apiIdOf(nm);
  return (spriteSrc !== 'original' && apiId) ? `images/poke/${apiId}.png` : `images/sim/${encodeURIComponent(nm)}.svg`;
}
// 持ち物アイコン(PokeAPI item sprites=name_enスラッグ化。無い物はonerrorで消えて文字だけ残る)
function itemIconHtml(it){
  if (!it) return '';
  // 汎用メガストーン(name_enなし)はキーストーン画像で代用(メガシンカの象徴)
  const slug = it.key === 'mega_stone_any' ? 'key-stone'
    : it.name_en ? it.name_en.toLowerCase().replace(/[.'’]/g, '').replace(/ /g, '-') : '';
  if (!slug) return '';
  return `<img class="item-ic" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${slug}.png" alt="" onerror="this.remove()">`;
}
// みがわり人形(自作SVG=ライセンスクリーン・本家の緑の人形を踏襲)。みがわり中はこれに差し替える(2026-07-06 阿部さん)
function substituteSpriteHtml(){

    <!-- 耳 -->

    <path d="M88 34 L94 8 L70 26 Z" fill="#8fbf5a" stroke="#5f8f3a" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- 体 -->
    <ellipse cx="60" cy="82" rx="42" ry="46" fill="#9ec96a" stroke="#5f8f3a" stroke-width="3"/>

    <!-- 顔 -->
    <circle cx="46" cy="70" r="4.5" fill="#3a3a2a"/>

}
// みがわりの人形↔元のすがたを拍レベルで切替(renderAllはみがわり出現/破壊の拍で呼ばれないため明示的に)
function setSpriteSub(side, on){
  const f = $('f-' + side); if (!f) return;
  const spriteEl = f.querySelector('.sprite'); if (!spriteEl) return;
  const st = S.sides[side]; if (!st || !st.poke) return;
  const shown = st.illusionAs || st.poke;
  if (on){ spriteEl.innerHTML = substituteSpriteHtml(); spriteEl.dataset.shown = 'SUB:' + shown.name; }
  else { spriteEl.innerHTML = spriteHtml(shown); spriteEl.dataset.shown = spriteSrc + ':' + shown.name; }
}
function spriteHtml(poke, st){
  const color = (S.typeColors()[poke.type1]) || '#3a4660';
  // 仮アイコンには「ポケモン名」を出す(タイプ名だと名前と紛らわしい=2026-06-12 阿部さん指摘)
  const short = poke.name.length > 6 ? poke.name.slice(0, 6) : poke.name;
  // ばけのかわが剥がれたミミッキュは「ばれたすがた」(首カクン絵/公式id 10143)で描く(2026-07-10 阿部さん)。
  // st.disguise は登場でtrue・剥がれてfalse(エンジン)。未定義(他ポケ)は===falseにならない
  const _BUSTED = { 'ミミッキュ': { ja: 'ばれたすがた', apiId: '10143' } };
  const _bust = (st && st.disguise === false && _BUSTED[poke.name]) ? _BUSTED[poke.name] : null;
  const enc = encodeURIComponent(_bust ? _bust.ja : poke.name);
  // APIモード: 対応表(sprite_api_ids.js=フォーム/メガ込み274体)にある名前はPokeAPI画像。
  // ローカルpoke画像→PokeAPI本家→自作SVG→サークルの順でフォールバック
  let _apiId = _bust ? _bust.apiId : apiIdOf(poke.name);
  // Champions独自メガ(メガマフォクシー等)は公式画像が存在しない(3Dもドットも)→自作SVGへ(2026-07-11 阿部さん)。
  // apiIdOfはメガ名→ベース種へフォールバックするため、メガなのに自身のIDが無い=独自メガと判定
  if (poke.mega && !_bust && typeof SPRITE_API_ID !== 'undefined' && !SPRITE_API_ID[poke.name]) _apiId = null;
  if (spriteSrc === 'home' && _apiId){
    const n = _apiId;
    return `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/home/${n}.png" alt="" style="display:none;height:150px" data-step="0"
        onload="this.style.display='inline';if(this.nextElementSibling)this.nextElementSibling.style.display='none'"
        onerror="if(this.dataset.step==='0'){this.dataset.step='1';this.style.imageRendering='pixelated';this.style.height='112px';this.src='images/poke/${n}.png';}else if(this.dataset.step==='1'){this.dataset.step='2';this.style.imageRendering='auto';this.src='images/sim/${enc}.svg';}else{this.remove();}">
      <span class="circ" style="background:${color};font-size:${short.length > 4 ? 11 : 13}px">${short}</span>`;
  }
  if (spriteSrc === 'api' && _apiId){
    const n = _apiId;
    return `<img src="images/poke/${n}.png" alt="" style="display:none;image-rendering:pixelated;height:112px" data-step="0"
        onload="this.style.display='inline';if(this.nextElementSibling)this.nextElementSibling.style.display='none'"
        onerror="if(this.dataset.step==='0'){this.dataset.step='1';this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${n}.png';}else if(this.dataset.step==='1'){this.dataset.step='2';this.style.imageRendering='auto';this.src='images/sim/${enc}.svg';}else{this.remove();}">
      <span class="circ" style="background:${color};font-size:${short.length > 4 ? 11 : 13}px">${short}</span>`;
  }
  // オリジナル: SVG(忠実トレース版)優先→PNGに切替→どちらも無ければタイプ色サークル
  return `<img src="images/sim/${enc}.svg" alt="" style="display:none"
      onload="this.style.display='inline';if(this.nextElementSibling)this.nextElementSibling.style.display='none'"
      onerror="if(!this.dataset.png){this.dataset.png=1;this.src='images/sim/${enc}.png';}else{this.remove();}">
    <span class="circ" style="background:${color};font-size:${short.length > 4 ? 11 : 13}px">${short}</span>`;
}
function renderAll(){
  ['self', 'opp'].forEach(side => {
    let st = S.sides[side];
    const f = $('f-' + side), pb = $('pb-' + side);
    if (!st.poke) return;
    let frozenId = false;
    if (window._idSnap && _idSnap[side] && st.poke !== _idSnap[side]){
      // ターン再生中はスナップ個体(交代/ひんし前の子)を表示。控えに残る同一オブジェクトを探す(無ければ現状表示)
      const old = [S.sides[side]].concat(S.sides[side].bench || []).find(e => e && e.poke === _idSnap[side]);
      if (old){ st = old; frozenId = true; }
    }
    const shown = st.illusionAs || st.poke;   // イリュージョン(段138)/へんしん(メタモン): 化けている・変身した姿を表示
    // 同じ姿なら作り直さない(renderAllは頻繁に呼ばれる=毎回innerHTML再構築だと画像再読込でちらつく)。
    // 画像ソース設定(spriteSrc)が変わった時は作り直す
    const spriteEl = f.querySelector('.sprite');
    const subActive = (st.subHp || 0) > 0;   // みがわり中は人形のすがた(2026-07-06 阿部さん)
    // ばけのかわの絵: リプレイ中(busy)は表示スナップ(_dgSnap)基準=「はがれた」の拍まで皮のまま。
    // 非リプレイ時はエンジン状態(engine先読みの絵バレ防止=2026-07-10 阿部さん)
    const bustShown = (busy && window._dgSnap) ? (_dgSnap[side] === false) : (st.disguise === false);
    const shownKey = (subActive ? 'SUB' : spriteSrc) + ':' + shown.name + (bustShown ? ':busted' : '');
    if (spriteEl.dataset.shown !== shownKey){
      spriteEl.innerHTML = subActive ? substituteSpriteHtml() : spriteHtml(shown, { disguise: bustShown ? false : true });
      spriteEl.dataset.shown = shownKey;
    }
    // 名前はへんしん中も自分の名前(実機のニックネーム表示準拠=すがたは変身先・名前はメタモン)
    const named = st.illusionAs || (st.transformBase ? st.transformBase.poke : st.poke);
    const _g = (!st.illusionAs && !st.transformBase && st.gender && st.gender !== '—') ? ' ' + st.gender : '';   // 性別記号(化け中・へんしん中は出さない)
    pb.querySelector('.nm').innerHTML = tPokeName(named.name) + (_g ? `<span style="color:${st.gender === '♂' ? '#a8d4ff' : '#ffd0e0'};font-weight:900">${_g}</span>` : '');
    // CH: statbar内ミニアイコン(実機の丸顔アイコン)。すがた=見えている姿(shown)
    const icn = pb.querySelector('.icn');
    if (icn){
      const encI = encodeURIComponent(shown.name);
      icn.innerHTML = `<img src="${pokeIconSrc(shown.name)}" alt="" onerror="this.remove()">`;
    }
    // リプレイ中(busy)はHPバーをrenderAllで動かさない=各拍のfx(ダメージ/回復/反動)が正しい拍で動かす。
    // renderAllはエンジンの最終HP(ターン終了時の値)を持つので、ここで入れると攻撃前に減って見える(2026-07-06 阿部さん)
    if (!frozenId && !busy){
      const max = S.realStat(st, 'hp') || 1;
      const hp = st.currentHp == null ? max : Math.max(0, st.currentHp);
      setHpBar(side, hp, max);
    }
    // 状態バッジ(最小限: 状態異常+こんらん+みがわり)
    const sj = S.statusJa();
    const _STBADGE_KEY = {burn:'common.status_burn', paralysis:'common.status_paralysis', poison:'common.status_poison',
      badpoison:'common.status_toxic', sleep:'common.status_sleep', freeze:'common.status_freeze'};
    const b = [];
    if (sj[st.status]) b.push(I18N.t(_STBADGE_KEY[st.status] || '', sj[st.status]));
    if (st.confusion > 0) b.push(I18N.t('common.status_confusion', 'こんらん'));
    if (st.attracted) b.push('💕' + I18N.t('common.status_infatuation', 'メロメロ'));
    if (st.subHp > 0) b.push(I18N.t('common.bdg_substitute', 'みがわり'));
    const stsEl = $('sts-' + side);
    if (stsEl) stsEl.innerHTML = b.map(x => `<span class="bdg">${x}</span>`).join('');
    // 両者のタイプ表示(2026-07-06 阿部さん)
    const tEl = pb.querySelector('.ptypes');
    if (tEl){
      const _tc2 = S.typeColors();
      tEl.innerHTML = [shown.type1, shown.type2].filter(Boolean).map(t =>
        `<span style="background:${_tc2[t] || '#3a4660'}">${tTypeName(t)}</span>`).join('');
    }
    // 自分の持ち物(2026-07-06 阿部さん): アイコン+名前。消費済みはグレー
    const heldEl = pb.querySelector('.held');
    if (heldEl){
      if (side === 'self'){
        const cur = S.itemByKey(st.item);
        const usedIt = !cur && st.lastConsumedItem ? S.itemByKey(st.lastConsumedItem) : null;
        const showIt = cur || usedIt;
        heldEl.className = 'held' + (usedIt ? ' used' : '');
        heldEl.innerHTML = showIt ? itemIconHtml(showIt) + tItemName(showIt) : '';
      } else heldEl.innerHTML = '';
    }
    // 残りポケモン(手持ちアイコン列 pbox内.balls): S3でleftbar/rightbarに一本化のため非表示
    // (復活: pbox .balls の display:none を外す + 下記をコメントアウト解除)
    // const team = [st].concat(st.bench || []).filter(e => e && e.poke);
    // const ballsHtml = team.map(e => {
    //   const dead = e.fainted || (e.currentHp != null && e.currentHp <= 0);
    //   const nm = (e.illusionAs || e.poke).name;
    //   const enc = encodeURIComponent(nm);
    //   return `<span class="tball${dead ? ' dead' : ''}" title="${tPokeName(nm)}"><img src="images/sim/${enc}.svg" alt="" onerror="this.remove()"></span>`;
    // }).join('');
    // pb.querySelector('.balls').innerHTML = ballsHtml;
  });
  // S3: leftbar / rightbar の更新(renderAll呼び出しごとに同期)
  renderSideBars();
}

// S3: leftbar/rightbar 描画。場に出ている個体=.active / ひんし=.dead
function renderSideBars(){
  ['self', 'opp'].forEach(side => {
    const st = S && S.sides && S.sides[side];
    if (!st) return;
    // ★2026-07-11 阿部さん: 「開示済み」トラッキングはオンライン/AI戦問わずfullTeamsがあれば常時更新する
    // (交代画面の相手列が使う=RB_ONLINE.startedに限定すると、AI戦でrevealedが一切更新されず全マスがずっと「？」になる)。
    // 一方、この関数のサイドバー6アイコン表示じたいは従来どおりstarted(オンライン)限定のまま(AI戦の見た目は変えない)。
    if (window.RB_ONLINE && RB_ONLINE.fullTeams && RB_ONLINE.revealed && st.poke){
      const normNm0 = n => String(n || '').replace(/^メガ/, '').replace(/[XY]$/, '');
      RB_ONLINE.revealed[side].add(normNm0((st.transformBase ? st.transformBase.poke : st.poke).name));
    }
    const iconsEl = document.getElementById('sbar-icons-' + side);
    const nameEl  = document.getElementById('sbar-name-' + side);
    if (!iconsEl || !nameEl) return;
    // チーム全体(先頭+控え)
    const team = [st].concat(st.bench || []).filter(e => e && e.poke);
    // ★オンライン: 選出3体でなくチーム6体を並べる(選出がバレない=本家仕様)。相手は場に出て初めて判明
    if (window.RB_ONLINE && RB_ONLINE.started && RB_ONLINE.fullTeams){
      const normNm = n => String(n || '').replace(/^メガ/, '').replace(/[XY]$/, '');
      const baseOf = e => normNm((e.transformBase ? e.transformBase.poke : e.poke).name);
      const revealed = RB_ONLINE.revealed[side];
      let html6 = '';
      (RB_ONLINE.fullTeams[side] || []).forEach(nm => {
        const n0 = normNm(nm);
        const e = team.find(x => baseOf(x) === n0);
        // 自分側=自分の選出は開示(知ってる情報)。相手側=場に出た子だけ開示
        const known = side === 'self' ? !!e : (!!e && revealed.has(n0));
        const dead = known && e && (e.fainted || (e.currentHp != null && e.currentHp <= 0));
        const active = known && e === st && !!st.poke && !dead;
        const cls = ['sicon', dead ? 'dead' : '', active ? 'active' : '', known ? '' : 'unknown'].filter(Boolean).join(' ');
        let label = tPokeName(nm);
        if (known && e && !dead){
          const max = S.realStat(e, 'hp') || 1;
          const hp = e.currentHp == null ? max : Math.max(0, e.currentHp);
          label += ` (${Math.round(hp / max * 100)}%)`;
        }
        html6 += `<div class="${cls}" title="${label}" aria-label="${label}">` +
          `<img src="${pokeIconSrc(nm)}" alt="${tPokeName(nm)}" loading="lazy" onerror="this.parentElement.classList.add('noimg');this.remove()">` +
          (dead ? '<span class="sic-x">✕</span>' : '') + `</div>`;
      });
      iconsEl.innerHTML = html6;
      const online = true;
      nameEl.textContent = side === 'self'
        ? ((online && LOBBY.name) || (window.I18N && I18N.t ? I18N.t('real_battle.pbox_label_self', 'じぶん') : 'じぶん'))
        : ((online && RB_ONLINE.oppName) || (window.I18N && I18N.t ? I18N.t('real_battle.pbox_label_opp', 'あいて') : 'あいて'));
      return;
    }
    // 先頭ポケモン(場に出ている個体)
    const activePoke = st.poke ? st.poke.name : null;
    // CH: ボールマークは実機準拠=選出した数だけ(空スロットは出さない)。
    // 画像なしでも「残数」が読めるよう●フォールバック(noimg)を敷く
    let html = '';
    for (let i = 0; i < team.length; i++){
      const e = team[i];
      // 手持ちアイコンはへんしん中も元のすがた(実機準拠: 手持ち画面はメタモンのまま)
      const nm = (e.illusionAs || (e.transformBase ? e.transformBase.poke : e.poke)).name;
      const enc = encodeURIComponent(nm);
      const dead = e.fainted || (e.currentHp != null && e.currentHp <= 0);
      // 場に出ている=先頭(i===0)かつひんし未
      const active = (i === 0 && !dead);
      const cls = ['sicon', dead ? 'dead' : '', active ? 'active' : ''].filter(Boolean).join(' ');
      const max = S.realStat(e, 'hp') || 1;
      const hp  = e.currentHp == null ? max : Math.max(0, e.currentHp);
      const pct = Math.round(hp / max * 100);
      const label = `${tPokeName(nm)} (${pct}%)`;
      html += `<div class="${cls}" title="${label}" aria-label="${label}">` +
              `<img src="${pokeIconSrc(nm)}" alt="${tPokeName(nm)}" loading="lazy" onerror="this.parentElement.classList.add('noimg');this.remove()">` +
              `</div>`;
    }
    iconsEl.innerHTML = html;
    // トレーナー名: オンライン対戦中はお互いのプレイヤー名(2026-07-10 阿部さん)。それ以外はi18nラベル
    const online = window.RB_ONLINE && RB_ONLINE.started;
    nameEl.textContent = side === 'self'
      ? ((online && LOBBY.name) || (window.I18N && I18N.t ? I18N.t('real_battle.pbox_label_self', 'じぶん') : 'じぶん'))
      : ((online && RB_ONLINE.oppName) || (window.I18N && I18N.t ? I18N.t('real_battle.pbox_label_opp', 'あいて') : 'あいて'));
  });
}
function setHpBar(side, hp, max){
  const pb = $('pb-' + side);
  const pct = Math.max(0, Math.min(100, hp / max * 100));
  // CH: ダメージ反映=statbarを戻す(メッセージ中の全消しから復帰して減るバーを見せる=実機の流れ)
  $('field').classList.remove('ch-busy');
  // 2層HPバー(Showdown版の演出を踏襲): prevhp=残像(遅れて縮む) / hp=現在(即時)
  // CH: パネル幅が可変(PC210/スマホ170)になったため px指定→%指定に変更
  const newW = pct.toFixed(1) + '%';
  const hpEl = pb.querySelector('.hp');
  const prevEl = pb.querySelector('.prevhp');
  if (hpEl && prevEl) {
    const oldW = prevEl.style.width || '100%';
    // prevhpを旧幅に固定(アニメ開始点)
    prevEl.style.transition = 'none';
    prevEl.style.width = oldW;
    requestAnimationFrame(() => {
      hpEl.style.width = newW;
      hpEl.className = 'hp' + (pct <= 25 ? ' low' : pct <= 50 ? ' mid' : '');
      requestAnimationFrame(() => {
        prevEl.style.transition = ''; // CSSに戻す(1.2s ease-out)
        prevEl.style.width = newW;
      });
    });
  }
  // CH: 実機準拠のHP表示=自分は数値(171/171)・相手は%のみ(ゲームと同じ=2026-07-04 阿部さん)
  // 実数値はdata属性に保持(後から切替可能)
  const t = pb.querySelector('.hptext');
  if (t) {
    if (side === 'self'){
      t.innerHTML = `${Math.round(hp)}<small>/${Math.round(max)}</small>`;
    } else {
      // 生きている限り0%と表示しない(実機の最低1%表示)
      const pd = hp > 0 ? Math.max(1, Math.round(pct)) : 0;
      t.innerHTML = `${pd}<small>%</small>`;
    }
    t.dataset.hp = hp;
    t.dataset.max = max;
  }
}

// ===== メッセージ送り =====
let sayQueue = [], sayDone = null, autoTimer = null;
function say(lines, done){
  sayQueue = lines.slice();
  sayDone = done || null;
  busy = true;
  showCmd(false);
  $('msgbox').style.display = 'block';   // CH: メッセージ再生中だけ出す(実機準拠。残留するとボタンを塞ぐ)
  nextSay();
}
function nextSay(){
  if (autoTimer){ clearTimeout(autoTimer); autoTimer = null; }
  if (!sayQueue.length){
    busy = false;
    $('msgbox').querySelector('.next').style.display = 'none';
    $('msgbox').style.display = 'none';        // CH: メッセージ退場(コマンドUIに舞台を返す)
    $('field').classList.remove('ch-busy');    // CH: メッセージ完了=UIを戻す
    if (sayDone){ const d = sayDone; sayDone = null; d(); }
    return;
  }
  const line = sayQueue.shift();
  const box = $('msgbox');
  const txt = line.text != null ? line.text : line;
  // CH: 行ごとにいったん全UIを消す(実機の「メッセージ中はUI退場」)。
  // ダメージ/状態反映を含む行は fx内のsetHpBarがすぐ戻す=「演出→バーが出て減る」の実機の流れ
  $('field').classList.add('ch-busy');
  pushMsgLine(txt);   // 下部メッセージ欄(6行・直近が薄く残る)
  if (!line.noLog) logLine(txt, undefined, line.src != null ? line.src : txt);   // ログはJA原文で保存=言語切替で再翻訳できる
  if (line.fx) line.fx();
  // こうか(ばつぐん/いまひとつ/なし)・急所はダメージ行と同じ拍に重ねる。
  // 別拍だと「2回当たった」ように見える(2026-07-06 阿部さん「1発で効果抜群とかそれだけでいい」)
  if (line.src && /ダメージ！/.test(line.src)){
    const _EFF_JA = ['こうかは ばつぐんだ！', 'こうかは いまひとつのようだ…', 'こうかは こうかなし…', 'きゅうしょに あたった！'];
    while (sayQueue.length){
      const nx = sayQueue[0];
      if (!nx || !nx.src || !_EFF_JA.includes(nx.src)) break;
      sayQueue.shift();
      pushMsgLine(nx.text);
      if (!nx.noLog) logLine(nx.text, undefined, nx.src != null ? nx.src : nx.text);
      if (nx.fx) nx.fx();
    }
  }
  box.querySelector('.next').style.display = 'none';   // ▼表記廃止(盤面クリック/自動送りは従来どおり)
  if ($('auto-msg').checked){
    // Wave3/4: メガシンカ演出(_megaFxDelay)・KOスロー演出(_koFxDelay)・交代の引っ込め演出(_recallFxDelay)は
    // msg-speedより長ければそちらを優先=専用ホールド(次行を待たせる。送り速度:はやいでも退場が完全に終わってから登場させる)
    const _hold = Math.max(+$('msg-speed').value, _megaFxDelay || 0, _koFxDelay || 0, _recallFxDelay || 0);
    _megaFxDelay = 0;
    _koFxDelay = 0;
    _recallFxDelay = 0;
    autoTimer = setTimeout(nextSay, _hold);
  }
}
function advanceMsg(){ const t = $('mv-tip'); if (t) t.style.display = 'none'; if (busy) nextSay(); }

// ===== コマンド =====
function showCmd(on){
  // あばれ継続中(げきりん/あばれる/さわぐ)は技選択なしで自動続行(実機準拠。エンジン側が技を強制する)
  if (on && !gameOver && S.sides.self.rampage && !S.sides.self.fainted){
    setTimeout(() => doTurn(null), 450);
    return;
  }
  $('cmd').style.display = on ? 'flex' : 'none';   // CH: 右側縦並び
  $('moves').style.display = 'none';
  $('party').style.display = 'none';
}
// 実機準拠: メッセージ後は技リストを直接開く(たたかう→技の2段階を廃止=2026-07-06 阿部さん)。
// あばれ継続(げきりん等)はここで自動続行。「様子を見る」からコマンドメニュー(たたかう/ポケモン/にげる)へ
function showActionUI(){
  if (!gameOver && S.sides.self.rampage && !S.sides.self.fainted){
    setTimeout(() => doTurn(null), 450);
    return;
  }
  showMoves();
}
function showMoves(){
  const st = S.sides.self;
  const tc = S.typeColors();
  $('cmd').style.display = 'none';
  $('party').style.display = 'none';        // 相互排他(重なるとクリックが食われて固まる=2026-07-06)
  $('watch-panel').style.display = 'none';
  $('weak-panel').style.display = 'none';
  const mv = $('moves');
  mv.style.display = 'flex';   // CH: 縦カプセルリスト
  const ppOf = i => (st.pp ? st.pp[i] : null);
  const lockName = st.choiceLock ? st.choiceLock.name : null;   // こだわりロック(段135)
  const allOut = st.pp && st.moves.every((m, i) => !m || st.pp[i] <= 0);
  // CH: 相性ヒント(実機の★/◎/△/✕帯)。エンジンのcalcDamageで判定=DB同様に特性込み
  // (ちょすい/ふゆう等の無効も✕になる=2026-07-05 阿部さん「DBの特性×0をそのままバトルで」)。
  // calcDamageが使えない場合は素の相性表(typeEffPreview)にフォールバック
  const oppTypes = (S.sideTypes && S.sides.opp && S.sides.opp.poke) ? S.sideTypes(S.sides.opp) : [];
  const effBand = m => {
    if (!m || m.category === '変化') return '';
    let eff = 1, immune = false;
    try {
      const r = S.calcDamage('self', 'opp', m);
      // ばけのかわ(disguiseBlock)は「タイプ相性のこうかなし」ではない(技は当たって皮が剥がれる)
      // →素のタイプ相性で帯を出す(2026-07-10 阿部さん発見・ポケモンWiki準拠)
      if (r && r.immune && r.disguiseBlock){
        const e2 = S.typeEffPreview ? S.typeEffPreview(m.type, oppTypes) : 1;
        eff = e2; immune = (e2 === 0);
      }
      else if (r && r.immune){ immune = true; }
      else if (r && r.chips){
        const c = r.chips.find(c => c.kind === 'eff-up' || c.kind === 'eff-down');
        eff = c ? c.factor : 1;
      }
    } catch(e){
      eff = S.typeEffPreview ? S.typeEffPreview(m.type, oppTypes) : 1;
      immune = eff === 0;
    }
    if (immune || eff === 0) return `<span class="mv-eff eff-no">✕ ${I18N.t('real_battle.no_effect','こうかなし')}</span>`;
    // 4倍=★ちょうばつぐん(チャンピオンズ実機準拠。en公式=Extremely effective / Game8・Kotaku裏取り済み)
    if (eff >= 4) return `<span class="mv-eff eff-hyper">★ ${I18N.t('real_battle.eff_hyper','ちょうばつぐん')}</span>`;
    if (eff > 1)  return `<span class="mv-eff eff-super">◎ ${I18N.t('real_battle.chip_super_effective','こうかばつぐん')}</span>`;
    if (eff < 1)  return `<span class="mv-eff eff-weak">△ ${I18N.t('real_battle.chip_not_very_effective','こうかいまひとつ')}</span>`;
    return '';
  };
  // CH: 技カプセル(チャンピオンズ準拠)
  // - 上段: タイプバッジ + 技名 / 右上: PP大きめ / 下段: 相性帯 + 威力/命中
  // - カプセル背景はタイプ色グラデ・disabled時(PP切れ/こだわり外)はグレーアウト
  // 上段=様子を見る/技の説明(トグル)/⚙能力値(実機のX/Y行相当=2026-07-06 阿部さん)
  const detailOn = localStorage.getItem('rb_move_detail') === 'on';
  const statsBtn = `<div class="mv-top">` +
    `<button class="watch-open">${I18N.t('real_battle.watch_button','👀 様子を見る')}</button>` +
    `<button class="weak-open">${I18N.t('real_battle.weakness_button','🎯 弱点')}</button>` +
    `<button class="desc-toggle${detailOn ? ' on' : ''}">${I18N.t('real_battle.movedesc_button','📖 技の説明')}</button>` +
    `<button class="stats-open">⚙</button></div>`;
  // メガシンカ=技リストの左横の丸ボタン(実機のRボタン位置=2026-07-06 阿部さん)。使える時だけ出す
  const megaSide = (S.canMegaEvolve(st) || st.megaChoice)
    ? `<button class="mega-side${st.megaChoice ? ' mega-armed' : ''}"><span class="ms-icon">⬡</span><span class="ms-label">${I18N.t('real_battle.cmd_mega','⬡ メガシンカ').replace('⬡ ', '')}</span></button>`
    : '';
  mv.innerHTML = megaSide + statsBtn + (allOut
    ? `<button data-i="0"><span class="mv-name"><strong>${I18N.t('real_battle.move_last_resort','わるあがき')}</strong></span><div class="mv-sub">${I18N.t('real_battle.move_last_resort_desc','PPが ぜんぶ なくなった！ 威力50 / 反動あり')}</div></button>`
    : st.moves.map((m, i) => {
        const col = tc[m.type] || '#3a4660';
        const ppNow = ppOf(i);
        const ppMax = m.pp || 0;
        // 使用条件(ゲップ=きのみ未食)を満たさない技は選べない(実機準拠で選択不可)
        const needsBerry = ((m.battle_data && m.battle_data.requires) || []).some(r => r.type === 'user_has_eaten_berry')
          && S.ateBerry && !S.ateBerry(st);
        const disabledMove = st.disable && st.disable.name === m.name;   // かなしばり中の技は選べない(実機準拠)
        const off = (ppNow != null && ppNow <= 0) || (lockName && m.name !== lockName) || needsBerry || disabledMove;
        const locked = lockName && m.name !== lockName;
        // PP残少(2以下): pp-low クラスで強調
        const ppLow = ppNow != null && ppNow <= 2 && !off;
        const ppCls = 'mv-pp' + (ppLow ? ' pp-low' : '');
        const ppTxt = ppNow != null ? `${ppNow}/${ppMax}` : '';
        // 威力/命中等はホバーの説明フロートに集約(ボタンは常時スリム=2026-07-06 阿部さん)
        // タイプ一致(STAB)=×1.5 を明示(2026-07-10 阿部さん「こうかばつぐんみたいに書いて」)。変化技は対象外
        const stab = m.category !== '変化' && (S.sideTypes ? S.sideTypes(st) : [st.poke.type1, st.poke.type2].filter(Boolean)).includes(m.type)
          ? `<span class="mv-eff eff-stab">✨ ${I18N.t('real_battle.chip_stab','タイプ一致')} ×1.5</span>` : '';
        const subParts = [
          locked ? I18N.t('real_battle.move_stubbornlock_note','こだわり中') : '',
          disabledMove ? I18N.t('real_battle.move_disabled_note','かなしばり中') : '',
          needsBerry ? I18N.t('real_battle.move_needs_berry','きのみを たべてから') : ''
        ].filter(Boolean).join(' / ');
        // カプセル背景=タイプ色グラデ(暗め→明るめ)
        const btnStyle = off ? '' : `background:linear-gradient(135deg,${col}dd 0%,${col}99 100%)`;
        return `<button class="tcol" data-i="${i}" ${off ? 'disabled' : ''} style="${btnStyle}">` +
          `<span class="mv-name"><span class="t-pill" style="background:${col}">${tTypeName(m.type)}</span><strong>${tMoveName(m)}${lockName === m.name ? ' 🔒' : ''}</strong></span>` +
          `<div class="mv-sub">${effBand(m)}${stab}${subParts}&nbsp;</div>` +
          (ppTxt ? `<span class="${ppCls}">${ppTxt}</span>` : '') +
          `</button>`;
      }).join(''))
    + `<button class="back party-open">${I18N.t('real_battle.cmd_party','🔄 ポケモン')}</button>`;
  // 技の説明ON: ホバーした技の「左横」にフロート(威力/命中/分類/優先度+説明文を集約=2026-07-06 阿部さん)
  if (detailOn){
    const tip = $('mv-tip');
    mv.querySelectorAll('button.tcol').forEach(b => {
      const m = st.moves[+b.dataset.i];
      if (!m) return;
      const desc = (window.I18N && I18N.moveDesc && I18N.moveDesc(m.key)) || m.desc || m.description || '';
      const pri = (m.battle_data && m.battle_data.priority) || m.priority || 0;
      const head = [
        `${I18N.t('real_battle.move_power_label','威力')}${m.power ?? '—'}`,
        `${I18N.t('real_battle.move_accuracy_label','命中')}${m.accuracy ?? '—'}`,
        tCatName(m.category),
        pri ? `${I18N.t('real_battle.move_priority_label','優先度')}${pri > 0 ? '+' : ''}${pri}` : ''
      ].filter(Boolean).join(' / ');
      b.addEventListener('mouseenter', () => {
        tip.innerHTML = `<b>${head}</b>` + (desc ? `<div style="margin-top:4px">${desc}</div>` : '');
        // ホバー中の技ボタンの左横に(zoom補正: rectはzoom後px→フィールド内部座標へ換算)
        const fr = $('field').getBoundingClientRect(), br = b.getBoundingClientRect();
        const ratio = fr.height / 360;
        tip.style.top = Math.max(6, Math.round((br.top - fr.top) / ratio)) + 'px';
        tip.style.bottom = 'auto';
        tip.style.left = 'auto';
        tip.style.right = '246px';
        tip.style.display = 'block';
      });
      b.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
    });
  } else $('mv-tip').style.display = 'none';
  mv.querySelectorAll('button').forEach(b => b.addEventListener('click', e => {
    // ★e.stopPropagation()必須(2026-07-13): #moves は #field の子孫なので、このクリックがdoTurn→say()で
    // 新しいメッセージ列を出した直後に #field の click(advanceMsg)へバブルし、技を選んだ同じクリックで
    // その行動の1コマ目を即座に送ってしまう(_recallFxDelay/_megaFxDelay等のホールドが効く前に先送りされる)。
    e.stopPropagation();
    SE.select();
    $('mv-tip').style.display = 'none';   // タップで説明フロートを消す(タッチでmouseleaveが来ないため)
    if (b.classList.contains('stats-open')){ openStatsModal(); return; }
    if (b.classList.contains('watch-open')){ toggleWatchPanel(b); return; }
    if (b.classList.contains('weak-open')){ toggleWeaknessPanel(b); return; }   // 相手へのタイプ相性(B1)
    if (b.classList.contains('desc-toggle')){
      localStorage.setItem('rb_move_detail', localStorage.getItem('rb_move_detail') === 'on' ? 'off' : 'on');
      showMoves(); return;
    }
    if (b.classList.contains('mega-side')){ toggleMega(); return; }
    if (b.classList.contains('party-open')){ showParty(); return; }   // 交代へ(もどるで技リストに帰る)
    const mi = +b.dataset.i;
    // 自分交代技(とんぼがえり等): 控えに生きてる子が2匹以上いる時だけ「だれに かわる?」を先に聞く
    if (!allOut && moveHasPivotSwitch(st.moves[mi])){ maybeStartPivot(mi); return; }
    doTurn(mi);
  }));
  actTimerStart();   // 本家準拠の45秒COMMANDタイマー(オンライン/AI戦問わずバトル中は常時=actTimerStart内でin-battleを見て自己ガード・2026-07-11)
}
// 自分交代技の交代先選択(事前選択方式): 控えが2匹以上生きていれば選択UIを出す。1匹以下は従来どおり自動(先頭)
function maybeStartPivot(moveIdx){
  const st = S.sides.self;
  const liveIdxs = (st.bench || []).map((e, i) => ({e, i}))
    .filter(x => x.e && x.e.poke && !x.e.fainted && !(x.e.currentHp != null && x.e.currentHp <= 0)).map(x => x.i);
  RB_PIVOT.selfIdx = liveIdxs.length ? liveIdxs[0] : null;   // 既定=控え筆頭(選択UIを出さない場合のフォールバック)
  if (liveIdxs.length < 2){ doTurn(moveIdx); return; }
  RB_PIVOT.pendingMoveIdx = moveIdx;
  showParty(false, true);   // pivot=true(3カラム交代画面を選択モードで流用。やめる=技選択に戻る)
}
// ===== 交代画面(本家チャンピオンズ実機準拠3カラム) 2026-07-10 阿部さん =====
// 左=じぶんのチーム(場に出ている子含む・タップで選択→行の下に交代する/やめる確認)/
// 中央=選択中(未選択時は場に出ている子)の読み取り専用詳細カード/右=あいてのチーム。
// 「交代する」の実処理は元のボタンclickハンドラと同じ経路(doSwitchTo=旧ロジックをそのまま踏襲)。
let swForced = false;      // 今開いている交代画面が死に出し強制か(もどるボタンの有無に使う)
let swSelected = null;     // 選択中の控えindex(st.bench基準)。null=未選択(中央は場に出ている子を表示)
// ★2026-07-10 阿部さん: バトンタッチ/とんぼがえり等の自分交代の交代先選択(事前選択方式=ロックステップの技選択直後に選ぶ)
let swPivot = false;       // 今開いている交代画面が自分交代の交代先選択モードか(もどるで技リストに帰れる=swForcedと違う)
// selfIdx=engineへ渡す自分の事前選択bench idx / oppIdx=オンラインで相手から受信した選択(onlineRunTurnがセット)
const RB_PIVOT = { pendingMoveIdx: null, selfIdx: null, oppIdx: null };
// 自分交代(とんぼがえり/ボルトチェンジ/クイックターン/すてゼリフ/バトンタッチ)を持つ技か
function moveHasPivotSwitch(m){
  return !!(m && m.battle_data && Array.isArray(m.battle_data.effects) && m.battle_data.effects.some(e => e.kind === '自分交代'));
}
function partyRowsMine(st){
  const rows = [];
  if (st && st.poke) rows.push({ entry: st, idx: null, active: true });
  (st.bench || []).forEach((e, i) => { if (e && e.poke) rows.push({ entry: e, idx: i, active: false }); });
  return rows;
}
// ★2026-07-11 阿部さん: セル=編成カプセル(slotCapsuleHtmlと同じ見た目)をそのまま流用。
// entry(場に出ている子=st or 控えentry)からライブ状態(HP/ひんし/現在の持ち物)で組み立てる版。
function swBattleCapsuleHtml(entry, opts){
  const p = entry.poke;
  const named = entry.illusionAs || p;
  const tc = S.typeColors();
  const g = entry.gender;
  const gHtml = g && g !== '—' ? `<span class="cap-g ${g === '♂' ? 'm' : 'f'}">${g}</span>` : '';
  const types = [p.type1, p.type2].filter(Boolean).map(t =>
    `<span class="cap-type" style="background:${tc[t] || '#3a4660'}">${tTypeName(t)}</span>`).join('');
  const it = S.itemByKey(entry.item);
  const itemHtml = it ? itemIconHtml(it) + tItemName(it)
    : `<span class="cap-noitem">${I18N.t('real_battle.item_none_option', 'もちもの なし')}</span>`;
  const src = setupSpriteSrc(named.name, true);
  const max = S.realStat(entry, 'hp') || 1;
  const hp = entry.currentHp == null ? max : Math.max(0, entry.currentHp);
  const dead = entry.fainted || hp <= 0;
  const pct = Math.round(hp / max * 100);
  const barCls = 'sw-hpbar' + (pct <= 25 ? ' low' : pct <= 50 ? ' mid' : '');
  const tag = dead
    ? `<span class="cap-tag dead">${I18N.t('real_battle.party_fainted', 'ひんし')} ✕</span>`
    : opts.active ? `<span class="cap-tag">${I18N.t('real_battle.party_active_label', '場に出ている')}</span>` : '';
  const hpHtml = dead ? '' : `<span class="sw-hpwrap"><span class="sw-hpbar-bg"><span class="${barCls}" style="width:${pct}%"></span></span>` +
    `<span class="sw-hptext">${pct}% (${hp}/${max})</span></span>`;
  const selected = !opts.active && swSelected === opts.idx;
  const disabled = opts.active || dead;
  const cls = ['slot', opts.active ? 'active' : '', dead ? 'dead' : '', selected ? 'selected' : ''].filter(Boolean).join(' ');
  return `<button type="button" class="${cls}" ${opts.active ? '' : `data-i="${opts.idx}"`} ${disabled ? 'disabled' : ''}>` +
    `<strong class="cap-name">${tPokeName(named.name)}${gHtml}</strong>` +
    `<span class="cap-mid"><span class="cap-types">${types}</span><small class="cap-item">${itemHtml}</small></span>` +
    `<img src="${src}" alt="" onerror="this.remove()">` + tag + hpHtml + `</button>`;
}
// 選外の3体=編成カプセル(slotCapsuleHtml)そのまま・薄く表示・選択不可(バトルに出ていないのでライブ状態は無い)
function swGhostCapsuleHtml(id){
  return `<div class="slot sw-ghost" data-id="${id}">` + slotCapsuleHtml(id) + `</div>`;
}
function swConfirmHtml(){
  return `<div class="sw-confirm"><button type="button" class="sw-yes">${I18N.t('real_battle.party_switch_confirm', '交代する')}</button>` +
    `<button type="button" class="sw-no">${I18N.t('real_battle.party_switch_cancel', 'やめる')}</button></div>`;
}
// 左列=自分の6体全部。選出3体(_pickOverride.self=選出画面で決めた順)=通常表示/選外3体=薄く選択不可
function swMineHtml(st){
  const ids = (typeof selfIds === 'function') ? selfIds() : [];
  const sel = (window._pickOverride && _pickOverride.self && _pickOverride.self.length) ? _pickOverride.self : null;
  if (!sel){   // 選出フロー未経由(保険): 従来どおり場に出ている子+控えだけを表示
    return partyRowsMine(st).map(row => {
      const html = swBattleCapsuleHtml(row.entry, { active: row.active, idx: row.idx });
      return (!row.active && swSelected === row.idx) ? html + swConfirmHtml() : html;
    }).join('');
  }
  return ids.map(id => {
    if (!slotVal[id]) return '';
    const pos = sel.indexOf(id);
    if (pos === -1) return swGhostCapsuleHtml(id);
    const entry = pos === 0 ? st : (st.bench || [])[pos - 1];
    if (!entry || !entry.poke) return swGhostCapsuleHtml(id);   // 保険(データ不整合時は薄表示に逃がす)
    const active = pos === 0;
    const idx = active ? null : pos - 1;
    const html = swBattleCapsuleHtml(entry, { active, idx });
    return (!active && swSelected === idx) ? html + swConfirmHtml() : html;
  }).join('');
}
// 中央=読み取り専用詳細カード(renderSelDetailは編成用の編集UIなので流用しない・簡易な閲覧専用カードを新設)
function swDetailHtml(entry){
  if (!entry || !entry.poke) return `<div class="sw-detail"><div class="sw-empty">${I18N.t('real_battle.sel_empty', 'ポケモンを えらんでね')}</div></div>`;
  const p = entry.poke;
  const named = entry.illusionAs || p;
  const tc = S.typeColors();
  const types = [p.type1, p.type2].filter(Boolean).map(t =>
    `<span class="sw-dtype" style="background:${tc[t] || '#3a4660'}">${tTypeName(t)}</span>`).join('');
  const mvs = (entry.moves || []).filter(Boolean);
  const movesHtml = mvs.map((m, i) => {
    const col = tc[m.type] || '#3a4660';
    const ppNow = entry.pp ? entry.pp[i] : null;
    const ppMax = m.pp || 0;
    return `<div class="sw-dmove" style="background:linear-gradient(135deg,${col}dd,${col}99)">` +
      `<span class="t-pill" style="background:${col}">${tTypeName(m.type)}</span>${tMoveName(m)}` +
      (ppNow != null ? `<span class="sw-dpp">${ppNow}/${ppMax}</span>` : '') + `</div>`;
  }).join('');
  const ab = entry.ability || p.ab1;
  const it = S.itemByKey(entry.item);
  const src = (typeof setupSpriteSrc === 'function') ? setupSpriteSrc(named.name, true) : pokeIconSrc(named.name);
  return `<div class="sw-detail">` +
    `<div class="sw-dhead"><img src="${src}" alt="" onerror="this.remove()"><div><strong>${tPokeName(named.name)}</strong><div class="sw-dtypes">${types}</div></div></div>` +
    `<div class="sw-dmoves">${movesHtml}</div>` +
    `<div class="sw-drow"><span>${I18N.t('real_battle.sel_ability', '特性')}</span><span>${(window.I18N && I18N.ability) ? I18N.ability(ab) : ab}</span></div>` +
    `<div class="sw-drow"><span>${I18N.t('real_battle.sel_item', 'もちもの')}</span><span>${it ? tItemName(it) : I18N.t('real_battle.item_none_option', 'もちもの なし')}</span></div>` +
    `</div>`;
}

// 右=あいてのチーム。オンライン(見せ合い選出=6体既知)は「場に出て判明した子」だけ開示・未判明はシルエット均一表示。

// 相手セル(クリムゾンカプセル・名前は絶対非公開=性別のみ)。

// 未登場の子は自分の選外と同じうっすらフィルター(sw-ghost)で「まだ出てきていない」だけ表す。
function swOppSlotHtml(nm, entry, known){
  const p = S.pokeByName(nm);
  if (!p) return '';
  const src = setupSpriteSrc(nm, true);
  const tc = S.typeColors();
  const tps = [p.type1, p.type2].filter(Boolean).map(t =>
    `<span class="cap-type" style="background:${tc[t] || '#3a4660'}">${tTypeName(t)}</span>`).join('');
  if (!known || !entry){
    return `<div class="slot sw-ghost"><strong class="cap-name"></strong>` +
      `<span class="cap-mid"><span class="cap-types">${tps}</span><small class="cap-item"></small></span>` +
      `<img src="${src}" alt="" onerror="this.remove()"></div>`;
  }
  const g = entry.gender;
  const gHtml = g && g !== '—' ? `<span class="cap-g ${g === '♂' ? 'm' : 'f'}">${g}</span>` : '';
  const dead = entry.fainted || (entry.currentHp != null && entry.currentHp <= 0);
  const max = S.realStat(entry, 'hp') || 1;
  const hp = entry.currentHp == null ? max : Math.max(0, entry.currentHp);
  const pct = Math.round(hp / max * 100);
  const barCls = 'sw-hpbar' + (pct <= 25 ? ' low' : pct <= 50 ? ' mid' : '');
  const tag = dead ? `<span class="cap-tag dead">${I18N.t('real_battle.party_fainted', 'ひんし')} ✕</span>` : '';
  // 相手のHPは数値非公開・バーだけ(戦闘中に見えている情報の範囲=2026-07-11 阿部さん)
  const hpHtml = dead ? '' : `<span class="sw-hpwrap"><span class="sw-hpbar-bg"><span class="${barCls}" style="width:${pct}%"></span></span></span>`;
  return `<div class="slot${dead ? ' dead' : ''}"><strong class="cap-name">${gHtml}</strong>` +
    `<span class="cap-mid"><span class="cap-types">${tps}</span><small class="cap-item"></small></span>` +
    `<img src="${src}" alt="" onerror="this.remove()">` + tag + hpHtml + `</div>`;
}
function swOppHtml(){
  const opp = S.sides.opp;
  if (!opp) return '';
  // ★2026-07-11 阿部さん: オンラインだけでなくAI戦でも同じ開示ルール(場に出て判明した子だけ開示)。
  // 判定はRB_ONLINE.startedでなくfullTeamsの有無で見る(AI戦はconfirmPickのAI分岐でfullTeams/revealedをセット)。
  // real_battle.htmlはfullTeamsが常にnull(オンライン撤去済み)なので自動的に下のフォールバック=全員公開になる。
  if (window.RB_ONLINE && RB_ONLINE.fullTeams){
    const normNm = n => String(n || '').replace(/^メガ/, '').replace(/[XY]$/, '');
    const baseOf = e => normNm((e.transformBase ? e.transformBase.poke : e.poke).name);
    const team = [opp].concat(opp.bench || []).filter(e => e && e.poke);
    const revealed = RB_ONLINE.revealed ? RB_ONLINE.revealed.opp : new Set();
    return (RB_ONLINE.fullTeams.opp || []).map(nm => {
      const n0 = normNm(nm);
      const e = team.find(x => baseOf(x) === n0);
      const known = !!e && revealed.has(n0);
      return swOppSlotHtml(nm, e, known);
    }).join('');
  }
  const team = [opp].concat(opp.bench || []).filter(e => e && e.poke);
  return team.map(e => swOppSlotHtml((e.illusionAs || e.poke).name, e, true)).join('');
}

function finishPivotPick(idx){
  if (idx == null) return;
  swPivot = false;
  $('party').style.display = 'none';

// 「交代する」の実処理: 旧showPartyのボタンclickハンドラと同じ経路を厳密に踏襲(data-iに相当するidxを引数化しただけ)
function doSwitchTo(idx){
  if (idx == null) return;
  const pt = $('party');
  if (swForced){
    // ★オンライン: 選択を相手へ送り、両者の選択が揃ってから決められた順で適用(ロックステップ)
    if (window.RB_ONLINE && RB_ONLINE.started && RB_ONLINE.pendingRep){
      pt.style.display = 'none';
      const _seed = (Math.random() * 0x7fffffff) | 0;
      RB_ONLINE.pendingRep.selfIdx = idx;
      RB_ONLINE.pendingRep.selfSeed = _seed;
      actTimerStop();   // 交代先確定=タイマー停止
      RBOnline.sendFaintReplace(idx, _seed);
      onlineTryApplyReplaces();
      return;
    }
    // 死に出し: その場で交代を実行してログを再生(ターン消費なし=実機どおり)
    pt.style.display = 'none';
    actTimerStop();   // 交代先確定=COMMANDタイマー停止(AI戦もオンラインと同じく即停止・2026-07-11)
    logPos = S.battleLog.length;
    S.attemptSwitch('self', idx, {ignoreTrapping: true, faintReplace: true});
    // 新しい子は登場拍(いけっ！の声)まで隠す=前触れなくポンと出るのを防ぐ(2026-07-06 阿部さん)
    const ff = $('f-self'); if (ff){ ff.classList.remove('recall', 'enter'); ff.classList.add('gone'); }
    const pbSelf = $('pb-self'); if (pbSelf) pbSelf.style.visibility = 'hidden';
    renderAll();   // 隠れたまま新しい子のスプライトを組む(表示は登場拍のenter fxが行う)
    const fresh = reorderEndure(S.battleLog.slice(logPos).filter(e => !/^───/.test(e.msg)));
    say(fresh.flatMap(e => splitBattleLines(e.msg).map(lineWithFx)), () => showActionUI());
    return;
  }
  S.sides.self.switchChoice = idx;
  doTurn(null);   // 交代をこのターンの行動に
}

// 弱点パネル(2026-07-08 B1): 相手の場のポケモンに対する18タイプ相性を
// こうかばつぐん / いまひとつ / こうかなし の3区分で表示。toggleWatchPanel を踏襲(位置・zoom補正・クリックで閉じる)。
// 倍率は calcDamage('self','opp',ダミー技) の immune/eff-up/eff-down で「特性込み」を優先し、
// 例外/非反応時は typeEffPreview(素相性)にフォールバック(ベストエフォート・spec§2準拠)。
function toggleWeaknessPanel(btn){
  const w = $('weak-panel');
  if (w.style.display === 'block'){ w.style.display = 'none'; return; }
  $('watch-panel').style.display = 'none';   // 様子を見るパネルとは排他(同じ位置に出す)
  // 左上の非常口ボタン(btn-exit)の真下に出す(zoom補正あり・toggleWatchPanelと同じ位置計算)
  const fr = $('field').getBoundingClientRect();
  const ratio = fr.height / 360;
  const ex = $('btn-exit');
  const topPx = ex ? Math.round((ex.getBoundingClientRect().bottom - fr.top) / ratio) + 8 : 52;
  w.style.top = topPx + 'px'; w.style.bottom = 'auto'; w.style.left = '14px'; w.style.right = 'auto';

  const opp = S.sides.opp;
  // 相手の実効タイプ(sideTypes優先・無ければポケモン素タイプ)
  const defTypes = (S.sideTypes && opp && opp.poke) ? S.sideTypes(opp)
    : (opp && opp.poke ? [opp.poke.type1, opp.poke.type2].filter(Boolean) : []);
  const tc = (S.typeColors && S.typeColors()) || (typeof TYPE_COLORS !== 'undefined' ? TYPE_COLORS : {});
  const TYPES18 = (typeof TYPES !== 'undefined') ? TYPES : [];

  // 相手が場にいない/入替中=無害に(空メッセージ)
  if (!opp || !opp.poke || !defTypes.length){
    w.innerHTML = `<div class="wp-row">${I18N.t('real_battle.weakness_empty','あいては いないようだ')}</div>`;
    w.style.display = 'block';
    w.onclick = () => { w.style.display = 'none'; };
    return;
  }

  // 18タイプそれぞれについて相手への倍率を計算(特性込み優先→素相性フォールバック)
  const buckets = { super: [], weak: [], none: [] };
  TYPES18.forEach(atkType => {
    let eff = 1, immune = false;
    try {
      const dummy = { name: '__weakness', type: atkType, category: '物理', power: 40 };
      const r = S.calcDamage ? S.calcDamage('self', 'opp', dummy) : null;
      if (r && r.immune && r.disguiseBlock){   // ばけのかわ=タイプ無効ではない→素の相性で表示(2026-07-10)
        eff = S.typeEffPreview ? S.typeEffPreview(atkType, defTypes) : 1; immune = (eff === 0);
      }
      else if (r && r.immune){ immune = true; }
      else if (r && Array.isArray(r.chips)){
        const c = r.chips.find(c => c.kind === 'eff-up' || c.kind === 'eff-down');
        if (c) eff = c.factor;
        else { eff = S.typeEffPreview ? S.typeEffPreview(atkType, defTypes) : 1; if (eff === 0) immune = true; }
      } else {
        eff = S.typeEffPreview ? S.typeEffPreview(atkType, defTypes) : 1; if (eff === 0) immune = true;
      }
    } catch(e){
      eff = S.typeEffPreview ? S.typeEffPreview(atkType, defTypes) : 1; immune = eff === 0;
    }
    const mult = immune ? 0 : eff;
    const col = tc[atkType] || '#3a4660';
    const badge = `<span class="wp-t" style="background:${col}">${tTypeName(atkType)}</span>`;
    if (mult === 0){
      buckets.none.push(badge);
    } else if (mult > 1){
      const m = mult >= 4 ? I18N.t('real_battle.weakness_4x','4倍') : `×${mult}`;
      buckets.super.push(`${badge}<span class="wp-m">${m}</span>`);
    } else if (mult < 1){
      const m = mult <= 0.25 ? I18N.t('real_battle.weakness_quarter','1/4') : `×${mult}`;
      buckets.weak.push(`${badge}<span class="wp-m">${m}</span>`);
    }   // ×1(等倍)は省略
  });

  const section = (title, arr) => arr.length
    ? `<div class="wp-row"><b>${title}</b><div class="wp-types">${arr.join('')}</div></div>` : '';
  w.innerHTML =
    section(I18N.t('real_battle.weakness_title_super','こうかばつぐん'), buckets.super) +
    section(I18N.t('real_battle.weakness_title_weak','いまひとつ'), buckets.weak) +
    section(I18N.t('real_battle.weakness_title_none','こうかなし'), buckets.none);
  w.style.display = 'block';
  w.onclick = () => { w.style.display = 'none'; };
}
