// ===== ターン実行→ログを1行ずつ実機テンポで再生 =====
function doTurn(moveIdx){
  if (busy || gameOver) return;
  if (S.sides.self.fainted) return;   // 死に出しの選択待ち中はターンを進めない
  // 行動が決まったらまずメニューをパッと消す(2026-07-06 阿部さん)
  ['cmd', 'moves', 'party', 'watch-panel', 'weak-panel', 'mv-tip'].forEach(id => { $(id).style.display = 'none'; });
  actTimerStop();   // 行動確定=COMMANDタイマー停止(AI戦もオンラインと同じ挙動に揃える・オンラインはonlineSubmitAction側でも停止=二重停止だが無害)
  const self = S.sides.self, opp = S.sides.opp;
  if (moveIdx != null) self.selectedMoveIdx = moveIdx;
  // ★オンライン対戦(ロックステップ): 自分の行動を相手へ送り、両者の行動+共有シードが揃ってから実行
  if (window.RB_ONLINE && RB_ONLINE.started){ onlineSubmitAction(moveIdx); return; }
  // 相手はAI v2(段118): 技だけでなく不利な時の交代も選ぶ
  // (デモ/非オンライン時はopp側の交代先は選べないのでAI任意=先頭。前回オンライン戦の受信値が残っていたら捨てる)
  RB_PIVOT.oppIdx = null;
  if (opp.poke && !opp.fainted){
    const act = S.aiChooseAction ? S.aiChooseAction('opp') : {type: 'move', index: S.aiChooseMove('opp')};
    if (act.type === 'switch') opp.switchChoice = act.index;
    else opp.selectedMoveIdx = act.index;
  }
  executeTurn();
}
// 1ターンを実行して差分ログを再生する本体(オフライン=doTurnから直接/オンライン=両者の行動が揃ってから)
function executeTurn(){
  // 演出用HPスナップショット: 交代で出た瞬間のバーは「攻撃前のHP」を出す
  // (renderAllはエンジン最終状態=被弾後を入れてしまい、登場した瞬間に減って見えていた=2026-07-06 阿部さん)
  window._hpSnap = {};

const BGM_BASS = [110, 0, 110, 0, 165, 0, 110, 0, 131, 0, 131, 0, 98, 0, 98, 123];           // A E C G…
const BGM_LEAD = [440, 0, 523, 587, 659, 0, 587, 523, 440, 0, 392, 440, 523, 440, 392, 330]; // 戦闘っぽい旋律
function bgmStart(){
  if (!sndOn || bgmTimer) return;
  const ctx = ac();
  masterBgm = ctx.createGain(); masterBgm.gain.value = 0.10; masterBgm.connect(dest());
  let next = ctx.currentTime + 0.05;
  const SPB = 0.13;   // 16分音符の長さ(≒115bpmの16ビート)
  bgmStep = 0;
  bgmTimer = setInterval(() => {
    if (!sndOn){ bgmStop(); return; }
    while (next < ctx.currentTime + 0.2){
      const i = bgmStep % 16;
      const b = BGM_BASS[i], l = BGM_LEAD[i];
      if (b){ const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'triangle'; o.frequency.value = b;
        g.gain.setValueAtTime(0.9, next); g.gain.exponentialRampToValueAtTime(0.001, next + SPB * 0.9);
        o.connect(g); g.connect(masterBgm); o.start(next); o.stop(next + SPB); }

        o.type = 'square'; o.frequency.value = l;
        g.gain.setValueAtTime(0.35, next); g.gain.exponentialRampToValueAtTime(0.001, next + SPB * 0.85);
        o.connect(g); g.connect(masterBgm); o.start(next); o.stop(next + SPB); }

        const len = Math.floor(ctx.sampleRate * 0.03), buf = ctx.createBuffer(1, len, ctx.sampleRate);
        const d = buf.getChannelData(0); for (let k = 0; k < len; k++) d[k] = (Math.random() * 2 - 1) * (1 - k / len);
        const s = ctx.createBufferSource(); s.buffer = buf;
        const g = ctx.createGain(); g.gain.value = 0.12; s.connect(g); g.connect(masterBgm); s.start(next); }
      next += SPB; bgmStep++;
    }
  }, 40);
}

    const st = S.sides[side];

    // 詳細=reference/_aizuchi_win_rule_2026-07-11.md。従来はdead('opp')だけ見て相打ち=常に勝ち扱いだった):
    // ・反動(フレアドライブ等)での相打ち=最後に技を出した側(攻撃側)の勝ち
    // ・自爆技(じばく/だいばくはつ/いのちがけ=effects kind「自分瀕死」)での相打ち=使った側の負け
    // ・みちづれ相打ちは「最後の技=倒した側の攻撃」なので攻撃側の勝ち=みちづれ使用側の負け(公式と同結果)

    let won = dead('opp');
    if (dead('opp') && dead('self') && S.getLastMoveInfo){
      const lm = S.getLastMoveInfo();
      if (lm && lm.side && lm.move){
        const suicide = ((lm.move.battle_data && lm.move.battle_data.effects) || []).some(e => e.kind === '自分瀕死');
        won = suicide ? lm.side !== 'self' : lm.side === 'self';
      }
    }
    if (won){ SE.win(); winStreak++; } else { SE.lose(); winStreak = 0; }
    // scene:win/scene:lose(演出ツクールStep5・上書きオーバーレイ): シート無し=従来のshowResultBannerのまま(挙動不変)。
    const _wlSheet = resolveSceneSheet(won ? 'win' : 'lose');
    if (_wlSheet) playSceneCueSheet(_wlSheet, { won }); else showResultBanner(won);
    // 勝ちは案内文なし(WIN!バナー+つぎの相手ボタンで足りる=2026-07-06 阿部さん)。負けだけ操作案内。
    // JA正典で生成→lineWithFxで表示翻訳(ログはJA原文で保存され言語切替に追従)
    const winJa = `🎉 相手のポケモンは ぜんぶ たおれた！ きみの かち！(連勝: ${winStreak})`;
    say([lineWithFx(won ? winJa : '😵 自分のポケモンは ぜんぶ たおれた… まけてしまった…')]
        .concat(won ? [] : [lineWithFx('「にげる」から 編成にもどって もういちど あそべます')]),
        () => { showCmd(true);
          // 通常フローは技リスト1画面完結=たたかう/ポケモンは勝敗後のメニューに出さない(2026-07-06 阿部さん)

          if (won && !(window.RB_ONLINE && RB_ONLINE.started)) showNextOpponentButton();

  }
  // ★オンライン: 死に出しは両者が各自選ぶ(相手側はエンジンが保留済み=__rbDeferFaintReplaceOpp)
  if (window.RB_ONLINE && RB_ONLINE.started && (S.sides.self.fainted || S.sides.opp.fainted)){

  // 死に出し(自分側): エンジンが保留した交代先をプレイヤーが選ぶ(控え2匹以上の時だけ保留される)
  if (S.sides.self.fainted){

    setTimeout(() => { if (S.sides.self.fainted) $('msgbox').style.display = 'none'; }, 2200);
    return;
  }
  turnNo++; updateTurnBadge();   // 次のターンへ(Showdown風 Turnバッジ)
  showActionUI();   // 実機準拠=技リスト直行
}

//   - simテスト群がシード付きMath.randomで決定論なのを流用(mulberry32=tools/_sim_engine.jsと同じ)
//   - ホスト=シードの発行者。ゲストの行動を受けてから turnGo(自分の行動+シード) を配る
//   - 死に出しは各自が選び、選択+シードを共有して「ホスト側から」の固定順で両者が適用

function m32(a){ return function(){ a |= 0; a = a + 0x6D2B79F5 | 0; var t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
function engineWin(){ try { return $('engine-frame').contentWindow; } catch (e){ return null; } }
function onlineSeedEngine(seed){ const w = engineWin(); if (w) w.Math.random = m32(seed >>> 0); }

function actTimerRender(){
  let el = $('act-timer');
  // 技メニュー/交代画面のうち表示中の方に付ける(交代・死に出し中も残り時間が見える=2026-07-10 阿部さん)。

  const mv = $('moves'), pt = $('party');

  actTimerRender();

    if (!actInBattle() || gameOver || RB_ONLINE.myAction){ actTimerStop(); return; }
    RB_ACT.left = Math.max(0, RB_ACT.left - 1);

// 合言葉はpresenceに生で載せずハッシュだけ共有(照合用・部屋名の名前空間にも使う)
function codeHash(c){ let h = 5381; for (const ch of String(c || '')) h = (h * 33 + ch.codePointAt(0)) >>> 0; return h.toString(36); }
function teamComplete(){ return selfIds().filter(id => slotVal[id]).length >= 3; }   // 最低3体でOK(本家準拠・2026-07-10 阿部さん)。選出で3体えらぶので3体未満は不可

  const other = LOBBY.members.find(m => m.st === 'code' && m.codeHash === h && m.id !== myLobbyId());
  if (other){ lobbyGoRoom('c_' + other.id + '_' + h, other); return; }

function onlineTeamPayload(){
  const ids = selfIds();
  const pick = obj => Object.fromEntries(ids.map(id => [id, obj[id]]));
  return { size: teamSize, lead: leadSlot.self,
    val: pick(slotVal), item: pick(slotItem), ability: pick(slotAbility), gender: pick(slotGender),
    nature: pick(slotNature), effort: pick(slotEffort),
    moves: Object.fromEntries(ids.map(id => [id, (slotMoves[id] || []).map(m => m && m.name)])) };
}
function onlineSendTeamOnce(){
  if (!RB_ONLINE.active || RB_ONLINE.myTeamSent) return;
  RBOnline.sendTeam();

function onlineApplyOppTeam(d){
  if (!d || !d.val) return;
  RB_ONLINE.applying = true;   // 適用中のsaveTeamで自分のチームを再送しない(相互再送ループ防止)
  try {
  if (d.size && d.size !== teamSize){ teamSize = d.size; renderTeamRows(); }   // オンライン専用=セレクタ無し(6固定同士なら通常起きない)
  selfIds().forEach((sid, i) => {
    const oid = oppIds()[i]; if (!oid) return;
    const nm = d.val[sid];
    if (!nm || !S.pokeByName(nm)){   // 3〜5体チーム: 空きスロットは相手側でも空にする(旧データ残り防止)
      slotVal[oid] = null;
      if ($(oid)) $(oid).innerHTML = slotCapsuleHtml(oid);
      return;
    }
    slotItem[oid] = d.item && d.item[sid] != null ? d.item[sid] : 'mega_stone_any';
    slotGender[oid] = (d.gender && d.gender[sid]) || genderOfRB(nm);
    slotNature[oid] = (d.nature && d.nature[sid]) || 'まじめ';
    slotEffort[oid] = clampEffortRB((d.effort && d.effort[sid]) || {});
    const poke = S.pokeByName(nm);
    const abS = d.ability && d.ability[sid];
    slotAbility[oid] = (abS && [poke.ab1, poke.ab2, poke.ab3].includes(abS)) ? abS : defaultAbilityRB(poke);
    const all = S.usableMoves(poke);
    const mvs = ((d.moves && d.moves[sid]) || []).map(n => all.find(m => m.name === n)).filter(Boolean);
    slotMoves[oid] = mvs.length === 4 ? mvs : autoMoves(poke);
    setSlot(oid, nm, true);
  });
  const li = selfIds().indexOf(d.lead || 's1');

// --- ターン(ロックステップ) ---
function onlineSubmitAction(moveIdx){
  if (RB_ONLINE.myAction) return;   // 二重送信ガード
  const self = S.sides.self;
  // moveIdx=null は2通り: ①交代(switchChoiceがセット済み) ②あばれる等のロック継続(エンジンが技を強制)
  // 自分交代技(とんぼがえり等)を選んだ時はRB_PIVOT.selfIdxに事前選択済み(2026-07-10)。
  // pivotIdxとして一緒に相手へ送り、両クライアントで同じ子が出るようにする(ロックステップ非分岐)
  RB_ONLINE.myAction = (moveIdx != null)
    ? { kind: 'move', idx: moveIdx, mega: !!self.megaChoice, pivotIdx: RB_PIVOT.selfIdx }
    : (self.switchChoice != null
      ? { kind: 'switch', idx: self.switchChoice, mega: false }
      : { kind: 'lock', mega: false });
  RBOnline.sendAction(RB_ONLINE.myAction);
  actTimerStop();   // 行動確定=COMMANDタイマー停止
  pushMsgLine(_olT('online_wait_action', '相手の こうどうを まっています…'));
  $('msgbox').style.display = 'block';
  if (RBOnline.role === 'host') onlineHostTryGo();
}
function onlineHostTryGo(){
  if (!RB_ONLINE.started || !window.RBOnline || RBOnline.role !== 'host') return;
  if (!RB_ONLINE.myAction || !RB_ONLINE.oppAction) return;
  const seed = (Math.random() * 0x7fffffff) | 0;
  RBOnline.sendTurnGo(RB_ONLINE.myAction, seed, turnNo);
  onlineRunTurn(seed);
}
function onlineGuestGo(hostAction, seed){
  if (!RB_ONLINE.started) return;
  RB_ONLINE.oppAction = hostAction;
  onlineRunTurn(seed);
}
function onlineRunTurn(seed){
  const opp = S.sides.opp, a = RB_ONLINE.oppAction || {};
  if (a.kind === 'switch') opp.switchChoice = a.idx;
  else if (a.kind === 'move' && a.idx != null) opp.selectedMoveIdx = a.idx;
  // kind:'lock'(あばれる継続等)は何もセットしない=エンジンのロックが技を強制する
  opp.megaChoice = !!a.mega;
  // 相手が自分交代技を選んでいたら、相手が選んだ交代先(pivotIdx)をこちらの__rbSwitchPickにも使わせる
  // (2026-07-10・ロックステップ=両クライアントで同じ子が出る必要がある)
  RB_PIVOT.oppIdx = (a.kind === 'move' && a.pivotIdx != null) ? a.pivotIdx : null;
  RB_ONLINE.myAction = null; RB_ONLINE.oppAction = null;
  onlineSeedEngine(seed);
  executeTurn();
}

// --- 死に出し(各自が選ぶ→両者そろってからホスト側優先の固定順で適用=両クライアントの状態一致) ---
function onlineBeginFaintReplace(){
  RB_ONLINE.pendingRep = { needSelf: !!S.sides.self.fainted, needOpp: !!S.sides.opp.fainted,
    selfIdx: null, selfSeed: null, oppIdx: null, oppSeed: null };
  if (RB_ONLINE.pendingRep.needSelf){
    pushMsgLine(`${tPokeName(S.sides.self.poke.name)} ${I18N.t('real_battle.faint_replace_prompt', 'は たおれてしまった… つぎのポケモンを えらんでね')}`);
    $('msgbox').style.display = 'block';
    showParty(true);
    actTimerStop(); RB_ACT.turn = -1; actTimerStart();   // 死に出しにも45秒(時間切れ=先頭の生きてる子)
    setTimeout(() => { if (S.sides.self.fainted) $('msgbox').style.display = 'none'; }, 2200);
  } else {
    pushMsgLine(_olT('online_wait_replace', '相手が つぎのポケモンを えらんでいます…'));
    $('msgbox').style.display = 'block';
  }
  onlineTryApplyReplaces();   // 相手の選択が先に届いていた場合(repInbox)を回収
}
function onlineTryApplyReplaces(){
  const P = RB_ONLINE.pendingRep; if (!P) return;
  if (P.needOpp && P.oppIdx == null && RB_ONLINE.repInbox){
    P.oppIdx = RB_ONLINE.repInbox.idx; P.oppSeed = RB_ONLINE.repInbox.seed; RB_ONLINE.repInbox = null;
  }
  if (P.needSelf && P.selfIdx == null) return;
  if (P.needOpp && P.oppIdx == null){
    pushMsgLine(_olT('online_wait_replace', '相手が つぎのポケモンを えらんでいます…'));
    $('msgbox').style.display = 'block';
    return;
  }
  RB_ONLINE.pendingRep = null;
  const mine = P.needSelf ? { side: 'self', idx: P.selfIdx, seed: P.selfSeed } : null;
  const theirs = P.needOpp ? { side: 'opp', idx: P.oppIdx, seed: P.oppSeed } : null;
  const order = (window.RBOnline && RBOnline.role === 'host') ? [mine, theirs] : [theirs, mine];
  logPos = S.battleLog.length;
  order.filter(Boolean).forEach(r => { onlineSeedEngine(r.seed); S.attemptSwitch(r.side, r.idx, { ignoreTrapping: true, faintReplace: true }); });
  if (mine){
    const ff = $('f-self'); if (ff){ ff.classList.remove('recall', 'enter'); ff.classList.add('gone'); }
    const pb = $('pb-self'); if (pb) pb.style.visibility = 'hidden';
  }
  renderAll();
  const fresh = reorderEndure(S.battleLog.slice(logPos).filter(e => !/^───/.test(e.msg)));
  say(fresh.flatMap(e => splitBattleLines(e.msg).map(lineWithFx)), () => showActionUI());
}

    `</span>` +
    `<span id="online-status" style="color:#4a4470;font-weight:800;font-size:14px"></span>`;
  $('lobby-ready').addEventListener('click', lobbyToggleReady);
  $('lobby-code-toggle').addEventListener('click', () => {
    SE.select();
    const f = $('online-form');
    f.style.display = f.style.display === 'none' ? 'flex' : 'none';
    if (f.style.display === 'flex') $('online-room').focus();
  });
  $('lobby-leave').addEventListener('click', lobbyExit);
  $('lobby-vs-ai').addEventListener('click', lobbyVsAi);
  $('online-connect').addEventListener('click', onlineConnect);
  $('online-room').addEventListener('keydown', e => { if (e.key === 'Enter') onlineConnect(); });
  renderLobbyList();
}
// 🤖AIと対戦(2026-07-10 阿部さん「誰もいなかったらAIと」): オンライン非接続のまま、
// このページのバトルチームでオフラインバトル(相手=おまかせ編成のAI)。real_battle由来のstartBattleを流用
function lobbyVsAi(){
  SE.select();
  if (window.RB_ONLINE && RB_ONLINE.active) return;
  if (!teamComplete()){ onlineStatus(_olT('online_need_full_team', 'バトルチームは さいてい3体 そろえてね')); return; }
  // ★AI戦も見せ合い選出を挟む(2026-07-11 阿部さん「6体同士でいきなりでなく3体選んで開始」)
  // 相手(AI)の6体が空いていたら未使用種でランダム補充してから選出画面へ
  const usedNames = new Set(selfIds().concat(oppIds()).map(id => slotVal[id]).filter(Boolean));
  const pool = S.pokeList().filter(isPickable).filter(pk => !usedNames.has(pk.name));
  oppIds().forEach(id => {
    if (!slotVal[id] && pool.length){
      const i = Math.floor(Math.random() * pool.length);
      setSlot(id, pool.splice(i, 1)[0].name);
    }
  });
  RB_ONLINE.oppName = 'AI';   // 選出画面右の見出し/バトル中プレートに表示(言語中立)
  PICK.aiMode = true; PICK.mine = null; PICK.theirs = null; PICK.sel = [];
  showPickScreen();
}
function lobbyExit(){
  try { RBOnline.lobbyLeave(); } catch (e) {}
  _observing = false;   // 入口に戻ったら観戦購読を張り直す(チャンネルは破棄済み)
  LOBBY.joined = false; LOBBY.ready = false; LOBBY.matching = false; LOBBY.members = [];
  if (LOBBY.roomTimer){ clearTimeout(LOBBY.roomTimer); LOBBY.roomTimer = null; }
  renderLobbyEntry();
}
function lobbyOnState(members){
  LOBBY.members = members || [];
  renderLobbyList();
  lobbyTryMatch();
}
function myLobbyId(){ try { return localStorage.getItem('rb_online_cid'); } catch (e){ return null; } }
function renderLobbyList(){
  const cnt = $('lobby-count'); if (cnt) cnt.textContent = String(LOBBY.members.length);
  const list = $('lobby-waitlist'); if (!list) return;
  const me = myLobbyId();
  // ロビーの「全員」を表示(2026-07-10 阿部さん)。自分が先頭・つぎに対戦待ち(⚔️)・あとは在室(🟢)。
  // 他の人の「待ち」チップには[たいせんする]=クリックでその人に挑戦(即マッチ)
  const rank = m => m.st === 'waiting' ? 0 : m.st === 'code' ? 1 : 2;
  const members = LOBBY.members.slice().sort((a, b) =>
    (a.id === me ? -1 : b.id === me ? 1 : 0) ||
    (rank(a) - rank(b)) || (a.since - b.since) || (a.id < b.id ? -1 : 1));
  // ランプ色(2026-07-10 阿部さん): 🔴=たいせん待ち(誰でも申し込める)/🟡=あいことばで友だち待ち/🟢=在室(右上の人数と同色)
  const chip = m => {
    const isMe = m.id === me;
    const lamp = m.st === 'waiting' ? '🔴 ' : m.st === 'code' ? '🟡🔑 ' : '🟢 ';   // 在室=🟢・あいことば待ち=🟡🔑・たいせん待ち=🔴
    const you = isMe ? esc2(_olT('online_lobby_you', '(あなた)')) : '';
    const base = `${lamp}${esc2(m.name || '?')}${you}`;
    if (!isMe && m.st === 'waiting' && LOBBY.joined)
      return `<button type="button" class="lobby-vs" data-id="${esc2(m.id)}">${base}<span class="lv-go">▶ ${esc2(_olT('online_lobby_vs', 'たいせんする'))}</span></button>`;
    if (!isMe && m.st === 'code' && m.codeHash && LOBBY.joined)   // 🔑の人を選んで合言葉を入れて参加(codeHash無し=旧クライアントはボタン非表示)
      return `<button type="button" class="lobby-vs lobby-key" data-id="${esc2(m.id)}">${base}<span class="lv-go">🔑 ${esc2(_olT('online_lobby_key_join', 'さんか'))}</span></button>`;
    const title = m.st === 'code' ? ` title="${esc2(_olT('online_lobby_code_mark', 'あいことばで まってるよ'))}"` : '';
    return `<span class="lobby-chip${m.st === 'waiting' ? ' waiting' : ''}"${title}>${base}</span>`;
  };
  let html = members.map(chip).join('');
  if (!members.some(m => m.st === 'waiting' && m.id !== me))
    html += `<div style="margin-top:4px;color:#8a82a8;font-weight:700">${esc2(_olT('online_lobby_none', 'いま たいせんまちの人は いないよ。じゅんびOKで まってみよう！'))}</div>`;
  list.innerHTML = html;
  list.querySelectorAll('.lobby-vs').forEach(b => b.addEventListener('click', () => {
    SE.select();
    const m = LOBBY.members.find(x => x.id === b.dataset.id);
    if (!m) return;
    if (b.classList.contains('lobby-key')) openKeyJoin(b.getBoundingClientRect(), m);
    else lobbyChallenge(m);
  }));
}
// 🔑の人を選んで合言葉を入力→ハッシュ一致でその人の部屋へ(2026-07-10 阿部さん)
function openKeyJoin(anchorRect, m){
  closeSwapConfirm();
  if (LOBBY.matching || (window.RB_ONLINE && RB_ONLINE.active)) return;
  if (!teamComplete()){ onlineStatus(_olT('online_need_full_team', 'バトルチームは さいてい3体 そろえてね')); return; }
  const pop = document.createElement('div');
  pop.id = 'swap-pop';
  const q = I18N.t('online_battle.key_join_q', '{name} さんの あいことばを いれてね').replace('{name}', m.name || '?');
  pop.innerHTML = `<div class="sp-q">🔑 ${q}</div>` +
    `<input id="key-join-in" maxlength="24" style="width:100%;box-sizing:border-box;margin-bottom:8px;padding:7px 9px;border:2px solid #6a5be0;border-radius:9px;font-size:13px;font-family:inherit">` +
    `<div class="sp-btns"><button class="sp-yes">🔑 ${I18N.t('online_battle.key_join_go', 'さんか')}</button>` +
    `<button class="sp-no">${I18N.t('online_battle.swap_no', 'やめる')}</button></div>`;
  document.body.appendChild(pop);
  const r = anchorRect, pw = 240;
  pop.style.left = Math.max(8, Math.min(window.innerWidth - pw - 8, r.left + r.width / 2 - pw / 2 + window.scrollX)) + 'px';
  pop.style.top = (r.bottom + 6 + window.scrollY) + 'px';
  const tryJoin = () => {
    const v = ($('key-join-in').value || '').trim();
    if (!v) return;
    if (codeHash(v) !== m.codeHash){
      onlineStatus(_olT('online_lobby_key_wrong', 'あいことばが ちがうよ'));
      $('key-join-in').style.borderColor = '#e0564a';
      return;
    }
    SE.select(); closeSwapConfirm();
    lobbyGoRoom('c_' + m.id + '_' + m.codeHash, m);
  };
  pop.querySelector('.sp-yes').addEventListener('click', e => { e.stopPropagation(); tryJoin(); });
  $('key-join-in').addEventListener('keydown', e => { if (e.key === 'Enter') tryJoin(); });
  pop.querySelector('.sp-no').addEventListener('click', e => { e.stopPropagation(); SE.select(); closeSwapConfirm(); });
  armPopCloser(pop);
  setTimeout(() => { const i = $('key-join-in'); if (i) i.focus(); }, 50);
}
// 待っている人を選んで挑戦(2026-07-10 阿部さん)。自分がready(waiting)でなくてもOK
function lobbyChallenge(target){
  if (LOBBY.matching || (window.RB_ONLINE && RB_ONLINE.active)) return;
  if (!teamComplete()){ onlineStatus(_olT('online_need_full_team', 'バトルチームは さいてい3体 そろえてね')); return; }
  const me = myLobbyId(); if (!me || !target || target.id === me) return;
  const room = 'm_' + [me, target.id].sort().join('_');
  RBOnline.lobbySet({ st: 'matched', partner: target.id, room: room });
  lobbyGoRoom(room, target);
}
function lobbySyncReadyBtn(){
  const b = $('lobby-ready'); if (!b) return;
  b.textContent = LOBBY.ready ? '⏳ ' + _olT('online_lobby_ready_cancel', 'まつのを やめる') : '⚔️ ' + _olT('online_lobby_ready', 'じゅんびOK(相手を まつ)');
  b.style.background = LOBBY.ready ? '#7a8290' : 'linear-gradient(90deg,#e0564a,#ff7a63)';
}
function lobbyToggleReady(){
  SE.select();
  if (LOBBY.matching) return;
  if (!LOBBY.ready && !teamComplete()){ onlineStatus(_olT('online_need_full_team', 'バトルチームは さいてい3体 そろえてね')); return; }
  LOBBY.ready = !LOBBY.ready;
  RBOnline.lobbySet(LOBBY.ready ? { st: 'waiting', since: Date.now(), partner: null, room: null } : { st: 'idle', partner: null, room: null });
  lobbySyncReadyBtn();
  onlineStatus(LOBBY.ready ? _olT('online_lobby_wait_status', 'あいてを まっています…') : '');
  lobbyTryMatch();
}
// マッチング=申し込み制のみ(2026-07-10 阿部さん: 自動ペアは廃止。「たいせん待ち」の人を選んで挑戦する)
// 自分が「たいせん待ち」中に、誰かが自分をpartner指名(matched)したらその部屋へ行く
function lobbyTryMatch(){
  if (!LOBBY.ready || LOBBY.matching || (window.RB_ONLINE && RB_ONLINE.active)) return;
  const me = myLobbyId(); if (!me) return;
  const inviter = LOBBY.members.find(m => m.st === 'matched' && m.partner === me && m.room);
  if (inviter) lobbyGoRoom(inviter.room, inviter);
}
async function lobbyGoRoom(room, partner){
  if (LOBBY.matching) return;
  LOBBY.matching = true;
  if (partner && partner.name) RB_ONLINE.oppName = partner.name;   // バトル中の名前表示用
  onlineStatus(_olT('online_lobby_matched', 'あいてが みつかった！ {name} さんと たいせん！').replace('{name}', partner && partner.name || '?'));
  try { await onlineConnectRoom(room, LOBBY.name); } catch (e){
    LOBBY.matching = false;
    onlineStatus(_olT('online_error', 'せつぞくに しっぱいしました: ') + (e && e.message || ''));
    return;
  }
  lobbySetUiConnected();
  // 相手が部屋に来なければ15秒でロビー待機に戻る(相手が直前に離脱したケース)
  LOBBY.roomTimer = setTimeout(() => {
    if (window.RBOnline && !RBOnline.peerPresent && !RB_ONLINE.started){
      try { RBOnline.disconnect(); } catch (e) {}
      RB_ONLINE.active = false; RB_ONLINE.myTeamSent = false;
      LOBBY.matching = false;
      RBOnline.lobbySet({ st: LOBBY.ready ? 'waiting' : 'idle', since: Date.now(), partner: null, room: null });
      renderLobbyMain();
      lobbySyncReadyBtn();
      onlineStatus(_olT('online_lobby_room_timeout', 'あいてと つながらなかった… もういちど まってみてね'));
    }
  }, 15000);
}
// 部屋に相手が来た=マッチ成立確定。ロビーからは退室(在席一覧を汚さない)
function lobbyRoomPeerArrived(){
  if (LOBBY.roomTimer){ clearTimeout(LOBBY.roomTimer); LOBBY.roomTimer = null; }
  if (LOBBY.joined){ try { RBOnline.lobbyLeave(); } catch (e) {} LOBBY.joined = false; }
}
// 部屋接続後のパネル表示(ボタン類を引っ込めてステータスだけに)
function lobbySetUiConnected(){
  // 一覧(lobby-waitlist)は見せたまま=あいことば待ち中も「自分が🟡で待ってる」のが見える(2026-07-10 阿部さん)。
  // 隠すのは操作ボタンだけ(部屋接続中に二重操作させない)
  ['lobby-ready', 'lobby-code-toggle', 'lobby-leave', 'online-form'].forEach(id => {
    const el = $(id); if (el) el.style.display = 'none';
  });
}
function esc2(s){ return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }
window.addEventListener('load', onlineInitUI);
</script>
