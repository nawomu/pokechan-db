  </tr>`);

  // タイプ別わざカバレッジ
  typeOrder.forEach(t => {
    const allMoves = Object.values(WAZA_MAP).filter(m => m.type === t && filterCats.has(m.category));
    if (allMoves.length === 0) return;
    const color  = TYPE_COLORS[t];
    const stats  = TYPE_OFFENSIVE_STATS[t] || {p:0,m:0,x:0};
    const statsBadge = `<span class="type-stats">
      <span class="ts-good" title="ばつぐん">◯${stats.p}</span>
      <span class="ts-bad" title="いまひとつ">▲${stats.m}</span>
      <span class="ts-zero" title="無効">✗${stats.x}</span>
    </span>`;

    // タイプ色を半透明で行背景に適用 (視認性UP)
    const hex = TYPE_COLORS[t] || "#888";
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const rowBg = `rgba(${r},${g},${b},0.10)`;     // データセル用、薄い
    const labelBg = `rgba(${r},${g},${b},0.18)`;   // 行ラベル用、やや濃いめ
    rows.push(`<tr class="type-data-row" data-type="${t}" style="background:${rowBg}"
        draggable="true"
        ondragstart="onTypeDragStart(event,'${t}')"
        ondragover="onTypeDragOver(event,'${t}')"
        ondragleave="onTypeDragLeave(event)"
        ondrop="onTypeDrop(event,'${t}')">
      <td class="row-label" style="background:${labelBg}">
        <div class="type-label-cell">
          <span class="drag-handle" title="ドラッグで並び替え">⠿</span>
          <span class="tbadge" style="background:${color}">${tDisp(t)}</span>
          ${statsBadge}
        </div>
      </td>
      ${party.map((name, slotIdx) => {
        if (!name) return `<td class="empty-slot-cell" onclick="openModal(${slotIdx})"></td>`;
        const info = wazaCellHtml(name, t, slotIdx);
        if (!info.clickable) {
          return `<td class="waza-cell"></td>`;
        }
        const cntCls = info.isCountOnly ? " waza-cell-count" : "";
        return `<td class="waza-cell waza-cell-clickable${cntCls}" onclick="openPokemonFilter(${slotIdx},'${t}')">${info.html}</td>`;
      }).join("")}
    </tr>`);
  });

  table.innerHTML = rows.join("");
}

// ── スロット描画 ──────────────────────────────────────────────────────────────
function renderSlots() {
  const container = document.getElementById("party-slots");
  container.innerHTML = "";
  party.forEach((name, i) => {
    const div = document.createElement("div");
    div.className = "slot-card" + (name ? " active" : "");
    div.draggable = true;
    const p = name && POKE_MAP[name];
    const type1 = p?.type1;
    div.innerHTML = `
      <div class="s-label">スロット${i+1}</div>
      <div class="s-name ${name?"":"empty"}" style="color:${type1?TYPE_COLORS[type1]:''}">${name||"（空き）"}</div>`;
    div.addEventListener("click", () => openModal(i));
    div.addEventListener("dragstart", e => onSlotDragStart(e, i));
    div.addEventListener("dragover",  e => onSlotDragOver(e, i));
    div.addEventListener("dragleave", () => div.classList.remove("drag-over"));
    div.addEventListener("drop",      e => onSlotDrop(e, i));
    container.appendChild(div);
  });
}

// ── スロット ドラッグ ─────────────────────────────────────────────────────────
let dragSlotIdx = null;
function onSlotDragStart(e, idx) {
  dragSlotIdx = idx;
  e.dataTransfer.effectAllowed = "move";
}
function onSlotDragOver(e, idx) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  document.querySelectorAll(".slot-card").forEach((c,i) => c.classList.toggle("drag-over", i===idx));
}
function onSlotDrop(e, idx) {
  e.preventDefault();
  document.querySelectorAll(".slot-card").forEach(c => c.classList.remove("drag-over"));
  if (dragSlotIdx !== null && dragSlotIdx !== idx) {
    // ポケモンを入れ替え
    const tmp = party[dragSlotIdx];
    party[dragSlotIdx] = party[idx];
    party[idx] = tmp;
    // スロットフィルタも一緒にスワップ (ポケモンに追従)
    const tmpF = slotFilters[dragSlotIdx];
    if (slotFilters[idx] !== undefined) slotFilters[dragSlotIdx] = slotFilters[idx];
    else delete slotFilters[dragSlotIdx];
    if (tmpF !== undefined) slotFilters[idx] = tmpF;
    else delete slotFilters[idx];
    dragSlotIdx = null;
    saveParty(); saveSlotFilters(); renderTable();
  }
}

// ── タイプ行 ドラッグ ─────────────────────────────────────────────────────────
let dragTypeVal = null;
function onTypeDragStart(e, type) {
  dragTypeVal = type;
  e.dataTransfer.effectAllowed = "move";
  e.stopPropagation();
}
function onTypeDragOver(e, type) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  document.querySelectorAll("tr.type-data-row").forEach(tr =>
    tr.classList.toggle("drag-target", tr.dataset.type === type));
}
function onTypeDragLeave(e) {
  document.querySelectorAll("tr.type-data-row").forEach(tr => tr.classList.remove("drag-target"));
}
function onTypeDrop(e, type) {
  e.preventDefault();
  document.querySelectorAll("tr.type-data-row").forEach(tr => tr.classList.remove("drag-target"));
  if (dragTypeVal && dragTypeVal !== type) {
    const fi = typeOrder.indexOf(dragTypeVal);
    const ti = typeOrder.indexOf(type);
    typeOrder.splice(fi, 1);
    typeOrder.splice(ti, 0, dragTypeVal);
    dragTypeVal = null;
    saveTypeOrder(); renderTable();
  }
}

// ── モーダル共通: ソート/フィルタ適用 + ヘッダ生成 ────────────────────────────
const SORT_GETTERS = {
  name: m => m.name,
  type: m => TYPES.indexOf(m.type),
  category: m => ({"物理":0,"特殊":1,"変化":2}[m.category] ?? 99),
  power:    m => m.power    ?? -1,
  accuracy: m => m.accuracy ?? -1,
  pp:       m => m.pp       ?? -1,
  contact:  m => m.contact === true ? 1 : (m.contact === false ? 0 : -1),
  priority: m => extractPriority(m.description),
};
const SORT_LABELS = {
  name:"技名", type:"タイプ", category:"分類", power:"威力",
  accuracy:"命中", pp:"PP", contact:"接触", priority:"優先度"
};

function applyFilterSort(moves, fs, query) {
  let arr = moves
    .filter(m => filterCats.has(m.category))
    .filter(m => fs.cat.has(m.category))
    .filter(m => !query || fuzzyIncludes(m.name, query) || fuzzyIncludes(m.description, query) || fuzzyIncludes(m.type, query))
    .filter(m => fs.powMin == null || (m.power    ?? 0) >= fs.powMin)
    .filter(m => fs.accMin == null || (m.accuracy ?? 0) >= fs.accMin)
    .filter(m => fs.ppMin  == null || (m.pp       ?? 0) >= fs.ppMin)
    .filter(m => fs.priMin == null || extractPriority(m.description) >= fs.priMin);
  if (fs.sort.col && SORT_GETTERS[fs.sort.col]) {
    const get = SORT_GETTERS[fs.sort.col];
    arr.sort((a,b) => {
      const va = get(a), vb = get(b);
      if (typeof va === "string") return fs.sort.dir * va.localeCompare(vb);
      return fs.sort.dir * (va - vb);
    });
  }
  return arr;
}

function renderHeaderRow(prefix, fs, onSortClick) {
  const cols = ["name","type","category","power","accuracy","pp","contact","priority"];
  const arrow = (col) => {
    if (fs.sort.col !== col) return "";
    return fs.sort.dir > 0 ? " ▲" : " ▼";
  };
  const headerHtml = cols.map(c =>
    `<span class="${fs.sort.col===c?'sort-active':''}" onclick="${onSortClick}('${c}')">${SORT_LABELS[c]}${arrow(c)}</span>`
  ).join("") + "<span>説明</span>";
  return `<div class="waza-row-header">${headerHtml}</div>`;
}

function renderFilterBar(prefix, fs, onChange) {
  const catBtn = (lbl, key) => `<button class="fb-cat-btn ${fs.cat.has(key)?'on':''}" onclick="${onChange}('cat','${key}')">${lbl}</button>`;
  return `<div class="modal-filter-bar">
    分類
    ${catBtn("物理","物理")}${catBtn("特殊","特殊")}${catBtn("変化","変化")}
    <label>威力≥<input type="number" min="0" id="${prefix}-pow-min" value="${fs.powMin ?? ''}" oninput="${onChange}('powMin', this.value)"></label>
    <label>命中≥<input type="number" min="0" id="${prefix}-acc-min" value="${fs.accMin ?? ''}" oninput="${onChange}('accMin', this.value)"></label>
    <label>PP≥<input type="number" min="0" id="${prefix}-pp-min" value="${fs.ppMin ?? ''}" oninput="${onChange}('ppMin', this.value)"></label>
    <label>優先度≥<input type="number" id="${prefix}-pri-min" value="${fs.priMin ?? ''}" oninput="${onChange}('priMin', this.value)"></label>
    <span style="color:#6e7681;font-size:.68rem">(空欄=条件なし)</span>
  </div>`;
}

// ── ポケモン別わざフィルタモーダル ─────────────────────────────────────────────
function openPokemonFilter(slotIdx, type) {

// 効果文から最大%確率抽出
function pfExtractProb(desc) {
  if (!desc) return null;
  const matches = [...desc.matchAll(/(\d+)\s*%の確率/g)];
  if (matches.length === 0) return null;
  const probs = matches.map(m => parseInt(m[1])).filter(n => n >= 0 && n <= 100);
  return probs.length > 0 ? Math.max(...probs) : null;
}

// ランク変動分析 (waza-list-template と同ロジック)
function pfAnalyzeStat(desc, stat, subject) {
  const upStages = new Set(), downStages = new Set();
  if (!desc) return { upStages, downStages };
  const statTok = '『' + stat + '』';
  const sentences = desc.split('。');
  for (const sentence of sentences) {
    if (!sentence) continue;
    const sentSubj = (sentence.match(/(自分|相手)/) || [])[1] || null;
    const clauses = sentence.split(/(?:かわりに|反対に)/);
    for (const clause of clauses) {
      if (!clause.includes(statTok)) continue;
      const lSubj = (clause.match(/(自分|相手)/) || [])[1] || sentSubj;
      if (lSubj !== subject) continue;
      const after = clause.substring(clause.indexOf(statTok));
      const u = after.match(/上[がげ]/), d = after.match(/下[がげ]/);
      const upPos = u ? u.index : Infinity, dnPos = d ? d.index : Infinity;
      if (upPos === Infinity && dnPos === Infinity) continue;
      const dir = upPos < dnPos ? 'up' : 'down';
      const sm = after.match(/(\d+)\s*段階/);
      const stage = /最大/.test(after) ? 6 : (sm ? parseInt(sm[1]) : 1);
      (dir === 'up' ? upStages : downStages).add(stage);
    }
  }
  if (upStages.size > 0) {
    for (const sentence of sentences) {
      if (!sentence || sentence.includes(statTok)) continue;
      const subj = (sentence.match(/(自分|相手)/) || [])[1] || subject;
      if (subj !== subject) continue;
      const sm = sentence.match(/(\d+)\s*段階/);
      const hu = /上[がげ]/.test(sentence), hd = /下[がげ]/.test(sentence);
      if (sm && hu && !hd) upStages.add(parseInt(sm[1]));
      else if (/最大/.test(sentence) && hu && !hd) upStages.add(6);
    }
  }
  return { upStages, downStages };
}

const PF_STATS = ['こうげき','ぼうぎょ','とくこう','とくぼう','すばやさ'];
let pfPrecomputed = false;
function pfPrecomputeWaza() {
  if (pfPrecomputed) return;
  Object.values(WAZA_MAP).forEach(m => {
    m._prob = pfExtractProb(m.description || '');
    m._priority = extractPriority(m.description || '');
    m._statSelf = {}; m._statOpp = {};
    PF_STATS.forEach(stat => {
      m._statSelf[stat] = pfAnalyzeStat(m.description || '', stat, '自分');
      m._statOpp[stat]  = pfAnalyzeStat(m.description || '', stat, '相手');
    });
  });
  pfPrecomputed = true;
}

function pfMatchesEffect(m) {
  const eff = m.description || '', flags = m.flags || {};
  if (pfActiveEf.exclude.size > 0) for (const f of pfActiveEf.exclude) if (flags[f]) return false;
  if (pfActiveEf.flag.size > 0 && ![...pfActiveEf.flag].some(f => flags[f])) return false;
  if (pfActiveEf.status.size > 0) {
    const PAT = {'まひ':/まひ/,'ねむり':/相手を.*ねむり.*状態/,'こおり':/こおり/,'やけど':/やけど/,'どく':/もうどく|(?<!も)どく/,'こんらん':/こんらん/,'ひるみ':/ひるませ/};
    if (![...pfActiveEf.status].some(s => PAT[s] && PAT[s].test(eff))) return false;
  }
  if (pfActiveEf.self_up2.size > 0 && ![...pfActiveEf.self_up2].some(s => { const sc = m._statSelf?.[s]; return sc && [...sc.upStages].some(x => x >= 2); })) return false;
  if (pfActiveEf.self_up1.size > 0 && ![...pfActiveEf.self_up1].some(s => { const sc = m._statSelf?.[s]; return sc && sc.upStages.has(1); })) return false;
  if (pfActiveEf.opp_down2.size > 0 && ![...pfActiveEf.opp_down2].some(s => { const sc = m._statOpp?.[s]; return sc && [...sc.downStages].some(x => x >= 2); })) return false;
  if (pfActiveEf.opp_down1.size > 0 && ![...pfActiveEf.opp_down1].some(s => { const sc = m._statOpp?.[s]; return sc && sc.downStages.has(1); })) return false;
  if (pfActiveEf.misc.size > 0) {
    const PAT = {'回復':/HP.*回復|回復する/,'急所':/急所.*当たりやすい|急所ランク/,'連続':/連続して|複数回|回連続/,'先制':/必ず先制|優先度:[+＋][1-9]/,'バインド':/バインド|束縛|まとわりつく|ほのおのうず|うずしお/,'交代':/強制的に交代/};
    if (![...pfActiveEf.misc].some(k => PAT[k] && PAT[k].test(eff))) return false;
  }
  return true;
}

    if (cb.checked) pfTempSel.add(key); else pfTempSel.delete(key);

  const fPower = document.getElementById('pf-f-power').value;
  const fAcc = document.getElementById('pf-f-acc').value;
  const fPp = document.getElementById('pf-f-pp').value;
  const fProb = document.getElementById('pf-f-prob').value;
  const fPrio = document.getElementById('pf-f-prio').value;
  const fTarget = document.getElementById('pf-f-target').value;
  const fContact = document.getElementById('pf-f-contact').value;
  const fGuard = document.getElementById('pf-f-guard').value;

  let baseList = getPokemonAllMoves(pfPoke);
  if (pfType) baseList = baseList.filter(m => m.type === pfType);
  let rows = baseList.slice();

  rows.sort((a, b) => {
    const k = pfSortKey, dir = pfSortDir;
    let av, bv;
    if (k === 'prob') { av = a._prob; bv = b._prob; }
    else if (k === 'priority') { av = a._priority || 0; bv = b._priority || 0; }
    else if (['power','accuracy','pp'].includes(k)) {
      av = (a[k] != null) ? a[k] : null; bv = (b[k] != null) ? b[k] : null;
    }
    else if (k === 'contact' || k === 'protect') {
      av = a[k] === true ? 1 : (a[k] === false ? 0 : -1);
      bv = b[k] === true ? 1 : (b[k] === false ? 0 : -1);
    }
    else if (k === 'type') { av = TYPES.indexOf(a.type); bv = TYPES.indexOf(b.type); }
    else if (k === 'category') { const ord = {"物理":0,"特殊":1,"変化":2}; av = ord[a.category] ?? 99; bv = ord[b.category] ?? 99; }
    else { av = a[k] || ''; bv = b[k] || ''; }
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === 'string') return av.localeCompare(bv) * dir;
    return (av - bv) * dir;
  });

  let visible = 0;
  const visibleKeys = [];
  rows.forEach(m => {
    if (searchQ && !fuzzyIncludes(m.name, searchQ) && !fuzzyIncludes(m.description || '', searchQ)) return;
    if (pfSelectedTypes.size > 0 && !pfSelectedTypes.has(m.type)) return;
    if (fClass && m.category !== fClass) return;
    if (fPower !== '' && (m.power == null || m.power < parseInt(fPower, 10))) return;
    if (fAcc !== '' && (m.accuracy == null || m.accuracy < parseInt(fAcc, 10))) return;
    if (fPp !== '' && (m.pp == null || m.pp < parseInt(fPp, 10))) return;
    if (fProb !== '' && (m._prob == null || m._prob < parseInt(fProb, 10))) return;
    if (fPrio) {
      const p = m._priority || 0;
      if (fPrio === 'hi' && !(p > 0)) return;
      else if (fPrio === 'lo' && !(p < 0)) return;
      else if (fPrio === '0' && p !== 0) return;
    }
    if (fTarget && m.target !== fTarget) return;
    if (fContact) {
      const cv = m.contact === true ? '●' : (m.contact === false ? '○' : '');
      if (cv !== fContact) return;
    }
    if (fGuard) {
      const gv = m.protect === true ? '○' : (m.protect === false ? '×' : '');
      if (gv !== fGuard) return;
    }
    if (!pfMatchesEffect(m)) return;

    const checked = pfTempSel.has(m.key);
    const tr = document.createElement('tr');
    if (checked) tr.classList.add('row-checked');
    const color = TYPE_COLORS[m.type] || '#999';
    const power = m.power != null ? m.power : '—';
    const accuracy = m.accuracy != null ? m.accuracy : '—';
    const pp = m.pp != null ? m.pp : '—';
    const probStr = m._prob != null ? m._prob + '%' : '—';
    const pri = m._priority || 0;
    const priStr = pri > 0 ? '+' + pri : (pri < 0 ? String(pri) : '—');
    const priCls = pri > 0 ? 'prio-pos' : (pri < 0 ? 'prio-neg' : 'prio-zero');
    const contactStr = m.contact === true ? '接●' : (m.contact === false ? '接○' : '—');
    const guardStr = m.protect === true ? '守○' : (m.protect === false ? '守×' : '—');
    const escEff = (m.description || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    tr.innerHTML = `
      <td class="col-chk"><input type="checkbox" data-key="${m.key}" ${checked ? 'checked' : ''}></td>
      <td class="col-name">${m.name}</td>
      <td class="col-type"><span class="type-cell-i" style="background:${color}">${tDisp(m.type)}</span></td>
      <td class="col-class"><span class="cat-cell ${catClass(m.category)}">${catShortChar(m.category)}</span></td>
      <td class="col-power">${power}</td>
      <td class="col-acc">${accuracy}</td>
      <td class="col-pp">${pp}</td>
      <td class="col-prob">${probStr}</td>
      <td class="col-prio ${priCls}">${priStr}</td>
      <td class="col-target">${m.target || '—'}</td>
      <td class="col-contact">${contactStr}</td>
      <td class="col-guard">${guardStr}</td>
      <td class="col-effect">${escEff}</td>
    `;
    tbody.appendChild(tr);
    visible++;
    visibleKeys.push(m.key);
  });

  pfVisibleKeys = visibleKeys;
  document.getElementById('pf-count').textContent = `${pfTempSel.size}件選択中 / 表示中 ${visible}件`;
  document.querySelectorAll('#pf-table th[data-pfsort]').forEach(th => th.classList.remove('sorted','asc'));
  const activeTh = document.querySelector(`#pf-table th[data-pfsort="${pfSortKey}"]`);
  if (activeTh) { activeTh.classList.add('sorted'); if (pfSortDir === 1) activeTh.classList.add('asc'); }
}

function renderPfList(_q) {
  pfEnsureStaticBuilt();
  pfRender();
}

function togglePf(key) {
  if (pfTempSel.has(key)) pfTempSel.delete(key); else pfTempSel.add(key);
  const cb  = document.getElementById(`pf_${key}`);
  const row = document.getElementById(`pf_row_${key}`);
  if (cb)  cb.checked = pfTempSel.has(key);
  if (row) row.classList.toggle("checked", pfTempSel.has(key));
  document.getElementById("pf-count").textContent = `${pfTempSel.size}件選択中`;
}

bindSearch("pf-search", v => renderPfList(v));
document.getElementById("pf-none").addEventListener("click", () => {
  // 現在モーダルに表示中の技だけを対象に解除 (他タイプの選択は維持)
  pfVisibleKeys.forEach(k => pfTempSel.delete(k));
  renderPfList(document.getElementById("pf-search").value);
});
// pfTempSel を slotFilters[slot][type] に commit
function commitPfChanges() {
  if (!slotFilters[pfSlot]) slotFilters[pfSlot] = {};
  if (pfType) {
    // タイプ指定モーダル: そのタイプのみ更新 (空でも明示記録)
    slotFilters[pfSlot][pfType] = Array.from(pfTempSel);
  } else {
    // 全タイプモーダル: 選択技をタイプ毎に振り分けて上書き
    const grouped = {};
    pfTempSel.forEach(key => {
      const m = WAZA_MAP[key];
      if (m) {
        if (!grouped[m.type]) grouped[m.type] = [];
        grouped[m.type].push(key);
      }
    });
    slotFilters[pfSlot] = grouped;
  }
  // スロットの全タイプ未設定なら entry 自体削除
  if (Object.keys(slotFilters[pfSlot]).length === 0) delete slotFilters[pfSlot];
  saveSlotFilters();
}

document.getElementById("pf-reset").addEventListener("click", () => {
  // タイプ指定モーダルならそのタイプだけリセット、全タイプモーダルならスロット全体
  if (pfType && slotFilters[pfSlot]) {
    delete slotFilters[pfSlot][pfType];
    if (Object.keys(slotFilters[pfSlot]).length === 0) delete slotFilters[pfSlot];
  } else {
    delete slotFilters[pfSlot];
  }
  saveSlotFilters(); closePokemonFilter(); renderTable();
});
document.getElementById("pf-done").addEventListener("click", () => {
  commitPfChanges(); closePokemonFilter(); renderTable();
});
document.getElementById("pf-ov").addEventListener("click", e => {
  if (e.target === document.getElementById("pf-ov")) {
    commitPfChanges();
    closePokemonFilter();
    renderTable();
  }
});

// ── フィルタバー ──────────────────────────────────────────────────────────────
bindSearch("waza-filter", v => { filterWaza = v; renderTable(); });
document.querySelectorAll(".fcat-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const c = btn.dataset.cat;
    if (filterCats.has(c)) { filterCats.delete(c); btn.classList.remove("on"); }
    else { filterCats.add(c); btn.classList.add("on"); }
    renderTable();
  });
});
// 種族値表示モード切替ボタン (各ボタン独立 ON/OFF)
document.querySelectorAll(".sv-btn").forEach(btn => {
  const key = btn.dataset.sv;
  // 初期状態を statVis から復元
  if (statVis[key]) btn.classList.add("on");
  else              btn.classList.remove("on");
  btn.addEventListener("click", () => {
    statVis[key] = !statVis[key];
    btn.classList.toggle("on", statVis[key]);
    saveStatVis();
    renderTable();
  });
});

// ── グローバル ホバー説明ツールチップ ───────────────────────────────────────
(function setupHoverTip() {
  const tip = document.getElementById("hover-tip");
  const SEL = ".waza-row, .ab-name, #pf-table td.col-effect";
  let curRow = null;
  document.addEventListener("mouseover", e => {
    // .waza-row (旧モーダル) / .ab-name (特性セル) / pf-table の効果列 を拾う
    const row = e.target.closest(SEL);
    if (!row) { tip.style.display = "none"; curRow = null; return; }
    if (row === curRow) return;
    curRow = row;
    // data-desc 属性があればそれを優先、なければ textContent (pf-table 効果列はこちら)
    const desc = row.getAttribute("data-desc") || (row.textContent || "").trim();
    if (!desc) { tip.style.display = "none"; return; }
    tip.textContent = desc;
    tip.style.display = "block";
  });
  document.addEventListener("mousemove", e => {
    if (tip.style.display === "none") return;
    const pad = 18;
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    let x = e.clientX + pad, y = e.clientY + pad;
    if (x + tw > window.innerWidth - 5)  x = e.clientX - tw - pad;
    if (y + th > window.innerHeight - 5) y = e.clientY - th - pad;
    tip.style.left = Math.max(4, x) + "px";
    tip.style.top  = Math.max(4, y) + "px";
  });
  document.addEventListener("mouseout", e => {
    if (!e.relatedTarget) { tip.style.display = "none"; curRow = null; return; }
    const fromTarget = e.target.closest && e.target.closest(SEL);
    const toTarget   = e.relatedTarget.closest && e.relatedTarget.closest(SEL);
    if (fromTarget && fromTarget === toTarget) return;
    tip.style.display = "none";
    curRow = null;
  });
})();

// ── 初期化 ────────────────────────────────────────────────────────────────────
loadPcTabs();
renderPcTabs();
renderTable();
</script>

(function(){
  const btn = document.getElementById('back-to-top');
  if (!btn) return;
  const wrap = document.getElementById('main-wrap');
  function getScroll() {
    const ws = wrap ? wrap.scrollTop : 0;
    const bs = window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
    return Math.max(ws, bs);
  }
  function update() { btn.style.display = getScroll() > 200 ? 'flex' : 'none'; }
  window.addEventListener('scroll', update);
  if (wrap) wrap.addEventListener('scroll', update);
  btn.addEventListener('click', () => {
    if (wrap) wrap.scrollTo({top: 0, behavior: 'smooth'});
    window.scrollTo({top: 0, behavior: 'smooth'});
  });
})();
</script>

<script>
(function(){
  function initMirror() {
    const wrap = document.getElementById('main-wrap');
    const mirror = document.getElementById('h-mirror-scroll');
    const inner = document.getElementById('h-mirror-inner');
    if (!wrap || !mirror || !inner) return;
    function syncWidth() { inner.style.width = wrap.scrollWidth + 'px'; }
    syncWidth();
    if (window.ResizeObserver) new ResizeObserver(syncWidth).observe(wrap);
    let busy = false;
    wrap.addEventListener('scroll', () => { if (!busy) { busy=true; mirror.scrollLeft=wrap.scrollLeft; busy=false; } });
    mirror.addEventListener('scroll', () => { if (!busy) { busy=true; wrap.scrollLeft=mirror.scrollLeft; busy=false; } });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initMirror);
  else initMirror();
})();
</script>

<!-- バトルシミュレーターへの送信機能（ローカル開発専用、file:// でのみ有効） -->
<script>
(function(){
  if (location.protocol !== 'file:') return;  // 公開サイトでは無効
  const btn = document.getElementById('send-to-battle');
  if (!btn) return;
  btn.style.display = 'inline-block';
  btn.addEventListener('click', function(){
    const handoff = { version: 1, timestamp: Date.now(), party: [] };
    let sent = 0;
    for (let i = 0; i < PARTY_SIZE; i++){
      const name = party[i];
      if (!name){ handoff.party.push(null); continue; }
      const moves = [];
      const sf = slotFilters[i];
      if (sf && typeof sf === 'object'){
        Object.values(sf).forEach(arr=>{
          if (Array.isArray(arr)) moves.push(...arr);
        });
      }
      handoff.party.push({
        name: name,
        nature: partyNatures[i] || 'まじめ',
        effort: { ...(partyEvs[i] || {hp:0,atk:0,def:0,spatk:0,spdef:0,spd:0}) },
        moves: [...new Set(moves)],
      });
      sent++;
    }
    if (sent === 0){
      alert('パーティが空です。先にポケモンを選択してください。');
      return;
    }
    localStorage.setItem('pokechan_battle_handoff_v1', JSON.stringify(handoff));
    window.open('battle_simulator.html', '_blank');
  });
})();
</script>
