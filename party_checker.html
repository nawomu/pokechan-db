<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{font-family:"Hiragino Kaku Gothic ProN",sans-serif;background:#0d1117;color:#e6edf3;font-size:11px;display:flex;flex-direction:column;overflow-x:hidden}
h1{text-align:center;padding:14px;font-size:1.2rem;color:#79c0ff;border-bottom:1px solid #21262d}

/* パーティバー */
#party-bar{background:#161b22;padding:8px 14px;border-bottom:1px solid #21262d;display:flex;gap:8px;align-items:flex-start;overflow-x:auto}
#party-bar h2{font-size:.8rem;color:#8b949e;white-space:nowrap;margin-right:4px}
.slot-card{width:90px;padding:5px 4px;border-radius:8px;cursor:grab;border:2px solid #30363d;background:#0d1117;text-align:center;transition:.15s;user-select:none}
.slot-card.active{border-color:#79c0ff;background:#1c2a3a}
.slot-card.drag-over{border-color:#f0883e;opacity:.7}
.slot-card .s-label{font-size:.6rem;color:#8b949e}
.slot-card .s-name{font-size:.8rem;font-weight:bold;margin-top:2px;min-height:1.1em}
.slot-card .s-name.empty{color:#484f58}

/* ポケモン選択モーダル */
#modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center}
#modal-ov.vis{display:flex}
#modal-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px;max-width:460px;width:92vw;max-height:82vh;display:flex;flex-direction:column;gap:10px}
#modal-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
#modal-head h3{margin:0;font-size:1rem;color:#e6edf3}
#modal-close-x{background:transparent;border:1px solid #30363d;color:#e6edf3;width:34px;height:34px;border-radius:8px;font-size:1.3rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0}
#modal-close-x:hover{background:#21262d;border-color:#79c0ff;color:#fff}
#modal-close-x:active{background:#30363d}
#modal-search{padding:8px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:13px;width:100%}
#modal-list{overflow-y:auto;flex:1}
.m-item{padding:7px 12px;cursor:pointer;border-radius:6px;transition:.1s}
.m-item:hover{background:#1c2a3a}
.m-btns{display:flex;gap:8px;justify-content:flex-end}
.m-btns button{padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px}
#modal-clear{background:#da3633;color:#fff}
#modal-close{background:#30363d;color:#e6edf3}

/* わざチェックリストモーダル */

/* メインテーブル */
#main-wrap{overflow:auto;flex:1;min-height:0;scrollbar-width:none;-ms-overflow-style:none}
/* オリジナルスクロールバーは完全非表示 (画面下部のミラーバーで代替)
   横は ::horizontal セレクタが Chrome で効かない事があるので全消し、
   縦はマウスホイール / トラックパッドで操作してもらう前提 */
#main-wrap::-webkit-scrollbar{display:none !important;width:0 !important;height:0 !important;-webkit-appearance:none !important}
#main-wrap::-webkit-scrollbar-track{display:none !important}
#main-wrap::-webkit-scrollbar-thumb{display:none !important}
#main-wrap::-webkit-scrollbar-corner{display:none !important}
table.cmp{border-collapse:collapse;min-width:100%}
table.cmp th,table.cmp td{padding:2px 5px;border:1px solid #21262d;vertical-align:top;white-space:nowrap;line-height:1.25}
table.cmp .row-label{background:#161b22;color:#8b949e;font-weight:bold;font-size:.72rem;width:80px;min-width:80px;position:sticky;left:0;z-index:10;white-space:normal}
table.cmp tr.sec-hdr td{background:#21262d;color:#79c0ff;font-weight:bold;font-size:.8rem;text-align:center;padding:7px 8px}
.poke-name-cell{text-align:center;min-width:120px;max-width:160px;user-select:none}
/* ドラッグ中の列ハイライト (ポケ名上の全セル共通) */
td.drag-over{outline:2px solid #f0883e;outline-offset:-2px;background:#1c2a3a !important}
.poke-filter-btn{display:inline-block;margin-top:4px;padding:2px 8px;font-size:.65rem;background:#21262d;color:#79c0ff;border:1px solid #30363d;border-radius:10px;cursor:pointer;user-select:none}
.poke-filter-btn:hover{background:#1c2a3a;border-color:#79c0ff}
.poke-filter-btn.active{background:#1f4a1f;color:#56d364;border-color:#2ea043}

/* 持ち物セル (クリックでモーダル) */
table.cmp td.item-cell{text-align:center;padding:3px 4px;background:#0d1117;cursor:pointer}
table.cmp td.item-cell:hover{background:#1c2a3a}
table.cmp td.item-cell .item-pill{
  display:inline-block;padding:3px 8px;font-size:.72rem;
  background:#0a0f15;color:#e6edf3;border:1px solid #30363d;border-radius:12px;
  max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
table.cmp td.item-cell .item-pill.empty{color:#6e7681;font-style:italic;border-style:dashed}

/* 持ち物選択モーダル */
#item-modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:250;align-items:center;justify-content:center}
#item-modal-ov.vis{display:flex}
#item-modal-box{
  background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px;
  max-width:560px;width:92vw;max-height:85vh;display:flex;flex-direction:column;gap:10px;
}
#item-modal-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
#item-modal-head h3{margin:0;font-size:1rem;color:#e6edf3}
#item-modal-close-x{
  background:transparent;border:1px solid #30363d;color:#e6edf3;
  width:34px;height:34px;border-radius:8px;font-size:1.3rem;line-height:1;
  cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;
}
#item-modal-close-x:hover{background:#21262d;border-color:#79c0ff;color:#fff}
#item-modal-list{overflow-y:auto;flex:1;padding-right:4px}
.item-cat-head{
  font-size:.75rem;color:#79c0ff;font-weight:bold;
  padding:6px 4px 3px;border-bottom:1px solid #21262d;margin-top:6px;
}
.item-cat-head:first-child{margin-top:0}
.item-row{
  padding:8px 10px;border-radius:6px;cursor:pointer;transition:.1s;
  display:flex;flex-direction:column;gap:2px;
}
.item-row:hover{background:#1c2a3a}
.item-row.selected{background:#1f4a1f;border:1px solid #2ea043}
.item-row .item-row-name{font-size:.85rem;color:#e6edf3;font-weight:bold}
.item-row .item-row-desc{font-size:.7rem;color:#8b949e;line-height:1.4}
.item-row.none-row .item-row-name{color:#6e7681;font-style:italic}

/* ポケモン別わざ選択モーダル (わざリスト風) */
#pf-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center}
#pf-ov.vis{display:flex}
#pf-box{
  background:#161b22;color:#e6edf3;border:1px solid #30363d;border-radius:8px;
  padding:10px;width:90vw;height:92vh;display:flex;flex-direction:column;gap:6px;
  font-family:-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;font-size:11px;
}
#pf-title-row{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
#pf-title{font-size:14px;font-weight:bold;color:#79c0ff;flex-shrink:0}
#pf-type-toggle{
  padding:3px 10px;border-radius:3px;border:1px solid #30363d;
  background:#21262d;color:#e6edf3;cursor:pointer;font-size:11px;
  flex-shrink:0;white-space:nowrap;font-weight:700;
}
#pf-type-toggle:hover{background:#1c2a3a}
#pf-type-toggle.has-filter{background:#1c2a3a;color:#79c0ff;border-color:#58a6ff}
#pf-type-buttons{display:flex;gap:3px;flex-wrap:wrap;flex:1;min-width:0}
#pf-type-buttons .pf-type-btn{
  padding:3px 8px;border-radius:3px;border:1px solid rgba(255,255,255,0.2);
  color:#fff;cursor:pointer;font-size:10px;font-weight:700;
  white-space:nowrap;opacity:0.5;transition:opacity .12s;
}
#pf-type-buttons .pf-type-btn:hover{opacity:0.9}
#pf-type-buttons .pf-type-btn.active{
  opacity:1;border:1px solid #fff;box-shadow:0 0 0 2px rgba(255,255,255,0.3);
}
#pf-search{padding:4px 8px;border-radius:4px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:12px;width:100%;flex-shrink:0}

/* 効果フィルターパネル */
#pf-effect-filter-panel{
  background:#0d1117;border:1px solid #21262d;border-radius:4px;
  padding:4px 6px;font-size:11px;flex-shrink:0;
}
#pf-effect-filter-panel.collapsed{display:none}
#pf-box .ef-row{display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-bottom:3px}
#pf-box .ef-row:last-child{margin-bottom:0}
#pf-box .ef-label{font-weight:700;color:#79c0ff;min-width:70px;font-size:10px;white-space:nowrap}
#pf-box .ef-chip{
  display:inline-block;padding:1px 7px;border-radius:10px;
  border:1px solid #30363d;background:#21262d;cursor:pointer;
  font-size:10px;color:#8b949e;user-select:none;transition:all .1s;
}
#pf-box .ef-chip:hover{border-color:#58a6ff;color:#79c0ff}
#pf-box .ef-chip.active{background:#1c2a3a;color:#79c0ff;border-color:#58a6ff;font-weight:700}
#pf-box .ef-chip.active-status{background:#4a1f5a;color:#e9bfff;border-color:#9d4cd8}
#pf-box .ef-chip.active-up{background:#5a1f1f;color:#ff9c9c;border-color:#e74c3c}
#pf-box .ef-chip.active-down{background:#1f3a5a;color:#9cc8ff;border-color:#3498db}
#pf-box .ef-chip.active-misc{background:#1f5a2f;color:#9cffac;border-color:#2ecc71}
#pf-box .ef-chip.ef-exclude-chip{border-color:#7d3030;color:#ff7b72}
#pf-box .ef-chip.ef-exclude-chip:hover{background:#3a1212}
#pf-box .ef-chip.active-exclude{background:#5a1f1f;color:#fff;border-color:#e74c3c}
#pf-box .ef-divider{width:1px;height:14px;background:#30363d;margin:0 2px}
#pf-ef-toggle-btn{background:#3A6EA5;color:#fff;font-size:10px;padding:3px 10px;border-radius:3px;border:none;cursor:pointer;font-weight:700;flex-shrink:0;white-space:nowrap}
#pf-ef-toggle-btn:hover{background:#2A5E90}

/* タイプ多重選択ドロップダウン (ダーク) */
#pf-box .ms-wrap{position:relative;display:inline-block;width:100%}
#pf-box .ms-btn{
  width:100%;padding:2px 4px;font-size:10px;
  border:1px solid #30363d;border-radius:2px;background:#21262d;color:#e6edf3;
  cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#pf-box .ms-btn.has-val{background:#1c2a3a;font-weight:700;color:#79c0ff}
#pf-box .ms-dd{
  display:none;position:absolute;top:100%;left:0;z-index:5000;
  background:#161b22;border:1px solid #30363d;border-radius:4px;
  box-shadow:0 4px 12px rgba(0,0,0,.6);
  padding:4px 6px;width:160px;max-height:280px;overflow-y:auto;overflow-x:hidden;
  text-align:left;color:#e6edf3;
}
#pf-box .ms-wrap.open .ms-dd{display:block}
#pf-box .ms-dd label{
  display:flex;align-items:center;justify-content:flex-start;gap:6px;
  padding:3px 4px;font-size:12px;cursor:pointer;border-radius:2px;
  user-select:none;white-space:nowrap;text-align:left;
  width:100%;box-sizing:border-box;color:#e6edf3;
}
#pf-box .ms-dd label:hover{background:#1c2a3a}
#pf-box .ms-dd input[type=checkbox]{cursor:pointer;margin:0;flex-shrink:0;width:14px;height:14px;accent-color:#79c0ff}
#pf-box .ms-dd .ms-color{display:inline-block;width:10px;height:10px;border-radius:2px;border:1px solid rgba(255,255,255,.2);flex-shrink:0}
#pf-box .ms-dd .ms-name{flex:0 0 auto}
#pf-box .ms-dd .ms-actions{display:flex;gap:4px;padding:4px 0 6px;border-bottom:1px solid #30363d;margin-bottom:4px}
#pf-box .ms-dd .ms-act-btn{flex:1;padding:2px 4px;font-size:10px;border:1px solid #30363d;border-radius:2px;background:#21262d;color:#e6edf3;cursor:pointer}
#pf-box .ms-dd .ms-act-btn:hover{background:#1c2a3a}

/* テーブル */
#pf-table-wrap{flex:1;overflow:auto;background:#0d1117;border:1px solid #30363d;border-radius:4px;min-height:0}
#pf-table{border-collapse:collapse;width:100%;font-size:11px;background:#0d1117;color:#e6edf3}
#pf-table thead{position:sticky;top:0;z-index:50}
#pf-table thead tr.head-row th{background:#1F4E79;color:#fff;padding:3px 4px;text-align:center;border:1px solid #0a2040;cursor:pointer;user-select:none;white-space:nowrap;font-weight:700;font-size:11px}
#pf-table thead tr.head-row th.col-name,#pf-table thead tr.head-row th.col-effect{text-align:left}
#pf-table thead tr.head-row th.col-chk{cursor:default;padding:2px}
#pf-table thead tr.head-row th:not(.col-chk):hover{background:#2A6091}
#pf-table thead tr.head-row th.sorted::after{content:" ▼";font-size:9px}
#pf-table thead tr.head-row th.sorted.asc::after{content:" ▲"}
#pf-table thead tr.filter-row th{background:#21262d;padding:1px;border:1px solid #30363d}
#pf-table thead tr.filter-row input,#pf-table thead tr.filter-row select{width:100%;font-size:10px;padding:1px 3px;border:1px solid #30363d;border-radius:2px;background:#0d1117;color:#e6edf3;font-family:inherit}
#pf-table tbody td{padding:2px 4px;border:1px solid #21262d;vertical-align:middle;color:#e6edf3}
#pf-table tbody tr:nth-child(even){background:#161b22}
#pf-table tbody tr:hover{background:#1c2a3a !important}
#pf-table tbody tr.row-checked{background:#1f4a1f !important}
#pf-table .col-chk{width:32px;text-align:center}
#pf-table .col-chk input[type=checkbox]{cursor:pointer;accent-color:#79c0ff;width:14px;height:14px;margin:0}
#pf-table .col-name{width:120px}
#pf-table td.col-name{font-weight:700;color:#79c0ff}
#pf-table .col-type{width:60px;text-align:center}
#pf-table .col-type .type-cell-i{color:#fff;text-align:center;padding:1px 5px;border-radius:2px;font-weight:700;font-size:10px;white-space:nowrap;display:inline-block}
#pf-table .col-class{width:96px;text-align:center}
#pf-table .col-class .cat-cell{padding:2px 8px;border-radius:3px;font-size:11px;color:#fff;font-weight:700;display:inline-block;min-width:24px}
#pf-table .col-class .cat-cell.phys{background:#f0883e}
#pf-table .col-class .cat-cell.spec{background:#58a6ff}
#pf-table .col-class .cat-cell.stat{background:#6e7681}
.pf-class-btns{display:flex;gap:2px;justify-content:center;padding:1px}
.pf-class-btns button{
  flex:1;padding:3px 0;border:1px solid #30363d;border-radius:3px;
  background:transparent;color:#8b949e;cursor:pointer;
  font-size:11px;font-weight:700;
  transition:all .12s;font-family:inherit;
}
.pf-class-btns button.phys{color:#f0883e;border-color:#5a3719}
.pf-class-btns button.spec{color:#58a6ff;border-color:#1f3a5a}
.pf-class-btns button.stat{color:#a6a8ad;border-color:#3a3f47}
.pf-class-btns button:hover{filter:brightness(1.3)}
.pf-class-btns button.phys.active{background:#f0883e;color:#fff;border-color:#f0883e;box-shadow:0 0 0 2px rgba(240,136,62,0.3)}
.pf-class-btns button.spec.active{background:#58a6ff;color:#fff;border-color:#58a6ff;box-shadow:0 0 0 2px rgba(88,166,255,0.3)}
.pf-class-btns button.stat.active{background:#6e7681;color:#fff;border-color:#6e7681;box-shadow:0 0 0 2px rgba(110,118,129,0.3)}
#pf-table .col-power,#pf-table .col-acc,#pf-table .col-pp,#pf-table .col-prob{width:42px;text-align:center;font-family:monospace}
#pf-table .col-prio{width:42px;text-align:center;font-family:monospace}
#pf-table td.col-prio.prio-pos{color:#56d364;font-weight:700}
#pf-table td.col-prio.prio-neg{color:#ff7b72;font-weight:700}
#pf-table td.col-prio.prio-zero{color:#6e7681}
#pf-table .col-target{width:80px;text-align:center;font-size:10px;white-space:nowrap;color:#a6a8ad}
#pf-table .col-contact,#pf-table .col-guard{width:38px;text-align:center;font-size:10px;color:#a6a8ad}
#pf-table .col-effect{min-width:280px;font-size:10px;color:#a6a8ad;line-height:1.3}

/* ボタン (ダーク) */
#pf-btns{display:flex;gap:8px;justify-content:space-between;align-items:center;border-top:1px solid #21262d;padding-top:6px;flex-shrink:0;color:#8b949e}
#pf-btns .left{display:flex;gap:6px;align-items:center}
#pf-btns button{padding:5px 12px;border-radius:6px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;font-size:.78rem}
#pf-btns button:hover{background:#1c2a3a}
#pf-done{background:#238636 !important;color:#fff !important;border:none !important}
#pf-reset{background:#30363d !important;color:#e6edf3 !important;border:none !important}
#pf-count{color:#8b949e;font-size:.73rem}
.poke-no{font-size:.62rem;color:#8b949e}
.poke-name-big{font-size:.85rem;font-weight:bold;color:#e6edf3;display:block}
.type-row{display:flex;gap:3px;justify-content:center;margin-top:2px;flex-wrap:wrap}
.tbadge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.7rem;font-weight:bold;color:#fff}
.stat-cell{text-align:right;font-size:.74rem;white-space:nowrap;font-variant-numeric:tabular-nums}
.stat-total{font-weight:bold}
.stat-rank{font-size:.7rem;color:#e6edf3;display:inline-block;min-width:3.2em;text-align:right;margin-left:4px}
/* 値1個分の固定幅セル (縦揃え用) */
.sv{display:inline-block;min-width:3em;text-align:right;padding-right:2px;font-variant-numeric:tabular-nums}
/* 略号 (H/A/B/C/D/S) — 値の左に小さく表示 */
/* デフォルト: 白 / 性格補正で上がる: 赤 (.nature-up) / 下がる: 青 (.nature-down) */
.stat-letter{display:inline-block;min-width:1.2em;text-align:right;color:#e6edf3;font-weight:bold;font-size:.7rem;margin-right:3px}
/* 各モード値のカラー */
.sm-base{color:#e6edf3}              /* 種族 = 白 */
.sm-v6{color:#79c0ff}                 /* V6 = 水色 */
.sm-c{color:#56d364}                  /* 性補 = 緑 */
.sm-a{color:#f8d030}                  /* 準振 = 黄色 (EV252・補正なし) */
.sm-b{color:#ff7b9d;font-weight:bold} /* 最大 = ピンク (EV252・性格1.1) */

/* 種族値表示モード切替ボタン */
.sv-btn{padding:2px 8px;border:1px solid #30363d;background:transparent;border-radius:4px;cursor:pointer;font-size:.7rem;margin:0 1px;color:#6e7681;font-weight:normal}
.sv-btn:hover{background:#21262d}
.sv-btn.on{background:#1c2a3a;border-color:#58a6ff}
.sv-btn.on.sv-base{color:#e6edf3}
.sv-btn.on.sv-v6{color:#79c0ff}
.sv-btn.on.sv-c{color:#56d364}
.sv-btn.on.sv-a{color:#f8d030}
.sv-btn.on.sv-b{color:#ff7b9d;font-weight:bold}
.sv-btn.on.sv-rank{color:#e6edf3}
/* 種族値表示モード切替ボタン群 */
.stat-mode-group{display:inline-flex;gap:0;border:1px solid #30363d;border-radius:6px;overflow:hidden;font-size:.7rem;margin-left:8px}
.stat-mode-btn{padding:3px 9px;background:transparent;color:#8b949e;border:none;cursor:pointer;border-right:1px solid #30363d}
.stat-mode-btn:last-child{border-right:none}
.stat-mode-btn.on{background:#1c2a3a;color:#e6edf3;font-weight:bold}
.stat-mode-btn:hover{background:#21262d}
.ab-cell{font-size:.78rem;color:#d2a8ff;text-align:center;white-space:normal !important;max-width:140px;line-height:1.5;word-break:break-word}
.ab-name{cursor:help;border-bottom:1px dotted #d2a8ff;padding:0 2px;display:inline-block}
.ab-name:hover{color:#fff;background:#1c2a3a;border-radius:3px}
.resist-cell{white-space:normal;max-width:150px;font-size:.73rem;line-height:1.4;overflow:hidden;padding:5px 6px !important}
.resist-cell > div{display:flex;align-items:flex-start;gap:3px;margin-bottom:2px}
.resist-cell .tbadge{padding:1px 5px;font-size:.62rem;border-radius:8px}
.resist-cell .r-mul{display:inline-block;min-width:2em;text-align:right;flex-shrink:0}
.resist-cell .r-badges{display:flex;flex-wrap:wrap;gap:3px;flex:1;min-width:0}
.r4{color:#ff66c4;font-weight:bold}
.r2{color:#f0883e;font-weight:bold}
.r05{color:#56d364}
.r025{color:#3fb950;font-weight:bold}
.r0{color:#58a6ff;font-weight:bold}
.r-none{color:#484f58}
.waza-cell{white-space:nowrap;max-width:140px;min-width:90px;vertical-align:top}
.waza-cell-clickable{cursor:pointer;transition:background .1s}
.waza-cell-clickable:hover{background:#1c2a3a}
/* 表セル内 わざ1個 (1行表示: 技名 / 分類 / 威力 / 命中 / 接触) */
.waza-item{display:flex;align-items:center;gap:4px;font-size:.7rem;padding:1px 2px;line-height:1.4;overflow:hidden}
.waza-item .w-name{font-weight:bold;color:#e6edf3;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
/* 分類による技名の文字色 (物=橙 / 特=青 / 変=灰) */
.waza-item .w-name.wn-phys{color:#f0883e}
.waza-item .w-name.wn-spec{color:#79c0ff}
.waza-item .w-name.wn-stat{color:#a6a8ad}
.waza-item .w-cat{flex-shrink:0}
.waza-item .w-pow,.waza-item .w-acc,.waza-item .w-contact{color:#8b949e;font-size:.62rem;flex-shrink:0}
/* モーダル内 わざ1個 (1行表示: 技名 / タイプ / 分類 / 威力 / 命中 / PP / 接触 / 優先度 / 説明) */
.waza-row{display:grid;grid-template-columns:8em 3.5em 2.5em 3.5em 3.5em 3em 3em 3.5em 1fr;align-items:center;gap:6px;padding:4px 6px;font-size:.74rem;white-space:nowrap;border-bottom:1px dotted #21262d;position:relative}
.waza-row > *:not(.desc-popup){overflow:hidden;text-overflow:ellipsis;min-width:0}
.waza-row .w-name{font-weight:bold;color:#e6edf3}
.waza-row .w-pow,.waza-row .w-acc,.waza-row .w-pp,.waza-row .w-contact{color:#8b949e;font-size:.7rem}
.waza-row .w-desc-inline{color:#a6a8ad;font-size:.65rem;cursor:help}
.waza-row:hover{background:#161f2c}
/* グローバル説明ツールチップ (カーソル追従、画面外にもみ出さない) */
#hover-tip{
  display:none;
  position:fixed;
  background:#1c2a3a;
  border:2px solid #79c0ff;
  padding:12px 16px;
  border-radius:6px;
  font-size:1rem;
  line-height:1.65;
  color:#e6edf3;
  max-width:600px;
  z-index:9999;
  pointer-events:none;
  box-shadow:0 8px 22px rgba(0,0,0,.7);
  white-space:normal;
  word-break:break-word;
}
#pf-table td.col-effect{cursor:help}
#pf-table td.col-effect:hover{background:#243447 !important}
.w-pri{font-size:.7rem;font-weight:bold;text-align:center}
.w-pri.pri-pos{color:#56d364}
.w-pri.pri-neg{color:#ff7b72}
.w-pri.pri-zero{color:#6e7681}
/* ソート対応ヘッダ行 */
.waza-row-header{display:grid;grid-template-columns:8em 3.5em 2.5em 3.5em 3.5em 3em 3em 3.5em 1fr;align-items:center;gap:6px;padding:5px 14px 5px 34px;font-size:.7rem;background:#21262d;color:#8b949e;font-weight:bold;border-radius:4px;position:sticky;top:0;z-index:5}
.waza-row-header > span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.waza-row-header > span{cursor:pointer;user-select:none;padding:2px 0}
.waza-row-header > span:hover{color:#79c0ff}
.waza-row-header .sort-active{color:#79c0ff}
/* フィルタバー */
.modal-filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:6px 8px;background:#0d1117;border:1px solid #21262d;border-radius:6px;font-size:.72rem}
.modal-filter-bar label{color:#8b949e;display:inline-flex;align-items:center;gap:3px}
.modal-filter-bar input[type=number]{width:55px;padding:2px 4px;border-radius:4px;border:1px solid #30363d;background:#161b22;color:#e6edf3;font-size:.72rem}
.modal-filter-bar input[type=checkbox]{accent-color:#79c0ff;cursor:pointer}
.modal-filter-bar .fb-cat-btn{padding:2px 8px;border:1px solid #30363d;border-radius:10px;background:#161b22;color:#8b949e;cursor:pointer;font-size:.7rem}
.modal-filter-bar .fb-cat-btn.on{background:#1c2a3a;color:#e6edf3;border-color:#79c0ff}
/* 共通バッジ */
.w-cat{display:inline-block;padding:0 4px;border-radius:3px;font-size:.62rem;font-weight:bold;color:#fff;line-height:1.4}
.w-cat.phys{background:#f0883e}
.w-cat.spec{background:#79c0ff}
.w-cat.stat{background:#8b949e}
.w-type{display:inline-block;padding:0 5px;border-radius:8px;font-size:.62rem;font-weight:bold;color:#fff;line-height:1.5}
.w-stat-key{color:#6e7681}
.waza-more{font-size:.65rem;padding:2px 0;cursor:pointer;text-align:center}
.waza-more span{margin:0 4px}
.bd-phys{color:#f0883e}
.bd-spec{color:#79c0ff}
.bd-stat{color:#a6a8ad}
/* 件数のみのセルは縦方向も中央揃え */
.waza-cell-count{vertical-align:middle;text-align:center}
.waza-empty{color:#30363d;font-size:.73rem}
.empty-slot-cell{text-align:center;color:#30363d;font-size:.78rem;min-width:120px;cursor:pointer}
.empty-slot-cell:hover{background:#1c2a3a}

/* タイプ行ラベル */
.type-label-cell{display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto auto;align-items:center;gap:2px 5px}
.type-label-cell .drag-handle{grid-row:1;grid-column:1}
.type-label-cell .tbadge{grid-row:1;grid-column:2;justify-self:start}
.type-label-cell .type-cnt,
.type-label-cell .filter-badge,
.type-label-cell .type-stats{grid-row:2;grid-column:1/3;justify-self:center}
.type-cnt{font-size:.62rem;color:#8b949e}
.filter-badge{font-size:.62rem;background:#1f4a1f;color:#56d364;border-radius:8px;padding:1px 5px;border:1px solid #2ea043}
.type-stats{font-size:.62rem;display:flex;gap:5px;justify-content:center}
.type-stats .ts-good{color:#56d364;font-weight:bold}
.type-stats .ts-bad{color:#f0883e}
.type-stats .ts-zero{color:#8b949e}
.drag-handle{color:#484f58;cursor:grab;font-size:.9rem;flex-shrink:0;line-height:1}
.drag-handle:active{cursor:grabbing}
tr.type-data-row{cursor:default}
tr.type-data-row.drag-target td{border-top:2px solid #f0883e !important}

/* フィルタバー */
/* タブバー */
#pc-tab-bar{background:#0d1117;padding:5px 10px;display:flex;gap:4px;align-items:center;border-bottom:1px solid #21262d;flex-shrink:0;flex-wrap:wrap}
.pc-tab{display:inline-flex;align-items:center;gap:5px;padding:4px 10px 4px 12px;background:#161b22;border:1px solid #30363d;border-radius:6px 6px 0 0;cursor:pointer;color:#8b949e;font-size:.78rem;user-select:none;transition:.1s}
.pc-tab:hover{background:#1c2a3a;color:#e6edf3}
.pc-tab.active{background:#1c2a3a;color:#e6edf3;border-color:#58a6ff;border-bottom-color:transparent}
.pc-tab-name{padding:1px 0}
.pc-tab-close{color:#6e7681;padding:0 2px;font-size:.85rem;line-height:1;border-radius:3px}
.pc-tab-close:hover{background:#21262d;color:#f85149}
.pc-tab-add{padding:4px 9px;background:transparent;border:1px dashed #30363d;border-radius:6px;color:#8b949e;cursor:pointer;font-size:.85rem}
.pc-tab-add:hover{background:#161b22;color:#e6edf3;border-color:#58a6ff}
/* ナビボタン共通サイズ (色は modifier で) */
.pc-nav-btn{padding:3px 10px;background:#21262d;border:1px solid #30363d;border-radius:4px;color:#79c0ff;cursor:pointer;font-size:11px;font-weight:700;line-height:1.4}
.pc-nav-btn:hover{background:#1c6ab7;color:#fff;border-color:#1c6ab7}
/* ナビボタン: 相手ページのテーマ色 */
.pc-nav-btn.nav-db{background:#2E86AB;color:#fff;border-color:#2E86AB}
.pc-nav-btn.nav-db:hover{background:#246B89;border-color:#246B89}
.pc-nav-btn.nav-checker{background:#27AE60;color:#fff;border-color:#27AE60}
.pc-nav-btn.nav-checker:hover{background:#1E8449;border-color:#1E8449}
.pc-nav-btn.nav-waza{background:#F39C12;color:#fff;border-color:#F39C12}
.pc-nav-btn.nav-waza:hover{background:#D68910;border-color:#D68910}

#filter-bar{background:#161b22;padding:7px 14px;border-bottom:1px solid #21262d;display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex-shrink:0}
#filter-bar input{padding:5px 10px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:12px;width:130px}
.fcat-btn{padding:2px 9px;border:1px solid #30363d;border-radius:10px;background:transparent;color:#8b949e;cursor:pointer;font-size:.73rem}
.fcat-btn.on{background:#21262d;color:#e6edf3;border-color:#8b949e}
#filter-bar label{font-size:.73rem;color:#8b949e}
#send-to-battle{display:none;margin-left:auto;padding:5px 12px;background:#8a3a00;color:#fff;border:1px solid #c66e00;border-radius:5px;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap}
#send-to-battle:hover{background:#c66e00;border-color:#f59e0b}
#send-to-battle:active{background:#6e2e00}

/* ── ステータス調整ポップアップ (Pokemon Champions 完全再現) ── */
#ev-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;align-items:center;justify-content:center;padding:16px}
#ev-ov.vis{display:flex}
#ev-box{background:linear-gradient(180deg,#1f2a4d,#16223e);border:2px solid #4a5a90;border-radius:14px;padding:18px 22px;width:600px;max-width:96vw;max-height:92vh;overflow:auto;display:flex;flex-direction:column;gap:14px;box-shadow:0 24px 60px rgba(0,0,0,.95)}
#ev-head{display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;border-bottom:1px solid #4a5a90;gap:12px}
#ev-pokemon-name{font-weight:bold;font-size:1.1rem;color:#fff}
#ev-subhead{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
#ev-head-right{display:flex;align-items:center;gap:10px}
#ev-budget{font-size:.95rem;color:#cfd9ea;font-variant-numeric:tabular-nums}
#ev-budget #ev-used{color:#ffe066;font-weight:bold;font-size:1.1em}
#ev-budget.budget-full #ev-used{color:#ff5ee0}
#ev-reset{padding:5px 12px;border-radius:6px;border:1px solid #4a5a90;background:#22305a;color:#cfd9ea;font-size:.78rem;cursor:pointer;font-weight:bold;letter-spacing:.04em}
#ev-reset:hover{background:#2e406e;border-color:#79c0ff;color:#fff}
#ev-body{display:flex;flex-direction:column;gap:8px}
#ev-rows{display:flex;flex-direction:column;gap:6px}
.ev-row{display:grid;grid-template-columns:5.5em 3em 2.3em 1.7em 1fr 1.7em 1.7em 2.3em;gap:5px;align-items:center;padding:7px 10px;border-radius:9px;background:#1a2540;border:2px solid transparent;transition:.1s}
.ev-row:hover{background:#22305a;border-color:#3a4a7a}
.ev-row.selected{background:#3a4a7a;border-color:#ffd633;box-shadow:0 0 0 1px rgba(255,214,51,.3)}
.ev-row-icon{font-size:1.1rem;text-align:center;line-height:1}
.ev-row-label{font-size:.85rem;color:#e6edf3;display:flex;align-items:center;gap:4px;white-space:nowrap}
/* 性格補正に応じてラベル自体を着色 (矢印は使わない) */
.ev-row.nat-up .ev-row-label{color:#ff5c5c;font-weight:bold}
.ev-row.nat-down .ev-row-label{color:#5cb0ff;font-weight:bold}
.ev-row-actual{font-weight:bold;font-size:1.05rem;text-align:right;color:#e6edf3;font-variant-numeric:tabular-nums}
/* 実数値の色は性格・pt 状況によらず常に固定 (要望) */
/* バー: 32分割表示 */
.ev-row-bar{height:22px;background:#0d1117;border-radius:4px;overflow:hidden;position:relative;border:1px solid #4a5a90;cursor:pointer;touch-action:none;user-select:none}
.ev-row-bar:hover{border-color:#79c0ff}
.ev-row-bar::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0,transparent calc(3.125% - 1px),rgba(255,255,255,.18) calc(3.125% - 1px),rgba(255,255,255,.18) 3.125%);pointer-events:none;z-index:3}
/* 通常時: 薄い黄色 → ベージュ */
.ev-bar-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#ffe680,#c9b878);transition:width .08s,background .2s;pointer-events:none;z-index:1}
/* 合計 66/66 (能力ポイント満タン) になったら全バーをオレンジに */
#ev-box.budget-full .ev-bar-fill{background:linear-gradient(90deg,#ffb84d,#ff7733)}
/* ホバー時のプレビュー (色は本体と同じグラデ) */
.ev-bar-preview{position:absolute;left:0;top:0;height:100%;width:0;background:linear-gradient(90deg,#ffe680,#c9b878);opacity:0;pointer-events:none;z-index:2;transition:width .04s,opacity .1s,background .2s}
#ev-box.budget-full .ev-bar-preview{background:linear-gradient(90deg,#ffb84d,#ff7733)}
.ev-row-bar:hover .ev-bar-preview{opacity:.45}
/* 動的ボーナス目盛り (性格↑で +2 になる位置、性格↓で +0 になる位置) */
.ev-bonus-mark{position:absolute;top:0;bottom:0;width:3px;pointer-events:none;z-index:4;transform:translateX(-50%)}
.ev-bonus-mark.bonus{background:rgba(255,215,80,.85);box-shadow:0 0 3px rgba(255,215,80,.6)}
.ev-bonus-mark.waste{background:rgba(80,100,140,.7)}
.ev-row-pts{font-weight:bold;color:#e6edf3;text-align:center;font-variant-numeric:tabular-nums;font-size:.95rem}
.ev-row.has-pts .ev-row-pts{color:#ffe066}
.ev-row.max-pts .ev-row-pts{color:#ff4d4d}
/* 行内 ボタン: MIN / ◀ / ▶ / MAX */
.ev-row-min,.ev-row-max,.ev-row-dec,.ev-row-inc{height:22px;border-radius:4px;border:1px solid #4a5a90;background:#22305a;color:#fff;cursor:pointer;font-weight:bold;padding:0}
.ev-row-dec,.ev-row-inc{font-size:.85rem;line-height:1}
.ev-row-min,.ev-row-max{font-size:.62rem;letter-spacing:.04em}
.ev-row-min:hover:not(:disabled),.ev-row-max:hover:not(:disabled),
.ev-row-dec:hover:not(:disabled),.ev-row-inc:hover:not(:disabled){background:#2e406e;border-color:#79c0ff}
.ev-row-min:disabled,.ev-row-max:disabled,.ev-row-dec:disabled,.ev-row-inc:disabled{opacity:.3;cursor:not-allowed}
#ev-help{font-size:.72rem;color:#a0b8e0;text-align:center;padding:6px 8px;line-height:1.55;background:rgba(255,255,255,.03);border-radius:6px;border:1px solid #2a3868}
#ev-nature-pick{display:flex;align-items:center;gap:8px;font-size:.85rem;color:#cfd9ea;flex-wrap:wrap;position:relative}
/* カスタム性格ドロップダウン */
.nat-dd{position:relative;display:inline-block}
.nat-dd-trigger{background:#0d1117;color:#e6edf3;border:1px solid #4a5a90;border-radius:5px;font-size:.82rem;padding:4px 22px 4px 8px;cursor:pointer;min-width:7em;text-align:left;font-weight:bold;position:relative}
.nat-dd-trigger::after{content:'▼';position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:.6rem;color:#a0b8e0}
.nat-dd-trigger:hover{border-color:#79c0ff}
/* 性格パネル: ev-box の overflow:auto に切られないよう fixed 配置 */
.nat-dd-panel{position:fixed;top:0;left:0;background:#1a2540;border:1px solid #4a5a90;border-radius:6px;padding:3px;max-height:560px;overflow-y:auto;z-index:900;display:none;min-width:18em;box-shadow:0 6px 16px rgba(0,0,0,.6)}
.nat-dd-panel.open{display:block}
.nat-dd-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:5px 9px;cursor:pointer;border-radius:4px;font-size:.78rem;color:#e6edf3;white-space:nowrap}
.nat-dd-item:hover{background:#22305a}
.nat-dd-item.selected{background:#3a4a7a}
.nat-dd-name{font-weight:bold}
.nat-dd-item .nat-eff{font-size:.74rem;font-variant-numeric:tabular-nums}
.nat-dd-item .nat-eff-up{color:#ff5c5c;font-weight:bold}
.nat-dd-item .nat-eff-down{color:#5cb0ff;font-weight:bold}
.nat-dd-item .nat-eff-neutral{color:#8b949e;font-style:italic;font-size:.7rem}
#ev-nature-effect{font-size:.78rem}
#ev-nature-effect .nat-eff-up{color:#ff7b72;font-weight:bold}
#ev-nature-effect .nat-eff-down{color:#79c0ff;font-weight:bold}
#ev-nature-effect .nat-eff-neutral{color:#8b949e}
#ev-actions{display:flex;justify-content:flex-end;gap:8px;padding-top:4px}
#ev-cancel{padding:7px 16px;border-radius:7px;border:1px solid #4a5a90;background:transparent;color:#cfd9ea;font-size:14px;cursor:pointer}
#ev-ok{padding:8px 26px;border-radius:7px;border:none;background:#3a82f0;color:#fff;font-size:14px;cursor:pointer;font-weight:bold}
#ev-ok:hover{background:#4a92ff}
/* メイン表での性格色・ポイント色 */
.nature-up.stat-letter{color:#ff7b72 !important;font-weight:bold}
.nature-down.stat-letter{color:#79c0ff !important;font-weight:bold}
.sv-base-nat-up{color:#ff7b72 !important;font-weight:bold}
.sv-base-nat-down{color:#79c0ff !important}
.sv-pt-has{color:#ffe066 !important}
.sv-pt-max{color:#ff5ee0 !important;font-weight:bold}
.sv-base-click{cursor:pointer;border-radius:3px;padding:0 2px;transition:background .1s}
.sv-base-click:hover{background:#2a3f5a;outline:1px solid #3a82f0}
/* 性格表示セル (メイン表クリック領域) */
.nature-cell{display:inline-block;padding:3px 8px;border-radius:5px;background:#0d1117;border:1px solid #30363d;color:#e6edf3;font-size:.72rem;cursor:pointer;min-width:5.5em;text-align:center;transition:.1s}
.nature-cell:hover{background:#1c2a3a;border-color:#79c0ff}
/* ── 性格選択グリッドポップアップ ── */

<script>
(function(){

  // ?nopop でデバッグ無効化、?forcepop で強制表示
  var qs = location.search;
  if (qs.indexOf('nopop') >= 0) return;
  if (qs.indexOf('forcepop') >= 0) sessionStorage.removeItem('pchamdb_entry_popup_shown');

  // 商品プールは下部の ad-grid と一致 (5商品)

    {h:'https://hb.afl.rakuten.co.jp/ichiba/53b836fd.c6155541.53b836fe.00d578fa/?pc=https%3A%2F%2Fitem.rakuten.co.jp%2Fbansyuselect%2Fex293948219%2F&link_type=picttext', i:'https://thumbnail.image.rakuten.co.jp/@0_mall/bansyuselect/cabinet/09256555/10620272/imgrc0129824024.jpg?_ex=240x240'},

    {h:'https://hb.afl.rakuten.co.jp/ichiba/53b83e1e.db22d291.53b83e1f.1fb9e945/?pc=https%3A%2F%2Fitem.rakuten.co.jp%2Fhoneys-online%2F4400139902%2F&link_type=pict', i:'https://hbb.afl.rakuten.co.jp/hgb/53b83e1e.db22d291.53b83e1f.1fb9e945/?me_id=1239494&item_id=10038978&pc=https%3A%2F%2Fthumbnail.image.rakuten.co.jp%2F%400_mall%2Fhoneys-online%2Fcabinet%2Fgoods%2F4400139902%2F4400139902.jpg%3F_ex%3D240x240&s=240x240&t=pict'}

  setTimeout(function(){

    popup.hidden = false;
    document.body.style.overflow = 'hidden';

    var sec = 3;
    var timer = setInterval(function(){
      sec--;
      if (sec > 0) {
        btn.textContent = sec + '秒…';
      } else {
        clearInterval(timer);
        btn.disabled = false;
        btn.textContent = '✕ 閉じる';

    var close = function(){
      if (btn.disabled) return;
      popup.hidden = true;
      popup.style.display = 'none';  // 保険: hidden 属性が効かない場合の二重防御

    });

      if (e.key === 'Escape') close();
    });
  }, 800);
})();

<script>







// ── 表示用短縮名 ───────────────────────────────────────────────────────────
// バッジ表示時のみ短縮（内部のタイプ名は変更しない）
// 3文字統一: 4〜5文字のタイプは先頭3文字に短縮、3文字以下はそのまま

const tDisp = t => TYPE_DISPLAY[t] || t;

// ── 特性説明文（後でスクレイピングで埋める） ────────────────────────────────




// ── タイプ攻撃時の有利不利カウント（◯=ばつぐん ▲=いまひとつ ✗=無効） ───────
// 出典: ◯相性表 ポケモン　全技網羅.xlsx (Sheet ◯相性表) を集計


// ── 定数 ─────────────────────────────────────────────────────────────────────
const CHECKER_VERSION = 'チェッカー: 05/12更新';
const PARTY_SIZE = 24;
const LS_PARTY        = "pokechan_party_v3";
const LS_ORDER        = "pokechan_type_order_v4";  // v4: あべ指定の戦術順をデフォルト化

// あべ指定のデフォルトタイプ順 (戦術的優先順、強い攻撃タイプ先頭)

const LS_SLOT_FILTERS = "pokechan_slot_filters_v2";  // v2: per-slot×per-type 構造に変更
const LS_STAT_VIS     = "pokechan_stat_vis_v1";   // {base,v6,c,a,b,rank} の表示ON/OFF
const LS_PARTY_ITEMS  = "pokechan_party_items_v1"; // 各スロットの持ち物 key (空文字でなし)

// ── 状態 ─────────────────────────────────────────────────────────────────────
let party = JSON.parse(localStorage.getItem(LS_PARTY) || "[]");
while (party.length < PARTY_SIZE) party.push(null);
party = party.slice(0, PARTY_SIZE);

let partyItems = JSON.parse(localStorage.getItem(LS_PARTY_ITEMS) || "[]");
while (partyItems.length < PARTY_SIZE) partyItems.push("");
partyItems = partyItems.slice(0, PARTY_SIZE);

// 持ち物 key → アイテム情報の逆引き（items_database.js 読み込み後に構築）
const ITEM_BY_KEY = {};
if (window.ITEMS_DATABASE && Array.isArray(window.ITEMS_DATABASE.items)){
  window.ITEMS_DATABASE.items.forEach(it=>{ ITEM_BY_KEY[it.key] = it; });
}

function saveItems(){ localStorage.setItem(LS_PARTY_ITEMS, JSON.stringify(partyItems)); }

// 持ち物選択モーダルで現在開いているスロット
let _itemModalSlot = null;

const _ITEM_CAT_ORDER = ['attack_boost','speed_boost','defense_boost','type_boost','berry_resist','berry_status_cure','berry_hp_cure','hp_drain','survival','status_inflict','misc','mega_stone'];

function _escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// グローバル: スロット用持ち物モーダルを開く
window.openItemModal = function(slotIdx){
  _itemModalSlot = slotIdx;
  const cur = partyItems[slotIdx] || "";
  const titleEl = document.getElementById('item-modal-title');
  const slotLabel = (typeof party !== 'undefined' && party[slotIdx]) ? party[slotIdx] : `スロット${slotIdx+1}`;
  if (titleEl) titleEl.textContent = `${slotLabel} の持ち物を選択`;
  _renderItemModalList(cur);
  document.getElementById('item-modal-ov').classList.add('vis');
};

window.closeItemModal = function(){
  _itemModalSlot = null;
  document.getElementById('item-modal-ov').classList.remove('vis');
};

function _renderItemModalList(selectedKey){
  const listEl = document.getElementById('item-modal-list');
  if (!listEl) return;
  if (!window.ITEMS_DATABASE){
    listEl.innerHTML = '<div style="color:#ff7b72;padding:10px">items_database.js が読み込めません</div>';
    return;
  }
  const cats = window.ITEMS_DATABASE.categories || {};
  const byCat = {};
  for (const it of window.ITEMS_DATABASE.items){
    (byCat[it.category] = byCat[it.category] || []).push(it);
  }
  let html = `<div class="item-row none-row ${!selectedKey?'selected':''}" onclick="_pickItemFromModal('')">
    <span class="item-row-name">— 持ち物なし —</span>
  </div>`;
  for (const cat of _ITEM_CAT_ORDER){
    if (!byCat[cat]) continue;
    html += `<div class="item-cat-head">${_escHtml(cats[cat]||cat)}</div>`;
    for (const it of byCat[cat]){
      const sel = (selectedKey === it.key) ? ' selected' : '';
      html += `<div class="item-row${sel}" onclick="_pickItemFromModal('${_escHtml(it.key)}')">
        <span class="item-row-name">${_escHtml(it.name)}</span>
        <span class="item-row-desc">${_escHtml(it.effect||'')}</span>
      </div>`;
    }
  }
  listEl.innerHTML = html;
  // 選択中の行までスクロール
  const sel = listEl.querySelector('.item-row.selected');
  if (sel) sel.scrollIntoView({block:'center'});
}

// モーダル内のアイテム行クリック
window._pickItemFromModal = function(key){
  if (_itemModalSlot === null) return;
  const slotIdx = _itemModalSlot;
  partyItems[slotIdx] = key || "";
  saveItems();
  // 該当 td の pill だけ更新（フル再描画はコスト高）
  const td = document.querySelector(`td.item-cell[data-slot="${slotIdx}"]`);
  if (td){
    const pill = td.querySelector('.item-pill');
    const it = key && ITEM_BY_KEY[key];
    if (pill){
      pill.textContent = it ? it.name : '＋ 選択';
      pill.classList.toggle('empty', !it);
    }
    td.setAttribute('title', it ? (it.effect||it.name) : 'クリックで持ち物を選ぶ');
  }
  closeItemModal();
};

// ── 性格データ (25種) ───────────────────────────────────────────────────────
// 中性 (up===down) は 5種、各能力の対角位置に配置
// Champions の画面に合わせ、まじめ = ATK 中性位置
const NATURES = {
  // ATK行
  'まじめ':    { up: 'atk',   down: 'atk'   },   // 中性 (ATK/ATK)
  'さみしがり': { up: 'atk',   down: 'def'   },

  'わんぱく':  { up: 'def',   down: 'spatk' },
  'のうてんき': { up: 'def',   down: 'spdef' },
  'のんき':   { up: 'def',   down: 'spd'   },
  // SPATK行
  'ひかえめ':  { up: 'spatk', down: 'atk'   },

  'うっかりや': { up: 'spatk', down: 'spdef' },
  'れいせい':  { up: 'spatk', down: 'spd'   },
  // SPDEF行
  'おだやか':  { up: 'spdef', down: 'atk'   },
  'やさしい':  { up: 'spdef', down: 'def'   },
  'しんちょう': { up: 'spdef', down: 'spatk' },
  'きまぐれ':  { up: 'spdef', down: 'spdef' },   // 中性 (SPDEF/SPDEF)
  'なまいき':  { up: 'spdef', down: 'spd'   },
  // SPD行
  'おくびょう': { up: 'spd',  down: 'atk'   },
  'せっかち':  { up: 'spd',  down: 'def'   },
  'ようき':   { up: 'spd',  down: 'spatk' },
  'むじゃき':  { up: 'spd',  down: 'spdef' },
  'がんばりや': { up: 'spd',  down: 'spd'   },   // 中性 (SPD/SPD)
};
const NATURE_NAMES = Object.keys(NATURES);
const STAT_KEYS_5 = ['atk','def','spatk','spdef','spd'];
const STAT_FULL_LABEL = {atk:'こうげき',def:'ぼうぎょ',spatk:'とくこう',spdef:'とくぼう',spd:'すばやさ'};

// 能力ポイント (Champions 方式: 1pt = 実数値+1, 各 0-32, 合計 0-66)
const PT_MAX_PER_STAT = 32;
const PT_MAX_TOTAL = 66;
const STAT_KEYS_6 = ['hp','atk','def','spatk','spdef','spd'];
const EV_STAT_LABEL = {hp:'HP',atk:'こうげき',def:'ぼうぎょ',spatk:'とくこう',spdef:'とくぼう',spd:'すばやさ'};
const EV_STAT_LETTER = {hp:'H',atk:'A',def:'B',spatk:'C',spdef:'D',spd:'S'};

// PC タブごとに保存される (captureCurrentPcState / applyPcState 参照)
let partyNatures = Array.from({length: PARTY_SIZE}, () => 'まじめ');
let partyEvs = Array.from({length: PARTY_SIZE}, () =>
  ({hp:0,atk:0,def:0,spatk:0,spdef:0,spd:0}));

function getNatureMul(natureName, statKey) {
  if (!natureName || statKey === 'hp' || statKey === 'total') return 1.0;
  const n = NATURES[natureName];
  if (!n) return 1.0;
  if (n.up === n.down) return 1.0;   // 中性 (up == down)
  if (n.up === statKey) return 1.1;
  if (n.down === statKey) return 0.9;
  return 1.0;
}
function isNatureNeutral(natureName) {
  const n = NATURES[natureName];
  return !n || n.up === n.down;
}

// Lv50・IV=31 想定の実数値
// Champions 方式 (段階的反映): 性格補正は (inner + pts) 全体に乗ずる
//   actual = floor((inner + pts) * nature)
// これにより補正ありステータスでは「色の濃い目盛り」(10ptごと付近) に当てると
// 通常の目盛りより +1 多く実数値が上がる挙動になる。
// 参考: https://gamerch.com/pokemonchampions/970094
function computeActualStat(base, statKey, pts, natureName) {
  if (base == null) return null;
  if (statKey === 'hp') return Math.floor((base * 2 + 31) / 2) + 60 + pts;
  const inner = Math.floor((base * 2 + 31) / 2) + 5;
  return Math.floor((inner + pts) * getNatureMul(natureName, statKey));
}

// あるステータスについて pt を +1 した時に実数値が増える量を返す
//   性格 ×1.1 の場合: 1 or 2 (10pt毎付近で 2)
//   性格 ×0.9 の場合: 0 or 1 (10pt毎付近で 0)
//   性格 ×1.0 の場合: 常に 1
function statGainFor(base, statKey, pts, natureName) {
  const cur = computeActualStat(base, statKey, pts, natureName);
  const nxt = computeActualStat(base, statKey, pts + 1, natureName);
  if (cur == null || nxt == null) return 0;
  return nxt - cur;
}

function getTotalEv(slotIdx) {
  const e = partyEvs[slotIdx];
  return e.hp + e.atk + e.def + e.spatk + e.spdef + e.spd;
}

function _evRefresh() {
  const total = STAT_KEYS_6.reduce((s,k) => s + _evTemp[k], 0);
  document.getElementById('ev-used').textContent = total;
  document.getElementById('ev-budget').classList.toggle('budget-full', total >= PT_MAX_TOTAL);
  // 合計 66/66 になったら #ev-box にも budget-full を付与 (バー全体をオレンジ化)
  document.getElementById('ev-box').classList.toggle('budget-full', total >= PT_MAX_TOTAL);

  // 性格ドロップダウンのトリガー表示更新 & 選択中ハイライト
  const trigger = document.getElementById('ev-nature-trigger');
  if (trigger) trigger.textContent = _evTempNature;
  const panel = document.getElementById('ev-nature-panel');
  if (panel) {
    panel.querySelectorAll('.nat-dd-item').forEach(it => {
      it.classList.toggle('selected', it.dataset.n === _evTempNature);
    });
  }

  const nat = NATURES[_evTempNature] || {};
  const natIsNeutral = nat.up === nat.down;

  // 性格効果テキスト
  const effEl = document.getElementById('ev-nature-effect');
  if (natIsNeutral || !nat.up || !nat.down) {
    effEl.innerHTML = '<span class="nat-eff-neutral">(補正なし)</span>';
  } else {
    effEl.innerHTML =
      `<span class="nat-eff-up">${STAT_FULL_LABEL[nat.up]}↑</span> / ` +
      `<span class="nat-eff-down">${STAT_FULL_LABEL[nat.down]}↓</span>`;
  }

  // 6行 (直接バー操作 + 行内 MIN/MAX + 動的ボーナス目盛り)
  document.getElementById('ev-rows').innerHTML = STAT_KEYS_6.map(k => {
    const pts = _evTemp[k];
    const base = _evBaseFor(k);
    const actual = computeActualStat(base, k, pts, _evTempNature);
    const natUp   = !natIsNeutral && nat.up   === k;
    const natDown = !natIsNeutral && nat.down === k;
    const hasPts  = pts > 0;
    const maxPts  = pts >= PT_MAX_PER_STAT;
    const cls = ['ev-row',
      _evSelected === k ? 'selected' : '',
      natUp ? 'nat-up' : '', natDown ? 'nat-down' : '',
      hasPts ? 'has-pts' : 'no-pts', maxPts ? 'max-pts' : ''
    ].filter(Boolean).join(' ');
    const pct = (pts / PT_MAX_PER_STAT) * 100;

    // ボーナス/無駄目盛り (調査中: ↓ の青ラインは公式に存在するか要検証)
    //   ↑ ステ: gain=+2 の位置に黄ライン (ボーナス pt)
    //   ↓ ステ: gain=0  の位置に青ライン (無駄 pt — 公式仕様は要確認)
    let marksHtml = '';
    if (base != null && (natUp || natDown)) {
      for (let p = 0; p < PT_MAX_PER_STAT; p++) {
        const gain = statGainFor(base, k, p, _evTempNature);
        if (gain >= 2) {
          const left = ((p + 1) / PT_MAX_PER_STAT) * 100;
          marksHtml += `<span class="ev-bonus-mark bonus" style="left:${left}%" title="+2 ボーナス pt"></span>`;
        } else if (gain === 0) {
          const left = ((p + 1) / PT_MAX_PER_STAT) * 100;
          marksHtml += `<span class="ev-bonus-mark waste" style="left:${left}%" title="+0 無駄 pt — 計算式上ここに振っても実数値は上がらない"></span>`;
        }
      }
    }

    const maxHere = (function(){
      const t = STAT_KEYS_6.reduce((s,kk) => s + _evTemp[kk], 0);
      return Math.min(PT_MAX_PER_STAT, PT_MAX_TOTAL - (t - pts));
    })();
    const canInc = pts < maxHere;
    const canDec = pts > 0;
    return `<div class="${cls}" data-k="${k}">
      <span class="ev-row-label">${EV_STAT_LABEL[k]}</span>
      <span class="ev-row-actual">${actual ?? '—'}</span>
      <button class="ev-row-min" data-k="${k}" ${canDec?'':'disabled'} title="ミニマム (0)">MIN</button>
      <button class="ev-row-dec" data-k="${k}" ${canDec?'':'disabled'} title="-1">◀</button>
      <span class="ev-row-bar" data-k="${k}"><span class="ev-bar-fill" style="width:${pct}%"></span><span class="ev-bar-preview"></span>${marksHtml}</span>
      <span class="ev-row-pts">${pts}</span>
      <button class="ev-row-inc" data-k="${k}" ${canInc?'':'disabled'} title="+1">▶</button>
      <button class="ev-row-max" data-k="${k}" ${canInc?'':'disabled'} title="マックス (最大)">MAX</button>
    </div>`;
  }).join('');
}

function openStatPopup(slotIdx) {
  const name = party[slotIdx];
  const p = name && POKE_MAP[name];
  if (!p) return;
  _evSlot = slotIdx;

// 性格ドロップダウン: 各候補に「○○↑/○○↓」を併記。中性5種は最下部にまとめる
function _buildNatureDropdownPanel() {
  const panel = document.getElementById('ev-nature-panel');
  if (!panel) return;
  // 非中性 → 中性 の順に並べ替え
  const nonNeutral = NATURE_NAMES.filter(n => {
    const nat = NATURES[n];
    return nat && nat.up !== nat.down;
  });
  const neutral = NATURE_NAMES.filter(n => {
    const nat = NATURES[n];
    return !nat || nat.up === nat.down;
  });
  const ordered = [...nonNeutral, ...neutral];

  panel.innerHTML = ordered.map(n => {
    const nat = NATURES[n];
    const isNeutral = !nat || nat.up === nat.down;
    const effHtml = isNeutral
      ? '<span class="nat-eff-neutral">(補正なし)</span>'
      : `<span class="nat-eff">` +
          `<span class="nat-eff-up">${STAT_FULL_LABEL[nat.up]}↑</span> / ` +
          `<span class="nat-eff-down">${STAT_FULL_LABEL[nat.down]}↓</span>` +
        `</span>`;
    const isSel = (n === _evTempNature) ? ' selected' : '';
    return `<div class="nat-dd-item${isSel}" data-n="${n}"><span class="nat-dd-name">${n}</span>${effHtml}</div>`;
  }).join('');
}

function _closeEv() { document.getElementById('ev-ov').classList.remove('vis'); }

(function() {
  function totalNow() { return STAT_KEYS_6.reduce((s,k) => s + _evTemp[k], 0); }
  function maxFor(k) {
    return Math.min(PT_MAX_PER_STAT, PT_MAX_TOTAL - (totalNow() - _evTemp[k]));
  }
  function adjustSelected(d) {
    const k = _evSelected;
    let next = Math.max(0, Math.min(maxFor(k), _evTemp[k] + d));
    _evTemp[k] = next;
    _evRefresh();
  }

  // 各行のバーをクリック / ドラッグで pt 設定
  //   ※ _evRefresh で #ev-rows の innerHTML が毎回書き換わり、
  //     mousedown 時に取得した barEl が detached になる → getBoundingClientRect が 0 を返し
  //     ratio=1 で誤って MAX 化していたので、毎回 DOM から再取得する
  function setPtsFromX(k, clientX) {
    const bar = document.querySelector(`.ev-row-bar[data-k="${k}"]`);
    if (!bar) return;
    const r = bar.getBoundingClientRect();
    if (!r.width) return;
    const ratio = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
    const target = Math.round(ratio * PT_MAX_PER_STAT);
    _evTemp[k] = Math.max(0, Math.min(maxFor(k), target));
    _evSelected = k;
    _evRefresh();
  }

  function findBar(target) {
    return target && target.closest && target.closest('.ev-row-bar[data-k]');
  }

  const rowsEl = document.getElementById('ev-rows');

  // 行内ボタン: MIN / ◀ (-1), ▶ (+1) / MAX
  rowsEl.addEventListener('click', e => {
    const minBtn = e.target.closest('.ev-row-min[data-k]');
    if (minBtn) {
      const k = minBtn.dataset.k;
      _evTemp[k] = 0;
      _evSelected = k;
      _evRefresh();
      return;
    }
    const decBtn = e.target.closest('.ev-row-dec[data-k]');
    if (decBtn) {
      const k = decBtn.dataset.k;
      _evTemp[k] = Math.max(0, _evTemp[k] - 1);
      _evSelected = k;
      _evRefresh();
      return;
    }
    const incBtn = e.target.closest('.ev-row-inc[data-k]');
    if (incBtn) {
      const k = incBtn.dataset.k;
      _evTemp[k] = Math.min(maxFor(k), _evTemp[k] + 1);
      _evSelected = k;
      _evRefresh();
      return;
    }
    const maxBtn = e.target.closest('.ev-row-max[data-k]');
    if (maxBtn) {
      const k = maxBtn.dataset.k;
      _evTemp[k] = maxFor(k);
      _evSelected = k;
      _evRefresh();
      return;
    }
  });

  // mousedown → クリック開始: そのまま mousemove で連続更新
  rowsEl.addEventListener('mousedown', e => {
    // 行内ボタンの mousedown は click ハンドラに任せる (再描画でボタン消失を防ぐ)
    if (e.target.closest('.ev-row-min, .ev-row-dec, .ev-row-inc, .ev-row-max')) return;
    const bar = findBar(e.target);
    if (bar) {
      const k = bar.dataset.k;
      // 初回クリック位置を反映
      setPtsFromX(k, e.clientX);
      // ドラッグ中: 連続更新 (バー要素は内部で毎回再取得)
      const onMove = (ev) => setPtsFromX(k, ev.clientX);
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      e.preventDefault();
      return;
    }
    // バー以外のクリック: 行選択のみ
    const row = e.target.closest('.ev-row[data-k]');
    if (row) {
      _evSelected = row.dataset.k;
      _evRefresh();
    }
  });

  // ホバー時にプレビューを表示
  rowsEl.addEventListener('mousemove', e => {
    const bar = findBar(e.target);
    if (!bar) return;
    const preview = bar.querySelector('.ev-bar-preview');
    if (!preview) return;
    const r = bar.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    // 32 マスにスナップして表示 (1マス = 3.125%)
    const snappedPt = Math.round(ratio * PT_MAX_PER_STAT);
    const snappedPct = (snappedPt / PT_MAX_PER_STAT) * 100;
    preview.style.width = snappedPct + '%';
  });
  rowsEl.addEventListener('mouseleave', e => {
    // 行を離れたらプレビュー消す
    rowsEl.querySelectorAll('.ev-bar-preview').forEach(p => p.style.width = '0');
  }, true);

  // タッチ対応 (iPad / iPhone)
  rowsEl.addEventListener('touchstart', e => {
    const bar = findBar(e.target);
    if (!bar) return;
    const k = bar.dataset.k;
    const touch = e.touches[0];
    setPtsFromX(k, touch.clientX);
    const onMove = (ev) => {
      const t = ev.touches[0];
      if (t) setPtsFromX(k, t.clientX);
    };
    const onEnd = () => {
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
      document.removeEventListener('touchcancel', onEnd);
    };
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
    document.addEventListener('touchcancel', onEnd);
    e.preventDefault();
  }, { passive: false });

  // 性格ドロップダウン: トリガー = 開閉、パネル項目 = 選択
  const trigger = document.getElementById('ev-nature-trigger');
  const panel   = document.getElementById('ev-nature-panel');
  function positionPanel() {
    const r = trigger.getBoundingClientRect();
    panel.style.top = (r.bottom + 3) + 'px';
    panel.style.left = r.left + 'px';
  }
  trigger.addEventListener('click', e => {
    e.stopPropagation();
    const willOpen = !panel.classList.contains('open');
    if (willOpen) positionPanel();
    panel.classList.toggle('open');
  });
  panel.addEventListener('click', e => {
    const item = e.target.closest('.nat-dd-item[data-n]');
    if (!item) return;
    _evTempNature = item.dataset.n;
    panel.classList.remove('open');
    _evRefresh();
  });
  // パネル外クリックで閉じる
  document.addEventListener('click', e => {
    if (!document.getElementById('ev-ov').classList.contains('vis')) return;
    if (!e.target.closest('#ev-nature-dd, #ev-nature-panel')) panel.classList.remove('open');
  });

  document.getElementById('ev-reset').addEventListener('click', () => {
    STAT_KEYS_6.forEach(k => _evTemp[k] = 0); _evRefresh();
  });

  document.getElementById('ev-ok').addEventListener('click', () => {
    partyEvs[_evSlot] = { ..._evTemp };
    partyNatures[_evSlot] = _evTempNature;
    savePcTabs();
    _closeEv();
    renderTable();
  });

  document.getElementById('ev-cancel').addEventListener('click', _closeEv);
  document.getElementById('ev-ov').addEventListener('click', e => {
    if (e.target.id === 'ev-ov') _closeEv();
  });

  // キーボード: ←/→ で ±1, ↑/↓ で行移動, Esc で閉じる
  document.addEventListener('keydown', e => {
    if (!document.getElementById('ev-ov').classList.contains('vis')) return;
    if (e.target.tagName === 'SELECT') return;
    if      (e.key === 'ArrowLeft')  { adjustSelected(-1); e.preventDefault(); }
    else if (e.key === 'ArrowRight') { adjustSelected(+1); e.preventDefault(); }
    else if (e.key === 'ArrowUp')    {
      const i = STAT_KEYS_6.indexOf(_evSelected);
      _evSelected = STAT_KEYS_6[(i - 1 + 6) % 6]; _evRefresh(); e.preventDefault();
    }
    else if (e.key === 'ArrowDown')  {
      const i = STAT_KEYS_6.indexOf(_evSelected);
      _evSelected = STAT_KEYS_6[(i + 1) % 6]; _evRefresh(); e.preventDefault();
    }
    else if (e.key === 'Escape') { _closeEv(); }
  });
})();

// ── 性格選択グリッドポップアップ (Pokemon Champions 方式 5x5) ──────────────
let _natSlot = null;

function _buildNatureIndex() {
  // 5x5 のマス目: row = up stat, col = down stat
  const idx = {};
  for (const [name, n] of Object.entries(NATURES)) {
    const up = n.up, down = n.down;
    if (!up || !down) continue;
    idx[`${up}|${down}`] = name;
  }
  return idx;
}
const NATURE_GRID_INDEX = _buildNatureIndex();

function openNaturePicker(slotIdx) {

  const nonNeutral = NATURE_NAMES.filter(n => {
    const nat = NATURES[n];
    return nat && nat.up !== nat.down;
  });
  const neutral = NATURE_NAMES.filter(n => {

(function() {

const LS_PC_TABS = "pokechan_pc_tabs_v1";

function captureCurrentPcState() {
  return {
    party: party.slice(),
    typeOrder: typeOrder.slice(),
    slotFilters: JSON.parse(JSON.stringify(slotFilters)),
    statVis: Object.assign({}, statVis),
    partyNatures: partyNatures.slice(),
    partyEvs: partyEvs.map(e => ({...e})),
  };
}
function applyPcState(s) {
  if (!s) return;
  party = (s.party || []).slice();
  while (party.length < PARTY_SIZE) party.push(null);
  party = party.slice(0, PARTY_SIZE);
  typeOrder = (s.typeOrder && s.typeOrder.length === TYPES.length)
    ? s.typeOrder.slice() : [...DEFAULT_TYPE_ORDER];
  slotFilters = JSON.parse(JSON.stringify(s.slotFilters || {}));
  statVis = Object.assign({}, STAT_VIS_DEFAULT, s.statVis || {});

  // 性格・ポイント (タブごとに保存)
  partyNatures = (s.partyNatures || []).slice();
  while (partyNatures.length < PARTY_SIZE) partyNatures.push('まじめ');
  partyNatures = partyNatures.slice(0, PARTY_SIZE);
  partyEvs = (s.partyEvs || []).map(e => ({hp:0,atk:0,def:0,spatk:0,spdef:0,spd:0,...(e||{})}));
  while (partyEvs.length < PARTY_SIZE) partyEvs.push({hp:0,atk:0,def:0,spatk:0,spdef:0,spd:0});
  partyEvs = partyEvs.slice(0, PARTY_SIZE);

  // 既存LSキーにも反映 (リロード時の整合性)
  localStorage.setItem(LS_PARTY,        JSON.stringify(party));
  localStorage.setItem(LS_ORDER,        JSON.stringify(typeOrder));
  localStorage.setItem(LS_SLOT_FILTERS, JSON.stringify(slotFilters));
  localStorage.setItem(LS_STAT_VIS,     JSON.stringify(statVis));
}
function savePcTabs() {
  // 現在の active タブの state を最新化
  const t = pcTabs.find(x => x.id === pcActiveId);
  if (t) t.state = captureCurrentPcState();
  try {
    localStorage.setItem(LS_PC_TABS, JSON.stringify({ tabs: pcTabs, activeId: pcActiveId, nextId: pcNextId }));
  } catch(e) {}
}
function loadPcTabs() {
  try {
    const s = localStorage.getItem(LS_PC_TABS);
    if (s) {
      const obj = JSON.parse(s);
      if (Array.isArray(obj.tabs) && obj.tabs.length > 0) {
        pcTabs = obj.tabs;
        // 旧名「メイン」→「タブ1」へマイグレーション
        pcTabs.forEach(t => { if (t.name === 'メイン') t.name = 'タブ1'; });
        pcActiveId = obj.activeId || pcTabs[0].id;
        pcNextId = obj.nextId || (Math.max(...pcTabs.map(t => t.id)) + 1);
        // active の state を現グローバルに反映
        const at = pcTabs.find(t => t.id === pcActiveId);
        if (at && at.state) applyPcState(at.state);
        return;
      }
    }
  } catch(e) {}
  // 初回起動 → 既存の単一データから初期タブ生成
  pcTabs = [{ id: 1, name: 'タブ1', state: captureCurrentPcState() }];
  pcActiveId = 1;
  pcNextId = 2;
  savePcTabs();
}

function switchPcTab(id) {
  if (id === pcActiveId) return;
  // 現在の状態を保存
  const cur = pcTabs.find(t => t.id === pcActiveId);
  if (cur) cur.state = captureCurrentPcState();
  pcActiveId = id;
  const next = pcTabs.find(t => t.id === id);
  if (next && next.state) applyPcState(next.state);
  savePcTabs();
  renderPcTabs();
  if (typeof renderTable === 'function') renderTable();
}
function addPcTab() {
  // 現タブ保存
  const cur = pcTabs.find(t => t.id === pcActiveId);
  if (cur) cur.state = captureCurrentPcState();
  const newId = pcNextId++;
  const newTab = {
    id: newId,
    name: 'タブ' + newId,
    state: {
      party: Array(PARTY_SIZE).fill(null),
      typeOrder: [...DEFAULT_TYPE_ORDER],
      slotFilters: {},
      statVis: Object.assign({}, STAT_VIS_DEFAULT),
    }
  };
  pcTabs.push(newTab);
  pcActiveId = newId;
  applyPcState(newTab.state);
  savePcTabs();
  renderPcTabs();
  if (typeof renderTable === 'function') renderTable();
}
function removePcTab(id) {
  if (pcTabs.length <= 1) { alert('タブは1個以上必要です'); return; }
  const t = pcTabs.find(t => t.id === id);
  if (!t) return;
  if (!confirm(`タブ「${t.name}」を削除しますか？\n(中身のパーティ・設定も全て消えます)`)) return;
  const idx = pcTabs.findIndex(x => x.id === id);
  pcTabs.splice(idx, 1);
  if (pcActiveId === id) {
    pcActiveId = pcTabs[Math.min(idx, pcTabs.length - 1)].id;
    const next = pcTabs.find(t => t.id === pcActiveId);
    if (next && next.state) applyPcState(next.state);
  }
  savePcTabs();
  renderPcTabs();
  if (typeof renderTable === 'function') renderTable();
}

//   base : 種族値そのまま

//   a    : 準振   (IV=31, EV=252, 性格補正なし)
//   b    : 最大   (IV=31, EV=252, 性格補正1.1)
//   rank : 順位 (a/base値の全国図鑑内順位)
const STAT_VIS_DEFAULT = { base:true, v6:false, c:false, a:true, b:true, rank:true };

// POKEMON_LIST の name + form を STAT_RANK のキー形式に変換
// 例: name="フシギバナ", form="通常"     → "フシギバナ"
//     name="メガフシギバナ", form="メガ進化" → "メガフシギバナ(メガ進化)"
function statRankKey(p) {
  if (!p) return null;
  const form = p.form || '通常';
  return form === '通常' ? p.name : `${p.name}(${form})`;
}

// Lv50 実数値計算 (IV=31 固定)
//   HP   : floor((B*2 + IV + EV/4)/2) + 60
//   他    : floor((floor((B*2 + IV + EV/4)/2) + 5) * nature)
function computeStat(base, key, ev, natureMul) {
  if (base == null) return null;
  if (key === 'hp') return Math.floor((base * 2 + 31 + Math.floor(ev/4)) / 2) + 60;
  const inner = Math.floor((base * 2 + 31 + Math.floor(ev/4)) / 2) + 5;
  return Math.floor(inner * natureMul);
}

// V6/C モードの値+ランキングをキャッシュ (suffix='v6' or 'c')
//   V6: IV=31, EV=0, 性格補正なし   (=性格無視 6V個体の実数値)
//   C : IV=31, EV=0, 性格補正1.1    (HP・合計は補正対象外)
function buildStatCache(suffix) {
  const natureMul = (suffix === 'c') ? 1.1 : 1.0;
  const cache = {};
  const STAT_KEYS_NATURE = ['atk','def','spatk','spdef','spd'];   // 性格補正対象
  const allNames = Object.keys(STAT_RANK);

  // 値計算
  for (const name of allNames) {
    const e = STAT_RANK[name];
    cache[name] = {};
    for (const k of STAT_KEYS_NATURE) {
      cache[name][`${k}_${suffix}`] = computeStat(e[`${k}_base`], k, 0, natureMul);
    }
    cache[name][`hp_${suffix}`]    = computeStat(e.hp_base, 'hp', 0, 1.0);
    cache[name][`total_${suffix}`] = STAT_KEYS_NATURE.reduce((s,k) => s + cache[name][`${k}_${suffix}`], 0) + cache[name][`hp_${suffix}`];
  }

  // ランキング (降順、同値は同順位)
  for (const k of [...STAT_KEYS_NATURE, 'hp', 'total']) {
    const sorted = allNames.map(n => ({n, v: cache[n][`${k}_${suffix}`]})).sort((a,b) => b.v - a.v);
    let prev = null, prevRank = 0;
    sorted.forEach((row, i) => {
      const rank = (row.v === prev) ? prevRank : i + 1;
      cache[row.n][`${k}_${suffix}_rank`] = rank;
      prev = row.v; prevRank = rank;
    });
  }
  return cache;
}

let _statCacheC  = null;
let _statCacheV6 = null;
function ensureStatCaches() {
  if (statVis.c  && !_statCacheC)  _statCacheC  = buildStatCache('c');
  if (statVis.v6 && !_statCacheV6) _statCacheV6 = buildStatCache('v6');
}

// 説明文から「優先度:+N」「優先度:-N」を抽出 → 数値
// 説明に書いてない場合はデフォルト 0 (通常技)
function extractPriority(desc) {
  if (!desc) return 0;
  const m = desc.match(/優先度[:：]\s*([+\-]?\d+)/);
  return m ? parseInt(m[1], 10) : 0;
}

// 検索用カナ正規化: カタカナ → ひらがな統一 (大文字小文字も統一)
// 例: "フシギバナ" と "ふしぎばな" を同一視できる
function normalizeKana(s) {
  if (!s) return "";
  return s.toLowerCase().replace(/[ァ-ヶ]/g, ch =>
    String.fromCharCode(ch.charCodeAt(0) - 0x60)
  );
}
// 部分一致(カナ正規化済み)
function fuzzyIncludes(haystack, needle) {
  if (!needle) return true;
  return normalizeKana(haystack || "").includes(normalizeKana(needle));
}

// ── タイプ相性 ────────────────────────────────────────────────────────────────
// section: 'weak' (×4, ×2) | 'resist' (½, ¼, ×0)
function resistHtml(resist, section) {
  const g = {4:[],2:[],0.5:[],0.25:[],0:[]};
  (resist||[]).forEach((v,i) => { if (g[v] !== undefined) g[v].push(TYPES[i]); });
  const badge = t => `<span class="tbadge" style="background:${TYPE_COLORS[t]}">${tDisp(t)}</span>`;
  const row = (mulCls, mulText, types) =>
    `<div><span class="r-mul ${mulCls}">${mulText}</span><span class="r-badges">${types.map(badge).join("")}</span></div>`;
  let html = "";
  if (section === 'weak') {
    if (g[4].length)    html += row("r4",  "×4", g[4]);
    if (g[2].length)    html += row("r2",  "×2", g[2]);
  } else {
    if (g[0.5].length)  html += row("r05",  "½", g[0.5]);
    if (g[0.25].length) html += row("r025", "¼", g[0.25]);
    if (g[0].length)    html += row("r0",  "×0", g[0]);
  }
  return html || `<span class="r-none">—</span>`;
}

// ── わざカバレッジセル ────────────────────────────────────────────────────────
function catClass(cat) {
  if (cat === "物理") return "phys";
  if (cat === "特殊") return "spec";
  return "stat";
}

// 分類を1文字に: 物理→物 特殊→特 変化→変
function catShortChar(cat) {
  if (cat === "物理") return "物";
  if (cat === "特殊") return "特";
  return "変";
}

// テーブルセル用: 1行 (技名 / 分類 / 威力 / 命中 / 接触)
// 説明はホバーtitleで表示
function wazaItemTableHtml(m) {
  // テーブルセル内は技名のみ、分類は文字色で示す (物=橙 / 特=青 / 変=灰)
  // 詳細はホバー(title)とモーダルで確認
  const descTip = (m.description || "").replace(/"/g, '&quot;');
  const catCls  = catClass(m.category);  // phys / spec / stat
  return `<div class="waza-item" title="${descTip}">
    <span class="w-name wn-${catCls}">${m.name}</span>
  </div>`;
}

// モーダル用: 1行 grid (技名 / タイプ / 分類 / 威力 / 命中 / PP / 接触 / 優先度 / 説明)
function wazaItemModalHtml(m) {
  const power    = m.power    != null ? m.power    : "—";
  const accuracy = m.accuracy != null ? m.accuracy : "—";
  const pp       = m.pp       != null ? m.pp       : "—";
  const contact  = m.contact === true ? "●" : (m.contact === false ? "○" : "—");
  const desc     = (m.description || "").trim();
  const descTip  = desc.replace(/"/g, '&quot;');
  const pri      = extractPriority(desc);
  const priStr   = pri > 0 ? `+${pri}` : `${pri}`;
  const priCls   = pri > 0 ? "w-pri pri-pos" : pri < 0 ? "w-pri pri-neg" : "w-pri pri-zero";
  const descAttr = desc.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<div class="waza-row" data-desc="${descAttr}">
    <span class="w-name">${m.name}</span>
    <span class="w-type" style="background:${TYPE_COLORS[m.type]}">${tDisp(m.type)}</span>
    <span class="w-cat ${catClass(m.category)}">${catShortChar(m.category)}</span>
    <span class="w-pow">威${power}</span>
    <span class="w-acc">命${accuracy}</span>
    <span class="w-pp">PP${pp}</span>
    <span class="w-contact">接${contact}</span>
    <span class="${priCls}">${priStr}</span>
    <span class="w-desc-inline">${desc}</span>
  </div>`;
}

function wazaCellHtml(pokeName, type, slotIdx) {
  const keys = POKEMON_WAZA[pokeName] || [];
  let moves = keys
    .map(k => WAZA_MAP[k])
    .filter(m => m && m.type === type && filterCats.has(m.category))
    .filter(m => fuzzyIncludes(m.name, filterWaza));

  // ポケモンがこのタイプの技を1個も持ってない → 完全空 + 非クリック
  if (moves.length === 0) return { html: "", clickable: false };

  // スロット×タイプ別フィルタ (per-type 構造 v2)
  const slotData = slotFilters[slotIdx];                       // undefined or {type: [...]}
  const pokeSel  = slotData && slotData[type];                  // undefined / [] / [keys]
  let displayMoves;
  let moreCount = 0;

  if (pokeSel !== undefined) {
    // 明示的にこのタイプを設定 (空配列でも honor)
    displayMoves = moves.filter(m => pokeSel.includes(m.key));
    if (displayMoves.length === 0) moreCount = moves.length;
  } else {
    // 未設定 → カウント表示のみ
    displayMoves = [];
    moreCount = moves.length;
  }

  let html = displayMoves.map(wazaItemTableHtml).join("");
  const isCountOnly = (moreCount > 0 && displayMoves.length === 0);
  if (isCountOnly) {
    // 分類別件数 (物理/特殊/変化) でブレイクダウン
    const bd = { 物理: 0, 特殊: 0, 変化: 0 };
    moves.forEach(m => { if (bd[m.category] !== undefined) bd[m.category]++; });
    const parts = [];
    if (bd.物理 > 0) parts.push(`<span class="bd-phys">物${bd.物理}</span>`);
    if (bd.特殊 > 0) parts.push(`<span class="bd-spec">特${bd.特殊}</span>`);
    if (bd.変化 > 0) parts.push(`<span class="bd-stat">変${bd.変化}</span>`);
    html += `<div class="waza-more">${parts.join(" ")}</div>`;
  }
  return { html, clickable: true, isCountOnly };
}

// ── テーブル描画 ──────────────────────────────────────────────────────────────
function renderTable() {
  const table = document.getElementById("cmp-table");
  const rows = [];

  // 種族値 (各ボタンのON/OFFで列を選択表示)
  // 略号: H=HP, A=こうげき, B=ぼうぎょ, C=とくこう, D=とくぼう, S=すばやさ (合計は記号なし)
  const STAT_LETTER = { hp:"H", atk:"A", def:"B", spatk:"C", spdef:"D", spd:"S", total:"" };
  // ドラッグ用属性 (列移動可能セル共通)
  const dragAttrs = (i) => `draggable="true" ondragstart="onSlotDragStart(event,${i})" ondragover="onSlotDragOver(event,${i})" ondragleave="this.classList.remove('drag-over')" ondrop="onSlotDrop(event,${i})"`;
  ensureStatCaches();

  [["HP","hp"],["こうげき","atk"],["ぼうぎょ","def"],["とくこう","spatk"],["とくぼう","spdef"],["すばやさ","spd"],["合計","total"]].forEach(([label,key]) => {
    rows.push(`<tr>
      <td class="row-label">${label}</td>
      ${party.map((name, slotIdx) => {
        const p = name && POKE_MAP[name];
        if (!p) return `<td class="stat-cell empty-slot-cell" ${dragAttrs(slotIdx)} onclick="openModal(${slotIdx})"></td>`;
        const srKey = statRankKey(p);
        const e = STAT_RANK[srKey];

        // 性格補正 (略号と base の色付け用)
        const nat = NATURES[partyNatures[slotIdx]] || {};
        const natIsNeutral = nat.up === nat.down;
        const natUp   = !natIsNeutral && key !== 'total' && nat.up   === key;
        const natDown = !natIsNeutral && key !== 'total' && nat.down === key;
        const letterCls = natUp ? ' nature-up' : natDown ? ' nature-down' : '';
        const letter = `<span class="stat-letter${letterCls}">${STAT_LETTER[key] || ""}</span>`;

        if (!e) {
          return `<td class="${key==="total"?"stat-cell stat-total":"stat-cell"}">${letter}<span class="sv">${p[key] ?? "—"}</span></td>`;
        }
        const isHpOrTotal = (key === "hp" || key === "total");
        const isTotal     = (key === "total");
        const cell = (cls, val, tip) => `<span class="sv ${cls}"${tip?` title="${tip}"`:''}>${val ?? ""}</span>`;
        let html = letter;
        const pts = (!isTotal) ? (partyEvs[slotIdx][key] || 0) : 0;

        if (statVis.base) {
          if (isTotal) {
            html += cell("sm-base", e[`${key}_base`], "種族値");
          } else {
            // クリックでステータス調整ポップアップ
            const baseV = e[`${key}_base`];
            const baseCls = ['sv','sm-base','sv-base-click',
              pts >= PT_MAX_PER_STAT ? 'sv-pt-max' : pts > 0 ? 'sv-pt-has' : '',
              !pts && natUp ? 'sv-base-nat-up' : !pts && natDown ? 'sv-base-nat-down' : ''
            ].filter(Boolean).join(' ');
            html += `<span class="${baseCls}" onclick="openStatPopup(${slotIdx})" title="クリックしてポイント割り振り (+${pts})">${baseV ?? ""}</span>`;
          }
        }
        if (statVis.v6) {
          if (isTotal) {
            const t = STAT_KEYS_6.reduce((s,k) => {
              const b = e[`${k}_base`];
              const ptsK = (partyEvs[slotIdx][k] || 0);
              return s + (computeActualStat(b, k, ptsK, partyNatures[slotIdx]) ?? 0);
            }, 0);
            html += cell("sm-v6", t, "現値合計 (Lv50・IV31・性格・pt込み)");
          } else {
            // 現値: V6 ベースに性格1.1/0.9 と +pts を反映 (Champions 方式)
            const actual = computeActualStat(e[`${key}_base`], key, pts, partyNatures[slotIdx]);
            const v6Cls = ['sv','sm-v6','sv-base-click',
              pts >= PT_MAX_PER_STAT ? 'sv-pt-max' : pts > 0 ? 'sv-pt-has' : '',
              !pts && natUp ? 'sv-base-nat-up' : !pts && natDown ? 'sv-base-nat-down' : ''
            ].filter(Boolean).join(' ');
            html += `<span class="${v6Cls}" onclick="openStatPopup(${slotIdx})" title="現値 (V6 × ${partyNatures[slotIdx]} + ${pts}pt) — クリックで割り振り">${actual ?? ""}</span>`;
          }
        }
        if (statVis.c) {
          // 性補: HP・合計は補正対象外なので、表示しない (空セル)
          if (isTotal) {
            html += cell("sm-c", "", "");
          } else {
            const v = (_statCacheC && _statCacheC[srKey]) ? _statCacheC[srKey][`${key}_c`] : null;
            html += cell("sm-c", v, "性補 (IV=31, EV=0, 性格1.1)");
          }
        }
        if (statVis.a) {
          if (isTotal) {
            html += cell("sm-a", "", "");
          } else {
            html += cell("sm-a", e[`${key}_a`], "準振 (EV252・性格補正なし)");
          }
        }
        if (statVis.b) {
          if (isTotal || isHpOrTotal) {
            html += cell("sm-b", "", "");
          } else {
            html += cell("sm-b", e[`${key}_b`], "最大 (EV252・性格1.1)");
          }
        }

        if (statVis.rank) {
          const rank = e[`${key}_a_rank`];
          html += `<span class="stat-rank">${rank ? `(${rank})` : ""}</span>`;
        }
        const tdClick = (!isTotal) ? ` onclick="openStatPopup(${slotIdx})"` : '';
        const tdStyle = (!isTotal) ? ` style="cursor:pointer"` : '';
        return `<td class="${key==="total"?"stat-cell stat-total":"stat-cell"}" ${dragAttrs(slotIdx)}${tdClick}${tdStyle}>${html}</td>`;
      }).join("")}
    </tr>`);
  });

  // 性格選択行 (合計の下・特性の上) — クリックでグリッドポップアップを開く
  rows.push(`<tr>
    <td class="row-label">性格</td>
    ${party.map((name, slotIdx) => {
      const p = name && POKE_MAP[name];
      if (!p) return `<td class="empty-slot-cell" ${dragAttrs(slotIdx)} onclick="openModal(${slotIdx})"></td>`;
      return `<td style="text-align:center;padding:2px 3px" ${dragAttrs(slotIdx)}>
        <span class="nature-cell" onclick="openNaturePicker(${slotIdx})" title="クリックして性格を選ぶ">${partyNatures[slotIdx]}</span>
      </td>`;
    }).join("")}
  </tr>`);

  // 特性
  rows.push(`<tr>
    <td class="row-label">特性</td>
    ${party.map((name, slotIdx) => {
      const p = name && POKE_MAP[name];
      if (!p) return `<td class="empty-slot-cell" ${dragAttrs(slotIdx)} onclick="openModal(${slotIdx})"></td>`;
      const abs = [p.ab1,p.ab2,p.ab3].filter(Boolean);
      if (abs.length === 0) return `<td class="ab-cell" ${dragAttrs(slotIdx)}>—</td>`;
      return `<td class="ab-cell" ${dragAttrs(slotIdx)}>${abs.map(a => {
        const desc = ABILITY_DESC[a] || "（説明データ未取得）";
        const descAttr = desc.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<span class="ab-name" data-desc="${descAttr}">${a}</span>`;
      }).join(" / ")}</td>`;
    }).join("")}
  </tr>`);

  // タイプ相性 — 弱点 (×4, ×2)
  rows.push(`<tr>
    <td class="row-label" style="white-space:normal;font-size:.68rem">弱点</td>
    ${party.map((name, slotIdx) => {
      const p = name && POKE_MAP[name];
      if (!p) return `<td class="empty-slot-cell" ${dragAttrs(slotIdx)} onclick="openModal(${slotIdx})"></td>`;
      return `<td class="resist-cell" ${dragAttrs(slotIdx)}>${resistHtml(p.resist||[], 'weak')}</td>`;
    }).join("")}
  </tr>`);
  // タイプ相性 — 耐性 (½, ¼, ×0)
  rows.push(`<tr>
    <td class="row-label" style="white-space:normal;font-size:.68rem">耐性</td>
    ${party.map((name, slotIdx) => {
      const p = name && POKE_MAP[name];
      if (!p) return `<td class="empty-slot-cell" ${dragAttrs(slotIdx)} onclick="openModal(${slotIdx})"></td>`;
      return `<td class="resist-cell" ${dragAttrs(slotIdx)}>${resistHtml(p.resist||[], 'resist')}</td>`;
    }).join("")}
  </tr>`);

  // 手持ち (ポケモン名)
  rows.push(`<tr>
    <td class="row-label" style="text-align:center;vertical-align:middle;font-size:.68rem">手持ち</td>
    ${party.map((name, slotIdx) => {
      if (!name) return `<td class="poke-name-cell empty-slot-cell" ${dragAttrs(slotIdx)} onclick="openModal(${slotIdx})" style="cursor:pointer">スロット${slotIdx+1}<br><span style="font-size:.73rem">＋ 選択</span></td>`;
      const p = POKE_MAP[name];
      const displayName = (window.I18N && window.I18N.pokemon) ? window.I18N.pokemon(name) : name;
      if (!p)   return `<td class="poke-name-cell" ${dragAttrs(slotIdx)}><span class="poke-name-big">${displayName}</span></td>`;
      const types = [p.type1, p.type2].filter(Boolean);
      return `<td class="poke-name-cell" ${dragAttrs(slotIdx)} onclick="openModal(${slotIdx})" style="cursor:grab">
        <span class="poke-name-big">${displayName}</span>
        <div class="type-row">${types.map(t=>`<span class="tbadge" style="background:${TYPE_COLORS[t]}">${tDisp(t)}</span>`).join("")}</div>
      </td>`;
    }).join("")}
  </tr>`);

  // 持ち物 (スロット毎にクリックでモーダル)
  rows.push(`<tr>
    <td class="row-label" style="text-align:center;vertical-align:middle;font-size:.68rem">持ち物</td>
    ${party.map((name, slotIdx) => {
      if (!name) return `<td class="item-cell empty-slot-cell"></td>`;
      const cur = partyItems[slotIdx] || "";
      const curItem = cur ? ITEM_BY_KEY[cur] : null;
      const label = curItem ? curItem.name : '＋ 選択';
      const cls = curItem ? '' : 'empty';
      const title = curItem ? (curItem.effect || curItem.name) : 'クリックで持ち物を選ぶ';
      return `<td class="item-cell" data-slot="${slotIdx}" onclick="openItemModal(${slotIdx})" title="${title.replace(/"/g,'&quot;')}">
        <span class="item-pill ${cls}">${label}</span>
