let currentModalSide = null;

function openPokeModal(side, anchorEl){
  currentModalSide = side;
  const modal = document.getElementById('poke-modal');
  modal.querySelector('.who').textContent = side === 'self' ? '（自分側）' : '（相手側）';
  document.getElementById('poke-search').value = '';
  renderPokeList('');
  modal.classList.add('vis');
  // クリックした場所の近くにモーダルを出す(マウス移動を減らす)。anchor 無しなら中央。
  positionModalBox(modal.querySelector('.modal-box'), anchorEl);
  setTimeout(()=>document.getElementById('poke-search').focus(), 50);
}

// モーダル本体を anchorEl の直下(はみ出すなら上/端に寄せる)に固定配置。anchor 無しは中央に戻す。
function positionModalBox(box, anchorEl){
  if (!box) return;
  if (!anchorEl){
    box.style.position = ''; box.style.left = ''; box.style.top = ''; box.style.margin = '';
    return;
  }
  const r = anchorEl.getBoundingClientRect();
  box.style.position = 'fixed';
  box.style.margin = '0';
  box.style.left = '0px'; box.style.top = '0px';   // 一旦置いてサイズ確定
  const bw = box.offsetWidth, bh = box.offsetHeight, gap = 6, pad = 8;
  let left = r.left + r.width / 2 - bw / 2;   // カードの中央に揃える
  let top = r.bottom + gap;
  if (top + bh > window.innerHeight - pad) top = r.top - gap - bh;          // 下に入らなければ上へ
  if (top < pad) top = Math.max(pad, window.innerHeight - pad - bh);        // それでも無理なら下端合わせ
  if (left + bw > window.innerWidth - pad) left = window.innerWidth - pad - bw;
  if (left < pad) left = pad;
  box.style.left = left + 'px';
  box.style.top = top + 'px';
}

function closePokeModal(){
  document.getElementById('poke-modal').classList.remove('vis');
  // 次回 中央表示にも戻せるよう インライン位置を解除
  const box = document.querySelector('#poke-modal .modal-box');
  if (box){ box.style.position=''; box.style.left=''; box.style.top=''; box.style.margin=''; }
  currentModalSide = null;
}

// ひらがな→カタカナに正規化(検索を かな区別なしに。例: 「やみ」で「ヤミラミ」がヒット)
function toKata(s){ return String(s).replace(/[ぁ-ゖ]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60)); }
function renderPokeList(q){
  const list = document.getElementById('poke-list');
  list.innerHTML = '';
  const ql = toKata(q.trim().toLowerCase());
  const filtered = TEST_POKEMON.concat(POKEMON_LIST).filter(p=>{   // ダミーは先頭に表示
    if (!ql) return true;
    const label = toKata((p.name + (p.form && p.form !== '通常' ? p.form : '')).toLowerCase());
    return label.includes(ql);
  }).slice(0, 200);   // 表示は上位200件まで

  filtered.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'm-item';
    const formTag = p.form && p.form !== '通常' ? `<span style="color:#8b949e;font-size:10px">(${p.form})</span>` : '';
    item.innerHTML = `
      <span class="m-name">${p.name} ${formTag}</span>
      <span class="m-types">
        ${[p.type1, p.type2].filter(Boolean).map(t=>`<span class="t-badge t-${t}">${t}</span>`).join('')}
      </span>
    `;
    item.addEventListener('click', ()=>{
      if (currentModalSide){
        const st = sides[currentModalSide];
        st.poke = p;
        // ポケモン変更時はバトル状態をリセット
        st.currentHp = null;
        st.fainted = false;
        st.badpoisonCounter = 0;
        st.rank = {atk:0,def:0,spatk:0,spdef:0,spd:0,acc:0,eva:0};
        st.selectedMoveIdx = 0;
        st.moves = usableMoves(p);   // そのポケモンが覚える全技を一覧表示(先頭を選択中)
        st.moveSearch = '';
        st.status = 'none';
        st.flinched = false;
        st.confusion = 0;
        st.pendingStatus = null;
        st.turnsOut = 0;
        render(currentModalSide);
      }
      closePokeModal();
    });
    list.appendChild(item);
  });

  if (!filtered.length){
    list.innerHTML = '<div style="padding:20px;color:#8b949e;text-align:center">該当なし</div>';
  }
}

const HANDOFF_KEY = 'pokechan_battle_handoff_v1';

function loadHandoff(){
  try{
    const raw = localStorage.getItem(HANDOFF_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (!data || !Array.isArray(data.party)) return null;
    return data;
  }catch(e){
    console.warn('handoff parse error', e);
    return null;
  }
}

function renderHandoffBar(){
  const data = loadHandoff();
  const bar = document.getElementById('handoff-bar');
  const chipsEl = document.getElementById('handoff-chips');

  const valid = data.party.filter(p=>p);

  bar.classList.add('vis');
  chipsEl.innerHTML = '';
  data.party.forEach(p=>{
    if (!p) return;
    const poke = POKE_MAP_BY_NAME[p.name];

function applyHandoffToSide(side, p){
  const poke = POKE_MAP_BY_NAME[p.name];

    alert('「' + p.name + '」が POKEMON_LIST に見つかりません。pokechan_data.js を確認してください。');

  const st = sides[side];

  st.rank = {atk:0,def:0,spatk:0,spdef:0,spd:0,acc:0,eva:0};
  st.selectedMoveIdx = 0;
  st.effort = {hp:0,atk:0,def:0,spatk:0,spdef:0,spd:0, ...(p.effort||{})};
  const natIdx = NATURE_LIST.findIndex(([n])=>n === p.nature);
  st.natureIdx = natIdx >= 0 ? natIdx : 0;

//   ・HP実数値999(基礎924→floor((924*2+31)/2)+60=999)=テスト中に倒れにくい

// 弱点・耐性表示用の resist(SSOT形式の18倍率)を TYPE_CHART から計算して付与
function registerTestPokemon(){
  TEST_POKEMON.forEach(p=>{

// 起動時のデフォルト編成(リロードのたびに選び直さずテストできるように)。
// 希望のポケモン・技をセット。技は希望名→無ければ威力上位で4枠を埋める(データ欠けに強い)。
// テスト用ダミー同士(みず vs みず=無効タイプなし)で、リロード直後からテストを回せる。
const DEFAULT_SETUP = {
  self: { name: 'テスト(みず)', moves: ['たいあたり'] },
  opp:  { name: 'テスト(みず)', moves: ['たいあたり'] },
};
function applyDefaultSetup(){
  if (typeof WAZA_MAP === 'undefined') return;
  ['self', 'opp'].forEach(side=>{
    const w = DEFAULT_SETUP[side];
    const poke = POKE_MAP_BY_NAME[w.name] || POKEMON_LIST[0];
    if (!poke) return;
    const st = sides[side];
    st.poke = poke;
    st.currentHp = null; st.fainted = false; st.badpoisonCounter = 0;
    st.rank = {atk:0,def:0,spatk:0,spdef:0,spd:0,acc:0,eva:0};
    st.status = 'none'; st.flinched = false; st.confusion = 0; st.pendingStatus = null; st.turnsOut = 0;
    st.selectedMoveIdx = 0;
    st.effort = {hp:0,atk:0,def:0,spatk:0,spdef:0,spd:0, ...(poke.effort||{})};
    const natIdx = NATURE_LIST.findIndex(([n])=>n === poke.nature);
    st.natureIdx = natIdx >= 0 ? natIdx : 0;
    const selEl = document.getElementById('side-'+side) && document.getElementById('side-'+side).querySelector('.nature-select');
    if (selEl) selEl.value = st.natureIdx;
    st.ability = '';

    const learn = usableMoves(poke);

    st.selectedMoveIdx = selIdx;
  });
}

// 技スロットをクリックして「使う技」を選択、または ⚔ 実行ボタンで片側攻撃
function attachMoveSelect(){
  document.querySelectorAll('.side').forEach(sideEl=>{
    const side = sideEl.dataset.side;
    sideEl.addEventListener('click', e=>{
      // 並び替えチップ(威力順/タイプ)
      const sortChip = e.target.closest('.pool-sort-chip');
      if (sortChip){
        e.stopPropagation();
        sides[side].poolSort = sortChip.dataset.sort || 'power';
        render(side);
        return;
      }
      // 絞り込みチップ(物理/特殊/変化)→ そのカテゴリだけ表示(同じものを再クリックで全表示に戻す)
      const filtChip = e.target.closest('.pool-filter-chip');
      if (filtChip){
        e.stopPropagation();
        const c = filtChip.dataset.cat;
        sides[side].poolFilter = (sides[side].poolFilter === c) ? null : c;
        render(side);
        return;
      }
      // 「選択」ボタン → ターン実行で使う技に設定(スクロール位置は保つ)
      const selBtn = e.target.closest('.m-select-btn');
      if (selBtn){
        e.stopPropagation();
        const idx = parseInt(selBtn.dataset.moveIdx, 10);
        if (isNaN(idx)) return;
        const sc = sideEl.querySelector('.moves-scroll');
        const top = sc ? sc.scrollTop : 0;
        sides[side].selectedMoveIdx = idx;
        render(side);
        const sc2 = sideEl.querySelector('.moves-scroll');
        if (sc2) sc2.scrollTop = top;
        return;
      }
      // ⚔ 実行ボタン → 片側だけ即時攻撃
      const btn = e.target.closest('.m-attack-btn');
      if (btn){
        e.stopPropagation();
        const idx = parseInt(btn.dataset.moveIdx, 10);
        if (isNaN(idx)) return;
        sides[side].selectedMoveIdx = idx;
        runSingleAttack(side, idx);
        return;
      }
      // 行のどこ(タイプ/技名/説明など)をクリックしても選択中にする(ボタン以外)
      const row = e.target.closest('.moves-scroll .move-row');
      if (row){
        const idx = parseInt(row.dataset.moveIdx, 10);
        if (isNaN(idx)) return;
        const sc = sideEl.querySelector('.moves-scroll');
        const top = sc ? sc.scrollTop : 0;
        sides[side].selectedMoveIdx = idx;
        render(side);
        const sc2 = sideEl.querySelector('.moves-scroll');
        if (sc2) sc2.scrollTop = top;
        return;
      }
    });
    // 技の検索(ひらがなOK・かな区別なし)→ 一致しない行を隠す。再renderでも維持するため st に保存。
    sideEl.addEventListener('input', e=>{
      const inp = e.target.closest('.move-row-search');
      if (!inp) return;
      sides[side].moveSearch = inp.value;
      applyMoveRowSearch(sideEl, inp.value);
    });
  });
}

// === 技説明のホバーポップアップ(data-tip を持つ要素に乗せると全文表示) ===
let _moveTipEl = null;
function showMoveTip(anchorEl, text){
  if (!text) return;
  if (!_moveTipEl){ _moveTipEl = document.createElement('div'); _moveTipEl.id = 'move-tip'; document.body.appendChild(_moveTipEl); }
  const tip = _moveTipEl;
  tip.textContent = text;
  tip.style.display = 'block';
  const r = anchorEl.getBoundingClientRect();
  const tw = tip.offsetWidth, th = tip.offsetHeight, pad = 8, gap = 6;
  let left = r.left;
  let top = r.bottom + gap;
  if (top + th > window.innerHeight - pad) top = r.top - gap - th;   // 下に入らなければ上に
  if (top < pad) top = pad;
  if (left + tw > window.innerWidth - pad) left = window.innerWidth - pad - tw;
  if (left < pad) left = pad;
  tip.style.left = left + 'px';
  tip.style.top = top + 'px';
}
function hideMoveTip(){ if (_moveTipEl) _moveTipEl.style.display = 'none'; }
function setupMoveTooltip(){
  document.addEventListener('mouseover', e=>{
    const t = e.target.closest && e.target.closest('[data-tip]');
    if (t && t.dataset.tip) showMoveTip(t, t.dataset.tip);
  });
  document.addEventListener('mouseout', e=>{
    const t = e.target.closest && e.target.closest('[data-tip]');
    if (!t) return;
    if (e.relatedTarget && t.contains(e.relatedTarget)) return;   // 同要素内の移動は無視
    hideMoveTip();
  });
  document.addEventListener('scroll', hideMoveTip, true);          // スクロールしたら消す(位置ずれ防止)
}

  _movePickerSlot = slotIdx;
  const pokeName = pokeFullName(st.poke);
  // 現在セット済みの技 key を initial に渡してチェックを引き継ぐ
  const currentKeys = (st.moves || [])
    .map(m => m && m.key).filter(Boolean);
  const params = new URLSearchParams();
  params.set('mode', 'multi');
  params.set('pokemon', pokeName);
  params.set('lock', '1');
  if (currentKeys.length) params.set('initial', currentKeys.join(','));
  const url = 'waza-list.html?' + params.toString();
  const iframe = document.getElementById('move-picker-iframe');
  const title = document.getElementById('move-picker-title');
  const modal = document.getElementById('move-picker-modal');
  if (title) title.textContent = `${side === 'self' ? '自分' : '相手'}側 ${pokeName} — 技を選択 (複数可)`;
  if (iframe) iframe.src = url;
  if (modal) modal.classList.add('vis');
}
function closeMovePickerModal(){
  const modal = document.getElementById('move-picker-modal');
  const iframe = document.getElementById('move-picker-iframe');
  if (modal) modal.classList.remove('vis');
  if (iframe) iframe.src = 'about:blank';
  _movePickerSide = null;
  _movePickerSlot = null;
}
// 閉じるボタンとオーバーレイクリック
(function setupMovePickerCloseHandlers(){
  const closeBtn = document.getElementById('move-picker-close');
  if (closeBtn) closeBtn.addEventListener('click', closeMovePickerModal);
  const modal = document.getElementById('move-picker-modal');
  if (modal) modal.addEventListener('click', e => {
    if (e.target === modal) closeMovePickerModal();
  });
})();
// iframe からの postMessage (waza-picker)
window.addEventListener('message', (e) => {
  const d = e.data || {};
  // 複数選択 (mode=multi の確定)
  if (d.type === 'waza-picker:confirm') {
    if (_movePickerSide != null && Array.isArray(d.keys)) {
      const st = sides[_movePickerSide];
      const wazaMap = (typeof WAZA_MAP !== 'undefined') ? WAZA_MAP : {};
      st.moves = d.keys
        .map(k => wazaMap[k])
        .filter(Boolean)
        .slice(0, 4);
      // 選択中インデックスが範囲外になったらリセット
      if (st.selectedMoveIdx != null && st.selectedMoveIdx >= st.moves.length) {
        st.selectedMoveIdx = null;
      }
      render(_movePickerSide);
    }
    closeMovePickerModal();
  }
  // 単一選択 (mode=single の互換ハンドラ; 現状未使用だが残しておく)
  else if (d.type === 'waza-picker:pick') {
    if (_movePickerSide != null && _movePickerSlot != null && d.key) {
      const move = (typeof WAZA_MAP !== 'undefined') ? WAZA_MAP[d.key] : null;
      if (move) {
        const st = sides[_movePickerSide];
        st.moves = st.moves || [];
        st.moves[_movePickerSlot] = move;
        render(_movePickerSide);
      }
    }
    closeMovePickerModal();
  } else if (d.type === 'waza-picker:cancel') {
    closeMovePickerModal();
  }
});

// バトル進行ボタン
function attachBattleControl(){
  const start = document.getElementById('btn-start-battle');
  const turn  = document.getElementById('btn-run-turn');
  const undo  = document.getElementById('btn-undo-battle');
  const reset = document.getElementById('btn-reset-battle');
  const full  = document.getElementById('btn-full-reset');
  if (start) start.addEventListener('click', startBattle);
  if (turn)  turn.addEventListener('click', runTurn);
  if (undo)  undo.addEventListener('click', undoBattle);
  if (full)  full.addEventListener('click', fullResetBattle);
  if (reset) reset.addEventListener('click', resetBattle);
}
</script>
