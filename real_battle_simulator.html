<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  font-family:-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  background:#0d1117;color:#e6edf3;font-size:12px;
  display:flex;flex-direction:column;min-height:100vh;
}
header{padding:10px 16px;background:#161b22;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:14px}
h1{font-size:15px;color:#79c0ff;font-weight:700}
.head-note{font-size:11px;color:#8b949e}
.bs-nav{margin-left:auto;display:flex;gap:6px;align-items:center}
.bs-nav-btn{padding:3px 10px;background:#21262d;border:1px solid #30363d;border-radius:4px;color:#79c0ff;cursor:pointer;font-size:11px;font-weight:700;line-height:1.4;text-decoration:none;display:inline-block}
.bs-nav-btn:hover{background:#1c6ab7;color:#fff;border-color:#1c6ab7}
.bs-nav-btn.nav-db{background:#2E86AB;color:#fff;border-color:#2E86AB}
.bs-nav-btn.nav-db:hover{background:#246B89;border-color:#246B89}
.bs-nav-btn.nav-checker{background:#27AE60;color:#fff;border-color:#27AE60}
.bs-nav-btn.nav-checker:hover{background:#1E8449;border-color:#1E8449}
.bs-nav-btn.nav-waza{background:#F39C12;color:#fff;border-color:#F39C12}
.bs-nav-btn.nav-waza:hover{background:#D68910;border-color:#D68910}
.bs-nav-btn.nav-type-chart{background:#2E8B57;color:#fff;border-color:#2E8B57}
.bs-nav-btn.nav-type-chart:hover{background:#246B45;border-color:#246B45}
.bs-nav-btn.nav-quick-sim{background:#5DADE2;color:#fff;border-color:#5DADE2}
.bs-nav-btn.nav-quick-sim:hover{background:#3498DB;border-color:#3498DB}

#arena{
  display:grid;grid-template-columns:1fr 340px 1fr;gap:10px;
  padding:12px;flex:1;min-height:0;
}
@media (max-width:1100px){
  #arena{grid-template-columns:1fr 1fr;}
  #env-panel{grid-column:1 / -1;order:-1;}
}
.side{
  background:#161b22;border:1px solid #21262d;border-radius:8px;
  padding:8px;display:flex;flex-direction:column;gap:4px;
  overflow-y:auto;
}
.side.self{border-left:4px solid #58a6ff}
.side.opp{border-left:4px solid #f85149}

/* ポケモン名カード（最上部・ヘッダー兼用） */
.poke-card{
  background:#0d1117;border:1px solid #30363d;border-radius:6px;
  padding:8px 10px;cursor:pointer;transition:.15s;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  margin-bottom:2px;
}
.poke-card:hover{border-color:#58a6ff;background:#1c2a3a}
.poke-name-wrap{display:flex;flex-direction:row;align-items:center;gap:8px;flex-wrap:wrap;flex:1;min-width:0}
.poke-name{font-size:15px;font-weight:700;color:#e6edf3}
.poke-name.empty{color:#8b949e;font-weight:400;font-style:italic}
.poke-types{display:flex;gap:4px;flex-wrap:wrap}
.t-badge{
  display:inline-block;padding:1px 7px;border-radius:10px;
  font-size:10px;font-weight:700;color:#fff;
  border:1px solid rgba(255,255,255,.15);
}
.poke-card .change-btn{font-size:10px;color:#8b949e;flex-shrink:0}

/* セクション見出しは非表示（色とレイアウトで判別） */
.sec-head, .side-label{display:none}

/* 能力値編集 (ビルダーの数値入力 UI をインラインに移植) */
.stat-rows{display:flex;flex-direction:column;gap:4px;font-size:12px;margin-top:2px}
.stat-row{
  display:grid;
  grid-template-columns: 4em 2.6em 2em 1.4em minmax(50px,1fr) 1.7em 1.4em 2em 4em;
  align-items:center;gap:4px;
  padding:5px 7px;background:#1a2540;border-radius:8px;
  border:2px solid transparent;transition:.1s;
}
.stat-row:hover{background:#22305a;border-color:#3a4a7a}
.stat-row.selected{background:#3a4a7a;border-color:#ffd633;box-shadow:0 0 0 1px rgba(255,214,51,.3)}

.stat-row.foot{
  display:flex;justify-content:space-between;align-items:center;
  background:#0d1117;color:#79c0ff;font-weight:700;
  padding:5px 9px;border-radius:6px;border:1px solid #21262d;
}
.stat-row.foot:hover{background:#0d1117;border-color:#21262d}
.stat-row.foot b{color:#79c0ff;font-variant-numeric:tabular-nums}
/* 性格セレクト＋実数値合計を1行に */
.stat-foot-row{display:flex;align-items:center;gap:8px;margin-top:2px}
.stat-foot-row .nature-select{flex:1 1 auto;min-width:0}
.stat-foot-row .stat-total-box{flex:0 0 auto;background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:5px 9px;font-size:12px;font-weight:700;color:#79c0ff;white-space:nowrap}
.stat-foot-row .stat-total-box b{color:#79c0ff;font-variant-numeric:tabular-nums}

.stat-row.nat-up .stat-key{color:#ff5c5c;font-weight:700}
.stat-row.nat-down .stat-key{color:#5cb0ff;font-weight:700}
.stat-row.nat-up .stat-jp,.stat-row.nat-down .stat-jp{color:inherit;opacity:.85}

.stat-key{
  color:#e6edf3;white-space:nowrap;text-align:left;
  display:flex;align-items:center;gap:3px;font-size:.85em;
}
.stat-letter{display:inline-block;min-width:1.1em;text-align:center;font-weight:700;font-size:1.05em}
.stat-jp{color:#8b949e;font-size:.78em;font-weight:normal}

/* 実数値 (左側、大きめ) */
.stat-actual{
  font-weight:700;font-size:1em;text-align:right;color:#e6edf3;
  font-variant-numeric:tabular-nums;
}
.stat-row.has-pts .stat-actual{color:#ffe066}
.stat-row.max-pts .stat-actual{color:#ff7b9d}

/* スライダーバー本体 (32分割の縦線) */
.stat-bar{
  position:relative;height:22px;background:#0d1117;
  border:1px solid #4a5a90;border-radius:4px;
  overflow:hidden;cursor:pointer;touch-action:none;user-select:none;
}
.stat-bar:hover{border-color:#79c0ff}
.stat-bar::after{
  content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(90deg, transparent 0, transparent calc(3.125% - 1px), rgba(255,255,255,.18) calc(3.125% - 1px), rgba(255,255,255,.18) 3.125%);
}
.stat-bar-fill{
  position:absolute;left:0;top:0;height:100%;
  background:linear-gradient(90deg,#ffe680,#c9b878);
  transition:width .08s,background .2s;pointer-events:none;z-index:1;
}
.stat-bar-preview{
  position:absolute;left:0;top:0;height:100%;width:0;
  background:linear-gradient(90deg,#ffe680,#c9b878);
  opacity:0;pointer-events:none;z-index:2;
  transition:width .04s,opacity .1s,background .2s;
}
.stat-bar:hover .stat-bar-preview{opacity:.45}
.stat-rows.budget-full .stat-bar-fill,
.stat-rows.budget-full .stat-bar-preview{
  background:linear-gradient(90deg,#ffb84d,#ff7733);
}

/* 性格 ↑/↓ 行: ボーナス pt 位置・無駄 pt 位置の縦ライン */
.stat-bonus-mark{
  position:absolute;top:0;bottom:0;width:3px;
  pointer-events:none;z-index:4;transform:translateX(-50%);
}
.stat-bonus-mark.bonus{background:rgba(255,215,80,.85);box-shadow:0 0 3px rgba(255,215,80,.6)}
.stat-bonus-mark.waste{background:rgba(80,100,140,.7)}

.stat-pts{
  font-weight:700;color:#e6edf3;text-align:center;
  font-variant-numeric:tabular-nums;font-size:.95em;
}
.stat-row.has-pts .stat-pts{color:#ffe066}
.stat-row.max-pts .stat-pts{color:#ff4d4d}

/* MIN / MAX / ◀ / ▶ */
.stat-row .stat-min,.stat-row .stat-max,
.stat-row .stat-dec,.stat-row .stat-inc{
  height:22px;border-radius:4px;border:1px solid #4a5a90;
  background:#22305a;color:#fff;cursor:pointer;font-weight:700;
  padding:0;line-height:1;font-family:inherit;
}
.stat-row .stat-dec,.stat-row .stat-inc{font-size:.85em}
.stat-row .stat-min,.stat-row .stat-max{font-size:.62em;letter-spacing:.04em}
.stat-row .stat-min:hover:not(:disabled),
.stat-row .stat-max:hover:not(:disabled),
.stat-row .stat-dec:hover:not(:disabled),
.stat-row .stat-inc:hover:not(:disabled){background:#2e406e;border-color:#79c0ff}
.stat-row .stat-min:disabled,.stat-row .stat-max:disabled,
.stat-row .stat-dec:disabled,.stat-row .stat-inc:disabled{opacity:.3;cursor:not-allowed}

/* ランク補正 ± (HP 以外) */
.stat-rank{text-align:center}
.stat-rank-ctrl{
  display:inline-flex;align-items:center;gap:2px;
  font-size:10px;color:#8b949e;
}
.stat-rank-ctrl button{
  width:14px;height:18px;padding:0;border:1px solid #30363d;border-radius:2px;
  background:#0d1117;color:#8b949e;font-size:10px;line-height:1;cursor:pointer;
  font-family:inherit;
}
.stat-rank-ctrl button:hover{border-color:#58a6ff;color:#fff}
.stat-rank-ctrl button:disabled{opacity:0.3;cursor:not-allowed}
.stat-rank-ctrl .rank-val{min-width:18px;display:inline-block;text-align:center;font-variant-numeric:tabular-nums}
.stat-rank-ctrl .rank-val.up{color:#ff9c9c;font-weight:700}
.stat-rank-ctrl .rank-val.down{color:#9cc8ff;font-weight:700}

/* 性格セレクタ */
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.row label{font-size:11px;color:#8b949e;font-weight:700;min-width:42px}
select,.styled-input{
  padding:4px 8px;border:1px solid #30363d;border-radius:4px;
  background:#0d1117;color:#e6edf3;font-size:12px;
  font-family:inherit;
}
select:focus,.styled-input:focus{outline:none;border-color:#58a6ff;background:#1c2a3a}

/* 能力Pサマリ */
/* タイプ相性表 */
.type-eff{display:flex;flex-direction:column;gap:4px;font-size:11px}
.te-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.te-mult{
  font-weight:700;min-width:34px;font-size:10px;
  padding:2px 6px;border-radius:3px;text-align:center;
}
.te-mult.x4{background:#5a1212;color:#ff7b72}
.te-mult.x2{background:#3a1f1f;color:#ffa39e}
.te-mult.x05{background:#1f3a5a;color:#9cc8ff}
.te-mult.x025{background:#0f2a4a;color:#79c0ff}
.te-mult.x0{background:#2d2d2d;color:#8b949e}

/* タイプカラー */
.t-ノーマル{background:#A8A77A}
.t-ほのお{background:#EE8130}
.t-みず{background:#6390F0}
.t-でんき{background:#F7D02C;color:#222 !important}
.t-くさ{background:#7AC74C}
.t-こおり{background:#96D9D6;color:#222 !important}
.t-かくとう{background:#C22E28}
.t-どく{background:#A33EA1}
.t-じめん{background:#E2BF65;color:#222 !important}
.t-ひこう{background:#A98FF3}
.t-エスパー{background:#F95587}
.t-むし{background:#A6B91A}
.t-いわ{background:#B6A136}
.t-ゴースト{background:#735797}
.t-ドラゴン{background:#6F35FC}
.t-あく{background:#705746}
.t-はがね{background:#B7B7CE;color:#222 !important}
.t-フェアリー{background:#D685AD}

/* モーダル共通 */
.modal-ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.78);z-index:200;
  align-items:center;justify-content:center;
}
.modal-ov.vis{display:flex}
.modal-box{
  background:#161b22;border:1px solid #30363d;border-radius:10px;
  padding:14px;width:90vw;max-width:480px;max-height:84vh;
  display:flex;flex-direction:column;gap:10px;
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #21262d;padding-bottom:8px;
}
.modal-head h3{font-size:14px;color:#79c0ff}
.modal-head .who{font-size:11px;color:#8b949e;margin-left:8px}
.modal-close{
  background:transparent;border:1px solid #30363d;color:#e6edf3;
  width:32px;height:32px;border-radius:6px;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{background:#21262d;border-color:#79c0ff}
.modal-search{
  padding:7px 10px;border-radius:5px;border:1px solid #30363d;
  background:#0d1117;color:#e6edf3;font-size:13px;width:100%;
}
.modal-list{overflow-y:auto;flex:1;min-height:200px;max-height:54vh}
.m-item{
  padding:7px 10px;cursor:pointer;border-radius:5px;transition:.1s;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.m-item:hover{background:#1c2a3a}
.m-item .m-name{font-size:13px;color:#e6edf3}
.m-item .m-types{display:flex;gap:3px}

/* 特性セレクタ */
.ability-wrap{display:flex;flex-direction:column;gap:3px}
.ability-desc{
  font-size:12px;color:#8b949e;background:#0d1117;
  border:1px solid #21262d;border-radius:4px;padding:4px 7px;
  line-height:1.3;
}
.ability-desc.empty{color:#484f58;font-style:italic}

/* 持ち物セレクタ */
.item-wrap{display:flex;flex-direction:column;gap:3px}
.item-pick-btn{
  background:#0d1117;border:1px solid #30363d;border-radius:4px;
  padding:6px 8px;cursor:pointer;font-family:inherit;text-align:left;
  display:flex;align-items:center;gap:6px;
}
.item-pick-btn:hover{border-color:#58a6ff;background:#1c2a3a}
.item-pill{
  display:inline-block;padding:2px 8px;font-size:12px;
  background:#0a0f15;color:#e6edf3;border:1px solid #30363d;border-radius:12px;
  max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.item-pill.empty{color:#6e7681;font-style:italic;border-style:dashed}

/* 持ち物選択モーダル */
#item-modal-ov{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:300;align-items:center;justify-content:center;
}
#item-modal-ov.vis{display:flex}
#item-modal-box{
  background:#161b22;border:1px solid #30363d;border-radius:12px;
  padding:14px;max-width:640px;width:92vw;max-height:85vh;
  display:flex;flex-direction:column;gap:10px;color:#e6edf3;
  font-family:'Helvetica Neue',-apple-system,'Hiragino Sans',sans-serif;
}
#item-modal-head{display:flex;align-items:center;justify-content:space-between}
#item-modal-head h3{margin:0;font-size:14px;color:#e6edf3}
#item-modal-close-x{
  background:transparent;border:1px solid #30363d;color:#e6edf3;
  width:32px;height:32px;border-radius:6px;font-size:18px;line-height:1;
  cursor:pointer;
}
#item-modal-close-x:hover{background:#21262d;border-color:#58a6ff;color:#fff}
#item-modal-list{overflow-y:auto;flex:1;padding-right:4px}
.item-cat-head{
  font-size:11px;color:#79c0ff;font-weight:700;
  padding:6px 4px 3px;border-bottom:1px solid #21262d;margin-top:6px;
}
.item-cat-head:first-child{margin-top:0}
.item-row{
  padding:6px 10px;border-radius:6px;cursor:pointer;transition:.1s;
  display:grid;grid-template-columns:minmax(110px,150px) 1fr;
  gap:10px;align-items:baseline;
}
.item-row:hover{background:#1c2a3a}
.item-row.selected{background:#1f4a1f;border:1px solid #2ea043}
.item-row .item-row-name{font-size:13px;color:#e6edf3;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-row .item-row-desc{font-size:12px;color:#8b949e;line-height:1.25}
.item-row.none-row{grid-template-columns:1fr}
.item-row.none-row .item-row-name{color:#6e7681;font-style:italic}

/* 弱点・耐性ボックス枠 */
.type-eff.weakness,.type-eff.resist{
  background:#0d1117;border:1px solid #21262d;border-radius:5px;
  padding:4px 7px;
}
.type-eff.empty{color:#484f58;font-style:italic;font-size:11px}

/* 受信チームバー */
#handoff-bar{
  display:none;background:#1a1f2e;border:1px solid #30363d;border-radius:6px;
  margin:8px 12px 0;padding:8px 12px;flex-shrink:0;
}
#handoff-bar.vis{display:block}
#handoff-bar .hf-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
#handoff-bar h3{font-size:12px;color:#79c0ff;font-weight:700}
#handoff-bar .hf-clear{
  background:transparent;border:1px solid #30363d;color:#8b949e;
  padding:2px 8px;border-radius:4px;cursor:pointer;font-size:10px;
}
#handoff-bar .hf-clear:hover{border-color:#da3633;color:#ff7b72}
#handoff-bar .hf-row{display:flex;gap:6px;flex-wrap:wrap}
.hf-chip{
  background:#0d1117;border:1px solid #30363d;border-radius:5px;
  padding:6px 8px;display:flex;flex-direction:column;gap:5px;min-width:140px;
}
.hf-chip-name{font-size:12px;font-weight:700;color:#e6edf3}
.hf-chip-types{display:flex;gap:3px}
.hf-chip-meta{font-size:10px;color:#8b949e}
.hf-chip-btns{display:flex;gap:4px;margin-top:2px}
.hf-chip-btns button{
  flex:1;padding:3px 6px;border-radius:3px;font-size:10px;cursor:pointer;
  border:1px solid #30363d;background:#21262d;color:#e6edf3;font-weight:700;
}
.hf-chip-btns .hf-self{border-color:#58a6ff;color:#79c0ff}
.hf-chip-btns .hf-self:hover{background:#1c2a3a}
.hf-chip-btns .hf-opp{border-color:#f85149;color:#ff7b72}

/* 技スロット表示 */
.moves-list{display:flex;flex-direction:column;gap:4px}
.move-row{
  display:flex;flex-direction:column;gap:3px;
  padding:5px 7px;background:#0d1117;border:1px solid #21262d;
  border-radius:4px;font-size:11px;
}
.move-head{
  display:grid;grid-template-columns:auto 1fr 44px 40px 36px auto;
  gap:6px;align-items:center;
}
.m-attack-btn{
  padding:2px 8px;border:1px solid #8a7b5c;border-radius:3px;
  background:#26221a;color:#e6d6b3;font-size:10px;font-weight:700;
  cursor:pointer;white-space:nowrap;font-family:inherit;
}
.m-attack-btn:hover{background:#34301f;color:#f3e6c4;border-color:#b5a06f}
.m-attack-btn:disabled{opacity:.4;cursor:not-allowed;background:#1c1c1c;color:#6e7681;border-color:#30363d}
.move-row .m-type{padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700;color:#fff}
.move-row .m-name{color:#e6edf3;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.move-row .m-cat{font-size:10px;padding:1px 5px;border-radius:8px;text-align:center}
.move-row .m-cat.物理{background:#5a1212;color:#ff9c9c}
.move-row .m-cat.特殊{background:#1f3a5a;color:#9cc8ff}
.move-row .m-cat.変化{background:#3a3a3a;color:#c0c0c0}
.move-row .m-pow,.move-row .m-acc,.move-row .m-pp{
  color:#e6edf3;text-align:center;font-variant-numeric:tabular-nums;font-size:10px;
}
.moves-empty{color:#484f58;font-style:italic;font-size:11px;padding:6px}
.move-row-empty{opacity:.55;background:#0a0d12;border-style:dashed}
.move-row-empty .m-empty{color:#6e7681;font-style:italic;font-size:11px}

/* ダメ結果（3段） */
.dmg-result{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;
  margin-top:2px;padding:3px 0;border-top:1px dashed #21262d;
  font-size:10px;font-variant-numeric:tabular-nums;
}
.dmg-cell{text-align:center;padding:2px 3px;border-radius:3px;background:#0a0f15}
.dmg-cell .dmg-label{color:#6e7681;font-size:9px;display:block;margin-bottom:1px}
.dmg-cell .dmg-val{color:#e6edf3;font-weight:700;font-size:11px}
.dmg-cell.dmg-range .dmg-val{color:#79c0ff}
.dmg-cell.dmg-pct .dmg-val{color:#ffa657}
.dmg-cell.dmg-ko .dmg-val{color:#a5d6a7}
.dmg-cell.dmg-ko.guaranteed-1 .dmg-val{color:#ff7b72}
.dmg-cell.dmg-ko.guaranteed-2 .dmg-val{color:#ffa657}
.dmg-side-tag{
  font-size:9px;color:#8b949e;padding:1px 5px;
  background:#21262d;border-radius:3px;
}
.move-recoil{font-size:9px;color:#8b949e}
.move-immune{color:#484f58;font-style:italic;font-size:10px;padding:2px 2px}
/* 全技を1リストで表示・選択中ボタン */
.moves-scroll{display:flex;flex-direction:column;gap:3px;max-height:460px;overflow-y:auto;
  border:1px solid #21262d;border-radius:4px;padding:4px;background:#0a0d12}
.moves-scroll .move-row{cursor:pointer}
.moves-scroll .move-row:hover{border-color:#3b4754;background:#11161d}
/* 技説明のホバーポップアップ */
#move-tip{position:fixed;z-index:800;display:none;max-width:340px;
  background:#161b22;border:1px solid #58a6ff;border-radius:6px;padding:7px 10px;
  font-size:11.5px;line-height:1.5;color:#e6edf3;box-shadow:0 4px 16px rgba(0,0,0,.5);pointer-events:none}
.m-select-btn{flex:0 0 auto;font-size:11px;font-weight:700;border-radius:4px;padding:3px 9px;cursor:pointer;
  border:1px solid #2ea043;background:#08160c;color:#56d364;font-family:inherit;white-space:nowrap}
.m-select-btn:hover{border-color:#3fb950;background:#0d2412;color:#7ee787}
.m-select-btn.is-sel{border-color:#3fb950;background:#238636;color:#fff;box-shadow:0 0 0 1px #3fb95066}
.m-attack-btn{flex:0 0 auto}
/* 横1行ダメージ表示(縦を詰める) */
.dmg-line{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:2px;padding:2px 2px;
  border-top:1px dashed #21262d;font-size:11px;font-variant-numeric:tabular-nums}
.dmg-line .dl-d b{color:#79c0ff}
.dmg-line .dl-p b{color:#ffa657}
.dmg-line .dl-k b{color:#a5d6a7}
.dmg-line .dl-k.guaranteed-1 b{color:#ff7b72}
.dmg-line .dl-k.guaranteed-2 b{color:#ffa657}
.dmg-line .dl-d,.dmg-line .dl-p,.dmg-line .dl-k{color:#6e7681;font-size:10px}
/* プール行のミニダメージ */
.dmg-mini{font-size:10px;font-variant-numeric:tabular-nums}
.dmg-mini .dm-p{color:#ffa657}
.dmg-mini .dm-k{color:#a5d6a7;margin-left:3px}
.dmg-mini .dm-k.guaranteed-1{color:#ff7b72}
.dmg-mini .dm-k.guaranteed-2{color:#ffa657}
.dmg-immune{color:#484f58;font-style:italic;font-size:10px}

/* 選択中の技ハイライト */
.move-row.selected{
  background:linear-gradient(90deg,rgba(88,166,255,.15),rgba(255,144,184,.10));
  border-left:3px solid #58a6ff;padding-left:5px;
}

/* バトル進行パネル */
.battle-ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.battle-ctrl button{
  padding:6px 12px;border:1px solid #30363d;border-radius:4px;
  background:#161b22;color:#e6edf3;font-size:12px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:.15s;
}
.battle-ctrl button:hover{border-color:#58a6ff;background:#1c2a3a;color:#fff}
.battle-ctrl button#btn-run-turn{background:linear-gradient(90deg,#1c2a3a,#2a1c3a);}
.battle-ctrl button#btn-run-turn:hover{background:linear-gradient(90deg,#22354a,#341d4a);}
.battle-ctrl button:active{transform:translateY(1px)}
.battle-hint{font-size:10px;color:#8b949e;margin-top:4px;line-height:1.4}

/* aside (環境パネル) 内の操作ボタンは 2×2 グリッド */
.battle-ctrl-aside{
  display:grid;grid-template-columns:1fr 1fr;gap:5px;width:100%;
}
.battle-ctrl-aside button{
  padding:6px 6px;font-size:11px;width:100%;
}
#battle-log{
  max-height:340px;min-height:120px;overflow-y:auto;resize:vertical;
  background:#000;border:1px solid #21262d;border-radius:4px;
  padding:6px 8px;font-size:11px;font-family:Menlo,Consolas,monospace;
}
/* ターン/開始の区切り行を見やすく(履歴を遡りやすく) */
#battle-log .log-line.log-sep .log-msg{color:#ffd479;font-weight:700;}
#battle-log .log-line.log-sep{border-top:1px solid #30363d;margin-top:3px;padding-top:3px;}
#battle-log .log-line{display:flex;gap:8px;padding:1px 0;color:#c9d1d9}
#battle-log .log-phase{
  flex-shrink:0;min-width:48px;color:#79c0ff;font-weight:700;font-size:10px;
}
#battle-log .log-msg{color:#e6edf3}

/* 現在HP バー（ポケモンカード下） */
.battle-hp{
  margin-top:4px;font-size:13px;color:#c9d1d9;font-weight:600;
  display:flex;align-items:center;gap:6px;
}
.battle-hp-bar{
  flex:1;height:12px;background:#21262d;border-radius:4px;overflow:hidden;
}
.battle-hp-fill{
  height:100%;background:linear-gradient(90deg,#3fb950,#7ee787);transition:width .2s;
}
.battle-hp-fill.mid{background:linear-gradient(90deg,#d29922,#f0b232)}
.battle-hp-fill.low{background:linear-gradient(90deg,#da3633,#ff7b72)}
.battle-fainted{color:#da3633;font-weight:700}
.battle-hp-input{
  width:58px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;
  border-radius:3px;font-size:13px;font-weight:600;text-align:right;padding:2px 4px;
  -moz-appearance:textfield;
}
.battle-hp-input::-webkit-outer-spin-button,
.battle-hp-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

/* 適用補正チップ列 */
.dmg-chips{
  display:flex;flex-wrap:wrap;gap:3px;margin-top:2px;
}
.dmg-chip{
  display:inline-block;padding:1px 6px;border-radius:8px;
  font-size:9px;line-height:1.4;font-weight:600;
  border:1px solid rgba(255,255,255,.08);
  background:#21262d;color:#c9d1d9;
  white-space:nowrap;
}
.dmg-chip.chip-env{background:#1f3a2a;color:#7ee787;border-color:#2ea04344}
.dmg-chip.chip-env-down{background:#3a1f1f;color:#ffa198;border-color:#da363344}
.dmg-chip.chip-stab{background:#28304a;color:#a5b4fc;border-color:#5e5fd944}
.dmg-chip.chip-eff-up{background:#3b2a4a;color:#d8b4fe;border-color:#a855f744}
.dmg-chip.chip-eff-down{background:#2a2a2a;color:#8b949e}
.dmg-chip.chip-crit{background:#4a3a1a;color:#fbbf24;border-color:#facc1544}
.dmg-chip.chip-wall{background:#1f2a3a;color:#93c5fd;border-color:#3b82f644}
.dmg-chip.chip-item{background:#3a1f2a;color:#fda4af;border-color:#f43f5e44}
.dmg-chip.chip-ability{background:#1f3a3a;color:#5eead4;border-color:#14b8a644}

/* 環境パネル */
#env-panel{
  background:#161b22;border:1px solid #21262d;border-radius:8px;
  padding:10px;display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;font-size:11px;
}
#env-panel h3{
  font-size:12px;color:#79c0ff;font-weight:700;
  border-bottom:1px solid #21262d;padding-bottom:4px;
}
#env-swap-btn{
  padding:6px 8px;border:1px solid #30363d;border-radius:4px;
  background:linear-gradient(90deg,#1c2a3a 0%,#2a1c3a 100%);
  color:#e6edf3;font-size:11px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:.15s;
}
#env-swap-btn:hover{
  border-color:#58a6ff;background:linear-gradient(90deg,#22354a 0%,#341d4a 100%);
  color:#fff;
}
#env-swap-btn:active{transform:translateY(1px)}
.env-block{display:flex;flex-direction:column;gap:4px}
.env-block label{color:#8b949e;font-size:10px}
.env-block select{
  padding:3px 6px;border:1px solid #30363d;border-radius:3px;
  background:#0d1117;color:#e6edf3;font-size:11px;font-family:inherit;width:100%;
}
.env-block select:focus{outline:none;border-color:#58a6ff}

.env-toggle-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:4px;
  font-size:10px;
}
.env-toggle-grid .side-col{
  background:#0d1117;border:1px solid #21262d;border-radius:4px;
  padding:5px 6px;display:flex;flex-direction:column;gap:3px;
}
.env-toggle-grid .side-col.self-col{border-left:2px solid #58a6ff}
.env-toggle-grid .side-col.opp-col{border-left:2px solid #f85149}
.env-toggle-grid .side-head{
  font-size:9px;color:#8b949e;font-weight:700;
  text-transform:uppercase;letter-spacing:0.5px;
}
.env-toggle-grid label.chk{
  display:flex;align-items:center;gap:4px;cursor:pointer;
  color:#e6edf3;font-size:10px;
}
.env-toggle-grid .status-select{
  margin-top:3px;padding:2px 4px;border:1px solid #30363d;border-radius:3px;
  background:#0d1117;color:#e6edf3;font-size:10px;font-family:inherit;width:100%;
}
.env-toggle-grid .status-select:focus{outline:none;border-color:#58a6ff}
.env-toggle-grid label.chk input{
  margin:0;width:11px;height:11px;cursor:pointer;
}

.env-crit-row{display:flex;gap:6px;justify-content:space-between}
.env-crit-row label{
  display:flex;align-items:center;gap:3px;cursor:pointer;
  font-size:10px;color:#e6edf3;
}
.env-crit-row label input{width:11px;height:11px;cursor:pointer}

</style>
