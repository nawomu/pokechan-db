<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 120" width="130" height="120">
  <!-- しっぽ(背側=右後ろ・いなずま) -->
  <path d="M92 78 C108 74 110 58 118 50 L110 50 C116 40 116 34 120 28 L106 42 L112 42 L100 60 L96 56 Z" fill="#f0c33a" stroke="#6b4a12" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M99 60 L108 50 L102 50 L110 40" fill="none" stroke="#a9701b" stroke-width="2.4"/>
  <!-- 足 -->
  <ellipse cx="48" cy="108" rx="10" ry="6" fill="#f0c33a" stroke="#6b4a12" stroke-width="2"/>
  <ellipse cx="74" cy="109" rx="10" ry="6" fill="#e7b62b" stroke="#6b4a12" stroke-width="2"/>
  <!-- 耳(左向きなので少し左へ流す) -->
  <path d="M33 46 C20 28 17 13 25 10 C33 8 41 24 44 42 Z" fill="#f6cf45" stroke="#5a3f12" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M70 42 C78 24 82 11 90 14 C97 17 92 33 84 47 Z" fill="#f6cf45" stroke="#5a3f12" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M22 18 C18 11 21 10 25 10 C29 11 28 15 28 20 Z" fill="#3a2c1d"/>
  <path d="M88 22 C92 15 90 13 86 14 C82 16 82 20 81 25 Z" fill="#3a2c1d"/>
  <!-- 体・頭(やや左を向く=右にボリューム) -->
  <path d="M62 30 C84 30 96 50 94 72 C92 98 76 110 58 110 C40 110 28 96 28 72 C28 50 40 30 62 30 Z" fill="#f6cf45" stroke="#5a3f12" stroke-width="2.4"/>
  <!-- 腕(手前=左) -->
  <ellipse cx="36" cy="78" rx="6.5" ry="10" fill="#efc232" stroke="#6b4a12" stroke-width="1.8"/>
  <!-- ほっぺ(左向きなので左頬が大きく手前) -->
  <circle cx="40" cy="70" r="9" fill="#e8504a"/>
  <circle cx="73" cy="69" r="7" fill="#e8504a"/>
  <!-- 目(視線やや左) -->
  <circle cx="46" cy="56" r="6" fill="#3a2c1d"/>
  <circle cx="68" cy="55" r="5.6" fill="#3a2c1d"/>
  <circle cx="44.5" cy="53.5" r="2" fill="#fff"/>
  <circle cx="66.5" cy="52.5" r="1.9" fill="#fff"/>
  <!-- 鼻・口(やや左) -->
  <path d="M54 60 q2 2 4 0" fill="none" stroke="#3a2c1d" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50 64 q6 6 12 0" fill="none" stroke="#3a2c1d" stroke-width="1.7" stroke-linecap="round"/>
</svg>
