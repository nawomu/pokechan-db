<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 150" width="170" height="150">
  <!-- 後ろ脚 -->
  <ellipse cx="118" cy="126" rx="16" ry="13" fill="#3f9e86" stroke="#205a4a" stroke-width="2.4"/>
  <!-- 胴体(ずんぐり四足) -->
  <path d="M40 96 C34 70 56 58 86 58 C120 58 142 72 140 100 C139 118 120 130 86 130 C54 130 45 116 40 96 Z"
        fill="#5bbfa3" stroke="#205a4a" stroke-width="2.6"/>
  <!-- 体の濃い斑点 -->
  <ellipse cx="62" cy="98" rx="7" ry="5" fill="#3f9e86"/><ellipse cx="86" cy="108" rx="8" ry="5" fill="#3f9e86"/>
  <ellipse cx="110" cy="98" rx="7" ry="5" fill="#3f9e86"/><ellipse cx="74" cy="84" rx="5" ry="4" fill="#3f9e86"/>
  <!-- 前脚 -->
  <ellipse cx="56" cy="126" rx="15" ry="12" fill="#5bbfa3" stroke="#205a4a" stroke-width="2.4"/>
  <ellipse cx="92" cy="128" rx="14" ry="11" fill="#4fb096" stroke="#205a4a" stroke-width="2.4"/>
  <!-- かぎ爪 -->
  <path d="M46 132 l3 5 M54 134 l2 5 M62 132 l3 5" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
  <!-- 背中の葉(花の土台) -->
  <path d="M58 60 C40 44 44 30 60 34 C58 48 70 52 78 50 Z" fill="#4a9a4a" stroke="#27602a" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M112 60 C132 44 128 30 112 34 C114 48 102 52 94 50 Z" fill="#4a9a4a" stroke="#27602a" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M86 52 C70 38 78 24 90 30 C96 24 108 30 98 44 Z" fill="#56a956" stroke="#27602a" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- 背中の大きな花(ピンク・5枚) -->
  <g stroke="#a83b6a" stroke-width="2.2" stroke-linejoin="round">
    <ellipse cx="86" cy="22" rx="16" ry="13" fill="#ef6fa0"/>
    <ellipse cx="62" cy="34" rx="15" ry="12" fill="#e85f95" transform="rotate(-30 62 34)"/>
    <ellipse cx="110" cy="34" rx="15" ry="12" fill="#e85f95" transform="rotate(30 110 34)"/>
    <ellipse cx="70" cy="52" rx="14" ry="11" fill="#ec679a" transform="rotate(-60 70 52)"/>
    <ellipse cx="102" cy="52" rx="14" ry="11" fill="#ec679a" transform="rotate(60 102 52)"/>
  </g>
  <circle cx="86" cy="38" r="9" fill="#f2c14e" stroke="#a8771e" stroke-width="2"/>
  <!-- 頭(手前左) -->
  <path d="M30 92 C20 84 22 70 36 66 C52 62 66 70 66 86 C66 102 50 110 38 106 C32 104 30 98 30 92 Z"
        fill="#5bbfa3" stroke="#205a4a" stroke-width="2.6"/>
  <!-- 耳状の角 -->
  <path d="M40 68 q-4 -10 4 -12 q6 4 4 12 Z" fill="#4fb096" stroke="#205a4a" stroke-width="2"/>
  <!-- 目 -->
  <ellipse cx="42" cy="86" rx="6.5" ry="7.5" fill="#fff" stroke="#205a4a" stroke-width="1.6"/>
  <ellipse cx="42" cy="87" rx="3.2" ry="5" fill="#c0392b"/><circle cx="42" cy="84.5" r="1.3" fill="#000"/>
  <!-- 口(牙) -->
  <path d="M28 98 q12 8 26 2" fill="none" stroke="#205a4a" stroke-width="2" stroke-linecap="round"/>
  <path d="M34 100 l-1 5 M44 102 l1 5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
</svg>
