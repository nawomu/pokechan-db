<!doctype html><meta charset=utf-8><body style="margin:0;background:#13202c;font-family:sans-serif">
<div id=g style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px;padding:8px"></div>
<script>
fetch('nonmega.json').then(r=>r.json()).then(ns=>{
  let h='';
  for(let i=0;i<110;i++){
    h+=`<div style="text-align:center"><div style="background:#fff;border-radius:5px;height:62px;display:flex;align-items:center;justify-content:center"><img src="out1/${String(i).padStart(3,'0')}.png" style="max-height:56px;max-width:90%"></div><div style="color:#bcd;font-size:9.5px;line-height:1.1;margin-top:1px">${i+1}.${ns[i]}</div></div>`;
  }
  document.getElementById('g').innerHTML=h;
});
</script></body>
