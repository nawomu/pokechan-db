<meta name="description" content="全部の技・特性・持ち物を自由に試せるバトル実験場。神の手モードでHP・状態異常・天候も自在に操作できる検証用ツール。">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://pchamdb.com/battle_lab.html">
<script defer src="i18n/runtime.js?v=20260705"></script>
<script>
(function(){
  // ★Phase E(2026-07-19): チャンピオンズ版⇔全部版データ切替(設計_全部版バトル切替_2026-07-18.md §1/§4)。
  // モード解決: URL?data=all|champions を最優先(指定時はlocalStorageへも同期=共有URLで一貫)→
  // localStorage(rb_lab_data_mode)→既定champions。ラボ以外(real_battle/online)はこのスクリプトを使わないので無関係。
  var urlMode = null;
  try { urlMode = new URLSearchParams(location.search).get('data'); } catch (e) {}
  var mode;
  if (urlMode === 'all' || urlMode === 'champions') {
    mode = urlMode;
    try { localStorage.setItem('rb_lab_data_mode', mode); } catch (e) {}
  } else {
    try { mode = localStorage.getItem('rb_lab_data_mode') || 'champions'; } catch (e) { mode = 'champions'; }
  }
  window.RB_LAB_MODE = mode;
  // 後続の<script src>群(battle_log_i18n.js等)より確実に先に完了させる必要がある。
  // ★検証時に判明: 同期XHR+間接eval(0,eval)だと、pokechan_data*.jsのトップレベルconst/letが
  // そのeval呼び出しのスコープに閉じ込められ、後続の別<script>タグからは見えない(=POKEMON_LIST等が
  // undefinedになる実行時バグ)。document.write()での<script src>挿入はパーサーを同期的に一時停止させ、
  // 本物のグローバルスクリプトとして実行順を保証するため、こちらを採用する(意図的にdocument.write)。
  var src = (mode === 'all') ? 'pokechan_data_all.js?v=20260626a' : 'pokechan_data.js?v=20260705a';
  document.write('<script src="' + src + '"><' + '/script>');
})();
</script>

<style>
/* 実機風バトルページ(2026-06-12 阿部さん: 検証用シミュレーターとは別ページ・実機の画面とテンポで) */
*{box-sizing:border-box}
/* 縦持ち(スマホ幅)は横向き案内を全画面表示=横長の盤面が崩れる前に横向きへ誘導(2026-07-07 阿部さん iPhone対応) */
#rotate-hint{display:none}
@media (orientation:portrait) and (max-width:820px){
  #rotate-hint{display:flex;position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#eceafa,#d4d0ec);
    align-items:center;justify-content:center;text-align:center;padding:24px}
  #rotate-hint .rh-ico{font-size:64px;animation:rhRot 2s ease-in-out infinite;display:inline-block}
  #rotate-hint .rh-txt{font-size:20px;font-weight:900;color:#4a4470;margin-top:14px;line-height:1.6}
  #rotate-hint .rh-txt span{font-size:13px;font-weight:600;color:#6a648c}
  @keyframes rhRot{0%,55%{transform:rotate(0)}75%,100%{transform:rotate(90deg)}}
}
html{overflow-x:hidden}
body{margin:0;background:linear-gradient(160deg,#eceafa 0%,#dfdcf2 55%,#d4d0ec 100%);color:#3a3552;
  font-family:"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  display:flex;flex-direction:column;align-items:center;min-height:100vh;
  overflow-x:hidden;max-width:100vw;overscroll-behavior-x:none}/* タップで横にブヨンと動く(横バウンス)を固定=Safariのzoom横オーバーフロー対策(2026-07-07 阿部さん) */

/* CH: 選出3カラム(230+280+230+gap)が760だと#setupの枠を突き破る→820に(2026-07-05 阿部さん「右がはみ出してる」) */
header{width:100%;max-width:820px;display:flex;justify-content:space-between;align-items:center;padding:10px 14px 0}
header h1{font-size:15px;margin:0;color:#4a4470}
header a{color:#58a6ff;font-size:12px;text-decoration:none}
header .hdr-left{display:flex;align-items:center;gap:8px;min-width:0}
header .hdr-home{color:#6a5be0;font-size:13px;font-weight:800;white-space:nowrap}
header .hdr-home:hover{color:#4638ae;text-decoration:underline}
header .hdr-sep{color:#b9b2de;font-size:12px}
#game{width:100%;max-width:820px;padding:8px 14px 30px}
/* バトル中は左右2カラムのぶん横幅を広げる(設定画面は760pxのまま) */
/* CH: 盤面640(16:9)+ログ460+gap14+余白 = 1150px(2026-07-05 阿部さん「チャンピオンズ実機と同じ縦横比に」) */
body.in-battle #game,body.in-battle header{max-width:990px}

/* ===== チーム編成 ===== */
#setup{background:#f6f5fc;border:1px solid #c9c3e6;border-radius:14px;padding:18px;box-shadow:0 6px 18px #6a5be022}
#setup h2{font-size:14px;margin:0 0 10px;color:#6a5fa0}
/* ===== CH: 選出画面=本家3カラム(左=自分/中央=詳細/右=相手。2026-07-05 阿部さん) ===== */
#setup-top{display:flex;gap:16px;align-items:center;margin-bottom:10px;font-size:12px;color:#6a5fa0;flex-wrap:wrap}
/* ★2026-07-21: データ版セグメントコントロール(常に両方見える・アクティブ側を塗りで強調)。
   #setup button{...}(汎用の大ボタン=紫グラデ角丸)が id+element でこの.data-mode-segより強いため、
   #lab-data-mode配下(id+class)で書いて確実に勝たせる。 */
#lab-data-mode{display:inline-flex;margin-left:12px;border:1px solid #c9c3e6;border-radius:8px;overflow:hidden;flex:0 0 auto}
#lab-data-mode .data-mode-seg{flex:0 0 auto;background:#fff;color:#3a3552;border:none;border-radius:0;box-shadow:none;padding:4px 9px;font-size:12px;font-weight:700;font-family:inherit;white-space:nowrap;cursor:pointer;transition:background .12s,color .12s}
#lab-data-mode .data-mode-seg+.data-mode-seg{border-left:1px solid #c9c3e6}
#lab-data-mode .data-mode-seg:hover{border-color:transparent;box-shadow:none}
#lab-data-mode .data-mode-seg:not(.active):hover{background:#f0edfd}
#lab-data-mode .data-mode-seg.active{background:#6a5be0;color:#fff;font-weight:800;cursor:default;border-color:transparent;box-shadow:none}
/* 左右カラムは縮められるように(固定230pxだと狭い画面で右カラムが枠外へはみ出す=2026-07-05 阿部さん指摘) */
#setup-cols{display:grid;grid-template-columns:minmax(170px,230px) minmax(250px,1fr) minmax(170px,230px);gap:14px;margin-bottom:12px;align-items:start}
.col-title{font-size:12px;font-weight:900;color:#fff;text-align:center;border-radius:12px;padding:3px 0;margin-bottom:8px;
  transform:skewX(-8deg)}
.col-title.self{background:linear-gradient(135deg,#4638ae,#6a5be0)}
.col-title.opp{background:linear-gradient(135deg,#b02458,#d63c78)}
.team-row{display:flex;flex-direction:column;gap:8px}
.team-row .tlabel{display:none}
/* 本家風カプセル: 自分=青紫/相手=クリムゾン・選択中=黄緑発光カーソル */
.team-row .slot{position:relative;color:#fff;border:2px solid #ffffff22;border-radius:14px;
  padding:6px 10px;cursor:pointer;display:grid;grid-template-columns:1fr auto;grid-template-rows:auto auto auto auto;
  column-gap:6px;row-gap:1px;font-size:13px;text-align:left;
  transform:skewX(-8deg);box-shadow:0 2px 7px #0006;transition:border-color .12s,box-shadow .12s;font-family:inherit;min-height:62px}
.team-row .slot>*{transform:skewX(8deg)}
#row-self .slot{background:linear-gradient(135deg,#4638ae,#6a5be0)}
#row-opp .slot{background:linear-gradient(135deg,#a02150,#d63c78)}
.team-row .slot:hover{border-color:#d4f542}
.team-row .slot.selected{border-color:#d4f542;box-shadow:0 0 0 3px #d4f54277,0 2px 7px #0006}
.team-row .slot img{width:84px;height:84px;object-fit:contain;grid-column:2;grid-row:2/5;justify-self:end;align-self:center;margin:-10px -2px}/* 右列ぜんぶ使って大きく(2026-07-06 阿部さん) */
.team-row .slot .cap-name{grid-column:1/3;grid-row:1;min-width:0}
.team-row .slot .cap-mid{display:flex;flex-direction:column;gap:2px;min-width:0;grid-column:1;grid-row:2/4;justify-content:center}
.team-row .slot .cap-name{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-row .slot .cap-item{font-size:12px;color:#ffffffdd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;font-weight:700}
.team-row .slot .item-ic{width:18px;height:18px;object-fit:contain;image-rendering:pixelated}
.team-row .slot .cap-g{margin-left:4px;font-size:11px}
.team-row .slot .cap-types{min-height:14px}
.team-row .slot .cap-g.m{color:#8fd0ff}
.team-row .slot .cap-g.f{color:#ffa9cf}
.team-row .slot .cap-types{display:flex;gap:3px;margin-top:2px;flex-wrap:nowrap;overflow:hidden}
.team-row .slot .cap-type{font-size:8px;font-weight:800;color:#fff;border-radius:6px;padding:1px 6px;border:1px solid #ffffff44;white-space:nowrap;flex:0 0 auto}
/* ボックスボタン=右下に配置(名前を右端までフルに=2026-07-06 阿部さん) */
.team-row .slot .cap-change{grid-column:1;grid-row:4;justify-self:start;align-self:end;font-size:11.5px;font-weight:800;/* 左寄せに戻す=スプライトに被らない(🔄は残す・2026-07-07 阿部さん) */
  background:#00000066;border-radius:11px;padding:5px 10px;border:1px solid #ffffff55;white-space:nowrap;line-height:1}
.team-row .slot .cap-change .cap-swap{font-size:12.5px;margin-left:1px;filter:saturate(1.2)}
.team-row .slot .cap-change:hover{background:#000000aa;border-color:#d4f542;color:#d4f542}
/* 初手(先頭)バッジ=名前の右上・self側のみ(2026-07-06 阿部さん) */
.team-row .slot .cap-lead{grid-column:2;grid-row:1;justify-self:end;align-self:start;font-size:10px;font-weight:800;
  background:#00000055;border-radius:9px;padding:3px 8px;border:1px solid #ffffff44;white-space:nowrap;line-height:1;color:#ffffffcc}
.team-row .slot .cap-lead.on{background:linear-gradient(135deg,#c9a227,#e8c84a);color:#3a2c00;border-color:#ffe98a}
.team-row .slot .cap-lead:hover{border-color:#d4f542;color:#d4f542}
.team-row .slot .cap-lead.on:hover{color:#3a2c00}
/* ===== ★選出(pick)画面: ▶バトルスタートで開く事前選出オーバーレイ(2026-07-21)。
   online_battle.htmlの#pick-screen/.pk-badgeデザインを踏襲(自分=青紫/相手=クリムゾン・①②③バッジ)。
   ラボは両側とも編集可=左右とも同じクリックトグルで選出する(online版は相手が非公開の読取専用・ラボは実験室なので相手側も操作可)。
   ★2026-07-21夜(阿部さんFB=commit 3b8cea5b直後): 素の2カラムでなくonline_battle.htmlの選出画面と同じ3カラム
   (左=自分/中央=選択中の詳細=setup画面の#sel-detailをノードごと移動して流用/右=相手)に統一。 */
#lab-pick-screen{position:fixed;inset:0;z-index:45;background:#2a2350ee;display:flex;align-items:flex-start;justify-content:center;padding:14px;overflow:auto}
#lab-pick-screen .lpk-card{background:#f6f5fc;border-radius:16px;padding:14px 16px;max-width:960px;width:100%;max-height:94vh;overflow:auto}
#lab-pick-screen .lpk-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
#lab-pick-screen .lpk-head h3{margin:0;color:#4638ae;font-size:15px;flex:1 1 auto}
#lab-pick-screen .lpk-cols{display:grid;grid-template-columns:232px minmax(250px,300px) 232px;gap:14px;align-items:start;justify-content:center}
@media(max-width:760px){#lab-pick-screen .lpk-cols{grid-template-columns:1fr}}
/* 選出セル=編成カプセルを流用(.team-row .slotの既存CSSを継承・両側ともクリック可なのでcursor:pointerのまま) */
#lab-pk-self .slot{background:linear-gradient(135deg,#4638ae,#6a5be0);width:100%;box-sizing:border-box}
#lab-pk-opp .slot{background:linear-gradient(135deg,#a02150,#d63c78);width:100%;box-sizing:border-box}
#lab-pk-self .slot.picked,#lab-pk-opp .slot.picked{border-color:#d4f542;box-shadow:inset 0 0 0 2px #d4f54255,0 2px 7px #0006}
/* 中央詳細に表示中(選出トグルとは別軸)=onlineの#pick-mine .slot.selectedと同じ緑で区別 */
#lab-pk-self .slot.selected,#lab-pk-opp .slot.selected{border-color:#7ac142;box-shadow:0 0 0 3px #d4f54277,0 2px 7px #0006}
/* ★阿部さんFB(2026-07-21夜): pick画面では①②③バッジが選出順の唯一の権威。★1番目/1番目にバッジは
   ノイズなので選出画面だけ非表示にする(setup画面側のslotCapsuleHtml/CSSは現状維持=触らない)。 */
#lab-pick-screen .cap-lead{display:none}
#lab-pick-screen .pk-badge{display:none;position:absolute;top:-9px;left:-4px;background:#e0564a;color:#fff;font-weight:900;border-radius:50%;
  width:28px;height:28px;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 6px #0006;border:2px solid #fff;z-index:2}
#lab-pick-screen .lpk-btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;justify-content:center}
#lab-pick-screen button.lpk-go{padding:10px 18px;border-radius:20px;border:0;background:#6a5be0;color:#fff;font-weight:900;font-size:14px;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px #0004}
#lab-pick-screen button.lpk-go:disabled{opacity:.5;cursor:default}
#lab-pick-screen button.lpk-go.full{background:linear-gradient(135deg,#1f8f3a,#3fc45c)}
#lab-pick-screen button.lpk-back{padding:10px 18px;border-radius:20px;border:2px solid #c9c3e6;background:#fff;color:#4638ae;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit}
#lab-pick-screen button.lpk-back:hover{border-color:#6a5be0}
#lab-pick-screen .lpk-status{display:block;text-align:center;margin-top:8px;color:#6a5fa0;font-weight:700;font-size:12px}
/* 中央=選択中ポケモンの詳細パネル(本家の能力タブ風) */
#sel-detail{background:linear-gradient(150deg,#41369fee 0%,#5d4fd6dd 100%);border:1px solid #ffffff26;border-radius:16px;
  padding:14px;color:#fff;min-height:280px;box-shadow:0 4px 14px #0007;transition:background .25s}
/* 相手スロット選択中=相手カプセルと同じクリムゾン系に切替(2026-07-05 阿部さん) */
#sel-detail.opp{background:linear-gradient(150deg,#96204dee 0%,#d63c78dd 100%)}
#sel-detail .sd-empty{color:#ffffffaa;text-align:center;padding:60px 0}
#sel-detail .sd-head{display:flex;gap:12px;align-items:center;margin-bottom:8px}
#sel-detail .sd-head img{width:96px;height:96px;object-fit:contain;margin:-8px 0}
#sel-detail .sd-head strong{font-size:17px;display:block;line-height:1.25;min-height:2.5em;overflow:hidden;
  display:flex;align-items:center}/* 2行分を常時確保=名前の折返しでパネル全体がズレない(2026-07-06 阿部さん) */
#sel-detail .sd-type{display:inline-block;font-size:10px;font-weight:800;color:#fff;border-radius:9px;padding:2px 9px;
  margin:4px 4px 0 0;box-shadow:0 1px 2px #0007;border:1px solid #ffffff55}
/* おすすめビルド=実戦プリセット(58〜60ビルド)を1タップで反映(タスクB①・2026-07-11) */
#sel-detail .sd-preset-btn{display:block;width:100%;margin:0 0 8px;padding:8px 10px;border-radius:12px;
  border:2px solid #ffe066;background:linear-gradient(135deg,#ffd23f,#ff9f1c);color:#3a2600;font-weight:900;
  font-size:13px;font-family:inherit;cursor:pointer;box-shadow:0 2px 8px #0006;text-align:center}
#sel-detail .sd-preset-btn:hover{border-color:#fff;filter:brightness(1.06)}
/* 特性/もちもの/性格の変更セレクト(2026-07-05 阿部さん「持ち物と特性もクリックで変更できたら」) */
#sel-detail .sd-row select,#sel-detail .sd-ev select,#sel-detail button.sd-pick{background:#00000042;color:#fff;border:1px solid #ffffff33;border-radius:8px;
  padding:2px 8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
#sel-detail button.sd-pick:hover{border-color:#d4f542}
#sel-detail .sd-ev-top .sd-nature{flex:1 1 auto;min-width:0;text-align:left;overflow:hidden;white-space:nowrap}
#sel-detail .sd-row select{max-width:62%;text-align:right}
#sel-detail .sd-row select:hover,#sel-detail .sd-ev select:hover{border-color:#d4f542}
#sel-detail .sd-row select option,#sel-detail .sd-ev select option{color:#e6edf3;background:#141927;font-weight:400}
#sel-detail .sd-moves{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
#sel-detail .sd-move{position:relative;padding:6px 44px 6px 12px;border-radius:16px;border:2px solid #ffffff33;color:#fff;
  text-align:left;font-size:12.5px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 2px 6px #0005;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#sel-detail .sd-move:hover{border-color:#d4f542}
#sel-detail .sd-move .t-pill{display:inline-block;font-size:9px;padding:1px 7px;border-radius:8px;margin-right:6px;border:1px solid #ffffff55}
#sel-detail .sd-move .sd-pp{position:absolute;right:12px;top:6px;font-style:italic;font-weight:900;font-size:12px}
#sel-detail .sd-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;background:transparent;
  padding:1px 2px;margin-top:6px;gap:8px}/* 二重枠をやめて一重に=薄い外箱を廃止(2026-07-07 阿部さん) */
#sel-detail .sd-row span{color:#ffffffbb}
/* 3カラムは横向きでは維持(iPhone横=844≒デスクトップ838で見やすい)。縦積みは縦持ちのみ(縦持ちは横向き案内が出る) */
@media(max-width:880px) and (orientation:portrait){
  #setup-cols{grid-template-columns:1fr}
  #setup-center{order:3}
}
/* 共通選択モーダル(ライトラベンダー・説明つき) */
#choice-modal{position:fixed;inset:0;background:#0006;display:none;z-index:60}
#choice-modal .cm-box{position:fixed;background:linear-gradient(165deg,#f0eefa,#e2def4);border:2px solid #b9b2de;border-radius:14px;
  width:min(94vw,600px);max-height:90vh;display:flex;flex-direction:column;padding:12px 14px;box-shadow:0 14px 40px #00000066}
#choice-modal .cm-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
#choice-modal .cm-title{font-weight:800;font-size:15px;color:#4a4470;flex:0 0 auto}
#choice-modal .cm-head .cm-search{flex:1 1 auto;margin-bottom:0;padding:6px 10px;font-size:13px}
#choice-modal .cm-search{width:100%;background:#fff;color:#3a3552;border:1px solid #c9c3e6;border-radius:9px;
  padding:8px 11px;font-size:14px;margin-bottom:8px;font-family:inherit;box-sizing:border-box}
#choice-modal .cm-inforow{display:block;width:100%;box-sizing:border-box;background:#efeafd;border:1px dashed #b9b2de;border-radius:9px;
  padding:7px 10px;margin:3px 0;font-size:12.5px;color:#5a5480;text-align:left}
#choice-modal .cm-inforow b{color:#6a4fc4}
#choice-modal .cm-inforow span{display:block;font-weight:400;font-size:11.5px;margin-top:2px}
#choice-modal .cm-x{margin-left:auto;background:none;border:none;font-size:16px;color:#8a82c8;cursor:pointer}
#choice-modal .cm-body{overflow-y:auto;display:flex;flex-direction:column;gap:5px}
#choice-modal .cm-group{font-size:10.5px;font-weight:800;color:#7a72b0;margin:7px 2px 1px}/* 見出しは控えめに(2026-07-07 阿部さん) */

/* S1: 3ブロックレイアウト化・盤面560×360/ログ460×362 (Showdown実測値) */
#battle{display:none;gap:14px;flex-direction:column/* ログは下段(2026-07-06 阿部さん「バトル画面を大きく迫力を」) */}
/* S1: 盤面サイズ 600×430 → 560×360 に変更(Showdown準拠) */
/* font-familyはShowdown準拠でVerdanaを盤面内に限定適用(body全体は日本語フォントを維持) */
/* S6: backgroundをfieldから除去し#field-backdropに委譲(プリセット切替の器として分離) */
#field{position:relative;width:640px;height:360px;border:1px solid #2a3550;border-radius:14px;overflow:hidden;
  font-family:Verdana,sans-serif;background:#1a2a1a/* fallback(backdrop読込前のちらつき防止) */;
  transform-origin:top center}/* 内部640×360固定=どの画面でもJSのzoomで相似拡大(2026-07-07 阿部さん iPhone対応) */
/* S6: 背景プリセット構造 — #field-backdrop (z-index:0 / position:absolute;inset:0 / opacity:0.8)
 * Showdown準拠: .backdrop div を差し替えることで背景を1行で切り替え可能にする器。
 * うちの独自化ポイント: Showdownは外部画像だがうちはCSSグラデのみで構成(ファイル不要・権利フリー)。
 * ダーク基調を維持(うち独自): Showdownは白系だがうちは暗め=現状維持。
 * [阿部さん確認事項] ページ全体の背景トーン: SDは白系だがうちはダーク基調=現状維持(独自化ポイント)。
 */
#field-backdrop{position:absolute;inset:0;z-index:0;opacity:0.8;pointer-events:none;
  transition:background 0.5s ease}
/* プリセット1: grass = 草原グラデ(現状の#field背景をそのまま移植・第1プリセット) */
#field-backdrop[data-preset="grass"]{
  background:
    radial-gradient(150% 70% at 50% 118%, #7ec25a 0%, #6db04c 30%, transparent 58%),
    linear-gradient(180deg,#a9e0f5 0%,#cbecfb 18%,#a9d57f 24%,#8cc35e 56%,#74b350 100%);
  box-shadow:inset 0 -40px 60px #3a6e2f33, inset 0 18px 40px #ffffff22}
/* プリセット2: cave = 洞窟(ダーク石壁グラデ) */
#field-backdrop[data-preset="cave"]{
  background:
    radial-gradient(ellipse 80% 60% at 50% 90%, #3a3020 0%, #2a2218 40%, transparent 70%),
    linear-gradient(180deg,#1a1510 0%,#2a2018 25%,#38301e 50%,#4a3c26 72%,#3a3020 100%);
  box-shadow:inset 0 -40px 80px #0006, inset 0 30px 60px #0004}
/* プリセット3: water = 水辺(水面グラデ) */
#field-backdrop[data-preset="water"]{
  background:
    radial-gradient(ellipse 100% 50% at 50% 110%, #2a6a8a 0%, #1a4e72 30%, transparent 60%),
    linear-gradient(180deg,#a8d4e8 0%,#b8e0f0 12%,#d0ecf8 23%,#8ab8d4 24%,#5a9ec0 52%,#3a7ea8 100%);
  box-shadow:inset 0 -40px 60px #1a5a8a44, inset 0 18px 40px #ffffff33}
/* プリセット4: night = 夜空グラデ */
#field-backdrop[data-preset="night"]{
  background:
    radial-gradient(ellipse 80% 50% at 50% 110%, #2a2438 0%, #1a1830 35%, transparent 65%),
    linear-gradient(180deg,#0a0818 0%,#12102a 20%,#1c1840 40%,#2a2438 55%,#1e1c30 75%,#14121e 100%);
  box-shadow:inset 0 -30px 60px #0a0816cc, inset 0 0 80px #ffffff0a}
/* 夜空の星をCSS疑似要素で演出(Showdown非依存・うちの独自エフェクト) */
#field-backdrop[data-preset="night"]::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
  background-image:
    radial-gradient(1px 1px at 15% 12%, #ffffffcc, transparent),
    radial-gradient(1px 1px at 32% 8%, #ffffffaa, transparent),
    radial-gradient(1.5px 1.5px at 48% 18%, #ffffff99, transparent),
    radial-gradient(1px 1px at 63% 6%, #ffffffbb, transparent),
    radial-gradient(1px 1px at 78% 14%, #ffffffaa, transparent),
    radial-gradient(1px 1px at 88% 9%, #ffffff88, transparent),
    radial-gradient(1px 1px at 22% 22%, #ffffffcc, transparent),
    radial-gradient(1px 1px at 55% 28%, #ffffffaa, transparent),
    radial-gradient(1.5px 1.5px at 71% 24%, #ffffff99, transparent),
    radial-gradient(1px 1px at 41% 33%, #ffffff88, transparent)}
/* S6: #weather-fx はbackdrop(z:0)の上・他演出要素より下(z:1)。天候絵文字オーバーレイ */
#weather-fx{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.22;font-size:34px;letter-spacing:18px;line-height:1.3;text-align:center}
/* 勝敗バナー(画面中央に大きくWIN/LOSE=2026-07-06 阿部さん) */
#result-banner{position:absolute;inset:0;z-index:20;display:none;align-items:center;justify-content:center;pointer-events:none}
#result-banner.show{display:flex}
#result-banner .rb-txt{font-size:84px;font-weight:900;font-style:italic;letter-spacing:2px;color:#fff;
  text-shadow:0 4px 0 #0004,0 0 26px currentColor;animation:rbResultPop .6s cubic-bezier(.2,1.5,.4,1) both;font-family:'Arial Black',sans-serif}
#result-banner.win .rb-txt{color:#ffd54a}
#result-banner.lose .rb-txt{color:#8fa2c4}
@keyframes rbResultPop{0%{opacity:0;transform:scale(.3) rotate(-8deg)}100%{opacity:1;transform:scale(1) rotate(-6deg)}}
.fighter{position:absolute;width:300px;transition:transform .2s}
.fighter .platform{position:absolute;left:50%;transform:translateX(-50%);bottom:-6px;width:200px;height:34px;border-radius:50%;
  background:radial-gradient(ellipse at center,#3f6f2caa 0%,#3f6f2c55 55%,transparent 72%)}

.fighter .sprite img{max-height:118px;max-width:150px;filter:drop-shadow(0 6px 6px #0009);transition:transform .15s}
.fighter .sprite .circ{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;color:#fff;background:#3a4660;box-shadow:inset 0 -8px 16px #0007,0 5px 8px #000a}
/* CH: 敵=中央やや右(メニューとは重ねない)/自分=左寄り(2026-07-05 阿部さん「相手は少し右・手持ちは少し左」) */
/* 配置調整(2026-07-06 阿部さん): 相手=もう少し右+下げて地平線(46.5%)の草に乗せる。
 * 自分=少し左+下に戻す(浮いて見えない高さ・左下HPボックスとは非重畳を維持) */
#f-opp{top:58px;right:100px;transform:scale(.95);transform-origin:center bottom}
#f-self{bottom:64px;left:44px;transform:scale(1.2);transform-origin:center bottom}
/* 味方は右向き(全スプライトが左向き素材なので反転して相手の方を向かせる=2026-07-06 阿部さん) */
#f-self .sprite img{transform:scaleX(-1)}
#f-opp .platform{width:150px;height:24px}
#f-self .platform{width:236px;height:40px}
/* CH: バトル終了ボタン(左上・実機のexitアイコン風。ch-busyでも消えない=いつでも離脱できる) */
#btn-exit .exit-div{width:1px;height:12px;background:#ffffff55;margin:0 2px}
#btn-exit{position:absolute;top:8px;left:10px;z-index:12;display:flex;gap:3px;align-items:center;
  background:#000000aa;border:1px solid #ffffff33;border-radius:14px;color:#fff;font-size:11px;font-weight:700;
  padding:3px 10px;cursor:pointer;transition:background .15s,border-color .15s;font-family:inherit}
#btn-exit:hover{background:#333333cc;border-color:#d4f542}
/* CH: ターンバッジは上中央の細帯へ(右上かぶり解消=右上はstatbar専用にする) */
#turn-badge{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:7;background:#000000aa;color:#fff;font-weight:900;
  font-size:11px;padding:2px 12px;border-radius:10px;box-shadow:0 2px 5px #0004;border:1px solid #ffffff22}
/* CH: トレーナーチップは廃止(チャンピオンズはバトル中に出さない・statbarの名前で足りる) */
.trainer{display:none}
/* ===== CH: statbar チャンピオンズ風(平行四辺形パネル) =====
 * 相手=右上クリムゾン+%のみ / 自分=左下青紫+数値。実機スクショ準拠(設計_リアルバトルUI_チャンピオンズ寄せ_2026-07-04.md) */
.pbox{position:absolute;z-index:9;width:264px;padding:5px 12px 22px;font-family:Verdana,sans-serif;font-size:13px;color:#fff;
  transform:skewX(-10deg);border-radius:8px;box-shadow:0 3px 10px #0007;transition:opacity .3s;overflow:visible}
.pbox>*{transform:skewX(10deg)}   /* パネルだけ斜めに・中身は水平に戻す */
#pb-opp{background:linear-gradient(135deg,#b02458 0%,#d63c78 100%);right:16px;top:10px;left:auto;border:1px solid #ffffff33}
#pb-self{background:linear-gradient(135deg,#4638ae 0%,#6a5be0 100%);left:16px;bottom:10px;top:auto;border:1px solid #ffffff33}
.pbox .who{display:none}
.pbox .row1{display:flex;align-items:center;gap:6px;position:relative;padding-left:58px}
/* CH: statbar内ミニアイコン(実機の丸顔アイコン) */
.pbox .icn{position:absolute;left:-4px;top:0;width:52px;height:52px;border-radius:50%;background:#00000044;overflow:hidden;/* 左いっぱいに大きく(2026-07-06 阿部さん) */
  display:flex;align-items:center;justify-content:center}
.pbox .icn img{width:50px;height:50px;object-fit:contain;image-rendering:pixelated}
.pbox .nm{font-weight:800;font-size:13px;color:#fff;text-shadow:0 1px 2px #0009;
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pbox .ptypes{display:flex;gap:2px;flex:0 0 auto}
.pbox .ptypes span{font-size:7px;font-weight:800;color:#fff;border-radius:6px;padding:1px 4px;border:1px solid #ffffff55;white-space:nowrap}
.pbox .lv{display:none}   /* 実機statbarにLv表示なし(全員Lv50) */
/* CH: HPバー=ダーク下地+ライム緑。%/数値テキストはバーの下に大きく出す */
.pbox .hpbar{position:relative;width:calc(100% - 58px);margin-left:58px !important;height:10px;/* 名前の左端に揃えて左へ延長 */background:#00000066;border-radius:5px;border:none;/* 右端寄せ=アイコンに被せない(skewの横ずれ込みで66px空け=2026-07-06 阿部さん) */
  margin:5px 0 0;overflow:visible}
.pbox .hptext{position:absolute;right:0;top:11px;font-size:16px;font-weight:900;color:#fff;line-height:1.2;z-index:2;
  pointer-events:none;text-shadow:0 1px 3px #000c;font-style:italic}
.pbox .hptext small{font-size:11px;font-weight:700;opacity:.85}
/* prevhp=残像バー(黄色・遅れて縮む) / hp=現在バー(即時) — 2層演出はShowdown版の仕組みを踏襲 */
.pbox .prevhp{position:absolute;top:1px;left:1px;height:8px;border-radius:4px;background:#d0c000;
  transition:width 1.2s ease-out;width:0;z-index:1}
.pbox .hp{position:absolute;top:1px;left:1px;height:8px;border-radius:4px;background:linear-gradient(180deg,#b5f542,#8ed62a);
  transition:width .3s ease-out;width:0;z-index:2}
.pbox .hp.mid{background:linear-gradient(180deg,#f5d442,#e0b81e)}
.pbox .hp.low{background:linear-gradient(180deg,#f56a5a,#d63c2e)}
/* %幅指定でも右端1pxの枠内に収める */
.pbox .hp,.pbox .prevhp{max-width:calc(100% - 2px)}
/* 状態異常バッジはpbox外(ボール列の上に積む)へ移動=丸アイコンに被らない(2026-07-06 阿部さん) */
.pbox .sts{display:none}
.sts-float{position:absolute;z-index:9;display:flex;gap:3px;pointer-events:none;transition:opacity .3s}
#sts-self{left:22px;bottom:116px;flex-direction:column-reverse;align-items:flex-start}/* leftbar(bottom:88)の真上・複数は上に積み上がる */
#sts-opp{right:22px;top:116px;flex-direction:column;align-items:flex-end}
.sts-float .bdg{font-size:9px;padding:1px 6px;border-radius:7px;background:#00000077;color:#fbbf24;border:1px solid #fbbf2466;white-space:nowrap}
.pbox .held{position:absolute;right:110px;bottom:5px;transform:skewX(10deg);display:flex;gap:3px;align-items:center;
  font-size:8.5px;font-weight:700;color:#ffffffcc;white-space:nowrap;max-width:96px;overflow:hidden;justify-content:flex-end}/* HP数値(右端)のすぐ左(2026-07-06 阿部さん) */
.pbox .held img{width:14px;height:14px;object-fit:contain;image-rendering:pixelated}
.pbox .held.used{opacity:.45;filter:grayscale(1)}
.pbox .sts .bdg{font-size:9px;padding:1px 6px;border-radius:7px;background:#00000055;color:#fbbf24;border:1px solid #fbbf2466}
.pbox .balls{display:none}
/* ★2026-07-17 阿部さんFB: 両側HPボックスの能力値調整⚙。位置はCSSの固定pxでは
   持ち物テキストの長さ/画面幅で必ず重なるため、JS(positionPbGears・renderAllから毎回呼ぶ)で
   アイコン右端〜持ち物orHP数値の左端の「すき間」に動的配置する。ここは見た目(丸ボタン)だけ */
.pbox .pb-gear{position:absolute;top:4px;left:4px;transform:skewX(10deg);width:15px;height:15px;line-height:13px;
  padding:0;font-size:9px;border-radius:50%;border:1px solid #ffffff55;background:#00000066;color:#fff;
  cursor:pointer;z-index:3}
.pbox .pb-gear:hover{border-color:#d4f542}

/* ===== CH: leftbar / rightbar (残りポケモンのボールマーク列=statbarに隣接) ===== */
/* 相手=statbar直下(右上) / 自分=statbar直上(左下)。実機のボールマーク行に対応 */
#leftbar,#rightbar{position:absolute;z-index:9;display:flex;flex-direction:row;
  align-items:center;gap:3px;pointer-events:none;transition:opacity .3s}
#leftbar{left:22px;bottom:88px;top:auto}
#rightbar{right:22px;top:88px;bottom:auto}
/* トレーナー名ラベルは非表示(かぶり解消。statbarの名前で足りる) */
.sbar-name{display:none}
/* 6体を横一列の丸マークで(実機のボールマーク準拠・スプライト入りで情報量は維持) */
.sbar-icons{display:flex;gap:3px}
.sbar-icons .sicon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;background:#00000055;border:1px solid #ffffff55;overflow:hidden;transition:opacity .3s,filter .3s}
.sbar-icons .sicon img{width:19px;height:19px;object-fit:contain;display:block}
/* 場に出ている個体を強調 */
.sbar-icons .sicon.active{background:#ffffff55;box-shadow:0 0 0 2px #d4f542}
/* 瀕死 */
.sbar-icons .sicon.dead{opacity:0.35;filter:grayscale(100%) brightness(.5)}
/* スプライト画像なしのフォールバック=白● (空マークと区別して「残っている」が読めるように) */
.sbar-icons .sicon.noimg::after{content:'●';color:#fff;font-size:11px;line-height:1;text-shadow:0 1px 2px #0009}

/* ===== CH: UI出し入れ(メッセージ/演出中は全UIを消す=実機準拠の肝) =====
 * say()開始で #field.ch-busy → statbar/ボール列/ターン帯をフェードアウト。
 * setHpBar(ダメージ反映)や完了で解除=バーが戻ってきて減る、の実機の流れを再現 */
#field.ch-busy .pbox, #field.ch-busy #leftbar, #field.ch-busy #rightbar, #field.ch-busy #turn-badge, #field.ch-busy .sts-float{
  opacity:0;pointer-events:none}

/* ===== ステージ演出v3(2026-06-12 阿部さん「演出強化」) ===== */
.popnum{position:absolute;left:50%;top:8px;transform:translateX(-50%);font-weight:900;font-size:20px;
  text-shadow:0 2px 4px #000c;pointer-events:none;animation:rbPop 1s forwards;z-index:5;white-space:nowrap}
@keyframes rbPop{0%{opacity:0;transform:translateX(-50%) translateY(6px) scale(.6)}18%{opacity:1;transform:translateX(-50%) translateY(-6px) scale(1.18)}100%{opacity:0;transform:translateX(-50%) translateY(-46px) scale(1)}}
.burst{position:absolute;left:calc(50% + var(--fx-ox,0px));top:calc(46% + var(--fx-oy,0px));width:calc(120px * var(--fx-burst-scale,1));height:calc(120px * var(--fx-burst-scale,1));margin:calc(-60px * var(--fx-burst-scale,1)) 0 0 calc(-60px * var(--fx-burst-scale,1));border-radius:50%;
  pointer-events:none;animation:rbBurst .85s forwards;z-index:4/* 被弾エフェクト少し長め */}
@keyframes rbBurst{0%{transform:scale(.15);opacity:.9}100%{transform:scale(1.8);opacity:0}}
#fx-flash{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:6}
#fx-flash.on{animation:rbFlash .5s forwards}
#fx-flash.mega{animation:rbMega 1s forwards}
@keyframes rbFlash{0%{opacity:.75}100%{opacity:0}}
@keyframes rbMega{0%{opacity:0}25%{opacity:.95}55%{opacity:.6}100%{opacity:0}}
@keyframes rbWeather{0%{transform:translateY(-8px)}100%{transform:translateY(8px)}}
#weather-fx.live{animation:rbWeather 2.2s ease-in-out infinite alternate}
/* 変化技演出Phase1(2026-07-16・設計_変化技演出_2026-07-16.md §2): フィールド(グラス/エレキ/サイコ/
   ミストフィールド)の地面演出。fx_primitives.jsのsetTerrainFxが操作(#weather-fxと同じ持続ライフサイクル)。*/
#terrain-fx{position:absolute;left:0;right:0;bottom:0;height:46%;z-index:1;pointer-events:none;opacity:0;transition:opacity .35s;overflow:hidden}
#terrain-fx.live{opacity:1}
#terrain-fx[data-terrain="grass"]{background:linear-gradient(to top,rgba(74,222,128,.34),transparent 88%)}
#terrain-fx[data-terrain="electric"]{background:linear-gradient(to top,rgba(250,204,21,.3),transparent 88%)}
#terrain-fx[data-terrain="psychic"]{background:radial-gradient(ellipse at 50% 100%,rgba(168,85,247,.55),transparent 75%)}
#terrain-fx[data-terrain="misty"]{background:radial-gradient(ellipse at 50% 100%,rgba(244,114,182,.4),rgba(255,255,255,.3) 55%,transparent 85%)}
.rb-terrainp{position:absolute;bottom:2%;pointer-events:none}
.rb-terrainp-grass{font-size:24px;line-height:1;filter:drop-shadow(0 0 4px rgba(74,222,128,.9));animation:rbTerrainRise 1.5s ease-out forwards}
.rb-terrainp-electric{width:22px;height:4px;border-radius:2px;background:linear-gradient(90deg,transparent,#fde047,transparent);box-shadow:0 0 6px 1px #fde047;animation:rbTerrainSpark .6s ease-out forwards}
.rb-terrainp-psychic{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle,rgba(216,180,254,.95),transparent 70%);animation:rbTerrainSmoke 1.6s ease-out forwards}
.rb-terrainp-misty{width:52px;height:18px;border-radius:50%;background:rgba(255,255,255,.65);filter:blur(2px);animation:rbTerrainDrift 1.8s ease-in-out forwards}
@keyframes rbTerrainRise{0%{transform:translateY(0) scale(.7);opacity:0}15%{opacity:1}100%{transform:translateY(-80px) scale(1);opacity:0}}
@keyframes rbTerrainSpark{0%{transform:translateX(0) scaleX(.3);opacity:0}25%{opacity:1}100%{transform:translateX(50px) scaleX(1.4);opacity:0}}
@keyframes rbTerrainSmoke{0%{transform:translateY(0) scale(.5);opacity:0}20%{opacity:.9}100%{transform:translateY(-70px) scale(1.6);opacity:0}}
@keyframes rbTerrainDrift{0%{transform:translateX(-20px);opacity:0}20%{opacity:.8}100%{transform:translateX(60px);opacity:0}}
@keyframes rbShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-10px)}30%{transform:translateX(9px)}45%{transform:translateX(-7px)}60%{transform:translateX(5px)}75%{transform:translateX(-3px)}90%{transform:translateX(2px)}}
/* 攻撃予告: ぴょんぴょん2回はねる(2026-07-05 阿部さん「攻撃するぞーって予告」) */
@keyframes rbPreAttack{0%,100%{transform:translateY(0)}18%{transform:translateY(-12px)}36%{transform:translateY(0)}54%{transform:translateY(-8px)}72%{transform:translateY(0)}}
@keyframes rbLunge{0%{transform:none}40%{transform:translate(14px,-10px) scale(1.05)}100%{transform:none}}
@keyframes rbLungeOpp{0%{transform:none}40%{transform:translate(-14px,10px) scale(1.05)}100%{transform:none}}
@keyframes rbFaint{0%{opacity:1;transform:none}100%{opacity:0;transform:translateY(52px)}}
@keyframes rbEnter{0%{opacity:0;transform:translateY(30px) scale(.5)}70%{transform:translateY(-6px) scale(1.06)}100%{opacity:1;transform:none}}
/* 交代の引っ込み(ボールに戻る感じ=縮んで沈んで消える)。2026-07-06 阿部さん「いきなり消えていきなり出てくる」対策 */
@keyframes rbRecall{0%{opacity:1;transform:none}25%{opacity:1;transform:translateY(-10px) scale(1.04)}100%{opacity:0;transform:translateY(46px) scale(.1)}}/* ふわっと浮いてから ぐっと沈んで吸い込まれる=交代が分かる大きな動き(2026-07-06 阿部さん) */
.fighter.hit .sprite{animation:rbShake .85s/* 被弾は少し長め(2026-07-05 阿部さん) */}
.fighter.preattack .sprite{animation:rbPreAttack .7s}
.fighter.lunge-self .sprite{animation:rbLunge .45s}
.fighter.lunge-opp .sprite{animation:rbLungeOpp .45s}
.fighter.faint .sprite{animation:rbFaint 1.5s forwards}
/* ひんし後は交代まで消えたまま(2026-07-05 阿部さん「瀕死になったら画面から消えたほうがいい」) */
.fighter.gone .sprite{opacity:0;transform:translateY(40px);pointer-events:none}
.fighter.enter .sprite{animation:rbEnter .85s}
.fighter.recall .sprite{animation:rbRecall 1s forwards}

/* ===== バトル演出強化(Wave1攻撃/Wave2状態) 2026-07-10 阿部さん「音とエフェクトを派手に」 =====
 * 飛翔体・ビームは#field外(position:fixed)にappendして画面座標(getBoundingClientRect)で動かす
 * =#fieldのzoom:1.45やCSS scale変換の影響を受けず正確に飛ばせる(2026-07-10) */
.rb-proj{position:fixed;z-index:55;font-size:24px;line-height:1;pointer-events:none;left:0;top:0;
  filter:drop-shadow(0 0 6px var(--pc,#fff)) drop-shadow(0 0 2px #fff)}
.rb-proj-dot{width:12px;height:12px;border-radius:50%;background:var(--pc,#fff);
  box-shadow:0 0 10px 3px var(--pc,#fff);filter:none}
.rb-proj-dot-lg{width:20px;height:20px;box-shadow:0 0 14px 4px var(--pc,#fff)}
.rb-beam{position:fixed;z-index:55;height:5px;top:0;left:0;border-radius:3px;pointer-events:none;
  transform-origin:0 50%;background:linear-gradient(90deg, var(--bc,#fff) 0%, #ffffffcc 100%);
  box-shadow:0 0 10px 3px var(--bc,#fff)}
.rb-beam-wave{height:7px;background:repeating-linear-gradient(90deg, var(--bc,#fff) 0 8px, transparent 8px 14px);
  box-shadow:0 0 12px 4px var(--bc,#fff)}
/* mag強弱スケール(Wave2.5 S級): --shake-magはfieldShake(mag)がJSから設定(既定1=従来と同じ振れ幅) */
@keyframes rbFieldShake{0%,100%{transform:translateX(0)}20%{transform:translateX(calc(-4px * var(--shake-mag,1)))}40%{transform:translateX(calc(3px * var(--shake-mag,1)))}60%{transform:translateX(calc(-2px * var(--shake-mag,1)))}80%{transform:translateX(calc(1px * var(--shake-mag,1)))}}
#field.rb-shake{animation-name:rbFieldShake;animation-duration:.28s}
.rb-rankp{position:absolute;left:50%;bottom:30%;font-weight:900;font-size:34px;pointer-events:none;
  animation:rbRankFloat .9s ease-out forwards;z-index:5}
.rb-rankp-up{color:#4ade80;text-shadow:0 0 10px #4ade80cc,0 0 4px #fff8}
.rb-rankp-down{color:#c084fc;text-shadow:0 0 10px #c084fccc,0 0 4px #fff8}
@keyframes rbRankFloat{0%{opacity:0;transform:translate(-50%,0) scale(.6)}25%{opacity:1}100%{opacity:0;transform:translate(-50%,-60px) scale(1.1)}}
.rb-sparkle{position:absolute;font-size:16px;pointer-events:none;animation:rbSparkle .7s ease-out forwards;z-index:5}
@keyframes rbSparkle{0%{opacity:0;transform:scale(.4) translateY(6px)}30%{opacity:1}100%{opacity:0;transform:scale(1.1) translateY(-18px)}}

/* ===== Wave2.5(接触突進+S級技法)/Wave3(メガ儀式+壁+A級技法) 2026-07-10 設計v2 ===== */
/* --- 接触技=本体クローンの突進(chargeFx)。飛翔体と同じくbody直下fixed(z:55)で#fieldの変換を回避 --- */
.rb-chargeclone{position:fixed;z-index:55;pointer-events:none;margin:0}
/* --- 被弾ノックバック(.fighter外側に掛ける=.spriteのrbShake/squash&stretchと別要素で衝突しない) --- */
@keyframes rbKnockbackSelf{0%{transform:scale(1.2) translate(0,0) rotate(0deg)}30%{transform:scale(1.2) translate(-12px,4px) rotate(-3deg)}100%{transform:scale(1.2) translate(0,0) rotate(0deg)}}
@keyframes rbKnockbackOpp{0%{transform:scale(.95) translate(0,0) rotate(0deg)}30%{transform:scale(.95) translate(12px,-4px) rotate(3deg)}100%{transform:scale(.95) translate(0,0) rotate(0deg)}}
.fighter.rb-knockback-self{animation:rbKnockbackSelf .28s cubic-bezier(.22,1,.36,1)}
.fighter.rb-knockback-opp{animation:rbKnockbackOpp .28s cubic-bezier(.22,1,.36,1)}
/* --- burstFx多層化: 破片パーティクル/衝撃リング/クラス別グリフ --- */
.rb-burstp{position:absolute;left:calc(50% + var(--fx-ox,0px));top:calc(46% + var(--fx-oy,0px));border-radius:50%;pointer-events:none;z-index:4;box-shadow:0 0 4px 1px currentColor}
.rb-burstring{position:absolute;left:calc(50% + var(--fx-ox,0px));top:calc(46% + var(--fx-oy,0px));width:calc(20px * var(--fx-burst-scale,1));height:calc(20px * var(--fx-burst-scale,1));margin:calc(-10px * var(--fx-burst-scale,1)) 0 0 calc(-10px * var(--fx-burst-scale,1));border-radius:50%;
  border-width:5px;border-style:solid;pointer-events:none;z-index:4;box-sizing:border-box}
.rb-burstglyph-slash{position:absolute;left:calc(50% + var(--fx-ox,0px));top:calc(46% + var(--fx-oy,0px));width:calc(46px * var(--fx-burst-scale,1));height:calc(5px * var(--fx-burst-scale,1));margin:calc(-2px * var(--fx-burst-scale,1)) 0 0 calc(-23px * var(--fx-burst-scale,1));
  background:linear-gradient(90deg,transparent,#fff,transparent);pointer-events:none;z-index:5;animation:rbGlyphSlash .26s ease-out forwards}
@keyframes rbGlyphSlash{0%{opacity:0;transform:rotate(45deg) scaleX(.3)}40%{opacity:1;transform:rotate(45deg) scaleX(1.15)}100%{opacity:0;transform:rotate(45deg) scaleX(1)}}
.rb-burstglyph-star{position:absolute;left:calc(50% + var(--fx-ox,0px));top:calc(40% + var(--fx-oy,0px));font-size:30px;color:#fff;text-shadow:0 0 8px #fff;
  pointer-events:none;z-index:5;animation:rbGlyphStar .26s ease-out forwards}

.rb-burstglyph-spiral{position:absolute;left:calc(50% + var(--fx-ox,0px));top:calc(46% + var(--fx-oy,0px));width:calc(30px * var(--fx-burst-scale,1));height:calc(30px * var(--fx-burst-scale,1));margin:calc(-15px * var(--fx-burst-scale,1)) 0 0 calc(-15px * var(--fx-burst-scale,1));
  border-radius:50%;pointer-events:none;z-index:5;animation:rbGlyphSpiral .32s ease-out forwards}
@keyframes rbGlyphSpiral{0%{opacity:0;transform:rotate(0deg) scale(.3)}35%{opacity:.95}100%{opacity:0;transform:rotate(200deg) scale(1.5)}}

.rb-burstglyph-dust{position:absolute;left:calc(50% + var(--fx-ox,0px));top:calc(50% + var(--fx-oy,0px));width:calc(70px * var(--fx-burst-scale,1));height:calc(70px * var(--fx-burst-scale,1));margin:calc(-35px * var(--fx-burst-scale,1)) 0 0 calc(-35px * var(--fx-burst-scale,1));
  border-radius:50%;pointer-events:none;z-index:4;background:radial-gradient(circle,#a97c50cc 0%,#7a5a3855 55%,transparent 75%);

@keyframes rbGlyphDust{0%{opacity:0;transform:scale(.2)}30%{opacity:.9}100%{opacity:0;transform:scale(1.6)}}
.rb-burstglyph-crack{position:absolute;left:calc(50% + var(--fx-ox,0px));top:calc(56% + var(--fx-oy,0px));width:calc(52px * var(--fx-burst-scale,1));height:calc(14px * var(--fx-burst-scale,1));margin:calc(-7px * var(--fx-burst-scale,1)) 0 0 calc(-26px * var(--fx-burst-scale,1));pointer-events:none;z-index:4;

/* explosion: だいばくはつ/じばく専用(2026-07-11 阿部さん承認=dust流用でなく専用の閃光+爆風) */
.rb-burstglyph-explosion{position:absolute;left:calc(50% + var(--fx-ox,0px));top:calc(50% + var(--fx-oy,0px));width:calc(130px * var(--fx-burst-scale,1));height:calc(130px * var(--fx-burst-scale,1));margin:calc(-65px * var(--fx-burst-scale,1)) 0 0 calc(-65px * var(--fx-burst-scale,1));
  border-radius:50%;pointer-events:none;z-index:4;background:radial-gradient(circle,#fff 0%,#ffb350cc 30%,#c2410ccc 55%,transparent 75%);

@keyframes rbGlyphExplosion{0%{opacity:0;transform:scale(.1)}20%{opacity:1}100%{opacity:0;transform:scale(2.2)}}
/* fang: 白い鋭い牙2本(2026-07-16 阿部さんFB=人間の歯🦷でなく狼/サメ型の牙。かみつく等bite技の着弾) */
.rb-burstglyph-fang{position:absolute;left:calc(50% + var(--fx-ox,0px));top:calc(42% + var(--fx-oy,0px));width:calc(40px * var(--fx-burst-scale,1));height:calc(30px * var(--fx-burst-scale,1));margin:calc(-6px * var(--fx-burst-scale,1)) 0 0 calc(-20px * var(--fx-burst-scale,1));

/* 飛翔体側: orb/sand/dust/explosion(絵文字を持たない=既存.rb-proj-dotの発展形)。drillは回転縞 */

/* ビーム側: shapeごとの見た目バリエーション(既存.rb-beamに重ねるmodifierクラス) */

/* --- Wave3 A級: 被弾スプライトの点滅+スカッシュ&ストレッチ(体積保存 x*y≈1)。.sprite img/.circに掛ける=
   .spriteのrbShake(transform:translateX)・#f-self/#f-oppのscaleと別要素で衝突しない --- */
@keyframes rbHitFlash{0%,100%{filter:none}25%{filter:brightness(4) saturate(0)}50%{filter:none}75%{filter:brightness(4) saturate(0)}}
.fighter.hit .sprite{animation:rbShake .85s, rbHitFlash .16s linear}
.fighter.hit-big .sprite{animation:rbShake .85s, rbHitFlash .16s linear}
@keyframes rbSquash{0%{transform:scale(1,1)}25%{transform:scale(1.12,.88)}55%{transform:scale(.96,1.04)}100%{transform:scale(1,1)}}
@keyframes rbSquashFlip{0%{transform:scaleX(-1) scale(1,1)}25%{transform:scaleX(-1) scale(1.12,.88)}55%{transform:scaleX(-1) scale(.96,1.04)}100%{transform:scaleX(-1) scale(1,1)}}
@keyframes rbSquashBig{0%{transform:scale(1,1)}25%{transform:scale(1.32,.76)}55%{transform:scale(.9,1.09)}100%{transform:scale(1,1)}}
@keyframes rbSquashBigFlip{0%{transform:scaleX(-1) scale(1,1)}25%{transform:scaleX(-1) scale(1.32,.76)}55%{transform:scaleX(-1) scale(.9,1.09)}100%{transform:scaleX(-1) scale(1,1)}}
.fighter.hit .sprite .circ{animation:rbSquash .18s cubic-bezier(.34,1.56,.64,1)}
#f-opp.hit .sprite img{animation:rbSquash .18s cubic-bezier(.34,1.56,.64,1)}
#f-self.hit .sprite img{animation:rbSquashFlip .18s cubic-bezier(.34,1.56,.64,1)}
.fighter.hit-big .sprite .circ{animation:rbSquashBig .18s cubic-bezier(.34,1.56,.64,1)}
#f-opp.hit-big .sprite img{animation:rbSquashBig .18s cubic-bezier(.34,1.56,.64,1)}
#f-self.hit-big .sprite img{animation:rbSquashBigFlip .18s cubic-bezier(.34,1.56,.64,1)}
/* --- popText拡張: 急所(傾き復帰+オーバーシュート)/ばつぐん(金色glow) --- */
.popnum-crit{font-weight:900;animation:rbPopCrit .6s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes rbPopCrit{0%{opacity:0;transform:translateX(-50%) translateY(6px) scale(0) rotate(-8deg)}
  25%{opacity:1;transform:translateX(-50%) translateY(-6px) scale(1.3) rotate(4deg)}

  100%{opacity:0;transform:translateX(-50%) translateY(-46px) scale(1) rotate(0)}}
.popnum-se{color:#ffd54a;text-shadow:0 0 10px #ffd54a,0 0 4px #fff,0 2px 4px #000c;animation:rbPopSe .6s cubic-bezier(.34,1.56,.64,1) forwards}

  100%{opacity:0;transform:translateX(-50%) translateY(-46px) scale(1)}}
/* --- Wave3: メガシンカ儀式(光柱/収束玉/シルエット/虹リング/桃霧/DNAシンボル)。全て#f-側内append --- */
.rb-mega-pillar{position:absolute;left:50%;bottom:0;width:36px;height:140%;margin-left:-18px;pointer-events:none;z-index:4;

@keyframes rbMegaOrb{0%{transform:translate(var(--ox),var(--oy)) scale(2);opacity:.9}100%{transform:translate(0,0) scale(.3);opacity:.2}}
.rb-mega-silhouette{filter:brightness(0) invert(1) drop-shadow(0 0 12px #fff);transition:filter .3s}
.rb-mega-ring{position:absolute;left:50%;top:46%;width:24px;height:24px;margin:-12px 0 0 -12px;border-radius:50%;pointer-events:none;z-index:5;

.rb-mega-dna{position:absolute;left:50%;top:40%;font-size:34px;color:#fff;text-shadow:0 0 14px #ffd96b,0 0 4px #fff;

@keyframes rbMegaDna{0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-20deg)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.3) rotate(6deg)}

/* --- Wave3: 壁パネル(リフレクター=銀/ひかりのかべ=金/オーロラベール=水色。実測準拠の半透明ガラス板) ---
 * ::before=リフレクター/オーロラベール(視覚上ほぼ同時に張られない=Bulbapedia準拠なので同じ枠を共用可)、::after=ひかりのかべ */
.rb-wall-reflect::before, .rb-wall-screen::after, .rb-wall-veil::before{

/* --- エフェクト絵の体系整理(設計_エフェクト絵の体系整理_2026-07-16.md §2): 新プリミティブ3種 ---

.rb-note{position:absolute;bottom:32%;left:50%;font-size:22px;font-weight:900;pointer-events:none;z-index:5;

.rb-bindring{position:absolute;left:50%;top:38%;width:120px;height:34px;margin:-17px 0 0 -60px;border-radius:50%;

@keyframes rbBindRing{0%{opacity:0;transform:scale(1.4)}25%{opacity:1;transform:scale(1.1)}

/* D. abilityFx=特性発動バナー(2026-07-17・設計_特性・場エフェクト増強_2026-07-17.md §2)。
 * #f-<side>直下に「⭐ 名前」の帯バナー(側色=自分:青紫グラデ/相手:紅グラデ=#pb-self/#pb-oppと同じ配色語彙)。
 * スライドイン(15%)→1.1s滞在(82%まで)→フェード。計1.45s(JS側_fxAutoRemove(1450)と一致)。 */
.rb-ability-banner{position:absolute;left:50%;top:-16px;white-space:nowrap;padding:3px 10px;border-radius:12px;
  font-size:12px;font-weight:900;color:#fff;text-shadow:0 1px 2px #0009;box-shadow:0 2px 8px #0006;

#field .rb-ability-banner{top:14px}
/* P1.5: こらえた/もちこたえた(タスキ・がんじょう・こらえる)踏ん張りflash(白)。

#f-opp.endure .sprite img,#f-self.endure .sprite img{animation:rbEndureFlash .35s ease}
@keyframes rbEndureFlash{0%{filter:brightness(1)}30%{filter:brightness(2.4) saturate(0)}100%{filter:brightness(1)}}
/* P2: 設置物の常駐ミニアイコン(hazardFx・2026-07-18 設計_特性・場エフェクト増強_2026-07-17.md §4)。
 * #f-<side>の下端(platformの脇)に🪨△☠🕸を控えめに常駐。renderAllは.sprite内しか触らない=常駐に耐える。 */
.rb-hazards{position:absolute;left:50%;bottom:-14px;transform:translateX(-50%);display:flex;gap:3px;
  pointer-events:none;z-index:2;font-size:13px;line-height:1;filter:drop-shadow(0 1px 2px #0008);opacity:.9}
.rb-hazard{animation:rbHazardPop .4s ease}
@keyframes rbHazardPop{0%{opacity:0;transform:translateY(6px) scale(.5)}100%{opacity:1;transform:none}}
.rb-hazard-spikes{color:#e3e3e3;font-size:11px;font-weight:900}
.rb-hazard-toxic{color:#c084fc}
.rb-hazard-web{font-size:14px}

/* ===== Wave4 B級(juiceパス・2026-07-10 設計_バトル演出強化_2026-07-10.md v2): インパクトフレーム =====
 * 急所/KO級限定(通常打には出さない=特別感の温存)。transition:noneが命(class付与→50msでremove・JS側)。
 * 色収差風シェイクは#field.style.filterをJS側で直接付け外し(このクラスと!importantが競合しないよう分離)。
 * トラウマ式シェイク(trauma²減衰+sin合成+rotate)もJS側でtransformを直接駆動=rbFieldShake keyframesは
 * --shake-mag経路の互換維持のため値だけ設定を継続(表示はもうこのkeyframesを使わない) */
.rb-impact{filter:invert(1) grayscale(1) contrast(1.6) !important;transition:none !important}

/* ===== CH: メッセージ=盤面内オーバーレイ(箱なし・白文字+黒フチ=実機準拠) ===== */
/* 左端は自分statbar(幅210+余白)を避けて非重畳にする(ダメージ行=statbarとメッセージが同時表示のため) */
#msgbox{position:absolute;left:244px;right:14px;bottom:6px;z-index:11;background:transparent;border:none;
  padding:0 0 4px;cursor:pointer;min-height:2.6em;display:none/* メッセージ再生中だけ表示(say/nextSayが切替) */}
#msg-lines{line-height:1.5;font-size:17px;display:flex;flex-direction:column;justify-content:flex-end}
/* 実機は現在の1行だけを出す(履歴は右のバトルログパネルにある) */
#msg-lines .ml-line{display:none}
#msg-lines .ml-line:last-child{display:block;margin:0;color:#fff;font-weight:800;
  text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000,0 2px 5px #000d}
#msgbox .next{position:absolute;right:2px;bottom:-4px;color:#fff;animation:blink 1s infinite;font-size:11px;
  text-shadow:0 0 3px #000,0 1px 2px #000}
/* S1: 2カラム配置。ログは右配置(Showdown準拠)。
 * 注: 過去に「ログは左」という独自化の経緯があったが、今回の方針「Showdownと完全に同じに再現」により
 * Showdown準拠の右配置へ変更。order指定で左=盤面(order:0)/右=ログ(order:1)に揃える。 */
/* CH: 盤面640×360=16:9(チャンピオンズ実機の画面比と同一)。
 * 経緯: 07-05朝に一度640→「横長すぎ」で600に戻し→同日昼に阿部さん「実機と全く同じ縦横比に」で16:9確定(明示指示が上書き) */
#battle-main{flex:0 0 auto;width:100%;max-width:none;min-width:0;order:0}
/* 盤面は内部座標640×360のまま。zoomはfitField()がビューポートに合わせて設定(既定1.45相当=デスクトップ)。margin:autoで中央寄せ */
#field{zoom:1.45;margin:0 auto}
/* S1: ログパネル 460×362px / bg:#eef2f5(Showdown実測値) / フォントVerdana限定指定 */
/* CH: 盤面640化に合わせてログは伸縮(340〜460px)。狭ければ下に折返す(flex-wrap) */
#battle-log-panel{flex:0 0 auto;width:100%;min-width:0;max-width:none;height:230px;display:flex;flex-direction:column;order:1;
  background:#eef2f5;border:1px solid #aaaaaa;border-radius:0;
  font-family:Verdana,sans-serif;color:#000;overflow:hidden}
/* S1: ログヘッダーをShowdown配色に合わせる(bg:#e0e7ea=ターン見出し色で統一) */
#log-head{flex:0 0 auto;padding:8px 12px;font-weight:800;font-size:13px;color:#000;
  background:#e0e7ea;border-bottom:1px solid #aaaaaa}
/* S1: ログスクロール領域・文字色をShowdown準拠の黒に */
#log-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;padding:6px 12px 12px;font-size:13px;line-height:1.55;
  color:#000}
/* S4: ターン見出し h2.battle-history(旧 div.log-turn を置き換え) */
#log-scroll h2.battle-history{display:block;margin:0 -12px;padding:0 12px;
  background:#e0e7ea;color:#000;font-size:17px;font-weight:bold;
  height:31px;line-height:31px;border-radius:0}
/* S4: spacer(ターン内区切り空行) */
#log-scroll .spacer.battle-history{display:block;height:0.6em;margin:0;padding:0}
/* S4: 通常行 */
#log-scroll .log-line{color:#000;margin:1px 0}
/* S4: 効果行(small) — Showdown 13.3px×0.8 ≒ 10.6px。グレー寄りで控えめに */
#log-scroll .log-line-small{margin:0 0 1px;color:#333}
#log-scroll .log-line-small small{font-size:smaller;color:#555}
/* 後方互換: S1で設定した旧div.log-turnスタイルを残しておく(JS切替後は使われない) */
#log-scroll .log-turn{display:block;margin:0 -12px 0;padding:0 12px;
  background:#e0e7ea;color:#000;font-size:17px;font-weight:bold;
  height:31px;line-height:31px;border-radius:0}
#log-scroll .log-turn:first-child{margin-top:0}
/* S1: スマホ縦積み維持(≤880px。不変条件) */
@media(max-width:880px){
/* CH: スマホ配置の寸法上書きは後勝ちにするためstyle末尾の media ブロックにある(#moves等の定義より後) */
  #battle{flex-direction:column}
  #battle-main{flex:1 1 auto;width:100%;max-width:100%;order:0}
  #battle-log-panel{flex:0 0 auto;width:100%;height:auto;max-height:240px;min-width:0;order:1}
}
@keyframes blink{50%{opacity:0}}
/* ===== CH: コマンド/技/交代 = 盤面右側の縦オーバーレイ(チャンピオンズ準拠) ===== */
/* #cmd: たたかう(緑)/ポケモン(紫) の丸ピル縦並び+COMMANDラベル。実機スクショ準拠 */
#cmd{position:absolute;right:14px;top:auto;bottom:14px;z-index:10;display:flex;flex-direction:column;gap:7px;
  width:190px;margin:0}
/* ★バトルラボ: いま自分/相手どちらが選んでいるかの目印(labSwappedに追従) */
#lab-turn-indicator{position:absolute;left:50%;top:8px;transform:translateX(-50%);z-index:12;
  padding:4px 14px;border-radius:14px;font-weight:900;font-size:12px;color:#fff;box-shadow:0 2px 8px #0007;white-space:nowrap}
#lab-turn-indicator.self{background:linear-gradient(135deg,#2b6de0,#4f9dff);border:2px solid #ffffff55}
#lab-turn-indicator.opp{background:linear-gradient(135deg,#c0304a,#e0564a);border:2px solid #ffffff55}
/* ★L5(2026-07-17): 両方AI観戦中の表示(🤖 オートたたかい) */
#lab-turn-indicator.watching{background:linear-gradient(135deg,#4a4a5e,#6b6b82);border:2px solid #ffffff55}
/* ★A4(2026-07-17): 直前ターンのダメージピン留め(ログ上部・小さく) */
#log-pin{flex:0 0 auto;padding:4px 12px;background:#f5f2e6;border-bottom:1px solid #d9d2b8;font-size:11px;line-height:1.5;color:#4a4430}
#log-pin .pin-title{font-weight:800;color:#8a7b3a;font-size:10px}
#log-pin .pin-line{white-space:normal}
/* ★Lab-3-A(2026-07-17): 手動⇔AI切替+観戦オート。ターンインジケータの真下に常設(バトル中いつでも押せる) */
#lab-ai-row{position:absolute;left:50%;top:34px;transform:translateX(-50%);z-index:12;display:none;gap:6px;white-space:nowrap}
body.in-battle #lab-ai-row{display:flex}
#lab-ai-row .lab-ai-btn{padding:3px 10px;border-radius:12px;font-weight:800;font-size:11px;color:#fff;
  border:2px solid #ffffff44;background:#22283add;cursor:pointer;font-family:inherit;box-shadow:0 2px 6px #0006}
#lab-ai-row .lab-ai-btn.on{border-color:#d4f542;color:#d4f542}
#lab-ai-row .lab-ai-btn.self-side{background:linear-gradient(135deg,#2b6de0,#4f9dff)}
#lab-ai-row .lab-ai-btn.opp-side{background:linear-gradient(135deg,#c0304a,#e0564a)}
/* COMMANDラベルは削除(2026-07-05 阿部さん「白い文字はいらない」) */
#cmd button{position:relative;padding:12px 16px;border-radius:26px;border:2px solid #ffffff44;color:#fff;
  font-weight:900;font-size:14px;text-align:left;cursor:pointer;box-shadow:0 3px 9px #0007;
  transition:box-shadow .15s,border-color .15s,transform .1s;font-family:inherit}
#cmd button:hover:not(:disabled){border-color:#d4f542;box-shadow:0 0 0 3px #d4f54288,0 3px 9px #0007;transform:translateX(-3px)}
#cmd button:hover:not(:disabled)::before{content:'▶';position:absolute;left:-18px;top:50%;transform:translateY(-50%);
  color:#ffd400;font-size:13px;text-shadow:0 1px 3px #000}
#c-fight{background:linear-gradient(135deg,#1f8f3a,#3fc45c)}
#c-party{background:linear-gradient(135deg,#4638ae,#7b6ff0)}
/* メガシンカ=技リスト左横の丸ボタン(実機のR位置=2026-07-06 阿部さん) */
#moves .mega-side{position:absolute;left:-86px;bottom:64px;width:74px;height:74px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:0;
  background:linear-gradient(135deg,#7a6116,#c9a227);border:2px solid #ffffff55;color:#fff;cursor:pointer;
  box-shadow:0 3px 9px #0007;font-family:inherit}
#moves .mega-side:hover{border-color:#d4f542;box-shadow:0 0 0 3px #d4f54288,0 3px 9px #0007}
#moves .mega-side .ms-icon{font-size:24px;line-height:1}
#moves .mega-side .ms-label{font-size:8.5px;font-weight:800;line-height:1;letter-spacing:.3px}
#c-run{background:#22283add;font-size:10.5px;padding:7px 12px;font-weight:700;white-space:nowrap;text-align:center}
#cmd button:disabled{opacity:.35;cursor:default}
/* メガシンカ予約中: 黄色強調(既存ロジック維持) */
#cmd button.mega-armed,#moves .mega-side.mega-armed{border-color:#fff;
  background:linear-gradient(135deg,#c99b1e,#ffe45e)}
#moves .mega-side.mega-armed{animation:rbMegaPulse .9s infinite;transform:scale(1.1)}
@keyframes rbMegaPulse{0%,100%{box-shadow:0 0 0 4px #fbbf2477,0 0 16px 6px #ffd94daa}50%{box-shadow:0 0 0 12px #fbbf2422,0 0 34px 16px #ffd94dee}}
/* ===== CH: #moves 技カプセル縦リスト(チャンピオンズ準拠) ===== */
/* 実機: 縦カプセル・左にタイプ・技名・右にPP・下に相性帯(◎ばつぐん/△いまひとつ)。選択中=黄緑発光 */
#moves{position:absolute;right:14px;top:auto;bottom:10px;z-index:10;display:none;flex-direction:column;gap:4px;
  width:224px;margin:0}
/* 上段の小ボタン列(様子を見る/技の説明/⚙)=実機のX/Y行相当 */
#moves .mv-top{display:flex;gap:4px}
#moves .mv-top button{flex:1 1 auto;padding:2px 4px;border-radius:12px;font-size:9.5px;font-weight:700;text-align:center;}
#moves .mv-top button.stats-open{flex:0 0 auto;font-size:15px;padding:1px 10px}
#moves .mv-top button{
  background:#22283add;color:#dbe3f2;border:1px solid #ffffff33;cursor:pointer;font-family:inherit;white-space:nowrap}
#moves .mv-top button:hover{border-color:#d4f542}
#moves .mv-top button.on{color:#d4f542;border-color:#d4f54288}
/* 様子を見るパネル(左側オーバーレイ): ランク変化/状態/天候・フィールド残りターン。
   ★2026-07-17 阿部さんFB: バトル中は常時表示に変更→一回り小さく・詰めてコンパクト化。
   操作不要(クリック不要)なのでpointer-events:noneにして盤面クリック(メッセージ送り)を妨げない */
#watch-panel{position:absolute;left:14px;top:52px;bottom:auto;z-index:12;display:none;max-width:196px;background:#1a1f2e4d;
  border:1px solid #ffffff1c;border-radius:10px;padding:5px 8px;font-size:10px;color:#eef2fb;cursor:default;pointer-events:none;
  backdrop-filter:blur(2px);box-shadow:0 2px 8px #0004;text-shadow:0 1px 2px #0007}/* 左上・非常口ボタンの下・背景に馴染む薄い透明(2026-07-06 阿部さん) */
#watch-panel .wp-row{margin:1.5px 0;line-height:1.3}
#watch-panel .wp-row b{color:#9ec5ff}
#mv-tip{position:absolute;left:14px;bottom:112px;z-index:12;display:none;max-width:300px;/* 自分HPボックスに被らない高さ */background:#141927ee;
  border:1px solid #2a3450;border-radius:12px;padding:9px 12px;font-size:11px;line-height:1.55;color:#e6edf3;
  box-shadow:0 4px 14px #0008;pointer-events:none}
#watch-panel .bdg{font-size:8px;padding:1px 5px;border-radius:6px;background:#00000055;color:#fbbf24;border:1px solid #fbbf2466;margin-left:2px}
/* 弱点パネル(左側オーバーレイ): 相手への18タイプ相性を3区分で表示(2026-07-08 B1・watch-panel踏襲) */
#weak-panel{position:absolute;left:14px;top:52px;bottom:auto;z-index:12;display:none;max-width:260px;background:#1a1f2e55;
  border:1px solid #ffffff22;border-radius:12px;padding:9px 12px;font-size:11.5px;color:#eef2fb;cursor:pointer;
  backdrop-filter:blur(2px);box-shadow:0 2px 8px #0004;text-shadow:0 1px 2px #0007}
#weak-panel .wp-row{margin:3px 0;line-height:1.5}
#weak-panel .wp-row b{color:#9ec5ff}
#weak-panel .wp-types{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
#weak-panel .wp-t{display:inline-block;font-size:9px;padding:2px 7px;border-radius:9px;color:#fff;
  box-shadow:0 1px 2px #0007;border:1px solid #ffffff55;position:relative}
#weak-panel .wp-m{font-size:8.5px;font-weight:800;color:#fde68a;margin-left:3px}
#moves button{position:relative;padding:3px 14px 3px 12px;border-radius:18px;border:2px solid #ffffff33;
  background:linear-gradient(135deg,#4638aeee,#6a5be0ee);color:#fff;text-align:left;cursor:pointer;
  font-family:inherit;box-shadow:0 3px 8px #0006;
  transition:box-shadow .12s,border-color .12s,transform .1s}
#moves button:hover:not(:disabled){border-color:#d4f542;box-shadow:0 0 0 3px #d4f54288,0 3px 8px #0006;transform:translateX(-3px)}
#moves button:disabled{opacity:.38;cursor:default}
#moves button.tcol:not(:disabled){color:#fff;text-shadow:0 1px 3px #0009}
/* 技名(上段・bold) */
#moves .mv-name{font-weight:800;font-size:12.5px;line-height:1.25;display:block;padding-right:44px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* タイプバッジ(技名の左・実機の丸タイプアイコン相当) */
#moves .t-pill{display:inline-block;font-size:9px;padding:2px 7px;border-radius:9px;
  color:#fff;margin-right:5px;vertical-align:middle;box-shadow:0 1px 2px #0007;border:1px solid #ffffff55}
/* mv-sub: 相性ヒント帯(◎ばつぐん等)+威力/命中の小字。1行固定(折返しでカプセル高が暴れるのを防ぐ) */
#moves .mv-sub{font-size:10px;color:#ffffffcc;margin-top:1px;display:block;line-height:16px;height:17px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}/* 相性帯の有無でボタン高が揃うよう固定高 */
#moves .mv-eff{display:inline-block;font-size:10px;font-weight:800;padding:1px 8px;border-radius:8px;
  margin-right:5px;background:#00000044;border:1px solid #ffffff33}
#moves .mv-eff.eff-hyper{color:#fff;background:linear-gradient(90deg,#e0b400,#ffd400);border-color:#fff8;text-shadow:0 1px 2px #0008}
#moves .mv-eff.eff-super{color:#ffe14d;border-color:#ffe14d88}
#moves .mv-eff.eff-weak{color:#c9b8ff}
#moves .mv-eff.eff-no{color:#ff9c9c}
.mv-eff.eff-stab{background:#c9a227;color:#fff}/* タイプ一致×1.5(2026-07-10 阿部さん) */
/* PP表示: 実機準拠=右側に大きめ */
#moves .mv-pp{position:absolute;right:14px;top:6px;font-size:12px;font-weight:900;
  color:#fff;font-style:italic;text-shadow:0 1px 2px #0009}
#moves .mv-pp.pp-low{color:#ffb3a7}
/* もどるボタン */
#moves button.back{text-align:center;color:#e6edf3;font-weight:700;padding:5px;font-size:12px;
  background:#22283add;border-radius:16px}
/* ===== 交代画面(本家チャンピオンズ実機準拠3カラムオーバーレイ) 2026-07-10 阿部さん =====
 * 左=じぶんのチーム縦リスト(選択→行の下に交代する/やめる確認)/中央=選択中の読み取り専用詳細カード/
 * 右=あいてのチーム(1人用=選出チームをそのまま表示)
 * z-indexは編集モーダル(50/60)より下 */
#party{position:fixed;inset:0;z-index:40;background:#2a2350ee;display:none;align-items:flex-start;justify-content:center;padding:14px;overflow:auto}
#party .sw-card{background:#f6f5fc;border-radius:16px;padding:14px 16px;max-width:960px;width:100%;max-height:94vh;overflow:auto}
#party .sw-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
#party .sw-head h3{margin:0;color:#4638ae;font-size:15px;flex:1 1 auto}
/* ★バトルラボ(2026-07-16): 今のばんの側の見出し(#lab-turn-indicatorは#partyの背後に隠れるのでここにも出す) */
#party .sw-turn-badge{font-size:11.5px;font-weight:900;color:#fff;border-radius:10px;padding:4px 12px;white-space:nowrap}
#party .sw-turn-badge.self{background:linear-gradient(135deg,#2b6de0,#4f9dff)}
#party .sw-turn-badge.opp{background:linear-gradient(135deg,#c0304a,#e0564a)}
#party .sw-cols{display:grid;grid-template-columns:232px minmax(250px,300px) 232px;gap:14px;align-items:start;justify-content:center}
@media(max-width:760px){#party .sw-cols{grid-template-columns:1fr}}
#party .sw-colhead{font-weight:900;font-size:12px;color:#fff;text-align:center;border-radius:12px;padding:3px 0;margin-bottom:8px;transform:skewX(-8deg)}
#party .sw-colhead.self{background:linear-gradient(135deg,#4638ae,#6a5be0)}
#party .sw-colhead.opp{background:linear-gradient(135deg,#b02458,#d63c78)}
#party .sw-mine,#party .sw-opp-list{display:flex;flex-direction:column;gap:8px}
/* ★2026-07-11: 交代画面のセル=編成カプセル(.team-row .slot/slotCapsuleHtml)をそのまま流用(online_battle.htmlと同じ見た目に統一)。
   ★2026-07-17再設計: 色は「今のばんの側(mine/opp-list=編集可否)」でなく「真の左右(sw-col-self/sw-col-opp)」で決める。
   自分=常に青紫(左列)/相手=常に赤(右列)。mine/opp-listクラスは編集可否(役割)だけを担い、色は担わない。 */
#party .sw-col-self .slot{background:linear-gradient(135deg,#4638ae,#6a5be0)}
#party .sw-col-opp .slot{background:linear-gradient(135deg,#a02150,#d63c78)}
#party .sw-mine .slot{width:100%;box-sizing:border-box}
/* ★A1(2026-07-17 阿部さんFB): 場のポケモンもクリック→中央エディタで編集できる=activeもpointerに */
#party .sw-mine .slot.active{cursor:pointer}
#party .sw-mine .slot.dead{cursor:default}
#party .sw-mine .slot.selected{border-color:#7ac142;box-shadow:0 0 0 3px #d4f54277,0 2px 7px #0006}
#party .sw-mine .slot.dead{opacity:.6}
/* 閲覧専用セル。★2026-07-16 阿部さんFB: ラボは秘匿不要=名前も表示+クリックで中央詳細を閲覧可
   (交代はできない=常に閲覧専用。data-i付きのみ<button>=クリック可)。★2026-07-17: どちらの列に出ても閲覧専用の見た目は不変 */
#party .sw-opp-list .slot{width:100%;box-sizing:border-box;min-height:88px}
#party .sw-opp-list div.slot{cursor:default}
#party .sw-opp-list .slot.selected{border-color:#ffe066;box-shadow:0 0 0 3px #ffe06677,0 2px 7px #0006}
#party .sw-opp-list .slot.dead{opacity:.6}
/* 未登場=うっすらフィルター(online_battle.htmlと同型・このページでは通常発生しない) */
#party .sw-opp-list .slot.sw-ghost{opacity:.35;filter:grayscale(.75);pointer-events:none}
/* HPバー(カプセル4段目=cap-mid[row2/4]の下・row4に配置) */
#party .slot .sw-hpwrap{grid-column:1;grid-row:4;display:flex;align-items:center;gap:5px;margin-top:2px}
#party .slot .sw-hpbar-bg{flex:1 1 auto;height:6px;background:#00000045;border-radius:3px;overflow:hidden}
#party .slot .sw-hpbar{height:100%;border-radius:3px;background:#7ac142;transition:width .3s;display:block}
#party .slot .sw-hpbar.mid{background:#e0c020}
#party .slot .sw-hpbar.low{background:#e0564a}
#party .slot .sw-hptext{font-size:9px;color:#ffffffdd;white-space:nowrap}
/* 場に出ている/ひんしタグ(名前の右上=cap-leadと同じ位置。編集用cap-leadとは別クラスで独立させる) */
#party .slot .cap-tag{grid-column:2;grid-row:1;justify-self:end;align-self:start;font-size:9.5px;font-weight:800;
  background:#00000055;border-radius:9px;padding:2px 7px;border:1px solid #ffffff44;white-space:nowrap;line-height:1;color:#ffffffdd}
#party .slot .cap-tag.dead{background:#7a1c1c;border-color:#ff9a8a;color:#fff}
/* 行の下に出す交代する/やめる確認メニュー(本家準拠) */
#party .sw-confirm{display:flex;gap:8px;margin:-2px 0 2px;padding:8px;background:#efeafd;border:2px dashed #b9b2de;border-radius:12px}
#party .sw-confirm button{flex:1;padding:8px 0;border-radius:14px;border:0;font-weight:800;font-size:12.5px;cursor:pointer;font-family:inherit;box-shadow:none}
#party .sw-confirm .sw-yes{background:linear-gradient(90deg,#5a4fc4,#7b6ff0);color:#fff}
#party .sw-confirm .sw-no{background:#cfc9ea;color:#4a4470}
/* ⏩/⏸(任意交代の2択)=専用CSSが無く素の白ボタンで淡紫パネルと同化して見にくかった(2026-07-17 阿部さんFB)
   →薄い黄色/ベージュ系に。⏩(ターンも進める=大きいアクション)をやや濃いめ・⏸を薄めで区別 */
#party .sw-confirm .sw-go{background:linear-gradient(90deg,#e9c96a,#f3dc92);color:#4a3a10;border:1px solid #c9a94f}
#party .sw-confirm .sw-hold{background:linear-gradient(90deg,#f1e2b4,#f8eecd);color:#5a4a1c;border:1px solid #d8c28a}
#party .sw-confirm button:hover{box-shadow:0 0 0 2px #d4f542}
#party button.sw-back{display:block;width:100%;margin-top:10px;text-align:center;color:#8b94a7;font-weight:700;padding:9px;
  border-radius:14px;border:2px solid #c9c3e6;background:#fff;cursor:pointer;font-family:inherit}
#party button.sw-back:hover{border-color:#7a72b0;color:#4a4470;box-shadow:none;transform:none}
/* ★Lab-3-B(2026-07-17): 交代画面のリスト末尾「＋ついか」(編集列/閲覧列どちらにも出す) */
#party button.party-add-member{display:block;width:100%;text-align:center;color:#5a4fc4;font-weight:800;padding:9px;
  border-radius:14px;border:2px dashed #b9b2de;background:#efeafd;cursor:pointer;font-family:inherit;font-size:12.5px}
#party button.party-add-member:hover{border-color:#7b6ff0;color:#4638ae}
/* ★Lab-3-C: ひんし控えの♻ふっかつ(カプセル最下段=専用行として1行占有) */
#party .slot .sw-revive{grid-column:1/3;grid-row:5;justify-self:stretch;margin-top:3px;padding:5px 0;
  border-radius:10px;border:1px solid #ffffff55;background:#00000055;color:#fff;font-weight:800;font-size:11px;
  cursor:pointer;font-family:inherit}
#party .slot .sw-revive:hover{background:#000000aa;border-color:#d4f542;color:#d4f542}
/* 中央=読み取り専用詳細カード(sel-detailの見た目を流用・編集UIなし) */
#party .sw-detail{background:linear-gradient(150deg,#41369fee 0%,#5d4fd6dd 100%);border-radius:16px;padding:12px 14px;color:#fff}

/* ★2026-07-18 阿部さんFB: 中央詳細パネルのタイプ相性表(受け側=このポケモンが受ける倍率・特性込み)。
 * 能力値エディタ下の空きスペースにコンパクトに常設。編成(#sel-detail)/交代・選出(#party .sw-detail)共通。 */
.sd-matchup{margin-top:8px;padding:6px 9px;border-radius:10px;background:#00000012;font-size:10px}

.sd-matchup .smu-t{display:inline-block;font-size:9px;padding:1px 6px;border-radius:8px;color:#fff;font-weight:800;text-shadow:0 1px 1px #0007}
.sd-matchup .smu-m{font-size:8.5px;font-weight:800;margin-left:2px;opacity:.9}
/* ★バトルラボ(2026-07-16): 中央詳細が今どちら側(真の自分/あいて)を表示中か分かるバッジ+枠色(阿部さんFB item2) */
#party .sw-detail-badge{font-size:10px;font-weight:900;color:#fff;text-align:center;border-radius:9px;padding:3px 12px;
  margin-bottom:8px;display:inline-block}
#party .sw-detail-badge.sw-detail-self{background:linear-gradient(135deg,#2b6de0,#4f9dff)}
#party .sw-detail-badge.sw-detail-opp{background:linear-gradient(135deg,#c0304a,#e0564a)}
#party .sw-detail.sw-detail-self{box-shadow:inset 0 0 0 2px #4f9dff88}
#party .sw-detail.sw-detail-opp{box-shadow:inset 0 0 0 2px #e0564a88}
#party .sw-detail .sw-dhead{display:flex;gap:12px;align-items:center;margin-bottom:8px}
#party .sw-detail .sw-dhead img{width:88px;height:88px;object-fit:contain;margin:-8px 0}
#party .sw-detail .sw-dhead strong{font-size:16px;display:block;line-height:1.25}
#party .sw-detail .sw-dtypes{display:flex;gap:4px;margin-top:4px}
#party .sw-detail .sw-dtype{font-size:10px;font-weight:800;color:#fff;border-radius:9px;padding:2px 9px;display:inline-block}
#party .sw-detail .sw-dmoves{display:flex;flex-direction:column;gap:6px;margin:8px 0}
/* ★2026-07-17再設計item4: sw-dmoveは<button>化(バトル中も技をクリック→差し替え)。display:block/text-align:left/
   font-family:inheritはブラウザ既定のbutton見た目を打ち消すため必須(元は読み取り専用<div>だった) */
#party .sw-detail .sw-dmove{position:relative;display:block;width:100%;text-align:left;padding:6px 44px 6px 12px;
  border-radius:16px;border:2px solid #ffffff33;color:#fff;font-size:12.5px;font-weight:800;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;font-family:inherit;cursor:pointer;box-shadow:0 2px 6px #0005}
#party .sw-detail .sw-dmove:hover{border-color:#d4f542}
#party .sw-detail .sw-dmove .t-pill{display:inline-block;font-size:9px;padding:1px 7px;border-radius:8px;margin-right:6px;border:1px solid #ffffff55}
#party .sw-detail .sw-dmove .sw-dpp{position:absolute;right:12px;top:6px;font-style:italic;font-weight:900;font-size:12px}
#party .sw-detail .sw-drow{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:1px 2px;margin-top:6px;gap:8px}
/* 特性/持ち物ピッカー(編成画面のsd-pickをこの中央パネルにも適用) */
#party .sw-detail button.sd-pick{background:#00000042;color:#fff;border:1px solid #ffffff33;border-radius:8px;
  padding:2px 8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
#party .sw-detail button.sd-pick:hover{border-color:#d4f542}
#party .sw-detail .sw-drow span:first-child{color:#ffffffbb}
#speed-row{margin-top:8px;font-size:11px;color:#6a5fa0;display:flex;gap:10px 14px;align-items:center;flex-wrap:wrap}
#speed-row select{background:#fff;color:#3a3552;border:1px solid #c9c3e6;border-radius:8px;padding:3px 6px;font-size:11px}
/* ===== ★バトルラボ 神の手パネル(設計§3-4・2026-07-16 / 再設計2026-07-21阿部さんFB) =====
   役割の可視化: ⚙(育成をいじる=実数値・別ファイル/party screen)とは見た目を分ける。
   神の手=いまのバトル状態をいじる(HP%・状態異常・ランク・天候/フィールド)。 */
#god-hand{margin-top:10px;border:2px solid #6a5be0;border-radius:12px;background:#231f45;overflow:hidden}
.gh-head{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#2c2760;flex-wrap:wrap}
.gh-head button{border:1px solid #8f85e8;border-radius:8px;background:#3a3480;color:#fff;font-weight:800;font-size:12px;padding:5px 10px;cursor:pointer}
#gh-toggle{margin-right:auto}
#gh-battle-reset{border-color:#4ade80;background:#1f8f3a}
#gh-full-reset{border-color:#f87171;background:#7f1d1d}
/* 役割サブタイトル(2026-07-21): 「神の手=いまのバトル状態をいじる」を一言で。⚙(育成をいじる)と混同させない */
#gh-role{width:100%;font-size:10.5px;color:#c9c3ffcc;padding:0 2px;margin-top:-2px}
#gh-body{padding:10px;display:flex;flex-direction:column;gap:10px}
.gh-env{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:#c9c3ff}
.gh-env select{background:#fff;color:#3a3552;border:1px solid #c9c3e6;border-radius:8px;padding:3px 6px;font-size:12px;margin-left:6px}
.gh-sides{display:grid;grid-template-columns:1fr 1fr;gap:10px;min-width:0}
.gh-side{background:#1a1638;border-radius:10px;padding:8px;min-width:0}
/* 自分/相手の見出しはバトル本体の側色(青/赤)を踏襲=#party .sw-detail-badgeと同じグラデ(2026-07-21) */
.gh-side h4{margin:0 0 6px;font-size:11px;font-weight:900;color:#fff;text-align:center;border-radius:8px;padding:3px 6px;letter-spacing:.02em}
.gh-side.gh-self h4{background:linear-gradient(135deg,#2b6de0,#4f9dff)}
.gh-side.gh-opp h4{background:linear-gradient(135deg,#c0304a,#e0564a)}
.gh-list{display:flex;flex-direction:column;gap:6px;min-width:0}
.gh-empty{color:#8b94a7;font-size:11px}
/* ミニカプセル化(2026-07-21): 盤面カプセル(.pbox/.slot)と同じ「角丸+濃色背景+アクセント枠」語彙。
   1行詰め込みでなく段組み(名前/HP/状態/ランク)にして390px幅でもはみ出さない */
.gh-row{display:flex;flex-direction:column;gap:4px;font-size:11px;color:#fff;background:#2c2760;border-radius:10px;
  padding:6px 8px;border:1px solid #4a4390;min-width:0}
/* アクティブ個体=盤面全体で使う共通アクセント色(#d4f542・選択/ホバーの目印)で強調(2026-07-21阿部さんFB) */
.gh-row.gh-active{border-color:#d4f542;box-shadow:0 0 0 2px #d4f54244;background:#332f6b}
.gh-row-head{display:flex;align-items:center;gap:5px;min-width:0}
.gh-icn{flex:none;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.gh-icn img{width:100%;height:100%;object-fit:contain}
.gh-star{color:#d4f542;font-weight:900}
.gh-nm{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.gh-gender-m{color:#a8d4ff;font-weight:900}
.gh-gender-f{color:#ffd0e0;font-weight:900}
.gh-row-hp{display:flex;align-items:center;gap:6px;min-width:0}
.gh-hp{flex:1 1 auto;min-width:0;accent-color:#4ade80}
.gh-hpv{flex:none;min-width:60px;text-align:right;font-variant-numeric:tabular-nums;font-size:10.5px}
.gh-hpv b{font-size:12px}
.gh-hpv small{color:#c9c3ffaa}
.gh-row-st{display:flex;align-items:center;gap:6px}
.gh-st-label{color:#c9c3ffaa;font-size:10px;flex:none}
.gh-st{background:#fff;color:#3a3552;border:1px solid #c9c3e6;border-radius:6px;padding:2px 4px;font-size:11px;flex:1 1 auto;min-width:0}
/* ランクセクション: アクティブ個体だけ表示。ラベル+色つきバッジ(実機±N準拠=上昇緑/下降赤) */
.gh-rank-sec{display:flex;flex-direction:column;gap:3px;margin-top:2px;padding-top:5px;border-top:1px solid #4a439077}
.gh-rank-label{font-size:9.5px;color:#c9c3ffaa;font-weight:800;letter-spacing:.03em}
.gh-ranks{display:flex;flex-wrap:wrap;gap:4px}
.gh-rank{display:inline-flex;align-items:center;gap:2px;background:#3a3480;border-radius:6px;padding:1px 3px;border:1px solid transparent}
.gh-rank b{font-size:10px;color:#c9c3ff}
.gh-rank button{border:0;background:#5a4fc4;color:#fff;border-radius:4px;width:16px;height:16px;line-height:16px;padding:0;font-size:11px;cursor:pointer}
.gh-rv{min-width:18px;text-align:center;font-variant-numeric:tabular-nums;font-weight:800}
/* ±N配色: 実機準拠(能力ランクの増減は上昇=緑/下降=赤。CLAUDE.md「±N表記」の色版) */
.gh-rank.gh-rank-pos{border-color:#4ade8066}
.gh-rank.gh-rank-pos .gh-rv{color:#4ade80}
.gh-rank.gh-rank-neg{border-color:#f8717166}
.gh-rank.gh-rank-neg .gh-rv{color:#f87171}
@media(max-width:760px){.gh-sides{grid-template-columns:1fr}}
/* 390px想定(タスク仕様のはみ出し防止): パネル余白/フォントを一段締める */
@media(max-width:420px){
  #gh-body{padding:8px}
  .gh-env{gap:8px;font-size:11px}
  .gh-row{padding:5px 6px}
  .gh-hpv{min-width:52px;font-size:10px}
  .gh-st{font-size:10px}
}
/* ===== CH: スマホ寸法上書き。盤面内の再配置は縦持ちのみ(横向きはfitFieldのzoomが基準640×360を相似縮小=再配置不要)。2026-07-07 阿部さん iPhone横で相手が左に来る崩れを修正 ===== */
@media(max-width:880px) and (orientation:portrait){
  /* チャンピオンズ同配置(相手=右上/自分=左下)。幅を詰めて右側の技リストと非重畳にする */
  #pb-opp{right:8px;top:6px;left:auto;width:134px}
  #pb-self{left:8px;bottom:6px;top:auto;width:134px}
  #pb-self .nm,#pb-opp .nm{max-width:82px;font-size:11.5px}
  /* ★2026-07-17: スマホ幅では⚙を一回り小さく(位置はJS=positionPbGearsが毎回動的計算するのでここでは大きさのみ) */
  .pbox .pb-gear{width:13px;height:13px;line-height:11px;font-size:8px}
  #rightbar{right:14px;top:64px}
  #leftbar{left:14px;bottom:74px}
  #moves{width:188px}
  #cmd{width:150px}
  /* 交代画面(フルスクリーンオーバーレイ)はスマホでも1カラムに畳んで表示(sw-colsのmedia queryが担当) */
  #party .sw-card{padding:10px 8px;max-width:100%}
  #msgbox{left:170px}
  #msg-lines .ml-line:last-child{font-size:14px}
  .pbox .hptext{font-size:13px}
  /* 敵は左寄せ(右のメニューと重ねない。box300px中央にスプライトが来るのでマイナス寄せ) */
  #f-opp{right:auto;left:-40px;top:56px;transform:scale(.68)}
}
/* スマホ横画面はfitField()のzoomで盤面(メニュー込み)を丸ごと相似縮小するため、個別の再配置クエリは廃止(2026-07-07 阿部さん) */
/* ===== タスクD(検証WF特定・2026-07-11): モバイル小物4件。989px未満のみ・デスクトップ現状維持 ===== */
@media(max-width:989px){
  /* D3: 右上の言語切替ピル(🌐・position:fixed/i18n/runtime.js側)とヘッダー右リンクが重なるので、
     ヘッダー側にピルの専有幅ぶんの余白を確保して衝突を避ける(ピル自体は編集不可のため退避側で対応) */
  header{padding-right:128px}
  /* D4: 編成画面のバトルスタートボタンが横向き低height(例: 844×390)で画面外になり、
     スクロールしないと押せない→ビューポート下端に常時固定するフッター化(既存カード色を踏襲・スクロール量に関係なく常に押せる) */
  #setup{padding-bottom:78px}
  #setup .btns{position:fixed;left:0;right:0;bottom:0;margin:0 auto;max-width:820px;
    padding:10px 14px;background:#f6f5fcf2;box-shadow:0 -4px 14px #6a5be033;backdrop-filter:blur(3px);z-index:20}
  /* D2: 技パネルは相手スプライトの上に重なる設計(内部640×360基準なのでzoom拡大しても重なり比率は不変)。
     HPバー/名前パネルだけは万一の重なりでも隠れないよう技パネルより手前に固定 */
  .pbox{z-index:11}
  /* D1: 技パネル補助ボタン(👀様子を見る/🎯弱点/📖技の説明/⚙)はピル見た目を変えずに当たり判定だけ拡張(44px目安) */
  #moves .mv-top button::after{content:'';position:absolute;inset:-30px -5px -4px -5px}
}
@media(max-width:989px) and (orientation:landscape){
  /* D2続き: 横向きは相手スプライトが技パネルの下敷きになりやすいので少し上・左に逃がして視認性を底上げ(重なり自体は仕様として残す) */
  #f-opp{top:40px;right:130px}
}

<body>
<script>document.body.dataset.mode = window.RB_LAB_MODE || 'champions';</script>
<header>
  <div class="hdr-left">

</div>
<div id="game">

  <!-- チーム編成(CH: 本家選出画面デザイン=左:自分/右:相手/中央:選択中の詳細。2026-07-05 阿部さん) -->
  <div id="setup">
    <h2 data-i18n="battle_lab.setup_heading">🧪 バトルラボ：両側とも自由に編成！技も特性も持ち物も なんでもOK(⚙くわしく編成で変更)</h2>
    <div id="setup-top">

      <select id="team-size" style="background:#fff;color:#3a3552;border:1px solid #c9c3e6;border-radius:8px;padding:4px">
        <option value="3" selected data-i18n="real_battle.team_size_option_3">3体ずつ</option><option value="6" data-i18n="real_battle.team_size_option_6">6体ずつ(フルバトル)</option>
      </select></span>

      <label style="display:inline-flex;align-items:center;gap:5px;margin-left:12px;cursor:pointer">

           クリックで localStorage(rb_lab_data_mode)更新→再読込(champions=battle_lab.html / all=?data=all)。
           ★2026-07-21(阿部さんFB): 単一ボタンだと「もう一個ある/切り替えられる/今どっち」が伝わらない

    <div style="margin-top:10px;font-size:12px;color:#6a5fa0;display:flex;gap:8px;align-items:center">

    <div class="btns">

  <!-- バトル画面 -->

    <div id="battle-main">

      <div id="field-backdrop" data-preset="grass"></div>

      <button id="btn-exit" data-i18n-attr="title:real_battle.exit_button" title="終了"><span>🏃</span><span class="exit-div"></span><span>⊖</span></button>

<script>
// ★Phase E(2026-07-19): エンジンiframeのsrcはモードに応じてここで確定する(HTMLのsrc属性は外して二重ロード防止)。
