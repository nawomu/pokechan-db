<script>
let S = null;           // __sim ブリッジ
let busy = false;       // メッセージ再生中
let msgQueue = [];      // 表示待ちのログ行
let logPos = 0;         // battleLog の読み取り位置
let gameOver = false;
let turnNo = 1;         // ターン数(Showdown風 Turn バッジ表示用)
function updateTurnBadge(){ const b = document.getElementById('turn-badge'); if (b) b.textContent = 'Turn ' + turnNo; }
// ===== 流れるバトルログ(Showdown風・右カラム。履歴が積み上がって残る) =====
// S4: 4層マークアップ化。ターン見出し=h2.battle-history / 通常行=div.log-line.battle-history /
//     効果行=div.log-line.log-line-small.battle-history / spacer=div.spacer.battle-history
// retranslateLogDom は .log-line の textContent を走査するため .log-line クラスは必ず維持する。
// XSS対策: テキストはすべて textContent / createTextNode で挿入し innerHTML に生文字列を流さない。
let lastLogTurn = 0;
function clearLog(){ const s = document.getElementById('log-scroll'); if (s) s.innerHTML = ''; lastLogTurn = 0; }
function logTurnHeader(n){ const s = document.getElementById('log-scroll'); if (!s || n === lastLogTurn) return; lastLogTurn = n;
  // spacer before turn h2 (ターン間の区切り空行)
  if (lastLogTurn > 0){ const sp = document.createElement('div'); sp.className = 'spacer battle-history'; sp.appendChild(document.createElement('br')); s.appendChild(sp); }
  const h = document.createElement('h2'); h.className = 'battle-history'; h.textContent = 'Turn ' + n; s.appendChild(h);
  // spacer after turn h2
  { const sp = document.createElement('div'); sp.className = 'spacer battle-history'; sp.appendChild(document.createElement('br')); s.appendChild(sp); }
  s.scrollTop = s.scrollHeight; }
// S4: logLine(text, type) — type: 'normal'(省略時) / 'small'(効果行) / 'spacer'(区切り空行)
// 技名の <strong> はセグメント分割で安全に挿入(textContent ベースを維持)。
// 技使用行パターン: 「〇〇の 〇〇！」または「〇〇 の 〇〇！」で始まり技名が「！」で終わる
function _logMoveSplit(text, container){
  // 「Aの B！」または「A の B！」: 末尾「！」まで技名(最後の「！」区切り)
  // パターン: "{ポケモン名}の {技名}！" か "{ポケモン名} の {技名}！"
  const m = text.match(/^(.+?)(の |の)(\S+？?！)(.*)$/);
  if (!m){ container.textContent = text; return; }
  const prefix = m[1] + m[2];
  const moveName = m[3];
  const suffix = m[4];
  container.appendChild(document.createTextNode(prefix));
  const strong = document.createElement('strong');
  strong.textContent = moveName;
  container.appendChild(strong);
  if (suffix) container.appendChild(document.createTextNode(suffix));
}
// 効果行(small)として扱うパターン
const _SMALL_PATS = [
  /^こうかは ばつぐんだ！$/,
  /^こうかは いまひとつのようだ…$/,
  /^こうかは こうかなし…$/,
  /^きゅうしょに あたった！$/,
];
function _isSmallLine(text){
  for (var i=0;i<_SMALL_PATS.length;i++) if (_SMALL_PATS[i].test(text)) return true;
  return false;
}
function logLine(text, type, srcJa){ const s = document.getElementById('log-scroll'); if (!s || text == null || text === '') return;
  // type 未指定時は内容でauto判定
  if (!type){ type = _isSmallLine(text) ? 'small' : 'normal'; }
  if (type === 'spacer'){
    const sp = document.createElement('div'); sp.className = 'spacer battle-history'; sp.appendChild(document.createElement('br')); s.appendChild(sp); s.scrollTop = s.scrollHeight; return;
  }
  const d = document.createElement('div');
  d.className = 'log-line battle-history' + (type === 'small' ? ' log-line-small' : '');
  d.setAttribute('data-bl-src', srcJa != null ? srcJa : text); // retranslateLogDom が参照するja原文(常にJA正典)
  if (type === 'small'){
    const sm = document.createElement('small'); sm.textContent = text; d.appendChild(sm);
  } else {
    // 技使用行は技名を strong にする試み(失敗してもフォールバックで全文 textContent)
    const isMoveUse = /^(.+?)(の |の )(\S+！)/.test(text);
    if (isMoveUse) { try { _logMoveSplit(text, d); } catch(e){ d.textContent = text; } }
    else { d.textContent = text; }
  }
  s.appendChild(d); s.scrollTop = s.scrollHeight; }
// メッセージ欄(下部・6行)に1行積む。直近が薄く残って見える
function pushMsgLine(text){ const ml = document.getElementById('msg-lines'); if (!ml || text == null) return;
  const d = document.createElement('div'); d.className = 'ml-line'; d.textContent = text; ml.appendChild(d);
  while (ml.children.length > 40) ml.removeChild(ml.firstChild);
  ml.scrollTop = ml.scrollHeight; }
function clearMsg(){ const ml = document.getElementById('msg-lines'); if (ml) ml.innerHTML = ''; }

const $ = id => document.getElementById(id);

// ★Phase E(2026-07-19)→2026-07-21セグメント化: チャンピオンズ版⇔全部版トグル(エンジン読込を待たず・DOM準備済みなら即配線)。
// 両セグメントのラベルは常に静的表示(data-i18n配線=i18n/runtime.jsのapplyDOMが自動で言語追従・JS側での上書き不要)。
// JS側の仕事は「今のモードにactiveクラスを付ける」だけ。非アクティブ側クリック=切替、アクティブ側クリック=何もしない。
function initDataModeToggle(){
  const wrap = $('lab-data-mode');
  if (!wrap) return;
  const mode = (window.RB_LAB_MODE === 'all') ? 'all' : 'champions';
  wrap.querySelectorAll('.data-mode-seg').forEach(seg => {
    const segMode = seg.dataset.mode;
    seg.classList.toggle('active', segMode === mode);
    seg.addEventListener('click', () => {
      if (segMode === mode) return; // 既にアクティブな側=何もしない
      try { localStorage.setItem('rb_lab_data_mode', segMode); } catch (e) {}
      location.href = location.pathname + (segMode === 'all' ? '?data=all' : '');
    });
  });
}
initDataModeToggle();

// I18N 表示ヘルパー(マスターDBの固有名詞は直書きせずDB辞書から描画。jaや未登録はjaにフォールバック)
const tPokeName = nm => (window.I18N && window.I18N.pokemon) ? window.I18N.pokemon(nm) : nm;
const tAbilityName = nm => (window.I18N && window.I18N.ability) ? window.I18N.ability(nm) : nm;
// 特性名リスト(2026-07-17・設計_特性・場エフェクト増強_2026-07-17.md §2): ABILITY_DESC辞書(pokechan_data.js)の
// JA名から動的生成(ハードコードしない)。長い名前を先に並べる(部分一致の罠=「かちき」の中に「ち」だけ拾う等を回避)。
// lineWithFxの汎用マッチ(_ABILITY_GENERIC_RE)がこの一覧をそのまま使う=辞書が増えても自動で拾う。
// メイカー4種(エレキ/グラス/ミスト/サイコメイカー)はABILITY_DESC(SSOT)に追加済み(2026-07-18)=
// 2026-07-17の手動補完(ローカルconcat)は撤去。以降の特性追加も辞書に入れれば自動で拾われる。
const _ABILITY_NAMES = (typeof ABILITY_DESC !== 'undefined' ? Object.keys(ABILITY_DESC) : [])

function pickPresetBuildsRB(n){

  for (let i = list.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }

// メガストーンのapplies_to(進化前の種=カイリュー)を置いてバトル中にメガシンカさせる(既存エンジンがそのまま処理)。
// この時build.ability/build.movesはメガシンカ後の値である(実測=23/58ビルドで検証済)ため、

function applyPresetToSlot(id, build){
  if (!build || !build.species) return false;
  const srcPoke = S.pokeByName(build.species);   // JSON上の種(メガ名の場合あり=技検索の基準)

// PRESET_BUILDSから候補を集める。例: 「クチート」を選んでいても「メガクチート」ビルドがヒットする。
function findPresetsForSpecies(name){
  if (!name || !Array.isArray(window.PRESET_BUILDS)) return [];
  const items = S.itemsList() || [];
  const out = [];
  for (const b of window.PRESET_BUILDS){
    if (b.species === name){ out.push(b); continue; }
    if (b.species && b.species.startsWith('メガ')){
      const it = items.find(i => i.name === b.item);
      if (it && it.applies_to === name) out.push(b);
    }
  }
  return out;
}

  return S.itemsList().filter(it => it.category !== 'mega_stone' || it.key === 'mega_stone_any');
}
// ★2026-07-18 阿部さんFB(メタグロスナイト表示): メガストーンは汎用mega_stone_anyに統一(2026-07-13確定)なのに、
// 保存編成(rb_team_lab_*)/プリセット/ビルダーhandoff/オンライン相手チーム由来の個別ストーンキーが読込・設定経路で
// 素通りしていた。itemキーが入ってくる全経路(loadTeam/setSlot/applyPresetToSlot/buildSide/各エディタ書き込み)で
// この正規化を通す=既存の保存データもリロードで自己修復(real_battleのFORM_REVERT矯正と同じ流儀)。
function normMegaKeyRB(k){
  if (!k || k === 'mega_stone_any') return k;
  const it = (typeof S !== 'undefined' && S.itemByKey) ? S.itemByKey(k) : null;
  return (it && it.category === 'mega_stone') ? 'mega_stone_any' : k;
}
// 共通選択モーダル: groups=[{label, rows:[{key,name,desc,selected}]}]
function openChoiceModal(title, groups, onPick, anchor){
  const cm = $('choice-modal');
  const box = cm.querySelector('.cm-box');
  cm.querySelector('.cm-title').textContent = title;
  const totalRows = groups.reduce((n, g) => n + g.rows.length, 0);
  const bodyHtml = groups.map((g, gi) =>
    (g.label ? `<div class="cm-group" data-cmgroup="${gi}">${g.label}</div>` : '') +
    g.rows.map(r => {
      const searchStr = ((r.name || '') + ' ' + (r.desc || '')).replace(/<[^>]*>/g, '');
      if (r.info)   // 情報行(選択不可): メガシンカ後の特性表示など(2026-07-10 阿部さん)
        return `<div class="cm-inforow" data-cmg="${gi}" data-search="${searchStr.replace(/"/g, '')}"><b>${r.icon || ''}${r.name}</b>${r.desc ? `<span>${r.desc}</span>` : ''}</div>`;
      return `<button class="cm-row${r.selected ? ' sel' : ''}" data-k="${r.key}" data-cmg="${gi}" data-search="${searchStr.replace(/"/g, '')}"><b>${r.icon || ''}${r.name}</b>${r.desc ? `<span>${r.desc}</span>` : ''}</button>`;
    }).join('')
  ).join('');
  cm.querySelector('.cm-body').innerHTML = bodyHtml;
  // 項目が多い時(もちもの等)は文字検索をヘッダー行に出す=縦幅節約(2026-07-07 阿部さん)
  const head = cm.querySelector('.cm-head');
  const oldSearch = head.querySelector('.cm-search'); if (oldSearch) oldSearch.remove();
  if (totalRows > 12){
    const inp = document.createElement('input');
    inp.className = 'cm-search';
    inp.placeholder = I18N.t('real_battle.item_search_placeholder','なまえで さがす(ひらがなでもOK)…');
    head.insertBefore(inp, head.querySelector('.cm-x'));
  }
  cm.style.display = 'block';
  // 検索フィルタ: 名前/説明にマッチしない行を隠す。空になったグループ見出しも隠す(検索はヘッダー行)
  const sInput = cm.querySelector('.cm-head .cm-search');
  if (sInput){
    const applyFilter = () => {
      const q = sInput.value.trim();
      const k = (typeof toKata === 'function') ? toKata(q) : q;
      const groupHas = {};
      cm.querySelectorAll('.cm-row').forEach(row => {
        const hit = !q || row.dataset.search.includes(q) || (k && row.dataset.search.includes(k));
        row.style.display = hit ? '' : 'none';
        if (hit) groupHas[row.dataset.cmg] = true;
      });
      cm.querySelectorAll('.cm-group').forEach(gl => { gl.style.display = groupHas[gl.dataset.cmgroup] ? '' : 'none'; });
    };
    sInput.addEventListener('input', applyFilter);
    // 自動フォーカスしない=キーボードが勝手に出るのを防ぐ(タップで出す)(2026-07-07 阿部さん)
  }
  // 押したボタンの上に出す(マウス移動を最小に=2026-07-06 阿部さん)。入り切らなければ下/画面内にクランプ
  const w = box.offsetWidth, h = box.offsetHeight, vw = innerWidth, vh = innerHeight;
  let left = vw / 2 - w / 2, top = 60;
  if (anchor && anchor.getBoundingClientRect){
    const a = anchor.getBoundingClientRect();
    left = Math.max(8, Math.min(a.left + a.width / 2 - w / 2, vw - w - 8));
    top = a.top - h - 10;
    if (top < 8) top = 8;   // 入り切らない時は画面上部に出す(下に落とさない=2026-07-06 阿部さん)
  }
  box.style.left = left + 'px';
  box.style.top = top + 'px';
  // 選択中の行が見える位置までスクロール
  const sel = cm.querySelector('.cm-row.sel');
  if (sel) sel.scrollIntoView({ block: 'center' });
  cm.querySelectorAll('.cm-row').forEach(b => b.addEventListener('click', () => { SE.select(); cm.style.display = 'none'; onPick(b.dataset.k); }));
}
// 同サイドの他スロットが使用中の持ち物キー(1種類1個ルール用。メガストーンは除外)
function usedItemsRB(id){
  const sib = (id[0] === 's' ? selfIds() : oppIds()).filter(x => x !== id);
  return new Set(sib.map(x => slotItem[x]).filter(k => k && k !== 'mega_stone_any'));
}
// 読込/おまかせ後の重複持ち物を矯正(先勝ち・後のスロットは汎用メガストーンへ)
function dedupeItemsRB(){
  [selfIds(), oppIds()].forEach(ids => {
    const seen = new Set();
    ids.forEach(id => {
      const k = slotItem[id];
      if (!k || k === 'mega_stone_any') return;
      if (seen.has(k)) slotItem[id] = 'mega_stone_any';
      else seen.add(k);
    });
  });
}

  cm.style.display = 'block';
  const w = box.offsetWidth, h = box.offsetHeight, vw = innerWidth;
  let left = vw / 2 - w / 2, top = 60;

    const a = anchor.getBoundingClientRect();
    left = Math.max(8, Math.min(a.left + a.width / 2 - w / 2, vw - w - 8));
    top = a.top - h - 10;
    if (top < 8) top = 8;
  }
  box.style.left = left + 'px';
  box.style.top = top + 'px';
  cm.querySelectorAll('.cm-cell').forEach(b => b.addEventListener('click', () => { SE.select(); cm.style.display = 'none'; onPick(b.dataset.k); }));

// 持ち物の5ジャンル(ビルダーのモーダル同様「ジャンル+説明」で探しやすく)
const ITEMCAT_BUCKET = {attack_boost:'attack', type_boost:'attack', speed_boost:'speed',
  defense_boost:'defense', survival:'defense', berry_resist:'heal', berry_status_cure:'heal', berry_hp_cure:'heal', hp_drain:'heal'};
function openItemModal(current, onPick, anchor, usedKeys){
  const buckets = {attack:[], speed:[], defense:[], heal:[], other:[]};
  // 同サイドで使用中の持ち物は出さない=1種類1個(メガストーンだけ共有可・2026-07-06 阿部さん)
  itemChoicesRB().filter(it => it.key === 'mega_stone_any' || !(usedKeys && usedKeys.has(it.key)))
    .forEach(it => { buckets[ITEMCAT_BUCKET[it.category] || 'other'].push(it); });
  const g = [{label:'', rows:[{key:'', name:I18N.t('real_battle.item_none_option','もちもの なし'), desc:'', selected:!current}]}];
  [['attack','itemcat_attack','こうげき強化'],['speed','itemcat_speed','すばやさ'],['defense','itemcat_defense','ぼうぎょ・たいきゅう'],
   ['heal','itemcat_heal','きのみ・かいふく'],['other','itemcat_other','そのほか']].forEach(([b, k, ja]) => {
    if (!buckets[b].length) return;
    // ★2026-07-18: ラボはサンドボックス仕様=ポケチャン未実装アイテムも選べる(itemChoicesRBは絞り込まない)が、
    // 技ピッカーの「🧪 おぼえない技」と同じ流儀で未実装には🧪印を付けて分かるようにする(新i18nキー不要)。
    g.push({label:I18N.t('real_battle.' + k, ja), rows:buckets[b].map(it => ({key:it.key, name:(it.implemented_in_pokechan === false ? '🧪 ' : '') + tItemName(it), desc:tItemDesc(it), icon:itemIconHtml(it), selected:current === it.key}))});
  });
  openChoiceModal(I18N.t('real_battle.sel_item','もちもの'), g, onPick, anchor);
}

// 編成の保存/復元(localStorage): ポケモン名・技名・持ち物キー・人数(リロードしても残る)
// ★バトルラボ: 保存キーはreal_battleの`rb_team`と完全分離(自分/相手それぞれ別キー=設計§4)
// ★Phase E(2026-07-19): allモードはキー名前空間を分ける(_all_)。championsモードは既存キー名を維持=
// 既存の保存編成をそのまま読める(設計_全部版バトル切替_2026-07-18.md 契約7)。
function labTeamKey(side){ return (window.RB_LAB_MODE === 'all') ? ('rb_team_lab_all_' + side) : ('rb_team_lab_' + side); }
function saveTeam(){
  try {
    // ★2026-07-16バグ修正: 以前は`ids === selfIds()`で比較していたが、selfIds()は毎回新しい配列を
    // 返す(Array.from)ため参照が一致せず常にfalse=常にleadSlot.oppが両サイドに保存されていた
    // (自分側の「1番目」変更がリロード後に消える原因)。sideを直接渡す形に修正。
    const pack = (ids, side) => ({
      size: teamSize,
      lead: leadSlot[side],
      val: Object.fromEntries(ids.map(id => [id, slotVal[id]])),
      item: Object.fromEntries(ids.map(id => [id, slotItem[id]])),
      ability: Object.fromEntries(ids.map(id => [id, slotAbility[id]])),
      gender: Object.fromEntries(ids.map(id => [id, slotGender[id]])),
      nature: Object.fromEntries(ids.map(id => [id, slotNature[id]])),
      effort: Object.fromEntries(ids.map(id => [id, slotEffort[id]])),
      moves: Object.fromEntries(ids.map(id => [id, (slotMoves[id] || []).map(m => m && m.name)])),
    });
    localStorage.setItem(labTeamKey('self'), JSON.stringify(pack(selfIds(), 'self')));
    localStorage.setItem(labTeamKey('opp'), JSON.stringify(pack(oppIds(), 'opp')));
  } catch (e) {}
}
function loadTeam(){
  try {
    const dSelf = JSON.parse(localStorage.getItem(labTeamKey('self')) || 'null');
    const dOpp = JSON.parse(localStorage.getItem(labTeamKey('opp')) || 'null');
    if (!dSelf || !dSelf.val || !dSelf.val.s1) return false;
    teamSize = dSelf.size || 3;
    leadSlot = {
      self: (dSelf.lead && selfIds().includes(dSelf.lead)) ? dSelf.lead : 's1',
      opp:  (dOpp && dOpp.lead && oppIds().includes(dOpp.lead)) ? dOpp.lead : 'o1'
    };
    $('team-size').value = String(teamSize);
    renderTeamRows();
    const allMoves = Object.values(WAZA_MAP);
    const applyOne = (d, id) => {
      if (!d) return;
      // 保存チームにメガのすがたが残っていたら基本のすがたへ矯正(メガはバトル中のみ)
      const _p0 = d.val[id] && S.pokeByName(d.val[id]);
      if (_p0 && (_p0.mega || _p0.form === 'メガ進化')){
        const _base = d.val[id].replace(/^メガ/, '').replace(/[XY]$/, '');
        if (S.pokeByName(_base)) d.val[id] = _base;
      }
      if (!d.val[id] || !S.pokeByName(d.val[id])) return;
      slotItem[id] = normMegaKeyRB(d.item && d.item[id] != null ? d.item[id] : 'mega_stone_any');   // ★2026-07-18: 保存データの個別ストーンを自己修復
      slotGender[id] = (d.gender && d.gender[id]) || genderOfRB(d.val[id]);
      slotNature[id] = (d.nature && d.nature[id]) || 'まじめ';
      slotEffort[id] = clampEffortRB((d.effort && d.effort[id]) || {});
      const poke = S.pokeByName(d.val[id]);
      // ★バトルラボ: 特性は全特性から自由選択なので、ABILITY_DESCに存在すればそのまま復元
      const _abSaved = d.ability && d.ability[id];
      slotAbility[id] = (_abSaved && ABILITY_DESC[_abSaved] != null) ? _abSaved : defaultAbilityRB(poke);
      const names = (d.moves && d.moves[id]) || [];
      const mvs = names.map(n => allMoves.find(m => m.name === n)).filter(Boolean);
      slotMoves[id] = mvs.length === 4 ? mvs : autoMoves(poke);
      setSlot(id, d.val[id], true);
    };
    selfIds().forEach(id => applyOne(dSelf, id));
    oppIds().forEach(id => applyOne(dOpp, id));
    dedupeTeams();   // 過去の保存に同種重複が残っていたら引き直す
    dedupeItemsRB(); // 過去の保存に持ち物重複が残っていたら矯正(1種類1個)
    return true;
  } catch (e) { return false; }
}
// 同じポケモンは1チーム1体まで(2026-07-06 阿部さん)。重複していた2体目以降をランダムな未使用種に引き直す
function dedupeTeams(){
  const all = S.pokeList().filter(isPickable).map(p => p.name);
  [selfIds(), oppIds()].forEach(ids => {
    const seen = new Set();
    ids.forEach(id => {
      const nm = slotVal[id];
      if (!nm) return;
      if (seen.has(nm)){
        const pool = all.filter(n => !seen.has(n) && !ids.some(x => slotVal[x] === n));
        if (pool.length) setSlot(id, pool[Math.floor(Math.random() * pool.length)]);
      }
      seen.add(slotVal[id]);
    });
  });
}
// チームビルダー(party_checker.html)からの受け取り(2026-06-13)。自分チームだけ反映・相手はランダム。
// 一度読んだら handoff キーは消す(リロードで毎回上書きしないため。rb_teamには保存される)
function loadHandoff(){
  try {
    const d = JSON.parse(localStorage.getItem('pokechan_realbattle_handoff_v1') || 'null');
    if (!d || !Array.isArray(d.party)) return false;
    const picks = d.party.filter(e => e && e.name && S.pokeByName(e.name)).slice(0, 6);
    if (!picks.length) return false;
    localStorage.removeItem('pokechan_realbattle_handoff_v1');
    teamSize = picks.length > 3 ? 6 : 3;
    $('team-size').value = String(teamSize);
    renderTeamRows();
    const pokes = S.pokeList().filter(isPickable);
    // 重複なしランダム(同名2体は交代リストで紛らわしい): 使った名前を除外しながら引く
    const used = new Set(picks.map(e => e && e.name).filter(Boolean));
    const rnd = () => {
      const cand = pokes.filter(p => !used.has(p.name));
      const nm = (cand.length ? cand : pokes)[Math.floor(Math.random() * (cand.length ? cand.length : pokes.length))].name;
      used.add(nm);
      return nm;
    };
    // 自分チーム = ビルダーの編成(技keyを解決・足りなければ自動補完)
    selfIds().forEach((id, i) => {
      const e = picks[i];
      if (!e){ setSlot(id, rnd()); return; }
      const poke = S.pokeByName(e.name);
      const all = S.usableMoves(poke);
      const byKey = (e.moves || []).map(k => all.find(m => m && (m.key === k || m.name === k))).filter(Boolean);
      slotMoves[id] = byKey.length ? byKey.slice(0, 4) : autoMoves(poke);
      slotItem[id] = normMegaKeyRB(e.item || 'mega_stone_any');   // ★2026-07-18: ビルダーhandoffの個別ストーンも汎用へ
      slotGender[id] = e.gender || genderOfRB(e.name);
      slotNature[id] = e.nature || 'まじめ';
      slotEffort[id] = clampEffortRB(e.effort || {});
      slotAbility[id] = null;   // ビルダーhandoffは特性を持たない→setSlot(keepCustom)内で既定を補完
      setSlot(id, e.name, true);
    });
    dedupeItemsRB();
    // 相手チームはランダム
    oppIds().forEach(id => setSlot(id, rnd()));
    dedupeTeams();   // ビルダー側に同種が居ても1チーム1体に矯正
    return true;
  } catch (e) { return false; }
}
// ===== 能力値コンパクトエディタ(中央パネル直下に一体化・2026-07-05 阿部さん) =====
// ルールはビルダー準拠(合計66pt/1能力32pt/1pt=実数値+1・性格補正)。UIは指示どおりコンパクト独自:
// ポケモン名なし/メーター4目盛り(1目盛り=8pt)/MIN⇔MAXトグル1個/適用・キャンセルなし=触った瞬間に確定保存
const EV_LETTER = {hp:'H', atk:'A', def:'B', spatk:'C', spdef:'D', spd:'S'};
const EV_LABEL_KEY = {hp:'stats.hp_full', atk:'stats.atk_full', def:'stats.def_full',
  spatk:'stats.sp_atk_full', spdef:'stats.sp_def_full', spd:'stats.spd_full'};
const tNature = n => (window.I18N && I18N.nature) ? I18N.nature(n) : n;
// ctx = { poke, getEff(), getNature(), apply(eff, nature) } — applyは変更のたびに即呼ばれる(自動確定)
function renderEvEditor(container, ctx){
  if (!container || !ctx.poke) return;
  const eff = clampEffortRB(ctx.getEff());
  const natureName = ctx.getNature() || 'まじめ';
  const nat = S.natureList().find(n => n[0] === natureName) || ['まじめ','—','—'];
  const total = EFFORT_KEYS.reduce((s, k) => s + eff[k], 0);
  const maxFor = k => Math.min(32, 66 - (total - eff[k]));
  const tmp = S.makeSideState();
  tmp.poke = ctx.poke; tmp.effort = eff; tmp.natureIdx = S.natureIdxOf(natureName);
  // 性格表記=名前をやめて補正だけ(2026-07-10 阿部さん「ずぶとい→B↑A↓だけでいい」)。補正なし(がんばりや等)=±0。
  // 名前はtitle(ホバー)に残す
  const natFx = n => n[1] !== '—' ? `${EV_LETTER[n[1]]}↑${EV_LETTER[n[2]]}↓` : '±0';
  const curNat = S.natureList().find(n => n[0] === natureName) || ['まじめ','—','—'];
  container.classList.toggle('full', total >= 66);
  container.innerHTML =
    `<div class="sd-ev-top"><button class="sd-nature sd-pick" title="${tNature(natureName)}">${natFx(curNat)} ▾</button>` +
    `<span class="sd-ev-budget"><b>${total}</b>/66</span>` +
    `<button class="sd-ev-reset">${I18N.t('buttons.reset','リセット')}</button></div>` +
    EFFORT_KEYS.map(k => {
      const pts = eff[k], mx = maxFor(k);
      const isMin = pts > 0 && pts >= mx;   // これ以上盛れない→MINに切り替わる(1ボタントグル)
      return `<div class="sd-ev-row${pts >= 32 ? ' maxed' : pts > 0 ? ' has' : ''}" data-k="${k}">` +
        `<span class="evl${nat[1] === k ? ' up' : nat[2] === k ? ' down' : ''}">${EV_LETTER[k]}<small>${I18N.t(EV_LABEL_KEY[k], k)}</small></span>` +
        `<span class="real">${S.realStat(tmp, k)}</span><span class="sp"></span>` +
        `<button class="dec" ${pts <= 0 ? 'disabled' : ''}>◀</button><span class="pts">${pts}</span>` +
        `<button class="inc" ${pts >= mx ? 'disabled' : ''}>▶</button>` +
        `<button class="mm" ${!isMin && mx <= pts ? 'disabled' : ''}>${isMin ? 'MIN' : 'MAX'}</button></div>`;
    }).join('');
  // どの操作も即確定(適用ボタン無し=他のポケモンに移っても設定が残る)
  const commit = (newEff, newNature) => {
    ctx.apply(clampEffortRB(newEff || eff), newNature || natureName);
    renderEvEditor(container, ctx);
  };
  container.querySelector('.sd-nature').addEventListener('click', e => {
    SE.select();
    openNatureModal(natureName, k => commit(eff, k), e.currentTarget);
  });
  container.querySelector('.sd-ev-reset').addEventListener('click', () => { SE.select(); commit(ZERO_EV()); });
  container.querySelectorAll('.sd-ev-row').forEach(row => {
    const k = row.dataset.k;
    const set = v => commit({ ...eff, [k]: Math.max(0, Math.min(maxFor(k), Math.round(v))) });
    row.querySelector('.dec').addEventListener('click', () => set(eff[k] - 1));
    row.querySelector('.inc').addEventListener('click', () => set(eff[k] + 1));
    row.querySelector('.mm').addEventListener('click', () => { SE.select(); set(eff[k] > 0 && eff[k] >= maxFor(k) ? 0 : maxFor(k)); });
    // メーター(bar)は廃止=ドラッグ入力も廃止(2026-07-07 阿部さん)
  });
}

function renderMovePickList(query){
  if (!movePick) return;
  // ★バトルラボ: 習得可否を無視して全498技(WAZA_MAP)から選べる(テスト用途の核心=設計§3)。
  // ただし「本来おぼえる技」か「おぼえない技(ラボ専用)」かはセクション分けして見分けられるようにする(2026-07-16 阿部さんFB)
  const all = Object.values(WAZA_MAP);

  const k = toKata(query.trim());
  let hits = k ? all.filter(m => m.name.includes(k) || m.name.includes(query.trim())) : all;
  if (mpCat) hits = hits.filter(m => m.category === mpCat);
  // 並び: 攻撃技(物理/特殊混合)を威力の強い順→変化技は末尾(2026-07-06 阿部さん)
  const sortFn = (a, b) => {
    const av = a.category === '変化' ? -1 : (a.power || 0);
    const bv = b.category === '変化' ? -1 : (b.power || 0);
    return bv - av;
  };
  const curName = movePick.entry ? (movePick.entry.illusionAs || movePick.entry.poke).name : slotVal[movePick.slotId];
  const learnable = hits.filter(m => isMoveLearnableBy(m, curName)).sort(sortFn);
  const unlearnable = mpLearnableOnly ? [] : hits.filter(m => !isMoveLearnableBy(m, curName)).sort(sortFn);
  const renderBtn = (m, isUnlearnable) => {

    const pri = (m.battle_data && m.battle_data.priority) || m.priority || 0;
    const desc = (window.I18N && I18N.moveDesc && I18N.moveDesc(m.key)) || m.description || m.desc || '';
    const meta = [
      `${I18N.t('real_battle.move_power_label','威力')}${m.power ?? '—'}`,

    html += learnable.slice(0, 120).map(m => renderBtn(m, false)).join('');

    html += unlearnable.slice(0, 120).map(m => renderBtn(m, true)).join('');

  $('mp-list').innerHTML = html || `<div style="color:#8b94a7;padding:8px">${I18N.t('real_battle.move_not_found','みつからない…')}</div>`;
  $('mp-list').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {

        // ★バトルラボ(2026-07-17): バトル中の技差し替え=生きたentry.movesを直接書き換え(次の行動から反映)。
        // PP配列(entry.pp)は技ごとの独立トラッキングなので、差し替え時に新しい技の最大PPへリセットする
        // (real_battle_simulator.htmlのinitPPは戦闘開始時にしか走らない=放置すると旧技のPP残量が残る)。
        const entry = movePick.entry;

        if (dup >= 0 && dup !== movePick.idx){ arr[dup] = arr[movePick.idx]; pp[dup] = pp[movePick.idx]; }
        arr[movePick.idx] = mv;

function addBattleMember(trueSide, name){

  if (!st || !st.poke) return;
  const poke = S.pokeByName(name);

    poke, effort: ZERO_EV(), natureIdx: S.natureIdxOf('まじめ'),

    moves, gender: genderOfRB(name),

    lastConsumedItem: null, megaBase: null,

  if (!cols || !game) return;
  cols.style.zoom = '';  // いったん戻して自然幅を測る
  const avail = Math.max(280, game.clientWidth - 40);
  const natural = 760;   // 3カラムが窮屈にならない目安幅

// 技の自動セット: 覚える技から「タイプかぶりなしで威力上位」を4つ(変化技は1つまで混ぜる)
// 自動選出で避けたい「一発の不利技」: 自分瀕死(だいばくはつ)/反動で次ターン動けない(はかいこうせん)/溜め技(ソーラービーム等)。
// 威力は高いが初手セットには不向き=ある分だけ後回しにして、埋まらない時だけ使う(2026-07-06 阿部さん)
function isDisadvMove(m){
  const bd = m.battle_data || {};
  return !!(bd.self_faint || bd.recharge || bd.charge);
}
function autoMoves(poke){
  const all = S.usableMoves(poke);
  const dmgAll = all.filter(m => m.category !== '変化' && typeof m.power === 'number' && m.power > 0)
                    .sort((a, b) => b.power - a.power);
  // 不利技を除いた候補を優先。足りなければ不利技も威力順で足す
  const good = dmgAll.filter(m => !isDisadvMove(m));
  const bad  = dmgAll.filter(isDisadvMove);
  const pickFrom = (list, picked, types, typeFirst) => {
    if (typeFirst) for (const m of list){ if (picked.length >= 4) break; if (!types.has(m.type)){ picked.push(m); types.add(m.type); } }
    for (const m of list){ if (picked.length >= 4) break; if (!picked.includes(m)) picked.push(m); }
  };
  const picked = [], types = new Set();
  pickFrom(good, picked, types, true);    // まず不利でない技をタイプ多様→威力順で
  pickFrom(bad,  picked, types, false);   // それでも4未満なら不利技(だいばくはつ等)を威力順で補完
  // 攻撃技を1つも覚えない子(メタモン=へんしんのみ)は変化技で埋める(技ゼロで出ると毎ターン棒立ちになる)
  if (!picked.length) return all.slice(0, 4);
  return picked.slice(0, 4);
}

function defaultAbilityRB(p){
  if (p && p.name === 'メタモン') return p.ab3 || p.ab2 || p.ab1 || '';
  return (p && p.ab1) || '';

function buildSide(sideKey, ids){
  const st = S.makeSideState();
  const lead = S.pokeByName(slotVal[ids[0]]);
  st.poke = lead;
  st.moves = (slotMoves[ids[0]] || autoMoves(lead)).filter(Boolean);
  st.selectedMoveIdx = 0;
  st.item = normMegaKeyRB(slotItem[ids[0]] != null ? slotItem[ids[0]] : 'mega_stone_any');   // 中央パネルで変更可(既定=汎用メガストーン。個別ストーンは汎用へ正規化=2026-07-18)
  st.gender = slotGender[ids[0]] || genderOfRB(slotVal[ids[0]]);
  st.natureIdx = S.natureIdxOf(slotNature[ids[0]] || 'まじめ');   // 性格(ビルダー由来 or 無補正)
  st.effort = clampEffortRB(slotEffort[ids[0]]);    // 努力値(Champions点・各32/計66に矯正)
  st.bench = ids.slice(1).map(id => {
    const p = S.pokeByName(slotVal[id]);
    return { poke: p, effort: clampEffortRB(slotEffort[id]), natureIdx: S.natureIdxOf(slotNature[id] || 'まじめ'),
      ability: slotAbility[id] || defaultAbilityRB(p), item: normMegaKeyRB(slotItem[id] != null ? slotItem[id] : 'mega_stone_any'),
      moves: (slotMoves[id] || autoMoves(p)).filter(Boolean), gender: slotGender[id] || genderOfRB(slotVal[id]),
      currentHp: null, fainted: false, status: 'none', sleepTurns: null, lastConsumedItem: null, megaBase: null };
  })
  // 保存チームに現プール外の名前が残っていた場合(pokeByName=null)の抜け殻エントリを捨てる。
  // 残すと「見えない控え」で実質人数が減る+ボールマーク欠け(2026-07-04 深掘りPDCAで発見)
  .filter(e => e.poke);
  st.ability = slotAbility[ids[0]] || defaultAbilityRB(lead);   // 中央パネルで選んだ特性(既定=特性1/メタモンはかわりもの)
  // PP管理(段129): 場の技+控えの技のPPを初期化(エンジンはst.ppがある時だけPPを見る)
  st.pp = st.moves.map(m => (m && m.pp) ? m.pp : 0);
  st.bench.forEach(e => { e.pp = (e.moves || []).map(m => (m && m.pp) ? m.pp : 0); });
  S.sides[sideKey] = st;
}

  const selfNameRaw = S.sides.self.poke.name, oppNameRaw = S.sides.opp.poke.name;

function apiIdOf(nm){
  if (typeof SPRITE_API_ID === 'undefined') return null;
  if (SPRITE_API_ID[nm]) return SPRITE_API_ID[nm];

  const _FORECAST = { sunny: { ja: 'たいようのすがた', apiId: '10013' }, rain: { ja: 'あまみずのすがた', apiId: '10014' }, snow: { ja: 'ゆきぐものすがた', apiId: '10015' } };
  const _fc = (!_bust && st && st.forecastForm && poke.name === 'ポワルン') ? _FORECAST[st.forecastForm] : null;
  const _swap = _bust || _fc;   // ミミッキュとポワルンが同時に化けることは無いのでどちらか一方
  const enc = encodeURIComponent(_swap ? _swap.ja : poke.name);

  renderSideBars();
  // ★2026-07-17 阿部さんFB: 両側HPボックスの⚙をアイコン〜持ち物/HP数値のすき間に動的配置(renderAllのたびに再計算)
  try { positionPbGears(); } catch (e) {}

  // ただしメッセージ再生中(busy)はエンジンが先に最終状態を持ってしまう=見えている演出より先にランク変化がバレる(HPバーと同じ理由の凍結)ので、

  if (!busy) try { renderWatchPanel(); } catch (e) {}
}
// ★2026-07-17 阿部さんFB: HPボックス⚙の動的配置。pboxはtransform:skewXで斜めに描画されるが、
// 直接の子要素(row1/hpbar/held/pb-gear自身)は.pbox>*{transform:skewX(10deg)}で打ち消されているため、
// offsetLeft/offsetWidth(レイアウト値=transformの影響を受けない)をそのまま同じ座標系で比較できる=
// zoom(fitField)やskewの変換計算が不要。アイコン右端〜(自分側は持ち物/両側ともHP数値)の左端の
// すき間に置く。すき間が無ければアイコンのすぐ右に詰める(重ならない優先)。
function positionPbGears(){
  ['self', 'opp'].forEach(side => {
    const pb = $('pb-' + side);
    const gear = pb && pb.querySelector('.pb-gear');
    const row1 = pb && pb.querySelector('.row1');
    const icn = pb && pb.querySelector('.icn');
    const hpbar = pb && pb.querySelector('.hpbar');
    const hptext = pb && pb.querySelector('.hptext');
    if (!gear || !row1 || !icn || !hpbar || !hptext) return;
    const iconRight = row1.offsetLeft + icn.offsetLeft + icn.offsetWidth;
    const held = side === 'self' ? pb.querySelector('.held') : null;
    const numLeft = hpbar.offsetLeft + hptext.offsetLeft;   // HP数値(166/166・100%)の左端
    const boundaryLeft = (held && held.offsetWidth > 0) ? held.offsetLeft : numLeft;
    const gearW = gear.offsetWidth || 15;
    let left = boundaryLeft - 4 - gearW;
    if (left < iconRight + 2) left = iconRight + 2;   // すき間が狭い時はアイコンのすぐ右で妥協(重なりゼロ優先)
    gear.style.left = Math.round(left) + 'px';
    gear.style.right = 'auto';
    const numTop = hpbar.offsetTop + hptext.offsetTop;
    const numH = hptext.offsetHeight || 16;
    gear.style.top = Math.round(numTop + (numH - gearW) / 2) + 'px';
    gear.style.bottom = 'auto';
  });
}

// S3: leftbar/rightbar 描画。場に出ている個体=.active / ひんし=.dead
function renderSideBars(){
  ['self', 'opp'].forEach(side => {
    const st = S && S.sides && S.sides[side];
    if (!st) return;
    const iconsEl = document.getElementById('sbar-icons-' + side);
    const nameEl  = document.getElementById('sbar-name-' + side);
    if (!iconsEl || !nameEl) return;
    // チーム全体(先頭+控え)
    const team = [st].concat(st.bench || []).filter(e => e && e.poke);
    // 先頭ポケモン(場に出ている個体)
    const activePoke = st.poke ? st.poke.name : null;
    // CH: ボールマークは実機準拠=選出した数だけ(空スロットは出さない)。
    // 画像なしでも「残数」が読めるよう●フォールバック(noimg)を敷く
    let html = '';
    for (let i = 0; i < team.length; i++){
      const e = team[i];
      // 手持ちアイコンはへんしん中も元のすがた(実機準拠: 手持ち画面はメタモンのまま)
      const nm = (e.illusionAs || (e.transformBase ? e.transformBase.poke : e.poke)).name;
      const enc = encodeURIComponent(nm);
      const dead = e.fainted || (e.currentHp != null && e.currentHp <= 0);
      // 場に出ている=先頭(i===0)かつひんし未
      const active = (i === 0 && !dead);
      const cls = ['sicon', dead ? 'dead' : '', active ? 'active' : ''].filter(Boolean).join(' ');
      const max = S.realStat(e, 'hp') || 1;
      const hp  = e.currentHp == null ? max : Math.max(0, e.currentHp);
      const pct = Math.round(hp / max * 100);
      const label = `${tPokeName(nm)} (${pct}%)`;
      // ★A1(2026-07-17 阿部さんFB): 丸アイコンクリック→交代画面の中央エディタでその子を選択(data-bi=-1は場の子)
      html += `<div class="${cls}" title="${label}" aria-label="${label}" data-bi="${i === 0 ? -1 : i - 1}">` +
              `<img src="${pokeIconSrc(nm)}" alt="${tPokeName(nm)}" loading="lazy" onerror="this.parentElement.classList.add('noimg');this.remove()">` +
              `</div>`;
    }
    iconsEl.innerHTML = html;
    // ★A1: クリック配線(#field子孫=stopPropagation必須)。i=0(場の子)はbenchIdx=null換算
    iconsEl.querySelectorAll('.sicon[data-bi]').forEach(ic => {
      ic.style.cursor = 'pointer';
      ic.addEventListener('click', e => {
        e.stopPropagation();
        SE.select();
        const bi = +ic.dataset.bi;
        openPartyEditorFor(side, bi === -1 ? null : bi);
      });
    });
    // トレーナー名はi18nキーから
    nameEl.textContent = side === 'self'
      ? (window.I18N && I18N.t ? I18N.t('real_battle.pbox_label_self', 'じぶん') : 'じぶん')
      : (window.I18N && I18N.t ? I18N.t('real_battle.pbox_label_opp', 'あいて') : 'あいて');
  });
}
function setHpBar(side, hp, max){
  const pb = $('pb-' + side);
  const pct = Math.max(0, Math.min(100, hp / max * 100));
  // CH: ダメージ反映=statbarを戻す(メッセージ中の全消しから復帰して減るバーを見せる=実機の流れ)
  $('field').classList.remove('ch-busy');
  // 2層HPバー(Showdown版の演出を踏襲): prevhp=残像(遅れて縮む) / hp=現在(即時)
  // CH: パネル幅が可変(PC210/スマホ170)になったため px指定→%指定に変更
  const newW = pct.toFixed(1) + '%';
  const hpEl = pb.querySelector('.hp');
  const prevEl = pb.querySelector('.prevhp');
  if (hpEl && prevEl) {
    const oldW = prevEl.style.width || '100%';
    // prevhpを旧幅に固定(アニメ開始点)
    prevEl.style.transition = 'none';
    prevEl.style.width = oldW;
    requestAnimationFrame(() => {
      hpEl.style.width = newW;
      hpEl.className = 'hp' + (pct <= 25 ? ' low' : pct <= 50 ? ' mid' : '');
      requestAnimationFrame(() => {
        prevEl.style.transition = ''; // CSSに戻す(1.2s ease-out)
        prevEl.style.width = newW;
      });
    });
  }
  // CH: 実機準拠のHP表示=自分は数値(171/171)・相手は%のみ(ゲームと同じ=2026-07-04 阿部さん)
  // 実数値はdata属性に保持(後から切替可能)
  const t = pb.querySelector('.hptext');
  if (t) {
    if (side === 'self'){
      t.innerHTML = `${Math.round(hp)}<small>/${Math.round(max)}</small>`;
    } else {
      // 生きている限り0%と表示しない(実機の最低1%表示)
      const pd = hp > 0 ? Math.max(1, Math.round(pct)) : 0;
      t.innerHTML = `${pd}<small>%</small>`;
    }
    t.dataset.hp = hp;
    t.dataset.max = max;
  }
}

// ===== メッセージ送り =====
let sayQueue = [], sayDone = null, autoTimer = null;
function say(lines, done){
  sayQueue = lines.slice();
  sayDone = done || null;
  busy = true;
  showCmd(false);
  $('msgbox').style.display = 'block';   // CH: メッセージ再生中だけ出す(実機準拠。残留するとボタンを塞ぐ)
  nextSay();
}
function nextSay(){
  if (autoTimer){ clearTimeout(autoTimer); autoTimer = null; }
  if (!sayQueue.length){
    busy = false;
    $('msgbox').querySelector('.next').style.display = 'none';
    $('msgbox').style.display = 'none';        // CH: メッセージ退場(コマンドUIに舞台を返す)
    $('field').classList.remove('ch-busy');    // CH: メッセージ完了=UIを戻す
    if (sayDone){ const d = sayDone; sayDone = null; d(); }
    return;
  }
  const line = sayQueue.shift();
  const box = $('msgbox');
  const txt = line.text != null ? line.text : line;
  // CH: 行ごとにいったん全UIを消す(実機の「メッセージ中はUI退場」)。
  // ダメージ/状態反映を含む行は fx内のsetHpBarがすぐ戻す=「演出→バーが出て減る」の実機の流れ
  $('field').classList.add('ch-busy');
  pushMsgLine(txt);   // 下部メッセージ欄(6行・直近が薄く残る)
  if (!line.noLog) logLine(txt, undefined, line.src != null ? line.src : txt);   // ログはJA原文で保存=言語切替で再翻訳できる
  if (line.fx) line.fx();
  // こうか(ばつぐん/いまひとつ/なし)・急所はダメージ行と同じ拍に重ねる。
  // 別拍だと「2回当たった」ように見える(2026-07-06 阿部さん「1発で効果抜群とかそれだけでいい」)
  if (line.src && /ダメージ！/.test(line.src)){
    const _EFF_JA = ['こうかは ばつぐんだ！', 'こうかは いまひとつのようだ…', 'こうかは こうかなし…', 'きゅうしょに あたった！'];
    while (sayQueue.length){
      const nx = sayQueue[0];
      if (!nx || !nx.src || !_EFF_JA.includes(nx.src)) break;
      sayQueue.shift();
      pushMsgLine(nx.text);
      if (!nx.noLog) logLine(nx.text, undefined, nx.src != null ? nx.src : nx.text);
      if (nx.fx) nx.fx();
    }
  }
  box.querySelector('.next').style.display = 'none';   // ▼表記廃止(盤面クリック/自動送りは従来どおり)
  if ($('auto-msg').checked){
    // Wave3/4: メガシンカ演出(_megaFxDelay)・KOスロー演出(_koFxDelay)・交代の引っ込め演出(_recallFxDelay)は
    // msg-speedより長ければそちらを優先=専用ホールド(次行を待たせる。送り速度:はやいでも退場が完全に終わってから登場させる)
    // 予告(preattack)行はline.holdで送り速度を上書き=技が出るまでの間を短縮(2026-07-13)
    const _hold = (line.hold != null) ? line.hold
      : Math.max(+$('msg-speed').value, _megaFxDelay || 0, _koFxDelay || 0, _recallFxDelay || 0);
    _megaFxDelay = 0;
    _koFxDelay = 0;
    _recallFxDelay = 0;
    autoTimer = setTimeout(nextSay, _hold);
  }
}

  // ⚙(育成/実数値)を閉じた直後もここを通る=モーダルを閉じた瞬間の取りこぼしをここで一括カバー)
  try { ghRenderAll(); } catch(e) {}
  try { renderWatchPanel(); } catch(e) {}   // ★2026-07-17: 常時表示化=閉じずに最新状態で作り直す(watchPanelHiddenなら内部でnone)
  $('weak-panel').style.display = 'none';
  const mv = $('moves');
  mv.style.display = 'flex';   // CH: 縦カプセルリスト
  const ppOf = i => (st.pp ? st.pp[i] : null);
  const lockName = st.choiceLock ? st.choiceLock.name : null;   // こだわりロック(段135)
  const allOut = st.pp && st.moves.every((m, i) => !m || st.pp[i] <= 0);
  // CH: 相性ヒント(実機の★/◎/△/✕帯)。エンジンのcalcDamageで判定=DB同様に特性込み
  // (ちょすい/ふゆう等の無効も✕になる=2026-07-05 阿部さん「DBの特性×0をそのままバトルで」)。
  // calcDamageが使えない場合は素の相性表(typeEffPreview)にフォールバック
  const oppTypes = (S.sideTypes && S.sides.opp && S.sides.opp.poke) ? S.sideTypes(S.sides.opp) : [];
  const effBand = m => {
    if (!m || m.category === '変化') return '';
    let eff = 1, immune = false;
    try {
      const r = S.calcDamage('self', 'opp', m);
      // ばけのかわ(disguiseBlock)は「タイプ相性のこうかなし」ではない(技は当たって皮が剥がれる)
      // →素のタイプ相性で帯を出す(2026-07-10 阿部さん発見・ポケモンWiki準拠)
      if (r && r.immune && r.disguiseBlock){
        const e2 = S.typeEffPreview ? S.typeEffPreview(m.type, oppTypes) : 1;
        eff = e2; immune = (e2 === 0);
      }
      else if (r && r.immune){ immune = true; }
      else if (r && r.chips){
        const c = r.chips.find(c => c.kind === 'eff-up' || c.kind === 'eff-down');
        eff = c ? c.factor : 1;
      }
    } catch(e){
      eff = S.typeEffPreview ? S.typeEffPreview(m.type, oppTypes) : 1;
      immune = eff === 0;
    }
    if (immune || eff === 0) return `<span class="mv-eff eff-no">✕ ${I18N.t('real_battle.no_effect','こうかなし')}</span>`;
    // 4倍=★ちょうばつぐん(チャンピオンズ実機準拠。en公式=Extremely effective / Game8・Kotaku裏取り済み)
    if (eff >= 4) return `<span class="mv-eff eff-hyper">★ ${I18N.t('real_battle.eff_hyper','ちょうばつぐん')}</span>`;
    if (eff > 1)  return `<span class="mv-eff eff-super">◎ ${I18N.t('real_battle.chip_super_effective','こうかばつぐん')}</span>`;
    if (eff < 1)  return `<span class="mv-eff eff-weak">△ ${I18N.t('real_battle.chip_not_very_effective','こうかいまひとつ')}</span>`;
    return '';
  };
  // CH: 技カプセル(チャンピオンズ準拠)
  // - 上段: タイプバッジ + 技名 / 右上: PP大きめ / 下段: 相性帯 + 威力/命中
  // - カプセル背景はタイプ色グラデ・disabled時(PP切れ/こだわり外)はグレーアウト
  // 上段=様子を見る/技の説明(トグル)/⚙能力値(実機のX/Y行相当=2026-07-06 阿部さん)
  const detailOn = localStorage.getItem('rb_move_detail') === 'on';
  const statsBtn = `<div class="mv-top">` +
    `<button class="watch-open${watchPanelHidden ? '' : ' on'}">${I18N.t('real_battle.watch_button','👀 様子を見る')}</button>` +
    `<button class="weak-open">${I18N.t('real_battle.weakness_button','🎯 弱点')}</button>` +
    `<button class="desc-toggle${detailOn ? ' on' : ''}">${I18N.t('real_battle.movedesc_button','📖 技の説明')}</button>` +
    `<button class="stats-open">⚙</button></div>`;
  // メガシンカ=技リストの左横の丸ボタン(実機のRボタン位置=2026-07-06 阿部さん)。使える時だけ出す
  const megaSide = (S.canMegaEvolve(st) || st.megaChoice)
    ? `<button class="mega-side${st.megaChoice ? ' mega-armed' : ''}"><span class="ms-icon">⬡</span><span class="ms-label">${I18N.t('real_battle.cmd_mega','⬡ メガシンカ').replace('⬡ ', '')}</span></button>`
    : '';
  mv.innerHTML = megaSide + statsBtn + (allOut
    ? `<button data-i="0"><span class="mv-name"><strong>${I18N.t('real_battle.move_last_resort','わるあがき')}</strong></span><div class="mv-sub">${I18N.t('real_battle.move_last_resort_desc','PPが ぜんぶ なくなった！ 威力50 / 反動あり')}</div></button>`
    : st.moves.map((m, i) => {
        const col = tc[m.type] || '#3a4660';
        const ppNow = ppOf(i);
        const ppMax = m.pp || 0;
        // 使用条件(ゲップ=きのみ未食)を満たさない技は選べない(実機準拠で選択不可)
        const needsBerry = ((m.battle_data && m.battle_data.requires) || []).some(r => r.type === 'user_has_eaten_berry')
          && S.ateBerry && !S.ateBerry(st);
        const disabledMove = st.disable && st.disable.name === m.name;   // かなしばり中の技は選べない(実機準拠)
        const off = (ppNow != null && ppNow <= 0) || (lockName && m.name !== lockName) || needsBerry || disabledMove;
        const locked = lockName && m.name !== lockName;
        // PP残少(2以下): pp-low クラスで強調
        const ppLow = ppNow != null && ppNow <= 2 && !off;
        const ppCls = 'mv-pp' + (ppLow ? ' pp-low' : '');
        const ppTxt = ppNow != null ? `${ppNow}/${ppMax}` : '';
        // 威力/命中等はホバーの説明フロートに集約(ボタンは常時スリム=2026-07-06 阿部さん)
        // タイプ一致(STAB)=×1.5 を明示(2026-07-10 阿部さん「こうかばつぐんみたいに書いて」)。変化技は対象外
        const stab = m.category !== '変化' && (S.sideTypes ? S.sideTypes(st) : [st.poke.type1, st.poke.type2].filter(Boolean)).includes(m.type)
          ? `<span class="mv-eff eff-stab">✨ ${I18N.t('real_battle.chip_stab','タイプ一致')} ×1.5</span>` : '';
        const subParts = [
          locked ? I18N.t('real_battle.move_stubbornlock_note','こだわり中') : '',
          disabledMove ? I18N.t('real_battle.move_disabled_note','かなしばり中') : '',
          needsBerry ? I18N.t('real_battle.move_needs_berry','きのみを たべてから') : ''
        ].filter(Boolean).join(' / ');
        // カプセル背景=タイプ色グラデ(暗め→明るめ)
        const btnStyle = off ? '' : `background:linear-gradient(135deg,${col}dd 0%,${col}99 100%)`;
        return `<button class="tcol" data-i="${i}" ${off ? 'disabled' : ''} style="${btnStyle}">` +
          `<span class="mv-name"><span class="t-pill" style="background:${col}">${tTypeName(m.type)}</span><strong>${tMoveName(m)}${lockName === m.name ? ' 🔒' : ''}</strong></span>` +
          `<div class="mv-sub">${effBand(m)}${stab}${subParts}&nbsp;</div>` +
          (ppTxt ? `<span class="${ppCls}">${ppTxt}</span>` : '') +
          `</button>`;
      }).join(''))
    + `<button class="back party-open">${I18N.t('real_battle.cmd_party','🔄 ポケモン')}</button>`;
  // 技の説明ON: ホバーした技の「左横」にフロート(威力/命中/分類/優先度+説明文を集約=2026-07-06 阿部さん)
  if (detailOn){
    const tip = $('mv-tip');
    mv.querySelectorAll('button.tcol').forEach(b => {
      const m = st.moves[+b.dataset.i];
      if (!m) return;
      const desc = (window.I18N && I18N.moveDesc && I18N.moveDesc(m.key)) || m.desc || m.description || '';
      const pri = (m.battle_data && m.battle_data.priority) || m.priority || 0;
      const head = [
        `${I18N.t('real_battle.move_power_label','威力')}${m.power ?? '—'}`,
        `${I18N.t('real_battle.move_accuracy_label','命中')}${m.accuracy ?? '—'}`,
        tCatName(m.category),
        pri ? `${I18N.t('real_battle.move_priority_label','優先度')}${pri > 0 ? '+' : ''}${pri}` : ''
      ].filter(Boolean).join(' / ');
      b.addEventListener('mouseenter', () => {
        tip.innerHTML = `<b>${head}</b>` + (desc ? `<div style="margin-top:4px">${desc}</div>` : '');
        // ホバー中の技ボタンの左横に(zoom補正: rectはzoom後px→フィールド内部座標へ換算)
        const fr = $('field').getBoundingClientRect(), br = b.getBoundingClientRect();
        const ratio = fr.height / 360;
        tip.style.top = Math.max(6, Math.round((br.top - fr.top) / ratio)) + 'px';
        tip.style.bottom = 'auto';
        tip.style.left = 'auto';
        tip.style.right = '246px';
        tip.style.display = 'block';
      });
      b.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
    });
  } else $('mv-tip').style.display = 'none';
  mv.querySelectorAll('button').forEach(b => b.addEventListener('click', e => {
    // ★e.stopPropagation()必須(2026-07-13): #moves は #field の子孫なので、このクリックがdoTurn→say()で
    // 新しいメッセージ列を出した直後に #field の click(advanceMsg)へバブルし、技を選んだ同じクリックで
    // その行動の1コマ目を即座に送ってしまう(_recallFxDelay/_megaFxDelay等のホールドが効く前に先送りされる)。
    e.stopPropagation();
    SE.select();
    $('mv-tip').style.display = 'none';   // タップで説明フロートを消す(タッチでmouseleaveが来ないため)
    if (b.classList.contains('stats-open')){ openStatsModal(); return; }
    if (b.classList.contains('watch-open')){ toggleWatchPanel(b); return; }
    if (b.classList.contains('weak-open')){ toggleWeaknessPanel(b); return; }   // 相手へのタイプ相性(B1)
    if (b.classList.contains('desc-toggle')){
      localStorage.setItem('rb_move_detail', localStorage.getItem('rb_move_detail') === 'on' ? 'off' : 'on');
      showMoves(); return;
    }
    if (b.classList.contains('mega-side')){ toggleMega(); return; }
    if (b.classList.contains('party-open')){ showParty(); return; }   // 交代へ(もどるで技リストに帰る)
    const mi = +b.dataset.i;
    // 自分交代技(とんぼがえり等): 控えに生きてる子が2匹以上いる時だけ「だれに かわる?」を先に聞く
    if (!allOut && moveHasPivotSwitch(st.moves[mi])){ maybeStartPivot(mi); return; }
    doTurn(mi);
  }));
}
// 自分交代技の交代先選択(事前選択方式): 控えが2匹以上生きていれば選択UIを出す。1匹以下は従来どおり自動(先頭)
function maybeStartPivot(moveIdx){
  const st = S.sides.self;
  const liveIdxs = (st.bench || []).map((e, i) => ({e, i}))
    .filter(x => x.e && x.e.poke && !x.e.fainted && !(x.e.currentHp != null && x.e.currentHp <= 0)).map(x => x.i);
  RB_PIVOT.selfIdx = liveIdxs.length ? liveIdxs[0] : null;   // 既定=控え筆頭(選択UIを出さない場合のフォールバック)
  // ★バトルラボ: いま選んでいるのが真の自分/相手どちらの側かを記録(labSwapSides中でもengineの__rbSwitchPickが正しく効くように)
  RB_PIVOT.trueSide = labSwapped ? 'opp' : 'self';
  if (liveIdxs.length < 2){ doTurn(moveIdx); return; }
  RB_PIVOT.pendingMoveIdx = moveIdx;
  showParty(false, true);   // pivot=true(3カラム交代画面を選択モードで流用。やめる=技選択に戻る)
}
// ===== 交代画面(本家チャンピオンズ実機準拠3カラム) 2026-07-10 阿部さん =====
// 左=じぶんのチーム(場に出ている子含む・タップで選択→行の下に交代する/やめる確認)/
// 中央=選択中(未選択時は場に出ている子)の読み取り専用詳細カード/右=あいてのチーム(1人用=選出チームそのまま)。
// 「交代する」の実処理は元のボタンclickハンドラと同じ経路(doSwitchTo=旧ロジックをそのまま踏襲)。
let swForced = false;      // 今開いている交代画面が死に出し強制か(もどるボタンの有無に使う)
let swSelected = null;     // 選択中の控えindex(st.bench基準)。null=未選択(中央は場に出ている子を表示)
// ★バトルラボ(2026-07-16 阿部さんFB): 「あいてのチーム」列は秘匿不要=クリックで中央詳細を閲覧できる
// (交代はできない=常に閲覧専用。実際に交代できるのは今のばんの側=swMineHtml/swSelected)。
let swOppSelected = null;  // 閲覧中のS.sides.opp側index(-1=場に出ている子/null=未選択)
let swDetailSrc = 'mine';  // 中央詳細の出どころ('mine'=swSelected基準/'opp'=swOppSelected基準)
// ★2026-07-10 阿部さん: バトンタッチ/とんぼがえり等の自分交代の交代先選択(事前選択方式=ロックステップの技選択直後に選ぶ)
let swPivot = false;       // 今開いている交代画面が自分交代の交代先選択モードか(もどるで技リストに帰れる=swForcedと違う)
const RB_PIVOT = { pendingMoveIdx: null, selfIdx: null, trueSide: null };   // selfIdx=engine __rbSwitchPickへ渡す事前選択bench idx
// 自分交代(とんぼがえり/ボルトチェンジ/クイックターン/すてゼリフ/バトンタッチ)を持つ技か
function moveHasPivotSwitch(m){
  return !!(m && m.battle_data && Array.isArray(m.battle_data.effects) && m.battle_data.effects.some(e => e.kind === '自分交代'));
}
function partyRowsMine(st){
  const rows = [];
  if (st && st.poke) rows.push({ entry: st, idx: null, active: true });
  (st.bench || []).forEach((e, i) => { if (e && e.poke) rows.push({ entry: e, idx: i, active: false }); });
  return rows;
}
// ★2026-07-11: セル=編成カプセル(slotCapsuleHtmlと同じ見た目)をそのまま流用(online_battle.htmlと統一)。
// entry(場に出ている子=st or 控えentry)からライブ状態(HP/ひんし/現在の持ち物)で組み立てる。
function swBattleCapsuleHtml(entry, opts){
  const p = entry.poke;
  const named = entry.illusionAs || p;
  const tc = S.typeColors();
  const g = entry.gender;
  const gHtml = g && g !== '—' ? `<span class="cap-g ${g === '♂' ? 'm' : 'f'}">${g}</span>` : '';
  const types = [p.type1, p.type2].filter(Boolean).map(t =>
    `<span class="cap-type" style="background:${tc[t] || '#3a4660'}">${tTypeName(t)}</span>`).join('');
  const it = S.itemByKey(entry.item);
  const itemHtml = it ? itemIconHtml(it) + tItemName(it) : '';
  const src = (typeof setupSpriteSrc === 'function') ? setupSpriteSrc(named.name, true) : pokeIconSrc(named.name);
  const max = S.realStat(entry, 'hp') || 1;
  const hp = entry.currentHp == null ? max : Math.max(0, entry.currentHp);
  const dead = entry.fainted || hp <= 0;
  const pct = Math.round(hp / max * 100);
  const barCls = 'sw-hpbar' + (pct <= 25 ? ' low' : pct <= 50 ? ' mid' : '');
  const tag = dead
    ? `<span class="cap-tag dead">${I18N.t('real_battle.party_fainted', 'ひんし')} ✕</span>`
    : opts.active ? `<span class="cap-tag">${I18N.t('real_battle.party_active_label', '場に出ている')}</span>` : '';
  const hpHtml = dead ? '' : `<span class="sw-hpwrap"><span class="sw-hpbar-bg"><span class="${barCls}" style="width:${pct}%"></span></span>` +
    `<span class="sw-hptext">${pct}% (${hp}/${max})</span></span>`;
  const selected = !opts.active && swSelected === opts.idx;
  const cls = ['slot', opts.active ? 'active' : '', dead ? 'dead' : '', selected ? 'selected' : ''].filter(Boolean).join(' ');
  // ★Lab-3-C(2026-07-17): ひんしの行には♻ふっかつを出す。押すとlabRevive→再描画で「ひんし」でなくなり、
  // 以後は普通にタップ→交代する、の既存フローに合流する(設計§3経路1)。
  // ★M4(2026-07-17レビューWF): 場のひんし行(active && dead)にも出す=1体編成(控えゼロ)の側が全滅→
  // つづける、の時にその場で復活してバトル続行できる(data-i=-1が「場の子」の目印)。
  const reviveBtn = dead
    ? `<button type="button" class="sw-revive" data-i="${opts.active ? -1 : opts.idx}">${I18N.t('battle_lab.revive', '♻ ふっかつ')}</button>` : '';
  const inner = `<strong class="cap-name">${tPokeName(named.name)}${gHtml}</strong>` +
    `<span class="cap-mid"><span class="cap-types">${types}</span><small class="cap-item">${itemHtml}</small></span>` +
    `<img src="${src}" alt="" onerror="this.remove()">` + tag + hpHtml + reviveBtn;
  // ♻ふっかつボタンを内包するのでbutton-in-buttonを避け、死んでいる行(場/控えとも)はdivにする
  // (どのみち死んでいる間は交代先に選べない。復活後の再描画で通常のbutton版に戻る)。
  if (dead) return `<div class="${cls}" ${opts.active ? '' : `data-i="${opts.idx}"`}>${inner}</div>`;
  // ★A1(2026-07-17 阿部さんFB): 場の子(active)もクリック可=中央エディタで編集(交代確認は出ない=swSelected対象外)
  return `<button type="button" class="${cls}" ${opts.active ? '' : `data-i="${opts.idx}"`}>${inner}</button>`;
}
// ★Lab-3-C: ひんし復活の共通ヘルパー(3経路すべてが通る)。BENCH_FIELDSに沿った最小セットのみ更新
// (実機/エンジンの復帰慣習=currentHp=null(次回満タン換算)/fainted=false/status='none'/sleepTurns=null。
// real_battle_simulator.html 6774付近の控えリセット処理と同型)。
function labRevive(entry){
  if (!entry || !entry.poke) return;
  // ★S9(2026-07-21 敵対的シナリオテストで発見): メガ進化→ひんし→ふっかつでメガのまま永続していた。
  // 実ゲーム仕様=ひんしでメガはベースに戻る(エンジンのバトルリセット同型 real_battle_simulator 7622)。
  // 特性は進化前の選択が保存されていないためベース種のab1で復帰(ラボの実験用途では十分・要改善なら別途)。
  if (entry.megaBase){ entry.poke = entry.megaBase; entry.ability = entry.poke.ab1 || ''; entry.megaBase = null; }
  entry.currentHp = null;
  entry.fainted = false;
  entry.status = 'none';
  entry.sleepTurns = null;
  // ★L4(2026-07-17): もうどくカウンタもリセット(エンジンの実フィールド=badpoisonCounter。
  // toxicCounterは神の手が使っている別名なので両方消しておく)
  entry.badpoisonCounter = 0;
  entry.toxicCounter = null;
}
// ★バトルラボ: 死に出し(強制)/自分交代技(pivot)はそのまま「交代する/やめる」。
// 任意タイミングの交代(神の手の一部・設計§7阿部さん確定)は毎回「⏩ターンも進める/⏸このまま」を選ばせる。
function swConfirmHtml(){
  if (swForced || swPivot){
    return `<div class="sw-confirm"><button type="button" class="sw-yes">${I18N.t('real_battle.party_switch_confirm', '交代する')}</button>` +
      `<button type="button" class="sw-no">${I18N.t('real_battle.party_switch_cancel', 'やめる')}</button></div>`;
  }
  return `<div class="sw-confirm sw-confirm-lab">` +
    `<button type="button" class="sw-go">⏩ ${I18N.t('battle_lab.switch_go', 'ターンも進める')}</button>` +
    `<button type="button" class="sw-hold">⏸ ${I18N.t('battle_lab.switch_hold', 'このまま(ターン消費なし)')}</button>` +
    `<button type="button" class="sw-no">${I18N.t('real_battle.party_switch_cancel', 'やめる')}</button></div>`;
}
// real_battle.htmlは選出画面(6体から3体)が無い=チーム全員が常に場+控えに居る。partyRowsMineがそのまま「全員」
function swMineHtml(st){
  return partyRowsMine(st).map(row => {
    const html = swBattleCapsuleHtml(row.entry, { active: row.active, idx: row.idx });
    return (!row.active && swSelected === row.idx) ? html + swConfirmHtml() : html;
  }).join('');
}
// 中央=編集可能詳細カード(2026-07-17再設計 阿部さんFB item4: 編成画面の中央パネル=renderSelDetail系を
// ベースに、技4枠クリック→ピッカー/特性・持ち物セレクト/能力値エディタ66Pを流用。バトル中の変更は次の行動
// から反映(エンジンstateの該当ポケモンのmoves/ability/item/実数値を直接書き換える=生きた参照そのもの)。
// 場に出ている子・控え・相手側もすべて編集可(ラボの思想=秘匿/制約なし)。
// ★バトルラボ(2026-07-16由来): side='self'|'opp'(真の自分/相手。labSwapped中の入れ替えを解いた実体)を渡すと、
// 「いまどちら側を表示中か」がひと目で分かる色バッジを頭に出す(阿部さんFB item2「どちら側か分かる見出し色」)。
// ★2026-07-18 阿部さんFB: 選択中ポケモンのタイプ相性(受け側)をコンパクトなチップ表で。
// 弱点パネル(toggleWeaknessPanel・2026-07-10)の3区分の流儀を踏襲するが、あちらは「場の相手へ攻める」
// calcDamage計算・こちらは任意のポケモン(控え/編成中含む)の「受ける」相性なので、素相性
// (S.typeEffPreview)+特性の無効化(エンジン1679の_ABSORBマップ/ふゆう/ふしぎなまもりと同じ規則)で算出。
// 特性を編集すると呼び出し元(renderSelDetail/renderPartyScreen)が再描画=自動で追従再計算される。
// 倍率変更系(あついしぼう等)は弱点パネル同様に反映しない(無効化=×0のみ特性込み)。
const _MU_ABSORB = {'ちょすい': 'みず', 'ちくでん': 'でんき', 'もらいび': 'ほのお', 'そうしょく': 'くさ',
  'ひらいしん': 'でんき', 'でんきエンジン': 'でんき', 'かんそうはだ': 'みず'};
function matchupChipsHtml(p, ability){
  if (!p) return '';
  const types = [p.type1, p.type2].filter(Boolean);
  if (!types.length || !S.typeEffPreview) return '';
  const tc = (S.typeColors && S.typeColors()) || (typeof TYPE_COLORS !== 'undefined' ? TYPE_COLORS : {});
  const TYPES18 = (typeof TYPES !== 'undefined') ? TYPES : [];
  const buckets = { weak: [], strong: [], none: [] };
  TYPES18.forEach(atkType => {
    let eff = S.typeEffPreview(atkType, types);
    if (ability === 'ふゆう' && atkType === 'じめん') eff = 0;
    if (_MU_ABSORB[ability] === atkType) eff = 0;
    if (ability === 'ふしぎなまもり' && eff <= 1) eff = 0;
    const badge = `<span class="smu-t" style="background:${tc[atkType] || '#3a4660'}">${tTypeName(atkType)}</span>`;
    if (eff === 0) buckets.none.push(badge);
    else if (eff > 1) buckets.weak.push(`${badge}<span class="smu-m">${eff >= 4 ? I18N.t('real_battle.weakness_4x','4倍') : '×' + eff}</span>`);
    else if (eff < 1) buckets.strong.push(`${badge}<span class="smu-m">${eff <= 0.25 ? I18N.t('real_battle.weakness_quarter','1/4') : '×' + eff}</span>`);
    // 等倍(×1)は省略=コンパクト優先(弱点パネルと同じ)
  });
  const row = (label, arr) => arr.length
    ? `<div class="smu-row"><b>${label}</b><div class="smu-types">${arr.join('')}</div></div>` : '';
  const html = row(I18N.t('battle_lab.matchup_weak','⚠ よわい'), buckets.weak) +
    row(I18N.t('battle_lab.matchup_strong','🛡 つよい'), buckets.strong) +
    row(I18N.t('real_battle.weakness_title_none','こうかなし'), buckets.none);
  return html ? `<div class="sd-matchup">${html}</div>` : '';
}

// ★中央詳細パネルの編集ハンドラ配線(2026-07-17): entry=表示中の生きたエンジンstate参照・rootSt=それが
// 属する側の永続オブジェクト(S.sides.self/opp=アクティブ/控え共通の器。控え=rootSt.bench[i])。

function wireSwDetailEvents(entry, side, rootSt){
  const box = $('party').querySelector('.sw-detail');
  if (!box || !entry || !entry.poke) return;
  box.querySelectorAll('.sw-dmove[data-i]').forEach(b => {
    b.addEventListener('click', () => { SE.select(); openBattleMovePicker(entry, +b.dataset.i); });
  });
  const abBtn = box.querySelector('.sw-dab');
  if (abBtn) abBtn.addEventListener('click', e => {
    SE.select();
    const curAb = entry.ability || entry.poke.ab1;
    // ★2026-07-18 阿部さんFB: 編成側(renderSelDetail)と同じ2段構成(上=本来の特性ab1/ab2/ab3・下=ほかの全特性)
    const nativeAbs = [entry.poke.ab1, entry.poke.ab2, entry.poke.ab3].filter(Boolean).filter((v, i, a) => a.indexOf(v) === i);
    const abilities = Object.keys(ABILITY_DESC).filter(a => !nativeAbs.includes(a));
    const abRow = a => ({key:a, name:(window.I18N && I18N.ability) ? I18N.ability(a) : a,
      desc:(window.I18N && I18N.abilityDesc && I18N.abilityDesc(a)) || (S.abilityDescJa ? S.abilityDescJa(a) : '') || '', selected:a === curAb});
    openChoiceModal(I18N.t('real_battle.sel_ability', '特性'),
      [{label: I18N.t('battle_lab.native_abilities','✅ このポケモンの とくせい'), rows: nativeAbs.map(abRow)},
       {label: I18N.t('battle_lab.other_abilities','🧪 ほかの とくせい'), rows: abilities.map(abRow)}],
      k => {
        entry.ability = k;
        entry.abilityOverride = null;   // トレース等の一時上書きが残っていたら解除(実験なので明示指定を優先)
        renderPartyScreen();
        try { renderAll(); } catch (e) {}
      }, e.currentTarget);
  });
  const itBtn = box.querySelector('.sw-ditem');
  if (itBtn) itBtn.addEventListener('click', e => {
    SE.select();
    // 1種類1個(メガストーンは共有可)。同じ側の場+控え(自分自身は除く)で重複禁止=編成画面の流儀を踏襲
    const used = new Set([rootSt].concat(rootSt.bench || [])
      .filter(x => x && x !== entry && x.item && x.item !== 'mega_stone_any').map(x => x.item));
    openItemModal(entry.item, k => {
      entry.item = normMegaKeyRB(k);   // ★2026-07-18: 個別メガストーンキーはエンジンentryにも残さない
      renderPartyScreen();
      try { renderAll(); } catch (e) {}
    }, e.currentTarget, used);
  });
  const evBox = box.querySelector('.sd-ev');
  if (evBox) renderEvEditor(evBox, {
    poke: entry.poke,
    getEff: () => entry.effort || ZERO_EV(),
    getNature: () => (S.natureList()[entry.natureIdx || 0] || ['まじめ'])[0],
    apply: (eff, nature) => {
      entry.effort = eff;
      entry.natureIdx = S.natureIdxOf(nature);
      const newMax = S.realStat(entry, 'hp');
      if (entry.currentHp != null) entry.currentHp = Math.min(entry.currentHp, newMax);
      try { renderAll(); } catch (e) {}
      // ★2026-07-21阿部さんFB修正: ここ(⚙=育成/実数値エディタ)でHP努力値を変えても、神の手パネルが
      // 開いていると再構築されず「最大HPが変わったのに神の手のHP%表示は前の最大値のまま」に見えていた。
      // ⚙で編集するたびに神の手も明示的に再同期する(パネルが閉じていてもコスト僅少・ghRenderAllは早期return持ち)
      try { ghRenderAll(); } catch (e) {}
    },
  });
}
// ★バトルラボ: 中央詳細はswDetailSrcで「今のばん側(mine)」/「あいての列(opp)」のどちらの選択を見るか切り替える。
// opp列は常に閲覧専用(交代先には出来ない=swSelectedとは独立)。
function swCurrentDetailEntry(st){
  if (swDetailSrc === 'opp'){
    const opp = S.sides.opp;
    if (swOppSelected != null && swOppSelected >= 0){
      const e = (opp && opp.bench || [])[swOppSelected];
      if (e && e.poke) return e;
    }
    return (opp && opp.poke) ? opp : null;
  }
  if (swSelected != null){
    const e = (st.bench || [])[swSelected];
    if (e && e.poke) return e;
  }
  return (st && st.poke) ? st : null;
}
// 右=あいてのチーム。real_battle(1人用)は選出チームをそのまま表示(隠す情報が無い)。
// RB_ONLINEはこのファイルでは撤去済み(onlineInitUIは呼ばれない=RB_ONLINE.startedは常にfalse)なので
// 常にこちらのフォールバック分岐を通る(online_battle.htmlと構造をそろえるためガードはそのまま残す)
// ★バトルラボ(2026-07-16 阿部さんFB): 両側とも人間操作=秘匿不要。旧real_battle由来の「名前は絶対非公開」を
// 撤去し、自分側(swBattleCapsuleHtml)と同じ名前+性別+タイプ+持ち物+HPを表示。クリックで中央詳細も見られる
// (交代はできない=常に閲覧専用。opts.idx指定時のみdata-i付与=クリック可能にする)。
function swOppSlotHtml(nm, entry, known, opts){
  opts = opts || {};
  const p = S.pokeByName(nm);
  if (!p) return '';
  const src = (typeof setupSpriteSrc === 'function') ? setupSpriteSrc(nm, true) : pokeIconSrc(nm);
  const tc = S.typeColors();
  const tps = [p.type1, p.type2].filter(Boolean).map(t =>
    `<span class="cap-type" style="background:${tc[t] || '#3a4660'}">${tTypeName(t)}</span>`).join('');
  if (!known || !entry){
    return `<div class="slot sw-ghost"><strong class="cap-name"></strong>` +
      `<span class="cap-mid"><span class="cap-types">${tps}</span><small class="cap-item"></small></span>` +
      `<img src="${src}" alt="" onerror="this.remove()"></div>`;
  }
  const g = entry.gender;
  const gHtml = g && g !== '—' ? `<span class="cap-g ${g === '♂' ? 'm' : 'f'}">${g}</span>` : '';
  const dead = entry.fainted || (entry.currentHp != null && entry.currentHp <= 0);
  const max = S.realStat(entry, 'hp') || 1;
  const hp = entry.currentHp == null ? max : Math.max(0, entry.currentHp);
  const pct = Math.round(hp / max * 100);
  const barCls = 'sw-hpbar' + (pct <= 25 ? ' low' : pct <= 50 ? ' mid' : '');
  const tag = opts.active ? `<span class="cap-tag">${I18N.t('real_battle.party_active_label', '場に出ている')}</span>`
    : dead ? `<span class="cap-tag dead">${I18N.t('real_battle.party_fainted', 'ひんし')} ✕</span>` : '';
  const hpHtml = dead ? '' : `<span class="sw-hpwrap"><span class="sw-hpbar-bg"><span class="${barCls}" style="width:${pct}%"></span></span>` +
    `<span class="sw-hptext">${pct}% (${hp}/${max})</span></span>`;
  const it = S.itemByKey(entry.item);
  const itemHtml = it ? itemIconHtml(it) + tItemName(it) : '';
  const clickable = opts.idx != null;
  const selected = clickable && opts.selected;
  const cls = ['slot', dead ? 'dead' : '', selected ? 'selected' : ''].filter(Boolean).join(' ');
  // ★L2(2026-07-17): 閲覧側列のひんし行にも♻ふっかつを出す(＋ついかと対称=どちらの列からでも復活可)。
  // button-in-button回避のため、ひんし行はdivで包む(data-iは残す=中央詳細の閲覧クリックはそのまま効く)
  const reviveBtn = (dead && clickable)
    ? `<button type="button" class="sw-revive" data-i="${opts.idx}">${I18N.t('battle_lab.revive', '♻ ふっかつ')}</button>` : '';
  const useDiv = !clickable || dead;
  const tag_ = useDiv ? `<div class="${cls}" ${clickable ? `data-i="${opts.idx}"` : ''}>` : `<button type="button" class="${cls}" data-i="${opts.idx}">`;
  const closeTag = useDiv ? '</div>' : '</button>';
  return `${tag_}<strong class="cap-name">${tPokeName(nm)}${gHtml}</strong>` +
    `<span class="cap-mid"><span class="cap-types">${tps}</span><small class="cap-item">${itemHtml}</small></span>` +
    `<img src="${src}" alt="" onerror="this.remove()">` + tag + hpHtml + reviveBtn + closeTag;
}
function swOppHtml(){
  const opp = S.sides.opp;
  if (!opp) return '';
  // RB_ONLINEはこのファイルでは撤去済み(onlineInitUIは呼ばれない=RB_ONLINE.startedは常にfalse)なので
  // 常にこちらのフォールバック分岐を通る(online_battle.htmlと構造をそろえるためガードはそのまま残す)。
  // real_battleは相手が見えるページ=右列は相手チームをそのまま公開表示(2026-07-11 阿部さん)
  if (window.RB_ONLINE && RB_ONLINE.started && RB_ONLINE.fullTeams){
    const normNm = n => String(n || '').replace(/^メガ/, '').replace(/[XY]$/, '');
    const baseOf = e => normNm((e.transformBase ? e.transformBase.poke : e.poke).name);
    const team = [opp].concat(opp.bench || []).filter(e => e && e.poke);
    const revealed = RB_ONLINE.revealed ? RB_ONLINE.revealed.opp : new Set();
    return (RB_ONLINE.fullTeams.opp || []).map(nm => {
      const n0 = normNm(nm);
      const e = team.find(x => baseOf(x) === n0);
      const known = !!e && revealed.has(n0);
      return swOppSlotHtml(nm, e, known);
    }).join('');
  }
  // ★バトルラボ: partyRowsMineを使い回して{entry,idx,active}の並びをmine列と揃える(active=場に出ている子=idx null)。
  return partyRowsMine(opp).map(row => {
    const idx = row.active ? -1 : row.idx;   // -1=場に出ている子(クリック可・交代先ではなく閲覧専用)
    const selected = swOppSelected === idx;
    return swOppSlotHtml((row.entry.illusionAs || row.entry.poke).name, row.entry, true,
      { active: row.active, idx, selected });
  }).join('');
}

  pt.querySelectorAll('.party-add-member').forEach(b => {

  pt.querySelectorAll('div.slot.dead').forEach(d => {
    d.addEventListener('click', e => e.stopPropagation());
  });
  // ★Lab-3-C: ひんしの♻ふっかつ(labRevive→再描画。以後は普通に選んで交代できる)。
  // data-i=-1は「場に出ている子」(★M4: 1体編成の全滅→つづける、でその場復活してバトル続行)。
  // ★L2: 閲覧側列(.sw-opp-list)のひんし行にも同じボタンが出る=S.sides.opp系を対象に同処理。
  const wireRevive = (sel, rootStOf) => {
    pt.querySelectorAll(sel).forEach(b => {
      b.addEventListener('click', e => {
        e.stopPropagation();
        SE.select();
        const rootSt = rootStOf();
        const i = +b.dataset.i;
        const entry = i === -1 ? rootSt : (rootSt.bench || [])[i];
        labRevive(entry);
        if (i === -1){
          // 場の子をその場復活: 盤面スプライト/HPボックスの退場状態も解除して見えるようにする

          const pb = $('pb-' + physSide); if (pb) pb.style.visibility = 'visible';

  // ホールドが効く前に advanceMsg→nextSay が先に走る)＝退場が一瞬でポップするバグの実バグ源。
  if (yes) yes.addEventListener('click', e => {

  // renderPartyScreenと同じ規則で再計算して配線(swDetailSrc='mine'→S.sides.self系/'opp'→S.sides.opp系)。
  const st0 = S.sides.self;

  const dSide = swDetailSrc === 'opp' ? (labSwapped ? 'self' : 'opp') : (labSwapped ? 'opp' : 'self');
  wireSwDetailEvents(dEntry, dSide, dRootSt);
}

// 「交代する」の実処理: 旧showPartyのボタンclickハンドラと同じ経路を厳密に踏襲(data-iに相当するidxを引数化しただけ)
// ★バトルラボ: 死に出し(swForced)は自分/相手どちらの死に出しもここを通る。labRunForcedQueue()が
// labSwapSides()で「いま死に出し中の側」を一時的にselfへ入れ替えてこの画面を出すので、実際にエンジンへ
// 反映する直前で真の対応関係へ戻し(=labSwapped解除)、物理DOM(#f-self/#f-opp等)も正しい側を触る。
function doSwitchTo(idx){
  if (idx == null) return;
  const pt = $('party');
  if (swForced){
    // ★オンライン: 選択を相手へ送り、両者の選択が揃ってから決められた順で適用(ロックステップ)
    if (window.RB_ONLINE && RB_ONLINE.started && RB_ONLINE.pendingRep){
      pt.style.display = 'none';
      const _seed = (Math.random() * 0x7fffffff) | 0;
      RB_ONLINE.pendingRep.selfIdx = idx;
      RB_ONLINE.pendingRep.selfSeed = _seed;
      RBOnline.sendFaintReplace(idx, _seed);
      onlineTryApplyReplaces();
      return;
    }
    // 死に出し: その場で交代を実行してログを再生(ターン消費なし=実機どおり)
    const wasSwapped = labSwapped;
    if (wasSwapped) labSwapSides();   // 相手側の死に出し中なら、ここで真の対応関係に戻す
    const side = wasSwapped ? 'opp' : 'self';
    pt.style.display = 'none';
    logPos = S.battleLog.length;
    S.attemptSwitch(side, idx, {ignoreTrapping: true, faintReplace: true});
    // 新しい子は登場拍(いけっ！の声)まで隠す=前触れなくポンと出るのを防ぐ(2026-07-06 阿部さん)
    const ff = $('f-' + side); if (ff){ ff.classList.remove('recall', 'enter'); ff.classList.add('gone'); }
    const pbX = $('pb-' + side); if (pbX) pbX.style.visibility = 'hidden';
    renderAll();   // 隠れたまま新しい子のスプライトを組む(表示は登場拍のenter fxが行う)
    try { ghRenderAll(); } catch (e) {}
    const fresh = reorderEndure(S.battleLog.slice(logPos).filter(e => !/^───/.test(e.msg)));
    say(fresh.flatMap(e => splitBattleLines(e.msg).map(lineWithFx)), () => labRunForcedQueue());
    return;
  }
  S.sides.self.switchChoice = idx;
  doTurn(null);   // 交代をこのターンの行動に(⏩=ターンも進める。doTurnが相手側にバトンタッチ/実行する)
}
// ★バトルラボ: ⏸「このまま(ターン消費なし)」=即座に交代を反映するが、ターンの行動としては消費しない。
// いま選んでいるのが相手側(labSwapped中)なら、真の対応関係に戻してから反映し、終わったら選ばせている側の
// 続き(そのままもう一度アクション選択)へ戻すため再度入れ替える。
function doSwitchToFree(idx){
  if (idx == null) return;
  $('party').style.display = 'none';
  const wasSwapped = labSwapped;
  if (wasSwapped) labSwapSides();
  const side = wasSwapped ? 'opp' : 'self';
  logPos = S.battleLog.length;
  S.attemptSwitch(side, idx, {ignoreTrapping: true});
  renderAll();
  try { ghRenderAll(); } catch (e) {}
  const fresh = reorderEndure(S.battleLog.slice(logPos).filter(e => !/^───/.test(e.msg)));
  say(fresh.flatMap(e => splitBattleLines(e.msg).map(lineWithFx)), () => {
    if (wasSwapped) labSwapSides();   // 相手側の選択を続けさせるため、再度入れ替えて戻す
    showActionUI();
  });
}

let watchPanelHidden = false;   // 👀ボタンでユーザーが一時的に隠した状態(バトル開始のたびにリセット)
function renderWatchPanel(){
  const w = $('watch-panel');

  if (watchPanelHidden || !document.body.classList.contains('in-battle') ||
      !S || !S.sides || !S.sides.self || !S.sides.self.poke || !S.sides.opp || !S.sides.opp.poke){

  w.style.top = topPx + 'px'; w.style.bottom = 'auto'; w.style.left = '14px'; w.style.right = 'auto';
  const RL = {atk:'A', def:'B', spatk:'C', spdef:'D', spd:'S', accuracy:'ACC', evasion:'EVA', crit:'CRIT'};
  const sj = S.statusJa();

    badpoison:'common.status_toxic', sleep:'common.status_sleep', freeze:'common.status_freeze'};
  const row = side => {

    const parts = [];
    Object.entries(st.rank || {}).forEach(([k, v]) => { if (v) parts.push(`<span class="bdg">${RL[k] || k}${v > 0 ? '+' : ''}${v}</span>`); });
    if (sj[st.status]) parts.push(`<span class="bdg">${I18N.t(_K[st.status] || '', sj[st.status])}</span>`);
    if (st.confusion > 0) parts.push(`<span class="bdg">${I18N.t('common.status_confusion','こんらん')}</span>`);
    if (st.subHp > 0) parts.push(`<span class="bdg">${I18N.t('common.bdg_substitute','みがわり')}</span>`);
    return `<div class="wp-row"><b>${tPokeName((st.illusionAs || st.poke).name)}</b>${parts.join('') || ' ' + I18N.t('real_battle.watch_none','とくに 変化なし')}</div>`;

  const envRows = [];
  const turnsTxt = n => n != null ? ' (' + I18N.t('real_battle.watch_turns_left','のこり{n}ターン').replace('{n}', n) + ')' : '';

  if (env.weather && env.weather !== 'none')
    envRows.push(`<div class="wp-row">☀ ${I18N.t('real_battle.env_weather_' + env.weather, env.weather)}${turnsTxt(env.weatherTurns)}</div>`);

  const w = $('weak-panel');

  const fr = $('field').getBoundingClientRect();
  const ratio = fr.height / 360;
  const ex = $('btn-exit');
  const topPx = ex ? Math.round((ex.getBoundingClientRect().bottom - fr.top) / ratio) + 8 : 52;
  w.style.top = topPx + 'px'; w.style.bottom = 'auto'; w.style.left = '14px'; w.style.right = 'auto';

  const opp = S.sides.opp;
  // 相手の実効タイプ(sideTypes優先・無ければポケモン素タイプ)
  const defTypes = (S.sideTypes && opp && opp.poke) ? S.sideTypes(opp)
    : (opp && opp.poke ? [opp.poke.type1, opp.poke.type2].filter(Boolean) : []);
  const tc = (S.typeColors && S.typeColors()) || (typeof TYPE_COLORS !== 'undefined' ? TYPE_COLORS : {});
  const TYPES18 = (typeof TYPES !== 'undefined') ? TYPES : [];

  if (!opp || !opp.poke || !defTypes.length){

  const buckets = { super: [], weak: [], none: [] };

      const dummy = { name: '__weakness', type: atkType, category: '物理', power: 40 };
      const r = S.calcDamage ? S.calcDamage('self', 'opp', dummy) : null;

      } else {
        eff = S.typeEffPreview ? S.typeEffPreview(atkType, defTypes) : 1; if (eff === 0) immune = true;
      }
    } catch(e){
      eff = S.typeEffPreview ? S.typeEffPreview(atkType, defTypes) : 1; immune = eff === 0;
    }
    const mult = immune ? 0 : eff;
    const col = tc[atkType] || '#3a4660';
    const badge = `<span class="wp-t" style="background:${col}">${tTypeName(atkType)}</span>`;

      buckets.none.push(badge);

      const m = mult >= 4 ? I18N.t('real_battle.weakness_4x','4倍') : `×${mult}`;

      buckets.weak.push(`${badge}<span class="wp-m">${m}</span>`);
    }   // ×1(等倍)は省略
  });

  const section = (title, arr) => arr.length
    ? `<div class="wp-row"><b>${title}</b><div class="wp-types">${arr.join('')}</div></div>` : '';
  w.innerHTML =
    section(I18N.t('real_battle.weakness_title_super','こうかばつぐん'), buckets.super) +

    section(I18N.t('real_battle.weakness_title_none','こうかなし'), buckets.none);
  w.style.display = 'block';
  w.onclick = () => { w.style.display = 'none'; try { renderWatchPanel(); } catch(e) {} };
}

// labAIは常に「真の側キー」で保持する(labSwappedとは無関係。設計§1)。
let labAI = { self: false, opp: false };

// ★禁止: labSwapped=trueの間に呼ばない(側が逆転する)。呼び出し元が必ずunswap後に呼ぶこと。
function injectAiAction(side){
  if (!S.aiChooseAction) return;
  const st = S.sides[side];
  if (!st || !st.poke) return;
  if (st.fainted) return;   // ★H2(2026-07-17): ひんしのまま技/交代を注入しない(死に出し解決が先)
  const act = S.aiChooseAction(side);

  // 前ターンのstale値が残らないよう、注入時に必ずもう一方をクリアする。
  if (act.type === 'switch'){ st.switchChoice = act.index; }
  else { st.selectedMoveIdx = act.index; st.switchChoice = null; }
}

function labScheduleAiTurn(){

// ★2026-07-17 Playwright再検証FB: 「どのタイミングでトグルしても、システムが落ち着いた時点で
// labAI に合った状態に収束する」ための仕切り直し本体。戻り値=true なら収束完了(or もう対象外)、
// false なら「今はまだ仕切り直せない」(busy中/強制交代・交代先選択中)=ポーリング継続が必要。
// エンジンはexecuteTurnまで何も消費していないので収集のやり直しは安全(selectedMoveIdxは上書きされる)。
function labApplyAIResync(){
  // バトル外/勝敗確定/全滅ふっかつ選択待ち=仕切り直しの対象外(それぞれの解決経路がlabBeginTurnへ収束する)
  if (!document.body.classList.contains('in-battle') || gameOver || labChoicePending) return true;
  if (busy) return false;   // メッセージ再生中: 明けてから(ポーリングで再試行)
  const uiOpen = $('moves').style.display === 'flex' || $('party').style.display === 'flex';
  // 死に出し強制(swForced)・交代技の交代先選択(swPivot)中は割り込まない(既存フロー破壊防止)。
  // これらの解決経路(labRunForcedQueue/doTurn)は最終的にlabBeginTurnへ到達する=そこで収束する。
  // ★2026-07-17 3周目検証FB: swForced/swPivotはshowPartyでしか代入されない=画面を閉じた後もtrueが残留する。
  // フラグだけで見ると強制交代解決後の技UI(#moves)を永久にブロックしてしまうため、
  // 「強制/pivotのパーティ画面が実際に開いている」時だけブロックする(残留フラグは無視してよい=
  // swForcedの他用途「もどるボタンの有無」等はパーティ表示中しか意味を持たない)。
  if ((swForced || swPivot) && $('party').style.display === 'flex') return false;
  if (uiOpen){
    ['cmd', 'moves', 'party', 'watch-panel', 'weak-panel', 'mv-tip'].forEach(id => { $(id).style.display = 'none'; });
    RB_PIVOT.selfIdx = null; RB_PIVOT.trueSide = null; RB_PIVOT.pendingMoveIdx = null;
    try { closePicker(); } catch (e) {}   // ★L6: バトル追加ピッカーが開いていたら一緒に閉じる
  }
  // ★H3(2026-07-17): 収集中に選ばれた行動の残骸を必ず破棄する。エンジンはswitchChoice最優先
  // (real_battle_simulator 5919-5928)なので、放置すると「取り消したはずの交代」が次のターンで実行される。
  ['self', 'opp'].forEach(k => { S.sides[k].switchChoice = null; S.sides[k].selectedMoveIdx = null; });
  labBeginTurn();
  return true;
}

// ===== ★A3(2026-07-17 阿部さんFB): 1手もどす(深さ1) =====
// sides本体の巻き戻しはエンジンの undoBattle()(runTurnごとにpushHistoryされるbattleHistoryのpop・
// sides.self/oppの「中身」をin-placeで書き戻す=labSwapSidesの参照スワップと衝突しない)を流用し、

function labUndoTurn(){
  if (!labUndoSnap || busy || gameOver || labChoicePending) return;
  if (!document.body.classList.contains('in-battle')) return;
  const w = engineWin();
  if (!w || typeof w.undoBattle !== 'function') return;
  if (labSwapped) labSwapSides();   // 復元は必ず真の対応関係で(参照は差し替えず中身を書き戻す)
  const snap = labUndoSnap; labUndoSnap = null;   // 深さ1=連打で2手は戻れない
  // 収集中のUI/キュー/行動の残骸を全部畳む
  ['cmd', 'moves', 'party', 'watch-panel', 'weak-panel', 'mv-tip'].forEach(id => { $(id).style.display = 'none'; });
  try { closePicker(); } catch (e) {}
  labForcedQueue = []; labReviveFlow = false;

  w.undoBattle();   // sides中身の巻き戻し+battleLogをスナップショット時点へ(エンジン実装=4696-4785)
  ['self', 'opp'].forEach(k => { S.sides[k].switchChoice = null; S.sides[k].selectedMoveIdx = null; });
  // env(天候/フィールド/ターン系)はエンジンundo対象外=ページ側スナップショットから中身を書き戻す
  try {
    Object.keys(S.env).forEach(k => { delete S.env[k]; });
    Object.assign(S.env, snap.env);
  } catch (e) {}
  // 表示の巻き戻し: ターン番号・右ログDOM・ダメージピン(logPosはエンジンlog末尾へ同期)
  turnNo = snap.turnNo; updateTurnBadge();

  const ls = document.getElementById('log-scroll'); if (ls) ls.innerHTML = snap.logHtml;
  labDmgPin = snap.pin || []; renderDmgPin();

  window._idSnap = null; window._hpSnap = {};
  // ひんし退場クラス/HPボックス非表示が残っていたら解除(巻き戻しで生き返っているため)
  ['self', 'opp'].forEach(sd => {
    const f = $('f-' + sd); if (f) f.classList.remove('gone', 'faint', 'recall', 'enter');
    const pb = $('pb-' + sd); if (pb) pb.style.visibility = 'visible';
  });
  // 天候/フィールドの盤面演出も復元値に合わせる(神の手と同じマップ)

  try { setTerrainFx(({grassy: 'grass', electric: 'electric', psychic: 'psychic', misty: 'misty'})[S.env.field] || null); } catch (e) {}
  hideResultBanner();
  renderAll();

function doTurn(moveIdx){
  if (busy || gameOver || labChoicePending) return;
  if (S.sides.self.fainted) return;   // 死に出しの選択待ち中はターンを進めない
  // 行動が決まったらまずメニューをパッと消す(2026-07-06 阿部さん)
  ['cmd', 'moves', 'party', 'watch-panel', 'weak-panel', 'mv-tip'].forEach(id => { $(id).style.display = 'none'; });
  if (moveIdx != null) S.sides.self.selectedMoveIdx = moveIdx;
  // ★Lab-3-A: いまクリックした側(現在self位置)は手動入力が確定した。まだ選んでいない「もう一方の真の側」を求め、
  // それがAIならUIを見せずここで注入する(注入は必ずunswap後=§0禁止事項)。
  const otherTrueSide = labSwapped ? 'self' : 'opp';
  if (labAI[otherTrueSide]){
    if (labSwapped) labSwapSides();
    injectAiAction(otherTrueSide);
    executeTurn();
    RB_PIVOT.selfIdx = null; RB_PIVOT.trueSide = null; RB_PIVOT.pendingMoveIdx = null;
    return;
  }
  if (!labSwapped){
    // 自分側の行動が決まった→相手側にバトンタッチ(入れ替えて同じUIで相手の行動を選ばせる)
    labSwapSides();
    showActionUI();
    return;
  }
  // 相手側の行動も決まった→元の対応関係に戻してからターンを実行
  labSwapSides();
  executeTurn();
  RB_PIVOT.selfIdx = null; RB_PIVOT.trueSide = null; RB_PIVOT.pendingMoveIdx = null;
}
// 1ターンを実行して差分ログを再生する本体(オフライン=doTurnから直接/オンライン=両者の行動が揃ってから)
function executeTurn(){
  // ★A3(2026-07-17 阿部さんFB): 1手もどす用スナップショット(深さ1)。sides本体はエンジンのbattleHistory
  // (runTurnが毎ターンpushHistory)を流用し、エンジンが巻き戻さない env(天候/フィールド/ターン系)と
  // ページ表示(ターン番号/右ログDOM/ダメージピン)だけこちらで控える
  try {
    labUndoSnap = {
      env: JSON.parse(JSON.stringify(S.env)),
      turnNo, lastLogTurn,
      logHtml: (document.getElementById('log-scroll') || {innerHTML: ''}).innerHTML,
      pin: labDmgPin.slice(),
    };
  } catch (e) { labUndoSnap = null; }
  // 演出用HPスナップショット: 交代で出た瞬間のバーは「攻撃前のHP」を出す
  // (renderAllはエンジン最終状態=被弾後を入れてしまい、登場した瞬間に減って見えていた=2026-07-06 阿部さん)
  window._hpSnap = {};
  // 表示個体スナップ: エンジンは1ターン分を先に計算し終えるので、renderAllが最終状態(交代後の子)を
  // 先に描いてしまう(=ひんし前にstatbarの名前が次の子になる)。登場拍(enter fx)までは旧個体を表示し続ける
  window._idSnap = {self: S.sides.self && S.sides.self.poke, opp: S.sides.opp && S.sides.opp.poke};
  // ばけのかわ表示スナップ: エンジンは剥がれ済みでも、絵は「はがれた」の拍まで皮のまま(2026-07-10 阿部さん)
  window._dgSnap = {self: S.sides.self && S.sides.self.disguise, opp: S.sides.opp && S.sides.opp.disguise};
  ['self', 'opp'].forEach(sd => {
    const st0 = S.sides[sd]; const m = {};
    [st0].concat(st0.bench || []).forEach(e => {
      if (e && e.poke){ const mx = S.realStat(e, 'hp') || 1; m[e.poke.name] = e.currentHp == null ? mx : Math.max(0, e.currentHp); }
    });
    _hpSnap[sd] = m;
  });
  logPos = S.battleLog.length;
  S.runTurn();
  const fresh = reorderEndure(S.battleLog.slice(logPos).filter(e => !/^───/.test(e.msg)));
  // ★A4(2026-07-17 阿部さんFB): このターンの攻撃ダメージ行をピン留め(次ターンで置き換え=技比較用)
  labDmgPin = fresh.map(e => e.msg).filter(m => / に \d+ ダメージ！/.test(m)).slice(0, 8);
  renderDmgPin();
  updateLabUndoButton();   // ★A3: スナップショットが出来た=1手もどすを出す
  // CH: 攻撃行の前に「◯◯の こうげき！」を差し込み(2段表示=2026-07-05 阿部さん)。
  // 表示専用(noLog)でエンジンログ/右ログは汚さない。攻撃側はぴょんぴょん予告(preattack)
  const lines = [];
  for (let i = 0; i < fresh.length; i++){
    const e = fresh[i];
    const am = e.msg.match(/^((?:相手の )?)(\S+) の (\S+)！/);
    // ばけのかわブロック: 「◯◯の 技！」の直後に「…ばけのかわが はがれた！」が続く形で判別する
    // (かたやぶり等の入場宣言も同じ「◯◯の 特性名！」の裸行なので、次の行の内容で狙い撃ちする=2026-07-13 阿部さん報告)
    const nextIsDisguiseBreak = !!(fresh[i + 1] && /ばけのかわが はがれた！$/.test(fresh[i + 1].msg));
    // まもる系ブロック: 同じ形(「◯◯の 技！」の直後に「…こうげきを 防いだ！」)。技告知を消さず、
    // 予告+攻撃演出を出してから防がれる流れを見せる(2026-07-16 阿部さんFB=心理戦の情報が消えていた)
    const nextIsProtectBlock = !!(fresh[i + 1] && /こうげきを 防いだ！$/.test(fresh[i + 1].msg));
    const nextIsBlockAnnounce = nextIsDisguiseBreak || nextIsProtectBlock;
    if (am && (/ダメージ！/.test(e.msg) || nextIsBlockAnnounce)){
      // ★2026-07-18 阿部さんFB: 予告は技名入り「{名} の {技名}！」に(「こうげき！」だと何の技か分からない)。
      // 技名は攻撃行そのもの(am[3])から取る=selectedMoveIdx/AI注入を追いかけない(行が正・両側共通)。
      // i18n: 標準の技使用行と同じJA正典形式なのでbattle_log_i18nの既存used_moveパターンで翻訳される(新パターン不要)。
      // 二重表示の扱い: ①変化技=このifはダメージ/ブロック行限定なので予告は出ず、エンジンの裸使用行(2694)に
      // 任せる(選択理由: 予告を変化技にも出すと同文2連になるだけで情報が増えない)。②ばけのかわ/まもるブロック
      // (nextIsBlockAnnounce)はエンジン行自体が同文の裸使用行=予告(ぴょんぴょん)→同文のまま攻撃fx、と
      // 表示上は1本に見える(リズム維持・重複感なし)。予告行はnoLog+lineWithFx非経由=attack fx/Phase2の
      // 変化技cueフックは誤発火しない(本物の行だけが発火する)。
      const introJa = `${am[1]}${am[2]} の ${am[3]}！`;
      const introSide = am[1] ? 'opp' : 'self';
      // ★2026-07-21 阿部さんFB「テンポ速すぎ」: 相手の攻撃は予告で一拍長く(1600ms)区切ってからバーン。自分は850のまま
      lines.push({ text: (window.translateLogLine ? translateLogLine(introJa) : introJa),
        fx: () => flash(introSide, 'preattack'), noLog: true, hold: introSide === 'opp' ? 1600 : 850 });
    }
    // ★2026-07-16連続技演出: エンジンのlog entry(e)が持つmultiHit/hitIndex/hitCountをそのままoptsへ渡す
    // (real_battle_simulator.htmlのphaseDealDamageが各ヒット行に載せたメタ)。表示側はこれを見て
    // 速い連打演出(圧縮ストライク)に切替える。省略時=undefined=従来の単発演出のまま(不変)。
    splitBattleLines(e.msg).forEach(t => lines.push(lineWithFx(t, {
      forceAttackFx: nextIsBlockAnnounce, multiHit: e.multiHit, hitIndex: e.hitIndex, hitCount: e.hitCount,
    })));
  }
  logTurnHeader(turnNo);   // 右ログに「Turn N」見出し
  say(lines, endOfTurn);
}

// ===== ★バトルラボ 神の手パネル(設計§3-4): 天候/フィールド(共通)+両側のHP%/状態異常/ランクを直接操作 =====

const GH_RANK_LETTER = {atk:'A', def:'B', spatk:'C', spdef:'D', spd:'S', acc:'ACC', eva:'EVA'};
function ghEntries(side){

// max は毎回 S.realStat(e,'hp') をライブで読む(⚙でHP努力値を変えた直後でも常に最新の最大値を反映する)。
function ghHpvHtml(hp, max, pct){

function ghRankBadgeHtml(k, v){

  const rankSecHtml = row.active

    `<div class="gh-row-st"><select class="gh-st">${GH_STATUS.map(([k, key, ja]) => `<option value="${k}"${e.status === k ? ' selected' : ''}>${I18N.t(key, ja)}</option>`).join('')}</select></div>` +

function ghRenderSide(side){

      const max = S.realStat(e, 'hp') || 1;
