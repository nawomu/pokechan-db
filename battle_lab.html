// 編成の保存/復元(localStorage): ポケモン名・技名・持ち物キー・人数(リロードしても残る)
// ★バトルラボ: 保存キーはreal_battleの`rb_team`と完全分離(自分/相手それぞれ別キー=設計§4)
function saveTeam(){
  try {
    const pack = ids => ({
      size: teamSize,
      lead: leadSlot[ids === selfIds() ? 'self' : 'opp'],
      val: Object.fromEntries(ids.map(id => [id, slotVal[id]])),
      item: Object.fromEntries(ids.map(id => [id, slotItem[id]])),
      ability: Object.fromEntries(ids.map(id => [id, slotAbility[id]])),
      gender: Object.fromEntries(ids.map(id => [id, slotGender[id]])),
      nature: Object.fromEntries(ids.map(id => [id, slotNature[id]])),
      effort: Object.fromEntries(ids.map(id => [id, slotEffort[id]])),
      moves: Object.fromEntries(ids.map(id => [id, (slotMoves[id] || []).map(m => m && m.name)])),
    });
    localStorage.setItem('rb_team_lab_self', JSON.stringify(pack(selfIds())));
    localStorage.setItem('rb_team_lab_opp', JSON.stringify(pack(oppIds())));
  } catch (e) {}
}
function loadTeam(){
  try {
    const dSelf = JSON.parse(localStorage.getItem('rb_team_lab_self') || 'null');
    const dOpp = JSON.parse(localStorage.getItem('rb_team_lab_opp') || 'null');
    if (!dSelf || !dSelf.val || !dSelf.val.s1) return false;
    teamSize = dSelf.size || 3;
    leadSlot = {
      self: (dSelf.lead && selfIds().includes(dSelf.lead)) ? dSelf.lead : 's1',
      opp:  (dOpp && dOpp.lead && oppIds().includes(dOpp.lead)) ? dOpp.lead : 'o1'
    };
    $('team-size').value = String(teamSize);
    renderTeamRows();
    const allMoves = Object.values(WAZA_MAP);
    const applyOne = (d, id) => {
      if (!d) return;
      // 保存チームにメガのすがたが残っていたら基本のすがたへ矯正(メガはバトル中のみ)
      const _p0 = d.val[id] && S.pokeByName(d.val[id]);
      if (_p0 && (_p0.mega || _p0.form === 'メガ進化')){
        const _base = d.val[id].replace(/^メガ/, '').replace(/[XY]$/, '');
        if (S.pokeByName(_base)) d.val[id] = _base;
      }
      if (!d.val[id] || !S.pokeByName(d.val[id])) return;
      slotItem[id] = d.item && d.item[id] != null ? d.item[id] : 'mega_stone_any';
      slotGender[id] = (d.gender && d.gender[id]) || genderOfRB(d.val[id]);
      slotNature[id] = (d.nature && d.nature[id]) || 'まじめ';
      slotEffort[id] = clampEffortRB((d.effort && d.effort[id]) || {});
      const poke = S.pokeByName(d.val[id]);
      // ★バトルラボ: 特性は全特性から自由選択なので、ABILITY_DESCに存在すればそのまま復元
      const _abSaved = d.ability && d.ability[id];
      slotAbility[id] = (_abSaved && ABILITY_DESC[_abSaved] != null) ? _abSaved : defaultAbilityRB(poke);
      const names = (d.moves && d.moves[id]) || [];
      const mvs = names.map(n => allMoves.find(m => m.name === n)).filter(Boolean);
      slotMoves[id] = mvs.length === 4 ? mvs : autoMoves(poke);
      setSlot(id, d.val[id], true);
    };
    selfIds().forEach(id => applyOne(dSelf, id));
    oppIds().forEach(id => applyOne(dOpp, id));
    dedupeTeams();   // 過去の保存に同種重複が残っていたら引き直す
    dedupeItemsRB(); // 過去の保存に持ち物重複が残っていたら矯正(1種類1個)
    return true;
  } catch (e) { return false; }
}
// 同じポケモンは1チーム1体まで(2026-07-06 阿部さん)。重複していた2体目以降をランダムな未使用種に引き直す
function dedupeTeams(){
  const all = S.pokeList().filter(isPickable).map(p => p.name);
  [selfIds(), oppIds()].forEach(ids => {
    const seen = new Set();
    ids.forEach(id => {
      const nm = slotVal[id];
      if (!nm) return;
      if (seen.has(nm)){
        const pool = all.filter(n => !seen.has(n) && !ids.some(x => slotVal[x] === n));
        if (pool.length) setSlot(id, pool[Math.floor(Math.random() * pool.length)]);
      }
      seen.add(slotVal[id]);
    });
  });
}
// チームビルダー(party_checker.html)からの受け取り(2026-06-13)。自分チームだけ反映・相手はランダム。
// 一度読んだら handoff キーは消す(リロードで毎回上書きしないため。rb_teamには保存される)
function loadHandoff(){
  try {
    const d = JSON.parse(localStorage.getItem('pokechan_realbattle_handoff_v1') || 'null');
    if (!d || !Array.isArray(d.party)) return false;
    const picks = d.party.filter(e => e && e.name && S.pokeByName(e.name)).slice(0, 6);
    if (!picks.length) return false;
    localStorage.removeItem('pokechan_realbattle_handoff_v1');
    teamSize = picks.length > 3 ? 6 : 3;
    $('team-size').value = String(teamSize);
    renderTeamRows();
    const pokes = S.pokeList().filter(isPickable);
    // 重複なしランダム(同名2体は交代リストで紛らわしい): 使った名前を除外しながら引く
    const used = new Set(picks.map(e => e && e.name).filter(Boolean));
    const rnd = () => {
      const cand = pokes.filter(p => !used.has(p.name));
      const nm = (cand.length ? cand : pokes)[Math.floor(Math.random() * (cand.length ? cand.length : pokes.length))].name;
      used.add(nm);
      return nm;
    };
    // 自分チーム = ビルダーの編成(技keyを解決・足りなければ自動補完)
    selfIds().forEach((id, i) => {
      const e = picks[i];
      if (!e){ setSlot(id, rnd()); return; }
      const poke = S.pokeByName(e.name);
      const all = S.usableMoves(poke);
      const byKey = (e.moves || []).map(k => all.find(m => m && (m.key === k || m.name === k))).filter(Boolean);
      slotMoves[id] = byKey.length ? byKey.slice(0, 4) : autoMoves(poke);
      slotItem[id] = e.item || 'mega_stone_any';
      slotGender[id] = e.gender || genderOfRB(e.name);
      slotNature[id] = e.nature || 'まじめ';
      slotEffort[id] = clampEffortRB(e.effort || {});
      slotAbility[id] = null;   // ビルダーhandoffは特性を持たない→setSlot(keepCustom)内で既定を補完
      setSlot(id, e.name, true);
    });
    dedupeItemsRB();
    // 相手チームはランダム
    oppIds().forEach(id => setSlot(id, rnd()));
    dedupeTeams();   // ビルダー側に同種が居ても1チーム1体に矯正
    return true;
  } catch (e) { return false; }
}
// ===== 能力値コンパクトエディタ(中央パネル直下に一体化・2026-07-05 阿部さん) =====
// ルールはビルダー準拠(合計66pt/1能力32pt/1pt=実数値+1・性格補正)。UIは指示どおりコンパクト独自:
// ポケモン名なし/メーター4目盛り(1目盛り=8pt)/MIN⇔MAXトグル1個/適用・キャンセルなし=触った瞬間に確定保存
const EV_LETTER = {hp:'H', atk:'A', def:'B', spatk:'C', spdef:'D', spd:'S'};
const EV_LABEL_KEY = {hp:'stats.hp_full', atk:'stats.atk_full', def:'stats.def_full',
  spatk:'stats.sp_atk_full', spdef:'stats.sp_def_full', spd:'stats.spd_full'};
const tNature = n => (window.I18N && I18N.nature) ? I18N.nature(n) : n;
// ctx = { poke, getEff(), getNature(), apply(eff, nature) } — applyは変更のたびに即呼ばれる(自動確定)
function renderEvEditor(container, ctx){
  if (!container || !ctx.poke) return;
  const eff = clampEffortRB(ctx.getEff());
  const natureName = ctx.getNature() || 'まじめ';
  const nat = S.natureList().find(n => n[0] === natureName) || ['まじめ','—','—'];
  const total = EFFORT_KEYS.reduce((s, k) => s + eff[k], 0);
  const maxFor = k => Math.min(32, 66 - (total - eff[k]));
  const tmp = S.makeSideState();
  tmp.poke = ctx.poke; tmp.effort = eff; tmp.natureIdx = S.natureIdxOf(natureName);
  // 性格表記=名前をやめて補正だけ(2026-07-10 阿部さん「ずぶとい→B↑A↓だけでいい」)。補正なし(がんばりや等)=±0。
  // 名前はtitle(ホバー)に残す
  const natFx = n => n[1] !== '—' ? `${EV_LETTER[n[1]]}↑${EV_LETTER[n[2]]}↓` : '±0';
  const curNat = S.natureList().find(n => n[0] === natureName) || ['まじめ','—','—'];
  container.classList.toggle('full', total >= 66);
  container.innerHTML =
    `<div class="sd-ev-top"><button class="sd-nature sd-pick" title="${tNature(natureName)}">${natFx(curNat)} ▾</button>` +
    `<span class="sd-ev-budget"><b>${total}</b>/66</span>` +
    `<button class="sd-ev-reset">${I18N.t('buttons.reset','リセット')}</button></div>` +
    EFFORT_KEYS.map(k => {
      const pts = eff[k], mx = maxFor(k);
      const isMin = pts > 0 && pts >= mx;   // これ以上盛れない→MINに切り替わる(1ボタントグル)
      return `<div class="sd-ev-row${pts >= 32 ? ' maxed' : pts > 0 ? ' has' : ''}" data-k="${k}">` +
        `<span class="evl${nat[1] === k ? ' up' : nat[2] === k ? ' down' : ''}">${EV_LETTER[k]}<small>${I18N.t(EV_LABEL_KEY[k], k)}</small></span>` +
        `<span class="real">${S.realStat(tmp, k)}</span><span class="sp"></span>` +
        `<button class="dec" ${pts <= 0 ? 'disabled' : ''}>◀</button><span class="pts">${pts}</span>` +
        `<button class="inc" ${pts >= mx ? 'disabled' : ''}>▶</button>` +
        `<button class="mm" ${!isMin && mx <= pts ? 'disabled' : ''}>${isMin ? 'MIN' : 'MAX'}</button></div>`;
    }).join('');
  // どの操作も即確定(適用ボタン無し=他のポケモンに移っても設定が残る)
  const commit = (newEff, newNature) => {
    ctx.apply(clampEffortRB(newEff || eff), newNature || natureName);
    renderEvEditor(container, ctx);
  };
  container.querySelector('.sd-nature').addEventListener('click', e => {
    SE.select();
    openNatureModal(natureName, k => commit(eff, k), e.currentTarget);
  });
  container.querySelector('.sd-ev-reset').addEventListener('click', () => { SE.select(); commit(ZERO_EV()); });
  container.querySelectorAll('.sd-ev-row').forEach(row => {
    const k = row.dataset.k;
    const set = v => commit({ ...eff, [k]: Math.max(0, Math.min(maxFor(k), Math.round(v))) });
    row.querySelector('.dec').addEventListener('click', () => set(eff[k] - 1));
    row.querySelector('.inc').addEventListener('click', () => set(eff[k] + 1));
    row.querySelector('.mm').addEventListener('click', () => { SE.select(); set(eff[k] > 0 && eff[k] >= maxFor(k) ? 0 : maxFor(k)); });
    // メーター(bar)は廃止=ドラッグ入力も廃止(2026-07-07 阿部さん)
  });
}

function renderMovePickList(query){

  // ただし「本来おぼえる技」か「おぼえない技(ラボ専用)」かはセクション分けして見分けられるようにする(2026-07-16 阿部さんFB)

    return bv - av;
  };
  const curName = slotVal[movePick.slotId];
  const learnable = hits.filter(m => isMoveLearnableBy(m, curName)).sort(sortFn);

    return `<button data-n="${p.name}"><img loading="lazy" src="${src}" onerror="this.remove()">${tPokeName(p.name)}<span class="pp-types">${types}</span></button>`;
  }).join('') || `<div style="color:#8b94a7;padding:10px">${I18N.t('real_battle.poke_not_found','みつからない…')}</div>`;
  $('pp-list').querySelectorAll('button').forEach(b => b.addEventListener('click', () => {

}
function renderTeamRows(){

      b.addEventListener('click', e => {

// 盤面(内部640×360)をビューポートに合わせて相似拡大。デスクトップは最大1.55・スマホ横は幅/高さに収める(2026-07-07 阿部さん)
// 選出画面の3カラムを狭い端末に合わせて縮小(配置は維持=デスクトップと同じ並び)。iPhone横(844)はほぼ等倍
function fitSetup(){
  const cols = document.getElementById('setup-cols');
  const game = document.getElementById('game');
  if (!cols || !game) return;
  cols.style.zoom = '';  // いったん戻して自然幅を測る
  const avail = Math.max(280, game.clientWidth - 40);
  const natural = 760;   // 3カラムが窮屈にならない目安幅
  cols.style.zoom = avail < natural ? Math.max(0.5, avail / natural) : '';
}
function fitField(){
  const f = document.getElementById('field');
  const game = document.getElementById('game');
  if (!f || !game) return;
  const availW = Math.max(200, game.clientWidth - 4);
  // バトル中はヘッダー/コントロール/最小ログ分を除いた高さを盤面に回す(横向きスマホで盤面を大きく)
  const reserve = document.body.classList.contains('in-battle') ? 96 : 120;
  const availH = Math.max(180, window.innerHeight - reserve);
  let z = Math.min(availW / 640, availH / 360);
  z = Math.max(0.42, Math.min(1.55, z));
  f.style.zoom = z;
}
let _fitTimer = null;
function scheduleFit(){ if (_fitTimer) cancelAnimationFrame(_fitTimer); _fitTimer = requestAnimationFrame(() => { fitField(); fitSetup(); }); }
window.addEventListener('resize', scheduleFit);
window.addEventListener('orientationchange', () => setTimeout(() => { fitField(); fitSetup(); }, 200));

  // 音オン/オフ(設定はlocalStorageに保存)
  updateSndBtn();
  // 音量スライダー(2026-07-06 阿部さん): 全SE/BGM共通のマスターゲイン。保存して次回も同じ音量
  const volEl = $('snd-vol');

    sndOn = !sndOn;

    if (sndOn){ SE.select(); if ($('battle').style.display !== 'none' && !gameOver) bgmStart(); }
    else bgmStop();
  });
  // 同じポケモンを1チームに2体引かない(重複すると交代リストで「HP満タンの同名」が出て混乱する=2026-07-05 阿部さん)
  function sampleUnique(n){
    const arr = pokes.slice();
    for (let i = arr.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
    return arr.slice(0, n).map(p => p.name);
  }
  function randomize(){
    const mine = sampleUnique(teamSize);
    selfIds().forEach((id, i) => setSlot(id, mine[i]));

  }
  // 相手(AI)チーム=実戦プリセット58ビルドを優先して埋める(タスクB②)。
  // プリセットが尽きた/種の解決に失敗した枠だけランダム種+自動技でフォールバック補充する
  // (フォールバック分もプリセットで既に使った種と重ならないよう除外する)。
  function randomizeOppTeam(){
    const builds = pickPresetBuildsRB(teamSize);
    const usedNames = new Set();
    oppIds().forEach((id, i) => {
      if (applyPresetToSlot(id, builds[i])){ usedNames.add(slotVal[id]); return; }
      const fallback = pokes.filter(p => !usedNames.has(p.name));
      const pick = fallback.length ? fallback[Math.floor(Math.random() * fallback.length)].name : sampleUnique(1)[0];
      usedNames.add(pick);
      setSlot(id, pick);
    });
  }
  window.__randomizeOpp = randomizeOppTeam;   // 連戦モード: 相手チームだけ引き直す(プリセット優先・重複なし)

  if (location.search.includes('demo')){

    setInterval(() => { if (!busy && !gameOver && $('battle').style.display !== 'none') doTurn(0); }, 1200);
  }
}

// 技の自動セット: 覚える技から「タイプかぶりなしで威力上位」を4つ(変化技は1つまで混ぜる)
// 自動選出で避けたい「一発の不利技」: 自分瀕死(だいばくはつ)/反動で次ターン動けない(はかいこうせん)/溜め技(ソーラービーム等)。
// 威力は高いが初手セットには不向き=ある分だけ後回しにして、埋まらない時だけ使う(2026-07-06 阿部さん)
function isDisadvMove(m){
  const bd = m.battle_data || {};
  return !!(bd.self_faint || bd.recharge || bd.charge);
}
function autoMoves(poke){
  const all = S.usableMoves(poke);
  const dmgAll = all.filter(m => m.category !== '変化' && typeof m.power === 'number' && m.power > 0)
                    .sort((a, b) => b.power - a.power);
  // 不利技を除いた候補を優先。足りなければ不利技も威力順で足す
  const good = dmgAll.filter(m => !isDisadvMove(m));
  const bad  = dmgAll.filter(isDisadvMove);
  const pickFrom = (list, picked, types, typeFirst) => {
    if (typeFirst) for (const m of list){ if (picked.length >= 4) break; if (!types.has(m.type)){ picked.push(m); types.add(m.type); } }
    for (const m of list){ if (picked.length >= 4) break; if (!picked.includes(m)) picked.push(m); }
  };
  const picked = [], types = new Set();
  pickFrom(good, picked, types, true);    // まず不利でない技をタイプ多様→威力順で
  pickFrom(bad,  picked, types, false);   // それでも4未満なら不利技(だいばくはつ等)を威力順で補完
  // 攻撃技を1つも覚えない子(メタモン=へんしんのみ)は変化技で埋める(技ゼロで出ると毎ターン棒立ちになる)
  if (!picked.length) return all.slice(0, 4);
  return picked.slice(0, 4);
}
// 初手(1番目)に出すスロット。self/opp両方選べる(2026-07-06 阿部さん)。既定=各サイド先頭
let leadSlot = {self: 's1', opp: 'o1'};
function orderedIds(side){
  const ids = side === 'self' ? selfIds() : oppIds();
  const lead = leadSlot[side];
  if (!ids.includes(lead) || !slotVal[lead]) return ids;
  return [lead].concat(ids.filter(id => id !== lead));
}
// 既定の特性: 基本は特性1。メタモンは隠れ特性かわりもの(シングル実戦の確定特性・チャンピオンズWiki準拠。
// じゅうなん既定だと1ターン目にへんしんするだけの的になるため)
function defaultAbilityRB(p){
  if (p && p.name === 'メタモン') return p.ab3 || p.ab2 || p.ab1 || '';
  return (p && p.ab1) || '';
}

function buildSide(sideKey, ids){
  const st = S.makeSideState();
  const lead = S.pokeByName(slotVal[ids[0]]);
  st.poke = lead;
  st.moves = (slotMoves[ids[0]] || autoMoves(lead)).filter(Boolean);
  st.selectedMoveIdx = 0;
  st.item = slotItem[ids[0]] != null ? slotItem[ids[0]] : 'mega_stone_any';   // 中央パネルで変更可(既定=汎用メガストーン)
  st.gender = slotGender[ids[0]] || genderOfRB(slotVal[ids[0]]);
  st.natureIdx = S.natureIdxOf(slotNature[ids[0]] || 'まじめ');   // 性格(ビルダー由来 or 無補正)
  st.effort = clampEffortRB(slotEffort[ids[0]]);    // 努力値(Champions点・各32/計66に矯正)
  st.bench = ids.slice(1).map(id => {
    const p = S.pokeByName(slotVal[id]);
    return { poke: p, effort: clampEffortRB(slotEffort[id]), natureIdx: S.natureIdxOf(slotNature[id] || 'まじめ'),
      ability: slotAbility[id] || defaultAbilityRB(p), item: slotItem[id] != null ? slotItem[id] : 'mega_stone_any',
      moves: (slotMoves[id] || autoMoves(p)).filter(Boolean), gender: slotGender[id] || genderOfRB(slotVal[id]),
      currentHp: null, fainted: false, status: 'none', sleepTurns: null, lastConsumedItem: null, megaBase: null };
  })
  // 保存チームに現プール外の名前が残っていた場合(pokeByName=null)の抜け殻エントリを捨てる。
  // 残すと「見えない控え」で実質人数が減る+ボールマーク欠け(2026-07-04 深掘りPDCAで発見)
  .filter(e => e.poke);
  st.ability = slotAbility[ids[0]] || defaultAbilityRB(lead);   // 中央パネルで選んだ特性(既定=特性1/メタモンはかわりもの)
  // PP管理(段129): 場の技+控えの技のPPを初期化(エンジンはst.ppがある時だけPPを見る)
  st.pp = st.moves.map(m => (m && m.pp) ? m.pp : 0);
  st.bench.forEach(e => { e.pp = (e.moves || []).map(m => (m && m.pp) ? m.pp : 0); });
  S.sides[sideKey] = st;
}

function startBattle(){
  try { window.scrollTo(0, 0); } catch (e) {}   // モバイル横: 編成下部から開始するとスクロール残りで相手HPバーが画面外(検証WF #6)
  // 前試合の残骸を掃除: 勝敗で無効化したボタンを戻し、「つぎの相手」ボタンが残っていれば消す
  // (勝利→にげる→再スタートの経路では c-next のクリックハンドラを通らないため)
  const _nb = $('c-next'); if (_nb) _nb.remove();
  ['c-fight','c-party','c-run'].forEach(id => { const b = $(id); if (b) { b.disabled = false; b.style.display = ''; } });
  ['f-self','f-opp'].forEach(id => { const f = $(id); if (f) f.classList.remove('gone','faint','rb-wall-reflect','rb-wall-screen','rb-wall-veil'); });   // 前試合のひんし退場/壁パネルを解除
  window._idSnap = null;   // 表示個体スナップも初期化(初回登場から素直に描く)
  hideResultBanner();   // 前試合の勝敗バナーを消す
  buildSide('self', orderedIds('self'));   // 1番目に選んだ子を先頭に
  buildSide('opp',  orderedIds('opp'));
  S.battleLog.length = 0;
  logPos = 0; gameOver = false;
  turnNo = 1; updateTurnBadge(); clearLog(); clearMsg();
  document.body.classList.add('in-battle');
  $('setup').style.display = 'none';
  $('battle').style.display = 'flex';
  fitField();
  // 開始メッセージの名前はへんしん(かわりもの)前に確定させる(いけっ！はメタモンの名前で言う)
  const selfName0 = tPokeName(S.sides.self.poke.name), oppName0 = tPokeName(S.sides.opp.poke.name);
  // Init-A: バトル開始時の登場特性(いかく/天候/かわりもの=メタモンのへんしん等)を発動(実機準拠)。
  // 交代・死に出しはエンジンのattemptSwitch内で発動済み=開始時だけここで呼ぶ
  if (S.phaseInitA) S.phaseInitA();
  const initLines = S.battleLog.filter(e => !/^───/.test(e.msg)).flatMap(e => splitBattleLines(e.msg).map(lineWithFx));
  logPos = S.battleLog.length;
  renderAll();   // renderAll内でrenderSideBarsも呼ばれる(へんしん済みのすがたで描画)
  labSwapped = false;   // ★バトルラボ: 新しいバトル開始時にswap状態を必ずリセット
  try { ghRenderAll(); } catch (e) {}   // ★バトルラボ: 神の手パネルも開戦時の状態で作り直す
  setWeatherFx(null);
  bgmStart();
  say([I18N.t('real_battle.battle_start_self','バトルスタート！ いけっ！ {n}！').replace('{n}', selfName0), I18N.t('real_battle.battle_start_opp','相手は {n} を くりだした！').replace('{n}', oppName0)].concat(initLines), () => showActionUI());
}

// ===== 描画 =====
// キャラ画像ソース設定(2026-07-05 阿部さん): 'original'=うちの落書きSVG / 'api'=PokeAPIスプライト
// APIモードは通常フォームのみ(メガ/特殊フォームは名前→フォームID対応が未整備なので自作SVG継続)
let spriteSrc = localStorage.getItem('rb_sprite_src') || 'home';   // 既定=公式3D(Pokémon HOME)。「かっこいい、これ使いましょう」(2026-07-06 阿部さん)。小さいアイコン類はドット絵のまま
function setSpriteSrc(v){
  spriteSrc = (v === 'api' || v === 'home') ? v : 'original';
  localStorage.setItem('rb_sprite_src', spriteSrc);
  ['sprite-src', 'sprite-src-setup'].forEach(id => { const el = $(id); if (el && el.value !== spriteSrc) el.value = spriteSrc; });
  const cr = $('sprite-credit'); if (cr) cr.style.display = spriteSrc !== 'original' ? 'inline' : 'none';
  if (document.body.classList.contains('in-battle')){ try { renderAll(); } catch(e) {} }
  // 選出画面のカプセル/詳細パネルのスプライトも追従
  try {
    selfIds().concat(oppIds()).forEach(id => { if (slotVal[id] && $(id)) $(id).innerHTML = slotCapsuleHtml(id); });
    if (typeof selectedSlot !== 'undefined') setSelectedSlot(selectedSlot);
  } catch(e) {}
}
// 小アイコン(HPボックス/控えバー/交代/選出)= 公式ドット絵優先・無ければ自作SVG
function apiIdOf(nm){
  if (typeof SPRITE_API_ID === 'undefined') return null;
  if (SPRITE_API_ID[nm]) return SPRITE_API_ID[nm];
  // Champions独自メガ(公式画像なし・自作SVGも未描画の38体)はベースの姿で代用
  if (nm && nm.startsWith('メガ')){
    const base = nm.replace(/^メガ/, '').replace(/[XY♂♀]$/, '');
    if (SPRITE_API_ID[base]) return SPRITE_API_ID[base];
  }
  return null;
}
function pokeIconSrc(nm){
  const apiId = apiIdOf(nm);
  return (spriteSrc !== 'original' && apiId) ? `images/poke/${apiId}.png` : `images/sim/${encodeURIComponent(nm)}.svg`;
}
// 持ち物アイコン(PokeAPI item sprites=name_enスラッグ化。無い物はonerrorで消えて文字だけ残る)
function itemIconHtml(it){
  if (!it) return '';
  // 汎用メガストーン(name_enなし)はキーストーン画像で代用(メガシンカの象徴)
  const slug = it.key === 'mega_stone_any' ? 'key-stone'
    : it.name_en ? it.name_en.toLowerCase().replace(/[.'’]/g, '').replace(/ /g, '-') : '';
  if (!slug) return '';
  return `<img class="item-ic" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${slug}.png" alt="" onerror="this.remove()">`;
}
// みがわり人形(自作SVG=ライセンスクリーン・本家の緑の人形を踏襲)。みがわり中はこれに差し替える(2026-07-06 阿部さん)
function substituteSpriteHtml(){
  return `<svg viewBox="0 0 120 150" style="height:132px;display:inline-block;filter:drop-shadow(0 4px 6px #0005)" xmlns="http://www.w3.org/2000/svg">

    <!-- 体 -->
    <ellipse cx="60" cy="82" rx="42" ry="46" fill="#9ec96a" stroke="#5f8f3a" stroke-width="3"/>
    <!-- お腹(白) -->
    <ellipse cx="60" cy="94" rx="24" ry="28" fill="#f4f6ea" stroke="#cdd6b4" stroke-width="2"/>
    <!-- 顔 -->
    <circle cx="46" cy="70" r="4.5" fill="#3a3a2a"/>
    <circle cx="74" cy="70" r="4.5" fill="#3a3a2a"/>

function spriteHtml(poke, st){
  const color = (S.typeColors()[poke.type1]) || '#3a4660';
  // 仮アイコンには「ポケモン名」を出す(タイプ名だと名前と紛らわしい=2026-06-12 阿部さん指摘)
  const short = poke.name.length > 6 ? poke.name.slice(0, 6) : poke.name;
  // ばけのかわが剥がれたミミッキュは「ばれたすがた」(首カクン絵/公式id 10143)で描く(2026-07-10 阿部さん)。
  // st.disguise は登場でtrue・剥がれてfalse(エンジン)。未定義(他ポケ)は===falseにならない
  const _BUSTED = { 'ミミッキュ': { ja: 'ばれたすがた', apiId: '10143' } };
  const _bust = (st && st.disguise === false && _BUSTED[poke.name]) ? _BUSTED[poke.name] : null;
  const enc = encodeURIComponent(_bust ? _bust.ja : poke.name);
  // APIモード: 対応表(sprite_api_ids.js=フォーム/メガ込み274体)にある名前はPokeAPI画像。
  // ローカルpoke画像→PokeAPI本家→自作SVG→サークルの順でフォールバック
  let _apiId = _bust ? _bust.apiId : apiIdOf(poke.name);
  // Champions独自メガ(メガマフォクシー等)は公式画像が存在しない(3Dもドットも)→自作SVGへ(2026-07-11 阿部さん)。
  // apiIdOfはメガ名→ベース種へフォールバックするため、メガなのに自身のIDが無い=独自メガと判定
  if (poke.mega && !_bust && typeof SPRITE_API_ID !== 'undefined' && !SPRITE_API_ID[poke.name]) _apiId = null;
  if (spriteSrc === 'home' && _apiId){
    const n = _apiId;
    return `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/home/${n}.png" alt="" style="display:none;height:150px" data-step="0"
        onload="this.style.display='inline';if(this.nextElementSibling)this.nextElementSibling.style.display='none'"
        onerror="if(this.dataset.step==='0'){this.dataset.step='1';this.style.imageRendering='pixelated';this.style.height='112px';this.src='images/poke/${n}.png';}else if(this.dataset.step==='1'){this.dataset.step='2';this.style.imageRendering='auto';this.src='images/sim/${enc}.svg';}else{this.remove();}">
      <span class="circ" style="background:${color};font-size:${short.length > 4 ? 11 : 13}px">${short}</span>`;
  }
  if (spriteSrc === 'api' && _apiId){
    const n = _apiId;
    return `<img src="images/poke/${n}.png" alt="" style="display:none;image-rendering:pixelated;height:112px" data-step="0"
        onload="this.style.display='inline';if(this.nextElementSibling)this.nextElementSibling.style.display='none'"
        onerror="if(this.dataset.step==='0'){this.dataset.step='1';this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${n}.png';}else if(this.dataset.step==='1'){this.dataset.step='2';this.style.imageRendering='auto';this.src='images/sim/${enc}.svg';}else{this.remove();}">
      <span class="circ" style="background:${color};font-size:${short.length > 4 ? 11 : 13}px">${short}</span>`;
  }
  // オリジナル: SVG(忠実トレース版)優先→PNGに切替→どちらも無ければタイプ色サークル
  return `<img src="images/sim/${enc}.svg" alt="" style="display:none"
      onload="this.style.display='inline';if(this.nextElementSibling)this.nextElementSibling.style.display='none'"
      onerror="if(!this.dataset.png){this.dataset.png=1;this.src='images/sim/${enc}.png';}else{this.remove();}">
    <span class="circ" style="background:${color};font-size:${short.length > 4 ? 11 : 13}px">${short}</span>`;
}

// S3: leftbar/rightbar 描画。場に出ている個体=.active / ひんし=.dead
function renderSideBars(){

    // CH: ボールマークは実機準拠=選出した数だけ(空スロットは出さない)。

    let html = '';

      // 手持ちアイコンはへんしん中も元のすがた(実機準拠: 手持ち画面はメタモンのまま)

      const enc = encodeURIComponent(nm);
      const dead = e.fainted || (e.currentHp != null && e.currentHp <= 0);
      // 場に出ている=先頭(i===0)かつひんし未
      const active = (i === 0 && !dead);
      const cls = ['sicon', dead ? 'dead' : '', active ? 'active' : ''].filter(Boolean).join(' ');
      const max = S.realStat(e, 'hp') || 1;
      const hp  = e.currentHp == null ? max : Math.max(0, e.currentHp);
      const pct = Math.round(hp / max * 100);
      const label = `${tPokeName(nm)} (${pct}%)`;
      html += `<div class="${cls}" title="${label}" aria-label="${label}">` +
              `<img src="${pokeIconSrc(nm)}" alt="${tPokeName(nm)}" loading="lazy" onerror="this.parentElement.classList.add('noimg');this.remove()">` +

    // トレーナー名はi18nキーから

function setHpBar(side, hp, max){
  const pb = $('pb-' + side);
  const pct = Math.max(0, Math.min(100, hp / max * 100));
  // CH: ダメージ反映=statbarを戻す(メッセージ中の全消しから復帰して減るバーを見せる=実機の流れ)
  $('field').classList.remove('ch-busy');
  // 2層HPバー(Showdown版の演出を踏襲): prevhp=残像(遅れて縮む) / hp=現在(即時)
  // CH: パネル幅が可変(PC210/スマホ170)になったため px指定→%指定に変更
  const newW = pct.toFixed(1) + '%';
  const hpEl = pb.querySelector('.hp');
  const prevEl = pb.querySelector('.prevhp');
  if (hpEl && prevEl) {
    const oldW = prevEl.style.width || '100%';
    // prevhpを旧幅に固定(アニメ開始点)
    prevEl.style.transition = 'none';
    prevEl.style.width = oldW;
    requestAnimationFrame(() => {
      hpEl.style.width = newW;
      hpEl.className = 'hp' + (pct <= 25 ? ' low' : pct <= 50 ? ' mid' : '');
      requestAnimationFrame(() => {
        prevEl.style.transition = ''; // CSSに戻す(1.2s ease-out)
        prevEl.style.width = newW;
      });
    });
  }
  // CH: 実機準拠のHP表示=自分は数値(171/171)・相手は%のみ(ゲームと同じ=2026-07-04 阿部さん)
  // 実数値はdata属性に保持(後から切替可能)
  const t = pb.querySelector('.hptext');
  if (t) {
    if (side === 'self'){
      t.innerHTML = `${Math.round(hp)}<small>/${Math.round(max)}</small>`;
    } else {
      // 生きている限り0%と表示しない(実機の最低1%表示)
      const pd = hp > 0 ? Math.max(1, Math.round(pct)) : 0;
      t.innerHTML = `${pd}<small>%</small>`;
    }
    t.dataset.hp = hp;
    t.dataset.max = max;
  }
}

// ===== メッセージ送り =====
let sayQueue = [], sayDone = null, autoTimer = null;
function say(lines, done){
  sayQueue = lines.slice();
  sayDone = done || null;
  busy = true;
  showCmd(false);
  $('msgbox').style.display = 'block';   // CH: メッセージ再生中だけ出す(実機準拠。残留するとボタンを塞ぐ)
  nextSay();
}
function nextSay(){
  if (autoTimer){ clearTimeout(autoTimer); autoTimer = null; }
  if (!sayQueue.length){
    busy = false;
    $('msgbox').querySelector('.next').style.display = 'none';
    $('msgbox').style.display = 'none';        // CH: メッセージ退場(コマンドUIに舞台を返す)
    $('field').classList.remove('ch-busy');    // CH: メッセージ完了=UIを戻す
    if (sayDone){ const d = sayDone; sayDone = null; d(); }
    return;
  }
  const line = sayQueue.shift();
  const box = $('msgbox');
  const txt = line.text != null ? line.text : line;
  // CH: 行ごとにいったん全UIを消す(実機の「メッセージ中はUI退場」)。
  // ダメージ/状態反映を含む行は fx内のsetHpBarがすぐ戻す=「演出→バーが出て減る」の実機の流れ
  $('field').classList.add('ch-busy');
  pushMsgLine(txt);   // 下部メッセージ欄(6行・直近が薄く残る)
  if (!line.noLog) logLine(txt, undefined, line.src != null ? line.src : txt);   // ログはJA原文で保存=言語切替で再翻訳できる
  if (line.fx) line.fx();
  // こうか(ばつぐん/いまひとつ/なし)・急所はダメージ行と同じ拍に重ねる。
  // 別拍だと「2回当たった」ように見える(2026-07-06 阿部さん「1発で効果抜群とかそれだけでいい」)
  if (line.src && /ダメージ！/.test(line.src)){
    const _EFF_JA = ['こうかは ばつぐんだ！', 'こうかは いまひとつのようだ…', 'こうかは こうかなし…', 'きゅうしょに あたった！'];
    while (sayQueue.length){
      const nx = sayQueue[0];
      if (!nx || !nx.src || !_EFF_JA.includes(nx.src)) break;
      sayQueue.shift();
      pushMsgLine(nx.text);
      if (!nx.noLog) logLine(nx.text, undefined, nx.src != null ? nx.src : nx.text);
      if (nx.fx) nx.fx();
    }
  }
  box.querySelector('.next').style.display = 'none';   // ▼表記廃止(盤面クリック/自動送りは従来どおり)
  if ($('auto-msg').checked){
    // Wave3/4: メガシンカ演出(_megaFxDelay)・KOスロー演出(_koFxDelay)・交代の引っ込め演出(_recallFxDelay)は
    // msg-speedより長ければそちらを優先=専用ホールド(次行を待たせる。送り速度:はやいでも退場が完全に終わってから登場させる)
    // 予告(preattack)行はline.holdで送り速度を上書き=技が出るまでの間を短縮(2026-07-13)
    const _hold = (line.hold != null) ? line.hold
      : Math.max(+$('msg-speed').value, _megaFxDelay || 0, _koFxDelay || 0, _recallFxDelay || 0);
    _megaFxDelay = 0;
    _koFxDelay = 0;
    _recallFxDelay = 0;
    autoTimer = setTimeout(nextSay, _hold);
  }
}

function showMoves(){
  updateLabTurnIndicator();   // ★バトルラボ
  const st = S.sides.self;
  const tc = S.typeColors();
  $('cmd').style.display = 'none';
  $('party').style.display = 'none';        // 相互排他(重なるとクリックが食われて固まる=2026-07-06)
  $('watch-panel').style.display = 'none';
  $('weak-panel').style.display = 'none';
  const mv = $('moves');
  mv.style.display = 'flex';   // CH: 縦カプセルリスト
  const ppOf = i => (st.pp ? st.pp[i] : null);
  const lockName = st.choiceLock ? st.choiceLock.name : null;   // こだわりロック(段135)
  const allOut = st.pp && st.moves.every((m, i) => !m || st.pp[i] <= 0);
  // CH: 相性ヒント(実機の★/◎/△/✕帯)。エンジンのcalcDamageで判定=DB同様に特性込み
  // (ちょすい/ふゆう等の無効も✕になる=2026-07-05 阿部さん「DBの特性×0をそのままバトルで」)。
  // calcDamageが使えない場合は素の相性表(typeEffPreview)にフォールバック
  const oppTypes = (S.sideTypes && S.sides.opp && S.sides.opp.poke) ? S.sideTypes(S.sides.opp) : [];
  const effBand = m => {
    if (!m || m.category === '変化') return '';
    let eff = 1, immune = false;
    try {
      const r = S.calcDamage('self', 'opp', m);
      // ばけのかわ(disguiseBlock)は「タイプ相性のこうかなし」ではない(技は当たって皮が剥がれる)
      // →素のタイプ相性で帯を出す(2026-07-10 阿部さん発見・ポケモンWiki準拠)
      if (r && r.immune && r.disguiseBlock){
        const e2 = S.typeEffPreview ? S.typeEffPreview(m.type, oppTypes) : 1;
        eff = e2; immune = (e2 === 0);
      }
      else if (r && r.immune){ immune = true; }
      else if (r && r.chips){
        const c = r.chips.find(c => c.kind === 'eff-up' || c.kind === 'eff-down');
        eff = c ? c.factor : 1;
      }
    } catch(e){
      eff = S.typeEffPreview ? S.typeEffPreview(m.type, oppTypes) : 1;
      immune = eff === 0;
    }

        const disabledMove = st.disable && st.disable.name === m.name;   // かなしばり中の技は選べない(実機準拠)

        const locked = lockName && m.name !== lockName;
        // PP残少(2以下): pp-low クラスで強調

        const stab = m.category !== '変化' && (S.sideTypes ? S.sideTypes(st) : [st.poke.type1, st.poke.type2].filter(Boolean)).includes(m.type)

  // 技の説明ON: ホバーした技の「左横」にフロート(威力/命中/分類/優先度+説明文を集約=2026-07-06 阿部さん)
  if (detailOn){

    e.stopPropagation();

    if (b.classList.contains('weak-open')){ toggleWeaknessPanel(b); return; }   // 相手へのタイプ相性(B1)

}

  RB_PIVOT.trueSide = labSwapped ? 'opp' : 'self';

function swBattleCapsuleHtml(entry, opts){

    ? `<span class="cap-tag dead">${I18N.t('real_battle.party_fainted', 'ひんし')} ✕</span>`

  const disabled = opts.active || dead;
  const cls = ['slot', opts.active ? 'active' : '', dead ? 'dead' : '', selected ? 'selected' : ''].filter(Boolean).join(' ');
  return `<button type="button" class="${cls}" ${opts.active ? '' : `data-i="${opts.idx}"`} ${disabled ? 'disabled' : ''}>` +

function swOppHtml(){

    const baseOf = e => normNm((e.transformBase ? e.transformBase.poke : e.poke).name);
    const team = [opp].concat(opp.bench || []).filter(e => e && e.poke);

function wireSwEvents(){
  const pt = $('party');
  pt.querySelectorAll('.sw-mine .slot[data-i]').forEach(b => {
    if (b.disabled) return;
    b.addEventListener('click', () => {
      SE.select();
      swSelected = +b.dataset.i;

    });
  });
  const yes = pt.querySelector('.sw-confirm .sw-yes');

  // doSwitchTo→say()で新しいメッセージ列を出した直後に #field の click(advanceMsg)へバブルし、
  // 「交代する」を押した同じクリックで1コマ目(引っ込め=recall行)を即座に送ってしまう(_recallFxDelayの
  // ホールドが効く前に advanceMsg→nextSay が先に走る)＝退場が一瞬でポップするバグの実バグ源。
  if (yes) yes.addEventListener('click', e => {

    doSwitchTo(swSelected);
  });

  const go = pt.querySelector('.sw-confirm .sw-go');

  const hold = pt.querySelector('.sw-confirm .sw-hold');
  if (hold) hold.addEventListener('click', e => { e.stopPropagation(); SE.select(); doSwitchToFree(swSelected); });
  const no = pt.querySelector('.sw-confirm .sw-no');
  if (no) no.addEventListener('click', () => { SE.select(); swSelected = null; renderPartyScreen(); });
  const back = pt.querySelector('.sw-back');
  if (back) back.addEventListener('click', () => { SE.select(); swPivot = false; RB_PIVOT.pendingMoveIdx = null; showMoves(); });
}

// 「交代する」の実処理: 旧showPartyのボタンclickハンドラと同じ経路を厳密に踏襲(data-iに相当するidxを引数化しただけ)
// ★バトルラボ: 死に出し(swForced)は自分/相手どちらの死に出しもここを通る。labRunForcedQueue()が
// labSwapSides()で「いま死に出し中の側」を一時的にselfへ入れ替えてこの画面を出すので、実際にエンジンへ
// 反映する直前で真の対応関係へ戻し(=labSwapped解除)、物理DOM(#f-self/#f-opp等)も正しい側を触る。
function doSwitchTo(idx){
  if (idx == null) return;
  const pt = $('party');
  if (swForced){
    // ★オンライン: 選択を相手へ送り、両者の選択が揃ってから決められた順で適用(ロックステップ)
    if (window.RB_ONLINE && RB_ONLINE.started && RB_ONLINE.pendingRep){
      pt.style.display = 'none';
      const _seed = (Math.random() * 0x7fffffff) | 0;
      RB_ONLINE.pendingRep.selfIdx = idx;
      RB_ONLINE.pendingRep.selfSeed = _seed;
      RBOnline.sendFaintReplace(idx, _seed);
      onlineTryApplyReplaces();
      return;
    }
    // 死に出し: その場で交代を実行してログを再生(ターン消費なし=実機どおり)
    const wasSwapped = labSwapped;
    if (wasSwapped) labSwapSides();   // 相手側の死に出し中なら、ここで真の対応関係に戻す
    const side = wasSwapped ? 'opp' : 'self';
    pt.style.display = 'none';
    logPos = S.battleLog.length;
    S.attemptSwitch(side, idx, {ignoreTrapping: true, faintReplace: true});
    // 新しい子は登場拍(いけっ！の声)まで隠す=前触れなくポンと出るのを防ぐ(2026-07-06 阿部さん)
    const ff = $('f-' + side); if (ff){ ff.classList.remove('recall', 'enter'); ff.classList.add('gone'); }
    const pbX = $('pb-' + side); if (pbX) pbX.style.visibility = 'hidden';
    renderAll();   // 隠れたまま新しい子のスプライトを組む(表示は登場拍のenter fxが行う)
    try { ghRenderAll(); } catch (e) {}
    const fresh = reorderEndure(S.battleLog.slice(logPos).filter(e => !/^───/.test(e.msg)));
    say(fresh.flatMap(e => splitBattleLines(e.msg).map(lineWithFx)), () => labRunForcedQueue());
    return;
  }
  S.sides.self.switchChoice = idx;
  doTurn(null);   // 交代をこのターンの行動に(⏩=ターンも進める。doTurnが相手側にバトンタッチ/実行する)
}
// ★バトルラボ: ⏸「このまま(ターン消費なし)」=即座に交代を反映するが、ターンの行動としては消費しない。
// いま選んでいるのが相手側(labSwapped中)なら、真の対応関係に戻してから反映し、終わったら選ばせている側の
// 続き(そのままもう一度アクション選択)へ戻すため再度入れ替える。
function doSwitchToFree(idx){
  if (idx == null) return;
  $('party').style.display = 'none';
  const wasSwapped = labSwapped;
  if (wasSwapped) labSwapSides();
  const side = wasSwapped ? 'opp' : 'self';
  logPos = S.battleLog.length;
  S.attemptSwitch(side, idx, {ignoreTrapping: true});
  renderAll();
  try { ghRenderAll(); } catch (e) {}
  const fresh = reorderEndure(S.battleLog.slice(logPos).filter(e => !/^───/.test(e.msg)));
  say(fresh.flatMap(e => splitBattleLines(e.msg).map(lineWithFx)), () => {
    if (wasSwapped) labSwapSides();   // 相手側の選択を続けさせるため、再度入れ替えて戻す
    showActionUI();
  });
}

// 弱点パネル(2026-07-08 B1): 相手の場のポケモンに対する18タイプ相性を
// こうかばつぐん / いまひとつ / こうかなし の3区分で表示。toggleWatchPanel を踏襲(位置・zoom補正・クリックで閉じる)。
// 倍率は calcDamage('self','opp',ダミー技) の immune/eff-up/eff-down で「特性込み」を優先し、
// 例外/非反応時は typeEffPreview(素相性)にフォールバック(ベストエフォート・spec§2準拠)。
function toggleWeaknessPanel(btn){
  const w = $('weak-panel');
  if (w.style.display === 'block'){ w.style.display = 'none'; return; }
  $('watch-panel').style.display = 'none';   // 様子を見るパネルとは排他(同じ位置に出す)
  // 左上の非常口ボタン(btn-exit)の真下に出す(zoom補正あり・toggleWatchPanelと同じ位置計算)
  const fr = $('field').getBoundingClientRect();
  const ratio = fr.height / 360;
  const ex = $('btn-exit');
  const topPx = ex ? Math.round((ex.getBoundingClientRect().bottom - fr.top) / ratio) + 8 : 52;
  w.style.top = topPx + 'px'; w.style.bottom = 'auto'; w.style.left = '14px'; w.style.right = 'auto';

  const opp = S.sides.opp;
  // 相手の実効タイプ(sideTypes優先・無ければポケモン素タイプ)
  const defTypes = (S.sideTypes && opp && opp.poke) ? S.sideTypes(opp)
    : (opp && opp.poke ? [opp.poke.type1, opp.poke.type2].filter(Boolean) : []);
  const tc = (S.typeColors && S.typeColors()) || (typeof TYPE_COLORS !== 'undefined' ? TYPE_COLORS : {});
  const TYPES18 = (typeof TYPES !== 'undefined') ? TYPES : [];

  // 相手が場にいない/入替中=無害に(空メッセージ)
  if (!opp || !opp.poke || !defTypes.length){
    w.innerHTML = `<div class="wp-row">${I18N.t('real_battle.weakness_empty','あいては いないようだ')}</div>`;
    w.style.display = 'block';
    w.onclick = () => { w.style.display = 'none'; };
    return;
  }

  // 18タイプそれぞれについて相手への倍率を計算(特性込み優先→素相性フォールバック)
  const buckets = { super: [], weak: [], none: [] };
  TYPES18.forEach(atkType => {
    let eff = 1, immune = false;
    try {
      const dummy = { name: '__weakness', type: atkType, category: '物理', power: 40 };
      const r = S.calcDamage ? S.calcDamage('self', 'opp', dummy) : null;
      if (r && r.immune && r.disguiseBlock){   // ばけのかわ=タイプ無効ではない→素の相性で表示(2026-07-10)
        eff = S.typeEffPreview ? S.typeEffPreview(atkType, defTypes) : 1; immune = (eff === 0);
      }
      else if (r && r.immune){ immune = true; }
      else if (r && Array.isArray(r.chips)){
        const c = r.chips.find(c => c.kind === 'eff-up' || c.kind === 'eff-down');
        if (c) eff = c.factor;
        else { eff = S.typeEffPreview ? S.typeEffPreview(atkType, defTypes) : 1; if (eff === 0) immune = true; }
      } else {
        eff = S.typeEffPreview ? S.typeEffPreview(atkType, defTypes) : 1; if (eff === 0) immune = true;
      }
    } catch(e){
      eff = S.typeEffPreview ? S.typeEffPreview(atkType, defTypes) : 1; immune = eff === 0;
    }
    const mult = immune ? 0 : eff;
    const col = tc[atkType] || '#3a4660';
    const badge = `<span class="wp-t" style="background:${col}">${tTypeName(atkType)}</span>`;
    if (mult === 0){
      buckets.none.push(badge);
    } else if (mult > 1){
      const m = mult >= 4 ? I18N.t('real_battle.weakness_4x','4倍') : `×${mult}`;
      buckets.super.push(`${badge}<span class="wp-m">${m}</span>`);
    } else if (mult < 1){
      const m = mult <= 0.25 ? I18N.t('real_battle.weakness_quarter','1/4') : `×${mult}`;
      buckets.weak.push(`${badge}<span class="wp-m">${m}</span>`);
    }   // ×1(等倍)は省略
  });

  const section = (title, arr) => arr.length
    ? `<div class="wp-row"><b>${title}</b><div class="wp-types">${arr.join('')}</div></div>` : '';
  w.innerHTML =
    section(I18N.t('real_battle.weakness_title_super','こうかばつぐん'), buckets.super) +
    section(I18N.t('real_battle.weakness_title_weak','いまひとつ'), buckets.weak) +
    section(I18N.t('real_battle.weakness_title_none','こうかなし'), buckets.none);
  w.style.display = 'block';
  w.onclick = () => { w.style.display = 'none'; };
}

// ===== ★バトルラボ: 両側手動(AIなし)ターン実行→ログを1行ずつ実機テンポで再生 =====
// 方式(設計§4): S.sides.self / S.sides.opp の「参照そのものを入れ替える」ことで、

// 「いま選んでいる側」に使い回す。labSwappedはこの入れ替えが現在有効かどうかのフラグ。
let labSwapped = false;
function labSwapSides(){ const t = S.sides.self; S.sides.self = S.sides.opp; S.sides.opp = t; labSwapped = !labSwapped; }
// ★バトルラボ: 「いま誰が選んでいるか」の目印を更新(labSwapped=true→物理的には相手側が選んでいる)

function doTurn(moveIdx){
  if (busy || gameOver) return;
  if (S.sides.self.fainted) return;   // 死に出しの選択待ち中はターンを進めない
  // 行動が決まったらまずメニューをパッと消す(2026-07-06 阿部さん)
  ['cmd', 'moves', 'party', 'watch-panel', 'weak-panel', 'mv-tip'].forEach(id => { $(id).style.display = 'none'; });
  if (moveIdx != null) S.sides.self.selectedMoveIdx = moveIdx;

    // 自分側の行動が決まった→相手側にバトンタッチ(入れ替えて同じUIで相手の行動を選ばせる)
    labSwapSides();
    showActionUI();

  }
  // 相手側の行動も決まった→元の対応関係に戻してからターンを実行
  labSwapSides();

// 1ターンを実行して差分ログを再生する本体(オフライン=doTurnから直接/オンライン=両者の行動が揃ってから)
function executeTurn(){
  // 演出用HPスナップショット: 交代で出た瞬間のバーは「攻撃前のHP」を出す
  // (renderAllはエンジン最終状態=被弾後を入れてしまい、登場した瞬間に減って見えていた=2026-07-06 阿部さん)
  window._hpSnap = {};
  // 表示個体スナップ: エンジンは1ターン分を先に計算し終えるので、renderAllが最終状態(交代後の子)を
  // 先に描いてしまう(=ひんし前にstatbarの名前が次の子になる)。登場拍(enter fx)までは旧個体を表示し続ける
  window._idSnap = {self: S.sides.self && S.sides.self.poke, opp: S.sides.opp && S.sides.opp.poke};
  // ばけのかわ表示スナップ: エンジンは剥がれ済みでも、絵は「はがれた」の拍まで皮のまま(2026-07-10 阿部さん)
  window._dgSnap = {self: S.sides.self && S.sides.self.disguise, opp: S.sides.opp && S.sides.opp.disguise};
  ['self', 'opp'].forEach(sd => {
    const st0 = S.sides[sd]; const m = {};
    [st0].concat(st0.bench || []).forEach(e => {
      if (e && e.poke){ const mx = S.realStat(e, 'hp') || 1; m[e.poke.name] = e.currentHp == null ? mx : Math.max(0, e.currentHp); }
    });
    _hpSnap[sd] = m;
  });
  logPos = S.battleLog.length;
  S.runTurn();
  const fresh = reorderEndure(S.battleLog.slice(logPos).filter(e => !/^───/.test(e.msg)));
  // CH: 攻撃行の前に「◯◯の こうげき！」を差し込み(2段表示=2026-07-05 阿部さん)。
  // 表示専用(noLog)でエンジンログ/右ログは汚さない。攻撃側はぴょんぴょん予告(preattack)
  const lines = [];
  for (let i = 0; i < fresh.length; i++){
    const e = fresh[i];
    const am = e.msg.match(/^((?:相手の )?)(\S+) の \S+！/);
    // ばけのかわブロック: 「◯◯の 技！」の直後に「…ばけのかわが はがれた！」が続く形で判別する
    // (かたやぶり等の入場宣言も同じ「◯◯の 特性名！」の裸行なので、次の行の内容で狙い撃ちする=2026-07-13 阿部さん報告)
    const nextIsDisguiseBreak = !!(fresh[i + 1] && /ばけのかわが はがれた！$/.test(fresh[i + 1].msg));
    // まもる系ブロック: 同じ形(「◯◯の 技！」の直後に「…こうげきを 防いだ！」)。技告知を消さず、
    // 予告+攻撃演出を出してから防がれる流れを見せる(2026-07-16 阿部さんFB=心理戦の情報が消えていた)
    const nextIsProtectBlock = !!(fresh[i + 1] && /こうげきを 防いだ！$/.test(fresh[i + 1].msg));
    const nextIsBlockAnnounce = nextIsDisguiseBreak || nextIsProtectBlock;
    if (am && (/ダメージ！/.test(e.msg) || nextIsBlockAnnounce)){
      const introJa = `${am[1]}${am[2]} の こうげき！`;
      const introSide = am[1] ? 'opp' : 'self';
      // 予告のぴょんぴょん(.7s)+一拍だけ待って技を出す(送り速度=ふつうの約2.9秒だと予告後に間が空きすぎる=2026-07-13)
      lines.push({ text: (window.translateLogLine ? translateLogLine(introJa) : introJa),
        fx: () => flash(introSide, 'preattack'), noLog: true, hold: 850 });
    }
    // ★2026-07-16連続技演出: エンジンのlog entry(e)が持つmultiHit/hitIndex/hitCountをそのままoptsへ渡す
    // (real_battle_simulator.htmlのphaseDealDamageが各ヒット行に載せたメタ)。表示側はこれを見て
    // 速い連打演出(圧縮ストライク)に切替える。省略時=undefined=従来の単発演出のまま(不変)。
    splitBattleLines(e.msg).forEach(t => lines.push(lineWithFx(t, {
      forceAttackFx: nextIsBlockAnnounce, multiHit: e.multiHit, hitIndex: e.hitIndex, hitCount: e.hitCount,
    })));
  }
  logTurnHeader(turnNo);   // 右ログに「Turn N」見出し
  say(lines, endOfTurn);
}

// ===== ★バトルラボ 神の手パネル(設計§3-4): 天候/フィールド(共通)+両側のHP%/状態異常/ランクを直接操作 =====
// simの既存フラグ(S.env.weather/field, entry.currentHp/status/rank)をそのまま書き換え、renderAll()で
// 盤面へ即反映する(real_battle_simulator.htmlの管理パネルattachEnvPanel等と同じ「直接書き換え→再描画」作法)。
const GH_STATUS = [['none','battle_lab.status_none','なし'],['paralysis','common.status_paralysis','まひ'],
  ['burn','common.status_burn','やけど'],['poison','common.status_poison','どく'],
  ['badpoison','common.status_toxic','もうどく'],['sleep','common.status_sleep','ねむり'],
  ['freeze','common.status_freeze','こおり']];
const GH_RANK_KEYS = ['atk','def','spatk','spdef','spd','acc','eva'];
const GH_RANK_LETTER = {atk:'A', def:'B', spatk:'C', spdef:'D', spd:'S', acc:'ACC', eva:'EVA'};
function ghEntries(side){
  const st = S.sides[side];
  if (!st || !st.poke) return [];
  return [{entry: st, idx: null, active: true}]
    .concat((st.bench || []).map((e, i) => ({entry: e, idx: i, active: false})).filter(x => x.entry && x.entry.poke));
}
function ghRowHtml(row){
  const e = row.entry;
  const max = S.realStat(e, 'hp') || 1;
  const hp = e.currentHp == null ? max : Math.max(0, e.currentHp);
  const pct = e.fainted ? 0 : Math.round(hp / max * 100);
  const rankHtml = row.active ? GH_RANK_KEYS.map(k =>
    `<span class="gh-rank" data-rk="${k}"><b>${GH_RANK_LETTER[k]}</b>` +
    `<button type="button" data-rk="${k}" data-d="-1">−</button>` +
    `<span class="gh-rv">${(e.rank && e.rank[k]) || 0}</span>` +
    `<button type="button" data-rk="${k}" data-d="1">＋</button></span>`).join('') : '';
  return `<div class="gh-row" data-idx="${row.idx == null ? '' : row.idx}">` +
    `<span class="gh-nm">${tPokeName((e.illusionAs || e.poke).name)}${row.active ? ' ★' : ''}</span>` +
    `<input type="range" class="gh-hp" min="0" max="100" value="${pct}">` +
    `<span class="gh-hpv">${pct}%</span>` +
    `<select class="gh-st">${GH_STATUS.map(([k, key, ja]) => `<option value="${k}"${e.status === k ? ' selected' : ''}>${I18N.t(key, ja)}</option>`).join('')}</select>` +
    `<span class="gh-ranks">${rankHtml}</span></div>`;
}
function ghRenderSide(side){
  const box = document.querySelector('#gh-' + side + ' .gh-list');
  if (!box) return;
  const rows = ghEntries(side);
  box.innerHTML = rows.length ? rows.map(ghRowHtml).join('') : `<div class="gh-empty">—</div>`;
  box.querySelectorAll('.gh-row').forEach(rowEl => {
    const idxAttr = rowEl.dataset.idx;
    const getEntry = () => { const st = S.sides[side]; return idxAttr === '' ? st : (st.bench || [])[+idxAttr]; };
    const hpEl = rowEl.querySelector('.gh-hp');
    hpEl.addEventListener('input', () => {
      const e = getEntry(); if (!e || !e.poke) return;
      const max = S.realStat(e, 'hp') || 1;
      const pct = +hpEl.value;
      e.currentHp = Math.max(0, Math.min(max, Math.round(max * pct / 100)));
      e.fainted = e.currentHp <= 0;
      rowEl.querySelector('.gh-hpv').textContent = pct + '%';
      renderAll();   // 盤面のHPバーへ即反映(神の手パネル自体は再構築しない=スライダー操作中の自壊を防ぐ)
    });
    rowEl.querySelector('.gh-st').addEventListener('change', e2 => {
      const e = getEntry(); if (!e || !e.poke) return;
      e.status = e2.target.value;
      if (e.status === 'sleep') e.sleepTurns = null;
      if (e.status === 'badpoison') e.toxicCounter = 1;
      renderAll();
    });
    rowEl.querySelectorAll('.gh-rank button').forEach(b => {
      b.addEventListener('click', () => {
        const e = getEntry(); if (!e || !e.poke) return;
        if (!e.rank) e.rank = {atk:0,def:0,spatk:0,spdef:0,spd:0,acc:0,eva:0};
        const k = b.dataset.rk, d = +b.dataset.d;
        e.rank[k] = Math.max(-6, Math.min(6, (e.rank[k] || 0) + d));
        rowEl.querySelector(`.gh-rank[data-rk="${k}"] .gh-rv`).textContent = e.rank[k];
        renderAll();
      });
    });
  });
}
// ★呼び出しどころ限定: renderAll()自体には組み込まない(HPスライダーのinput中にrenderAll→ghRenderAll経由で
// 自分自身のDOMを再構築すると、ドラッグ中のinput要素が消えて操作が壊れるため)。ターン確定/交代確定/開始時など

// ===== サウンド(Web Audio合成・ファミコン風 — ファイル不要・全部自作波形=権利フリー) =====
// 2026-06-12 阿部さん「音とBGM入れたらそれっぽくなる」。autoplay制限があるので初回クリックで解錠。
let AC = null, sndOn = localStorage.getItem('rb_snd') !== 'off';
let bgmTimer = null, bgmStep = 0, masterBgm = null;
let masterVol = null, sndVol = Math.min(1, Math.max(0, parseFloat(localStorage.getItem('rb_vol') || '0.7')));
function dest(){   // 全SE/BGMの出口(音量スライダーが効くマスターゲイン)
  const ctx = ac();
  if (!masterVol){
    masterVol = ctx.createGain(); masterVol.gain.value = sndVol;
    // Wave4 B級: SEマスターコンプ(全SE/BGM共通の最終段に1個・threshold-18dB/ratio6。音量感を均して「前に出る」音に)
    let out = ctx.destination;
    try {
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.setValueAtTime(-18, ctx.currentTime);
      comp.ratio.setValueAtTime(6, ctx.currentTime);
      comp.knee.setValueAtTime(6, ctx.currentTime);
      comp.attack.setValueAtTime(0.003, ctx.currentTime);
      comp.release.setValueAtTime(0.25, ctx.currentTime);
      comp.connect(ctx.destination);
      out = comp;
    } catch (e) { /* DynamicsCompressorNode非対応環境は直結にフォールバック */ }
    masterVol.connect(out);
  }
  return masterVol;
}
function ac(){
  if (!AC){ AC = new (window.AudioContext || window.webkitAudioContext)(); }
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
// 単音(波形・周波数・長さ・音量・ピッチスライド先)
function tone(type, freq, dur, vol, slideTo, when){
  if (!sndOn) return;
  const ctx = ac(), t = when != null ? when : ctx.currentTime;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(dest());
  o.start(t); o.stop(t + dur + 0.02);
}
// ノイズ(打撃用)
function noise(dur, vol, lowpass){
  if (!sndOn) return;
  const ctx = ac(), t = ctx.currentTime;
  const len = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain(); g.gain.value = vol;
  const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lowpass || 1200;
  src.connect(f); f.connect(g); g.connect(dest()); src.start(t);
}
// ノイズ+lowpassスイープ(メガシンカ等のロング音の「うねり」用。Wave3・2026-07-10)
function noiseSweep(dur, vol, fromHz, toHz){
  if (!sndOn) return;
  const ctx = ac(), t = ctx.currentTime;
  const len = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain(); g.gain.value = vol;
  const f = ctx.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(fromHz, t);
  f.frequency.linearRampToValueAtTime(toHz, t + dur);
  src.connect(f); f.connect(g); g.connect(dest()); src.start(t);
}
// 爆発/大技音(白ノイズ+lowpassスイープ+サブベース。大技・KO限定。Wave4 B級・2026-07-10)
function explosionFx(){
  if (!sndOn) return;
  const ctx = ac(), t = ctx.currentTime, dur = 0.6;
  const len = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const f = ctx.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(3000, t);
  f.frequency.exponentialRampToValueAtTime(100, t + 0.4);
  const g = ctx.createGain();
  g.gain.setValueAtTime(1, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  src.connect(f); f.connect(g); g.connect(dest()); src.start(t);
  const o = ctx.createOscillator(), og = ctx.createGain();   // サブベース(小型スピーカ対策の薄い低音)
  o.type = 'sine';
  o.frequency.setValueAtTime(60, t);
  o.frequency.exponentialRampToValueAtTime(30, t + 0.5);
  og.gain.setValueAtTime(0.15, t);   // 低音強すぎFB(2026-07-11 阿部さん)→0.35から半分以下に
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
  o.connect(og); og.connect(dest()); o.start(t); o.stop(t + 0.55);
}
// 効果音いろいろ

    noiseSweep(1.2, 0.16, 200, 2200); },   // Wave3: ロングスウェル(儀式演出の全長にわたるうねり)

  miss(){ tone('sine', 340, 0.09, 0.14, 140); noise(0.05, 0.1, 500); },   // スカッ(短く上品に)

// バトルBGM: 8bit風2小節ループ(Am)。スケジューラで16分音符を先読み再生
const BGM_BASS = [110, 0, 110, 0, 165, 0, 110, 0, 131, 0, 131, 0, 98, 0, 98, 123];           // A E C G…
const BGM_LEAD = [440, 0, 523, 587, 659, 0, 587, 523, 440, 0, 392, 440, 523, 440, 392, 330]; // 戦闘っぽい旋律
function bgmStart(){
  if (!sndOn || bgmTimer) return;
  const ctx = ac();
  masterBgm = ctx.createGain(); masterBgm.gain.value = 0.10; masterBgm.connect(dest());
  let next = ctx.currentTime + 0.05;
  const SPB = 0.13;   // 16分音符の長さ(≒115bpmの16ビート)
  bgmStep = 0;
  bgmTimer = setInterval(() => {
    if (!sndOn){ bgmStop(); return; }
    while (next < ctx.currentTime + 0.2){
      const i = bgmStep % 16;
      const b = BGM_BASS[i], l = BGM_LEAD[i];
      if (b){ const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'triangle'; o.frequency.value = b;
        g.gain.setValueAtTime(0.9, next); g.gain.exponentialRampToValueAtTime(0.001, next + SPB * 0.9);
        o.connect(g); g.connect(masterBgm); o.start(next); o.stop(next + SPB); }
      if (l){ const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'square'; o.frequency.value = l;
        g.gain.setValueAtTime(0.35, next); g.gain.exponentialRampToValueAtTime(0.001, next + SPB * 0.85);
        o.connect(g); g.connect(masterBgm); o.start(next); o.stop(next + SPB); }
      if (i % 4 === 0){ // ハイハット代わりのノイズチック
        const len = Math.floor(ctx.sampleRate * 0.03), buf = ctx.createBuffer(1, len, ctx.sampleRate);
        const d = buf.getChannelData(0); for (let k = 0; k < len; k++) d[k] = (Math.random() * 2 - 1) * (1 - k / len);
        const s = ctx.createBufferSource(); s.buffer = buf;
        const g = ctx.createGain(); g.gain.value = 0.12; s.connect(g); g.connect(masterBgm); s.start(next); }
      next += SPB; bgmStep++;
    }
  }, 40);
}
function bgmStop(){
  if (bgmTimer){ clearInterval(bgmTimer); bgmTimer = null; }
  if (masterBgm){ try { masterBgm.disconnect(); } catch (e) {} masterBgm = null; }
}
function updateSndBtn(){ const b = $('snd-toggle'); if (b) b.textContent = sndOn ? I18N.t('real_battle.snd_toggle_on','🔊 音オン') : I18N.t('real_battle.snd_toggle_off','🔇 音オフ'); }

// ===== ステージ演出v3のヘルパー =====
let lastTgt = null;   // 直前のダメージ対象(「こうかは…」「きゅうしょ」は直後の行で飛んでくる)
let _hitFxDelay = 0;  // Wave1: 直前の飛翔体の飛翔ms(こうか/きゅうしょ行のflash/soundを着弾と同じ拍に重ねる用)

  const in2 = (pre, nm) => pre ? `相手は ${nm} を くりだした！` : `いけっ！ ${nm}！`;
  if (m) return [out2(m[1], m[2]), in2(m[3], m[4])];
  const w = msg.match(/^(相手の )?(\S+) は 引っ込んだ！$/);
  if (w) return [out2(w[1], w[2])];

  if (g) return [in2(g[1], g[2])];

}

      // scene:recall(演出ツクールStep5・上書きオーバーレイ): シート無し=従来のrecallFxのまま(挙動不変)。
      const _rcSheet = resolveSceneSheet('recall');
      let _rcDur;
      if (_rcSheet) _rcDur = playSceneCueSheet(_rcSheet, { side }); else recallFx(side);
      // 退場(引っ込め)が完全に終わってから登場が始まるよう、最低1150ms(rbRecall 1s+一拍)は次行(登場)へ進ませない(2026-07-13)
      _recallFxDelay = Math.max(_rcDur || 0, 1150);
    }
    if (/が 場に出た！/.test(msg) || /^いけっ！ \S+！$/.test(msg) || /^相手は \S+ を くりだした！$/.test(msg)){
      // 死に出し行は「たおれた 相手の◯◯の代わりに…」で始まる=行頭判定(subjOpp)では側を誤る
      const enterSide = (/相手の \S+ が 場に出た/.test(msg) || msg.startsWith('相手は')) ? 'opp' : 'self';
      if (window._idSnap) _idSnap[enterSide] = null;   // 表示固定を解除(この拍から新しい子)
      clearTimeout(_recallTimer[enterSide]);   // 1拍目の遅延goneが登場後に発火して消すのを防ぐ
      const f = $('f-' + enterSide);
      f.classList.remove('gone', 'recall');
      const pbEl = $('pb-' + enterSide); if (pbEl) pbEl.style.visibility = '';
      renderAll();
      // 出た瞬間は「攻撃前のHP」を表示(この後のダメージ行fxが正しいタイミングで減らす)
      try {
        const stE = S.sides[enterSide];
        const max = S.realStat(stE, 'hp') || 1;
        const snap = window._hpSnap && _hpSnap[enterSide] && _hpSnap[enterSide][stE.poke.name];
        // スナップ(攻撃前HP)が無い死に出しは現在HPで(前の子の0%を引きずらない)
        const hp = (snap != null) ? snap : (stE.currentHp == null ? max : Math.max(0, stE.currentHp));
        setHpBar(enterSide, hp, max);
      } catch(e){}
      // scene:send_out(演出ツクールStep5・上書きオーバーレイ): done:trueの調整済みシートがあれば
      // playSceneCueSheetで再生、無ければ従来のsendOutFx(=flash('enter')+SE.enter())のまま(挙動不変)。
      const _soSheet = resolveSceneSheet('send_out');
      if (_soSheet) playSceneCueSheet(_soSheet, { side: enterSide }); else sendOutFx(enterSide);
    }
    if (/メガシンカした！/.test(msg)){
      const mgSide = subjOpp ? 'opp' : 'self';
      if (window._idSnap) _idSnap[mgSide] = S.sides[mgSide].poke;   // メガの姿はこの拍から表示
      // Wave3: 儀式演出(収束→シルエット→爆発・特例1.5-2.0s)。dur戻り値で次行のsay自動送りをホールドする
      // scene:mega_evolve(演出ツクールStep5・上書きオーバーレイ): シート無し=従来のmegaFxのまま(挙動不変)。
      const _meSheet = resolveSceneSheet('mega_evolve');
      const _mDur = _meSheet ? playSceneCueSheet(_meSheet, { side: mgSide }) : megaFx(mgSide);
      _megaFxDelay = _mDur;
      setTimeout(() => { renderAll(); flash(mgSide, 'enter'); }, 700);   // t=700: シルエットのうちにスプライト差し替え(変身の瞬間を見せない)
      SE.mega();
    }
    // Wave3: 壁パネル(リフレクター/ひかりのかべ/オーロラベール)の出し入れ。エンジン状態は読まずログ行だけで判定
    const wallUpM = msg.match(/^(相手の )?\S+ の場に (リフレクター|ひかりのかべ|オーロラベール) が 張られた！$/);
    if (wallUpM) showWallFx(wallUpM[1] ? 'opp' : 'self', wallUpM[2]);
    const wallDownM = msg.match(/^(相手の )?\S+ の場の (リフレクター|ひかりのかべ|オーロラベール) の効果が なくなった！$/);
    if (wallDownM) hideWallFx(wallDownM[1] ? 'opp' : 'self', wallDownM[2]);
    // 技で壊された場合の文言は常に「相手の場の…」表記(既存の他fx同様、subjOpp慣習=「相手の」接頭で側を読む)
    const wallBreakM = msg.match(/^相手の場の (リフレクター|ひかりのかべ|オーロラベール) が こわれて消えた！$/);
    if (wallBreakM) hideWallFx('opp', wallBreakM[1]);
    // バトルスイッチ(ギルガルド): フォルムチェンジでスプライト・能力表示を更新
    if (/フォルム チェンジ！/.test(msg)){
      const side = msg.includes('相手の') ? 'opp' : 'self';
      renderAll();
      flash(side, 'enter');
      SE.enter();
    }
    // イリュージョン解除(ゾロアーク): 正体バレで姿を戻す
    if (/イリュージョンが とけた！/.test(msg)){
      renderAll();
      flash(msg.includes('相手の') ? 'opp' : 'self', 'enter');
      SE.status();
    }
    // マイティチェンジ(イルカマン): ヒーロー初登場はメガ並みの演出で
    if (/変身して 帰ってきた！/.test(msg)){
      screenFlash('#7dd3fc', true);
      renderAll();
      flash(subjOpp ? 'opp' : 'self', 'enter');
      SE.mega();
    }
    if (/回復/.test(msg)){ renderAll(); if (hpM){ const hSide = subjOpp ? 'opp' : 'self'; popText(hSide, '＋', '#4ade80', 18); sparkleFx(hSide); SE.heal(); } }
  };
  // ★2026-07-16連続技演出: 連続技の各ヒット行はline.holdで送り速度を短く上書きし、パッパッと連打に見せる
  // (W3のpreattack予告と同じ機構=line.holdがsay()側の$('msg-speed')より優先される・2026-07-13で導入済み)。
  // 省略時(単発技)は従来どおり$('msg-speed')に従う(不変)。
  const _mhHold = opts.multiHit ? 420 : undefined;
  return { text: (window.translateLogLine ? translateLogLine(msg) : msg), fx, src: msg, hold: _mhHold };   // src=ja原文(演出合流の判定用)
}

// showResultBanner/hideResultBanner: fx_primitives.js へ移設(演出ツクール Step2b 2026-07-11)。定義はそちらを参照。
function endOfTurn(){
  renderAll();
  try { ghRenderAll(); } catch (e) {}
  const dead = side => {
    const st = S.sides[side];
    const all = [st].concat(st.bench || []);
    return all.every(e => !e || !e.poke || e.fainted || (e.currentHp != null && e.currentHp <= 0));
  };
  if (dead('opp') || dead('self')){
    gameOver = true;
    bgmStop();
    // ★相打ち(両者全滅)の勝敗規則(A.4 2026-07-11・権威=ポケモンWiki「ターン」「だいばくはつ」「みちづれ」。
    // 詳細=reference/_aizuchi_win_rule_2026-07-11.md。従来はdead('opp')だけ見て相打ち=常に勝ち扱いだった):
    // ・反動(フレアドライブ等)での相打ち=最後に技を出した側(攻撃側)の勝ち
    // ・自爆技(じばく/だいばくはつ/いのちがけ=effects kind「自分瀕死」)での相打ち=使った側の負け
    // ・みちづれ相打ちは「最後の技=倒した側の攻撃」なので攻撃側の勝ち=みちづれ使用側の負け(公式と同結果)
    // ロックステップでも決定的(両クライアントが同じエンジン状態から同じ判定になる)
    let won = dead('opp');
    if (dead('opp') && dead('self') && S.getLastMoveInfo){
      const lm = S.getLastMoveInfo();
      if (lm && lm.side && lm.move){
        const suicide = ((lm.move.battle_data && lm.move.battle_data.effects) || []).some(e => e.kind === '自分瀕死');
        won = suicide ? lm.side !== 'self' : lm.side === 'self';
      }
    }
    if (won){ SE.win(); winStreak++; } else { SE.lose(); winStreak = 0; }
    // scene:win/scene:lose(演出ツクールStep5・上書きオーバーレイ): シート無し=従来のshowResultBannerのまま(挙動不変)。
    const _wlSheet = resolveSceneSheet(won ? 'win' : 'lose');
    if (_wlSheet) playSceneCueSheet(_wlSheet, { won }); else showResultBanner(won);
    // 勝ちは案内文なし(WIN!バナー+つぎの相手ボタンで足りる=2026-07-06 阿部さん)。負けだけ操作案内。
    // JA正典で生成→lineWithFxで表示翻訳(ログはJA原文で保存され言語切替に追従)
    const winJa = `🎉 相手のポケモンは ぜんぶ たおれた！ きみの かち！(連勝: ${winStreak})`;
    say([lineWithFx(won ? winJa : '😵 自分のポケモンは ぜんぶ たおれた… まけてしまった…')]
        .concat(won ? [] : [lineWithFx('「にげる」から 編成にもどって もういちど あそべます')]),
        () => { showCmd(true);
          // 通常フローは技リスト1画面完結=たたかう/ポケモンは勝敗後のメニューに出さない(2026-07-06 阿部さん)
          ['c-fight','c-party'].forEach(id => { const b = $(id); if (b) b.style.display = 'none'; });
          // ★バトルラボ: 「つぎの相手(AI連戦)」は無し(両側とも自由編成の人間操作なので馴染まない=設計§4)。
          // かわりに神の手パネルの「🔄バトルリセット」で同じ編成のまま再戦できる。
          const ind = $('lab-turn-indicator'); if (ind) ind.style.display = 'none';
        });
    return;
  }
  // ★バトルラボ: 死に出しは自分/相手どちらも人間が選ぶ。両方ひんしなら自分→相手の順で1体ずつ選ばせる
  // (labRunForcedQueue。swapトリックで同じ交代画面/doSwitchToを両側に使い回す=設計§4)
  const _needSelf = !!S.sides.self.fainted, _needOpp = !!S.sides.opp.fainted;
  if (_needSelf || _needOpp){
    labForcedQueue = [];
    if (_needSelf) labForcedQueue.push('self');
    if (_needOpp) labForcedQueue.push('opp');
    labRunForcedQueue();
    return;
  }
  turnNo++; updateTurnBadge();   // 次のターンへ(Showdown風 Turnバッジ)
  showActionUI();   // 実機準拠=技リスト直行
}
// ★バトルラボ: 死に出しキュー(自分/相手の順)。1件ずつlabSwapSidesで「いま死に出し中の側」をselfへ
// 一時的に入れ替えてshowParty(true)/doSwitchToを無改造で使い回す(swForced=trueの分岐がlabSwappedを見て
// 真の対応関係へ戻す=doSwitchTo参照)。キューが空になったら次のターンへ進む。
let labForcedQueue = [];
function labRunForcedQueue(){
  if (!labForcedQueue.length){ turnNo++; updateTurnBadge(); showActionUI(); return; }
  const side = labForcedQueue.shift();
  if ((side === 'opp') !== labSwapped) labSwapSides();   // side==='opp'ならswap、'self'ならswap解除、を保証
  pushMsgLine(`${tPokeName(S.sides.self.poke.name)} ${I18N.t('real_battle.faint_replace_prompt','は たおれてしまった… つぎのポケモンを えらんでね')}`);
  $('msgbox').style.display = 'block';   // CH: sayを経由しない案内なので明示的に出す(出さないと選択理由が見えない)
  showParty(true);
  // 案内は一度見せたら引っ込める(交代リストに文字が被る=2026-07-06 阿部さん「一回出たら消えていい」)
  setTimeout(() => { if (S.sides.self.fainted) $('msgbox').style.display = 'none'; }, 2200);
}

// ★オンライン対戦 P1(合言葉ルーム・Supabase・ロックステップ方式) 2026-07-10
// 方式: 両者ともエンジンを回すが「両者の行動+共有乱数シード」で完全に同じ計算をする。
//   - simテスト群がシード付きMath.randomで決定論なのを流用(mulberry32=tools/_sim_engine.jsと同じ)
//   - ホスト=シードの発行者。ゲストの行動を受けてから turnGo(自分の行動+シード) を配る
//   - 死に出しは各自が選び、選択+シードを共有して「ホスト側から」の固定順で両者が適用
// 通信: online/rb_online.js(Supabase Realtime)。設計=設計_オンライン対戦_2026-07-07.md
// ===================================================================
const RB_ONLINE = { active: false, started: false, myAction: null, oppAction: null,
  myTeamSent: false, oppTeamReady: false, myReadySent: false, peerReady: false, pendingRep: null, repInbox: null };
// ★constはwindowプロパティにならない(window.RB_ONLINEはundefined)ため、ガードで参照できるよう明示的に載せる
window.RB_ONLINE = RB_ONLINE;
function m32(a){ return function(){ a |= 0; a = a + 0x6D2B79F5 | 0; var t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
function engineWin(){ try { return $('engine-frame').contentWindow; } catch (e){ return null; } }
function onlineSeedEngine(seed){ const w = engineWin(); if (w) w.Math.random = m32(seed >>> 0); }
function onlineStatus(txt){ const el = $('online-status'); if (el) el.textContent = txt || ''; }
const _olT = (k, ja) => I18N.t('real_battle.' + k, ja);

// --- スクリプト遅延ロード(オンラインを使う人だけsupabase-jsを読む) ---
function _loadScript(src){ return new Promise((res, rej) => { const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s); }); }
async function onlineEnsureLibs(){
  if (window.RBOnline) return;
  await _loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
  await _loadScript('online/supabase-config.js?v=20260710');
  await _loadScript('online/rb_online.js?v=20260711a');
}

// --- 接続と役割 ---
async function onlineConnect(){
  const room = ($('online-room').value || '').trim();
  const name = ($('online-name').value || '').trim() || 'Player';
  if (!room){ onlineStatus(_olT('online_need_room', 'あいことばを いれてね')); return; }
  onlineStatus(_olT('online_connecting', 'せつぞくちゅう…'));
  try {
    await onlineEnsureLibs();
    window.RBHooks = {
      getTeamPayload: () => onlineTeamPayload(),
      onStatus: t => onlineStatus(t),
      onPeerJoined: () => { onlineSendTeamOnce(); },
      onPeerLeft: () => { if (RB_ONLINE.started && !gameOver) onlineOppGone(false); else onlineStatus(_olT('online_peer_left', '相手が退出しました')); },
      applyOpponentTeam: d => onlineApplyOppTeam(d),
      onOpponentAction: a => { RB_ONLINE.oppAction = a; onlineHostTryGo(); },
      onTurnGo: (a, seed) => onlineGuestGo(a, seed),
      onStart: seed => onlineBegin(seed),
      onFaintReplace: (idx, seed) => { RB_ONLINE.repInbox = { idx: idx, seed: seed }; onlineTryApplyReplaces(); },
      onPeerReady: () => { RB_ONLINE.peerReady = true; onlineMaybeReady(); },
      onResign: () => onlineOppGone(true),
    };
    await RBOnline.connect(room, name);
    RB_ONLINE.active = true;
    $('online-connect').style.display = 'none';
    if (RBOnline.peerPresent) onlineSendTeamOnce();
  } catch (e){ onlineStatus(_olT('online_error', 'せつぞくに しっぱいしました: ') + (e && e.message || '')); }
}
function onlineLeave(){
  try { if (window.RBOnline) RBOnline.disconnect(); } catch (e) {}
  RB_ONLINE.active = false; RB_ONLINE.started = false;
  RB_ONLINE.myAction = null; RB_ONLINE.oppAction = null; RB_ONLINE.pendingRep = null; RB_ONLINE.repInbox = null;
  RB_ONLINE.myTeamSent = false; RB_ONLINE.oppTeamReady = false; RB_ONLINE.myReadySent = false; RB_ONLINE.peerReady = false;
  const c = $('online-connect'); if (c) c.style.display = '';
  const st = $('online-start'); if (st) st.style.display = 'none';
  onlineStatus('');
}

// --- チーム交換(自分のs枠→相手のo枠。saveTeamと同じ形) ---
function onlineTeamPayload(){
  const ids = selfIds();
  const pick = obj => Object.fromEntries(ids.map(id => [id, obj[id]]));
  return { size: teamSize, lead: leadSlot.self,
    val: pick(slotVal), item: pick(slotItem), ability: pick(slotAbility), gender: pick(slotGender),
    nature: pick(slotNature), effort: pick(slotEffort),
    moves: Object.fromEntries(ids.map(id => [id, (slotMoves[id] || []).map(m => m && m.name)])) };
}
function onlineSendTeamOnce(){
  if (!RB_ONLINE.active || RB_ONLINE.myTeamSent) return;
  RBOnline.sendTeam();
  RB_ONLINE.myTeamSent = true;
  onlineStatus(_olT('online_team_sent', 'チームを送りました。相手のチームを待っています…'));
  onlineMaybeReady();
}
function onlineApplyOppTeam(d){
  if (!d || !d.val) return;
  if (d.size && d.size !== teamSize){ teamSize = d.size; $('team-size').value = String(teamSize); renderTeamRows(); }
  selfIds().forEach((sid, i) => {
    const oid = oppIds()[i]; if (!oid) return;
    const nm = d.val[sid]; if (!nm || !S.pokeByName(nm)) return;
    slotItem[oid] = d.item && d.item[sid] != null ? d.item[sid] : 'mega_stone_any';
    slotGender[oid] = (d.gender && d.gender[sid]) || genderOfRB(nm);
    slotNature[oid] = (d.nature && d.nature[sid]) || 'まじめ';
    slotEffort[oid] = clampEffortRB((d.effort && d.effort[sid]) || {});
    const poke = S.pokeByName(nm);
    const abS = d.ability && d.ability[sid];
    slotAbility[oid] = (abS && [poke.ab1, poke.ab2, poke.ab3].includes(abS)) ? abS : defaultAbilityRB(poke);
    const all = S.usableMoves(poke);
    const mvs = ((d.moves && d.moves[sid]) || []).map(n => all.find(m => m.name === n)).filter(Boolean);
    slotMoves[oid] = mvs.length === 4 ? mvs : autoMoves(poke);
    setSlot(oid, nm, true);
  });
  const li = selfIds().indexOf(d.lead || 's1');
  leadSlot.opp = oppIds()[li >= 0 ? li : 0];
  RB_ONLINE.oppTeamReady = true;
  onlineMaybeReady();
}
function onlineMaybeReady(){
  if (!RB_ONLINE.active || RB_ONLINE.started) return;
  if (!(RB_ONLINE.myTeamSent && RB_ONLINE.oppTeamReady)) return;
  // 自分の準備完了を相手へ握手(1回だけ)。ホストは「相手もready」まで開始ボタンを出さない
  // (readyなしだと、ゲストがチーム適用を終える前にホストが開始できてしまう=別チームで戦うレース)
  if (!RB_ONLINE.myReadySent){ RB_ONLINE.myReadySent = true; try { RBOnline.sendReady(); } catch (e) {} }
  if (RBOnline.role === 'host'){
    if (!RB_ONLINE.peerReady){ onlineStatus(_olT('online_wait_peer_ready', '相手の じゅんびを まっています…')); return; }
    const btn = $('online-start'); if (btn) btn.style.display = '';
    onlineStatus(_olT('online_ready_host', 'じゅんびOK! 「たいせん かいし」を おしてね'));
  } else {
    onlineStatus(_olT('online_ready_guest', 'じゅんびOK! ホストの かいしを まっています…'));
  }
}

// --- 開始(ホストがシードを配る) ---
function onlineHostStart(){
  if (!RB_ONLINE.active || RBOnline.role !== 'host' || RB_ONLINE.started) return;
  const seed = (Math.random() * 0x7fffffff) | 0;
  RBOnline.sendStart(seed);
  onlineBegin(seed);
}
function onlineBegin(seed){
  RB_ONLINE.started = true; RB_ONLINE.myAction = null; RB_ONLINE.oppAction = null;
  RB_ONLINE.pendingRep = null; RB_ONLINE.repInbox = null;
  const w = engineWin();
  if (w){
    w.__rbDeferFaintReplace = true; w.__rbDeferFaintReplaceOpp = true;
    // 正準サイド=ホスト側(側依存の乱数消費を両クライアントで同じ実体に割り当てる)
    w.__rbCanonFirst = (RBOnline.role === 'host') ? 'self' : 'opp';
  }
  onlineSeedEngine(seed);
  startBattle();
}
function onlineAfterGame(){
  // 勝敗がついたら再戦は接続し直し(P1)。接続は残すが状態はリセット
  RB_ONLINE.started = false;
  onlineStatus(_olT('online_rematch_hint', 'もういちど あそぶには おたがいに「にげる」→ せつぞくし直してね'));
}
function onlineOppGone(resigned){
  if (gameOver) return;
  gameOver = true; bgmStop(); SE.win();
  // scene:win(演出ツクールStep5・上書きオーバーレイ): シート無し=従来のshowResultBannerのまま(挙動不変)。
  { const _wlSheet2 = resolveSceneSheet('win'); if (_wlSheet2) playSceneCueSheet(_wlSheet2, { won: true }); else showResultBanner(true); }
  const ja = resigned ? '相手は こうさんした！ きみの かち！' : '相手が たいせんから 抜けた。きみの かち！';
  say([lineWithFx(ja)], () => { showCmd(true); ['c-fight', 'c-party'].forEach(id => { const b = $(id); if (b) b.style.display = 'none'; }); onlineAfterGame(); });
}

// --- ターン(ロックステップ) ---
function onlineSubmitAction(moveIdx){
  if (RB_ONLINE.myAction) return;   // 二重送信ガード
  const self = S.sides.self;
  // moveIdx=null は2通り: ①交代(switchChoiceがセット済み) ②あばれる等のロック継続(エンジンが技を強制)
  RB_ONLINE.myAction = (moveIdx != null)
    ? { kind: 'move', idx: moveIdx, mega: !!self.megaChoice }
    : (self.switchChoice != null
      ? { kind: 'switch', idx: self.switchChoice, mega: false }
      : { kind: 'lock', mega: false });
  RBOnline.sendAction(RB_ONLINE.myAction);
  pushMsgLine(_olT('online_wait_action', '相手の こうどうを まっています…'));
  $('msgbox').style.display = 'block';
  if (RBOnline.role === 'host') onlineHostTryGo();
}
function onlineHostTryGo(){
  if (!RB_ONLINE.started || !window.RBOnline || RBOnline.role !== 'host') return;
  if (!RB_ONLINE.myAction || !RB_ONLINE.oppAction) return;
  const seed = (Math.random() * 0x7fffffff) | 0;
  RBOnline.sendTurnGo(RB_ONLINE.myAction, seed, turnNo);
  onlineRunTurn(seed);
}
function onlineGuestGo(hostAction, seed){
  if (!RB_ONLINE.started) return;
  RB_ONLINE.oppAction = hostAction;
  onlineRunTurn(seed);
}
function onlineRunTurn(seed){
  const opp = S.sides.opp, a = RB_ONLINE.oppAction || {};
  if (a.kind === 'switch') opp.switchChoice = a.idx;
  else if (a.kind === 'move' && a.idx != null) opp.selectedMoveIdx = a.idx;
  // kind:'lock'(あばれる継続等)は何もセットしない=エンジンのロックが技を強制する
  opp.megaChoice = !!a.mega;
  RB_ONLINE.myAction = null; RB_ONLINE.oppAction = null;
  onlineSeedEngine(seed);
  executeTurn();
}

// --- 死に出し(各自が選ぶ→両者そろってからホスト側優先の固定順で適用=両クライアントの状態一致) ---
function onlineBeginFaintReplace(){
  RB_ONLINE.pendingRep = { needSelf: !!S.sides.self.fainted, needOpp: !!S.sides.opp.fainted,
    selfIdx: null, selfSeed: null, oppIdx: null, oppSeed: null };
  if (RB_ONLINE.pendingRep.needSelf){
    pushMsgLine(`${tPokeName(S.sides.self.poke.name)} ${I18N.t('real_battle.faint_replace_prompt', 'は たおれてしまった… つぎのポケモンを えらんでね')}`);
    $('msgbox').style.display = 'block';
    showParty(true);
    setTimeout(() => { if (S.sides.self.fainted) $('msgbox').style.display = 'none'; }, 2200);
  } else {
    pushMsgLine(_olT('online_wait_replace', '相手が つぎのポケモンを えらんでいます…'));
    $('msgbox').style.display = 'block';
  }
  onlineTryApplyReplaces();   // 相手の選択が先に届いていた場合(repInbox)を回収
}
function onlineTryApplyReplaces(){
  const P = RB_ONLINE.pendingRep; if (!P) return;
  if (P.needOpp && P.oppIdx == null && RB_ONLINE.repInbox){
    P.oppIdx = RB_ONLINE.repInbox.idx; P.oppSeed = RB_ONLINE.repInbox.seed; RB_ONLINE.repInbox = null;
  }
  if (P.needSelf && P.selfIdx == null) return;
  if (P.needOpp && P.oppIdx == null){
    pushMsgLine(_olT('online_wait_replace', '相手が つぎのポケモンを えらんでいます…'));
    $('msgbox').style.display = 'block';
    return;
  }
  RB_ONLINE.pendingRep = null;
  const mine = P.needSelf ? { side: 'self', idx: P.selfIdx, seed: P.selfSeed } : null;
  const theirs = P.needOpp ? { side: 'opp', idx: P.oppIdx, seed: P.oppSeed } : null;
  const order = (window.RBOnline && RBOnline.role === 'host') ? [mine, theirs] : [theirs, mine];
  logPos = S.battleLog.length;
  order.filter(Boolean).forEach(r => { onlineSeedEngine(r.seed); S.attemptSwitch(r.side, r.idx, { ignoreTrapping: true, faintReplace: true }); });
  if (mine){
    const ff = $('f-self'); if (ff){ ff.classList.remove('recall', 'enter'); ff.classList.add('gone'); }
    const pb = $('pb-self'); if (pb) pb.style.visibility = 'hidden';
  }
  renderAll();
  const fresh = reorderEndure(S.battleLog.slice(logPos).filter(e => !/^───/.test(e.msg)));
  say(fresh.flatMap(e => splitBattleLines(e.msg).map(lineWithFx)), () => showActionUI());
}

// --- 選出画面のUI(🌐ボタン+あいことばフォーム) ---
function onlineInitUI(){
  if ($('online-panel')) return;
  const btns = document.querySelector('#setup .btns'); if (!btns) return;
  const wrap = document.createElement('div');
  wrap.id = 'online-panel';
  wrap.style.cssText = 'margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12.5px';
  wrap.innerHTML =
    `<button id="online-open" type="button" style="padding:8px 14px;border-radius:18px;border:2px solid #6a5be0;background:#fff;color:#4638ae;font-weight:800;cursor:pointer">🌐 ${esc2(_olT('online_button', 'オンラインたいせん(あいことば)'))}</button>` +
    `<span id="online-form" style="display:none;gap:6px;align-items:center;flex-wrap:wrap">` +
    `<input id="online-room" placeholder="${esc2(_olT('online_room_ph', 'あいことば'))}" maxlength="24" style="padding:7px 10px;border:1px solid #c9c3e6;border-radius:8px;width:120px">` +
    `<input id="online-name" placeholder="${esc2(_olT('online_name_ph', 'なまえ'))}" maxlength="12" style="padding:7px 10px;border:1px solid #c9c3e6;border-radius:8px;width:90px">` +
    `<button id="online-connect" type="button" style="padding:7px 14px;border-radius:16px;border:0;background:#6a5be0;color:#fff;font-weight:800;cursor:pointer">${esc2(_olT('online_connect', 'せつぞく'))}</button>` +
    `<button id="online-start" type="button" style="display:none;padding:7px 14px;border-radius:16px;border:0;background:#e0564a;color:#fff;font-weight:900;cursor:pointer">⚔ ${esc2(_olT('online_start', 'たいせん かいし'))}</button>` +
    `<span id="online-status" style="color:#6a5fa0;font-weight:700"></span></span>`;
  btns.parentNode.insertBefore(wrap, btns.nextSibling);
  $('online-open').addEventListener('click', () => {
    const f = $('online-form');
    f.style.display = f.style.display === 'none' ? 'inline-flex' : 'none';
  });
  $('online-connect').addEventListener('click', onlineConnect);
  $('online-start').addEventListener('click', onlineHostStart);
}
function esc2(s){ return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }
