// ===== サウンド(Web Audio合成・ファミコン風 — ファイル不要・全部自作波形=権利フリー) =====
// 2026-06-12 阿部さん「音とBGM入れたらそれっぽくなる」。autoplay制限があるので初回クリックで解錠。
let AC = null, sndOn = true;   // ★2026-07-21(阿部さん): 🔊トグル廃止。SEは常時オン=ミュートは音量スライダー(0で無音)のみが担う
let masterVol = null, sndVol = Math.min(1, Math.max(0, parseFloat(localStorage.getItem('rb_vol') || '0.7')));
function dest(){   // 全SE/BGMの出口(音量スライダーが効くマスターゲイン)
  const ctx = ac();
  if (!masterVol){
    masterVol = ctx.createGain(); masterVol.gain.value = sndVol;
    // Wave4 B級: SEマスターコンプ(全SE/BGM共通の最終段に1個・threshold-18dB/ratio6。音量感を均して「前に出る」音に)
    let out = ctx.destination;
    try {
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.setValueAtTime(-18, ctx.currentTime);
      comp.ratio.setValueAtTime(6, ctx.currentTime);
      comp.knee.setValueAtTime(6, ctx.currentTime);
      comp.attack.setValueAtTime(0.003, ctx.currentTime);
      comp.release.setValueAtTime(0.25, ctx.currentTime);
      comp.connect(ctx.destination);
      out = comp;
    } catch (e) { /* DynamicsCompressorNode非対応環境は直結にフォールバック */ }
    masterVol.connect(out);
  }
  return masterVol;
}
function ac(){
  if (!AC){ AC = new (window.AudioContext || window.webkitAudioContext)(); }
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
// ★SE解錠(2026-07-21・阿部さん): 🔊音オン/オフボタン廃止に伴い、旧ボタンのクリックが担っていた
// ユーザージェスチャ解錠を、最初のタップ/クリック全般で肩代わりする(以降SEは無音警告なく鳴る)
document.addEventListener('pointerdown', () => { try { ac(); } catch (e) {} }, { capture: true, once: true });
// 単音(波形・周波数・長さ・音量・ピッチスライド先)
function tone(type, freq, dur, vol, slideTo, when){
  if (!sndOn) return;
  const ctx = ac(), t = when != null ? when : ctx.currentTime;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(dest());
  o.start(t); o.stop(t + dur + 0.02);
}
// ノイズ(打撃用)
function noise(dur, vol, lowpass){
  if (!sndOn) return;
  const ctx = ac(), t = ctx.currentTime;
  const len = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain(); g.gain.value = vol;
  const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lowpass || 1200;
  src.connect(f); f.connect(g); g.connect(dest()); src.start(t);
}
// ノイズ+lowpassスイープ(メガシンカ等のロング音の「うねり」用。Wave3・2026-07-10)
function noiseSweep(dur, vol, fromHz, toHz){
  if (!sndOn) return;
  const ctx = ac(), t = ctx.currentTime;
  const len = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain(); g.gain.value = vol;
  const f = ctx.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(fromHz, t);
  f.frequency.linearRampToValueAtTime(toHz, t + dur);
  src.connect(f); f.connect(g); g.connect(dest()); src.start(t);
}
// 爆発/大技音(白ノイズ+lowpassスイープ+サブベース。大技・KO限定。Wave4 B級・2026-07-10)
function explosionFx(){
  if (!sndOn) return;
  const ctx = ac(), t = ctx.currentTime, dur = 0.6;
  const len = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const f = ctx.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(3000, t);
  f.frequency.exponentialRampToValueAtTime(100, t + 0.4);
  const g = ctx.createGain();
  g.gain.setValueAtTime(1, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  src.connect(f); f.connect(g); g.connect(dest()); src.start(t);
  const o = ctx.createOscillator(), og = ctx.createGain();   // サブベース(小型スピーカ対策の薄い低音)
  o.type = 'sine';
  o.frequency.setValueAtTime(60, t);
  o.frequency.exponentialRampToValueAtTime(30, t + 0.5);
  og.gain.setValueAtTime(0.15, t);   // 低音強すぎFB(2026-07-11 阿部さん)→0.35から半分以下に
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
  o.connect(og); og.connect(dest()); o.start(t); o.stop(t + 0.55);
}
// 効果音いろいろ
const SE = {
  select(){ tone('square', 880, 0.06, 0.12); },
  hit(){ noise(0.16, 0.5, 900); tone('square', 180, 0.12, 0.2, 70); },
  superEff(){ noise(0.25, 0.6, 2200); tone('square', 320, 0.22, 0.25, 60); tone('square', 480, 0.18, 0.18, 90); },
  weak(){ noise(0.1, 0.25, 500); tone('triangle', 140, 0.14, 0.18, 90); },
  crit(){ tone('sawtooth', 1400, 0.1, 0.22, 500); noise(0.2, 0.5, 3000); tone('square', 250, 0.2, 0.2, 60); },
  faint(){ tone('square', 520, 0.5, 0.22, 65); tone('triangle', 260, 0.55, 0.18, 40); },
  heal(){ [523, 659, 784, 1047].forEach((f, i) => tone('square', f, 0.12, 0.14, null, ac().currentTime + i * 0.09)); },
  status(){ tone('square', 330, 0.1, 0.16, 392); tone('square', 392, 0.1, 0.16, 330, null); },
  endure(){ tone('square', 220, 0.1, 0.2, 440); tone('square', 440, 0.14, 0.16, null, ac().currentTime + 0.06); },   // 2026-07-17: こらえた/もちこたえた専用の踏ん張り音
  mega(){ [440, 554, 659, 880, 1109].forEach((f, i) => tone('square', f, 0.16, 0.16, null, ac().currentTime + i * 0.08)); noise(0.5, 0.25, 4000);
    noiseSweep(1.2, 0.16, 200, 2200); },   // Wave3: ロングスウェル(儀式演出の全長にわたるうねり)
  explosion(){ explosionFx(); },   // Wave4 B級: 爆発/大技音(大技・KO限定)

// ===== リアル効果音(mp3ファイル・Splice素材=ユーザーDL済ロイヤリティフリー・2026-07-21) =====
// 合成SE(SE={...})とは別レイヤーとして共存(既存hitClass等は変更しない=上書きでなく重ね鳴らし)。
// pbBgm(直上ブロック)と同じ読み込みパターン(fetch+decodeAudioData+Mapキャッシュ)をワンショット/ループに流用。
// 出口は必ずdest()(既存マスターゲイン=音量スライダーrb_volが効く)を経由する。
const fileSeBufCache = new Map();   // ファイル名(拡張子抜き) → Promise<AudioBuffer|null>
function fileSeLoadBuffer(name){
  if (fileSeBufCache.has(name)) return fileSeBufCache.get(name);
  const p = fetch('assets/se/' + name + '.mp3')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.arrayBuffer(); })
    .then(ab => ac().decodeAudioData(ab))
    .catch(e => { console.warn('[fileSE] load failed(オフライン等):', name, e); fileSeBufCache.delete(name); return null; });
  fileSeBufCache.set(name, p);
  return p;
}
// ワンショット再生(gain省略時=1)。dest()経由なので音量スライダー/コンプ共通。
async function fileSePlay(name, gain){
  const buf = await fileSeLoadBuffer(name);
  if (!buf) return;
  const ctx = ac();
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain(); g.gain.value = gain != null ? gain : 1;
  src.connect(g); g.connect(dest());
  src.start();
}
// いわ技(ダメージ技のみ・変化技のロックカット/すなあらし/ワイドガード/ステルスロックは除外)→いわなだれ風の崩落音

// 天候ループ(2026-07-21 阿部さん指示=経路非依存の共通化構造): 天候の「種類→ループSEファイル名」マップ。
// 発生経路(特性いかく/あめふらし・技あまごい/あまいます等・神の手)に関係なく、天候がその種になったら
// fileSeWeatherSet(kind)を呼べば開始し、変わる/終わる時に呼べば止まる(全経路が下の天候分類ブロック1箇所を通る)。
// 値が無い天候(ファイル未整備)はfileSeLoadBufferのfetch失敗→console.warnで無音のまま安全に壊れない(pbBgmと同じ流儀)。
// 後日ファイルをassets/se/に置くだけで、コード変更なしに鳴り始める。
const WEATHER_SE = { sand: 'se_sandstorm_loop', rain: 'se_rain_loop', snow: 'se_snow_loop' };
let fileSeWeatherSrc = null, fileSeWeatherGain = null, fileSeWeatherWant = null;   // want=現在望まれている天候kind文字列(null=無音)
function fileSeWeatherGraph(){
  const ctx = ac();
  if (!fileSeWeatherGain){ fileSeWeatherGain = ctx.createGain(); fileSeWeatherGain.gain.value = 0.5; fileSeWeatherGain.connect(dest()); }
}
function fileSeWeatherStopSrc(){
  if (fileSeWeatherSrc){
    try { fileSeWeatherSrc.stop(); } catch (e) {}
    fileSeWeatherSrc = null;
  }
  fileSeUpdateDebug();   // 何もしていなくても(既に無音でも)呼び出し側の状態確認に必ず反映する
}
// kind: 'sand'|'rain'|'sun'|'snow'|null。WEATHER_SEに無いkind(sun/snow等ファイル未整備)は前のループを止めて
// 無音に戻すだけ(=想定どおり)。myWantトークン比較でpbBgmApplyと同じ「待ってる間に状態が変わったら捨てる」設計。
async function fileSeWeatherSet(kind){
  if (fileSeWeatherWant === kind) return;   // 変化なし(二重start/二重stop防止)
  fileSeWeatherWant = kind;
  fileSeWeatherStopSrc();   // 前の天候ループは即停止(次のkindが無音/未対応でも必ず止まる)
  const name = kind && WEATHER_SE[kind];
  if (!name) return;   // 対応ファイル無し→無音のまま安全側
  const myWant = kind;
  const buf = await fileSeLoadBuffer(name);
  if (!buf || fileSeWeatherWant !== myWant) return;   // 読み込み中に天候が変わった/取り消された→この結果は捨てる
  fileSeWeatherGraph();
  const ctx = ac();
  const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
  src.connect(fileSeWeatherGain);
  src.start();
  fileSeWeatherSrc = src;
  fileSeUpdateDebug();
}
function fileSeUpdateDebug(){   // テスト/検証用フック(Playwright等から再生状態を覗く)
  window.__seDebug = {
    weatherLoopPlaying: !!fileSeWeatherSrc,
    weatherLoopKind: fileSeWeatherWant,
    bufferedFileSE: Array.from(fileSeBufCache.keys()),
  };
}

// ===== BGM(mp3ループ・タスク#19 2026-07-20 阿部さん指示 / ギャップレス化 2026-07-21) =====
// 既定OFF(自動再生ポリシー+UX)。🎵トグルでON、状態はlocalStorage(pcham_bgm_on)に記憶。
// ★2026-07-21(阿部さんFB=ループの継ぎ目が聞こえる): <audio loop>方式を撤去し、Web Audioで
// decodeAudioData→AudioBufferSourceNode(loop=true)によるサンプル精度ループに切替え。mp3エンコーダの
// priming/tail padding(無音の数十ms)を振幅スキャンでよけたloopStart/loopEndを使い、「実際に鳴っている
// 音」の頭と尻尾だけをループすることで耳に聞こえる継ぎ目を消す。
// SEに埋もれない控えめゲイン(0.35=pbBgmGainNode)を挟んで、既存マスター音量スライダー(masterVol)にも
// dest()経由で連動させる(スライダーを動かすとBGMも一緒に変わる/0で無音のままは不変)。
// ★2026-07-21: 旧合成chiptune BGM(bgmStart/bgmStop)は二重再生バグのため撤去済み。<audio>要素方式も本改修で撤去。
let pbBgmOn = localStorage.getItem('pcham_bgm_on') === '1';
let pbBgmGainNode = null, pbBgmSrcNode = null, pbBgmCurTrack = null, pbBgmScene_ = null, pbBgmPickerPrevScene = null;
const PB_BGM_VER = '20260721b';
const pbBgmBufCache = new Map();   // scene名 → Promise<{buffer,loopStart,loopEnd}|null>(トラックごとに1ページ1回だけfetch)
let pbBgmApplyToken = 0;   // シーン切替の競合防止(遅れて解決したfetchが後から古いシーンを鳴らすのを防ぐ)
// 振幅がしきい値を超える最初/最後のサンプルをスキャンし、mp3エンコーダのpadding抜きの実音区間を[loopStart,loopEnd]にする
function pbBgmFindLoopBounds(buf){
  const THRESH = 0.001, ch = buf.getChannelData(0), n = ch.length;
  let start = 0, end = n - 1, found = false;
  for (let i = 0; i < n; i++){ if (Math.abs(ch[i]) > THRESH){ start = i; found = true; break; } }
  for (let i = n - 1; i >= 0; i--){ if (Math.abs(ch[i]) > THRESH){ end = i; break; } }
  if (!found || end <= start){ start = 0; end = n - 1; }   // 検出できなければ全長にフォールバック(無音になるよりまし)
  return { loopStart: start / buf.sampleRate, loopEnd: end / buf.sampleRate };
}
function pbBgmLoadBuffer(scene){
  if (pbBgmBufCache.has(scene)) return pbBgmBufCache.get(scene);
  const p = fetch('assets/bgm/pb_' + scene + '.mp3?v=' + PB_BGM_VER)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.arrayBuffer(); })
    .then(ab => ac().decodeAudioData(ab))
    .then(buf => Object.assign({ buffer: buf }, pbBgmFindLoopBounds(buf)))
    .catch(e => { console.warn('[pbBgm] track load failed(オフライン等):', scene, e); pbBgmBufCache.delete(scene); return null; });
  pbBgmBufCache.set(scene, p);
  return p;
}
function pbBgmGraph(){
  const ctx = ac();
  if (!pbBgmGainNode){ pbBgmGainNode = ctx.createGain(); pbBgmGainNode.gain.value = 0.35; pbBgmGainNode.connect(dest()); }
}
// 再生中の音源を短いフェードアウト(~30ms)でクリックなく止める(シーン切替/OFF共通)
function pbBgmStopSrc(){
  if (!pbBgmSrcNode) return;
  const src = pbBgmSrcNode, fadeG = src._pbFadeGain; pbBgmSrcNode = null;
  try {
    const ctx = ac(), t = ctx.currentTime;
    if (fadeG){ fadeG.gain.cancelScheduledValues(t); fadeG.gain.setValueAtTime(fadeG.gain.value, t); fadeG.gain.linearRampToValueAtTime(0, t + 0.03); }
    src.stop(t + 0.03);
  } catch (e) { try { src.stop(); } catch (e2) {} }
}
function pbBgmStartSrc(data, scene){
  pbBgmStopSrc();
  pbBgmGraph();
  const ctx = ac();
  const src = ctx.createBufferSource();
  src.buffer = data.buffer; src.loop = true; src.loopStart = data.loopStart; src.loopEnd = data.loopEnd;
  const fadeG = ctx.createGain(); fadeG.gain.value = 1;
  src.connect(fadeG); fadeG.connect(pbBgmGainNode);
  src._pbFadeGain = fadeG;
  src.start(ctx.currentTime, data.loopStart);
  pbBgmSrcNode = src; pbBgmCurTrack = scene;
  pbBgmUpdateDebug();
}
function pbBgmUpdateDebug(){   // テスト/検証用フック(Playwright等から再生状態を覗く)
  window.__pbBgmDebug = {
    playing: !!pbBgmSrcNode, scene: pbBgmScene_,
    loopStart: pbBgmSrcNode ? pbBgmSrcNode.loopStart : null,
    loopEnd: pbBgmSrcNode ? pbBgmSrcNode.loopEnd : null,
    buffered: Array.from(pbBgmBufCache.keys()),
  };
}
async function pbBgmApply(){
  if (!pbBgmScene_){ pbBgmStop(); return; }
  const scene = pbBgmScene_;
  if (pbBgmSrcNode && pbBgmCurTrack === scene) return;   // 既に同じ曲が再生中なら継ぎ目なしループを維持(再スタートしない)
  const myToken = ++pbBgmApplyToken;
  const ctx = ac();
  try { if (ctx.state === 'suspended') await ctx.resume(); } catch (e) {}
  const data = await pbBgmLoadBuffer(scene);
  if (myToken !== pbBgmApplyToken || !pbBgmOn || pbBgmScene_ !== scene) return;   // 待ってる間に状態が変わった→この結果は捨てる
  if (!data) return;   // fetch/decode失敗(オフライン等)。console.warnはpbBgmLoadBuffer側で1回済み・UIは無音のまま継続
  pbBgmStartSrc(data, scene);
}
function pbBgmStop(){ pbBgmApplyToken++; pbBgmStopSrc(); pbBgmUpdateDebug(); }
// scene = 'battle' | 'lobby' | 'select' | null(そのシーンでは無音)。ON/OFFに関係なく常に呼んでよい(内部でpbBgmOnを見る)
// 'lobby'=セットアップ(編成)画面・'select'=ポケモン/技ピッカーを開いている間・'battle'=バトル画面(2026-07-21)
function pbBgmSetScene(scene){
  pbBgmScene_ = scene;
  if (pbBgmOn) pbBgmApply(); else pbBgmStop();
  // ★リアルSE: バトル画面(scene==='battle')以外に切り替わる=退室/勝敗確定/交代画面等は必ず
  // 砂嵐ループを止める(2026-07-21・天候演出のライフサイクルとは独立の安全弁。冪等=既に止まっていてもOK)
  if (scene !== 'battle') fileSeWeatherSet(null);
}

let lastTgt = null;   // 直前のダメージ対象(「こうかは…」「きゅうしょ」は直後の行で飛んでくる)
let _hitFxDelay = 0;  // Wave1: 直前の飛翔体の飛翔ms(こうか/きゅうしょ行のflash/soundを着弾と同じ拍に重ねる用)

// ===== fx_primitives.js へ移設(演出ツクール Step2a 2026-07-11) =====
// popText/burstFx/spawnBurstParticles/spawnBurstRing/spawnBurstGlyph/moveClassOf/shapeOf/
// _RB_CLS_ICON/_RB_CLS_DOT/_RB_BEAM_CLS/_SHAPE_FLAG_ORDER/_SHAPE_ICON/_RB_BEAM_SHAPES/_RB_BEAM_SHAPE_CLASS/
// _RB_PROJ_DOT_SHAPES/fxPoint/spawnProjectile/spawnBeam/attackFx/chargeFx/knockbackFx/impactFrameFx/
// chromaticAberrationFx/_shakeTick/fieldShake は fx_primitives.js(<head>で読み込み済み)へ移設。定義はそちらを参照。
// ===== fx_primitives.js へ移設(演出ツクール Step2b 2026-07-11) =====
// rankFx/sparkleFx/screenFlash/megaFx/_koCollectAnims/koSlowFx/_WALL_CLASS/showWallFx/hideWallFx/

// sendOutFx/recallFx/faintFx は fx_primitives.js(<head>で読み込み済み)へ移設。定義はそちらを参照。

// ログ1行 → テキスト+演出(HPバー同期・タイプ色バースト・ダメージ数字・こうか/急所・状態異常・天候・メガ)
// 交代の複合行「Xは引っ込んだ！ Yが場に出た！」を2拍(2行)に割る(言葉でじっくり見せる=2026-07-06 阿部さん)
// きあいのタスキ/がんじょう/こらえるの「もちこたえた！」はエンジンがダメージ計算中に先に出す=ダメージ行より前に来る。
// 表示では「攻撃で1になった→タスキで耐えた」の順が自然なので、直後のダメージ行と入れ替える(2026-07-07 阿部さん)
function reorderEndure(entries){
  const isEndure = m => /(もちこたえた|こらえた)！$/.test(m);
  const isDmg = m => /ダメージ！/.test(m);
  // きゅうしょ/こうかは行=ダメージと同じ拍の付随行(2026-07-16 阿部さん実機FB:「ばつぐんはダメージと一緒、
  // タスキはその後」)。タスキ行は自分のダメージ行1つ+それに続く付随行を越えた位置まで送る。
  // ★連続技: 次のヒットのダメージ行(isDmg)はまたがない=そのヒットの拍のままにする(1発分だけ越える)。
  const isBeatTail = m => m === 'きゅうしょに あたった！' || /^こうかは /.test(m);
  for (let i = 0; i < entries.length - 1; i++){
    if (isEndure(entries[i].msg) && isDmg(entries[i + 1].msg)){
      const tmp = entries[i]; entries[i] = entries[i + 1]; entries[i + 1] = tmp;

  eb.textContent = I18N.t('battle_lab.end_battle', 'おわる');
  eb.style.display = '';
}
// 「おわる」= 従来どおりのgameOver確定(ここで初めてgameOver=trueにする。これより前には一度も立てない)。
function labEndBattleChoice(){
  gameOver = true;
  labChoicePending = false;
  labReviveFlow = false;
  labUndoSnap = null; try { updateLabUndoButton(); } catch (e) {}   // ★A3: 勝敗確定後は戻さない
  const rc = $('c-revive-continue'); if (rc) rc.style.display = 'none';
  const eb = $('c-end-battle'); if (eb) eb.style.display = 'none';
}
// 「♻ふっかつしてつづける」= 全滅側を1体ずつ復活対象キューに入れ、labForcedQueueと同じ交代画面
// (♻ふっかつボタン付き)に流す。ここでも一度もgameOverは立てない(=最初から立てていないので巻き戻しも無い)。
function labReviveContinue(){
  labChoicePending = false;
  hideResultBanner();
  // 任意確認(2026-07-17レビューWF): scene cue(win/lose演出シート)由来のオーバーレイが残っていたら掃除
  // (シート未設定なら従来showResultBannerのみ=上のhideResultBannerで済んでいる)
  try { if (typeof clearSceneCueFx === 'function') clearSceneCueFx(); } catch (e) {}
  const rc = $('c-revive-continue'); if (rc) rc.style.display = 'none';
  const eb = $('c-end-battle'); if (eb) eb.style.display = 'none';
  ['c-fight','c-party'].forEach(id => { const b = $(id); if (b) b.style.display = ''; });
  // ★M2(2026-07-17): つづける=バトル続行なのでBGMも再開
  pbBgmSetScene('battle');   // ★タスク#19: mp3 BGMは独立トグルなのでsndOnと無関係に続行
  if (labSwapped) labSwapSides();   // 判定は非swap前提
  labReviveFlow = true;   // ★H4: この死に出しは復活経由=全滅側でも♻ふっかつ付き交代画面を出してよい
  labForcedQueue = [];
  // ★H2(2026-07-17): 相打ち/全滅時、非全滅側でも場のポケモンがひんしなら取りこぼさず一緒に死に出しへ
  ['self', 'opp'].forEach(k => { if (labSideDead(k) || S.sides[k].fainted) labForcedQueue.push(k); });
  if (!labForcedQueue.length){ labReviveFlow = false; labBeginTurn(); return; }   // 理論上到達しない保険
  labRunForcedQueue();
}

// ===================================================================
// ★オンライン対戦 P1(合言葉ルーム・Supabase・ロックステップ方式) 2026-07-10
// 方式: 両者ともエンジンを回すが「両者の行動+共有乱数シード」で完全に同じ計算をする。
//   - simテスト群がシード付きMath.randomで決定論なのを流用(mulberry32=tools/_sim_engine.jsと同じ)
//   - ホスト=シードの発行者。ゲストの行動を受けてから turnGo(自分の行動+シード) を配る
//   - 死に出しは各自が選び、選択+シードを共有して「ホスト側から」の固定順で両者が適用
// 通信: online/rb_online.js(Supabase Realtime)。設計=設計_オンライン対戦_2026-07-07.md
// ===================================================================
const RB_ONLINE = { active: false, started: false, myAction: null, oppAction: null,
  myTeamSent: false, oppTeamReady: false, myReadySent: false, peerReady: false, pendingRep: null, repInbox: null };
// ★constはwindowプロパティにならない(window.RB_ONLINEはundefined)ため、ガードで参照できるよう明示的に載せる
window.RB_ONLINE = RB_ONLINE;
function m32(a){ return function(){ a |= 0; a = a + 0x6D2B79F5 | 0; var t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
function engineWin(){ try { return $('engine-frame').contentWindow; } catch (e){ return null; } }
function onlineSeedEngine(seed){ const w = engineWin(); if (w) w.Math.random = m32(seed >>> 0); }
function onlineStatus(txt){ const el = $('online-status'); if (el) el.textContent = txt || ''; }
const _olT = (k, ja) => I18N.t('real_battle.' + k, ja);

// --- スクリプト遅延ロード(オンラインを使う人だけsupabase-jsを読む) ---
function _loadScript(src){ return new Promise((res, rej) => { const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.head.appendChild(s); }); }
async function onlineEnsureLibs(){
  if (window.RBOnline) return;
  await _loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
  await _loadScript('online/supabase-config.js?v=20260710');
  await _loadScript('online/rb_online.js?v=20260711a');
}

// --- 接続と役割 ---
async function onlineConnect(){
  const room = ($('online-room').value || '').trim();
  const name = ($('online-name').value || '').trim() || 'Player';
  if (!room){ onlineStatus(_olT('online_need_room', 'あいことばを いれてね')); return; }
  onlineStatus(_olT('online_connecting', 'せつぞくちゅう…'));
  try {
    await onlineEnsureLibs();
    window.RBHooks = {
      getTeamPayload: () => onlineTeamPayload(),
      onStatus: t => onlineStatus(t),
      onPeerJoined: () => { onlineSendTeamOnce(); },
      onPeerLeft: () => { if (RB_ONLINE.started && !gameOver) onlineOppGone(false); else onlineStatus(_olT('online_peer_left', '相手が退出しました')); },
      applyOpponentTeam: d => onlineApplyOppTeam(d),
      onOpponentAction: a => { RB_ONLINE.oppAction = a; onlineHostTryGo(); },
      onTurnGo: (a, seed) => onlineGuestGo(a, seed),
      onStart: seed => onlineBegin(seed),
      onFaintReplace: (idx, seed) => { RB_ONLINE.repInbox = { idx: idx, seed: seed }; onlineTryApplyReplaces(); },
      onPeerReady: () => { RB_ONLINE.peerReady = true; onlineMaybeReady(); },
      onResign: () => onlineOppGone(true),
    };
    await RBOnline.connect(room, name);
    RB_ONLINE.active = true;
    $('online-connect').style.display = 'none';
    if (RBOnline.peerPresent) onlineSendTeamOnce();
  } catch (e){ onlineStatus(_olT('online_error', 'せつぞくに しっぱいしました: ') + (e && e.message || '')); }
}
function onlineLeave(){
  try { if (window.RBOnline) RBOnline.disconnect(); } catch (e) {}
  RB_ONLINE.active = false; RB_ONLINE.started = false;
  RB_ONLINE.myAction = null; RB_ONLINE.oppAction = null; RB_ONLINE.pendingRep = null; RB_ONLINE.repInbox = null;
  RB_ONLINE.myTeamSent = false; RB_ONLINE.oppTeamReady = false; RB_ONLINE.myReadySent = false; RB_ONLINE.peerReady = false;
  const c = $('online-connect'); if (c) c.style.display = '';
  const st = $('online-start'); if (st) st.style.display = 'none';
  onlineStatus('');
}

// --- チーム交換(自分のs枠→相手のo枠。saveTeamと同じ形) ---
function onlineTeamPayload(){
  const ids = selfIds();
  const pick = obj => Object.fromEntries(ids.map(id => [id, obj[id]]));
  return { size: teamSize, lead: leadSlot.self,
    val: pick(slotVal), item: pick(slotItem), ability: pick(slotAbility), gender: pick(slotGender),
    nature: pick(slotNature), effort: pick(slotEffort),
    moves: Object.fromEntries(ids.map(id => [id, (slotMoves[id] || []).map(m => m && m.name)])) };
}
function onlineSendTeamOnce(){
  if (!RB_ONLINE.active || RB_ONLINE.myTeamSent) return;
  RBOnline.sendTeam();
  RB_ONLINE.myTeamSent = true;
  onlineStatus(_olT('online_team_sent', 'チームを送りました。相手のチームを待っています…'));
  onlineMaybeReady();
}
function onlineApplyOppTeam(d){
  if (!d || !d.val) return;
  if (d.size && d.size !== teamSize){ teamSize = d.size; $('team-size').value = String(teamSize); renderTeamRows(); }
  selfIds().forEach((sid, i) => {
    const oid = oppIds()[i]; if (!oid) return;
    const nm = d.val[sid]; if (!nm || !S.pokeByName(nm)) return;
    slotItem[oid] = normMegaKeyRB(d.item && d.item[sid] != null ? d.item[sid] : 'mega_stone_any');   // ★2026-07-18: 相手チーム由来も正規化
    slotGender[oid] = (d.gender && d.gender[sid]) || genderOfRB(nm);
    slotNature[oid] = (d.nature && d.nature[sid]) || 'まじめ';
    slotEffort[oid] = clampEffortRB((d.effort && d.effort[sid]) || {});
    const poke = S.pokeByName(nm);
    const abS = d.ability && d.ability[sid];
    slotAbility[oid] = (abS && [poke.ab1, poke.ab2, poke.ab3].includes(abS)) ? abS : defaultAbilityRB(poke);
    const all = S.usableMoves(poke);
    const mvs = ((d.moves && d.moves[sid]) || []).map(n => all.find(m => m.name === n)).filter(Boolean);
    slotMoves[oid] = mvs.length === 4 ? mvs : autoMoves(poke);
    setSlot(oid, nm, true);
  });
  const li = selfIds().indexOf(d.lead || 's1');
  leadSlot.opp = oppIds()[li >= 0 ? li : 0];
  RB_ONLINE.oppTeamReady = true;
  onlineMaybeReady();
}
function onlineMaybeReady(){
  if (!RB_ONLINE.active || RB_ONLINE.started) return;
  if (!(RB_ONLINE.myTeamSent && RB_ONLINE.oppTeamReady)) return;
  // 自分の準備完了を相手へ握手(1回だけ)。ホストは「相手もready」まで開始ボタンを出さない
  // (readyなしだと、ゲストがチーム適用を終える前にホストが開始できてしまう=別チームで戦うレース)
  if (!RB_ONLINE.myReadySent){ RB_ONLINE.myReadySent = true; try { RBOnline.sendReady(); } catch (e) {} }
  if (RBOnline.role === 'host'){
    if (!RB_ONLINE.peerReady){ onlineStatus(_olT('online_wait_peer_ready', '相手の じゅんびを まっています…')); return; }
    const btn = $('online-start'); if (btn) btn.style.display = '';
    onlineStatus(_olT('online_ready_host', 'じゅんびOK! 「たいせん かいし」を おしてね'));
  } else {
    onlineStatus(_olT('online_ready_guest', 'じゅんびOK! ホストの かいしを まっています…'));
  }
}

// --- 開始(ホストがシードを配る) ---
function onlineHostStart(){
  if (!RB_ONLINE.active || RBOnline.role !== 'host' || RB_ONLINE.started) return;
  const seed = (Math.random() * 0x7fffffff) | 0;
  RBOnline.sendStart(seed);
  onlineBegin(seed);
}
function onlineBegin(seed){
  RB_ONLINE.started = true; RB_ONLINE.myAction = null; RB_ONLINE.oppAction = null;
  RB_ONLINE.pendingRep = null; RB_ONLINE.repInbox = null;
  const w = engineWin();
  if (w){
    w.__rbDeferFaintReplace = true; w.__rbDeferFaintReplaceOpp = true;
    // 正準サイド=ホスト側(側依存の乱数消費を両クライアントで同じ実体に割り当てる)
    w.__rbCanonFirst = (RBOnline.role === 'host') ? 'self' : 'opp';
  }
  onlineSeedEngine(seed);
  startBattle();
}
function onlineAfterGame(){
  // 勝敗がついたら再戦は接続し直し(P1)。接続は残すが状態はリセット
  RB_ONLINE.started = false;
  onlineStatus(_olT('online_rematch_hint', 'もういちど あそぶには おたがいに「にげる」→ せつぞくし直してね'));
}
function onlineOppGone(resigned){
  if (gameOver) return;
  gameOver = true; pbBgmSetScene('champion'); SE.win();   // ★2026-07-21: 勝ち曲
  // scene:win(演出ツクールStep5・上書きオーバーレイ): シート無し=従来のshowResultBannerのまま(挙動不変)。
  { const _wlSheet2 = resolveSceneSheet('win'); if (_wlSheet2) playSceneCueSheet(_wlSheet2, { won: true }); else showResultBanner(true); }
  const ja = resigned ? '相手は こうさんした！ きみの かち！' : '相手が たいせんから 抜けた。きみの かち！';
  say([lineWithFx(ja)], () => { showCmd(true); ['c-fight', 'c-party'].forEach(id => { const b = $(id); if (b) b.style.display = 'none'; }); onlineAfterGame(); });
}

// --- ターン(ロックステップ) ---
function onlineSubmitAction(moveIdx){
  if (RB_ONLINE.myAction) return;   // 二重送信ガード
  const self = S.sides.self;
  // moveIdx=null は2通り: ①交代(switchChoiceがセット済み) ②あばれる等のロック継続(エンジンが技を強制)
  RB_ONLINE.myAction = (moveIdx != null)
    ? { kind: 'move', idx: moveIdx, mega: !!self.megaChoice }
    : (self.switchChoice != null
      ? { kind: 'switch', idx: self.switchChoice, mega: false }
      : { kind: 'lock', mega: false });
  RBOnline.sendAction(RB_ONLINE.myAction);
  pushMsgLine(_olT('online_wait_action', '相手の こうどうを まっています…'));
  $('msgbox').style.display = 'block';
  if (RBOnline.role === 'host') onlineHostTryGo();
}
function onlineHostTryGo(){
  if (!RB_ONLINE.started || !window.RBOnline || RBOnline.role !== 'host') return;
  if (!RB_ONLINE.myAction || !RB_ONLINE.oppAction) return;
  const seed = (Math.random() * 0x7fffffff) | 0;
  RBOnline.sendTurnGo(RB_ONLINE.myAction, seed, turnNo);
  onlineRunTurn(seed);
}
function onlineGuestGo(hostAction, seed){
  if (!RB_ONLINE.started) return;
  RB_ONLINE.oppAction = hostAction;
  onlineRunTurn(seed);
}
function onlineRunTurn(seed){
  const opp = S.sides.opp, a = RB_ONLINE.oppAction || {};
  if (a.kind === 'switch') opp.switchChoice = a.idx;
  else if (a.kind === 'move' && a.idx != null) opp.selectedMoveIdx = a.idx;
  // kind:'lock'(あばれる継続等)は何もセットしない=エンジンのロックが技を強制する
  opp.megaChoice = !!a.mega;
  RB_ONLINE.myAction = null; RB_ONLINE.oppAction = null;
  onlineSeedEngine(seed);
  executeTurn();
}

// --- 死に出し(各自が選ぶ→両者そろってからホスト側優先の固定順で適用=両クライアントの状態一致) ---
function onlineBeginFaintReplace(){
  RB_ONLINE.pendingRep = { needSelf: !!S.sides.self.fainted, needOpp: !!S.sides.opp.fainted,
    selfIdx: null, selfSeed: null, oppIdx: null, oppSeed: null };
  if (RB_ONLINE.pendingRep.needSelf){
    pushMsgLine(`${tPokeName(S.sides.self.poke.name)} ${I18N.t('real_battle.faint_replace_prompt', 'は たおれてしまった… つぎのポケモンを えらんでね')}`);
    $('msgbox').style.display = 'block';
    showParty(true);
    setTimeout(() => { if (S.sides.self.fainted) $('msgbox').style.display = 'none'; }, 2200);
  } else {
    pushMsgLine(_olT('online_wait_replace', '相手が つぎのポケモンを えらんでいます…'));
    $('msgbox').style.display = 'block';
  }
  onlineTryApplyReplaces();   // 相手の選択が先に届いていた場合(repInbox)を回収
}
function onlineTryApplyReplaces(){
  const P = RB_ONLINE.pendingRep; if (!P) return;
  if (P.needOpp && P.oppIdx == null && RB_ONLINE.repInbox){
    P.oppIdx = RB_ONLINE.repInbox.idx; P.oppSeed = RB_ONLINE.repInbox.seed; RB_ONLINE.repInbox = null;
  }
  if (P.needSelf && P.selfIdx == null) return;
  if (P.needOpp && P.oppIdx == null){
    pushMsgLine(_olT('online_wait_replace', '相手が つぎのポケモンを えらんでいます…'));
    $('msgbox').style.display = 'block';
    return;
  }
  RB_ONLINE.pendingRep = null;
  const mine = P.needSelf ? { side: 'self', idx: P.selfIdx, seed: P.selfSeed } : null;
  const theirs = P.needOpp ? { side: 'opp', idx: P.oppIdx, seed: P.oppSeed } : null;
  const order = (window.RBOnline && RBOnline.role === 'host') ? [mine, theirs] : [theirs, mine];
  logPos = S.battleLog.length;
  order.filter(Boolean).forEach(r => { onlineSeedEngine(r.seed); S.attemptSwitch(r.side, r.idx, { ignoreTrapping: true, faintReplace: true }); });
  if (mine){
    const ff = $('f-self'); if (ff){ ff.classList.remove('recall', 'enter'); ff.classList.add('gone'); }
    const pb = $('pb-self'); if (pb) pb.style.visibility = 'hidden';
  }
  renderAll();
  const fresh = reorderEndure(S.battleLog.slice(logPos).filter(e => !/^───/.test(e.msg)));
  say(fresh.flatMap(e => splitBattleLines(e.msg).map(lineWithFx)), () => showActionUI());
}

// --- 選出画面のUI(🌐ボタン+あいことばフォーム) ---
function onlineInitUI(){
  if ($('online-panel')) return;
  const btns = document.querySelector('#setup .btns'); if (!btns) return;
  const wrap = document.createElement('div');
  wrap.id = 'online-panel';
  wrap.style.cssText = 'margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12.5px';
  wrap.innerHTML =
    `<button id="online-open" type="button" style="padding:8px 14px;border-radius:18px;border:2px solid #6a5be0;background:#fff;color:#4638ae;font-weight:800;cursor:pointer">🌐 ${esc2(_olT('online_button', 'オンラインたいせん(あいことば)'))}</button>` +
    `<span id="online-form" style="display:none;gap:6px;align-items:center;flex-wrap:wrap">` +
    `<input id="online-room" placeholder="${esc2(_olT('online_room_ph', 'あいことば'))}" maxlength="24" style="padding:7px 10px;border:1px solid #c9c3e6;border-radius:8px;width:120px">` +
    `<input id="online-name" placeholder="${esc2(_olT('online_name_ph', 'なまえ'))}" maxlength="12" style="padding:7px 10px;border:1px solid #c9c3e6;border-radius:8px;width:90px">` +
    `<button id="online-connect" type="button" style="padding:7px 14px;border-radius:16px;border:0;background:#6a5be0;color:#fff;font-weight:800;cursor:pointer">${esc2(_olT('online_connect', 'せつぞく'))}</button>` +
    `<button id="online-start" type="button" style="display:none;padding:7px 14px;border-radius:16px;border:0;background:#e0564a;color:#fff;font-weight:900;cursor:pointer">⚔ ${esc2(_olT('online_start', 'たいせん かいし'))}</button>` +
    `<span id="online-status" style="color:#6a5fa0;font-weight:700"></span></span>`;
  btns.parentNode.insertBefore(wrap, btns.nextSibling);
  $('online-open').addEventListener('click', () => {
    const f = $('online-form');
    f.style.display = f.style.display === 'none' ? 'inline-flex' : 'none';
  });
  $('online-connect').addEventListener('click', onlineConnect);
  $('online-start').addEventListener('click', onlineHostStart);
}
function esc2(s){ return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }
